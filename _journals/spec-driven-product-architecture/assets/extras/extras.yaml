extras:
  - file: "screenshot_product_architecture_index.png"
    description: "Screenshot of the Spec-Driven Product Architectures overview page, showing the searchable catalog of generated product-domain architecture examples across marketplaces, mobility, travel, finance, biotech, and technical infrastructure."

  - file: "screenshot_start_page_of_one_product_architecture.png"
    description: "Screenshot of the Real Estate Marketplace start page, showing the domain entry cards for strategy, product architecture, teams, objectives, KTLO, and releases."

  - file: "screenshot_customers_overview.png"
    description: "Screenshot of the Real Estate Marketplace customers overview, showing customer segments such as committed home buyers, individual sellers, agency growth managers, and broker integration partners with cares, wins, and fears."

  - file: "screenshot_customer_jobs_to_be_done.png"
    description: "Screenshot of the Committed Home Buyer / Tenant Seeker Jobs To Be Done comic view, showing illustrated steps for discovering, evaluating, shortlisting, and monitoring the right property."

  - file: "screenshot_customer_journeys.png"
    description: "Screenshot of the Committed Home Buyer / Tenant Seeker journey view, showing a future-state journey vision and staged journey panels from trigger through retention."

  - file: "screenshot_customer_kpis.png"
    description: "Screenshot of the Committed Home Buyer / Tenant Seeker KPI view, showing the customer outcomes tree with success rate, search efficiency, decision confidence, and supporting KPI leaves."

  - file: "screenshot_customer_product_vision.png"
    description: "Screenshot of the Committed Home Buyer / Tenant Seeker product vision view, showing one-year, three-year, and five-year horizons with business KPIs, customer KPIs, milestones, and the long-term vision."

  - file: "screenshot_product_deployments.png"
    description: "Screenshot of the Real Estate Marketplace product deployments view, showing product platforms, customers, interfaces, delivery channels, and associated product bricks."

  - file: "screenshot_product_bricks.png"
    description: "Screenshot of the Real Estate Marketplace Product Bricks & Capabilities bricks view, showing grouped product bricks across seeker, owner, intermediary, lifecycle, lead-management, and tools areas."

  - file: "screenshot_product_capabilities.png"
    description: "Screenshot of the Real Estate Marketplace Product Bricks & Capabilities capabilities view, showing outcome capabilities grouped by seeker and owner journeys with their supporting bricks."

  - file: "screenshot_product_bricks_data.png"
    description: "Screenshot of the Product Bricks & Capabilities data view, showing data assets such as customer profiles, contact points, identity credentials, and saved-search alerts with producing and consuming bricks."

  - file: "screenshot_product_modules.png"
    description: "Screenshot of a product-brick module dependency diagram for the Search Engine Results Page, showing UI, API, worker, and service modules with dependency arrows and node filters."

  - file: "screenshot_product_brick_connecting_to_implementation_evidence.png"
    description: "Screenshot of the Search Engine Results Page implementation evidence view, showing repository analysis cards with source-code metrics, commits, costs, and links to GitHub and Sokrates reports."

  - file: "screenshot_product_teams.png"
    description: "Screenshot of the Real Estate Marketplace teams overview, showing team topology, role blocks, headcount, and staffing distribution across marketplace growth teams."

  - file: "screenshot_product_one_team_dependecies.png"
    description: "Screenshot of the Home Discovery Growth - Homepage team dependencies view, showing explicit team relationships and shared product-brick dependencies."

  - file: "screenshot_objectives.png"
    description: "Screenshot of the Real Estate Marketplace objectives overview, showing current company objectives and team objectives with key-result target cards."

  - file: "screenshot_team_objective.png"
    description: "Screenshot of a Real Estate Marketplace team objective detail page, showing mapped company objectives, key results, status chips, and the dependency map linking objectives to initiatives."

  - file: "screenshot_releases.png"
    description: "Screenshot of the Real Estate Marketplace releases overview, showing the release timeline and release rows with dates, customers, product channels, and affected product bricks."
