<script id="data" type="application/json">{"meta": {"title": "AI Will Do the Heavy Lifting. You Still Need to Lead", "date": "2025-10-21 21:12:01 +0100", "author": "by Željko Obrenović (obren.io)", "permalink": "prepare-for-ai-future", "icon": "assets/icons/ai-future.png", "timetoread": "15 min", "excerpt": "Cultivate agency, sharpen judgment, and practice persuasion. Don't just adapt—initiate. Technology leaders who wait get left behind.", "logo": "assets/images/prepare-for-ai-future/logo.jpeg", "logo_credit": "Image generated by Google Gemini (gemini-3-pro-image-preview)"}, "tags": [], "modalities": [{"key": "index", "label": "Article", "meta": {}, "blocks": [{"type": "markdown", "content": "> **KEY POINTS:**\n>\n> * **As AI automates routine work, technology leaders must evolve from artifact-makers to decision-makers.** The question shifts from \"How should we work today?\" to \"What kind of leadership remains valuable when the diagrams, memos, and briefs draft themselves?\"\n> * **AI amplifies productivity but demands more human leadership, not less.** The value moves from producing artifacts by hand to deciding what should happen next — connecting AI-generated options to direction, strategy, risk, and accountability.\n> * **Agency, judgment, and persuasion are what will define technical and organizational impact** as the routine layer is automated away.\n\nWhat if the next architecture diagram, decision memo, roadmap brief, or risk analysis you would normally spend hours preparing could be drafted in seconds? AI is changing the landscape for nearly every knowledge profession, and technology leadership is no exception. Principal and staff engineers, engineering managers and directors, VPs of Engineering, CTOs, and architects are all at a transition point.\n\nFor technology leaders, the question is shifting from \"How should we work today?\" to \"What kind of leadership remains valuable as routine work is automated?\" Technical leadership is bigger than artifacts and frameworks. AI makes that point sharper by forcing leaders to lean harder into judgment, initiative, and influence.\n\nThe stakes differ by role. Principal and staff engineers need to turn AI-generated options into coherent technical direction. Engineering managers need to help teams adopt AI without losing quality, accountability, or learning. Directors, VPs, and CTOs need to connect adoption with strategy, risk, investment, and organizational capacity. Architects need to make system-level choices understandable and actionable. Different titles, same shift: less value in producing artifacts by hand, more value in deciding what should happen next.\n\n![Diagram showing technology leadership shifting from manual artifact production to accountable decisions using AI-generated inputs.](assets/images/prepare-for-ai-future/artifact-to-decision-shift.jpeg)\n**Figure 1:** *As AI produces more artifacts, leadership value shifts toward deciding what should happen next.*\n\n\n## Reskilling: Agency + Judgment + Persuasion\n\nIn a 2025 essay, Jakob Nielsen [argued](https://www.uxtigers.com/post/ai-transition-career-transition) that the most important skills in the AI transition are **agency**, **judgment**, and **persuasion**. He was writing about UX, but the argument applies just as strongly to people accountable for technical direction, engineering execution, and organizational change.\n\nWhen AI can draft candidate architecture diagrams, RFCs, migration plans, or stakeholder summaries faster than you can open the right tool, your value no longer lies primarily in producing artifacts. It lies in how you evaluate them, how you guide teams through ambiguity and trade-offs, and how you turn ideas into decisions that work in the real world.\n\nPeople who combine all three become **AI-savvy experts** who can lead, influence, and navigate complexity. Those who lack one of the three are more likely to be marginalized, sidelined, or trapped in hype.\n\n![Diagram showing agency, judgment, and persuasion as overlapping skills that create AI-savvy expertise](assets/images/prepare-for-ai-future/ai-future.png)\n**Figure 2:** *To thrive in the AI era, experts must combine agency, judgment, and persuasion—without all three, they risk becoming marginalized, sidelined, or lost in hype.*\n\n\nThe rest of this note looks at what that transition means for technology leaders and how to respond before AI commoditizes more of the work that once looked distinctive. The scenarios below are illustrative composites, not case studies; use them as prompts for reflection rather than as proof that every organization will follow the same path.\n\n## Why You Cannot Simply Delegate This to AI\n\nAI can support agency, judgment, and persuasion, but it cannot fully own them because these skills sit where information meets accountability. A model can generate options, arguments, summaries, and risks. It cannot be responsible for the consequences, repair trust after a bad call, understand the informal history of a team, or decide which trade-offs are legitimate for your organization.\n\n| Skill | AI can help by... | Leaders cannot delegate... |\n| --- | --- | --- |\n| Agency | Surfacing opportunities, drafting experiments, finding patterns, and reducing the cost of starting. | Choosing to act before there is a mandate, taking responsibility for the initiative, and creating momentum across people who did not ask for change. |\n| Judgment | Comparing options, listing trade-offs, stress-testing assumptions, and exposing blind spots. | Deciding what matters here, now, with these people, constraints, politics, customers, risks, and values. |\n| Persuasion | Drafting narratives, adapting language for audiences, preparing objections, and improving clarity. | Earning trust, reading the room, handling resistance, and making a decision feel legitimate to the people who must live with it. |\n\nThe pattern is simple: AI can expand the surface area of thinking, but leaders still own direction, accountability, and consent. The more AI contributes, the more important it becomes to know which parts must remain human-led.\n\n![Diagram showing AI support artifacts separated from human ownership of direction, accountability, consent, and trust.](assets/images/prepare-for-ai-future/ai-support-human-ownership.jpeg)\n**Figure 3:** *AI can expand thinking, but direction, accountability, and consent remain human-led.*\n\n## 1. Agency: The Era of Waiting is Over\n\nThere was a time when senior technical leaders could wait for requirements to roll in, produce a reference model, review a plan, or escalate a decision, and move on. That time has passed. AI doesn't wait. Neither do modern product teams.\n\nThe leaders most likely to thrive with AI take initiative. They create momentum rather than waiting for it, and they do not need permission to begin leading change.\n\n**Scenario:** A mid-size logistics company is seeing inefficiencies across its microservices: latency, duplication, and poor observability. A principal engineer does not wait for a formal initiative. She uses AI tools to review design documents, trace dependency patterns, and identify likely areas of redundancy. Then she builds a small event-driven prototype with observability built in and brings the engineering manager and platform team into the conversation. She does not ask if it is her job; she makes it her job. That's agency.\n\nWhen agency is missing, AI adoption becomes something that happens *to* the organization instead of something leaders shape deliberately.\n\n| Without agency | With agency |\n| --- | --- |\n| Teams wait for a formal mandate, experiment in private, duplicate effort, and argue about AI in the abstract. | A leader starts a bounded experiment, shares what worked and failed, and creates enough evidence for a real decision. |\n| Risk-averse stakeholders define the pace by default because nobody has shown a responsible path forward. | The leader brings security, delivery, and product concerns into the experiment early, making responsible adoption easier to support. |\n\nTo assess your agency, ask yourself:\n* Are you sparking conversations about how AI will reshape your tech stack or delivery model?\n* Have you tested AI-driven design tools to cut down repetitive effort in your own workflow?\n* Are you advocating for technical, architectural, or operating-model changes that align with new business needs—even if nobody asked yet?\n\nAgency means moving from \"solution provider\" or \"escalation handler\" to strategic instigator. As AI absorbs more routine work, technology leaders must bring more leadership to the work that remains.\n\n## 2. Judgment: When AI Gives You 10 Options, Can You Choose the Right One?\n\nAI is prolific. It can produce many plausible designs, plans, trade-off summaries, and metrics. But the real question is which one works here, now, with your teams, constraints, and organizational history. AI does not know that context. Accountable leaders do.\n\n**Scenario:** A VP of Engineering asks AI to draft three plausible plans for introducing AI-assisted development across the organization. One plan centralizes expertise in a platform team, another embeds champions in every product group, and a third opens access broadly with lightweight guardrails. On paper, all three could work. But she knows two product groups are already under delivery pressure, security wants auditable usage, and managers need time to learn what good AI-assisted work looks like. She chooses a staged adoption plan: a small enablement team, clear policy, a few visible pilots, and manager coaching before broad rollout.\n\nThis is judgment: choosing through technical, organizational, and human constraints at the same time.\n\n| AI can suggest... | Leaders must decide... |\n| --- | --- |\n| Several plausible architecture options | Which option fits the team's skills, risk tolerance, and operating model |\n| A rollout plan for a new tool or practice | Whether the organization has the capacity, trust, and governance to absorb it |\n| A policy draft or decision memo | What trade-offs are acceptable, who must be consulted, and where accountability sits |\n| A list of risks and mitigations | Which risks matter in this context and which ones are noise |\n| A polished stakeholder summary | Whether the story is honest, useful, and tied to outcomes people care about |\n\nWhen judgment is missing, polished AI output and market hype can create false confidence. The danger is not that AI suggests a bad option; it is that a leader accepts a plausible option, or follows the fashionable one, without understanding whether the organization can execute it.\n\n| Without judgment | With judgment |\n| --- | --- |\n| A leader forwards an AI-generated rollout plan because it looks complete or matches the latest hype cycle. Teams are overloaded, security pauses the rollout, and managers lose trust in the initiative. | A leader treats the AI plan as input, tests it against team capacity and governance constraints, and stages adoption through pilots. |\n| The loudest metric wins because the recommendation sounds data-driven. | The leader asks what the metric hides: operational load, migration risk, learning cost, customer impact, or reversibility. |\n\nTo assess your judgment skills, ask yourself:\n* Can you look at five viable AI-generated options and quickly eliminate the ones that will not fly in your context?\n* Are you connecting technical choices with business constraints, team skills, and cultural readiness?\n* Do you balance optimization with delivery risk and long-term maintainability—even if it is less flashy?\n\nJudgment turns outputs into outcomes. Without it, leaders are left with only more generated artifacts.\n\n## 3. Persuasion: Influence Is the New Essential Skill\n\nBeing right is not enough. Many technically sound proposals fail because they never gain support.\n\nIn flatter, faster-moving organizations, technology leaders cannot simply hand off decisions. They need to influence across engineering, legal, finance, operations, and sometimes marketing.\n\n**Scenario:** A staff engineer at a SaaS company proposes migrating key services to a modular platform model using containers and service meshes. Engineering is interested. Leadership is not. So he reframes the proposal not as a technical upgrade, but as a way to reduce release friction, improve SLAs for premium customers, and simplify compliance reporting. Suddenly, the proposal is easier for non-technical stakeholders to evaluate.\n\nThis is persuasion: making the right decision legible and compelling to other people.\n\nWhen persuasion is missing, good technical direction dies as a private conviction. The proposal may be correct, but it does not become a decision.\n\n| Without persuasion | With persuasion |\n| --- | --- |\n| A staff engineer explains the migration in terms of containers, meshes, and platform purity. Finance hears cost, product hears delay, and leadership shelves the proposal. | The same engineer explains how the change reduces release friction, protects premium SLAs, and simplifies compliance reporting. Stakeholders can now evaluate the trade-off. |\n| A manager tells teams to \"use AI more\" without a story about why, where, and how quality will be protected. | The manager connects AI use to a concrete workflow, explains guardrails, and shows how the team will review AI-assisted work. |\n\nTo practice your persuasion skills, try this:\n\n* Replace \"Kubernetes is more scalable\" with \"This lets us launch new customer features two weeks faster.\"\n* Translate \"reduces tech debt\" into \"frees up developer time for revenue-generating features.\"\n* Use visual storytelling or simulations to explain the impact—not just the architecture.\n* Your artifacts are only as useful as your ability to sell the story behind them.\n\nTools change. The need to influence does not.\n\n![Loop diagram connecting agency, judgment, and persuasion in AI-assisted technology leadership.](assets/images/prepare-for-ai-future/agency-judgment-persuasion-loop.jpeg)\n**Figure 4:** *Agency, judgment, and persuasion work as a loop: initiate, choose, and align.*\n\n\n## Immediate Practices: What to Do This Week\n\nNielsen frames the current period as a short transition toward AI-native work. The practical question, then, is what technology leaders should do now, in their own teams and routines. The answer is not a transformation program; it is a set of habits you can start practicing immediately.\n\n**Automate Low-Risk Work First**  \nDo not make manual diagramming, dependency documentation, or first-pass status writing your default. Use AI to draft templates, compare patterns, summarize constraints, and produce first-pass governance text. Treat AI as a fast assistant that needs supervision: useful for breadth and speed, but not a substitute for accountability.\n\n**Develop Judgment Intentionally**  \nStart collecting real examples of AI-generated designs, plans, and recommendations, then review them critically. What's missing? What's unscalable? What's politically impossible? Build decision trees. Run technical and organizational \"tabletop exercises\" with peers to hone your instincts.\n\n**Practice Persuasion in Small Moments**  \nTry explaining your technical choices to someone in sales. Or your CFO. Can you make them care? Can you translate abstract tech into tangible business value? Don't wait for the big presentation. Influence happens in hallway chats and Slack threads.\n\n**Keep Fundamentals Sharp—But Look Up**  \nKeep your fundamentals sharp (cloud, security, scalability), but widen your lens. Read about AI governance, ethics, team dynamics, product strategy, and operating models. The best technology leaders of tomorrow will be technical enough to build trust and broad enough to guide business impact.\n\nTry a simple one-week practice loop:\n\n1. Pick one real decision, plan, or communication you already need to produce.\n2. Ask AI for three materially different options, not one answer.\n3. Reject at least one option and write down why it would fail in your context.\n4. Ask AI for risks, then compare them with the risks your organization would actually care about.\n5. Rewrite the recommendation for a non-technical stakeholder.\n6. Share the result with one peer and ask where your judgment was weak.\n\n![Six-step practice loop for using AI to develop leadership judgment and persuasion.](assets/images/prepare-for-ai-future/one-week-practice-loop.jpeg)\n**Figure 5:** *A small weekly loop turns AI use into practice for judgment, persuasion, and accountable decision-making.*\n\n## Mindset Shifts for the AI Transition Era\n\nThe practices above are about what to do this week. The deeper shift is how you orient yourself over the next few years. Nielsen's article goes beyond skills; it is also a prompt to rethink how technical leadership works when AI changes the cost of analysis, drafting, and experimentation.\n\n**Don’t just automate—rethink the work.**  \nThe goal is not only to make old routines faster. It is to ask which routines should change when AI can draft, compare, critique, and simulate options. Some of this is available now; some is still frontier work. The important habit is experimentation.\n\n**Expect the practice to keep changing.**  \nAgency, judgment, and persuasion are durable capabilities, but the way leaders practice them will keep changing as AI improves. Today's agency may mean starting a careful pilot; tomorrow it may mean orchestrating AI agents across product, security, and operations workflows. Today's judgment may mean reviewing generated plans; tomorrow it may mean deciding how much autonomy to grant a system. Today's persuasion may mean rewriting a technical proposal for finance; tomorrow it may mean helping people trust, contest, and improve decisions made with AI in the loop.\n\n**Move before the playbook is settled.**  \nNobody knows exactly what AI-native engineering leadership looks like yet. That is your chance. If you invent and test now, you will learn faster than those waiting for consensus.\n\n**Choose your environment wisely.**  \nWorking at an AI-native or AI-first organization will accelerate your learning. If you are in a culture that blocks responsible experimentation, your growth will slow. If you are in a cautious culture with real governance concerns, use judgment: disciplined adoption beats denial and hype.\n\n**Retire low-value habits.**  \nMastering legacy frameworks can still matter when those systems run the business. Clinging to outdated governance models is different. Be willing to trade technical prestige for future-relevant judgment.\n\n**Prepare for flatter leadership.**  \nTeams are flattening. The future technology leader is not a gatekeeper, but a guide. Your ability to influence across autonomous teams will define your impact.\n\n## You Are Not Being Replaced, But the Work Is Changing\n\nNielsen uses a stark analogy: around 2030, old skills may be the equivalent of \"being an experienced mammoth hunter.\" The point is not that every old skill disappears overnight. The point is that expertise loses value when the work around it changes.\n\nThat might sound dramatic, but the direction is plausible. AI may increasingly draft code, compare options, and detect performance risks. But it will not automatically know that your customer ops team is burned out, or that your sales lead needs a feature by next quarter, or that your team is already quietly resisting the platform shift.\n\nThat's where you come in. Your value is no longer in drawing boxes—it's in drawing people together.\n\nTechnology leadership should always connect technology with people, outcomes, and change. AI is a powerful tool. But leadership is still a human job.\n\n## Final Thoughts\n\n[Gregor Hohpe argues](https://architectelevator.com/architecture/multiple-dimensions/) that architects do not need to be the smartest people in the room; their work is to make everyone else smarter. The same principle applies to principal engineers, staff engineers, engineering managers, directors, VPs, and CTOs.\n\nThat insight is even more relevant in an AI-driven world. Effective leadership is not about knowing everything. It is about helping people and intelligent systems work better through the right tools, guidance, and context.\n\nThe future will likely favor leaders who enhance collective intelligence, whether human or artificial.\n\nThe more powerful the tools become, the more technology leadership depends on human agency, contextual judgment, and the ability to align people around meaningful decisions. AI changes the medium of the work, but it does not remove the need for accountable leadership.\n\n\n## To Probe Further\n* [Use the AI Transition Period to Transition Your Career](https://www.uxtigers.com/post/ai-transition-career-transition), by Jakob Nielsen, 2025\n* [Think Like An Architect, Part 2: Architects See More Dimensions](https://architectelevator.com/architecture/multiple-dimensions/), by Gregor Hohpe, 2020\n\n## Questions to Consider\nUse the following questions to consider how AI is changing your role and which capabilities will matter most going forward.\n\n* *What parts of your workflow could AI take over today?*\n* *How are you preparing to guide AI-generated outputs with human context?*\n* *When was the last time you had to convince a non-technical stakeholder to back a technical choice?*\n* *How would you reframe a technical decision in business terms?*\n"}]}, {"key": "summary", "label": "Summary", "meta": {"timetoread": "2 min"}, "blocks": [{"type": "markdown", "content": "AI is automating the artifacts that once defined technology leadership — diagrams, decision memos, roadmap briefs, risk analyses. The leaders who stay valuable shift from artifact-makers to decision-makers, and the skills that carry that shift are **agency, judgment, and persuasion** (Jakob Nielsen's transition-period frame, applied to technology leadership).\n\nThe reason these three survive automation is structural: they sit where information meets accountability. AI can surface opportunities, compare options, and draft narratives — it cannot take responsibility for consequences, decide which trade-offs are legitimate for *this* organization, or make a decision feel legitimate to the people who must live with it.\n\n**What changes**\n\n- **Agency**: the era of waiting is over. Leaders start bounded experiments before there is a mandate, and shape AI adoption instead of having it happen *to* the organization.\n- **Judgment**: AI produces ten plausible plans; the leader's value is eliminating the ones that won't fly given team capacity, governance, politics, and history. Polished output plus hype creates false confidence without it.\n- **Persuasion**: being right is not enough. Technical direction becomes a decision only when it is legible to finance, product, and leadership — \"launches features two weeks faster,\" not \"Kubernetes is more scalable.\"\n- The stakes apply across roles — principal/staff engineers, EMs, directors, VPs, CTOs, architects — different titles, same shift.\n\n**What it costs**\n\n- Deliberate practice now, before the playbook settles: a one-week loop (ask AI for three options, reject one in writing, stress-test risks, rewrite for a non-technical stakeholder, get peer feedback).\n- Retiring low-value habits and some technical prestige in favor of future-relevant judgment.\n- Accepting that how these skills are practiced will keep changing as AI capability evolves — the capabilities are durable, the practice is not.\n\n**What we are not doing**\n\n- Not a tool catalog, not a 2030 capability prediction, not an AI governance policy.\n- Not claiming legacy skills are worthless overnight — expertise loses value when the work around it changes, which is a different claim.\n- The scenarios are illustrative composites, not sourced case studies.\n\nThe Article tab has the role-specific stakes, the \"AI can suggest / leaders must decide\" table, the without/with contrast tables for each skill, and the full practice loop.\n"}]}, {"key": "dialog", "label": "Conversation", "meta": {"timetoread": "8 min listen"}, "blocks": [{"type": "markdown", "content": "## The uncomfortable question\n\n**Ben:** Ana, every architect I know has the same quiet worry: AI now drafts the diagram, the decision memo, the migration plan — in seconds. If the artifacts were the job, what's left?\n\n**Ana:** That worry is the right starting point, and the post's answer is blunt: the artifacts were never the job. They were the *medium*. The job was always deciding what should happen next and getting people to move. AI just makes that distinction impossible to ignore — when production gets cheap, the value concentrates in evaluation, direction, and influence.\n\n**Ben:** And the frame for that comes from Jakob Nielsen, right? Three skills?\n\n**Ana:** Agency, judgment, and persuasion. He wrote it for UX careers in the AI transition; the post applies it to technology leadership — principal and staff engineers, EMs, directors, VPs, CTOs, architects. Different titles, same shift: less value in producing artifacts by hand, more value in deciding what happens next.\n\n**Ben:** Obvious follow-up: if AI is so capable, why can't it do those three too?\n\n**Ana:** Because all three sit where information meets accountability. A model can generate options, arguments, summaries, risks. It cannot be *responsible* for consequences. It can't repair trust after a bad call, doesn't know the informal history of your team, and can't decide which trade-offs are legitimate for your organization. AI expands the surface area of thinking; leaders still own direction, accountability, and consent.\n\n## Agency: stop waiting\n\n**Ben:** Take them one at a time. Agency — isn't that just \"be proactive,\" the oldest career advice in the book?\n\n**Ana:** The advice is old; the cost of ignoring it changed. There was a time a senior leader could wait for requirements, produce the reference model, review, escalate, done. AI doesn't wait, and neither do product teams. The post's scenario: a principal engineer at a logistics company sees latency and duplication across microservices. No formal initiative exists. She uses AI to trace dependencies, builds a small event-driven prototype with observability built in, and *then* pulls in the platform team. She doesn't ask if it's her job — she makes it her job.\n\n**Ben:** And without that?\n\n**Ana:** AI adoption becomes something that happens *to* the organization. Teams experiment in private, duplicate effort, argue about AI in the abstract, and the most risk-averse stakeholder sets the pace by default — because nobody has shown a responsible path forward.\n\n## Judgment: ten options, one context\n\n**Ben:** Judgment. The AI gives you ten plausible plans. So what — pick the highest-scored one?\n\n**Ana:** That's exactly the trap. Plausibility is cheap now. The post's scenario: a VP asks AI for three rollout plans for AI-assisted development — centralize in a platform team, embed champions, or open access with light guardrails. On paper all three work. But she knows two product groups are under delivery pressure, security wants auditable usage, and managers haven't yet learned what good AI-assisted work looks like. She stages it: small enablement team, clear policy, visible pilots, manager coaching first. The model didn't know any of that context. It can't.\n\n**Ben:** So the failure mode isn't AI suggesting something bad.\n\n**Ana:** It's a leader accepting a plausible plan — or the fashionable one — without knowing whether the organization can execute it. Polished output plus hype equals false confidence. The judgment question is always: which option fits *these* teams, *this* risk tolerance, *this* history? And: what does the loudest metric hide — migration risk, learning cost, reversibility?\n\n## Persuasion: right isn't enough\n\n**Ben:** Persuasion always feels like the soft one. Why does it rank with the other two?\n\n**Ana:** Because correct proposals die as private convictions all the time. The scenario: a staff engineer proposes a modular platform migration — containers, service meshes. Engineering nods; leadership shrugs. So he reframes: this reduces release friction, protects premium-customer SLAs, simplifies compliance reporting. Same proposal, suddenly legible to people who don't speak mesh. That's the skill — making the right decision evaluable and compelling for the people who must live with it.\n\n**Ben:** \"This lets us launch features two weeks faster\" instead of \"Kubernetes is more scalable.\"\n\n**Ana:** That literal translation is in the post. And the manager version: don't say \"use AI more\" — connect it to a concrete workflow, name the guardrails, show how AI-assisted work gets reviewed. Influence happens in hallway chats and Slack threads, not just the big presentation.\n\n## What to actually do this week\n\n**Ben:** This all risks staying inspirational. Give me the Monday-morning version.\n\n**Ana:** The post ends with a one-week practice loop, six steps. Pick one real decision you already owe someone. Ask AI for three *materially different* options, not one answer. Reject at least one and write down why it would fail in your context — that's judgment practice. Ask AI for risks, compare them with what your organization actually cares about. Rewrite the recommendation for a non-technical stakeholder — persuasion practice. Then share it with a peer and ask where your reasoning was weak.\n\n**Ben:** And the longer arc? Nielsen has that mammoth-hunter line.\n\n**Ana:** Around 2030, old skills may be the equivalent of being an experienced mammoth hunter. The point isn't that skills vanish overnight — it's that expertise loses value when the work around it changes. But the durable part is real too: agency, judgment, and persuasion persist while their *practice* keeps changing. Today's agency is starting a careful pilot; tomorrow's may be orchestrating agents across product, security, and operations. Today's judgment reviews generated plans; tomorrow's decides how much autonomy a system gets.\n\n## What this isn't\n\n**Ben:** Scope check before we close. What should nobody take from this?\n\n**Ana:** It's not a tool catalog and not a prediction of exact 2030 capabilities. It's not an AI governance policy. It's explicitly *not* saying legacy skills are worthless — mastering systems that run the business still matters; clinging to outdated governance models is what doesn't. And the scenarios are illustrative composites, not case studies from named companies.\n\n**Ben:** One line for the leader who reads nothing else?\n\n**Ana:** Gregor Hohpe's principle, which the post closes on: you don't need to be the smartest person in the room — your job is making everyone else smarter, including the AI systems now in the room. Your value is no longer in drawing boxes. It's in drawing people together.\n\n**Ben:** From mammoth hunter to people-gatherer. There are worse career arcs. *(laughs)*\n\n**Ana:** And the leaders who start practicing now get to invent the playbook instead of waiting for it.\n"}]}, {"key": "comics", "label": "Comic", "meta": {"timetoread": "3 min"}, "blocks": [{"type": "markdown", "content": "<!-- comic-style\n{\n  \"cast\": \"MAYA: a pragmatic technology leader, short dark hair, glasses, rolled-up sleeves, calm and slightly amused, often holding a marker or coffee mug. REX: an over-eager boxy robot AI assistant, one bent antenna, glowing rectangular eyes, perpetually printing or presenting too many documents.\",\n  \"style\": \"Clean two-tone explainer comic, thick ink outlines, flat colors with blue/teal accents on a light cream background, generous white space, hand-lettered speech bubbles with SHORT readable text (max 8 words per bubble), simple geometric office/meeting-room settings, no photorealism, no dense text, no title text.\"\n}\n-->\n\nWhat technology leadership looks like when AI does the heavy lifting — in eight panels.\n\n![Comic panel: a robot instantly prints diagrams, memos, and roadmaps while the leader wonders what her job is now.](assets/images/prepare-for-ai-future/comic-01-instant-artifacts.jpeg)\n**Panel 1:** *The artifacts that once took leaders hours now take seconds — which forces the real question: where does leadership value live?*\n\n![Comic panel: a display case with a compass, scale, and megaphone labeled agency, judgment, and persuasion.](assets/images/prepare-for-ai-future/comic-02-three-skills.jpeg)\n**Panel 2:** *Agency, judgment, persuasion: the three skills that define leadership impact when routine work is automated.*\n\n![Comic panel: a desk divided between the robot's drafts and the leader's accountability stamp.](assets/images/prepare-for-ai-future/comic-03-accountability-line.jpeg)\n**Panel 3:** *AI can suggest options, risks, and narratives. It cannot be responsible for consequences — accountability stays human.*\n\n![Comic panel: workers wait on a 'waiting for mandate' bench while the leader builds a small pilot with the robot.](assets/images/prepare-for-ai-future/comic-04-agency.jpeg)\n**Panel 4:** *Agency: the era of waiting is over. Leaders start bounded experiments and create the evidence for real decisions.*\n\n![Comic panel: the robot fans out ten plausible plans while the leader checks one against hidden context questions.](assets/images/prepare-for-ai-future/comic-05-judgment.jpeg)\n**Panel 5:** *Judgment: AI makes plausibility cheap. The leader's value is knowing which option survives this team, this risk, this history.*\n\n![Comic panel: the leader replaces technical jargon on a flip chart with a business outcome and wins over executives.](assets/images/prepare-for-ai-future/comic-06-persuasion.jpeg)\n**Panel 6:** *Persuasion: being right is not enough. Direction becomes a decision when stakeholders can evaluate it in their own terms.*\n\n![Comic panel: a six-station weekly practice loop on a whiteboard, with one rejected option in a labeled bin.](assets/images/prepare-for-ai-future/comic-07-practice-loop.jpeg)\n**Panel 7:** *The one-week loop: pick a real decision, demand three options, reject one in writing, stress-test risks, rewrite, get feedback.*\n\n![Comic panel: the leader gathers colleagues and the robot around one shared plan, a framed mammoth picture on the wall.](assets/images/prepare-for-ai-future/comic-08-drawing-people-together.jpeg)\n**Panel 8:** *The work changes, the job remains: connect technology with people, outcomes, and change — and make everyone smarter.*\n"}]}]}</script>
<script>
    (function () {
        const data = JSON.parse(document.getElementById('data').textContent);
        const root = document.getElementById('content');

        const postId = (data.meta && data.meta.id) ? String(data.meta.id) : '';
        const postStatusRaw = (data.meta && data.meta.status) ? String(data.meta.status) : '';
        if (postId || postStatusRaw) {
            const header = document.getElementById('post-header');
            let sectionEl = header.querySelector('p.section');
            if (!sectionEl) {
                sectionEl = document.createElement('p');
                sectionEl.className = 'section';
                header.insertBefore(sectionEl, header.firstChild);
            }
            // Status pill goes first, then a " / " separator before the existing
            // content (section name and/or id).
            if (postStatusRaw) {
                const parts = postStatusRaw.split(':');
                const statusName = parts[0].trim();
                const statusColor = (parts[1] || '').trim();
                const wrap = document.createElement('span');
                wrap.className = 'post-status';
                const dot = document.createElement('span');
                dot.className = 'status-dot';
                if (statusColor) dot.style.background = statusColor;
                wrap.appendChild(dot);
                wrap.appendChild(document.createTextNode(statusName));
                if (sectionEl.firstChild) {
                    sectionEl.insertBefore(document.createTextNode(' • '), sectionEl.firstChild);
                    sectionEl.insertBefore(wrap, sectionEl.firstChild);
                } else {
                    sectionEl.appendChild(wrap);
                }
            }
            if (postId) {
                if (sectionEl.firstChild) sectionEl.appendChild(document.createTextNode(' • '));
                sectionEl.appendChild(document.createTextNode(postId));
            }
        }

        const tagsHost = document.getElementById('tags');
        (data.tags || []).forEach(function (t) {
            const span = document.createElement('span');
            span.className = 'tag';
            span.textContent = t;
            tagsHost.appendChild(span);
        });

        // Minimal markdown renderer. Supports: ATX headings, paragraphs, blockquotes,
        // unordered/ordered lists, fenced code, inline code, bold/italic/strikethrough, links, images, hr.
        // Sufficient for the posts in this repo; replace with a fuller parser if needed.
        function renderMarkdown(src) {
            const lines = src.replace(/\r\n/g, '\n').split('\n');
            const out = [];
            let i = 0;

            const bullet = /^(\s*)([-*])\s+(.*)$/;
            const ordered = /^(\s*)(\d+)\.\s+(.*)$/;
            const tableRow = /^\s*\|(.+)\|\s*$/;
            const tableSep = /^\s*\|?\s*:?-{3,}:?\s*(\|\s*:?-{3,}:?\s*)+\|?\s*$/;

            function splitRow(s) {
                let t = s.trim();
                if (t.startsWith('|')) t = t.slice(1);
                if (t.endsWith('|')) t = t.slice(0, -1);
                return t.split('|').map(c => c.trim());
            }

            function inline(s) {
                // Posts are trusted content, so raw HTML passes through unescaped
                // (some posts embed inline <blockquote>, <div>, etc.).
                // Stray ampersands still get fixed up.
                s = s.replace(/&(?![a-zA-Z]+;|#\d+;)/g, '&amp;');
                s = s.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<a class="image-link" href="$2" target="_blank" rel="noopener noreferrer"><img alt="$1" src="$2"></a>');
                s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
                s = s.replace(/`([^`]+)`/g, function (_, c) {
                    return '<code>' + c.replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</code>';
                });
                s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
                s = s.replace(/~~([^~\n]+)~~/g, '<del>$1</del>');
                s = s.replace(/(^|[^*])\*([^*\n]+)\*/g, '$1<em>$2</em>');
                return s;
            }

            while (i < lines.length) {
                const line = lines[i];
                if (!line.trim()) {
                    i++;
                    continue;
                }

                const fence = line.match(/^```(\w*)\s*$/);
                if (fence) {
                    i++;
                    const buf = [];
                    while (i < lines.length && !/^```\s*$/.test(lines[i])) {
                        buf.push(lines[i]);
                        i++;
                    }
                    i++;
                    const escaped = buf.join('\n').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                    const cls = fence[1] ? ' class="lang-' + fence[1] + '"' : '';
                    out.push('<pre><code' + cls + '>' + escaped + '</code></pre>');
                    continue;
                }

                const h = line.match(/^(#{1,6})\s+(.*)$/);
                if (h) {
                    out.push('<h' + h[1].length + '>' + inline(h[2]) + '</h' + h[1].length + '>');
                    i++;
                    continue;
                }

                if (/^\s*(?:-\s*){3,}\s*$/.test(line) || /^\s*\*{3,}\s*$/.test(line)) {
                    out.push('<hr>');
                    i++;
                    continue;
                }

                if (/^>\s?/.test(line)) {
                    const buf = [];
                    while (i < lines.length && /^>\s?/.test(lines[i])) {
                        buf.push(lines[i].replace(/^>\s?/, ''));
                        i++;
                    }
                    out.push('<blockquote>' + renderMarkdown(buf.join('\n')) + '</blockquote>');
                    continue;
                }

                if (tableRow.test(line) && i + 1 < lines.length && tableSep.test(lines[i + 1])) {
                    const headers = splitRow(line);
                    i += 2;
                    const rows = [];
                    while (i < lines.length && tableRow.test(lines[i])) {
                        rows.push(splitRow(lines[i]));
                        i++;
                    }
                    let html = '<table><thead><tr>';
                    headers.forEach(h => {
                        html += '<th>' + inline(h) + '</th>';
                    });
                    html += '</tr></thead><tbody>';
                    rows.forEach(r => {
                        html += '<tr>';
                        r.forEach(c => {
                            html += '<td>' + inline(c) + '</td>';
                        });
                        html += '</tr>';
                    });
                    html += '</tbody></table>';
                    out.push(html);
                    continue;
                }

                if (bullet.test(line) || ordered.test(line)) {
                    // Indent of the first bullet defines this list's base level.
                    // Deeper-indented bullets become nested lists (rendered by
                    // recursing into renderMarkdown). Same-or-less indent at a
                    // bullet starts a sibling item (or ends the list).
                    const firstMatch = line.match(bullet) || line.match(ordered);
                    const baseIndent = firstMatch[1].length;
                    const isOrdered = ordered.test(line);
                    const items = [];
                    while (i < lines.length) {
                        const cur = lines[i];
                        if (!cur.trim()) {
                            // blank line breaks the list (matches CommonMark-ish behaviour)
                            i++;
                            break;
                        }
                        const mBul = cur.match(bullet);
                        const mOrd = cur.match(ordered);
                        const m = mBul || mOrd;
                        if (!m) break;
                        if (m[1].length < baseIndent) break;
                        if (m[1].length > baseIndent) break; // shouldn't happen at top of loop
                        // Same-type check: switching between -/* and 1. closes the list
                        if (isOrdered !== !!mOrd) break;

                        const itemBuf = [m[3]];
                        const nestedBuf = [];
                        i++;
                        while (i < lines.length) {
                            const nxt = lines[i];
                            if (!nxt.trim()) break;
                            const nBul = nxt.match(bullet);
                            const nOrd = nxt.match(ordered);
                            const nm = nBul || nOrd;
                            if (nm) {
                                if (nm[1].length > baseIndent) {
                                    // nested list line — dedent and stash
                                    nestedBuf.push(nxt.slice(baseIndent + 2));
                                    i++;
                                    continue;
                                }
                                // sibling or end of list
                                break;
                            }
                            // Plain continuation text
                            if (nestedBuf.length) {
                                // continuation inside the nested block
                                nestedBuf.push(nxt.slice(baseIndent + 2));
                            } else {
                                itemBuf.push(nxt.trim());
                            }
                            i++;
                        }

                        let liHtml = inline(itemBuf.join('\n'));
                        if (nestedBuf.length) {
                            liHtml += renderMarkdown(nestedBuf.join('\n'));
                        }
                        items.push('<li>' + liHtml + '</li>');
                    }
                    out.push((isOrdered ? '<ol>' : '<ul>') + items.join('') + (isOrdered ? '</ol>' : '</ul>'));
                    continue;
                }

                const buf = [line];
                i++;
                while (i < lines.length && lines[i].trim() && !/^#{1,6}\s/.test(lines[i]) && !/^>\s?/.test(lines[i]) && !bullet.test(lines[i]) && !ordered.test(lines[i]) && !/^```/.test(lines[i]) && !tableRow.test(lines[i])) {
                    buf.push(lines[i]);
                    i++;
                }
                out.push('<p>' + inline(buf.join(' ')) + '</p>');
            }
            return out.join('\n');
        }

        // Block dispatcher. New block types plug in here.
        const renderers = {
            markdown: function (block) {
                const div = document.createElement('div');
                div.innerHTML = renderMarkdown(block.content);
                return div;
            },
            mermaid: function (block) {
                // Mermaid scans elements with class "mermaid" whose textContent
                // is the diagram source. We collect these nodes and run
                // mermaid.run() once after all blocks are in the DOM.
                const div = document.createElement('div');
                div.className = 'mermaid';
                div.textContent = block.content;
                return div;
            },
            'force-graph': function (block) {
                // build.py emits parsed JSON: {nodes:[{id,size}], links:[{source,target}]}.
                // We instantiate force-graph after the container is in the DOM
                // so it can measure its own width.
                const div = document.createElement('div');
                div.className = 'force-graph';
                const data = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.ForceGraph) return;
                    const maxSize = data.nodes.reduce((m, n) => Math.max(m, n.size || 1), 1);
                    window.ForceGraph()(div)
                        .graphData(data)
                        .width(div.clientWidth)
                        .height(div.clientHeight)
                        .nodeRelSize(4)
                        .nodeVal(n => Math.max(20 * (n.size || 1) / maxSize, 0.001))
                        .nodeLabel(n => n.id + ' (' + (n.size || 1) + ')')
                        .nodeColor(() => 'rgba(135, 206, 235, 0.7)')
                        .linkColor(() => 'rgba(60, 60, 60, 0.4)')
                        .linkDirectionalArrowLength(4)
                        .linkDirectionalArrowRelPos(1)
                        .linkWidth(1);
                });
                return div;
            },
            'bubble-chart': function (block) {
                // build.py emits {nodes:[{name,size}]}. Renders a D3 circle-pack
                // SVG (same shape as the obren.io reference, just inline).
                const wrap = document.createElement('div');
                wrap.className = 'bubble-chart';
                const payload = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.d3) return;
                    const diameter = 480;
                    const fill = '#c0deed';
                    const textColor = '#111111';
                    const fontSize = 12;

                    const svg = window.d3.select(wrap).append('svg')
                        .attr('viewBox', '0 0 ' + diameter + ' ' + diameter)
                        .attr('width', diameter)
                        .attr('height', diameter);

                    const root = window.d3.hierarchy({children: payload.nodes})
                        .sum(d => d.size || 0)
                        .sort((a, b) => b.value - a.value);

                    window.d3.pack().size([diameter, diameter]).padding(2)(root);

                    const node = svg.selectAll('g')
                        .data(root.leaves())
                        .enter().append('g')
                        .attr('transform', d => 'translate(' + d.x + ',' + d.y + ')');

                    node.append('title').text(d => d.data.name + ': ' + d.value);
                    node.append('circle').attr('r', d => d.r).style('fill', fill);
                    node.append('text')
                        .attr('dy', '.3em')
                        .style('text-anchor', 'middle')
                        .style('fill', textColor)
                        .style('font-size', fontSize + 'px')
                        .text(d => d.data.name.substring(0, Math.max(0, Math.floor(d.r / 3))));
                });
                return wrap;
            }
        };

        // Render one modality's blocks into a host element. Mermaid runs
        // scoped to just the nodes created here, so lazily rendered tabs get
        // their diagrams on first activation.
        let mermaidInitialized = false;
        function renderBlocksInto(blocks, host) {
            const mermaidNodes = [];
            blocks.forEach(function (block) {
                const r = renderers[block.type];
                if (!r) {
                    const pre = document.createElement('pre');
                    pre.textContent = '[unknown block type: ' + block.type + ']';
                    host.appendChild(pre);
                    return;
                }
                const node = r(block);
                if (node instanceof Node) {
                    host.appendChild(node);
                    if (block.type === 'mermaid') mermaidNodes.push(node);
                }
            });
            if (mermaidNodes.length && window.mermaid) {
                if (!mermaidInitialized) {
                    window.mermaid.initialize({startOnLoad: false, theme: 'default'});
                    mermaidInitialized = true;
                }
                window.mermaid.run({nodes: mermaidNodes});
            }
        }

        // Modality tabs. One <article class="pane"> per modality; panes are
        // rendered lazily on first activation (force-graph / D3 / mermaid
        // need a visible, measurable container). With a single modality the
        // tab bar stays hidden and the page looks exactly like before.
        const mods = data.modalities;
        const tabBar = document.getElementById('modality-tabs');
        const panes = {};
        const tabButtons = {};
        const renderedPanes = {};

        mods.forEach(function (m) {
            const pane = document.createElement('article');
            pane.className = 'pane';
            pane.dataset.key = m.key;
            pane.hidden = true;
            root.appendChild(pane);
            panes[m.key] = pane;
        });

        const defaultKey = mods.some(m => m.key === 'index') ? 'index' : mods[0].key;

        function activate(key, updateHash) {
            mods.forEach(function (m) {
                const isActive = m.key === key;
                panes[m.key].hidden = !isActive;
                if (tabButtons[m.key]) {
                    tabButtons[m.key].classList.toggle('active', isActive);
                    tabButtons[m.key].setAttribute('aria-selected', isActive ? 'true' : 'false');
                }
            });
            // Unhide first, then render: the chart libraries measure widths.
            if (!renderedPanes[key]) {
                renderBlocksInto(mods.find(m => m.key === key).blocks, panes[key]);
                renderedPanes[key] = true;
            }
            if (updateHash) {
                history.replaceState(null, '',
                    key === defaultKey ? location.pathname + location.search : '#' + key);
            }
        }

        if (mods.length > 1) {
            mods.forEach(function (m) {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.textContent = m.label;
                btn.setAttribute('role', 'tab');
                btn.addEventListener('click', function () { activate(m.key, true); });
                tabBar.appendChild(btn);
                tabButtons[m.key] = btn;
            });
            tabBar.hidden = false;
        }

        // The hash selects a tab only when it matches a modality key, so
        // existing anchors keep working.
        const initialHash = location.hash.slice(1);
        activate(mods.some(m => m.key === initialHash) ? initialHash : defaultKey, false);
        window.addEventListener('hashchange', function () {
            const k = location.hash.slice(1);
            if (mods.some(m => m.key === k)) activate(k, false);
        });
    })();
</script>
</body>
</html>
