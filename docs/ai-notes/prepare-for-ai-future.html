<script id="data" type="application/json">{"meta": {"title": "AI Will Do the Heavy Lifting. You Still Need to Lead", "date": "2025-10-21 21:12:01 +0100", "author": "by Željko Obrenović (obren.io)", "permalink": "prepare-for-ai-future", "icon": "assets/icons/ai-future.png", "timetoread": "15 min", "excerpt": "Cultivate agency, sharpen judgment, and practice persuasion. Don't just adapt—initiate. Technology leaders who wait get left behind.", "logo": "assets/images/prepare-for-ai-future/logo.jpeg", "logo_credit": "Image generated by Google Gemini (gemini-3-pro-image-preview)"}, "tags": [], "blocks": [{"type": "markdown", "content": "> **KEY POINTS:**\n>\n> * Technology leaders must evolve from **artifact-makers to decision-makers**.\n> * **AI amplifies productivity** but demands **more human leadership**.\n> * **Agency, judgment, and persuasion** will define technical and organizational impact.\n\nWhat if the next architecture diagram, decision memo, roadmap brief, or risk analysis you would normally spend hours preparing could be drafted in seconds? AI is changing the landscape for nearly every knowledge profession, and technology leadership is no exception. Principal and staff engineers, engineering managers and directors, VPs of Engineering, CTOs, and architects are all at a transition point.\n\nFor technology leaders, the question is shifting from \"How should we work today?\" to \"What kind of leadership remains valuable as routine work is automated?\" Technical leadership is bigger than artifacts and frameworks. AI makes that point sharper by forcing leaders to lean harder into judgment, initiative, and influence.\n\nThe stakes differ by role. Principal and staff engineers need to turn AI-generated options into coherent technical direction. Engineering managers need to help teams adopt AI without losing quality, accountability, or learning. Directors, VPs, and CTOs need to connect adoption with strategy, risk, investment, and organizational capacity. Architects need to make system-level choices understandable and actionable. Different titles, same shift: less value in producing artifacts by hand, more value in deciding what should happen next.\n\n![Diagram showing technology leadership shifting from manual artifact production to accountable decisions using AI-generated inputs.](assets/images/prepare-for-ai-future/artifact-to-decision-shift.jpeg)\n**Figure 1:** *As AI produces more artifacts, leadership value shifts toward deciding what should happen next.*\n\n\n## Reskilling: Agency + Judgment + Persuasion\n\nIn a 2025 essay, Jakob Nielsen [argued](https://www.uxtigers.com/post/ai-transition-career-transition) that the most important skills in the AI transition are **agency**, **judgment**, and **persuasion**. He was writing about UX, but the argument applies just as strongly to people accountable for technical direction, engineering execution, and organizational change.\n\nWhen AI can draft candidate architecture diagrams, RFCs, migration plans, or stakeholder summaries faster than you can open the right tool, your value no longer lies primarily in producing artifacts. It lies in how you evaluate them, how you guide teams through ambiguity and trade-offs, and how you turn ideas into decisions that work in the real world.\n\nPeople who combine all three become **AI-savvy experts** who can lead, influence, and navigate complexity. Those who lack one of the three are more likely to be marginalized, sidelined, or trapped in hype.\n\n![Diagram showing agency, judgment, and persuasion as overlapping skills that create AI-savvy expertise](assets/images/prepare-for-ai-future/ai-future.png)\n**Figure 2:** *To thrive in the AI era, experts must combine agency, judgment, and persuasion—without all three, they risk becoming marginalized, sidelined, or lost in hype.*\n\n\nThe rest of this note looks at what that transition means for technology leaders and how to respond before AI commoditizes more of the work that once looked distinctive. The scenarios below are illustrative composites, not case studies; use them as prompts for reflection rather than as proof that every organization will follow the same path.\n\n## Why You Cannot Simply Delegate This to AI\n\nAI can support agency, judgment, and persuasion, but it cannot fully own them because these skills sit where information meets accountability. A model can generate options, arguments, summaries, and risks. It cannot be responsible for the consequences, repair trust after a bad call, understand the informal history of a team, or decide which trade-offs are legitimate for your organization.\n\n| Skill | AI can help by... | Leaders cannot delegate... |\n| --- | --- | --- |\n| Agency | Surfacing opportunities, drafting experiments, finding patterns, and reducing the cost of starting. | Choosing to act before there is a mandate, taking responsibility for the initiative, and creating momentum across people who did not ask for change. |\n| Judgment | Comparing options, listing trade-offs, stress-testing assumptions, and exposing blind spots. | Deciding what matters here, now, with these people, constraints, politics, customers, risks, and values. |\n| Persuasion | Drafting narratives, adapting language for audiences, preparing objections, and improving clarity. | Earning trust, reading the room, handling resistance, and making a decision feel legitimate to the people who must live with it. |\n\nThe pattern is simple: AI can expand the surface area of thinking, but leaders still own direction, accountability, and consent. The more AI contributes, the more important it becomes to know which parts must remain human-led.\n\n![Diagram showing AI support artifacts separated from human ownership of direction, accountability, consent, and trust.](assets/images/prepare-for-ai-future/ai-support-human-ownership.jpeg)\n**Figure 3:** *AI can expand thinking, but direction, accountability, and consent remain human-led.*\n\n## 1. Agency: The Era of Waiting is Over\n\nThere was a time when senior technical leaders could wait for requirements to roll in, produce a reference model, review a plan, or escalate a decision, and move on. That time has passed. AI doesn't wait. Neither do modern product teams.\n\nThe leaders most likely to thrive with AI take initiative. They create momentum rather than waiting for it, and they do not need permission to begin leading change.\n\n**Scenario:** A mid-size logistics company is seeing inefficiencies across its microservices: latency, duplication, and poor observability. A principal engineer does not wait for a formal initiative. She uses AI tools to review design documents, trace dependency patterns, and identify likely areas of redundancy. Then she builds a small event-driven prototype with observability built in and brings the engineering manager and platform team into the conversation. She does not ask if it is her job; she makes it her job. That's agency.\n\nWhen agency is missing, AI adoption becomes something that happens *to* the organization instead of something leaders shape deliberately.\n\n| Without agency | With agency |\n| --- | --- |\n| Teams wait for a formal mandate, experiment in private, duplicate effort, and argue about AI in the abstract. | A leader starts a bounded experiment, shares what worked and failed, and creates enough evidence for a real decision. |\n| Risk-averse stakeholders define the pace by default because nobody has shown a responsible path forward. | The leader brings security, delivery, and product concerns into the experiment early, making responsible adoption easier to support. |\n\nTo assess your agency, ask yourself:\n* Are you sparking conversations about how AI will reshape your tech stack or delivery model?\n* Have you tested AI-driven design tools to cut down repetitive effort in your own workflow?\n* Are you advocating for technical, architectural, or operating-model changes that align with new business needs—even if nobody asked yet?\n\nAgency means moving from \"solution provider\" or \"escalation handler\" to strategic instigator. As AI absorbs more routine work, technology leaders must bring more leadership to the work that remains.\n\n## 2. Judgment: When AI Gives You 10 Options, Can You Choose the Right One?\n\nAI is prolific. It can produce many plausible designs, plans, trade-off summaries, and metrics. But the real question is which one works here, now, with your teams, constraints, and organizational history. AI does not know that context. Accountable leaders do.\n\n**Scenario:** A VP of Engineering asks AI to draft three plausible plans for introducing AI-assisted development across the organization. One plan centralizes expertise in a platform team, another embeds champions in every product group, and a third opens access broadly with lightweight guardrails. On paper, all three could work. But she knows two product groups are already under delivery pressure, security wants auditable usage, and managers need time to learn what good AI-assisted work looks like. She chooses a staged adoption plan: a small enablement team, clear policy, a few visible pilots, and manager coaching before broad rollout.\n\nThis is judgment: choosing through technical, organizational, and human constraints at the same time.\n\n| AI can suggest... | Leaders must decide... |\n| --- | --- |\n| Several plausible architecture options | Which option fits the team's skills, risk tolerance, and operating model |\n| A rollout plan for a new tool or practice | Whether the organization has the capacity, trust, and governance to absorb it |\n| A policy draft or decision memo | What trade-offs are acceptable, who must be consulted, and where accountability sits |\n| A list of risks and mitigations | Which risks matter in this context and which ones are noise |\n| A polished stakeholder summary | Whether the story is honest, useful, and tied to outcomes people care about |\n\nWhen judgment is missing, polished AI output and market hype can create false confidence. The danger is not that AI suggests a bad option; it is that a leader accepts a plausible option, or follows the fashionable one, without understanding whether the organization can execute it.\n\n| Without judgment | With judgment |\n| --- | --- |\n| A leader forwards an AI-generated rollout plan because it looks complete or matches the latest hype cycle. Teams are overloaded, security pauses the rollout, and managers lose trust in the initiative. | A leader treats the AI plan as input, tests it against team capacity and governance constraints, and stages adoption through pilots. |\n| The loudest metric wins because the recommendation sounds data-driven. | The leader asks what the metric hides: operational load, migration risk, learning cost, customer impact, or reversibility. |\n\nTo assess your judgment skills, ask yourself:\n* Can you look at five viable AI-generated options and quickly eliminate the ones that will not fly in your context?\n* Are you connecting technical choices with business constraints, team skills, and cultural readiness?\n* Do you balance optimization with delivery risk and long-term maintainability—even if it is less flashy?\n\nJudgment turns outputs into outcomes. Without it, leaders are left with only more generated artifacts.\n\n## 3. Persuasion: Influence Is the New Essential Skill\n\nBeing right is not enough. Many technically sound proposals fail because they never gain support.\n\nIn flatter, faster-moving organizations, technology leaders cannot simply hand off decisions. They need to influence across engineering, legal, finance, operations, and sometimes marketing.\n\n**Scenario:** A staff engineer at a SaaS company proposes migrating key services to a modular platform model using containers and service meshes. Engineering is interested. Leadership is not. So he reframes the proposal not as a technical upgrade, but as a way to reduce release friction, improve SLAs for premium customers, and simplify compliance reporting. Suddenly, the proposal is easier for non-technical stakeholders to evaluate.\n\nThis is persuasion: making the right decision legible and compelling to other people.\n\nWhen persuasion is missing, good technical direction dies as a private conviction. The proposal may be correct, but it does not become a decision.\n\n| Without persuasion | With persuasion |\n| --- | --- |\n| A staff engineer explains the migration in terms of containers, meshes, and platform purity. Finance hears cost, product hears delay, and leadership shelves the proposal. | The same engineer explains how the change reduces release friction, protects premium SLAs, and simplifies compliance reporting. Stakeholders can now evaluate the trade-off. |\n| A manager tells teams to \"use AI more\" without a story about why, where, and how quality will be protected. | The manager connects AI use to a concrete workflow, explains guardrails, and shows how the team will review AI-assisted work. |\n\nTo practice your persuasion skills, try this:\n\n* Replace \"Kubernetes is more scalable\" with \"This lets us launch new customer features two weeks faster.\"\n* Translate \"reduces tech debt\" into \"frees up developer time for revenue-generating features.\"\n* Use visual storytelling or simulations to explain the impact—not just the architecture.\n* Your artifacts are only as useful as your ability to sell the story behind them.\n\nTools change. The need to influence does not.\n\n![Loop diagram connecting agency, judgment, and persuasion in AI-assisted technology leadership.](assets/images/prepare-for-ai-future/agency-judgment-persuasion-loop.jpeg)\n**Figure 4:** *Agency, judgment, and persuasion work as a loop: initiate, choose, and align.*\n\n\n## Immediate Practices: What to Do This Week\n\nNielsen frames the current period as a short transition toward AI-native work. The practical question, then, is what technology leaders should do now, in their own teams and routines. The answer is not a transformation program; it is a set of habits you can start practicing immediately.\n\n**Automate Low-Risk Work First**  \nDo not make manual diagramming, dependency documentation, or first-pass status writing your default. Use AI to draft templates, compare patterns, summarize constraints, and produce first-pass governance text. Treat AI as a fast assistant that needs supervision: useful for breadth and speed, but not a substitute for accountability.\n\n**Develop Judgment Intentionally**  \nStart collecting real examples of AI-generated designs, plans, and recommendations, then review them critically. What's missing? What's unscalable? What's politically impossible? Build decision trees. Run technical and organizational \"tabletop exercises\" with peers to hone your instincts.\n\n**Practice Persuasion in Small Moments**  \nTry explaining your technical choices to someone in sales. Or your CFO. Can you make them care? Can you translate abstract tech into tangible business value? Don't wait for the big presentation. Influence happens in hallway chats and Slack threads.\n\n**Keep Fundamentals Sharp—But Look Up**  \nKeep your fundamentals sharp (cloud, security, scalability), but widen your lens. Read about AI governance, ethics, team dynamics, product strategy, and operating models. The best technology leaders of tomorrow will be technical enough to build trust and broad enough to guide business impact.\n\nTry a simple one-week practice loop:\n\n1. Pick one real decision, plan, or communication you already need to produce.\n2. Ask AI for three materially different options, not one answer.\n3. Reject at least one option and write down why it would fail in your context.\n4. Ask AI for risks, then compare them with the risks your organization would actually care about.\n5. Rewrite the recommendation for a non-technical stakeholder.\n6. Share the result with one peer and ask where your judgment was weak.\n\n![Six-step practice loop for using AI to develop leadership judgment and persuasion.](assets/images/prepare-for-ai-future/one-week-practice-loop.jpeg)\n**Figure 5:** *A small weekly loop turns AI use into practice for judgment, persuasion, and accountable decision-making.*\n\n## Mindset Shifts for the AI Transition Era\n\nThe practices above are about what to do this week. The deeper shift is how you orient yourself over the next few years. Nielsen's article goes beyond skills; it is also a prompt to rethink how technical leadership works when AI changes the cost of analysis, drafting, and experimentation.\n\n**Don’t just automate—rethink the work.**  \nThe goal is not only to make old routines faster. It is to ask which routines should change when AI can draft, compare, critique, and simulate options. Some of this is available now; some is still frontier work. The important habit is experimentation.\n\n**Expect the practice to keep changing.**  \nAgency, judgment, and persuasion are durable capabilities, but the way leaders practice them will keep changing as AI improves. Today's agency may mean starting a careful pilot; tomorrow it may mean orchestrating AI agents across product, security, and operations workflows. Today's judgment may mean reviewing generated plans; tomorrow it may mean deciding how much autonomy to grant a system. Today's persuasion may mean rewriting a technical proposal for finance; tomorrow it may mean helping people trust, contest, and improve decisions made with AI in the loop.\n\n**Move before the playbook is settled.**  \nNobody knows exactly what AI-native engineering leadership looks like yet. That is your chance. If you invent and test now, you will learn faster than those waiting for consensus.\n\n**Choose your environment wisely.**  \nWorking at an AI-native or AI-first organization will accelerate your learning. If you are in a culture that blocks responsible experimentation, your growth will slow. If you are in a cautious culture with real governance concerns, use judgment: disciplined adoption beats denial and hype.\n\n**Retire low-value habits.**  \nMastering legacy frameworks can still matter when those systems run the business. Clinging to outdated governance models is different. Be willing to trade technical prestige for future-relevant judgment.\n\n**Prepare for flatter leadership.**  \nTeams are flattening. The future technology leader is not a gatekeeper, but a guide. Your ability to influence across autonomous teams will define your impact.\n\n## You Are Not Being Replaced, But the Work Is Changing\n\nNielsen uses a stark analogy: around 2030, old skills may be the equivalent of \"being an experienced mammoth hunter.\" The point is not that every old skill disappears overnight. The point is that expertise loses value when the work around it changes.\n\nThat might sound dramatic, but the direction is plausible. AI may increasingly draft code, compare options, and detect performance risks. But it will not automatically know that your customer ops team is burned out, or that your sales lead needs a feature by next quarter, or that your team is already quietly resisting the platform shift.\n\nThat's where you come in. Your value is no longer in drawing boxes—it's in drawing people together.\n\nTechnology leadership should always connect technology with people, outcomes, and change. AI is a powerful tool. But leadership is still a human job.\n\n## Final Thoughts\n\n[Gregor Hohpe argues](https://architectelevator.com/architecture/multiple-dimensions/) that architects do not need to be the smartest people in the room; their work is to make everyone else smarter. The same principle applies to principal engineers, staff engineers, engineering managers, directors, VPs, and CTOs.\n\nThat insight is even more relevant in an AI-driven world. Effective leadership is not about knowing everything. It is about helping people and intelligent systems work better through the right tools, guidance, and context.\n\nThe future will likely favor leaders who enhance collective intelligence, whether human or artificial.\n\nThe more powerful the tools become, the more technology leadership depends on human agency, contextual judgment, and the ability to align people around meaningful decisions. AI changes the medium of the work, but it does not remove the need for accountable leadership.\n\n\n## To Probe Further\n* [Use the AI Transition Period to Transition Your Career](https://www.uxtigers.com/post/ai-transition-career-transition), by Jakob Nielsen, 2025\n* [Think Like An Architect, Part 2: Architects See More Dimensions](https://architectelevator.com/architecture/multiple-dimensions/), by Gregor Hohpe, 2020\n\n## Questions to Consider\nUse the following questions to consider how AI is changing your role and which capabilities will matter most going forward.\n\n* *What parts of your workflow could AI take over today?*\n* *How are you preparing to guide AI-generated outputs with human context?*\n* *When was the last time you had to convince a non-technical stakeholder to back a technical choice?*\n* *How would you reframe a technical decision in business terms?*\n"}]}</script>

            function inline(s) {
                // Posts are trusted content, so raw HTML passes through unescaped
                // (some posts embed inline <blockquote>, <div>, etc.).
                // Stray ampersands still get fixed up.
                s = s.replace(/&(?![a-zA-Z]+;|#\d+;)/g, '&amp;');
                s = s.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<a class="image-link" href="$2" target="_blank" rel="noopener noreferrer"><img alt="$1" src="$2"></a>');
                s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
                s = s.replace(/`([^`]+)`/g, function (_, c) {
                    return '<code>' + c.replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</code>';
                });
                s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
                s = s.replace(/~~([^~\n]+)~~/g, '<del>$1</del>');
                s = s.replace(/(^|[^*])\*([^*\n]+)\*/g, '$1<em>$2</em>');
                return s;
            }

            while (i < lines.length) {
                const line = lines[i];
                if (!line.trim()) {
                    i++;
                    continue;
                }

                const fence = line.match(/^```(\w*)\s*$/);
                if (fence) {
                    i++;
                    const buf = [];
                    while (i < lines.length && !/^```\s*$/.test(lines[i])) {
                        buf.push(lines[i]);
                        i++;
                    }
                    i++;
                    const escaped = buf.join('\n').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                    const cls = fence[1] ? ' class="lang-' + fence[1] + '"' : '';
                    out.push('<pre><code' + cls + '>' + escaped + '</code></pre>');
                    continue;
                }

                const h = line.match(/^(#{1,6})\s+(.*)$/);
                if (h) {
                    out.push('<h' + h[1].length + '>' + inline(h[2]) + '</h' + h[1].length + '>');
                    i++;
                    continue;
                }

                if (/^\s*(?:-\s*){3,}\s*$/.test(line) || /^\s*\*{3,}\s*$/.test(line)) {
                    out.push('<hr>');
                    i++;
                    continue;
                }

                if (/^>\s?/.test(line)) {
                    const buf = [];
                    while (i < lines.length && /^>\s?/.test(lines[i])) {
                        buf.push(lines[i].replace(/^>\s?/, ''));
                        i++;
                    }
                    out.push('<blockquote>' + renderMarkdown(buf.join('\n')) + '</blockquote>');
                    continue;
                }

                if (tableRow.test(line) && i + 1 < lines.length && tableSep.test(lines[i + 1])) {
                    const headers = splitRow(line);
                    i += 2;
                    const rows = [];
                    while (i < lines.length && tableRow.test(lines[i])) {
                        rows.push(splitRow(lines[i]));
                        i++;
                    }
                    let html = '<table><thead><tr>';
                    headers.forEach(h => {
                        html += '<th>' + inline(h) + '</th>';
                    });
                    html += '</tr></thead><tbody>';
                    rows.forEach(r => {
                        html += '<tr>';
                        r.forEach(c => {
                            html += '<td>' + inline(c) + '</td>';
                        });
                        html += '</tr>';
                    });
                    html += '</tbody></table>';
                    out.push(html);
                    continue;
                }

                if (bullet.test(line) || ordered.test(line)) {
                    // Indent of the first bullet defines this list's base level.
                    // Deeper-indented bullets become nested lists (rendered by
                    // recursing into renderMarkdown). Same-or-less indent at a
                    // bullet starts a sibling item (or ends the list).
                    const firstMatch = line.match(bullet) || line.match(ordered);
                    const baseIndent = firstMatch[1].length;
                    const isOrdered = ordered.test(line);
                    const items = [];
                    while (i < lines.length) {
                        const cur = lines[i];
                        if (!cur.trim()) {
                            // blank line breaks the list (matches CommonMark-ish behaviour)
                            i++;
                            break;
                        }
                        const mBul = cur.match(bullet);
                        const mOrd = cur.match(ordered);
                        const m = mBul || mOrd;
                        if (!m) break;
                        if (m[1].length < baseIndent) break;
                        if (m[1].length > baseIndent) break; // shouldn't happen at top of loop
                        // Same-type check: switching between -/* and 1. closes the list
                        if (isOrdered !== !!mOrd) break;

                        const itemBuf = [m[3]];
                        const nestedBuf = [];
                        i++;
                        while (i < lines.length) {
                            const nxt = lines[i];
                            if (!nxt.trim()) break;
                            const nBul = nxt.match(bullet);
                            const nOrd = nxt.match(ordered);
                            const nm = nBul || nOrd;
                            if (nm) {
                                if (nm[1].length > baseIndent) {
                                    // nested list line — dedent and stash
                                    nestedBuf.push(nxt.slice(baseIndent + 2));
                                    i++;
                                    continue;
                                }
                                // sibling or end of list
                                break;
                            }
                            // Plain continuation text
                            if (nestedBuf.length) {
                                // continuation inside the nested block
                                nestedBuf.push(nxt.slice(baseIndent + 2));
                            } else {
                                itemBuf.push(nxt.trim());
                            }
                            i++;
                        }

                        let liHtml = inline(itemBuf.join('\n'));
                        if (nestedBuf.length) {
                            liHtml += renderMarkdown(nestedBuf.join('\n'));
                        }
                        items.push('<li>' + liHtml + '</li>');
                    }
                    out.push((isOrdered ? '<ol>' : '<ul>') + items.join('') + (isOrdered ? '</ol>' : '</ul>'));
                    continue;
                }

                const buf = [line];
                i++;
                while (i < lines.length && lines[i].trim() && !/^#{1,6}\s/.test(lines[i]) && !/^>\s?/.test(lines[i]) && !bullet.test(lines[i]) && !ordered.test(lines[i]) && !/^```/.test(lines[i]) && !tableRow.test(lines[i])) {
                    buf.push(lines[i]);
                    i++;
                }
                out.push('<p>' + inline(buf.join(' ')) + '</p>');
            }
            return out.join('\n');
        }

        // Block dispatcher. New block types plug in here.
        const renderers = {
            markdown: function (block) {
                const div = document.createElement('div');
                div.innerHTML = renderMarkdown(block.content);
                return div;
            },
            mermaid: function (block) {
                // Mermaid scans elements with class "mermaid" whose textContent
                // is the diagram source. We collect these nodes and run
                // mermaid.run() once after all blocks are in the DOM.
                const div = document.createElement('div');
                div.className = 'mermaid';
                div.textContent = block.content;
                return div;
            },
            'force-graph': function (block) {
                // build.py emits parsed JSON: {nodes:[{id,size}], links:[{source,target}]}.
                // We instantiate force-graph after the container is in the DOM
                // so it can measure its own width.
                const div = document.createElement('div');
                div.className = 'force-graph';
                const data = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.ForceGraph) return;
                    const maxSize = data.nodes.reduce((m, n) => Math.max(m, n.size || 1), 1);
                    window.ForceGraph()(div)
                        .graphData(data)
                        .width(div.clientWidth)
                        .height(div.clientHeight)
                        .nodeRelSize(4)
                        .nodeVal(n => Math.max(20 * (n.size || 1) / maxSize, 0.001))
                        .nodeLabel(n => n.id + ' (' + (n.size || 1) + ')')
                        .nodeColor(() => 'rgba(135, 206, 235, 0.7)')
                        .linkColor(() => 'rgba(60, 60, 60, 0.4)')
                        .linkDirectionalArrowLength(4)
                        .linkDirectionalArrowRelPos(1)
                        .linkWidth(1);
                });
                return div;
            },
            'bubble-chart': function (block) {
                // build.py emits {nodes:[{name,size}]}. Renders a D3 circle-pack
                // SVG (same shape as the obren.io reference, just inline).
                const wrap = document.createElement('div');
                wrap.className = 'bubble-chart';
                const payload = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.d3) return;
                    const diameter = 480;
                    const fill = '#c0deed';
                    const textColor = '#111111';
                    const fontSize = 12;

                    const svg = window.d3.select(wrap).append('svg')
                        .attr('viewBox', '0 0 ' + diameter + ' ' + diameter)
                        .attr('width', diameter)
                        .attr('height', diameter);

                    const root = window.d3.hierarchy({children: payload.nodes})
                        .sum(d => d.size || 0)
                        .sort((a, b) => b.value - a.value);

                    window.d3.pack().size([diameter, diameter]).padding(2)(root);

                    const node = svg.selectAll('g')
                        .data(root.leaves())
                        .enter().append('g')
                        .attr('transform', d => 'translate(' + d.x + ',' + d.y + ')');

                    node.append('title').text(d => d.data.name + ': ' + d.value);
                    node.append('circle').attr('r', d => d.r).style('fill', fill);
                    node.append('text')
                        .attr('dy', '.3em')
                        .style('text-anchor', 'middle')
                        .style('fill', textColor)
                        .style('font-size', fontSize + 'px')
                        .text(d => d.data.name.substring(0, Math.max(0, Math.floor(d.r / 3))));
                });
                return wrap;
            }
        };

        const mermaidNodes = [];
        data.blocks.forEach(function (block) {
            const r = renderers[block.type];
            if (!r) {
                const pre = document.createElement('pre');
                pre.textContent = '[unknown block type: ' + block.type + ']';
                root.appendChild(pre);
                return;
            }
            const node = r(block);
            if (node instanceof Node) {
                root.appendChild(node);
                if (block.type === 'mermaid') mermaidNodes.push(node);
            }
        });

        if (mermaidNodes.length && window.mermaid) {
            window.mermaid.initialize({startOnLoad: false, theme: 'default'});
            window.mermaid.run({nodes: mermaidNodes});
        }
    })();
</script>
</body>
</html>
