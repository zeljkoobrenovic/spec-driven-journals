<script id="data" type="application/json">{"meta": {"title": "Software Has Seasons Now: Fashion-Driven Development for Generative AI Products", "date": "2026-05-28", "author": "by Željko Obrenović (obren.io)", "permalink": "fashion-driven-software-development", "timetoread": "20 min", "excerpt": "Model-powered products may need frequent reinterpretation around new materials. When generative models become the material your product is made from, development starts to look less like stable long-term planning and more like short, seasonal, taste-driven fashion.", "tags": "ai product development, software development, evaluation, gen-ai, product strategy", "logo": "assets/images/fashion-driven-software-development/logo.jpeg", "logo_credit": "Image generated by Google Gemini (gemini-3-pro-image-preview)", "icon": "assets/icons/fashion.png"}, "tags": ["ai product development", "software development", "evaluation", "gen-ai", "product strategy"], "modalities": [{"key": "index", "label": "Article", "meta": {}, "blocks": [{"type": "markdown", "content": "> **KEY POINTS:**\n>\n> * **When the model is the product's material, every major release can change the product itself** — what is possible, what customers expect, what breaks, and what should be rebuilt — so model-powered products need **frequent reinterpretation** around new materials.\n> * **Fashion is the useful metaphor** for this: **short seasons** and **changing materials** combined with taste, craft, and brand identity. It is **not fad-driven development** — the point is moving fast while protecting **customer value and trust**, not chasing novelty.\n> * **It extends modern product management rather than replacing it.** Outcome thinking still matters, but roadmaps, discovery, and evaluation must now account for **unstable model materials**.\n\n<br>\n**Model-powered products** may need **frequent reinterpretation** around new materials. That is the central thesis of fashion-driven software development. When an AI model is only a tool used by developers, a better model may help the team build faster. But when a generative model is part of **the product's material**, a better model can change the product itself: its workflow, interface, quality bar, unit economics, customer promise, and competitive position. The **planning horizon** becomes shorter. Stability becomes more seasonal. Product fit becomes harder to predict from capability charts alone.\n\nAnd \"**better model**\" does not mean \"**better product**\" automatically. A model can improve dramatically in general benchmarks while becoming worse for your specific workflow, tone, latency target, safety boundary, expert control, or unit economics.\n\nThis post was inspired by a talk by [Samuel Beek](https://samuelbeek.com/), founder and CEO of [Schematik](https://lsvp.com/company/schematik/) and formerly CPO at [VEED](https://veed.io), at an Engineering Excellence meetup in Amsterdam. While describing his work at VEED, the phrase that stuck with me was that software development started to **feel like fashion**. VEED operated in a product category where the underlying generative AI models for video and image creation kept improving dramatically, so each new model could make previous workflows, interfaces, and assumptions feel old.\n\nThat observation is bigger than one company. It points to a distinction that is easy to miss in AI strategy conversations.\n\nThere is **AI-assisted software development**: developers use AI to write code, review pull requests, generate tests, summarize incidents, or draft documentation. This changes the productivity of the development process.\n\nAnd there is **AI-powered product development**: the product's customer value depends directly on AI capabilities. In that world, a new model is not just a better tool for the team. It is **a new material** for the product itself.\n\nThose require **different operating models**.\n\nIf AI helps your developers write code faster, you may need new engineering practices. If AI changes what your product can do, you may need a new product operating model. The second case can look surprisingly like fashion.\n\n## Two Very Different AI Conversations\n\nMost organizations are having both conversations at once, often using the same words.\n\n| Question | AI-assisted development | AI-powered product development |\n| --- | --- | --- |\n| Where is AI used? | Inside the delivery process. | Inside the customer experience. |\n| What improves first? | Developer throughput, review speed, documentation, test scaffolding. | Product capability, creative range, personalization, automation, user outcomes. |\n| What changes when a new model appears? | The team may code, test, or analyze faster. | The product may need to be redesigned around new capabilities and new regressions. |\n| Primary risk | Low-quality generated work entering the codebase. | A product experience becoming obsolete, generic, unsafe, regressed, or misaligned with customer value. |\n| Core discipline | Engineering review, tests, architecture, security, developer workflow. | Product judgment, model evaluation, customer evidence, quality control, business-value validation. |\n\nThe distinction matters because AI-assisted development can create **false progress**. A team can ship more artifacts, faster, while the product itself is **falling behind** what new models make possible.\n\nFor a model-powered product, the key question is not only \"Can we build this faster?\" It is \"Should this product **still exist in this shape** after the model changes?\"\n\nThat is a different question. It is closer to fashion than to traditional software planning.\n\n![Diagram contrasting AI-assisted development with AI-powered product development.](assets/images/fashion-driven-software-development/two-ai-conversations.jpeg)\n**Figure 1:** *AI-assisted development changes delivery speed; AI-powered products can change shape when the model material changes.*\n\n## Why Fashion Is Not a Superficial Metaphor\n\nWhen software people say \"fashion\", they often mean \"fad\": something shallow, temporary, and irrational. That is not the meaning I want here.\n\nFashion is **not only trend chasing**. The fashion industry is a system for turning changing materials, culture, taste, identity, seasonality, production constraints, and commercial demand into designed products. A fashion house has to know what is changing and **what must remain recognizable**. It has to experiment, edit, produce, market, learn, and archive.\n\nIt also has to accept **limited predictability**. You can study materials, production cost, past sales, customer segments, and cultural signals. You still cannot derive next season's taste from first principles. Timing, social proof, identity, surprise, fatigue, and context matter.\n\nThat maps surprisingly well to AI product development.\n\nLars Holmquist's [Intelligence on tap: AI as a new design material](https://interactions.acm.org/archive/view/july-august-2017/intelligence-on-tap) helps explain why AI changes product design: **intelligence as material**. But **generative AI adds a harder problem**. The tap does not deliver the same material every season. The material changes in quality, cost, latency, modalities, controllability, and user expectations. That is why model-powered products need not only AI design literacy, but **seasonal product judgment**.\n\n| Fashion concept | AI product parallel |\n| --- | --- |\n| Fabric and materials | Foundation models, APIs, model costs, latency, context windows, modalities, tool use. |\n| Season | Model release cycles, platform shifts, user expectation changes, new creative patterns. |\n| Collection | A coherent product release built around what the new model makes possible. |\n| Silhouette | The dominant product shape: workflow, interface, interaction model, output form. |\n| Fit | Whether the product actually works for the user's job, context, and taste. |\n| Craft | Prompting, data flows, UX, editing controls, guardrails, retrieval, orchestration, evaluation. |\n| Brand identity | The durable promise customers trust, even as features and models change. |\n| Runway | Prototype, demo, launch video, internal model showcase. |\n| Retail performance | Adoption, retention, willingness to pay, expansion, production usage. |\n| Archive | What the team learns from past releases, failures, prompts, examples, and evaluations. |\n\nFashion moves because the world moves. AI products move because **the capability substrate moves**.\n\nA fashion designer cannot pretend new fabric, new manufacturing techniques, new cultural signals, and new customer taste do not matter. An AI product team cannot pretend model quality, multimodality, reasoning, generation speed, cost, and user expectations are stable.\n\nBut good fashion is not chaos. It is disciplined change.\n\n![AI model releases represented as changing materials being reinterpreted into product workflows and interfaces.](assets/images/fashion-driven-software-development/model-as-changing-material.jpeg)\n**Figure 2:** *When the model is part of the product material, each major model release can force a reinterpretation of the product.*\n\n## What Changes When the Model Is the Core Material\n\nIn traditional software, a team often assumes that the underlying material is relatively stable. Programming languages, databases, cloud platforms, and UI frameworks evolve, but the product's core behavior is usually under the team's control. You can plan a roadmap, build features, refactor, maintain, and improve incrementally.\n\nAI-powered products are different. The model is part of the material, and **the material changes from outside**.\n\nWhen a new model arrives, several things can happen at once:\n\n* A workflow that required five steps becomes one model call.\n* A careful prompt chain becomes unnecessary because the model handles the task directly.\n* A custom interface becomes too rigid because users can now express richer intent.\n* A previously impossible output becomes normal.\n* A premium feature becomes table stakes.\n* A quality workaround becomes technical debt.\n* A latency or cost change makes a new interaction pattern viable.\n* A safety or consistency problem appears in a new form.\n* A golden workflow that worked reliably on the previous model starts failing.\n* A model that is better overall becomes worse for your specific use case.\n\nThis creates **a product-management problem**, not only an engineering problem. The team has to ask what to **preserve**, rebuild, retire, and explore.\n\nIn a video or image product, a new generation model might change the default output quality so much that the old editing flow feels over-engineered. Or it might unlock a new creative workflow where users describe intent instead of manipulating layers manually. Or it might make the product more powerful but less predictable, forcing new controls, previews, rollback, and evaluation.\n\nThe model is not a stable dependency with a strictly improving version number. It is **an unstable capability**. Each release is partly an upgrade, partly a migration, and partly **a new failure surface**. The previous model's quirks may have become part of the product's behavior. Customers may have learned them. Prompts may depend on them. Guardrails may have been tuned around them. A new model can remove old limitations while also **invalidating old assumptions**.\n\nThe product is still software, but the development rhythm starts to resemble collections.\n\n## Short Seasons and Unstable Materials\n\nTraditional software planning often assumes a reasonably stable substrate. A team may make a three-year platform bet, a twelve-month roadmap, or a multi-quarter architecture plan because the basic materials are expected to hold still long enough for the investment to pay back.\n\nModel-powered products weaken that assumption.\n\nThe model landscape moves in **short seasons**. A frontier model release can change output quality, latency, cost, reasoning ability, multimodal range, tool use, safety behavior, failure modes, or customer expectations in weeks. A competitor can turn a new capability into a familiar interaction pattern before your annual plan finishes. Users can develop new taste quickly once a new output quality becomes normal.\n\nThis does not mean every team should operate in panic mode. It means **stability shifts layers**. The **stable layer** may be the customer promise, data trust boundary, evaluation suite, brand identity, and architecture for swapping materials. The **unstable layer** may be the model, workflow, interface, prompting strategy, editing controls, pricing assumptions, and even the product's default interaction shape.\n\nThat is why the fashion metaphor is useful. Fashion has seasons because materials, culture, and demand do not move on a purely rational engineering schedule. AI products can behave the same way. **The new material does not wait** for the roadmap. The customer's taste does not wait for architectural convenience. The market does not move because the better model is objectively better; it moves when better capability becomes **legible and useful**.\n\nIn this environment, prediction has limits:\n\n| Planning assumption | What changes in model-powered products |\n| --- | --- |\n| Capability improvements can be mapped directly to product value. | Better models create possibilities, but customer value depends on workflow fit, trust, control, timing, and willingness to change behavior. |\n| New model versions are straightforward upgrades. | They can improve general capability while regressing your golden scenarios, expert workflows, safety assumptions, latency, or cost profile. |\n| A product interface can stay stable while the underlying engine improves. | Sometimes the new model makes the old interface feel wrong, over-specified, or unnecessarily constrained. |\n| Benchmarks tell us which model should win. | Benchmarks help, but they do not predict taste, brand fit, expert workflows, or production adoption. |\n| Long-term roadmap certainty is a sign of maturity. | For model-powered products, maturity may mean short-cycle sensing, fast evaluation, and stable principles rather than fixed feature plans. |\n| Rebuilds are exceptional events. | Reinterpretation may become seasonal: expected, budgeted, evaluated, and archived. |\n\nThe operating question becomes: What should be **stable across seasons**, and what should be easy to reinterpret when the material changes?\n\n## What This Adds to Modern Product Management\n\nGood product management is not feature-factory management.\n\nThe build-trap critique is already correct: product teams should not measure success by how many features they ship. They should understand customer problems, connect product work to business outcomes, discover opportunities, test assumptions, and create value. A product manager is not supposed to be a backlog secretary or a requirements courier.\n\nFashion-driven software development does not reverse that lesson. It depends on it.\n\nThe AI-specific shift is different: even good outcome-focused product management often assumes the solution material is stable enough to reason about for a while. Customer problems may be uncertain, but the material used to solve them is usually not reinvented every few months. In model-powered products, **problem and solution can both move**.\n\nThat changes the PM's work. The PM is no longer only connecting customer outcomes to product strategy. The PM is also **managing the fit** between changing model capability, changing customer expectations, unstable workflows, and a product promise that must remain coherent.\n\nSeveral product-management practices need an AI-era extension:\n\n| Modern product-management practice | Fashion-driven extension |\n| --- | --- |\n| Outcome orientation | Keep outcomes central, but make model assumptions explicit. A desired outcome may become easier, harder, cheaper, riskier, or obsolete when the model changes. |\n| Continuous discovery | Continue customer discovery, but add material discovery: model scouting, capability probes, cost/latency checks, failure-mode exploration, and competitor pattern watching. |\n| Product strategy | Preserve the product promise, but treat some workflows, interfaces, and value propositions as seasonal interpretations of that promise. |\n| Roadmapping | Use the roadmap as a portfolio of stable commitments, seasonal bets, learning goals, and assumptions that may expire when the model changes. |\n| Product briefs and specs | Describe value hypotheses, evaluation criteria, stop conditions, customer evidence, model assumptions, and what must be preserved, rebuilt, retired, or explored. |\n| Prioritization | Go beyond impact and effort. Ask what the new material makes obsolete, what creates customer value now, what should be delayed until the material stabilizes, and what must be tested before commitment. |\n| Launch and measurement | Treat launch as one fitting session in a longer seasonal cycle. Evaluate before, during, and after release: model quality, customer value, business value, trust, safety, and brand fit. |\n\nThis shifts the PM role from outcome steward to **outcome-and-material editor**.\n\nThe word \"editor\" matters. A fashion editor does not publish every possible look. A product manager in a model-powered product should not ship every possible model capability. The work is **selection and coherence**. Which capabilities express the product promise? Which ones confuse the customer? Which old workflows now feel unnecessary? Which expert controls must survive? Which demo is seductive but commercially weak? Which outcome is now achievable through a different shape than the team expected last quarter?\n\nThe product brief changes too. In a fashion-driven AI product, the spec should describe:\n\n* the model capability or material change that triggered the work\n* the customer behavior expected to improve\n* the old workflow, assumption, or workaround that may become obsolete\n* the stable product promise that must not be broken\n* the evaluation set that decides whether the change is worth shipping\n* the failure modes that would stop or delay the release\n* the business metric that makes the rebuild matter\n* the decision to preserve, rebuild, retire, or explore\n\nThis is where product management and spec-driven development meet. The spec is not only a delivery document. It is **a seasonal product brief**: a way to turn unstable material into a testable product bet before the team spends energy rebuilding.\n\n## What Fashion-Driven Software Development Means\n\nFashion-driven software development is **an operating model** for products built on fast-moving AI capability.\n\nIt does **not** mean chasing every trend.\n\nIt does **not** mean rebuilding because the team is bored.\n\nIt does **not** mean sacrificing reliability, architecture, or customer trust.\n\nIt means accepting that model-powered products may need frequent reinterpretation around new materials. The team needs to maintain **a durable product identity** while repeatedly redesigning workflows, interfaces, evaluation suites, and value propositions as the underlying model capability changes.\n\nThe cadence is seasonal, not because teams should imitate fashion calendars mechanically, but because **the material may not stay stable** for traditional product-planning cycles. Teams need a way to **sense, interpret, evaluate**, and respond without pretending that the future is rationally predictable.\n\nThe work has a rhythm:\n\n1. **Scout the material.** Track new models, modalities, costs, constraints, and failure modes.\n2. **Read the culture.** Understand how customer expectations and creative behaviors are shifting.\n3. **Design a collection.** Decide which product experiences should change together.\n4. **Prototype the silhouette.** Explore new workflows and interaction models before hardening implementation.\n5. **Fit on real users.** Test with representative customers, not only internal demos.\n6. **Evaluate quality and value.** Compare the new experience against existing workflows, business metrics, and customer jobs.\n7. **Release selectively.** Ship what strengthens the product identity and retire what no longer fits.\n8. **Archive the learning.** Preserve prompts, examples, evals, failures, and decisions for the next cycle.\n\nThis loop is slower than hype and faster than traditional annual planning. It treats AI capability as **unstable material** that must be continuously reinterpreted.\n\n![Loop diagram showing the operating rhythm of fashion-driven software development.](assets/images/fashion-driven-software-development/fashion-driven-operating-loop.jpeg)\n**Figure 3:** *Fashion-driven software development is a repeatable loop for reinterpreting product value around changing model materials.*\n\n## The Dangerous Version: Fad-Driven Development\n\nThere is an unhealthy version of this metaphor. It happens when teams confuse fashion with novelty.\n\nFad-driven development sounds like this:\n\n* \"The new model is out; we need to integrate it immediately.\"\n* \"Competitors launched an AI feature; we need one too.\"\n* \"The demo looks amazing; let's rebuild the workflow.\"\n* \"Users will understand it once they see it.\"\n* \"We can evaluate after launch.\"\n\nThis is not fashion-driven development. It is **hype chasing**.\n\nGood fashion has **taste and constraints**. A strong fashion house does not put every new fabric on the runway. It edits. It knows its customer. It knows the brand. It understands fit. It makes bets, but it also knows that **novelty without coherence** becomes noise.\n\nAI product teams need the same discipline.\n\n| Fad-driven AI product work | Fashion-driven AI product work |\n| --- | --- |\n| Integrates every new model because it is new. | Studies whether the model changes the product's material possibilities. |\n| Ships demos as product. | Uses demos to discover possible new silhouettes, then tests fit. |\n| Optimizes for announcement value. | Optimizes for customer value and business value. |\n| Rebuilds without preserving product identity. | Changes the garment while preserving the promise customers trust. |\n| Treats evaluation as cleanup. | Treats evaluation as design infrastructure. |\n| Measures \"AI usage\". | Measures whether users achieve better outcomes. |\n\nThe difference is **judgment**.\n\n## Evaluation Is the Fitting Room\n\nIn traditional software, tests often answer one question: did the system do what we specified?\n\nIn AI-powered products, evaluation has to answer more:\n\n* Is the output good?\n* Is it good for this user?\n* Is it good for this use case?\n* Is it better than the previous version?\n* Which old workflows did it break?\n* Is it worth the cost?\n* Is it controllable enough?\n* Is it consistent enough?\n* Is it safe enough?\n* Does it still express the product's promise?\n* Does it create business value, or only demo value?\n\nThis is why **evaluation becomes more important** as rebuild cycles accelerate. If implementation gets cheaper and model capability changes faster, the bottleneck moves. The hard part is no longer only building. The hard part is knowing **whether it should exist**.\n\nIn fashion terms, evaluation is the fitting room, quality control, buyer feedback, sales floor, return data, and brand review combined. The garment may look impressive on the runway, but it still has to **fit, last, and sell**.\n\nAI products need the same layers of evaluation.\n\n| Evaluation layer | What it checks |\n| --- | --- |\n| Technical correctness | Does the workflow run, return outputs, preserve data, handle errors, and meet latency/cost constraints? |\n| Model quality | Are generated outputs accurate, coherent, useful, controllable, and consistent enough? |\n| Regression | Did the new model break important old use cases? |\n| Comparative quality | Is the new model or workflow materially better than the current one? |\n| Customer value | Does it help users complete a real job faster, better, cheaper, or with more creative range? |\n| Business value | Does it improve conversion, retention, expansion, margin, differentiation, or strategic positioning? |\n| Trust and safety | Does it create unacceptable risk, ambiguity, surprise, or misuse? |\n| Brand fit | Does the experience still feel like the product customers chose? |\n\n![AI product demo passing through evaluation checkpoints before becoming a customer-ready product experience.](assets/images/fashion-driven-software-development/evaluation-fitting-room.jpeg)\n**Figure 4:** *Evaluation is the fitting room where model novelty is tested against customer value, business value, trust, and brand fit.*\n\nThe strongest teams do not only ask \"Can we build with the new model?\" They ask \"What must be true for this rebuild to be worth it?\"\n\n## The Evaluation Suite Becomes a Strategic Asset\n\nIf AI products change like fashion, **evaluation suites** become product infrastructure.\n\nThey should not live only in engineering. They should be **co-owned** by product, design, engineering, data, support, and sometimes legal or trust teams. They should include quantitative metrics, qualitative review, customer evidence, and business signals.\n\nA serious evaluation suite for a model-powered product might include:\n\n* **Golden scenarios:** representative user jobs the product must continue to serve.\n* **Creative benchmark prompts:** examples that test range, style, control, and output quality.\n* **Failure galleries:** known bad outputs that should not reappear.\n* **Customer panels:** real users or power users who test new workflows before broad release.\n* **Side-by-side comparisons:** old model versus new model, old workflow versus new workflow.\n* **Cost and latency thresholds:** because a magical experience that is too slow or too expensive may not be a product.\n* **Safety and policy checks:** especially when outputs are public, personalized, regulated, or brand-sensitive.\n* **Business dashboards:** activation, task completion, paid conversion, retention, expansion, support load, refund rate.\n* **Decision logs:** why the team chose to adopt, delay, wrap, fine-tune, or reject a model.\n\nThis is where spec-driven work becomes important. A spec is **the pattern card** for a rebuild. It states the intent, expected customer value, non-goals, evaluation criteria, and stop conditions before the team starts cutting fabric.\n\n**Without evaluation**, fashion-driven software development becomes **mood-driven development**. **With evaluation**, it becomes **a disciplined way** to keep product value aligned with a moving capability frontier.\n\n## Customer Value Beats Model Novelty\n\nThe most dangerous sentence in AI product development is: **\"The new model is better.\"**\n\nBetter for whom?\n\nBetter at what?\n\nBetter enough to change the product?\n\nBetter after cost, latency, safety, and control are included?\n\nBetter in a way customers will notice and pay for?\n\nA model can be **stronger on benchmarks** and still make **your product worse**. It may produce higher-quality outputs but reduce user control. It may be more creative but less consistent. It may be more capable but slower. It may make a workflow magical for new users while breaking expert users' muscle memory.\n\nIn fashion terms, the fabric may be beautiful but wrong for the garment.\n\nThe evaluation question must move from model capability to product value:\n\n| Model question | Product-value question |\n| --- | --- |\n| Is the model more capable? | Does it improve the user's job to be done? |\n| Is the output more impressive? | Does the user trust, control, and use it? |\n| Is the demo better? | Does production usage improve? |\n| Can we remove steps? | Did we remove useful control or only friction? |\n| Can we generate more? | Did we help the user decide, edit, publish, or sell better? |\n| Is the model cheaper? | Does the unit economics improvement create a better product or only better margin? |\n\nThis is why **customer evidence** becomes more important, not less. When models move quickly, internal taste can **drift away from real user value**. Teams start admiring what the model can do instead of measuring what customers need.\n\nThe antidote is **direct contact with users**, especially heavy users. Watch what they actually do. Ask what they kept, edited, rejected, exported, paid for, shared, or abandoned. Use analytics, but do not let **analytics replace observation**.\n\n## What Should Stay Stable\n\nFashion changes, but **not everything changes**.\n\nThe strongest brands have continuity. They may reinvent silhouettes, materials, campaigns, and seasonal collections, but they preserve a recognizable identity. Customers do not only buy novelty. They buy trust, aspiration, fit, taste, status, utility, and meaning.\n\nAI products need the same **stable core**.\n\nThe product team should be clear about what does not change with every model release:\n\n* The customer's core job.\n* The product's promise.\n* The quality bar.\n* The trust boundary.\n* The brand or experience identity.\n* The data and privacy commitments.\n* The review and safety principles.\n* The economics that make the product viable.\n* The learning archive that prevents repeated mistakes.\n\nThis stable core is what allows **fast rebuilding** without losing the product. Otherwise, every model release turns into **an identity crisis**.\n\n[AI Will Do the Heavy Lifting. You Still Need to Lead](prepare-for-ai-future.html) argues that technology leaders need **agency, judgment, and persuasion** as AI changes the work. Fashion-driven software development is one place where all three show up. Leaders need agency to explore new model capabilities early, judgment to decide what should change, and persuasion to align teams around rebuilding only what creates value.\n\n## How Teams Should Work\n\nFashion-driven software development changes team rhythms.\n\nTeams need **a capability radar**, not only a roadmap. Someone must continuously watch model releases, competitor patterns, cost shifts, tool ecosystems, user behavior, and emerging creative workflows. This is not research theater. It is **material scouting**.\n\nTeams need **seasonal planning**, not only long-term certainty. The roadmap should distinguish **stable commitments** from seasonal bets: what the product will keep promising, what the team will explore, what model assumptions are expiring, and which workflows may need reinterpretation soon.\n\nTeams need **explicit product specs**. A model-powered rebuild should state the material change, value hypothesis, customer evidence, evaluation plan, and stop condition. This is not a return to feature-factory requirements. It is outcome-focused product work with **the model material named** as an assumption.\n\nTeams need **collection thinking**, not only ticket thinking. A model release may require a coherent set of changes across onboarding, creation flow, editing controls, pricing, evaluation, and marketing. Shipping isolated AI features can create **a fragmented product**.\n\nTeams need **fast rebuild paths**. If the model changes the material, old abstractions may become wrong. The architecture should make it possible to **swap models**, compare workflows, run experiments, and retire obsolete chains without heroic rewrites.\n\nTeams need **evaluation before enthusiasm**. Every model adoption should come with a small business case, test plan, customer-value hypothesis, and stop condition.\n\nTeams need **archives**. Keep examples of past prompts, outputs, failures, user feedback, release decisions, and benchmark results. The archive prevents the team from repeating old mistakes and helps new people understand why the product has its shape.\n\nTeams need **taste**. This is uncomfortable for software organizations because taste feels subjective. But AI products often produce language, images, video, recommendations, workflows, or decisions that users experience qualitatively. **Taste does not replace data.** It guides what data to collect, what good means, and which trade-offs matter.\n\n## Practical Principles\n\nIf you are building an AI-powered product, these principles are a starting point.\n\n**Separate scouting from commitment.**  \nExplore new models quickly, but do not confuse a promising prototype with a product decision.\n\n**Write the value hypothesis first.**  \nWhat customer behavior should improve? What business metric should move? What old pain should disappear? What new risk might appear?\n\n**Use seasonal bet contracts.**  \nDescribe the model-material change, the customer outcome, the product promise to preserve, the evaluation suite, and the decision criteria for shipping, delaying, retiring, or reverting.\n\n**Plan in seasons, not certainties.**  \nName which model assumptions are stable enough to build on, which are seasonal bets, and which decisions should be revisited when the material changes.\n\n**Keep a stable product promise.**  \nIf every model release changes what the product is for, the team is not innovating; it is drifting.\n\n**Version evaluation artifacts.**  \nTreat prompts, golden scenarios, comparison sets, and review criteria as product assets. Update them deliberately.\n\n**Test old jobs with new models.**  \nA new model can improve headline quality while breaking workflows that loyal users depend on.\n\n**Treat model upgrades as migrations.**  \nDo not assume a stronger model is a drop-in replacement. Test golden scenarios, expert workflows, safety cases, latency, cost, and customer-visible behavior before switching.\n\n**Measure business value.**  \n\"More AI\" is not a metric. Better activation, retention, margin, trust, and customer outcomes are metrics.\n\n**Preserve taste and accountability.**  \nAI can generate options. It cannot decide what your product should stand for.\n\n**Retire carefully.**  \nWhen old workflows become obsolete, remove them carefully. Tell customers what improved and what trade-offs changed.\n\n## Anti-Patterns\n\nWatch for these traps.\n\n**Runway-only product development.**  \nThe team optimizes for demos, launch videos, and internal excitement. Production users find the workflow incomplete, uncontrollable, or not worth paying for.\n\n**Model-release panic.**  \nEvery new model triggers urgent rewrites. The roadmap becomes reactive, and the team loses its product identity.\n\n**Feature-factory relapse.**  \nThe team responds to model change by generating more roadmap items, tickets, and launches instead of asking which customer outcomes, workflows, and product promises need reinterpretation.\n\n**False long-term stability.**  \nThe team treats today's model behavior, cost, workflow, or user expectation as a durable foundation. Six months later the product is organized around assumptions that no longer hold.\n\n**Benchmark blindness.**  \nThe team upgrades because the new model is better overall, then discovers that it is worse for the product's most important prompts, customers, workflows, or economics.\n\n**Evaluation theater.**  \nThe team creates a few examples that show the new model looking good, then calls that validation. Real evaluation includes failures, edge cases, old workflows, and business impact.\n\n**Architecture as costume jewelry.**  \nThe system looks modern because it uses the newest model or agent framework, but the underlying product value is weak.\n\n**Customer amnesia.**  \nThe team forgets why users came in the first place. It replaces useful controls with magical automation and calls the loss of control simplicity.\n\n**Implementation pride.**  \nThe team celebrates how fast it rebuilt instead of asking whether the rebuild mattered.\n\n## The Real Shift\n\nGenerative AI can make software faster to write. That part is obvious.\n\nThe less obvious shift is that some products are now made from **changing material** on short, uneven timelines. If your product depends on generative models, you are not only managing a codebase. You are also extending modern product management itself: discovery, roadmaps, product briefs, prioritization, launch decisions, and success metrics all have to account for **unstable product material**.\n\nThat is why fashion is a useful metaphor. It reminds us that **speed is not enough**. Novelty is not enough. Stability is seasonal. Prediction is limited. Taste matters. Fit matters. Timing matters. Quality matters. The archive matters. Commercial response matters.\n\nAbove all, **evaluation matters**.\n\nWhen you need to rebuild often, implementation becomes less scarce. The scarce capability is knowing whether **the fresh product creates value**.\n\nFashion-driven software development is not about being fashionable. It is about building with **changing materials** without losing the customer.\n\n## To Probe Further\n\n* [Samuel Beek](https://samuelbeek.com/)\n* [How VEED turned AI into its biggest growth driver ($40M+)](https://www.youtube.com/watch?v=V-uYGwgeaQM), Samuel Beek\n* [Intelligence on tap: AI as a new design material](https://interactions.acm.org/archive/view/july-august-2017/intelligence-on-tap), Lars Holmquist\n* [Fashion Industry](https://www.britannica.com/art/fashion-industry), Britannica\n* [Escaping the Build Trap](https://www.oreilly.com/library/view/escaping-the-build/9781491973783/), Melissa Perri\n* [From Prompting to Intent: The Leadership Ladder for Working with AI](leadership-ladder.html)\n* [AI Will Do the Heavy Lifting. You Still Need to Lead](prepare-for-ai-future.html)\n\n## Questions to Consider\n\nUse these questions if your product depends directly on AI capability.\n\n* Are you using AI only to ship faster, or does AI change what your product can be?\n* Which parts of your product are built around assumptions that the latest models may already have changed?\n* What is your evaluation suite for customer value, not only model quality?\n* Which old user jobs must still work after a model upgrade?\n* Where could a stronger model be worse for your specific product promise?\n* What is your product's stable promise across model seasons?\n* Where are you following hype instead of testing fit?\n* Which assumptions in your roadmap are stable commitments, and which are seasonal bets?\n* What cannot be predicted from model benchmarks and needs customer evidence?\n* Does your product spec describe the model-material change, the value hypothesis, and the evaluation criteria?\n* Which outcomes are now achievable through a different workflow because the solution material changed?\n* If a new model made half your workflow obsolete, how quickly would you know what to rebuild and what to preserve?\n"}]}, {"key": "summary", "label": "Summary", "meta": {"timetoread": "2 min"}, "blocks": [{"type": "markdown", "content": "When a generative model is part of the product itself — not just a tool developers use — development stops resembling stable long-term planning and starts resembling fashion: short seasons, changing materials, limited predictability, and taste-driven, evaluation-heavy judgment. Model-powered products may need frequent reinterpretation around new materials.\n\nThe distinction that matters: **AI-assisted development** (AI helps developers ship faster) is a productivity shift. **AI-powered product development** (customer value depends directly on the model) is an operating-model shift. A new model release isn't a better tool for the team — it's a new material for the product, and it can change workflows, interfaces, quality bars, unit economics, and the competitive position at once.\n\n**What changes**\n\n- Roadmaps become **seasonal portfolios**: stable commitments separated from seasonal bets and expiring model assumptions.\n- Product briefs become **value hypotheses with evaluation contracts**: the material change, the customer outcome, the promise to preserve, the evaluation suite, and the stop condition — decided before rebuilding.\n- Discovery adds **model-material scouting** alongside customer discovery: capability probes, cost/latency checks, failure-mode exploration, competitor patterns.\n- Model upgrades become **migrations, not drop-ins**: a model that is better overall can be worse for your golden scenarios, expert controls, safety boundaries, latency targets, or margins.\n- The **evaluation suite becomes a strategic asset** — golden scenarios, failure galleries, side-by-side comparisons, business dashboards — co-owned by product, design, and engineering.\n\n**What it costs**\n\n- Continuous material scouting and short-cycle re-planning instead of multi-quarter certainty.\n- Evaluation artifacts and learning archives maintained as versioned, first-class product assets.\n- Accepting limited predictability: customer taste, timing, culture, and competitor moves cannot be derived from model benchmarks.\n\n**What we are not doing**\n\n- Not fad-driven development: no integrating every release, no rebuilding for novelty, no shipping demos as product.\n- Not replacing outcome-focused product management, durable architecture, testing, or customer trust — this extends them for unstable model materials.\n- Not claiming every software team should rebuild continuously; the stable core (promise, quality bar, trust boundary, brand) is what makes fast rebuilding safe.\n\nThe Article tab covers the full fashion-to-AI mapping, the eight-step seasonal operating loop, anti-patterns, and practical principles. Related: [From Prompting to Intent: The Leadership Ladder for Working with AI](leadership-ladder.html), [AI Will Do the Heavy Lifting. You Still Need to Lead](prepare-for-ai-future.html).\n"}]}, {"key": "dialog", "label": "Conversation", "meta": {"timetoread": "9 min listen"}, "blocks": [{"type": "markdown", "content": "## Software has seasons?\n\n**Ben:** \"Fashion-driven software development.\" I'll be honest, Ana — that sounds like a parody of our industry. We already chase enough shiny things.\n\n**Ana:** That reaction is exactly why the metaphor needs defending, because the post means almost the opposite of trend-chasing. Start with the distinction underneath it. There's AI-*assisted* development — developers using AI to write code, review PRs, draft docs. That's a productivity shift. And there's AI-*powered* product development — products whose customer value depends directly on the model. That's an operating-model shift.\n\n**Ben:** And the difference shows up when... what, a new model ships?\n\n**Ana:** Exactly then. If AI is a tool for your team, a better model means you build faster. If AI is the material your product is made from, a better model can change the product itself — its workflow, its interface, its quality bar, its unit economics, its customer promise. The phrase that started the whole article came from Samuel Beek describing his time at VEED: software development started to *feel like fashion*. Video and image models kept improving so dramatically that each release could make the previous workflows and interfaces feel old.\n\n**Ben:** So the team isn't asking \"can we build this faster?\" anymore.\n\n**Ana:** They're asking something much more uncomfortable: \"should this product still exist in this shape after the model changes?\"\n\n## Why fashion and not just \"move fast\"?\n\n**Ben:** Fine, but why fashion specifically? Why not just say \"iterate faster\"?\n\n**Ana:** Because fashion carries the parts \"move faster\" misses. The fashion industry is a system for turning changing materials, culture, taste, and commercial demand into designed products — with discipline. Materials map to foundation models, costs, latency, modalities. Seasons map to release cycles. A collection is a coherent product release built around what the new material makes possible. Fit is whether it actually works for the customer's job. And the brand is the durable promise that survives while everything else changes.\n\n**Ben:** You skipped the part of fashion everyone mocks: nobody can predict next season.\n\n**Ana:** That's not a bug in the metaphor — it's the point. You can study materials, past sales, customer segments, and still not derive next season's taste from first principles. Same here: you cannot predict product fit from benchmark curves. Taste, timing, social proof, workflow fit, competitor moves — they all matter, and they're not in the model card.\n\n**Ben:** Okay, here's my real objection. Model releases are upgrades. Version numbers go up. Where's the instability?\n\n**Ana:** That's the most dangerous assumption in the whole space. A model can improve dramatically on general benchmarks and get *worse* for your product — your golden scenarios, your expert controls, your tone, your latency target, your safety boundary, your margins. Your customers learned the old model's quirks. Your prompts depend on them. Your guardrails were tuned around them. Every release is partly an upgrade, partly a migration, and partly a new failure surface. In fashion terms: the new fabric may be beautiful and wrong for the garment.\n\n## Isn't this just product management?\n\n**Ben:** Let me push from the other side. Good product managers already reject the feature factory. Outcome over output, escape the build trap — Melissa Perri wrote the book. What's actually new here?\n\n**Ana:** And the post is explicit: fashion-driven development *depends* on that lesson, it doesn't reverse it. The new part is this — even good outcome-focused product management quietly assumes the solution *material* is stable enough to reason about for a while. Customer problems are uncertain, sure, but the stuff you solve them with isn't usually reinvented every few months. In model-powered products, problem and solution can both move.\n\n**Ben:** So what does the PM actually do differently on Monday?\n\n**Ana:** Four concrete extensions. Roadmaps become portfolios — stable commitments separated from seasonal bets and from assumptions that expire when the model changes. Product briefs become value hypotheses with evaluation contracts: what material change triggered this, what customer behavior should improve, what promise must not break, what evaluation decides if it ships, and the stop condition. Discovery adds material scouting next to customer discovery. And prioritization gains a new question: what did the new material just make obsolete?\n\n**Ben:** That's a lot of editorial judgment.\n\n**Ana:** The post literally calls the PM an outcome-and-material *editor*. A fashion editor doesn't publish every possible look. A PM shouldn't ship every possible model capability. The work is selection and coherence.\n\n## The fitting room\n\n**Ben:** You've said \"evaluation\" about five times now. Why is it the center of this?\n\n**Ana:** Because when rebuild cycles accelerate and implementation gets cheaper, the bottleneck moves. The hard part is no longer building — it's knowing whether the thing should exist. In fashion terms, evaluation is the fitting room, quality control, buyer feedback, and return data combined. The garment can look stunning on the runway and still have to fit, last, and sell.\n\n**Ben:** And concretely, for a model-powered product?\n\n**Ana:** Layers. Technical correctness, model quality, regression — did the new model break old use cases — comparative quality, customer value, business value, trust and safety, brand fit. And the suite itself becomes a strategic asset: golden scenarios, failure galleries that bad outputs must never re-enter, side-by-side comparisons, customer panels, cost and latency thresholds, decision logs. Co-owned by product, design, and engineering — not parked in QA.\n\n**Ben:** Without that?\n\n**Ana:** Without evaluation, fashion-driven development degrades into mood-driven development. With it, it's a disciplined way to track a moving capability frontier.\n\n## The dangerous version\n\n**Ben:** Describe the team that reads this post and gets it wrong.\n\n**Ana:** Easy, because the post names it: fad-driven development. \"New model's out, integrate it now.\" \"Competitor shipped an AI feature, we need one.\" \"The demo is amazing, rebuild the workflow.\" \"We'll evaluate after launch.\" That's hype chasing wearing the metaphor as a costume.\n\n**Ben:** And the tell that separates them?\n\n**Ana:** Judgment about the stable core. A strong fashion house doesn't put every new fabric on the runway — it knows its customer and its brand. The fashion-driven team is clear about what does *not* change with a model release: the customer's core job, the product promise, the quality bar, the trust boundary, the data commitments, the economics. That stable core is what makes fast rebuilding safe. Without it, every release becomes an identity crisis.\n\n## What this is not\n\n**Ben:** Close us out. What should listeners *not* take from this?\n\n**Ana:** Four things, deliberately scoped out. It's not a claim that every team should rebuild continuously — if AI is just your tooling, your world is calmer. It doesn't replace durable architecture, testing, reliability, or product strategy; it sits on top of them. It's not a fashion-industry history lesson or a model-evaluation tutorial. And it's not a VEED case study — Beek's talk was the inspiration, not the evidence.\n\n**Ben:** So the one-line takeaway?\n\n**Ana:** Using AI to build software is a productivity shift. Building software *from* AI is an operating-model shift — short seasons, unstable materials, limited predictability. The scarce skill isn't shipping fast. It's knowing whether the fresh product creates value. That's also why [AI Will Do the Heavy Lifting. You Still Need to Lead](prepare-for-ai-future.html) matters here: agency to explore early, judgment to decide what changes, persuasion to align the team around rebuilding only what's worth it.\n\n**Ben:** Software with a fitting room. I can live with that. *(laughs)*\n\n**Ana:** Better than software with only a runway.\n"}]}, {"key": "comics", "label": "Comic", "meta": {"timetoread": "3 min"}, "blocks": [{"type": "markdown", "content": "<!-- comic-style\n{\n  \"cast\": \"MAYA: a pragmatic product lead, short dark hair, glasses, rolled-up sleeves, calm and slightly amused, here working in a software atelier with a measuring tape around her neck. REX: an over-eager boxy robot AI assistant, one bent antenna, glowing rectangular eyes, perpetually excited about every new thing.\",\n  \"style\": \"Clean two-tone explainer comic, thick ink outlines, flat colors with blue/teal accents on a light cream background, generous white space, hand-lettered speech bubbles with SHORT readable text (max 8 words per bubble), simple geometric fashion-atelier and office settings mixing garments with software symbols, no photorealism, no dense text, no title text.\"\n}\n-->\n\nWhy building on generative models feels like fashion — in eight panels.\n\n![Comic panel: a robot bursts in announcing a new AI model while the product lead pins a garment labeled 'our product'.](assets/images/fashion-driven-software-development/comic-01-new-model-drops.jpeg)\n**Panel 1:** *Every major model release can change what is possible, what customers expect, and what should be rebuilt.*\n\n![Comic panel: two doors, one where AI is a tool for builders and one where AI is the product material itself.](assets/images/fashion-driven-software-development/comic-02-two-conversations.jpeg)\n**Panel 2:** *AI-assisted development is a productivity shift; AI-powered product development is an operating-model shift.*\n\n![Comic panel: three increasingly different bolts of model fabric beside a dated garment made from the oldest one.](assets/images/fashion-driven-software-development/comic-03-changing-fabric.jpeg)\n**Panel 3:** *The model is part of the product's material — and the material changes from outside, in short seasons.*\n\n![Comic panel: a benchmark-winning garment fits the golden-scenario mannequin badly, with a splitting seam.](assets/images/fashion-driven-software-development/comic-04-beautiful-but-wrong.jpeg)\n**Panel 4:** *'Better model' is not 'better product': general gains can break your golden scenarios, controls, costs, or promises.*\n\n![Comic panel: a six-station loop on the wall — scout, design, fit, evaluate, release, archive — walked by the duo.](assets/images/fashion-driven-software-development/comic-05-seasonal-loop.jpeg)\n**Panel 5:** *The rhythm is seasonal: scout the material, design a collection, fit on real users, evaluate, release selectively, archive the learning.*\n\n![Comic panel: a garment passes through evaluation archways for job fit, cost, and product promise before shipping.](assets/images/fashion-driven-software-development/comic-06-fitting-room.jpeg)\n**Panel 6:** *Evaluation is the fitting room: demos must still fit the job, justify the cost, and keep the promise customers trust.*\n\n![Comic panel: a mannequin buried under every new fabric and gadget while the product lead holds shears and one clean sketch.](assets/images/fashion-driven-software-development/comic-07-fad-driven.jpeg)\n**Panel 7:** *The unhealthy version is fad-driven development: novelty without coherence. Good fashion edits.*\n\n![Comic panel: a fixed wardrobe labeled promise, quality bar, and trust surrounded by rotating seasonal racks.](assets/images/fashion-driven-software-development/comic-08-stable-core.jpeg)\n**Panel 8:** *Fashion changes, but not everything changes: the stable core is what lets the product rebuild fast without losing itself.*\n"}]}]}</script>
<script>
    (function () {
        const data = JSON.parse(document.getElementById('data').textContent);
        const root = document.getElementById('content');

        const postId = (data.meta && data.meta.id) ? String(data.meta.id) : '';
        const postStatusRaw = (data.meta && data.meta.status) ? String(data.meta.status) : '';
        if (postId || postStatusRaw) {
            const header = document.getElementById('post-header');
            let sectionEl = header.querySelector('p.section');
            if (!sectionEl) {
                sectionEl = document.createElement('p');
                sectionEl.className = 'section';
                header.insertBefore(sectionEl, header.firstChild);
            }
            // Status pill goes first, then a " / " separator before the existing
            // content (section name and/or id).
            if (postStatusRaw) {
                const parts = postStatusRaw.split(':');
                const statusName = parts[0].trim();
                const statusColor = (parts[1] || '').trim();
                const wrap = document.createElement('span');
                wrap.className = 'post-status';
                const dot = document.createElement('span');
                dot.className = 'status-dot';
                if (statusColor) dot.style.background = statusColor;
                wrap.appendChild(dot);
                wrap.appendChild(document.createTextNode(statusName));
                if (sectionEl.firstChild) {
                    sectionEl.insertBefore(document.createTextNode(' • '), sectionEl.firstChild);
                    sectionEl.insertBefore(wrap, sectionEl.firstChild);
                } else {
                    sectionEl.appendChild(wrap);
                }
            }
            if (postId) {
                if (sectionEl.firstChild) sectionEl.appendChild(document.createTextNode(' • '));
                sectionEl.appendChild(document.createTextNode(postId));
            }
        }

        const tagsHost = document.getElementById('tags');
        (data.tags || []).forEach(function (t) {
            const span = document.createElement('span');
            span.className = 'tag';
            span.textContent = t;
            tagsHost.appendChild(span);
        });

        // Minimal markdown renderer. Supports: ATX headings, paragraphs, blockquotes,
        // unordered/ordered lists, fenced code, inline code, bold/italic/strikethrough, links, images, hr.
        // Sufficient for the posts in this repo; replace with a fuller parser if needed.
        function renderMarkdown(src) {
            const lines = src.replace(/\r\n/g, '\n').split('\n');
            const out = [];
            let i = 0;

            const bullet = /^(\s*)([-*])\s+(.*)$/;
            const ordered = /^(\s*)(\d+)\.\s+(.*)$/;
            const tableRow = /^\s*\|(.+)\|\s*$/;
            const tableSep = /^\s*\|?\s*:?-{3,}:?\s*(\|\s*:?-{3,}:?\s*)+\|?\s*$/;

            function splitRow(s) {
                let t = s.trim();
                if (t.startsWith('|')) t = t.slice(1);
                if (t.endsWith('|')) t = t.slice(0, -1);
                return t.split('|').map(c => c.trim());
            }

            function inline(s) {
                // Posts are trusted content, so raw HTML passes through unescaped
                // (some posts embed inline <blockquote>, <div>, etc.).
                // Stray ampersands still get fixed up.
                s = s.replace(/&(?![a-zA-Z]+;|#\d+;)/g, '&amp;');
                s = s.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<a class="image-link" href="$2" target="_blank" rel="noopener noreferrer"><img alt="$1" src="$2"></a>');
                s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
                s = s.replace(/`([^`]+)`/g, function (_, c) {
                    return '<code>' + c.replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</code>';
                });
                s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
                s = s.replace(/~~([^~\n]+)~~/g, '<del>$1</del>');
                s = s.replace(/(^|[^*])\*([^*\n]+)\*/g, '$1<em>$2</em>');
                return s;
            }

            while (i < lines.length) {
                const line = lines[i];
                if (!line.trim()) {
                    i++;
                    continue;
                }

                const fence = line.match(/^```(\w*)\s*$/);
                if (fence) {
                    i++;
                    const buf = [];
                    while (i < lines.length && !/^```\s*$/.test(lines[i])) {
                        buf.push(lines[i]);
                        i++;
                    }
                    i++;
                    const escaped = buf.join('\n').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                    const cls = fence[1] ? ' class="lang-' + fence[1] + '"' : '';
                    out.push('<pre><code' + cls + '>' + escaped + '</code></pre>');
                    continue;
                }

                const h = line.match(/^(#{1,6})\s+(.*)$/);
                if (h) {
                    out.push('<h' + h[1].length + '>' + inline(h[2]) + '</h' + h[1].length + '>');
                    i++;
                    continue;
                }

                if (/^\s*(?:-\s*){3,}\s*$/.test(line) || /^\s*\*{3,}\s*$/.test(line)) {
                    out.push('<hr>');
                    i++;
                    continue;
                }

                if (/^>\s?/.test(line)) {
                    const buf = [];
                    while (i < lines.length && /^>\s?/.test(lines[i])) {
                        buf.push(lines[i].replace(/^>\s?/, ''));
                        i++;
                    }
                    out.push('<blockquote>' + renderMarkdown(buf.join('\n')) + '</blockquote>');
                    continue;
                }

                if (tableRow.test(line) && i + 1 < lines.length && tableSep.test(lines[i + 1])) {
                    const headers = splitRow(line);
                    i += 2;
                    const rows = [];
                    while (i < lines.length && tableRow.test(lines[i])) {
                        rows.push(splitRow(lines[i]));
                        i++;
                    }
                    let html = '<table><thead><tr>';
                    headers.forEach(h => {
                        html += '<th>' + inline(h) + '</th>';
                    });
                    html += '</tr></thead><tbody>';
                    rows.forEach(r => {
                        html += '<tr>';
                        r.forEach(c => {
                            html += '<td>' + inline(c) + '</td>';
                        });
                        html += '</tr>';
                    });
                    html += '</tbody></table>';
                    out.push(html);
                    continue;
                }

                if (bullet.test(line) || ordered.test(line)) {
                    // Indent of the first bullet defines this list's base level.
                    // Deeper-indented bullets become nested lists (rendered by
                    // recursing into renderMarkdown). Same-or-less indent at a
                    // bullet starts a sibling item (or ends the list).
                    const firstMatch = line.match(bullet) || line.match(ordered);
                    const baseIndent = firstMatch[1].length;
                    const isOrdered = ordered.test(line);
                    const items = [];
                    while (i < lines.length) {
                        const cur = lines[i];
                        if (!cur.trim()) {
                            // blank line breaks the list (matches CommonMark-ish behaviour)
                            i++;
                            break;
                        }
                        const mBul = cur.match(bullet);
                        const mOrd = cur.match(ordered);
                        const m = mBul || mOrd;
                        if (!m) break;
                        if (m[1].length < baseIndent) break;
                        if (m[1].length > baseIndent) break; // shouldn't happen at top of loop
                        // Same-type check: switching between -/* and 1. closes the list
                        if (isOrdered !== !!mOrd) break;

                        const itemBuf = [m[3]];
                        const nestedBuf = [];
                        i++;
                        while (i < lines.length) {
                            const nxt = lines[i];
                            if (!nxt.trim()) break;
                            const nBul = nxt.match(bullet);
                            const nOrd = nxt.match(ordered);
                            const nm = nBul || nOrd;
                            if (nm) {
                                if (nm[1].length > baseIndent) {
                                    // nested list line — dedent and stash
                                    nestedBuf.push(nxt.slice(baseIndent + 2));
                                    i++;
                                    continue;
                                }
                                // sibling or end of list
                                break;
                            }
                            // Plain continuation text
                            if (nestedBuf.length) {
                                // continuation inside the nested block
                                nestedBuf.push(nxt.slice(baseIndent + 2));
                            } else {
                                itemBuf.push(nxt.trim());
                            }
                            i++;
                        }

                        let liHtml = inline(itemBuf.join('\n'));
                        if (nestedBuf.length) {
                            liHtml += renderMarkdown(nestedBuf.join('\n'));
                        }
                        items.push('<li>' + liHtml + '</li>');
                    }
                    out.push((isOrdered ? '<ol>' : '<ul>') + items.join('') + (isOrdered ? '</ol>' : '</ul>'));
                    continue;
                }

                const buf = [line];
                i++;
                while (i < lines.length && lines[i].trim() && !/^#{1,6}\s/.test(lines[i]) && !/^>\s?/.test(lines[i]) && !bullet.test(lines[i]) && !ordered.test(lines[i]) && !/^```/.test(lines[i]) && !tableRow.test(lines[i])) {
                    buf.push(lines[i]);
                    i++;
                }
                out.push('<p>' + inline(buf.join(' ')) + '</p>');
            }
            return out.join('\n');
        }

        // Block dispatcher. New block types plug in here.
        const renderers = {
            markdown: function (block) {
                const div = document.createElement('div');
                div.innerHTML = renderMarkdown(block.content);
                return div;
            },
            mermaid: function (block) {
                // Mermaid scans elements with class "mermaid" whose textContent
                // is the diagram source. We collect these nodes and run
                // mermaid.run() once after all blocks are in the DOM.
                const div = document.createElement('div');
                div.className = 'mermaid';
                div.textContent = block.content;
                return div;
            },
            'force-graph': function (block) {
                // build.py emits parsed JSON: {nodes:[{id,size}], links:[{source,target}]}.
                // We instantiate force-graph after the container is in the DOM
                // so it can measure its own width.
                const div = document.createElement('div');
                div.className = 'force-graph';
                const data = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.ForceGraph) return;
                    const maxSize = data.nodes.reduce((m, n) => Math.max(m, n.size || 1), 1);
                    window.ForceGraph()(div)
                        .graphData(data)
                        .width(div.clientWidth)
                        .height(div.clientHeight)
                        .nodeRelSize(4)
                        .nodeVal(n => Math.max(20 * (n.size || 1) / maxSize, 0.001))
                        .nodeLabel(n => n.id + ' (' + (n.size || 1) + ')')
                        .nodeColor(() => 'rgba(135, 206, 235, 0.7)')
                        .linkColor(() => 'rgba(60, 60, 60, 0.4)')
                        .linkDirectionalArrowLength(4)
                        .linkDirectionalArrowRelPos(1)
                        .linkWidth(1);
                });
                return div;
            },
            'bubble-chart': function (block) {
                // build.py emits {nodes:[{name,size}]}. Renders a D3 circle-pack
                // SVG (same shape as the obren.io reference, just inline).
                const wrap = document.createElement('div');
                wrap.className = 'bubble-chart';
                const payload = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.d3) return;
                    const diameter = 480;
                    const fill = '#c0deed';
                    const textColor = '#111111';
                    const fontSize = 12;

                    const svg = window.d3.select(wrap).append('svg')
                        .attr('viewBox', '0 0 ' + diameter + ' ' + diameter)
                        .attr('width', diameter)
                        .attr('height', diameter);

                    const root = window.d3.hierarchy({children: payload.nodes})
                        .sum(d => d.size || 0)
                        .sort((a, b) => b.value - a.value);

                    window.d3.pack().size([diameter, diameter]).padding(2)(root);

                    const node = svg.selectAll('g')
                        .data(root.leaves())
                        .enter().append('g')
                        .attr('transform', d => 'translate(' + d.x + ',' + d.y + ')');

                    node.append('title').text(d => d.data.name + ': ' + d.value);
                    node.append('circle').attr('r', d => d.r).style('fill', fill);
                    node.append('text')
                        .attr('dy', '.3em')
                        .style('text-anchor', 'middle')
                        .style('fill', textColor)
                        .style('font-size', fontSize + 'px')
                        .text(d => d.data.name.substring(0, Math.max(0, Math.floor(d.r / 3))));
                });
                return wrap;
            }
        };

        // Render one modality's blocks into a host element. Mermaid runs
        // scoped to just the nodes created here, so lazily rendered tabs get
        // their diagrams on first activation.
        let mermaidInitialized = false;
        function renderBlocksInto(blocks, host) {
            const mermaidNodes = [];
            blocks.forEach(function (block) {
                const r = renderers[block.type];
                if (!r) {
                    const pre = document.createElement('pre');
                    pre.textContent = '[unknown block type: ' + block.type + ']';
                    host.appendChild(pre);
                    return;
                }
                const node = r(block);
                if (node instanceof Node) {
                    host.appendChild(node);
                    if (block.type === 'mermaid') mermaidNodes.push(node);
                }
            });
            if (mermaidNodes.length && window.mermaid) {
                if (!mermaidInitialized) {
                    window.mermaid.initialize({startOnLoad: false, theme: 'default'});
                    mermaidInitialized = true;
                }
                window.mermaid.run({nodes: mermaidNodes});
            }
        }

        // Modality tabs. One <article class="pane"> per modality; panes are
        // rendered lazily on first activation (force-graph / D3 / mermaid
        // need a visible, measurable container). With a single modality the
        // tab bar stays hidden and the page looks exactly like before.
        const mods = data.modalities;
        const tabBar = document.getElementById('modality-tabs');
        const panes = {};
        const tabButtons = {};
        const renderedPanes = {};

        mods.forEach(function (m) {
            const pane = document.createElement('article');
            pane.className = 'pane';
            pane.dataset.key = m.key;
            pane.hidden = true;
            root.appendChild(pane);
            panes[m.key] = pane;
        });

        const defaultKey = mods.some(m => m.key === 'index') ? 'index' : mods[0].key;

        function activate(key, updateHash) {
            mods.forEach(function (m) {
                const isActive = m.key === key;
                panes[m.key].hidden = !isActive;
                if (tabButtons[m.key]) {
                    tabButtons[m.key].classList.toggle('active', isActive);
                    tabButtons[m.key].setAttribute('aria-selected', isActive ? 'true' : 'false');
                }
            });
            // Unhide first, then render: the chart libraries measure widths.
            if (!renderedPanes[key]) {
                renderBlocksInto(mods.find(m => m.key === key).blocks, panes[key]);
                renderedPanes[key] = true;
            }
            if (updateHash) {
                history.replaceState(null, '',
                    key === defaultKey ? location.pathname + location.search : '#' + key);
            }
        }

        if (mods.length > 1) {
            mods.forEach(function (m) {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.textContent = m.label;
                btn.setAttribute('role', 'tab');
                btn.addEventListener('click', function () { activate(m.key, true); });
                tabBar.appendChild(btn);
                tabButtons[m.key] = btn;
            });
            tabBar.hidden = false;
        }

        // The hash selects a tab only when it matches a modality key, so
        // existing anchors keep working.
        const initialHash = location.hash.slice(1);
        activate(mods.some(m => m.key === initialHash) ? initialHash : defaultKey, false);
        window.addEventListener('hashchange', function () {
            const k = location.hash.slice(1);
            if (mods.some(m => m.key === k)) activate(k, false);
        });
    })();
</script>
