<script id="data" type="application/json">{"meta": {}, "tags": [], "modalities": [{"key": "spec", "label": "Spec", "meta": {}, "blocks": [{"type": "markdown", "content": "# Spec: Breaking Up the Vibe Monolith: Architecting AI-Built Systems to Keep Their Cool\n\n## Intent\n\nDraft a new AI Notes article arguing that IT architecture in the age of AI\ncomes down to two scarce resources — **trust** and **sustainability** — and\nthat we are running short on both because software now grows faster than our\ntrust in it. The post should name the symptom (continuous re-architecting),\ndiagnose the new failure mode it produces (the **Vibe Monolith**: a system\nthat is modular on paper but behaves as a single rigid entity because its\nparts grow deeply coupled and its architecture never holds still), and trace\nthe human cost (cognitive load, collapse of clear ownership, and\nhigh-functioning burnout concentrated on the engineers *best* at AI). It\nshould then reframe the job of architecture in this era as **cooling the\nsystem down**: deciding what must stay stable while everything above it stays\nfluid — domain boundaries, API contracts, and the data model — so that fast,\nend-to-end AI development becomes something a larger group can sustainably\nbuild on.\n\nThe real question the post answers: not \"how much faster does AI let us\nbuild?\" but \"at what cost, and on whom, can we sustain that speed — and what\nstructure lets us stop paying it in people?\"\n\n## Audience\n\n- Engineering and technology leaders deciding how to scale AI-assisted\n  development beyond a small team.\n- Principal and staff engineers who own architecture and feel the\n  re-architecting churn first-hand.\n- Tech leadership watching delivery speed rise while stability and team\n  health quietly erode.\n- Readers of [Can RISC-Inspired Platforms Make AI Less Risky?](risc-for-ai-software-development.html) and\n  [Software Has Seasons Now: Fashion-Driven Development for Generative AI Products](fashion-driven-software-development.html) who want the architecture-and-people\n  side of the AI-development story.\n\nReaders should leave able to name the Vibe Monolith, recognize it in their own\nsystems, and articulate the one architectural move that addresses it: freeze\nthe high-blast-radius seams, let AI move fast inside them.\n\n## Success criteria\n\n- [ ] Reader can state the core thesis: **software now grows faster than our\n      trust in it**, and that gap — not raw capability — is the problem.\n- [ ] Reader understands that current practice leans on **brute force on both\n      sides**: brute-force generation *and* brute-force after-the-fact\n      verification, and that brute force does not scale.\n- [ ] Reader can name **continuous re-architecting** as the architectural\n      symptom, and distinguish it from the published \"AI under-refactors\"\n      finding (autocomplete era) — this is the opposite, agentic-era failure:\n      AI **won't stop re-architecting**.\n- [ ] Reader can define the **Vibe Monolith** and distinguish it from the\n      classic, distributed, and release monoliths — its defining trait is\n      instability of the architecture over time, not poor modularity at a\n      moment.\n- [ ] Reader understands the human cost: **extraneous** cognitive load,\n      collapse of clear ownership (Conway's Law / Team Topologies), and\n      **high-functioning burnout** landing hardest on the engineers most\n      fluent with AI.\n- [ ] Reader can explain why **small teams fly and scaling stalls**: AI\n      removes the individual constraint while leaving the coordination\n      constraint intact.\n- [ ] Reader can name the architectural response — **cool the system down** by\n      freezing the highest-blast-radius seams (**domain boundaries, API\n      contracts, the data model**) while letting AI move fast inside them.\n- [ ] Reader leaves with **concrete first moves** (name the seams, gate the\n      seams not the code, measure churn/PR-size, find who holds the whole\n      system, run a lightweight architecture forum) — governance that matches\n      the speed rather than slowing it.\n- [ ] Reader leaves with the closing reframe: **the way out of the burn is not\n      more force, it is better structure.**\n\n## Non-goals\n\n- Not a verdict that AI-assisted development is bad or should be slowed; the\n  fix is governance that matches the speed, not slower generation.\n- Not a tools comparison or a how-to for any specific agent, framework, or\n  platform.\n- Not a microservices-vs-monolith debate; the Vibe Monolith can occur *inside*\n  a clean microservice architecture.\n- Not a burnout self-help piece; the burnout is framed as a structural\n  consequence of architectural instability, not an individual failing.\n- The people cost does not get reduced to a mere symptom of the architecture\n  problem, nor the architecture problem to a mere cause of burnout — the two\n  halves close a loop; keep both first-class.\n\n## Modalities\n\n- [x] `summary.md` — management summary (leaders deciding if this affects how\n      they scale).\n- [x] `dialog.md` — two-host dialog (Ana carries the argument, Ben pushes the\n      \"isn't this just normal tech debt / just slow down?\" objections).\n- [x] `comics.md` — explainer comic (the 17k-line PR → clean diagram that\n      still behaves as one blob → frozen seams).\n\n## Open questions\n\nNone for the current draft.\n\n## Decision log\n\n- **2026-06-21** — Titled the post around the **Vibe Monolith** rather than\n  \"trust and sustainability.\" The coined term is the memorable, ownable idea;\n  trust/sustainability is the framing, not the hook. Rejected\n  \"IT Architecture in the Age of AI\" (the INPUT's working title) as too\n  generic for an AI Notes piece.\n- **2026-06-21** — Placed in the **AI Software Development** section next to\n  [Can RISC-Inspired Platforms Make AI Less Risky?](risc-for-ai-software-development.html), not Leadership. The burnout material is\n  strong but secondary to the architecture thesis; the two share a journal\n  thread on trust as the AI-development bottleneck.\n- **2026-06-21** — Kept the burnout half as a co-equal beat rather than a\n  closing aside. The post's distinctive claim is that system-level instability\n  *manufactures* the human cost; cutting it would reduce the piece to a generic\n  tech-debt argument.\n- **2026-06-21** — Heavy rework of INPUT.md into AI Notes house style (KEY\n  POINTS block, Title Case headings, tables of contrasts, bold-skim path),\n  rather than a light copy-edit, per author direction. Preserved the load-\n  bearing anecdotes (the 17k-line PR, the two CTOs) and the coined terms\n  verbatim.\n- **2026-06-21** — Kept the published-research caveats (AI under-refactors;\n  productivity gains are uneven; some experienced devs are slower while feeling\n  faster) because they make the argument more credible, not less.\n\n## Sources\n\n- **Internal**\n  - [Can RISC-Inspired Platforms Make AI Less Risky?](risc-for-ai-software-development.html) — trust as the adoption bottleneck;\n    reducing the platform surface AI builds on so humans can reason about it.\n  - [Software Has Seasons Now: Fashion-Driven Development for Generative AI Products](fashion-driven-software-development.html) — stable core vs. seasonal change;\n    what to hold still while the material moves.\n  - INPUT.md — the complete source essay (the 17k-line PR anecdote, the\n    monolith taxonomy, the Vibe Monolith coinage, the burnout-loop argument,\n    the \"cooling the system down\" response).\n- **External**\n  - GitClear, *AI Copilot Code Quality* (2025) — churn doubling, duplication,\n    and the decline of refactoring across 211M changed lines.\n  - *The AI Engineering Report* (2026) and Faros AI — PR size, files touched,\n    bugs per PR, and the human review/verification burden under high AI\n    adoption.\n  - Skelton & Pais, *Team Topologies* — cognitive load, Conway's Law, hidden\n    monoliths, and designing team boundaries around stable architectural seams.\n  - \"High-functioning burnout among developers after AI\" — the shift from\n    authoring to validating, and its human cost.\n  - DeepSeek — example that structural cleverness can substitute for brute\n    expenditure of compute and money.\n\n## Changelog\n\n- **2026-06-21** — Retitled to \"Breaking Up the Vibe Monolith: Architecting\n  AI-Built Systems to Keep Their Cool\" (visible `title` only; `permalink` and the\n  `breaking-vibe-monolith` slug unchanged for URL/cross-link stability). Intent\n  and criteria unchanged → stays `accepted`. *(Zeljko, AI-mediated session)*\n- **2026-06-21** — Applied post-review fixes: echoed the five \"Monday\" moves into\n  `summary.md` and `dialog.md`, folded \"scaling stalls\" into comic panel 6,\n  trimmed repeated \"burning people\" phrasing in `index.md`, plus two nits. Spec\n  and all modalities now agree → status `draft` → `accepted`. *(Zeljko,\n  AI-mediated session)*\n- **2026-06-21** — Revision pass on the article: added a \"What to Do on Monday\"\n  actions section (new Success criterion), attributed the churn/PR-size/review\n  stats to GitClear and Faros AI, referenced all four inline figures from the\n  prose, and expanded Further Reading. Spec stays `draft`. *(Zeljko,\n  AI-mediated session)*\n- **2026-06-21** — Initial spec. Status `draft`. Drives `index.md` plus\n  `summary.md`, `dialog.md`, `comics.md`. *(Zeljko, AI-mediated session)*\n"}]}]}</script>

        // Minimal markdown renderer. Supports: ATX headings, paragraphs, blockquotes,
        // unordered/ordered lists, fenced code, inline code, bold/italic/strikethrough, links, images, hr.
        // Sufficient for the posts in this repo; replace with a fuller parser if needed.
        function renderMarkdown(src) {
            const lines = src.replace(/\r\n/g, '\n').split('\n');
            const out = [];
            let i = 0;

            const bullet = /^(\s*)([-*])\s+(.*)$/;

                const buf = [line];
                i++;
                while (i < lines.length && lines[i].trim() && !/^#{1,6}\s/.test(lines[i]) && !/^>\s?/.test(lines[i]) && !bullet.test(lines[i]) && !ordered.test(lines[i]) && !/^```/.test(lines[i]) && !tableRow.test(lines[i])) {
                    buf.push(lines[i]);
                    i++;
                }
                out.push('<p>' + inline(buf.join(' ')) + '</p>');
            }
            return out.join('\n');
        }

        // Block dispatcher. New block types plug in here.
        const renderers = {
            markdown: function (block) {
                const div = document.createElement('div');
                div.innerHTML = renderMarkdown(block.content);
                return div;
            },
            mermaid: function (block) {
                // Mermaid scans elements with class "mermaid" whose textContent
                // is the diagram source. We collect these nodes and run
                // mermaid.run() once after all blocks are in the DOM.
                const div = document.createElement('div');
                div.className = 'mermaid';
                div.textContent = block.content;
                return div;
            },
            'force-graph': function (block) {
                // build.py emits parsed JSON: {nodes:[{id,size}], links:[{source,target}]}.
                // We instantiate force-graph after the container is in the DOM
                // so it can measure its own width.
                const div = document.createElement('div');
                div.className = 'force-graph';
                const data = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.ForceGraph) return;
                    const maxSize = data.nodes.reduce((m, n) => Math.max(m, n.size || 1), 1);
                    window.ForceGraph()(div)
                        .graphData(data)
                        .width(div.clientWidth)
                        .height(div.clientHeight)
                        .nodeRelSize(4)
                        .nodeVal(n => Math.max(20 * (n.size || 1) / maxSize, 0.001))
                        .nodeLabel(n => n.id + ' (' + (n.size || 1) + ')')
                        .nodeColor(() => 'rgba(135, 206, 235, 0.7)')
                        .linkColor(() => 'rgba(60, 60, 60, 0.4)')
                        .linkDirectionalArrowLength(4)
                        .linkDirectionalArrowRelPos(1)
                        .linkWidth(1);
                });
                return div;
            },
            'bubble-chart': function (block) {
                // build.py emits {nodes:[{name,size}]}. Renders a D3 circle-pack
                // SVG (same shape as the obren.io reference, just inline).
                const wrap = document.createElement('div');
                wrap.className = 'bubble-chart';
                const payload = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.d3) return;
                    const diameter = 480;
                    const fill = '#c0deed';
                    const textColor = '#111111';
                    const fontSize = 12;

                    const svg = window.d3.select(wrap).append('svg')
                        .attr('viewBox', '0 0 ' + diameter + ' ' + diameter)
                        .attr('width', diameter)
                        .attr('height', diameter);

                    const root = window.d3.hierarchy({children: payload.nodes})
                        .sum(d => d.size || 0)
                        .sort((a, b) => b.value - a.value);

                    window.d3.pack().size([diameter, diameter]).padding(2)(root);

                    const node = svg.selectAll('g')
                        .data(root.leaves())
                        .enter().append('g')
                        .attr('transform', d => 'translate(' + d.x + ',' + d.y + ')');

                    node.append('title').text(d => d.data.name + ': ' + d.value);
                    node.append('circle').attr('r', d => d.r).style('fill', fill);
                    node.append('text')
                        .attr('dy', '.3em')
                        .style('text-anchor', 'middle')
                        .style('fill', textColor)
                        .style('font-size', fontSize + 'px')
                        .text(d => d.data.name.substring(0, Math.max(0, Math.floor(d.r / 3))));
                });
                return wrap;
            }
        };

        // Render one modality's blocks into a host element. Mermaid runs
        // scoped to just the nodes created here, so lazily rendered tabs get
        // their diagrams on first activation.
        let mermaidInitialized = false;
        function renderBlocksInto(blocks, host) {
            const mermaidNodes = [];
            blocks.forEach(function (block) {
                const r = renderers[block.type];
                if (!r) {
                    const pre = document.createElement('pre');
                    pre.textContent = '[unknown block type: ' + block.type + ']';
                    host.appendChild(pre);
                    return;
                }
                const node = r(block);
                if (node instanceof Node) {
                    host.appendChild(node);
                    if (block.type === 'mermaid') mermaidNodes.push(node);
                }
            });
            if (mermaidNodes.length && window.mermaid) {
                if (!mermaidInitialized) {
                    window.mermaid.initialize({startOnLoad: false, theme: 'default'});
                    mermaidInitialized = true;
                }
                window.mermaid.run({nodes: mermaidNodes});
            }
        }

        // Modality tabs. One <article class="pane"> per modality; panes are
        // rendered lazily on first activation (force-graph / D3 / mermaid
        // need a visible, measurable container). With a single modality the
        // tab bar stays hidden and the page looks exactly like before.
        const mods = data.modalities;
        const tabBar = document.getElementById('modality-tabs');
        const panes = {};
        const tabButtons = {};
        const renderedPanes = {};

        mods.forEach(function (m) {
            const pane = document.createElement('article');
            pane.className = 'pane';
            pane.dataset.key = m.key;
            pane.hidden = true;
            root.appendChild(pane);
            panes[m.key] = pane;
        });

        const defaultKey = mods.some(m => m.key === 'index') ? 'index' : mods[0].key;

        function activate(key, updateHash) {
            mods.forEach(function (m) {
                const isActive = m.key === key;
                panes[m.key].hidden = !isActive;
                if (tabButtons[m.key]) {
                    tabButtons[m.key].classList.toggle('active', isActive);
                    tabButtons[m.key].setAttribute('aria-selected', isActive ? 'true' : 'false');
                }
            });
            // Unhide first, then render: the chart libraries measure widths.
            if (!renderedPanes[key]) {
                renderBlocksInto(mods.find(m => m.key === key).blocks, panes[key]);
                renderedPanes[key] = true;
            }
            if (updateHash) {
                history.replaceState(null, '',
                    key === defaultKey ? location.pathname + location.search : '#' + key);
            }
        }

        if (mods.length > 1) {
            mods.forEach(function (m) {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.textContent = m.label;
                btn.setAttribute('role', 'tab');
                btn.addEventListener('click', function () { activate(m.key, true); });
                tabBar.appendChild(btn);
                tabButtons[m.key] = btn;
            });
            tabBar.hidden = false;
        }

        // The hash selects a tab only when it matches a modality key, so
        // existing anchors keep working.
        const initialHash = location.hash.slice(1);
        activate(mods.some(m => m.key === initialHash) ? initialHash : defaultKey, false);
        window.addEventListener('hashchange', function () {
            const k = location.hash.slice(1);
            if (mods.some(m => m.key === k)) activate(k, false);
        });
    })();
</script>
</body>
</html>
