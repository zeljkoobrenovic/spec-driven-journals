<script id="data" type="application/json">{"meta": {}, "tags": [], "modalities": [{"key": "spec", "label": "Spec", "meta": {}, "blocks": [{"type": "markdown", "content": "# Spec: From Prompting to Intent: The Leadership Ladder for Working with AI\n\n## Intent\n\nDevelop the current rough note into a clear article about how David Marquet's\nLeader-Leader / Intent-Based Leadership model can help technology leaders work\nwith increasingly capable AI systems. The post should land one central claim:\nas AI moves from tool use toward agentic workflows, the leadership skill shifts\nfrom giving better commands to expressing clearer intent, context, constraints,\nreview boundaries, and accountability.\n\nThe article should not claim that AI has human intent, moral agency, or equal\nstanding with people. The useful analogy is about *leadership language and\ndelegation boundaries*: what humans say, what AI can do, what must be checked,\nand where responsibility remains.\n\n## Recommended direction\n\nDevelop the article as a practical **human-AI collaboration ladder** inspired by\nMarquet's model. The ladder should describe how a technology leader's\ninteraction with AI can mature:\n\n1. From exact commands.\n2. To better prompts and requests.\n3. To critique, reflection, and recommendation.\n4. To intent statements with explicit context and constraints.\n5. To bounded delegation with review points.\n6. To monitored autonomy only where evidence, guardrails, logging, ownership,\n   and escalation paths exist.\n\nThis direction is stronger than a broad \"leadership in the AI future\" essay\nbecause it gives the article a concrete mechanism: language creates the\noperating boundary between human responsibility and AI capability. It also makes\nthe article distinct from [AI Will Do the Heavy Lifting. You Still Need to Lead](prepare-for-ai-future.html), which already covers\nagency, judgment, and persuasion at a broader leadership level.\n\nDo not make the article about \"AI becoming a leader.\" Make it about people\nlearning to lead work in which AI systems can increasingly propose, critique,\nexecute, and monitor within boundaries.\n\n## Audience\n\n- Technology leaders adopting AI in engineering organizations: principal\n  engineers, staff engineers, engineering managers, directors, VPs of\n  Engineering, CTOs, and architects.\n- Leaders who already use AI tools but mostly through command-style prompts\n  and want a more disciplined model for collaboration.\n- Readers of [AI Will Do the Heavy Lifting. You Still Need to Lead](prepare-for-ai-future.html) who understand that agency, judgment,\n  and persuasion remain human leadership responsibilities and now need a more\n  concrete interaction model.\n\nReaders should walk away with a practical ladder for improving how they work\nwith AI: from command/prompt interactions toward intent, bounded delegation,\nand monitored autonomy.\n\n## Candidate titles\n\nRecommended:\n\n- `From Prompting to Intent: The Leadership Ladder for Working with AI`\n\nGood alternatives:\n\n- `Intent-Based Leadership for Human-AI Collaboration`\n- `Leading with AI Without Delegating Leadership`\n- `From Commands to Intent: How Technology Leaders Should Work with AI`\n\nAvoid titles that are too broad, such as the current\n`Leading into the AI Future: Applying the Leader-Leader Model`. It is accurate,\nbut it does not tell the reader what practical problem the post solves.\n\n## Success criteria\n\n- [x] Reader can explain, in two or three sentences, what the Leader-Leader\n      / Intent-Based Leadership model contributes to AI-era leadership.\n- [x] Reader understands that the article is adapting Marquet's model as an\n      analogy, not treating AI as a person or moral agent.\n- [x] Reader can distinguish command-style prompting from intent-based\n      collaboration.\n- [x] Reader sees a practical ladder of human-AI interaction levels, with\n      examples of language at each level.\n- [x] Reader understands that increased AI autonomy requires clarity,\n      competence checks, bounded control, review points, and escalation paths.\n- [x] Reader sees at least one negative and one positive example of human-AI\n      interaction at different maturity levels.\n- [x] Reader can apply one immediate practice, such as rewriting a command\n      prompt into an intent statement with context, constraints, success\n      criteria, and review expectations.\n- [x] Reader understands spec-driven development as a concrete way to turn\n      intent, constraints, validation, and review expectations into an\n      inspectable contract before AI acts.\n- [x] Reader will not leave with the impression that leadership can be\n      delegated to AI or that \"agentic AI\" removes human responsibility.\n- [x] The article has a non-empty excerpt, key-points block, and closing\n      questions that match the recommended direction.\n\n## Proposed article shape\n\n1. **Open with the problem**: command-style prompting works for small tasks, but\n   breaks down when AI systems are asked to explore options, make trade-offs, or\n   operate over longer workflows.\n2. **Introduce Marquet briefly**: Leader-Leader replaces \"do what I say\" with\n   intent, clarity, competence, and distributed decision-making.\n3. **Set the adaptation boundary**: AI can work from stated intent, but it does\n   not own consequences. Humans remain accountable for purpose, trade-offs,\n   consent, risk, and escalation.\n4. **Present the Human-AI Leadership Ladder** with levels, example language,\n   appropriate use, and failure modes.\n5. **Show examples**: rewrite weak command prompts into stronger intent-based\n   collaborations, preferably using engineering leadership scenarios.\n6. **Connect to spec-driven development**: show that a spec is the written\n   boundary between human intent and AI execution.\n7. **Define guardrails for higher autonomy**: scope, evidence of competence,\n   logging, review checkpoints, stop conditions, rollback, and human ownership.\n8. **Close with practices**: one or two rituals leaders can try this week, such\n   as writing prompts as intent statements or asking AI to state assumptions and\n   escalation conditions before proceeding.\n\n## Non-goals\n\n- A full summary of *Turn the Ship Around!* or *Leadership Is Language*.\n- A general article about leadership in the AI era; [AI Will Do the Heavy Lifting. You Still Need to Lead](prepare-for-ai-future.html)\n  already covers agency, judgment, and persuasion at that level.\n- A generic prompt-engineering guide.\n- A governance policy for autonomous AI agents.\n- A claim that AI genuinely has intent, ownership, commitment, or moral agency.\n- A claim that organizations should grant broad autonomy to AI systems without\n  competence evidence, auditability, and human override.\n\n## Modalities\n\nWhich docs this spec drives beyond the main article (`index.md`).\n\n- [x] `summary.md` — management summary\n- [x] `dialog.md` — two-host dialog\n- [x] `comics.md` — explainer comic\n\n## Open questions\n\nNone for the current draft.\n\nResolved in the 2026-05-28 rewrite:\n\n- Adopted `From Prompting to Intent: The Leadership Ladder for Working with AI`\n  as the article title.\n- Focused the ladder on individual and team human-AI interaction, with a short\n  role-specific implications section for technology leaders.\n- Adapted Marquet's model rather than reproducing the original ladder\n  mechanically.\n- Avoided \"AI teammate\" as the core frame and kept human accountability\n  explicit.\n- Removed the broken leadership-section link.\n- Used architecture trade-off review and delivery-risk review as the two main\n  examples.\n- Kept the existing ladder image for now with a more precise caption. A future\n  visual pass could still redraw it, but the article no longer depends on that\n  work.\n\n## Decision log\n\n- **2026-05-28** - Recommended developing the article as an\n  **intent-based human-AI collaboration ladder* al levels.\n  6. Define guardrails for bounded autonomy.\n  7. End with practices leaders can try this week.\n- **2026-05-28** - Proposed ladder shape for the article:\n\n  | Level | Human-AI mode | Typical language | Risk if overused |\n  | --- | --- | --- | --- |\n  | 1 | Command | \"Do this exact task.\" | Brittle outputs; no shared context. |\n  | 2 | Prompt/request | \"Draft a proposal for...\" | Polished but context-light artifacts. |\n  | 3 | Critique/reflection | \"Here is my thinking; challenge it.\" | Useful feedback, but still reactive. |\n  | 4 | Recommendation | \"Compare options and recommend one.\" | AI recommendation may hide assumptions. |\n  | 5 | Intent | \"I intend to achieve X under constraints Y; help design the path.\" | Requires human clarity and review discipline. |\n  | 6 | Bounded delegation | \"Execute these steps within these limits; escalate if...\" | Needs competence checks, logging, and stop conditions. |\n  | 7 | Monitored autonomy | \"Operate within this policy and report exceptions.\" | Dangerous without auditability, ownership, and rollback. |\n\n## Drafting notes\n\n- Use Marquet's model as an analogy and source of leadership language, not as a\n  claim that AI systems are people.\n- Prefer \"AI systems\", \"AI agents\", or \"AI-assisted workflows\" over \"AI\n  teammate\" unless the sentence explicitly keeps human accountability clear.\n- Keep \"agentic AI\" grounded. Use it when discussing workflows that can plan,\n  act, observe results, and continue within constraints; do not use it as a\n  hype label.\n- When describing higher ladder levels, pair every increase in autonomy with a\n  corresponding increase in clarity, competence evidence, observability, and\n  human review.\n- Make the current diagram earn its place. If it remains, relabel it for the\n  AI-specific ladder. Otherwise replace it with a simpler ladder table and a\n  cleaner generated diagram later.\n\n## Sources\n\n- **Internal**\n  - [AI Will Do the Heavy Lifting. You Still Need to Lead](prepare-for-ai-future.html) - companion post defining agency, judgment,\n    and persuasion as durable technology-leadership capabilities in the AI\n    transition.\n  - [Spec-Driven Authoring as a Lightweight Default for Posts](../foundations/spec-driven-authoring.html) - foundation record defining sibling\n    `spec.md` files as lightweight contracts for AI-mediated authoring and\n    review.\n  - [What Is Spec-Driven Product Architecture?](../spec-driven-product-architecture/what-is-spec-driven-product-architecture.html) - broader product\n    architecture example where structured specifications become the durable\n    interface between product intent, implementation, delivery, and AI agents.\n\n- **External**\n  - [David Marquet, *Turn the Ship Around!*](https://davidmarquet.com/books/turn-the-ship-around-book/)\n    - source for the Leader-Leader model and the shift from command-and-control\n    toward leadership at every level.\n  - [David Marquet, *Leadership Is Language*](https://davidmarquet.com/books/leadership-is-language/)\n    - source for the claim that leadership language shapes whether people\n    comply, contribute, or think.\n  - [David Marquet, Intent-Based Leadership overview](https://davidmarquet.com/)\n    - source for the \"I intend to...\" language, the Ladder of Leadership, and\n    the distinction between permission and intent.\n  - [Intent-Based Leadership](https://www.intentbasedleadership.com/about-us)\n    - supporting source for the broader model: moving away from\n    command-and-control toward leader-leader cultures with clarity,\n    accountability, and distributed decision-making.\n\n## Changelog\n\n- **2026-06-12** - Added Modalities section; the spec now drives `summary.md`,\n  `dialog.md`, and `comics.md` alongside the article. Status `accepted`.\n  *(Zeljko, AI-mediated session)*\n- **2026-05-28** - Connected the article more explicitly to spec-driven\n  development, adding a dedicated section and practice guidance that treats\n  specs as written intent boundaries for AI-assisted work. Status `accepted`.\n  *(Zeljko, AI-mediated session)*\n- **2026-05-28** - Rewrote the post to match the spec: new title, excerpt,\n  key points, practical ladder, examples, guardrails, failure modes, role\n  implications, and closing practice. Status `accepted`. *(Zeljko,\n  AI-mediated session)*\n- **2026-05-28** - Initial spec for the rough `leadership-ladder` article.\n  Recommended the intent-based human-AI collaboration direction and captured\n  alternatives, non-goals, sources, and a proposed article structure.\n  *(Zeljko, AI-mediated session)*\n"}]}]}</script>

                    continue;
                }

                if (tableRow.test(line) && i + 1 < lines.length && tableSep.test(lines[i + 1])) {
                    const headers = splitRow(line);
                    i += 2;
                    const rows = [];
                    while (i < lines.length && tableRow.test(lines[i])) {
                        rows.push(splitRow(lines[i]));
                        i++;
                    }
                    let html = '<table><thead><tr>';
                    headers.forEach(h => {
                        html += '<th>' + inline(h) + '</th>';
                    });
                    html += '</tr></thead><tbody>';
                    rows.forEach(r => {
                        html += '<tr>';
                        r.forEach(c => {
                            html += '<td>' + inline(c) + '</td>';
                        });
                        html += '</tr>';
                    });
                    html += '</tbody></table>';
                    out.push(html);
                    continue;
                }

                if (bullet.test(line) || ordered.test(line)) {
                    // Indent of the first bullet defines this list's base level.
                    // Deeper-indented bullets become nested lists (rendered by
                    // recursing into renderMarkdown). Same-or-less indent at a
                    // bullet starts a sibling item (or ends the list).
                    const firstMatch = line.match(bullet) || line.match(ordered);
                    const baseIndent = firstMatch[1].length;
                    const isOrdered = ordered.test(line);
                    const items = [];
                    while (i < lines.length) {
                        const cur = lines[i];
                        if (!cur.trim()) {
                            // blank line breaks the list (matches CommonMark-ish behaviour)
                            i++;
                            break;
                        }
                        const mBul = cur.match(bullet);
                        const mOrd = cur.match(ordered);
                        const m = mBul || mOrd;
                        if (!m) break;
                        if (m[1].length < baseIndent) break;
                        if (m[1].length > baseIndent) break; // shouldn't happen at top of loop
                        // Same-type check: switching between -/* and 1. closes the list
                        if (isOrdered !== !!mOrd) break;

                        const itemBuf = [m[3]];
                        const nestedBuf = [];
                        i++;
                        while (i < lines.length) {
                            const nxt = lines[i];
                            if (!nxt.trim()) break;
                            const nBul = nxt.match(bullet);
                            const nOrd = nxt.match(ordered);
                            const nm = nBul || nOrd;
                            if (nm) {
                                if (nm[1].length > baseIndent) {
                                    // nested list line — dedent and stash
                                    nestedBuf.push(nxt.slice(baseIndent + 2));
                                    i++;
                                    continue;
                                }
                                // sibling or end of list
                                break;
                            }
                            // Plain continuation text
                            if (nestedBuf.length) {
                                // continuation inside the nested block
                                nestedBuf.push(nxt.slice(baseIndent + 2));
                            } else {
                                itemBuf.push(nxt.trim());
                            }
                            i++;
                        }

                        let liHtml = inline(itemBuf.join('\n'));
                        if (nestedBuf.length) {
                            liHtml += renderMarkdown(nestedBuf.join('\n'));
                        }
                        items.push('<li>' + liHtml + '</li>');
                    }
                    out.push((isOrdered ? '<ol>' : '<ul>') + items.join('') + (isOrdered ? '</ol>' : '</ul>'));
                    continue;
                }

                const buf = [line];
                i++;
                while (i < lines.length && lines[i].trim() && !/^#{1,6}\s/.test(lines[i]) && !/^>\s?/.test(lines[i]) && !bullet.test(lines[i]) && !ordered.test(lines[i]) && !/^```/.test(lines[i]) && !tableRow.test(lines[i])) {
                    buf.push(lines[i]);
                    i++;
                }
                out.push('<p>' + inline(buf.join(' ')) + '</p>');
            }
            return out.join('\n');
        }

        // Block dispatcher. New block types plug in here.
        const renderers = {
            markdown: function (block) {
                const div = document.createElement('div');
                div.innerHTML = renderMarkdown(block.content);
                return div;
            },
            mermaid: function (block) {
                // Mermaid scans elements with class "mermaid" whose textContent
                // is the diagram source. We collect these nodes and run
                // mermaid.run() once after all blocks are in the DOM.
                const div = document.createElement('div');
                div.className = 'mermaid';
                div.textContent = block.content;
                return div;
            },
            'force-graph': function (block) {
                // build.py emits parsed JSON: {nodes:[{id,size}], links:[{source,target}]}.
                // We instantiate force-graph after the container is in the DOM
                // so it can measure its own width.
                const div = document.createElement('div');
                div.className = 'force-graph';
                const data = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.ForceGraph) return;
                    const maxSize = data.nodes.reduce((m, n) => Math.max(m, n.size || 1), 1);
                    window.ForceGraph()(div)
                        .graphData(data)
                        .width(div.clientWidth)
                        .height(div.clientHeight)
                        .nodeRelSize(4)
                        .nodeVal(n => Math.max(20 * (n.size || 1) / maxSize, 0.001))
                        .nodeLabel(n => n.id + ' (' + (n.size || 1) + ')')
                        .nodeColor(() => 'rgba(135, 206, 235, 0.7)')
                        .linkColor(() => 'rgba(60, 60, 60, 0.4)')
                        .linkDirectionalArrowLength(4)
                        .linkDirectionalArrowRelPos(1)
                        .linkWidth(1);
                });
                return div;
            },
            'bubble-chart': function (block) {
                // build.py emits {nodes:[{name,size}]}. Renders a D3 circle-pack
                // SVG (same shape as the obren.io reference, just inline).
                const wrap = document.createElement('div');
                wrap.className = 'bubble-chart';
                const payload = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.d3) return;
                    const diameter = 480;
                    const fill = '#c0deed';
                    const textColor = '#111111';
                    const fontSize = 12;

                    const svg = window.d3.select(wrap).append('svg')
                        .attr('viewBox', '0 0 ' + diameter + ' ' + diameter)
                        .attr('width', diameter)
                        .attr('height', diameter);

                    const root = window.d3.hierarchy({children: payload.nodes})
                        .sum(d => d.size || 0)
                        .sort((a, b) => b.value - a.value);

                    window.d3.pack().size([diameter, diameter]).padding(2)(root);

                    const node = svg.selectAll('g')
                        .data(root.leaves())
                        .enter().append('g')
                        .attr('transform', d => 'translate(' + d.x + ',' + d.y + ')');

                    node.append('title').text(d => d.data.name + ': ' + d.value);
                    node.append('circle').attr('r', d => d.r).style('fill', fill);
                    node.append('text')
                        .attr('dy', '.3em')
                        .style('text-anchor', 'middle')
                        .style('fill', textColor)
                        .style('font-size', fontSize + 'px')
                        .text(d => d.data.name.substring(0, Math.max(0, Math.floor(d.r / 3))));
                });
                return wrap;
            }
        };

        // Render one modality's blocks into a host element. Mermaid runs
        // scoped to just the nodes created here, so lazily rendered tabs get
        // their diagrams on first activation.
        let mermaidInitialized = false;
        function renderBlocksInto(blocks, host) {
            const mermaidNodes = [];
            blocks.forEach(function (block) {
                const r = renderers[block.type];
                if (!r) {
                    const pre = document.createElement('pre');
                    pre.textContent = '[unknown block type: ' + block.type + ']';
                    host.appendChild(pre);
                    return;
                }
                const node = r(block);
                if (node instanceof Node) {
                    host.appendChild(node);
                    if (block.type === 'mermaid') mermaidNodes.push(node);
                }
            });
            if (mermaidNodes.length && window.mermaid) {
                if (!mermaidInitialized) {
                    window.mermaid.initialize({startOnLoad: false, theme: 'default'});
                    mermaidInitialized = true;
                }
                window.mermaid.run({nodes: mermaidNodes});
            }
        }

        // Modality tabs. One <article class="pane"> per modality; panes are
        // rendered lazily on first activation (force-graph / D3 / mermaid
        // need a visible, measurable container). With a single modality the
        // tab bar stays hidden and the page looks exactly like before.
        const mods = data.modalities;
        const tabBar = document.getElementById('modality-tabs');
        const panes = {};
        const tabButtons = {};
        const renderedPanes = {};

        mods.forEach(function (m) {
            const pane = document.createElement('article');
            pane.className = 'pane';
            pane.dataset.key = m.key;
            pane.hidden = true;
            root.appendChild(pane);
            panes[m.key] = pane;
        });

        const defaultKey = mods.some(m => m.key === 'index') ? 'index' : mods[0].key;

        function activate(key, updateHash) {
            mods.forEach(function (m) {
                const isActive = m.key === key;
                panes[m.key].hidden = !isActive;
                if (tabButtons[m.key]) {
                    tabButtons[m.key].classList.toggle('active', isActive);
                    tabButtons[m.key].setAttribute('aria-selected', isActive ? 'true' : 'false');
                }
            });
            // Unhide first, then render: the chart libraries measure widths.
            if (!renderedPanes[key]) {
                renderBlocksInto(mods.find(m => m.key === key).blocks, panes[key]);
                renderedPanes[key] = true;
            }
            if (updateHash) {
                history.replaceState(null, '',
                    key === defaultKey ? location.pathname + location.search : '#' + key);
            }
        }

        if (mods.length > 1) {
            mods.forEach(function (m) {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.textContent = m.label;
                btn.setAttribute('role', 'tab');
                btn.addEventListener('click', function () { activate(m.key, true); });
                tabBar.appendChild(btn);
                tabButtons[m.key] = btn;
            });
            tabBar.hidden = false;
        }

        // The hash selects a tab only when it matches a modality key, so
        // existing anchors keep working.
        const initialHash = location.hash.slice(1);
        activate(mods.some(m => m.key === initialHash) ? initialHash : defaultKey, false);
        window.addEventListener('hashchange', function () {
            const k = location.hash.slice(1);
            if (mods.some(m => m.key === k)) activate(k, false);
        });
    })();
</script>
</body>
</html>
