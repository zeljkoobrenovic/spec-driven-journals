<script id="data" type="application/json">{"meta": {"layout": "post", "title": "What Digital Marketplaces Sell? A Short Memo", "date": "2021-10-21 21:12:01 +0100", "categories": "architecture", "author": "by Željko Obrenović (obren.io)", "permalink": "digital-marketplaces", "icon": "market.png", "timetoread": "15 min", "excerpt": "Digital marketplaces facilitate transactions between buyers and sellers. The marketplace is not the seller (nor a buyer), but it sells a reduction in transaction costs. ."}, "blocks": [{"type": "markdown", "content": "![](../assets/images/markets/floating-market.jpg)\n\n> **KEY POINTS:**\n> * When referring to digital marketplaces, we refer to the entities facilitating transactions between buyers and sellers. The marketplace is not the seller (nor a buyer). \n> * Marketplaces sell a reduction in transaction costs. \n> * There are three types of transaction costs: Search and Information Costs; Bargaining and Negotiation Costs; and Policing and Enforcement Costs.\n\n## Basic Terminology\n\nWhat do we mean when we use the term digital marketplace? What do we not mean when we use this word? Here I summarize some of the answers to this question from an excellent essay [History of Online Marketplaces](https://web.stanford.edu/class/msande238/projects/2014/Marketplaces.docx) by Andrew Adams and Lance Martin.\n\nWhen referring to digital marketplaces, we refer to the entities ***facilitating transactions between buyers and sellers***. Marketplaces act as a third party to the principal transaction at hand. The marketplace is not the seller (nor a buyer), and as such, it does not own the inventory or services transacted on the platform. The entities that own the inventory or services would be ***traditional retailers*** rather than ***marketplaces***.\n\nAccordingly, it would be incorrect to state that recognized digital marketplaces like **Uber**, **Etsy**, and **Airbnb** sell transportation, handcrafted goods, or lodging. Instead, they ***facilitate transactions*** between drivers and riders, artisans and buyers, hosts and lodgers. \n\n## What Online Marketplaces Actually Sell?\n\nMany marketplaces are very profitable. So how do marketplaces earn money by facilitating transactions? What do they sell? ***Marketplaces sell a reduction in transaction costs.*** \n\nCosts relate to effort, time and other resources needed to prosecute a transaction. The marketplace expert [Ramesh Johari](https://profiles.stanford.edu/ramesh-johari) defines three types of these transaction costs:\n\n* **Search and Information Costs**: Search cost captures the cost of buyers and sellers finding each other. Information cost concerns finding information relevant to either party in making an informed decision about whether they should execute the transaction.\n* **Bargaining and Negotiation Costs**: Bargaining and Negotiation costs are the cost of determining what exactly is being sold, for what price, and under which conditions and guarantees.\n* **Policing and Enforcement Costs**: Policing and Enforcement Costs are the costs of ensuring transactions are prosecuted fairly, favorably for both parties, and according to agreed conditions.\n\n![](../assets/images/markets/costs.png)\n  <br>\n**Figure 1:** *Marketplaces sell a reduction in transaction costs: Search and Information Costs, Bargaining and Negotiation Costs, Policing and Enforcement Costs.*\n\n## Few Examples\n \nA marketplace need not mitigate costs from all three dimensions. But it is difficult to imagine a marketplace that does not reduce costs along at least one dimension. \n\nFor example, ***[Craigslist](https://en.wikipedia.org/wiki/Craigslist)*** (the web’s original marketplace) mitigates ***Search, and Information Costs*** by serving as a central repository for buyers and sellers to connect. Craigslist, however, does not reduce costs along the other two dimensions, as they provide no infrastructure to minimize bargaining and negotiation costs or policing and enforcement costs. \n\nAnother example is ***Uber***, a mobile transportation marketplace that reduces ***Search and Information Costs*** by automatically making matches between riders on the demand side and drivers on the supply side. It further automatically sets fares bringing ***Bargaining and Negotiation Costs*** practically to zero. Uber also provides significant liability insurance to drivers and reimbursements to riders if drivers take inefficient routes (both of these measures minimize ***Policing and Enforcement Costs***).\n\n\n## Monetizing Online Marketplaces\n\nWith the value of marketplaces defined as “*reduction in transaction costs*,” it is also more apparent how marketplaces can monetize their usage. \n\nIn essence, they aim at creating a ***win-win proposition***, e.g., paid subscriptions, where people are ready to pay to get an additional reduction in their transactions costs. For example, a seller may want to pay extra so that buyers can find them more quickly, reducing their Search and Information Costs compared to other means. Sellers and buyers can opt for paid subscriptions to get better customer support, reducing their costs and risks of Policing and Enforcement. \n\nMarketplaces can also offer extra paid services, such as price recommenders or sanity checkers, reducing Bargaining and Negotiation costs.\n\n"}, {"type": "mermaid", "content": "gantt\n    title A Gantt Diagram\n    dateFormat YYYY-MM-DD\n    section Section\n        A task          :a1, 2014-01-01, 30d\n        Another task    :after a1, 20d\n    section Another\n        Task in Another :2014-01-12, 12d\n        another task    :24d"}, {"type": "markdown", "content": "**Figure 1:** *Example mermaid graph.*\n\n"}, {"type": "mermaid", "content": "mindmap\n  root((mindmap))\n    Origins\n      Long history\n      ::icon(fa fa-book)\n      Popularisation\n        British popular psychology author Tony Buzan\n    Research\n      On effectiveness<br/>and features\n      On Automatic creation\n        Uses\n            Creative techniques\n            Strategic planning\n            Argument mapping\n    Tools\n      Pen and paper\n      Mermaid"}, {"type": "markdown", "content": "**Figure 1:** *Example mermaid graph.*\n\n"}, {"type": "force-graph", "content": "{\"nodes\": [{\"id\": \"A\", \"size\": 10.0}, {\"id\": \"B\", \"size\": 4.0}, {\"id\": \"C\", \"size\": 1}, {\"id\": \"D\", \"size\": 1}, {\"id\": \"C Test\", \"size\": 1}, {\"id\": \"[D]\", \"size\": 1}, {\"id\": \"E\", \"size\": 1}, {\"id\": \"F\", \"size\": 1}], \"links\": [{\"source\": \"A\", \"target\": \"B\"}, {\"source\": \"A\", \"target\": \"C\"}, {\"source\": \"B\", \"target\": \"D\"}, {\"source\": \"C Test\", \"target\": \"[D]\"}, {\"source\": \"B\", \"target\": \"E\"}, {\"source\": \"B\", \"target\": \"F\"}, {\"source\": \"E\", \"target\": \"F\"}, {\"source\": \"D\", \"target\": \"A\"}]}"}, {"type": "markdown", "content": "**Figure 1:** *Example mermaid graph.*\n\n\n"}, {"type": "bubble-chart", "content": "{\"nodes\": [{\"name\": \"A\", \"size\": 10.0}, {\"name\": \"B\", \"size\": 4.0}, {\"name\": \"C\", \"size\": 4.0}, {\"name\": \"D\", \"size\": 4.0}, {\"name\": \"E\", \"size\": 23.0}]}"}, {"type": "markdown", "content": "**Figure 1:** *Example mermaid graph.*\n\n<iframe src=\"https://docs.google.com/presentation/d/e/2PACX-1vQgtCZ3eAHcLUedxpOAtu5mXV1cbpUrhzSHQqwn8hf4_OJQiRXFs44vNMO1At3leGdEBsy1epqtANxd/pubembed?start=false&loop=false&delayms=3000\" frameborder=\"0\" width=\"800\" height=\"486\" allowfullscreen=\"true\" mozallowfullscreen=\"true\" webkitallowfullscreen=\"true\"><\/iframe>\n\n## To Probe Further\n\n* [History of Online Marketplaces](https://web.stanford.edu/class/msande238/projects/2014/Marketplaces.docx), 2014, by Andrew Adams and Lance Martin\n* [Marketplace](https://en.wikipedia.org/wiki/Marketplace), 2021, Wikipedia\n* [A History of Shopping, Marketplaces, and Experiences](https://www.starkenterprises.com/a-history-of-shopping-marketplaces-and-experiences/), 2021, by Ezra Stark\n* [Ezra Stark](https://www.sutherlandlabs.com/blog/history-repeating-how-digital-marketplaces-conquered-retail/), 2018, sutherlandlabs.com\n* [Search, Matching, and the Role of Digital Marketplace Design in Enabling Trade: Evidence from Airbnb](https://ide.mit.edu/sites/default/files/publications/SearchMatchingEfficiency.pdf), 2017, by Andrey Fradkin\n* [Digital Marketplaces](https://andreyfradkin.com/assets/econ_of_digital.pdf), 2017, by Andrey Fradkin\n"}]}</script>
<script>
    (function () {
        const data = JSON.parse(document.getElementById('data').textContent);
        const root = document.getElementById('content');

        // Minimal markdown renderer. Supports: ATX headings, paragraphs, blockquotes,
        // unordered/ordered lists, fenced code, inline code, bold/italic, links, images, hr.
        // Sufficient for the posts in this repo; replace with a fuller parser if needed.
        function renderMarkdown(src) {
            const lines = src.replace(/\r\n/g, '\n').split('\n');
            const out = [];
            let i = 0;

            const bullet = /^(\s*)([-*])\s+(.*)$/;
            const ordered = /^(\s*)(\d+)\.\s+(.*)$/;

            function inline(s) {
                // Posts are trusted content, so raw HTML passes through unescaped
                // (some posts embed inline <blockquote>, <div>, etc.).
                // Stray ampersands still get fixed up.
                s = s.replace(/&(?![a-zA-Z]+;|#\d+;)/g, '&amp;');
                s = s.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img alt="$1" src="$2">');
                s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
                s = s.replace(/`([^`]+)`/g, function (_, c) {
                    return '<code>' + c.replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</code>';
                });
                s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
                s = s.replace(/(^|[^*])\*([^*\n]+)\*/g, '$1<em>$2</em>');
                return s;
            }

            while (i < lines.length) {
                const line = lines[i];
                if (!line.trim()) {
                    i++;
                    continue;
                }

                const fence = line.match(/^```(\w*)\s*$/);
                if (fence) {
                    i++;
                    const buf = [];
                    while (i < lines.length && !/^```\s*$/.test(lines[i])) {
                        buf.push(lines[i]);
                        i++;
                    }
                    i++;
                    const escaped = buf.join('\n').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                    const cls = fence[1] ? ' class="lang-' + fence[1] + '"' : '';
                    out.push('<pre><code' + cls + '>' + escaped + '</code></pre>');
                    continue;
                }

                const h = line.match(/^(#{1,6})\s+(.*)$/);
                if (h) {
                    out.push('<h' + h[1].length + '>' + inline(h[2]) + '</h' + h[1].length + '>');
                    i++;
                    continue;
                }

                if (/^\s*(?:-\s*){3,}\s*$/.test(line) || /^\s*\*{3,}\s*$/.test(line)) {
                    out.push('<hr>');
                    i++;
                    continue;
                }

                if (/^>\s?/.test(line)) {
                    const buf = [];
                    while (i < lines.length && /^>\s?/.test(lines[i])) {
                        buf.push(lines[i].replace(/^>\s?/, ''));
                        i++;
                    }
                    out.push('<blockquote>' + renderMarkdown(buf.join('\n')) + '</blockquote>');
                    continue;
                }

                if (bullet.test(line) || ordered.test(line)) {
                    const isOrdered = ordered.test(line);
                    const re = isOrdered ? ordered : bullet;
                    const items = [];
                    while (i < lines.length && re.test(lines[i])) {
                        const m = lines[i].match(re);
                        let item = m[3];
                        i++;
                        while (i < lines.length && lines[i].trim() && !bullet.test(lines[i]) && !ordered.test(lines[i])) {
                            item += '\n' + lines[i].trim();
                            i++;
                        }
                        items.push('<li>' + inline(item) + '</li>');
                    }
                    out.push((isOrdered ? '<ol>' : '<ul>') + items.join('') + (isOrdered ? '</ol>' : '</ul>'));
                    continue;
                }

                const buf = [line];
                i++;
                while (i < lines.length && lines[i].trim() && !/^#{1,6}\s/.test(lines[i]) && !/^>\s?/.test(lines[i]) && !bullet.test(lines[i]) && !ordered.test(lines[i]) && !/^```/.test(lines[i])) {
                    buf.push(lines[i]);
                    i++;
                }
                out.push('<p>' + inline(buf.join(' ')) + '</p>');
            }
            return out.join('\n');
        }

        // Block dispatcher. New block types plug in here.
        const renderers = {
            markdown: function (block) {
                const div = document.createElement('div');
                div.innerHTML = renderMarkdown(block.content);
                return div;
            },
            mermaid: function (block) {
                // Mermaid scans elements with class "mermaid" whose textContent
                // is the diagram source. We collect these nodes and run
                // mermaid.run() once after all blocks are in the DOM.
                const div = document.createElement('div');
                div.className = 'mermaid';
                div.textContent = block.content;
                return div;
            },
            'force-graph': function (block) {
                // build.py emits parsed JSON: {nodes:[{id,size}], links:[{source,target}]}.
                // We instantiate force-graph after the container is in the DOM
                // so it can measure its own width.
                const div = document.createElement('div');
                div.className = 'force-graph';
                const data = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.ForceGraph) return;
                    const maxSize = data.nodes.reduce((m, n) => Math.max(m, n.size || 1), 1);
                    window.ForceGraph()(div)
                        .graphData(data)
                        .width(div.clientWidth)
                        .height(div.clientHeight)
                        .nodeRelSize(4)
                        .nodeVal(n => Math.max(20 * (n.size || 1) / maxSize, 0.001))
                        .nodeLabel(n => n.id + ' (' + (n.size || 1) + ')')
                        .nodeColor(() => 'rgba(135, 206, 235, 0.7)')
                        .linkColor(() => 'rgba(60, 60, 60, 0.4)')
                        .linkDirectionalArrowLength(4)
                        .linkDirectionalArrowRelPos(1)
                        .linkWidth(1);
                });
                return div;
            },
            'bubble-chart': function (block) {
                // build.py emits {nodes:[{name,size}]}. Renders a D3 circle-pack
                // SVG (same shape as the obren.io reference, just inline).
                const wrap = document.createElement('div');
                wrap.className = 'bubble-chart';
                const payload = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.d3) return;
                    const diameter = 480;
                    const fill = '#c0deed';
                    const textColor = '#111111';
                    const fontSize = 12;

                    const svg = window.d3.select(wrap).append('svg')
                        .attr('viewBox', '0 0 ' + diameter + ' ' + diameter)
                        .attr('width', diameter)
                        .attr('height', diameter);

                    const root = window.d3.hierarchy({children: payload.nodes})
                        .sum(d => d.size || 0)
                        .sort((a, b) => b.value - a.value);

                    window.d3.pack().size([diameter, diameter]).padding(2)(root);

                    const node = svg.selectAll('g')
                        .data(root.leaves())
                        .enter().append('g')
                        .attr('transform', d => 'translate(' + d.x + ',' + d.y + ')');

                    node.append('title').text(d => d.data.name + ': ' + d.value);
                    node.append('circle').attr('r', d => d.r).style('fill', fill);
                    node.append('text')
                        .attr('dy', '.3em')
                        .style('text-anchor', 'middle')
                        .style('fill', textColor)
                        .style('font-size', fontSize + 'px')
                        .text(d => d.data.name.substring(0, Math.max(0, Math.floor(d.r / 3))));
                });
                return wrap;
            }
        };

        const mermaidNodes = [];
        data.blocks.forEach(function (block) {
            const r = renderers[block.type];
            if (!r) {
                const pre = document.createElement('pre');
                pre.textContent = '[unknown block type: ' + block.type + ']';
                root.appendChild(pre);
                return;
            }
            const node = r(block);
            if (node instanceof Node) {
                root.appendChild(node);
                if (block.type === 'mermaid') mermaidNodes.push(node);
            }
        });

        if (mermaidNodes.length && window.mermaid) {
            window.mermaid.initialize({startOnLoad: false, theme: 'default'});
            window.mermaid.run({nodes: mermaidNodes});
        }
    })();
</script>
