<script id="data" type="application/json">{"meta": {"layout": "post", "title": "The IT Cost Box", "date": "2021-01-01 21:12:01 +0100", "categories": "general", "author": "by Željko Obrenović (obren.io)", "icon": "assets/icons/costs.png", "permalink": "costbox", "timetoread": "3 min", "excerpt": "In this post, I introduce a simple model for thinking about IT costs in three dimensions. This model presents IT costs as the volume of the box, where each side of the box shows three drivers of the cost: unit costs, size, and time."}, "tags": [], "blocks": [{"type": "markdown", "content": "![](assets/images/finops/money.jpg)\n\n> **KEY POINTS:**\n>\n>* In this post, I introduce a simple model for thinking about IT costs in three dimensions. \n>* The model presents IT costs as a volume of a box, where each side of the box shows three drivers of IT cost: unit costs, size, and time. You can optimize expenses on all of these three dimensions.\n>* Unit costs describe the price of units of resources needed to run the systems (e.g., compute, storage, or network resources). Size represents the number of resource units required to run the system. Time describes how the size changes in time.\n\n\n## Intro\n\n\nRunning IT systems always costs money. And architects are expected to help keep these costs under control. In this post, I discuss a simple model for thinking about IT costs in three dimensions. I want to help facilitate discussions around IT costs with this model by providing structure and a common vocabulary.\n\nFigure 1 illustrates this model. I borrow it from Gregor Hohpe's book [Cloud Strategy](https://architectelevator.com/book/cloudstrategy/). This model presents IT costs as the volume of the box. Each side of the box shows three drives of IT costs:\n* Unit costs, describing the price of units of resources needed to run the systems (e.g., compute, storage, or network resources).\n* Size, representing the number of resource units required to run the system.\n* Time, describing how the size changes in time.\n\n<div style=\"text-align: center\">\n<img src='assets/images/finops/costcube.png'>\n<br>\n<b>Figure 1:<\/b> The IT Cost Box (credit Gregor Hohpe, Cloud Strategy):<br>Cost[$] = size [units] * time [hours] * unit cost [$/unit/hour]\n<\/div>\n\n<br>\nTo calculate the IT system costs, you need to know the price of your units (e.g., price of VMs in the cloud), the amount of these units your system needs now, and how this usage of resources changes in time. \n\nYou can optimize IT costs around all of these three dimensions.\n\n\n## Optimizing For Unit Costs\n\nUnit costs describe the price of the smallest piece of resources you can use. What exactly is a unit depends on the infrastructure you are using. In our private cloud, examples of units are processors, storage disks, and network bandwidth. We usually express unit prices as the costs of using some amount of resource per some time unit. For example, running a virtual machine may cost you 10 dollars per day.\n\nIn a public cloud, when we use higher-level managed services like hosted databases and machine learning tools, a unit is frequently some discrete action you can perform on a service, e.g., the read or update actions. Then we usually express unit costs are price per action.\n\nIn general, as system developers, we have a limited amount of optimization options for unit sizes. If we run all systems in the same data center with the same hardware and VM options, we can only choose the number of VMs but not their characteristics. However, there are some possibilities to optimize for unit costs. \n\n\nFirstly, you need to be clear about what resources you need. We need to avoid being too defensive or greedy and use a much more significant amount of resources than we need. If you have several options for VMs, for example, then you need to choose the one most suited for your system tasks. Public cloud providers offer many combinations of CPU and RAM so that you can deploy applications that are compute or memory-intensive on virtual machines that match their needs more closely.  It makes no sense to always use the most expensive processors suitable for complex machine learning tasks, or to use costly SSD disks to store backup data accessed once a year. Having a good understanding of your workloads is the key to selecting instances suited for them. \n\n![](assets/images/finops/ferrari.jpg)\n<br>\n**Figure 1:** *Do you need a Ferrari to commute to your work in a city with frequent traffic jams and a speed limit of 50km/h? Similarly, do you need machine learning ready VMs for simple non-real-time data processing tasks?*\n\nSecond, an option that is sometimes available is using trading the stability for costs. For instance, Google Cloud offers Preemptible VMs. These virtual machines provide the same options as regular VMs. The difference is that they last for up to 24 hours, and Google may terminate them at any time. But if your applications are fault-tolerant and can withstand possible instance termination, then preemptible instances can reduce your costs by up to 80%.\n\nThe last way to reduce unit costs is through sound financial management. If you bundle your expenses, you may get a discount. For instance, customers typically get lower unit prices in the public cloud after their usage is above some threshold or commit to a minimum usage level.\n\n\n## Optimizing  For  Size\n\nOptimizing cost for size means using as few as possible resource units to run your system.\n\n![](assets/images/finops/traffic-jam.jpg)\n<br>\n**Figure 2:** *Most cars carry just one or two persons, while they can seat at least four comfortably. Similarly, running your VMs at a 25% utilization level will multiply the number of VMs you need.*\n\nWe can generally optimize by size by being more precise in defining resource needs or by aggregating workloads to more efficiently use resources. \n\nThe key to the first approach to optimizing for size lies in a good understanding of your usage patterns. Good instrumentation and monitoring are critical. A high level of automation also helps as it enables you to add or remove resources quickly. Optimizing for size by better utilizing individual resources may be complicated as having too few resources may cause your system to perform poorly or even crash. Reducing redundancy also needs to be done carefully, as more redundancy may increase your system's uptime.\n\nAnother approach you can apply to optimize for size is [aggregation of workloads](http://www.joeweinman.com/Resources/IEEE%20CCM%20Weinman%20Sep-Oct%202017%20Capacity,%20Utilization,%20Cost.pdf). Aggregation can create unarguable economic benefits in terms of investment required for service resource capacity, utilization of that capacity, and the delivered cost. However, these advantages need to be traded off against other factors, such as response time or data networking costs.\n\n## Optimizing For Time\n\nOptimizing for time means introducing elasticity or auto-scaling in your system design so that your resource creation and termination follow your usage pattern as real-time as possible. \n\nA typical development test environment, for instance, is utilized around 50 hours a week, roughly a quarter of the week's hours. Stopping or downscaling these environments when they're not needed can cut your cost dramatically. Similarly, our customers are much more active during the day than at night.\n\n![](assets/images/finops/empty-metro.jpg)\n<br>\n**Figure 3:** *You may need fewer carriages during the night.*\n\n## Looking Holistically\n\nAny optimization has its costs and risks. If you have a system that consumes resources inefficiently, you may reduce its costs if you invest in making the system more efficient. However, such investment may sometimes be more expensive than the eventual saving that it can bring during the system's lifetime. \n\nAnother topic to think about is where it makes sense to optimize first. If your system has irregular usage patterns, then optimizing for time may be the most cost-effective investment. If your system always has a high load and you may keep allocated resources statically, reduce the number you need or use cheaper units. \n\n\n## To Probe Further\n\n* Gregor Hohpe (2020): **[Cloud Strategy](https://architectelevator.com/book/cloudstrategy/)**, Chapter \"Cloud Savings Have To Be Earned\"\n\n* Joe Weinman: **[Articles on Cloud Economics](http://www.joeweinman.com/Papers.htm)**\n"}]}</script>
<script>
    (function () {
        const data = JSON.parse(document.getElementById('data').textContent);
        const root = document.getElementById('content');

        const tagsHost = document.getElementById('tags');
        (data.tags || []).forEach(function (t) {
            const span = document.createElement('span');
            span.className = 'tag';
            span.textContent = t;
            tagsHost.appendChild(span);
        });

        // Minimal markdown renderer. Supports: ATX headings, paragraphs, blockquotes,
        // unordered/ordered lists, fenced code, inline code, bold/italic, links, images, hr.
        // Sufficient for the posts in this repo; replace with a fuller parser if needed.
        function renderMarkdown(src) {
            const lines = src.replace(/\r\n/g, '\n').split('\n');
            const out = [];
            let i = 0;

            const bullet = /^(\s*)([-*])\s+(.*)$/;
            const ordered = /^(\s*)(\d+)\.\s+(.*)$/;

            function inline(s) {
                // Posts are trusted content, so raw HTML passes through unescaped
                // (some posts embed inline <blockquote>, <div>, etc.).
                // Stray ampersands still get fixed up.
                s = s.replace(/&(?![a-zA-Z]+;|#\d+;)/g, '&amp;');
                s = s.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img alt="$1" src="$2">');
                s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
                s = s.replace(/`([^`]+)`/g, function (_, c) {
                    return '<code>' + c.replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</code>';
                });
                s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
                s = s.replace(/(^|[^*])\*([^*\n]+)\*/g, '$1<em>$2</em>');
                return s;
            }

            while (i < lines.length) {
                const line = lines[i];
                if (!line.trim()) {
                    i++;
                    continue;
                }

                const fence = line.match(/^```(\w*)\s*$/);
                if (fence) {
                    i++;
                    const buf = [];
                    while (i < lines.length && !/^```\s*$/.test(lines[i])) {
                        buf.push(lines[i]);
                        i++;
                    }
                    i++;
                    const escaped = buf.join('\n').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                    const cls = fence[1] ? ' class="lang-' + fence[1] + '"' : '';
                    out.push('<pre><code' + cls + '>' + escaped + '</code></pre>');
                    continue;
                }

                const h = line.match(/^(#{1,6})\s+(.*)$/);
                if (h) {
                    out.push('<h' + h[1].length + '>' + inline(h[2]) + '</h' + h[1].length + '>');
                    i++;
                    continue;
                }

                if (/^\s*(?:-\s*){3,}\s*$/.test(line) || /^\s*\*{3,}\s*$/.test(line)) {
                    out.push('<hr>');
                    i++;
                    continue;
                }

                if (/^>\s?/.test(line)) {
                    const buf = [];
                    while (i < lines.length && /^>\s?/.test(lines[i])) {
                        buf.push(lines[i].replace(/^>\s?/, ''));
                        i++;
                    }
                    out.push('<blockquote>' + renderMarkdown(buf.join('\n')) + '</blockquote>');
                    continue;
                }

                if (bullet.test(line) || ordered.test(line)) {
                    const isOrdered = ordered.test(line);
                    const re = isOrdered ? ordered : bullet;
                    const items = [];
                    while (i < lines.length && re.test(lines[i])) {
                        const m = lines[i].match(re);
                        let item = m[3];
                        i++;
                        while (i < lines.length && lines[i].trim() && !bullet.test(lines[i]) && !ordered.test(lines[i])) {
                            item += '\n' + lines[i].trim();
                            i++;
                        }
                        items.push('<li>' + inline(item) + '</li>');
                    }
                    out.push((isOrdered ? '<ol>' : '<ul>') + items.join('') + (isOrdered ? '</ol>' : '</ul>'));
                    continue;
                }

                const buf = [line];
                i++;
                while (i < lines.length && lines[i].trim() && !/^#{1,6}\s/.test(lines[i]) && !/^>\s?/.test(lines[i]) && !bullet.test(lines[i]) && !ordered.test(lines[i]) && !/^```/.test(lines[i])) {
                    buf.push(lines[i]);
                    i++;
                }
                out.push('<p>' + inline(buf.join(' ')) + '</p>');
            }
            return out.join('\n');
        }

        // Block dispatcher. New block types plug in here.
        const renderers = {
            markdown: function (block) {
                const div = document.createElement('div');
                div.innerHTML = renderMarkdown(block.content);
                return div;
            },
            mermaid: function (block) {
                // Mermaid scans elements with class "mermaid" whose textContent
                // is the diagram source. We collect these nodes and run
                // mermaid.run() once after all blocks are in the DOM.
                const div = document.createElement('div');
                div.className = 'mermaid';
                div.textContent = block.content;
                return div;
            },
            'force-graph': function (block) {
                // build.py emits parsed JSON: {nodes:[{id,size}], links:[{source,target}]}.
                // We instantiate force-graph after the container is in the DOM
                // so it can measure its own width.
                const div = document.createElement('div');
                div.className = 'force-graph';
                const data = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.ForceGraph) return;
                    const maxSize = data.nodes.reduce((m, n) => Math.max(m, n.size || 1), 1);
                    window.ForceGraph()(div)
                        .graphData(data)
                        .width(div.clientWidth)
                        .height(div.clientHeight)
                        .nodeRelSize(4)
                        .nodeVal(n => Math.max(20 * (n.size || 1) / maxSize, 0.001))
                        .nodeLabel(n => n.id + ' (' + (n.size || 1) + ')')
                        .nodeColor(() => 'rgba(135, 206, 235, 0.7)')
                        .linkColor(() => 'rgba(60, 60, 60, 0.4)')
                        .linkDirectionalArrowLength(4)
                        .linkDirectionalArrowRelPos(1)
                        .linkWidth(1);
                });
                return div;
            },
            'bubble-chart': function (block) {
                // build.py emits {nodes:[{name,size}]}. Renders a D3 circle-pack
                // SVG (same shape as the obren.io reference, just inline).
                const wrap = document.createElement('div');
                wrap.className = 'bubble-chart';
                const payload = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.d3) return;
                    const diameter = 480;
                    const fill = '#c0deed';
                    const textColor = '#111111';
                    const fontSize = 12;

                    const svg = window.d3.select(wrap).append('svg')
                        .attr('viewBox', '0 0 ' + diameter + ' ' + diameter)
                        .attr('width', diameter)
                        .attr('height', diameter);

                    const root = window.d3.hierarchy({children: payload.nodes})
                        .sum(d => d.size || 0)
                        .sort((a, b) => b.value - a.value);

                    window.d3.pack().size([diameter, diameter]).padding(2)(root);

                    const node = svg.selectAll('g')
                        .data(root.leaves())
                        .enter().append('g')
                        .attr('transform', d => 'translate(' + d.x + ',' + d.y + ')');

                    node.append('title').text(d => d.data.name + ': ' + d.value);
                    node.append('circle').attr('r', d => d.r).style('fill', fill);
                    node.append('text')
                        .attr('dy', '.3em')
                        .style('text-anchor', 'middle')
                        .style('fill', textColor)
                        .style('font-size', fontSize + 'px')
                        .text(d => d.data.name.substring(0, Math.max(0, Math.floor(d.r / 3))));
                });
                return wrap;
            }
        };

        const mermaidNodes = [];
        data.blocks.forEach(function (block) {
            const r = renderers[block.type];
            if (!r) {
                const pre = document.createElement('pre');
                pre.textContent = '[unknown block type: ' + block.type + ']';
                root.appendChild(pre);
                return;
            }
            const node = r(block);
            if (node instanceof Node) {
                root.appendChild(node);
                if (block.type === 'mermaid') mermaidNodes.push(node);
            }
        });

        if (mermaidNodes.length && window.mermaid) {
            window.mermaid.initialize({startOnLoad: false, theme: 'default'});
            window.mermaid.run({nodes: mermaidNodes});
        }
    })();
</script>
