<script id="data" type="application/json">{"meta": {"layout": "post", "title": "Architects as Superglue: One Approach To Being An Architect in IT Organizations", "date": "2021-10-21 21:12:01 +0100", "categories": "superglue", "author": "by Željko Obrenović (obren.io)", "permalink": "superglue", "icon": "assets/icons/superglue.png", "timetoread": "15 min", "excerpt": "This article is a written statement of my experiences on what it means to be an architect in IT organizations, how architects need to develop, and how architects should work together."}, "tags": [], "blocks": [{"type": "markdown", "content": "![](assets/images/superglue/superglue.png)\n\n> **KEY POINTS:**\n> * This article describes an approach to being an architect in IT organizations. It is a written statement, based on my experiences, on what it means to be an architect, how architects need to develop, and why architects should work together. \n> * The article's central message is that we need to develop architects as organizational superglue - people that hold architecture, technical details, business needs, and people together across an organization or complex projects.\n\n\n\nWith this article, I want to, based on my experiences, create a written statement on:\n* what it means to be an architect in an IT organization\n* how architects need to develop\n* how architects should work together\n\nI consider the people the central and the essential part of architecture activities. Developing architecture as a discipline in an IT organization requires having competent, empowered, and motivated architects. In other words, Strong Architecture = Strong Architects. \n\n<blockquote style=\"font-size: 150%; margin-top: 42px; margin-bottom: 42px;\">\nStrong Architecture = Strong Architects.\n<\/blockquote>\n\nIn the next section, I elaborate on the role of individual architects. Then, I describe how I think we should develop architects. Lastly, I discuss the importance of creating a community of architects and describe expected architects' activities in more detail.\n\n\n## 1. Architects\n\nIn my view, architects in IT organizations should develop as \"superglue.\" I borrow this view from [Adam Bar-Niv and Amir Shenhav from Intel](https://resources.sei.cmu.edu/library/asset-view.cfm?assetID=454541). They pointed out that instead of the superhero, we need \"super glue\" architects - the fellows who hold architecture, technical details, business needs, and people together across a large organization or complex projects.\n\nThe superglue characteristics mean serving as the organizational connective tissue, linking the \"business wheelhouse\" and the \"engine room.\" Architects, of course, need to be technically strong. But their unique strengths should stem from being able to relate, or glue, technical issues with business and broader issues.\n\n \n<blockquote style=\"font-size: 150%; margin-top: 42px; margin-bottom: 42px;\">\nArchitects, of course, need to be technically strong. But their unique strengths should stem from being able to relate technical issues with business and broader issues.\n<\/blockquote>\n \n\nFrom discussions I've had with our technology leaders, engineers, architects, the picture below has crystallized as a representation of the \"superglue\" metaphor for architects (Figure 1).\n\n![](assets/images/superglue/architect-as-superglue.png)\n***Figure 1:** Architects serve as a superglue, connecting development teams with business stakeholders while also linking their teams with the internal communities and the external world.*\n\nIT organizations need persons who look broader, linking architecture, technical details, business needs, and people together. These persons may not necessarily have a title of an architect. But they need to have good working relationships with developer teams and the local business stakeholders and functions. Simultaneously, such a person is well connected with the internal communities and has external visibility. They promote what we are doing, and on the other hand, they bring back the ideas from the outside.\n\n\n## 2. Developing Architect as Superglue\n\nSetting the architects' goals to be \"superglue\" also requires some thought on developing as a superglue. Borrowing from Gregor Hohpe's view on architect development from his book Software Architecture Elevator, I share the view that our architects should stand on three legs:\n\n* Skills\n* Impact\n* Thought leadership\n\n**Skills.** Architects have to have proper skill sets. By skills, I mean possessing knowledge and the ability to apply relevant knowledge in practice. These skills should include both technical (e.g., cloud architecture or Kubernetes technology) as well as communication and influence skills.  \n\n**Impact.** Impact should be measured as a benefit for the business. Architects need to ensure that what they are doing profits the business. New architects start as students or trainees having skills but little impact. But sooner than later, fresh architects need to get out into the world and make an impact. Architects that do not make an impact do not have a place in a for-profit business.\n\n**Though leadership.** Thought leadership acknowledges that experienced architects should do more than make architecture. This \"more\" can have different forms but should include at least some of the following activities: mentoring junior architects and engineers, publishing articles, giving talks, starting initiatives, and driving decisions.\n\nArchitects need to have minimal \"length\" of all of these \"legs\" to be successful. For instance, having skills and impact without leadership frequently leads to hitting a glass ceiling. Such architects plateau at an intermediate level and cannot lead the company to innovative or transformative solutions. Leadership without impact lacks foundation and may signal that you have become an ivory tower architect with a weak relation to reality.\n\nIn all scenarios, it is crucial for an organization that a senior architect mentors junior architects. Feedback cycles in (software) architecture are inherently slow. Mentoring can save new architects many years of learning by doing and making mistakes. \n\n\n## 3. Gluing Together Superglue Architects in Strong Communites\n\n> Do not underestimate the power of building community and authentic relationships.\n\nArchitects are always a part of some team, where they may be the only architects. But they can and should collaborate globally with architects in other units. For instance, I work with a virtual team of architects. In this peer-to-peer community, we were collectively responsible for identifying and growing architectural talent, mentoring, and helping each other. \n\nWhile the exact structure of communities may differ per organization and change over time, it is crucial to keep developing such groups as a vibrant, diverse community where they can leverage and build on each other's work. \n\nAs a strong community, such a group can transform individual experiences into collective knowledge that can benefit the whole organization.\n\n\n![](assets/images/superglue/community.png)\n***Figure 2:** Architects work together as community of peers helping each other in their architectural activities.*\n\n\n## 4. Making An Impact\n\nWhen we have strong architects and strong communities, we can do lots of impactful things. I classify the key activities that superglue architects could do into five categories:\n\n* Maximizing organizational learnings\n* Internalizing technology trends\n* Increasing transparency and bringing the data\n* Improving the quality of decision making\n* Facilitating alignment & decision making\n\n\n### 3.1 Maximizing Organizational Learnings\n\n> *\" I expect you to learn to be better each day. I challenge you to look at each working day as an opportunity to learn more, and by doing so, to grow as a person.\"* -- L. David Marquet\n>\n> *\"Good judgment comes from experience, and experience comes from bad judgment.\"* -- Fred Brooks\n\nOne of our primary daily tasks is learning. We need to discover new things about our domain, teams, new tools, and technologies. As individual architects, we need to use each day as an opportunity to learn something new. We need to maximize personal learnings, transforming individual lessons learned into shared guidelines.\n\nOne of the problems I frequently see in organizations, particularly complex and international ones, is that they may not have natural spaces for group knowledge sharing. Consequently, architects' superglue attributes may uniquely position them to work together to create spaces for sharing knowledge about architecture and technology. These spaces include but are not limited to regular update calls, knowledge sharing sessions, or conferences.\n\nIn addition to creating spaces, as a community, we can further increase our learnings' value by deriving generalized insights from cross-group cases.\n\nI also believe that learning should also have an external component. We need to expose our knowledge externally. With external exposure, we promote what we are doing, and we get valuable external feedback. We need to look for opportunities to give talks, blog, or organize meetups.\n\n\n\n\n### 3.2 Internalizing Technology Trends\n\n> *\"The world is moving so fast these days that the man who says it can't be done is generally interrupted by someone doing it.\"* --Elbert Hubbard\n\nLearning should not be only about our internal activities. We need to know what is going in the world and bring new ideas back home. One of the problems that many organizations face is that due to their complexity and size, they have more challenges in introducing new technologies compared to their disruptors (Figure 3). We have less time to understand and utilize new technology developments while the number of new technologies is increasing due to, e.g., continuous and accelerating evolution of cloud and mobile products.\n\nAs architects, we need to be proactive in the identification of relevant new technology developments. Based on our understanding of these developments, we need to create pragmatic technology recommendations for concrete platforms and across the organization.\n\n\n![](assets/images/superglue/internalizing-tech-trends.png)\n***Figure 3:** One crucial aspect of Architects' work is following external trends and finding pragmatic ways to introduce these trends in the organization. Credit: [thoughtworks.com/insights/blog/whats-hurry-building-digital-enterprise](https://www.thoughtworks.com/insights/blog/whats-hurry-building-digital-enterprise)*\n\n\n\n\n### 3.3 Increasing Transparency and Bringing the Data\n\n> *\"If we have data, let's look at data. If all we have are opinions, let's go with mine.\"* -— Jim Barksdale\n\nI genuinely believe that we should make our decision process as much as possible data-drive. Consequently, I see it as one of the most critical tasks to maintain high-quality data on relevant technology development, both internally and externally, providing fuel for data-driven decision-making.\n\nOne of the problems we face is that we have lots of data on technology, but they are not well connected, and manual data input and gathering are still frequent. For that reason, we need to work on developing automated tools that facilitate insights into technology and business. \n\nIn my recent positions, I've always aimed to get reliable data about technology with as much as possible automation. Some examples of tools I built and used include:\n* Source code contains an incredible amount of information about technology, people activity, team dependencies, and the quality of software systems. To get insights by pragmatic code analyses, I've started and still actively maintain the project [Sokrates](https://sokrates.dev).\n* Public cloud usage reposts (e.g., billing reports), providing overview and trends on which team uses which services, regions, budgets.\n* Incident reports, looking at trends and dependencies among incidents.\n* Key business metrics, like the vibrancy.\n* Slack activity to understand team interactions.\n\nI consider the [data and transparency](../ddad), together with architects, to be two main pillars of technology governance (Figure 4). Data and transparency provide a basis for data-informed decision-making. People enable governance to have an impact. Without these two strong pillars, the architecture becomes an abstract ivory tower exercise.\n\n![](assets/images/superglue/pillars.png)\n***Figure 4:** IT architecture relies on two pillars: transparency and community. Data and transparency provide a basis for data-informed decision-making. People enable governance to have an impact. Without these two strong pillars, the architecture becomes an abstract ivory tower exercise.*\n\n\n### 3.4 Improving Quality of Decision Making\n\n> *\"Most of the world will make decisions by either guessing or using their gut. They will be either lucky or wrong.\"* -– Suhail Doshi\n\nWe cannot centrally make all decisions. One-size-fits-all solutions do not work for everyone, and central decision-making does not scale. But we can at least make sure that the quality of decision-making is high.\n\nIn line with becoming more data-driven, we need to create shared frameworks to move from opinion-based decisions to data-driven economic risk modeling. Such frameworks should achieve the following:\n* dismantle the buzzwords, present the problem in clear terms, understandable to a broader audience\n* identify the real drivers behind buzzwords based on internal and external research\n* bring internal data and external trends\n* translate drivers into an economic risk model, and use the model to find the best spot for the given business context\n\nIn practice, I expect architects to be in continuous motion through organization layers and interact with diverse stakeholders (Figure 5). We need to work with business functions to define strategy, with other architects to define shared guiding principles, and with developers to ensure consistency among their practical decisions.\n\n![](assets/images/superglue/strategy-principles-decisions.png)\n***Figure 5:** The daily work of an architect is in continuous motion. We need to work with management to define strategy, define guiding principles, and work with developers to ensure the consistency of practical decisions. Credit: Gregor Hophe.*\n\n\n\n### 3.5 Alignment & Decision Making\n\n> *\"Excessive complexity is nature's punishment for organizations that are unable to make decisions.\"\n> <br>-- Gregor Hohpe*\n\nIn some cases, it makes perfect sense to make decisions together. We work on very similar issues but frequently reinvent the wheel. The goals of a community should be to prevent needled creativity to focus the work and creativity on making a difference for customers and business. In particular, architects must help align the organization on key strategic activities, e.g., cloud strategy, data strategy, or database technology choices.\n\n## 4. Acknowledgments\n\nMany people have provided feedback on the idea presented in this article. I would like to many of my colleagues who all provided helpful feedback on the early version of the \"architects as superglue\" concept.\n\n## 5. To Probe Further\n\n1. [**The Software Architecture Elevator**](https://learning.oreilly.com/library/view/the-software-architect/9781492077534/) (2020), by Gregor Hohpe\n1. [**Can't Find Superheroes to Help You Out of a Crisis? How About Some Architecture and Lots of Superglue?**](https://resources.sei.cmu.edu/library/asset-view.cfm?assetID=454541) (2016), by Adam Bar-Niv (Intel), Amir Shenhav (Intel)\n"}]}</script>

        function renderMarkdown(src) {
            const lines = src.replace(/\r\n/g, '\n').split('\n');
            const out = [];

                let t = s.trim();

                if (t.endsWith('|')) t = t.slice(0, -1);

            function inline(s) {
                // Posts are trusted content, so raw HTML passes through unescaped
                // (some posts embed inline <blockquote>, <div>, etc.).
                // Stray ampersands still get fixed up.

                    let html = '<table><thead><tr>';

                        const mOrd = cur.match(ordered);
                        const m = mBul || mOrd;
                        if (!m) break;
                        if (m[1].length < baseIndent) break;
                        if (m[1].length > baseIndent) break; // shouldn't happen at top of loop
                        // Same-type check: switching between -/* and 1. closes the list
                        if (isOrdered !== !!mOrd) break;

                        const itemBuf = [m[3]];
                        const nestedBuf = [];
                        i++;
                        while (i < lines.length) {
                            const nxt = lines[i];
                            if (!nxt.trim()) break;
                            const nBul = nxt.match(bullet);
                            const nOrd = nxt.match(ordered);
                            const nm = nBul || nOrd;
                            if (nm) {
                                if (nm[1].length > baseIndent) {
                                    // nested list line — dedent and stash
                                    nestedBuf.push(nxt.slice(baseIndent + 2));
                                    i++;
                                    continue;
                                }
                                // sibling or end of list
                                break;
                            }
                            // Plain continuation text
                            if (nestedBuf.length) {
                                // continuation inside the nested block
                                nestedBuf.push(nxt.slice(baseIndent + 2));
                            } else {
                                itemBuf.push(nxt.trim());
                            }
                            i++;
                        }

                        let liHtml = inline(itemBuf.join('\n'));
                        if (nestedBuf.length) {
                            liHtml += renderMarkdown(nestedBuf.join('\n'));
                        }
                        items.push('<li>' + liHtml + '</li>');
                    }
                    out.push((isOrdered ? '<ol>' : '<ul>') + items.join('') + (isOrdered ? '</ol>' : '</ul>'));
                    continue;
                }

                const buf = [line];
                i++;
                while (i < lines.length && lines[i].trim() && !/^#{1,6}\s/.test(lines[i]) && !/^>\s?/.test(lines[i]) && !bullet.test(lines[i]) && !ordered.test(lines[i]) && !/^```/.test(lines[i]) && !tableRow.test(lines[i])) {
                    buf.push(lines[i]);
                    i++;
                }
                out.push('<p>' + inline(buf.join(' ')) + '</p>');
            }
            return out.join('\n');
        }

        // Block dispatcher. New block types plug in here.
        const renderers = {
            markdown: function (block) {
                const div = document.createElement('div');
                div.innerHTML = renderMarkdown(block.content);
                return div;
            },
            mermaid: function (block) {
                // Mermaid scans elements with class "mermaid" whose textContent
                // is the diagram source. We collect these nodes and run
                // mermaid.run() once after all blocks are in the DOM.
                const div = document.createElement('div');
                div.className = 'mermaid';
                div.textContent = block.content;
                return div;
            },
            'force-graph': function (block) {
                // build.py emits parsed JSON: {nodes:[{id,size}], links:[{source,target}]}.
                // We instantiate force-graph after the container is in the DOM
                // so it can measure its own width.
                const div = document.createElement('div');
                div.className = 'force-graph';
                const data = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.ForceGraph) return;
                    const maxSize = data.nodes.reduce((m, n) => Math.max(m, n.size || 1), 1);
                    window.ForceGraph()(div)
                        .graphData(data)
                        .width(div.clientWidth)
                        .height(div.clientHeight)
                        .nodeRelSize(4)
                        .nodeVal(n => Math.max(20 * (n.size || 1) / maxSize, 0.001))
                        .nodeLabel(n => n.id + ' (' + (n.size || 1) + ')')
                        .nodeColor(() => 'rgba(135, 206, 235, 0.7)')
                        .linkColor(() => 'rgba(60, 60, 60, 0.4)')
                        .linkDirectionalArrowLength(4)
                        .linkDirectionalArrowRelPos(1)
                        .linkWidth(1);
                });
                return div;
            },
            'bubble-chart': function (block) {
                // build.py emits {nodes:[{name,size}]}. Renders a D3 circle-pack
                // SVG (same shape as the obren.io reference, just inline).
                const wrap = document.createElement('div');
                wrap.className = 'bubble-chart';
                const payload = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.d3) return;
                    const diameter = 480;
                    const fill = '#c0deed';
                    const textColor = '#111111';
                    const fontSize = 12;

                    const svg = window.d3.select(wrap).append('svg')
                        .attr('viewBox', '0 0 ' + diameter + ' ' + diameter)
                        .attr('width', diameter)
                        .attr('height', diameter);

                    const root = window.d3.hierarchy({children: payload.nodes})
                        .sum(d => d.size || 0)
                        .sort((a, b) => b.value - a.value);

                    window.d3.pack().size([diameter, diameter]).padding(2)(root);

                    const node = svg.selectAll('g')
                        .data(root.leaves())
                        .enter().append('g')
                        .attr('transform', d => 'translate(' + d.x + ',' + d.y + ')');

                    node.append('title').text(d => d.data.name + ': ' + d.value);
                    node.append('circle').attr('r', d => d.r).style('fill', fill);
                    node.append('text')
                        .attr('dy', '.3em')
                        .style('text-anchor', 'middle')
                        .style('fill', textColor)
                        .style('font-size', fontSize + 'px')
                        .text(d => d.data.name.substring(0, Math.max(0, Math.floor(d.r / 3))));
                });
                return wrap;
            }
        };

        const mermaidNodes = [];
        data.blocks.forEach(function (block) {
            const r = renderers[block.type];
            if (!r) {
                const pre = document.createElement('pre');
                pre.textContent = '[unknown block type: ' + block.type + ']';
                root.appendChild(pre);
                return;
            }
            const node = r(block);
            if (node instanceof Node) {
                root.appendChild(node);
                if (block.type === 'mermaid') mermaidNodes.push(node);
            }
        });

        if (mermaidNodes.length && window.mermaid) {
            window.mermaid.initialize({startOnLoad: false, theme: 'default'});
            window.mermaid.run({nodes: mermaidNodes});
        }
    })();
</script>
</body>
</html>
