<script id="data" type="application/json">{"meta": {"layout": "post", "title": "LLMs, ChatGPT and Evolution of Software Engineering: Patterns, Anti-Patterns, and Quality Imperative", "date": "2023-04-16 21:12:01 +0100", "categories": "architecture", "author": "by Željko Obrenović (obren.io)", "permalink": "chatgpt-se-evolution", "icon": "assets/icons/chatgpt.png", "timetoread": "15 min", "excerpt": "LLMs like ChatGPT can significantly impact software engineering by synergically combining Natural Language Processing (NLP), LLM-driven Soft Programming, and Traditional Hard Programming. Three synergy patterns: Generative Pattern, Learning and Explanation Pattern, and Hardening Pattern, can help developers harness the potential of these technologies."}, "tags": [], "modalities": [{"key": "index", "label": "Article", "meta": {}, "blocks": [{"type": "markdown", "content": "<style>\n    h2 {\n        margin-top: 42px;\n        font-size: 50px;\n    }\n    h3 {\n        margin-top: 42px;\n        font-size: 40px;\n    }\n<\/style>\n\n![](assets/images/chatgpt/grandmother-gd1611d538_1920.jpg)\n<div style=\"font-size: 70%; margin-top: -16px; color: grey; margin-bottom: 12px\">\nImage by <a href=\"https://pixabay.com/users/sasint-3639875/?utm_source=link-attribution&amp;utm_medium=referral&amp;utm_campaign=image&amp;utm_content=1822560\">Sasin Tipchai<\/a> from <a href=\"https://pixabay.com//?utm_source=link-attribution&amp;utm_medium=referral&amp;utm_campaign=image&amp;utm_content=1822560\">Pixabay<\/a>\n<\/div>\n\n> **KEY POINTS:**\n> * The primary objective of this article is to present a framework that can better structure discussions about ChatGPT and software engineering.\n> * Using this framework, I discuss that LLMs like ChatGPT can positively impact software engineering by synergically combining Natural Language Processing (NLP), LLM-driven Soft Programming, and Traditional Hard Programming.\n> * Three synergy patterns, Generative Pattern, Learning & Explanation Pattern, and Hardening Pattern, can help developers harness the potential of these technologies.\n> * Developers must be cautious of anti-patterns such as Over-generation and Knowledge Pollution (Bullshit Asymmetry Principle), Softening Hard Knowledge, and Unnatural Verbalizations.\n> * Ideally, we should be able to produce better software faster, not by AI replacing developers but by having developers employ productivity gains from AI to spend more time improving products’ quality.\n\n\n\n&nbsp;\n\n* TOC\n{:toc}\n\n&nbsp;\n\n## Intro\n\n[ChatGPT](https://chat.openai.com/), an advanced AI language model using [GPT-3](https://openai.com/blog/gpt-3-apps) and [GPT-4](https://openai.com/research/gpt-4), has gained attention in various fields, including software engineering. This AI model demonstrates exceptional language understanding, allowing complex problem-solving, code generation, and software documentation. Consequently, developers are integrating ChatGPT into their processes to reduce development time and improve software quality. While there is a lot of hype, the growing reliance on ChatGPT in software engineering is here to stay.\n\nWith this article, I want to help software developers to understand the underlying structure and developments behind recent ChatGPT hype. By assessing the technology’s foundation, developers can make informed decisions about incorporating ChatGPT, ensuring its effective use while avoiding over-dependence or misaligned expectations. This balanced approach allows them to maximize ChatGPT’s benefits and combine them with traditional software engineering practices.\n\nThe primary objective of this article is to present a framework that can better structure discussions about ChatGPT and software engineering. Using this framework, I discuss that:\n* LLMs like ChatGPT can positively impact software engineering by synergically combining Natural Language Processing (NLP), Soft Programming, and Traditional Hard Programming.\n* Three synergy patterns, Generative Pattern, Learning & Explanation Pattern, and Hardening Pattern, can help developers harness the potential of these technologies.\n* Developers must be cautious of anti-patterns such as Over-Generation and Knowledge Pollution (Bullshit Asymmetry Principle), Softening Hard Knowledge, and Unnatural Verbalizations.\n* Ideally, we should be able to produce better software faster, not by AI replacing developers but by having developers employ productivity gains from AI to spend more time improving products’ quality.\n\n\n## The Framework: Soft and Hard Programming + NLP\n\nMany discussions about ChatGPT tend to focus on low-level machine learning topics, such as deep learning, or on the high-level impact of the AI \"revolution\" on business and humanity. These conversations are not suited to understanding the practical implications of recent advancements in specific disciplines, like software engineering. To address this, I will use a model that outlines three high-level developments that, when used synergically, will further evolve the software engineering field. This model represents the styles and skillsets developers will need to master to benefit from the full power of AI-assisted software development.\n\nFrom a software engineering point of view, I see three key developments that current advances in AI leverage (Figure 1):\n\n* **Natural Language Processing (NLP)**: [NLP](https://en.wikipedia.org/wiki/Natural_language_processing) has improved significantly, allowing AI models like ChatGPT to engage in human-like conversations. These advances enable developers to interact with tools in everyday language, simplifying tasks and enabling better human-machine collaboration. It can automate documentation, enhance code readability, and improve team communication. This new possibility will require developers to rethink new modes of interactions, both when building solutions for users and for internal tooling.\n\n* **Soft Programming**: By soft programming, I mean a general set of methods for [training machines through examples](https://kozyrkov.medium.com/the-simplest-explanation-of-machine-learning-youll-ever-read-bebc0700047c) to, for instance, learning from existing code to generate new solutions. Knowing how to train programs with examples rather than instructions and how to test, monitor and deploy such soft/probabilistic solutions is an important skill to master.\n\n* **Hard Programming**: Despite AI and NLP advancements, [\"traditional\" programming languages](https://obren.io/tools/tech/index.html?catalog=programming_languages) are still crucial, and will keep developing. We should expect continued progress in programming languages, their syntax, libraries, and compilers supporting developers in controlling their code, optimizing performance, and addressing security concerns.\n\nThe [Appendix](#appendix-evolution-of-programming-and-ai) provides an overview of the evolution of these three key developments. The seemingly \"overnight\" success of [Large Language Models (LLMs)](https://en.wikipedia.org/wiki/Large_language_model) and ChatGPT is not due to an abrupt breakthrough but a series of progressive advancements that have evolved. The convergence of developments in traditional programming, NLP, and soft programming now allows individuals to synergistically combine these technologies synergistically, creating powerful new solutions.\n\n![](assets/images/chatgpt/framework.png)\n<div style=\"font-size: 90%; color: #323232; font-style: italic; margin-bottom: 32px;\">\n<b>Figure 1:<\/b> Large Language Models (LLMs) like ChatGPT can have a significant impact on software engineering by synergistically combining Natural Language Processing (NLP), LLM-driven Soft Programming, and Traditional Hard Programming.\n<\/div>\n\n\nEach of described three developments sits at the shoulders of knowledge giants. They can provide us not only with particular techniques but a vast body of knowledge that you can leverage when you engage with them:\n* **Soft/probabilistic knowledge**: soft programming is not possible without context knowledge. AI models, like LLMs, provide a rich context of world knowledge you can leverage or fine-tune with your data and examples.\n* **Language knowledge**: NLP tools embed a significant amount of growing linguistic and other knowledge for hundreds of languages. \n* **Hard/explicit knowledge**: classical programming leverages billions of lines of code in libraries, frameworks, and services used when you develop your solutions.\n\nOne of the fascinating developments behind ChatGPT recently is that we can now synergically connect these three bodies of knowledge without significant investments.\n\nDevelopers can use AI and NLP while leveraging traditional programming languages. This balanced approach can create a versatile software engineering process, leading to better products and satisfied users.\n\n## Synergy Patterns \n\nWhile each of the three developments (Soft Programming, Hard Programming, NLP) is useful in itself, the true power of AI-assisted software development, in my view, will come by mastering their synergic usage. To fully exploit the possibilities offered by the combination of Soft Programming, NLP, and Hard Programming, I identify three new synergy patterns that software developers can now leverage:\n\n* **Generative Pattern**: This pattern refers to the ability to utilize large language models (LLMs) like ChatGPT to generate new text content and code. By understanding how to leverage these models effectively, developers can automate and streamline various aspects of the software engineering process, such as code generation and documentation.\n\n* **Learning and Explanation Pattern**: This pattern focuses on the ability to communicate complex concepts and constructs in a clear, personalized manner using natural language. Mastering this skill enables developers to create more user-friendly interfaces, enhance collaboration among team members, and facilitate a better understanding of software systems for technical and non-technical stakeholders.\n\n* **Hardening Pattern**: This pattern adds accuracy and reliability to the probabilistic, by-example nature of \"soft\" programming. By developing this skill, developers can ensure that the generated code meets the necessary performance, security, and maintainability standards while integrating seamlessly with the more deterministic aspects of traditional hard programming.\n\nBy mastering these three new synergy patterns, software developers can fully harness the combined potential of NLP, Soft Programming, and Hard Programming, leading to more efficient, innovative, and robust software development processes.\n\n\n### Generative Pattern\n\nUsing Soft Programming techniques, developers can leverage ChatGPT and similar large language models (LLMs) to generate natural language text and code, making the software development process more efficient, intuitive, and accessible, transforming how software developers approach their tasks. Using LLMs to produce high-quality text and code may be essential in modern software development (Figure 2).\n\n\n![](assets/images/chatgpt/generative.png)\n<div style=\"font-size: 90%; color: #323232; font-style: italic; margin-bottom: 32px;\">\n<b>Figure 2:<\/b> By using Soft Programming techniques, developers can leverage ChatGPT and similar large language models (LLMs) to generate both natural language text and code, making the software development process more efficient, intuitive, and accessible.\n<\/div>\n\nThe current hype surrounding LLMs primarily revolves around discovering and sharing effective techniques for generating accurate and contextually appropriate text and code. These tips and tricks can range from understanding how to provide specific prompts to fine-tuning the models to produce more accurate outputs. Mastering these techniques is crucial for developers looking to harness the full potential of LLMs like ChatGPT.\n\nBy effectively leveraging LLMs, developers can streamline various aspects of their work, including code generation, debugging, and documentation. This approach can increase efficiency and innovation within the software development process. Furthermore, LLM-generated content can help bridge the gap between technical and non-technical stakeholders, fostering better communication and collaboration within teams and organizations.\n\nHowever, developers must still exercise their skills in critical analysis and problem-solving to ensure the quality and reliability of the generated content. By striking a balance between utilizing LLMs and traditional software development techniques, developers can harness the power of these advanced AI models while maintaining the necessary control and precision in their work.\n\n\n### Explanation and Learning Pattern\n\nThe combination of NLP and ChatGPT presents an opportunity to enhance understanding and education in various fields. By leveraging the advanced language capabilities of ChatGPT, individuals can learn faster and improve their teaching abilities. Acquiring this critical skill enables more effective knowledge transfer and fosters a better learning environment (Figure 3).\n\n\n![](assets/images/chatgpt/nlp-patterns.png)\n<div style=\"font-size: 90%; color: #323232; font-style: italic; margin-bottom: 32px;\">\n<b>Figure 3:<\/b>  NLP and ChatGPT can help learners grasp complex concepts and code more efficiently.\n<\/div>\n\nNLP and ChatGPT can help learners grasp complex concepts more efficiently by providing concise, contextual explanations of code or complex concepts and data tailored to their needs. Its ability to generate relevant examples and analogies further enriches the learning experience, aiding the comprehension and retention of new information. Furthermore, ChatGPT can offer instant feedback and support, making it an invaluable resource for self-paced learning and skill development.\n\nIn addition to its learning capabilities, developers can utilize ChatGPT as a powerful teaching aid. Educators can harness the AI model to create personalized learning materials, such as adaptive quizzes, interactive exercises, or customized lesson plans, which cater to each student's unique needs and preferences. Incorporating ChatGPT into their teaching toolkit allows educators to save time on content creation while ensuring that their instructional methods remain engaging and effective.\n\nUltimately, learning faster with ChatGPT and using it to enhance teaching methods is a valuable skill in today's rapidly evolving world. By embracing this new educational paradigm, learners and educators can benefit from a more adaptable, efficient, and engaging learning experience.\n\n\n### Hardening Pattern\n\nOne way to make LLMs more robust is by using conventional programming languages to create chatbot plugins that can help the LLMs handle specific tasks or scenarios. For example, design an LLM to assist with customer service. You can also create a plugin using a programming language like Python or Java to handle specific customer inquiries or complaints. This plugin could be integrated into the LLM's existing architecture, allowing it to take more complex scenarios and provide more accurate responses (Figure 4).\n\n![](assets/images/chatgpt/hardening.png)\n<div style=\"font-size: 90%; color: #323232; font-style: italic; margin-bottom: 32px; font-style: italic\">\n<b>Figure 4:<\/b> Using conventional programming languages can make LLMs and similar AI techniques more robust and capable of handling a more comprehensive range of scenarios and tasks.\n<\/div>\n\nAnother way to make LLMs more robust is by using programming languages to improve their natural language processing capabilities. For example, you could use machine learning algorithms to train the LLM to understand better and interpret natural language inputs. This process could involve using programming languages like Python or R to develop custom algorithms and models that can help the LLM better understand the nuances of human language.\n\nOverall, using conventional programming languages can make LLMs and similar AI techniques more robust and capable of handling a more comprehensive range of scenarios and tasks. By leveraging the power of programming languages, developers can create custom plugins and algorithms to help LLMs better understand and respond to user inputs, ultimately improving their overall performance and effectiveness.\n\n## Anti-Patterns\n\nDespite the benefits, software developers must be cautious of anti-patterns such as:\n* Over-Generation and Pollution, \n* Softening Hard Knowledge, and\n* Unnatural Verbalizations.\n\n### Over Generation and Pollution\n\nThe [Bullshit Asymmetry Principle](https://en.wikipedia.org/wiki/Brandolini's_law) is a concept coined by the Italian software developer and blogger Alberto Brandolini. It states that \"*the amount of energy needed to refute bullshit is an order of magnitude bigger than to produce it.*\" In other words, creating false or misleading information is much easier than fact-checking and correcting it. As an AI language model, ChatGPT can generate text on a wide range of topics at a breakneck pace. However, ChatGPT creates text based on the patterns it has learned from the data provided to it for training. If such training data are of low quality, the ChatGPT's answer will be similar (i.e., [garbage in, garbage out](https://en.wikipedia.org/wiki/Garbage_in,_garbage_out)). Of course, ChatGPT has the potential to help combat the spread of misinformation and \"bullshit\" by generating accurate and fact-checked information in response to queries. However, without awareness and appropriate measures, we may end up with an AI-driven technology that can create a massive amount of misleading information that will be practically impossible to refute.\n\n\nThe ease of using LLMs like ChatGPT has democratized AI-generated text and code, but having in mind Brandolini's observation,  it also brings potential risks, leading to several concerns:\n\n* **Content oversaturation**: Widespread LLM use may lead to an excess of low-quality content, making finding valuable information difficult.\n* **Inaccurate or misleading information**: Developers may generate content without deep subject knowledge, causing inaccuracies and misinformation.\n* **Code quality and maintainability**: Generated code may not follow best practices, affecting maintainability and scalability.\n* **Plagiarism and originality**: LLMs could encourage plagiarism or derivative work, harming intellectual property rights and creativity.\n* **Ethical concerns**: Generating low-quality text and code can propagate biases and prejudices from LLMs' training data, raising ethical issues.\n\nThe ease of content creation can lead to a vicious circle of deteriorating knowledge quality (Figure 6).\n\n<div style=\" margin-bottom: 32px; text-align: center\">\n<img src=\"assets/images/chatgpt/low-quality-spiral.png\" style=\"width: 600px\"><br>\n<\/div>\n<div style=\"font-size: 90%; color: #323232; font-style: italic; margin-bottom: 32px;\">\n<b>Figure 6:<\/b> The negative cycle of content over-generalization begins with difficulty finding knowledge, leading to using ChatGPT as a knowledge source. This usage creates overdependence on it. Overdependence, combined with easy knowledge generation, results in a large amount of low-quality content. The high volume and low quality make finding knowledge even harder, starting the cycle again.\n<\/div>\n\nIf left unattended, this vicious circle can create a massive amount of low-quality knowledge across all areas (Figure 7).\n\n![](assets/images/chatgpt/low-quality-network.png)\n<div style=\"font-size: 90%; color: #323232; font-style: italic; margin-bottom: 32px; font-style: italic\">\n<b>Figure 7:<\/b> The network of low-quality knowledge arises from the ease of generating text and code using Generative Pattern. This knowledge becomes part of the data and examples used by LLMs to generate new content, further deteriorating the quality of knowledge produced.\n<\/div>\n\nPromoting responsible LLM usage and emphasizing human oversight in generating text and code are essential. Encouraging developers to verify accuracy, adhere to software development best practices, and maintain ethical standards can help mitigate risks tied to LLMs like ChatGPT.\n\n\n\n### Softening Hard Knowledge\n\nLarge language models (LLMs) like ChatGPT and their probabilistic approach can offer numerous benefits in generating text and code and providing explanations. However, using LLMs to replace hard knowledge and explicit facts may lead to several issues, including softening hard knowledge (Figure 5).\n* **Blurring of hard knowledge**: The probabilistic approach of LLMs can result in the blurring or softening of hard knowledge, leading to ambiguity or uncertainty. This approach can be problematic when dealing with subjects that demand precise and unambiguous information, as it may dilute the clarity and objectivity associated with hard knowledge.\n\n* **(Un)reliability**: LLMs generate content based on probabilities, which means they might not always provide correct or up-to-date information. Relying solely on LLMs for factual knowledge could lead to misinformation or misconceptions, particularly in areas where accuracy is crucial.\n\n* **Lack of domain expertise**: Although LLMs have a broad understanding of various subjects, they may need more depth of knowledge and context that domain experts possess. This limitation could result in superficial or misleading answers, which can be detrimental in fields that require specialized knowledge.\n\n* **Bias**: LLMs are trained on data from the internet, which can include biased or prejudiced information. As a result, LLM-generated content may inadvertently perpetuate harmful stereotypes or reflect discriminatory attitudes. Relying on LLMs for hard knowledge could exacerbate existing biases and undermine efforts to promote fairness and inclusivity.\n\n* **(Lack of) critical thinking**: Overreliance on LLMs for knowledge acquisition might decrease critical thinking and problem-solving skills. These cognitive abilities are essential for evaluating the integrity and relevance of information and developing a deep understanding of complex topics.\n\n![](assets/images/chatgpt/softening.png)\n<div style=\"font-size: 90%; color: #323232; font-style: italic; margin-bottom: 32px;\">\n<b>Figure 5:<\/b> Softening pattern occurs when hard knowledge sources are ignored, and soft knowledge sources are used to obtain information instead.\n<\/div>\n\n\nIt is crucial to balance utilizing LLMs and relying on traditional sources of hard knowledge, such as textbooks, research papers, and domain experts, to mitigate these issues. By maintaining a healthy skepticism towards LLM-generated content and verifying its accuracy, users can make the most of these powerful tools while minimizing their potential drawbacks and preserving the integrity of hard knowledge.\n\n<div style=\"font-size: 90%; color: #323232; margin-bottom: 32px; text-align: center\">\n<img src=\"assets/images/chatgpt/wife.jpeg\" style=\"width: 400px\"><br>\n<\/div>\n<div style=\"font-size: 90%; color: #323232; margin-bottom: 32px;\">\nSource: https://twitter.com/DrEliDavid/status/1617762423972429824\n<\/div>\n\n\n\n### Unnatural Verbalizations\n\nLLMs like ChatGPT make generating natural language content easy, but this convenience can cause issues such as unnatural verbalizations, loss of nuance, inappropriate medium, and oversimplification.\n\n* **Inappropriate medium**: Visual representations might be more suitable for certain types of information than natural language.\n* **Unnatural verbalizations**: LLMs may create awkward phrasing, reducing communication effectiveness.\n* **Loss of nuance and context**: Over-reliance on NLP-generated content can lead to misunderstandings, especially with complex topics.\n* **Oversimplification**: LLM-generated content may oversimplify complex concepts, causing a loss of essential details.\n\nTo balance LLM use with other forms of representation, developers should consider the most effective medium for their message and apply human oversight and critical thinking to maintain content quality, nuance, and context.\n\n\n## Conclusions: Focus on Quality\n\nThe integration of Hard Programming, Soft Programming, and NLP through LLMs like ChatGPT can further advance software engineering. This technology mix increases efficiency and innovation, helping professionals and businesses excel. However, there are risks and negatives to address.\n\n> Ideally, we should be able to produce better software faster, not by AI replacing developers but by having developers employ productivity gains from AI to spend more time improving products' quality. \n\nIn my view, the key to maximizing the positive impact involves using productivity gains from usage of LLMs for quality assurance. This ensures AI-generated output is accurate, unbiased, and safe. The NN/g Nielsen Norman Group's article, \"[ChatGPT Lifts Business Professionals’ Productivity and Improves Work Quality](https://www.nngroup.com/articles/chatgpt-productivity/),\" supports this idea (Figure 8). It found that using ChatGPT for business documents saved time and significantly improved work quality. This is because people spent more time on editing (quality improvement) and less time on drafting the document. I also similarly developed this document, brainstorming and drafting the paper with the help of ChatGPT and spending a significant amount of time on multiple rounds of editing.\n\n<br>\n<div style=\"font-size: 90%; margin-bottom: 32px; text-align: center\">\n<img src=\"assets/images/chatgpt/chatgpt-authoring-productivity.jpg\" style=\"width: 600px\"><br>\n<\/div>\n<div style=\"font-size: 90%; color: #323232; font-style: italic; margin-bottom: 32px\">\n<b>Figure 8:<\/b> Credit: <a href=\"https://www.nngroup.com/articles/chatgpt-productivity/\">NN/g Nielson Norman Group<\/a>. The bar chart compares the average time in minutes spent on three stages of writing a document: 1) brainstorming, 2) creating the first draft, and 3) editing the draft. It shows the time taken by users who used ChatGPT (top bar) and those who didn't (bottom bar). The data is from a study by Noy and Zhang (2023).\n<\/div>\n\nThe previous diagram also illustrates my dream of AI-assisted software engineering: to give us more time to think through our decisions, validate, test, and improve their quality while simultaneously reducing the time-to-market. Ideally, we should be able to produce better software faster, not by AI replacing developers but by having developers employ productivity gains from AI to spend more time improving products' quality. And [improving quality is a sustainable way to reduce costs and speed up software development](https://martinfowler.com/articles/is-quality-worth-cost.html). By leveraging AI and other productivity tools, developers can reduce the time spent on repetitive or tedious tasks, such as code reviews and testing, and instead focus on improving the overall quality of the software. By enhancing the quality, developers can also reduce the overall software development costs by catching and fixing issues earlier in the development cycle before they become more expensive. Additionally, higher-quality software is typically more reliable and requires fewer updates and patches, which can further reduce costs over time.\n\n\nBut I am cautious about this dream as our ambitions will also grow. Software engineering history can teach us one thing (see the quote from Bruce Shiver from almost 40 years ago): every time we increase our development productivity, such an increase is followed by an even more considerable rise in our ambitions to build more applications and bigger systems.\n\n> “Many of the challenges facing the software industry today are a direct result of **our insatiable appetite for new\n> computer-based systems applications**. Others confront us simply because we have not managed to successfully solve a\n> large number of problems that we ourselves created many years ago.”\n> <br><br>--Bruce D. Shriver, From the Editor-in-Chief, IEEE Software, **January 1984**.\n\nIn conclusion, to harness the power of Hard Programming, Soft Programming, and NLP, the right balance between AI and human expertise is crucial. By emphasizing quality assurance and fostering a cooperative relationship between AI and humans, developers can unlock the full potential of this technology and minimize associated risks. As nicely described by the NN/s's article, AI and skilled human professionals collaborating is essential. By working together, they form a symbiotic relationship that surpasses individual capabilities. As AI develops and integrates more into the business world, our focus should shift to fostering collaboration between AI and humans. This aligns with Doug Engelbart's vision of advanced user interfaces augmenting human intellect, not replacing it.\n\n\n\n<br>\n## APPENDIX: Evolution of Programming and AI\n\n> \"The entire history of software engineering can be seen as one of raising levels of abstraction.\" \n> <br>--Grady Booch\n\n<br>\n\nThe seemingly \"overnight\" success of LLMs and ChatGPT is not due to an abrupt breakthrough but a series of progressive advancements that have evolved. The convergence of developments in traditional programming, NLP, and soft programming allows individuals to synergistically combine these technologies synergistically, creating a powerful and efficient solution.\n\n### Hard Programming Evolution\n\nThe [evolution of programming languages](https://en.wikipedia.org/wiki/History_of_programming_languages) has consistently trended towards higher levels of abstraction, enabling developers to concentrate more on the problem at hand and less on underlying implementation details. This article delves into the growing abstraction in programming languages, demonstrating how each stage has empowered developers and facilitated the creation of increasingly complex and sophisticated software systems.\n\n**From Machine Code to Assembly Languages**: \nIn programming's early days, developers worked with [machine code](https://en.wikipedia.org/wiki/Machine_code), manually inputting binary instruction sequences executed by computer hardware. [Assembly languages](https://en.wikipedia.org/wiki/Assembly_language) offered a significant abstraction leap, utilizing mnemonic codes that were more human-readable and simpler to write. An assembler translated these mnemonics into machine code, freeing developers from directly manipulating binary instructions.\n\n**High-Level Programming Languages: FORTRAN and COBOL**: \nThe emergence of high-level programming languages like [Fortran](https://en.wikipedia.org/wiki/Fortran) and [COBOL](https://en.wikipedia.org/wiki/Fortran) in the late 1950s represented another major abstraction milestone. These languages employed more natural syntax and constructs, allowing developers to express complex algorithms and data manipulation tasks more intuitively. High-level languages enabled portability across different machines, making code reuse more practical.\n\n**Structured Programming: ALGOL, Pascal, and C**: \n[Structured programming languages](https://en.wikipedia.org/wiki/Structured_programming), such as [ALGOL](https://en.wikipedia.org/wiki/ALGOL), [Pascal](https://en.wikipedia.org/wiki/Pascal_(programming_language)), and [C](https://en.wikipedia.org/wiki/C_(programming_language)), introduced control structures (e.g., loops and conditionals) and modularization, enabling developers to organize better and manage code. This abstraction level made reasoning about program flow easier, reducing cognitive load on developers while further enhancing code reusability and maintainability.\n\n**Object-Oriented Programming: Smalltalk, C++, and Java**: \n[Object-oriented programming (OOP) languages](https://en.wikipedia.org/wiki/Object-oriented_programming) abstract real-world entities or abstract concepts through classes and objects. OOP languages like [Smalltalk](https://en.wikipedia.org/wiki/Smalltalk), [C++](https://en.wikipedia.org/wiki/C++), and [Java](https://en.wikipedia.org/wiki/Java_(programming_language)) promoted encapsulation, inheritance, and polymorphism, fostering modularity and code reuse. OOP languages significantly streamlined large-scale software creation and maintenance by allowing developers to model complex systems using objects.\n\n**Scripting and Domain-Specific Languages: Perl, Python, and Ruby**: \nScripting languages like [Perl](https://en.wikipedia.org/wiki/Perl), [Python](https://en.wikipedia.org/wiki/Python_(programming_language)), and [Ruby](https://en.wikipedia.org/wiki/Ruby_(programming_language)) increased abstraction by offering higher-level constructs for everyday tasks and specialized domains. These languages often featured powerful libraries, expressive syntax, and dynamic typing, allowing developers to write less code and accomplish more. Domain-specific languages, conversely, provided tailored abstractions and constructs for specific problem domains, further simplifying the development process.\n\n**Declarative Programming: SQL, Prolog, and HTML**: \n[Declarative programming languages](https://en.wikipedia.org/wiki/Declarative_programming), including [SQL](https://en.wikipedia.org/wiki/SQL), [Prolog](https://en.wikipedia.org/wiki/Prolog), and [HTML](https://en.wikipedia.org/wiki/Prolog), signified another substantial abstraction step. Unlike imperative languages, which focus on a task's performance, declarative languages emphasize the desired outcome, allowing developers to express their intent without detailing the exact steps to achieve it. This abstraction enables developers to reason at a higher level, often leading to more concise and maintainable code.\n\n**Functional and Reactive Paradigms**: \n[Functional programming languages](https://en.wikipedia.org/wiki/Functional_programming) like [Haskell](https://en.wikipedia.org/wiki/Haskell) and [Scala](https://en.wikipedia.org/wiki/Scala_(programming_language)) and [reactive paradigms](https://en.wikipedia.org/wiki/Reactive_programming) such as the [Reactive Extensions (Rx) library](https://en.wikipedia.org/wiki/ReactiveX) offer new abstraction levels by prioritizing immutability, pure functions, and reactive programming constructs. These paradigms allow developers to manage states better, handle concurrency, and create more robust and scalable software systems.\n\n### Natural Language Processing Evolution\n\nOver the years, [natural language processing (NLP)](https://en.wikipedia.org/wiki/Natural_language_processing) has developed significantly, facilitating increasingly complex interactions between humans and computers. This article examines the growing abstraction in NLP, from the early days of rudimentary template-based systems to cutting-edge conversational AI models like ChatGPT, and how these advancements have reshaped our interactions with machines.\n\n**Template-Based Systems: NLP's Early Days**:\nThe first NLP systems used basic [template-based approaches](https://en.wikipedia.org/wiki/Template_processor) to produce and interpret language. These systems employed predefined templates with placeholders that were filled based on user input. Although limited in flexibility and capable of handling only elementary interactions, they established the foundation for more advanced NLP techniques.\n\n**Rule-Based Systems and Syntax Analysis**: \n[Rule-based systems](https://en.wikipedia.org/wiki/Rule-based_system), which utilized grammatical and syntactic rules to analyze and generate language, marked the next stage in NLP evolution. These systems were more advanced than template-based approaches, offering a better understanding of language structure and increased flexibility. However, they still struggled with ambiguities and demanded considerable manual effort to develop and maintain the rules.\n\n**Statistical Methods and Machine Learning**: \nThe introduction of [statistical methods](https://cl.lingfil.uu.se/~nivre/docs/statnlp.pdf) and machine learning in the 1990s represented a considerable shift in NLP abstraction. These techniques enabled the automatic extraction of patterns and relationships from extensive datasets, allowing NLP models to learn from and adapt to real-world language data. This transition significantly improved tasks like part-of-speech tagging, named entity recognition, and sentiment analysis.\n\n**Deep Learning and Word Embeddings**: \nThe advent of [deep learning](https://en.wikipedia.org/wiki/Deep_learning) and [word embeddings](https://en.wikipedia.org/wiki/Word_embedding), such as [Word2Vec](https://en.wikipedia.org/wiki/Word2vec) and [GloVe](https://en.wikipedia.org/wiki/GloVe), further advanced NLP by allowing models to learn dense vector representations of words that captured their semantic meanings. These embeddings facilitated more powerful and efficient models capable of handling complex language understanding tasks like machine translation and text summarization.\n\n**Transformers and Contextualized Language Models**: \nThe emergence of the [transformer architecture](https://en.wikipedia.org/wiki/Transformer_(machine_learning_model)) and contextualized language models, including [Bidirectional Encoder Representations from Transformers (BERT)](https://en.wikipedia.org/wiki/BERT_(language_model)) and [Generative Pre-trained Transformers (GPT)](https://en.wikipedia.org/wiki/Generative_pre-trained_transformer), changed NLP by enabling models to learn deep contextual representations of words in a sentence. These models utilized self-attention mechanisms and large-scale unsupervised learning, resulting in significant performance enhancements across various NLP tasks, such as question answering, text classification, and more.\n\n**Conversational AI and ChatGPT**: \nThe latest advancements in NLP have led to sophisticated conversational AI models like [ChatGPT](https://en.wikipedia.org/wiki/ChatGPT). Building upon the [transformer architecture](https://en.wikipedia.org/wiki/Transformer_(machine_learning_model)) , these models can engage in more natural, context-aware conversations with users. By leveraging large-scale pre-training and fine-tuning techniques, ChatGPT and similar models can understand and generate human-like responses, paving the way for various applications, from customer support to virtual assistants.\n\n### Soft Programming Evolution\n\n[Programming by example (PbE)](https://en.wikipedia.org/wiki/Programming_by_example) offers a powerful software development method that lets developers specify their intentions through examples instead of writing code. As PbE has progressed, it has become more abstract, capable of addressing increasingly complex tasks. This article investigates the growing abstraction in PbE, from its humble beginnings to the innovative use of ChatGPT prompting, and explores how training machine learning models can be viewed as a form of low-level programming by example.\n\n**Early PbE: Macros and Scripting**:  \nIn PbE's early stages, simple [macros](https://en.wikipedia.org/wiki/Macro_(computer_science)) and scripting languages enabled users to automate repetitive tasks by recording their actions or offering example input-output pairs. While these systems had limited flexibility, they laid the groundwork for more advanced PbE methods.\n\n**Spreadsheets and Formula Inference**: \nThe widespread use of [spreadsheets](https://en.wikipedia.org/wiki/Spreadsheet) brought a new abstraction level to PbE. Users could create formulas based on example data, and spreadsheet software would automatically deduce the intended calculations. This method simplified data manipulation and analysis for non-programmers, allowing them to concentrate on the problem without concerning themselves with the underlying code.\n\n**Inductive Programming and Synthesis**: \n[Inductive programming](https://en.wikipedia.org/wiki/Inductive_programming) and program synthesis techniques emerged as a more robust way to generate code from examples. These methods utilized formal techniques and constraint-solving algorithms to produce code that fulfilled given input-output pairs automatically. Although more flexible and expressive than previous PbE methods, inductive programming, and synthesis often demanded substantial computational resources and faced scalability challenges.\n\n**Machine Learning: A New Form of PbE**: \nWith the advent of machine learning, PbE entered a new phase. Training a machine learning model can be considered [a low-level PbE form](https://kozyrkov.medium.com/the-simplest-explanation-of-machine-learning-youll-ever-read-bebc0700047c)), where the model learns to execute a task based on example inputs and corresponding outputs. This approach enables greater flexibility and adaptability, as models can generalize from the provided examples to tackle unseen situations.\n\n**ChatGPT Prompting: PbE Meets Conversational AI**: \nThe emergence of [conversational AI models](https://en.wikipedia.org/wiki/Chatbot) like ChatGPT has unlocked new potential in programming by example. Users can supply natural language prompts and example data to guide the model in generating code, automating tasks, or solving intricate problems. ChatGPT's capacity to comprehend and produce human-like responses facilitates more intuitive and efficient interactions, narrowing the gap between users and code generation. Prompting enables intuitive interactions and bridges the gap between users and code generation.\n"}]}]}</script>
<script>
    (function () {
        const data = JSON.parse(document.getElementById('data').textContent);
        const root = document.getElementById('content');

        const postId = (data.meta && data.meta.id) ? String(data.meta.id) : '';
        const postStatusRaw = (data.meta && data.meta.status) ? String(data.meta.status) : '';
        if (postId || postStatusRaw) {
            const header = document.getElementById('post-header');
            let sectionEl = header.querySelector('p.section');
            if (!sectionEl) {
                sectionEl = document.createElement('p');
                sectionEl.className = 'section';
                header.insertBefore(sectionEl, header.firstChild);
            }
            // Status pill goes first, then a " / " separator before the existing
            // content (section name and/or id).
            if (postStatusRaw) {
                const parts = postStatusRaw.split(':');
                const statusName = parts[0].trim();
                const statusColor = (parts[1] || '').trim();
                const wrap = document.createElement('span');
                wrap.className = 'post-status';
                const dot = document.createElement('span');
                dot.className = 'status-dot';
                if (statusColor) dot.style.background = statusColor;
                wrap.appendChild(dot);
                wrap.appendChild(document.createTextNode(statusName));
                if (sectionEl.firstChild) {
                    sectionEl.insertBefore(document.createTextNode(' • '), sectionEl.firstChild);
                    sectionEl.insertBefore(wrap, sectionEl.firstChild);
                } else {
                    sectionEl.appendChild(wrap);
                }
            }
            if (postId) {
                if (sectionEl.firstChild) sectionEl.appendChild(document.createTextNode(' • '));
                sectionEl.appendChild(document.createTextNode(postId));
            }
        }

        const tagsHost = document.getElementById('tags');
        (data.tags || []).forEach(function (t) {
            const span = document.createElement('span');
            span.className = 'tag';
            span.textContent = t;
            tagsHost.appendChild(span);
        });

        // Minimal markdown renderer. Supports: ATX headings, paragraphs, blockquotes,
        // unordered/ordered lists, fenced code, inline code, bold/italic/strikethrough, links, images, hr.
        // Sufficient for the posts in this repo; replace with a fuller parser if needed.
        function renderMarkdown(src) {
            const lines = src.replace(/\r\n/g, '\n').split('\n');
            const out = [];
            let i = 0;

            const bullet = /^(\s*)([-*])\s+(.*)$/;
            const ordered = /^(\s*)(\d+)\.\s+(.*)$/;
            const tableRow = /^\s*\|(.+)\|\s*$/;
            const tableSep = /^\s*\|?\s*:?-{3,}:?\s*(\|\s*:?-{3,}:?\s*)+\|?\s*$/;

            function splitRow(s) {
                let t = s.trim();
                if (t.startsWith('|')) t = t.slice(1);
                if (t.endsWith('|')) t = t.slice(0, -1);
                return t.split('|').map(c => c.trim());
            }

            function inline(s) {
                // Posts are trusted content, so raw HTML passes through unescaped
                // (some posts embed inline <blockquote>, <div>, etc.).
                // Stray ampersands still get fixed up.
                s = s.replace(/&(?![a-zA-Z]+;|#\d+;)/g, '&amp;');
                s = s.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<a class="image-link" href="$2" target="_blank" rel="noopener noreferrer"><img alt="$1" src="$2"></a>');
                s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
                s = s.replace(/`([^`]+)`/g, function (_, c) {
                    return '<code>' + c.replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</code>';
                });
                s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
                s = s.replace(/~~([^~\n]+)~~/g, '<del>$1</del>');
                s = s.replace(/(^|[^*])\*([^*\n]+)\*/g, '$1<em>$2</em>');
                return s;
            }

            while (i < lines.length) {
                const line = lines[i];
                if (!line.trim()) {
                    i++;
                    continue;
                }

                const fence = line.match(/^```(\w*)\s*$/);
                if (fence) {
                    i++;
                    const buf = [];
                    while (i < lines.length && !/^```\s*$/.test(lines[i])) {
                        buf.push(lines[i]);
                        i++;
                    }
                    i++;
                    const escaped = buf.join('\n').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                    const cls = fence[1] ? ' class="lang-' + fence[1] + '"' : '';
                    out.push('<pre><code' + cls + '>' + escaped + '</code></pre>');
                    continue;
                }

                const h = line.match(/^(#{1,6})\s+(.*)$/);
                if (h) {
                    out.push('<h' + h[1].length + '>' + inline(h[2]) + '</h' + h[1].length + '>');
                    i++;
                    continue;
                }

                if (/^\s*(?:-\s*){3,}\s*$/.test(line) || /^\s*\*{3,}\s*$/.test(line)) {
                    out.push('<hr>');
                    i++;
                    continue;
                }

                if (/^>\s?/.test(line)) {
                    const buf = [];
                    while (i < lines.length && /^>\s?/.test(lines[i])) {
                        buf.push(lines[i].replace(/^>\s?/, ''));
                        i++;
                    }
                    out.push('<blockquote>' + renderMarkdown(buf.join('\n')) + '</blockquote>');
                    continue;
                }

                if (tableRow.test(line) && i + 1 < lines.length && tableSep.test(lines[i + 1])) {
                    const headers = splitRow(line);
                    i += 2;
                    const rows = [];
                    while (i < lines.length && tableRow.test(lines[i])) {
                        rows.push(splitRow(lines[i]));
                        i++;
                    }
                    let html = '<table><thead><tr>';
                    headers.forEach(h => {
                        html += '<th>' + inline(h) + '</th>';
                    });
                    html += '</tr></thead><tbody>';
                    rows.forEach(r => {
                        html += '<tr>';
                        r.forEach(c => {
                            html += '<td>' + inline(c) + '</td>';
                        });
                        html += '</tr>';
                    });
                    html += '</tbody></table>';
                    out.push(html);
                    continue;
                }

                if (bullet.test(line) || ordered.test(line)) {
                    // Indent of the first bullet defines this list's base level.
                    // Deeper-indented bullets become nested lists (rendered by
                    // recursing into renderMarkdown). Same-or-less indent at a
                    // bullet starts a sibling item (or ends the list).
                    const firstMatch = line.match(bullet) || line.match(ordered);
                    const baseIndent = firstMatch[1].length;
                    const isOrdered = ordered.test(line);
                    const items = [];
                    while (i < lines.length) {
                        const cur = lines[i];
                        if (!cur.trim()) {
                            // blank line breaks the list (matches CommonMark-ish behaviour)
                            i++;
                            break;
                        }
                        const mBul = cur.match(bullet);
                        const mOrd = cur.match(ordered);
                        const m = mBul || mOrd;
                        if (!m) break;
                        if (m[1].length < baseIndent) break;
                        if (m[1].length > baseIndent) break; // shouldn't happen at top of loop
                        // Same-type check: switching between -/* and 1. closes the list
                        if (isOrdered !== !!mOrd) break;

                        const itemBuf = [m[3]];
                        const nestedBuf = [];
                        i++;
                        while (i < lines.length) {
                            const nxt = lines[i];
                            if (!nxt.trim()) break;
                            const nBul = nxt.match(bullet);
                            const nOrd = nxt.match(ordered);
                            const nm = nBul || nOrd;
                            if (nm) {
                                if (nm[1].length > baseIndent) {
                                    // nested list line — dedent and stash
                                    nestedBuf.push(nxt.slice(baseIndent + 2));
                                    i++;
                                    continue;
                                }
                                // sibling or end of list
                                break;
                            }
                            // Plain continuation text
                            if (nestedBuf.length) {
                                // continuation inside the nested block
                                nestedBuf.push(nxt.slice(baseIndent + 2));
                            } else {
                                itemBuf.push(nxt.trim());
                            }
                            i++;
                        }

                        let liHtml = inline(itemBuf.join('\n'));
                        if (nestedBuf.length) {
                            liHtml += renderMarkdown(nestedBuf.join('\n'));
                        }
                        items.push('<li>' + liHtml + '</li>');
                    }
                    out.push((isOrdered ? '<ol>' : '<ul>') + items.join('') + (isOrdered ? '</ol>' : '</ul>'));
                    continue;
                }

                const buf = [line];
                i++;
                while (i < lines.length && lines[i].trim() && !/^#{1,6}\s/.test(lines[i]) && !/^>\s?/.test(lines[i]) && !bullet.test(lines[i]) && !ordered.test(lines[i]) && !/^```/.test(lines[i]) && !tableRow.test(lines[i])) {
                    buf.push(lines[i]);
                    i++;
                }
                out.push('<p>' + inline(buf.join(' ')) + '</p>');
            }
            return out.join('\n');
        }

        // Block dispatcher. New block types plug in here.
        const renderers = {
            markdown: function (block) {
                const div = document.createElement('div');
                div.innerHTML = renderMarkdown(block.content);
                return div;
            },
            mermaid: function (block) {
                // Mermaid scans elements with class "mermaid" whose textContent
                // is the diagram source. We collect these nodes and run
                // mermaid.run() once after all blocks are in the DOM.
                const div = document.createElement('div');
                div.className = 'mermaid';
                div.textContent = block.content;
                return div;
            },
            'force-graph': function (block) {
                // build.py emits parsed JSON: {nodes:[{id,size}], links:[{source,target}]}.
                // We instantiate force-graph after the container is in the DOM
                // so it can measure its own width.
                const div = document.createElement('div');
                div.className = 'force-graph';
                const data = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.ForceGraph) return;
                    const maxSize = data.nodes.reduce((m, n) => Math.max(m, n.size || 1), 1);
                    window.ForceGraph()(div)
                        .graphData(data)
                        .width(div.clientWidth)
                        .height(div.clientHeight)
                        .nodeRelSize(4)
                        .nodeVal(n => Math.max(20 * (n.size || 1) / maxSize, 0.001))
                        .nodeLabel(n => n.id + ' (' + (n.size || 1) + ')')
                        .nodeColor(() => 'rgba(135, 206, 235, 0.7)')
                        .linkColor(() => 'rgba(60, 60, 60, 0.4)')
                        .linkDirectionalArrowLength(4)
                        .linkDirectionalArrowRelPos(1)
                        .linkWidth(1);
                });
                return div;
            },
            'bubble-chart': function (block) {
                // build.py emits {nodes:[{name,size}]}. Renders a D3 circle-pack
                // SVG (same shape as the obren.io reference, just inline).
                const wrap = document.createElement('div');
                wrap.className = 'bubble-chart';
                const payload = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.d3) return;
                    const diameter = 480;
                    const fill = '#c0deed';
                    const textColor = '#111111';
                    const fontSize = 12;

                    const svg = window.d3.select(wrap).append('svg')
                        .attr('viewBox', '0 0 ' + diameter + ' ' + diameter)
                        .attr('width', diameter)
                        .attr('height', diameter);

                    const root = window.d3.hierarchy({children: payload.nodes})
                        .sum(d => d.size || 0)
                        .sort((a, b) => b.value - a.value);

                    window.d3.pack().size([diameter, diameter]).padding(2)(root);

                    const node = svg.selectAll('g')
                        .data(root.leaves())
                        .enter().append('g')
                        .attr('transform', d => 'translate(' + d.x + ',' + d.y + ')');

                    node.append('title').text(d => d.data.name + ': ' + d.value);
                    node.append('circle').attr('r', d => d.r).style('fill', fill);
                    node.append('text')
                        .attr('dy', '.3em')
                        .style('text-anchor', 'middle')
                        .style('fill', textColor)
                        .style('font-size', fontSize + 'px')
                        .text(d => d.data.name.substring(0, Math.max(0, Math.floor(d.r / 3))));
                });
                return wrap;
            }
        };

        // Render one modality's blocks into a host element. Mermaid runs
        // scoped to just the nodes created here, so lazily rendered tabs get
        // their diagrams on first activation.
        let mermaidInitialized = false;
        function renderBlocksInto(blocks, host) {
            const mermaidNodes = [];
            blocks.forEach(function (block) {
                const r = renderers[block.type];
                if (!r) {
                    const pre = document.createElement('pre');
                    pre.textContent = '[unknown block type: ' + block.type + ']';
                    host.appendChild(pre);
                    return;
                }
                const node = r(block);
                if (node instanceof Node) {
                    host.appendChild(node);
                    if (block.type === 'mermaid') mermaidNodes.push(node);
                }
            });
            if (mermaidNodes.length && window.mermaid) {
                if (!mermaidInitialized) {
                    window.mermaid.initialize({startOnLoad: false, theme: 'default'});
                    mermaidInitialized = true;
                }
                window.mermaid.run({nodes: mermaidNodes});
            }
        }

        // Modality tabs. One <article class="pane"> per modality; panes are
        // rendered lazily on first activation (force-graph / D3 / mermaid
        // need a visible, measurable container). With a single modality the
        // tab bar stays hidden and the page looks exactly like before.
        const mods = data.modalities;
        const tabBar = document.getElementById('modality-tabs');
        const panes = {};
        const tabButtons = {};
        const renderedPanes = {};

        mods.forEach(function (m) {
            const pane = document.createElement('article');
            pane.className = 'pane';
            pane.dataset.key = m.key;
            pane.hidden = true;
            root.appendChild(pane);
            panes[m.key] = pane;
        });

        const defaultKey = mods.some(m => m.key === 'index') ? 'index' : mods[0].key;

        function activate(key, updateHash) {
            mods.forEach(function (m) {
                const isActive = m.key === key;
                panes[m.key].hidden = !isActive;
                if (tabButtons[m.key]) {
                    tabButtons[m.key].classList.toggle('active', isActive);
                    tabButtons[m.key].setAttribute('aria-selected', isActive ? 'true' : 'false');
                }
            });
            // Unhide first, then render: the chart libraries measure widths.
            if (!renderedPanes[key]) {
                renderBlocksInto(mods.find(m => m.key === key).blocks, panes[key]);
                renderedPanes[key] = true;
            }
            if (updateHash) {
                history.replaceState(null, '',
                    key === defaultKey ? location.pathname + location.search : '#' + key);
            }
        }

        if (mods.length > 1) {
            mods.forEach(function (m) {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.textContent = m.label;
                btn.setAttribute('role', 'tab');
                btn.addEventListener('click', function () { activate(m.key, true); });
                tabBar.appendChild(btn);
                tabButtons[m.key] = btn;
            });
            tabBar.hidden = false;
        }

        // The hash selects a tab only when it matches a modality key, so
        // existing anchors keep working.
        const initialHash = location.hash.slice(1);
        activate(mods.some(m => m.key === initialHash) ? initialHash : defaultKey, false);
        window.addEventListener('hashchange', function () {
            const k = location.hash.slice(1);
            if (mods.some(m => m.key === k)) activate(k, false);
        });
    })();
</script>
</body>
</html>
