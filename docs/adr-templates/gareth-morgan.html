<script id="data" type="application/json">{"meta": {"title": "Decision record template by Gareth Morgan", "date": "2020-01-21 21:12:01 +0100", "icon": "assets/icons/gareth-morgan.jpeg", "author": "by Garteh Morgan", "permalink": "gareth-morgan", "timetoread": "15 min", "excerpt": "Gareth Morgan's compact ADR template: numbered title, Status (with supersedes/deprecated links), Context, Decided Approach, and Consequences. Designed for easy referencing and cataloging across an organization's decision log."}, "tags": [], "blocks": [{"type": "markdown", "content": "![](../assets/images/gareth-morgan.jpeg)\n# [000] Title\n*Allocate each ADR a number for easy reference and cataloging* \\\n*NOTE: All italicised text provides hints and should be removed for production*\n\n## Status - DRAFT / ACTIVE /  DEPRECATED by [000] / SUPERSEDES [000]\n\n## Context\n*Briefly describe the problem(s) that this ADR intends to address, and why the problems exist.*\n\n## Decided Approach\n*Detail the architecturally significant decision that has been / will be made and describe how it addresses the problems outlined in the Context section.*\n\n## Consequences\n*What is the impact of this decision on the architecture characteristics and functional requirements of the system?*\n\n## Governance\n*How will the outcomes of this decision be monitored?* \\\n*How will compliance with this decision be ensured?*\n\n## Options Analysis\n*If applicable, include or link to any trade-off analysis which has been performed to arrive at the decision made in this document.*\n\n### Key\n*Optional: Provide visual aids to stakeholders which can help to quickly spot the positive and the negative trade-offs - for example simple traffic-light highlights with positive or negative prefixes.*\n\nA <span style=\"background-color:#4bce97; color:black;\">green<\/span> background indicates a good fit, worsening through <span style=\"background-color:#f1c232; color:black;\">amber<\/span>, with <span style=\"background-color:#e06666; color:black;\">red<\/span> being the worst fit. \\\n\\+ indicates a positive impacting comment \\\n\\- indicates a negative impacting comment\n\n### High-Level Overview\n*How well does each option fit the problem context at a glance?*\n\n<table>\n  <thead>\n    <tr>\n      <th>Summary<\/th>\n      <th>Option 1<\/th>\n      <th>Option 2<\/th>\n      <th>Option 3<\/th>\n    <\/tr>\n  <\/thead>\n  <tbody>\n    <tr>\n      <td><i>Ease of Implementation<\/i><\/td>\n      <td>\n        <span style=\"background-color:#4bce97; color:black; padding-right:5px\">\n          + Super easy\n        <\/span>\n      <\/td>\n      <td>\n        <span style=\"background-color:#f1c232; color:black; padding-right:5px\">\n            - Tricky\n        <\/span>\n      <\/td>\n      <td>\n        <span style=\"background-color:#e06666; color:black; padding-right:5px\">\n            - Large implementation requiring expert knowledge\n        <\/span>\n      <\/td>\n    <\/tr>\n    <tr>\n      <td><i>Timescales<\/i><\/td>\n      <td>\n        <span style=\"background-color:#4bce97; color:black; padding-right:5px\">\n            + Very quick\n        <\/span>\n      <\/td>\n       <td>\n        <span style=\"background-color:#f1c232; color:black; padding-right:5px\">\n            - Fairly slow\n        <\/span>\n      <\/td>\n      <td>\n        <span style=\"background-color:#e06666; color:black; padding-right:5px\">\n            - Very slow\n        <\/span>\n      <\/td>\n    <\/tr>\n    <tr>\n      <td><i>Strategic Value<\/i><\/td>\n      <td>\n        <span style=\"background-color:#e06666; color:black; padding-right:5px\">\n            - No strategic value, purely tactical\n        <\/span>\n      <\/td>\n       <td>\n        <span style=\"background-color:#f1c232; color:black; padding-right:5px\">\n            + Slightly improves the customer onboarding experience\n        <\/span>\n      <\/td>\n      <td>\n        <span style=\"background-color:#4bce97; color:black; padding-right:5px\">\n            + Ideal for the upcoming merger\n        <\/span>\n      <\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>\n\n### Functional Requirements\n*How well does each potential option fit the desired functional requirements?*\n\n<table>\n  <thead>\n    <tr>\n      <th>Scenario<\/th>\n      <th><i>Option 1<\/i><\/th>\n      <th><i>Option 2<\/i><\/th>\n      <th><i>Option 3<\/i><\/th>\n    <\/tr>\n  <\/thead>\n  <tbody>\n    <tr>\n      <td><i>Scenario 1<\/i><\/td>\n      <td><\/td>\n      <td><\/td>\n      <td><\/td>\n    <\/tr>\n    <tr>\n      <td><i>Scenario 2<\/i><\/td>\n      <td><\/td>\n      <td><\/td>\n      <td><\/td>\n    <\/tr>\n    <tr>\n      <td><i>Scenario 3<\/i><\/td>\n      <td><\/td>\n      <td><\/td>\n      <td><\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>\n\n*Optional: Add rows / another table to cover known future scenarios.*\n\n### Non-Functional Requirements\n*How well does each potential option fit the desired architecture characteristics?\nNote: ‘Architecture Characteristics’ would be a more appropriate title, but tailor this to familiar language for your business domain.*\n\n<table>\n  <thead>\n    <tr>\n      <th>Architecture <\/br> Characteristic<\/th>\n      <th><i>Option 1<\/i><\/th>\n      <th><i>Option 2<\/i><\/th>\n      <th><i>Option 3<\/i><\/th>\n    <\/tr>\n  <\/thead>\n  <tbody>\n    <tr>\n      <td><i>Scalability<\/i><\/td>\n      <td><\/td>\n      <td><\/td>\n      <td><\/td>\n    <\/tr>\n    <tr>\n      <td><i>Performance<\/i><\/td>\n      <td><\/td>\n      <td><\/td>\n      <td><\/td>\n    <\/tr>\n    <tr>\n      <td><i>Availability<\/i><\/td>\n      <td><\/td>\n      <td><\/td>\n      <td><\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>\n\n*Optional: Add in or link to definitions of the architecture characteristics as they pertain to your business / product.*"}]}</script>
<script>
    (function () {
        const data = JSON.parse(document.getElementById('data').textContent);
        const root = document.getElementById('content');

        const tagsHost = document.getElementById('tags');
        (data.tags || []).forEach(function (t) {
            const span = document.createElement('span');
            span.className = 'tag';
            span.textContent = t;
            tagsHost.appendChild(span);
        });

        // Minimal markdown renderer. Supports: ATX headings, paragraphs, blockquotes,
        // unordered/ordered lists, fenced code, inline code, bold/italic, links, images, hr.
        // Sufficient for the posts in this repo; replace with a fuller parser if needed.
        function renderMarkdown(src) {
            const lines = src.replace(/\r\n/g, '\n').split('\n');
            const out = [];
            let i = 0;

            const bullet = /^(\s*)([-*])\s+(.*)$/;
            const ordered = /^(\s*)(\d+)\.\s+(.*)$/;

            function inline(s) {
                // Posts are trusted content, so raw HTML passes through unescaped
                // (some posts embed inline <blockquote>, <div>, etc.).
                // Stray ampersands still get fixed up.
                s = s.replace(/&(?![a-zA-Z]+;|#\d+;)/g, '&amp;');
                s = s.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img alt="$1" src="$2">');
                s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
                s = s.replace(/`([^`]+)`/g, function (_, c) {
                    return '<code>' + c.replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</code>';
                });
                s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
                s = s.replace(/(^|[^*])\*([^*\n]+)\*/g, '$1<em>$2</em>');
                return s;
            }

            while (i < lines.length) {
                const line = lines[i];
                if (!line.trim()) {
                    i++;
                    continue;
                }

                const fence = line.match(/^```(\w*)\s*$/);
                if (fence) {
                    i++;
                    const buf = [];
                    while (i < lines.length && !/^```\s*$/.test(lines[i])) {
                        buf.push(lines[i]);
                        i++;
                    }
                    i++;
                    const escaped = buf.join('\n').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                    const cls = fence[1] ? ' class="lang-' + fence[1] + '"' : '';
                    out.push('<pre><code' + cls + '>' + escaped + '</code></pre>');
                    continue;
                }

                const h = line.match(/^(#{1,6})\s+(.*)$/);
                if (h) {
                    out.push('<h' + h[1].length + '>' + inline(h[2]) + '</h' + h[1].length + '>');
                    i++;
                    continue;
                }

                if (/^\s*(?:-\s*){3,}\s*$/.test(line) || /^\s*\*{3,}\s*$/.test(line)) {
                    out.push('<hr>');
                    i++;
                    continue;
                }

                if (/^>\s?/.test(line)) {
                    const buf = [];
                    while (i < lines.length && /^>\s?/.test(lines[i])) {
                        buf.push(lines[i].replace(/^>\s?/, ''));
                        i++;
                    }
                    out.push('<blockquote>' + renderMarkdown(buf.join('\n')) + '</blockquote>');
                    continue;
                }

                if (bullet.test(line) || ordered.test(line)) {
                    const isOrdered = ordered.test(line);
                    const re = isOrdered ? ordered : bullet;
                    const items = [];
                    while (i < lines.length && re.test(lines[i])) {
                        const m = lines[i].match(re);
                        let item = m[3];
                        i++;
                        while (i < lines.length && lines[i].trim() && !bullet.test(lines[i]) && !ordered.test(lines[i])) {
                            item += '\n' + lines[i].trim();
                            i++;
                        }
                        items.push('<li>' + inline(item) + '</li>');
                    }
                    out.push((isOrdered ? '<ol>' : '<ul>') + items.join('') + (isOrdered ? '</ol>' : '</ul>'));
                    continue;
                }

                const buf = [line];
                i++;
                while (i < lines.length && lines[i].trim() && !/^#{1,6}\s/.test(lines[i]) && !/^>\s?/.test(lines[i]) && !bullet.test(lines[i]) && !ordered.test(lines[i]) && !/^```/.test(lines[i])) {
                    buf.push(lines[i]);
                    i++;
                }
                out.push('<p>' + inline(buf.join(' ')) + '</p>');
            }
            return out.join('\n');
        }

        // Block dispatcher. New block types plug in here.
        const renderers = {
            markdown: function (block) {
                const div = document.createElement('div');
                div.innerHTML = renderMarkdown(block.content);
                return div;
            },
            mermaid: function (block) {
                // Mermaid scans elements with class "mermaid" whose textContent
                // is the diagram source. We collect these nodes and run
                // mermaid.run() once after all blocks are in the DOM.
                const div = document.createElement('div');
                div.className = 'mermaid';
                div.textContent = block.content;
                return div;
            },
            'force-graph': function (block) {
                // build.py emits parsed JSON: {nodes:[{id,size}], links:[{source,target}]}.
                // We instantiate force-graph after the container is in the DOM
                // so it can measure its own width.
                const div = document.createElement('div');
                div.className = 'force-graph';
                const data = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.ForceGraph) return;
                    const maxSize = data.nodes.reduce((m, n) => Math.max(m, n.size || 1), 1);
                    window.ForceGraph()(div)
                        .graphData(data)
                        .width(div.clientWidth)
                        .height(div.clientHeight)
                        .nodeRelSize(4)
                        .nodeVal(n => Math.max(20 * (n.size || 1) / maxSize, 0.001))
                        .nodeLabel(n => n.id + ' (' + (n.size || 1) + ')')
                        .nodeColor(() => 'rgba(135, 206, 235, 0.7)')
                        .linkColor(() => 'rgba(60, 60, 60, 0.4)')
                        .linkDirectionalArrowLength(4)
                        .linkDirectionalArrowRelPos(1)
                        .linkWidth(1);
                });
                return div;
            },
            'bubble-chart': function (block) {
                // build.py emits {nodes:[{name,size}]}. Renders a D3 circle-pack
                // SVG (same shape as the obren.io reference, just inline).
                const wrap = document.createElement('div');
                wrap.className = 'bubble-chart';
                const payload = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.d3) return;
                    const diameter = 480;
                    const fill = '#c0deed';
                    const textColor = '#111111';
                    const fontSize = 12;

                    const svg = window.d3.select(wrap).append('svg')
                        .attr('viewBox', '0 0 ' + diameter + ' ' + diameter)
                        .attr('width', diameter)
                        .attr('height', diameter);

                    const root = window.d3.hierarchy({children: payload.nodes})
                        .sum(d => d.size || 0)
                        .sort((a, b) => b.value - a.value);

                    window.d3.pack().size([diameter, diameter]).padding(2)(root);

                    const node = svg.selectAll('g')
                        .data(root.leaves())
                        .enter().append('g')
                        .attr('transform', d => 'translate(' + d.x + ',' + d.y + ')');

                    node.append('title').text(d => d.data.name + ': ' + d.value);
                    node.append('circle').attr('r', d => d.r).style('fill', fill);
                    node.append('text')
                        .attr('dy', '.3em')
                        .style('text-anchor', 'middle')
                        .style('fill', textColor)
                        .style('font-size', fontSize + 'px')
                        .text(d => d.data.name.substring(0, Math.max(0, Math.floor(d.r / 3))));
                });
                return wrap;
            }
        };

        const mermaidNodes = [];
        data.blocks.forEach(function (block) {
            const r = renderers[block.type];
            if (!r) {
                const pre = document.createElement('pre');
                pre.textContent = '[unknown block type: ' + block.type + ']';
                root.appendChild(pre);
                return;
            }
            const node = r(block);
            if (node instanceof Node) {
                root.appendChild(node);
                if (block.type === 'mermaid') mermaidNodes.push(node);
            }
        });

        if (mermaidNodes.length && window.mermaid) {
            window.mermaid.initialize({startOnLoad: false, theme: 'default'});
            window.mermaid.run({nodes: mermaidNodes});
        }
    })();
</script>
