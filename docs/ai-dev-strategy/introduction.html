<script id="data" type="application/json">{"meta": {"title": "Introduction", "date": "2026-05-13 10:40:00 +0100", "author": "by Željko Obrenović (obren.io)", "permalink": "introduction", "timetoread": "5 min", "excerpt": "The AI strategy starts from a difficult reality: three architecture paradigms, three repository ecosystems, and too much operational variation. The goal is to use Claude Code to accelerate modernization toward a simpler AWS-based engineering platform.", "icon": "assets/icons/introduction.png", "logo": "assets/images/introduction/logo.jpeg", "logo_credit": "Image generated by Google Gemini (gemini-3.1-flash-image-preview)"}, "tags": [], "blocks": [{"type": "markdown", "content": "> KEY POINTS:\n> * The AI strategy starts from a difficult reality: three architecture paradigms, three repository ecosystems, and too much operational variation. \n> * The goal is to use Claude Code to accelerate modernization toward a simpler AWS-based engineering platform.\n\n<hr>\n\nThis strategy defines how we use AI in software development. It is not an \"AI adoption\" plan and it is not mainly about helping individual developers type code faster.\n\nThe strategy exists because the engineering landscape is already complex, and modernization will add even more work before it makes things simpler. AI should help us move through that transition faster, with better understanding, stronger tests, more consistent standards, and clearer governance.\n\n## Current Context\n\nWe operate three different architecture paradigms at the same time.\n\n### 1. Monolithic web application\n\nThe oldest part of the landscape is a .NET/C# monolithic web application backed by MS SQL Server. A significant amount of business logic lives in stored procedures, not only in application code. The code is hosted in a self-managed TFS environment.\n\nThis estate carries high modernization value because it likely contains core business rules. It also carries high risk: hidden behavior, weak test coverage, database coupling, and old delivery workflows make large rewrites unsafe.\n\n### 2. Legacy microservices architecture\n\nThe second part is a Java-based microservices landscape using self-managed Kafka. The code is hosted in GitLab.\n\nThis estate is closer to the target architecture in shape, but not necessarily in operating model. Service patterns may vary, Kafka ownership may be inconsistent, and running Kafka ourselves creates operational responsibility that should not be spread across product teams.\n\n### 3. Newer serverless architecture\n\nThe newest part is a Node.js-based serverless stack hosted in GitHub.\n\nThis estate is more modern and generic, but it has become overly complex in workflow and operations. Serverless functions, event flows, deployment pipelines, permissions, and handoffs can become difficult to understand and expensive to operate when the architecture grows without enough standardization.\n\n## The Problem\n\nThe technology problem is not that we lack AI tools. The problem is that we are modernizing from a fragmented baseline:\n\n* different architecture paradigms\n* different programming languages\n* different repository platforms\n* different delivery workflows\n* different operational models\n* inconsistent standards across services and teams\n* hidden business rules in legacy code and stored procedures\n* limited shared understanding of dependencies and migration risk\n\nIf we apply AI casually to this environment, we will accelerate inconsistency. Teams will generate more code inside already-complex systems, invent new patterns, and make modernization harder to govern.\n\nThe AI strategy must do the opposite. It must make the target direction easier to follow than the legacy habits.\n\n## Strategic Direction\n\nThe strategic direction is to gradually rebuild and modernize the landscape on AWS.\n\nThe target architecture should be simpler than the current mix:\n\n* microservices organized around clear business capabilities\n* containerized workloads running on Amazon ECS\n* Kafka as the main messaging infrastructure\n* managed Kafka operations through AWS patterns, preferably Amazon MSK\n* standardized CI/CD\n* standardized observability\n* consistent security and secrets handling\n* clear repository ownership and service metadata\n* engineering practices that work across GitHub, GitLab, and migration paths out of TFS\n\nThe modernization approach should be incremental. The legacy monolith should be understood, tested, wrapped, extracted, and retired progressively. Existing Java services should be standardized and moved toward the target operating model. The Node.js serverless estate should be simplified, with some capabilities staying serverless and others moving to ECS where a service model is clearer.\n\n## Role of AI\n\nAI should be treated as a modernization accelerator, not as a separate technology program.\n\nIts role is to help engineers:\n\n* understand legacy modules, stored procedures, services, events, and workflows\n* generate characterization tests before risky changes\n* document current state and migration options\n* identify extraction candidates and service boundaries\n* generate scaffolding from approved templates\n* improve consistency in CI/CD, observability, and repository structure\n* review pull requests against target standards\n* answer questions from a curated engineering knowledge base\n\nClaude Code is the recommended default developer tool because it can operate across repositories, read code, run commands, use MCP servers, apply Skills, follow `CLAUDE.md`, and run repeatable subagent workflows. That combination matters more than generic code completion.\n\n## Goals\n\nThe AI strategy has six goals.\n\n### 1. Accelerate modernization safely\n\nUse AI to reduce the time needed to understand, test, document, wrap, extract, and migrate legacy capabilities. Speed matters only when changes remain reviewable, tested, and reversible.\n\n### 2. Reduce complexity\n\nUse AI to expose unnecessary complexity, not hide it. The strategy should help teams simplify serverless workflows, standardize service patterns, reduce custom pipelines, and avoid adding more architectural variation.\n\n### 3. Improve developer productivity\n\nUse AI to remove repetitive work from engineers: boilerplate, first-pass documentation, dependency exploration, test scaffolding, PR summaries, and standards lookup. The productivity gain should come from better flow and less cognitive load, not from bypassing engineering discipline.\n\n### 4. Ensure consistency across platforms\n\nUse a shared Claude Code setup, common `CLAUDE.md` guidance, approved Skills, subagents, MCP servers, templates, and hooks so teams get the same modernization guidance across TFS migration work, GitLab Java services, and GitHub Node.js repositories.\n\n### 5. Govern AI-generated work\n\nAI-generated output must go through normal engineering controls: human review, tests, security checks, license checks, architecture review where needed, and production approval. AI may propose and generate; humans remain accountable.\n\n### 6. Build reusable modernization capabilities\n\nInvest in reusable workflows rather than one-off prompts. A stored procedure summarizer, Kafka contract reviewer, service scorecard builder, ECS template generator, and PR review helper should become shared platform assets that improve over time.\n\n## Success Criteria\n\nThe strategy is working when:\n\n* engineers understand legacy components faster\n* critical legacy flows gain characterization tests before change\n* modernization candidates have clear documentation and ADRs\n* new services start from approved ECS and observability templates\n* Kafka contracts become easier to review and govern\n* serverless workflows become simpler, not more elaborate\n* repository and service standards are applied consistently\n* PR review catches standards drift earlier\n* AI usage has traceability, governance, and human accountability\n\n## The Framing\n\nThe AI strategy should not be:\n\n> ~~Let developers use AI tools to code faster.~~\n\nIt should be:\n\n> Use Claude Code as the default developer environment to make modernization repeatable, safe, and faster by combining legacy understanding, automated testing, platform standards, reusable workflows, and governed engineering controls.\n\nThat framing connects AI directly to the real technology challenge: moving from a fragmented legacy landscape to a simpler, consistent, AWS-based engineering platform.\n"}]}</script>
<script>
    (function () {
        const data = JSON.parse(document.getElementById('data').textContent);
        const root = document.getElementById('content');

        const tagsHost = document.getElementById('tags');
        (data.tags || []).forEach(function (t) {
            const span = document.createElement('span');
            span.className = 'tag';
            span.textContent = t;
            tagsHost.appendChild(span);
        });

        // Minimal markdown renderer. Supports: ATX headings, paragraphs, blockquotes,
        // unordered/ordered lists, fenced code, inline code, bold/italic, links, images, hr.
        // Sufficient for the posts in this repo; replace with a fuller parser if needed.
        function renderMarkdown(src) {
            const lines = src.replace(/\r\n/g, '\n').split('\n');
            const out = [];
            let i = 0;

            const bullet = /^(\s*)([-*])\s+(.*)$/;
            const ordered = /^(\s*)(\d+)\.\s+(.*)$/;
            const tableRow = /^\s*\|(.+)\|\s*$/;
            const tableSep = /^\s*\|?\s*:?-{3,}:?\s*(\|\s*:?-{3,}:?\s*)+\|?\s*$/;

            function splitRow(s) {
                let t = s.trim();
                if (t.startsWith('|')) t = t.slice(1);
                if (t.endsWith('|')) t = t.slice(0, -1);
                return t.split('|').map(c => c.trim());
            }

            function inline(s) {
                // Posts are trusted content, so raw HTML passes through unescaped
                // (some posts embed inline <blockquote>, <div>, etc.).
                // Stray ampersands still get fixed up.
                s = s.replace(/&(?![a-zA-Z]+;|#\d+;)/g, '&amp;');
                s = s.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img alt="$1" src="$2">');
                s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
                s = s.replace(/`([^`]+)`/g, function (_, c) {
                    return '<code>' + c.replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</code>';
                });
                s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
                s = s.replace(/(^|[^*])\*([^*\n]+)\*/g, '$1<em>$2</em>');
                return s;
            }

            while (i < lines.length) {
                const line = lines[i];
                if (!line.trim()) {
                    i++;
                    continue;
                }

                const fence = line.match(/^```(\w*)\s*$/);
                if (fence) {
                    i++;
                    const buf = [];
                    while (i < lines.length && !/^```\s*$/.test(lines[i])) {
                        buf.push(lines[i]);
                        i++;
                    }
                    i++;
                    const escaped = buf.join('\n').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                    const cls = fence[1] ? ' class="lang-' + fence[1] + '"' : '';
                    out.push('<pre><code' + cls + '>' + escaped + '</code></pre>');
                    continue;
                }

                const h = line.match(/^(#{1,6})\s+(.*)$/);
                if (h) {
                    out.push('<h' + h[1].length + '>' + inline(h[2]) + '</h' + h[1].length + '>');
                    i++;
                    continue;
                }

                if (/^\s*(?:-\s*){3,}\s*$/.test(line) || /^\s*\*{3,}\s*$/.test(line)) {
                    out.push('<hr>');
                    i++;
                    continue;
                }

                if (/^>\s?/.test(line)) {
                    const buf = [];
                    while (i < lines.length && /^>\s?/.test(lines[i])) {
                        buf.push(lines[i].replace(/^>\s?/, ''));
                        i++;
                    }
                    out.push('<blockquote>' + renderMarkdown(buf.join('\n')) + '</blockquote>');
                    continue;
                }

                if (tableRow.test(line) && i + 1 < lines.length && tableSep.test(lines[i + 1])) {
                    const headers = splitRow(line);
                    i += 2;
                    const rows = [];
                    while (i < lines.length && tableRow.test(lines[i])) {
                        rows.push(splitRow(lines[i]));
                        i++;
                    }
                    let html = '<table><thead><tr>';
                    headers.forEach(h => { html += '<th>' + inline(h) + '</th>'; });
                    html += '</tr></thead><tbody>';
                    rows.forEach(r => {
                        html += '<tr>';
                        r.forEach(c => { html += '<td>' + inline(c) + '</td>'; });
                        html += '</tr>';
                    });
                    html += '</tbody></table>';
                    out.push(html);
                    continue;
                }

                if (bullet.test(line) || ordered.test(line)) {
                    const isOrdered = ordered.test(line);
                    const re = isOrdered ? ordered : bullet;
                    const items = [];
                    while (i < lines.length && re.test(lines[i])) {
                        const m = lines[i].match(re);
                        let item = m[3];
                        i++;
                        while (i < lines.length && lines[i].trim() && !bullet.test(lines[i]) && !ordered.test(lines[i])) {
                            item += '\n' + lines[i].trim();
                            i++;
                        }
                        items.push('<li>' + inline(item) + '</li>');
                    }
                    out.push((isOrdered ? '<ol>' : '<ul>') + items.join('') + (isOrdered ? '</ol>' : '</ul>'));
                    continue;
                }

                const buf = [line];
                i++;
                while (i < lines.length && lines[i].trim() && !/^#{1,6}\s/.test(lines[i]) && !/^>\s?/.test(lines[i]) && !bullet.test(lines[i]) && !ordered.test(lines[i]) && !/^```/.test(lines[i]) && !tableRow.test(lines[i])) {
                    buf.push(lines[i]);
                    i++;
                }
                out.push('<p>' + inline(buf.join(' ')) + '</p>');
            }
            return out.join('\n');
        }

        // Block dispatcher. New block types plug in here.
        const renderers = {
            markdown: function (block) {
                const div = document.createElement('div');
                div.innerHTML = renderMarkdown(block.content);
                return div;
            },
            mermaid: function (block) {
                // Mermaid scans elements with class "mermaid" whose textContent
                // is the diagram source. We collect these nodes and run
                // mermaid.run() once after all blocks are in the DOM.
                const div = document.createElement('div');
                div.className = 'mermaid';
                div.textContent = block.content;
                return div;
            },
            'force-graph': function (block) {
                // build.py emits parsed JSON: {nodes:[{id,size}], links:[{source,target}]}.
                // We instantiate force-graph after the container is in the DOM
                // so it can measure its own width.
                const div = document.createElement('div');
                div.className = 'force-graph';
                const data = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.ForceGraph) return;
                    const maxSize = data.nodes.reduce((m, n) => Math.max(m, n.size || 1), 1);
                    window.ForceGraph()(div)
                        .graphData(data)
                        .width(div.clientWidth)
                        .height(div.clientHeight)
                        .nodeRelSize(4)
                        .nodeVal(n => Math.max(20 * (n.size || 1) / maxSize, 0.001))
                        .nodeLabel(n => n.id + ' (' + (n.size || 1) + ')')
                        .nodeColor(() => 'rgba(135, 206, 235, 0.7)')
                        .linkColor(() => 'rgba(60, 60, 60, 0.4)')
                        .linkDirectionalArrowLength(4)
                        .linkDirectionalArrowRelPos(1)
                        .linkWidth(1);
                });
                return div;
            },
            'bubble-chart': function (block) {
                // build.py emits {nodes:[{name,size}]}. Renders a D3 circle-pack
                // SVG (same shape as the obren.io reference, just inline).
                const wrap = document.createElement('div');
                wrap.className = 'bubble-chart';
                const payload = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.d3) return;
                    const diameter = 480;
                    const fill = '#c0deed';
                    const textColor = '#111111';
                    const fontSize = 12;

                    const svg = window.d3.select(wrap).append('svg')
                        .attr('viewBox', '0 0 ' + diameter + ' ' + diameter)
                        .attr('width', diameter)
                        .attr('height', diameter);

                    const root = window.d3.hierarchy({children: payload.nodes})
                        .sum(d => d.size || 0)
                        .sort((a, b) => b.value - a.value);

                    window.d3.pack().size([diameter, diameter]).padding(2)(root);

                    const node = svg.selectAll('g')
                        .data(root.leaves())
                        .enter().append('g')
                        .attr('transform', d => 'translate(' + d.x + ',' + d.y + ')');

                    node.append('title').text(d => d.data.name + ': ' + d.value);
                    node.append('circle').attr('r', d => d.r).style('fill', fill);
                    node.append('text')
                        .attr('dy', '.3em')
                        .style('text-anchor', 'middle')
                        .style('fill', textColor)
                        .style('font-size', fontSize + 'px')
                        .text(d => d.data.name.substring(0, Math.max(0, Math.floor(d.r / 3))));
                });
                return wrap;
            }
        };

        const mermaidNodes = [];
        data.blocks.forEach(function (block) {
            const r = renderers[block.type];
            if (!r) {
                const pre = document.createElement('pre');
                pre.textContent = '[unknown block type: ' + block.type + ']';
                root.appendChild(pre);
                return;
            }
            const node = r(block);
            if (node instanceof Node) {
                root.appendChild(node);
                if (block.type === 'mermaid') mermaidNodes.push(node);
            }
        });

        if (mermaidNodes.length && window.mermaid) {
            window.mermaid.initialize({startOnLoad: false, theme: 'default'});
            window.mermaid.run({nodes: mermaidNodes});
        }
    })();
</script>
