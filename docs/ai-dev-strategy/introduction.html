<script id="data" type="application/json">{"meta": {"title": "Introduction", "date": "2026-05-13 10:40:00 +0100", "author": "by Željko Obrenović (obren.io)", "permalink": "introduction", "timetoread": "6 min", "excerpt": "The AI development strategy is a modernization strategy first and a tooling strategy second. It uses agentic coding as a governed way to understand legacy systems, generate tests, apply standards, and move a fragmented estate toward a simpler AWS, ECS, and Kafka-based engineering model.", "icon": "assets/icons/introduction.png", "logo": "assets/images/introduction/logo.jpeg", "logo_credit": "Image generated by Google Gemini (gemini-3.1-flash-image-preview)"}, "tags": [], "blocks": [{"type": "markdown", "content": "> KEY POINTS:\n> * This is a modernization strategy first and an AI tooling strategy second.\n> * The goal is to make modernization **repeatable, safe, and faster**, not to maximize AI activity or generated code.\n> * Agentic coding matters because it can turn legacy understanding, tests, standards, and governance into repeatable engineering workflows.\n\n<hr>\n\n## Why This Strategy Exists\n\nThe AI strategy should not be:\n\n> ~~Let developers use AI tools to code faster.~~\n\nIt should be:\n\n> Use AI to make modernization **repeatable, safe, and faster** by combining legacy understanding, automated testing, platform standards, reusable workflows, and governed engineering controls.\n\nThat distinction is the whole point. This is not an \"AI adoption\" plan, and it is not mainly about helping individual developers type code faster. It defines how to use AI in software development during modernization, where the real challenge is architectural fragmentation, hidden business logic, inconsistent delivery models, and the need to move safely toward a simpler target engineering model.\n\nModernization will add work before it removes work. Teams need to understand old behavior, create tests where few exist, standardize service patterns, migrate repositories and pipelines, simplify operations, and keep delivery moving. AI should help with that transition by improving understanding, increasing test coverage, applying standards consistently, and making governance easier to execute.\n\nIf AI is applied casually to a fragmented estate, it will accelerate inconsistency. Teams will generate more code inside already-complex systems, invent new local patterns, and make modernization harder to govern. The strategy must do the opposite: make the target direction easier to follow than the legacy habits.\n\n## What This Strategy Decides\n\nThis strategy makes one central decision: **use AI-assisted development to accelerate modernization toward a simpler target engineering model**.\n\nThe target is an AWS-based landscape built around clear microservices, ECS-hosted container workloads, Kafka as the main messaging backbone, standard CI/CD, standard observability, and consistent engineering controls.\n\nThe strategy also makes one implementation decision: **Claude Code is the default AI developer tool for 2026**. That default is not a statement that no other tool can do useful work. It is a decision to concentrate enablement investment in one governed surface: repository instructions, Skills, MCP servers, subagents, hooks, settings, templates, and audit controls. The tool default is reviewed every six months.\n\nThe expected outcome is not \"more AI usage.\" The expected outcome is **faster, safer modernization with less architectural variation**.\n\n## Current Reality in Brief\n\nThe current estate has three architecture paradigms side by side:\n\n| Estate | Main issue |\n| --- | --- |\n| **.NET/C# monolith with SQL Server and TFS** | High modernization value, high risk, hidden behavior in code and stored procedures |\n| **Java microservices with self-managed Kafka and GitLab** | Closer to the target shape, but inconsistent in operating model and ownership |\n| **Node.js serverless stack with GitHub** | Modern but operationally complex when workflows, permissions, and event flows grow without enough standardization |\n\nThe detailed current-state framing is in [Current State and Problem](current-state-and-problem.html). The important point for the introduction is this: the problem is not a lack of AI tools. The problem is modernization from a fragmented baseline.\n\n## Strategic Response\n\nThe strategic direction is to gradually rebuild and modernize the landscape on AWS. The target architecture should be simpler than the current mix:\n\n* microservices organized around clear business capabilities\n* containerized workloads running on Amazon ECS\n* Kafka as the main messaging infrastructure\n* managed Kafka operations through AWS patterns, preferably Amazon MSK\n* standardized CI/CD\n* standardized observability\n* consistent security and secrets handling\n* clear repository ownership and service metadata\n* engineering practices that work across GitHub, GitLab, and migration paths out of TFS\n\nThe modernization approach should be incremental. The legacy monolith should be understood, tested, wrapped, extracted, and retired progressively. Existing Java services should be standardized and moved toward the target operating model. The Node.js serverless estate should be simplified, with some capabilities staying serverless and others moving to ECS where a service model is clearer.\n\nAI should be treated as a **modernization accelerator**, not as a separate technology program or a local productivity experiment.\n\nIts role is to help engineers:\n\n* understand legacy modules, stored procedures, services, events, and workflows\n* generate characterization tests before risky changes\n* document current state and produce modernization dossiers\n* generate scaffolding from approved templates and review PRs against target standards\n* answer questions from a curated engineering knowledge base\n\n## What AI Changes\n\nMost engineers have seen generative AI used in two familiar ways:\n\n* **chat**: ask a question, get an explanation or draft;\n* **autocomplete**: type code, get inline suggestions.\n\nAgentic coding is different. An agentic coding tool such as Claude Code or Codex can run a **multi-step engineering loop**:\n\n1. read files in a repository;\n2. inspect tests, build files, logs, schemas, or tickets;\n3. decide what information is missing;\n4. call approved tools or MCP servers to get current state;\n5. propose a plan;\n6. edit files in a branch;\n7. run commands or tests;\n8. revise its work based on failures;\n9. produce a reviewable artifact such as a PR, ADR, test pack, or modernization dossier.\n\nThat loop is powerful, but it is not magic. It behaves well only when the organization gives it **good context**, **safe tools**, **clear boundaries**, and **human review**.\n\nThis strategy therefore treats agentic coding as an **engineering system**, not as a clever prompt. The useful unit is not \"a prompt that works once.\" The useful unit is a reusable workflow: repository context, a Skill, an MCP server, a subagent, a template, a hook, and a review rule that together make the same work repeatable across teams.\n\nIf you understand CI pipelines, service templates, API contracts, and platform golden paths, these concepts should feel familiar. Agentic coding adds a new developer surface, but the governance model is still ordinary engineering discipline.\n\n## Scope\n\nThe strategy covers **AI in software development for modernization**. It is explicitly **not**:\n\n* an AI adoption plan for non-development functions such as support, marketing, or analytics\n* a model procurement strategy or commercial contract framework\n* a plan for autonomous production operations\n* a substitute for normal architecture, security, or change management\n\n## Who This Is For\n\n| Audience | Decision asked of them |\n| --- | --- |\n| **Executive sponsor** | Endorse the AI-as-modernization-accelerator framing; fund the enablement function for the first year |\n| **Engineering leadership** | Approve Claude Code as the 2026 default and the six-month review cadence |\n| **Platform engineering** | Build the enablement stack: `CLAUDE.md` baseline, Skills, MCP, subagents, hooks, templates, registries |\n| **Security, Legal, Procurement** | Approve the AI policy: data classification, vendor terms, IP, audit, incident handling |\n| **Architecture** | Own service boundaries, event semantics, target-state exceptions, and the major decision records |\n| **Service team leads** | Adopt the standards in their estate (.NET, Java, or Node) through the pilots and rollout gates |\n\n## Goals and Success Criteria\n\nThe AI strategy has six goals.\n\n| Goal | Success measure |\n| --- | --- |\n| **Accelerate modernization safely** | Time from candidate identification to reviewed modernization dossier drops by 30%; risky flows gain characterization tests before extraction |\n| **Reduce complexity** | Distinct deployment patterns, custom CI workflows, and special-case serverless orchestrations decrease quarter over quarter |\n| **Improve developer productivity** | Time to understand a legacy module, produce first tests, or create an approved service scaffold drops in measured pilots |\n| **Ensure consistency across platforms** | Strategic repositories have current `CLAUDE.md`, standard build/test commands, ownership metadata, and service catalog entries |\n| **Govern AI-generated work** | AI-assisted PRs include traceability, reviewed outputs, tests, and evidence references |\n| **Build reusable modernization capability** | Shared Skills, MCP servers, subagents, templates, and hooks have owners, review dates, usage metrics, and deprecation paths |\n\nAvoid vanity measures such as prompt count, generated lines of code, or number of AI users unless they are paired with modernization outcomes.\n\n## Where To Go Next\n\nThe strategy is one document but different readers need different paths.\n\n| Audience | Read first | Then |\n| --- | --- | --- |\n| Executive sponsor | Introduction, Tooling Decision | Roadmap, Risks |\n| Engineering leadership | Current State and Problem, Strategic Principles | Target Engineering Model, Operating Model |\n| Platform | Claude Code Enablement, Engineering Standards | Use-Case Portfolio, Strategy by Landscape |\n| Security & Legal | AI Policy, Risks | Enablement controls and registries |\n| Architecture | Current State and Problem, Strategic Principles | Strategy by Landscape, Engineering Standards |\n| Service team lead | Strategy by Landscape for their estate | Use-Case Portfolio, Operating Model |\n\nThe next chapter expands the current-state problem and the baseline that must be collected before rollout can prove progress.\n"}]}</script>
<script>
    (function () {
        const data = JSON.parse(document.getElementById('data').textContent);
        const root = document.getElementById('content');

        const postId = (data.meta && data.meta.id) ? String(data.meta.id) : '';
        const postStatusRaw = (data.meta && data.meta.status) ? String(data.meta.status) : '';
        if (postId || postStatusRaw) {
            const header = document.getElementById('post-header');
            let sectionEl = header.querySelector('p.section');
            if (!sectionEl) {
                sectionEl = document.createElement('p');
                sectionEl.className = 'section';
                header.insertBefore(sectionEl, header.firstChild);
            }
            // Status pill goes first, then a " / " separator before the existing
            // content (section name and/or id).
            if (postStatusRaw) {
                const parts = postStatusRaw.split(':');
                const statusName = parts[0].trim();
                const statusColor = (parts[1] || '').trim();
                const wrap = document.createElement('span');
                wrap.className = 'post-status';
                const dot = document.createElement('span');
                dot.className = 'status-dot';
                if (statusColor) dot.style.background = statusColor;
                wrap.appendChild(dot);
                wrap.appendChild(document.createTextNode(statusName));
                if (sectionEl.firstChild) {
                    sectionEl.insertBefore(document.createTextNode(' • '), sectionEl.firstChild);
                    sectionEl.insertBefore(wrap, sectionEl.firstChild);
                } else {
                    sectionEl.appendChild(wrap);
                }
            }
            if (postId) {
                if (sectionEl.firstChild) sectionEl.appendChild(document.createTextNode(' • '));
                sectionEl.appendChild(document.createTextNode(postId));
            }
        }

        const tagsHost = document.getElementById('tags');
        (data.tags || []).forEach(function (t) {
            const span = document.createElement('span');
            span.className = 'tag';
            span.textContent = t;
            tagsHost.appendChild(span);
        });

        // Minimal markdown renderer. Supports: ATX headings, paragraphs, blockquotes,
        // unordered/ordered lists, fenced code, inline code, bold/italic/strikethrough, links, images, hr.
        // Sufficient for the posts in this repo; replace with a fuller parser if needed.
        function renderMarkdown(src) {
            const lines = src.replace(/\r\n/g, '\n').split('\n');
            const out = [];
            let i = 0;

            const bullet = /^(\s*)([-*])\s+(.*)$/;
            const ordered = /^(\s*)(\d+)\.\s+(.*)$/;
            const tableRow = /^\s*\|(.+)\|\s*$/;
            const tableSep = /^\s*\|?\s*:?-{3,}:?\s*(\|\s*:?-{3,}:?\s*)+\|?\s*$/;

            function splitRow(s) {
                let t = s.trim();
                if (t.startsWith('|')) t = t.slice(1);
                if (t.endsWith('|')) t = t.slice(0, -1);
                return t.split('|').map(c => c.trim());
            }

            function inline(s) {
                // Posts are trusted content, so raw HTML passes through unescaped
                // (some posts embed inline <blockquote>, <div>, etc.).
                // Stray ampersands still get fixed up.
                s = s.replace(/&(?![a-zA-Z]+;|#\d+;)/g, '&amp;');
                s = s.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<a class="image-link" href="$2" target="_blank" rel="noopener noreferrer"><img alt="$1" src="$2"></a>');
                s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
                s = s.replace(/`([^`]+)`/g, function (_, c) {
                    return '<code>' + c.replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</code>';
                });
                s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
                s = s.replace(/~~([^~\n]+)~~/g, '<del>$1</del>');
                s = s.replace(/(^|[^*])\*([^*\n]+)\*/g, '$1<em>$2</em>');
                return s;
            }

            while (i < lines.length) {
                const line = lines[i];
                if (!line.trim()) {
                    i++;
                    continue;
                }

                const fence = line.match(/^```(\w*)\s*$/);
                if (fence) {
                    i++;
                    const buf = [];
                    while (i < lines.length && !/^```\s*$/.test(lines[i])) {
                        buf.push(lines[i]);
                        i++;
                    }
                    i++;
                    const escaped = buf.join('\n').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                    const cls = fence[1] ? ' class="lang-' + fence[1] + '"' : '';
                    out.push('<pre><code' + cls + '>' + escaped + '</code></pre>');
                    continue;
                }

                const h = line.match(/^(#{1,6})\s+(.*)$/);
                if (h) {
                    out.push('<h' + h[1].length + '>' + inline(h[2]) + '</h' + h[1].length + '>');
                    i++;
                    continue;
                }

                if (/^\s*(?:-\s*){3,}\s*$/.test(line) || /^\s*\*{3,}\s*$/.test(line)) {
                    out.push('<hr>');
                    i++;
                    continue;
                }

                if (/^>\s?/.test(line)) {
                    const buf = [];
                    while (i < lines.length && /^>\s?/.test(lines[i])) {
                        buf.push(lines[i].replace(/^>\s?/, ''));
                        i++;
                    }
                    out.push('<blockquote>' + renderMarkdown(buf.join('\n')) + '</blockquote>');
                    continue;
                }

                if (tableRow.test(line) && i + 1 < lines.length && tableSep.test(lines[i + 1])) {
                    const headers = splitRow(line);
                    i += 2;
                    const rows = [];
                    while (i < lines.length && tableRow.test(lines[i])) {
                        rows.push(splitRow(lines[i]));
                        i++;
                    }
                    let html = '<table><thead><tr>';
                    headers.forEach(h => {
                        html += '<th>' + inline(h) + '</th>';
                    });
                    html += '</tr></thead><tbody>';
                    rows.forEach(r => {
                        html += '<tr>';
                        r.forEach(c => {
                            html += '<td>' + inline(c) + '</td>';
                        });
                        html += '</tr>';
                    });
                    html += '</tbody></table>';
                    out.push(html);
                    continue;
                }

                if (bullet.test(line) || ordered.test(line)) {
                    // Indent of the first bullet defines this list's base level.
                    // Deeper-indented bullets become nested lists (rendered by
                    // recursing into renderMarkdown). Same-or-less indent at a
                    // bullet starts a sibling item (or ends the list).
                    const firstMatch = line.match(bullet) || line.match(ordered);
                    const baseIndent = firstMatch[1].length;
                    const isOrdered = ordered.test(line);
                    const items = [];
                    while (i < lines.length) {
                        const cur = lines[i];
                        if (!cur.trim()) {
                            // blank line breaks the list (matches CommonMark-ish behaviour)
                            i++;
                            break;
                        }
                        const mBul = cur.match(bullet);
                        const mOrd = cur.match(ordered);
                        const m = mBul || mOrd;
                        if (!m) break;
                        if (m[1].length < baseIndent) break;
                        if (m[1].length > baseIndent) break; // shouldn't happen at top of loop
                        // Same-type check: switching between -/* and 1. closes the list
                        if (isOrdered !== !!mOrd) break;

                        const itemBuf = [m[3]];
                        const nestedBuf = [];
                        i++;
                        while (i < lines.length) {
                            const nxt = lines[i];
                            if (!nxt.trim()) break;
                            const nBul = nxt.match(bullet);
                            const nOrd = nxt.match(ordered);
                            const nm = nBul || nOrd;
                            if (nm) {
                                if (nm[1].length > baseIndent) {
                                    // nested list line — dedent and stash
                                    nestedBuf.push(nxt.slice(baseIndent + 2));
                                    i++;
                                    continue;
                                }
                                // sibling or end of list
                                break;
                            }
                            // Plain continuation text
                            if (nestedBuf.length) {
                                // continuation inside the nested block
                                nestedBuf.push(nxt.slice(baseIndent + 2));
                            } else {
                                itemBuf.push(nxt.trim());
                            }
                            i++;
                        }

                        let liHtml = inline(itemBuf.join('\n'));
                        if (nestedBuf.length) {
                            liHtml += renderMarkdown(nestedBuf.join('\n'));
                        }
                        items.push('<li>' + liHtml + '</li>');
                    }
                    out.push((isOrdered ? '<ol>' : '<ul>') + items.join('') + (isOrdered ? '</ol>' : '</ul>'));
                    continue;
                }

                const buf = [line];
                i++;
                while (i < lines.length && lines[i].trim() && !/^#{1,6}\s/.test(lines[i]) && !/^>\s?/.test(lines[i]) && !bullet.test(lines[i]) && !ordered.test(lines[i]) && !/^```/.test(lines[i]) && !tableRow.test(lines[i])) {
                    buf.push(lines[i]);
                    i++;
                }
                out.push('<p>' + inline(buf.join(' ')) + '</p>');
            }
            return out.join('\n');
        }

        // Block dispatcher. New block types plug in here.
        const renderers = {
            markdown: function (block) {
                const div = document.createElement('div');
                div.innerHTML = renderMarkdown(block.content);
                return div;
            },
            mermaid: function (block) {
                // Mermaid scans elements with class "mermaid" whose textContent
                // is the diagram source. We collect these nodes and run
                // mermaid.run() once after all blocks are in the DOM.
                const div = document.createElement('div');
                div.className = 'mermaid';
                div.textContent = block.content;
                return div;
            },
            'force-graph': function (block) {
                // build.py emits parsed JSON: {nodes:[{id,size}], links:[{source,target}]}.
                // We instantiate force-graph after the container is in the DOM
                // so it can measure its own width.
                const div = document.createElement('div');
                div.className = 'force-graph';
                const data = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.ForceGraph) return;
                    const maxSize = data.nodes.reduce((m, n) => Math.max(m, n.size || 1), 1);
                    window.ForceGraph()(div)
                        .graphData(data)
                        .width(div.clientWidth)
                        .height(div.clientHeight)
                        .nodeRelSize(4)
                        .nodeVal(n => Math.max(20 * (n.size || 1) / maxSize, 0.001))
                        .nodeLabel(n => n.id + ' (' + (n.size || 1) + ')')
                        .nodeColor(() => 'rgba(135, 206, 235, 0.7)')
                        .linkColor(() => 'rgba(60, 60, 60, 0.4)')
                        .linkDirectionalArrowLength(4)
                        .linkDirectionalArrowRelPos(1)
                        .linkWidth(1);
                });
                return div;
            },
            'bubble-chart': function (block) {
                // build.py emits {nodes:[{name,size}]}. Renders a D3 circle-pack
                // SVG (same shape as the obren.io reference, just inline).
                const wrap = document.createElement('div');
                wrap.className = 'bubble-chart';
                const payload = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.d3) return;
                    const diameter = 480;
                    const fill = '#c0deed';
                    const textColor = '#111111';
                    const fontSize = 12;

                    const svg = window.d3.select(wrap).append('svg')
                        .attr('viewBox', '0 0 ' + diameter + ' ' + diameter)
                        .attr('width', diameter)
                        .attr('height', diameter);

                    const root = window.d3.hierarchy({children: payload.nodes})
                        .sum(d => d.size || 0)
                        .sort((a, b) => b.value - a.value);

                    window.d3.pack().size([diameter, diameter]).padding(2)(root);

                    const node = svg.selectAll('g')
                        .data(root.leaves())
                        .enter().append('g')
                        .attr('transform', d => 'translate(' + d.x + ',' + d.y + ')');

                    node.append('title').text(d => d.data.name + ': ' + d.value);
                    node.append('circle').attr('r', d => d.r).style('fill', fill);
                    node.append('text')
                        .attr('dy', '.3em')
                        .style('text-anchor', 'middle')
                        .style('fill', textColor)
                        .style('font-size', fontSize + 'px')
                        .text(d => d.data.name.substring(0, Math.max(0, Math.floor(d.r / 3))));
                });
                return wrap;
            }
        };

        const mermaidNodes = [];
        data.blocks.forEach(function (block) {
            const r = renderers[block.type];
            if (!r) {
                const pre = document.createElement('pre');
                pre.textContent = '[unknown block type: ' + block.type + ']';
                root.appendChild(pre);
                return;
            }
            const node = r(block);
            if (node instanceof Node) {
                root.appendChild(node);
                if (block.type === 'mermaid') mermaidNodes.push(node);
            }
        });

        if (mermaidNodes.length && window.mermaid) {
            window.mermaid.initialize({startOnLoad: false, theme: 'default'});
            window.mermaid.run({nodes: mermaidNodes});
        }
    })();
</script>
</body>
</html>
