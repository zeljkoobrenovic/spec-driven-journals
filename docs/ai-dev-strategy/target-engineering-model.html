<script id="data" type="application/json">{"meta": {"title": "Target Engineering Model with Claude Code", "date": "2026-05-13 09:55:00 +0100", "author": "by Željko Obrenović (obren.io)", "permalink": "target-engineering-model", "timetoread": "7 min", "excerpt": "A four-layer model with Claude Code as the developer surface: the assistant layer, a modernization factory of subagents and MCP servers, platform engineering with golden paths, and AI governance and quality controls.", "icon": "assets/icons/target-engineering-model.png", "logo": "assets/images/target-engineering-model/logo.jpeg", "logo_credit": "Image generated by Google Gemini (gemini-3.1-flash-image-preview)"}, "tags": [], "blocks": [{"type": "markdown", "content": "> KEY POINTS:\n> * A four-layer model with Claude Code as the developer surface. \n> * The assistant layer, a modernization factory of subagents and MCP servers, platform engineering with golden paths, and AI governance and quality controls.\n\n<hr>\n\nThis post turns the primitives into an operating model. The point is to show where Claude Code sits in the engineering system: not beside the platform, but as one surface through which teams use the platform's standards, templates, knowledge, and controls.\n\nThe recommended model has four layers. Claude Code is the consistent developer surface across all of them.\n\n## Layer 1: Claude Code as the developer surface\n\nClaude Code is the default AI developer tool, used inside the IDE, the terminal, and CI for day-to-day work:\n\n* explain legacy code\n* generate unit and characterization tests\n* suggest refactorings\n* write boilerplate\n* create Dockerfiles and ECS task definitions\n* assist with Kafka producer/consumer code\n* generate migration scaffolding\n* improve documentation\n* support pull request reviews\n* drive multi-step modernization tasks via subagents\n\nThe surface is uniform: every engineer's Claude Code reads the same `CLAUDE.md`, calls the same MCP servers, and has access to the same shared subagents. That uniformity — not the raw model capability — is the strategic property.\n\nOther tools (Amazon Q Developer for AWS-console operations, GitHub Copilot for niche autocomplete cases) are allowed by exception. See [Tooling Decision][td] for the criteria.\n\n## Layer 2: AI-assisted modernization factory\n\nThe modernization factory is the org's library of **subagents** that encode repeatable workflows, composing **MCP servers** (for stable third-party systems) and **Skills** (for our own code and conventions). See [MCP, Skills, and Subagents][mcps] for the implementation detail.\n\n| Modernization task        | Claude Code subagent / MCP                                       | Human role                            |\n| ------------------------- | ---------------------------------------------------------------- | ------------------------------------- |\n| Legacy code understanding | `legacy-explorer` + repo MCP server                              | Validate business meaning             |\n| Stored proc analysis      | `stored-proc-summarizer` + DB-schema MCP server                  | Confirm domain interpretation         |\n| Test creation             | `characterization-test-writer` reads code, generates regression tests | Approve scenarios and edge cases  |\n| Service extraction        | `extraction-planner` proposes seams; produces ADR draft          | Decide service boundaries             |\n| Data migration            | Subagent + DB-schema MCP server walks dependencies                | Own data model and migration plan     |\n| Kafka migration           | `kafka-contract-reviewer` + Schema Registry MCP server            | Approve event semantics and ownership |\n| Containerization          | `ecs-template-generator` + AWS MCP server                         | Validate runtime, security, scaling   |\n| CI/CD standardization     | Subagent generates pipeline from approved template                | Own release governance                |\n| Documentation             | Subagent generates ADRs, API docs, runbooks                       | Review and publish                    |\n\nThis is what \"modernization factory\" means concretely: a versioned, reviewable, distributable set of subagents — not a slide deck of AI use cases.\n\n## Layer 3: Platform engineering with Claude Code-ready golden paths\n\nThe internal developer platform gives Claude Code and engineers the same paved roads. The platform's job is to make the right thing the easy thing — for both.\n\nThe platform should include:\n\n* standard ECS service template (referenced by `ecs-template-generator`)\n* standard Java service template\n* standard Node.js service template\n* optional .NET modernization template\n* Kafka producer/consumer libraries (enforced by `kafka-contract-reviewer`)\n* shared observability package\n* shared security and secrets handling\n* CI/CD templates\n* infrastructure-as-code modules\n* service catalog (exposed via MCP server)\n* architecture decision record templates\n* runbook templates\n* automated quality gates\n* the org-level `CLAUDE.md` distribution mechanism\n* the org's MCP server registry\n\nAmazon ECS supports containerized workloads on AWS; Amazon MSK provides managed Apache Kafka, reducing the need for teams to become Kafka infrastructure specialists. ([Amazon Web Services, Inc.][3])\n\nThe platform team's deliverables now include subagents and MCP servers alongside Helm charts and Terraform modules. Treat them with the same product discipline.\n\n## Layer 4: AI governance and quality controls\n\nGovernance for Claude Code is mostly *configuration*, not policy. The mechanisms:\n\n* **Approved tool allowlist** in the org-level `settings.json` distributed to every engineer\n* **Permission modes** — `default`, `acceptEdits`, `plan` — chosen per workflow class\n* **Hooks** — pre/post tool execution scripts that run security scans, audit logging, secrets checks\n* **MCP server registry** — only registered servers may appear in `settings.json`\n* **Subagent registry** — only reviewed subagents may be distributed at the org level\n* **Audit trail** — Claude Code session logs captured to a central store\n* **Required tests for AI-generated code** (enforced in CI, not by trust)\n* **Pull request checklist** — including a \"Claude Code session id\" field for traceability\n* **Production approval rules** — unchanged: humans approve prod changes\n\nThe AWS Well-Architected Framework remains the backbone for what \"good\" looks like for a workload, organising quality around operational excellence, security, reliability, performance efficiency, cost optimization, and sustainability. ([AWS Documentation][4])\n\nThe shift Claude Code enables: governance is **executable**. A `settings.json` and a hook script either run or they don't. A policy PDF that says \"engineers should not put secrets in prompts\" is wishful. A pre-prompt hook that scans for secrets and refuses to send them is enforcement.\n\n[td]: tooling-decision.html\n[mcps]: mcp-skills-subagents.html\n[3]: https://aws.amazon.com/msk/ \"Amazon MSK - Fully Managed Apache Kafka\"\n[4]: https://docs.aws.amazon.com/wellarchitected/latest/framework/definitions.html \"Definitions - AWS Well-Architected Framework\"\n"}]}</script>
<script>
    (function () {
        const data = JSON.parse(document.getElementById('data').textContent);
        const root = document.getElementById('content');

        const tagsHost = document.getElementById('tags');
        (data.tags || []).forEach(function (t) {
            const span = document.createElement('span');
            span.className = 'tag';
            span.textContent = t;
            tagsHost.appendChild(span);
        });

        // Minimal markdown renderer. Supports: ATX headings, paragraphs, blockquotes,
        // unordered/ordered lists, fenced code, inline code, bold/italic, links, images, hr.
        // Sufficient for the posts in this repo; replace with a fuller parser if needed.
        function renderMarkdown(src) {
            const lines = src.replace(/\r\n/g, '\n').split('\n');
            const out = [];
            let i = 0;

            const bullet = /^(\s*)([-*])\s+(.*)$/;
            const ordered = /^(\s*)(\d+)\.\s+(.*)$/;
            const tableRow = /^\s*\|(.+)\|\s*$/;
            const tableSep = /^\s*\|?\s*:?-{3,}:?\s*(\|\s*:?-{3,}:?\s*)+\|?\s*$/;

            function splitRow(s) {
                let t = s.trim();
                if (t.startsWith('|')) t = t.slice(1);
                if (t.endsWith('|')) t = t.slice(0, -1);
                return t.split('|').map(c => c.trim());
            }

            function inline(s) {
                // Posts are trusted content, so raw HTML passes through unescaped
                // (some posts embed inline <blockquote>, <div>, etc.).
                // Stray ampersands still get fixed up.
                s = s.replace(/&(?![a-zA-Z]+;|#\d+;)/g, '&amp;');
                s = s.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img alt="$1" src="$2">');
                s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
                s = s.replace(/`([^`]+)`/g, function (_, c) {
                    return '<code>' + c.replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</code>';
                });
                s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
                s = s.replace(/(^|[^*])\*([^*\n]+)\*/g, '$1<em>$2</em>');
                return s;
            }

            while (i < lines.length) {
                const line = lines[i];
                if (!line.trim()) {
                    i++;
                    continue;
                }

                const fence = line.match(/^```(\w*)\s*$/);
                if (fence) {
                    i++;
                    const buf = [];
                    while (i < lines.length && !/^```\s*$/.test(lines[i])) {
                        buf.push(lines[i]);
                        i++;
                    }
                    i++;
                    const escaped = buf.join('\n').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                    const cls = fence[1] ? ' class="lang-' + fence[1] + '"' : '';
                    out.push('<pre><code' + cls + '>' + escaped + '</code></pre>');
                    continue;
                }

                const h = line.match(/^(#{1,6})\s+(.*)$/);
                if (h) {
                    out.push('<h' + h[1].length + '>' + inline(h[2]) + '</h' + h[1].length + '>');
                    i++;
                    continue;
                }

                if (/^\s*(?:-\s*){3,}\s*$/.test(line) || /^\s*\*{3,}\s*$/.test(line)) {
                    out.push('<hr>');
                    i++;
                    continue;
                }

                if (/^>\s?/.test(line)) {
                    const buf = [];
                    while (i < lines.length && /^>\s?/.test(lines[i])) {
                        buf.push(lines[i].replace(/^>\s?/, ''));
                        i++;
                    }
                    out.push('<blockquote>' + renderMarkdown(buf.join('\n')) + '</blockquote>');
                    continue;
                }

                if (tableRow.test(line) && i + 1 < lines.length && tableSep.test(lines[i + 1])) {
                    const headers = splitRow(line);
                    i += 2;
                    const rows = [];
                    while (i < lines.length && tableRow.test(lines[i])) {
                        rows.push(splitRow(lines[i]));
                        i++;
                    }
                    let html = '<table><thead><tr>';
                    headers.forEach(h => { html += '<th>' + inline(h) + '</th>'; });
                    html += '</tr></thead><tbody>';
                    rows.forEach(r => {
                        html += '<tr>';
                        r.forEach(c => { html += '<td>' + inline(c) + '</td>'; });
                        html += '</tr>';
                    });
                    html += '</tbody></table>';
                    out.push(html);
                    continue;
                }

                if (bullet.test(line) || ordered.test(line)) {
                    const isOrdered = ordered.test(line);
                    const re = isOrdered ? ordered : bullet;
                    const items = [];
                    while (i < lines.length && re.test(lines[i])) {
                        const m = lines[i].match(re);
                        let item = m[3];
                        i++;
                        while (i < lines.length && lines[i].trim() && !bullet.test(lines[i]) && !ordered.test(lines[i])) {
                            item += '\n' + lines[i].trim();
                            i++;
                        }
                        items.push('<li>' + inline(item) + '</li>');
                    }
                    out.push((isOrdered ? '<ol>' : '<ul>') + items.join('') + (isOrdered ? '</ol>' : '</ul>'));
                    continue;
                }

                const buf = [line];
                i++;
                while (i < lines.length && lines[i].trim() && !/^#{1,6}\s/.test(lines[i]) && !/^>\s?/.test(lines[i]) && !bullet.test(lines[i]) && !ordered.test(lines[i]) && !/^```/.test(lines[i]) && !tableRow.test(lines[i])) {
                    buf.push(lines[i]);
                    i++;
                }
                out.push('<p>' + inline(buf.join(' ')) + '</p>');
            }
            return out.join('\n');
        }

        // Block dispatcher. New block types plug in here.
        const renderers = {
            markdown: function (block) {
                const div = document.createElement('div');
                div.innerHTML = renderMarkdown(block.content);
                return div;
            },
            mermaid: function (block) {
                // Mermaid scans elements with class "mermaid" whose textContent
                // is the diagram source. We collect these nodes and run
                // mermaid.run() once after all blocks are in the DOM.
                const div = document.createElement('div');
                div.className = 'mermaid';
                div.textContent = block.content;
                return div;
            },
            'force-graph': function (block) {
                // build.py emits parsed JSON: {nodes:[{id,size}], links:[{source,target}]}.
                // We instantiate force-graph after the container is in the DOM
                // so it can measure its own width.
                const div = document.createElement('div');
                div.className = 'force-graph';
                const data = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.ForceGraph) return;
                    const maxSize = data.nodes.reduce((m, n) => Math.max(m, n.size || 1), 1);
                    window.ForceGraph()(div)
                        .graphData(data)
                        .width(div.clientWidth)
                        .height(div.clientHeight)
                        .nodeRelSize(4)
                        .nodeVal(n => Math.max(20 * (n.size || 1) / maxSize, 0.001))
                        .nodeLabel(n => n.id + ' (' + (n.size || 1) + ')')
                        .nodeColor(() => 'rgba(135, 206, 235, 0.7)')
                        .linkColor(() => 'rgba(60, 60, 60, 0.4)')
                        .linkDirectionalArrowLength(4)
                        .linkDirectionalArrowRelPos(1)
                        .linkWidth(1);
                });
                return div;
            },
            'bubble-chart': function (block) {
                // build.py emits {nodes:[{name,size}]}. Renders a D3 circle-pack
                // SVG (same shape as the obren.io reference, just inline).
                const wrap = document.createElement('div');
                wrap.className = 'bubble-chart';
                const payload = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.d3) return;
                    const diameter = 480;
                    const fill = '#c0deed';
                    const textColor = '#111111';
                    const fontSize = 12;

                    const svg = window.d3.select(wrap).append('svg')
                        .attr('viewBox', '0 0 ' + diameter + ' ' + diameter)
                        .attr('width', diameter)
                        .attr('height', diameter);

                    const root = window.d3.hierarchy({children: payload.nodes})
                        .sum(d => d.size || 0)
                        .sort((a, b) => b.value - a.value);

                    window.d3.pack().size([diameter, diameter]).padding(2)(root);

                    const node = svg.selectAll('g')
                        .data(root.leaves())
                        .enter().append('g')
                        .attr('transform', d => 'translate(' + d.x + ',' + d.y + ')');

                    node.append('title').text(d => d.data.name + ': ' + d.value);
                    node.append('circle').attr('r', d => d.r).style('fill', fill);
                    node.append('text')
                        .attr('dy', '.3em')
                        .style('text-anchor', 'middle')
                        .style('fill', textColor)
                        .style('font-size', fontSize + 'px')
                        .text(d => d.data.name.substring(0, Math.max(0, Math.floor(d.r / 3))));
                });
                return wrap;
            }
        };

        const mermaidNodes = [];
        data.blocks.forEach(function (block) {
            const r = renderers[block.type];
            if (!r) {
                const pre = document.createElement('pre');
                pre.textContent = '[unknown block type: ' + block.type + ']';
                root.appendChild(pre);
                return;
            }
            const node = r(block);
            if (node instanceof Node) {
                root.appendChild(node);
                if (block.type === 'mermaid') mermaidNodes.push(node);
            }
        });

        if (mermaidNodes.length && window.mermaid) {
            window.mermaid.initialize({startOnLoad: false, theme: 'default'});
            window.mermaid.run({nodes: mermaidNodes});
        }
    })();
</script>
