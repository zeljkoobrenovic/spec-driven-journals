<script id="data" type="application/json">{"meta": {"title": "Why Claude Code: The Three Capabilities That Matter", "date": "2026-05-13 09:25:00 +0100", "author": "by Željko Obrenović (obren.io)", "permalink": "claude-code-as-standard", "timetoread": "7 min", "excerpt": "The case for Claude Code rests on three capabilities: an agentic loop with subagents, MCP for connecting internal systems, and CLAUDE.md for codifying standards. Together they turn a coding assistant into a modernization platform.", "icon": "assets/icons/claude-code-as-standard.png", "logo": "assets/images/claude-code-as-standard/logo.jpeg", "logo_credit": "Image generated by Google Gemini (gemini-3.1-flash-image-preview)"}, "tags": [], "blocks": [{"type": "markdown", "content": "> KEY POINTS:\n> * The case for Claude Code rests on three capabilities: an agentic loop with subagents, MCP for connecting internal systems, and CLAUDE.md for codifying standards. \n> * Together they turn a coding assistant into a modernization platform.\n\n<hr>\n\nThe tooling decision says what to standardize on. This post explains why Claude Code is more than a chat window over a model, and why its primitives are useful for modernization work that spans code, infrastructure, repositories, and governance.\n\n## The case in one sentence\n\nMost AI developer tools are autocomplete with a chat panel attached. Claude Code is an **agent that reads our codebase, calls our tools, and follows our instructions** — which is what modernization actually needs.\n\nThe strategic value comes from three capabilities, each of which addresses a real failure mode of the multi-vendor approach.\n\n## 1. Agentic loop with subagents\n\nClaude Code runs a tool-using loop: read files, run commands, edit code, run tests, decide what to do next. For multi-step work — \"extract this stored procedure into a service, generate characterization tests first, then write the wrapper, then propose the Terraform\" — the loop is the unit of work, not the line of code.\n\n**Subagents** let us delegate parts of the loop to specialized agents:\n\n* an `Explore` subagent for read-only codebase search (used heavily for legacy understanding)\n* a `Plan` subagent that produces an implementation plan but doesn't write code\n* domain-specific subagents we define ourselves: `kafka-contract-reviewer`, `stored-proc-summarizer`, `ecs-template-generator`\n\nA minimal custom subagent definition lives at `.claude/agents/<name>.md`:\n\n```markdown\n---\ndescription: Summarizes a SQL Server stored procedure in business terms.\ntools: Read, Bash\n---\n\nYou are reviewing a stored procedure for a modernization team. For the file\nthe user names, produce: (1) a one-paragraph plain-language summary of what\nthe procedure does for the business, (2) the inputs, outputs, and side\neffects, (3) the tables it reads from and writes to, (4) any obviously\nduplicated logic that probably also lives in application code. Do not\npropose changes.\n```\n\nThe strategic point: **subagents make the agentic loop reusable across teams**. Instead of every developer prompting from scratch, the org publishes a library of subagents that encode how this organization does modernization work.\n\n## 2. MCP for connecting internal systems\n\nThe Model Context Protocol is how Claude Code talks to external systems — not as bespoke per-workflow integrations, but as standard servers that any agent can call.\n\nPractical MCP servers worth standing up early:\n\n| Server | What it gives Claude Code |\n| --- | --- |\n| **AWS** (official) | Read account state, query CloudWatch, inspect ECS services, draft CDK/Terraform |\n| **GitHub / GitLab** (official) | Open and review PRs, read issues, search across repos |\n| **Kafka / Schema Registry** (custom) | List topics, read schemas, validate consumer/producer contracts |\n| **Service catalog** (custom) | Look up service ownership, dependencies, deployment state |\n| **ADR / docs** (custom) | Search architecture decisions, runbooks, internal standards |\n\nA typical entry in `~/.claude/settings.json`:\n\n```json\n{\n  \"mcpServers\": {\n    \"aws\": { \"command\": \"npx\", \"args\": [\"-y\", \"@modelcontextprotocol/server-aws\"] },\n    \"service-catalog\": { \"command\": \"node\", \"args\": [\"./mcp/service-catalog/index.js\"] }\n  }\n}\n```\n\nOnce these are in place, an engineer asking \"what consumes the `orders.events` topic?\" gets an answer that is **grounded in current production state**, not in stale wiki text. That is the unlock that makes legacy understanding workflows trustworthy.\n\n## 3. `CLAUDE.md` and memory\n\nStandards documents are notoriously ignored. `CLAUDE.md` is different: Claude Code loads it automatically into every session in that repository.\n\nA project `CLAUDE.md` at the repository root is the right home for:\n\n* \"This service uses pattern X for error handling — match it.\"\n* \"All Kafka producers must include a correlation ID — see `lib/kafka/producer.go`.\"\n* \"Database migrations go in `db/migrations/`, never hand-edited SQL.\"\n* \"Run `make verify` before declaring work done.\"\n\nA user-level `~/.claude/CLAUDE.md` (or memory directory) carries individual preferences. An organization-wide `CLAUDE.md` distributed via a shared template repo carries cross-cutting rules.\n\nThe result: a new engineer's first AI-assisted PR follows the same conventions as a ten-year veteran's, because the conventions live in a file Claude Code always reads.\n\n## Why this combination matters\n\nEach capability on its own is incremental. Together they create a different kind of tool:\n\n* **Agentic loop + subagents** = repeatable workflows, not one-shot completions\n* **MCP** = grounded in real state, not in training data\n* **CLAUDE.md** = standards enforced by default, not by review\n\nMulti-tool strategies cannot achieve this because investments in subagents, MCP servers, and `CLAUDE.md` files are tool-specific. The case for picking Claude Code as the default is not that it has the highest benchmark scores this quarter — it is that **the organization can build on it**.\n\n## What this is not\n\nClaude Code is not a replacement for engineers, architects, or platform teams. It is also not a magic legacy-modernization machine — it works only as well as the standards, MCP integrations, and subagents we invest in. That investment is the actual strategy. The tool choice just makes it possible.\n"}]}</script>
<script>
    (function () {
        const data = JSON.parse(document.getElementById('data').textContent);
        const root = document.getElementById('content');

        const tagsHost = document.getElementById('tags');
        (data.tags || []).forEach(function (t) {
            const span = document.createElement('span');
            span.className = 'tag';
            span.textContent = t;
            tagsHost.appendChild(span);
        });

        // Minimal markdown renderer. Supports: ATX headings, paragraphs, blockquotes,
        // unordered/ordered lists, fenced code, inline code, bold/italic, links, images, hr.
        // Sufficient for the posts in this repo; replace with a fuller parser if needed.
        function renderMarkdown(src) {
            const lines = src.replace(/\r\n/g, '\n').split('\n');
            const out = [];
            let i = 0;

            const bullet = /^(\s*)([-*])\s+(.*)$/;
            const ordered = /^(\s*)(\d+)\.\s+(.*)$/;
            const tableRow = /^\s*\|(.+)\|\s*$/;
            const tableSep = /^\s*\|?\s*:?-{3,}:?\s*(\|\s*:?-{3,}:?\s*)+\|?\s*$/;

            function splitRow(s) {
                let t = s.trim();
                if (t.startsWith('|')) t = t.slice(1);
                if (t.endsWith('|')) t = t.slice(0, -1);
                return t.split('|').map(c => c.trim());
            }

            function inline(s) {
                // Posts are trusted content, so raw HTML passes through unescaped
                // (some posts embed inline <blockquote>, <div>, etc.).
                // Stray ampersands still get fixed up.
                s = s.replace(/&(?![a-zA-Z]+;|#\d+;)/g, '&amp;');
                s = s.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img alt="$1" src="$2">');
                s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
                s = s.replace(/`([^`]+)`/g, function (_, c) {
                    return '<code>' + c.replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</code>';
                });
                s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
                s = s.replace(/(^|[^*])\*([^*\n]+)\*/g, '$1<em>$2</em>');
                return s;
            }

            while (i < lines.length) {
                const line = lines[i];
                if (!line.trim()) {
                    i++;
                    continue;
                }

                const fence = line.match(/^```(\w*)\s*$/);
                if (fence) {
                    i++;
                    const buf = [];
                    while (i < lines.length && !/^```\s*$/.test(lines[i])) {
                        buf.push(lines[i]);
                        i++;
                    }
                    i++;
                    const escaped = buf.join('\n').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                    const cls = fence[1] ? ' class="lang-' + fence[1] + '"' : '';
                    out.push('<pre><code' + cls + '>' + escaped + '</code></pre>');
                    continue;
                }

                const h = line.match(/^(#{1,6})\s+(.*)$/);
                if (h) {
                    out.push('<h' + h[1].length + '>' + inline(h[2]) + '</h' + h[1].length + '>');
                    i++;
                    continue;
                }

                if (/^\s*(?:-\s*){3,}\s*$/.test(line) || /^\s*\*{3,}\s*$/.test(line)) {
                    out.push('<hr>');
                    i++;
                    continue;
                }

                if (/^>\s?/.test(line)) {
                    const buf = [];
                    while (i < lines.length && /^>\s?/.test(lines[i])) {
                        buf.push(lines[i].replace(/^>\s?/, ''));
                        i++;
                    }
                    out.push('<blockquote>' + renderMarkdown(buf.join('\n')) + '</blockquote>');
                    continue;
                }

                if (tableRow.test(line) && i + 1 < lines.length && tableSep.test(lines[i + 1])) {
                    const headers = splitRow(line);
                    i += 2;
                    const rows = [];
                    while (i < lines.length && tableRow.test(lines[i])) {
                        rows.push(splitRow(lines[i]));
                        i++;
                    }
                    let html = '<table><thead><tr>';
                    headers.forEach(h => { html += '<th>' + inline(h) + '</th>'; });
                    html += '</tr></thead><tbody>';
                    rows.forEach(r => {
                        html += '<tr>';
                        r.forEach(c => { html += '<td>' + inline(c) + '</td>'; });
                        html += '</tr>';
                    });
                    html += '</tbody></table>';
                    out.push(html);
                    continue;
                }

                if (bullet.test(line) || ordered.test(line)) {
                    const isOrdered = ordered.test(line);
                    const re = isOrdered ? ordered : bullet;
                    const items = [];
                    while (i < lines.length && re.test(lines[i])) {
                        const m = lines[i].match(re);
                        let item = m[3];
                        i++;
                        while (i < lines.length && lines[i].trim() && !bullet.test(lines[i]) && !ordered.test(lines[i])) {
                            item += '\n' + lines[i].trim();
                            i++;
                        }
                        items.push('<li>' + inline(item) + '</li>');
                    }
                    out.push((isOrdered ? '<ol>' : '<ul>') + items.join('') + (isOrdered ? '</ol>' : '</ul>'));
                    continue;
                }

                const buf = [line];
                i++;
                while (i < lines.length && lines[i].trim() && !/^#{1,6}\s/.test(lines[i]) && !/^>\s?/.test(lines[i]) && !bullet.test(lines[i]) && !ordered.test(lines[i]) && !/^```/.test(lines[i]) && !tableRow.test(lines[i])) {
                    buf.push(lines[i]);
                    i++;
                }
                out.push('<p>' + inline(buf.join(' ')) + '</p>');
            }
            return out.join('\n');
        }

        // Block dispatcher. New block types plug in here.
        const renderers = {
            markdown: function (block) {
                const div = document.createElement('div');
                div.innerHTML = renderMarkdown(block.content);
                return div;
            },
            mermaid: function (block) {
                // Mermaid scans elements with class "mermaid" whose textContent
                // is the diagram source. We collect these nodes and run
                // mermaid.run() once after all blocks are in the DOM.
                const div = document.createElement('div');
                div.className = 'mermaid';
                div.textContent = block.content;
                return div;
            },
            'force-graph': function (block) {
                // build.py emits parsed JSON: {nodes:[{id,size}], links:[{source,target}]}.
                // We instantiate force-graph after the container is in the DOM
                // so it can measure its own width.
                const div = document.createElement('div');
                div.className = 'force-graph';
                const data = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.ForceGraph) return;
                    const maxSize = data.nodes.reduce((m, n) => Math.max(m, n.size || 1), 1);
                    window.ForceGraph()(div)
                        .graphData(data)
                        .width(div.clientWidth)
                        .height(div.clientHeight)
                        .nodeRelSize(4)
                        .nodeVal(n => Math.max(20 * (n.size || 1) / maxSize, 0.001))
                        .nodeLabel(n => n.id + ' (' + (n.size || 1) + ')')
                        .nodeColor(() => 'rgba(135, 206, 235, 0.7)')
                        .linkColor(() => 'rgba(60, 60, 60, 0.4)')
                        .linkDirectionalArrowLength(4)
                        .linkDirectionalArrowRelPos(1)
                        .linkWidth(1);
                });
                return div;
            },
            'bubble-chart': function (block) {
                // build.py emits {nodes:[{name,size}]}. Renders a D3 circle-pack
                // SVG (same shape as the obren.io reference, just inline).
                const wrap = document.createElement('div');
                wrap.className = 'bubble-chart';
                const payload = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.d3) return;
                    const diameter = 480;
                    const fill = '#c0deed';
                    const textColor = '#111111';
                    const fontSize = 12;

                    const svg = window.d3.select(wrap).append('svg')
                        .attr('viewBox', '0 0 ' + diameter + ' ' + diameter)
                        .attr('width', diameter)
                        .attr('height', diameter);

                    const root = window.d3.hierarchy({children: payload.nodes})
                        .sum(d => d.size || 0)
                        .sort((a, b) => b.value - a.value);

                    window.d3.pack().size([diameter, diameter]).padding(2)(root);

                    const node = svg.selectAll('g')
                        .data(root.leaves())
                        .enter().append('g')
                        .attr('transform', d => 'translate(' + d.x + ',' + d.y + ')');

                    node.append('title').text(d => d.data.name + ': ' + d.value);
                    node.append('circle').attr('r', d => d.r).style('fill', fill);
                    node.append('text')
                        .attr('dy', '.3em')
                        .style('text-anchor', 'middle')
                        .style('fill', textColor)
                        .style('font-size', fontSize + 'px')
                        .text(d => d.data.name.substring(0, Math.max(0, Math.floor(d.r / 3))));
                });
                return wrap;
            }
        };

        const mermaidNodes = [];
        data.blocks.forEach(function (block) {
            const r = renderers[block.type];
            if (!r) {
                const pre = document.createElement('pre');
                pre.textContent = '[unknown block type: ' + block.type + ']';
                root.appendChild(pre);
                return;
            }
            const node = r(block);
            if (node instanceof Node) {
                root.appendChild(node);
                if (block.type === 'mermaid') mermaidNodes.push(node);
            }
        });

        if (mermaidNodes.length && window.mermaid) {
            window.mermaid.initialize({startOnLoad: false, theme: 'default'});
            window.mermaid.run({nodes: mermaidNodes});
        }
    })();
</script>
