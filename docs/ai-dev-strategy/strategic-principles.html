<script id="data" type="application/json">{"meta": {"title": "Strategic Principles for AI in Software Modernization", "date": "2026-05-13 09:00:00 +0100", "author": "by Željko Obrenović (obren.io)", "permalink": "strategic-principles", "timetoread": "6 min", "excerpt": "Our AI strategy should be positioned as an engineering modernization accelerator, not as a standalone AI adoption initiative. Six principles keep AI aligned with the target architecture instead of reinforcing legacy complexity.", "icon": "assets/icons/strategic-principles.png", "logo": "assets/images/strategic-principles/logo.jpeg", "logo_credit": "Image generated by Google Gemini (gemini-3.1-flash-image-preview)"}, "tags": [], "blocks": [{"type": "markdown", "content": "> KEY POINTS:\n> * Our AI strategy should be positioned as an engineering modernization accelerator, not as a standalone AI adoption initiative. \n> * Six principles keep AI aligned with the target architecture instead of reinforcing legacy complexity.\n\n<hr>\n\nThese principles are the guardrails for the rest of the strategy. They explain what Claude Code is allowed to accelerate, what it must not reinforce, and how the organization keeps the tool choice reversible while still investing with intent.\n\nOur AI strategy should be positioned as an **engineering modernization accelerator**, not as a standalone \"AI adoption\" initiative.\n\nThe core goal:\n\n> Use AI — with **Claude Code as the default developer tool** — to accelerate the controlled transition from fragmented legacy delivery models toward a consistent AWS-based microservices engineering platform, while reducing cognitive load, improving quality, and keeping humans accountable for architecture, design, security, and production decisions.\n\nThe \"with Claude Code as the default\" qualifier matters. A vendor-neutral AI strategy sounds prudent on paper but in practice produces a long evaluation phase, three pilot programs that never converge, and engineers picking tools by personal preference. Picking a default unlocks investment in shared standards, reusable subagents, and MCP integrations that compound over time. Other tools are not banned — they need a governance case.\n\n## 1. AI supports the target architecture, not the old complexity\n\nAI should not be used mainly to make the current fragmented landscape easier to tolerate. It should help teams move toward the future state:\n\n* AWS-based platform\n* containerized services on ECS\n* Kafka-based asynchronous messaging\n* simpler microservices\n* standardized CI/CD\n* standardized observability\n* consistent engineering practices across repositories\n\nThis avoids the trap of using AI to produce more code inside already-complex systems. Claude Code's ability to read large legacy codebases and propose extractions, rather than just autocomplete inside them, is a direct lever for this principle.\n\n## 2. Modernization should be incremental\n\nThe recommended modernization model is a **strangler-style transition**: wrap, extract, replace, and retire legacy capabilities progressively. AWS describes the strangler fig pattern as a way to migrate monolithic applications to microservices incrementally, reducing transformation risk and business disruption. ([AWS Documentation][1])\n\nClaude Code supports this incremental model directly: a planning subagent can map a legacy module's seams; an extraction subagent can produce a wrapper; a test-generation subagent can build characterization tests before any change. Each step is small, reviewable, and reversible.\n\n## 3. AI output must be governed by engineering standards\n\nAI-generated code should never bypass normal engineering controls. The policy should be:\n\n> AI may propose, generate, explain, test, and refactor; humans remain accountable for correctness, security, architecture, licensing, and production readiness.\n\nThis is especially important across C#, SQL stored procedures, Java services, Node.js serverless code, Terraform/CDK, Docker, Kafka, and CI/CD definitions.\n\nClaude Code's permission modes, hooks, and tool allowlists are the mechanism for enforcing this. Governance moves from a policy PDF that no one reads into a `settings.json` that runs every session.\n\n## 4. Standardization comes before large-scale automation\n\nBefore giving AI agents broad autonomy, define standard patterns:\n\n* service template\n* API conventions\n* Kafka topic conventions\n* container standards\n* CI/CD pipeline standards\n* observability baseline\n* security controls\n* testing expectations\n* repository structure\n* definition of done\n\nWithout this, AI will accelerate inconsistency. With Claude Code, those standards live in a project `CLAUDE.md` and in shared subagents — so a developer asking \"create a new service\" gets the same answer everywhere.\n\n## 5. The strategy is revisited every six months\n\nThis document is not a one-time bet. The AI developer-tooling landscape moves faster than any other layer of the stack — model capabilities, agentic harnesses, and primitives like Skills are evolving on a quarterly cadence. A strategy that doesn't expire goes stale.\n\n> **This strategy is reviewed every six months.** Each review re-tests the tooling default (is Claude Code still the right primary?), the MCP/Skills/subagent inventory (what should be deprecated?), the cost/model-routing assumptions, and the modernization progress. Outputs go to the same governance forum that approves the strategy itself.\n\nThis cadence is part of what makes a default safe to pick. If the choice is reversible by design — every six months we can swap defaults, retire stale Skills, switch from one MCP server to another — then committing now is much less expensive than waiting indefinitely for the \"right\" tool to emerge. The committed direction compounds; the periodic review keeps it honest.\n\nWhat the review specifically checks:\n\n* **Tooling default** — has a serious challenger (Codex CLI, Gemini CLI, something new) moved ahead on the dimensions the org actually decides on?\n* **Cost and model routing** — are we paying for Opus on work that Sonnet or Haiku handles? Is the routing policy still right?\n* **Vendor-concentration mitigations** — Bedrock/Vertex deployment, MCP/Skill portability — are they still in place?\n* **Skill and subagent inventory** — what is stale? What new patterns should be promoted into shared Skills?\n* **MCP server inventory** — are any third-party integrations broken, deprecated, or worth replacing?\n* **Governance fit** — are hook scripts, permission modes, allowlists still matching how teams actually work?\n\nA six-month cycle is short enough that no investment is locked in for years, long enough that compound returns on shared Skills and subagents are visible. Anything shorter becomes thrash; anything longer becomes legacy.\n\n## 6. MCP for their systems, Skills for ours\n\nWhen extending Claude Code with new capabilities, follow this split:\n\n> **MCP for stable third-party systems we don't own (GitHub, Jira, Snyk, AWS, Schema Registry). Skills for capabilities backed by our own code, conventions, or evolving processes.**\n\nThird-party APIs change on someone else's schedule and live behind a vendor's interface — MCP is the right seam. Our own conventions and capabilities change daily, in our PRs, by our engineers — Skills are how those capabilities ship with the code they document, in the same PR.\n\nThis split prevents the two most common mistakes: building custom MCP servers that wrap our own evolving code (and going stale every sprint), or building Skills that wrap vendor APIs (and breaking on every vendor release). It also keeps the platform investment in the right place — MCP servers are owned by platform/integration teams, Skills are owned by the teams whose code they describe.\n\n[1]: https://docs.aws.amazon.com/prescriptive-guidance/latest/cloud-design-patterns/strangler-fig.html \"Strangler fig pattern - AWS Prescriptive Guidance\"\n"}]}</script>
<script>
    (function () {
        const data = JSON.parse(document.getElementById('data').textContent);
        const root = document.getElementById('content');

        const tagsHost = document.getElementById('tags');
        (data.tags || []).forEach(function (t) {
            const span = document.createElement('span');
            span.className = 'tag';
            span.textContent = t;
            tagsHost.appendChild(span);
        });

        // Minimal markdown renderer. Supports: ATX headings, paragraphs, blockquotes,
        // unordered/ordered lists, fenced code, inline code, bold/italic, links, images, hr.
        // Sufficient for the posts in this repo; replace with a fuller parser if needed.
        function renderMarkdown(src) {
            const lines = src.replace(/\r\n/g, '\n').split('\n');
            const out = [];
            let i = 0;

            const bullet = /^(\s*)([-*])\s+(.*)$/;
            const ordered = /^(\s*)(\d+)\.\s+(.*)$/;
            const tableRow = /^\s*\|(.+)\|\s*$/;
            const tableSep = /^\s*\|?\s*:?-{3,}:?\s*(\|\s*:?-{3,}:?\s*)+\|?\s*$/;

            function splitRow(s) {
                let t = s.trim();
                if (t.startsWith('|')) t = t.slice(1);
                if (t.endsWith('|')) t = t.slice(0, -1);
                return t.split('|').map(c => c.trim());
            }

            function inline(s) {
                // Posts are trusted content, so raw HTML passes through unescaped
                // (some posts embed inline <blockquote>, <div>, etc.).
                // Stray ampersands still get fixed up.
                s = s.replace(/&(?![a-zA-Z]+;|#\d+;)/g, '&amp;');
                s = s.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img alt="$1" src="$2">');
                s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
                s = s.replace(/`([^`]+)`/g, function (_, c) {
                    return '<code>' + c.replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</code>';
                });
                s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
                s = s.replace(/(^|[^*])\*([^*\n]+)\*/g, '$1<em>$2</em>');
                return s;
            }

            while (i < lines.length) {
                const line = lines[i];
                if (!line.trim()) {
                    i++;
                    continue;
                }

                const fence = line.match(/^```(\w*)\s*$/);
                if (fence) {
                    i++;
                    const buf = [];
                    while (i < lines.length && !/^```\s*$/.test(lines[i])) {
                        buf.push(lines[i]);
                        i++;
                    }
                    i++;
                    const escaped = buf.join('\n').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                    const cls = fence[1] ? ' class="lang-' + fence[1] + '"' : '';
                    out.push('<pre><code' + cls + '>' + escaped + '</code></pre>');
                    continue;
                }

                const h = line.match(/^(#{1,6})\s+(.*)$/);
                if (h) {
                    out.push('<h' + h[1].length + '>' + inline(h[2]) + '</h' + h[1].length + '>');
                    i++;
                    continue;
                }

                if (/^\s*(?:-\s*){3,}\s*$/.test(line) || /^\s*\*{3,}\s*$/.test(line)) {
                    out.push('<hr>');
                    i++;
                    continue;
                }

                if (/^>\s?/.test(line)) {
                    const buf = [];
                    while (i < lines.length && /^>\s?/.test(lines[i])) {
                        buf.push(lines[i].replace(/^>\s?/, ''));
                        i++;
                    }
                    out.push('<blockquote>' + renderMarkdown(buf.join('\n')) + '</blockquote>');
                    continue;
                }

                if (tableRow.test(line) && i + 1 < lines.length && tableSep.test(lines[i + 1])) {
                    const headers = splitRow(line);
                    i += 2;
                    const rows = [];
                    while (i < lines.length && tableRow.test(lines[i])) {
                        rows.push(splitRow(lines[i]));
                        i++;
                    }
                    let html = '<table><thead><tr>';
                    headers.forEach(h => { html += '<th>' + inline(h) + '</th>'; });
                    html += '</tr></thead><tbody>';
                    rows.forEach(r => {
                        html += '<tr>';
                        r.forEach(c => { html += '<td>' + inline(c) + '</td>'; });
                        html += '</tr>';
                    });
                    html += '</tbody></table>';
                    out.push(html);
                    continue;
                }

                if (bullet.test(line) || ordered.test(line)) {
                    const isOrdered = ordered.test(line);
                    const re = isOrdered ? ordered : bullet;
                    const items = [];
                    while (i < lines.length && re.test(lines[i])) {
                        const m = lines[i].match(re);
                        let item = m[3];
                        i++;
                        while (i < lines.length && lines[i].trim() && !bullet.test(lines[i]) && !ordered.test(lines[i])) {
                            item += '\n' + lines[i].trim();
                            i++;
                        }
                        items.push('<li>' + inline(item) + '</li>');
                    }
                    out.push((isOrdered ? '<ol>' : '<ul>') + items.join('') + (isOrdered ? '</ol>' : '</ul>'));
                    continue;
                }

                const buf = [line];
                i++;
                while (i < lines.length && lines[i].trim() && !/^#{1,6}\s/.test(lines[i]) && !/^>\s?/.test(lines[i]) && !bullet.test(lines[i]) && !ordered.test(lines[i]) && !/^```/.test(lines[i]) && !tableRow.test(lines[i])) {
                    buf.push(lines[i]);
                    i++;
                }
                out.push('<p>' + inline(buf.join(' ')) + '</p>');
            }
            return out.join('\n');
        }

        // Block dispatcher. New block types plug in here.
        const renderers = {
            markdown: function (block) {
                const div = document.createElement('div');
                div.innerHTML = renderMarkdown(block.content);
                return div;
            },
            mermaid: function (block) {
                // Mermaid scans elements with class "mermaid" whose textContent
                // is the diagram source. We collect these nodes and run
                // mermaid.run() once after all blocks are in the DOM.
                const div = document.createElement('div');
                div.className = 'mermaid';
                div.textContent = block.content;
                return div;
            },
            'force-graph': function (block) {
                // build.py emits parsed JSON: {nodes:[{id,size}], links:[{source,target}]}.
                // We instantiate force-graph after the container is in the DOM
                // so it can measure its own width.
                const div = document.createElement('div');
                div.className = 'force-graph';
                const data = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.ForceGraph) return;
                    const maxSize = data.nodes.reduce((m, n) => Math.max(m, n.size || 1), 1);
                    window.ForceGraph()(div)
                        .graphData(data)
                        .width(div.clientWidth)
                        .height(div.clientHeight)
                        .nodeRelSize(4)
                        .nodeVal(n => Math.max(20 * (n.size || 1) / maxSize, 0.001))
                        .nodeLabel(n => n.id + ' (' + (n.size || 1) + ')')
                        .nodeColor(() => 'rgba(135, 206, 235, 0.7)')
                        .linkColor(() => 'rgba(60, 60, 60, 0.4)')
                        .linkDirectionalArrowLength(4)
                        .linkDirectionalArrowRelPos(1)
                        .linkWidth(1);
                });
                return div;
            },
            'bubble-chart': function (block) {
                // build.py emits {nodes:[{name,size}]}. Renders a D3 circle-pack
                // SVG (same shape as the obren.io reference, just inline).
                const wrap = document.createElement('div');
                wrap.className = 'bubble-chart';
                const payload = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.d3) return;
                    const diameter = 480;
                    const fill = '#c0deed';
                    const textColor = '#111111';
                    const fontSize = 12;

                    const svg = window.d3.select(wrap).append('svg')
                        .attr('viewBox', '0 0 ' + diameter + ' ' + diameter)
                        .attr('width', diameter)
                        .attr('height', diameter);

                    const root = window.d3.hierarchy({children: payload.nodes})
                        .sum(d => d.size || 0)
                        .sort((a, b) => b.value - a.value);

                    window.d3.pack().size([diameter, diameter]).padding(2)(root);

                    const node = svg.selectAll('g')
                        .data(root.leaves())
                        .enter().append('g')
                        .attr('transform', d => 'translate(' + d.x + ',' + d.y + ')');

                    node.append('title').text(d => d.data.name + ': ' + d.value);
                    node.append('circle').attr('r', d => d.r).style('fill', fill);
                    node.append('text')
                        .attr('dy', '.3em')
                        .style('text-anchor', 'middle')
                        .style('fill', textColor)
                        .style('font-size', fontSize + 'px')
                        .text(d => d.data.name.substring(0, Math.max(0, Math.floor(d.r / 3))));
                });
                return wrap;
            }
        };

        const mermaidNodes = [];
        data.blocks.forEach(function (block) {
            const r = renderers[block.type];
            if (!r) {
                const pre = document.createElement('pre');
                pre.textContent = '[unknown block type: ' + block.type + ']';
                root.appendChild(pre);
                return;
            }
            const node = r(block);
            if (node instanceof Node) {
                root.appendChild(node);
                if (block.type === 'mermaid') mermaidNodes.push(node);
            }
        });

        if (mermaidNodes.length && window.mermaid) {
            window.mermaid.initialize({startOnLoad: false, theme: 'default'});
            window.mermaid.run({nodes: mermaidNodes});
        }
    })();
</script>
