<script id="data" type="application/json">{"meta": {"title": "Operating Model for AI Engineering Enablement", "date": "2026-05-13 11:00:00 +0100", "author": "by Željko Obrenović (obren.io)", "permalink": "operating-model", "timetoread": "6 min", "excerpt": "The strategy needs clear ownership: who maintains Claude Code standards, who approves MCP servers and subagents, who owns modernization workflows, and who remains accountable for production decisions.", "icon": "assets/icons/operating-model.png", "logo": "assets/images/operating-model/logo.jpeg", "logo_credit": "Image generated by Google Gemini (gemini-3-pro-image-preview)"}, "tags": [], "blocks": [{"type": "markdown", "content": "> KEY POINTS:\n> * The strategy needs clear ownership.\n> * Who maintains Claude Code standards, who approves MCP servers and subagents, who owns modernization workflows, and who remains accountable for production decisions.\n\n<hr>\n\nClaude Code changes the engineering workflow, but it does not remove accountability. The operating model defines who owns the platform capabilities, who approves risk, and how service teams use AI without turning every repository into a separate experiment.\n\n## Core Principle\n\nAI Engineering Enablement is not a separate delivery team that modernizes systems on behalf of everyone else.\n\nIt is an enablement function that builds reusable assets, sets guardrails, coaches teams, and measures whether modernization is getting safer and faster.\n\nService teams still own their code. Architects still own architecture decisions. Security still owns risk policy. Platform still owns the golden paths.\n\n## AI Engineering Enablement Group\n\nCreate a small cross-functional group with representatives from:\n\n* platform engineering\n* architecture\n* security\n* developer experience\n* QA and test automation\n* cloud operations\n* .NET legacy modernization\n* Java/Kafka services\n* Node.js/serverless services\n\nThis group should be small enough to move quickly and broad enough to avoid building a strategy that works only for one estate.\n\n## Responsibilities\n\n| Responsibility | Primary owner | Supporting roles |\n| --- | --- | --- |\n| Claude Code default and exception process | AI Engineering Enablement | Security, Procurement |\n| Organization `CLAUDE.md` | Platform | Architecture, Security |\n| Project `CLAUDE.md` quality | Service team | Platform |\n| MCP server registry | Platform | Security, Integration Teams |\n| Skills registry | Platform | Service Teams, DevEx |\n| Subagent registry | Platform | Architecture, Security |\n| Hook scripts and permission baselines | Platform | Security |\n| AI policy | Security | Platform, Legal, Architecture |\n| Engineering standards | Platform | Architecture, Service Teams |\n| Service templates | Platform | Cloud Operations, Service Teams |\n| Legacy modernization workflows | Architecture | Service Teams, QA |\n| PR review assistance | Platform | Security, Service Teams |\n| Metrics and reporting | AI Engineering Enablement | DevEx, Platform |\n\n## Governance Forums\n\nUse three forums. Keep them separate so operational decisions do not get stuck in risk review, and risk decisions do not get buried in platform backlog grooming.\n\n| Forum | Purpose | Frequency |\n| --- | --- | --- |\n| AI Engineering Enablement | Standards, roadmap, subagents, Skills, adoption, metrics | Weekly |\n| Architecture Review | Service boundaries, extraction candidates, Kafka contracts, target-state exceptions | Weekly or biweekly |\n| Risk and Compliance Review | Data handling, tool approval, vendor risk, licensing, audit, regulated use cases | Monthly or as needed |\n\n## Decision Rights\n\nThe strategy should be explicit about who can decide what.\n\n| Decision | Decision owner |\n| --- | --- |\n| Claude Code remains the default tool | AI Engineering Enablement, reviewed every six months |\n| Alternative AI tool exception | AI Engineering Enablement + Security |\n| New MCP server in org registry | Platform + Security |\n| New shared Skill | Platform, with owning service team if domain-specific |\n| New shared subagent | Platform, with Architecture or Security review if it affects standards or risk |\n| New service boundary | Architecture Review |\n| New Kafka event contract | Architecture Review + owning domain team |\n| Production deployment | Existing production approval process |\n| Modification of business-critical legacy logic | Owning service team + domain expert + required regression tests |\n\n## How Work Flows\n\n### 1. A team identifies a modernization candidate\n\nThe service team owns the candidate. Claude Code may help produce a current-state summary, dependency map, test gaps, and first ADR draft.\n\nArchitecture Review decides whether the proposed target shape is acceptable.\n\n### 2. The team uses shared workflows\n\nThe team invokes approved subagents and Skills instead of inventing a workflow from scratch. Typical examples:\n\n* `legacy-explorer`\n* `stored-proc-summarizer`\n* `characterization-test-writer`\n* `kafka-contract-reviewer`\n* `ecs-template-generator`\n* `pr-review-helper`\n\nThe output becomes normal repository material: tests, docs, ADRs, PR comments, scorecards, and migration plans.\n\n### 3. Humans approve decisions\n\nClaude Code can propose extraction seams, event contract changes, service templates, and migration plans. It does not approve them.\n\nHumans remain accountable for:\n\n* architecture\n* security\n* licensing\n* correctness\n* domain semantics\n* production readiness\n\n### 4. Platform promotes reusable patterns\n\nWhen a team repeats a workflow more than twice, Platform decides whether it belongs in:\n\n* `CLAUDE.md`\n* a Skill\n* a subagent\n* a template\n* an MCP server\n* a normal shared library\n\nThis is how one team's modernization learning becomes a shared asset.\n\n## Team-Level Expectations\n\nEach service team should maintain:\n\n* a project `CLAUDE.md`\n* repository ownership metadata\n* standard build and test commands\n* a runbook\n* ADRs for major decisions\n* service catalog entry\n* test strategy for risky changes\n* explicit AI usage traceability on AI-assisted PRs\n\nThis is not documentation for its own sake. It is the minimum context Claude Code needs to produce useful, consistent work.\n\n## Platform-Level Expectations\n\nPlatform should maintain:\n\n* organization `CLAUDE.md`\n* standard service templates\n* approved Skills\n* approved subagents\n* MCP registry and setup guidance\n* hook scripts\n* CI quality gates\n* policy-as-code examples\n* scorecard definitions\n* training and onboarding material\n\nThe platform product is no longer only infrastructure modules and CI templates. It also includes the AI-facing instructions and workflows that make those standards easy to follow.\n\n## Operating Metrics\n\n| Metric | Why it matters |\n| --- | --- |\n| Number of repositories with valid `CLAUDE.md` | Measures context readiness |\n| Number of shared Skills and subagents with owners | Measures reusable capability |\n| Stale Skills or subagents found in review | Measures maintenance risk |\n| AI-assisted PRs with traceability | Measures audit readiness |\n| Repeated standards comments in PRs | Measures whether standards are encoded early enough |\n| Modernization artifacts produced per candidate | Measures workflow completeness |\n| Exceptions to default tooling | Measures drift |\n\n## Anti-Patterns\n\nAvoid these patterns:\n\n* a central AI team generating code for service teams without ownership transfer\n* every team creating its own unreviewed subagents\n* broad tool autonomy before tests and standards are in place\n* governance by wiki page without hooks, templates, or CI enforcement\n* treating `CLAUDE.md` as a long essay instead of executable context\n* measuring \"AI adoption\" instead of modernization outcomes\n\nThe operating model is successful when service teams move faster without losing ownership, and platform standards become easier to follow than local variation.\n"}]}</script>
<script>
    (function () {
        const data = JSON.parse(document.getElementById('data').textContent);
        const root = document.getElementById('content');

        const tagsHost = document.getElementById('tags');
        (data.tags || []).forEach(function (t) {
            const span = document.createElement('span');
            span.className = 'tag';
            span.textContent = t;
            tagsHost.appendChild(span);
        });

        // Minimal markdown renderer. Supports: ATX headings, paragraphs, blockquotes,
        // unordered/ordered lists, fenced code, inline code, bold/italic, links, images, hr.
        // Sufficient for the posts in this repo; replace with a fuller parser if needed.
        function renderMarkdown(src) {
            const lines = src.replace(/\r\n/g, '\n').split('\n');
            const out = [];
            let i = 0;

            const bullet = /^(\s*)([-*])\s+(.*)$/;
            const ordered = /^(\s*)(\d+)\.\s+(.*)$/;
            const tableRow = /^\s*\|(.+)\|\s*$/;
            const tableSep = /^\s*\|?\s*:?-{3,}:?\s*(\|\s*:?-{3,}:?\s*)+\|?\s*$/;

            function splitRow(s) {
                let t = s.trim();
                if (t.startsWith('|')) t = t.slice(1);
                if (t.endsWith('|')) t = t.slice(0, -1);
                return t.split('|').map(c => c.trim());
            }

            function inline(s) {
                // Posts are trusted content, so raw HTML passes through unescaped
                // (some posts embed inline <blockquote>, <div>, etc.).
                // Stray ampersands still get fixed up.
                s = s.replace(/&(?![a-zA-Z]+;|#\d+;)/g, '&amp;');
                s = s.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img alt="$1" src="$2">');
                s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
                s = s.replace(/`([^`]+)`/g, function (_, c) {
                    return '<code>' + c.replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</code>';
                });
                s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
                s = s.replace(/(^|[^*])\*([^*\n]+)\*/g, '$1<em>$2</em>');
                return s;
            }

            while (i < lines.length) {
                const line = lines[i];
                if (!line.trim()) {
                    i++;
                    continue;
                }

                const fence = line.match(/^```(\w*)\s*$/);
                if (fence) {
                    i++;
                    const buf = [];
                    while (i < lines.length && !/^```\s*$/.test(lines[i])) {
                        buf.push(lines[i]);
                        i++;
                    }
                    i++;
                    const escaped = buf.join('\n').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                    const cls = fence[1] ? ' class="lang-' + fence[1] + '"' : '';
                    out.push('<pre><code' + cls + '>' + escaped + '</code></pre>');
                    continue;
                }

                const h = line.match(/^(#{1,6})\s+(.*)$/);
                if (h) {
                    out.push('<h' + h[1].length + '>' + inline(h[2]) + '</h' + h[1].length + '>');
                    i++;
                    continue;
                }

                if (/^\s*(?:-\s*){3,}\s*$/.test(line) || /^\s*\*{3,}\s*$/.test(line)) {
                    out.push('<hr>');
                    i++;
                    continue;
                }

                if (/^>\s?/.test(line)) {
                    const buf = [];
                    while (i < lines.length && /^>\s?/.test(lines[i])) {
                        buf.push(lines[i].replace(/^>\s?/, ''));
                        i++;
                    }
                    out.push('<blockquote>' + renderMarkdown(buf.join('\n')) + '</blockquote>');
                    continue;
                }

                if (tableRow.test(line) && i + 1 < lines.length && tableSep.test(lines[i + 1])) {
                    const headers = splitRow(line);
                    i += 2;
                    const rows = [];
                    while (i < lines.length && tableRow.test(lines[i])) {
                        rows.push(splitRow(lines[i]));
                        i++;
                    }
                    let html = '<table><thead><tr>';
                    headers.forEach(h => { html += '<th>' + inline(h) + '</th>'; });
                    html += '</tr></thead><tbody>';
                    rows.forEach(r => {
                        html += '<tr>';
                        r.forEach(c => { html += '<td>' + inline(c) + '</td>'; });
                        html += '</tr>';
                    });
                    html += '</tbody></table>';
                    out.push(html);
                    continue;
                }

                if (bullet.test(line) || ordered.test(line)) {
                    const isOrdered = ordered.test(line);
                    const re = isOrdered ? ordered : bullet;
                    const items = [];
                    while (i < lines.length && re.test(lines[i])) {
                        const m = lines[i].match(re);
                        let item = m[3];
                        i++;
                        while (i < lines.length && lines[i].trim() && !bullet.test(lines[i]) && !ordered.test(lines[i])) {
                            item += '\n' + lines[i].trim();
                            i++;
                        }
                        items.push('<li>' + inline(item) + '</li>');
                    }
                    out.push((isOrdered ? '<ol>' : '<ul>') + items.join('') + (isOrdered ? '</ol>' : '</ul>'));
                    continue;
                }

                const buf = [line];
                i++;
                while (i < lines.length && lines[i].trim() && !/^#{1,6}\s/.test(lines[i]) && !/^>\s?/.test(lines[i]) && !bullet.test(lines[i]) && !ordered.test(lines[i]) && !/^```/.test(lines[i]) && !tableRow.test(lines[i])) {
                    buf.push(lines[i]);
                    i++;
                }
                out.push('<p>' + inline(buf.join(' ')) + '</p>');
            }
            return out.join('\n');
        }

        // Block dispatcher. New block types plug in here.
        const renderers = {
            markdown: function (block) {
                const div = document.createElement('div');
                div.innerHTML = renderMarkdown(block.content);
                return div;
            },
            mermaid: function (block) {
                // Mermaid scans elements with class "mermaid" whose textContent
                // is the diagram source. We collect these nodes and run
                // mermaid.run() once after all blocks are in the DOM.
                const div = document.createElement('div');
                div.className = 'mermaid';
                div.textContent = block.content;
                return div;
            },
            'force-graph': function (block) {
                // build.py emits parsed JSON: {nodes:[{id,size}], links:[{source,target}]}.
                // We instantiate force-graph after the container is in the DOM
                // so it can measure its own width.
                const div = document.createElement('div');
                div.className = 'force-graph';
                const data = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.ForceGraph) return;
                    const maxSize = data.nodes.reduce((m, n) => Math.max(m, n.size || 1), 1);
                    window.ForceGraph()(div)
                        .graphData(data)
                        .width(div.clientWidth)
                        .height(div.clientHeight)
                        .nodeRelSize(4)
                        .nodeVal(n => Math.max(20 * (n.size || 1) / maxSize, 0.001))
                        .nodeLabel(n => n.id + ' (' + (n.size || 1) + ')')
                        .nodeColor(() => 'rgba(135, 206, 235, 0.7)')
                        .linkColor(() => 'rgba(60, 60, 60, 0.4)')
                        .linkDirectionalArrowLength(4)
                        .linkDirectionalArrowRelPos(1)
                        .linkWidth(1);
                });
                return div;
            },
            'bubble-chart': function (block) {
                // build.py emits {nodes:[{name,size}]}. Renders a D3 circle-pack
                // SVG (same shape as the obren.io reference, just inline).
                const wrap = document.createElement('div');
                wrap.className = 'bubble-chart';
                const payload = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.d3) return;
                    const diameter = 480;
                    const fill = '#c0deed';
                    const textColor = '#111111';
                    const fontSize = 12;

                    const svg = window.d3.select(wrap).append('svg')
                        .attr('viewBox', '0 0 ' + diameter + ' ' + diameter)
                        .attr('width', diameter)
                        .attr('height', diameter);

                    const root = window.d3.hierarchy({children: payload.nodes})
                        .sum(d => d.size || 0)
                        .sort((a, b) => b.value - a.value);

                    window.d3.pack().size([diameter, diameter]).padding(2)(root);

                    const node = svg.selectAll('g')
                        .data(root.leaves())
                        .enter().append('g')
                        .attr('transform', d => 'translate(' + d.x + ',' + d.y + ')');

                    node.append('title').text(d => d.data.name + ': ' + d.value);
                    node.append('circle').attr('r', d => d.r).style('fill', fill);
                    node.append('text')
                        .attr('dy', '.3em')
                        .style('text-anchor', 'middle')
                        .style('fill', textColor)
                        .style('font-size', fontSize + 'px')
                        .text(d => d.data.name.substring(0, Math.max(0, Math.floor(d.r / 3))));
                });
                return wrap;
            }
        };

        const mermaidNodes = [];
        data.blocks.forEach(function (block) {
            const r = renderers[block.type];
            if (!r) {
                const pre = document.createElement('pre');
                pre.textContent = '[unknown block type: ' + block.type + ']';
                root.appendChild(pre);
                return;
            }
            const node = r(block);
            if (node instanceof Node) {
                root.appendChild(node);
                if (block.type === 'mermaid') mermaidNodes.push(node);
            }
        });

        if (mermaidNodes.length && window.mermaid) {
            window.mermaid.initialize({startOnLoad: false, theme: 'default'});
            window.mermaid.run({nodes: mermaidNodes});
        }
    })();
</script>
