<script id="data" type="application/json">{"meta": {"title": "Claude Code Use-Case Portfolio", "date": "2026-05-13 10:15:00 +0100", "author": "by Željko Obrenović (obren.io)", "permalink": "ai-use-case-portfolio", "timetoread": "7 min", "excerpt": "Six high-priority Claude Code workflows for modernization: legacy understanding, modernization documentation, test generation, service template generation, pull request review assistance, and developer self-service. Each maps to specific subagents and MCP servers.", "icon": "assets/icons/ai-use-case-portfolio.png", "logo": "assets/images/ai-use-case-portfolio/logo.jpeg", "logo_credit": "Image generated by Google Gemini (gemini-3.1-flash-image-preview)"}, "tags": [], "blocks": [{"type": "markdown", "content": "> KEY POINTS:\n> * Six high-priority Claude Code workflows for modernization: legacy understanding, modernization documentation, test generation, service template generation, pull request review assistance, and developer self-service. \n> * Each maps to specific subagents and MCP servers.\n\n<hr>\n\nThe engineering model is useful only if it turns into a build order. This portfolio identifies the first workflows worth funding, who should own them, and what human decision point keeps each one safe.\n\n## How to read this list\n\nEach use case below is **a specific Claude Code workflow** — a subagent (or small set of subagents), a set of MCP servers it depends on, and the human accountability point. This is what to build and in what order. The workflows compose: the legacy-understanding subagents feed the modernization-documentation workflow, which feeds the test-generation workflow, and so on.\n\n| Use case | Owner | When to build |\n| --- | --- | --- |\n| 1. Legacy understanding assistant | Platform | First quarter |\n| 2. Modernization documentation | Platform | First quarter |\n| 3. Test generation | Platform + QA | First quarter |\n| 4. Service template generation | Platform | Second quarter |\n| 5. Pull request review assistance | Platform | Second quarter |\n| 6. Developer self-service knowledge | Platform + DevEx | Continuous |\n\n## 1. Legacy understanding assistant\n\n### What it does\n\nEngineers ask questions about the legacy estate and get answers grounded in current code, schemas, and runbooks — not in stale wiki pages.\n\n* \"Where is customer pricing calculated?\"\n* \"Which stored procedures update order status?\"\n* \"Which services consume this Kafka topic?\"\n* \"What workflows call this Lambda?\"\n* \"Which repositories implement this business capability?\"\n\n### Claude Code implementation\n\n* **Subagents**: `legacy-explorer`, `stored-proc-summarizer`, `event-flow-mapper`\n* **MCP servers**: repo (GitHub/GitLab), DB schema, Kafka/Schema Registry, AWS, service catalog\n* **Human accountability**: domain experts validate business interpretation; platform team owns the subagents\n\n### Why it goes first\n\nWithout this, every other workflow runs blind. The investment in the underlying MCP servers — repo, schema, Kafka — is what enables every later use case.\n\n## 2. Modernization documentation\n\n### What it does\n\nFor every modernization candidate, Claude Code produces a complete dossier:\n\n* current-state summary\n* dependency map\n* risks\n* test gaps\n* proposed target design\n* migration steps\n* rollback strategy\n* ADR draft\n\n### Claude Code implementation\n\n* **Subagent**: `modernization-doc-builder` (composes outputs from legacy-understanding subagents)\n* **MCP servers**: same as use case 1 + ADR/docs MCP server\n* **Output**: a markdown dossier committed to the repo as a PR; ADR draft committed to `docs/adr/`\n* **Human accountability**: architect approves the ADR; platform team approves the migration plan\n\n### Why this matters\n\nModernization without documentation is what produced the current legacy estate. Making documentation a *byproduct of the workflow* — not a separate manual step — is how we avoid repeating that.\n\n## 3. Test generation and characterization\n\n### What it does\n\nThis should be one of the first production-grade Claude Code uses. Focus areas:\n\n* stored procedure tests\n* Java service contract tests\n* Kafka consumer/producer tests\n* Node.js workflow tests\n* regression tests before refactoring\n* golden-master tests for legacy behavior\n\n### Claude Code implementation\n\n* **Subagent**: `characterization-test-writer` — reads code (and DB schema, for stored procs), generates test files, runs them to confirm they pass against current behavior\n* **MCP servers**: repo, DB schema; AWS for any test-double setup\n* **Permission mode**: `acceptEdits` is acceptable here because the test files are new code, not modifications to behavior. Generated tests still go through PR review.\n* **Human accountability**: QA approves the scenarios and edge cases; the test author owns ongoing maintenance\n\n### Why this is high-leverage\n\nTests are the unblocker for every other modernization workflow. Without them, \"wrap first, extract second\" is too risky to start.\n\n## 4. Service template generation\n\n### What it does\n\nWhen an engineer needs a new service, Claude Code generates it from the approved template — never from scratch. Templates include:\n\n* Dockerfile\n* ECS task definition\n* health checks\n* logging\n* metrics\n* tracing\n* security defaults\n* Kafka integration\n* CI/CD pipeline\n* README\n* runbook\n* ADR\n\n### Claude Code implementation\n\n* **Subagent**: `ecs-template-generator` (and language-specific variants: `java-service-generator`, `node-service-generator`)\n* **MCP servers**: AWS (for VPC/SG lookup), service catalog (to register the new service)\n* **Permission mode**: `acceptEdits` within a new directory; `default` (i.e. ask for approval) for any modification outside it\n* **Human accountability**: platform team owns the templates; service owner approves the generated PR\n\n### The strategic property\n\nOnce `ecs-template-generator` exists, \"create a new service\" is no longer a place where teams diverge. The template is the standard, and the subagent is how the standard gets applied. Drift becomes much harder.\n\n## 5. Pull request review assistance\n\n### What it does\n\nWhen a PR is opened, a Claude Code subagent posts a first-pass review:\n\n* code summary\n* risk areas\n* missing tests\n* security concerns\n* inconsistent patterns\n* migration checklist compliance\n\nFinal approval remains human. Always.\n\n### Claude Code implementation\n\n* **Subagent**: `pr-review-helper` (or domain-specific variants like `kafka-contract-reviewer`, invoked when the diff touches Kafka code)\n* **MCP servers**: repo, service catalog (to identify owners), DB schema (to check migration impact)\n* **Trigger**: PR-opened webhook → headless Claude Code session → review comment posted\n* **Human accountability**: human reviewers own approval; the subagent is a checklist-runner, not a gatekeeper\n\n### What it doesn't do\n\nIt does not auto-approve. It does not auto-merge. It does not block PRs (that's CI's job). It saves human reviewers from spending the first thirty minutes of a review re-discovering things the subagent could have flagged immediately.\n\n## 6. Developer self-service knowledge\n\n### What it does\n\nClaude Code answers questions about internal standards from a curated knowledge base — so engineers stop asking the same questions in Slack:\n\n* \"How do I create a new ECS service?\"\n* \"How do I publish a Kafka event?\"\n* \"What is the standard logging format?\"\n* \"How do I migrate a GitLab service to the target platform?\"\n* \"What is the approved pattern for retries?\"\n\n### Claude Code implementation\n\n* **Mechanism**: org-level `CLAUDE.md` distributed to every repo + an internal docs MCP server that indexes runbooks, ADRs, and standards docs\n* **Subagent (optional)**: `internal-docs-search` — for queries that span multiple sources, this subagent can search across all of them in parallel\n* **Human accountability**: DevEx owns the docs MCP server's freshness; platform team owns `CLAUDE.md` content\n\n### Why this is \"continuous\"\n\nUnlike the other use cases, this one doesn't have a launch date. It improves whenever someone updates a runbook, adds an ADR, or refines `CLAUDE.md`. The investment is curating the knowledge base — Claude Code is just the interface to it.\n"}]}</script>
<script>
    (function () {
        const data = JSON.parse(document.getElementById('data').textContent);
        const root = document.getElementById('content');

        const tagsHost = document.getElementById('tags');
        (data.tags || []).forEach(function (t) {
            const span = document.createElement('span');
            span.className = 'tag';
            span.textContent = t;
            tagsHost.appendChild(span);
        });

        // Minimal markdown renderer. Supports: ATX headings, paragraphs, blockquotes,
        // unordered/ordered lists, fenced code, inline code, bold/italic, links, images, hr.
        // Sufficient for the posts in this repo; replace with a fuller parser if needed.
        function renderMarkdown(src) {
            const lines = src.replace(/\r\n/g, '\n').split('\n');
            const out = [];
            let i = 0;

            const bullet = /^(\s*)([-*])\s+(.*)$/;
            const ordered = /^(\s*)(\d+)\.\s+(.*)$/;
            const tableRow = /^\s*\|(.+)\|\s*$/;
            const tableSep = /^\s*\|?\s*:?-{3,}:?\s*(\|\s*:?-{3,}:?\s*)+\|?\s*$/;

            function splitRow(s) {
                let t = s.trim();
                if (t.startsWith('|')) t = t.slice(1);
                if (t.endsWith('|')) t = t.slice(0, -1);
                return t.split('|').map(c => c.trim());
            }

            function inline(s) {
                // Posts are trusted content, so raw HTML passes through unescaped
                // (some posts embed inline <blockquote>, <div>, etc.).
                // Stray ampersands still get fixed up.
                s = s.replace(/&(?![a-zA-Z]+;|#\d+;)/g, '&amp;');
                s = s.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img alt="$1" src="$2">');
                s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
                s = s.replace(/`([^`]+)`/g, function (_, c) {
                    return '<code>' + c.replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</code>';
                });
                s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
                s = s.replace(/(^|[^*])\*([^*\n]+)\*/g, '$1<em>$2</em>');
                return s;
            }

            while (i < lines.length) {
                const line = lines[i];
                if (!line.trim()) {
                    i++;
                    continue;
                }

                const fence = line.match(/^```(\w*)\s*$/);
                if (fence) {
                    i++;
                    const buf = [];
                    while (i < lines.length && !/^```\s*$/.test(lines[i])) {
                        buf.push(lines[i]);
                        i++;
                    }
                    i++;
                    const escaped = buf.join('\n').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                    const cls = fence[1] ? ' class="lang-' + fence[1] + '"' : '';
                    out.push('<pre><code' + cls + '>' + escaped + '</code></pre>');
                    continue;
                }

                const h = line.match(/^(#{1,6})\s+(.*)$/);
                if (h) {
                    out.push('<h' + h[1].length + '>' + inline(h[2]) + '</h' + h[1].length + '>');
                    i++;
                    continue;
                }

                if (/^\s*(?:-\s*){3,}\s*$/.test(line) || /^\s*\*{3,}\s*$/.test(line)) {
                    out.push('<hr>');
                    i++;
                    continue;
                }

                if (/^>\s?/.test(line)) {
                    const buf = [];
                    while (i < lines.length && /^>\s?/.test(lines[i])) {
                        buf.push(lines[i].replace(/^>\s?/, ''));
                        i++;
                    }
                    out.push('<blockquote>' + renderMarkdown(buf.join('\n')) + '</blockquote>');
                    continue;
                }

                if (tableRow.test(line) && i + 1 < lines.length && tableSep.test(lines[i + 1])) {
                    const headers = splitRow(line);
                    i += 2;
                    const rows = [];
                    while (i < lines.length && tableRow.test(lines[i])) {
                        rows.push(splitRow(lines[i]));
                        i++;
                    }
                    let html = '<table><thead><tr>';
                    headers.forEach(h => { html += '<th>' + inline(h) + '</th>'; });
                    html += '</tr></thead><tbody>';
                    rows.forEach(r => {
                        html += '<tr>';
                        r.forEach(c => { html += '<td>' + inline(c) + '</td>'; });
                        html += '</tr>';
                    });
                    html += '</tbody></table>';
                    out.push(html);
                    continue;
                }

                if (bullet.test(line) || ordered.test(line)) {
                    const isOrdered = ordered.test(line);
                    const re = isOrdered ? ordered : bullet;
                    const items = [];
                    while (i < lines.length && re.test(lines[i])) {
                        const m = lines[i].match(re);
                        let item = m[3];
                        i++;
                        while (i < lines.length && lines[i].trim() && !bullet.test(lines[i]) && !ordered.test(lines[i])) {
                            item += '\n' + lines[i].trim();
                            i++;
                        }
                        items.push('<li>' + inline(item) + '</li>');
                    }
                    out.push((isOrdered ? '<ol>' : '<ul>') + items.join('') + (isOrdered ? '</ol>' : '</ul>'));
                    continue;
                }

                const buf = [line];
                i++;
                while (i < lines.length && lines[i].trim() && !/^#{1,6}\s/.test(lines[i]) && !/^>\s?/.test(lines[i]) && !bullet.test(lines[i]) && !ordered.test(lines[i]) && !/^```/.test(lines[i]) && !tableRow.test(lines[i])) {
                    buf.push(lines[i]);
                    i++;
                }
                out.push('<p>' + inline(buf.join(' ')) + '</p>');
            }
            return out.join('\n');
        }

        // Block dispatcher. New block types plug in here.
        const renderers = {
            markdown: function (block) {
                const div = document.createElement('div');
                div.innerHTML = renderMarkdown(block.content);
                return div;
            },
            mermaid: function (block) {
                // Mermaid scans elements with class "mermaid" whose textContent
                // is the diagram source. We collect these nodes and run
                // mermaid.run() once after all blocks are in the DOM.
                const div = document.createElement('div');
                div.className = 'mermaid';
                div.textContent = block.content;
                return div;
            },
            'force-graph': function (block) {
                // build.py emits parsed JSON: {nodes:[{id,size}], links:[{source,target}]}.
                // We instantiate force-graph after the container is in the DOM
                // so it can measure its own width.
                const div = document.createElement('div');
                div.className = 'force-graph';
                const data = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.ForceGraph) return;
                    const maxSize = data.nodes.reduce((m, n) => Math.max(m, n.size || 1), 1);
                    window.ForceGraph()(div)
                        .graphData(data)
                        .width(div.clientWidth)
                        .height(div.clientHeight)
                        .nodeRelSize(4)
                        .nodeVal(n => Math.max(20 * (n.size || 1) / maxSize, 0.001))
                        .nodeLabel(n => n.id + ' (' + (n.size || 1) + ')')
                        .nodeColor(() => 'rgba(135, 206, 235, 0.7)')
                        .linkColor(() => 'rgba(60, 60, 60, 0.4)')
                        .linkDirectionalArrowLength(4)
                        .linkDirectionalArrowRelPos(1)
                        .linkWidth(1);
                });
                return div;
            },
            'bubble-chart': function (block) {
                // build.py emits {nodes:[{name,size}]}. Renders a D3 circle-pack
                // SVG (same shape as the obren.io reference, just inline).
                const wrap = document.createElement('div');
                wrap.className = 'bubble-chart';
                const payload = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.d3) return;
                    const diameter = 480;
                    const fill = '#c0deed';
                    const textColor = '#111111';
                    const fontSize = 12;

                    const svg = window.d3.select(wrap).append('svg')
                        .attr('viewBox', '0 0 ' + diameter + ' ' + diameter)
                        .attr('width', diameter)
                        .attr('height', diameter);

                    const root = window.d3.hierarchy({children: payload.nodes})
                        .sum(d => d.size || 0)
                        .sort((a, b) => b.value - a.value);

                    window.d3.pack().size([diameter, diameter]).padding(2)(root);

                    const node = svg.selectAll('g')
                        .data(root.leaves())
                        .enter().append('g')
                        .attr('transform', d => 'translate(' + d.x + ',' + d.y + ')');

                    node.append('title').text(d => d.data.name + ': ' + d.value);
                    node.append('circle').attr('r', d => d.r).style('fill', fill);
                    node.append('text')
                        .attr('dy', '.3em')
                        .style('text-anchor', 'middle')
                        .style('fill', textColor)
                        .style('font-size', fontSize + 'px')
                        .text(d => d.data.name.substring(0, Math.max(0, Math.floor(d.r / 3))));
                });
                return wrap;
            }
        };

        const mermaidNodes = [];
        data.blocks.forEach(function (block) {
            const r = renderers[block.type];
            if (!r) {
                const pre = document.createElement('pre');
                pre.textContent = '[unknown block type: ' + block.type + ']';
                root.appendChild(pre);
                return;
            }
            const node = r(block);
            if (node instanceof Node) {
                root.appendChild(node);
                if (block.type === 'mermaid') mermaidNodes.push(node);
            }
        });

        if (mermaidNodes.length && window.mermaid) {
            window.mermaid.initialize({startOnLoad: false, theme: 'default'});
            window.mermaid.run({nodes: mermaidNodes});
        }
    })();
</script>
