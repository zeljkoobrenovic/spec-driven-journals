<script id="data" type="application/json">{"meta": {"id": "ORG-ORG-ONBOARDING-AND-RAMP-UP", "status": "draft:gray", "title": "Onboarding and Ramp-Up", "date": "2026-05-17", "author": "Organization Org Design", "permalink": "onboarding-and-ramp-up", "timetoread": "13 min", "excerpt": "Organization engineering will treat onboarding as a structured ramp-up system, not a first-day orientation event. Every new hire should receive role context, team context, technical setup, a buddy, manager check-ins, learning path, and 30-60-90 day outcomes.", "tags": "org-design, onboarding, ramp-up, hiring, team-health, learning", "icon": "assets/icons/onboarding-and-ramp-up.png", "logo": "assets/images/onboarding-and-ramp-up/logo.jpeg", "logo_credit": "Image generated by Google Gemini (gemini-3-pro-image-preview)"}, "tags": ["org-design", "onboarding", "ramp-up", "hiring", "team-health", "learning"], "modalities": [{"key": "index", "label": "Article", "meta": {}, "blocks": [{"type": "markdown", "content": "> **Status**: DRAFT\n>\n> **Decision**: Organization engineering will treat onboarding as a structured ramp-up system. Every new engineer, manager, staff-plus engineer, or technical specialist receives a prepared start, clear ownership context, access setup, a buddy, manager check-ins, a learning path, and 30-60-90 day outcomes. Onboarding is owned by the hiring manager and team, supported by people operations and communities of practice.\n\n## Decision\n\nAdopt a **structured onboarding and ramp-up model**.\n\nThe model covers:\n\n* preboarding before the first day;\n* first-day orientation and access readiness;\n* team and domain context;\n* technical environment setup;\n* buddy or mentor support;\n* manager check-ins and role expectations;\n* first contribution path;\n* 30-60-90 day outcomes;\n* feedback from the new hire to improve the system.\n\nOnboarding is not complete when accounts are created. It is complete when the person can navigate the team, make appropriate contributions, ask for help safely, and understand what success looks like in the role.\n\n## How to Read This Decision\n\n| What it says | What it does **not** say |\n| --- | --- |\n| Onboarding is a months-long ramp-up system. | New hires should wait months before contributing. |\n| Managers and teams own role onboarding. | HR alone is responsible for onboarding success. |\n| Buddies help social and practical integration. | Buddies replace manager accountability. |\n| 30-60-90 outcomes create clarity. | Every new hire follows identical tasks. |\n| Onboarding should be measured and improved. | Ramp-up becomes surveillance. |\n\nGood onboarding makes the implicit explicit.\n\n## How to Use This Decision\n\nUse this decision to:\n\n* distinguish orientation, team onboarding, technical onboarding, and role ramp-up;\n* design a 30-60-90 day plan for an engineering role;\n* explain the roles of manager, buddy, team, HR, and communities of practice;\n* recognise onboarding gaps as system failures, not personal weakness;\n* use new-hire feedback to improve documentation, tooling, and team clarity.\n\nThe practical lesson is that onboarding teaches the organisation where its knowledge is hidden.\n\n## One-Minute Mental Model\n\nOnboarding is **controlled exposure to context**.\n\nNew hires need enough context to contribute, but not all context at once. They need the company story, team mission, domain language, systems, tools, rituals, decision records, production expectations, and social norms. The ramp-up system sequences that context so the person can build confidence and judgement without relying on luck.\n\nIf a new hire has to discover every important fact through interruption and guesswork, onboarding has failed even if everyone is friendly.\n\n## Rationale\n\nHiring creates potential. Onboarding converts that potential into contribution.\n\nWeak onboarding has predictable costs:\n\n* access and equipment are not ready;\n* the new hire reads stale documents and misses tacit knowledge;\n* the manager is busy and assumes the team will absorb the person;\n* the first task is either trivial or dangerously ambiguous;\n* cultural norms are learned through mistakes;\n* the person does not know whether they are progressing well;\n* the organisation never learns which parts of the system are confusing.\n\nStructured onboarding reduces time-to-context, improves belonging, and turns new-hire confusion into a source of organisational improvement.\n\n## Ramp-Up Stages\n\n| Stage | Purpose | Typical outputs |\n| --- | --- | --- |\n| Preboarding | Reduce avoidable first-day friction. | Welcome note, schedule, equipment/access readiness, buddy assigned. |\n| First week | Build orientation, safety, and working setup. | Team introductions, local dev environment, key docs, first small contribution. |\n| First 30 days | Understand team mission, systems, rituals, and role expectations. | 30-day check-in, learning gaps, initial contribution evidence. |\n| First 60 days | Grow ownership in bounded work. | Meaningful delivery, incident/operational exposure, feedback loop. |\n| First 90 days | Confirm role fit, expectations, and development direction. | 90-day review, updated growth plan, onboarding retrospective. |\n\nThe timeline varies by level and role. A staff engineer, engineering manager, or platform specialist may need a different first 90 days from a junior engineer.\n\n## 30-60-90 Plan Template\n\nUse this structure for each new hire:\n\n| Timeframe | Focus | Example outcomes |\n| --- | --- | --- |\n| First 30 days | Orientation and context. | Can explain team mission, domain basics, key systems, delivery path, and support model. |\n| First 60 days | Bounded contribution. | Delivers meaningful work with support, participates in review, understands common failure modes. |\n| First 90 days | Increasing ownership. | Owns a small area, identifies improvement opportunities, receives clear feedback on role fit and growth. |\n\nThe plan should include learning goals and contribution goals. A plan with only learning creates passivity; a plan with only delivery creates unnecessary stress.\n\n## Role Responsibilities\n\n| Role | Responsibility |\n| --- | --- |\n| Hiring manager | Owns ramp-up plan, role expectations, check-ins, feedback, and integration. |\n| Buddy | Helps with practical questions, social context, rituals, and navigation. |\n| Team | Makes work visible, explains norms, pairs, reviews, and welcomes questions. |\n| People operations | Handles employment, policy, benefits, compliance, and company orientation. |\n| Communities of practice | Provide craft onboarding, standards, learning paths, and contacts. |\n| New hire | Asks questions, follows the learning path, gives feedback, and takes increasing ownership. |\n\nNo single role carries onboarding alone.\n\n## Onboarding by Role Type\n\nDifferent roles need different ramp-up emphasis:\n\n| Role type | Extra onboarding focus |\n| --- | --- |\n| Junior engineer | Pairing, feedback safety, development workflow, code review norms, foundational domain vocabulary. |\n| Senior engineer | Ownership boundaries, production expectations, architectural context, stakeholder map. |\n| Staff-plus engineer | Cross-team history, decision landscape, unresolved architecture tensions, influence network. |\n| Engineering manager | Team health, people context, performance history, planning cadence, product/tech lead partnership. |\n| Platform engineer | Internal customers, support model, capability lifecycle, adoption metrics, paved-road constraints. |\n\nUsing the same onboarding plan for every role hides the real learning curve.\n\n## Engineering Onboarding Checklist\n\nMinimum engineering onboarding should include:\n\n* team mission and ownership boundaries;\n* product/domain overview;\n* system map and important ADRs;\n* local development setup;\n* build, test, deploy, and observability paths;\n* production readiness and on-call/support expectations;\n* code review norms;\n* security and compliance basics;\n* team rituals and decision practices;\n* first contribution path;\n* escalation and help channels.\n\nThe checklist should be maintained by the team. A stale onboarding checklist is a signal that team knowledge is decaying.\n\n## New-Hire Feedback Loop\n\nAsk the new hire these questions at 30, 60, and 90 days:\n\n| Question | Why it matters |\n| --- | --- |\n| What confused you more than it should have? | Finds missing or stale context. |\n| Which setup step took too long? | Reveals tooling and access friction. |\n| Which document was most useful? | Shows what to preserve and promote. |\n| Which document was misleading or stale? | Finds documentation debt. |\n| Where did you hesitate to ask for help? | Finds safety and support gaps. |\n| What should the next new hire receive earlier? | Converts fresh eyes into system improvement. |\n\nOnboarding should improve after every hire.\n\n## Worked Example\n\nA senior engineer joins a platform team.\n\nWeak onboarding:\n\n* The manager says \"read the docs and join standup\".\n* Access takes three days.\n* The first task requires tribal knowledge.\n* The engineer does not know which platform capabilities are active, deprecated, or contested.\n\nStructured onboarding:\n\n| Time | Experience |\n| --- | --- |\n| Before day one | Equipment, access, schedule, buddy, and team mission sent. |\n| Week one | Pair on a small platform change and review capability lifecycle records. |\n| Day 30 | Explain the platform product surface and support model back to the team. |\n| Day 60 | Own a bounded improvement to developer experience. |\n| Day 90 | Lead a small platform adoption review with consuming-team feedback. |\n\nThe second version teaches the role through real work, not passive reading.\n\n## Anti-Patterns\n\n* **Orientation equals onboarding.** Paperwork and presentations are mistaken for ramp-up.\n* **Sink or swim.** New hires are expected to prove themselves by navigating ambiguity alone.\n* **Buddy as dumping ground.** The buddy carries all practical, social, and role support.\n* **Stale docs gauntlet.** New hires are sent through documents nobody has tested recently.\n* **No feedback until probation.** The person learns too late whether they are meeting expectations.\n* **One-size-fits-all ramp-up.** Juniors, seniors, managers, and staff engineers get the same plan.\n\n## Practice Exercise\n\nPick one role in the team and design the first 90 days:\n\n1. Name the role's first meaningful contribution.\n2. List the five pieces of context the person must understand first.\n3. Decide who explains each piece of context.\n4. Choose one buddy and one manager check-in rhythm.\n5. Write the day-30, day-60, and day-90 outcomes.\n6. Identify which existing document must be updated before the person starts.\n\n## Discussion Prompts\n\nUse these prompts when improving onboarding:\n\n* What does a new hire need before day one to feel expected and prepared?\n* Which knowledge is still tribal and should become documentation or a walkthrough?\n* What is the first meaningful contribution for this role?\n* What should the person understand by day 30, 60, and 90?\n* How will the manager know whether ramp-up is healthy?\n* What did the last new hire find confusing, and did we fix it?\n\n## Related Records\n\n* [Structured Hiring and Selection](structured-hiring-and-selection.html) - hiring should hand useful context into onboarding.\n* [Dual Career Paths and Transparent Progression](career-paths-and-progression.html) - onboarding expectations should match level and role.\n* [Team Size and Composition Guardrails](team-size-and-composition.html) - onboarding burden is part of team capacity.\n* [Communities of Practice and Chapters for Shared Craft](communities-of-practice-and-chapters.html) - communities support craft onboarding.\n* [Markdown Records as the Default Format for Technical Decisions, Strategies, and Discussions](../foundations/markdown-records.html) - durable records reduce hidden context.\n\n## Scope and Revisiting\n\nThis ADR applies to onboarding engineering hires, internal transfers, managers, and senior technical roles. Company-wide HR orientation and legal requirements remain owned by the appropriate people/HR functions.\n\nRevisit if new-hire ramp-up is slow, onboarding feedback repeats the same problems, teams lack onboarding capacity, or role expectations are unclear during the first 90 days.\n\n## Authoritative References\n\n* SHRM, [Complete Employee Onboarding Guide](https://www.shrm.org/topics-tools/topics/onboarding).\n* Atlassian Team Playbook, [User Manual play](https://www.atlassian.com/team-playbook/plays/my-user-manual).\n* Organization Foundation, [Markdown Records as the Default Format for Technical Decisions, Strategies, and Discussions](../foundations/markdown-records.html).\n"}]}]}</script>
<script>
    (function () {
        const data = JSON.parse(document.getElementById('data').textContent);
        const root = document.getElementById('content');

        const postId = (data.meta && data.meta.id) ? String(data.meta.id) : '';
        const postStatusRaw = (data.meta && data.meta.status) ? String(data.meta.status) : '';
        if (postId || postStatusRaw) {
            const header = document.getElementById('post-header');
            let sectionEl = header.querySelector('p.section');
            if (!sectionEl) {
                sectionEl = document.createElement('p');
                sectionEl.className = 'section';
                header.insertBefore(sectionEl, header.firstChild);
            }
            // Status pill goes first, then a " / " separator before the existing
            // content (section name and/or id).
            if (postStatusRaw) {
                const parts = postStatusRaw.split(':');
                const statusName = parts[0].trim();
                const statusColor = (parts[1] || '').trim();
                const wrap = document.createElement('span');
                wrap.className = 'post-status';
                const dot = document.createElement('span');
                dot.className = 'status-dot';
                if (statusColor) dot.style.background = statusColor;
                wrap.appendChild(dot);
                wrap.appendChild(document.createTextNode(statusName));
                if (sectionEl.firstChild) {
                    sectionEl.insertBefore(document.createTextNode(' • '), sectionEl.firstChild);
                    sectionEl.insertBefore(wrap, sectionEl.firstChild);
                } else {
                    sectionEl.appendChild(wrap);
                }
            }
            if (postId) {
                if (sectionEl.firstChild) sectionEl.appendChild(document.createTextNode(' • '));
                sectionEl.appendChild(document.createTextNode(postId));
            }
        }

        const tagsHost = document.getElementById('tags');
        (data.tags || []).forEach(function (t) {
            const span = document.createElement('span');
            span.className = 'tag';
            span.textContent = t;
            tagsHost.appendChild(span);
        });

        // Minimal markdown renderer. Supports: ATX headings, paragraphs, blockquotes,
        // unordered/ordered lists, fenced code, inline code, bold/italic/strikethrough, links, images, hr.
        // Sufficient for the posts in this repo; replace with a fuller parser if needed.
        function renderMarkdown(src) {
            const lines = src.replace(/\r\n/g, '\n').split('\n');
            const out = [];
            let i = 0;

            const bullet = /^(\s*)([-*])\s+(.*)$/;
            const ordered = /^(\s*)(\d+)\.\s+(.*)$/;
            const tableRow = /^\s*\|(.+)\|\s*$/;
            const tableSep = /^\s*\|?\s*:?-{3,}:?\s*(\|\s*:?-{3,}:?\s*)+\|?\s*$/;

            function splitRow(s) {
                let t = s.trim();
                if (t.startsWith('|')) t = t.slice(1);
                if (t.endsWith('|')) t = t.slice(0, -1);
                return t.split('|').map(c => c.trim());
            }

            function inline(s) {
                // Posts are trusted content, so raw HTML passes through unescaped
                // (some posts embed inline <blockquote>, <div>, etc.).
                // Stray ampersands still get fixed up.
                s = s.replace(/&(?![a-zA-Z]+;|#\d+;)/g, '&amp;');
                s = s.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<a class="image-link" href="$2" target="_blank" rel="noopener noreferrer"><img alt="$1" src="$2"></a>');
                s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
                s = s.replace(/`([^`]+)`/g, function (_, c) {
                    return '<code>' + c.replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</code>';
                });
                s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
                s = s.replace(/~~([^~\n]+)~~/g, '<del>$1</del>');
                s = s.replace(/(^|[^*])\*([^*\n]+)\*/g, '$1<em>$2</em>');
                return s;
            }

            while (i < lines.length) {
                const line = lines[i];
                if (!line.trim()) {
                    i++;
                    continue;
                }

                const fence = line.match(/^```(\w*)\s*$/);
                if (fence) {
                    i++;
                    const buf = [];
                    while (i < lines.length && !/^```\s*$/.test(lines[i])) {
                        buf.push(lines[i]);
                        i++;
                    }
                    i++;
                    const escaped = buf.join('\n').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                    const cls = fence[1] ? ' class="lang-' + fence[1] + '"' : '';
                    out.push('<pre><code' + cls + '>' + escaped + '</code></pre>');
                    continue;
                }

                const h = line.match(/^(#{1,6})\s+(.*)$/);
                if (h) {
                    out.push('<h' + h[1].length + '>' + inline(h[2]) + '</h' + h[1].length + '>');
                    i++;
                    continue;
                }

                if (/^\s*(?:-\s*){3,}\s*$/.test(line) || /^\s*\*{3,}\s*$/.test(line)) {
                    out.push('<hr>');
                    i++;
                    continue;
                }

                if (/^>\s?/.test(line)) {
                    const buf = [];
                    while (i < lines.length && /^>\s?/.test(lines[i])) {
                        buf.push(lines[i].replace(/^>\s?/, ''));
                        i++;
                    }
                    out.push('<blockquote>' + renderMarkdown(buf.join('\n')) + '</blockquote>');
                    continue;
                }

                if (tableRow.test(line) && i + 1 < lines.length && tableSep.test(lines[i + 1])) {
                    const headers = splitRow(line);
                    i += 2;
                    const rows = [];
                    while (i < lines.length && tableRow.test(lines[i])) {
                        rows.push(splitRow(lines[i]));
                        i++;
                    }
                    let html = '<table><thead><tr>';
                    headers.forEach(h => {
                        html += '<th>' + inline(h) + '</th>';
                    });
                    html += '</tr></thead><tbody>';
                    rows.forEach(r => {
                        html += '<tr>';
                        r.forEach(c => {
                            html += '<td>' + inline(c) + '</td>';
                        });
                        html += '</tr>';
                    });
                    html += '</tbody></table>';
                    out.push(html);
                    continue;
                }

                if (bullet.test(line) || ordered.test(line)) {
                    // Indent of the first bullet defines this list's base level.
                    // Deeper-indented bullets become nested lists (rendered by
                    // recursing into renderMarkdown). Same-or-less indent at a
                    // bullet starts a sibling item (or ends the list).
                    const firstMatch = line.match(bullet) || line.match(ordered);
                    const baseIndent = firstMatch[1].length;
                    const isOrdered = ordered.test(line);
                    const items = [];
                    while (i < lines.length) {
                        const cur = lines[i];
                        if (!cur.trim()) {
                            // blank line breaks the list (matches CommonMark-ish behaviour)
                            i++;
                            break;
                        }
                        const mBul = cur.match(bullet);
                        const mOrd = cur.match(ordered);
                        const m = mBul || mOrd;
                        if (!m) break;
                        if (m[1].length < baseIndent) break;
                        if (m[1].length > baseIndent) break; // shouldn't happen at top of loop
                        // Same-type check: switching between -/* and 1. closes the list
                        if (isOrdered !== !!mOrd) break;

                        const itemBuf = [m[3]];
                        const nestedBuf = [];
                        i++;
                        while (i < lines.length) {
                            const nxt = lines[i];
                            if (!nxt.trim()) break;
                            const nBul = nxt.match(bullet);
                            const nOrd = nxt.match(ordered);
                            const nm = nBul || nOrd;
                            if (nm) {
                                if (nm[1].length > baseIndent) {
                                    // nested list line — dedent and stash
                                    nestedBuf.push(nxt.slice(baseIndent + 2));
                                    i++;
                                    continue;
                                }
                                // sibling or end of list
                                break;
                            }
                            // Plain continuation text
                            if (nestedBuf.length) {
                                // continuation inside the nested block
                                nestedBuf.push(nxt.slice(baseIndent + 2));
                            } else {
                                itemBuf.push(nxt.trim());
                            }
                            i++;
                        }

                        let liHtml = inline(itemBuf.join('\n'));
                        if (nestedBuf.length) {
                            liHtml += renderMarkdown(nestedBuf.join('\n'));
                        }
                        items.push('<li>' + liHtml + '</li>');
                    }
                    out.push((isOrdered ? '<ol>' : '<ul>') + items.join('') + (isOrdered ? '</ol>' : '</ul>'));
                    continue;
                }

                const buf = [line];
                i++;
                while (i < lines.length && lines[i].trim() && !/^#{1,6}\s/.test(lines[i]) && !/^>\s?/.test(lines[i]) && !bullet.test(lines[i]) && !ordered.test(lines[i]) && !/^```/.test(lines[i]) && !tableRow.test(lines[i])) {
                    buf.push(lines[i]);
                    i++;
                }
                out.push('<p>' + inline(buf.join(' ')) + '</p>');
            }
            return out.join('\n');
        }

        // Block dispatcher. New block types plug in here.
        const renderers = {
            markdown: function (block) {
                const div = document.createElement('div');
                div.innerHTML = renderMarkdown(block.content);
                return div;
            },
            mermaid: function (block) {
                // Mermaid scans elements with class "mermaid" whose textContent
                // is the diagram source. We collect these nodes and run
                // mermaid.run() once after all blocks are in the DOM.
                const div = document.createElement('div');
                div.className = 'mermaid';
                div.textContent = block.content;
                return div;
            },
            'force-graph': function (block) {
                // build.py emits parsed JSON: {nodes:[{id,size}], links:[{source,target}]}.
                // We instantiate force-graph after the container is in the DOM
                // so it can measure its own width.
                const div = document.createElement('div');
                div.className = 'force-graph';
                const data = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.ForceGraph) return;
                    const maxSize = data.nodes.reduce((m, n) => Math.max(m, n.size || 1), 1);
                    window.ForceGraph()(div)
                        .graphData(data)
                        .width(div.clientWidth)
                        .height(div.clientHeight)
                        .nodeRelSize(4)
                        .nodeVal(n => Math.max(20 * (n.size || 1) / maxSize, 0.001))
                        .nodeLabel(n => n.id + ' (' + (n.size || 1) + ')')
                        .nodeColor(() => 'rgba(135, 206, 235, 0.7)')
                        .linkColor(() => 'rgba(60, 60, 60, 0.4)')
                        .linkDirectionalArrowLength(4)
                        .linkDirectionalArrowRelPos(1)
                        .linkWidth(1);
                });
                return div;
            },
            'bubble-chart': function (block) {
                // build.py emits {nodes:[{name,size}]}. Renders a D3 circle-pack
                // SVG (same shape as the obren.io reference, just inline).
                const wrap = document.createElement('div');
                wrap.className = 'bubble-chart';
                const payload = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.d3) return;
                    const diameter = 480;
                    const fill = '#c0deed';
                    const textColor = '#111111';
                    const fontSize = 12;

                    const svg = window.d3.select(wrap).append('svg')
                        .attr('viewBox', '0 0 ' + diameter + ' ' + diameter)
                        .attr('width', diameter)
                        .attr('height', diameter);

                    const root = window.d3.hierarchy({children: payload.nodes})
                        .sum(d => d.size || 0)
                        .sort((a, b) => b.value - a.value);

                    window.d3.pack().size([diameter, diameter]).padding(2)(root);

                    const node = svg.selectAll('g')
                        .data(root.leaves())
                        .enter().append('g')
                        .attr('transform', d => 'translate(' + d.x + ',' + d.y + ')');

                    node.append('title').text(d => d.data.name + ': ' + d.value);
                    node.append('circle').attr('r', d => d.r).style('fill', fill);
                    node.append('text')
                        .attr('dy', '.3em')
                        .style('text-anchor', 'middle')
                        .style('fill', textColor)
                        .style('font-size', fontSize + 'px')
                        .text(d => d.data.name.substring(0, Math.max(0, Math.floor(d.r / 3))));
                });
                return wrap;
            }
        };

        // Render one modality's blocks into a host element. Mermaid runs
        // scoped to just the nodes created here, so lazily rendered tabs get
        // their diagrams on first activation.
        let mermaidInitialized = false;
        function renderBlocksInto(blocks, host) {
            const mermaidNodes = [];
            blocks.forEach(function (block) {
                const r = renderers[block.type];
                if (!r) {
                    const pre = document.createElement('pre');
                    pre.textContent = '[unknown block type: ' + block.type + ']';
                    host.appendChild(pre);
                    return;
                }
                const node = r(block);
                if (node instanceof Node) {
                    host.appendChild(node);
                    if (block.type === 'mermaid') mermaidNodes.push(node);
                }
            });
            if (mermaidNodes.length && window.mermaid) {
                if (!mermaidInitialized) {
                    window.mermaid.initialize({startOnLoad: false, theme: 'default'});
                    mermaidInitialized = true;
                }
                window.mermaid.run({nodes: mermaidNodes});
            }
        }

        // Modality tabs. One <article class="pane"> per modality; panes are
        // rendered lazily on first activation (force-graph / D3 / mermaid
        // need a visible, measurable container). With a single modality the
        // tab bar stays hidden and the page looks exactly like before.
        const mods = data.modalities;
        const tabBar = document.getElementById('modality-tabs');
        const panes = {};
        const tabButtons = {};
        const renderedPanes = {};

        mods.forEach(function (m) {
            const pane = document.createElement('article');
            pane.className = 'pane';
            pane.dataset.key = m.key;
            pane.hidden = true;
            root.appendChild(pane);
            panes[m.key] = pane;
        });

        const defaultKey = mods.some(m => m.key === 'index') ? 'index' : mods[0].key;

        function activate(key, updateHash) {
            mods.forEach(function (m) {
                const isActive = m.key === key;
                panes[m.key].hidden = !isActive;
                if (tabButtons[m.key]) {
                    tabButtons[m.key].classList.toggle('active', isActive);
                    tabButtons[m.key].setAttribute('aria-selected', isActive ? 'true' : 'false');
                }
            });
            // Unhide first, then render: the chart libraries measure widths.
            if (!renderedPanes[key]) {
                renderBlocksInto(mods.find(m => m.key === key).blocks, panes[key]);
                renderedPanes[key] = true;
            }
            if (updateHash) {
                history.replaceState(null, '',
                    key === defaultKey ? location.pathname + location.search : '#' + key);
            }
        }

        if (mods.length > 1) {
            mods.forEach(function (m) {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.textContent = m.label;
                btn.setAttribute('role', 'tab');
                btn.addEventListener('click', function () { activate(m.key, true); });
                tabBar.appendChild(btn);
                tabButtons[m.key] = btn;
            });
            tabBar.hidden = false;
        }

        // The hash selects a tab only when it matches a modality key, so
        // existing anchors keep working.
        const initialHash = location.hash.slice(1);
        activate(mods.some(m => m.key === initialHash) ? initialHash : defaultKey, false);
        window.addEventListener('hashchange', function () {
            const k = location.hash.slice(1);
            if (mods.some(m => m.key === k)) activate(k, false);
        });
    })();
</script>
</body>
</html>
