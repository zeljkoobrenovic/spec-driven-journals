<script id="data" type="application/json">{"meta": {"id": "ORG-ORG-CAREER-PATHS-AND-PROGRESSION", "status": "draft:gray", "title": "Dual Career Paths and Transparent Progression", "date": "2026-05-17", "author": "Organization Org Design", "permalink": "career-paths-and-progression", "timetoread": "11 min", "excerpt": "Organization engineering will use transparent career paths with equal dignity for individual contributor and management progression. Advancement is based on demonstrated scope, impact, judgement, collaboration, and capability growth, not on becoming a manager by default.", "tags": "org-design, career-paths, progression, staff-engineer, engineering-management", "icon": "assets/icons/career-paths-and-progression.png", "logo": "assets/images/career-paths-and-progression/logo.jpeg", "logo_credit": "Image generated by Google Gemini (gemini-3-pro-image-preview)"}, "tags": ["org-design", "career-paths", "progression", "staff-engineer", "engineering-management"], "blocks": [{"type": "markdown", "content": "> **Status**: DRAFT\n>\n> **Decision**: Organization engineering will maintain transparent dual career paths for individual contributors and managers. Progression is based on demonstrated impact, scope, judgement, collaboration, and capability growth. Management is not the default promotion path for strong engineers; staff-plus technical leadership is a real path with expectations and accountability.\n\n## Decision\n\nAdopt a **dual-track engineering career model**.\n\nThe model includes:\n\n* an individual contributor path from engineer through senior, staff, principal, and equivalent levels;\n* a management path from engineering manager through senior manager, director, and equivalent levels;\n* clear expectations by level, expressed through scope and behaviours rather than checklists of tools;\n* explicit evidence for promotion and compensation decisions;\n* support for moving between tracks when the person and organisation both benefit;\n* career conversations at a regular cadence, not only during promotion windows.\n\nThe organisation should publish the framework internally and use it for hiring, feedback, growth planning, calibration, and succession.\n\n## How to Read This Decision\n\n| What it says | What it does **not** say |\n| --- | --- |\n| IC and manager paths should both allow senior growth. | The two paths require the same skills. |\n| Progression should be transparent. | Promotion is automatic when a checklist is complete. |\n| Staff-plus roles are leadership roles. | Staff-plus engineers are managers without reports. |\n| Managers need technical judgement. | Managers must be the strongest technical decision-makers. |\n| Movement between tracks is possible. | Track switching is casual or consequence-free. |\n\nCareer architecture is part of org design. If the career system rewards the wrong behaviour, the org chart cannot compensate.\n\n## How to Use This Decision\n\nUse this decision to:\n\n* explain why engineering needs both IC and management progression paths;\n* distinguish seniority, title, scope, and impact;\n* describe what changes when someone moves from senior to staff or from IC to manager;\n* understand why promotion evidence must be tied to demonstrated behaviour;\n* use career conversations to create growth opportunities rather than vague advice.\n\nThe main lesson is that a career framework is not an HR artifact only. It shapes what the organisation rewards, what people aspire to, and which leadership behaviours appear.\n\n## One-Minute Mental Model\n\nCareer progression is **expanding scope with increasing judgement**.\n\nEarly levels focus on learning to deliver well with support. Mid levels focus on owning meaningful work independently. Senior levels focus on judgement, tradeoffs, mentoring, and ownership. Staff-plus and management levels create leverage through other people, teams, systems, and strategy.\n\nThe IC and management tracks are different ways to create leverage. Neither is a consolation prize. Neither is a universal next step.\n\n## Rationale\n\nEngineering organisations often accidentally tell engineers that the only way to grow is to manage people. That creates three problems:\n\n* strong engineers become reluctant or ineffective managers;\n* technical leadership is underfunded;\n* management roles fill with people who wanted status, not the work of management.\n\nA dual career path fixes the signal. It says that building systems, shaping technical strategy, improving engineering practice, mentoring others, and solving cross-team problems are valuable forms of leadership. It also makes management a profession with its own expectations: coaching, hiring, performance, team health, delivery systems, and organisational design.\n\nTransparent progression reduces ambiguity and bias. People should know what is expected at the next level, what evidence matters, and which behaviours do not scale.\n\n## Progression Dimensions\n\nLevels should be described through dimensions like:\n\n| Dimension | What grows with level |\n| --- | --- |\n| Scope | From tasks, to features, to services, to teams, to domains, to organisation-wide systems. |\n| Impact | From local delivery to durable product, technical, operational, or organisational outcomes. |\n| Judgement | Ability to make tradeoffs under uncertainty and explain consequences. |\n| Technical depth | Quality of design, implementation, debugging, reliability, and domain expertise. |\n| Collaboration | Ability to work through others, handle disagreement, and create shared context. |\n| Leadership | Ability to set direction, mentor, influence, and raise the capability of others. |\n| Ownership | Accountability for outcomes, lifecycle, quality, and production consequences. |\n\nThe same dimensions appear differently on IC and management tracks. For example, a staff engineer may influence architecture across teams; an engineering manager may improve the system that lets several teams deliver sustainably.\n\n## Career Conversations\n\nEach engineer and manager should have recurring career conversations that cover:\n\n* current level expectations;\n* evidence of impact;\n* growth areas;\n* desired direction and track;\n* opportunities needed to demonstrate next-level scope;\n* feedback from peers and stakeholders;\n* risks to wellbeing, motivation, or retention.\n\nThe manager owns the cadence. The individual owns active participation. The organisation owns making opportunities and expectations visible.\n\n## Calibration and Fairness\n\nProgression should be calibrated across teams. Without calibration, levels become local currencies.\n\nMinimum calibration rules:\n\n* promotions require written evidence tied to the framework;\n* level expectations are shared across teams;\n* managers compare examples across domains;\n* staff-plus and management reviewers both participate where relevant;\n* promotion decisions distinguish potential from demonstrated next-level impact;\n* lack of opportunity is treated as an organisational issue, not only an individual gap.\n\n## Worked Example\n\nA senior engineer wants to grow.\n\nUnclear career conversation:\n\n* \"Be more strategic.\"\n* \"Have more impact.\"\n* \"Act like a staff engineer.\"\n\nUseful career conversation:\n\n| Question | Example answer |\n| --- | --- |\n| What next-level scope is missing? | Influence across two teams, not only within one service. |\n| Which behaviour needs evidence? | Technical direction, mentoring other tech leads, and written tradeoff analysis. |\n| What opportunity can show it? | Lead the checkout observability improvement across three services. |\n| What support is needed? | Staff engineer mentor, EM sponsorship, and time allocated in planning. |\n| How will evidence be collected? | ADRs, stakeholder feedback, improved alerts, reduced incident review findings. |\n\nThe conversation turns ambition into observable work and organisational support.\n\n## Anti-Patterns\n\n* **Management as reward.** A strong senior engineer is promoted into management because it is the only visible path.\n* **Staff as title inflation.** Staff title is granted without cross-team scope, influence, or accountability.\n* **Secret ladder.** Expectations exist only in managers' heads.\n* **Tool checklist promotion.** Level is tied to knowing specific technologies instead of judgement and impact.\n* **Hero impact.** People advance by rescuing broken systems but not by making the systems healthier.\n* **No opportunities.** People are told to show next-level impact but are never given next-level scope.\n\n## Discussion Prompts\n\nUse these prompts in career-framework reviews:\n\n* Which behaviours does the current promotion process actually reward?\n* Can engineers grow in compensation and impact without becoming managers?\n* Do staff-plus expectations describe real organisational leverage or only senior technical skill?\n* Are managers trained and evaluated for management work, not only delivery pressure?\n* How do people from different teams get calibrated fairly?\n* Where are people blocked by missing opportunities rather than missing ability?\n\n## Related Records\n\n* [Staff-Plus Technical Leadership](staff-plus-technical-leadership.html) - defines senior IC leadership in more detail.\n* [Engineering Management Operating Model](engineering-management-operating-model.html) - defines management as a profession.\n* [Communities of Practice and Chapters for Shared Craft](communities-of-practice-and-chapters.html) - supports craft growth across teams.\n* [Architecture as Advice and Guardrails](architecture-as-advice-and-guardrails.html) - senior technical roles contribute through advice and guardrails.\n\n## Scope and Revisiting\n\nThis ADR applies to engineering career architecture. Product, design, data, security, and platform roles may need equivalent frameworks aligned with the same principles.\n\nRevisit when hiring, promotion, retention, diversity, or performance data show that the framework is unclear, unfair, or misaligned with the organisation's strategy.\n\n## Authoritative References\n\n* GitLab Handbook, [Engineering Career Development](https://handbook.gitlab.com/handbook/engineering/careers/).\n* GitLab Handbook, [Engineering Career Framework](https://handbook.gitlab.com/handbook/engineering/careers/matrix/).\n* Will Larson, [Staff Engineer](https://staffeng.com/book/).\n* Tanya Reilly, *The Staff Engineer's Path*.\n"}]}</script>
<script>
    (function () {
        const data = JSON.parse(document.getElementById('data').textContent);
        const root = document.getElementById('content');

        const postId = (data.meta && data.meta.id) ? String(data.meta.id) : '';
        const postStatusRaw = (data.meta && data.meta.status) ? String(data.meta.status) : '';
        if (postId || postStatusRaw) {
            const header = document.getElementById('post-header');
            let sectionEl = header.querySelector('p.section');
            if (!sectionEl) {
                sectionEl = document.createElement('p');
                sectionEl.className = 'section';
                header.insertBefore(sectionEl, header.firstChild);
            }
            // Status pill goes first, then a " / " separator before the existing
            // content (section name and/or id).
            if (postStatusRaw) {
                const parts = postStatusRaw.split(':');
                const statusName = parts[0].trim();
                const statusColor = (parts[1] || '').trim();
                const wrap = document.createElement('span');
                wrap.className = 'post-status';
                const dot = document.createElement('span');
                dot.className = 'status-dot';
                if (statusColor) dot.style.background = statusColor;
                wrap.appendChild(dot);
                wrap.appendChild(document.createTextNode(statusName));
                if (sectionEl.firstChild) {
                    sectionEl.insertBefore(document.createTextNode(' • '), sectionEl.firstChild);
                    sectionEl.insertBefore(wrap, sectionEl.firstChild);
                } else {
                    sectionEl.appendChild(wrap);
                }
            }
            if (postId) {
                if (sectionEl.firstChild) sectionEl.appendChild(document.createTextNode(' • '));
                sectionEl.appendChild(document.createTextNode(postId));
            }
        }

        const tagsHost = document.getElementById('tags');
        (data.tags || []).forEach(function (t) {
            const span = document.createElement('span');
            span.className = 'tag';
            span.textContent = t;
            tagsHost.appendChild(span);
        });

        // Minimal markdown renderer. Supports: ATX headings, paragraphs, blockquotes,
        // unordered/ordered lists, fenced code, inline code, bold/italic/strikethrough, links, images, hr.
        // Sufficient for the posts in this repo; replace with a fuller parser if needed.
        function renderMarkdown(src) {
            const lines = src.replace(/\r\n/g, '\n').split('\n');
            const out = [];
            let i = 0;

            const bullet = /^(\s*)([-*])\s+(.*)$/;
            const ordered = /^(\s*)(\d+)\.\s+(.*)$/;
            const tableRow = /^\s*\|(.+)\|\s*$/;
            const tableSep = /^\s*\|?\s*:?-{3,}:?\s*(\|\s*:?-{3,}:?\s*)+\|?\s*$/;

            function splitRow(s) {
                let t = s.trim();
                if (t.startsWith('|')) t = t.slice(1);
                if (t.endsWith('|')) t = t.slice(0, -1);
                return t.split('|').map(c => c.trim());
            }

            function inline(s) {
                // Posts are trusted content, so raw HTML passes through unescaped
                // (some posts embed inline <blockquote>, <div>, etc.).
                // Stray ampersands still get fixed up.
                s = s.replace(/&(?![a-zA-Z]+;|#\d+;)/g, '&amp;');
                s = s.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<a class="image-link" href="$2" target="_blank" rel="noopener noreferrer"><img alt="$1" src="$2"></a>');
                s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
                s = s.replace(/`([^`]+)`/g, function (_, c) {
                    return '<code>' + c.replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</code>';
                });
                s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
                s = s.replace(/~~([^~\n]+)~~/g, '<del>$1</del>');
                s = s.replace(/(^|[^*])\*([^*\n]+)\*/g, '$1<em>$2</em>');
                return s;
            }

            while (i < lines.length) {
                const line = lines[i];
                if (!line.trim()) {
                    i++;
                    continue;
                }

                const fence = line.match(/^```(\w*)\s*$/);
                if (fence) {
                    i++;
                    const buf = [];
                    while (i < lines.length && !/^```\s*$/.test(lines[i])) {
                        buf.push(lines[i]);
                        i++;
                    }
                    i++;
                    const escaped = buf.join('\n').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                    const cls = fence[1] ? ' class="lang-' + fence[1] + '"' : '';
                    out.push('<pre><code' + cls + '>' + escaped + '</code></pre>');
                    continue;
                }

                const h = line.match(/^(#{1,6})\s+(.*)$/);
                if (h) {
                    out.push('<h' + h[1].length + '>' + inline(h[2]) + '</h' + h[1].length + '>');
                    i++;
                    continue;
                }

                if (/^\s*(?:-\s*){3,}\s*$/.test(line) || /^\s*\*{3,}\s*$/.test(line)) {
                    out.push('<hr>');
                    i++;
                    continue;
                }

                if (/^>\s?/.test(line)) {
                    const buf = [];
                    while (i < lines.length && /^>\s?/.test(lines[i])) {
                        buf.push(lines[i].replace(/^>\s?/, ''));
                        i++;
                    }
                    out.push('<blockquote>' + renderMarkdown(buf.join('\n')) + '</blockquote>');
                    continue;
                }

                if (tableRow.test(line) && i + 1 < lines.length && tableSep.test(lines[i + 1])) {
                    const headers = splitRow(line);
                    i += 2;
                    const rows = [];
                    while (i < lines.length && tableRow.test(lines[i])) {
                        rows.push(splitRow(lines[i]));
                        i++;
                    }
                    let html = '<table><thead><tr>';
                    headers.forEach(h => {
                        html += '<th>' + inline(h) + '</th>';
                    });
                    html += '</tr></thead><tbody>';
                    rows.forEach(r => {
                        html += '<tr>';
                        r.forEach(c => {
                            html += '<td>' + inline(c) + '</td>';
                        });
                        html += '</tr>';
                    });
                    html += '</tbody></table>';
                    out.push(html);
                    continue;
                }

                if (bullet.test(line) || ordered.test(line)) {
                    // Indent of the first bullet defines this list's base level.
                    // Deeper-indented bullets become nested lists (rendered by
                    // recursing into renderMarkdown). Same-or-less indent at a
                    // bullet starts a sibling item (or ends the list).
                    const firstMatch = line.match(bullet) || line.match(ordered);
                    const baseIndent = firstMatch[1].length;
                    const isOrdered = ordered.test(line);
                    const items = [];
                    while (i < lines.length) {
                        const cur = lines[i];
                        if (!cur.trim()) {
                            // blank line breaks the list (matches CommonMark-ish behaviour)
                            i++;
                            break;
                        }
                        const mBul = cur.match(bullet);
                        const mOrd = cur.match(ordered);
                        const m = mBul || mOrd;
                        if (!m) break;
                        if (m[1].length < baseIndent) break;
                        if (m[1].length > baseIndent) break; // shouldn't happen at top of loop
                        // Same-type check: switching between -/* and 1. closes the list
                        if (isOrdered !== !!mOrd) break;

                        const itemBuf = [m[3]];
                        const nestedBuf = [];
                        i++;
                        while (i < lines.length) {
                            const nxt = lines[i];
                            if (!nxt.trim()) break;
                            const nBul = nxt.match(bullet);
                            const nOrd = nxt.match(ordered);
                            const nm = nBul || nOrd;
                            if (nm) {
                                if (nm[1].length > baseIndent) {
                                    // nested list line — dedent and stash
                                    nestedBuf.push(nxt.slice(baseIndent + 2));
                                    i++;
                                    continue;
                                }
                                // sibling or end of list
                                break;
                            }
                            // Plain continuation text
                            if (nestedBuf.length) {
                                // continuation inside the nested block
                                nestedBuf.push(nxt.slice(baseIndent + 2));
                            } else {
                                itemBuf.push(nxt.trim());
                            }
                            i++;
                        }

                        let liHtml = inline(itemBuf.join('\n'));
                        if (nestedBuf.length) {
                            liHtml += renderMarkdown(nestedBuf.join('\n'));
                        }
                        items.push('<li>' + liHtml + '</li>');
                    }
                    out.push((isOrdered ? '<ol>' : '<ul>') + items.join('') + (isOrdered ? '</ol>' : '</ul>'));
                    continue;
                }

                const buf = [line];
                i++;
                while (i < lines.length && lines[i].trim() && !/^#{1,6}\s/.test(lines[i]) && !/^>\s?/.test(lines[i]) && !bullet.test(lines[i]) && !ordered.test(lines[i]) && !/^```/.test(lines[i]) && !tableRow.test(lines[i])) {
                    buf.push(lines[i]);
                    i++;
                }
                out.push('<p>' + inline(buf.join(' ')) + '</p>');
            }
            return out.join('\n');
        }

        // Block dispatcher. New block types plug in here.
        const renderers = {
            markdown: function (block) {
                const div = document.createElement('div');
                div.innerHTML = renderMarkdown(block.content);
                return div;
            },
            mermaid: function (block) {
                // Mermaid scans elements with class "mermaid" whose textContent
                // is the diagram source. We collect these nodes and run
                // mermaid.run() once after all blocks are in the DOM.
                const div = document.createElement('div');
                div.className = 'mermaid';
                div.textContent = block.content;
                return div;
            },
            'force-graph': function (block) {
                // build.py emits parsed JSON: {nodes:[{id,size}], links:[{source,target}]}.
                // We instantiate force-graph after the container is in the DOM
                // so it can measure its own width.
                const div = document.createElement('div');
                div.className = 'force-graph';
                const data = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.ForceGraph) return;
                    const maxSize = data.nodes.reduce((m, n) => Math.max(m, n.size || 1), 1);
                    window.ForceGraph()(div)
                        .graphData(data)
                        .width(div.clientWidth)
                        .height(div.clientHeight)
                        .nodeRelSize(4)
                        .nodeVal(n => Math.max(20 * (n.size || 1) / maxSize, 0.001))
                        .nodeLabel(n => n.id + ' (' + (n.size || 1) + ')')
                        .nodeColor(() => 'rgba(135, 206, 235, 0.7)')
                        .linkColor(() => 'rgba(60, 60, 60, 0.4)')
                        .linkDirectionalArrowLength(4)
                        .linkDirectionalArrowRelPos(1)
                        .linkWidth(1);
                });
                return div;
            },
            'bubble-chart': function (block) {
                // build.py emits {nodes:[{name,size}]}. Renders a D3 circle-pack
                // SVG (same shape as the obren.io reference, just inline).
                const wrap = document.createElement('div');
                wrap.className = 'bubble-chart';
                const payload = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.d3) return;
                    const diameter = 480;
                    const fill = '#c0deed';
                    const textColor = '#111111';
                    const fontSize = 12;

                    const svg = window.d3.select(wrap).append('svg')
                        .attr('viewBox', '0 0 ' + diameter + ' ' + diameter)
                        .attr('width', diameter)
                        .attr('height', diameter);

                    const root = window.d3.hierarchy({children: payload.nodes})
                        .sum(d => d.size || 0)
                        .sort((a, b) => b.value - a.value);

                    window.d3.pack().size([diameter, diameter]).padding(2)(root);

                    const node = svg.selectAll('g')
                        .data(root.leaves())
                        .enter().append('g')
                        .attr('transform', d => 'translate(' + d.x + ',' + d.y + ')');

                    node.append('title').text(d => d.data.name + ': ' + d.value);
                    node.append('circle').attr('r', d => d.r).style('fill', fill);
                    node.append('text')
                        .attr('dy', '.3em')
                        .style('text-anchor', 'middle')
                        .style('fill', textColor)
                        .style('font-size', fontSize + 'px')
                        .text(d => d.data.name.substring(0, Math.max(0, Math.floor(d.r / 3))));
                });
                return wrap;
            }
        };

        const mermaidNodes = [];
        data.blocks.forEach(function (block) {
            const r = renderers[block.type];
            if (!r) {
                const pre = document.createElement('pre');
                pre.textContent = '[unknown block type: ' + block.type + ']';
                root.appendChild(pre);
                return;
            }
            const node = r(block);
            if (node instanceof Node) {
                root.appendChild(node);
                if (block.type === 'mermaid') mermaidNodes.push(node);
            }
        });

        if (mermaidNodes.length && window.mermaid) {
            window.mermaid.initialize({startOnLoad: false, theme: 'default'});
            window.mermaid.run({nodes: mermaidNodes});
        }
    })();
</script>
</body>
</html>
