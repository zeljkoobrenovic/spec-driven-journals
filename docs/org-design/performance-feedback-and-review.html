<script id="data" type="application/json">{"meta": {"id": "ORG-ORG-PERFORMANCE-FEEDBACK-AND-REVIEW", "status": "draft:gray", "title": "Performance Feedback and Review", "date": "2026-05-17", "author": "Organization Org Design", "permalink": "performance-feedback-and-review", "timetoread": "13 min", "excerpt": "Organization engineering will use continuous performance feedback with periodic calibrated reviews. Performance management is a cycle of expectations, evidence, feedback, growth, accountability, and fair decisions, not an annual form or surprise rating.", "tags": "org-design, performance, feedback, reviews, management, career-paths", "icon": "assets/icons/performance-feedback-and-review.png", "logo": "assets/images/performance-feedback-and-review/logo.jpeg", "logo_credit": "Image generated by Google Gemini (gemini-3-pro-image-preview)"}, "tags": ["org-design", "performance", "feedback", "reviews", "management", "career-paths"], "blocks": [{"type": "markdown", "content": "> **Status**: DRAFT\n>\n> **Decision**: Organization engineering will use continuous performance feedback with periodic calibrated reviews. Managers set expectations, collect evidence, give timely feedback, support growth, and address gaps early. Formal reviews summarise a body of evidence; they must not be the first time a person hears important feedback.\n\n## Decision\n\nAdopt a **performance feedback and review system** for engineering.\n\nThe system includes:\n\n* clear expectations from the career framework, role mission, and team goals;\n* regular 1:1 feedback and coaching;\n* evidence collection across delivery, quality, collaboration, ownership, judgement, and growth;\n* mid-cycle check-ins to avoid surprises;\n* periodic formal reviews that summarise evidence and development direction;\n* calibration across teams for fairness and consistency;\n* improvement plans where performance gaps are material and sustained;\n* separation between goal learning, development conversations, compensation decisions, and employment actions where possible.\n\nPerformance management is a continuous cycle, not a form-filling event.\n\n## How to Read This Decision\n\n| What it says | What it does **not** say |\n| --- | --- |\n| Feedback should be regular and evidence-based. | Every conversation needs a formal record. |\n| Reviews should summarise known evidence. | Reviews are the main place to give feedback. |\n| Managers own performance management. | Employees are passive recipients of judgement. |\n| Calibration improves fairness. | Calibration is forced ranking. |\n| Underperformance must be addressed early. | Support replaces accountability. |\n\nThe system should make expectations clearer and improvement more possible.\n\n## How to Use This Decision\n\nUse this decision to:\n\n* explain the difference between feedback, coaching, performance review, promotion review, and compensation review;\n* identify what good performance evidence looks like for engineering work;\n* avoid surprise feedback and vague judgement;\n* use calibration without turning it into a ranking contest;\n* address performance gaps directly while preserving fairness and respect.\n\nThe practical lesson is that performance review quality depends on the months before the review.\n\n## One-Minute Mental Model\n\nPerformance management is **expectations plus evidence plus timely conversation**.\n\nExpectations say what good looks like. Evidence shows what happened. Conversation turns evidence into recognition, learning, growth, or accountability.\n\nIf expectations are vague, reviews become personality judgements. If evidence is weak, calibration becomes politics. If conversation is delayed, feedback becomes a surprise and trust erodes.\n\n## Rationale\n\nEngineering performance is multi-dimensional. Good engineers do not only close tickets. They improve systems, collaborate across roles, make tradeoffs, learn, review, mentor, operate services, and handle ambiguity.\n\nWeak performance systems damage teams:\n\n* people optimise for visible activity rather than meaningful impact;\n* managers avoid hard feedback until review season;\n* quiet contributors are underrated because their work is less performative;\n* collaboration and quality are ignored until they fail;\n* ratings vary by manager rather than by expectations;\n* promotions reward heroic rescues rather than durable system improvement.\n\nA better system uses regular feedback, evidence, and calibration to improve both individual growth and organisational fairness.\n\n## Performance Evidence\n\nGood performance evidence is specific, role-related, and connected to expectations.\n\n| Dimension | Evidence examples |\n| --- | --- |\n| Delivery | Completed meaningful work, reduced lead time, managed scope, unblocked dependencies. |\n| Quality | Improved test confidence, reduced defects, strengthened release readiness. |\n| Technical judgement | Made tradeoffs explicit, wrote useful ADRs, simplified systems, handled risk. |\n| Collaboration | Improved team decisions, handled disagreement, supported product/design/QE/platform partners. |\n| Ownership | Operated services responsibly, followed through, improved recurring pain. |\n| Leadership | Mentored others, raised standards, influenced beyond assigned tasks. |\n| Learning | Acted on feedback, grew skills, shared knowledge. |\n\nEvidence should include outcomes and behaviours, not only outputs.\n\n## Feedback Formula\n\nUse this simple structure for feedback:\n\n| Part | Prompt | Example |\n| --- | --- | --- |\n| Situation | When and where did the behaviour happen? | \"In last week's payment incident review...\" |\n| Behaviour | What did the person do, specifically? | \"...you separated customer impact, timeline, and unknowns before discussing fixes...\" |\n| Impact | What effect did it have? | \"...which helped product and support choose the right customer communication.\" |\n| Next expectation | What should continue or change? | \"Keep using that structure; next time, bring the rollback decision into the same summary.\" |\n\nThis works for positive and corrective feedback. It keeps the conversation grounded in observable behaviour.\n\n## Review Cycle\n\n| Moment | Purpose |\n| --- | --- |\n| Role expectation setting | Clarify level, role, team mission, and current focus. |\n| Regular 1:1s | Give feedback, coach, remove blockers, discuss growth. |\n| Mid-cycle check-in | Identify surprises, gaps, and support needs early. |\n| Formal review | Summarise evidence, performance direction, growth, and next expectations. |\n| Calibration | Compare interpretation of levels and evidence across teams. |\n| Development follow-up | Turn review output into concrete growth, support, or accountability actions. |\n\nThe formal review is a snapshot of an ongoing conversation.\n\n## Review Inputs\n\nBefore writing a review, gather:\n\n| Input | Why |\n| --- | --- |\n| Role and level expectations | Prevents reviewing against hidden standards. |\n| Team goals and role focus | Shows what work mattered this cycle. |\n| Examples of shipped work | Captures delivery and scope. |\n| Code, design, ADR, or operational evidence | Captures technical judgement and quality. |\n| Peer and partner feedback | Captures collaboration and influence. |\n| Incident, support, or quality learning | Captures ownership in production. |\n| Previous feedback and growth plan | Checks whether feedback was acted on. |\n\nReviews should not rely on memory from the last two weeks.\n\n## Worked Example\n\nVague review feedback:\n\n* \"Needs to be more senior.\"\n* \"Could communicate better.\"\n* \"Good team player.\"\n\nEvidence-based feedback:\n\n| Feedback area | Better version |\n| --- | --- |\n| Seniority | \"For the payments migration, you owned implementation well but did not surface integration risk until the last week. Next-level expectation is earlier risk framing and stakeholder advice.\" |\n| Communication | \"In the incident review, your timeline and impact summary helped support and product make a clear customer decision.\" |\n| Collaboration | \"You helped a new teammate ship their first change by pairing and improving the setup docs.\" |\n\nBetter feedback gives the person something to repeat, change, or develop.\n\n## Calibration\n\nCalibration should:\n\n* compare evidence against the career framework;\n* identify manager interpretation differences;\n* check for bias and inconsistent opportunity;\n* distinguish current performance, potential, and readiness for promotion;\n* challenge vague advocacy and vague criticism;\n* produce clearer expectations for the next cycle.\n\nCalibration should not force a fixed distribution when the evidence does not support it.\n\n## Anti-Patterns\n\n* **Annual surprise.** Important feedback appears for the first time in a formal review.\n* **Activity scoring.** Tickets, commits, or hours are treated as performance.\n* **Hero bias.** Emergency rescues are rewarded more than preventing emergencies.\n* **Manager lottery.** Ratings depend more on manager style than evidence.\n* **Feedback avoidance.** Managers preserve short-term comfort and create long-term unfairness.\n* **Forced ranking theatre.** Calibration becomes a competition for scarce ratings.\n\n## Common Confusions\n\n| Confusion | Clarification |\n| --- | --- |\n| Performance vs potential | Performance is current evidence; potential is a judgement about future scope. |\n| Feedback vs review | Feedback changes behaviour during the cycle; review summarises evidence at a point in time. |\n| Promotion vs performance | Strong performance at current level is not automatically readiness for the next level. |\n| Team outcome vs individual impact | Team outcomes matter, but individual contribution still needs evidence and context. |\n| Underperformance vs mismatch | A gap may come from skill, effort, role fit, unclear expectations, or team/system context. |\n\nNaming the distinction improves fairness.\n\n## Practice Exercise\n\nRewrite vague feedback:\n\n1. Choose one sentence from a draft review that uses vague language such as \"more senior\", \"strong communicator\", or \"not proactive\".\n2. Identify the actual expectation behind it.\n3. Add one concrete situation and behaviour.\n4. Explain the impact on the team, product, system, or stakeholder.\n5. State the next expectation in one sentence.\n\nIf you cannot find evidence, do not turn the vague statement into review feedback until you have done the management work.\n\n## Discussion Prompts\n\nUse these prompts before and during review cycles:\n\n* What expectations were clear at the start of the cycle?\n* What evidence shows impact, judgement, collaboration, and ownership?\n* What feedback has already been given, and what action followed?\n* Did the person have fair opportunity to demonstrate expected scope?\n* Which feedback is about performance, and which is about role fit or team context?\n* What support or accountability is needed next?\n\n## Related Records\n\n* [Dual Career Paths and Transparent Progression](career-paths-and-progression.html) - reviews should use the career framework.\n* [Engineering Management Operating Model](engineering-management-operating-model.html) - EMs own performance and feedback systems.\n* [Goal Setting and Planning Cadence](goal-setting-and-planning-cadence.html) - goals inform feedback but should not become simplistic scoring.\n* [Staff-Plus Technical Leadership](staff-plus-technical-leadership.html) - senior IC impact needs visible evidence.\n* [Organisation Health and Flow Metrics](org-health-and-flow-metrics.html) - team/system metrics should not be misused as individual surveillance.\n\n## Scope and Revisiting\n\nThis ADR applies to engineering performance feedback and review. Legal, HR, works-council, compensation, and employment-action requirements remain authoritative and must be followed.\n\nRevisit if reviews create surprises, managers avoid feedback, calibration feels unfair, performance evidence is weak, or people optimise for metrics rather than engineering impact.\n\n## Authoritative References\n\n* CIPD, [Performance management factsheet](https://www.cipd.org/en/knowledge/factsheets/performance-factsheet/).\n* GitLab Handbook, [Engineering Career Development](https://handbook.gitlab.com/handbook/engineering/careers/).\n* Camille Fournier, *The Manager's Path*.\n"}]}</script>
<script>
    (function () {
        const data = JSON.parse(document.getElementById('data').textContent);
        const root = document.getElementById('content');

        const postId = (data.meta && data.meta.id) ? String(data.meta.id) : '';
        const postStatusRaw = (data.meta && data.meta.status) ? String(data.meta.status) : '';
        if (postId || postStatusRaw) {
            const header = document.getElementById('post-header');
            let sectionEl = header.querySelector('p.section');
            if (!sectionEl) {
                sectionEl = document.createElement('p');
                sectionEl.className = 'section';
                header.insertBefore(sectionEl, header.firstChild);
            }
            // Status pill goes first, then a " / " separator before the existing
            // content (section name and/or id).
            if (postStatusRaw) {
                const parts = postStatusRaw.split(':');
                const statusName = parts[0].trim();
                const statusColor = (parts[1] || '').trim();
                const wrap = document.createElement('span');
                wrap.className = 'post-status';
                const dot = document.createElement('span');
                dot.className = 'status-dot';
                if (statusColor) dot.style.background = statusColor;
                wrap.appendChild(dot);
                wrap.appendChild(document.createTextNode(statusName));
                if (sectionEl.firstChild) {
                    sectionEl.insertBefore(document.createTextNode(' • '), sectionEl.firstChild);
                    sectionEl.insertBefore(wrap, sectionEl.firstChild);
                } else {
                    sectionEl.appendChild(wrap);
                }
            }
            if (postId) {
                if (sectionEl.firstChild) sectionEl.appendChild(document.createTextNode(' • '));
                sectionEl.appendChild(document.createTextNode(postId));
            }
        }

        const tagsHost = document.getElementById('tags');
        (data.tags || []).forEach(function (t) {
            const span = document.createElement('span');
            span.className = 'tag';
            span.textContent = t;
            tagsHost.appendChild(span);
        });

        // Minimal markdown renderer. Supports: ATX headings, paragraphs, blockquotes,
        // unordered/ordered lists, fenced code, inline code, bold/italic/strikethrough, links, images, hr.
        // Sufficient for the posts in this repo; replace with a fuller parser if needed.
        function renderMarkdown(src) {
            const lines = src.replace(/\r\n/g, '\n').split('\n');
            const out = [];
            let i = 0;

            const bullet = /^(\s*)([-*])\s+(.*)$/;
            const ordered = /^(\s*)(\d+)\.\s+(.*)$/;
            const tableRow = /^\s*\|(.+)\|\s*$/;
            const tableSep = /^\s*\|?\s*:?-{3,}:?\s*(\|\s*:?-{3,}:?\s*)+\|?\s*$/;

            function splitRow(s) {
                let t = s.trim();
                if (t.startsWith('|')) t = t.slice(1);
                if (t.endsWith('|')) t = t.slice(0, -1);
                return t.split('|').map(c => c.trim());
            }

            function inline(s) {
                // Posts are trusted content, so raw HTML passes through unescaped
                // (some posts embed inline <blockquote>, <div>, etc.).
                // Stray ampersands still get fixed up.
                s = s.replace(/&(?![a-zA-Z]+;|#\d+;)/g, '&amp;');
                s = s.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<a class="image-link" href="$2" target="_blank" rel="noopener noreferrer"><img alt="$1" src="$2"></a>');
                s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
                s = s.replace(/`([^`]+)`/g, function (_, c) {
                    return '<code>' + c.replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</code>';
                });
                s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
                s = s.replace(/~~([^~\n]+)~~/g, '<del>$1</del>');
                s = s.replace(/(^|[^*])\*([^*\n]+)\*/g, '$1<em>$2</em>');
                return s;
            }

            while (i < lines.length) {
                const line = lines[i];
                if (!line.trim()) {
                    i++;
                    continue;
                }

                const fence = line.match(/^```(\w*)\s*$/);
                if (fence) {
                    i++;
                    const buf = [];
                    while (i < lines.length && !/^```\s*$/.test(lines[i])) {
                        buf.push(lines[i]);
                        i++;
                    }
                    i++;
                    const escaped = buf.join('\n').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                    const cls = fence[1] ? ' class="lang-' + fence[1] + '"' : '';
                    out.push('<pre><code' + cls + '>' + escaped + '</code></pre>');
                    continue;
                }

                const h = line.match(/^(#{1,6})\s+(.*)$/);
                if (h) {
                    out.push('<h' + h[1].length + '>' + inline(h[2]) + '</h' + h[1].length + '>');
                    i++;
                    continue;
                }

                if (/^\s*(?:-\s*){3,}\s*$/.test(line) || /^\s*\*{3,}\s*$/.test(line)) {
                    out.push('<hr>');
                    i++;
                    continue;
                }

                if (/^>\s?/.test(line)) {
                    const buf = [];
                    while (i < lines.length && /^>\s?/.test(lines[i])) {
                        buf.push(lines[i].replace(/^>\s?/, ''));
                        i++;
                    }
                    out.push('<blockquote>' + renderMarkdown(buf.join('\n')) + '</blockquote>');
                    continue;
                }

                if (tableRow.test(line) && i + 1 < lines.length && tableSep.test(lines[i + 1])) {
                    const headers = splitRow(line);
                    i += 2;
                    const rows = [];
                    while (i < lines.length && tableRow.test(lines[i])) {
                        rows.push(splitRow(lines[i]));
                        i++;
                    }
                    let html = '<table><thead><tr>';
                    headers.forEach(h => {
                        html += '<th>' + inline(h) + '</th>';
                    });
                    html += '</tr></thead><tbody>';
                    rows.forEach(r => {
                        html += '<tr>';
                        r.forEach(c => {
                            html += '<td>' + inline(c) + '</td>';
                        });
                        html += '</tr>';
                    });
                    html += '</tbody></table>';
                    out.push(html);
                    continue;
                }

                if (bullet.test(line) || ordered.test(line)) {
                    // Indent of the first bullet defines this list's base level.
                    // Deeper-indented bullets become nested lists (rendered by
                    // recursing into renderMarkdown). Same-or-less indent at a
                    // bullet starts a sibling item (or ends the list).
                    const firstMatch = line.match(bullet) || line.match(ordered);
                    const baseIndent = firstMatch[1].length;
                    const isOrdered = ordered.test(line);
                    const items = [];
                    while (i < lines.length) {
                        const cur = lines[i];
                        if (!cur.trim()) {
                            // blank line breaks the list (matches CommonMark-ish behaviour)
                            i++;
                            break;
                        }
                        const mBul = cur.match(bullet);
                        const mOrd = cur.match(ordered);
                        const m = mBul || mOrd;
                        if (!m) break;
                        if (m[1].length < baseIndent) break;
                        if (m[1].length > baseIndent) break; // shouldn't happen at top of loop
                        // Same-type check: switching between -/* and 1. closes the list
                        if (isOrdered !== !!mOrd) break;

                        const itemBuf = [m[3]];
                        const nestedBuf = [];
                        i++;
                        while (i < lines.length) {
                            const nxt = lines[i];
                            if (!nxt.trim()) break;
                            const nBul = nxt.match(bullet);
                            const nOrd = nxt.match(ordered);
                            const nm = nBul || nOrd;
                            if (nm) {
                                if (nm[1].length > baseIndent) {
                                    // nested list line — dedent and stash
                                    nestedBuf.push(nxt.slice(baseIndent + 2));
                                    i++;
                                    continue;
                                }
                                // sibling or end of list
                                break;
                            }
                            // Plain continuation text
                            if (nestedBuf.length) {
                                // continuation inside the nested block
                                nestedBuf.push(nxt.slice(baseIndent + 2));
                            } else {
                                itemBuf.push(nxt.trim());
                            }
                            i++;
                        }

                        let liHtml = inline(itemBuf.join('\n'));
                        if (nestedBuf.length) {
                            liHtml += renderMarkdown(nestedBuf.join('\n'));
                        }
                        items.push('<li>' + liHtml + '</li>');
                    }
                    out.push((isOrdered ? '<ol>' : '<ul>') + items.join('') + (isOrdered ? '</ol>' : '</ul>'));
                    continue;
                }

                const buf = [line];
                i++;
                while (i < lines.length && lines[i].trim() && !/^#{1,6}\s/.test(lines[i]) && !/^>\s?/.test(lines[i]) && !bullet.test(lines[i]) && !ordered.test(lines[i]) && !/^```/.test(lines[i]) && !tableRow.test(lines[i])) {
                    buf.push(lines[i]);
                    i++;
                }
                out.push('<p>' + inline(buf.join(' ')) + '</p>');
            }
            return out.join('\n');
        }

        // Block dispatcher. New block types plug in here.
        const renderers = {
            markdown: function (block) {
                const div = document.createElement('div');
                div.innerHTML = renderMarkdown(block.content);
                return div;
            },
            mermaid: function (block) {
                // Mermaid scans elements with class "mermaid" whose textContent
                // is the diagram source. We collect these nodes and run
                // mermaid.run() once after all blocks are in the DOM.
                const div = document.createElement('div');
                div.className = 'mermaid';
                div.textContent = block.content;
                return div;
            },
            'force-graph': function (block) {
                // build.py emits parsed JSON: {nodes:[{id,size}], links:[{source,target}]}.
                // We instantiate force-graph after the container is in the DOM
                // so it can measure its own width.
                const div = document.createElement('div');
                div.className = 'force-graph';
                const data = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.ForceGraph) return;
                    const maxSize = data.nodes.reduce((m, n) => Math.max(m, n.size || 1), 1);
                    window.ForceGraph()(div)
                        .graphData(data)
                        .width(div.clientWidth)
                        .height(div.clientHeight)
                        .nodeRelSize(4)
                        .nodeVal(n => Math.max(20 * (n.size || 1) / maxSize, 0.001))
                        .nodeLabel(n => n.id + ' (' + (n.size || 1) + ')')
                        .nodeColor(() => 'rgba(135, 206, 235, 0.7)')
                        .linkColor(() => 'rgba(60, 60, 60, 0.4)')
                        .linkDirectionalArrowLength(4)
                        .linkDirectionalArrowRelPos(1)
                        .linkWidth(1);
                });
                return div;
            },
            'bubble-chart': function (block) {
                // build.py emits {nodes:[{name,size}]}. Renders a D3 circle-pack
                // SVG (same shape as the obren.io reference, just inline).
                const wrap = document.createElement('div');
                wrap.className = 'bubble-chart';
                const payload = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.d3) return;
                    const diameter = 480;
                    const fill = '#c0deed';
                    const textColor = '#111111';
                    const fontSize = 12;

                    const svg = window.d3.select(wrap).append('svg')
                        .attr('viewBox', '0 0 ' + diameter + ' ' + diameter)
                        .attr('width', diameter)
                        .attr('height', diameter);

                    const root = window.d3.hierarchy({children: payload.nodes})
                        .sum(d => d.size || 0)
                        .sort((a, b) => b.value - a.value);

                    window.d3.pack().size([diameter, diameter]).padding(2)(root);

                    const node = svg.selectAll('g')
                        .data(root.leaves())
                        .enter().append('g')
                        .attr('transform', d => 'translate(' + d.x + ',' + d.y + ')');

                    node.append('title').text(d => d.data.name + ': ' + d.value);
                    node.append('circle').attr('r', d => d.r).style('fill', fill);
                    node.append('text')
                        .attr('dy', '.3em')
                        .style('text-anchor', 'middle')
                        .style('fill', textColor)
                        .style('font-size', fontSize + 'px')
                        .text(d => d.data.name.substring(0, Math.max(0, Math.floor(d.r / 3))));
                });
                return wrap;
            }
        };

        const mermaidNodes = [];
        data.blocks.forEach(function (block) {
            const r = renderers[block.type];
            if (!r) {
                const pre = document.createElement('pre');
                pre.textContent = '[unknown block type: ' + block.type + ']';
                root.appendChild(pre);
                return;
            }
            const node = r(block);
            if (node instanceof Node) {
                root.appendChild(node);
                if (block.type === 'mermaid') mermaidNodes.push(node);
            }
        });

        if (mermaidNodes.length && window.mermaid) {
            window.mermaid.initialize({startOnLoad: false, theme: 'default'});
            window.mermaid.run({nodes: mermaidNodes});
        }
    })();
</script>
</body>
</html>
