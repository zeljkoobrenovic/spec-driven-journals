<script id="data" type="application/json">{"meta": {"id": "ORG-ORG-HEALTH-AND-FLOW-METRICS", "status": "draft:gray", "title": "Organisation Health and Flow Metrics", "date": "2026-05-17", "author": "Organization Org Design", "permalink": "org-health-and-flow-metrics", "timetoread": "11 min", "excerpt": "Organization will manage engineering with a balanced set of product, delivery, reliability, quality, developer-experience, and team-health metrics. Metrics are used for learning and system improvement, not individual surveillance or simplistic productivity scoring.", "tags": "org-design, metrics, dora, space, devex, team-health, flow", "icon": "assets/icons/org-health-and-flow-metrics.png", "logo": "assets/images/org-health-and-flow-metrics/logo.jpeg", "logo_credit": "Image generated by Google Gemini (gemini-3-pro-image-preview)"}, "tags": ["org-design", "metrics", "dora", "space", "devex", "team-health", "flow"], "modalities": [{"key": "index", "label": "Article", "meta": {}, "blocks": [{"type": "markdown", "content": "> **Status**: DRAFT\n>\n> **Decision**: Organization will use a balanced engineering health and flow measurement system. Product outcomes, delivery flow, reliability, quality, developer experience, and team health are reviewed together. Metrics are used to improve the system of work, not to rank individuals, maximise activity, or create a single productivity score.\n\n## Decision\n\nAdopt an **organisation health and flow metrics** model.\n\nThe model combines:\n\n* product and business outcome measures;\n* DORA-style software delivery and stability metrics;\n* reliability and operational health signals;\n* quality signals from testing, defects, incidents, and customer feedback;\n* developer experience and cognitive-load signals;\n* team health and collaboration signals.\n\nNo single metric represents engineering productivity. The operating rhythm should review a small set of signals together, interpret them in context, and turn learning into actions.\n\n## How to Read This Decision\n\n| What it says | What it does **not** say |\n| --- | --- |\n| Metrics should guide learning and improvement. | Metrics should rank individual engineers. |\n| Delivery flow and stability both matter. | Faster deployment is always better. |\n| Developer experience is a real management concern. | Feelings replace product and operational evidence. |\n| Team health should be visible. | Surveys are enough without follow-up action. |\n| Use a balanced set of signals. | Build a giant dashboard nobody acts on. |\n\nThe point is management attention, not measurement theatre.\n\n## How to Use This Decision\n\nUse this decision to:\n\n* explain why engineering productivity cannot be reduced to one number;\n* distinguish product outcomes, delivery flow, stability, quality, developer experience, and team health;\n* choose metrics that create learning rather than fear or gaming;\n* interpret team metrics in context instead of comparing teams mechanically;\n* turn a metrics review into an improvement decision.\n\nThe main lesson is that metrics are instruments for seeing the system. They are dangerous when used as individual surveillance or as substitutes for judgement.\n\n## One-Minute Mental Model\n\nEngineering metrics are a **balanced dashboard for a socio-technical system**.\n\nProduct outcomes tell whether work matters. Flow metrics tell whether change moves through the system. Stability and quality metrics tell whether change is safe. Developer experience and team health tell whether the system is sustainable.\n\nNo category is enough alone. A team can deploy often and still build the wrong thing. A team can have low incident count because it rarely changes anything. A team can close many tickets while burning out. Interpretation matters.\n\n## Rationale\n\nEngineering leaders need evidence, but the wrong evidence damages the system. Counting commits, lines of code, tickets closed, or story points encourages local activity and gaming. Teams become busy while outcomes, quality, and sustainability degrade.\n\nModern engineering metrics must respect that software work is socio-technical. Flow depends on architecture, dependencies, review speed, cognitive load, deployment paths, team health, product clarity, and operational feedback. A balanced model makes those constraints visible.\n\nThis ADR aligns with [Operational Principle: Observable by Default](../principles/observable-by-default.html), [Operational Principle: Production Ready](../principles/production-ready.html), and [Architecture as Advice and Guardrails](architecture-as-advice-and-guardrails.html). If the organisation cannot observe its own delivery system, it cannot improve it responsibly.\n\n## Metric Categories\n\n| Category | Example signals | Primary question |\n| --- | --- | --- |\n| Product outcomes | Adoption, conversion, retention, task success, internal-customer satisfaction. | Are we creating the intended value? |\n| Delivery flow | Lead time for changes, deployment frequency, WIP, dependency wait time. | Can teams move changes safely through the system? |\n| Stability and reliability | Change fail rate, failed deployment recovery time, SLOs, incidents, alert quality. | Are users protected from change and operational failure? |\n| Quality | Escaped defects, flaky tests, automated confidence, support contacts, rework. | Are we building and validating the right level of quality? |\n| Developer experience | Feedback-loop time, cognitive load, friction, tool satisfaction, focus time. | Can engineers do good work without unnecessary drag? |\n| Team health | Clarity, trust, role balance, decision quality, collaboration, learning cadence. | Is the team sustainable and effective? |\n\nThe organisation should choose a small number of actionable signals per category rather than collecting everything.\n\n## Operating Rhythm\n\nMetrics should be reviewed at three levels:\n\n| Level | Cadence | Focus |\n| --- | --- | --- |\n| Team | Weekly to monthly | Local flow, quality, incidents, team health actions, product learning. |\n| Domain / group | Monthly to quarterly | Cross-team dependencies, platform friction, reliability trends, staffing gaps. |\n| Engineering leadership | Quarterly | Strategy, investment, capability gaps, systemic impediments, portfolio tradeoffs. |\n\nEvery review should end with decisions or experiments:\n\n* What did we learn?\n* Which constraint matters most now?\n* What will we change?\n* Who owns the follow-up?\n* When will we revisit?\n\nIf a metric produces no action over time, remove it.\n\n## Worked Example\n\nLeadership sees that deployment frequency is low in one domain.\n\nBad interpretation:\n\n* Tell teams to deploy more often.\n* Compare the domain unfavourably with another domain.\n* Ask managers to report weekly deployment counts.\n\nBetter interpretation:\n\n| Signal to inspect | Possible learning |\n| --- | --- |\n| Lead time | Work may wait in review, testing, dependency, or approval queues. |\n| Change fail rate | Teams may be avoiding deployments because releases are risky. |\n| Failed deployment recovery time | Rollback, observability, or incident response may be weak. |\n| Developer experience | Tooling, environments, or cognitive load may be slowing delivery. |\n| Product context | Work may be bundled because planning creates large batches. |\n\nThe response might be smaller batches, better test confidence, platform pipeline improvements, clearer ownership, or product planning changes. The metric opens the investigation; it does not dictate the answer.\n\n## Guardrails Against Harmful Use\n\nMetrics must not be used to:\n\n* rank individual engineers by activity;\n* compare teams without context;\n* punish teams for surfacing problems;\n* maximise one dimension while damaging another;\n* replace judgement with dashboards;\n* hide product or organisational problems behind engineering productivity language.\n\nAny metric used for performance management must be reviewed carefully. Most engineering flow metrics are safer as team and system signals than as individual evaluation data.\n\n## Team Health\n\nTeam health should be assessed explicitly. Useful prompts include:\n\n* Do we understand our mission and users?\n* Do we have the skills and roles needed for our ownership?\n* Are our decision rights clear?\n* Are dependencies manageable?\n* Can we release and operate confidently?\n* Do we have enough focus time?\n* Do we learn from incidents and defects?\n* Is the team sustainable?\n\nHealth checks are only useful if they create action. Repeatedly collecting low scores without changing the system teaches cynicism.\n\n## Anti-Patterns\n\n* **One productivity number.** Leadership asks for a single metric that ranks teams or individuals.\n* **Activity worship.** Commits, tickets, or story points are mistaken for value.\n* **Dashboard graveyard.** Metrics are collected but never interpreted or acted on.\n* **Context-free comparison.** A platform team, migration team, and product team are compared as if their work were identical.\n* **Metric fear.** Teams hide defects, incidents, or slowdowns because metrics are used punitively.\n* **Local optimisation.** Lead time improves while reliability, quality, or team health degrades.\n\n## Discussion Prompts\n\nUse these prompts in metrics reviews:\n\n* Which outcome are we trying to improve, and which metric is only a proxy?\n* What behaviour could this metric accidentally encourage?\n* What context is needed before comparing this signal across teams?\n* Which metric moved, and what changed in the system of work?\n* What decision or experiment follows from this review?\n* Which metric should we stop tracking because nobody acts on it?\n\n## Related Records\n\n* [Product and Engineering Partnership Around Outcomes](product-engineering-partnership.html) - product and engineering share outcome measurement.\n* [Quality Engineering as Enablement, Not a Release Gate](quality-engineering-enablement.html) - quality signals belong in the model.\n* [Platform and DevOps Operating Model](platform-and-devops-operating-model.html) - platform teams use adoption and friction metrics.\n* [Engineering Management Operating Model](engineering-management-operating-model.html) - EMs use metrics to improve the system of work.\n* [Operational Principle: Observable by Default](../principles/observable-by-default.html) - observability applies to systems and delivery health.\n* [Operational Principle: Production Ready](../principles/production-ready.html) - operational readiness should be measured.\n\n## Scope and Revisiting\n\nThis ADR applies to engineering leadership, product engineering teams, platform teams, and communities responsible for engineering practice.\n\nRevisit if metrics are used punitively, if dashboards grow without action, if teams game measures, or if leadership cannot see the main constraints in engineering flow.\n\n## Authoritative References\n\n* DORA, [software delivery performance metrics](https://dora.dev/guides/dora-metrics/).\n* Microsoft Research, [The SPACE of Developer Productivity](https://www.microsoft.com/en-us/research/publication/the-space-of-developer-productivity-theres-more-to-it-than-you-think/).\n* ACM Queue, [DevEx: What Actually Drives Productivity](https://queue.acm.org/detail.cfm?id=3595878).\n* Atlassian Team Playbook, [Team Health Monitor](https://www.atlassian.com/team-playbook/health-monitor).\n"}]}]}</script>
<script>
    (function () {
        const data = JSON.parse(document.getElementById('data').textContent);
        const root = document.getElementById('content');

        const postId = (data.meta && data.meta.id) ? String(data.meta.id) : '';
        const postStatusRaw = (data.meta && data.meta.status) ? String(data.meta.status) : '';
        if (postId || postStatusRaw) {
            const header = document.getElementById('post-header');
            let sectionEl = header.querySelector('p.section');
            if (!sectionEl) {
                sectionEl = document.createElement('p');
                sectionEl.className = 'section';
                header.insertBefore(sectionEl, header.firstChild);
            }
            // Status pill goes first, then a " / " separator before the existing
            // content (section name and/or id).
            if (postStatusRaw) {
                const parts = postStatusRaw.split(':');
                const statusName = parts[0].trim();
                const statusColor = (parts[1] || '').trim();
                const wrap = document.createElement('span');
                wrap.className = 'post-status';
                const dot = document.createElement('span');
                dot.className = 'status-dot';
                if (statusColor) dot.style.background = statusColor;
                wrap.appendChild(dot);
                wrap.appendChild(document.createTextNode(statusName));
                if (sectionEl.firstChild) {
                    sectionEl.insertBefore(document.createTextNode(' • '), sectionEl.firstChild);
                    sectionEl.insertBefore(wrap, sectionEl.firstChild);
                } else {
                    sectionEl.appendChild(wrap);
                }
            }
            if (postId) {
                if (sectionEl.firstChild) sectionEl.appendChild(document.createTextNode(' • '));
                sectionEl.appendChild(document.createTextNode(postId));
            }
        }

        const tagsHost = document.getElementById('tags');
        (data.tags || []).forEach(function (t) {
            const span = document.createElement('span');
            span.className = 'tag';
            span.textContent = t;
            tagsHost.appendChild(span);
        });

        // Minimal markdown renderer. Supports: ATX headings, paragraphs, blockquotes,
        // unordered/ordered lists, fenced code, inline code, bold/italic/strikethrough, links, images, hr.
        // Sufficient for the posts in this repo; replace with a fuller parser if needed.
        function renderMarkdown(src) {
            const lines = src.replace(/\r\n/g, '\n').split('\n');
            const out = [];
            let i = 0;

            const bullet = /^(\s*)([-*])\s+(.*)$/;
            const ordered = /^(\s*)(\d+)\.\s+(.*)$/;
            const tableRow = /^\s*\|(.+)\|\s*$/;
            const tableSep = /^\s*\|?\s*:?-{3,}:?\s*(\|\s*:?-{3,}:?\s*)+\|?\s*$/;

            function splitRow(s) {
                let t = s.trim();
                if (t.startsWith('|')) t = t.slice(1);
                if (t.endsWith('|')) t = t.slice(0, -1);
                return t.split('|').map(c => c.trim());
            }

            function inline(s) {
                // Posts are trusted content, so raw HTML passes through unescaped
                // (some posts embed inline <blockquote>, <div>, etc.).
                // Stray ampersands still get fixed up.
                s = s.replace(/&(?![a-zA-Z]+;|#\d+;)/g, '&amp;');
                s = s.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<a class="image-link" href="$2" target="_blank" rel="noopener noreferrer"><img alt="$1" src="$2"></a>');
                s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
                s = s.replace(/`([^`]+)`/g, function (_, c) {
                    return '<code>' + c.replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</code>';
                });
                s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
                s = s.replace(/~~([^~\n]+)~~/g, '<del>$1</del>');
                s = s.replace(/(^|[^*])\*([^*\n]+)\*/g, '$1<em>$2</em>');
                return s;
            }

            while (i < lines.length) {
                const line = lines[i];
                if (!line.trim()) {
                    i++;
                    continue;
                }

                const fence = line.match(/^```(\w*)\s*$/);
                if (fence) {
                    i++;
                    const buf = [];
                    while (i < lines.length && !/^```\s*$/.test(lines[i])) {
                        buf.push(lines[i]);
                        i++;
                    }
                    i++;
                    const escaped = buf.join('\n').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                    const cls = fence[1] ? ' class="lang-' + fence[1] + '"' : '';
                    out.push('<pre><code' + cls + '>' + escaped + '</code></pre>');
                    continue;
                }

                const h = line.match(/^(#{1,6})\s+(.*)$/);
                if (h) {
                    out.push('<h' + h[1].length + '>' + inline(h[2]) + '</h' + h[1].length + '>');
                    i++;
                    continue;
                }

                if (/^\s*(?:-\s*){3,}\s*$/.test(line) || /^\s*\*{3,}\s*$/.test(line)) {
                    out.push('<hr>');
                    i++;
                    continue;
                }

                if (/^>\s?/.test(line)) {
                    const buf = [];
                    while (i < lines.length && /^>\s?/.test(lines[i])) {
                        buf.push(lines[i].replace(/^>\s?/, ''));
                        i++;
                    }
                    out.push('<blockquote>' + renderMarkdown(buf.join('\n')) + '</blockquote>');
                    continue;
                }

                if (tableRow.test(line) && i + 1 < lines.length && tableSep.test(lines[i + 1])) {
                    const headers = splitRow(line);
                    i += 2;
                    const rows = [];
                    while (i < lines.length && tableRow.test(lines[i])) {
                        rows.push(splitRow(lines[i]));
                        i++;
                    }
                    let html = '<table><thead><tr>';
                    headers.forEach(h => {
                        html += '<th>' + inline(h) + '</th>';
                    });
                    html += '</tr></thead><tbody>';
                    rows.forEach(r => {
                        html += '<tr>';
                        r.forEach(c => {
                            html += '<td>' + inline(c) + '</td>';
                        });
                        html += '</tr>';
                    });
                    html += '</tbody></table>';
                    out.push(html);
                    continue;
                }

                if (bullet.test(line) || ordered.test(line)) {
                    // Indent of the first bullet defines this list's base level.
                    // Deeper-indented bullets become nested lists (rendered by
                    // recursing into renderMarkdown). Same-or-less indent at a
                    // bullet starts a sibling item (or ends the list).
                    const firstMatch = line.match(bullet) || line.match(ordered);
                    const baseIndent = firstMatch[1].length;
                    const isOrdered = ordered.test(line);
                    const items = [];
                    while (i < lines.length) {
                        const cur = lines[i];
                        if (!cur.trim()) {
                            // blank line breaks the list (matches CommonMark-ish behaviour)
                            i++;
                            break;
                        }
                        const mBul = cur.match(bullet);
                        const mOrd = cur.match(ordered);
                        const m = mBul || mOrd;
                        if (!m) break;
                        if (m[1].length < baseIndent) break;
                        if (m[1].length > baseIndent) break; // shouldn't happen at top of loop
                        // Same-type check: switching between -/* and 1. closes the list
                        if (isOrdered !== !!mOrd) break;

                        const itemBuf = [m[3]];
                        const nestedBuf = [];
                        i++;
                        while (i < lines.length) {
                            const nxt = lines[i];
                            if (!nxt.trim()) break;
                            const nBul = nxt.match(bullet);
                            const nOrd = nxt.match(ordered);
                            const nm = nBul || nOrd;
                            if (nm) {
                                if (nm[1].length > baseIndent) {
                                    // nested list line — dedent and stash
                                    nestedBuf.push(nxt.slice(baseIndent + 2));
                                    i++;
                                    continue;
                                }
                                // sibling or end of list
                                break;
                            }
                            // Plain continuation text
                            if (nestedBuf.length) {
                                // continuation inside the nested block
                                nestedBuf.push(nxt.slice(baseIndent + 2));
                            } else {
                                itemBuf.push(nxt.trim());
                            }
                            i++;
                        }

                        let liHtml = inline(itemBuf.join('\n'));
                        if (nestedBuf.length) {
                            liHtml += renderMarkdown(nestedBuf.join('\n'));
                        }
                        items.push('<li>' + liHtml + '</li>');
                    }
                    out.push((isOrdered ? '<ol>' : '<ul>') + items.join('') + (isOrdered ? '</ol>' : '</ul>'));
                    continue;
                }

                const buf = [line];
                i++;
                while (i < lines.length && lines[i].trim() && !/^#{1,6}\s/.test(lines[i]) && !/^>\s?/.test(lines[i]) && !bullet.test(lines[i]) && !ordered.test(lines[i]) && !/^```/.test(lines[i]) && !tableRow.test(lines[i])) {
                    buf.push(lines[i]);
                    i++;
                }
                out.push('<p>' + inline(buf.join(' ')) + '</p>');
            }
            return out.join('\n');
        }

        // Block dispatcher. New block types plug in here.
        const renderers = {
            markdown: function (block) {
                const div = document.createElement('div');
                div.innerHTML = renderMarkdown(block.content);
                return div;
            },
            mermaid: function (block) {
                // Mermaid scans elements with class "mermaid" whose textContent
                // is the diagram source. We collect these nodes and run
                // mermaid.run() once after all blocks are in the DOM.
                const div = document.createElement('div');
                div.className = 'mermaid';
                div.textContent = block.content;
                return div;
            },
            'force-graph': function (block) {
                // build.py emits parsed JSON: {nodes:[{id,size}], links:[{source,target}]}.
                // We instantiate force-graph after the container is in the DOM
                // so it can measure its own width.
                const div = document.createElement('div');
                div.className = 'force-graph';
                const data = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.ForceGraph) return;
                    const maxSize = data.nodes.reduce((m, n) => Math.max(m, n.size || 1), 1);
                    window.ForceGraph()(div)
                        .graphData(data)
                        .width(div.clientWidth)
                        .height(div.clientHeight)
                        .nodeRelSize(4)
                        .nodeVal(n => Math.max(20 * (n.size || 1) / maxSize, 0.001))
                        .nodeLabel(n => n.id + ' (' + (n.size || 1) + ')')
                        .nodeColor(() => 'rgba(135, 206, 235, 0.7)')
                        .linkColor(() => 'rgba(60, 60, 60, 0.4)')
                        .linkDirectionalArrowLength(4)
                        .linkDirectionalArrowRelPos(1)
                        .linkWidth(1);
                });
                return div;
            },
            'bubble-chart': function (block) {
                // build.py emits {nodes:[{name,size}]}. Renders a D3 circle-pack
                // SVG (same shape as the obren.io reference, just inline).
                const wrap = document.createElement('div');
                wrap.className = 'bubble-chart';
                const payload = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.d3) return;
                    const diameter = 480;
                    const fill = '#c0deed';
                    const textColor = '#111111';
                    const fontSize = 12;

                    const svg = window.d3.select(wrap).append('svg')
                        .attr('viewBox', '0 0 ' + diameter + ' ' + diameter)
                        .attr('width', diameter)
                        .attr('height', diameter);

                    const root = window.d3.hierarchy({children: payload.nodes})
                        .sum(d => d.size || 0)
                        .sort((a, b) => b.value - a.value);

                    window.d3.pack().size([diameter, diameter]).padding(2)(root);

                    const node = svg.selectAll('g')
                        .data(root.leaves())
                        .enter().append('g')
                        .attr('transform', d => 'translate(' + d.x + ',' + d.y + ')');

                    node.append('title').text(d => d.data.name + ': ' + d.value);
                    node.append('circle').attr('r', d => d.r).style('fill', fill);
                    node.append('text')
                        .attr('dy', '.3em')
                        .style('text-anchor', 'middle')
                        .style('fill', textColor)
                        .style('font-size', fontSize + 'px')
                        .text(d => d.data.name.substring(0, Math.max(0, Math.floor(d.r / 3))));
                });
                return wrap;
            }
        };

        // Render one modality's blocks into a host element. Mermaid runs
        // scoped to just the nodes created here, so lazily rendered tabs get
        // their diagrams on first activation.
        let mermaidInitialized = false;
        function renderBlocksInto(blocks, host) {
            const mermaidNodes = [];
            blocks.forEach(function (block) {
                const r = renderers[block.type];
                if (!r) {
                    const pre = document.createElement('pre');
                    pre.textContent = '[unknown block type: ' + block.type + ']';
                    host.appendChild(pre);
                    return;
                }
                const node = r(block);
                if (node instanceof Node) {
                    host.appendChild(node);
                    if (block.type === 'mermaid') mermaidNodes.push(node);
                }
            });
            if (mermaidNodes.length && window.mermaid) {
                if (!mermaidInitialized) {
                    window.mermaid.initialize({startOnLoad: false, theme: 'default'});
                    mermaidInitialized = true;
                }
                window.mermaid.run({nodes: mermaidNodes});
            }
        }

        // Modality tabs. One <article class="pane"> per modality; panes are
        // rendered lazily on first activation (force-graph / D3 / mermaid
        // need a visible, measurable container). With a single modality the
        // tab bar stays hidden and the page looks exactly like before.
        const mods = data.modalities;
        const tabBar = document.getElementById('modality-tabs');
        const panes = {};
        const tabButtons = {};
        const renderedPanes = {};

        mods.forEach(function (m) {
            const pane = document.createElement('article');
            pane.className = 'pane';
            pane.dataset.key = m.key;
            pane.hidden = true;
            root.appendChild(pane);
            panes[m.key] = pane;
        });

        const defaultKey = mods.some(m => m.key === 'index') ? 'index' : mods[0].key;

        function activate(key, updateHash) {
            mods.forEach(function (m) {
                const isActive = m.key === key;
                panes[m.key].hidden = !isActive;
                if (tabButtons[m.key]) {
                    tabButtons[m.key].classList.toggle('active', isActive);
                    tabButtons[m.key].setAttribute('aria-selected', isActive ? 'true' : 'false');
                }
            });
            // Unhide first, then render: the chart libraries measure widths.
            if (!renderedPanes[key]) {
                renderBlocksInto(mods.find(m => m.key === key).blocks, panes[key]);
                renderedPanes[key] = true;
            }
            if (updateHash) {
                history.replaceState(null, '',
                    key === defaultKey ? location.pathname + location.search : '#' + key);
            }
        }

        if (mods.length > 1) {
            mods.forEach(function (m) {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.textContent = m.label;
                btn.setAttribute('role', 'tab');
                btn.addEventListener('click', function () { activate(m.key, true); });
                tabBar.appendChild(btn);
                tabButtons[m.key] = btn;
            });
            tabBar.hidden = false;
        }

        // The hash selects a tab only when it matches a modality key, so
        // existing anchors keep working.
        const initialHash = location.hash.slice(1);
        activate(mods.some(m => m.key === initialHash) ? initialHash : defaultKey, false);
        window.addEventListener('hashchange', function () {
            const k = location.hash.slice(1);
            if (mods.some(m => m.key === k)) activate(k, false);
        });
    })();
</script>
</body>
</html>
