<script id="data" type="application/json">{"meta": {"id": "ORG-ORG-ENGINEERING-MANAGEMENT-OPERATING-MODEL", "status": "draft:gray", "title": "Engineering Management Operating Model", "date": "2026-05-17", "author": "Organization Org Design", "permalink": "engineering-management-operating-model", "timetoread": "11 min", "excerpt": "Engineering management at Organization is accountable for people, team health, delivery systems, capability, and organisational clarity. Engineering managers are not project administrators or the default technical decision makers; they create the conditions for teams to own outcomes sustainably.", "tags": "org-design, engineering-management, leadership, team-health, delivery", "icon": "assets/icons/engineering-management-operating-model.png", "logo": "assets/images/engineering-management-operating-model/logo.jpeg", "logo_credit": "Image generated by Google Gemini (gemini-3-pro-image-preview)"}, "tags": ["org-design", "engineering-management", "leadership", "team-health", "delivery"], "modalities": [{"key": "index", "label": "Article", "meta": {}, "blocks": [{"type": "markdown", "content": "> **Status**: DRAFT\n>\n> **Decision**: Organization will treat engineering management as a distinct leadership discipline. Engineering managers are accountable for people growth, team health, hiring, performance, delivery systems, organisational clarity, and sustainable execution. They partner with product and technical leaders; they do not replace product ownership, technical leadership, or project administration.\n\n## Decision\n\nDefine the **engineering management operating model**.\n\nEngineering managers are accountable for:\n\n* building and maintaining healthy teams;\n* coaching and developing engineers;\n* hiring, onboarding, performance, and progression;\n* ensuring teams have clear missions, roles, and working agreements;\n* improving the delivery system and removing organisational impediments;\n* partnering with product and design leadership on outcomes and priorities;\n* ensuring technical health, operational health, and quality have real capacity;\n* escalating unresolved constraints with evidence.\n\nEngineering managers are not the default owner of every technical decision. They ensure the right people can make and record those decisions.\n\n## How to Read This Decision\n\n| What it says | What it does **not** say |\n| --- | --- |\n| Engineering management is a profession. | Strong engineers naturally know how to manage. |\n| EMs own team health and delivery systems. | EMs personally manage every task and deadline. |\n| EMs partner with product and tech leads. | EMs replace product managers or tech leads. |\n| EMs need technical judgement. | EMs must be the primary architect. |\n| EM span of control should be healthy. | Every reporting line has the same number of people. |\n\nThe EM role exists to make sustained team ownership possible.\n\n## How to Use This Decision\n\nUse this decision to:\n\n* explain what engineering managers are accountable for beyond project tracking;\n* distinguish management work from product ownership and technical leadership;\n* recognise when autonomy has become neglect or management has become micromanagement;\n* reason about healthy span of control;\n* use the EM/PM/tech-lead partnership to clarify decisions and tradeoffs.\n\nThe main learning is that good management is not command-and-control. It is the deliberate design and maintenance of the people system that lets teams own outcomes sustainably.\n\n## One-Minute Mental Model\n\nEngineering management is **stewardship of the team system**.\n\nThe manager does not need to make every product or technical decision. The manager makes sure the team has mission clarity, staffing, skills, feedback, focus, accountability, and a healthy delivery system. When those conditions are missing, autonomy becomes abandonment.\n\nThe strongest EMs create teams that can make better decisions without routing every decision through the manager.\n\n## Rationale\n\nModern engineering teams need autonomy, but autonomy without management becomes neglect. Teams need clarity, feedback, staffing, performance handling, prioritisation discipline, and protection from overload. Those are management responsibilities.\n\nAt the same time, management should not collapse into project chasing. If the EM becomes the person assigning every ticket, approving every technical choice, and negotiating every delivery detail, the team loses ownership and the EM becomes a bottleneck.\n\nThe operating model separates leadership concerns:\n\n* product leadership clarifies value and priority;\n* technical leadership clarifies technical tradeoffs and system direction;\n* engineering management clarifies team capability, delivery health, people growth, and organisational constraints.\n\nThe three roles overlap through partnership, not role confusion.\n\n## EM Responsibilities\n\n| Responsibility | Good evidence |\n| --- | --- |\n| Team health | Regular 1:1s, retrospectives, health checks, psychological safety, manageable load. |\n| Capability growth | Growth plans, mentoring, hiring plan, skill gaps visible and acted on. |\n| Delivery system | Flow impediments identified, WIP controlled, dependencies managed, planning realistic. |\n| Performance | Expectations clear, feedback timely, underperformance handled directly and fairly. |\n| Product partnership | Priorities understood, tradeoffs explicit, scope/time/quality decisions visible. |\n| Technical health | Technical debt and reliability work funded, not hidden behind feature delivery. |\n| Organisational clarity | Team mission, ownership, dependencies, and decision rights are clear. |\n\nThe EM does not need to solve every item personally. The EM is accountable for ensuring the system handles them.\n\n## Span of Control\n\nHealthy management span depends on maturity, domain complexity, seniority mix, and amount of change. As a starting guardrail:\n\n| Situation | Suggested span |\n| --- | --- |\n| New manager, new team, high change, many juniors | 4-6 direct reports |\n| Stable team with mixed seniority | 6-8 direct reports |\n| Very senior, stable group with strong tech leads | 8-10 direct reports may be possible |\n| Manager of managers | Fewer direct reports, higher organisational scope |\n\nWhen span is too large, management becomes reactive. Career development and performance feedback degrade first, then team health, then delivery quality.\n\n## EM, PM, and Tech Lead Partnership\n\nThe core leadership triangle:\n\n| Role | Owns primarily | Must partner on |\n| --- | --- | --- |\n| Product partner | Product value, user/customer outcomes, priority, stakeholder context. | Feasibility, quality, team capacity, discovery, delivery tradeoffs. |\n| Engineering manager | Team health, people, capability, delivery system, staffing. | Priority, technical health, incidents, planning, performance expectations. |\n| Tech lead / senior IC | Technical direction, design quality, engineering tradeoffs, local architecture. | Product outcome, team skill growth, delivery sequencing, operational health. |\n\nNo role should become a proxy for the others. If the PM is absent, the EM should not quietly become product owner. If the tech lead is absent, the EM should not become permanent architect by default.\n\n## Worked Example\n\nA team is missing delivery commitments and quality is slipping.\n\nProject-manager reaction:\n\n* Ask for more detailed status updates.\n* Push engineers to commit harder.\n* Escalate delays late.\n* Treat quality work as a competing backlog item.\n\nEngineering-management reaction:\n\n| Question | Management action |\n| --- | --- |\n| Is the team overloaded? | Review WIP, support load, unplanned work, and priority conflicts. |\n| Is the mission clear? | Reconfirm outcomes, tradeoffs, and decision rights with product and tech lead. |\n| Is capability missing? | Identify skill gaps, mentoring needs, hiring needs, or platform support. |\n| Is technical debt blocking flow? | Make technical health visible in planning and leadership tradeoff discussions. |\n| Is feedback healthy? | Use retrospectives, 1:1s, and metrics to identify systemic blockers. |\n\nThe EM still cares about delivery. The difference is that delivery failure is treated as a system signal, not only an individual effort problem.\n\n## Anti-Patterns\n\n* **Project-manager EM.** The manager tracks tasks but does not coach people, improve systems, or handle performance.\n* **Chief architect EM.** Every technical decision routes through the manager.\n* **Absentee autonomy.** The team is told it is autonomous but receives no coaching, context, or impediment removal.\n* **Too many reports.** The manager has so many people that 1:1s, feedback, and growth become symbolic.\n* **Priority shield failure.** The EM lets uncontrolled demand overload the team and then treats burnout as motivation.\n* **Career path confusion.** Engineers become managers without understanding the change in work.\n\n## Discussion Prompts\n\nUse these prompts in EM self-reviews or leadership reviews:\n\n* What part of the team's system most limits sustainable delivery right now?\n* Are 1:1s producing growth and feedback, or only status?\n* Which team decisions route through the manager unnecessarily?\n* Which people issues are being avoided because delivery pressure is high?\n* Does the team have enough technical leadership and product partnership?\n* Is the manager's span still compatible with real coaching and performance work?\n\n## Related Records\n\n* [Dual Career Paths and Transparent Progression](career-paths-and-progression.html) - management is one career path, not the default reward.\n* [Staff-Plus Technical Leadership](staff-plus-technical-leadership.html) - technical leadership complements management.\n* [Product and Engineering Partnership Around Outcomes](product-engineering-partnership.html) - EMs partner with product and engineering leads.\n* [Team Size and Composition Guardrails](team-size-and-composition.html) - team shape and management span are linked.\n* [Organisation Health and Flow Metrics](org-health-and-flow-metrics.html) - EMs use metrics for learning and system improvement.\n\n## Scope and Revisiting\n\nThis ADR applies to engineering management roles and their partnership with product, design, quality, platform, and senior technical roles.\n\nRevisit if managers are overloaded, if teams lack clarity, if technical decisions route through managers by default, or if career progression keeps pushing engineers into management against their strengths.\n\n## Authoritative References\n\n* GitLab Handbook, [Engineering Leadership](https://handbook.gitlab.com/job-families/engineering/development/management/).\n* Atlassian Team Playbook, [Team Health Monitor](https://www.atlassian.com/team-playbook/health-monitor).\n* Camille Fournier, *The Manager's Path*.\n"}]}]}</script>
<script>
    (function () {
        const data = JSON.parse(document.getElementById('data').textContent);
        const root = document.getElementById('content');

        const postId = (data.meta && data.meta.id) ? String(data.meta.id) : '';
        const postStatusRaw = (data.meta && data.meta.status) ? String(data.meta.status) : '';
        if (postId || postStatusRaw) {
            const header = document.getElementById('post-header');
            let sectionEl = header.querySelector('p.section');
            if (!sectionEl) {
                sectionEl = document.createElement('p');
                sectionEl.className = 'section';
                header.insertBefore(sectionEl, header.firstChild);
            }
            // Status pill goes first, then a " / " separator before the existing
            // content (section name and/or id).
            if (postStatusRaw) {
                const parts = postStatusRaw.split(':');
                const statusName = parts[0].trim();
                const statusColor = (parts[1] || '').trim();
                const wrap = document.createElement('span');
                wrap.className = 'post-status';
                const dot = document.createElement('span');
                dot.className = 'status-dot';
                if (statusColor) dot.style.background = statusColor;
                wrap.appendChild(dot);
                wrap.appendChild(document.createTextNode(statusName));
                if (sectionEl.firstChild) {
                    sectionEl.insertBefore(document.createTextNode(' • '), sectionEl.firstChild);
                    sectionEl.insertBefore(wrap, sectionEl.firstChild);
                } else {
                    sectionEl.appendChild(wrap);
                }
            }
            if (postId) {
                if (sectionEl.firstChild) sectionEl.appendChild(document.createTextNode(' • '));
                sectionEl.appendChild(document.createTextNode(postId));
            }
        }

        const tagsHost = document.getElementById('tags');
        (data.tags || []).forEach(function (t) {
            const span = document.createElement('span');
            span.className = 'tag';
            span.textContent = t;
            tagsHost.appendChild(span);
        });

        // Minimal markdown renderer. Supports: ATX headings, paragraphs, blockquotes,
        // unordered/ordered lists, fenced code, inline code, bold/italic/strikethrough, links, images, hr.
        // Sufficient for the posts in this repo; replace with a fuller parser if needed.
        function renderMarkdown(src) {
            const lines = src.replace(/\r\n/g, '\n').split('\n');
            const out = [];
            let i = 0;

            const bullet = /^(\s*)([-*])\s+(.*)$/;
            const ordered = /^(\s*)(\d+)\.\s+(.*)$/;
            const tableRow = /^\s*\|(.+)\|\s*$/;
            const tableSep = /^\s*\|?\s*:?-{3,}:?\s*(\|\s*:?-{3,}:?\s*)+\|?\s*$/;

            function splitRow(s) {
                let t = s.trim();
                if (t.startsWith('|')) t = t.slice(1);
                if (t.endsWith('|')) t = t.slice(0, -1);
                return t.split('|').map(c => c.trim());
            }

            function inline(s) {
                // Posts are trusted content, so raw HTML passes through unescaped
                // (some posts embed inline <blockquote>, <div>, etc.).
                // Stray ampersands still get fixed up.
                s = s.replace(/&(?![a-zA-Z]+;|#\d+;)/g, '&amp;');
                s = s.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<a class="image-link" href="$2" target="_blank" rel="noopener noreferrer"><img alt="$1" src="$2"></a>');
                s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
                s = s.replace(/`([^`]+)`/g, function (_, c) {
                    return '<code>' + c.replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</code>';
                });
                s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
                s = s.replace(/~~([^~\n]+)~~/g, '<del>$1</del>');
                s = s.replace(/(^|[^*])\*([^*\n]+)\*/g, '$1<em>$2</em>');
                return s;
            }

            while (i < lines.length) {
                const line = lines[i];
                if (!line.trim()) {
                    i++;
                    continue;
                }

                const fence = line.match(/^```(\w*)\s*$/);
                if (fence) {
                    i++;
                    const buf = [];
                    while (i < lines.length && !/^```\s*$/.test(lines[i])) {
                        buf.push(lines[i]);
                        i++;
                    }
                    i++;
                    const escaped = buf.join('\n').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                    const cls = fence[1] ? ' class="lang-' + fence[1] + '"' : '';
                    out.push('<pre><code' + cls + '>' + escaped + '</code></pre>');
                    continue;
                }

                const h = line.match(/^(#{1,6})\s+(.*)$/);
                if (h) {
                    out.push('<h' + h[1].length + '>' + inline(h[2]) + '</h' + h[1].length + '>');
                    i++;
                    continue;
                }

                if (/^\s*(?:-\s*){3,}\s*$/.test(line) || /^\s*\*{3,}\s*$/.test(line)) {
                    out.push('<hr>');
                    i++;
                    continue;
                }

                if (/^>\s?/.test(line)) {
                    const buf = [];
                    while (i < lines.length && /^>\s?/.test(lines[i])) {
                        buf.push(lines[i].replace(/^>\s?/, ''));
                        i++;
                    }
                    out.push('<blockquote>' + renderMarkdown(buf.join('\n')) + '</blockquote>');
                    continue;
                }

                if (tableRow.test(line) && i + 1 < lines.length && tableSep.test(lines[i + 1])) {
                    const headers = splitRow(line);
                    i += 2;
                    const rows = [];
                    while (i < lines.length && tableRow.test(lines[i])) {
                        rows.push(splitRow(lines[i]));
                        i++;
                    }
                    let html = '<table><thead><tr>';
                    headers.forEach(h => {
                        html += '<th>' + inline(h) + '</th>';
                    });
                    html += '</tr></thead><tbody>';
                    rows.forEach(r => {
                        html += '<tr>';
                        r.forEach(c => {
                            html += '<td>' + inline(c) + '</td>';
                        });
                        html += '</tr>';
                    });
                    html += '</tbody></table>';
                    out.push(html);
                    continue;
                }

                if (bullet.test(line) || ordered.test(line)) {
                    // Indent of the first bullet defines this list's base level.
                    // Deeper-indented bullets become nested lists (rendered by
                    // recursing into renderMarkdown). Same-or-less indent at a
                    // bullet starts a sibling item (or ends the list).
                    const firstMatch = line.match(bullet) || line.match(ordered);
                    const baseIndent = firstMatch[1].length;
                    const isOrdered = ordered.test(line);
                    const items = [];
                    while (i < lines.length) {
                        const cur = lines[i];
                        if (!cur.trim()) {
                            // blank line breaks the list (matches CommonMark-ish behaviour)
                            i++;
                            break;
                        }
                        const mBul = cur.match(bullet);
                        const mOrd = cur.match(ordered);
                        const m = mBul || mOrd;
                        if (!m) break;
                        if (m[1].length < baseIndent) break;
                        if (m[1].length > baseIndent) break; // shouldn't happen at top of loop
                        // Same-type check: switching between -/* and 1. closes the list
                        if (isOrdered !== !!mOrd) break;

                        const itemBuf = [m[3]];
                        const nestedBuf = [];
                        i++;
                        while (i < lines.length) {
                            const nxt = lines[i];
                            if (!nxt.trim()) break;
                            const nBul = nxt.match(bullet);
                            const nOrd = nxt.match(ordered);
                            const nm = nBul || nOrd;
                            if (nm) {
                                if (nm[1].length > baseIndent) {
                                    // nested list line — dedent and stash
                                    nestedBuf.push(nxt.slice(baseIndent + 2));
                                    i++;
                                    continue;
                                }
                                // sibling or end of list
                                break;
                            }
                            // Plain continuation text
                            if (nestedBuf.length) {
                                // continuation inside the nested block
                                nestedBuf.push(nxt.slice(baseIndent + 2));
                            } else {
                                itemBuf.push(nxt.trim());
                            }
                            i++;
                        }

                        let liHtml = inline(itemBuf.join('\n'));
                        if (nestedBuf.length) {
                            liHtml += renderMarkdown(nestedBuf.join('\n'));
                        }
                        items.push('<li>' + liHtml + '</li>');
                    }
                    out.push((isOrdered ? '<ol>' : '<ul>') + items.join('') + (isOrdered ? '</ol>' : '</ul>'));
                    continue;
                }

                const buf = [line];
                i++;
                while (i < lines.length && lines[i].trim() && !/^#{1,6}\s/.test(lines[i]) && !/^>\s?/.test(lines[i]) && !bullet.test(lines[i]) && !ordered.test(lines[i]) && !/^```/.test(lines[i]) && !tableRow.test(lines[i])) {
                    buf.push(lines[i]);
                    i++;
                }
                out.push('<p>' + inline(buf.join(' ')) + '</p>');
            }
            return out.join('\n');
        }

        // Block dispatcher. New block types plug in here.
        const renderers = {
            markdown: function (block) {
                const div = document.createElement('div');
                div.innerHTML = renderMarkdown(block.content);
                return div;
            },
            mermaid: function (block) {
                // Mermaid scans elements with class "mermaid" whose textContent
                // is the diagram source. We collect these nodes and run
                // mermaid.run() once after all blocks are in the DOM.
                const div = document.createElement('div');
                div.className = 'mermaid';
                div.textContent = block.content;
                return div;
            },
            'force-graph': function (block) {
                // build.py emits parsed JSON: {nodes:[{id,size}], links:[{source,target}]}.
                // We instantiate force-graph after the container is in the DOM
                // so it can measure its own width.
                const div = document.createElement('div');
                div.className = 'force-graph';
                const data = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.ForceGraph) return;
                    const maxSize = data.nodes.reduce((m, n) => Math.max(m, n.size || 1), 1);
                    window.ForceGraph()(div)
                        .graphData(data)
                        .width(div.clientWidth)
                        .height(div.clientHeight)
                        .nodeRelSize(4)
                        .nodeVal(n => Math.max(20 * (n.size || 1) / maxSize, 0.001))
                        .nodeLabel(n => n.id + ' (' + (n.size || 1) + ')')
                        .nodeColor(() => 'rgba(135, 206, 235, 0.7)')
                        .linkColor(() => 'rgba(60, 60, 60, 0.4)')
                        .linkDirectionalArrowLength(4)
                        .linkDirectionalArrowRelPos(1)
                        .linkWidth(1);
                });
                return div;
            },
            'bubble-chart': function (block) {
                // build.py emits {nodes:[{name,size}]}. Renders a D3 circle-pack
                // SVG (same shape as the obren.io reference, just inline).
                const wrap = document.createElement('div');
                wrap.className = 'bubble-chart';
                const payload = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.d3) return;
                    const diameter = 480;
                    const fill = '#c0deed';
                    const textColor = '#111111';
                    const fontSize = 12;

                    const svg = window.d3.select(wrap).append('svg')
                        .attr('viewBox', '0 0 ' + diameter + ' ' + diameter)
                        .attr('width', diameter)
                        .attr('height', diameter);

                    const root = window.d3.hierarchy({children: payload.nodes})
                        .sum(d => d.size || 0)
                        .sort((a, b) => b.value - a.value);

                    window.d3.pack().size([diameter, diameter]).padding(2)(root);

                    const node = svg.selectAll('g')
                        .data(root.leaves())
                        .enter().append('g')
                        .attr('transform', d => 'translate(' + d.x + ',' + d.y + ')');

                    node.append('title').text(d => d.data.name + ': ' + d.value);
                    node.append('circle').attr('r', d => d.r).style('fill', fill);
                    node.append('text')
                        .attr('dy', '.3em')
                        .style('text-anchor', 'middle')
                        .style('fill', textColor)
                        .style('font-size', fontSize + 'px')
                        .text(d => d.data.name.substring(0, Math.max(0, Math.floor(d.r / 3))));
                });
                return wrap;
            }
        };

        // Render one modality's blocks into a host element. Mermaid runs
        // scoped to just the nodes created here, so lazily rendered tabs get
        // their diagrams on first activation.
        let mermaidInitialized = false;
        function renderBlocksInto(blocks, host) {
            const mermaidNodes = [];
            blocks.forEach(function (block) {
                const r = renderers[block.type];
                if (!r) {
                    const pre = document.createElement('pre');
                    pre.textContent = '[unknown block type: ' + block.type + ']';
                    host.appendChild(pre);
                    return;
                }
                const node = r(block);
                if (node instanceof Node) {
                    host.appendChild(node);
                    if (block.type === 'mermaid') mermaidNodes.push(node);
                }
            });
            if (mermaidNodes.length && window.mermaid) {
                if (!mermaidInitialized) {
                    window.mermaid.initialize({startOnLoad: false, theme: 'default'});
                    mermaidInitialized = true;
                }
                window.mermaid.run({nodes: mermaidNodes});
            }
        }

        // Modality tabs. One <article class="pane"> per modality; panes are
        // rendered lazily on first activation (force-graph / D3 / mermaid
        // need a visible, measurable container). With a single modality the
        // tab bar stays hidden and the page looks exactly like before.
        const mods = data.modalities;
        const tabBar = document.getElementById('modality-tabs');
        const panes = {};
        const tabButtons = {};
        const renderedPanes = {};

        mods.forEach(function (m) {
            const pane = document.createElement('article');
            pane.className = 'pane';
            pane.dataset.key = m.key;
            pane.hidden = true;
            root.appendChild(pane);
            panes[m.key] = pane;
        });

        const defaultKey = mods.some(m => m.key === 'index') ? 'index' : mods[0].key;

        function activate(key, updateHash) {
            mods.forEach(function (m) {
                const isActive = m.key === key;
                panes[m.key].hidden = !isActive;
                if (tabButtons[m.key]) {
                    tabButtons[m.key].classList.toggle('active', isActive);
                    tabButtons[m.key].setAttribute('aria-selected', isActive ? 'true' : 'false');
                }
            });
            // Unhide first, then render: the chart libraries measure widths.
            if (!renderedPanes[key]) {
                renderBlocksInto(mods.find(m => m.key === key).blocks, panes[key]);
                renderedPanes[key] = true;
            }
            if (updateHash) {
                history.replaceState(null, '',
                    key === defaultKey ? location.pathname + location.search : '#' + key);
            }
        }

        if (mods.length > 1) {
            mods.forEach(function (m) {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.textContent = m.label;
                btn.setAttribute('role', 'tab');
                btn.addEventListener('click', function () { activate(m.key, true); });
                tabBar.appendChild(btn);
                tabButtons[m.key] = btn;
            });
            tabBar.hidden = false;
        }

        // The hash selects a tab only when it matches a modality key, so
        // existing anchors keep working.
        const initialHash = location.hash.slice(1);
        activate(mods.some(m => m.key === initialHash) ? initialHash : defaultKey, false);
        window.addEventListener('hashchange', function () {
            const k = location.hash.slice(1);
            if (mods.some(m => m.key === k)) activate(k, false);
        });
    })();
</script>
</body>
</html>
