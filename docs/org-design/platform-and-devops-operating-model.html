<script id="data" type="application/json">{"meta": {"id": "ORG-ORG-PLATFORM-AND-DEVOPS-OPERATING-MODEL", "status": "draft:gray", "title": "Platform and DevOps Operating Model", "date": "2026-05-17", "author": "Organization Org Design", "permalink": "platform-and-devops-operating-model", "timetoread": "11 min", "excerpt": "Organization will not use DevOps as a separate handoff team. Product teams own build-and-run responsibility for their services, while platform teams provide paved roads, self-service capabilities, reliability patterns, and expert enablement that reduce cognitive load.", "tags": "org-design, devops, platform-engineering, sre, operations, ownership", "icon": "assets/icons/platform-and-devops-operating-model.png", "logo": "assets/images/platform-and-devops-operating-model/logo.jpeg", "logo_credit": "Image generated by Google Gemini (gemini-3-pro-image-preview)"}, "tags": ["org-design", "devops", "platform-engineering", "sre", "operations", "ownership"], "blocks": [{"type": "markdown", "content": "> **Status**: DRAFT\n>\n> **Decision**: Organization will use a build-and-run operating model supported by platform product teams. DevOps is a way of working, not a separate ticket queue. Stream-aligned teams own their services in production; platform and reliability teams provide paved roads, self-service capabilities, guardrails, and enablement that reduce cognitive load and improve delivery speed.\n\n## Decision\n\nAdopt a **platform-enabled DevOps model**.\n\nThe default responsibilities are:\n\n| Area | Default owner |\n| --- | --- |\n| Application/service behaviour | Stream-aligned product team |\n| Production operation of owned services | Stream-aligned product team |\n| Internal developer platform capabilities | Platform product team |\n| Delivery pipelines and golden paths | Platform product team, with consuming-team feedback |\n| Reliability practices and SLO coaching | Reliability/platform enablement, with service teams accountable |\n| Cloud and infrastructure guardrails | Platform/security owners, encoded as reusable capabilities where possible |\n| Exceptions to paved roads | Owning team through Advice Process, with platform/security advice |\n\n\"You build it, you run it\" is not a slogan for abandoning teams. It requires platforms, standards, observability, support practices, and leadership capacity to make ownership realistic.\n\n## How to Read This Decision\n\n| What it says | What it does **not** say |\n| --- | --- |\n| DevOps is integrated into product teams. | Every engineer must be an infrastructure expert. |\n| Platform teams provide internal products. | Platform teams take ownership of every application. |\n| Paved roads should be easy and self-service. | Teams can never leave the paved road. |\n| Operations work should be engineered down. | Incidents, support, and toil can be ignored. |\n| Reliability is a product constraint. | Reliability teams are the only people responsible for reliability. |\n\nThe aim is to reduce handoffs without dumping unbounded complexity on stream-aligned teams.\n\n## How to Use This Decision\n\nUse this decision to:\n\n* explain why DevOps is a responsibility model, not a separate ticket team;\n* distinguish product-team production ownership from platform-team enablement;\n* describe what makes an internal platform a product;\n* identify when a paved road is helping teams and when it is becoming a constraint;\n* reason about SRE and reliability roles without outsourcing service ownership.\n\nThe key lesson is balance: teams should own what they build, but the organisation must reduce the cognitive load of that ownership through platforms, guardrails, and reusable capabilities.\n\n## One-Minute Mental Model\n\nPlatform-enabled DevOps is **ownership with leverage**.\n\nOwnership means the team changing a service sees and handles production consequences. Leverage means teams do not rebuild deployment, observability, infrastructure, compliance, and reliability patterns from scratch.\n\nIf ownership exists without leverage, product teams drown in infrastructure complexity. If leverage exists without ownership, platform becomes a helpdesk and services are thrown over the wall. The operating model needs both.\n\n## Rationale\n\nTraditional Dev/Ops separation optimises local roles and damages system outcomes. Product teams ship changes without operational feedback. Operations teams inherit systems they did not design. Platform expertise turns into a queue. Reliability work competes with feature delivery instead of shaping it.\n\nA modern engineering organisation needs both ownership and leverage:\n\n* ownership, because the team changing the service must feel production consequences;\n* leverage, because every team should not solve deployment, observability, security, and cloud primitives from scratch.\n\nPlatform teams create that leverage by treating internal capabilities as products. Their customers are stream-aligned teams. Their product quality is measured by adoption, reduced cognitive load, delivery speed, reliability, and developer experience.\n\n## Platform Product Expectations\n\nA platform capability should have:\n\n| Attribute | Meaning |\n| --- | --- |\n| Named internal customers | The platform exists for consuming teams, not for its own architecture. |\n| Clear product interface | Documentation, onboarding path, support model, API/CLI/templates, and lifecycle. |\n| Self-service default | Routine use does not require a ticket or private meeting. |\n| Guardrails | Security, compliance, reliability, and cost controls built into the path. |\n| Feedback loop | Consuming teams can report friction and influence roadmap. |\n| Adoption evidence | Platform owners know who uses it and where it fails. |\n| Exit path | Deprecated capabilities have migration and retirement plans. |\n\nThis is [Organisation Principle: Capabilities Follow Ownership](../principles/capabilities-follow-ownership.html) applied to internal platforms.\n\n## SRE and Reliability\n\nOrganization may use SRE or reliability roles where scale and risk justify them, but those roles must reinforce service ownership rather than replace it.\n\nHealthy patterns:\n\n* reliability specialists coach teams on SLOs, incident response, error budgets, observability, and toil reduction;\n* platform teams automate repeated operational work into paved roads;\n* service teams retain accountability for production behaviour;\n* handoffs are temporary, explicit, and paired with capability transfer.\n\nUnhealthy patterns:\n\n* SRE becomes the group that receives unreliable services;\n* platform becomes a deployment helpdesk;\n* \"DevOps team\" means old operations with a newer name;\n* product teams can ship without understanding alerts, logs, dashboards, or rollback.\n\n## Worked Example\n\nA product team wants to deploy a new service.\n\nWeak operating model:\n\n* The team files infrastructure tickets.\n* Another group creates cloud resources manually.\n* A DevOps team configures deployment.\n* Observability is added later if someone remembers.\n* Incidents route to whoever knows the deployment scripts.\n\nPlatform-enabled operating model:\n\n| Need | Platform-enabled answer |\n| --- | --- |\n| Service creation | A maintained service template with ownership, logging, tracing, deployment, and security defaults. |\n| Infrastructure | Self-service infrastructure module with policy guardrails. |\n| Deployment | Standard pipeline with rollback and environment conventions. |\n| Observability | Dashboard, alert, and runbook baseline created with the service. |\n| Support | Clear on-call or support model owned by the product team. |\n\nThe platform team does not own the product service. It owns the reusable path that makes service ownership realistic.\n\n## What This Means for Teams\n\nStream-aligned teams must:\n\n* use paved roads by default;\n* participate in on-call or support models appropriate to their service criticality;\n* maintain runbooks, dashboards, alerts, and rollback paths;\n* improve recurring operational pain rather than normalising toil;\n* bring platform gaps into platform feedback loops instead of silently forking.\n\nPlatform teams must:\n\n* define their product surfaces and team APIs;\n* measure adoption, friction, reliability, and support load;\n* make standards easy to follow;\n* publish lifecycles and deprecations;\n* treat documentation and onboarding as product features.\n\n## Anti-Patterns\n\n* **DevOps ticket queue.** Developers file tickets for deployments, infrastructure, or observability and wait.\n* **Platform without product management.** Internal tools are built with no clear customers, roadmap, or adoption evidence.\n* **Hero operations.** A few specialists keep production alive through manual work nobody reduces.\n* **Paved road as prison.** Teams cannot make justified exceptions even when the platform does not fit.\n* **Paved road as suggestion.** Teams ignore the platform and create snowflakes without owning the full cost.\n* **Reliability outsourcing.** Service teams assume SRE or platform owns production quality.\n\n## Discussion Prompts\n\nUse these prompts when reviewing platform and DevOps health:\n\n* Which production responsibilities does each stream-aligned team own?\n* Which parts of build-and-run ownership are too cognitively heavy today?\n* Which platform capabilities are true self-service, and which are ticket queues?\n* Where do teams leave the paved road, and why?\n* Which incidents should become platform improvements?\n* Are SRE or platform roles reducing toil, or absorbing it permanently?\n\n## Related Records\n\n* [Stream-Aligned Product Teams as the Default Unit](stream-aligned-product-teams.html) - teams own the systems they change.\n* [Team Topologies as the Operating Vocabulary](team-topologies-operating-model.html) - platform and enabling teams are explicit topologies.\n* [Organisation Principle: Capabilities Follow Ownership](../principles/capabilities-follow-ownership.html) - platforms are shared capabilities with lifecycle.\n* [Design Principle: Standardize Before Diverging](../principles/standardize-before-diverging.html) - paved roads are the default path before divergence.\n* [Operational Principle: Production Ready](../principles/production-ready.html) - production ownership is a readiness requirement.\n* [Operational Principle: Observable by Default](../principles/observable-by-default.html) - observability is part of build-and-run ownership.\n\n## Scope and Revisiting\n\nThis ADR applies to platform, infrastructure, delivery tooling, reliability, and service operation across engineering.\n\nRevisit if platform adoption stalls, support queues grow, teams cannot operate services safely, or the organisation recreates Dev/Ops handoffs under new names.\n\n## Authoritative References\n\n* Google SRE, [Site Reliability Engineering](https://sre.google/).\n* Google SRE Book, [Introduction](https://sre.google/sre-book/introduction/).\n* Thoughtworks Technology Radar, [Platform engineering product teams](https://www.thoughtworks.com/en-ec/radar/techniques/platform-engineering-product-teams).\n* DORA, [software delivery performance metrics](https://dora.dev/guides/dora-metrics/).\n"}]}</script>
<script>
    (function () {
        const data = JSON.parse(document.getElementById('data').textContent);
        const root = document.getElementById('content');

        const postId = (data.meta && data.meta.id) ? String(data.meta.id) : '';
        const postStatusRaw = (data.meta && data.meta.status) ? String(data.meta.status) : '';
        if (postId || postStatusRaw) {
            const header = document.getElementById('post-header');
            let sectionEl = header.querySelector('p.section');
            if (!sectionEl) {
                sectionEl = document.createElement('p');
                sectionEl.className = 'section';
                header.insertBefore(sectionEl, header.firstChild);
            }
            // Status pill goes first, then a " / " separator before the existing
            // content (section name and/or id).
            if (postStatusRaw) {
                const parts = postStatusRaw.split(':');
                const statusName = parts[0].trim();
                const statusColor = (parts[1] || '').trim();
                const wrap = document.createElement('span');
                wrap.className = 'post-status';
                const dot = document.createElement('span');
                dot.className = 'status-dot';
                if (statusColor) dot.style.background = statusColor;
                wrap.appendChild(dot);
                wrap.appendChild(document.createTextNode(statusName));
                if (sectionEl.firstChild) {
                    sectionEl.insertBefore(document.createTextNode(' • '), sectionEl.firstChild);
                    sectionEl.insertBefore(wrap, sectionEl.firstChild);
                } else {
                    sectionEl.appendChild(wrap);
                }
            }
            if (postId) {
                if (sectionEl.firstChild) sectionEl.appendChild(document.createTextNode(' • '));
                sectionEl.appendChild(document.createTextNode(postId));
            }
        }

        const tagsHost = document.getElementById('tags');
        (data.tags || []).forEach(function (t) {
            const span = document.createElement('span');
            span.className = 'tag';
            span.textContent = t;
            tagsHost.appendChild(span);
        });

        // Minimal markdown renderer. Supports: ATX headings, paragraphs, blockquotes,
        // unordered/ordered lists, fenced code, inline code, bold/italic/strikethrough, links, images, hr.
        // Sufficient for the posts in this repo; replace with a fuller parser if needed.
        function renderMarkdown(src) {
            const lines = src.replace(/\r\n/g, '\n').split('\n');
            const out = [];
            let i = 0;

            const bullet = /^(\s*)([-*])\s+(.*)$/;
            const ordered = /^(\s*)(\d+)\.\s+(.*)$/;
            const tableRow = /^\s*\|(.+)\|\s*$/;
            const tableSep = /^\s*\|?\s*:?-{3,}:?\s*(\|\s*:?-{3,}:?\s*)+\|?\s*$/;

            function splitRow(s) {
                let t = s.trim();
                if (t.startsWith('|')) t = t.slice(1);
                if (t.endsWith('|')) t = t.slice(0, -1);
                return t.split('|').map(c => c.trim());
            }

            function inline(s) {
                // Posts are trusted content, so raw HTML passes through unescaped
                // (some posts embed inline <blockquote>, <div>, etc.).
                // Stray ampersands still get fixed up.
                s = s.replace(/&(?![a-zA-Z]+;|#\d+;)/g, '&amp;');
                s = s.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img alt="$1" src="$2">');
                s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
                s = s.replace(/`([^`]+)`/g, function (_, c) {
                    return '<code>' + c.replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</code>';
                });
                s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
                s = s.replace(/~~([^~\n]+)~~/g, '<del>$1</del>');
                s = s.replace(/(^|[^*])\*([^*\n]+)\*/g, '$1<em>$2</em>');
                return s;
            }

            while (i < lines.length) {
                const line = lines[i];
                if (!line.trim()) {
                    i++;
                    continue;
                }

                const fence = line.match(/^```(\w*)\s*$/);
                if (fence) {
                    i++;
                    const buf = [];
                    while (i < lines.length && !/^```\s*$/.test(lines[i])) {
                        buf.push(lines[i]);
                        i++;
                    }
                    i++;
                    const escaped = buf.join('\n').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                    const cls = fence[1] ? ' class="lang-' + fence[1] + '"' : '';
                    out.push('<pre><code' + cls + '>' + escaped + '</code></pre>');
                    continue;
                }

                const h = line.match(/^(#{1,6})\s+(.*)$/);
                if (h) {
                    out.push('<h' + h[1].length + '>' + inline(h[2]) + '</h' + h[1].length + '>');
                    i++;
                    continue;
                }

                if (/^\s*(?:-\s*){3,}\s*$/.test(line) || /^\s*\*{3,}\s*$/.test(line)) {
                    out.push('<hr>');
                    i++;
                    continue;
                }

                if (/^>\s?/.test(line)) {
                    const buf = [];
                    while (i < lines.length && /^>\s?/.test(lines[i])) {
                        buf.push(lines[i].replace(/^>\s?/, ''));
                        i++;
                    }
                    out.push('<blockquote>' + renderMarkdown(buf.join('\n')) + '</blockquote>');
                    continue;
                }

                if (tableRow.test(line) && i + 1 < lines.length && tableSep.test(lines[i + 1])) {
                    const headers = splitRow(line);
                    i += 2;
                    const rows = [];
                    while (i < lines.length && tableRow.test(lines[i])) {
                        rows.push(splitRow(lines[i]));
                        i++;
                    }
                    let html = '<table><thead><tr>';
                    headers.forEach(h => {
                        html += '<th>' + inline(h) + '</th>';
                    });
                    html += '</tr></thead><tbody>';
                    rows.forEach(r => {
                        html += '<tr>';
                        r.forEach(c => {
                            html += '<td>' + inline(c) + '</td>';
                        });
                        html += '</tr>';
                    });
                    html += '</tbody></table>';
                    out.push(html);
                    continue;
                }

                if (bullet.test(line) || ordered.test(line)) {
                    // Indent of the first bullet defines this list's base level.
                    // Deeper-indented bullets become nested lists (rendered by
                    // recursing into renderMarkdown). Same-or-less indent at a
                    // bullet starts a sibling item (or ends the list).
                    const firstMatch = line.match(bullet) || line.match(ordered);
                    const baseIndent = firstMatch[1].length;
                    const isOrdered = ordered.test(line);
                    const items = [];
                    while (i < lines.length) {
                        const cur = lines[i];
                        if (!cur.trim()) {
                            // blank line breaks the list (matches CommonMark-ish behaviour)
                            i++;
                            break;
                        }
                        const mBul = cur.match(bullet);
                        const mOrd = cur.match(ordered);
                        const m = mBul || mOrd;
                        if (!m) break;
                        if (m[1].length < baseIndent) break;
                        if (m[1].length > baseIndent) break; // shouldn't happen at top of loop
                        // Same-type check: switching between -/* and 1. closes the list
                        if (isOrdered !== !!mOrd) break;

                        const itemBuf = [m[3]];
                        const nestedBuf = [];
                        i++;
                        while (i < lines.length) {
                            const nxt = lines[i];
                            if (!nxt.trim()) break;
                            const nBul = nxt.match(bullet);
                            const nOrd = nxt.match(ordered);
                            const nm = nBul || nOrd;
                            if (nm) {
                                if (nm[1].length > baseIndent) {
                                    // nested list line — dedent and stash
                                    nestedBuf.push(nxt.slice(baseIndent + 2));
                                    i++;
                                    continue;
                                }
                                // sibling or end of list
                                break;
                            }
                            // Plain continuation text
                            if (nestedBuf.length) {
                                // continuation inside the nested block
                                nestedBuf.push(nxt.slice(baseIndent + 2));
                            } else {
                                itemBuf.push(nxt.trim());
                            }
                            i++;
                        }

                        let liHtml = inline(itemBuf.join('\n'));
                        if (nestedBuf.length) {
                            liHtml += renderMarkdown(nestedBuf.join('\n'));
                        }
                        items.push('<li>' + liHtml + '</li>');
                    }
                    out.push((isOrdered ? '<ol>' : '<ul>') + items.join('') + (isOrdered ? '</ol>' : '</ul>'));
                    continue;
                }

                const buf = [line];
                i++;
                while (i < lines.length && lines[i].trim() && !/^#{1,6}\s/.test(lines[i]) && !/^>\s?/.test(lines[i]) && !bullet.test(lines[i]) && !ordered.test(lines[i]) && !/^```/.test(lines[i]) && !tableRow.test(lines[i])) {
                    buf.push(lines[i]);
                    i++;
                }
                out.push('<p>' + inline(buf.join(' ')) + '</p>');
            }
            return out.join('\n');
        }

        // Block dispatcher. New block types plug in here.
        const renderers = {
            markdown: function (block) {
                const div = document.createElement('div');
                div.innerHTML = renderMarkdown(block.content);
                return div;
            },
            mermaid: function (block) {
                // Mermaid scans elements with class "mermaid" whose textContent
                // is the diagram source. We collect these nodes and run
                // mermaid.run() once after all blocks are in the DOM.
                const div = document.createElement('div');
                div.className = 'mermaid';
                div.textContent = block.content;
                return div;
            },
            'force-graph': function (block) {
                // build.py emits parsed JSON: {nodes:[{id,size}], links:[{source,target}]}.
                // We instantiate force-graph after the container is in the DOM
                // so it can measure its own width.
                const div = document.createElement('div');
                div.className = 'force-graph';
                const data = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.ForceGraph) return;
                    const maxSize = data.nodes.reduce((m, n) => Math.max(m, n.size || 1), 1);
                    window.ForceGraph()(div)
                        .graphData(data)
                        .width(div.clientWidth)
                        .height(div.clientHeight)
                        .nodeRelSize(4)
                        .nodeVal(n => Math.max(20 * (n.size || 1) / maxSize, 0.001))
                        .nodeLabel(n => n.id + ' (' + (n.size || 1) + ')')
                        .nodeColor(() => 'rgba(135, 206, 235, 0.7)')
                        .linkColor(() => 'rgba(60, 60, 60, 0.4)')
                        .linkDirectionalArrowLength(4)
                        .linkDirectionalArrowRelPos(1)
                        .linkWidth(1);
                });
                return div;
            },
            'bubble-chart': function (block) {
                // build.py emits {nodes:[{name,size}]}. Renders a D3 circle-pack
                // SVG (same shape as the obren.io reference, just inline).
                const wrap = document.createElement('div');
                wrap.className = 'bubble-chart';
                const payload = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.d3) return;
                    const diameter = 480;
                    const fill = '#c0deed';
                    const textColor = '#111111';
                    const fontSize = 12;

                    const svg = window.d3.select(wrap).append('svg')
                        .attr('viewBox', '0 0 ' + diameter + ' ' + diameter)
                        .attr('width', diameter)
                        .attr('height', diameter);

                    const root = window.d3.hierarchy({children: payload.nodes})
                        .sum(d => d.size || 0)
                        .sort((a, b) => b.value - a.value);

                    window.d3.pack().size([diameter, diameter]).padding(2)(root);

                    const node = svg.selectAll('g')
                        .data(root.leaves())
                        .enter().append('g')
                        .attr('transform', d => 'translate(' + d.x + ',' + d.y + ')');

                    node.append('title').text(d => d.data.name + ': ' + d.value);
                    node.append('circle').attr('r', d => d.r).style('fill', fill);
                    node.append('text')
                        .attr('dy', '.3em')
                        .style('text-anchor', 'middle')
                        .style('fill', textColor)
                        .style('font-size', fontSize + 'px')
                        .text(d => d.data.name.substring(0, Math.max(0, Math.floor(d.r / 3))));
                });
                return wrap;
            }
        };

        const mermaidNodes = [];
        data.blocks.forEach(function (block) {
            const r = renderers[block.type];
            if (!r) {
                const pre = document.createElement('pre');
                pre.textContent = '[unknown block type: ' + block.type + ']';
                root.appendChild(pre);
                return;
            }
            const node = r(block);
            if (node instanceof Node) {
                root.appendChild(node);
                if (block.type === 'mermaid') mermaidNodes.push(node);
            }
        });

        if (mermaidNodes.length && window.mermaid) {
            window.mermaid.initialize({startOnLoad: false, theme: 'default'});
            window.mermaid.run({nodes: mermaidNodes});
        }
    })();
</script>
</body>
</html>
