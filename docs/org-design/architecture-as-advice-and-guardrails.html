<script id="data" type="application/json">{"meta": {"id": "ORG-ORG-ARCHITECTURE-AS-ADVICE-AND-GUARDRAILS", "status": "draft:gray", "title": "Architecture as Advice and Guardrails", "date": "2026-05-17", "author": "Organization Org Design", "permalink": "architecture-as-advice-and-guardrails", "timetoread": "11 min", "excerpt": "Architecture at Organization is a distributed capability: teams own decisions, architects and senior engineers provide advice, and reusable guardrails make good choices easier. The operating model rejects architecture as a late approval board.", "tags": "org-design, architecture, governance, advice-process, guardrails, adr", "icon": "assets/icons/architecture-as-advice-and-guardrails.png", "logo": "assets/images/architecture-as-advice-and-guardrails/logo.jpeg", "logo_credit": "Image generated by Google Gemini (gemini-3-pro-image-preview)"}, "tags": ["org-design", "architecture", "governance", "advice-process", "guardrails", "adr"], "blocks": [{"type": "markdown", "content": "> **Status**: DRAFT\n>\n> **Decision**: Organization will run architecture as advice, learning, and reusable guardrails rather than as a central approval board. Teams own architecture decisions inside their boundaries. Architects, staff-plus engineers, platform owners, security, and affected teams provide advice. Guardrails are encoded in principles, golden paths, templates, automation, and ADRs wherever possible.\n\n## Decision\n\nAdopt **architecture as advice and guardrails**.\n\nThe organisation will use:\n\n* team-owned ADRs for meaningful local decisions;\n* the [Architecture Advisory Forum as a Standing Advice Ritual](../foundations/architecture-advisory-forum.html) for early advice, cross-team learning, and decision revisits;\n* shared principles and standards as decision constraints;\n* platform paved roads and governance-as-code for routine guardrails;\n* architects and staff-plus engineers as advisors, coaches, reviewers, and stewards of cross-cutting concerns;\n* explicit escalation only where a decision crosses ownership boundaries or creates material enterprise risk.\n\nThis decision rejects architecture as a routine late-stage approval gate.\n\n## How to Read This Decision\n\n| What it says | What it does **not** say |\n| --- | --- |\n| Teams own decisions in their context. | Teams can ignore enterprise constraints. |\n| Architects advise and steward. | Architects have no authority or accountability. |\n| Guardrails should be reusable and visible. | Every architectural concern can be automated. |\n| The AAF is advisory. | Cross-team decisions are made privately or informally. |\n| ADRs support decisions. | ADRs are paperwork after the real decision. |\n\nArchitecture works when expert judgement is available early and preserved as organisational learning.\n\n## How to Use This Decision\n\nUse this decision to:\n\n* explain why architecture advice should happen before a decision hardens;\n* distinguish advice, guardrails, standards, escalation, and approval;\n* know when a team-owned decision needs broader consultation;\n* identify which repeated architectural concerns should become platform or automation guardrails;\n* use ADRs and forums as teaching mechanisms, not paperwork.\n\nThe learning goal is to make architecture visible without making teams wait for permission.\n\n## One-Minute Mental Model\n\nArchitecture is **distributed decision quality**.\n\nTeams make many architectural decisions because they are closest to the code, users, constraints, and operational consequences. Architects and senior engineers improve those decisions by bringing broader context, prior art, enterprise constraints, and systems thinking.\n\nGuardrails turn repeated advice into defaults. Forums turn individual advice into organisational learning. Escalation exists for real conflicts and material risk, not for every normal technical choice.\n\n## Rationale\n\nCentral architecture boards usually start from a real need: teams make decisions that affect other teams, cost, reliability, security, data, and future change. The failure comes when the answer becomes late approval. Teams delay decisions, hide uncertainty, prepare presentations, and wait for permission from people who are less close to the work.\n\nThe better model is distributed decision ownership with strong advice and strong defaults:\n\n* advice brings expertise to the team while the decision is still shapeable;\n* ADRs preserve reasoning for future readers and agents;\n* guardrails make safe choices cheap and repeatable;\n* architecture forums spread learning across teams;\n* escalation is reserved for real conflicts and enterprise-level constraints.\n\nThis aligns directly with [Organisation Principle: Decisions Stay with Teams](../principles/decisions-stay-with-teams.html), [Practice Principle: Advice in Public](../principles/advice-in-public.html), and [Practice Principle: Governance as Code](../principles/governance-as-code.html).\n\n## Architecture Role Model\n\nArchitecture work appears in several roles:\n\n| Role | Architecture contribution |\n| --- | --- |\n| Team tech lead | Leads local technical tradeoffs, keeps ADRs healthy, seeks advice early. |\n| Staff-plus engineer | Solves cross-team technical problems, mentors, reviews, and improves standards. |\n| Architect / principal architect | Stewards architecture coherence, enterprise constraints, strategic tradeoffs, and decision quality. |\n| Platform owner | Turns repeated architecture needs into reusable platform capabilities. |\n| Security / compliance expert | Provides constraints, risk assessment, guardrails, and exception advice. |\n| Engineering manager | Ensures the team has time, skills, and incentives to make good technical decisions. |\n\nThe title is less important than the behaviour: architecture should improve decisions and systems, not create status theatre.\n\n## Guardrail Types\n\n| Guardrail | Example |\n| --- | --- |\n| Principle | [Design Principle: Small (and Not Too Small) and Simple (and Not Too Simple)](../principles/small-and-simple.html), [Design Principle: Standardize Before Diverging](../principles/standardize-before-diverging.html), [Operational Principle: Production Ready](../principles/production-ready.html). |\n| Golden path | Approved service template, CI/CD path, observability baseline, infrastructure module. |\n| Automated policy | Repository checks, cloud policy, dependency scanning, code ownership validation. |\n| Reference architecture | Example patterns for common integration, frontend, mobile, or data scenarios. |\n| ADR template | Decision structure that prompts alternatives, consequences, advice, and revisit criteria. |\n| Forum ritual | AAF review of spikes, proposed decisions, and revisited decisions. |\n\nGuardrails should move recurring advice out of meetings and into the daily path.\n\n## Decision Escalation\n\nMost decisions stay with teams. Escalate when:\n\n* the decision changes ownership boundaries;\n* several teams are materially affected and advice cannot resolve conflict;\n* the decision creates security, legal, privacy, or regulatory risk;\n* the decision introduces a new shared capability;\n* the decision diverges from a published standard or platform default;\n* the decision materially affects cloud cost, reliability, data integrity, or customer trust.\n\nEscalation should name the decision owner and the disputed constraint. It should not become a generic \"architecture approval\" queue.\n\n## Worked Example\n\nA team wants to introduce a new synchronous dependency between two checkout services.\n\nPoor architecture process:\n\n* The team implements the dependency.\n* An architect sees it late and objects.\n* The discussion becomes a debate about approval and authority.\n* The decision is either forced through or blocked without shared learning.\n\nAdvice-and-guardrails process:\n\n| Moment | Behaviour |\n| --- | --- |\n| Spike | The team brings the dependency question to the AAF before implementation. |\n| Advice | Operations, platform, architecture, and affected teams discuss latency, failure modes, ownership, and alternatives. |\n| ADR | The team records options, advice received, chosen direction, and revisit triggers. |\n| Guardrail | If the same pattern recurs, platform or architecture creates a reference pattern or automated check. |\n\nThe team still owns the decision unless it crosses a real escalation boundary. The organisation gains reusable learning either way.\n\n## Anti-Patterns\n\n* **Architecture Review Board as gate.** Teams wait for approval instead of seeking advice early.\n* **Ivory tower architecture.** Architects define target states without production, product, or migration reality.\n* **Invisible veto.** A senior person blocks a decision privately without recording the reasoning.\n* **ADR afterthought.** The ADR is written after implementation to document a decision nobody can still influence.\n* **Guardrail by meeting.** The same advice is repeated in meetings instead of encoded into templates, platforms, or policy.\n* **Local optimisation.** A team makes a decision that is locally convenient and globally expensive.\n\n## Discussion Prompts\n\nUse these prompts before a meaningful technical decision:\n\n* Who is meaningfully affected by this decision?\n* Which constraints are facts, and which are preferences?\n* What advice do we need before the decision becomes expensive to change?\n* Which principle, standard, platform capability, or prior ADR applies?\n* What evidence would cause us to revisit this decision?\n* If this advice keeps repeating, should it become a guardrail?\n\n## Related Records\n\n* [Architecture Advisory Forum as a Standing Advice Ritual](../foundations/architecture-advisory-forum.html) - standing ritual for architecture advice.\n* [Organisation Principle: Decisions Stay with Teams](../principles/decisions-stay-with-teams.html) - decision ownership remains local where possible.\n* [Practice Principle: Advice in Public](../principles/advice-in-public.html) - advice should be visible and teachable.\n* [Practice Principle: Governance as Code](../principles/governance-as-code.html) - routine governance belongs in code and platforms.\n* [Staff-Plus Technical Leadership](staff-plus-technical-leadership.html) - defines technical leadership beyond team boundaries.\n* [Platform and DevOps Operating Model](platform-and-devops-operating-model.html) - guardrails should often become platform capabilities.\n\n## Scope and Revisiting\n\nThis ADR applies to technical decision-making across product engineering, platforms, infrastructure, data, security, and AI-assisted engineering capabilities.\n\nRevisit if teams experience architecture as a hidden gate, if enterprise constraints are ignored, or if the AAF is unable to influence decisions early enough.\n\n## Authoritative References\n\n* Andrew Harmel-Law, *Facilitating Software Architecture*.\n* Organization Foundation, [Architecture Advisory Forum as a Standing Advice Ritual](../foundations/architecture-advisory-forum.html).\n* Organization Principles, [Organisation Principle: Decisions Stay with Teams](../principles/decisions-stay-with-teams.html) and [Practice Principle: Governance as Code](../principles/governance-as-code.html).\n"}]}</script>

    (function () {
        const data = JSON.parse(document.getElementById('data').textContent);
        const root = document.getElementById('content');

        const postId = (data.meta && data.meta.id) ? String(data.meta.id) : '';
        const postStatusRaw = (data.meta && data.meta.status) ? String(data.meta.status) : '';
        if (postId || postStatusRaw) {
            const header = document.getElementById('post-header');
            let sectionEl = header.querySelector('p.section');
            if (!sectionEl) {
                sectionEl = document.createElement('p');
                sectionEl.className = 'section';
                header.insertBefore(sectionEl, header.firstChild);
            }
            // Status pill goes first, then a " / " separator before the existing
            // content (section name and/or id).
            if (postStatusRaw) {
                const parts = postStatusRaw.split(':');
                const statusName = parts[0].trim();
                const statusColor = (parts[1] || '').trim();
                const wrap = document.createElement('span');
                wrap.className = 'post-status';
                const dot = document.createElement('span');
                dot.className = 'status-dot';
                if (statusColor) dot.style.background = statusColor;
                wrap.appendChild(dot);
                wrap.appendChild(document.createTextNode(statusName));
                if (sectionEl.firstChild) {
                    sectionEl.insertBefore(document.createTextNode(' • '), sectionEl.firstChild);
                    sectionEl.insertBefore(wrap, sectionEl.firstChild);
                } else {
                    sectionEl.appendChild(wrap);
                }
            }
            if (postId) {
                if (sectionEl.firstChild) sectionEl.appendChild(document.createTextNode(' • '));
                sectionEl.appendChild(document.createTextNode(postId));
            }
        }

        const tagsHost = document.getElementById('tags');
        (data.tags || []).forEach(function (t) {
            const span = document.createElement('span');
            span.className = 'tag';
            span.textContent = t;
            tagsHost.appendChild(span);
        });

        // Minimal markdown renderer. Supports: ATX headings, paragraphs, blockquotes,
        // unordered/ordered lists, fenced code, inline code, bold/italic/strikethrough, links, images, hr.
        // Sufficient for the posts in this repo; replace with a fuller parser if needed.
        function renderMarkdown(src) {
            const lines = src.replace(/\r\n/g, '\n').split('\n');
            const out = [];
            let i = 0;

            const bullet = /^(\s*)([-*])\s+(.*)$/;
            const ordered = /^(\s*)(\d+)\.\s+(.*)$/;
            const tableRow = /^\s*\|(.+)\|\s*$/;
            const tableSep = /^\s*\|?\s*:?-{3,}:?\s*(\|\s*:?-{3,}:?\s*)+\|?\s*$/;

            function splitRow(s) {
                let t = s.trim();
                if (t.startsWith('|')) t = t.slice(1);
                if (t.endsWith('|')) t = t.slice(0, -1);
                return t.split('|').map(c => c.trim());
            }

            function inline(s) {
                // Posts are trusted content, so raw HTML passes through unescaped
                // (some posts embed inline <blockquote>, <div>, etc.).
                // Stray ampersands still get fixed up.
                s = s.replace(/&(?![a-zA-Z]+;|#\d+;)/g, '&amp;');
                s = s.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<a class="image-link" href="$2" target="_blank" rel="noopener noreferrer"><img alt="$1" src="$2"></a>');
                s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
                s = s.replace(/`([^`]+)`/g, function (_, c) {
                    return '<code>' + c.replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</code>';
                });
                s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
                s = s.replace(/~~([^~\n]+)~~/g, '<del>$1</del>');
                s = s.replace(/(^|[^*])\*([^*\n]+)\*/g, '$1<em>$2</em>');
                return s;
            }

            while (i < lines.length) {
                const line = lines[i];
                if (!line.trim()) {
                    i++;
                    continue;
                }

                const fence = line.match(/^```(\w*)\s*$/);
                if (fence) {
                    i++;
                    const buf = [];
                    while (i < lines.length && !/^```\s*$/.test(lines[i])) {
                        buf.push(lines[i]);
                        i++;
                    }
                    i++;
                    const escaped = buf.join('\n').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                    const cls = fence[1] ? ' class="lang-' + fence[1] + '"' : '';
                    out.push('<pre><code' + cls + '>' + escaped + '</code></pre>');
                    continue;
                }

                const h = line.match(/^(#{1,6})\s+(.*)$/);
                if (h) {
                    out.push('<h' + h[1].length + '>' + inline(h[2]) + '</h' + h[1].length + '>');
                    i++;
                    continue;
                }

                if (/^\s*(?:-\s*){3,}\s*$/.test(line) || /^\s*\*{3,}\s*$/.test(line)) {
                    out.push('<hr>');
                    i++;
                    continue;
                }

                if (/^>\s?/.test(line)) {
                    const buf = [];
                    while (i < lines.length && /^>\s?/.test(lines[i])) {
                        buf.push(lines[i].replace(/^>\s?/, ''));
                        i++;
                    }
                    out.push('<blockquote>' + renderMarkdown(buf.join('\n')) + '</blockquote>');
                    continue;
                }

                if (tableRow.test(line) && i + 1 < lines.length && tableSep.test(lines[i + 1])) {
                    const headers = splitRow(line);
                    i += 2;
                    const rows = [];
                    while (i < lines.length && tableRow.test(lines[i])) {
                        rows.push(splitRow(lines[i]));
                        i++;
                    }
                    let html = '<table><thead><tr>';
                    headers.forEach(h => {
                        html += '<th>' + inline(h) + '</th>';
                    });
                    html += '</tr></thead><tbody>';
                    rows.forEach(r => {
                        html += '<tr>';
                        r.forEach(c => {
                            html += '<td>' + inline(c) + '</td>';
                        });
                        html += '</tr>';
                    });
                    html += '</tbody></table>';
                    out.push(html);
                    continue;
                }

                if (bullet.test(line) || ordered.test(line)) {
                    // Indent of the first bullet defines this list's base level.
                    // Deeper-indented bullets become nested lists (rendered by
                    // recursing into renderMarkdown). Same-or-less indent at a
                    // bullet starts a sibling item (or ends the list).
                    const firstMatch = line.match(bullet) || line.match(ordered);
                    const baseIndent = firstMatch[1].length;
                    const isOrdered = ordered.test(line);
                    const items = [];
                    while (i < lines.length) {
                        const cur = lines[i];
                        if (!cur.trim()) {
                            // blank line breaks the list (matches CommonMark-ish behaviour)
                            i++;
                            break;
                        }
                        const mBul = cur.match(bullet);
                        const mOrd = cur.match(ordered);
                        const m = mBul || mOrd;
                        if (!m) break;
                        if (m[1].length < baseIndent) break;
                        if (m[1].length > baseIndent) break; // shouldn't happen at top of loop
                        // Same-type check: switching between -/* and 1. closes the list
                        if (isOrdered !== !!mOrd) break;

                        const itemBuf = [m[3]];
                        const nestedBuf = [];
                        i++;
                        while (i < lines.length) {
                            const nxt = lines[i];
                            if (!nxt.trim()) break;
                            const nBul = nxt.match(bullet);
                            const nOrd = nxt.match(ordered);
                            const nm = nBul || nOrd;
                            if (nm) {
                                if (nm[1].length > baseIndent) {
                                    // nested list line — dedent and stash
                                    nestedBuf.push(nxt.slice(baseIndent + 2));
                                    i++;
                                    continue;
                                }
                                // sibling or end of list
                                break;
                            }
                            // Plain continuation text
                            if (nestedBuf.length) {
                                // continuation inside the nested block
                                nestedBuf.push(nxt.slice(baseIndent + 2));
                            } else {
                                itemBuf.push(nxt.trim());
                            }
                            i++;
                        }

                        let liHtml = inline(itemBuf.join('\n'));
                        if (nestedBuf.length) {
                            liHtml += renderMarkdown(nestedBuf.join('\n'));
                        }
                        items.push('<li>' + liHtml + '</li>');
                    }
                    out.push((isOrdered ? '<ol>' : '<ul>') + items.join('') + (isOrdered ? '</ol>' : '</ul>'));
                    continue;
                }

                const buf = [line];
                i++;
                while (i < lines.length && lines[i].trim() && !/^#{1,6}\s/.test(lines[i]) && !/^>\s?/.test(lines[i]) && !bullet.test(lines[i]) && !ordered.test(lines[i]) && !/^```/.test(lines[i]) && !tableRow.test(lines[i])) {
                    buf.push(lines[i]);
                    i++;
                }
                out.push('<p>' + inline(buf.join(' ')) + '</p>');
            }
            return out.join('\n');
        }

        // Block dispatcher. New block types plug in here.
        const renderers = {
            markdown: function (block) {
                const div = document.createElement('div');
                div.innerHTML = renderMarkdown(block.content);
                return div;
            },
            mermaid: function (block) {
                // Mermaid scans elements with class "mermaid" whose textContent
                // is the diagram source. We collect these nodes and run
                // mermaid.run() once after all blocks are in the DOM.
                const div = document.createElement('div');
                div.className = 'mermaid';
                div.textContent = block.content;
                return div;
            },
            'force-graph': function (block) {
                // build.py emits parsed JSON: {nodes:[{id,size}], links:[{source,target}]}.
                // We instantiate force-graph after the container is in the DOM
                // so it can measure its own width.
                const div = document.createElement('div');
                div.className = 'force-graph';
                const data = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.ForceGraph) return;
                    const maxSize = data.nodes.reduce((m, n) => Math.max(m, n.size || 1), 1);
                    window.ForceGraph()(div)
                        .graphData(data)
                        .width(div.clientWidth)
                        .height(div.clientHeight)
                        .nodeRelSize(4)
                        .nodeVal(n => Math.max(20 * (n.size || 1) / maxSize, 0.001))
                        .nodeLabel(n => n.id + ' (' + (n.size || 1) + ')')
                        .nodeColor(() => 'rgba(135, 206, 235, 0.7)')
                        .linkColor(() => 'rgba(60, 60, 60, 0.4)')
                        .linkDirectionalArrowLength(4)
                        .linkDirectionalArrowRelPos(1)
                        .linkWidth(1);
                });
                return div;
            },
            'bubble-chart': function (block) {
                // build.py emits {nodes:[{name,size}]}. Renders a D3 circle-pack
                // SVG (same shape as the obren.io reference, just inline).
                const wrap = document.createElement('div');
                wrap.className = 'bubble-chart';
                const payload = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.d3) return;
                    const diameter = 480;
                    const fill = '#c0deed';
                    const textColor = '#111111';
                    const fontSize = 12;

                    const svg = window.d3.select(wrap).append('svg')
                        .attr('viewBox', '0 0 ' + diameter + ' ' + diameter)
                        .attr('width', diameter)
                        .attr('height', diameter);

                    const root = window.d3.hierarchy({children: payload.nodes})
                        .sum(d => d.size || 0)
                        .sort((a, b) => b.value - a.value);

                    window.d3.pack().size([diameter, diameter]).padding(2)(root);

                    const node = svg.selectAll('g')
                        .data(root.leaves())
                        .enter().append('g')
                        .attr('transform', d => 'translate(' + d.x + ',' + d.y + ')');

                    node.append('title').text(d => d.data.name + ': ' + d.value);
                    node.append('circle').attr('r', d => d.r).style('fill', fill);
                    node.append('text')
                        .attr('dy', '.3em')
                        .style('text-anchor', 'middle')
                        .style('fill', textColor)
                        .style('font-size', fontSize + 'px')
                        .text(d => d.data.name.substring(0, Math.max(0, Math.floor(d.r / 3))));
                });
                return wrap;
            }
        };

        const mermaidNodes = [];
        data.blocks.forEach(function (block) {
            const r = renderers[block.type];
            if (!r) {
                const pre = document.createElement('pre');
                pre.textContent = '[unknown block type: ' + block.type + ']';
                root.appendChild(pre);
                return;
            }
            const node = r(block);
            if (node instanceof Node) {
                root.appendChild(node);
                if (block.type === 'mermaid') mermaidNodes.push(node);
            }
        });

        if (mermaidNodes.length && window.mermaid) {
            window.mermaid.initialize({startOnLoad: false, theme: 'default'});
            window.mermaid.run({nodes: mermaidNodes});
        }
    })();
</script>
</body>
</html>
