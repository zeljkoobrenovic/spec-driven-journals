<script id="data" type="application/json">{"meta": {"id": "ORG-ORG-TEAM-TOPOLOGIES-OPERATING-MODEL", "status": "draft:gray", "title": "Team Topologies as the Operating Vocabulary", "date": "2026-05-17", "author": "Organization Org Design", "permalink": "team-topologies-operating-model", "timetoread": "11 min", "excerpt": "Organization will use Team Topologies as the common vocabulary for team types and interaction modes. Stream-aligned teams are the default; platform, enabling, and complicated-subsystem teams exist to reduce cognitive load and improve flow, not to recreate functional silos.", "tags": "org-design, team-topologies, platform, enabling-teams, cognitive-load", "icon": "assets/icons/team-topologies-operating-model.png", "logo": "assets/images/team-topologies-operating-model/logo.jpeg", "logo_credit": "Image generated by Google Gemini (gemini-3-pro-image-preview)"}, "tags": ["org-design", "team-topologies", "platform", "enabling-teams", "cognitive-load"], "modalities": [{"key": "index", "label": "Article", "meta": {}, "blocks": [{"type": "markdown", "content": "> **Status**: DRAFT\n>\n> **Decision**: Organization will use Team Topologies as the shared operating vocabulary for engineering organisation design. Stream-aligned teams are the default. Platform, enabling, and complicated-subsystem teams are explicit exceptions used to reduce cognitive load and accelerate flow. Interaction modes - collaboration, X-as-a-service, and facilitating - must be named rather than left implicit.\n\n## Decision\n\nAdopt **Team Topologies** as the language for describing engineering team types and interactions.\n\nOrganization will use four team types:\n\n| Team type | Purpose at Organization |\n| --- | --- |\n| Stream-aligned team | Owns a flow of customer, business, internal-product, or platform value. Default team type. |\n| Platform team | Provides an internal product that accelerates stream-aligned teams and reduces their cognitive load. |\n| Enabling team | Temporarily helps other teams acquire capability, improve practice, or adopt a new pattern. |\n| Complicated-subsystem team | Owns a part of the system requiring deep specialist knowledge that would overload stream-aligned teams. |\n\nOrganization will use three interaction modes:\n\n| Interaction mode | Use when |\n| --- | --- |\n| Collaboration | Two or more teams need to discover a new boundary, solve an uncertain problem, or coordinate a significant change. |\n| X-as-a-service | One team consumes a stable capability from another through a clear interface or team API. |\n| Facilitating | An enabling team helps another team learn, adopt, or improve without taking permanent ownership. |\n\n## How to Read This Decision\n\n| What it says | What it does **not** say |\n| --- | --- |\n| Team types and interaction modes should be explicit. | The org chart must be redrawn to match a book diagram. |\n| Platform teams build internal products. | Every infrastructure or operations group is automatically a platform team. |\n| Enabling teams transfer capability. | Enabling teams become permanent delivery proxies. |\n| Complicated-subsystem teams are rare and justified by cognitive load. | Specialists should be isolated by default. |\n| Interaction modes can change over time. | Team relationships are fixed forever. |\n\nThe vocabulary is useful only if it changes behaviour: fewer accidental dependencies, clearer ownership, and lower cognitive load.\n\n## How to Use This Decision\n\nUse this decision to:\n\n* distinguish the four Team Topologies team types in Organization terms;\n* identify the interaction mode a team relationship is currently using;\n* explain why platform and enabling teams exist to reduce cognitive load, not to collect work;\n* detect when a renamed silo is being presented as a platform team;\n* use topology review as a way to improve flow across teams.\n\nThe practical skill is diagnosis: when delivery slows down, ask whether the blocker is a team boundary, an interaction mode, a platform gap, or excessive cognitive load.\n\n## One-Minute Mental Model\n\nTeam Topologies is a **map of how work flows through teams**.\n\nThe team type describes why the team exists. The interaction mode describes how two teams work together right now. Both can change. A platform team may collaborate with early adopters while building a capability, then move to X-as-a-service when the interface stabilises. An enabling team may facilitate adoption for a quarter, then leave when the receiving team can operate independently.\n\nThe vocabulary prevents vague sentences like \"platform needs to help search\". A better sentence is: \"Search and Platform are collaborating for six weeks to discover the deployment interface; after that the capability should be consumed as a service.\"\n\n## Rationale\n\nMany software organisations use the word \"team\" for very different things: a product team, a component group, a guild, a project group, a support queue, an architecture board, a platform team, or a reporting line. The ambiguity hides real design choices.\n\nTeam Topologies gives Organization a small language for those choices. It makes the organisation ask:\n\n* Which team owns this stream of value?\n* Which dependencies are unavoidable, and which are design debt?\n* Which capabilities should be consumed as a product?\n* Which teams need temporary help instead of permanent handoff?\n* Which subsystem is genuinely too cognitively heavy for a stream-aligned team?\n\nThis reinforces [Design Principle: Small (and Not Too Small) and Simple (and Not Too Simple)](../principles/small-and-simple.html), [Organisation Principle: Capabilities Follow Ownership](../principles/capabilities-follow-ownership.html), and [Design Principle: Standardize Before Diverging](../principles/standardize-before-diverging.html). The goal is not terminology purity. The goal is fast flow through team boundaries that people can understand.\n\n## Team Type Guardrails\n\n| Team type | Valid when | Failure mode |\n| --- | --- | --- |\n| Stream-aligned | The team can own outcomes and systems for a coherent value stream. | Becomes a feature factory with no product context. |\n| Platform | The team has internal customers, product thinking, self-service capabilities, and support paths. | Becomes a ticket-driven infrastructure silo. |\n| Enabling | The team has a temporary mission to grow capability in other teams. | Becomes a permanent dependency or consulting bottleneck. |\n| Complicated-subsystem | The subsystem needs deep expertise and has a clear API to stream teams. | Becomes a component team that forces constant coordination. |\n\nNo team should be labelled as a platform or enabling team just because that sounds modern. The label must match how the team behaves.\n\n## Interaction Mode Guardrails\n\nInteraction modes should appear in team APIs, planning notes, ADRs, and cross-team working agreements.\n\n| Mode | Healthy signal | Warning signal |\n| --- | --- | --- |\n| Collaboration | Time-boxed, high-bandwidth joint work around uncertainty. | Permanent meetings with no boundary decision. |\n| X-as-a-service | Clear interface, support route, documentation, lifecycle, and adoption path. | Hidden Slack support and tribal knowledge. |\n| Facilitating | The receiving team grows capability and needs less help over time. | The enabling team keeps doing the work indefinitely. |\n\nWhen the mode is unclear, people invent their own expectations. That is how \"just ask platform\" turns into a queue and \"architecture advice\" turns into a hidden approval gate.\n\n## Worked Example\n\nA stream-aligned team wants to adopt a new observability standard.\n\nPossible topology interpretation:\n\n| Stage | Interaction mode | Why |\n| --- | --- | --- |\n| Early discovery | Collaboration | The standard is not mature enough; the service team and platform team need to learn together. |\n| Rollout | Facilitating | The observability enabling group helps the team instrument services and dashboards. |\n| Steady state | X-as-a-service | Dashboards, alert templates, tracing libraries, and documentation are stable platform capabilities. |\n\nThe same two teams can move through several modes. Trouble starts when everyone assumes a different mode: platform thinks it is offering a service, the product team expects hands-on help, and leadership thinks rollout is finished.\n\n## Operating Rhythm\n\nEngineering leadership should review team topology at least quarterly and whenever major strategy changes occur.\n\nUseful review prompts:\n\n* Which teams have unclear or overloaded missions?\n* Which teams are carrying too much cognitive load?\n* Which platform capabilities are still ticket queues?\n* Which enabling engagements should end, continue, or become self-service?\n* Which dependencies should move from collaboration to X-as-a-service?\n* Which complicated subsystems are justified, and which are accidental component teams?\n\nThe review output should be recorded as decisions or working agreements, not as private org-chart commentary.\n\n## Anti-Patterns\n\n* **Renamed silo.** An infrastructure group calls itself a platform team but still operates as a ticket queue.\n* **Permanent facilitation.** An enabling team keeps taking work from other teams instead of growing capability.\n* **Component maze.** Every customer change requires coordination across many narrow component teams.\n* **Topology theatre.** Team Topologies vocabulary appears in slides but not in team APIs, ownership, or planning.\n* **Unbounded collaboration.** Teams collaborate forever because no one decides the future boundary.\n\n## Discussion Prompts\n\nUse these prompts during topology reviews:\n\n* Which teams are stream-aligned, platform, enabling, or complicated-subsystem teams today?\n* Which team labels do not match actual behaviour?\n* Which interactions should be collaboration, service consumption, or facilitation?\n* Which dependencies create the most waiting or rework?\n* Which platform capabilities are still handled through tickets or private chat?\n* Which enabling engagements should now end, change mode, or become self-service?\n\n## Related Records\n\n* [Stream-Aligned Product Teams as the Default Unit](stream-aligned-product-teams.html) - sets the default team type.\n* [Team Size and Composition Guardrails](team-size-and-composition.html) - defines healthy team guardrails.\n* [Platform and DevOps Operating Model](platform-and-devops-operating-model.html) - applies platform-team thinking to DevOps and internal platforms.\n* [Architecture as Advice and Guardrails](architecture-as-advice-and-guardrails.html) - keeps architecture advice compatible with team-owned decisions.\n* [Organisation Principle: Capabilities Follow Ownership](../principles/capabilities-follow-ownership.html) - every shared capability needs ownership and lifecycle.\n\n## Scope and Revisiting\n\nThis decision applies to engineering organisation design, not to HR reporting lines alone. A reporting line may contain multiple team types; a team type may require collaboration across reporting lines.\n\nRevisit if the vocabulary stops improving clarity, if platform/enabling labels are abused, or if Organization adopts a different explicit org-design model.\n\n## Authoritative References\n\n* Matthew Skelton and Manuel Pais, *Team Topologies*.\n* Team Topologies, [key concepts and practices](https://teamtopologies.com/learn).\n* Thoughtworks Technology Radar, [Platform engineering product teams](https://www.thoughtworks.com/en-ec/radar/techniques/platform-engineering-product-teams).\n"}]}]}</script>

    (function () {
        const data = JSON.parse(document.getElementById('data').textContent);
        const root = document.getElementById('content');

        const postId = (data.meta && data.meta.id) ? String(data.meta.id) : '';
        const postStatusRaw = (data.meta && data.meta.status) ? String(data.meta.status) : '';
        if (postId || postStatusRaw) {
            const header = document.getElementById('post-header');
            let sectionEl = header.querySelector('p.section');
            if (!sectionEl) {
                sectionEl = document.createElement('p');
                sectionEl.className = 'section';
                header.insertBefore(sectionEl, header.firstChild);
            }
            // Status pill goes first, then a " / " separator before the existing
            // content (section name and/or id).
            if (postStatusRaw) {
                const parts = postStatusRaw.split(':');
                const statusName = parts[0].trim();
                const statusColor = (parts[1] || '').trim();
                const wrap = document.createElement('span');
                wrap.className = 'post-status';
                const dot = document.createElement('span');
                dot.className = 'status-dot';
                if (statusColor) dot.style.background = statusColor;
                wrap.appendChild(dot);
                wrap.appendChild(document.createTextNode(statusName));
                if (sectionEl.firstChild) {
                    sectionEl.insertBefore(document.createTextNode(' • '), sectionEl.firstChild);
                    sectionEl.insertBefore(wrap, sectionEl.firstChild);
                } else {
                    sectionEl.appendChild(wrap);
                }
            }
            if (postId) {
                if (sectionEl.firstChild) sectionEl.appendChild(document.createTextNode(' • '));
                sectionEl.appendChild(document.createTextNode(postId));
            }
        }

        const tagsHost = document.getElementById('tags');
        (data.tags || []).forEach(function (t) {
            const span = document.createElement('span');
            span.className = 'tag';
            span.textContent = t;
            tagsHost.appendChild(span);
        });

        // Minimal markdown renderer. Supports: ATX headings, paragraphs, blockquotes,
        // unordered/ordered lists, fenced code, inline code, bold/italic/strikethrough, links, images, hr.
        // Sufficient for the posts in this repo; replace with a fuller parser if needed.
        function renderMarkdown(src) {
            const lines = src.replace(/\r\n/g, '\n').split('\n');
            const out = [];
            let i = 0;

            const bullet = /^(\s*)([-*])\s+(.*)$/;
            const ordered = /^(\s*)(\d+)\.\s+(.*)$/;
            const tableRow = /^\s*\|(.+)\|\s*$/;
            const tableSep = /^\s*\|?\s*:?-{3,}:?\s*(\|\s*:?-{3,}:?\s*)+\|?\s*$/;

            function splitRow(s) {
                let t = s.trim();
                if (t.startsWith('|')) t = t.slice(1);
                if (t.endsWith('|')) t = t.slice(0, -1);
                return t.split('|').map(c => c.trim());
            }

            function inline(s) {
                // Posts are trusted content, so raw HTML passes through unescaped
                // (some posts embed inline <blockquote>, <div>, etc.).
                // Stray ampersands still get fixed up.
                s = s.replace(/&(?![a-zA-Z]+;|#\d+;)/g, '&amp;');
                s = s.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<a class="image-link" href="$2" target="_blank" rel="noopener noreferrer"><img alt="$1" src="$2"></a>');
                s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
                s = s.replace(/`([^`]+)`/g, function (_, c) {
                    return '<code>' + c.replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</code>';
                });
                s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
                s = s.replace(/~~([^~\n]+)~~/g, '<del>$1</del>');
                s = s.replace(/(^|[^*])\*([^*\n]+)\*/g, '$1<em>$2</em>');
                return s;
            }

            while (i < lines.length) {
                const line = lines[i];
                if (!line.trim()) {
                    i++;
                    continue;
                }

                const fence = line.match(/^```(\w*)\s*$/);
                if (fence) {
                    i++;
                    const buf = [];
                    while (i < lines.length && !/^```\s*$/.test(lines[i])) {
                        buf.push(lines[i]);
                        i++;
                    }
                    i++;
                    const escaped = buf.join('\n').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                    const cls = fence[1] ? ' class="lang-' + fence[1] + '"' : '';
                    out.push('<pre><code' + cls + '>' + escaped + '</code></pre>');
                    continue;
                }

                const h = line.match(/^(#{1,6})\s+(.*)$/);
                if (h) {
                    out.push('<h' + h[1].length + '>' + inline(h[2]) + '</h' + h[1].length + '>');
                    i++;
                    continue;
                }

                if (/^\s*(?:-\s*){3,}\s*$/.test(line) || /^\s*\*{3,}\s*$/.test(line)) {
                    out.push('<hr>');
                    i++;
                    continue;
                }

                if (/^>\s?/.test(line)) {
                    const buf = [];
                    while (i < lines.length && /^>\s?/.test(lines[i])) {
                        buf.push(lines[i].replace(/^>\s?/, ''));
                        i++;
                    }
                    out.push('<blockquote>' + renderMarkdown(buf.join('\n')) + '</blockquote>');
                    continue;
                }

                if (tableRow.test(line) && i + 1 < lines.length && tableSep.test(lines[i + 1])) {
                    const headers = splitRow(line);
                    i += 2;
                    const rows = [];
                    while (i < lines.length && tableRow.test(lines[i])) {
                        rows.push(splitRow(lines[i]));
                        i++;
                    }
                    let html = '<table><thead><tr>';
                    headers.forEach(h => {
                        html += '<th>' + inline(h) + '</th>';
                    });
                    html += '</tr></thead><tbody>';
                    rows.forEach(r => {
                        html += '<tr>';
                        r.forEach(c => {
                            html += '<td>' + inline(c) + '</td>';
                        });
                        html += '</tr>';
                    });
                    html += '</tbody></table>';
                    out.push(html);
                    continue;
                }

                if (bullet.test(line) || ordered.test(line)) {
                    // Indent of the first bullet defines this list's base level.
                    // Deeper-indented bullets become nested lists (rendered by
                    // recursing into renderMarkdown). Same-or-less indent at a
                    // bullet starts a sibling item (or ends the list).
                    const firstMatch = line.match(bullet) || line.match(ordered);
                    const baseIndent = firstMatch[1].length;
                    const isOrdered = ordered.test(line);
                    const items = [];
                    while (i < lines.length) {
                        const cur = lines[i];
                        if (!cur.trim()) {
                            // blank line breaks the list (matches CommonMark-ish behaviour)
                            i++;
                            break;
                        }
                        const mBul = cur.match(bullet);
                        const mOrd = cur.match(ordered);
                        const m = mBul || mOrd;
                        if (!m) break;
                        if (m[1].length < baseIndent) break;
                        if (m[1].length > baseIndent) break; // shouldn't happen at top of loop
                        // Same-type check: switching between -/* and 1. closes the list
                        if (isOrdered !== !!mOrd) break;

                        const itemBuf = [m[3]];
                        const nestedBuf = [];
                        i++;
                        while (i < lines.length) {
                            const nxt = lines[i];
                            if (!nxt.trim()) break;
                            const nBul = nxt.match(bullet);
                            const nOrd = nxt.match(ordered);
                            const nm = nBul || nOrd;
                            if (nm) {
                                if (nm[1].length > baseIndent) {
                                    // nested list line — dedent and stash
                                    nestedBuf.push(nxt.slice(baseIndent + 2));
                                    i++;
                                    continue;
                                }
                                // sibling or end of list
                                break;
                            }
                            // Plain continuation text
                            if (nestedBuf.length) {
                                // continuation inside the nested block
                                nestedBuf.push(nxt.slice(baseIndent + 2));
                            } else {
                                itemBuf.push(nxt.trim());
                            }
                            i++;
                        }

                        let liHtml = inline(itemBuf.join('\n'));
                        if (nestedBuf.length) {
                            liHtml += renderMarkdown(nestedBuf.join('\n'));
                        }
                        items.push('<li>' + liHtml + '</li>');
                    }
                    out.push((isOrdered ? '<ol>' : '<ul>') + items.join('') + (isOrdered ? '</ol>' : '</ul>'));
                    continue;
                }

                const buf = [line];
                i++;
                while (i < lines.length && lines[i].trim() && !/^#{1,6}\s/.test(lines[i]) && !/^>\s?/.test(lines[i]) && !bullet.test(lines[i]) && !ordered.test(lines[i]) && !/^```/.test(lines[i]) && !tableRow.test(lines[i])) {
                    buf.push(lines[i]);
                    i++;
                }
                out.push('<p>' + inline(buf.join(' ')) + '</p>');
            }
            return out.join('\n');
        }

        // Block dispatcher. New block types plug in here.
        const renderers = {
            markdown: function (block) {
                const div = document.createElement('div');
                div.innerHTML = renderMarkdown(block.content);
                return div;
            },
            mermaid: function (block) {
                // Mermaid scans elements with class "mermaid" whose textContent
                // is the diagram source. We collect these nodes and run
                // mermaid.run() once after all blocks are in the DOM.
                const div = document.createElement('div');
                div.className = 'mermaid';
                div.textContent = block.content;
                return div;
            },
            'force-graph': function (block) {
                // build.py emits parsed JSON: {nodes:[{id,size}], links:[{source,target}]}.
                // We instantiate force-graph after the container is in the DOM
                // so it can measure its own width.
                const div = document.createElement('div');
                div.className = 'force-graph';
                const data = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.ForceGraph) return;
                    const maxSize = data.nodes.reduce((m, n) => Math.max(m, n.size || 1), 1);
                    window.ForceGraph()(div)
                        .graphData(data)
                        .width(div.clientWidth)
                        .height(div.clientHeight)
                        .nodeRelSize(4)
                        .nodeVal(n => Math.max(20 * (n.size || 1) / maxSize, 0.001))
                        .nodeLabel(n => n.id + ' (' + (n.size || 1) + ')')
                        .nodeColor(() => 'rgba(135, 206, 235, 0.7)')
                        .linkColor(() => 'rgba(60, 60, 60, 0.4)')
                        .linkDirectionalArrowLength(4)
                        .linkDirectionalArrowRelPos(1)
                        .linkWidth(1);
                });
                return div;
            },
            'bubble-chart': function (block) {
                // build.py emits {nodes:[{name,size}]}. Renders a D3 circle-pack
                // SVG (same shape as the obren.io reference, just inline).
                const wrap = document.createElement('div');
                wrap.className = 'bubble-chart';
                const payload = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.d3) return;
                    const diameter = 480;
                    const fill = '#c0deed';
                    const textColor = '#111111';
                    const fontSize = 12;

                    const svg = window.d3.select(wrap).append('svg')
                        .attr('viewBox', '0 0 ' + diameter + ' ' + diameter)
                        .attr('width', diameter)
                        .attr('height', diameter);

                    const root = window.d3.hierarchy({children: payload.nodes})
                        .sum(d => d.size || 0)
                        .sort((a, b) => b.value - a.value);

                    window.d3.pack().size([diameter, diameter]).padding(2)(root);

                    const node = svg.selectAll('g')
                        .data(root.leaves())
                        .enter().append('g')
                        .attr('transform', d => 'translate(' + d.x + ',' + d.y + ')');

                    node.append('title').text(d => d.data.name + ': ' + d.value);
                    node.append('circle').attr('r', d => d.r).style('fill', fill);
                    node.append('text')
                        .attr('dy', '.3em')
                        .style('text-anchor', 'middle')
                        .style('fill', textColor)
                        .style('font-size', fontSize + 'px')
                        .text(d => d.data.name.substring(0, Math.max(0, Math.floor(d.r / 3))));
                });
                return wrap;
            }
        };

        // Render one modality's blocks into a host element. Mermaid runs
        // scoped to just the nodes created here, so lazily rendered tabs get
        // their diagrams on first activation.
        let mermaidInitialized = false;
        function renderBlocksInto(blocks, host) {
            const mermaidNodes = [];
            blocks.forEach(function (block) {
                const r = renderers[block.type];
                if (!r) {
                    const pre = document.createElement('pre');
                    pre.textContent = '[unknown block type: ' + block.type + ']';
                    host.appendChild(pre);
                    return;
                }
                const node = r(block);
                if (node instanceof Node) {
                    host.appendChild(node);
                    if (block.type === 'mermaid') mermaidNodes.push(node);
                }
            });
            if (mermaidNodes.length && window.mermaid) {
                if (!mermaidInitialized) {
                    window.mermaid.initialize({startOnLoad: false, theme: 'default'});
                    mermaidInitialized = true;
                }
                window.mermaid.run({nodes: mermaidNodes});
            }
        }

        // Modality tabs. One <article class="pane"> per modality; panes are
        // rendered lazily on first activation (force-graph / D3 / mermaid
        // need a visible, measurable container). With a single modality the
        // tab bar stays hidden and the page looks exactly like before.
        const mods = data.modalities;
        const tabBar = document.getElementById('modality-tabs');
        const panes = {};
        const tabButtons = {};
        const renderedPanes = {};

        mods.forEach(function (m) {
            const pane = document.createElement('article');
            pane.className = 'pane';
            pane.dataset.key = m.key;
            pane.hidden = true;
            root.appendChild(pane);
            panes[m.key] = pane;
        });

        const defaultKey = mods.some(m => m.key === 'index') ? 'index' : mods[0].key;

        function activate(key, updateHash) {
            mods.forEach(function (m) {
                const isActive = m.key === key;
                panes[m.key].hidden = !isActive;
                if (tabButtons[m.key]) {
                    tabButtons[m.key].classList.toggle('active', isActive);
                    tabButtons[m.key].setAttribute('aria-selected', isActive ? 'true' : 'false');
                }
            });
            // Unhide first, then render: the chart libraries measure widths.
            if (!renderedPanes[key]) {
                renderBlocksInto(mods.find(m => m.key === key).blocks, panes[key]);
                renderedPanes[key] = true;
            }
            if (updateHash) {
                history.replaceState(null, '',
                    key === defaultKey ? location.pathname + location.search : '#' + key);
            }
        }

        if (mods.length > 1) {
            mods.forEach(function (m) {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.textContent = m.label;
                btn.setAttribute('role', 'tab');
                btn.addEventListener('click', function () { activate(m.key, true); });
                tabBar.appendChild(btn);
                tabButtons[m.key] = btn;
            });
            tabBar.hidden = false;
        }

        // The hash selects a tab only when it matches a modality key, so
        // existing anchors keep working.
        const initialHash = location.hash.slice(1);
        activate(mods.some(m => m.key === initialHash) ? initialHash : defaultKey, false);
        window.addEventListener('hashchange', function () {
            const k = location.hash.slice(1);
            if (mods.some(m => m.key === k)) activate(k, false);
        });
    })();
</script>
</body>
</html>
