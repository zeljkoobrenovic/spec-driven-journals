<script id="data" type="application/json">{"meta": {"id": "ORG-ORG-PRODUCT-ENGINEERING-PARTNERSHIP", "status": "draft:gray", "title": "Product and Engineering Partnership Around Outcomes", "date": "2026-05-17", "author": "Organization Org Design", "permalink": "product-engineering-partnership", "timetoread": "11 min", "excerpt": "Organization product and engineering teams will share accountability for outcomes, not split into product demand and engineering supply. Teams receive problems, context, constraints, and success measures; they discover and deliver solutions together.", "tags": "org-design, product, engineering, outcomes, discovery, delivery", "icon": "assets/icons/product-engineering-partnership.png", "logo": "assets/images/product-engineering-partnership/logo.jpeg", "logo_credit": "Image generated by Google Gemini (gemini-3-pro-image-preview)"}, "tags": ["org-design", "product", "engineering", "outcomes", "discovery", "delivery"], "modalities": [{"key": "index", "label": "Article", "meta": {}, "blocks": [{"type": "markdown", "content": "> **Status**: DRAFT\n>\n> **Decision**: Organization will organise product and engineering around shared outcomes rather than a demand-supply handoff. Product, design, engineering, quality, and data work together in durable teams that discover and deliver solutions. Leaders provide strategy, constraints, and priorities; teams are accountable for solving the right problems in ways that customers use, the business values, and engineering can operate.\n\n## Decision\n\nAdopt an **outcome-oriented product-engineering partnership**.\n\nThe default pattern is:\n\n* product leadership provides product vision, strategy, commercial context, and priorities;\n* engineering leadership provides technical strategy, operational constraints, platform direction, and capability development;\n* teams receive problems, outcomes, constraints, and context;\n* product, design, and engineering discover possible solutions together;\n* the same team builds, tests, releases, observes, and iterates on the chosen solution.\n\nThis decision rejects the model where product owns \"what\" as a feature backlog and engineering owns \"how\" as an execution queue. That split is too simple for modern software work. Feasibility, viability, usability, reliability, data, cost, and security shape the product itself.\n\n## How to Read This Decision\n\n| What it says | What it does **not** say |\n| --- | --- |\n| Product and engineering jointly own outcomes. | Product management and engineering have identical responsibilities. |\n| Teams should participate in discovery. | Every engineer attends every customer interview. |\n| Strategy and constraints come from leadership. | Teams invent business priorities in isolation. |\n| Features are hypotheses until validated. | Delivery commitments no longer matter. |\n| Product discovery and delivery stay connected. | Discovery becomes endless research. |\n\nThe partnership is strongest when each discipline brings its real expertise without turning the others into downstream order takers.\n\n## How to Use This Decision\n\nUse this decision to:\n\n* explain the difference between outcome ownership and feature delivery;\n* describe how product, design, engineering, quality, and data contribute different expertise;\n* identify when product work has become a demand-supply handoff;\n* use decision rights to prevent role confusion;\n* run a product-engineering conversation around evidence, constraints, and tradeoffs.\n\nThe educational goal is simple: teams should stop asking \"who owns what part of the handoff?\" and start asking \"what outcome are we trying to create together, and what evidence changes our mind?\"\n\n## One-Minute Mental Model\n\nProduct and engineering are not two ends of a conveyor belt. They are a **joint problem-solving system**.\n\nProduct brings business and customer context. Design brings user experience and usability evidence. Engineering brings feasibility, operability, and technical opportunity. Quality brings risk and confidence. Data brings measurement and learning.\n\nIf any one of those perspectives arrives only at the end, the product decision has already been weakened. The earlier the perspectives meet, the cheaper it is to change direction.\n\n## Rationale\n\nFeature backlogs create a false contract: if product writes the right requirements and engineering delivers them on time, success follows. In practice, success depends on learning:\n\n* whether the problem is worth solving;\n* whether customers or internal users will adopt the solution;\n* whether the solution works for the business model;\n* whether the design is usable and accessible;\n* whether the system can be built, secured, operated, and evolved;\n* whether the result moves the intended metric.\n\nThose questions cannot be answered by one function alone. The team must connect discovery and delivery so implementation learning feeds product decisions and product learning feeds technical decisions.\n\nThis also prevents two common organisational failures: product becoming a ticket factory and engineering becoming a capacity pool.\n\n## Role Boundaries\n\nShared outcomes do not erase role boundaries. They make boundaries clearer.\n\n| Role | Primary contribution |\n| --- | --- |\n| Product manager / product owner | Customer and business problem, prioritisation, stakeholder alignment, value hypotheses, outcome framing. |\n| Product designer / UX | User experience, research, interaction quality, accessibility, prototyping, usability evidence. |\n| Engineering tech lead | Feasibility, architecture tradeoffs, system health, operability, technical sequencing. |\n| Engineers | Implementation, technical discovery, testing, release, observability, operational improvement. |\n| Quality engineering | Risk model, test strategy, automation approach, release confidence, exploratory testing. |\n| Data / analytics | Instrumentation, outcome measurement, experiment interpretation, product telemetry. |\n| Engineering manager | Team health, staffing, coaching, delivery system, capability growth, organisational impediments. |\n\nThe exact titles may vary. The responsibilities should not disappear.\n\n## Decision Rights\n\nDecision rights should be explicit:\n\n| Decision area | Default owner | Advice required from |\n| --- | --- | --- |\n| Product outcome and priority | Product leadership and product partner | Engineering, design, data, affected business stakeholders |\n| Technical approach inside team boundary | Accountable engineering team | Product, architecture advice, platform/security when affected |\n| Release readiness | Accountable team | Product, QE, operations/support where relevant |\n| Shared platform or standard exception | Owning team, through Advice Process | Platform, architecture, affected consuming teams |\n| Strategic tradeoff between scope, time, quality, and risk | Product and engineering leadership together | Accountable team and affected stakeholders |\n\nWhen decision rights are unclear, the team should write an ADR or working agreement rather than resolve the ambiguity through escalation habits.\n\n## Worked Example\n\nA stakeholder asks for \"saved searches with push notifications\".\n\nFeature-factory interpretation:\n\n* Product writes the feature request.\n* Engineering estimates implementation.\n* Design creates screens.\n* QA tests near the end.\n* Success is shipping the requested feature.\n\nOutcome-oriented interpretation:\n\n| Question | Who contributes |\n| --- | --- |\n| What user problem are we solving? | Product, design, data, customer-facing stakeholders. |\n| What outcome would prove value? | Product and data, with engineering input on instrumentation. |\n| Which solution options exist? | Product, design, engineering, quality. |\n| What are the technical and operational risks? | Engineering, quality, platform, architecture advice if needed. |\n| How will we learn after release? | Product, engineering, data, quality. |\n\nThe team may still build saved searches. But it may also discover that email digest, better filters, or marketplace alert tuning solves the problem with lower cost or risk.\n\n## What This Means for Teams\n\nTeams should:\n\n* maintain a visible problem statement and outcome measure for meaningful work;\n* involve engineering early enough that feasibility and operability shape solution discovery;\n* involve product and design late enough that implementation learning can change the product;\n* treat technical debt, reliability, and quality as product constraints, not engineering hobbies;\n* instrument features so the team can learn after release;\n* revisit decisions when user, operational, or business evidence contradicts assumptions.\n\n## Anti-Patterns\n\n* **Product as ticket writer.** Product translates stakeholder requests into Jira items and calls that strategy.\n* **Engineering as delivery vendor.** Engineering estimates and implements without customer, data, or business context.\n* **Discovery handoff.** A separate group discovers the solution and hands it to a delivery team that was not part of the learning.\n* **Technical veto theatre.** Engineering rejects product ideas late because feasibility was not discussed early.\n* **Outcome without instrumentation.** The team claims outcome ownership but cannot observe whether the outcome changed.\n* **Delivery without ownership.** A feature is shipped and abandoned before adoption, reliability, or support are understood.\n\n## Discussion Prompts\n\nUse these prompts when starting meaningful product work:\n\n* What problem or outcome is this work meant to address?\n* What evidence do we have from customers, users, support, sales, operations, or product data?\n* Which assumptions are value, usability, feasibility, viability, quality, or operational assumptions?\n* Where could engineering insight change the product direction?\n* Where could product or user insight change the technical direction?\n* What will we measure after release, and who will look at it?\n\n## Related Records\n\n* [Stream-Aligned Product Teams as the Default Unit](stream-aligned-product-teams.html) - keeps discovery, delivery, and operation in durable teams.\n* [Team Size and Composition Guardrails](team-size-and-composition.html) - defines the minimum skills needed for this partnership.\n* [Quality Engineering as Enablement, Not a Release Gate](quality-engineering-enablement.html) - embeds quality into product and engineering work.\n* [Architecture as Advice and Guardrails](architecture-as-advice-and-guardrails.html) - keeps technical advice visible and compatible with team ownership.\n* [Operational Principle: Observable by Default](../principles/observable-by-default.html) - product outcomes and system health need instrumentation.\n\n## Scope and Revisiting\n\nThis ADR applies to product engineering teams and internal platform product teams. It does not require every infrastructure change to use the same discovery ceremony as a consumer-facing product, but it does require internal customers, outcomes, and feedback loops for platform work.\n\nRevisit if teams lack access to product context, if product strategy is unclear, or if shared outcome ownership degenerates into ambiguous accountability.\n\n## Authoritative References\n\n* Silicon Valley Product Group, [Product Model Concepts](https://www.svpg.com/product-model-concepts/).\n* Silicon Valley Product Group, [Product, Design and AI](https://www.svpg.com/product-design-and-ai/).\n* Product Talk, [Continuous Discovery](https://www.producttalk.org/glossary-discovery-continuous-discovery/).\n"}]}]}</script>
<script>
    (function () {
        const data = JSON.parse(document.getElementById('data').textContent);
        const root = document.getElementById('content');

        const postId = (data.meta && data.meta.id) ? String(data.meta.id) : '';
        const postStatusRaw = (data.meta && data.meta.status) ? String(data.meta.status) : '';
        if (postId || postStatusRaw) {
            const header = document.getElementById('post-header');
            let sectionEl = header.querySelector('p.section');
            if (!sectionEl) {
                sectionEl = document.createElement('p');
                sectionEl.className = 'section';
                header.insertBefore(sectionEl, header.firstChild);
            }
            // Status pill goes first, then a " / " separator before the existing
            // content (section name and/or id).
            if (postStatusRaw) {
                const parts = postStatusRaw.split(':');
                const statusName = parts[0].trim();
                const statusColor = (parts[1] || '').trim();
                const wrap = document.createElement('span');
                wrap.className = 'post-status';
                const dot = document.createElement('span');
                dot.className = 'status-dot';
                if (statusColor) dot.style.background = statusColor;
                wrap.appendChild(dot);
                wrap.appendChild(document.createTextNode(statusName));
                if (sectionEl.firstChild) {
                    sectionEl.insertBefore(document.createTextNode(' • '), sectionEl.firstChild);
                    sectionEl.insertBefore(wrap, sectionEl.firstChild);
                } else {
                    sectionEl.appendChild(wrap);
                }
            }
            if (postId) {
                if (sectionEl.firstChild) sectionEl.appendChild(document.createTextNode(' • '));
                sectionEl.appendChild(document.createTextNode(postId));
            }
        }

        const tagsHost = document.getElementById('tags');
        (data.tags || []).forEach(function (t) {
            const span = document.createElement('span');
            span.className = 'tag';
            span.textContent = t;
            tagsHost.appendChild(span);
        });

        // Minimal markdown renderer. Supports: ATX headings, paragraphs, blockquotes,
        // unordered/ordered lists, fenced code, inline code, bold/italic/strikethrough, links, images, hr.
        // Sufficient for the posts in this repo; replace with a fuller parser if needed.
        function renderMarkdown(src) {
            const lines = src.replace(/\r\n/g, '\n').split('\n');
            const out = [];
            let i = 0;

            const bullet = /^(\s*)([-*])\s+(.*)$/;
            const ordered = /^(\s*)(\d+)\.\s+(.*)$/;
            const tableRow = /^\s*\|(.+)\|\s*$/;
            const tableSep = /^\s*\|?\s*:?-{3,}:?\s*(\|\s*:?-{3,}:?\s*)+\|?\s*$/;

            function splitRow(s) {
                let t = s.trim();
                if (t.startsWith('|')) t = t.slice(1);
                if (t.endsWith('|')) t = t.slice(0, -1);
                return t.split('|').map(c => c.trim());
            }

            function inline(s) {
                // Posts are trusted content, so raw HTML passes through unescaped
                // (some posts embed inline <blockquote>, <div>, etc.).
                // Stray ampersands still get fixed up.
                s = s.replace(/&(?![a-zA-Z]+;|#\d+;)/g, '&amp;');
                s = s.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<a class="image-link" href="$2" target="_blank" rel="noopener noreferrer"><img alt="$1" src="$2"></a>');
                s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
                s = s.replace(/`([^`]+)`/g, function (_, c) {
                    return '<code>' + c.replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</code>';
                });
                s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
                s = s.replace(/~~([^~\n]+)~~/g, '<del>$1</del>');
                s = s.replace(/(^|[^*])\*([^*\n]+)\*/g, '$1<em>$2</em>');
                return s;
            }

            while (i < lines.length) {
                const line = lines[i];
                if (!line.trim()) {
                    i++;
                    continue;
                }

                const fence = line.match(/^```(\w*)\s*$/);
                if (fence) {
                    i++;
                    const buf = [];
                    while (i < lines.length && !/^```\s*$/.test(lines[i])) {
                        buf.push(lines[i]);
                        i++;
                    }
                    i++;
                    const escaped = buf.join('\n').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                    const cls = fence[1] ? ' class="lang-' + fence[1] + '"' : '';
                    out.push('<pre><code' + cls + '>' + escaped + '</code></pre>');
                    continue;
                }

                const h = line.match(/^(#{1,6})\s+(.*)$/);
                if (h) {
                    out.push('<h' + h[1].length + '>' + inline(h[2]) + '</h' + h[1].length + '>');
                    i++;
                    continue;
                }

                if (/^\s*(?:-\s*){3,}\s*$/.test(line) || /^\s*\*{3,}\s*$/.test(line)) {
                    out.push('<hr>');
                    i++;
                    continue;
                }

                if (/^>\s?/.test(line)) {
                    const buf = [];
                    while (i < lines.length && /^>\s?/.test(lines[i])) {
                        buf.push(lines[i].replace(/^>\s?/, ''));
                        i++;
                    }
                    out.push('<blockquote>' + renderMarkdown(buf.join('\n')) + '</blockquote>');
                    continue;
                }

                if (tableRow.test(line) && i + 1 < lines.length && tableSep.test(lines[i + 1])) {
                    const headers = splitRow(line);
                    i += 2;
                    const rows = [];
                    while (i < lines.length && tableRow.test(lines[i])) {
                        rows.push(splitRow(lines[i]));
                        i++;
                    }
                    let html = '<table><thead><tr>';
                    headers.forEach(h => {
                        html += '<th>' + inline(h) + '</th>';
                    });
                    html += '</tr></thead><tbody>';
                    rows.forEach(r => {
                        html += '<tr>';
                        r.forEach(c => {
                            html += '<td>' + inline(c) + '</td>';
                        });
                        html += '</tr>';
                    });
                    html += '</tbody></table>';
                    out.push(html);
                    continue;
                }

                if (bullet.test(line) || ordered.test(line)) {
                    // Indent of the first bullet defines this list's base level.
                    // Deeper-indented bullets become nested lists (rendered by
                    // recursing into renderMarkdown). Same-or-less indent at a
                    // bullet starts a sibling item (or ends the list).
                    const firstMatch = line.match(bullet) || line.match(ordered);
                    const baseIndent = firstMatch[1].length;
                    const isOrdered = ordered.test(line);
                    const items = [];
                    while (i < lines.length) {
                        const cur = lines[i];
                        if (!cur.trim()) {
                            // blank line breaks the list (matches CommonMark-ish behaviour)
                            i++;
                            break;
                        }
                        const mBul = cur.match(bullet);
                        const mOrd = cur.match(ordered);
                        const m = mBul || mOrd;
                        if (!m) break;
                        if (m[1].length < baseIndent) break;
                        if (m[1].length > baseIndent) break; // shouldn't happen at top of loop
                        // Same-type check: switching between -/* and 1. closes the list
                        if (isOrdered !== !!mOrd) break;

                        const itemBuf = [m[3]];
                        const nestedBuf = [];
                        i++;
                        while (i < lines.length) {
                            const nxt = lines[i];
                            if (!nxt.trim()) break;
                            const nBul = nxt.match(bullet);
                            const nOrd = nxt.match(ordered);
                            const nm = nBul || nOrd;
                            if (nm) {
                                if (nm[1].length > baseIndent) {
                                    // nested list line — dedent and stash
                                    nestedBuf.push(nxt.slice(baseIndent + 2));
                                    i++;
                                    continue;
                                }
                                // sibling or end of list
                                break;
                            }
                            // Plain continuation text
                            if (nestedBuf.length) {
                                // continuation inside the nested block
                                nestedBuf.push(nxt.slice(baseIndent + 2));
                            } else {
                                itemBuf.push(nxt.trim());
                            }
                            i++;
                        }

                        let liHtml = inline(itemBuf.join('\n'));
                        if (nestedBuf.length) {
                            liHtml += renderMarkdown(nestedBuf.join('\n'));
                        }
                        items.push('<li>' + liHtml + '</li>');
                    }
                    out.push((isOrdered ? '<ol>' : '<ul>') + items.join('') + (isOrdered ? '</ol>' : '</ul>'));
                    continue;
                }

                const buf = [line];
                i++;
                while (i < lines.length && lines[i].trim() && !/^#{1,6}\s/.test(lines[i]) && !/^>\s?/.test(lines[i]) && !bullet.test(lines[i]) && !ordered.test(lines[i]) && !/^```/.test(lines[i]) && !tableRow.test(lines[i])) {
                    buf.push(lines[i]);
                    i++;
                }
                out.push('<p>' + inline(buf.join(' ')) + '</p>');
            }
            return out.join('\n');
        }

        // Block dispatcher. New block types plug in here.
        const renderers = {
            markdown: function (block) {
                const div = document.createElement('div');
                div.innerHTML = renderMarkdown(block.content);
                return div;
            },
            mermaid: function (block) {
                // Mermaid scans elements with class "mermaid" whose textContent
                // is the diagram source. We collect these nodes and run
                // mermaid.run() once after all blocks are in the DOM.
                const div = document.createElement('div');
                div.className = 'mermaid';
                div.textContent = block.content;
                return div;
            },
            'force-graph': function (block) {
                // build.py emits parsed JSON: {nodes:[{id,size}], links:[{source,target}]}.
                // We instantiate force-graph after the container is in the DOM
                // so it can measure its own width.
                const div = document.createElement('div');
                div.className = 'force-graph';
                const data = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.ForceGraph) return;
                    const maxSize = data.nodes.reduce((m, n) => Math.max(m, n.size || 1), 1);
                    window.ForceGraph()(div)
                        .graphData(data)
                        .width(div.clientWidth)
                        .height(div.clientHeight)
                        .nodeRelSize(4)
                        .nodeVal(n => Math.max(20 * (n.size || 1) / maxSize, 0.001))
                        .nodeLabel(n => n.id + ' (' + (n.size || 1) + ')')
                        .nodeColor(() => 'rgba(135, 206, 235, 0.7)')
                        .linkColor(() => 'rgba(60, 60, 60, 0.4)')
                        .linkDirectionalArrowLength(4)
                        .linkDirectionalArrowRelPos(1)
                        .linkWidth(1);
                });
                return div;
            },
            'bubble-chart': function (block) {
                // build.py emits {nodes:[{name,size}]}. Renders a D3 circle-pack
                // SVG (same shape as the obren.io reference, just inline).
                const wrap = document.createElement('div');
                wrap.className = 'bubble-chart';
                const payload = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.d3) return;
                    const diameter = 480;
                    const fill = '#c0deed';
                    const textColor = '#111111';
                    const fontSize = 12;

                    const svg = window.d3.select(wrap).append('svg')
                        .attr('viewBox', '0 0 ' + diameter + ' ' + diameter)
                        .attr('width', diameter)
                        .attr('height', diameter);

                    const root = window.d3.hierarchy({children: payload.nodes})
                        .sum(d => d.size || 0)
                        .sort((a, b) => b.value - a.value);

                    window.d3.pack().size([diameter, diameter]).padding(2)(root);

                    const node = svg.selectAll('g')
                        .data(root.leaves())
                        .enter().append('g')
                        .attr('transform', d => 'translate(' + d.x + ',' + d.y + ')');

                    node.append('title').text(d => d.data.name + ': ' + d.value);
                    node.append('circle').attr('r', d => d.r).style('fill', fill);
                    node.append('text')
                        .attr('dy', '.3em')
                        .style('text-anchor', 'middle')
                        .style('fill', textColor)
                        .style('font-size', fontSize + 'px')
                        .text(d => d.data.name.substring(0, Math.max(0, Math.floor(d.r / 3))));
                });
                return wrap;
            }
        };

        // Render one modality's blocks into a host element. Mermaid runs
        // scoped to just the nodes created here, so lazily rendered tabs get
        // their diagrams on first activation.
        let mermaidInitialized = false;
        function renderBlocksInto(blocks, host) {
            const mermaidNodes = [];
            blocks.forEach(function (block) {
                const r = renderers[block.type];
                if (!r) {
                    const pre = document.createElement('pre');
                    pre.textContent = '[unknown block type: ' + block.type + ']';
                    host.appendChild(pre);
                    return;
                }
                const node = r(block);
                if (node instanceof Node) {
                    host.appendChild(node);
                    if (block.type === 'mermaid') mermaidNodes.push(node);
                }
            });
            if (mermaidNodes.length && window.mermaid) {
                if (!mermaidInitialized) {
                    window.mermaid.initialize({startOnLoad: false, theme: 'default'});
                    mermaidInitialized = true;
                }
                window.mermaid.run({nodes: mermaidNodes});
            }
        }

        // Modality tabs. One <article class="pane"> per modality; panes are
        // rendered lazily on first activation (force-graph / D3 / mermaid
        // need a visible, measurable container). With a single modality the
        // tab bar stays hidden and the page looks exactly like before.
        const mods = data.modalities;
        const tabBar = document.getElementById('modality-tabs');
        const panes = {};
        const tabButtons = {};
        const renderedPanes = {};

        mods.forEach(function (m) {
            const pane = document.createElement('article');
            pane.className = 'pane';
            pane.dataset.key = m.key;
            pane.hidden = true;
            root.appendChild(pane);
            panes[m.key] = pane;
        });

        const defaultKey = mods.some(m => m.key === 'index') ? 'index' : mods[0].key;

        function activate(key, updateHash) {
            mods.forEach(function (m) {
                const isActive = m.key === key;
                panes[m.key].hidden = !isActive;
                if (tabButtons[m.key]) {
                    tabButtons[m.key].classList.toggle('active', isActive);
                    tabButtons[m.key].setAttribute('aria-selected', isActive ? 'true' : 'false');
                }
            });
            // Unhide first, then render: the chart libraries measure widths.
            if (!renderedPanes[key]) {
                renderBlocksInto(mods.find(m => m.key === key).blocks, panes[key]);
                renderedPanes[key] = true;
            }
            if (updateHash) {
                history.replaceState(null, '',
                    key === defaultKey ? location.pathname + location.search : '#' + key);
            }
        }

        if (mods.length > 1) {
            mods.forEach(function (m) {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.textContent = m.label;
                btn.setAttribute('role', 'tab');
                btn.addEventListener('click', function () { activate(m.key, true); });
                tabBar.appendChild(btn);
                tabButtons[m.key] = btn;
            });
            tabBar.hidden = false;
        }

        // The hash selects a tab only when it matches a modality key, so
        // existing anchors keep working.
        const initialHash = location.hash.slice(1);
        activate(mods.some(m => m.key === initialHash) ? initialHash : defaultKey, false);
        window.addEventListener('hashchange', function () {
            const k = location.hash.slice(1);
            if (mods.some(m => m.key === k)) activate(k, false);
        });
    })();
</script>
</body>
</html>
