<script id="data" type="application/json">{"meta": {"id": "ORG-ORG-TEAM-SIZE-AND-COMPOSITION", "status": "draft:gray", "title": "Team Size and Composition Guardrails", "date": "2026-05-17", "author": "Organization Org Design", "permalink": "team-size-and-composition", "timetoread": "10 min", "excerpt": "Organization product engineering teams should normally have five to eight engineers and a total cross-functional working group small enough to sustain trust, focus, and shared ownership. Teams below four engineers are fragile; teams above ten core contributors should usually split or narrow their mission.", "tags": "org-design, teams, staffing, cognitive-load, roles", "icon": "assets/icons/team-size-and-composition.png", "logo": "assets/images/team-size-and-composition/logo.jpeg", "logo_credit": "Image generated by Google Gemini (gemini-3-pro-image-preview)"}, "tags": ["org-design", "teams", "staffing", "cognitive-load", "roles"], "blocks": [{"type": "markdown", "content": "> **Status**: DRAFT\n>\n> **Decision**: Organization will use explicit guardrails for team size and composition. A healthy product engineering team normally has five to eight engineers, one clear product partner, design access where user experience matters, technical leadership, and enough delivery, quality, data, and operational skill to own its stream. Teams below four engineers are fragile; teams above ten core contributors should usually split, narrow scope, or change topology.\n\n## Decision\n\nAdopt team size and composition guardrails for stream-aligned product teams.\n\nThe normal target is:\n\n| Dimension | Default guardrail |\n| --- | --- |\n| Core engineers | 5-8 engineers |\n| Total standing team | Usually 6-10 people including product/design/QE roles |\n| Product ownership | One named product partner or equivalent decision owner |\n| Technical leadership | One named tech lead role, not necessarily a people manager |\n| Quality ownership | Quality skills embedded in the team, with QE enablement where needed |\n| Operational ownership | The team can deploy, observe, support, and improve its systems |\n| Bus factor | No critical capability depends on one person indefinitely |\n\nThe guardrails are not a spreadsheet rule. They are prompts for leadership judgement. The point is to protect team cognition, resilience, and ownership.\n\n## How to Read This Decision\n\n| What it says | What it does **not** say |\n| --- | --- |\n| Most teams should be small and durable. | Every team must have exactly the same headcount. |\n| Skill mix matters as much as size. | Every skill must be represented by a full-time dedicated person. |\n| Teams below four engineers are organisationally fragile. | Small temporary groups can never exist. |\n| Teams above ten core contributors need review. | Large missions must always be split immediately. |\n| Composition follows ownership. | People should be copied into every team just in case. |\n\nTeam design is a socio-technical decision: the shape of the team should match the product boundary, system boundary, and cognitive load.\n\n## How to Use This Decision\n\nUse this decision to:\n\n* explain why team size affects ownership, learning, and delivery flow;\n* tell the difference between headcount capacity and real team capability;\n* identify missing skills in a product team without defaulting to fractional staffing;\n* recognise when a team should be split, narrowed, or supported by platform/enabling work;\n* use team-shape discussions as design conversations, not only budget conversations.\n\nThe useful question is not \"how many people are on the team?\" The useful question is \"can this group sustainably own its mission with the skills, context, and authority it has?\"\n\n## One-Minute Mental Model\n\nTeam size has two failure cliffs.\n\nBelow the lower cliff, the team is fragile: support rotation, holidays, incidents, reviews, and onboarding all depend on too few people. Above the upper cliff, the team is noisy: coordination cost grows, internal subgroups form, and ownership becomes vague.\n\nComposition is the second half of the model. Eight engineers with no product context or quality strategy are not a healthy product team. A nominally cross-functional team made of many 10 percent allocations is also not healthy. A real team needs enough dedicated people and enough reliable skills to own the work.\n\n## Rationale\n\nVery small teams move quickly for a while, then become fragile. They struggle with support rotation, pairing, reviews, vacations, incidents, onboarding, and succession. Very large teams preserve capacity on paper while losing shared context in practice. Coordination cost rises, meetings multiply, and ownership blurs.\n\nThe target range gives teams enough people to sustain delivery and operations without creating an internal bureaucracy. It also makes team responsibilities legible: if a team needs many more people, either the mission is too broad, the system is too complex, or the team is doing work that should be moved to a platform, enabling, or complicated-subsystem topology.\n\nComposition is equally important. A team with eight backend engineers and no product access, user insight, quality strategy, or operational capability is not cross-functional. A team with every specialist assigned at 10 percent is also not cross-functional; it is a meeting schedule.\n\n## Minimum Viable Composition\n\nA stream-aligned team should be able to answer these questions without routing every decision elsewhere:\n\n| Capability | Minimum expectation |\n| --- | --- |\n| Product direction | Who decides priorities and interprets product strategy for this stream? |\n| User and customer understanding | Who brings recent evidence about users, customers, partners, or internal consumers? |\n| Engineering delivery | Who can design, implement, review, release, and maintain the system? |\n| Technical leadership | Who keeps tradeoffs explicit and raises cross-team decisions early? |\n| Quality strategy | Who designs the test approach, risk approach, and release confidence model? |\n| Operations | Who can respond to incidents, understand observability, and improve runbooks? |\n| Data and analytics | Who knows whether the product is producing the intended outcome? |\n\nSome capabilities may come through part-time collaboration or enabling support. The important point is that the team has reliable access and clear ownership, not that every role appears as a permanent full-time job title.\n\n## Composition Patterns\n\nUseful starting patterns:\n\n| Team situation | Likely composition |\n| --- | --- |\n| User-facing product stream | PM, product designer, tech lead, 5-8 engineers, QE skill, analytics access. |\n| Platform product stream | Platform product owner, tech lead, platform engineers, developer-experience feedback path, reliability/security input. |\n| High-risk regulated or legacy stream | Stronger QE presence, operational expertise, architecture advice, and explicit risk review. |\n| Early discovery stream | Smaller core group with product, design, tech lead, and one or two engineers; expand only when delivery starts. |\n| Migration stream | Temporary cross-functional group with a clear retirement date and receiving owners. |\n\nAvoid solving every shortage by adding fractional people. Too many fractional assignments increase coordination load and create weak accountability.\n\n## Sizing Smells\n\nUse these smells to decide whether a team needs design attention:\n\n| Smell | Likely interpretation | Better question |\n| --- | --- | --- |\n| Two engineers own a production service with on-call. | The team is under-resilient. | What is the minimum sustainable support model? |\n| Twelve people attend every planning meeting. | The mission may be too broad or internally split. | Which value streams or subdomains are hidden inside the team? |\n| A specialist attends five teams' ceremonies. | The role is spread too thin to be useful. | Should this skill be embedded, enabled, or turned into a platform capability? |\n| The team cannot release without another team. | Ownership boundary or platform capability is incomplete. | Is the dependency temporary, service-like, or a sign of wrong team boundaries? |\n| One person reviews every important change. | Knowledge and decision authority are concentrated. | How do we grow reviewers and reduce single-person bottlenecks? |\n\nSizing problems are often symptoms. The cause may be architecture, product scope, platform weakness, unclear ownership, or leadership overcommitment.\n\n## What This Means for Leaders\n\nEngineering and product leaders should review team shape when:\n\n* a team is smaller than four engineers for more than one quarter;\n* a team has more than ten regular contributors;\n* support load repeatedly blocks product work;\n* product discovery happens outside the team;\n* releases require routine coordination across many component teams;\n* one person is the bottleneck for a critical skill;\n* a team depends on specialists who are never available when decisions are made.\n\nThe first fix is not always \"add people\". Often the better answer is narrowing the mission, simplifying the system, moving a shared capability to a platform team, or changing interaction mode.\n\n## Anti-Patterns\n\n* **Two-person product team.** Fast until someone is sick, on holiday, or leaves.\n* **Fifteen-person standup.** Capacity looks high, but nobody can hold the whole mission in their head.\n* **Fractional specialist swarm.** Everyone is assigned to the team, nobody is truly available to it.\n* **Missing product partner.** Engineers receive tickets but not product context or outcome ownership.\n* **Missing operations skill.** The team builds software it cannot confidently run.\n* **Single hero skill.** A critical system depends on one irreplaceable person.\n\n## Discussion Prompts\n\nUse these prompts when reviewing a team:\n\n* Which responsibilities would fail if one person left?\n* Which skills does the team need all the time, and which can be accessed through enabling or platform support?\n* Where does the team wait for someone outside the team before it can release?\n* Is the team large because the mission is broad, the system is complex, or demand is uncontrolled?\n* Are fractional roles helping the team, or only making the org chart look complete?\n* What would we remove from the team's mission before adding more people?\n\n## Related Records\n\n* [Stream-Aligned Product Teams as the Default Unit](stream-aligned-product-teams.html) - defines the default team unit.\n* [Product and Engineering Partnership Around Outcomes](product-engineering-partnership.html) - defines product, design, and engineering collaboration.\n* [Quality Engineering as Enablement, Not a Release Gate](quality-engineering-enablement.html) - clarifies how quality skill enters team work.\n* [Platform and DevOps Operating Model](platform-and-devops-operating-model.html) - clarifies platform support and operational ownership.\n* [Organisation Principle: Capabilities Follow Ownership](../principles/capabilities-follow-ownership.html) - ownership must be real, not implied.\n\n## Scope and Revisiting\n\nThis ADR applies to standing product engineering teams. It does not prescribe the size of incident response groups, discovery spikes, migration tiger teams, guilds, or leadership groups.\n\nRevisit the guardrails if the organisation collects evidence that different size ranges are consistently healthier for its actual domains and constraints.\n\n## Authoritative References\n\n* Matthew Skelton and Manuel Pais, *Team Topologies*.\n* Atlassian Team Playbook, [Team Health Monitor](https://www.atlassian.com/team-playbook/health-monitor).\n* Silicon Valley Product Group, [Product, Design and AI](https://www.svpg.com/product-design-and-ai/).\n"}]}</script>
<script>
    (function () {
        const data = JSON.parse(document.getElementById('data').textContent);
        const root = document.getElementById('content');

        const postId = (data.meta && data.meta.id) ? String(data.meta.id) : '';
        const postStatusRaw = (data.meta && data.meta.status) ? String(data.meta.status) : '';
        if (postId || postStatusRaw) {
            const header = document.getElementById('post-header');
            let sectionEl = header.querySelector('p.section');
            if (!sectionEl) {
                sectionEl = document.createElement('p');
                sectionEl.className = 'section';
                header.insertBefore(sectionEl, header.firstChild);
            }
            // Status pill goes first, then a " / " separator before the existing
            // content (section name and/or id).
            if (postStatusRaw) {
                const parts = postStatusRaw.split(':');
                const statusName = parts[0].trim();
                const statusColor = (parts[1] || '').trim();
                const wrap = document.createElement('span');
                wrap.className = 'post-status';
                const dot = document.createElement('span');
                dot.className = 'status-dot';
                if (statusColor) dot.style.background = statusColor;
                wrap.appendChild(dot);
                wrap.appendChild(document.createTextNode(statusName));
                if (sectionEl.firstChild) {
                    sectionEl.insertBefore(document.createTextNode(' • '), sectionEl.firstChild);
                    sectionEl.insertBefore(wrap, sectionEl.firstChild);
                } else {
                    sectionEl.appendChild(wrap);
                }
            }
            if (postId) {
                if (sectionEl.firstChild) sectionEl.appendChild(document.createTextNode(' • '));
                sectionEl.appendChild(document.createTextNode(postId));
            }
        }

        const tagsHost = document.getElementById('tags');
        (data.tags || []).forEach(function (t) {
            const span = document.createElement('span');
            span.className = 'tag';
            span.textContent = t;
            tagsHost.appendChild(span);
        });

        // Minimal markdown renderer. Supports: ATX headings, paragraphs, blockquotes,
        // unordered/ordered lists, fenced code, inline code, bold/italic/strikethrough, links, images, hr.
        // Sufficient for the posts in this repo; replace with a fuller parser if needed.
        function renderMarkdown(src) {
            const lines = src.replace(/\r\n/g, '\n').split('\n');
            const out = [];
            let i = 0;

            const bullet = /^(\s*)([-*])\s+(.*)$/;
            const ordered = /^(\s*)(\d+)\.\s+(.*)$/;
            const tableRow = /^\s*\|(.+)\|\s*$/;
            const tableSep = /^\s*\|?\s*:?-{3,}:?\s*(\|\s*:?-{3,}:?\s*)+\|?\s*$/;

            function splitRow(s) {
                let t = s.trim();
                if (t.startsWith('|')) t = t.slice(1);
                if (t.endsWith('|')) t = t.slice(0, -1);
                return t.split('|').map(c => c.trim());
            }

            function inline(s) {
                // Posts are trusted content, so raw HTML passes through unescaped
                // (some posts embed inline <blockquote>, <div>, etc.).
                // Stray ampersands still get fixed up.
                s = s.replace(/&(?![a-zA-Z]+;|#\d+;)/g, '&amp;');
                s = s.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img alt="$1" src="$2">');
                s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
                s = s.replace(/`([^`]+)`/g, function (_, c) {
                    return '<code>' + c.replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</code>';
                });
                s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
                s = s.replace(/~~([^~\n]+)~~/g, '<del>$1</del>');
                s = s.replace(/(^|[^*])\*([^*\n]+)\*/g, '$1<em>$2</em>');
                return s;
            }

            while (i < lines.length) {
                const line = lines[i];
                if (!line.trim()) {
                    i++;
                    continue;
                }

                const fence = line.match(/^```(\w*)\s*$/);
                if (fence) {
                    i++;
                    const buf = [];
                    while (i < lines.length && !/^```\s*$/.test(lines[i])) {
                        buf.push(lines[i]);
                        i++;
                    }
                    i++;
                    const escaped = buf.join('\n').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                    const cls = fence[1] ? ' class="lang-' + fence[1] + '"' : '';
                    out.push('<pre><code' + cls + '>' + escaped + '</code></pre>');
                    continue;
                }

                const h = line.match(/^(#{1,6})\s+(.*)$/);
                if (h) {
                    out.push('<h' + h[1].length + '>' + inline(h[2]) + '</h' + h[1].length + '>');
                    i++;
                    continue;
                }

                if (/^\s*(?:-\s*){3,}\s*$/.test(line) || /^\s*\*{3,}\s*$/.test(line)) {
                    out.push('<hr>');
                    i++;
                    continue;
                }

                if (/^>\s?/.test(line)) {
                    const buf = [];
                    while (i < lines.length && /^>\s?/.test(lines[i])) {
                        buf.push(lines[i].replace(/^>\s?/, ''));
                        i++;
                    }
                    out.push('<blockquote>' + renderMarkdown(buf.join('\n')) + '</blockquote>');
                    continue;
                }

                if (tableRow.test(line) && i + 1 < lines.length && tableSep.test(lines[i + 1])) {
                    const headers = splitRow(line);
                    i += 2;
                    const rows = [];
                    while (i < lines.length && tableRow.test(lines[i])) {
                        rows.push(splitRow(lines[i]));
                        i++;
                    }
                    let html = '<table><thead><tr>';
                    headers.forEach(h => {
                        html += '<th>' + inline(h) + '</th>';
                    });
                    html += '</tr></thead><tbody>';
                    rows.forEach(r => {
                        html += '<tr>';
                        r.forEach(c => {
                            html += '<td>' + inline(c) + '</td>';
                        });
                        html += '</tr>';
                    });
                    html += '</tbody></table>';
                    out.push(html);
                    continue;
                }

                if (bullet.test(line) || ordered.test(line)) {
                    // Indent of the first bullet defines this list's base level.
                    // Deeper-indented bullets become nested lists (rendered by
                    // recursing into renderMarkdown). Same-or-less indent at a
                    // bullet starts a sibling item (or ends the list).
                    const firstMatch = line.match(bullet) || line.match(ordered);
                    const baseIndent = firstMatch[1].length;
                    const isOrdered = ordered.test(line);
                    const items = [];
                    while (i < lines.length) {
                        const cur = lines[i];
                        if (!cur.trim()) {
                            // blank line breaks the list (matches CommonMark-ish behaviour)
                            i++;
                            break;
                        }
                        const mBul = cur.match(bullet);
                        const mOrd = cur.match(ordered);
                        const m = mBul || mOrd;
                        if (!m) break;
                        if (m[1].length < baseIndent) break;
                        if (m[1].length > baseIndent) break; // shouldn't happen at top of loop
                        // Same-type check: switching between -/* and 1. closes the list
                        if (isOrdered !== !!mOrd) break;

                        const itemBuf = [m[3]];
                        const nestedBuf = [];
                        i++;
                        while (i < lines.length) {
                            const nxt = lines[i];
                            if (!nxt.trim()) break;
                            const nBul = nxt.match(bullet);
                            const nOrd = nxt.match(ordered);
                            const nm = nBul || nOrd;
                            if (nm) {
                                if (nm[1].length > baseIndent) {
                                    // nested list line — dedent and stash
                                    nestedBuf.push(nxt.slice(baseIndent + 2));
                                    i++;
                                    continue;
                                }
                                // sibling or end of list
                                break;
                            }
                            // Plain continuation text
                            if (nestedBuf.length) {
                                // continuation inside the nested block
                                nestedBuf.push(nxt.slice(baseIndent + 2));
                            } else {
                                itemBuf.push(nxt.trim());
                            }
                            i++;
                        }

                        let liHtml = inline(itemBuf.join('\n'));
                        if (nestedBuf.length) {
                            liHtml += renderMarkdown(nestedBuf.join('\n'));
                        }
                        items.push('<li>' + liHtml + '</li>');
                    }
                    out.push((isOrdered ? '<ol>' : '<ul>') + items.join('') + (isOrdered ? '</ol>' : '</ul>'));
                    continue;
                }

                const buf = [line];
                i++;
                while (i < lines.length && lines[i].trim() && !/^#{1,6}\s/.test(lines[i]) && !/^>\s?/.test(lines[i]) && !bullet.test(lines[i]) && !ordered.test(lines[i]) && !/^```/.test(lines[i]) && !tableRow.test(lines[i])) {
                    buf.push(lines[i]);
                    i++;
                }
                out.push('<p>' + inline(buf.join(' ')) + '</p>');
            }
            return out.join('\n');
        }

        // Block dispatcher. New block types plug in here.
        const renderers = {
            markdown: function (block) {
                const div = document.createElement('div');
                div.innerHTML = renderMarkdown(block.content);
                return div;
            },
            mermaid: function (block) {
                // Mermaid scans elements with class "mermaid" whose textContent
                // is the diagram source. We collect these nodes and run
                // mermaid.run() once after all blocks are in the DOM.
                const div = document.createElement('div');
                div.className = 'mermaid';
                div.textContent = block.content;
                return div;
            },
            'force-graph': function (block) {
                // build.py emits parsed JSON: {nodes:[{id,size}], links:[{source,target}]}.
                // We instantiate force-graph after the container is in the DOM
                // so it can measure its own width.
                const div = document.createElement('div');
                div.className = 'force-graph';
                const data = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.ForceGraph) return;
                    const maxSize = data.nodes.reduce((m, n) => Math.max(m, n.size || 1), 1);
                    window.ForceGraph()(div)
                        .graphData(data)
                        .width(div.clientWidth)
                        .height(div.clientHeight)
                        .nodeRelSize(4)
                        .nodeVal(n => Math.max(20 * (n.size || 1) / maxSize, 0.001))
                        .nodeLabel(n => n.id + ' (' + (n.size || 1) + ')')
                        .nodeColor(() => 'rgba(135, 206, 235, 0.7)')
                        .linkColor(() => 'rgba(60, 60, 60, 0.4)')
                        .linkDirectionalArrowLength(4)
                        .linkDirectionalArrowRelPos(1)
                        .linkWidth(1);
                });
                return div;
            },
            'bubble-chart': function (block) {
                // build.py emits {nodes:[{name,size}]}. Renders a D3 circle-pack
                // SVG (same shape as the obren.io reference, just inline).
                const wrap = document.createElement('div');
                wrap.className = 'bubble-chart';
                const payload = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.d3) return;
                    const diameter = 480;
                    const fill = '#c0deed';
                    const textColor = '#111111';
                    const fontSize = 12;

                    const svg = window.d3.select(wrap).append('svg')
                        .attr('viewBox', '0 0 ' + diameter + ' ' + diameter)
                        .attr('width', diameter)
                        .attr('height', diameter);

                    const root = window.d3.hierarchy({children: payload.nodes})
                        .sum(d => d.size || 0)
                        .sort((a, b) => b.value - a.value);

                    window.d3.pack().size([diameter, diameter]).padding(2)(root);

                    const node = svg.selectAll('g')
                        .data(root.leaves())
                        .enter().append('g')
                        .attr('transform', d => 'translate(' + d.x + ',' + d.y + ')');

                    node.append('title').text(d => d.data.name + ': ' + d.value);
                    node.append('circle').attr('r', d => d.r).style('fill', fill);
                    node.append('text')
                        .attr('dy', '.3em')
                        .style('text-anchor', 'middle')
                        .style('fill', textColor)
                        .style('font-size', fontSize + 'px')
                        .text(d => d.data.name.substring(0, Math.max(0, Math.floor(d.r / 3))));
                });
                return wrap;
            }
        };

        const mermaidNodes = [];
        data.blocks.forEach(function (block) {
            const r = renderers[block.type];
            if (!r) {
                const pre = document.createElement('pre');
                pre.textContent = '[unknown block type: ' + block.type + ']';
                root.appendChild(pre);
                return;
            }
            const node = r(block);
            if (node instanceof Node) {
                root.appendChild(node);
                if (block.type === 'mermaid') mermaidNodes.push(node);
            }
        });

        if (mermaidNodes.length && window.mermaid) {
            window.mermaid.initialize({startOnLoad: false, theme: 'default'});
            window.mermaid.run({nodes: mermaidNodes});
        }
    })();
</script>
</body>
</html>
