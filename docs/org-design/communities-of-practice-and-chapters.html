<script id="data" type="application/json">{"meta": {"id": "ORG-ORG-COMMUNITIES-OF-PRACTICE-AND-CHAPTERS", "status": "draft:gray", "title": "Communities of Practice and Chapters for Shared Craft", "date": "2026-05-17", "author": "Organization Org Design", "permalink": "communities-of-practice-and-chapters", "timetoread": "10 min", "excerpt": "Organization will use communities of practice and chapters to preserve shared craft across durable product teams. Communities advise, teach, curate standards, and maintain reusable knowledge; they do not become hidden reporting lines or delivery queues.", "tags": "org-design, communities-of-practice, chapters, guilds, standards, learning", "icon": "assets/icons/communities-of-practice-and-chapters.png", "logo": "assets/images/communities-of-practice-and-chapters/logo.jpeg", "logo_credit": "Image generated by Google Gemini (gemini-3-pro-image-preview)"}, "tags": ["org-design", "communities-of-practice", "chapters", "guilds", "standards", "learning"], "blocks": [{"type": "markdown", "content": "> **Status**: DRAFT\n>\n> **Decision**: Organization will use communities of practice and chapters to maintain shared engineering craft across stream-aligned teams. Communities advise, teach, curate standards, review practices, and maintain reusable knowledge. They do not replace product teams, create hidden reporting lines, or become delivery queues.\n\n## Decision\n\nAdopt **communities of practice and chapters** as the cross-team mechanism for shared craft.\n\nThe default model:\n\n* stream-aligned teams remain the primary unit of delivery and ownership;\n* communities connect people with similar disciplines or concerns across teams;\n* communities produce durable artifacts: ADRs, principles, standards, playbooks, templates, examples, learning material, and recommendations;\n* communities provide advice through visible rituals and records;\n* chapter-like structures may support career development, mentoring, and consistency for a discipline where the organisation needs that formality.\n\nExisting foundation records such as [Backend Guild as a Cross-Team Community of Practice](../foundations/backend-guild.html), [Frontend Guild as a Cross-Team Web Consortium](../foundations/frontend-guild.html), [Mobile Guild as a Cross-Team Mobile Consortium](../foundations/mobile-guild.html), and [GenAI Guild as a Cross-Team Generative AI Consortium](../foundations/genai-guild.html) are examples of this direction.\n\n## How to Read This Decision\n\n| What it says | What it does **not** say |\n| --- | --- |\n| Shared craft needs a cross-team home. | Product teams stop owning delivery decisions. |\n| Communities can define standards and advice. | Communities can silently override accountable teams. |\n| Chapters may support careers and skills. | Chapters are automatically separate reporting lines. |\n| Communities should produce durable artifacts. | Meetings are enough. |\n| Participation should create learning. | Every engineer must attend every guild. |\n\nCommunities are useful when they create leverage. They are wasteful when they become calendar rituals without outcomes.\n\n## How to Use This Decision\n\nUse this decision to:\n\n* explain why durable product teams still need cross-team craft mechanisms;\n* distinguish communities of practice from reporting lines, delivery teams, and approval boards;\n* recognise the outputs that make a community useful;\n* decide when a community recommendation should become a standard, ADR, or platform capability;\n* identify when a guild or chapter has become ceremony without leverage.\n\nThe practical lesson is that shared craft needs a home, but that home must improve product teams rather than compete with them.\n\n## One-Minute Mental Model\n\nA community of practice is a **learning and standard-setting amplifier**.\n\nIt connects people who solve similar problems in different teams. It finds repeated pain, turns local learning into shared material, helps people grow in their craft, and gives advice in public.\n\nIt should not become a second org chart. A healthy community makes teams better at owning their work. An unhealthy one pulls ownership away from teams or produces meetings without durable artifacts.\n\n## Rationale\n\nStream-aligned teams improve ownership, but they can also fragment craft. Without a cross-team mechanism, backend patterns diverge, frontend practices drift, mobile quality varies, AI-assisted engineering evolves inconsistently, and new engineers learn only the habits of their immediate team.\n\nCommunities solve this without recentralising delivery. They give the organisation a place to:\n\n* compare patterns across teams;\n* identify repeated pain;\n* turn good local practice into shared standards;\n* create learning paths and mentoring;\n* review external technology signals;\n* steward technical principles and defaults;\n* support career development for specialists embedded in product teams.\n\nThe important boundary is that communities advise and enable. They do not become the place where product work is approved or reassigned.\n\n## Community Outputs\n\nHealthy communities produce visible outputs:\n\n| Output | Example |\n| --- | --- |\n| Standards | Testing baseline, frontend accessibility checklist, API versioning guidance. |\n| Golden paths | Starter templates, reference pipelines, approved library patterns. |\n| Learning material | Onboarding path, internal workshops, recorded examples. |\n| Decision advice | Proposed ADRs, advice notes, revisits of old decisions. |\n| Practice reviews | Periodic review of health in a discipline, with follow-up actions. |\n| Talent support | Interview rubrics, career expectations, mentoring circles. |\n| External sensing | Technology radar input, vendor evaluation, deprecation warnings. |\n\nIf a community has no outputs beyond meeting notes, its purpose should be revisited.\n\n## Community Authority\n\nCommunities may:\n\n* recommend standards;\n* maintain playbooks and templates;\n* advise on ADRs;\n* identify gaps in team capability;\n* raise risks to engineering leadership;\n* own reusable capabilities only when a named team or group accepts lifecycle responsibility.\n\nCommunities may not:\n\n* own product delivery for stream-aligned teams;\n* act as hidden approval boards;\n* impose standards without an adoption path;\n* publish shared capabilities with no owner;\n* become a substitute for management, architecture, or platform ownership.\n\nWhen a community recommendation should become a real constraint, it must be turned into an ADR, principle, platform guardrail, or leadership decision with ownership.\n\n## Worked Example\n\nThe frontend community notices that several teams solve accessibility inconsistently.\n\nWeak community response:\n\n* A guild meeting discusses accessibility.\n* Notes are posted in chat.\n* Each team interprets the advice differently.\n* The same problem returns next quarter.\n\nStronger community response:\n\n| Step | Output |\n| --- | --- |\n| Collect examples | Short comparison of current accessibility gaps across teams. |\n| Draft guidance | A frontend accessibility checklist and examples. |\n| Create support path | Office-hours slot for teams applying the checklist. |\n| Encode defaults | Starter components and lint checks where possible. |\n| Review adoption | Follow up after one quarter with evidence and updates. |\n\nThe community does not take over frontend delivery. It improves the shared practice and lowers the effort for every team.\n\n## Operating Rhythm\n\nEach community should define a lightweight operating model:\n\n| Element | Minimum expectation |\n| --- | --- |\n| Purpose | Why the community exists and which discipline or concern it stewards. |\n| Lead or stewards | Named people who facilitate, curate, and follow up. |\n| Cadence | Regular enough to be useful, light enough to avoid ceremony. |\n| Backlog | Visible list of topics, standards, learning needs, and decisions. |\n| Outputs | Where durable artifacts live. |\n| Feedback loop | How teams request advice and report friction. |\n| Review | Periodic check whether the community still creates value. |\n\nThe community should have enough structure to be reliable, but not enough process to become a parallel organisation.\n\n## Anti-Patterns\n\n* **Guild as talking shop.** Interesting conversations happen, but nothing changes in teams or artifacts.\n* **Hidden approval board.** Teams learn they need a guild blessing even though no decision says so.\n* **Standard without owner.** The community publishes a rule but nobody maintains the supporting capability.\n* **Attendance tax.** People attend out of obligation even when the agenda has no relevance.\n* **Craft silo.** Members identify more with the chapter than with the product outcomes their team owns.\n* **One-person community.** A passionate individual carries everything with no succession or ownership.\n\n## Discussion Prompts\n\nUse these prompts when starting or reviewing a community:\n\n* What shared craft problem does this community solve?\n* Which teams benefit from the community's work?\n* What durable outputs did the community produce this quarter?\n* Which recommendations need owners, adoption paths, or automation?\n* Is the community helping teams own work better, or pulling decisions away from them?\n* What should the community stop doing because it creates no leverage?\n\n## Related Records\n\n* [Stream-Aligned Product Teams as the Default Unit](stream-aligned-product-teams.html) - teams remain the primary delivery and ownership unit.\n* [Architecture as Advice and Guardrails](architecture-as-advice-and-guardrails.html) - communities are one source of architecture and practice advice.\n* [Organisation Principle: Capabilities Follow Ownership](../principles/capabilities-follow-ownership.html) - community artifacts used by teams need real ownership.\n* [Backend Guild as a Cross-Team Community of Practice](../foundations/backend-guild.html), [Frontend Guild as a Cross-Team Web Consortium](../foundations/frontend-guild.html), [Mobile Guild as a Cross-Team Mobile Consortium](../foundations/mobile-guild.html), [GenAI Guild as a Cross-Team Generative AI Consortium](../foundations/genai-guild.html) - existing community foundation records.\n* [Markdown Records as the Default Format for Technical Decisions, Strategies, and Discussions](../foundations/markdown-records.html) - durable artifacts should be recorded in markdown.\n\n## Scope and Revisiting\n\nThis ADR applies to engineering communities, chapters, guilds, and similar cross-team practice groups.\n\nRevisit if communities become approval gates, if shared craft fragments despite them, or if career development needs require a more formal chapter model.\n\n## Authoritative References\n\n* Etienne Wenger, Richard McDermott, and William Snyder, *Cultivating Communities of Practice*.\n* Matthew Skelton and Manuel Pais, *Team Topologies*.\n* Atlassian Team Playbook, [Team Health Monitor](https://www.atlassian.com/team-playbook/health-monitor).\n"}]}</script>
<script>
    (function () {
        const data = JSON.parse(document.getElementById('data').textContent);
        const root = document.getElementById('content');

        const postId = (data.meta && data.meta.id) ? String(data.meta.id) : '';
        const postStatusRaw = (data.meta && data.meta.status) ? String(data.meta.status) : '';
        if (postId || postStatusRaw) {
            const header = document.getElementById('post-header');
            let sectionEl = header.querySelector('p.section');
            if (!sectionEl) {
                sectionEl = document.createElement('p');
                sectionEl.className = 'section';
                header.insertBefore(sectionEl, header.firstChild);
            }
            // Status pill goes first, then a " / " separator before the existing
            // content (section name and/or id).
            if (postStatusRaw) {
                const parts = postStatusRaw.split(':');
                const statusName = parts[0].trim();
                const statusColor = (parts[1] || '').trim();
                const wrap = document.createElement('span');
                wrap.className = 'post-status';
                const dot = document.createElement('span');
                dot.className = 'status-dot';
                if (statusColor) dot.style.background = statusColor;
                wrap.appendChild(dot);
                wrap.appendChild(document.createTextNode(statusName));
                if (sectionEl.firstChild) {
                    sectionEl.insertBefore(document.createTextNode(' • '), sectionEl.firstChild);
                    sectionEl.insertBefore(wrap, sectionEl.firstChild);
                } else {
                    sectionEl.appendChild(wrap);
                }
            }
            if (postId) {
                if (sectionEl.firstChild) sectionEl.appendChild(document.createTextNode(' • '));
                sectionEl.appendChild(document.createTextNode(postId));
            }
        }

        const tagsHost = document.getElementById('tags');
        (data.tags || []).forEach(function (t) {
            const span = document.createElement('span');
            span.className = 'tag';
            span.textContent = t;
            tagsHost.appendChild(span);
        });

        // Minimal markdown renderer. Supports: ATX headings, paragraphs, blockquotes,
        // unordered/ordered lists, fenced code, inline code, bold/italic/strikethrough, links, images, hr.
        // Sufficient for the posts in this repo; replace with a fuller parser if needed.
        function renderMarkdown(src) {
            const lines = src.replace(/\r\n/g, '\n').split('\n');
            const out = [];
            let i = 0;

            const bullet = /^(\s*)([-*])\s+(.*)$/;
            const ordered = /^(\s*)(\d+)\.\s+(.*)$/;
            const tableRow = /^\s*\|(.+)\|\s*$/;
            const tableSep = /^\s*\|?\s*:?-{3,}:?\s*(\|\s*:?-{3,}:?\s*)+\|?\s*$/;

            function splitRow(s) {
                let t = s.trim();
                if (t.startsWith('|')) t = t.slice(1);
                if (t.endsWith('|')) t = t.slice(0, -1);
                return t.split('|').map(c => c.trim());
            }

            function inline(s) {
                // Posts are trusted content, so raw HTML passes through unescaped
                // (some posts embed inline <blockquote>, <div>, etc.).
                // Stray ampersands still get fixed up.
                s = s.replace(/&(?![a-zA-Z]+;|#\d+;)/g, '&amp;');
                s = s.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<a class="image-link" href="$2" target="_blank" rel="noopener noreferrer"><img alt="$1" src="$2"></a>');
                s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
                s = s.replace(/`([^`]+)`/g, function (_, c) {
                    return '<code>' + c.replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</code>';
                });
                s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
                s = s.replace(/~~([^~\n]+)~~/g, '<del>$1</del>');
                s = s.replace(/(^|[^*])\*([^*\n]+)\*/g, '$1<em>$2</em>');
                return s;
            }

            while (i < lines.length) {
                const line = lines[i];
                if (!line.trim()) {
                    i++;
                    continue;
                }

                const fence = line.match(/^```(\w*)\s*$/);
                if (fence) {
                    i++;
                    const buf = [];
                    while (i < lines.length && !/^```\s*$/.test(lines[i])) {
                        buf.push(lines[i]);
                        i++;
                    }
                    i++;
                    const escaped = buf.join('\n').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                    const cls = fence[1] ? ' class="lang-' + fence[1] + '"' : '';
                    out.push('<pre><code' + cls + '>' + escaped + '</code></pre>');
                    continue;
                }

                const h = line.match(/^(#{1,6})\s+(.*)$/);
                if (h) {
                    out.push('<h' + h[1].length + '>' + inline(h[2]) + '</h' + h[1].length + '>');
                    i++;
                    continue;
                }

                if (/^\s*(?:-\s*){3,}\s*$/.test(line) || /^\s*\*{3,}\s*$/.test(line)) {
                    out.push('<hr>');
                    i++;
                    continue;
                }

                if (/^>\s?/.test(line)) {
                    const buf = [];
                    while (i < lines.length && /^>\s?/.test(lines[i])) {
                        buf.push(lines[i].replace(/^>\s?/, ''));
                        i++;
                    }
                    out.push('<blockquote>' + renderMarkdown(buf.join('\n')) + '</blockquote>');
                    continue;
                }

                if (tableRow.test(line) && i + 1 < lines.length && tableSep.test(lines[i + 1])) {
                    const headers = splitRow(line);
                    i += 2;
                    const rows = [];
                    while (i < lines.length && tableRow.test(lines[i])) {
                        rows.push(splitRow(lines[i]));
                        i++;
                    }
                    let html = '<table><thead><tr>';
                    headers.forEach(h => {
                        html += '<th>' + inline(h) + '</th>';
                    });
                    html += '</tr></thead><tbody>';
                    rows.forEach(r => {
                        html += '<tr>';
                        r.forEach(c => {
                            html += '<td>' + inline(c) + '</td>';
                        });
                        html += '</tr>';
                    });
                    html += '</tbody></table>';
                    out.push(html);
                    continue;
                }

                if (bullet.test(line) || ordered.test(line)) {
                    // Indent of the first bullet defines this list's base level.
                    // Deeper-indented bullets become nested lists (rendered by
                    // recursing into renderMarkdown). Same-or-less indent at a
                    // bullet starts a sibling item (or ends the list).
                    const firstMatch = line.match(bullet) || line.match(ordered);
                    const baseIndent = firstMatch[1].length;
                    const isOrdered = ordered.test(line);
                    const items = [];
                    while (i < lines.length) {
                        const cur = lines[i];
                        if (!cur.trim()) {
                            // blank line breaks the list (matches CommonMark-ish behaviour)
                            i++;
                            break;
                        }
                        const mBul = cur.match(bullet);
                        const mOrd = cur.match(ordered);
                        const m = mBul || mOrd;
                        if (!m) break;
                        if (m[1].length < baseIndent) break;
                        if (m[1].length > baseIndent) break; // shouldn't happen at top of loop
                        // Same-type check: switching between -/* and 1. closes the list
                        if (isOrdered !== !!mOrd) break;

                        const itemBuf = [m[3]];
                        const nestedBuf = [];
                        i++;
                        while (i < lines.length) {
                            const nxt = lines[i];
                            if (!nxt.trim()) break;
                            const nBul = nxt.match(bullet);
                            const nOrd = nxt.match(ordered);
                            const nm = nBul || nOrd;
                            if (nm) {
                                if (nm[1].length > baseIndent) {
                                    // nested list line — dedent and stash
                                    nestedBuf.push(nxt.slice(baseIndent + 2));
                                    i++;
                                    continue;
                                }
                                // sibling or end of list
                                break;
                            }
                            // Plain continuation text
                            if (nestedBuf.length) {
                                // continuation inside the nested block
                                nestedBuf.push(nxt.slice(baseIndent + 2));
                            } else {
                                itemBuf.push(nxt.trim());
                            }
                            i++;
                        }

                        let liHtml = inline(itemBuf.join('\n'));
                        if (nestedBuf.length) {
                            liHtml += renderMarkdown(nestedBuf.join('\n'));
                        }
                        items.push('<li>' + liHtml + '</li>');
                    }
                    out.push((isOrdered ? '<ol>' : '<ul>') + items.join('') + (isOrdered ? '</ol>' : '</ul>'));
                    continue;
                }

                const buf = [line];
                i++;
                while (i < lines.length && lines[i].trim() && !/^#{1,6}\s/.test(lines[i]) && !/^>\s?/.test(lines[i]) && !bullet.test(lines[i]) && !ordered.test(lines[i]) && !/^```/.test(lines[i]) && !tableRow.test(lines[i])) {
                    buf.push(lines[i]);
                    i++;
                }
                out.push('<p>' + inline(buf.join(' ')) + '</p>');
            }
            return out.join('\n');
        }

        // Block dispatcher. New block types plug in here.
        const renderers = {
            markdown: function (block) {
                const div = document.createElement('div');
                div.innerHTML = renderMarkdown(block.content);
                return div;
            },
            mermaid: function (block) {
                // Mermaid scans elements with class "mermaid" whose textContent
                // is the diagram source. We collect these nodes and run
                // mermaid.run() once after all blocks are in the DOM.
                const div = document.createElement('div');
                div.className = 'mermaid';
                div.textContent = block.content;
                return div;
            },
            'force-graph': function (block) {
                // build.py emits parsed JSON: {nodes:[{id,size}], links:[{source,target}]}.
                // We instantiate force-graph after the container is in the DOM
                // so it can measure its own width.
                const div = document.createElement('div');
                div.className = 'force-graph';
                const data = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.ForceGraph) return;
                    const maxSize = data.nodes.reduce((m, n) => Math.max(m, n.size || 1), 1);
                    window.ForceGraph()(div)
                        .graphData(data)
                        .width(div.clientWidth)
                        .height(div.clientHeight)
                        .nodeRelSize(4)
                        .nodeVal(n => Math.max(20 * (n.size || 1) / maxSize, 0.001))
                        .nodeLabel(n => n.id + ' (' + (n.size || 1) + ')')
                        .nodeColor(() => 'rgba(135, 206, 235, 0.7)')
                        .linkColor(() => 'rgba(60, 60, 60, 0.4)')
                        .linkDirectionalArrowLength(4)
                        .linkDirectionalArrowRelPos(1)
                        .linkWidth(1);
                });
                return div;
            },
            'bubble-chart': function (block) {
                // build.py emits {nodes:[{name,size}]}. Renders a D3 circle-pack
                // SVG (same shape as the obren.io reference, just inline).
                const wrap = document.createElement('div');
                wrap.className = 'bubble-chart';
                const payload = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.d3) return;
                    const diameter = 480;
                    const fill = '#c0deed';
                    const textColor = '#111111';
                    const fontSize = 12;

                    const svg = window.d3.select(wrap).append('svg')
                        .attr('viewBox', '0 0 ' + diameter + ' ' + diameter)
                        .attr('width', diameter)
                        .attr('height', diameter);

                    const root = window.d3.hierarchy({children: payload.nodes})
                        .sum(d => d.size || 0)
                        .sort((a, b) => b.value - a.value);

                    window.d3.pack().size([diameter, diameter]).padding(2)(root);

                    const node = svg.selectAll('g')
                        .data(root.leaves())
                        .enter().append('g')
                        .attr('transform', d => 'translate(' + d.x + ',' + d.y + ')');

                    node.append('title').text(d => d.data.name + ': ' + d.value);
                    node.append('circle').attr('r', d => d.r).style('fill', fill);
                    node.append('text')
                        .attr('dy', '.3em')
                        .style('text-anchor', 'middle')
                        .style('fill', textColor)
                        .style('font-size', fontSize + 'px')
                        .text(d => d.data.name.substring(0, Math.max(0, Math.floor(d.r / 3))));
                });
                return wrap;
            }
        };

        const mermaidNodes = [];
        data.blocks.forEach(function (block) {
            const r = renderers[block.type];
            if (!r) {
                const pre = document.createElement('pre');
                pre.textContent = '[unknown block type: ' + block.type + ']';
                root.appendChild(pre);
                return;
            }
            const node = r(block);
            if (node instanceof Node) {
                root.appendChild(node);
                if (block.type === 'mermaid') mermaidNodes.push(node);
            }
        });

        if (mermaidNodes.length && window.mermaid) {
            window.mermaid.initialize({startOnLoad: false, theme: 'default'});
            window.mermaid.run({nodes: mermaidNodes});
        }
    })();
</script>
</body>
</html>
