<script id="data" type="application/json">{"meta": {"id": "ORG-FOUND-GITHUB-NAMING-TAGGING", "status": "draft:gray", "title": "GitHub Naming and Tagging Conventions for Source Code", "date": "2026-05-19", "author": "Organization Tech Strategy", "permalink": "github-naming-tagging", "timetoread": "12 min", "excerpt": "Organization standardizes GitHub repository names, topics, branch names, commit messages, and release tags so the source-code estate is queryable by humans, automation, AI agents, and audit tooling.", "tags": "github, naming, tagging, source-control, conventions, governance", "icon": "assets/icons/github-naming-tagging.png", "logo": "assets/images/github-naming-tagging/logo.jpeg", "logo_credit": "Image generated by Google Gemini (gemini-3-pro-image-preview)"}, "tags": ["github", "naming", "tagging", "source-control", "conventions", "governance"], "blocks": [{"type": "markdown", "content": "> **Status**: DRAFT\n>\n> **Decision**: Organization standardizes source-code naming and tagging in GitHub. Repository names use `<domain>-<system>-<component>[-<kind>]` in lowercase kebab-case. Repositories carry required flat topics with namespace prefixes. Branches include Jira keys. Commits follow Conventional Commits with Jira traceability. Release tags use SemVer for libraries and date-based release tags for deployable services.\n\n## Decision\n\nAdopt one source-code naming and tagging model for the Organization GitHub organization.\n\n| Area | Standard |\n| --- | --- |\n| Repository name | `<domain>-<system>-<component>[-<kind>]` |\n| Repository topics | Required flat topics such as `domain-listings`, `system-search`, `lifecycle-active`, `tier-1`, `lang-kotlin`. |\n| Branch name | `<type>/<JIRA-KEY>-<short-slug>` |\n| Commit message | Conventional Commits plus Jira key in the footer. |\n| Library release tag | `vMAJOR.MINOR.PATCH` |\n| Service release tag | `release/YYYY.MM.DD[.N]` |\n| CODEOWNERS | Required for production repositories. |\n\nThe standard makes the source estate queryable. A repository should reveal what it belongs to, who owns it, how active it is, what language it uses, and how work connects to Jira.\n\n## How to Read This Decision\n\nThis is a mechanical convention. It should be boring, predictable, and easy to enforce.\n\n| Standardized | Not standardized here |\n| --- | --- |\n| Names, topics, branch shape, commit shape, release tags. | Team branching strategy beyond the branch-name shape. |\n| Required inventory metadata. | Product roadmap or ownership model. |\n| Traceability to Jira. | Jira workflow itself; see [Jira as the Issue Tracker and a Unified Workflow Standard Across Teams](jira-workflow-standards.html). |\n| Repository visibility defaults. | Fine-grained access policy for every team. |\n\n## Repository Names\n\nUse:\n\n```text\n<domain>-<system>-<component>[-<kind>]\n```\n\nExamples:\n\n| Name | Meaning |\n| --- | --- |\n| `listings-search-api` | Search API in the listings domain. |\n| `platform-deployment-runner` | Platform-owned deployment runner. |\n| `finance-billing-contracts` | Billing contracts in the finance domain. |\n| `shared-design-system-web` | Web package for a shared design system. |\n\nRules:\n\n* Use lowercase kebab-case.\n* Use shared domain and system vocabulary.\n* Add `kind` only when it clarifies the artifact: `api`, `worker`, `contracts`, `web`, `mobile`, `infra`, `docs`, `template`.\n* Do not use team names, personal names, temporary project names, vendor names, or jokes as primary segments.\n* Prefer durable capability names over current implementation detail.\n\n## Required Topics\n\nEvery production repository should carry topics from these families:\n\n| Topic family | Example | Purpose |\n| --- | --- | --- |\n| `domain-*` | `domain-listings` | Business or platform domain. |\n| `system-*` | `system-search` | System or product capability. |\n| `component-*` | `component-api` | Component type where useful. |\n| `lifecycle-*` | `lifecycle-active` | Active, deprecated, archived, experimental. |\n| `tier-*` | `tier-1` | Operational criticality. |\n| `lang-*` | `lang-kotlin` | Primary language. |\n| `runtime-*` | `runtime-ecs` | Runtime or deployment substrate. |\n\nTopics are flat because the GitHub API treats them as flat strings. Namespace prefixes preserve meaning.\n\n## Branches and Commits\n\nBranches use:\n\n```text\n<type>/<JIRA-KEY>-<short-slug>\n```\n\nExamples:\n\n```text\nfeature/IW-1234-search-filter\nfix/IW-1888-null-price\nchore/IW-2020-upgrade-gradle\n```\n\nAllowed branch types: `feature`, `fix`, `chore`, `docs`, `refactor`, `test`, `spike`, `release`, `hotfix`.\n\nCommits follow Conventional Commits:\n\n```text\nfeat(search): add price filter\n\nRefs: IW-1234\n```\n\nThe Jira key should be present in the branch name and commit footer unless the change is repository maintenance with no Jira issue.\n\n## Release Tags\n\nUse two release tag families:\n\n| Artifact | Tag |\n| --- | --- |\n| Library or versioned package | `vMAJOR.MINOR.PATCH` |\n| Deployable service | `release/YYYY.MM.DD[.N]` |\n\nDo not move release tags. If a release is wrong, create a new tag and record the correction.\n\n## Repository Metadata\n\nProduction repositories should have:\n\n* description that names the purpose in one sentence;\n* homepage or documentation link when applicable;\n* `CODEOWNERS`;\n* required topics;\n* default branch protection;\n* archived status when no longer active;\n* link to owning system or runbook where relevant.\n\n## Enforcement\n\nEnforce mechanically where possible:\n\n| Layer | Check |\n| --- | --- |\n| Repository creation | Name and required metadata exist. |\n| Pull request | Branch name, commit message, and CODEOWNERS expectations. |\n| Scheduled inventory | Missing topics, stale lifecycle, missing owners. |\n| Release automation | Tag shape and immutability. |\n\nManual exceptions should have an owner, reason, and review date.\n\n## What This Means for Teams\n\n* Pick the domain, system, and component before creating the repository.\n* Keep GitHub names aligned with AWS and package names.\n* Use Jira keys consistently so work is traceable.\n* Keep topics current when ownership, lifecycle, language, or runtime changes.\n* Archive rather than abandon repositories.\n\n## Anti-Patterns\n\n* **Team-name repositories.** Ownership changes, but the name stays misleading.\n* **Project-code names.** Temporary initiative names outlive their context.\n* **Missing topics.** Inventory becomes impossible without cloning or reading every repo.\n* **Moving release tags.** Breaks reproducibility.\n* **Branch names without work context.** Changes cannot be traced to a decision or issue.\n* **Different vocabulary per layer.** GitHub says one system name while AWS and packages say another.\n\n## Scope and Revisiting\n\nThis applies to repositories under the Organization GitHub organization. It does not define the full branching model, access-control model, or CI/CD standard.\n\nRevisit when the domain vocabulary changes, when GitHub adds better structured metadata, or when repeated exceptions show that the naming shape is too narrow.\n\n## Related Records\n\n* [Jira as the Issue Tracker and a Unified Workflow Standard Across Teams](jira-workflow-standards.html) — branch and commit traceability rely on Jira issue keys.\n* [AWS Account and Resource Naming and Tagging Conventions](aws-naming-tagging.html) — AWS names and tags should align with source ownership.\n* [Package Naming Conventions Across JVM, npm, Python, .NET, and OCI](package-naming-conventions.html) — published artifacts should map back to repository identity.\n* [The Curator Role for Records, Principles, and Strategies](curator-role.html) — curators help keep the vocabulary and cross-links coherent.\n\n## Authoritative References\n\n* GitHub repository topics and CODEOWNERS documentation\n* Conventional Commits\n* Semantic Versioning\n\n## Appendix: Vocabulary\n\n| Term | Meaning |\n| --- | --- |\n| **Domain** | Business or platform area. |\n| **System** | Product capability or service family. |\n| **Component** | Deployable, library, contract, template, or documentation unit. |\n| **Kind** | Optional suffix that clarifies repository type. |\n| **Topic** | Flat GitHub metadata label used for inventory and search. |\n| **Lifecycle** | Current state of the repository: active, experimental, deprecated, or archived. |\n"}]}</script>
<script>
    (function () {
        const data = JSON.parse(document.getElementById('data').textContent);
        const root = document.getElementById('content');

        const postId = (data.meta && data.meta.id) ? String(data.meta.id) : '';
        const postStatusRaw = (data.meta && data.meta.status) ? String(data.meta.status) : '';
        if (postId || postStatusRaw) {
            const header = document.getElementById('post-header');
            let sectionEl = header.querySelector('p.section');
            if (!sectionEl) {
                sectionEl = document.createElement('p');
                sectionEl.className = 'section';
                header.insertBefore(sectionEl, header.firstChild);
            }
            // Status pill goes first, then a " / " separator before the existing
            // content (section name and/or id).
            if (postStatusRaw) {
                const parts = postStatusRaw.split(':');
                const statusName = parts[0].trim();
                const statusColor = (parts[1] || '').trim();
                const wrap = document.createElement('span');
                wrap.className = 'post-status';
                const dot = document.createElement('span');
                dot.className = 'status-dot';
                if (statusColor) dot.style.background = statusColor;
                wrap.appendChild(dot);
                wrap.appendChild(document.createTextNode(statusName));
                if (sectionEl.firstChild) {
                    sectionEl.insertBefore(document.createTextNode(' • '), sectionEl.firstChild);
                    sectionEl.insertBefore(wrap, sectionEl.firstChild);
                } else {
                    sectionEl.appendChild(wrap);
                }
            }
            if (postId) {
                if (sectionEl.firstChild) sectionEl.appendChild(document.createTextNode(' • '));
                sectionEl.appendChild(document.createTextNode(postId));
            }
        }

        const tagsHost = document.getElementById('tags');
        (data.tags || []).forEach(function (t) {
            const span = document.createElement('span');
            span.className = 'tag';
            span.textContent = t;
            tagsHost.appendChild(span);
        });

        // Minimal markdown renderer. Supports: ATX headings, paragraphs, blockquotes,
        // unordered/ordered lists, fenced code, inline code, bold/italic/strikethrough, links, images, hr.
        // Sufficient for the posts in this repo; replace with a fuller parser if needed.
        function renderMarkdown(src) {
            const lines = src.replace(/\r\n/g, '\n').split('\n');
            const out = [];
            let i = 0;

            const bullet = /^(\s*)([-*])\s+(.*)$/;
            const ordered = /^(\s*)(\d+)\.\s+(.*)$/;
            const tableRow = /^\s*\|(.+)\|\s*$/;
            const tableSep = /^\s*\|?\s*:?-{3,}:?\s*(\|\s*:?-{3,}:?\s*)+\|?\s*$/;

            function splitRow(s) {
                let t = s.trim();
                if (t.startsWith('|')) t = t.slice(1);
                if (t.endsWith('|')) t = t.slice(0, -1);
                return t.split('|').map(c => c.trim());
            }

            function inline(s) {
                // Posts are trusted content, so raw HTML passes through unescaped
                // (some posts embed inline <blockquote>, <div>, etc.).
                // Stray ampersands still get fixed up.
                s = s.replace(/&(?![a-zA-Z]+;|#\d+;)/g, '&amp;');
                s = s.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<a class="image-link" href="$2" target="_blank" rel="noopener noreferrer"><img alt="$1" src="$2"></a>');
                s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
                s = s.replace(/`([^`]+)`/g, function (_, c) {
                    return '<code>' + c.replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</code>';
                });
                s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
                s = s.replace(/~~([^~\n]+)~~/g, '<del>$1</del>');
                s = s.replace(/(^|[^*])\*([^*\n]+)\*/g, '$1<em>$2</em>');
                return s;
            }

            while (i < lines.length) {
                const line = lines[i];
                if (!line.trim()) {
                    i++;
                    continue;
                }

                const fence = line.match(/^```(\w*)\s*$/);
                if (fence) {
                    i++;
                    const buf = [];
                    while (i < lines.length && !/^```\s*$/.test(lines[i])) {
                        buf.push(lines[i]);
                        i++;
                    }
                    i++;
                    const escaped = buf.join('\n').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                    const cls = fence[1] ? ' class="lang-' + fence[1] + '"' : '';
                    out.push('<pre><code' + cls + '>' + escaped + '</code></pre>');
                    continue;
                }

                const h = line.match(/^(#{1,6})\s+(.*)$/);
                if (h) {
                    out.push('<h' + h[1].length + '>' + inline(h[2]) + '</h' + h[1].length + '>');
                    i++;
                    continue;
                }

                if (/^\s*(?:-\s*){3,}\s*$/.test(line) || /^\s*\*{3,}\s*$/.test(line)) {
                    out.push('<hr>');
                    i++;
                    continue;
                }

                if (/^>\s?/.test(line)) {
                    const buf = [];
                    while (i < lines.length && /^>\s?/.test(lines[i])) {
                        buf.push(lines[i].replace(/^>\s?/, ''));
                        i++;
                    }
                    out.push('<blockquote>' + renderMarkdown(buf.join('\n')) + '</blockquote>');
                    continue;
                }

                if (tableRow.test(line) && i + 1 < lines.length && tableSep.test(lines[i + 1])) {
                    const headers = splitRow(line);
                    i += 2;
                    const rows = [];
                    while (i < lines.length && tableRow.test(lines[i])) {
                        rows.push(splitRow(lines[i]));
                        i++;
                    }
                    let html = '<table><thead><tr>';
                    headers.forEach(h => {
                        html += '<th>' + inline(h) + '</th>';
                    });
                    html += '</tr></thead><tbody>';
                    rows.forEach(r => {
                        html += '<tr>';
                        r.forEach(c => {
                            html += '<td>' + inline(c) + '</td>';
                        });
                        html += '</tr>';
                    });
                    html += '</tbody></table>';
                    out.push(html);
                    continue;
                }

                if (bullet.test(line) || ordered.test(line)) {
                    // Indent of the first bullet defines this list's base level.
                    // Deeper-indented bullets become nested lists (rendered by
                    // recursing into renderMarkdown). Same-or-less indent at a
                    // bullet starts a sibling item (or ends the list).
                    const firstMatch = line.match(bullet) || line.match(ordered);
                    const baseIndent = firstMatch[1].length;
                    const isOrdered = ordered.test(line);
                    const items = [];
                    while (i < lines.length) {
                        const cur = lines[i];
                        if (!cur.trim()) {
                            // blank line breaks the list (matches CommonMark-ish behaviour)
                            i++;
                            break;
                        }
                        const mBul = cur.match(bullet);
                        const mOrd = cur.match(ordered);
                        const m = mBul || mOrd;
                        if (!m) break;
                        if (m[1].length < baseIndent) break;
                        if (m[1].length > baseIndent) break; // shouldn't happen at top of loop
                        // Same-type check: switching between -/* and 1. closes the list
                        if (isOrdered !== !!mOrd) break;

                        const itemBuf = [m[3]];
                        const nestedBuf = [];
                        i++;
                        while (i < lines.length) {
                            const nxt = lines[i];
                            if (!nxt.trim()) break;
                            const nBul = nxt.match(bullet);
                            const nOrd = nxt.match(ordered);
                            const nm = nBul || nOrd;
                            if (nm) {
                                if (nm[1].length > baseIndent) {
                                    // nested list line — dedent and stash
                                    nestedBuf.push(nxt.slice(baseIndent + 2));
                                    i++;
                                    continue;
                                }
                                // sibling or end of list
                                break;
                            }
                            // Plain continuation text
                            if (nestedBuf.length) {
                                // continuation inside the nested block
                                nestedBuf.push(nxt.slice(baseIndent + 2));
                            } else {
                                itemBuf.push(nxt.trim());
                            }
                            i++;
                        }

                        let liHtml = inline(itemBuf.join('\n'));
                        if (nestedBuf.length) {
                            liHtml += renderMarkdown(nestedBuf.join('\n'));
                        }
                        items.push('<li>' + liHtml + '</li>');
                    }
                    out.push((isOrdered ? '<ol>' : '<ul>') + items.join('') + (isOrdered ? '</ol>' : '</ul>'));
                    continue;
                }

                const buf = [line];
                i++;
                while (i < lines.length && lines[i].trim() && !/^#{1,6}\s/.test(lines[i]) && !/^>\s?/.test(lines[i]) && !bullet.test(lines[i]) && !ordered.test(lines[i]) && !/^```/.test(lines[i]) && !tableRow.test(lines[i])) {
                    buf.push(lines[i]);
                    i++;
                }
                out.push('<p>' + inline(buf.join(' ')) + '</p>');
            }
            return out.join('\n');
        }

        // Block dispatcher. New block types plug in here.
        const renderers = {
            markdown: function (block) {
                const div = document.createElement('div');
                div.innerHTML = renderMarkdown(block.content);
                return div;
            },
            mermaid: function (block) {
                // Mermaid scans elements with class "mermaid" whose textContent
                // is the diagram source. We collect these nodes and run
                // mermaid.run() once after all blocks are in the DOM.
                const div = document.createElement('div');
                div.className = 'mermaid';
                div.textContent = block.content;
                return div;
            },
            'force-graph': function (block) {
                // build.py emits parsed JSON: {nodes:[{id,size}], links:[{source,target}]}.
                // We instantiate force-graph after the container is in the DOM
                // so it can measure its own width.
                const div = document.createElement('div');
                div.className = 'force-graph';
                const data = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.ForceGraph) return;
                    const maxSize = data.nodes.reduce((m, n) => Math.max(m, n.size || 1), 1);
                    window.ForceGraph()(div)
                        .graphData(data)
                        .width(div.clientWidth)
                        .height(div.clientHeight)
                        .nodeRelSize(4)
                        .nodeVal(n => Math.max(20 * (n.size || 1) / maxSize, 0.001))
                        .nodeLabel(n => n.id + ' (' + (n.size || 1) + ')')
                        .nodeColor(() => 'rgba(135, 206, 235, 0.7)')
                        .linkColor(() => 'rgba(60, 60, 60, 0.4)')
                        .linkDirectionalArrowLength(4)
                        .linkDirectionalArrowRelPos(1)
                        .linkWidth(1);
                });
                return div;
            },
            'bubble-chart': function (block) {
                // build.py emits {nodes:[{name,size}]}. Renders a D3 circle-pack
                // SVG (same shape as the obren.io reference, just inline).
                const wrap = document.createElement('div');
                wrap.className = 'bubble-chart';
                const payload = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.d3) return;
                    const diameter = 480;
                    const fill = '#c0deed';
                    const textColor = '#111111';
                    const fontSize = 12;

                    const svg = window.d3.select(wrap).append('svg')
                        .attr('viewBox', '0 0 ' + diameter + ' ' + diameter)
                        .attr('width', diameter)
                        .attr('height', diameter);

                    const root = window.d3.hierarchy({children: payload.nodes})
                        .sum(d => d.size || 0)
                        .sort((a, b) => b.value - a.value);

                    window.d3.pack().size([diameter, diameter]).padding(2)(root);

                    const node = svg.selectAll('g')
                        .data(root.leaves())
                        .enter().append('g')
                        .attr('transform', d => 'translate(' + d.x + ',' + d.y + ')');

                    node.append('title').text(d => d.data.name + ': ' + d.value);
                    node.append('circle').attr('r', d => d.r).style('fill', fill);
                    node.append('text')
                        .attr('dy', '.3em')
                        .style('text-anchor', 'middle')
                        .style('fill', textColor)
                        .style('font-size', fontSize + 'px')
                        .text(d => d.data.name.substring(0, Math.max(0, Math.floor(d.r / 3))));
                });
                return wrap;
            }
        };

        const mermaidNodes = [];
        data.blocks.forEach(function (block) {
            const r = renderers[block.type];
            if (!r) {
                const pre = document.createElement('pre');
                pre.textContent = '[unknown block type: ' + block.type + ']';
                root.appendChild(pre);
                return;
            }
            const node = r(block);
            if (node instanceof Node) {
                root.appendChild(node);
                if (block.type === 'mermaid') mermaidNodes.push(node);
            }
        });

        if (mermaidNodes.length && window.mermaid) {
            window.mermaid.initialize({startOnLoad: false, theme: 'default'});
            window.mermaid.run({nodes: mermaidNodes});
        }
    })();
</script>
</body>
</html>
