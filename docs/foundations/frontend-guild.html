<script id="data" type="application/json">{"meta": {"id": "ORG-FOUND-FRONTEND-GUILD", "status": "draft:gray", "title": "Frontend Guild as a Cross-Team Web Consortium", "date": "2026-05-17", "author": "Organization Tech Strategy", "permalink": "frontend-guild", "timetoread": "14 min", "excerpt": "Organization will form a Frontend Guild as a standing community of practice for web frontend engineers across teams, brands, and domains. The guild is the organisation-wide web consortium that enables and empowers teams around standards to ensure the long-term growth of the web ecosystem. It focuses on web frontend challenges first and uses them as an entry point to end-to-end concerns (backend, infrastructure, ...) where it makes sense. The guild is advisory and contributory: bi-weekly knowledge sharing, experimentation-first documentation, transparent recorded sessions, working groups, and coordinated external visibility. Mobile frontend is explicitly out of scope; a separate Mobile Guild handles it. The guild is provisioned with a dedicated Slack channel, source code repositories, and an AWS account (or a dedicated space in an existing account).", "tags": "foundations, guild, frontend, web, community-of-practice, design-system, micro-frontends", "icon": "assets/icons/frontend-guild.png", "logo": "assets/images/frontend-guild/logo.jpeg", "logo_credit": "Image generated by Google Gemini (gemini-3-pro-image-preview)"}, "tags": ["foundations", "guild", "frontend", "web", "community-of-practice", "design-system", "micro-frontends"], "blocks": [{"type": "markdown", "content": "> **Status**: DRAFT\n>\n> **Decision**: Organization will form a **Frontend Guild** as a standing community of practice for **web frontend** engineers across teams, brands, and domains. The guild is the organisation-wide web consortium that enables and empowers teams around standards to ensure the long-term growth of the web ecosystem. It focuses on web frontend challenges first and uses them as an entry point to end-to-end concerns (backend, infrastructure, ...) where it makes sense. The guild is **advisory and contributory**, not a governance body: it runs bi-weekly knowledge sharing, experimentation-first work in its own GitHub area, transparent recorded sessions, working groups, and coordinated external visibility. **Mobile frontend is explicitly out of scope**; a separate Mobile Guild handles it. The guild is provisioned with a dedicated Slack channel, source code repositories, and an AWS account (or a dedicated space in an existing account).\n\n## Decision\n\nEstablish a **Frontend Guild** at Organization as a cross-team community of practice for **web** frontend work. Concretely:\n\n* **Purpose**: act as the organisation-wide web consortium that enables and empowers teams around standards; resolve the open questions that no single team can settle alone (design system, web architecture, micro-frontends, white-label integration, frontend/backend communication, state management, package delivery).\n* **Scope**: **web frontend**. Mobile frontend (iOS, Android, mobile web shells where they materially diverge from desktop web) is out of scope; a separate Mobile Guild owns it. Where a topic genuinely spans both, the guilds coordinate explicitly rather than absorbing each other's scope.\n* **Composition**: open to every Aviver, temporarily or permanently. A small core organising group keeps the cadence honest and the agenda alive.\n* **Mandate**: bi-weekly knowledge sharing; guild sessions at Architecture Summits and Talks; experimentation-first work documented in the guild's GitHub area; transparent, recorded sessions; coaching; ad-hoc working groups; feedback to the architecture group and Chief Architect; the right to propose new recommendations and decisions; coordinated external visibility.\n* **Resources**: a dedicated Slack channel, source code repositories under a guild-owned area, and an AWS account (or a dedicated space inside an existing account) for shared experiments, reference implementations, and golden-path code.\n\nThis foundation **does not** create a decision-making board, **does not** transfer ownership of team-owned frontend systems to the guild, and **does not** make guild participation a prerequisite for contributing to frontend work at Organization.\n\n## How to Read This Decision\n\nSeveral ideas in this record are easy to confuse with traditional centralised teams. The distinctions matter:\n\n| Idea | What it means here | What it does **not** mean |\n| --- | --- | --- |\n| **Guild** | A standing community of practice for web frontend engineers. | A team that owns delivery. |\n| **Web consortium** | A cross-team forum for shared web standards and practice. | A standards body that mandates compliance. |\n| **Standards** | Opinionated, well-supported defaults teams adopt by choice. | A binding policy that bans alternatives. |\n| **Mandate** | A clear set of activities the guild is empowered to run. | Authority to approve or block other teams' decisions. |\n| **Experimentation-first** | Concrete prototypes and reference implementations in the guild's GitHub area. | Production ownership of those experiments. |\n| **Feedback to architecture** | A standing practitioner channel to the architecture group and Chief Architect. | A veto over architecture decisions. |\n\nIf you have worked in organisations where a frontend guild gradually became a closed standards body or a shadow architecture board, the Frontend Guild is deliberately different. It is a learning and coordination structure, not a governance structure. The [Backend Guild as a Cross-Team Community of Practice](backend-guild.html) is shaped on the same principles.\n\n## One-Minute Mental Model\n\nThink of the Frontend Guild as the **standing community where web frontend engineers meet, build, and shape practice across teams**:\n\n1. Teams keep ownership of their web frontends.\n2. The guild proposes and refines the standards, reference implementations, and golden paths the teams can adopt.\n3. The guild's bi-weekly sessions surface lessons learned across the organisation and are recorded for the rest of the company.\n4. The guild proposes recommendations and decisions; the architecture group and the [Architecture Advisory Forum as a Standing Advice Ritual](architecture-advisory-forum.html) handle the actual decision flow.\n5. The guild grows experts and gives them a coordinated platform to represent Organization externally.\n\nThe guild is succeeding when web frontend engineers across brands feel they belong to one community and when shared standards and reference implementations are visibly maintained and trusted. It is failing when it becomes a closed club, a parallel decision body, or quietly absorbs mobile concerns it is not set up to handle.\n\n## Purpose (Why)\n\nA lot of open questions in Organization's web frontend work cannot be answered well by a single team. The Frontend Guild exists to give those questions a community and a place to work. The standing topics:\n\n* **Design system** - shared visual and interaction language, component libraries, and adoption paths across brands.\n* **Business domains and web architecture implications** - how the domain shape of the company is reflected in the web layer, including ownership boundaries.\n* **Micro-frontend architecture** - patterns, tradeoffs, runtime composition, build-time composition, and shared infrastructure.\n* **White-label integration strategy and channels** - how the same product surfaces are delivered across brands, partners, and channels without forking.\n* **Communication between frontend interfaces and backend services** - API shapes, BFFs, gateways, contract testing, and the boundary with the [Backend Guild as a Cross-Team Community of Practice](backend-guild.html).\n* **State management** - shared and team-local patterns for managing UI state, server state, and cross-app state.\n* **Artifacts delivery (package management)** - how shared frontend artifacts are versioned, published, and consumed across teams.\n\nThe guild **focuses on web frontend challenges first and uses them as an entry point to solve end-to-end challenges (backend, infrastructure, ...) where it makes sense**. The guild does not pretend to be a backend or infra guild; it surfaces end-to-end concerns and partners with the relevant guilds.\n\nThese topics are not exhaustive. The criterion for adding a topic is whether it is a *web frontend* concern that benefits from being worked on across teams rather than within a single team.\n\n## Mandate (How)\n\nThe guild operates through two complementary streams of work.\n\n### Internal knowledge sharing\n\n* **Bi-weekly sharing of lessons learned** - a recurring, predictable session where teams bring incidents, patterns, postmortems, and successes for the guild to discuss.\n* **Architecture Summits and Talks** - the guild organises and runs guild-specific sessions during Organization's Architecture Summits and at relevant Talks.\n* **Experimentation-first** - the guild's GitHub area is the primary working surface. Topics are explored through concrete prototypes, reference implementations, and shareable artifacts that teams can pick up directly.\n* **Transparency** - all sessions are documented and recorded by default. The recordings and notes are accessible to the rest of the organisation, not just the attendees.\n* **Connections and trust** - the guild deliberately builds connections and trust across the organisation around its main competency, so practitioners know who to ask and feel safe doing so.\n* **Coaching and mutual help** - members coach each other, review designs, and pair on hard problems.\n* **Connection with CoEs** - the guild maintains an explicit relationship with relevant Centres of Excellence so that CoE work and guild work reinforce rather than duplicate each other.\n* **Synergies with other architecture guilds** - the guild coordinates with adjacent guilds (distributed systems design, security, data, [Backend Guild as a Cross-Team Community of Practice](backend-guild.html), the future Mobile Guild) on topics that cross boundaries.\n* **Ad-hoc working groups** - the guild may spin up short, focused working groups on shared topics (e.g., a design-system migration, a micro-frontend runtime upgrade, a new state-management pattern).\n* **Feedback to architecture and Chief Architect** - the guild provides a standing practitioner channel on architecture recommendations and decisions.\n* **Influence on strategic decisions** - the guild has a recognised seat in shaping key strategic tech decisions that affect web frontend.\n* **Proactive proposals** - the guild does not only react; it proactively proposes new recommendations and decisions where it sees a need. It is **impact-driven**.\n\n### Coordinated thought leadership\n\n* **Growing experts** - the guild grows world-class experts in specialised web domains by giving them a community, peers, and time to deepen.\n* **Local events** - the guild coordinates organising local events (meetups, workshops, internal conferences) on web frontend topics.\n* **External visibility** - public blogging, external conference talks, and open-source contributions are promoted and coordinated through the guild so Organization presents a coherent voice externally.\n\nDetailed internal ways of working - meeting cadence templates, working-group lifecycle, summit session contracts, external-talk approval flow - live in the guild's own working document (linked from the resources section below) and are owned by the guild itself.\n\n## Composition (Who)\n\n**Everyone is welcome to join the guild community, temporarily or permanently.** Web frontend engineers across all teams, brands, and domains are the primary audience, but the door is genuinely open: designers, product engineers working on the web boundary, platform engineers, and anyone whose work touches the web layer can participate.\n\nA small core organising group, led from or with the architecture group, keeps the cadence honest and the agenda alive. The core group is named, rotates, and is replaceable; it is not a closed steering committee.\n\nThe breadth of contributors is itself a leading indicator. A guild dominated by one brand, one team, or one framework is not yet succeeding.\n\n## Studies (What)\n\nThe guild aims to be **impact-driven** and prioritises its topics based on the needs of actor teams. Standing artefacts the guild maintains:\n\n| Artefact | Purpose |\n| --- | --- |\n| **[FG] Studies** | Time-boxed investigations of a topic the guild has chosen to look into. Output is a shareable write-up plus, where useful, a working prototype. |\n| **[FG] Meeting minutes** | Lightweight record of bi-weekly sessions, decisions taken, follow-ups owned. Sessions are also recorded. |\n| **[FG] ADRs** | The guild's own ADRs, recording decisions about its scope, recommended standards, and reference implementations. |\n| **[FG] Resources** | Curated links, references, and reusable materials that the guild stands behind. |\n| **[FG] Experiments** | Concrete prototypes and reference implementations in the guild's GitHub area, kept distinct from production-owned code. |\n\nThe `[FG]` prefix is a deliberate signal: it marks artefacts as guild outputs, distinct from team-owned records. Guild ADRs that recommend an organisation-wide direction still flow through the [Architecture Advisory Forum as a Standing Advice Ritual](architecture-advisory-forum.html) and the relevant decision logs; the guild does not bypass the standard decision path.\n\n## Resources\n\nThe guild is provisioned with a small set of shared resources:\n\n* **Slack channel** - a dedicated channel as the always-on front door. Membership is open. The channel is where questions, RFCs, study drafts, and event announcements live.\n* **GitHub repositories** - guild-owned source code repositories for design-system contributions, reference implementations, shared SDKs, working-group experiments, and the experimentation-first artifacts the guild produces. Each repository has a named maintainer from the core organising group.\n* **AWS account (or dedicated space)** - the guild has a dedicated AWS account, or a clearly carved-out space within an existing account, for shared experiments, reference deployments, and CDN / hosting trials. Cost ownership and access boundaries are explicit; the account is not a back door to production environments.\n\nThese resources exist to **support shared work**, not to host production systems owned by individual teams. If something built by the guild graduates into a production system, ownership transfers to a team and the guild artefact becomes a reference.\n\n## Relationship with Mobile\n\nThe Frontend Guild is **web-focused**. A separate Mobile Guild owns the equivalent space for iOS, Android, and mobile-specific web shells.\n\nThe split is deliberate:\n\n* The technology stacks, release cycles, and tooling diverge enough that one guild for both would dilute both communities.\n* Mobile frontend has its own deep questions (store releases, native UI, offline, device APIs) that are out of scope for a web consortium.\n* A web-only frame keeps the design-system, micro-frontend, and white-label conversations sharp.\n\nThe guilds coordinate, not compete:\n\n* Topics that genuinely span both (design tokens, brand consistency, shared API contracts, identity flows) are jointly worked rather than absorbed by one guild.\n* Both guilds share the same shape (purpose / mandate / composition / studies / resources) so cross-guild participation is low-friction.\n* The architecture group acts as the coordination point when scope is genuinely contested.\n\nIf the boundary turns out to be wrong - for example, mobile web becomes a dominant frontend channel that no longer fits either guild well - the foundations for both guilds should be revisited together.\n\n## What This Means for Teams\n\nFor web frontend engineers:\n\n* The guild is the place to bring web frontend questions that are bigger than one team. Use the Slack channel as the front door.\n* Lessons learned, incidents, and successful patterns are welcome at the bi-weekly session - the more concrete, the more useful for everyone else.\n* Adopting a recommended standard or reference implementation is a default, not a mandate. If a team needs to deviate, the guild is the right place to surface why; deviations often reveal a gap in the standard itself.\n\nFor team leads:\n\n* Encourage at least one delegate per web-heavy team to attend bi-weekly sessions.\n* Bring upcoming non-trivial web frontend decisions to the guild early enough for advice to change the outcome - much like the [Architecture Advisory Forum as a Standing Advice Ritual](architecture-advisory-forum.html) for cross-cutting decisions.\n* Surface incidents and postmortems with web-frontend lessons so the rest of the community learns from them.\n\nFor the architecture group and Chief Architect:\n\n* Treat the guild as the standing practitioner voice on web frontend topics.\n* Route relevant web frontend recommendations and decisions through the guild for feedback before finalising.\n* Resist the temptation to convert the guild into a steering committee; its value is in practice and in shared artefacts, not in approvals.\n\nFor new joiners:\n\n* The guild is one of the fastest places to absorb how Organization does web frontend work. Joining the Slack channel, watching a recorded session, and attending one bi-weekly is a low-cost, high-signal onboarding step.\n\n## Anti-Patterns\n\nThe guild can quietly drift into something less useful. Watch for these patterns:\n\n* **The guild becomes an approval board.** Teams stop deciding on frontend topics until the guild \"agrees\". Decision ownership has leaked from the teams to the guild.\n* **Closed membership.** The bi-weekly becomes a small invite-only circle. The community narrows. The breadth that justifies the guild disappears.\n* **Framework monoculture.** The guild only discusses one framework or one brand's stack. Recommendations stop being credible for the rest of the organisation.\n* **Scope creep into mobile.** The guild starts running mobile sessions because the Mobile Guild is quieter, hollowing both communities instead of fixing the real issue in mobile.\n* **Standards without owners.** A recommended standard exists in a repository, but no one is named to maintain it. It rots and teams stop trusting it.\n* **External visibility without internal substance.** Conference talks proliferate; internal sharing and reference-implementation work do not. The guild becomes a personal-brand vehicle.\n* **Meeting theatre.** Bi-weekly sessions run on time and produce no learning, decisions, or follow-ups. Attendance drops; cadence collapses.\n* **Shadow architecture body.** The guild begins to make decisions that should flow through the [Architecture Advisory Forum as a Standing Advice Ritual](architecture-advisory-forum.html) or the relevant decision log, bypassing the standard advice and record flow.\n* **Production by accident.** Something built in the guild's AWS account becomes load-bearing for a real product without an explicit ownership transfer.\n* **Recordings nobody watches, notes nobody reads.** Transparency becomes ceremony. The artefacts exist but are not curated, indexed, or signposted.\n\nMost failure modes share one shape: the guild slowly becomes either a closed club, a parallel governance body, or a scope-creeping super-guild. Resisting all three drifts is the lead's most important job.\n\n## Success Indicators\n\nThe Frontend Guild is succeeding when:\n\n* Web frontend engineers across brands say they feel part of one community.\n* Recommended standards and reference implementations are maintained, named, and trusted; deviations are visible and discussed.\n* Bi-weekly sessions are attended by a wide range of teams, recordings and notes are actually consumed, and contributions come from beyond the same five voices.\n* The guild's feedback is visibly reflected in architecture recommendations and decisions.\n* New joiners onboard faster on web frontend topics because the guild is a known front door.\n* External talks and posts are coordinated, on-message, and connected to internal work.\n* Ad-hoc working groups form, deliver, and dissolve cleanly when their topic is exhausted.\n* Coordination with the Mobile Guild and other architecture guilds is visible on cross-cutting topics.\n\nThe guild is **not** succeeding when:\n\n* The same small group dominates every session.\n* Standards are stale, unowned, or quietly ignored by most teams.\n* Teams route frontend decisions through the guild as if it were an approval gate.\n* The guild becomes a venue for status reporting rather than practice.\n* External visibility outpaces internal learning.\n* Mobile topics keep showing up because the Mobile Guild is not working - a sign to fix the Mobile Guild, not absorb its scope.\n\n## Scope and Revisiting\n\nThis decision applies to **Organization's web frontend practice across teams and brands**. It establishes a single Frontend Guild at the engineering-wide level. It does not preclude:\n\n* Team-level frontend rituals.\n* Domain-specific working groups inside the guild's umbrella.\n* Brand-specific design-system extensions, coordinated through the guild.\n* Other guilds for other competencies (mobile, backend, data, platform), which should follow the same shape but live in their own foundations.\n\nOut of scope:\n\n* Mobile frontend (handled by a separate Mobile Guild).\n* Ownership of team-owned web systems.\n* Approval of team-level architecture decisions.\n* Replacement of the [Architecture Advisory Forum as a Standing Advice Ritual](architecture-advisory-forum.html) for cross-team architecture advice.\n* Personnel decisions and performance management of guild members.\n\nThis decision should be revisited if:\n\n* Attendance breadth or contribution rate degrades over a sustained period.\n* The guild starts acting as an approval gate, or teams start routing decisions to it as if it were one.\n* Recommended standards fall out of date with no clear path to refresh them.\n* The web/mobile boundary becomes a recurring source of confusion - revisit the Frontend and Mobile Guild foundations together.\n* The organisation grows or splits in ways that make a single web guild the wrong shape (for example, a brand-specific guild becomes a better fit).\n* Other guilds form and the inter-guild coordination model needs to be made explicit.\n\nA regular review of the guild itself - perhaps once a quarter alongside the [Architecture Advisory Forum as a Standing Advice Ritual](architecture-advisory-forum.html) retrospective - is healthy. The guild should be willing to advise on changes to its own format.\n\n## Related Records\n\n* [Backend Guild as a Cross-Team Community of Practice](backend-guild.html) - the equivalent community of practice for backend and distributed systems; shares the same shape and resources model.\n* [Architecture Advisory Forum as a Standing Advice Ritual](architecture-advisory-forum.html) - the cross-team architecture advice ritual the guild plugs into for decisions with organisation-wide impact.\n* [Markdown Records as the Default Format for Technical Decisions, Strategies, and Discussions](markdown-records.html) - the format the guild's ADRs, studies, and meeting minutes follow.\n* [AI-Mediated Authoring as the Default Way to Edit This Repository](ai-mediated-authoring.html) - the authoring workflow used for guild records and write-ups.\n* [The Curator Role for Records, Principles, and Strategies](curator-role.html) - editorial stewardship of the corpus the guild contributes to.\n"}]}</script>

                const statusColor = (parts[1] || '').trim();
                const wrap = document.createElement('span');
                wrap.className = 'post-status';
                const dot = document.createElement('span');
                dot.className = 'status-dot';
                if (statusColor) dot.style.background = statusColor;
                wrap.appendChild(dot);
                wrap.appendChild(document.createTextNode(statusName));
                if (sectionEl.firstChild) {
                    sectionEl.insertBefore(document.createTextNode(' • '), sectionEl.firstChild);
                    sectionEl.insertBefore(wrap, sectionEl.firstChild);
                } else {
                    sectionEl.appendChild(wrap);
                }
            }
            if (postId) {
                if (sectionEl.firstChild) sectionEl.appendChild(document.createTextNode(' • '));
                sectionEl.appendChild(document.createTextNode(postId));
            }
        }

        const tagsHost = document.getElementById('tags');
        (data.tags || []).forEach(function (t) {
            const span = document.createElement('span');
            span.className = 'tag';
            span.textContent = t;
            tagsHost.appendChild(span);
        });

        // Minimal markdown renderer. Supports: ATX headings, paragraphs, blockquotes,
        // unordered/ordered lists, fenced code, inline code, bold/italic/strikethrough, links, images, hr.
        // Sufficient for the posts in this repo; replace with a fuller parser if needed.
        function renderMarkdown(src) {
            const lines = src.replace(/\r\n/g, '\n').split('\n');
            const out = [];
            let i = 0;

            const bullet = /^(\s*)([-*])\s+(.*)$/;
            const ordered = /^(\s*)(\d+)\.\s+(.*)$/;
            const tableRow = /^\s*\|(.+)\|\s*$/;
            const tableSep = /^\s*\|?\s*:?-{3,}:?\s*(\|\s*:?-{3,}:?\s*)+\|?\s*$/;

            function splitRow(s) {
                let t = s.trim();
                if (t.startsWith('|')) t = t.slice(1);
                if (t.endsWith('|')) t = t.slice(0, -1);
                return t.split('|').map(c => c.trim());
            }

            function inline(s) {
                // Posts are trusted content, so raw HTML passes through unescaped
                // (some posts embed inline <blockquote>, <div>, etc.).
                // Stray ampersands still get fixed up.
                s = s.replace(/&(?![a-zA-Z]+;|#\d+;)/g, '&amp;');
                s = s.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<a class="image-link" href="$2" target="_blank" rel="noopener noreferrer"><img alt="$1" src="$2"></a>');
                s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
                s = s.replace(/`([^`]+)`/g, function (_, c) {
                    return '<code>' + c.replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</code>';
                });
                s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
                s = s.replace(/~~([^~\n]+)~~/g, '<del>$1</del>');
                s = s.replace(/(^|[^*])\*([^*\n]+)\*/g, '$1<em>$2</em>');
                return s;
            }

            while (i < lines.length) {
                const line = lines[i];
                if (!line.trim()) {
                    i++;
                    continue;
                }

                const fence = line.match(/^```(\w*)\s*$/);
                if (fence) {
                    i++;
                    const buf = [];
                    while (i < lines.length && !/^```\s*$/.test(lines[i])) {
                        buf.push(lines[i]);
                        i++;
                    }
                    i++;
                    const escaped = buf.join('\n').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                    const cls = fence[1] ? ' class="lang-' + fence[1] + '"' : '';
                    out.push('<pre><code' + cls + '>' + escaped + '</code></pre>');
                    continue;
                }

                const h = line.match(/^(#{1,6})\s+(.*)$/);
                if (h) {
                    out.push('<h' + h[1].length + '>' + inline(h[2]) + '</h' + h[1].length + '>');
                    i++;
                    continue;
                }

                if (/^\s*(?:-\s*){3,}\s*$/.test(line) || /^\s*\*{3,}\s*$/.test(line)) {
                    out.push('<hr>');
                    i++;
                    continue;
                }

                if (/^>\s?/.test(line)) {
                    const buf = [];
                    while (i < lines.length && /^>\s?/.test(lines[i])) {
                        buf.push(lines[i].replace(/^>\s?/, ''));
                        i++;
                    }
                    out.push('<blockquote>' + renderMarkdown(buf.join('\n')) + '</blockquote>');
                    continue;
                }

                if (tableRow.test(line) && i + 1 < lines.length && tableSep.test(lines[i + 1])) {
                    const headers = splitRow(line);
                    i += 2;
                    const rows = [];
                    while (i < lines.length && tableRow.test(lines[i])) {
                        rows.push(splitRow(lines[i]));
                        i++;
                    }
                    let html = '<table><thead><tr>';
                    headers.forEach(h => {
                        html += '<th>' + inline(h) + '</th>';
                    });
                    html += '</tr></thead><tbody>';
                    rows.forEach(r => {
                        html += '<tr>';
                        r.forEach(c => {
                            html += '<td>' + inline(c) + '</td>';
                        });
                        html += '</tr>';
                    });
                    html += '</tbody></table>';
                    out.push(html);
                    continue;
                }

                if (bullet.test(line) || ordered.test(line)) {
                    // Indent of the first bullet defines this list's base level.
                    // Deeper-indented bullets become nested lists (rendered by
                    // recursing into renderMarkdown). Same-or-less indent at a
                    // bullet starts a sibling item (or ends the list).
                    const firstMatch = line.match(bullet) || line.match(ordered);
                    const baseIndent = firstMatch[1].length;
                    const isOrdered = ordered.test(line);
                    const items = [];
                    while (i < lines.length) {
                        const cur = lines[i];
                        if (!cur.trim()) {
                            // blank line breaks the list (matches CommonMark-ish behaviour)
                            i++;
                            break;
                        }
                        const mBul = cur.match(bullet);
                        const mOrd = cur.match(ordered);
                        const m = mBul || mOrd;
                        if (!m) break;
                        if (m[1].length < baseIndent) break;
                        if (m[1].length > baseIndent) break; // shouldn't happen at top of loop
                        // Same-type check: switching between -/* and 1. closes the list
                        if (isOrdered !== !!mOrd) break;

                        const itemBuf = [m[3]];
                        const nestedBuf = [];
                        i++;
                        while (i < lines.length) {
                            const nxt = lines[i];
                            if (!nxt.trim()) break;
                            const nBul = nxt.match(bullet);
                            const nOrd = nxt.match(ordered);
                            const nm = nBul || nOrd;
                            if (nm) {
                                if (nm[1].length > baseIndent) {
                                    // nested list line — dedent and stash
                                    nestedBuf.push(nxt.slice(baseIndent + 2));
                                    i++;
                                    continue;
                                }
                                // sibling or end of list
                                break;
                            }
                            // Plain continuation text
                            if (nestedBuf.length) {
                                // continuation inside the nested block
                                nestedBuf.push(nxt.slice(baseIndent + 2));
                            } else {
                                itemBuf.push(nxt.trim());
                            }
                            i++;
                        }

                        let liHtml = inline(itemBuf.join('\n'));
                        if (nestedBuf.length) {
                            liHtml += renderMarkdown(nestedBuf.join('\n'));
                        }
                        items.push('<li>' + liHtml + '</li>');
                    }
                    out.push((isOrdered ? '<ol>' : '<ul>') + items.join('') + (isOrdered ? '</ol>' : '</ul>'));
                    continue;
                }

                const buf = [line];
                i++;
                while (i < lines.length && lines[i].trim() && !/^#{1,6}\s/.test(lines[i]) && !/^>\s?/.test(lines[i]) && !bullet.test(lines[i]) && !ordered.test(lines[i]) && !/^```/.test(lines[i]) && !tableRow.test(lines[i])) {
                    buf.push(lines[i]);
                    i++;
                }
                out.push('<p>' + inline(buf.join(' ')) + '</p>');
            }
            return out.join('\n');
        }

        // Block dispatcher. New block types plug in here.
        const renderers = {
            markdown: function (block) {
                const div = document.createElement('div');
                div.innerHTML = renderMarkdown(block.content);
                return div;
            },
            mermaid: function (block) {
                // Mermaid scans elements with class "mermaid" whose textContent
                // is the diagram source. We collect these nodes and run
                // mermaid.run() once after all blocks are in the DOM.
                const div = document.createElement('div');
                div.className = 'mermaid';
                div.textContent = block.content;
                return div;
            },
            'force-graph': function (block) {
                // build.py emits parsed JSON: {nodes:[{id,size}], links:[{source,target}]}.
                // We instantiate force-graph after the container is in the DOM
                // so it can measure its own width.
                const div = document.createElement('div');
                div.className = 'force-graph';
                const data = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.ForceGraph) return;
                    const maxSize = data.nodes.reduce((m, n) => Math.max(m, n.size || 1), 1);
                    window.ForceGraph()(div)
                        .graphData(data)
                        .width(div.clientWidth)
                        .height(div.clientHeight)
                        .nodeRelSize(4)
                        .nodeVal(n => Math.max(20 * (n.size || 1) / maxSize, 0.001))
                        .nodeLabel(n => n.id + ' (' + (n.size || 1) + ')')
                        .nodeColor(() => 'rgba(135, 206, 235, 0.7)')
                        .linkColor(() => 'rgba(60, 60, 60, 0.4)')
                        .linkDirectionalArrowLength(4)
                        .linkDirectionalArrowRelPos(1)
                        .linkWidth(1);
                });
                return div;
            },
            'bubble-chart': function (block) {
                // build.py emits {nodes:[{name,size}]}. Renders a D3 circle-pack
                // SVG (same shape as the obren.io reference, just inline).
                const wrap = document.createElement('div');
                wrap.className = 'bubble-chart';
                const payload = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.d3) return;
                    const diameter = 480;
                    const fill = '#c0deed';
                    const textColor = '#111111';
                    const fontSize = 12;

                    const svg = window.d3.select(wrap).append('svg')
                        .attr('viewBox', '0 0 ' + diameter + ' ' + diameter)
                        .attr('width', diameter)
                        .attr('height', diameter);

                    const root = window.d3.hierarchy({children: payload.nodes})
                        .sum(d => d.size || 0)
                        .sort((a, b) => b.value - a.value);

                    window.d3.pack().size([diameter, diameter]).padding(2)(root);

                    const node = svg.selectAll('g')
                        .data(root.leaves())
                        .enter().append('g')
                        .attr('transform', d => 'translate(' + d.x + ',' + d.y + ')');

                    node.append('title').text(d => d.data.name + ': ' + d.value);
                    node.append('circle').attr('r', d => d.r).style('fill', fill);
                    node.append('text')
                        .attr('dy', '.3em')
                        .style('text-anchor', 'middle')
                        .style('fill', textColor)
                        .style('font-size', fontSize + 'px')
                        .text(d => d.data.name.substring(0, Math.max(0, Math.floor(d.r / 3))));
                });
                return wrap;
            }
        };

        const mermaidNodes = [];
        data.blocks.forEach(function (block) {
            const r = renderers[block.type];
            if (!r) {
                const pre = document.createElement('pre');
                pre.textContent = '[unknown block type: ' + block.type + ']';
                root.appendChild(pre);
                return;
            }
            const node = r(block);
            if (node instanceof Node) {
                root.appendChild(node);
                if (block.type === 'mermaid') mermaidNodes.push(node);
            }
        });

        if (mermaidNodes.length && window.mermaid) {
            window.mermaid.initialize({startOnLoad: false, theme: 'default'});
            window.mermaid.run({nodes: mermaidNodes});
        }
    })();
</script>
</body>
</html>
