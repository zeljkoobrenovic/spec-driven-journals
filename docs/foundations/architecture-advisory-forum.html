<script id="data" type="application/json">{"meta": {"id": "ORG-FOUND-ARCHITECTURE-ADVISORY-FORUM", "status": "draft:gray", "title": "Architecture Advisory Forum as a Standing Advice Ritual", "date": "2026-05-16", "author": "Organization Tech Strategy", "permalink": "architecture-advisory-forum", "timetoread": "13 min", "excerpt": "Organization will run a weekly Architecture Advisory Forum as the standing place for cross-team architecture advice. The forum does not approve or own decisions. It helps teams expose options early, improve ADRs, revisit decisions with evidence, and learn from shared engineering signals.", "tags": "architecture, advice-process, governance, decision-making, learning-organisation, adr", "logo": "assets/images/architecture-advisory-forum/logo.jpeg", "logo_credit": "Inspired by Andrew Harmel-Law, 'Scaling the Practice of Architecture, Conversationally'", "icon": "assets/icons/architecture-advisory-forum.png"}, "tags": ["architecture", "advice-process", "governance", "decision-making", "learning-organisation", "adr"], "blocks": [{"type": "markdown", "content": "> **Status**: DRAFT\n>\n> **Decision**: Organization will run a weekly Architecture Advisory Forum (AAF) as the standing ritual for cross-team architecture advice. The AAF is not an Architecture Review Board. It does not approve, reject, or own decisions. Decisions remain with the accountable team or individual. The forum creates a reliable place to test options early, improve decision records, revisit decisions with evidence, and build shared architecture judgment.\n\n## Decision\n\nAdopt a weekly **Architecture Advisory Forum** for architecture advice and organisational learning.\n\n| Element | Decision |\n| --- | --- |\n| Cadence | Weekly, one hour, at a stable time. |\n| Authority | Advisory, not approval-based. |\n| Decision ownership | Stays with the team or person making the decision. |\n| Inputs | Spikes, proposed ADRs, revisits, risks, metrics, and cross-team constraints. |\n| Outputs | Advice, recorded concerns, follow-up questions, links, and clearer decision records. |\n| Default behaviour | Discuss in public unless confidentiality, security, legal, or people concerns require a smaller setting. |\n\nThe forum exists because architecture decisions are better when teams can ask for advice before they are locked in.\n\n## How to Read This Decision\n\nThe AAF changes the venue for advice, not the ownership of decisions.\n\n| It is | It is not |\n| --- | --- |\n| A recurring advice ritual. | An approval board. |\n| A place to expose trade-offs early. | A late-stage gate. |\n| A way to teach architecture reasoning in public. | A substitute for team accountability. |\n| A way to improve ADRs and principles. | A place for status reporting. |\n| A learning loop across teams. | A central architecture command channel. |\n\nIf a team leaves the forum with sharper options, clearer risk language, and better evidence, the forum worked even when no one agreed on a single answer.\n\n## Operating Model\n\nThe AAF has five recurring modes:\n\n| Mode | Purpose | Typical output |\n| --- | --- | --- |\n| **Spike preview** | Test a question before a team spends time investigating. | Better spike framing and likely evidence sources. |\n| **Proposed decision** | Improve an ADR before it becomes accepted. | Concrete advice and recorded trade-offs. |\n| **Decision revisit** | Check whether an accepted decision still holds. | Keep, amend, supersede, or schedule evidence collection. |\n| **Shared signals** | Read metrics, incidents, cost, reliability, or delivery data in context. | Learning themes and possible record updates. |\n| **Exception review** | Discuss justified divergence from a standard. | Documented exception or path back to the standard. |\n\nThe forum should prefer fewer topics with better discussion over a full agenda with shallow handling.\n\n## Advice Process\n\nThe AAF follows the Advice Process:\n\n1. The decision maker frames the decision, options, and constraints.\n2. People affected by the decision give advice.\n3. People with relevant expertise give advice.\n4. The decision maker records the advice and decides.\n5. The decision record links back to the discussion when appropriate.\n\nAdvice is not consensus. A team may choose an option after hearing objections, but the record should show that the objections were heard and why the chosen trade-off still makes sense.\n\n## What Good Advice Sounds Like\n\nGood advice is specific, evidence-seeking, and owned:\n\n| Weak advice | Better advice |\n| --- | --- |\n| \"This feels risky.\" | \"The risk is operational ownership: who will page on this after launch?\" |\n| \"Use the standard.\" | \"The standard applies unless you can show latency or data-residency constraints that break it.\" |\n| \"We tried this before.\" | \"In 2024 this failed because ownership was split; here is the incident link.\" |\n| \"I disagree.\" | \"I would choose option B because it keeps rollback independent from the migration.\" |\n\nThe most useful advice names the constraint, the evidence, and the consequence.\n\n## Standing Agenda\n\nA simple agenda is enough:\n\n1. **New questions**: spikes or decisions that need early advice.\n2. **Decision records**: proposed ADRs, exceptions, or important revisions.\n3. **Revisits**: decisions with new evidence, incidents, cost shifts, or repeated exceptions.\n4. **Shared signals**: metrics or patterns that imply a standards or principle update.\n5. **Actions**: owners, record updates, and next discussion dates.\n\nThe agenda should stay lightweight. Detailed facilitation scripts, templates, and training material belong in a playbook, not in this decision.\n\n## Roles\n\n| Role | Responsibility |\n| --- | --- |\n| **Decision maker** | Brings the question, owns the final decision, updates the record. |\n| **Facilitator** | Keeps the conversation on advice, options, evidence, and next actions. |\n| **Recorder** | Captures advice, concerns, links, and follow-up items. |\n| **Advisers** | Offer expertise or affected-party perspective without taking over ownership. |\n| **Curators** | Improve the resulting records without changing the decision meaning. |\n\nParticipants should come prepared to help the decision maker think, not to win the room.\n\n## Records and Follow-Up\n\nEvery material topic should leave a trace:\n\n* a linked ADR, foundation, principle, strategy, or discussion record;\n* a short summary of advice received;\n* named follow-up owners when evidence is missing;\n* clear status when a decision is accepted, proposed, superseded, or abandoned.\n\nThe forum does not replace durable writing. It improves it.\n\n## What This Means for Teams\n\n* Bring decisions early, while options are still real.\n* Bring evidence, not only preference.\n* Use the forum for cross-team impact, standards exceptions, and decisions likely to be copied.\n* Do not wait for forum approval to make ordinary team-local decisions.\n* Update the record after the conversation; otherwise the learning disappears.\n\n## Anti-Patterns\n\n* **Approval theatre.** Teams present finished decisions and wait for a stamp.\n* **Architecture veto.** Senior people use the forum to take ownership away from teams.\n* **Status meeting drift.** The agenda becomes progress reporting instead of decision advice.\n* **Private architecture.** Important trade-offs happen in side channels and the forum only sees the result.\n* **Advice without records.** Good discussion disappears because no ADR or follow-up captures it.\n* **Metric blame.** Shared signals are used to rank teams rather than understand system constraints.\n\n## Success Indicators\n\nThe AAF is working when:\n\n* teams bring questions before they are locked in;\n* ADRs mention real alternatives, trade-offs, and advice received;\n* repeated exceptions trigger principle or standard updates;\n* cross-team dependencies become visible earlier;\n* decisions are revisited with evidence instead of opinion;\n* teams still feel accountable for their own decisions.\n\n## Scope and Revisiting\n\nThis decision applies to architecture-relevant choices with cross-team impact, standards implications, meaningful risk, or durable learning value.\n\nOut of scope:\n\n* routine code-level design decisions owned by a team;\n* people-management decisions;\n* incident command during active incidents;\n* confidential security, legal, vendor, or HR matters that need a smaller setting.\n\nRevisit the forum design after two quarters, or earlier if it becomes an approval gate, loses attendance from affected teams, or stops producing useful record updates.\n\n## Related Records\n\n* [Markdown Records as the Default Format for Technical Decisions, Strategies, and Discussions](markdown-records.html) — the durable format for decisions discussed in the forum.\n* [The Curator Role for Records, Principles, and Strategies](curator-role.html) — the editorial role that keeps records coherent after discussions.\n* [Organisation Principle: Decisions Stay with Teams](../principles/decisions-stay-with-teams.html) — the principle that decision ownership remains with teams.\n* [Practice Principle: Advice in Public](../principles/advice-in-public.html) — the principle behind visible advice and record-linked discussion.\n\n## Authoritative References\n\n* Andrew Harmel-Law, *Scaling the Practice of Architecture, Conversationally*\n* Team Topologies writing on enabling teams and interaction modes\n* Advice Process writing from consent-based and decentralized decision-making traditions\n\n## Appendix: Vocabulary\n\n| Term | Meaning |\n| --- | --- |\n| **AAF** | Architecture Advisory Forum, the weekly advice ritual. |\n| **Advice Process** | A decision maker seeks advice from affected people and experts before deciding. |\n| **Decision maker** | The accountable person or team that owns the final decision. |\n| **Adviser** | A participant who contributes expertise or affected-party perspective. |\n| **Revisit** | A structured check of an earlier decision against new evidence. |\n| **Exception** | A documented, justified divergence from an accepted standard or principle. |\n"}]}</script>

    (function () {
        const data = JSON.parse(document.getElementById('data').textContent);
        const root = document.getElementById('content');

        const postId = (data.meta && data.meta.id) ? String(data.meta.id) : '';
        const postStatusRaw = (data.meta && data.meta.status) ? String(data.meta.status) : '';
        if (postId || postStatusRaw) {
            const header = document.getElementById('post-header');
            let sectionEl = header.querySelector('p.section');
            if (!sectionEl) {
                sectionEl = document.createElement('p');
                sectionEl.className = 'section';
                header.insertBefore(sectionEl, header.firstChild);
            }
            // Status pill goes first, then a " / " separator before the existing
            // content (section name and/or id).
            if (postStatusRaw) {
                const parts = postStatusRaw.split(':');
                const statusName = parts[0].trim();
                const statusColor = (parts[1] || '').trim();
                const wrap = document.createElement('span');
                wrap.className = 'post-status';
                const dot = document.createElement('span');
                dot.className = 'status-dot';
                if (statusColor) dot.style.background = statusColor;
                wrap.appendChild(dot);
                wrap.appendChild(document.createTextNode(statusName));
                if (sectionEl.firstChild) {
                    sectionEl.insertBefore(document.createTextNode(' • '), sectionEl.firstChild);
                    sectionEl.insertBefore(wrap, sectionEl.firstChild);
                } else {
                    sectionEl.appendChild(wrap);
                }
            }
            if (postId) {
                if (sectionEl.firstChild) sectionEl.appendChild(document.createTextNode(' • '));
                sectionEl.appendChild(document.createTextNode(postId));
            }
        }

        const tagsHost = document.getElementById('tags');
        (data.tags || []).forEach(function (t) {
            const span = document.createElement('span');
            span.className = 'tag';
            span.textContent = t;
            tagsHost.appendChild(span);
        });

        // Minimal markdown renderer. Supports: ATX headings, paragraphs, blockquotes,
        // unordered/ordered lists, fenced code, inline code, bold/italic/strikethrough, links, images, hr.
        // Sufficient for the posts in this repo; replace with a fuller parser if needed.
        function renderMarkdown(src) {
            const lines = src.replace(/\r\n/g, '\n').split('\n');
            const out = [];
            let i = 0;

            const bullet = /^(\s*)([-*])\s+(.*)$/;
            const ordered = /^(\s*)(\d+)\.\s+(.*)$/;
            const tableRow = /^\s*\|(.+)\|\s*$/;
            const tableSep = /^\s*\|?\s*:?-{3,}:?\s*(\|\s*:?-{3,}:?\s*)+\|?\s*$/;

            function splitRow(s) {
                let t = s.trim();
                if (t.startsWith('|')) t = t.slice(1);
                if (t.endsWith('|')) t = t.slice(0, -1);
                return t.split('|').map(c => c.trim());
            }

            function inline(s) {
                // Posts are trusted content, so raw HTML passes through unescaped
                // (some posts embed inline <blockquote>, <div>, etc.).
                // Stray ampersands still get fixed up.
                s = s.replace(/&(?![a-zA-Z]+;|#\d+;)/g, '&amp;');
                s = s.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img alt="$1" src="$2">');
                s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
                s = s.replace(/`([^`]+)`/g, function (_, c) {
                    return '<code>' + c.replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</code>';
                });
                s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
                s = s.replace(/~~([^~\n]+)~~/g, '<del>$1</del>');
                s = s.replace(/(^|[^*])\*([^*\n]+)\*/g, '$1<em>$2</em>');
                return s;
            }

            while (i < lines.length) {
                const line = lines[i];
                if (!line.trim()) {
                    i++;
                    continue;
                }

                const fence = line.match(/^```(\w*)\s*$/);
                if (fence) {
                    i++;
                    const buf = [];
                    while (i < lines.length && !/^```\s*$/.test(lines[i])) {
                        buf.push(lines[i]);
                        i++;
                    }
                    i++;
                    const escaped = buf.join('\n').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                    const cls = fence[1] ? ' class="lang-' + fence[1] + '"' : '';
                    out.push('<pre><code' + cls + '>' + escaped + '</code></pre>');
                    continue;
                }

                const h = line.match(/^(#{1,6})\s+(.*)$/);
                if (h) {
                    out.push('<h' + h[1].length + '>' + inline(h[2]) + '</h' + h[1].length + '>');
                    i++;
                    continue;
                }

                if (/^\s*(?:-\s*){3,}\s*$/.test(line) || /^\s*\*{3,}\s*$/.test(line)) {
                    out.push('<hr>');
                    i++;
                    continue;
                }

                if (/^>\s?/.test(line)) {
                    const buf = [];
                    while (i < lines.length && /^>\s?/.test(lines[i])) {
                        buf.push(lines[i].replace(/^>\s?/, ''));
                        i++;
                    }
                    out.push('<blockquote>' + renderMarkdown(buf.join('\n')) + '</blockquote>');
                    continue;
                }

                if (tableRow.test(line) && i + 1 < lines.length && tableSep.test(lines[i + 1])) {
                    const headers = splitRow(line);
                    i += 2;
                    const rows = [];
                    while (i < lines.length && tableRow.test(lines[i])) {
                        rows.push(splitRow(lines[i]));
                        i++;
                    }
                    let html = '<table><thead><tr>';
                    headers.forEach(h => {
                        html += '<th>' + inline(h) + '</th>';
                    });
                    html += '</tr></thead><tbody>';
                    rows.forEach(r => {
                        html += '<tr>';
                        r.forEach(c => {
                            html += '<td>' + inline(c) + '</td>';
                        });
                        html += '</tr>';
                    });
                    html += '</tbody></table>';
                    out.push(html);
                    continue;
                }

                if (bullet.test(line) || ordered.test(line)) {
                    // Indent of the first bullet defines this list's base level.
                    // Deeper-indented bullets become nested lists (rendered by
                    // recursing into renderMarkdown). Same-or-less indent at a
                    // bullet starts a sibling item (or ends the list).
                    const firstMatch = line.match(bullet) || line.match(ordered);
                    const baseIndent = firstMatch[1].length;
                    const isOrdered = ordered.test(line);
                    const items = [];
                    while (i < lines.length) {
                        const cur = lines[i];
                        if (!cur.trim()) {
                            // blank line breaks the list (matches CommonMark-ish behaviour)
                            i++;
                            break;
                        }
                        const mBul = cur.match(bullet);
                        const mOrd = cur.match(ordered);
                        const m = mBul || mOrd;
                        if (!m) break;
                        if (m[1].length < baseIndent) break;
                        if (m[1].length > baseIndent) break; // shouldn't happen at top of loop
                        // Same-type check: switching between -/* and 1. closes the list
                        if (isOrdered !== !!mOrd) break;

                        const itemBuf = [m[3]];
                        const nestedBuf = [];
                        i++;
                        while (i < lines.length) {
                            const nxt = lines[i];
                            if (!nxt.trim()) break;
                            const nBul = nxt.match(bullet);
                            const nOrd = nxt.match(ordered);
                            const nm = nBul || nOrd;
                            if (nm) {
                                if (nm[1].length > baseIndent) {
                                    // nested list line — dedent and stash
                                    nestedBuf.push(nxt.slice(baseIndent + 2));
                                    i++;
                                    continue;
                                }
                                // sibling or end of list
                                break;
                            }
                            // Plain continuation text
                            if (nestedBuf.length) {
                                // continuation inside the nested block
                                nestedBuf.push(nxt.slice(baseIndent + 2));
                            } else {
                                itemBuf.push(nxt.trim());
                            }
                            i++;
                        }

                        let liHtml = inline(itemBuf.join('\n'));
                        if (nestedBuf.length) {
                            liHtml += renderMarkdown(nestedBuf.join('\n'));
                        }
                        items.push('<li>' + liHtml + '</li>');
                    }
                    out.push((isOrdered ? '<ol>' : '<ul>') + items.join('') + (isOrdered ? '</ol>' : '</ul>'));
                    continue;
                }

                const buf = [line];
                i++;
                while (i < lines.length && lines[i].trim() && !/^#{1,6}\s/.test(lines[i]) && !/^>\s?/.test(lines[i]) && !bullet.test(lines[i]) && !ordered.test(lines[i]) && !/^```/.test(lines[i]) && !tableRow.test(lines[i])) {
                    buf.push(lines[i]);
                    i++;
                }
                out.push('<p>' + inline(buf.join(' ')) + '</p>');
            }
            return out.join('\n');
        }

        // Block dispatcher. New block types plug in here.
        const renderers = {
            markdown: function (block) {
                const div = document.createElement('div');
                div.innerHTML = renderMarkdown(block.content);
                return div;
            },
            mermaid: function (block) {
                // Mermaid scans elements with class "mermaid" whose textContent
                // is the diagram source. We collect these nodes and run
                // mermaid.run() once after all blocks are in the DOM.
                const div = document.createElement('div');
                div.className = 'mermaid';
                div.textContent = block.content;
                return div;
            },
            'force-graph': function (block) {
                // build.py emits parsed JSON: {nodes:[{id,size}], links:[{source,target}]}.
                // We instantiate force-graph after the container is in the DOM
                // so it can measure its own width.
                const div = document.createElement('div');
                div.className = 'force-graph';
                const data = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.ForceGraph) return;
                    const maxSize = data.nodes.reduce((m, n) => Math.max(m, n.size || 1), 1);
                    window.ForceGraph()(div)
                        .graphData(data)
                        .width(div.clientWidth)
                        .height(div.clientHeight)
                        .nodeRelSize(4)
                        .nodeVal(n => Math.max(20 * (n.size || 1) / maxSize, 0.001))
                        .nodeLabel(n => n.id + ' (' + (n.size || 1) + ')')
                        .nodeColor(() => 'rgba(135, 206, 235, 0.7)')
                        .linkColor(() => 'rgba(60, 60, 60, 0.4)')
                        .linkDirectionalArrowLength(4)
                        .linkDirectionalArrowRelPos(1)
                        .linkWidth(1);
                });
                return div;
            },
            'bubble-chart': function (block) {
                // build.py emits {nodes:[{name,size}]}. Renders a D3 circle-pack
                // SVG (same shape as the obren.io reference, just inline).
                const wrap = document.createElement('div');
                wrap.className = 'bubble-chart';
                const payload = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.d3) return;
                    const diameter = 480;
                    const fill = '#c0deed';
                    const textColor = '#111111';
                    const fontSize = 12;

                    const svg = window.d3.select(wrap).append('svg')
                        .attr('viewBox', '0 0 ' + diameter + ' ' + diameter)
                        .attr('width', diameter)
                        .attr('height', diameter);

                    const root = window.d3.hierarchy({children: payload.nodes})
                        .sum(d => d.size || 0)
                        .sort((a, b) => b.value - a.value);

                    window.d3.pack().size([diameter, diameter]).padding(2)(root);

                    const node = svg.selectAll('g')
                        .data(root.leaves())
                        .enter().append('g')
                        .attr('transform', d => 'translate(' + d.x + ',' + d.y + ')');

                    node.append('title').text(d => d.data.name + ': ' + d.value);
                    node.append('circle').attr('r', d => d.r).style('fill', fill);
                    node.append('text')
                        .attr('dy', '.3em')
                        .style('text-anchor', 'middle')
                        .style('fill', textColor)
                        .style('font-size', fontSize + 'px')
                        .text(d => d.data.name.substring(0, Math.max(0, Math.floor(d.r / 3))));
                });
                return wrap;
            }
        };

        const mermaidNodes = [];
        data.blocks.forEach(function (block) {
            const r = renderers[block.type];
            if (!r) {
                const pre = document.createElement('pre');
                pre.textContent = '[unknown block type: ' + block.type + ']';
                root.appendChild(pre);
                return;
            }
            const node = r(block);
            if (node instanceof Node) {
                root.appendChild(node);
                if (block.type === 'mermaid') mermaidNodes.push(node);
            }
        });

        if (mermaidNodes.length && window.mermaid) {
            window.mermaid.initialize({startOnLoad: false, theme: 'default'});
            window.mermaid.run({nodes: mermaidNodes});
        }
    })();
</script>
</body>
</html>
