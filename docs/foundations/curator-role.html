<script id="data" type="application/json">{"meta": {"id": "ORG-FOUND-CURATOR-ROLE", "status": "draft:gray", "title": "The Curator Role for Records, Principles, and Strategies", "date": "2026-05-17", "author": "Organization Tech Strategy", "permalink": "curator-role", "timetoread": "12 min", "excerpt": "Organization names a Curator role for the engineering record corpus. Curators have editorial authority over structure, metadata, links, lifecycle, and clarity, but they do not own the underlying decisions. Meaning changes still go back to decision owners and the Architecture Advisory Forum.", "tags": "foundations, governance, curator, editorial, adr, architecture", "icon": "assets/icons/curator-role.png", "logo": "assets/images/curator-role/logo.jpeg", "logo_credit": "Image generated by Google Gemini (gemini-3-pro-image-preview)"}, "tags": ["foundations", "governance", "curator", "editorial", "adr", "architecture"], "blocks": [{"type": "markdown", "content": "> **Status**: DRAFT\n>\n> **Decision**: Organization will establish a Curator role for the engineering record corpus. Curators have editorial authority over record shape, metadata, cross-links, lifecycle, and prose clarity. They do not own the decisions. When an edit would change meaning, the change goes back to the decision owner and, when cross-team impact exists, through the Architecture Advisory Forum.\n\n## Decision\n\nCreate a small **Curator** function for records, principles, strategies, and foundations.\n\n| Area | Curator authority |\n| --- | --- |\n| Structure | Normalize section order, headings, and appendices. |\n| Metadata | Keep `id`, `status`, `permalink`, `tags`, and excerpts coherent. |\n| Links | Add, repair, and improve cross-record links. |\n| Lifecycle | Mark records as proposed, accepted, superseded, deprecated, or archived according to evidence. |\n| Prose | Rewrite for clarity without changing meaning. |\n| Corpus shape | Recommend splits, merges, or new records when the corpus becomes hard to navigate. |\n\nCurators steward the corpus. They do not become the owners of every decision in it.\n\n## Why This Role Exists\n\nAs the record set grows, unmanaged entropy appears:\n\n* similar decisions use different language;\n* old records keep looking current;\n* cross-links are missing or stale;\n* long posts hide their actual decision;\n* metadata becomes inconsistent;\n* AI agents receive conflicting context.\n\nCurators prevent this without centralizing decision authority.\n\n## Boundary\n\n| Curators may do | Curators may not do alone |\n| --- | --- |\n| Improve headings, order, summaries, and excerpts. | Change the substance of a decision. |\n| Move glossary material to appendices. | Accept, reject, or override a team-owned decision. |\n| Add missing related-record links. | Invent a new standard without advice. |\n| Fix stale status labels when evidence is clear. | Deprecate a living standard without owner review. |\n| Propose splits or merges. | Hide disagreement or remove important trade-offs. |\n\nThe boundary test is simple: **would the accountable owner say the decision now means something different?** If yes, it is not a curation-only change.\n\n## Workflow\n\n1. Identify a curation need: unclear structure, stale status, duplicate record, missing links, or confusing prose.\n2. Check the record's owner, status, related records, and spec.\n3. Make editorial changes through the normal AI-mediated workflow.\n4. Preserve `id` and `permalink` unless an explicit migration is approved.\n5. Build and review generated pages.\n6. Ask the owner or Architecture Advisory Forum for advice when meaning may change.\n\nCurators should leave enough trace in the spec or changelog for future readers to understand why a record moved.\n\n## Quality Bar\n\nA curated record should:\n\n* state its decision or principle early;\n* separate decision content from reference material;\n* keep vocabulary and templates in appendices;\n* link related records instead of repeating them;\n* expose consequences and anti-patterns;\n* have stable metadata;\n* have generated docs that build cleanly.\n\n## What This Means for Teams\n\n* Teams still own their decisions.\n* Teams should expect curators to improve structure and clarity.\n* Teams should respond when curators flag ambiguity, stale status, or conflicting guidance.\n* Teams should use `[[slug]]` links and stable metadata so curation remains easy.\n* Teams should not treat prose polish as an ownership challenge.\n\n## Examples\n\n| Situation | Curator action |\n| --- | --- |\n| A post starts with a long vocabulary section. | Move vocabulary to an appendix and keep the decision path clear. |\n| Two records say similar things with different terms. | Add cross-links and propose consolidation if needed. |\n| A proposed decision has clearly been adopted in practice. | Ask the owner whether status should move to accepted. |\n| A rewrite would change the technical recommendation. | Stop and route the change to the owner or AAF. |\n\n## Anti-Patterns\n\n* **Shadow architecture board.** Curators use editorial authority to override teams.\n* **Cosmetic-only curation.** Prose gets prettier while stale decisions remain stale.\n* **Metadata churn.** IDs, permalinks, and statuses change without migration thinking.\n* **Silent meaning change.** A curator rewrites a decision so it reads as a different choice.\n* **Corpus neglect.** Everyone can publish, but nobody maintains the body of records.\n\n## Scope and Revisiting\n\nThis role applies to durable engineering records in this repository. It does not apply to private people material, active incident command, or team-local runbooks that are not part of the durable corpus.\n\nRevisit the role if curation becomes a bottleneck, if curators start acting as approvers, or if the corpus grows enough to need explicit journal ownership.\n\n## Related Records\n\n* [Markdown Records as the Default Format for Technical Decisions, Strategies, and Discussions](markdown-records.html) — the canonical format curators maintain.\n* [Spec-Driven Authoring as a Lightweight Default for Posts](spec-driven-authoring.html) — the authoring contract curators use when changing posts.\n* [Architecture Advisory Forum as a Standing Advice Ritual](architecture-advisory-forum.html) — where meaning-changing proposals receive advice.\n* [Organisation Principle: Decisions Stay with Teams](../principles/decisions-stay-with-teams.html) — the principle that keeps decision ownership with teams.\n\n## Authoritative References\n\n* ADR stewardship and architecture knowledge-management practice\n* Diátaxis documentation structure\n* Wardley and Team Topologies writing on shared language and operating models\n\n## Appendix: Vocabulary\n\n| Term | Meaning |\n| --- | --- |\n| **Curator** | A person with editorial authority over the record corpus. |\n| **Decision owner** | The person or team accountable for the substance of a decision. |\n| **Corpus** | The connected body of records across journals. |\n| **Curation** | Improving shape, clarity, metadata, links, and lifecycle without changing meaning. |\n| **Meaning change** | An edit that changes what the record asks teams to believe or do. |\n"}]}</script>
<script>
    (function () {
        const data = JSON.parse(document.getElementById('data').textContent);
        const root = document.getElementById('content');

        const postId = (data.meta && data.meta.id) ? String(data.meta.id) : '';
        const postStatusRaw = (data.meta && data.meta.status) ? String(data.meta.status) : '';
        if (postId || postStatusRaw) {
            const header = document.getElementById('post-header');
            let sectionEl = header.querySelector('p.section');
            if (!sectionEl) {
                sectionEl = document.createElement('p');
                sectionEl.className = 'section';
                header.insertBefore(sectionEl, header.firstChild);
            }
            // Status pill goes first, then a " / " separator before the existing
            // content (section name and/or id).
            if (postStatusRaw) {
                const parts = postStatusRaw.split(':');
                const statusName = parts[0].trim();
                const statusColor = (parts[1] || '').trim();
                const wrap = document.createElement('span');
                wrap.className = 'post-status';
                const dot = document.createElement('span');
                dot.className = 'status-dot';
                if (statusColor) dot.style.background = statusColor;
                wrap.appendChild(dot);
                wrap.appendChild(document.createTextNode(statusName));
                if (sectionEl.firstChild) {
                    sectionEl.insertBefore(document.createTextNode(' • '), sectionEl.firstChild);
                    sectionEl.insertBefore(wrap, sectionEl.firstChild);
                } else {
                    sectionEl.appendChild(wrap);
                }
            }
            if (postId) {
                if (sectionEl.firstChild) sectionEl.appendChild(document.createTextNode(' • '));
                sectionEl.appendChild(document.createTextNode(postId));
            }
        }

        const tagsHost = document.getElementById('tags');
        (data.tags || []).forEach(function (t) {
            const span = document.createElement('span');
            span.className = 'tag';
            span.textContent = t;
            tagsHost.appendChild(span);
        });

        // Minimal markdown renderer. Supports: ATX headings, paragraphs, blockquotes,
        // unordered/ordered lists, fenced code, inline code, bold/italic/strikethrough, links, images, hr.
        // Sufficient for the posts in this repo; replace with a fuller parser if needed.
        function renderMarkdown(src) {
            const lines = src.replace(/\r\n/g, '\n').split('\n');
            const out = [];
            let i = 0;

            const bullet = /^(\s*)([-*])\s+(.*)$/;
            const ordered = /^(\s*)(\d+)\.\s+(.*)$/;
            const tableRow = /^\s*\|(.+)\|\s*$/;
            const tableSep = /^\s*\|?\s*:?-{3,}:?\s*(\|\s*:?-{3,}:?\s*)+\|?\s*$/;

            function splitRow(s) {
                let t = s.trim();
                if (t.startsWith('|')) t = t.slice(1);
                if (t.endsWith('|')) t = t.slice(0, -1);
                return t.split('|').map(c => c.trim());
            }

            function inline(s) {
                // Posts are trusted content, so raw HTML passes through unescaped
                // (some posts embed inline <blockquote>, <div>, etc.).
                // Stray ampersands still get fixed up.
                s = s.replace(/&(?![a-zA-Z]+;|#\d+;)/g, '&amp;');
                s = s.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<a class="image-link" href="$2" target="_blank" rel="noopener noreferrer"><img alt="$1" src="$2"></a>');
                s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
                s = s.replace(/`([^`]+)`/g, function (_, c) {
                    return '<code>' + c.replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</code>';
                });
                s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
                s = s.replace(/~~([^~\n]+)~~/g, '<del>$1</del>');
                s = s.replace(/(^|[^*])\*([^*\n]+)\*/g, '$1<em>$2</em>');
                return s;
            }

            while (i < lines.length) {
                const line = lines[i];
                if (!line.trim()) {
                    i++;
                    continue;
                }

                const fence = line.match(/^```(\w*)\s*$/);
                if (fence) {
                    i++;
                    const buf = [];
                    while (i < lines.length && !/^```\s*$/.test(lines[i])) {
                        buf.push(lines[i]);
                        i++;
                    }
                    i++;
                    const escaped = buf.join('\n').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                    const cls = fence[1] ? ' class="lang-' + fence[1] + '"' : '';
                    out.push('<pre><code' + cls + '>' + escaped + '</code></pre>');
                    continue;
                }

                const h = line.match(/^(#{1,6})\s+(.*)$/);
                if (h) {
                    out.push('<h' + h[1].length + '>' + inline(h[2]) + '</h' + h[1].length + '>');
                    i++;
                    continue;
                }

                if (/^\s*(?:-\s*){3,}\s*$/.test(line) || /^\s*\*{3,}\s*$/.test(line)) {
                    out.push('<hr>');
                    i++;
                    continue;
                }

                if (/^>\s?/.test(line)) {
                    const buf = [];
                    while (i < lines.length && /^>\s?/.test(lines[i])) {
                        buf.push(lines[i].replace(/^>\s?/, ''));
                        i++;
                    }
                    out.push('<blockquote>' + renderMarkdown(buf.join('\n')) + '</blockquote>');
                    continue;
                }

                if (tableRow.test(line) && i + 1 < lines.length && tableSep.test(lines[i + 1])) {
                    const headers = splitRow(line);
                    i += 2;
                    const rows = [];
                    while (i < lines.length && tableRow.test(lines[i])) {
                        rows.push(splitRow(lines[i]));
                        i++;
                    }
                    let html = '<table><thead><tr>';
                    headers.forEach(h => {
                        html += '<th>' + inline(h) + '</th>';
                    });
                    html += '</tr></thead><tbody>';
                    rows.forEach(r => {
                        html += '<tr>';
                        r.forEach(c => {
                            html += '<td>' + inline(c) + '</td>';
                        });
                        html += '</tr>';
                    });
                    html += '</tbody></table>';
                    out.push(html);
                    continue;
                }

                if (bullet.test(line) || ordered.test(line)) {
                    // Indent of the first bullet defines this list's base level.
                    // Deeper-indented bullets become nested lists (rendered by
                    // recursing into renderMarkdown). Same-or-less indent at a
                    // bullet starts a sibling item (or ends the list).
                    const firstMatch = line.match(bullet) || line.match(ordered);
                    const baseIndent = firstMatch[1].length;
                    const isOrdered = ordered.test(line);
                    const items = [];
                    while (i < lines.length) {
                        const cur = lines[i];
                        if (!cur.trim()) {
                            // blank line breaks the list (matches CommonMark-ish behaviour)
                            i++;
                            break;
                        }
                        const mBul = cur.match(bullet);
                        const mOrd = cur.match(ordered);
                        const m = mBul || mOrd;
                        if (!m) break;
                        if (m[1].length < baseIndent) break;
                        if (m[1].length > baseIndent) break; // shouldn't happen at top of loop
                        // Same-type check: switching between -/* and 1. closes the list
                        if (isOrdered !== !!mOrd) break;

                        const itemBuf = [m[3]];
                        const nestedBuf = [];
                        i++;
                        while (i < lines.length) {
                            const nxt = lines[i];
                            if (!nxt.trim()) break;
                            const nBul = nxt.match(bullet);
                            const nOrd = nxt.match(ordered);
                            const nm = nBul || nOrd;
                            if (nm) {
                                if (nm[1].length > baseIndent) {
                                    // nested list line — dedent and stash
                                    nestedBuf.push(nxt.slice(baseIndent + 2));
                                    i++;
                                    continue;
                                }
                                // sibling or end of list
                                break;
                            }
                            // Plain continuation text
                            if (nestedBuf.length) {
                                // continuation inside the nested block
                                nestedBuf.push(nxt.slice(baseIndent + 2));
                            } else {
                                itemBuf.push(nxt.trim());
                            }
                            i++;
                        }

                        let liHtml = inline(itemBuf.join('\n'));
                        if (nestedBuf.length) {
                            liHtml += renderMarkdown(nestedBuf.join('\n'));
                        }
                        items.push('<li>' + liHtml + '</li>');
                    }
                    out.push((isOrdered ? '<ol>' : '<ul>') + items.join('') + (isOrdered ? '</ol>' : '</ul>'));
                    continue;
                }

                const buf = [line];
                i++;
                while (i < lines.length && lines[i].trim() && !/^#{1,6}\s/.test(lines[i]) && !/^>\s?/.test(lines[i]) && !bullet.test(lines[i]) && !ordered.test(lines[i]) && !/^```/.test(lines[i]) && !tableRow.test(lines[i])) {
                    buf.push(lines[i]);
                    i++;
                }
                out.push('<p>' + inline(buf.join(' ')) + '</p>');
            }
            return out.join('\n');
        }

        // Block dispatcher. New block types plug in here.
        const renderers = {
            markdown: function (block) {
                const div = document.createElement('div');
                div.innerHTML = renderMarkdown(block.content);
                return div;
            },
            mermaid: function (block) {
                // Mermaid scans elements with class "mermaid" whose textContent
                // is the diagram source. We collect these nodes and run
                // mermaid.run() once after all blocks are in the DOM.
                const div = document.createElement('div');
                div.className = 'mermaid';
                div.textContent = block.content;
                return div;
            },
            'force-graph': function (block) {
                // build.py emits parsed JSON: {nodes:[{id,size}], links:[{source,target}]}.
                // We instantiate force-graph after the container is in the DOM
                // so it can measure its own width.
                const div = document.createElement('div');
                div.className = 'force-graph';
                const data = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.ForceGraph) return;
                    const maxSize = data.nodes.reduce((m, n) => Math.max(m, n.size || 1), 1);
                    window.ForceGraph()(div)
                        .graphData(data)
                        .width(div.clientWidth)
                        .height(div.clientHeight)
                        .nodeRelSize(4)
                        .nodeVal(n => Math.max(20 * (n.size || 1) / maxSize, 0.001))
                        .nodeLabel(n => n.id + ' (' + (n.size || 1) + ')')
                        .nodeColor(() => 'rgba(135, 206, 235, 0.7)')
                        .linkColor(() => 'rgba(60, 60, 60, 0.4)')
                        .linkDirectionalArrowLength(4)
                        .linkDirectionalArrowRelPos(1)
                        .linkWidth(1);
                });
                return div;
            },
            'bubble-chart': function (block) {
                // build.py emits {nodes:[{name,size}]}. Renders a D3 circle-pack
                // SVG (same shape as the obren.io reference, just inline).
                const wrap = document.createElement('div');
                wrap.className = 'bubble-chart';
                const payload = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.d3) return;
                    const diameter = 480;
                    const fill = '#c0deed';
                    const textColor = '#111111';
                    const fontSize = 12;

                    const svg = window.d3.select(wrap).append('svg')
                        .attr('viewBox', '0 0 ' + diameter + ' ' + diameter)
                        .attr('width', diameter)
                        .attr('height', diameter);

                    const root = window.d3.hierarchy({children: payload.nodes})
                        .sum(d => d.size || 0)
                        .sort((a, b) => b.value - a.value);

                    window.d3.pack().size([diameter, diameter]).padding(2)(root);

                    const node = svg.selectAll('g')
                        .data(root.leaves())
                        .enter().append('g')
                        .attr('transform', d => 'translate(' + d.x + ',' + d.y + ')');

                    node.append('title').text(d => d.data.name + ': ' + d.value);
                    node.append('circle').attr('r', d => d.r).style('fill', fill);
                    node.append('text')
                        .attr('dy', '.3em')
                        .style('text-anchor', 'middle')
                        .style('fill', textColor)
                        .style('font-size', fontSize + 'px')
                        .text(d => d.data.name.substring(0, Math.max(0, Math.floor(d.r / 3))));
                });
                return wrap;
            }
        };

        const mermaidNodes = [];
        data.blocks.forEach(function (block) {
            const r = renderers[block.type];
            if (!r) {
                const pre = document.createElement('pre');
                pre.textContent = '[unknown block type: ' + block.type + ']';
                root.appendChild(pre);
                return;
            }
            const node = r(block);
            if (node instanceof Node) {
                root.appendChild(node);
                if (block.type === 'mermaid') mermaidNodes.push(node);
            }
        });

        if (mermaidNodes.length && window.mermaid) {
            window.mermaid.initialize({startOnLoad: false, theme: 'default'});
            window.mermaid.run({nodes: mermaidNodes});
        }
    })();
</script>
</body>
</html>
