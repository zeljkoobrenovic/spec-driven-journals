<script id="data" type="application/json">{"meta": {"id": "ORG-FOUND-AWS-NAMING-TAGGING", "status": "draft:gray", "title": "AWS Account and Resource Naming and Tagging Conventions", "date": "2026-05-19", "author": "Organization Tech Strategy", "permalink": "aws-naming-tagging", "timetoread": "13 min", "excerpt": "Organization standardizes AWS account names, resource names, and resource tags. Names help humans recognize resources; tags are authoritative for cost, ownership, compliance, automation, and inventory. Production enforcement is automated through AWS Organizations, tag policies, SCPs, and AWS Config rules.", "tags": "aws, naming, tagging, cost-allocation, governance, cloud", "icon": "assets/icons/aws-naming-tagging.png", "logo": "assets/images/aws-naming-tagging/logo.jpeg", "logo_credit": "Image generated by Google Gemini (gemini-3-pro-image-preview)"}, "tags": ["aws", "naming", "tagging", "cost-allocation", "governance", "cloud"], "blocks": [{"type": "markdown", "content": "> **Status**: DRAFT\n>\n> **Decision**: Organization standardizes naming and tagging across AWS. Accounts use `org-<domain>-<env>`. Resources use `org-<domain>-<system>-<component>-<env>[-<qualifier>]` in lowercase kebab-case. Every taggable resource carries required ownership, cost, environment, data, compliance, management, and repository tags. Tags are authoritative for tooling; names are for human recognition.\n\n## Decision\n\nAdopt one AWS naming and tagging scheme across Organization.\n\n| Area | Standard |\n| --- | --- |\n| AWS Organization | One organization for Organization-managed accounts. |\n| Account name | `org-<domain>-<env>` |\n| Resource name | `org-<domain>-<system>-<component>-<env>[-<qualifier>]` |\n| Case | Lowercase kebab-case for names; PascalCase for tag keys. |\n| Tags | Required on every taggable production resource. |\n| Authority | Tags are authoritative for tooling; names are supporting context. |\n| Enforcement | AWS Organizations, tag policies, SCPs, AWS Config, IaC checks. |\n\nThe convention should let a human recognize a resource and let automation answer: who owns it, what system it belongs to, what environment it runs in, what it costs, and which compliance or data constraints apply.\n\n## How to Read This Decision\n\nNames and tags serve different purposes:\n\n| Mechanism | Optimized for | Failure mode |\n| --- | --- | --- |\n| **Name** | Human recognition in consoles, logs, dashboards, and tickets. | Names are often immutable and cannot carry all metadata. |\n| **Tag** | Queryable ownership, cost, compliance, lifecycle, and automation data. | Free-form tags drift unless keys and values are governed. |\n\nWhen names and tags disagree, fix the tags first. Tooling should trust tags.\n\n## Account Naming\n\nAWS accounts use:\n\n```text\norg-<domain>-<env>\n```\n\nExamples:\n\n| Account | Meaning |\n| --- | --- |\n| `org-listings-prod` | Production account for the listings domain. |\n| `org-search-dev` | Development account for search. |\n| `org-platform-shared` | Shared platform account. |\n| `org-security-prod` | Security-owned production account. |\n\nUse one primary purpose per account. Do not combine unrelated systems or ownership models inside one account just to reduce account count.\n\n## Resource Naming\n\nResources use:\n\n```text\norg-<domain>-<system>-<component>-<env>[-<qualifier>]\n```\n\nExamples:\n\n| Resource | Meaning |\n| --- | --- |\n| `org-listings-search-api-prod` | Production search API in the listings domain. |\n| `org-platform-deploy-runner-dev` | Development deployment runner owned by platform. |\n| `org-finance-billing-events-prod-dlq` | Dead-letter queue for billing events. |\n\nRules:\n\n* Use lowercase kebab-case.\n* Use the same `domain`, `system`, and `component` vocabulary as GitHub and package names.\n* Add a `qualifier` only when the base name is not specific enough.\n* Do not encode secrets, personal names, team jokes, or temporary project names.\n* Prefer stable system names over current implementation details.\n\n## Required Tags\n\nEvery taggable resource must carry:\n\n| Tag | Meaning |\n| --- | --- |\n| `Owner` | Owning team or accountable group. |\n| `Domain` | Business or platform domain. |\n| `System` | System or product capability. |\n| `Component` | Deployable or logical component. |\n| `Environment` | `prod`, `stage`, `dev`, `test`, `sandbox`, or approved equivalent. |\n| `CostCenter` | Finance allocation code. |\n| `DataClass` | Highest data classification processed or stored. |\n| `Compliance` | Relevant compliance scope, or `none`. |\n| `ManagedBy` | `terraform`, `cloudformation`, `cdk`, `manual-exception`, or approved tool. |\n| `RepoUrl` | Canonical source repository URL. |\n\nRecommended tags such as `ServiceTier`, `Lifecycle`, `Criticality`, and `RunbookUrl` may be added when useful, but they do not replace the required set.\n\n## Controlled Vocabularies\n\nThese values must come from governed lists:\n\n| Field | Why controlled |\n| --- | --- |\n| `Domain` | Enables ownership, cost, and architecture grouping. |\n| `System` | Connects AWS resources to repositories and packages. |\n| `Environment` | Enables environment-scoped controls and dashboards. |\n| `CostCenter` | Enables finance reporting. |\n| `DataClass` | Enables security and privacy controls. |\n| `Compliance` | Enables audit and regulatory reporting. |\n| `ManagedBy` | Enables drift detection and manual-exception review. |\n\nIf a needed value is missing, raise a vocabulary change. Do not invent a local spelling.\n\n## Enforcement\n\nEnforcement should be automated:\n\n| Layer | Check |\n| --- | --- |\n| IaC review | Names and tags exist before merge. |\n| Tag policies | Allowed keys and values are constrained. |\n| SCPs | Non-compliant resource creation can be blocked in production. |\n| AWS Config | Existing resources are monitored for drift. |\n| Inventory export | Ownership, cost, compliance, and repo links are queryable. |\n\nManual review is useful during migration, but it cannot be the long-term control.\n\n## What This Means for Teams\n\n* Choose `domain`, `system`, and `component` before provisioning.\n* Keep AWS, GitHub, and package names aligned.\n* Treat missing required tags as a release blocker for production resources.\n* Use `manual-exception` only with a tracked reason and expiry.\n* Fix tags when ownership, data classification, or cost allocation changes.\n\n## Anti-Patterns\n\n* **Name-only governance.** Automation tries to parse everything from resource names.\n* **Free-form tag values.** Dashboards fill with spelling variants.\n* **Multi-purpose accounts.** Isolation and cost signals become unclear.\n* **Owner as person.** A resource is tagged to an individual instead of an accountable team.\n* **Manual resources without expiry.** Emergency work becomes permanent drift.\n* **Different vocabularies per system.** AWS, GitHub, and packages describe the same thing differently.\n\n## Scope and Revisiting\n\nThis applies to Organization-managed AWS accounts and taggable resources. It does not define non-AWS cloud naming, IAM policy design, account-vending workflow, or migration steps for every existing resource.\n\nRevisit when AWS introduces materially better governance mechanisms, when the domain vocabulary changes, or when repeated exceptions show that the standard is missing a real pattern.\n\n## Related Records\n\n* [GitHub Naming and Tagging Conventions for Source Code](github-naming-tagging.html) — source-code naming should align with AWS ownership vocabulary.\n* [Package Naming Conventions Across JVM, npm, Python, .NET, and OCI](package-naming-conventions.html) — published artifacts should use the same logical names.\n* [Operational Principle: Cloud Native on AWS](../principles/cloud-native-on-aws.html) — principle-level reason to keep AWS usage coherent.\n\n## Authoritative References\n\n* AWS Well-Architected Framework\n* AWS tagging best practices\n* AWS Organizations, Service Control Policies, AWS Config, and tag policies documentation\n* FinOps Foundation cost-allocation guidance\n"}]}</script>
<script>
    (function () {
        const data = JSON.parse(document.getElementById('data').textContent);
        const root = document.getElementById('content');

        const postId = (data.meta && data.meta.id) ? String(data.meta.id) : '';
        const postStatusRaw = (data.meta && data.meta.status) ? String(data.meta.status) : '';
        if (postId || postStatusRaw) {
            const header = document.getElementById('post-header');
            let sectionEl = header.querySelector('p.section');
            if (!sectionEl) {
                sectionEl = document.createElement('p');
                sectionEl.className = 'section';
                header.insertBefore(sectionEl, header.firstChild);
            }
            // Status pill goes first, then a " / " separator before the existing
            // content (section name and/or id).
            if (postStatusRaw) {
                const parts = postStatusRaw.split(':');
                const statusName = parts[0].trim();
                const statusColor = (parts[1] || '').trim();
                const wrap = document.createElement('span');
                wrap.className = 'post-status';
                const dot = document.createElement('span');
                dot.className = 'status-dot';
                if (statusColor) dot.style.background = statusColor;
                wrap.appendChild(dot);
                wrap.appendChild(document.createTextNode(statusName));
                if (sectionEl.firstChild) {
                    sectionEl.insertBefore(document.createTextNode(' • '), sectionEl.firstChild);
                    sectionEl.insertBefore(wrap, sectionEl.firstChild);
                } else {
                    sectionEl.appendChild(wrap);
                }
            }
            if (postId) {
                if (sectionEl.firstChild) sectionEl.appendChild(document.createTextNode(' • '));
                sectionEl.appendChild(document.createTextNode(postId));
            }
        }

        const tagsHost = document.getElementById('tags');
        (data.tags || []).forEach(function (t) {
            const span = document.createElement('span');
            span.className = 'tag';
            span.textContent = t;
            tagsHost.appendChild(span);
        });

        // Minimal markdown renderer. Supports: ATX headings, paragraphs, blockquotes,
        // unordered/ordered lists, fenced code, inline code, bold/italic/strikethrough, links, images, hr.
        // Sufficient for the posts in this repo; replace with a fuller parser if needed.
        function renderMarkdown(src) {
            const lines = src.replace(/\r\n/g, '\n').split('\n');
            const out = [];
            let i = 0;

            const bullet = /^(\s*)([-*])\s+(.*)$/;
            const ordered = /^(\s*)(\d+)\.\s+(.*)$/;
            const tableRow = /^\s*\|(.+)\|\s*$/;
            const tableSep = /^\s*\|?\s*:?-{3,}:?\s*(\|\s*:?-{3,}:?\s*)+\|?\s*$/;

            function splitRow(s) {
                let t = s.trim();
                if (t.startsWith('|')) t = t.slice(1);
                if (t.endsWith('|')) t = t.slice(0, -1);
                return t.split('|').map(c => c.trim());
            }

            function inline(s) {
                // Posts are trusted content, so raw HTML passes through unescaped
                // (some posts embed inline <blockquote>, <div>, etc.).
                // Stray ampersands still get fixed up.
                s = s.replace(/&(?![a-zA-Z]+;|#\d+;)/g, '&amp;');
                s = s.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img alt="$1" src="$2">');
                s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
                s = s.replace(/`([^`]+)`/g, function (_, c) {
                    return '<code>' + c.replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</code>';
                });
                s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
                s = s.replace(/~~([^~\n]+)~~/g, '<del>$1</del>');
                s = s.replace(/(^|[^*])\*([^*\n]+)\*/g, '$1<em>$2</em>');
                return s;
            }

            while (i < lines.length) {
                const line = lines[i];
                if (!line.trim()) {
                    i++;
                    continue;
                }

                const fence = line.match(/^```(\w*)\s*$/);
                if (fence) {
                    i++;
                    const buf = [];
                    while (i < lines.length && !/^```\s*$/.test(lines[i])) {
                        buf.push(lines[i]);
                        i++;
                    }
                    i++;
                    const escaped = buf.join('\n').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                    const cls = fence[1] ? ' class="lang-' + fence[1] + '"' : '';
                    out.push('<pre><code' + cls + '>' + escaped + '</code></pre>');
                    continue;
                }

                const h = line.match(/^(#{1,6})\s+(.*)$/);
                if (h) {
                    out.push('<h' + h[1].length + '>' + inline(h[2]) + '</h' + h[1].length + '>');
                    i++;
                    continue;
                }

                if (/^\s*(?:-\s*){3,}\s*$/.test(line) || /^\s*\*{3,}\s*$/.test(line)) {
                    out.push('<hr>');
                    i++;
                    continue;
                }

                if (/^>\s?/.test(line)) {
                    const buf = [];
                    while (i < lines.length && /^>\s?/.test(lines[i])) {
                        buf.push(lines[i].replace(/^>\s?/, ''));
                        i++;
                    }
                    out.push('<blockquote>' + renderMarkdown(buf.join('\n')) + '</blockquote>');
                    continue;
                }

                if (tableRow.test(line) && i + 1 < lines.length && tableSep.test(lines[i + 1])) {
                    const headers = splitRow(line);
                    i += 2;
                    const rows = [];
                    while (i < lines.length && tableRow.test(lines[i])) {
                        rows.push(splitRow(lines[i]));
                        i++;
                    }
                    let html = '<table><thead><tr>';
                    headers.forEach(h => {
                        html += '<th>' + inline(h) + '</th>';
                    });
                    html += '</tr></thead><tbody>';
                    rows.forEach(r => {
                        html += '<tr>';
                        r.forEach(c => {
                            html += '<td>' + inline(c) + '</td>';
                        });
                        html += '</tr>';
                    });
                    html += '</tbody></table>';
                    out.push(html);
                    continue;
                }

                if (bullet.test(line) || ordered.test(line)) {
                    // Indent of the first bullet defines this list's base level.
                    // Deeper-indented bullets become nested lists (rendered by
                    // recursing into renderMarkdown). Same-or-less indent at a
                    // bullet starts a sibling item (or ends the list).
                    const firstMatch = line.match(bullet) || line.match(ordered);
                    const baseIndent = firstMatch[1].length;
                    const isOrdered = ordered.test(line);
                    const items = [];
                    while (i < lines.length) {
                        const cur = lines[i];
                        if (!cur.trim()) {
                            // blank line breaks the list (matches CommonMark-ish behaviour)
                            i++;
                            break;
                        }
                        const mBul = cur.match(bullet);
                        const mOrd = cur.match(ordered);
                        const m = mBul || mOrd;
                        if (!m) break;
                        if (m[1].length < baseIndent) break;
                        if (m[1].length > baseIndent) break; // shouldn't happen at top of loop
                        // Same-type check: switching between -/* and 1. closes the list
                        if (isOrdered !== !!mOrd) break;

                        const itemBuf = [m[3]];
                        const nestedBuf = [];
                        i++;
                        while (i < lines.length) {
                            const nxt = lines[i];
                            if (!nxt.trim()) break;
                            const nBul = nxt.match(bullet);
                            const nOrd = nxt.match(ordered);
                            const nm = nBul || nOrd;
                            if (nm) {
                                if (nm[1].length > baseIndent) {
                                    // nested list line — dedent and stash
                                    nestedBuf.push(nxt.slice(baseIndent + 2));
                                    i++;
                                    continue;
                                }
                                // sibling or end of list
                                break;
                            }
                            // Plain continuation text
                            if (nestedBuf.length) {
                                // continuation inside the nested block
                                nestedBuf.push(nxt.slice(baseIndent + 2));
                            } else {
                                itemBuf.push(nxt.trim());
                            }
                            i++;
                        }

                        let liHtml = inline(itemBuf.join('\n'));
                        if (nestedBuf.length) {
                            liHtml += renderMarkdown(nestedBuf.join('\n'));
                        }
                        items.push('<li>' + liHtml + '</li>');
                    }
                    out.push((isOrdered ? '<ol>' : '<ul>') + items.join('') + (isOrdered ? '</ol>' : '</ul>'));
                    continue;
                }

                const buf = [line];
                i++;
                while (i < lines.length && lines[i].trim() && !/^#{1,6}\s/.test(lines[i]) && !/^>\s?/.test(lines[i]) && !bullet.test(lines[i]) && !ordered.test(lines[i]) && !/^```/.test(lines[i]) && !tableRow.test(lines[i])) {
                    buf.push(lines[i]);
                    i++;
                }
                out.push('<p>' + inline(buf.join(' ')) + '</p>');
            }
            return out.join('\n');
        }

        // Block dispatcher. New block types plug in here.
        const renderers = {
            markdown: function (block) {
                const div = document.createElement('div');
                div.innerHTML = renderMarkdown(block.content);
                return div;
            },
            mermaid: function (block) {
                // Mermaid scans elements with class "mermaid" whose textContent
                // is the diagram source. We collect these nodes and run
                // mermaid.run() once after all blocks are in the DOM.
                const div = document.createElement('div');
                div.className = 'mermaid';
                div.textContent = block.content;
                return div;
            },
            'force-graph': function (block) {
                // build.py emits parsed JSON: {nodes:[{id,size}], links:[{source,target}]}.
                // We instantiate force-graph after the container is in the DOM
                // so it can measure its own width.
                const div = document.createElement('div');
                div.className = 'force-graph';
                const data = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.ForceGraph) return;
                    const maxSize = data.nodes.reduce((m, n) => Math.max(m, n.size || 1), 1);
                    window.ForceGraph()(div)
                        .graphData(data)
                        .width(div.clientWidth)
                        .height(div.clientHeight)
                        .nodeRelSize(4)
                        .nodeVal(n => Math.max(20 * (n.size || 1) / maxSize, 0.001))
                        .nodeLabel(n => n.id + ' (' + (n.size || 1) + ')')
                        .nodeColor(() => 'rgba(135, 206, 235, 0.7)')
                        .linkColor(() => 'rgba(60, 60, 60, 0.4)')
                        .linkDirectionalArrowLength(4)
                        .linkDirectionalArrowRelPos(1)
                        .linkWidth(1);
                });
                return div;
            },
            'bubble-chart': function (block) {
                // build.py emits {nodes:[{name,size}]}. Renders a D3 circle-pack
                // SVG (same shape as the obren.io reference, just inline).
                const wrap = document.createElement('div');
                wrap.className = 'bubble-chart';
                const payload = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.d3) return;
                    const diameter = 480;
                    const fill = '#c0deed';
                    const textColor = '#111111';
                    const fontSize = 12;

                    const svg = window.d3.select(wrap).append('svg')
                        .attr('viewBox', '0 0 ' + diameter + ' ' + diameter)
                        .attr('width', diameter)
                        .attr('height', diameter);

                    const root = window.d3.hierarchy({children: payload.nodes})
                        .sum(d => d.size || 0)
                        .sort((a, b) => b.value - a.value);

                    window.d3.pack().size([diameter, diameter]).padding(2)(root);

                    const node = svg.selectAll('g')
                        .data(root.leaves())
                        .enter().append('g')
                        .attr('transform', d => 'translate(' + d.x + ',' + d.y + ')');

                    node.append('title').text(d => d.data.name + ': ' + d.value);
                    node.append('circle').attr('r', d => d.r).style('fill', fill);
                    node.append('text')
                        .attr('dy', '.3em')
                        .style('text-anchor', 'middle')
                        .style('fill', textColor)
                        .style('font-size', fontSize + 'px')
                        .text(d => d.data.name.substring(0, Math.max(0, Math.floor(d.r / 3))));
                });
                return wrap;
            }
        };

        const mermaidNodes = [];
        data.blocks.forEach(function (block) {
            const r = renderers[block.type];
            if (!r) {
                const pre = document.createElement('pre');
                pre.textContent = '[unknown block type: ' + block.type + ']';
                root.appendChild(pre);
                return;
            }
            const node = r(block);
            if (node instanceof Node) {
                root.appendChild(node);
                if (block.type === 'mermaid') mermaidNodes.push(node);
            }
        });

        if (mermaidNodes.length && window.mermaid) {
            window.mermaid.initialize({startOnLoad: false, theme: 'default'});
            window.mermaid.run({nodes: mermaidNodes});
        }
    })();
</script>
</body>
</html>
