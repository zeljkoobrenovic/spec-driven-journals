<script id="data" type="application/json">{"meta": {"id": "ORG-FOUND-JIRA-WORKFLOW-STANDARDS", "status": "draft:gray", "title": "Jira as the Issue Tracker and a Unified Workflow Standard Across Teams", "date": "2026-05-19", "author": "QA Platform Team", "permalink": "jira-workflow-standards", "timetoread": "14 min", "excerpt": "Organization uses Jira as the standard engineering issue tracker and adopts four shared workflows: Epic, Spike, Story & Bug, and Task. The standard fixes the meaning of states and transitions across teams while leaving boards, priorities, estimation, and ceremonies team-owned.", "tags": "jira, issue-tracking, workflow, process, qa, delivery", "icon": "assets/icons/jira-workflow-standards.png", "logo": "assets/images/jira-workflow-standards/logo.jpeg", "logo_credit": "Image generated by Google Gemini (gemini-3-pro-image-preview)"}, "tags": ["jira", "issue-tracking", "workflow", "process", "qa", "delivery"], "blocks": [{"type": "markdown", "content": "> **Status**: DRAFT\n>\n> **Owner**: ...\n>\n> **Discussion**: [Slack thread](...)\n>\n> **Decision**: Organization will use Jira as the standard engineering issue tracker and adopt four shared workflows across teams: Epic, Spike, Story & Bug, and Task. The shared element is the state machine and the meaning of each transition. Teams still own their boards, sprint rituals, estimation, priorities, filters, and day-to-day operating model.\n\n## Decision\n\nAdopt Jira as the canonical issue tracker for engineering delivery work and standardize four workflows:\n\n| Workflow | Used for | Main flow | QA gate |\n| --- | --- | --- | --- |\n| **Epic** | A container for related delivery work. | `Backlog -> In progress -> Done` | No |\n| **Spike** | A time-boxed investigation that ends in evidence or a decision. | `Open -> In progress -> Ready -> Closed` | No |\n| **Story & Bug** | User-visible change, customer-impacting defects, and product behaviour. | `Open -> In progress -> In review -> Ready for QA -> In QA -> To deliver -> Closed` | Yes |\n| **Task** | Technical-only work where code review and deployment verification are sufficient. | `Open -> In progress -> In review -> To deliver -> Closed` | No |\n\nThe goal is a shared language for work in flight. A status should tell any engineer, QA engineer, product person, or manager what is true now, who owns the next action, and where work may be waiting.\n\n## How to Read This Decision\n\nThis is a workflow-state decision, not a delivery-process decision.\n\n| Standardized | Team-owned |\n| --- | --- |\n| Issue types and their workflows. | Sprint cadence, planning, estimation, and ceremonies. |\n| State names and transition meaning. | Board layout, swimlanes, quick filters, labels, and components. |\n| Split QA queue for Story & Bug work. | QA staffing model and team-level testing practice. |\n| Explicit rework transitions. | Retrospective format and local improvement experiments. |\n\nIf a team needs a local state, the default answer is not to add one locally. First ask whether the need is already covered by an existing state, a board filter, or a custom field. If the need is genuinely shared, raise a workflow-change proposal.\n\n## Workflow Map\n\n"}, {"type": "mermaid", "content": "flowchart TB\n    subgraph EpicFlow[\"Epic\"]\n        EBacklog[Backlog] --> EProgress[In progress] --> EDone[Done]\n        EProgress -.-> EBlocked[Blocked]\n        EBlocked -.-> EProgress\n        EBacklog -.-> EAbandoned[Abandoned]\n        EProgress -.-> EAbandoned\n    end\n\n    subgraph SpikeFlow[\"Spike\"]\n        SOpen[Open] --> SProgress[In progress] --> SReady[Ready] --> SClosed[Closed]\n        SProgress -.-> SRefine[To refine]\n        SRefine -.-> SOpen\n        SOpen -.-> SAbandoned[Abandoned]\n        SProgress -.-> SAbandoned\n    end\n\n    subgraph StoryBugFlow[\"Story and Bug\"]\n        BOpen[Open] --> BProgress[In progress] --> BReview[In review] --> BReadyQA[Ready for QA] --> BQA[In QA] --> BDeliver[To deliver] --> BClosed[Closed]\n        BReview -. rework .-> BProgress\n        BQA -. rework .-> BProgress\n        BProgress -. unclear .-> BRefine[To refine]\n        BOpen -.-> BAbandoned[Abandoned]\n        BProgress -.-> BAbandoned\n    end\n\n    subgraph TaskFlow[\"Task\"]\n        TOpen[Open] --> TProgress[In progress] --> TReview[In review] --> TDeliver[To deliver] --> TClosed[Closed]\n        TReview -. rework .-> TProgress\n        TOpen -.-> TAbandoned[Abandoned]\n        TProgress -.-> TAbandoned\n    end"}, {"type": "markdown", "content": "\n## Choosing the Right Workflow\n\nUse the work's output and risk, not its size:\n\n| Question | If yes |\n| --- | --- |\n| Is this a container for several child issues? | Use **Epic**. |\n| Is the expected output learning, evidence, a decision, or a recommendation? | Use **Spike**. |\n| Does this change user-visible behaviour, customer experience, business rules, displayed data, or production risk that QA should verify? | Use **Story & Bug**. |\n| Is this technical-only work where code review and deployment verification are enough? | Use **Task**. |\n\nUseful rules:\n\n* A small user-visible fix is still Story & Bug work.\n* A large refactoring can still be a Task if behaviour does not change.\n* Mixed work should usually be split: technical cleanup in a Task, user-facing behaviour in Story & Bug.\n* Reclassify when reality changes; do not stretch the wrong workflow to avoid moving the issue.\n\n## QA Model\n\nStory & Bug work has two QA states:\n\n| State | Meaning |\n| --- | --- |\n| `Ready for QA` | Review passed; the issue is waiting for QA capacity. |\n| `In QA` | A QA engineer is actively testing. |\n\nThis split matters because waiting time and testing time are different constraints. A growing `Ready for QA` queue suggests capacity, scheduling, or handoff problems. Long `In QA` time suggests test-data, environment, acceptance-criteria, or complexity problems.\n\nFailed review and failed QA return explicitly to `In progress`. Comments alone are not enough because the transition is the signal that makes rework visible.\n\n## Transition Discipline\n\nMove an issue when a fact changes:\n\n| Transition | What must be true |\n| --- | --- |\n| `Open -> In progress` | Someone has started active work. |\n| `In progress -> In review` | A reviewable artifact exists. |\n| `In review -> Ready for QA` | Code review passed and QA has enough context. |\n| `Ready for QA -> In QA` | QA actively started testing. |\n| `In QA -> To deliver` | QA passed and the issue is ready for release or production verification. |\n| `To deliver -> Closed` | Release and verification are complete. |\n| Any active state -> `To refine` | The issue lacks enough clarity to continue safely. |\n| Any non-terminal state -> `Abandoned` | The work is intentionally stopped. |\n\nDo not move issues for optics. Do not leave failed review or failed QA hidden in comments. Leave enough evidence for the next person to understand the transition.\n\n## Metrics This Enables\n\nThe standard makes metrics comparable because every team uses the same state semantics:\n\n| Metric | Signal |\n| --- | --- |\n| Lead time | How long work waits from creation or commitment to closure. |\n| Cycle time | How long active delivery takes from `In progress` to `Closed`. |\n| QA wait time | How long work waits in `Ready for QA`. |\n| QA execution time | How long active testing takes in `In QA`. |\n| Rework rate | How often review or QA sends work back to `In progress`. |\n| Blocked time | Which dependencies repeatedly stop delivery. |\n\nUse these metrics to improve the system of work, not to rank individuals.\n\n## What This Means for Teams\n\n* Pick the issue type before work enters delivery.\n* Keep issue state aligned with reality.\n* Use `Ready for QA` and `In QA` honestly.\n* Route review and QA failures back through explicit rework transitions.\n* Keep local customization in boards, filters, labels, fields, and ceremonies.\n* Raise recurring workflow gaps through the agreed governance path instead of adding local statuses.\n\n## Anti-Patterns\n\n* **Single `QA` state.** Hides whether work is waiting or actively being tested.\n* **Task as a fast path.** Uses a technical workflow to bypass QA for user-visible change.\n* **Comment-only rework.** Makes quality feedback invisible to flow metrics.\n* **Local workflow drift.** Recreates the cross-team ambiguity this standard is meant to remove.\n* **Blocked as prioritization.** Uses `Blocked` for \"we are busy\" rather than a named external dependency.\n* **Spike that never closes.** Leaves investigation work without evidence, decision, or follow-up.\n\n## Scope and Revisiting\n\nThis decision applies to engineering delivery work tracked in Jira: epics, spikes, stories, bugs, and technical tasks.\n\nOut of scope:\n\n* Product discovery boards that are not part of engineering delivery.\n* Operational ticket queues already managed in a different tool.\n* Team-specific estimation, planning, ceremonies, and dashboards.\n* Custom fields, components, labels, and board configuration.\n\nRevisit when a recurring work type does not fit the four workflows, when QA metrics show the bottleneck has moved, or when Jira is replaced as the issue tracker.\n\n## Related Records\n\n* [Markdown Records as the Default Format for Technical Decisions, Strategies, and Discussions](markdown-records.html) — durable technical writing lives in markdown records; Jira tickets are not the home for decisions.\n* [Architecture Advisory Forum as a Standing Advice Ritual](architecture-advisory-forum.html) — the forum where cross-team workflow changes can be discussed before adoption.\n* [GitHub Naming and Tagging Conventions for Source Code](github-naming-tagging.html) — uses Jira issue keys in branch names and commit metadata.\n\n## Authoritative References\n\n* [Atlassian: Jira workflows](https://support.atlassian.com/jira-cloud-administration/docs/work-with-issue-workflows/)\n* [Atlassian: Configure workflow transitions](https://support.atlassian.com/jira-cloud-administration/docs/configure-workflow-triggers/)\n* [Atlassian: Control flow with workflow conditions, validators, and post functions](https://support.atlassian.com/jira-cloud-administration/docs/advanced-workflow-configuration/)\n\n## Appendix: Vocabulary\n\nThis vocabulary is reference material. It should support the workflow decision without turning the record into a Jira manual.\n\n| Term | Meaning in this standard |\n| --- | --- |\n| **Issue type** | The category that selects the workflow: Epic, Spike, Story, Bug, or Task. |\n| **State** | A named phase with clear entry and exit meaning. |\n| **Transition** | An allowed state change that records a real event. |\n| **Queue** | Work is ready for someone but not yet actively handled. |\n| **Active work** | Someone is currently doing the work represented by the state. |\n| **Gate** | A quality check that must pass before work moves forward. |\n| **Rework** | Work returns to an earlier state because a gate found a problem. |\n| **Blocked** | Progress is prevented by a named external dependency. |\n| **Abandoned** | Work is intentionally stopped because it is cancelled, superseded, or no longer valuable. |\n| **Closed** | The workflow's definition of done is satisfied. |\n"}]}</script>

        // Minimal markdown renderer. Supports: ATX headings, paragraphs, blockquotes,
        // unordered/ordered lists, fenced code, inline code, bold/italic/strikethrough, links, images, hr.
        // Sufficient for the posts in this repo; replace with a fuller parser if needed.
        function renderMarkdown(src) {
            const lines = src.replace(/\r\n/g, '\n').split('\n');
            const out = [];
            let i = 0;

            const bullet = /^(\s*)([-*])\s+(.*)$/;
            const ordered = /^(\s*)(\d+)\.\s+(.*)$/;
            const tableRow = /^\s*\|(.+)\|\s*$/;
            const tableSep = /^\s*\|?\s*:?-{3,}:?\s*(\|\s*:?-{3,}:?\s*)+\|?\s*$/;

            function splitRow(s) {
                let t = s.trim();
                if (t.startsWith('|')) t = t.slice(1);
                if (t.endsWith('|')) t = t.slice(0, -1);
                return t.split('|').map(c => c.trim());
            }

            function inline(s) {
                // Posts are trusted content, so raw HTML passes through unescaped
                // (some posts embed inline <blockquote>, <div>, etc.).
                // Stray ampersands still get fixed up.

                s = s.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<a class="image-link" href="$2" target="_blank" rel="noopener noreferrer"><img alt="$1" src="$2"></a>');
                s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
                s = s.replace(/`([^`]+)`/g, function (_, c) {
                    return '<code>' + c.replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</code>';
                });
                s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
                s = s.replace(/~~([^~\n]+)~~/g, '<del>$1</del>');
                s = s.replace(/(^|[^*])\*([^*\n]+)\*/g, '$1<em>$2</em>');
                return s;
            }

            while (i < lines.length) {
                const line = lines[i];
                if (!line.trim()) {
                    i++;
                    continue;
                }

                const fence = line.match(/^```(\w*)\s*$/);
                if (fence) {
                    i++;
                    const buf = [];
                    while (i < lines.length && !/^```\s*$/.test(lines[i])) {

                    }

                    i++;
                    continue;
                }

                if (/^\s*(?:-\s*){3,}\s*$/.test(line) || /^\s*\*{3,}\s*$/.test(line)) {

                    i++;
                    continue;

                    continue;
                }

                if (tableRow.test(line) && i + 1 < lines.length && tableSep.test(lines[i + 1])) {

                    i += 2;
                    const rows = [];
                    while (i < lines.length && tableRow.test(lines[i])) {
                        rows.push(splitRow(lines[i]));
                        i++;
                    }
                    let html = '<table><thead><tr>';
                    headers.forEach(h => {
                        html += '<th>' + inline(h) + '</th>';
                    });
                    html += '</tr></thead><tbody>';
                    rows.forEach(r => {
                        html += '<tr>';
                        r.forEach(c => {
                            html += '<td>' + inline(c) + '</td>';
                        });
                        html += '</tr>';
                    });
                    html += '</tbody></table>';
                    out.push(html);
                    continue;
                }

                if (bullet.test(line) || ordered.test(line)) {
                    // Indent of the first bullet defines this list's base level.
                    // Deeper-indented bullets become nested lists (rendered by
                    // recursing into renderMarkdown). Same-or-less indent at a
                    // bullet starts a sibling item (or ends the list).
                    const firstMatch = line.match(bullet) || line.match(ordered);
                    const baseIndent = firstMatch[1].length;
                    const isOrdered = ordered.test(line);

                    while (i < lines.length) {

                                if (nm[1].length > baseIndent) {
                                    // nested list line — dedent and stash
                                    nestedBuf.push(nxt.slice(baseIndent + 2));
                                    i++;
                                    continue;
                                }
                                // sibling or end of list
                                break;
                            }
                            // Plain continuation text
                            if (nestedBuf.length) {
                                // continuation inside the nested block
                                nestedBuf.push(nxt.slice(baseIndent + 2));
                            } else {
                                itemBuf.push(nxt.trim());
                            }
                            i++;
                        }

                        let liHtml = inline(itemBuf.join('\n'));
                        if (nestedBuf.length) {
                            liHtml += renderMarkdown(nestedBuf.join('\n'));
                        }
                        items.push('<li>' + liHtml + '</li>');
                    }
                    out.push((isOrdered ? '<ol>' : '<ul>') + items.join('') + (isOrdered ? '</ol>' : '</ul>'));
                    continue;
                }

                const buf = [line];
                i++;
                while (i < lines.length && lines[i].trim() && !/^#{1,6}\s/.test(lines[i]) && !/^>\s?/.test(lines[i]) && !bullet.test(lines[i]) && !ordered.test(lines[i]) && !/^```/.test(lines[i]) && !tableRow.test(lines[i])) {
                    buf.push(lines[i]);
                    i++;
                }
                out.push('<p>' + inline(buf.join(' ')) + '</p>');
            }
            return out.join('\n');
        }

        // Block dispatcher. New block types plug in here.
        const renderers = {
            markdown: function (block) {
                const div = document.createElement('div');
                div.innerHTML = renderMarkdown(block.content);
                return div;
            },
            mermaid: function (block) {
                // Mermaid scans elements with class "mermaid" whose textContent
                // is the diagram source. We collect these nodes and run
                // mermaid.run() once after all blocks are in the DOM.
                const div = document.createElement('div');
                div.className = 'mermaid';
                div.textContent = block.content;
                return div;
            },
            'force-graph': function (block) {
                // build.py emits parsed JSON: {nodes:[{id,size}], links:[{source,target}]}.
                // We instantiate force-graph after the container is in the DOM
                // so it can measure its own width.
                const div = document.createElement('div');
                div.className = 'force-graph';
                const data = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.ForceGraph) return;
                    const maxSize = data.nodes.reduce((m, n) => Math.max(m, n.size || 1), 1);
                    window.ForceGraph()(div)
                        .graphData(data)
                        .width(div.clientWidth)
                        .height(div.clientHeight)
                        .nodeRelSize(4)
                        .nodeVal(n => Math.max(20 * (n.size || 1) / maxSize, 0.001))
                        .nodeLabel(n => n.id + ' (' + (n.size || 1) + ')')
                        .nodeColor(() => 'rgba(135, 206, 235, 0.7)')
                        .linkColor(() => 'rgba(60, 60, 60, 0.4)')
                        .linkDirectionalArrowLength(4)
                        .linkDirectionalArrowRelPos(1)
                        .linkWidth(1);
                });
                return div;
            },
            'bubble-chart': function (block) {
                // build.py emits {nodes:[{name,size}]}. Renders a D3 circle-pack
                // SVG (same shape as the obren.io reference, just inline).
                const wrap = document.createElement('div');
                wrap.className = 'bubble-chart';
                const payload = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.d3) return;
                    const diameter = 480;
                    const fill = '#c0deed';
                    const textColor = '#111111';
                    const fontSize = 12;

                    const svg = window.d3.select(wrap).append('svg')
                        .attr('viewBox', '0 0 ' + diameter + ' ' + diameter)
                        .attr('width', diameter)
                        .attr('height', diameter);

                    const root = window.d3.hierarchy({children: payload.nodes})
                        .sum(d => d.size || 0)
                        .sort((a, b) => b.value - a.value);

                    window.d3.pack().size([diameter, diameter]).padding(2)(root);

                    const node = svg.selectAll('g')
                        .data(root.leaves())
                        .enter().append('g')
                        .attr('transform', d => 'translate(' + d.x + ',' + d.y + ')');

                    node.append('title').text(d => d.data.name + ': ' + d.value);
                    node.append('circle').attr('r', d => d.r).style('fill', fill);
                    node.append('text')
                        .attr('dy', '.3em')
                        .style('text-anchor', 'middle')
                        .style('fill', textColor)
                        .style('font-size', fontSize + 'px')
                        .text(d => d.data.name.substring(0, Math.max(0, Math.floor(d.r / 3))));
                });
                return wrap;
            }
        };

        const mermaidNodes = [];
        data.blocks.forEach(function (block) {
            const r = renderers[block.type];
            if (!r) {
                const pre = document.createElement('pre');
                pre.textContent = '[unknown block type: ' + block.type + ']';
                root.appendChild(pre);
                return;
            }
            const node = r(block);
            if (node instanceof Node) {
                root.appendChild(node);
                if (block.type === 'mermaid') mermaidNodes.push(node);
            }
        });

        if (mermaidNodes.length && window.mermaid) {
            window.mermaid.initialize({startOnLoad: false, theme: 'default'});
            window.mermaid.run({nodes: mermaidNodes});
        }
    })();
</script>
</body>
</html>
