<script id="data" type="application/json">{"meta": {}, "tags": [], "blocks": [{"type": "markdown", "content": "# Spec: AI-Mediated Authoring as the Default Way to Edit This Repository\n\n> Backfilled after the post. The most opinionated foundation in the\n> repository; the spec captures what the policy is for so future tweaks\n> stay aligned with the intent.\n\n## Intent\n\nMake AI-mediated authoring the default workflow for substantive changes to\nthis repository, with an explicit trivial-fix exception path. The point is\nto preserve the *reasoning* behind each change in durable form, not to \noutsource judgement. The record should teach authors and reviewers how to \noperate the workflow without turning it into theatre.\n\n## Audience\n\n- **Authors** of new posts, edits, restructures, and config/template\n  changes.\n- **Reviewers** evaluating PRs that touch `_journals/`, `_templates/`, or\n  `_wiring/`.\n- **Tooling owners** maintaining the AI agent contract (build script,\n  `CLAUDE.md`, memory, the `[[…]]` resolver).\n- **Future leadership** evaluating whether the policy still fits when the\n  AI tool landscape shifts.\n\n## Success criteria\n\n- [ ] Reader can decide in under a minute whether a given change is\n      substantive or trivial.\n- [ ] Reader can run a session that produces (a) the artefact change and\n      (b) a session log of the right shape.\n- [ ] Reader can write a session log that captures intent, outcome,\n      decisions, files changed, follow-ups, and cross-links — without\n      degenerating into a transcript.\n- [ ] Reviewers know to inspect both the diff *and* the session log.\n- [ ] Reader sees the policy is tool-agnostic and survives Claude Code →\n      Codex CLI → successor transitions.\n\n- [ ] Vocabulary appears only as appendix reference material and does\n      not interrupt the opening decision flow.\n\n## Non-goals\n\n- Dictating which AI tool authors use.\n- Removing human accountability — the diff still goes through review.\n- Replacing direct editing of code or content outside `_journals/`.\n- Build-time enforcement (compliance currently relies on author honesty).\n- Replacing [Spec-Driven Authoring as a Lightweight Default for Posts](spec-driven-authoring.html) — the spec is *per post*; the session\n  log is *per session*.\n\n## Open questions\n\n- When (and whether) to add build-time enforcement that PRs touching\n  `_journals/` link a session log.\n- How to handle authors who legitimately need to hand-edit large changes\n  (accessibility, offline contexts, etc.) without breaking the policy.\n- Long-term scaling of the `ai-conversations` journal (folder per author,\n  file per session) once sessions accumulate by the hundred.\n- How the curator role ([The Curator Role for Records, Principles, and Strategies](curator-role.html)) interacts with this policy when\n  curation crosses the substantive/trivial boundary.\n\n## Decision log\n\n- **2026-05-20** — Moved vocabulary from the opening flow into an\n  appendix so the main foundation record stays focused on decision,\n  rationale, and workflow.\n- **2026-05-20** — Made AI-mediated authoring **the default** rather\n  than one option among many. Considered \"AI use is optional, authors\n  choose per change\"; rejected because optional use produces uneven\n  AI-readiness across the corpus and loses the reasoning trail.\n- **2026-05-20** — Kept the policy **tool-agnostic** (Claude Code, Codex\n  CLI, successors). Considered naming Claude Code specifically;\n  rejected because the policy should survive the next CLI tool\n  generation.\n- **2026-05-20** — Carved out an **explicit trivial-fix exception**\n  rather than treating the policy as absolute. Considered hard rule\n  with no exceptions; rejected because the exception path keeps the\n  rule honest and avoids theatre for one-character fixes.\n- **2026-05-20** — Defined the **session log shape** as concise\n  summary, not transcript. Considered including raw transcripts;\n  rejected because transcripts are noise, summaries are signal, and\n  signal is what the next reader needs.\n\n## Sources\n\n- **Internal**\n  - [Markdown Records as the Default Format for Technical Decisions, Strategies, and Discussions](markdown-records.html) — the canonical format this policy assumes.\n  - [AI Coding Policy: Human Accountability with Executable Controls](../ai-decisions-log/ai-policy.html) — the broader AI coding policy this policy sits under.\n  - [The Curator Role for Records, Principles, and Strategies](curator-role.html) — companion record; the curator role works through\n    this same workflow.\n  - [Spec-Driven Authoring as a Lightweight Default for Posts](spec-driven-authoring.html) — companion record; specs and session logs\n    together capture intent (per post) and execution (per session).\n- **External**\n  - Claude Code, Codex CLI documentation — the tools this policy\n    assumes can read and edit the working tree safely.\n  - Pair-programming literature on intent, navigation, and review —\n    informs the author/agent role split.\n\n## Changelog\n\n- **2026-05-20** — Moved vocabulary in `index.md` to an end\n  appendix. *(Zeljko, AI-mediated session)*\n- **2026-05-20** — Retrofitted to 7-section template (added Decision log\n  and Sources). *(Zeljko, AI-mediated session)*\n- **2026-05-20** — Reset status to `draft`. Specs were backfilled and later cleaned up; keep them current during substantive post edits. (Previously demonstrated as\n  `drifted` for the rendering prototype; that fiction has been cleared.)\n  *(Zeljko, AI-mediated session)*\n- **2026-05-17** — Backfilled spec after the post existed. *(Zeljko,\n  AI-mediated session)*\n"}]}</script>
<script>
    (function () {
        const data = JSON.parse(document.getElementById('data').textContent);
        const root = document.getElementById('content');

        const postId = (data.meta && data.meta.id) ? String(data.meta.id) : '';
        const postStatusRaw = (data.meta && data.meta.status) ? String(data.meta.status) : '';
        if (postId || postStatusRaw) {
            const header = document.getElementById('post-header');
            let sectionEl = header.querySelector('p.section');
            if (!sectionEl) {
                sectionEl = document.createElement('p');
                sectionEl.className = 'section';
                header.insertBefore(sectionEl, header.firstChild);
            }
            // Status pill goes first, then a " / " separator before the existing
            // content (section name and/or id).
            if (postStatusRaw) {
                const parts = postStatusRaw.split(':');
                const statusName = parts[0].trim();
                const statusColor = (parts[1] || '').trim();
                const wrap = document.createElement('span');
                wrap.className = 'post-status';
                const dot = document.createElement('span');
                dot.className = 'status-dot';
                if (statusColor) dot.style.background = statusColor;
                wrap.appendChild(dot);
                wrap.appendChild(document.createTextNode(statusName));
                if (sectionEl.firstChild) {
                    sectionEl.insertBefore(document.createTextNode(' • '), sectionEl.firstChild);
                    sectionEl.insertBefore(wrap, sectionEl.firstChild);
                } else {
                    sectionEl.appendChild(wrap);
                }
            }
            if (postId) {
                if (sectionEl.firstChild) sectionEl.appendChild(document.createTextNode(' • '));
                sectionEl.appendChild(document.createTextNode(postId));
            }
        }

        const tagsHost = document.getElementById('tags');
        (data.tags || []).forEach(function (t) {
            const span = document.createElement('span');
            span.className = 'tag';
            span.textContent = t;
            tagsHost.appendChild(span);
        });

        // Minimal markdown renderer. Supports: ATX headings, paragraphs, blockquotes,
        // unordered/ordered lists, fenced code, inline code, bold/italic/strikethrough, links, images, hr.
        // Sufficient for the posts in this repo; replace with a fuller parser if needed.
        function renderMarkdown(src) {
            const lines = src.replace(/\r\n/g, '\n').split('\n');
            const out = [];
            let i = 0;

            const bullet = /^(\s*)([-*])\s+(.*)$/;
            const ordered = /^(\s*)(\d+)\.\s+(.*)$/;
            const tableRow = /^\s*\|(.+)\|\s*$/;
            const tableSep = /^\s*\|?\s*:?-{3,}:?\s*(\|\s*:?-{3,}:?\s*)+\|?\s*$/;

            function splitRow(s) {
                let t = s.trim();
                if (t.startsWith('|')) t = t.slice(1);
                if (t.endsWith('|')) t = t.slice(0, -1);
                return t.split('|').map(c => c.trim());
            }

            function inline(s) {
                // Posts are trusted content, so raw HTML passes through unescaped
                // (some posts embed inline <blockquote>, <div>, etc.).
                // Stray ampersands still get fixed up.
                s = s.replace(/&(?![a-zA-Z]+;|#\d+;)/g, '&amp;');
                s = s.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img alt="$1" src="$2">');
                s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
                s = s.replace(/`([^`]+)`/g, function (_, c) {
                    return '<code>' + c.replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</code>';
                });
                s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
                s = s.replace(/~~([^~\n]+)~~/g, '<del>$1</del>');
                s = s.replace(/(^|[^*])\*([^*\n]+)\*/g, '$1<em>$2</em>');
                return s;
            }

            while (i < lines.length) {
                const line = lines[i];
                if (!line.trim()) {
                    i++;
                    continue;
                }

                const fence = line.match(/^```(\w*)\s*$/);
                if (fence) {
                    i++;
                    const buf = [];
                    while (i < lines.length && !/^```\s*$/.test(lines[i])) {
                        buf.push(lines[i]);
                        i++;
                    }
                    i++;
                    const escaped = buf.join('\n').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                    const cls = fence[1] ? ' class="lang-' + fence[1] + '"' : '';
                    out.push('<pre><code' + cls + '>' + escaped + '</code></pre>');
                    continue;
                }

                const h = line.match(/^(#{1,6})\s+(.*)$/);
                if (h) {
                    out.push('<h' + h[1].length + '>' + inline(h[2]) + '</h' + h[1].length + '>');
                    i++;
                    continue;
                }

                if (/^\s*(?:-\s*){3,}\s*$/.test(line) || /^\s*\*{3,}\s*$/.test(line)) {
                    out.push('<hr>');
                    i++;
                    continue;
                }

                if (/^>\s?/.test(line)) {
                    const buf = [];
                    while (i < lines.length && /^>\s?/.test(lines[i])) {
                        buf.push(lines[i].replace(/^>\s?/, ''));
                        i++;
                    }
                    out.push('<blockquote>' + renderMarkdown(buf.join('\n')) + '</blockquote>');
                    continue;
                }

                if (tableRow.test(line) && i + 1 < lines.length && tableSep.test(lines[i + 1])) {
                    const headers = splitRow(line);
                    i += 2;
                    const rows = [];
                    while (i < lines.length && tableRow.test(lines[i])) {
                        rows.push(splitRow(lines[i]));
                        i++;
                    }
                    let html = '<table><thead><tr>';
                    headers.forEach(h => {
                        html += '<th>' + inline(h) + '</th>';
                    });
                    html += '</tr></thead><tbody>';
                    rows.forEach(r => {
                        html += '<tr>';
                        r.forEach(c => {
                            html += '<td>' + inline(c) + '</td>';
                        });
                        html += '</tr>';
                    });
                    html += '</tbody></table>';
                    out.push(html);
                    continue;
                }

                if (bullet.test(line) || ordered.test(line)) {
                    // Indent of the first bullet defines this list's base level.
                    // Deeper-indented bullets become nested lists (rendered by
                    // recursing into renderMarkdown). Same-or-less indent at a
                    // bullet starts a sibling item (or ends the list).
                    const firstMatch = line.match(bullet) || line.match(ordered);
                    const baseIndent = firstMatch[1].length;
                    const isOrdered = ordered.test(line);
                    const items = [];
                    while (i < lines.length) {
                        const cur = lines[i];
                        if (!cur.trim()) {
                            // blank line breaks the list (matches CommonMark-ish behaviour)
                            i++;
                            break;
                        }
                        const mBul = cur.match(bullet);
                        const mOrd = cur.match(ordered);
                        const m = mBul || mOrd;
                        if (!m) break;
                        if (m[1].length < baseIndent) break;
                        if (m[1].length > baseIndent) break; // shouldn't happen at top of loop
                        // Same-type check: switching between -/* and 1. closes the list
                        if (isOrdered !== !!mOrd) break;

                        const itemBuf = [m[3]];
                        const nestedBuf = [];
                        i++;
                        while (i < lines.length) {
                            const nxt = lines[i];
                            if (!nxt.trim()) break;
                            const nBul = nxt.match(bullet);
                            const nOrd = nxt.match(ordered);
                            const nm = nBul || nOrd;
                            if (nm) {
                                if (nm[1].length > baseIndent) {
                                    // nested list line — dedent and stash
                                    nestedBuf.push(nxt.slice(baseIndent + 2));
                                    i++;
                                    continue;
                                }
                                // sibling or end of list
                                break;
                            }
                            // Plain continuation text
                            if (nestedBuf.length) {
                                // continuation inside the nested block
                                nestedBuf.push(nxt.slice(baseIndent + 2));
                            } else {
                                itemBuf.push(nxt.trim());
                            }
                            i++;
                        }

                        let liHtml = inline(itemBuf.join('\n'));
                        if (nestedBuf.length) {
                            liHtml += renderMarkdown(nestedBuf.join('\n'));
                        }
                        items.push('<li>' + liHtml + '</li>');
                    }
                    out.push((isOrdered ? '<ol>' : '<ul>') + items.join('') + (isOrdered ? '</ol>' : '</ul>'));
                    continue;
                }

                const buf = [line];
                i++;
                while (i < lines.length && lines[i].trim() && !/^#{1,6}\s/.test(lines[i]) && !/^>\s?/.test(lines[i]) && !bullet.test(lines[i]) && !ordered.test(lines[i]) && !/^```/.test(lines[i]) && !tableRow.test(lines[i])) {
                    buf.push(lines[i]);
                    i++;
                }
                out.push('<p>' + inline(buf.join(' ')) + '</p>');
            }
            return out.join('\n');
        }

        // Block dispatcher. New block types plug in here.
        const renderers = {
            markdown: function (block) {
                const div = document.createElement('div');
                div.innerHTML = renderMarkdown(block.content);
                return div;
            },
            mermaid: function (block) {
                // Mermaid scans elements with class "mermaid" whose textContent
                // is the diagram source. We collect these nodes and run
                // mermaid.run() once after all blocks are in the DOM.
                const div = document.createElement('div');
                div.className = 'mermaid';
                div.textContent = block.content;
                return div;
            },
            'force-graph': function (block) {
                // build.py emits parsed JSON: {nodes:[{id,size}], links:[{source,target}]}.
                // We instantiate force-graph after the container is in the DOM
                // so it can measure its own width.
                const div = document.createElement('div');
                div.className = 'force-graph';
                const data = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.ForceGraph) return;
                    const maxSize = data.nodes.reduce((m, n) => Math.max(m, n.size || 1), 1);
                    window.ForceGraph()(div)
                        .graphData(data)
                        .width(div.clientWidth)
                        .height(div.clientHeight)
                        .nodeRelSize(4)
                        .nodeVal(n => Math.max(20 * (n.size || 1) / maxSize, 0.001))
                        .nodeLabel(n => n.id + ' (' + (n.size || 1) + ')')
                        .nodeColor(() => 'rgba(135, 206, 235, 0.7)')
                        .linkColor(() => 'rgba(60, 60, 60, 0.4)')
                        .linkDirectionalArrowLength(4)
                        .linkDirectionalArrowRelPos(1)
                        .linkWidth(1);
                });
                return div;
            },
            'bubble-chart': function (block) {
                // build.py emits {nodes:[{name,size}]}. Renders a D3 circle-pack
                // SVG (same shape as the obren.io reference, just inline).
                const wrap = document.createElement('div');
                wrap.className = 'bubble-chart';
                const payload = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.d3) return;
                    const diameter = 480;
                    const fill = '#c0deed';
                    const textColor = '#111111';
                    const fontSize = 12;

                    const svg = window.d3.select(wrap).append('svg')
                        .attr('viewBox', '0 0 ' + diameter + ' ' + diameter)
                        .attr('width', diameter)
                        .attr('height', diameter);

                    const root = window.d3.hierarchy({children: payload.nodes})
                        .sum(d => d.size || 0)
                        .sort((a, b) => b.value - a.value);

                    window.d3.pack().size([diameter, diameter]).padding(2)(root);

                    const node = svg.selectAll('g')
                        .data(root.leaves())
                        .enter().append('g')
                        .attr('transform', d => 'translate(' + d.x + ',' + d.y + ')');

                    node.append('title').text(d => d.data.name + ': ' + d.value);
                    node.append('circle').attr('r', d => d.r).style('fill', fill);
                    node.append('text')
                        .attr('dy', '.3em')
                        .style('text-anchor', 'middle')
                        .style('fill', textColor)
                        .style('font-size', fontSize + 'px')
                        .text(d => d.data.name.substring(0, Math.max(0, Math.floor(d.r / 3))));
                });
                return wrap;
            }
        };

        const mermaidNodes = [];
        data.blocks.forEach(function (block) {
            const r = renderers[block.type];
            if (!r) {
                const pre = document.createElement('pre');
                pre.textContent = '[unknown block type: ' + block.type + ']';
                root.appendChild(pre);
                return;
            }
            const node = r(block);
            if (node instanceof Node) {
                root.appendChild(node);
                if (block.type === 'mermaid') mermaidNodes.push(node);
            }
        });

        if (mermaidNodes.length && window.mermaid) {
            window.mermaid.initialize({startOnLoad: false, theme: 'default'});
            window.mermaid.run({nodes: mermaidNodes});
        }
    })();
</script>
