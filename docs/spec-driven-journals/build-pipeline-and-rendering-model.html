<script id="data" type="application/json">{"meta": {"title": "Build Pipeline and Rendering Model", "date": "2026-05-22", "author": "by Željko Obrenović (obren.io)", "permalink": "build-pipeline-and-rendering-model", "timetoread": "9 min", "excerpt": "The journal build is intentionally small: Python collects source into structured JSON payloads, templates embed those payloads, and browser-side JavaScript renders markdown, links, images, diagrams, and custom blocks.", "tags": "implementation, build, rendering, static site", "icon": "assets/icons/build-pipeline-and-rendering-model.png", "logo": "assets/images/build-pipeline-and-rendering-model/logo.jpeg", "logo_credit": "Image generated by Google Gemini (gemini-3-pro-image-preview)"}, "tags": ["implementation", "build", "rendering", "static site"], "blocks": [{"type": "markdown", "content": "> The journal build is intentionally small: Python collects source into structured JSON payloads, templates embed those payloads, and browser-side JavaScript renders markdown, links, images, diagrams, and custom blocks.\n\nThe build pipeline is the implementation heart of [Spec-Driven Journals](https://github.com/zeljkoobrenovic/spec-driven-journals).\n\nIt is deliberately modest. The generator does not try to be a general static-site framework. It reads a narrow source shape, writes predictable HTML files, and lets shared templates handle browser-side rendering.\n\nThe previous articles describe what authors edit. This article describes what the system does with that source. Read it as a set of contracts rather than as a line-by-line walkthrough of every helper function.\n\n## The Pipeline\n\nAt a high level, `_wiring/build.py` does this:\n\n1. Walk `_journals/`.\n2. Skip directories without `config.yaml`.\n3. Parse each journal config.\n4. Read the posts listed in each section.\n5. Parse front matter and markdown body.\n6. Rewrite `assets/...` paths.\n7. Resolve double-bracket permalink cross-links.\n8. Split custom fenced blocks from markdown.\n9. Merge per-post assets into generated journal assets.\n10. Render post pages, spec pages, and the journal index.\n11. Write output under `docs/<journal>/`.\n\nThe successful build line looks like:\n\n```text\n[built] spec-driven-journals -> docs/spec-driven-journals\n```\n\nIn Spec-Driven Journals, that generated output is published as the [Spec-Driven Journals site](https://zeljkoobrenovic.github.io/spec-driven-journals/), while the source and generator live in the [Spec-Driven Journals repository](https://github.com/zeljkoobrenovic/spec-driven-journals).\n\n![Journal build pipeline](assets/images/journal-build-pipeline.png)\n*Illustration placeholder: `journal-build-pipeline.png` should show `_journals/`, `config.yaml`, posts, specs, and assets flowing through `_wiring/build.py` into JSON payloads, templates, and generated `docs/` pages.*\n\n## Config Is Parsed By A Tiny YAML Subset\n\nSpec-Driven Journals does not depend on PyYAML.\n\n`build.py` includes a small parser that supports the config shape Spec-Driven Journals uses:\n\n- scalar key/value pairs\n- lists of strings\n- lists of mappings\n- quoted strings\n\nThat is enough for `config.yaml`, but it is not a full YAML implementation. This is a deliberate tradeoff: fewer dependencies, less install friction, and a smaller contract.\n\nThe implication is practical. If a future journal needs advanced YAML features, either avoid them or improve the parser deliberately.\n\n## Posts Become Payloads\n\nEach post becomes a JSON payload shaped like this:\n\n```json\n{\n  \"meta\": {},\n  \"tags\": [],\n  \"blocks\": [\n    {\"type\": \"markdown\", \"content\": \"...\"}\n  ]\n}\n```\n\nThe `meta` object comes from front matter. `tags` is parsed from the comma-separated `tags:` field. `blocks` contains markdown plus any custom block types extracted by the build.\n\nThis payload is embedded into the generated HTML inside:\n\n```html\n<script id=\"data\" type=\"application/json\">...<\/script>\n```\n\nThe browser-side renderer reads that JSON and builds the page.\n\n## Templates Use Placeholder Substitution\n\nThe templates are not Jinja, React, or a server-side rendering framework.\n\nThey use plain string placeholders:\n\n| Template | Important placeholders |\n| --- | --- |\n| `_templates/index.html` | `__TITLE__`, `__DESCRIPTION__`, `__JOURNAL__`, `__LOGO_HTML__`, `__DATA_JSON__` |\n| `_templates/post.html` | `__TITLE__`, `__SECTION_HTML__`, `__BYLINE__`, `__LOGO_HTML__`, `__POST_NAV__`, `__DATA_JSON__` |\n\nThis keeps the Python side easy to inspect. It also means template changes should be made carefully: a misspelled placeholder is not caught by a template engine.\n\n## Specs Are Rendered With The Same Template\n\nWhen a post folder has `spec.md`, the build renders a sibling page:\n\n```text\ndocs/<journal>/<permalink>.spec.html\n```\n\nThe post page gets a \"View spec\" link in the byline. The spec page uses the same post template, the same markdown renderer, and the same cross-link logic.\n\nSpec front matter controls the status chip:\n\n```markdown\n---\nstatus: draft\nrevised: 2026-05-22\n---\n```\n\nIf a spec is marked `drifted` or `superseded`, the post's spec link is decorated so readers see that the contract may no longer match.\n\n## Navigation Comes From Config Order\n\nThe build creates previous/next navigation from the flattened post order in `config.yaml`.\n\nThis is why the per-post folder layout matters. All listed paths end in `index.md`, so sorting by basename does not disturb config order. The config becomes the reading sequence.\n\n## Rendering Happens In The Browser\n\n`_templates/post.html` contains a small markdown renderer.\n\nIt supports:\n\n- ATX headings\n- paragraphs\n- blockquotes\n- fenced code blocks\n- inline code\n- bold, italic, strikethrough\n- links\n- images\n- ordered and unordered lists\n- horizontal rules\n- GitHub-flavored tables\n\nThe renderer treats post content as trusted. Raw HTML is allowed to pass through because some posts embed custom HTML.\n\nThat trust assumption is important. Spec-Driven Journals is not currently designed for untrusted public user submissions.\n\n## Why The Split Works\n\nThe Python side handles filesystem and source concerns:\n\n- read files\n- parse config\n- rewrite asset paths\n- resolve cross-links\n- copy assets\n- emit generated HTML\n\nThe browser side handles presentation concerns:\n\n- render markdown\n- render tags\n- initialize Mermaid\n- render force graphs\n- render bubble charts\n- handle custom block renderers\n\nThis split keeps the build script small and makes renderer changes visible in one template.\n\n## What To Preserve\n\nThe most important implementation contract is the payload envelope:\n\n```json\n{\"type\": \"...\", \"content\": \"...\"}\n```\n\nNew block types can be added, but the dispatcher expects that envelope. Changing it would require coordinated changes in `build.py` and `_templates/post.html`.\n\nThe system is easy to extend because the contract is small. It stays easy only if extensions keep that contract clear.\n"}]}</script>
<script>
    (function () {
        const data = JSON.parse(document.getElementById('data').textContent);
        const root = document.getElementById('content');

        const postId = (data.meta && data.meta.id) ? String(data.meta.id) : '';
        const postStatusRaw = (data.meta && data.meta.status) ? String(data.meta.status) : '';
        if (postId || postStatusRaw) {
            const header = document.getElementById('post-header');
            let sectionEl = header.querySelector('p.section');
            if (!sectionEl) {
                sectionEl = document.createElement('p');
                sectionEl.className = 'section';
                header.insertBefore(sectionEl, header.firstChild);
            }
            // Status pill goes first, then a " / " separator before the existing
            // content (section name and/or id).
            if (postStatusRaw) {
                const parts = postStatusRaw.split(':');
                const statusName = parts[0].trim();
                const statusColor = (parts[1] || '').trim();
                const wrap = document.createElement('span');
                wrap.className = 'post-status';
                const dot = document.createElement('span');
                dot.className = 'status-dot';
                if (statusColor) dot.style.background = statusColor;
                wrap.appendChild(dot);
                wrap.appendChild(document.createTextNode(statusName));
                if (sectionEl.firstChild) {
                    sectionEl.insertBefore(document.createTextNode(' • '), sectionEl.firstChild);
                    sectionEl.insertBefore(wrap, sectionEl.firstChild);
                } else {
                    sectionEl.appendChild(wrap);
                }
            }
            if (postId) {
                if (sectionEl.firstChild) sectionEl.appendChild(document.createTextNode(' • '));
                sectionEl.appendChild(document.createTextNode(postId));
            }
        }

        const tagsHost = document.getElementById('tags');
        (data.tags || []).forEach(function (t) {
            const span = document.createElement('span');
            span.className = 'tag';
            span.textContent = t;
            tagsHost.appendChild(span);
        });

        // Minimal markdown renderer. Supports: ATX headings, paragraphs, blockquotes,
        // unordered/ordered lists, fenced code, inline code, bold/italic/strikethrough, links, images, hr.
        // Sufficient for the posts in this repo; replace with a fuller parser if needed.
        function renderMarkdown(src) {
            const lines = src.replace(/\r\n/g, '\n').split('\n');
            const out = [];
            let i = 0;

            const bullet = /^(\s*)([-*])\s+(.*)$/;
            const ordered = /^(\s*)(\d+)\.\s+(.*)$/;
            const tableRow = /^\s*\|(.+)\|\s*$/;
            const tableSep = /^\s*\|?\s*:?-{3,}:?\s*(\|\s*:?-{3,}:?\s*)+\|?\s*$/;

            function splitRow(s) {
                let t = s.trim();
                if (t.startsWith('|')) t = t.slice(1);
                if (t.endsWith('|')) t = t.slice(0, -1);
                return t.split('|').map(c => c.trim());
            }

            function inline(s) {
                // Posts are trusted content, so raw HTML passes through unescaped
                // (some posts embed inline <blockquote>, <div>, etc.).
                // Stray ampersands still get fixed up.
                s = s.replace(/&(?![a-zA-Z]+;|#\d+;)/g, '&amp;');
                s = s.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<a class="image-link" href="$2" target="_blank" rel="noopener noreferrer"><img alt="$1" src="$2"></a>');
                s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
                s = s.replace(/`([^`]+)`/g, function (_, c) {
                    return '<code>' + c.replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</code>';
                });
                s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
                s = s.replace(/~~([^~\n]+)~~/g, '<del>$1</del>');
                s = s.replace(/(^|[^*])\*([^*\n]+)\*/g, '$1<em>$2</em>');
                return s;
            }

            while (i < lines.length) {
                const line = lines[i];
                if (!line.trim()) {
                    i++;
                    continue;
                }

                const fence = line.match(/^```(\w*)\s*$/);
                if (fence) {
                    i++;
                    const buf = [];
                    while (i < lines.length && !/^```\s*$/.test(lines[i])) {
                        buf.push(lines[i]);
                        i++;
                    }
                    i++;
                    const escaped = buf.join('\n').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                    const cls = fence[1] ? ' class="lang-' + fence[1] + '"' : '';
                    out.push('<pre><code' + cls + '>' + escaped + '</code></pre>');
                    continue;
                }

                const h = line.match(/^(#{1,6})\s+(.*)$/);
                if (h) {
                    out.push('<h' + h[1].length + '>' + inline(h[2]) + '</h' + h[1].length + '>');
                    i++;
                    continue;
                }

                if (/^\s*(?:-\s*){3,}\s*$/.test(line) || /^\s*\*{3,}\s*$/.test(line)) {
                    out.push('<hr>');
                    i++;
                    continue;
                }

                if (/^>\s?/.test(line)) {
                    const buf = [];
                    while (i < lines.length && /^>\s?/.test(lines[i])) {
                        buf.push(lines[i].replace(/^>\s?/, ''));
                        i++;
                    }
                    out.push('<blockquote>' + renderMarkdown(buf.join('\n')) + '</blockquote>');
                    continue;
                }

                if (tableRow.test(line) && i + 1 < lines.length && tableSep.test(lines[i + 1])) {
                    const headers = splitRow(line);
                    i += 2;
                    const rows = [];
                    while (i < lines.length && tableRow.test(lines[i])) {
                        rows.push(splitRow(lines[i]));
                        i++;
                    }
                    let html = '<table><thead><tr>';
                    headers.forEach(h => {
                        html += '<th>' + inline(h) + '</th>';
                    });
                    html += '</tr></thead><tbody>';
                    rows.forEach(r => {
                        html += '<tr>';
                        r.forEach(c => {
                            html += '<td>' + inline(c) + '</td>';
                        });
                        html += '</tr>';
                    });
                    html += '</tbody></table>';
                    out.push(html);
                    continue;
                }

                if (bullet.test(line) || ordered.test(line)) {
                    // Indent of the first bullet defines this list's base level.
                    // Deeper-indented bullets become nested lists (rendered by
                    // recursing into renderMarkdown). Same-or-less indent at a
                    // bullet starts a sibling item (or ends the list).
                    const firstMatch = line.match(bullet) || line.match(ordered);
                    const baseIndent = firstMatch[1].length;
                    const isOrdered = ordered.test(line);
                    const items = [];
                    while (i < lines.length) {
                        const cur = lines[i];
                        if (!cur.trim()) {
                            // blank line breaks the list (matches CommonMark-ish behaviour)
                            i++;
                            break;
                        }
                        const mBul = cur.match(bullet);
                        const mOrd = cur.match(ordered);
                        const m = mBul || mOrd;
                        if (!m) break;
                        if (m[1].length < baseIndent) break;
                        if (m[1].length > baseIndent) break; // shouldn't happen at top of loop
                        // Same-type check: switching between -/* and 1. closes the list
                        if (isOrdered !== !!mOrd) break;

                        const itemBuf = [m[3]];
                        const nestedBuf = [];
                        i++;
                        while (i < lines.length) {
                            const nxt = lines[i];
                            if (!nxt.trim()) break;
                            const nBul = nxt.match(bullet);
                            const nOrd = nxt.match(ordered);
                            const nm = nBul || nOrd;
                            if (nm) {
                                if (nm[1].length > baseIndent) {
                                    // nested list line — dedent and stash
                                    nestedBuf.push(nxt.slice(baseIndent + 2));
                                    i++;
                                    continue;
                                }
                                // sibling or end of list
                                break;
                            }
                            // Plain continuation text
                            if (nestedBuf.length) {
                                // continuation inside the nested block
                                nestedBuf.push(nxt.slice(baseIndent + 2));
                            } else {
                                itemBuf.push(nxt.trim());
                            }
                            i++;
                        }

                        let liHtml = inline(itemBuf.join('\n'));
                        if (nestedBuf.length) {
                            liHtml += renderMarkdown(nestedBuf.join('\n'));
                        }
                        items.push('<li>' + liHtml + '</li>');
                    }
                    out.push((isOrdered ? '<ol>' : '<ul>') + items.join('') + (isOrdered ? '</ol>' : '</ul>'));
                    continue;
                }

                const buf = [line];
                i++;
                while (i < lines.length && lines[i].trim() && !/^#{1,6}\s/.test(lines[i]) && !/^>\s?/.test(lines[i]) && !bullet.test(lines[i]) && !ordered.test(lines[i]) && !/^```/.test(lines[i]) && !tableRow.test(lines[i])) {
                    buf.push(lines[i]);
                    i++;
                }
                out.push('<p>' + inline(buf.join(' ')) + '</p>');
            }
            return out.join('\n');
        }

        // Block dispatcher. New block types plug in here.
        const renderers = {
            markdown: function (block) {
                const div = document.createElement('div');
                div.innerHTML = renderMarkdown(block.content);
                return div;
            },
            mermaid: function (block) {
                // Mermaid scans elements with class "mermaid" whose textContent
                // is the diagram source. We collect these nodes and run
                // mermaid.run() once after all blocks are in the DOM.
                const div = document.createElement('div');
                div.className = 'mermaid';
                div.textContent = block.content;
                return div;
            },
            'force-graph': function (block) {
                // build.py emits parsed JSON: {nodes:[{id,size}], links:[{source,target}]}.
                // We instantiate force-graph after the container is in the DOM
                // so it can measure its own width.
                const div = document.createElement('div');
                div.className = 'force-graph';
                const data = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.ForceGraph) return;
                    const maxSize = data.nodes.reduce((m, n) => Math.max(m, n.size || 1), 1);
                    window.ForceGraph()(div)
                        .graphData(data)
                        .width(div.clientWidth)
                        .height(div.clientHeight)
                        .nodeRelSize(4)
                        .nodeVal(n => Math.max(20 * (n.size || 1) / maxSize, 0.001))
                        .nodeLabel(n => n.id + ' (' + (n.size || 1) + ')')
                        .nodeColor(() => 'rgba(135, 206, 235, 0.7)')
                        .linkColor(() => 'rgba(60, 60, 60, 0.4)')
                        .linkDirectionalArrowLength(4)
                        .linkDirectionalArrowRelPos(1)
                        .linkWidth(1);
                });
                return div;
            },
            'bubble-chart': function (block) {
                // build.py emits {nodes:[{name,size}]}. Renders a D3 circle-pack
                // SVG (same shape as the obren.io reference, just inline).
                const wrap = document.createElement('div');
                wrap.className = 'bubble-chart';
                const payload = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.d3) return;
                    const diameter = 480;
                    const fill = '#c0deed';
                    const textColor = '#111111';
                    const fontSize = 12;

                    const svg = window.d3.select(wrap).append('svg')
                        .attr('viewBox', '0 0 ' + diameter + ' ' + diameter)
                        .attr('width', diameter)
                        .attr('height', diameter);

                    const root = window.d3.hierarchy({children: payload.nodes})
                        .sum(d => d.size || 0)
                        .sort((a, b) => b.value - a.value);

                    window.d3.pack().size([diameter, diameter]).padding(2)(root);

                    const node = svg.selectAll('g')
                        .data(root.leaves())
                        .enter().append('g')
                        .attr('transform', d => 'translate(' + d.x + ',' + d.y + ')');

                    node.append('title').text(d => d.data.name + ': ' + d.value);
                    node.append('circle').attr('r', d => d.r).style('fill', fill);
                    node.append('text')
                        .attr('dy', '.3em')
                        .style('text-anchor', 'middle')
                        .style('fill', textColor)
                        .style('font-size', fontSize + 'px')
                        .text(d => d.data.name.substring(0, Math.max(0, Math.floor(d.r / 3))));
                });
                return wrap;
            }
        };

        const mermaidNodes = [];
        data.blocks.forEach(function (block) {
            const r = renderers[block.type];
            if (!r) {
                const pre = document.createElement('pre');
                pre.textContent = '[unknown block type: ' + block.type + ']';
                root.appendChild(pre);
                return;
            }
            const node = r(block);
            if (node instanceof Node) {
                root.appendChild(node);
                if (block.type === 'mermaid') mermaidNodes.push(node);
            }
        });

        if (mermaidNodes.length && window.mermaid) {
            window.mermaid.initialize({startOnLoad: false, theme: 'default'});
            window.mermaid.run({nodes: mermaidNodes});
        }
    })();
</script>
</body>
</html>
