<script id="data" type="application/json">{"meta": {"title": "Build Pipeline and Rendering Model", "date": "2026-05-22", "author": "by Željko Obrenović (obren.io)", "permalink": "build-pipeline-and-rendering-model", "timetoread": "9 min", "excerpt": "The journal build is intentionally small: Python collects source into structured JSON payloads, templates embed those payloads, and browser-side JavaScript renders markdown, links, images, diagrams, and custom blocks.", "tags": "implementation, build, rendering, static site", "icon": "assets/icons/build-pipeline-and-rendering-model.png", "logo": "assets/images/build-pipeline-and-rendering-model/logo.jpeg", "logo_credit": "Image generated by Google Gemini (gemini-3-pro-image-preview)"}, "tags": ["implementation", "build", "rendering", "static site"], "modalities": [{"key": "index", "label": "Article", "meta": {}, "blocks": [{"type": "markdown", "content": "> The journal build is intentionally small: Python collects source into structured JSON payloads, templates embed those payloads, and browser-side JavaScript renders markdown, links, images, diagrams, and custom blocks.\n\nThe build pipeline is the implementation heart of [Spec-Driven Journals](https://github.com/zeljkoobrenovic/spec-driven-journals).\n\nIt is deliberately modest. The generator does not try to be a general static-site framework. It reads a narrow source shape, writes predictable HTML files, and lets shared templates handle browser-side rendering.\n\nThe previous articles describe what authors edit. This article describes what the system does with that source. Read it as a set of contracts rather than as a line-by-line walkthrough of every helper function.\n\n## The Pipeline\n\nAt a high level, `_wiring/build.py` does this:\n\n1. Walk `_journals/`.\n2. Skip directories without `config.yaml`.\n3. Parse each journal config.\n4. Read the posts listed in each section.\n5. Parse front matter and markdown body.\n6. Collect sibling modality files (`summary.md`, `dialog.md`, `comics.md`) when present.\n7. Rewrite `assets/...` paths in every modality body.\n8. Resolve double-bracket permalink cross-links.\n9. Split custom fenced blocks from markdown.\n10. Merge per-post assets into generated journal assets.\n11. Render post pages (with modality tabs), spec pages, and the journal index.\n12. Write output under `docs/<journal>/`.\n\nThe successful build line looks like:\n\n```text\n[built] spec-driven-journals -> docs/spec-driven-journals\n```\n\nIn Spec-Driven Journals, that generated output is published as the [Spec-Driven Journals site](https://zeljkoobrenovic.github.io/spec-driven-journals/), while the source and generator live in the [Spec-Driven Journals repository](https://github.com/zeljkoobrenovic/spec-driven-journals).\n\n![Journal build pipeline](assets/images/journal-build-pipeline.png)\n*Illustration placeholder: `journal-build-pipeline.png` should show `_journals/`, `config.yaml`, posts, specs, and assets flowing through `_wiring/build.py` into JSON payloads, templates, and generated `docs/` pages.*\n\n## Config Is Parsed By A Tiny YAML Subset\n\nSpec-Driven Journals does not depend on PyYAML.\n\n`build.py` includes a small parser that supports the config shape Spec-Driven Journals uses:\n\n- scalar key/value pairs\n- lists of strings\n- lists of mappings\n- quoted strings\n\nThat is enough for `config.yaml`, but it is not a full YAML implementation. This is a deliberate tradeoff: fewer dependencies, less install friction, and a smaller contract.\n\nThe implication is practical. If a future journal needs advanced YAML features, either avoid them or improve the parser deliberately.\n\n## Posts Become Payloads\n\nEach post becomes a JSON payload shaped like this:\n\n```json\n{\n  \"meta\": {},\n  \"tags\": [],\n  \"modalities\": [\n    {\n      \"key\": \"index\",\n      \"label\": \"Article\",\n      \"meta\": {},\n      \"blocks\": [\n        {\"type\": \"markdown\", \"content\": \"...\"}\n      ]\n    }\n  ]\n}\n```\n\nThe `meta` object comes from front matter. `tags` is parsed from the comma-separated `tags:` field. `modalities` holds one entry per doc the post ships — the article plus any sibling `summary.md`, `dialog.md`, or `comics.md` (registry: `_MODALITIES` in `build.py`; list order is tab order). Each modality's `blocks` contains markdown plus any custom block types extracted by the build.\n\nA plain post has exactly one modality, and the renderer shows no tab bar — the page looks like a single-article page. With more than one modality, the renderer shows a tab bar; the article is the default tab, non-default tabs render lazily on first activation, and the URL hash (`#summary`, `#dialog`, `#comics`) deep-links a tab.\n\nThis payload is embedded into the generated HTML inside:\n\n```html\n<script id=\"data\" type=\"application/json\">...<\/script>\n```\n\nThe browser-side renderer reads that JSON and builds the page.\n\n## Templates Use Placeholder Substitution\n\nThe templates are not Jinja, React, or a server-side rendering framework.\n\nThey use plain string placeholders:\n\n| Template | Important placeholders |\n| --- | --- |\n| `_templates/index.html` | `__TITLE__`, `__DESCRIPTION__`, `__JOURNAL__`, `__LOGO_HTML__`, `__DATA_JSON__` |\n| `_templates/post.html` | `__TITLE__`, `__SECTION_HTML__`, `__BYLINE__`, `__LOGO_HTML__`, `__POST_NAV__`, `__DATA_JSON__` |\n\nThis keeps the Python side easy to inspect. It also means template changes should be made carefully: a misspelled placeholder is not caught by a template engine.\n\n## Specs Are Rendered With The Same Template\n\nWhen a post folder has `spec.md`, the build renders a sibling page:\n\n```text\ndocs/<journal>/<permalink>.spec.html\n```\n\nThe post page gets a \"View spec\" link in the byline. The spec page uses the same post template, the same markdown renderer, and the same cross-link logic. Internally the spec payload is a single-modality payload, which is why spec pages never show a tab bar — the renderer has one code path for both cases.\n\nSpec front matter controls the status chip:\n\n```markdown\n---\nstatus: draft\nrevised: 2026-05-22\n---\n```\n\nIf a spec is marked `drifted` or `superseded`, the post's spec link is decorated so readers see that the contract may no longer match.\n\n## Navigation Comes From Config Order\n\nThe build creates previous/next navigation from the flattened post order in `config.yaml`.\n\nThis is why the per-post folder layout matters. All listed paths end in `index.md`, so sorting by basename does not disturb config order. The config becomes the reading sequence.\n\n## Rendering Happens In The Browser\n\n`_templates/post.html` contains a small markdown renderer.\n\nIt supports:\n\n- ATX headings\n- paragraphs\n- blockquotes\n- fenced code blocks\n- inline code\n- bold, italic, strikethrough\n- links\n- images\n- ordered and unordered lists\n- horizontal rules\n- GitHub-flavored tables\n\nThe renderer treats post content as trusted. Raw HTML is allowed to pass through because some posts embed custom HTML.\n\nThat trust assumption is important. Spec-Driven Journals is not currently designed for untrusted public user submissions.\n\n## Why The Split Works\n\nThe Python side handles filesystem and source concerns:\n\n- read files\n- parse config\n- rewrite asset paths\n- resolve cross-links\n- copy assets\n- emit generated HTML\n\nThe browser side handles presentation concerns:\n\n- render markdown\n- render tags\n- render modality tabs and lazily render non-default panes\n- initialize Mermaid\n- render force graphs\n- render bubble charts\n- handle custom block renderers\n\nLazy pane rendering is not an optimization detail: Mermaid, force-graph, and D3 measure their container's width, which is zero inside a hidden element. Panes therefore render on first activation, after they become visible.\n\nThis split keeps the build script small and makes renderer changes visible in one template.\n\n## What To Preserve\n\nThe most important implementation contract is the block envelope:\n\n```json\n{\"type\": \"...\", \"content\": \"...\"}\n```\n\nNew block types can be added, but the dispatcher expects that envelope. Changing it would require coordinated changes in `build.py` and `_templates/post.html`. The modality layer wraps *above* this envelope — adding a modality never touches the block contract.\n\nThe system is easy to extend because the contract is small. It stays easy only if extensions keep that contract clear.\n"}]}, {"key": "summary", "label": "Summary", "meta": {"timetoread": "2 min"}, "blocks": [{"type": "markdown", "content": "The journal build is intentionally small: Python collects source into structured JSON payloads, templates embed those payloads, and browser-side JavaScript renders markdown, links, images, diagrams, and custom blocks. The generator does not try to be a general static-site framework — it reads a narrow source shape and writes predictable HTML under `docs/<journal>/`.\n\n**What changes**\n\n- The pipeline is describable end to end: `_wiring/build.py` walks `_journals/`, skips directories without `config.yaml`, parses each journal config with a tiny in-script YAML subset parser (no PyYAML), reads the posts each section lists, rewrites asset paths, resolves `[[permalink]]` cross-links, splits custom fenced blocks, merges per-post assets, and writes generated pages.\n- Every post becomes a JSON payload shaped `{meta, tags, modalities: [{key, label, meta, blocks}]}` embedded in a `<script id=\"data\" type=\"application/json\">` element. `modalities` holds one entry per doc the post ships — the article plus any sibling `summary.md`, `dialog.md`, or `comics.md`. A single-modality post shows no tab bar; with more than one, the article is the default tab, non-default tabs render lazily on first activation, and the URL hash (`#summary`, `#dialog`, `#comics`) deep-links a tab.\n- Templates use plain placeholder substitution (`__TITLE__`, `__DATA_JSON__`, ...) rather than Jinja or a framework, keeping the Python side easy to inspect.\n- Specs render through the same template and renderer: `spec.md` becomes `<permalink>.spec.html`, the post byline gets a \"View spec\" link, and `drifted`/`superseded` statuses decorate that link. Previous/next navigation comes straight from `config.yaml` order.\n- Local generated output maps directly to the public site: the same `docs/` tree the build writes is what the published journal serves.\n\n**What it costs**\n\n- The YAML parser supports only the config shape the project uses; advanced YAML features mean either avoiding them or improving the parser deliberately.\n- Placeholder substitution has no template engine to catch mistakes — a misspelled placeholder fails silently.\n- The renderer treats post content as trusted and lets raw HTML through, so the system is not designed for untrusted public submissions.\n- Lazy tab rendering is a hard requirement, not an optimization: Mermaid, force-graph, and D3 measure container width, which is zero inside a hidden pane.\n\n**What we are not doing**\n\n- No line-by-line walkthrough of `build.py` — the article documents contracts, not helper functions.\n- No reimplementation guide for the renderer, and no browser-side JavaScript tutorial.\n\nThe contract to preserve is the block envelope `{\"type\": ..., \"content\": ...}`; the modality layer wraps above it and never touches it. The Article tab covers the full pipeline, the payload model, and the rendering split — source layout is in [Anatomy of a Journal](anatomy-of-a-journal.html).\n"}]}, {"key": "dialog", "label": "Conversation", "meta": {"timetoread": "8 min listen"}, "blocks": [{"type": "markdown", "content": "## Why care about a build script?\n\n**Ben:** Ana, this one's an article about a build script. Static-site generators are a solved problem — Jekyll, Hugo, Eleventy, pick one. Why should anyone spend nine minutes reading about a homemade Python script?\n\n**Ana:** Because the post isn't pitching the script as a better generator — it says outright that it does not try to be a general static-site framework. It reads a narrow source shape, writes predictable HTML files, and lets shared templates handle browser-side rendering. The article exists so that anyone changing the build or templates — maintainer, agent operator, technical reader — understands the contracts before touching the code. It's deliberately a set of contracts, not a line-by-line walkthrough.\n\n**Ben:** \"Contracts\" is doing a lot of work in that sentence. What does the pipeline actually do?\n\n**Ana:** Twelve steps, and they fit in a breath. Walk `_journals/`. Skip directories without a `config.yaml`. Parse each journal config. Read the posts listed in each section. Parse front matter and the markdown body. Collect sibling modality files — `summary.md`, `dialog.md`, `comics.md` — when they exist. Rewrite asset paths in every modality body. Resolve the double-bracket permalink cross-links. Split custom fenced blocks out of the markdown. Merge per-post assets into the journal's generated assets. Render post pages with their modality tabs, spec pages, and the journal index. Write everything under `docs/<journal>/`. When it works, you get one line: `[built] spec-driven-journals -> docs/spec-driven-journals`.\n\n**Ben:** And that `docs/` folder is...?\n\n**Ana:** Exactly what gets published. The generated output is the public Spec-Driven Journals site; the source and the generator live in the repository. What you build locally is what readers see — there's no separate deployment transform.\n\n## A YAML parser you wrote yourself? Really?\n\n**Ben:** I noticed the script parses its own YAML. That's usually where I close the tab. PyYAML is one `pip install` away.\n\n**Ana:** And the post treats skipping it as a deliberate tradeoff, not an oversight. The in-script parser supports exactly the shape `config.yaml` uses — scalar key/value pairs, lists of strings, lists of mappings, quoted strings. That's enough. The win is fewer dependencies, less install friction, and a smaller contract. The build runs anywhere Python 3 runs.\n\n**Ben:** Until someone needs an anchor, or a multi-line string, or any of the YAML features actual YAML has.\n\n**Ana:** The article names that implication explicitly: if a future journal needs advanced YAML features, either avoid them or improve the parser deliberately. The constraint is visible and documented, which is the whole point of writing the implementation up at contract level — you learn where the edges are before you hit them.\n\n## Posts become payloads\n\n**Ben:** Okay, the part I actually want to understand: what does a post turn into?\n\n**Ana:** A JSON payload with three top-level pieces: `meta`, `tags`, and `modalities`. The `meta` object comes from front matter. `tags` is parsed from the comma-separated `tags:` field. And `modalities` is a list — one entry per doc the post ships. Each entry has a `key`, a `label`, its own `meta`, and a list of `blocks`.\n\n**Ben:** Modalities being what, exactly?\n\n**Ana:** The article, plus any sibling docs next to it. `index.md` is always there with key `index` and label \"Article\". If the post folder also has a `summary.md`, a `dialog.md`, or a `comics.md`, each becomes another modality entry — the registry is `_MODALITIES` in `build.py`, and the list order is the tab order. Inside each modality, `blocks` is markdown plus whatever custom block types the build extracted — Mermaid diagrams, force graphs, bubble charts.\n\n**Ben:** So every post page is secretly a tabbed application now? That sounds like scope creep for a \"deliberately modest\" generator.\n\n**Ana:** Here's the elegant bit: a plain post has exactly one modality, and the renderer shows no tab bar at all. The page looks like a single-article page. Only when there's more than one modality does the tab bar appear — the article is the default tab, and the URL hash deep-links the others: `#summary`, `#dialog`, `#comics`. One code path covers both cases.\n\n**Ben:** And this payload lives where?\n\n**Ana:** Embedded in the generated HTML, inside a `<script id=\"data\" type=\"application/json\">` element. The browser-side renderer reads that JSON and builds the page.\n\n**Ben:** Which brings me to my real objection. Rendering markdown in the browser, in 2026? Every other generator pre-renders to HTML. You're shipping a markdown parser to every reader.\n\n**Ana:** That's the split the post defends. The Python side handles filesystem and source concerns — read files, parse config, rewrite asset paths, resolve cross-links, copy assets, emit HTML. The browser side handles presentation — render markdown, tags, modality tabs, initialize Mermaid, render force graphs and bubble charts, dispatch custom block renderers. The result is that the build script stays small and every renderer change is visible in one template, `_templates/post.html`. You don't coordinate changes across a Python markdown library and a JavaScript diagram library; presentation lives in one place.\n\n**Ben:** Fine, but then explain \"lazy\" tab rendering. Why not render all tabs up front since the data's already on the page?\n\n**Ana:** Because of a concrete browser fact the article calls out: lazy pane rendering is not an optimization detail. Mermaid, force-graph, and D3 all measure their container's width — and inside a hidden element, that width is zero. Render a diagram into a hidden tab and you get a zero-width diagram. So non-default panes render on first activation, after they're visible. It's a correctness requirement dressed up as a performance feature.\n\n## Templates, specs, and the rest of the machine\n\n**Ben:** The templates. No Jinja, no React — just `__TITLE__`-style placeholders that get string-substituted. A misspelled placeholder just... silently ships?\n\n**Ana:** Yes, and the article is honest about that cost: there's no template engine to catch it, so template changes should be made carefully. The compensating benefit is that the Python side stays trivially easy to inspect — `index.html` takes `__TITLE__`, `__DESCRIPTION__`, `__JOURNAL__`, `__LOGO_HTML__`, `__DATA_JSON__`; `post.html` takes `__TITLE__`, `__SECTION_HTML__`, `__BYLINE__`, `__LOGO_HTML__`, `__POST_NAV__`, `__DATA_JSON__`. That's the entire templating contract, in one table.\n\n**Ben:** What about specs? This whole project is named after them.\n\n**Ana:** When a post folder has a `spec.md`, the build renders a sibling page — `<permalink>.spec.html` — and the post's byline gets a \"View spec\" link. Same template, same markdown renderer, same cross-link logic as posts. Internally, the spec payload is just a single-modality payload, which is why spec pages never show a tab bar — again, one code path. The spec's front matter drives a status chip, and if a spec is marked `drifted` or `superseded`, the post's spec link is decorated so readers see the contract may no longer match the article.\n\n**Ben:** And navigation between posts?\n\n**Ana:** Comes from config order. The build flattens the post order in `config.yaml` into previous/next navigation. That's also why the per-post folder layout matters: every listed path ends in `index.md`, so sorting by basename doesn't disturb config order. The config file *is* the reading sequence.\n\n**Ben:** One more skeptical poke. The renderer lets raw HTML pass through unescaped. That's an XSS hole with documentation.\n\n**Ana:** It's a trust assumption, stated as one. The renderer treats post content as trusted because some posts embed custom HTML, and the article flags the boundary explicitly: Spec-Driven Journals is not currently designed for untrusted public user submissions. Authors are the threat model's insiders, and they're the same people running the build.\n\n## What this article is not\n\n**Ben:** Close it out. If I change `build.py` tomorrow, what's the one thing I must not break?\n\n**Ana:** The block envelope: `{\"type\": ..., \"content\": ...}`. Every block in every modality wears it, and the dispatcher in `post.html` expects it. New block types are welcome — add a fence on the Python side, a renderer entry on the template side — but changing the envelope means coordinated changes in both files. And note the layering: the modality layer wraps *above* the envelope, so adding a whole new modality never touches the block contract. The system stays easy to extend only if extensions keep that contract clear.\n\n**Ben:** And what did the article deliberately not do?\n\n**Ana:** Three named non-goals. It's not a line-by-line walkthrough of `build.py` — the helpers aren't the point, the contracts are. It's not a reimplementation guide for the renderer. And it's not a browser-side JavaScript tutorial. If you want the source layout that feeds this pipeline, that's [Anatomy of a Journal](anatomy-of-a-journal.html); this article is about what the system does with that source once you hit build.\n\n**Ben:** A build script small enough to explain in a podcast. *(laughs)* Maybe that's the actual feature.\n\n**Ana:** The post would agree. It's easy to extend because the contract is small — and the article exists to keep it that way.\n"}]}, {"key": "comics", "label": "Comic", "meta": {"timetoread": "3 min"}, "blocks": [{"type": "markdown", "content": "<!-- comic-style\n{\n  \"cast\": \"MAYA: a pragmatic engineer-author, short dark hair, glasses, rolled-up sleeves, calm and slightly amused, often holding a marker or a printed page. REX: an over-eager boxy robot AI assistant, one bent antenna, glowing rectangular eyes, perpetually carrying or printing too many documents.\",\n  \"style\": \"Clean two-tone explainer comic, thick ink outlines, flat colors with blue/teal accents on a light cream background, generous white space, hand-lettered speech bubbles with SHORT readable text (max 8 words per bubble), simple geometric office/library/print-shop settings mixing documents with software symbols, no photorealism, no dense text, no title text.\"\n}\n-->\n\nHow a deliberately small build turns markdown folders into a published journal — in eight panels.\n\n![Comic panel: a robot wheels in a huge machine labeled FRAMEWORK while an engineer holds a small box labeled build.py.](assets/images/build-pipeline-and-rendering-model/comic-01-the-tiny-machine.jpeg)\n**Panel 1:** *The generator does not try to be a framework — it reads a narrow shape and writes predictable HTML.*\n\n![Comic panel: folders and config files ride a conveyor belt through a small build box and emerge as finished web pages.](assets/images/build-pipeline-and-rendering-model/comic-02-the-pipeline.jpeg)\n**Panel 2:** *Walk the journals, parse config, read posts, rewrite paths, resolve links, write docs/.*\n\n![Comic panel: an engineer packs an article into a box with compartments labeled meta, tags, and modalities.](assets/images/build-pipeline-and-rendering-model/comic-03-posts-become-payloads.jpeg)\n**Panel 3:** *Each post ships as JSON: meta, tags, and a list of modalities with their blocks.*\n\n![Comic panel: a robot clips folders labeled Summary, Dialog, and Comic as tabs onto a large page labeled Article.](assets/images/build-pipeline-and-rendering-model/comic-04-tabs-for-modalities.jpeg)\n**Panel 4:** *Sibling summary.md, dialog.md, and comics.md become tabs; alone, the article looks like a plain page.*\n\n![Comic panel: a robot holds a squashed flat diagram drawn inside a dark cupboard while an engineer opens the door.](assets/images/build-pipeline-and-rendering-model/comic-05-lazy-panes.jpeg)\n**Panel 5:** *Mermaid and D3 measure their container — so non-default tabs render on first activation, not before.*\n\n![Comic panel: an engineer slots labeled tiles into a template page while a robot holds a misspelled tile that does not fit.](assets/images/build-pipeline-and-rendering-model/comic-06-placeholder-templates.jpeg)\n**Panel 6:** *No Jinja, no React — just __PLACEHOLDER__ substitution, easy to inspect but unforgiving of typos.*\n\n![Comic panel: one printing press outputs a post page and a spec page with a status badge, linked by a View spec sign.](assets/images/build-pipeline-and-rendering-model/comic-07-specs-same-press.jpeg)\n**Panel 7:** *A spec.md becomes a sibling .spec.html page — same template, same renderer, status chip included.*\n\n![Comic panel: an engineer holds a small glowing envelope labeled type and content while a robot stacks new blocks around it.](assets/images/build-pipeline-and-rendering-model/comic-08-keep-the-envelope.jpeg)\n**Panel 8:** *The contract to preserve: every block is {type, content} — modalities wrap above it, never inside it.*\n"}]}]}</script>
<script>
    (function () {
        const data = JSON.parse(document.getElementById('data').textContent);
        const root = document.getElementById('content');

        const postId = (data.meta && data.meta.id) ? String(data.meta.id) : '';
        const postStatusRaw = (data.meta && data.meta.status) ? String(data.meta.status) : '';
        if (postId || postStatusRaw) {
            const header = document.getElementById('post-header');
            let sectionEl = header.querySelector('p.section');
            if (!sectionEl) {
                sectionEl = document.createElement('p');
                sectionEl.className = 'section';
                header.insertBefore(sectionEl, header.firstChild);
            }
            // Status pill goes first, then a " / " separator before the existing
            // content (section name and/or id).
            if (postStatusRaw) {
                const parts = postStatusRaw.split(':');
                const statusName = parts[0].trim();
                const statusColor = (parts[1] || '').trim();
                const wrap = document.createElement('span');
                wrap.className = 'post-status';
                const dot = document.createElement('span');
                dot.className = 'status-dot';
                if (statusColor) dot.style.background = statusColor;
                wrap.appendChild(dot);
                wrap.appendChild(document.createTextNode(statusName));
                if (sectionEl.firstChild) {
                    sectionEl.insertBefore(document.createTextNode(' • '), sectionEl.firstChild);
                    sectionEl.insertBefore(wrap, sectionEl.firstChild);
                } else {
                    sectionEl.appendChild(wrap);
                }
            }
            if (postId) {
                if (sectionEl.firstChild) sectionEl.appendChild(document.createTextNode(' • '));
                sectionEl.appendChild(document.createTextNode(postId));
            }
        }

        const tagsHost = document.getElementById('tags');
        (data.tags || []).forEach(function (t) {
            const span = document.createElement('span');
            span.className = 'tag';
            span.textContent = t;
            tagsHost.appendChild(span);
        });

        // Minimal markdown renderer. Supports: ATX headings, paragraphs, blockquotes,
        // unordered/ordered lists, fenced code, inline code, bold/italic/strikethrough, links, images, hr.
        // Sufficient for the posts in this repo; replace with a fuller parser if needed.
        function renderMarkdown(src) {
            const lines = src.replace(/\r\n/g, '\n').split('\n');
            const out = [];
            let i = 0;

            const bullet = /^(\s*)([-*])\s+(.*)$/;
            const ordered = /^(\s*)(\d+)\.\s+(.*)$/;
            const tableRow = /^\s*\|(.+)\|\s*$/;
            const tableSep = /^\s*\|?\s*:?-{3,}:?\s*(\|\s*:?-{3,}:?\s*)+\|?\s*$/;

            function splitRow(s) {
                let t = s.trim();
                if (t.startsWith('|')) t = t.slice(1);
                if (t.endsWith('|')) t = t.slice(0, -1);
                return t.split('|').map(c => c.trim());
            }

            function inline(s) {
                // Posts are trusted content, so raw HTML passes through unescaped
                // (some posts embed inline <blockquote>, <div>, etc.).
                // Stray ampersands still get fixed up.
                s = s.replace(/&(?![a-zA-Z]+;|#\d+;)/g, '&amp;');
                s = s.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<a class="image-link" href="$2" target="_blank" rel="noopener noreferrer"><img alt="$1" src="$2"></a>');
                s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
                s = s.replace(/`([^`]+)`/g, function (_, c) {
                    return '<code>' + c.replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</code>';
                });
                s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
                s = s.replace(/~~([^~\n]+)~~/g, '<del>$1</del>');
                s = s.replace(/(^|[^*])\*([^*\n]+)\*/g, '$1<em>$2</em>');
                return s;
            }

            while (i < lines.length) {
                const line = lines[i];
                if (!line.trim()) {
                    i++;
                    continue;
                }

                const fence = line.match(/^```(\w*)\s*$/);
                if (fence) {
                    i++;
                    const buf = [];
                    while (i < lines.length && !/^```\s*$/.test(lines[i])) {
                        buf.push(lines[i]);
                        i++;
                    }
                    i++;
                    const escaped = buf.join('\n').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                    const cls = fence[1] ? ' class="lang-' + fence[1] + '"' : '';
                    out.push('<pre><code' + cls + '>' + escaped + '</code></pre>');
                    continue;
                }

                const h = line.match(/^(#{1,6})\s+(.*)$/);
                if (h) {
                    out.push('<h' + h[1].length + '>' + inline(h[2]) + '</h' + h[1].length + '>');
                    i++;
                    continue;
                }

                if (/^\s*(?:-\s*){3,}\s*$/.test(line) || /^\s*\*{3,}\s*$/.test(line)) {
                    out.push('<hr>');
                    i++;
                    continue;
                }

                if (/^>\s?/.test(line)) {
                    const buf = [];
                    while (i < lines.length && /^>\s?/.test(lines[i])) {
                        buf.push(lines[i].replace(/^>\s?/, ''));
                        i++;
                    }
                    out.push('<blockquote>' + renderMarkdown(buf.join('\n')) + '</blockquote>');
                    continue;
                }

                if (tableRow.test(line) && i + 1 < lines.length && tableSep.test(lines[i + 1])) {
                    const headers = splitRow(line);
                    i += 2;
                    const rows = [];
                    while (i < lines.length && tableRow.test(lines[i])) {
                        rows.push(splitRow(lines[i]));
                        i++;
                    }
                    let html = '<table><thead><tr>';
                    headers.forEach(h => {
                        html += '<th>' + inline(h) + '</th>';
                    });
                    html += '</tr></thead><tbody>';
                    rows.forEach(r => {
                        html += '<tr>';
                        r.forEach(c => {
                            html += '<td>' + inline(c) + '</td>';
                        });
                        html += '</tr>';
                    });
                    html += '</tbody></table>';
                    out.push(html);
                    continue;
                }

                if (bullet.test(line) || ordered.test(line)) {
                    // Indent of the first bullet defines this list's base level.
                    // Deeper-indented bullets become nested lists (rendered by
                    // recursing into renderMarkdown). Same-or-less indent at a
                    // bullet starts a sibling item (or ends the list).
                    const firstMatch = line.match(bullet) || line.match(ordered);
                    const baseIndent = firstMatch[1].length;
                    const isOrdered = ordered.test(line);
                    const items = [];
                    while (i < lines.length) {
                        const cur = lines[i];
                        if (!cur.trim()) {
                            // blank line breaks the list (matches CommonMark-ish behaviour)
                            i++;
                            break;
                        }
                        const mBul = cur.match(bullet);
                        const mOrd = cur.match(ordered);
                        const m = mBul || mOrd;
                        if (!m) break;
                        if (m[1].length < baseIndent) break;
                        if (m[1].length > baseIndent) break; // shouldn't happen at top of loop
                        // Same-type check: switching between -/* and 1. closes the list
                        if (isOrdered !== !!mOrd) break;

                        const itemBuf = [m[3]];
                        const nestedBuf = [];
                        i++;
                        while (i < lines.length) {
                            const nxt = lines[i];
                            if (!nxt.trim()) break;
                            const nBul = nxt.match(bullet);
                            const nOrd = nxt.match(ordered);
                            const nm = nBul || nOrd;
                            if (nm) {
                                if (nm[1].length > baseIndent) {
                                    // nested list line — dedent and stash
                                    nestedBuf.push(nxt.slice(baseIndent + 2));
                                    i++;
                                    continue;
                                }
                                // sibling or end of list
                                break;
                            }
                            // Plain continuation text
                            if (nestedBuf.length) {
                                // continuation inside the nested block
                                nestedBuf.push(nxt.slice(baseIndent + 2));
                            } else {
                                itemBuf.push(nxt.trim());
                            }
                            i++;
                        }

                        let liHtml = inline(itemBuf.join('\n'));
                        if (nestedBuf.length) {
                            liHtml += renderMarkdown(nestedBuf.join('\n'));
                        }
                        items.push('<li>' + liHtml + '</li>');
                    }
                    out.push((isOrdered ? '<ol>' : '<ul>') + items.join('') + (isOrdered ? '</ol>' : '</ul>'));
                    continue;
                }

                const buf = [line];
                i++;
                while (i < lines.length && lines[i].trim() && !/^#{1,6}\s/.test(lines[i]) && !/^>\s?/.test(lines[i]) && !bullet.test(lines[i]) && !ordered.test(lines[i]) && !/^```/.test(lines[i]) && !tableRow.test(lines[i])) {
                    buf.push(lines[i]);
                    i++;
                }
                out.push('<p>' + inline(buf.join(' ')) + '</p>');
            }
            return out.join('\n');
        }

        // Block dispatcher. New block types plug in here.
        const renderers = {
            markdown: function (block) {
                const div = document.createElement('div');
                div.innerHTML = renderMarkdown(block.content);
                return div;
            },
            mermaid: function (block) {
                // Mermaid scans elements with class "mermaid" whose textContent
                // is the diagram source. We collect these nodes and run
                // mermaid.run() once after all blocks are in the DOM.
                const div = document.createElement('div');
                div.className = 'mermaid';
                div.textContent = block.content;
                return div;
            },
            'force-graph': function (block) {
                // build.py emits parsed JSON: {nodes:[{id,size}], links:[{source,target}]}.
                // We instantiate force-graph after the container is in the DOM
                // so it can measure its own width.
                const div = document.createElement('div');
                div.className = 'force-graph';
                const data = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.ForceGraph) return;
                    const maxSize = data.nodes.reduce((m, n) => Math.max(m, n.size || 1), 1);
                    window.ForceGraph()(div)
                        .graphData(data)
                        .width(div.clientWidth)
                        .height(div.clientHeight)
                        .nodeRelSize(4)
                        .nodeVal(n => Math.max(20 * (n.size || 1) / maxSize, 0.001))
                        .nodeLabel(n => n.id + ' (' + (n.size || 1) + ')')
                        .nodeColor(() => 'rgba(135, 206, 235, 0.7)')
                        .linkColor(() => 'rgba(60, 60, 60, 0.4)')
                        .linkDirectionalArrowLength(4)
                        .linkDirectionalArrowRelPos(1)
                        .linkWidth(1);
                });
                return div;
            },
            'bubble-chart': function (block) {
                // build.py emits {nodes:[{name,size}]}. Renders a D3 circle-pack
                // SVG (same shape as the obren.io reference, just inline).
                const wrap = document.createElement('div');
                wrap.className = 'bubble-chart';
                const payload = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.d3) return;
                    const diameter = 480;
                    const fill = '#c0deed';
                    const textColor = '#111111';
                    const fontSize = 12;

                    const svg = window.d3.select(wrap).append('svg')
                        .attr('viewBox', '0 0 ' + diameter + ' ' + diameter)
                        .attr('width', diameter)
                        .attr('height', diameter);

                    const root = window.d3.hierarchy({children: payload.nodes})
                        .sum(d => d.size || 0)
                        .sort((a, b) => b.value - a.value);

                    window.d3.pack().size([diameter, diameter]).padding(2)(root);

                    const node = svg.selectAll('g')
                        .data(root.leaves())
                        .enter().append('g')
                        .attr('transform', d => 'translate(' + d.x + ',' + d.y + ')');

                    node.append('title').text(d => d.data.name + ': ' + d.value);
                    node.append('circle').attr('r', d => d.r).style('fill', fill);
                    node.append('text')
                        .attr('dy', '.3em')
                        .style('text-anchor', 'middle')
                        .style('fill', textColor)
                        .style('font-size', fontSize + 'px')
                        .text(d => d.data.name.substring(0, Math.max(0, Math.floor(d.r / 3))));
                });
                return wrap;
            }
        };

        // Render one modality's blocks into a host element. Mermaid runs
        // scoped to just the nodes created here, so lazily rendered tabs get
        // their diagrams on first activation.
        let mermaidInitialized = false;
        function renderBlocksInto(blocks, host) {
            const mermaidNodes = [];
            blocks.forEach(function (block) {
                const r = renderers[block.type];
                if (!r) {
                    const pre = document.createElement('pre');
                    pre.textContent = '[unknown block type: ' + block.type + ']';
                    host.appendChild(pre);
                    return;
                }
                const node = r(block);
                if (node instanceof Node) {
                    host.appendChild(node);
                    if (block.type === 'mermaid') mermaidNodes.push(node);
                }
            });
            if (mermaidNodes.length && window.mermaid) {
                if (!mermaidInitialized) {
                    window.mermaid.initialize({startOnLoad: false, theme: 'default'});
                    mermaidInitialized = true;
                }
                window.mermaid.run({nodes: mermaidNodes});
            }
        }

        // Modality tabs. One <article class="pane"> per modality; panes are
        // rendered lazily on first activation (force-graph / D3 / mermaid
        // need a visible, measurable container). With a single modality the
        // tab bar stays hidden and the page looks exactly like before.
        const mods = data.modalities;
        const tabBar = document.getElementById('modality-tabs');
        const panes = {};
        const tabButtons = {};
        const renderedPanes = {};

        mods.forEach(function (m) {
            const pane = document.createElement('article');
            pane.className = 'pane';
            pane.dataset.key = m.key;
            pane.hidden = true;
            root.appendChild(pane);
            panes[m.key] = pane;
        });

        const defaultKey = mods.some(m => m.key === 'index') ? 'index' : mods[0].key;

        function activate(key, updateHash) {
            mods.forEach(function (m) {
                const isActive = m.key === key;
                panes[m.key].hidden = !isActive;
                if (tabButtons[m.key]) {
                    tabButtons[m.key].classList.toggle('active', isActive);
                    tabButtons[m.key].setAttribute('aria-selected', isActive ? 'true' : 'false');
                }
            });
            // Unhide first, then render: the chart libraries measure widths.
            if (!renderedPanes[key]) {
                renderBlocksInto(mods.find(m => m.key === key).blocks, panes[key]);
                renderedPanes[key] = true;
            }
            if (updateHash) {
                history.replaceState(null, '',
                    key === defaultKey ? location.pathname + location.search : '#' + key);
            }
        }

        if (mods.length > 1) {
            mods.forEach(function (m) {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.textContent = m.label;
                btn.setAttribute('role', 'tab');
                btn.addEventListener('click', function () { activate(m.key, true); });
                tabBar.appendChild(btn);
                tabButtons[m.key] = btn;
            });
            tabBar.hidden = false;
        }

        // The hash selects a tab only when it matches a modality key, so
        // existing anchors keep working.
        const initialHash = location.hash.slice(1);
        activate(mods.some(m => m.key === initialHash) ? initialHash : defaultKey, false);
        window.addEventListener('hashchange', function () {
            const k = location.hash.slice(1);
            if (mods.some(m => m.key === k)) activate(k, false);
        });
    })();
</script>
