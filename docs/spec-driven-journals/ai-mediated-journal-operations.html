<script id="data" type="application/json">{"meta": {"title": "AI-Mediated Journal Operations", "date": "2026-05-22", "author": "by Željko Obrenović (obren.io)", "permalink": "ai-mediated-journal-operations", "timetoread": "8 min", "excerpt": "AI agents are useful journal collaborators when they treat the Spec-Driven Journals repository as source, read the local contract before editing, update specs before substantial posts, build scoped output, and leave a clear verification trail.", "tags": "ai agents, authoring, review, operations", "icon": "assets/icons/ai-mediated-journal-operations.png", "logo": "assets/images/ai-mediated-journal-operations/logo.jpeg", "logo_credit": "Image generated by Google Gemini (gemini-3-pro-image-preview)"}, "tags": ["ai agents", "authoring", "review", "operations"], "blocks": [{"type": "markdown", "content": "> AI agents are useful journal collaborators when they treat the Spec-Driven Journals repository as source, read the local contract before editing, update specs before substantial posts, build scoped output, and leave a clear verification trail.\n\n[Spec-Driven Journals](https://github.com/zeljkoobrenovic/spec-driven-journals) assumes AI-mediated authoring for substantive work.\n\nThat does not mean \"AI writes the journal.\" It means a human describes intent, an agent edits the Spec-Driven Journals source, and the human reviews the diff and generated output. The durable rationale is captured in [AI-Mediated Authoring as the Default Way to Edit This Repository](../foundations/ai-mediated-authoring.html). This article describes the operating behavior inside Spec-Driven Journals.\n\n## The Human-Agent Split\n\nThe split is pragmatic:\n\n| Human responsibility | Agent responsibility |\n| --- | --- |\n| State the intent. | Inspect Spec-Driven Journals guidance and current source. |\n| Decide whether the direction is good. | Draft specs, posts, config, and template changes. |\n| Provide missing context. | Preserve existing conventions and stable permalinks. |\n| Review the generated output. | Run scoped builds and report verification. |\n| Accept or redirect the work. | Avoid reverting unrelated changes. |\n\nThe agent helps move the work through source files. It does not own the editorial judgment.\n\n![AI-mediated journal session flow](assets/images/ai-mediated-journal-session-flow.png)\n*Illustration placeholder: `ai-mediated-journal-session-flow.png` should show a human providing intent, an AI agent inspecting source and editing specs/posts, a scoped build, and the human reviewing generated output and diffs.*\n\n## What A Good Session Looks Like\n\nA good AI-mediated journal session follows a predictable shape:\n\n1. Read the user's request.\n2. Inspect relevant configs, posts, specs, templates, and scripts.\n3. Update specs first when the post intent changes.\n4. Edit source files, not generated HTML.\n5. Run a scoped build when possible.\n6. Check generated output for unresolved links or obvious rendering issues.\n7. Report what changed and what was verified.\n\nThe point is not to slow down. The point is to prevent the agent from writing plausible prose that does not fit Spec-Driven Journals.\n\n## Read Before Editing\n\nAgents should first ask Spec-Driven Journals what it already does.\n\nThe primary source context is the [official Spec-Driven Journals repository](https://github.com/zeljkoobrenovic/spec-driven-journals). The [generated Spec-Driven Journals site](https://zeljkoobrenovic.github.io/spec-driven-journals/) is useful for reader-facing review, but source edits belong in source.\n\nUseful files include:\n\n| File | What it teaches |\n| --- | --- |\n| `README.md` | Spec-Driven Journals purpose, quick start, current journal map. |\n| `AGENTS.md` | Detailed build, authoring, and rendering contract. |\n| `_journals/README.md` | Journal folder layout and front matter. |\n| `_wiring/README.md` | Build scripts and maintenance helpers. |\n| `_templates/post.html` | Supported client-side Markdown and custom renderers. |\n| existing `config.yaml` files | Local section and post ordering patterns. |\n| existing posts and specs | Tone, shape, and cross-link conventions. |\n\nReading these files is cheaper than repairing a model that guessed wrong.\n\n## Work With Dirty Trees\n\nThe worktree may already contain changes from the user, another agent, or a previous session.\n\nThe operational rule is strict: do not revert unrelated changes.\n\nThat affects builds. A full `python3 _wiring/build.py` can regenerate every journal, including ones with unrelated dirty output. During scoped work, a journal-specific build can be safer because it updates only the affected generated site.\n\nThe agent should still say what it built. Silent verification is not useful to the reviewer.\n\n## Keep Generated Output Disposable\n\nAgents should not edit `docs/<journal>/*.html` directly.\n\nGenerated files are useful for verification and publication. They are not the source of the article. If an image does not render, the fix belongs in the markdown path, the asset location, or the build logic. If a cross-link is unresolved, the fix belongs in the source permalink or the link target.\n\nThis is one of the easiest ways to evaluate agent quality. A good agent returns to source.\n\n## Use Specs As The Agent Contract\n\nFor non-trivial posts, the spec should be the first source file the agent creates or updates.\n\nThe spec gives the agent a compact contract:\n\n- intent\n- audience\n- success criteria\n- non-goals\n- open questions\n- decision log\n- sources\n- changelog\n\nWithout that contract, the agent may optimize for fluent prose. With that contract, it can optimize for a specific article outcome.\n\n## What Agents Should Avoid\n\nAI-mediated authoring fails when the agent becomes casual about source.\n\nWatch for:\n\n- editing generated HTML instead of source\n- changing permalinks unnecessarily\n- adding posts without wiring `config.yaml`\n- writing an article that does not match its spec\n- skipping the build\n- ignoring unresolved double-bracket links\n- overwriting user changes in unrelated journals\n- inventing Spec-Driven Journals behavior instead of inspecting scripts\n- treating specs as polished documentation rather than working contracts\n\nThese are not abstract risks. They are the practical failure modes of AI-assisted documentation systems.\n\n## What To Report At The End\n\nA useful final report should include:\n\n- source files changed\n- generated output rebuilt\n- verification commands run\n- known limitations or skipped checks\n- unrelated dirty files noticed but not touched\n\nThe user does not need a transcript of every action. They need enough to review the result and continue confidently.\n\n## The Payoff\n\nAI agents are valuable here because Spec-Driven Journals is structured enough for them to reason about.\n\nThe combination of markdown source, sibling specs, stable config, deterministic build, and generated review surfaces gives the agent guardrails. The agent can do real editorial and implementation work without turning every session into a fresh context negotiation.\n\nThat is the operating promise of spec-driven journals.\n\nAt this point, the authoring model has covered structure, content mechanics, workflow, and AI-mediated collaboration. The next article, [Build Pipeline and Rendering Model](build-pipeline-and-rendering-model.html), opens the implementation side of the system.\n"}]}</script>
<script>
    (function () {
        const data = JSON.parse(document.getElementById('data').textContent);
        const root = document.getElementById('content');

        const postId = (data.meta && data.meta.id) ? String(data.meta.id) : '';
        const postStatusRaw = (data.meta && data.meta.status) ? String(data.meta.status) : '';
        if (postId || postStatusRaw) {
            const header = document.getElementById('post-header');
            let sectionEl = header.querySelector('p.section');
            if (!sectionEl) {
                sectionEl = document.createElement('p');
                sectionEl.className = 'section';
                header.insertBefore(sectionEl, header.firstChild);
            }
            // Status pill goes first, then a " / " separator before the existing
            // content (section name and/or id).
            if (postStatusRaw) {
                const parts = postStatusRaw.split(':');
                const statusName = parts[0].trim();
                const statusColor = (parts[1] || '').trim();
                const wrap = document.createElement('span');
                wrap.className = 'post-status';
                const dot = document.createElement('span');
                dot.className = 'status-dot';
                if (statusColor) dot.style.background = statusColor;
                wrap.appendChild(dot);
                wrap.appendChild(document.createTextNode(statusName));
                if (sectionEl.firstChild) {
                    sectionEl.insertBefore(document.createTextNode(' • '), sectionEl.firstChild);
                    sectionEl.insertBefore(wrap, sectionEl.firstChild);
                } else {
                    sectionEl.appendChild(wrap);
                }
            }
            if (postId) {
                if (sectionEl.firstChild) sectionEl.appendChild(document.createTextNode(' • '));
                sectionEl.appendChild(document.createTextNode(postId));
            }
        }

        const tagsHost = document.getElementById('tags');
        (data.tags || []).forEach(function (t) {
            const span = document.createElement('span');
            span.className = 'tag';
            span.textContent = t;
            tagsHost.appendChild(span);
        });

        // Minimal markdown renderer. Supports: ATX headings, paragraphs, blockquotes,
        // unordered/ordered lists, fenced code, inline code, bold/italic/strikethrough, links, images, hr.
        // Sufficient for the posts in this repo; replace with a fuller parser if needed.
        function renderMarkdown(src) {
            const lines = src.replace(/\r\n/g, '\n').split('\n');
            const out = [];
            let i = 0;

            const bullet = /^(\s*)([-*])\s+(.*)$/;
            const ordered = /^(\s*)(\d+)\.\s+(.*)$/;
            const tableRow = /^\s*\|(.+)\|\s*$/;
            const tableSep = /^\s*\|?\s*:?-{3,}:?\s*(\|\s*:?-{3,}:?\s*)+\|?\s*$/;

            function splitRow(s) {
                let t = s.trim();
                if (t.startsWith('|')) t = t.slice(1);
                if (t.endsWith('|')) t = t.slice(0, -1);
                return t.split('|').map(c => c.trim());
            }

            function inline(s) {
                // Posts are trusted content, so raw HTML passes through unescaped
                // (some posts embed inline <blockquote>, <div>, etc.).
                // Stray ampersands still get fixed up.
                s = s.replace(/&(?![a-zA-Z]+;|#\d+;)/g, '&amp;');
                s = s.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<a class="image-link" href="$2" target="_blank" rel="noopener noreferrer"><img alt="$1" src="$2"></a>');
                s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
                s = s.replace(/`([^`]+)`/g, function (_, c) {
                    return '<code>' + c.replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</code>';
                });
                s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
                s = s.replace(/~~([^~\n]+)~~/g, '<del>$1</del>');
                s = s.replace(/(^|[^*])\*([^*\n]+)\*/g, '$1<em>$2</em>');
                return s;
            }

            while (i < lines.length) {
                const line = lines[i];
                if (!line.trim()) {
                    i++;
                    continue;
                }

                const fence = line.match(/^```(\w*)\s*$/);
                if (fence) {
                    i++;
                    const buf = [];
                    while (i < lines.length && !/^```\s*$/.test(lines[i])) {
                        buf.push(lines[i]);
                        i++;
                    }
                    i++;
                    const escaped = buf.join('\n').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                    const cls = fence[1] ? ' class="lang-' + fence[1] + '"' : '';
                    out.push('<pre><code' + cls + '>' + escaped + '</code></pre>');
                    continue;
                }

                const h = line.match(/^(#{1,6})\s+(.*)$/);
                if (h) {
                    out.push('<h' + h[1].length + '>' + inline(h[2]) + '</h' + h[1].length + '>');
                    i++;
                    continue;
                }

                if (/^\s*(?:-\s*){3,}\s*$/.test(line) || /^\s*\*{3,}\s*$/.test(line)) {
                    out.push('<hr>');
                    i++;
                    continue;
                }

                if (/^>\s?/.test(line)) {
                    const buf = [];
                    while (i < lines.length && /^>\s?/.test(lines[i])) {
                        buf.push(lines[i].replace(/^>\s?/, ''));
                        i++;
                    }
                    out.push('<blockquote>' + renderMarkdown(buf.join('\n')) + '</blockquote>');
                    continue;
                }

                if (tableRow.test(line) && i + 1 < lines.length && tableSep.test(lines[i + 1])) {
                    const headers = splitRow(line);
                    i += 2;
                    const rows = [];
                    while (i < lines.length && tableRow.test(lines[i])) {
                        rows.push(splitRow(lines[i]));
                        i++;
                    }
                    let html = '<table><thead><tr>';
                    headers.forEach(h => {
                        html += '<th>' + inline(h) + '</th>';
                    });
                    html += '</tr></thead><tbody>';
                    rows.forEach(r => {
                        html += '<tr>';
                        r.forEach(c => {
                            html += '<td>' + inline(c) + '</td>';
                        });
                        html += '</tr>';
                    });
                    html += '</tbody></table>';
                    out.push(html);
                    continue;
                }

                if (bullet.test(line) || ordered.test(line)) {
                    // Indent of the first bullet defines this list's base level.
                    // Deeper-indented bullets become nested lists (rendered by
                    // recursing into renderMarkdown). Same-or-less indent at a
                    // bullet starts a sibling item (or ends the list).
                    const firstMatch = line.match(bullet) || line.match(ordered);
                    const baseIndent = firstMatch[1].length;
                    const isOrdered = ordered.test(line);
                    const items = [];
                    while (i < lines.length) {
                        const cur = lines[i];
                        if (!cur.trim()) {
                            // blank line breaks the list (matches CommonMark-ish behaviour)
                            i++;
                            break;
                        }
                        const mBul = cur.match(bullet);
                        const mOrd = cur.match(ordered);
                        const m = mBul || mOrd;
                        if (!m) break;
                        if (m[1].length < baseIndent) break;
                        if (m[1].length > baseIndent) break; // shouldn't happen at top of loop
                        // Same-type check: switching between -/* and 1. closes the list
                        if (isOrdered !== !!mOrd) break;

                        const itemBuf = [m[3]];
                        const nestedBuf = [];
                        i++;
                        while (i < lines.length) {
                            const nxt = lines[i];
                            if (!nxt.trim()) break;
                            const nBul = nxt.match(bullet);
                            const nOrd = nxt.match(ordered);
                            const nm = nBul || nOrd;
                            if (nm) {
                                if (nm[1].length > baseIndent) {
                                    // nested list line — dedent and stash
                                    nestedBuf.push(nxt.slice(baseIndent + 2));
                                    i++;
                                    continue;
                                }
                                // sibling or end of list
                                break;
                            }
                            // Plain continuation text
                            if (nestedBuf.length) {
                                // continuation inside the nested block
                                nestedBuf.push(nxt.slice(baseIndent + 2));
                            } else {
                                itemBuf.push(nxt.trim());
                            }
                            i++;
                        }

                        let liHtml = inline(itemBuf.join('\n'));
                        if (nestedBuf.length) {
                            liHtml += renderMarkdown(nestedBuf.join('\n'));
                        }
                        items.push('<li>' + liHtml + '</li>');
                    }
                    out.push((isOrdered ? '<ol>' : '<ul>') + items.join('') + (isOrdered ? '</ol>' : '</ul>'));
                    continue;
                }

                const buf = [line];
                i++;
                while (i < lines.length && lines[i].trim() && !/^#{1,6}\s/.test(lines[i]) && !/^>\s?/.test(lines[i]) && !bullet.test(lines[i]) && !ordered.test(lines[i]) && !/^```/.test(lines[i]) && !tableRow.test(lines[i])) {
                    buf.push(lines[i]);
                    i++;
                }
                out.push('<p>' + inline(buf.join(' ')) + '</p>');
            }
            return out.join('\n');
        }

        // Block dispatcher. New block types plug in here.
        const renderers = {
            markdown: function (block) {
                const div = document.createElement('div');
                div.innerHTML = renderMarkdown(block.content);
                return div;
            },
            mermaid: function (block) {
                // Mermaid scans elements with class "mermaid" whose textContent
                // is the diagram source. We collect these nodes and run
                // mermaid.run() once after all blocks are in the DOM.
                const div = document.createElement('div');
                div.className = 'mermaid';
                div.textContent = block.content;
                return div;
            },
            'force-graph': function (block) {
                // build.py emits parsed JSON: {nodes:[{id,size}], links:[{source,target}]}.
                // We instantiate force-graph after the container is in the DOM
                // so it can measure its own width.
                const div = document.createElement('div');
                div.className = 'force-graph';
                const data = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.ForceGraph) return;
                    const maxSize = data.nodes.reduce((m, n) => Math.max(m, n.size || 1), 1);
                    window.ForceGraph()(div)
                        .graphData(data)
                        .width(div.clientWidth)
                        .height(div.clientHeight)
                        .nodeRelSize(4)
                        .nodeVal(n => Math.max(20 * (n.size || 1) / maxSize, 0.001))
                        .nodeLabel(n => n.id + ' (' + (n.size || 1) + ')')
                        .nodeColor(() => 'rgba(135, 206, 235, 0.7)')
                        .linkColor(() => 'rgba(60, 60, 60, 0.4)')
                        .linkDirectionalArrowLength(4)
                        .linkDirectionalArrowRelPos(1)
                        .linkWidth(1);
                });
                return div;
            },
            'bubble-chart': function (block) {
                // build.py emits {nodes:[{name,size}]}. Renders a D3 circle-pack
                // SVG (same shape as the obren.io reference, just inline).
                const wrap = document.createElement('div');
                wrap.className = 'bubble-chart';
                const payload = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.d3) return;
                    const diameter = 480;
                    const fill = '#c0deed';
                    const textColor = '#111111';
                    const fontSize = 12;

                    const svg = window.d3.select(wrap).append('svg')
                        .attr('viewBox', '0 0 ' + diameter + ' ' + diameter)
                        .attr('width', diameter)
                        .attr('height', diameter);

                    const root = window.d3.hierarchy({children: payload.nodes})
                        .sum(d => d.size || 0)
                        .sort((a, b) => b.value - a.value);

                    window.d3.pack().size([diameter, diameter]).padding(2)(root);

                    const node = svg.selectAll('g')
                        .data(root.leaves())
                        .enter().append('g')
                        .attr('transform', d => 'translate(' + d.x + ',' + d.y + ')');

                    node.append('title').text(d => d.data.name + ': ' + d.value);
                    node.append('circle').attr('r', d => d.r).style('fill', fill);
                    node.append('text')
                        .attr('dy', '.3em')
                        .style('text-anchor', 'middle')
                        .style('fill', textColor)
                        .style('font-size', fontSize + 'px')
                        .text(d => d.data.name.substring(0, Math.max(0, Math.floor(d.r / 3))));
                });
                return wrap;
            }
        };

        const mermaidNodes = [];
        data.blocks.forEach(function (block) {
            const r = renderers[block.type];
            if (!r) {
                const pre = document.createElement('pre');
                pre.textContent = '[unknown block type: ' + block.type + ']';
                root.appendChild(pre);
                return;
            }
            const node = r(block);
            if (node instanceof Node) {
                root.appendChild(node);
                if (block.type === 'mermaid') mermaidNodes.push(node);
            }
        });

        if (mermaidNodes.length && window.mermaid) {
            window.mermaid.initialize({startOnLoad: false, theme: 'default'});
            window.mermaid.run({nodes: mermaidNodes});
        }
    })();
</script>
</body>
</html>
