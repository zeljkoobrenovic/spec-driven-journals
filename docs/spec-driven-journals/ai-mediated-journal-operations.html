<script id="data" type="application/json">{"meta": {"title": "AI-Mediated Journal Operations", "date": "2026-05-22", "author": "by Željko Obrenović (obren.io)", "permalink": "ai-mediated-journal-operations", "timetoread": "8 min", "excerpt": "AI agents are useful journal collaborators when they treat the Spec-Driven Journals repository as source, read the local contract before editing, update specs before substantial posts, build scoped output, and leave a clear verification trail.", "tags": "ai agents, authoring, review, operations", "icon": "assets/icons/ai-mediated-journal-operations.png", "logo": "assets/images/ai-mediated-journal-operations/logo.jpeg", "logo_credit": "Image generated by Google Gemini (gemini-3-pro-image-preview)"}, "tags": ["ai agents", "authoring", "review", "operations"], "modalities": [{"key": "index", "label": "Article", "meta": {}, "blocks": [{"type": "markdown", "content": "> AI agents are useful journal collaborators when they treat the Spec-Driven Journals repository as source, read the local contract before editing, update specs before substantial posts, build scoped output, and leave a clear verification trail.\n\n[Spec-Driven Journals](https://github.com/zeljkoobrenovic/spec-driven-journals) assumes AI-mediated authoring for substantive work.\n\nThat does not mean \"AI writes the journal.\" It means a human describes intent, an agent edits the Spec-Driven Journals source, and the human reviews the diff and generated output. The durable rationale is captured in [AI-Mediated Authoring as the Default Way to Edit This Repository](../foundations/ai-mediated-authoring.html). This article describes the operating behavior inside Spec-Driven Journals.\n\n## The Human-Agent Split\n\nThe split is pragmatic:\n\n| Human responsibility | Agent responsibility |\n| --- | --- |\n| State the intent. | Inspect Spec-Driven Journals guidance and current source. |\n| Decide whether the direction is good. | Draft specs, posts, config, and template changes. |\n| Provide missing context. | Preserve existing conventions and stable permalinks. |\n| Review the generated output. | Run scoped builds and report verification. |\n| Accept or redirect the work. | Avoid reverting unrelated changes. |\n\nThe agent helps move the work through source files. It does not own the editorial judgment.\n\n![AI-mediated journal session flow](assets/images/ai-mediated-journal-session-flow.png)\n*Illustration placeholder: `ai-mediated-journal-session-flow.png` should show a human providing intent, an AI agent inspecting source and editing specs/posts, a scoped build, and the human reviewing generated output and diffs.*\n\n## What A Good Session Looks Like\n\nA good AI-mediated journal session follows a predictable shape:\n\n1. Read the user's request.\n2. Inspect relevant configs, posts, specs, templates, and scripts.\n3. Update specs first when the post intent changes.\n4. Edit source files, not generated HTML.\n5. Run a scoped build when possible.\n6. Check generated output for unresolved links or obvious rendering issues.\n7. Report what changed and what was verified.\n\nThe point is not to slow down. The point is to prevent the agent from writing plausible prose that does not fit Spec-Driven Journals.\n\n## Read Before Editing\n\nAgents should first ask Spec-Driven Journals what it already does.\n\nThe primary source context is the [official Spec-Driven Journals repository](https://github.com/zeljkoobrenovic/spec-driven-journals). The [generated Spec-Driven Journals site](https://zeljkoobrenovic.github.io/spec-driven-journals/) is useful for reader-facing review, but source edits belong in source.\n\nUseful files include:\n\n| File | What it teaches |\n| --- | --- |\n| `README.md` | Spec-Driven Journals purpose, quick start, current journal map. |\n| `AGENTS.md` | Detailed build, authoring, and rendering contract. |\n| `_journals/README.md` | Journal folder layout and front matter. |\n| `_wiring/README.md` | Build scripts and maintenance helpers. |\n| `_templates/post.html` | Supported client-side Markdown and custom renderers. |\n| existing `config.yaml` files | Local section and post ordering patterns. |\n| existing posts and specs | Tone, shape, and cross-link conventions. |\n\nReading these files is cheaper than repairing a model that guessed wrong.\n\n## Work With Dirty Trees\n\nThe worktree may already contain changes from the user, another agent, or a previous session.\n\nThe operational rule is strict: do not revert unrelated changes.\n\nThat affects builds. A full `python3 _wiring/build.py` can regenerate every journal, including ones with unrelated dirty output. During scoped work, a journal-specific build can be safer because it updates only the affected generated site.\n\nThe agent should still say what it built. Silent verification is not useful to the reviewer.\n\n## Keep Generated Output Disposable\n\nAgents should not edit `docs/<journal>/*.html` directly.\n\nGenerated files are useful for verification and publication. They are not the source of the article. If an image does not render, the fix belongs in the markdown path, the asset location, or the build logic. If a cross-link is unresolved, the fix belongs in the source permalink or the link target.\n\nThis is one of the easiest ways to evaluate agent quality. A good agent returns to source.\n\n## Use Specs As The Agent Contract\n\nFor non-trivial posts, the spec should be the first source file the agent creates or updates.\n\nThe spec gives the agent a compact contract:\n\n- intent\n- audience\n- success criteria\n- non-goals\n- modalities\n- open questions\n- decision log\n- sources\n- changelog\n\nWithout that contract, the agent may optimize for fluent prose. With that contract, it can optimize for a specific article outcome.\n\n## Modality Skills\n\nThe modality docs that share a post folder with `index.md` are agent-authored by design. Four skills in `.claude/skills/` define the formats and workflows:\n\n| Skill | Writes | Notes |\n| --- | --- | --- |\n| `detailed-article` | `index.md` | Canonical home of the house style; required, default tab. |\n| `management-summary` | `summary.md` | 300–500 words keyed to the spec's success criteria and non-goals. |\n| `podcast-dialog` | `dialog.md` | Two named hosts, consistent per journal, success criteria as conversation beats. |\n| `explainer-comics` | `comics.md` + panels | Panel placeholders plus a Gemini generation script with a shared style block for cross-panel consistency. |\n\nAll four share two rules: the spec is a read-only contract (drift gets flagged, not silently patched), and every run ends with a build plus verification that the generated page embeds the new modality.\n\n## What Agents Should Avoid\n\nAI-mediated authoring fails when the agent becomes casual about source.\n\nWatch for:\n\n- editing generated HTML instead of source\n- changing permalinks unnecessarily\n- adding posts without wiring `config.yaml`\n- writing an article that does not match its spec\n- skipping the build\n- ignoring unresolved double-bracket links\n- overwriting user changes in unrelated journals\n- inventing Spec-Driven Journals behavior instead of inspecting scripts\n- treating specs as polished documentation rather than working contracts\n\nThese are not abstract risks. They are the practical failure modes of AI-assisted documentation systems.\n\n## What To Report At The End\n\nA useful final report should include:\n\n- source files changed\n- generated output rebuilt\n- verification commands run\n- known limitations or skipped checks\n- unrelated dirty files noticed but not touched\n\nThe user does not need a transcript of every action. They need enough to review the result and continue confidently.\n\n## The Payoff\n\nAI agents are valuable here because Spec-Driven Journals is structured enough for them to reason about.\n\nThe combination of markdown source, sibling specs, stable config, deterministic build, and generated review surfaces gives the agent guardrails. The agent can do real editorial and implementation work without turning every session into a fresh context negotiation.\n\nThat is the operating promise of spec-driven journals.\n\nAt this point, the authoring model has covered structure, content mechanics, workflow, and AI-mediated collaboration. The next article, [Build Pipeline and Rendering Model](build-pipeline-and-rendering-model.html), opens the implementation side of the system.\n"}]}, {"key": "summary", "label": "Summary", "meta": {"timetoread": "2 min"}, "blocks": [{"type": "markdown", "content": "AI agents are useful journal collaborators when they treat the Spec-Driven Journals repository as source: read the local contract before editing, update specs before substantial posts, build scoped output, and leave a clear verification trail. This is not \"AI writes the journal\" — a human states intent, an agent edits source, and the human reviews the diff and the generated output; the durable rationale lives in [AI-Mediated Authoring as the Default Way to Edit This Repository](../foundations/ai-mediated-authoring.html).\n\n**What changes**\n\n- The division of labor is explicit. Humans state intent, judge direction, supply missing context, and accept or redirect; agents inspect source, draft specs and posts, preserve conventions and stable permalinks, run scoped builds, and report what they verified. The agent moves work through source files — it does not own editorial judgment.\n- A good session has a predictable shape: read the request, inspect configs/posts/specs/templates, update specs first when intent shifts, edit source (never generated HTML), run a scoped build, check output for unresolved links, and report what changed and what was verified.\n- Agents read before editing. `README.md`, `AGENTS.md`, the `_journals/` and `_wiring/` READMEs, `_templates/post.html`, and existing posts and specs teach the contract — reading them is cheaper than repairing a model that guessed wrong.\n- The spec is the agent contract for non-trivial posts: intent, audience, success criteria, non-goals, modalities, open questions, decision log, sources, changelog. Without it, agents optimize for fluent prose; with it, they optimize for a specific article outcome.\n- Modality docs are agent-authored by design. Four skills in `.claude/skills/` — `detailed-article`, `management-summary`, `podcast-dialog`, `explainer-comics` — define the formats, treat the spec as read-only (drift gets flagged, not silently patched), and end every run with a build plus verification.\n\n**What it costs**\n\n- Discipline around dirty worktrees: never revert unrelated changes, prefer journal-scoped builds over full rebuilds during scoped work, and always say what was built — silent verification is useless to the reviewer.\n- Generated output stays disposable. If something renders wrong, the fix belongs in source — the markdown path, the asset location, the permalink, the build logic — never in `docs/<journal>/*.html`. Agent quality is partly measured by whether the agent returns to source.\n- A final report is owed every time: source files changed, output rebuilt, verification commands run, known limitations, and unrelated dirty files noticed but not touched.\n\n**What we are not doing**\n\n- No tool-specific prompt catalog.\n- No security policy for AI development in general.\n- No model selection guidance.\n\nThe Article tab covers the session shape in full, the failure modes to watch for, and why the repository's structure is what makes agent guardrails work.\n"}]}, {"key": "dialog", "label": "Conversation", "meta": {"timetoread": "8 min listen"}, "blocks": [{"type": "markdown", "content": "## Doesn't the AI just write the journal?\n\n**Ben:** Ana, give it to me straight. The repository says it assumes AI-mediated authoring for substantive work. Why isn't this post just one sentence — \"the AI writes the journal\"?\n\n**Ana:** Because that's exactly what it is *not*. The model is: a human describes intent, an agent edits the Spec-Driven Journals source, and the human reviews the diff and the generated output. The durable rationale is in [AI-Mediated Authoring as the Default Way to Edit This Repository](../foundations/ai-mediated-authoring.html); this post is about the operating behavior inside the repository. The agent helps move the work through source files. It does not own the editorial judgment.\n\n**Ben:** That's a nice slogan. Where's the actual line between what I do and what the agent does?\n\n**Ana:** The post draws it as a table, and it's pragmatic. The human states the intent, decides whether the direction is good, provides missing context, reviews the generated output, and accepts or redirects the work. The agent inspects the repository's guidance and current source, drafts specs, posts, config, and template changes, preserves existing conventions and stable permalinks, runs scoped builds, and reports verification — and it avoids reverting unrelated changes.\n\n**Ben:** So why should a busy colleague care about any of this? They just want the post written.\n\n**Ana:** Because the failure mode of skipping it is an agent writing plausible prose that does not fit Spec-Driven Journals. The whole point of the session shape — read the request, inspect configs, posts, specs, templates, and scripts, update specs first, edit source, run a scoped build, check the output, report — is not to slow down. It's to prevent exactly that.\n\n## Read before editing\n\n**Ben:** \"Inspect the source first\" sounds like ceremony. Modern models know what a static-site generator looks like. Can't the agent just guess and fix later?\n\n**Ana:** The post's answer is blunt: reading these files is cheaper than repairing a model that guessed wrong. Agents should first ask Spec-Driven Journals what it already does. There's a concrete reading list — `README.md` for purpose and the journal map, `AGENTS.md` for the build, authoring, and rendering contract, the `_journals/` README for folder layout and front matter, the `_wiring/` README for build scripts, `_templates/post.html` for what the client-side renderer actually supports, plus existing `config.yaml` files and existing posts and specs for tone and cross-link conventions.\n\n**Ben:** And the source of truth is the repo, not the published site?\n\n**Ana:** The official Spec-Driven Journals repository is the primary source context. The generated site is useful for reader-facing review, but source edits belong in source. That distinction comes back later in a sharper form.\n\n**Ben:** Fine, sharper form now. What happens when the agent finds the working tree already messy — half-finished changes from me, or from another agent?\n\n**Ana:** That's the dirty-worktree rule, and it's strict: do not revert unrelated changes. And it has a practical consequence for builds. A full `python3 _wiring/build.py` regenerates every journal, including ones with unrelated dirty output. So during scoped work, a journal-specific build can be safer — it updates only the affected generated site. Either way the agent should still say what it built. Silent verification is not useful to the reviewer.\n\n## Source in, disposable output\n\n**Ben:** Here's my skeptical scenario. An image doesn't render on the published page. The fastest fix is to patch the HTML in `docs/`. Two seconds. Why not?\n\n**Ana:** Because generated output is disposable by design. Agents should not edit `docs/<journal>/*.html` directly. Generated files are useful for verification and publication — they are not the source of the article. If an image does not render, the fix belongs in the markdown path, the asset location, or the build logic. If a cross-link is unresolved, the fix belongs in the source permalink or the link target.\n\n**Ben:** And if the agent patches the HTML anyway?\n\n**Ana:** The post actually frames this as a quality signal: it's one of the easiest ways to evaluate agent quality. A good agent returns to source. An agent that patches output has become casual about source, and that's the root of most of the failure modes.\n\n**Ben:** Name a few. What's on the avoid list?\n\n**Ana:** Editing generated HTML instead of source. Changing permalinks unnecessarily. Adding posts without wiring `config.yaml`. Writing an article that doesn't match its spec. Skipping the build. Ignoring unresolved double-bracket links. Overwriting user changes in unrelated journals. Inventing repository behavior instead of inspecting the scripts. And treating specs as polished documentation rather than working contracts. The post insists these aren't abstract risks — they're the practical failure modes of AI-assisted documentation systems.\n\n## The spec is the contract\n\n**Ben:** You keep saying \"spec first.\" Why does an AI agent need a spec? It can hold the whole conversation in context.\n\n**Ana:** Context isn't a contract. For non-trivial posts, the spec should be the first source file the agent creates or updates, because it gives the agent a compact contract: intent, audience, success criteria, non-goals, modalities, open questions, decision log, sources, changelog. Without that contract, the agent may optimize for fluent prose. With it, it can optimize for a specific article outcome.\n\n**Ben:** You said \"modalities.\" That's new — the post folder isn't just an article anymore?\n\n**Ana:** Right, and the post has a whole section on it. The modality docs that share a folder with `index.md` are agent-authored by design, and four skills in `.claude/skills/` define the formats and workflows. `detailed-article` writes `index.md` — the canonical home of the house style, required, the default tab. `management-summary` writes `summary.md` — 300 to 500 words keyed to the spec's success criteria and non-goals. `podcast-dialog` writes `dialog.md` — two named hosts, consistent per journal, walking the success criteria as conversation beats.\n\n**Ben:** Which is what we're doing right now, rather self-referentially.\n\n**Ana:** *(laughs)* The format demonstrates itself. The fourth is `explainer-comics`, which writes `comics.md` plus panels — panel placeholders and a Gemini generation script with a shared style block, so the characters stay consistent across panels. And all four skills share two rules: the spec is a read-only contract — drift gets flagged, not silently patched — and every run ends with a build plus verification that the generated page embeds the new modality.\n\n**Ben:** Last objection. At the end of a session, do I really want a transcript of everything the agent did? That's noise.\n\n**Ana:** The post agrees — the user does not need a transcript of every action. They need enough to review the result and continue confidently. Concretely, five things: source files changed, generated output rebuilt, verification commands run, known limitations or skipped checks, and unrelated dirty files noticed but not touched.\n\n## What this post is not\n\n**Ben:** Close it out. What should I *not* take away from this?\n\n**Ana:** Three explicit non-goals. It is not a tool-specific prompt catalog — no library of magic prompts for Claude Code or Codex. It is not a security policy for AI development in general. And it offers no model selection guidance. It's deliberately scoped to repository operations, not general AI coding practice.\n\n**Ben:** Then what's the payoff for keeping it this narrow?\n\n**Ana:** That the repository is structured enough for agents to reason about. Markdown source, sibling specs, stable config, a deterministic build, and generated review surfaces give the agent guardrails — it can do real editorial and implementation work without turning every session into a fresh context negotiation. That's the operating promise of spec-driven journals. And it's the hinge point of the series: structure, content mechanics, workflow, and AI collaboration are covered, and [Build Pipeline and Rendering Model](build-pipeline-and-rendering-model.html) opens the implementation side.\n\n**Ben:** So the headline isn't \"AI writes the journal.\" It's \"the journal is built so AI can work in it without breaking it.\"\n\n**Ana:** And so a human can always see, in one diff and one report, exactly what it did.\n"}]}, {"key": "comics", "label": "Comic", "meta": {"timetoread": "3 min"}, "blocks": [{"type": "markdown", "content": "<!-- comic-style\n{\n  \"cast\": \"MAYA: a pragmatic engineer-author, short dark hair, glasses, rolled-up sleeves, calm and slightly amused, often holding a marker or a printed page. REX: an over-eager boxy robot AI assistant, one bent antenna, glowing rectangular eyes, perpetually carrying or printing too many documents.\",\n  \"style\": \"Clean two-tone explainer comic, thick ink outlines, flat colors with blue/teal accents on a light cream background, generous white space, hand-lettered speech bubbles with SHORT readable text (max 8 words per bubble), simple geometric office/library/print-shop settings mixing documents with software symbols, no photorealism, no dense text, no title text.\"\n}\n-->\n\nHow a human and an AI agent run a journal together without the agent going rogue — in eight panels.\n\n![Comic panel: an over-eager robot proudly prints a tall stack of articles while an engineer holds one page skeptically.](assets/images/ai-mediated-journal-operations/comic-01-not-autopilot.jpeg)\n**Panel 1:** *AI-mediated does not mean AI-owned: the human states intent, the agent edits, the human reviews.*\n\n![Comic panel: an engineer holds a polished document that fails to fit into a wall of organized journal folders like a wrong puzzle piece.](assets/images/ai-mediated-journal-operations/comic-02-plausible-prose.jpeg)\n**Panel 2:** *The failure mode: fluent, plausible prose that does not fit Spec-Driven Journals.*\n\n![Comic panel: a robot reads a book labeled AGENTS.MD in a library corner while an engineer nods approvingly.](assets/images/ai-mediated-journal-operations/comic-03-read-before-editing.jpeg)\n**Panel 3:** *Read before editing: the repo's own files are cheaper than repairing a wrong guess.*\n\n![Comic panel: an engineer and a robot hold a large page titled SPEC between them like a signed contract.](assets/images/ai-mediated-journal-operations/comic-04-spec-as-contract.jpeg)\n**Panel 4:** *For non-trivial posts, the spec comes first: intent, audience, success criteria, non-goals.*\n\n![Comic panel: an engineer redirects a robot away from painting over a framed webpage toward editing a plain source file.](assets/images/ai-mediated-journal-operations/comic-05-source-not-output.jpeg)\n**Panel 5:** *Generated output is disposable. If a page is wrong, the fix lives in source.*\n\n![Comic panel: a robot tiptoes through scattered folders and sticky notes, carrying only its own small folder overhead.](assets/images/ai-mediated-journal-operations/comic-06-dirty-trees.jpeg)\n**Panel 6:** *Worktrees are shared and often dirty: build scoped, and never revert unrelated changes.*\n\n![Comic panel: a robot runs a machine with four output trays labeled ARTICLE, SUMMARY, DIALOG, and COMIC while an engineer checks them.](assets/images/ai-mediated-journal-operations/comic-07-modality-skills.jpeg)\n**Panel 7:** *Four skills, one read-only contract: every modality traces back to the same spec.*\n\n![Comic panel: a robot hands an engineer a single tidy checklist page while a build terminal shows a green checkmark.](assets/images/ai-mediated-journal-operations/comic-08-the-report.jpeg)\n**Panel 8:** *The payoff: enough structure that the agent does real work — and one report tells you what to review.*\n"}]}]}</script>
<script>
    (function () {
        const data = JSON.parse(document.getElementById('data').textContent);
        const root = document.getElementById('content');

        const postId = (data.meta && data.meta.id) ? String(data.meta.id) : '';
        const postStatusRaw = (data.meta && data.meta.status) ? String(data.meta.status) : '';
        if (postId || postStatusRaw) {
            const header = document.getElementById('post-header');
            let sectionEl = header.querySelector('p.section');
            if (!sectionEl) {
                sectionEl = document.createElement('p');
                sectionEl.className = 'section';
                header.insertBefore(sectionEl, header.firstChild);
            }
            // Status pill goes first, then a " / " separator before the existing
            // content (section name and/or id).
            if (postStatusRaw) {
                const parts = postStatusRaw.split(':');
                const statusName = parts[0].trim();
                const statusColor = (parts[1] || '').trim();
                const wrap = document.createElement('span');
                wrap.className = 'post-status';
                const dot = document.createElement('span');
                dot.className = 'status-dot';
                if (statusColor) dot.style.background = statusColor;
                wrap.appendChild(dot);
                wrap.appendChild(document.createTextNode(statusName));
                if (sectionEl.firstChild) {
                    sectionEl.insertBefore(document.createTextNode(' • '), sectionEl.firstChild);
                    sectionEl.insertBefore(wrap, sectionEl.firstChild);
                } else {
                    sectionEl.appendChild(wrap);
                }
            }
            if (postId) {
                if (sectionEl.firstChild) sectionEl.appendChild(document.createTextNode(' • '));
                sectionEl.appendChild(document.createTextNode(postId));
            }
        }

        const tagsHost = document.getElementById('tags');
        (data.tags || []).forEach(function (t) {
            const span = document.createElement('span');
            span.className = 'tag';
            span.textContent = t;
            tagsHost.appendChild(span);
        });

        // Minimal markdown renderer. Supports: ATX headings, paragraphs, blockquotes,
        // unordered/ordered lists, fenced code, inline code, bold/italic/strikethrough, links, images, hr.
        // Sufficient for the posts in this repo; replace with a fuller parser if needed.
        function renderMarkdown(src) {
            const lines = src.replace(/\r\n/g, '\n').split('\n');
            const out = [];
            let i = 0;

            const bullet = /^(\s*)([-*])\s+(.*)$/;
            const ordered = /^(\s*)(\d+)\.\s+(.*)$/;
            const tableRow = /^\s*\|(.+)\|\s*$/;
            const tableSep = /^\s*\|?\s*:?-{3,}:?\s*(\|\s*:?-{3,}:?\s*)+\|?\s*$/;

            function splitRow(s) {
                let t = s.trim();
                if (t.startsWith('|')) t = t.slice(1);
                if (t.endsWith('|')) t = t.slice(0, -1);
                return t.split('|').map(c => c.trim());
            }

            function inline(s) {
                // Posts are trusted content, so raw HTML passes through unescaped
                // (some posts embed inline <blockquote>, <div>, etc.).
                // Stray ampersands still get fixed up.
                s = s.replace(/&(?![a-zA-Z]+;|#\d+;)/g, '&amp;');
                s = s.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<a class="image-link" href="$2" target="_blank" rel="noopener noreferrer"><img alt="$1" src="$2"></a>');
                s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
                s = s.replace(/`([^`]+)`/g, function (_, c) {
                    return '<code>' + c.replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</code>';
                });
                s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
                s = s.replace(/~~([^~\n]+)~~/g, '<del>$1</del>');
                s = s.replace(/(^|[^*])\*([^*\n]+)\*/g, '$1<em>$2</em>');
                return s;
            }

            while (i < lines.length) {
                const line = lines[i];
                if (!line.trim()) {
                    i++;
                    continue;
                }

                const fence = line.match(/^```(\w*)\s*$/);
                if (fence) {
                    i++;
                    const buf = [];
                    while (i < lines.length && !/^```\s*$/.test(lines[i])) {
                        buf.push(lines[i]);
                        i++;
                    }
                    i++;
                    const escaped = buf.join('\n').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                    const cls = fence[1] ? ' class="lang-' + fence[1] + '"' : '';
                    out.push('<pre><code' + cls + '>' + escaped + '</code></pre>');
                    continue;
                }

                const h = line.match(/^(#{1,6})\s+(.*)$/);
                if (h) {
                    out.push('<h' + h[1].length + '>' + inline(h[2]) + '</h' + h[1].length + '>');
                    i++;
                    continue;
                }

                if (/^\s*(?:-\s*){3,}\s*$/.test(line) || /^\s*\*{3,}\s*$/.test(line)) {
                    out.push('<hr>');
                    i++;
                    continue;
                }

                if (/^>\s?/.test(line)) {
                    const buf = [];
                    while (i < lines.length && /^>\s?/.test(lines[i])) {
                        buf.push(lines[i].replace(/^>\s?/, ''));
                        i++;
                    }
                    out.push('<blockquote>' + renderMarkdown(buf.join('\n')) + '</blockquote>');
                    continue;
                }

                if (tableRow.test(line) && i + 1 < lines.length && tableSep.test(lines[i + 1])) {
                    const headers = splitRow(line);
                    i += 2;
                    const rows = [];
                    while (i < lines.length && tableRow.test(lines[i])) {
                        rows.push(splitRow(lines[i]));
                        i++;
                    }
                    let html = '<table><thead><tr>';
                    headers.forEach(h => {
                        html += '<th>' + inline(h) + '</th>';
                    });
                    html += '</tr></thead><tbody>';
                    rows.forEach(r => {
                        html += '<tr>';
                        r.forEach(c => {
                            html += '<td>' + inline(c) + '</td>';
                        });
                        html += '</tr>';
                    });
                    html += '</tbody></table>';
                    out.push(html);
                    continue;
                }

                if (bullet.test(line) || ordered.test(line)) {
                    // Indent of the first bullet defines this list's base level.
                    // Deeper-indented bullets become nested lists (rendered by
                    // recursing into renderMarkdown). Same-or-less indent at a
                    // bullet starts a sibling item (or ends the list).
                    const firstMatch = line.match(bullet) || line.match(ordered);
                    const baseIndent = firstMatch[1].length;
                    const isOrdered = ordered.test(line);
                    const items = [];
                    while (i < lines.length) {
                        const cur = lines[i];
                        if (!cur.trim()) {
                            // blank line breaks the list (matches CommonMark-ish behaviour)
                            i++;
                            break;
                        }
                        const mBul = cur.match(bullet);
                        const mOrd = cur.match(ordered);
                        const m = mBul || mOrd;
                        if (!m) break;
                        if (m[1].length < baseIndent) break;
                        if (m[1].length > baseIndent) break; // shouldn't happen at top of loop
                        // Same-type check: switching between -/* and 1. closes the list
                        if (isOrdered !== !!mOrd) break;

                        const itemBuf = [m[3]];
                        const nestedBuf = [];
                        i++;
                        while (i < lines.length) {
                            const nxt = lines[i];
                            if (!nxt.trim()) break;
                            const nBul = nxt.match(bullet);
                            const nOrd = nxt.match(ordered);
                            const nm = nBul || nOrd;
                            if (nm) {
                                if (nm[1].length > baseIndent) {
                                    // nested list line — dedent and stash
                                    nestedBuf.push(nxt.slice(baseIndent + 2));
                                    i++;
                                    continue;
                                }
                                // sibling or end of list
                                break;
                            }
                            // Plain continuation text
                            if (nestedBuf.length) {
                                // continuation inside the nested block
                                nestedBuf.push(nxt.slice(baseIndent + 2));
                            } else {
                                itemBuf.push(nxt.trim());
                            }
                            i++;
                        }

                        let liHtml = inline(itemBuf.join('\n'));
                        if (nestedBuf.length) {
                            liHtml += renderMarkdown(nestedBuf.join('\n'));
                        }
                        items.push('<li>' + liHtml + '</li>');
                    }
                    out.push((isOrdered ? '<ol>' : '<ul>') + items.join('') + (isOrdered ? '</ol>' : '</ul>'));
                    continue;
                }

                const buf = [line];
                i++;
                while (i < lines.length && lines[i].trim() && !/^#{1,6}\s/.test(lines[i]) && !/^>\s?/.test(lines[i]) && !bullet.test(lines[i]) && !ordered.test(lines[i]) && !/^```/.test(lines[i]) && !tableRow.test(lines[i])) {
                    buf.push(lines[i]);
                    i++;
                }
                out.push('<p>' + inline(buf.join(' ')) + '</p>');
            }
            return out.join('\n');
        }

        // Block dispatcher. New block types plug in here.
        const renderers = {
            markdown: function (block) {
                const div = document.createElement('div');
                div.innerHTML = renderMarkdown(block.content);
                return div;
            },
            mermaid: function (block) {
                // Mermaid scans elements with class "mermaid" whose textContent
                // is the diagram source. We collect these nodes and run
                // mermaid.run() once after all blocks are in the DOM.
                const div = document.createElement('div');
                div.className = 'mermaid';
                div.textContent = block.content;
                return div;
            },
            'force-graph': function (block) {
                // build.py emits parsed JSON: {nodes:[{id,size}], links:[{source,target}]}.
                // We instantiate force-graph after the container is in the DOM
                // so it can measure its own width.
                const div = document.createElement('div');
                div.className = 'force-graph';
                const data = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.ForceGraph) return;
                    const maxSize = data.nodes.reduce((m, n) => Math.max(m, n.size || 1), 1);
                    window.ForceGraph()(div)
                        .graphData(data)
                        .width(div.clientWidth)
                        .height(div.clientHeight)
                        .nodeRelSize(4)
                        .nodeVal(n => Math.max(20 * (n.size || 1) / maxSize, 0.001))
                        .nodeLabel(n => n.id + ' (' + (n.size || 1) + ')')
                        .nodeColor(() => 'rgba(135, 206, 235, 0.7)')
                        .linkColor(() => 'rgba(60, 60, 60, 0.4)')
                        .linkDirectionalArrowLength(4)
                        .linkDirectionalArrowRelPos(1)
                        .linkWidth(1);
                });
                return div;
            },
            'bubble-chart': function (block) {
                // build.py emits {nodes:[{name,size}]}. Renders a D3 circle-pack
                // SVG (same shape as the obren.io reference, just inline).
                const wrap = document.createElement('div');
                wrap.className = 'bubble-chart';
                const payload = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.d3) return;
                    const diameter = 480;
                    const fill = '#c0deed';
                    const textColor = '#111111';
                    const fontSize = 12;

                    const svg = window.d3.select(wrap).append('svg')
                        .attr('viewBox', '0 0 ' + diameter + ' ' + diameter)
                        .attr('width', diameter)
                        .attr('height', diameter);

                    const root = window.d3.hierarchy({children: payload.nodes})
                        .sum(d => d.size || 0)
                        .sort((a, b) => b.value - a.value);

                    window.d3.pack().size([diameter, diameter]).padding(2)(root);

                    const node = svg.selectAll('g')
                        .data(root.leaves())
                        .enter().append('g')
                        .attr('transform', d => 'translate(' + d.x + ',' + d.y + ')');

                    node.append('title').text(d => d.data.name + ': ' + d.value);
                    node.append('circle').attr('r', d => d.r).style('fill', fill);
                    node.append('text')
                        .attr('dy', '.3em')
                        .style('text-anchor', 'middle')
                        .style('fill', textColor)
                        .style('font-size', fontSize + 'px')
                        .text(d => d.data.name.substring(0, Math.max(0, Math.floor(d.r / 3))));
                });
                return wrap;
            }
        };

        // Render one modality's blocks into a host element. Mermaid runs
        // scoped to just the nodes created here, so lazily rendered tabs get
        // their diagrams on first activation.
        let mermaidInitialized = false;
        function renderBlocksInto(blocks, host) {
            const mermaidNodes = [];
            blocks.forEach(function (block) {
                const r = renderers[block.type];
                if (!r) {
                    const pre = document.createElement('pre');
                    pre.textContent = '[unknown block type: ' + block.type + ']';
                    host.appendChild(pre);
                    return;
                }
                const node = r(block);
                if (node instanceof Node) {
                    host.appendChild(node);
                    if (block.type === 'mermaid') mermaidNodes.push(node);
                }
            });
            if (mermaidNodes.length && window.mermaid) {
                if (!mermaidInitialized) {
                    window.mermaid.initialize({startOnLoad: false, theme: 'default'});
                    mermaidInitialized = true;
                }
                window.mermaid.run({nodes: mermaidNodes});
            }
        }

        // Modality tabs. One <article class="pane"> per modality; panes are
        // rendered lazily on first activation (force-graph / D3 / mermaid
        // need a visible, measurable container). With a single modality the
        // tab bar stays hidden and the page looks exactly like before.
        const mods = data.modalities;
        const tabBar = document.getElementById('modality-tabs');
        const panes = {};
        const tabButtons = {};
        const renderedPanes = {};

        mods.forEach(function (m) {
            const pane = document.createElement('article');
            pane.className = 'pane';
            pane.dataset.key = m.key;
            pane.hidden = true;
            root.appendChild(pane);
            panes[m.key] = pane;
        });

        const defaultKey = mods.some(m => m.key === 'index') ? 'index' : mods[0].key;

        function activate(key, updateHash) {
            mods.forEach(function (m) {
                const isActive = m.key === key;
                panes[m.key].hidden = !isActive;
                if (tabButtons[m.key]) {
                    tabButtons[m.key].classList.toggle('active', isActive);
                    tabButtons[m.key].setAttribute('aria-selected', isActive ? 'true' : 'false');
                }
            });
            // Unhide first, then render: the chart libraries measure widths.
            if (!renderedPanes[key]) {
                renderBlocksInto(mods.find(m => m.key === key).blocks, panes[key]);
                renderedPanes[key] = true;
            }
            if (updateHash) {
                history.replaceState(null, '',
                    key === defaultKey ? location.pathname + location.search : '#' + key);
            }
        }

        if (mods.length > 1) {
            mods.forEach(function (m) {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.textContent = m.label;
                btn.setAttribute('role', 'tab');
                btn.addEventListener('click', function () { activate(m.key, true); });
                tabBar.appendChild(btn);
                tabButtons[m.key] = btn;
            });
            tabBar.hidden = false;
        }

        // The hash selects a tab only when it matches a modality key, so
        // existing anchors keep working.
        const initialHash = location.hash.slice(1);
        activate(mods.some(m => m.key === initialHash) ? initialHash : defaultKey, false);
        window.addEventListener('hashchange', function () {
            const k = location.hash.slice(1);
            if (mods.some(m => m.key === k)) activate(k, false);
        });
    })();
</script>
