<script id="data" type="application/json">{"meta": {"title": "Anatomy of a Journal", "date": "2026-05-22", "author": "by Željko Obrenović (obren.io)", "permalink": "anatomy-of-a-journal", "timetoread": "8 min", "excerpt": "A journal is a small source tree: one config file, a posts folder, optional assets, and per-post folders that keep the article, its spec, and its media together.", "tags": "journal structure, config, posts, front matter", "icon": "assets/icons/anatomy-of-a-journal.png", "logo": "assets/images/anatomy-of-a-journal/logo.jpeg", "logo_credit": "Image generated by Google Gemini (gemini-3-pro-image-preview)"}, "tags": ["journal structure", "config", "posts", "front matter"], "modalities": [{"key": "index", "label": "Article", "meta": {}, "blocks": [{"type": "markdown", "content": "> A journal is a small source tree: one config file, a posts folder, optional assets, and per-post folders that keep the article, its spec, and its media together.\n\nEvery generated journal starts as a directory under `_journals/`.\n\nIf that directory has a `config.yaml`, the build treats it as a journal. If it does not, the build skips it. That makes it safe to leave placeholder directories around, but a publishable journal needs a config and posts.\n\n## Journal Folder\n\nThe usual shape is:\n\n```text\n_journals/<journal>/\n  config.yaml\n  assets/\n  posts/\n```\n\n`config.yaml` is the table of contents. `posts/` contains the source articles. `assets/` is optional journal-level media.\n\nGenerated output goes to:\n\n```text\ndocs/<journal>/\n```\n\nThe generated directory is removed and recreated during a build of that journal, so it should never be treated as the editing surface. In [Spec-Driven Journals](https://github.com/zeljkoobrenovic/spec-driven-journals), source lives in the official project repository, while the generated reading surface is [zeljkoobrenovic.github.io/spec-driven-journals](https://zeljkoobrenovic.github.io/spec-driven-journals/).\n\n## Config File\n\nThe config file gives the journal its identity and order:\n\n```yaml\ntitle: Spec-Driven Journals\ndescription: \"A field guide to Spec-Driven Journals.\"\n\nsections:\n  - title: Foundations\n    description: \"The core ideas.\"\n    posts:\n      - what-are-spec-driven-journals/index.md\n```\n\nPost paths are relative to `_journals/<journal>/posts/`.\n\nThe generator sorts posts by basename, but with the per-post folder layout every post path ends in `index.md`. Python's stable sort preserves the config order, so the YAML order remains the reading order.\n\n## Per-Post Folder\n\nCurrent journals use this layout:\n\n```text\nposts/<slug>/\n  index.md\n  spec.md\n  summary.md     (optional modality)\n  dialog.md      (optional modality)\n  comics.md      (optional modality)\n  assets/\n    images/\n    icons/\n```\n\n`index.md` is the published article source — the required, default modality.\n\n`spec.md` is the working contract for non-trivial articles. When present, it is rendered as `docs/<journal>/<permalink>.spec.html`, and the post page gets a \"View spec\" link in its byline.\n\n`summary.md`, `dialog.md`, and `comics.md` are optional **modality** docs driven by the same spec: a management summary, a two-host conversation, and an explainer comic. Each one that exists becomes a tab on the same generated post page (Article · Summary · Conversation · Comic), with the article as the default tab. Discovery is file presence — no config changes needed — and the post URL stays stable; tabs are deep-linkable via URL hash (`#summary`, `#dialog`, `#comics`).\n\nPer-post `assets/` are merged into the generated journal-level `assets/` folder. That lets body content use simple paths such as:\n\n```markdown\n![Diagram](assets/images/diagram.png)\n```\n\n![Journal folder anatomy](assets/images/journal-folder-anatomy.png)\n*Illustration placeholder: `journal-folder-anatomy.png` should show `config.yaml`, `posts/<slug>/index.md`, `spec.md`, per-post `assets/images/`, and the generated `docs/<journal>/` output, including asset copying.*\n\n## Front Matter\n\nPosts start with front matter:\n\n```markdown\n---\ntitle: \"Anatomy of a Journal\"\ndate: 2026-05-22\nauthor: by Željko Obrenović (obren.io)\npermalink: anatomy-of-a-journal\ntimetoread: 8 min\nexcerpt: \"A short index-card summary.\"\ntags: journal structure, config, posts\nicon: assets/icons/anatomy-of-a-journal.png\nlogo: assets/images/anatomy-of-a-journal/logo.jpeg\nlogo_credit: Image generated by Google Gemini\n---\n```\n\nThe most important fields are:\n\n| Field | Role |\n| --- | --- |\n| `title` | Used in post pages, index cards, browser titles, and cross-link text. |\n| `permalink` | Stable output slug. The page becomes `docs/<journal>/<permalink>.html`. |\n| `excerpt` | Summary shown on the journal index card. |\n| `tags` | Comma-separated chips on the post page. |\n| `icon` | Optional index-card image. |\n| `logo` | Optional post hero image. |\n\nFor already-published posts, `permalink` should be stable. Rewording a title is normal; changing a permalink breaks links.\n\n## Specs\n\nA spec has small front matter and a predictable body:\n\n```markdown\n---\nstatus: draft\nrevised: 2026-05-22\n---\n\n# Spec: Anatomy of a Journal\n\n## Intent\n...\n```\n\nThe important spec sections are:\n\n- Intent\n- Audience\n- Success criteria\n- Non-goals\n- Modalities (which docs the spec drives beyond the article)\n- Open questions\n- Decision log\n- Sources\n- Changelog\n\nSpecs are not public polish. They are working documents. Their job is to make intent visible before the article text hardens.\n\n## Journal-Level Assets\n\nSome assets belong to the journal as a whole:\n\n```text\n_journals/<journal>/assets/\n```\n\nThese are copied directly into `docs/<journal>/assets/`.\n\nPer-post assets are better when the image or file belongs to a specific article. Journal-level assets are better for shared icons, shared images, or a journal logo.\n\n## What To Check When Adding A Post\n\nBefore considering a post wired correctly, check:\n\n- The folder exists under `_journals/<journal>/posts/<slug>/`.\n- `index.md` has front matter with a stable `permalink`.\n- A non-trivial post has a sibling `spec.md`.\n- The post path appears in `config.yaml`.\n- Any images use `assets/...` paths.\n- The scoped journal build writes `docs/<journal>/<permalink>.html`.\n- The generated page has a \"View spec\" link if the spec exists.\n- If modality files exist, the generated page shows their tabs and the article stays the default.\n\nThat is the basic anatomy. The next article, [Cross-Links, Assets, and Blocks](cross-links-assets-and-blocks.html), explains how content inside those post folders becomes links, images, diagrams, and richer rendered blocks.\n"}]}, {"key": "summary", "label": "Summary", "meta": {"timetoread": "2 min"}, "blocks": [{"type": "markdown", "content": "A journal is a small source tree: one `config.yaml`, a `posts/` folder, optional assets, and per-post folders that keep the article, its spec, and its media together. Anyone who understands that shape can add or inspect a journal without reading the generator first.\n\nThe contract is simple. A directory under `_journals/` with a `config.yaml` is a journal; without one, the build skips it. The config is the table of contents — title, description, and sections listing post paths relative to `posts/`. The YAML order is the reading order. Output goes to `docs/<journal>/`, which is removed and recreated on every build of that journal: source lives in the [Spec-Driven Journals](https://github.com/zeljkoobrenovic/spec-driven-journals) repository, the generated site is only the reading surface.\n\n**What changes**\n\n- Each post is a folder, `posts/<slug>/`, holding `index.md` (the required article), an optional sibling `spec.md`, optional modality docs (`summary.md`, `dialog.md`, `comics.md`), and its own `assets/`. Everything an article needs travels together.\n- Front matter drives the generated page: `permalink` fixes the output URL (`docs/<journal>/<permalink>.html`); `title` feeds pages, index cards, browser titles, and cross-link text; `excerpt`, `tags`, `icon`, and `logo` shape the index card and post header. Published permalinks do not change — retitling is normal, moving URLs is not.\n- When `spec.md` exists, it renders at `<permalink>.spec.html` and the post byline gets a \"View spec\" link. Specs are working documents with a predictable body — Intent, Audience, Success criteria, Non-goals, Modalities, Open questions, Decision log, Sources, Changelog — whose job is to make intent visible before the article text hardens.\n- Modality files become tabs on the same post page (Article · Summary · Conversation · Comic), discovered by file presence with no config changes, deep-linkable via `#summary`, `#dialog`, `#comics`. The article stays the default tab and the URL stays stable.\n- Per-post `assets/` merge into the journal-level `assets/` at build time, so body content uses plain `assets/images/...` paths regardless of where the file lives in source.\n\n**What it costs**\n\n- A new post is several deliberate steps, not one file: folder, front matter with a stable permalink, a spec for anything non-trivial, a config entry, and a build check that the page, spec link, and tabs all appear.\n- The generated `docs/` tree is disposable, so it can never be hand-edited — every fix has to land in `_journals/` source.\n\n**What we are not doing**\n\n- No exhaustive Markdown syntax reference — content mechanics follow in [Cross-Links, Assets, and Blocks](cross-links-assets-and-blocks.html).\n- No implementation tour of `build.py`, and no visual design documentation.\n\nThe Article tab covers the folder layouts, the front matter field table, and the full wiring checklist for adding a post.\n"}]}, {"key": "dialog", "label": "Conversation", "meta": {"timetoread": "8 min listen"}, "blocks": [{"type": "markdown", "content": "## Why care about a folder layout?\n\n**Ben:** Ana, be honest with me. This post is about directories and a YAML file. Why does anyone need eight minutes on where files go?\n\n**Ana:** Because the folder layout *is* the system. The whole promise of the post is that you can add or inspect a journal without reading the generator first. If the structure is predictable enough, the directory tree becomes the documentation: one `config.yaml`, a `posts/` folder, optional assets, and per-post folders that keep the article, its spec, and its media together. Learn that shape once and every journal in the repository reads the same way.\n\n**Ben:** Fine, but \"a directory under `_journals/`\" — what makes one of those a journal and not just a folder someone left lying around?\n\n**Ana:** Exactly one thing: a `config.yaml`. If the directory has one, the build treats it as a journal. If it doesn't, the build skips it. That single rule does double duty — it's the on switch for publishing, and it makes placeholder directories safe. You can park a half-formed journal idea as an empty folder and nothing breaks.\n\n**Ben:** And the config itself? Sell me on why I should care what's in it.\n\n**Ana:** It's the table of contents. Title, description, and sections, where each section lists post paths relative to `posts/`. The detail worth knowing: the generator sorts posts by basename, but with the per-post folder layout every path ends in `index.md`, so Python's stable sort preserves the config order. Translation — the order you write in the YAML is the order readers see. No dates doing surprise reordering, no hidden ranking. The file you edit is the reading order.\n\n## One post, one folder\n\n**Ben:** Now the per-post folder. The older convention in static-site land is a flat file per post — `2026-05-22-my-post.md`, done. Why is a whole folder per post the preferred shape here?\n\n**Ana:** Because a post stopped being one file. Look at what the folder holds: `index.md` is the published article — the required, default modality. Next to it sits `spec.md`, the working contract for non-trivial articles. Then the optional modality docs — `summary.md`, `dialog.md`, `comics.md`. And an `assets/` directory with the post's own images and icons. A flat file can't keep that family together; a folder can. Everything an article needs travels as one unit, which is also exactly what the spec for this post calls out as a success criterion — the reader should understand *why* the per-post layout is preferred.\n\n**Ben:** The assets bother me, though. If every post buries its images in its own `assets/` subfolder, don't the image paths inside the article turn into long relative gymnastics?\n\n**Ana:** They would, except the build flattens it for you. Per-post `assets/` are merged into the generated journal-level `assets/` folder. So inside the article body you write a plain `assets/images/diagram.png` path and it resolves on the rendered page, no matter that the file physically lives inside the post's folder in source. Authors get locality; readers get simple URLs.\n\n**Ben:** And the output side? Where does all this end up?\n\n**Ana:** `docs/<journal>/` — and here's the rule people trip on: that generated directory is removed and recreated during a build of that journal. It is never the editing surface. Source lives in the official Spec-Driven Journals repository under `_journals/`; the generated site at zeljkoobrenovic.github.io is just the reading surface. If you ever catch yourself fixing a typo in `docs/`, the build will erase your fix the next time it runs.\n\n## Front matter is the page\n\n**Ben:** Okay, front matter. Every static-site system has it and every author ignores half of it. Which fields actually matter here?\n\n**Ana:** A handful, each with a visible job. `title` shows up in the post page, the index card, the browser title, *and* the cross-link text when other posts link to this one. `excerpt` is the summary on the journal index card. `tags` become chips on the post page. `icon` and `logo` are the optional index-card image and the post hero. But the one with teeth is `permalink`.\n\n**Ben:** Teeth how?\n\n**Ana:** The permalink is the stable output slug — the page becomes `docs/<journal>/<permalink>.html`. The post is explicit about the asymmetry: for already-published posts, rewording a title is normal; changing a permalink breaks links. So the title is yours to polish forever, and the permalink is frozen the moment the post ships. Front matter controls the generated URL, and URLs are promises.\n\n**Ben:** Let's get to the spec, since the whole series is named after it. What does `spec.md` actually buy a post about folder structure?\n\n**Ana:** The same thing it buys any non-trivial post. A spec has small front matter — a status and a revised date — and a predictable body: Intent, Audience, Success criteria, Non-goals, Modalities, Open questions, Decision log, Sources, Changelog. The post's framing is the part I'd quote: specs are not public polish, they are working documents, and their job is to make intent visible *before* the article text hardens. And the build takes them seriously — when a `spec.md` exists, it renders as `<permalink>.spec.html` and the post page gets a \"View spec\" link in its byline. The contract is published right next to the artifact.\n\n## Tabs without configuration\n\n**Ben:** Now the modality files. Summary, dialog, comic — we're literally inside one right now. What's the mechanism?\n\n**Ana:** File presence, and only file presence. Drop `summary.md`, `dialog.md`, or `comics.md` next to `index.md` and each one that exists becomes a tab on the same generated post page — Article, Summary, Conversation, Comic — with the article as the default tab. No config changes, no registration step. And the tabs are deep-linkable via URL hash: `#summary`, `#dialog`, `#comics`.\n\n**Ben:** That's the part I'd push on. Three more documents per post sounds like three more things that rot. Why bolt them onto the same page instead of making them separate posts?\n\n**Ana:** Because they're not separate ideas — they're the same record in different registers, all driven by the same spec. Keeping them in one folder, on one page, at one stable URL means the post's identity doesn't fragment. The spec even tracks which modalities it drives, so when one exists, it's accounted for in the contract rather than floating free. And note they're optional. `index.md` is the only required modality; a trivial post can stay a single article forever.\n\n**Ben:** Suppose I'm convinced and I add a post tomorrow. What's my \"did I wire it right\" check?\n\n**Ana:** The post closes with exactly that checklist. The folder exists under `posts/<slug>/`. `index.md` has front matter with a stable permalink. A non-trivial post has a sibling `spec.md`. The post path appears in `config.yaml`. Images use `assets/...` paths. The scoped build writes `docs/<journal>/<permalink>.html`. The generated page has a \"View spec\" link if the spec exists. And if modality files exist, the page shows their tabs with the article still the default. Eight checks, all mechanical, all observable in the output.\n\n## What this post is not\n\n**Ben:** Last thing — fence it off. What did this post deliberately *not* try to be?\n\n**Ana:** Three explicit non-goals. It's not an exhaustive Markdown syntax reference — the follow-up article, [Cross-Links, Assets, and Blocks](cross-links-assets-and-blocks.html), covers how content inside these folders becomes links, images, diagrams, and richer rendered blocks. It's not a tour of the generator's implementation — you get the contract `build.py` honors, not its internals. And it's not visual design documentation. This is anatomy in the literal sense: the parts, where they live, and how they connect.\n\n**Ben:** So the pitch is: one config file as the on switch and table of contents, one folder per post holding the article, the contract, and the media, and front matter as the page's control panel.\n\n**Ana:** That's the whole skeleton. And once you can see it in one journal, you can see it in all of them — which is the point of having an anatomy in the first place.\n"}]}, {"key": "comics", "label": "Comic", "meta": {"timetoread": "3 min"}, "blocks": [{"type": "markdown", "content": "<!-- comic-style\n{\n  \"cast\": \"MAYA: a pragmatic engineer-author, short dark hair, glasses, rolled-up sleeves, calm and slightly amused, often holding a marker or a printed page. REX: an over-eager boxy robot AI assistant, one bent antenna, glowing rectangular eyes, perpetually carrying or printing too many documents.\",\n  \"style\": \"Clean two-tone explainer comic, thick ink outlines, flat colors with blue/teal accents on a light cream background, generous white space, hand-lettered speech bubbles with SHORT readable text (max 8 words per bubble), simple geometric office/library/print-shop settings mixing documents with software symbols, no photorealism, no dense text, no title text.\"\n}\n-->\n\nA journal is a small source tree you can read like a map — in eight panels.\n\n![Comic panel: an engineer shows a small tree with folder-labeled branches to a curious robot holding a magnifying glass.](assets/images/anatomy-of-a-journal/comic-01-the-source-tree.jpeg)\n**Panel 1:** *One config file, a posts folder, optional assets — that is the whole anatomy.*\n\n![Comic panel: a robot hesitates between two doors, one bearing a glowing config.yaml badge and one plain.](assets/images/anatomy-of-a-journal/comic-02-folder-or-journal.jpeg)\n**Panel 2:** *Two directories can look the same — only one is a journal.*\n\n![Comic panel: an engineer flips a document-shaped wall switch and a table-of-contents receipt prints out for the robot.](assets/images/anatomy-of-a-journal/comic-03-config-is-the-switch.jpeg)\n**Panel 3:** *config.yaml turns a folder into a journal and fixes the reading order.*\n\n![Comic panel: a robot wheels a crate holding an article, a spec, and an assets box while an engineer nods.](assets/images/anatomy-of-a-journal/comic-04-everything-travels-together.jpeg)\n**Panel 4:** *The per-post folder: article, spec, and media travel as one unit.*\n\n![Comic panel: an engineer repaints a sign while stopping a robot from unbolting the address plaque locked under glass.](assets/images/anatomy-of-a-journal/comic-05-permalink-is-a-promise.jpeg)\n**Panel 5:** *Front matter drives the page — and the permalink is a promise.*\n\n![Comic panel: an engineer pins a blueprint beside a framed article on a corkboard while a robot reads its sections.](assets/images/anatomy-of-a-journal/comic-06-spec-beside-the-article.jpeg)\n**Panel 6:** *spec.md is not polish — it is the contract published beside the post.*\n\n![Comic panel: a robot files three documents into a slot while a browser window above grows matching tabs.](assets/images/anatomy-of-a-journal/comic-07-tabs-by-file-presence.jpeg)\n**Panel 7:** *Summary, dialog, comic: discovered by file presence, no config changes.*\n\n![Comic panel: a robot tries to edit a freshly printed page at a machine labeled docs while an engineer points to the source crate.](assets/images/anatomy-of-a-journal/comic-08-source-not-output.jpeg)\n**Panel 8:** *docs/ is rebuilt every time — the journal lives in its source tree.*\n"}]}]}</script>
<script>
    (function () {
        const data = JSON.parse(document.getElementById('data').textContent);
        const root = document.getElementById('content');

        const postId = (data.meta && data.meta.id) ? String(data.meta.id) : '';
        const postStatusRaw = (data.meta && data.meta.status) ? String(data.meta.status) : '';
        if (postId || postStatusRaw) {
            const header = document.getElementById('post-header');
            let sectionEl = header.querySelector('p.section');
            if (!sectionEl) {
                sectionEl = document.createElement('p');
                sectionEl.className = 'section';
                header.insertBefore(sectionEl, header.firstChild);
            }
            // Status pill goes first, then a " / " separator before the existing
            // content (section name and/or id).
            if (postStatusRaw) {
                const parts = postStatusRaw.split(':');
                const statusName = parts[0].trim();
                const statusColor = (parts[1] || '').trim();
                const wrap = document.createElement('span');
                wrap.className = 'post-status';
                const dot = document.createElement('span');
                dot.className = 'status-dot';
                if (statusColor) dot.style.background = statusColor;
                wrap.appendChild(dot);
                wrap.appendChild(document.createTextNode(statusName));
                if (sectionEl.firstChild) {
                    sectionEl.insertBefore(document.createTextNode(' • '), sectionEl.firstChild);
                    sectionEl.insertBefore(wrap, sectionEl.firstChild);
                } else {
                    sectionEl.appendChild(wrap);
                }
            }
            if (postId) {
                if (sectionEl.firstChild) sectionEl.appendChild(document.createTextNode(' • '));
                sectionEl.appendChild(document.createTextNode(postId));
            }
        }

        const tagsHost = document.getElementById('tags');
        (data.tags || []).forEach(function (t) {
            const span = document.createElement('span');
            span.className = 'tag';
            span.textContent = t;
            tagsHost.appendChild(span);
        });

        // Minimal markdown renderer. Supports: ATX headings, paragraphs, blockquotes,
        // unordered/ordered lists, fenced code, inline code, bold/italic/strikethrough, links, images, hr.
        // Sufficient for the posts in this repo; replace with a fuller parser if needed.
        function renderMarkdown(src) {
            const lines = src.replace(/\r\n/g, '\n').split('\n');
            const out = [];
            let i = 0;

            const bullet = /^(\s*)([-*])\s+(.*)$/;
            const ordered = /^(\s*)(\d+)\.\s+(.*)$/;
            const tableRow = /^\s*\|(.+)\|\s*$/;
            const tableSep = /^\s*\|?\s*:?-{3,}:?\s*(\|\s*:?-{3,}:?\s*)+\|?\s*$/;

            function splitRow(s) {
                let t = s.trim();
                if (t.startsWith('|')) t = t.slice(1);
                if (t.endsWith('|')) t = t.slice(0, -1);
                return t.split('|').map(c => c.trim());
            }

            function inline(s) {
                // Posts are trusted content, so raw HTML passes through unescaped
                // (some posts embed inline <blockquote>, <div>, etc.).
                // Stray ampersands still get fixed up.
                s = s.replace(/&(?![a-zA-Z]+;|#\d+;)/g, '&amp;');
                s = s.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<a class="image-link" href="$2" target="_blank" rel="noopener noreferrer"><img alt="$1" src="$2"></a>');
                s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
                s = s.replace(/`([^`]+)`/g, function (_, c) {
                    return '<code>' + c.replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</code>';
                });
                s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
                s = s.replace(/~~([^~\n]+)~~/g, '<del>$1</del>');
                s = s.replace(/(^|[^*])\*([^*\n]+)\*/g, '$1<em>$2</em>');
                return s;
            }

            while (i < lines.length) {
                const line = lines[i];
                if (!line.trim()) {
                    i++;
                    continue;
                }

                const fence = line.match(/^```(\w*)\s*$/);
                if (fence) {
                    i++;
                    const buf = [];
                    while (i < lines.length && !/^```\s*$/.test(lines[i])) {
                        buf.push(lines[i]);
                        i++;
                    }
                    i++;
                    const escaped = buf.join('\n').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                    const cls = fence[1] ? ' class="lang-' + fence[1] + '"' : '';
                    out.push('<pre><code' + cls + '>' + escaped + '</code></pre>');
                    continue;
                }

                const h = line.match(/^(#{1,6})\s+(.*)$/);
                if (h) {
                    out.push('<h' + h[1].length + '>' + inline(h[2]) + '</h' + h[1].length + '>');
                    i++;
                    continue;
                }

                if (/^\s*(?:-\s*){3,}\s*$/.test(line) || /^\s*\*{3,}\s*$/.test(line)) {
                    out.push('<hr>');
                    i++;
                    continue;
                }

                if (/^>\s?/.test(line)) {
                    const buf = [];
                    while (i < lines.length && /^>\s?/.test(lines[i])) {
                        buf.push(lines[i].replace(/^>\s?/, ''));
                        i++;
                    }
                    out.push('<blockquote>' + renderMarkdown(buf.join('\n')) + '</blockquote>');
                    continue;
                }

                if (tableRow.test(line) && i + 1 < lines.length && tableSep.test(lines[i + 1])) {
                    const headers = splitRow(line);
                    i += 2;
                    const rows = [];
                    while (i < lines.length && tableRow.test(lines[i])) {
                        rows.push(splitRow(lines[i]));
                        i++;
                    }
                    let html = '<table><thead><tr>';
                    headers.forEach(h => {
                        html += '<th>' + inline(h) + '</th>';
                    });
                    html += '</tr></thead><tbody>';
                    rows.forEach(r => {
                        html += '<tr>';
                        r.forEach(c => {
                            html += '<td>' + inline(c) + '</td>';
                        });
                        html += '</tr>';
                    });
                    html += '</tbody></table>';
                    out.push(html);
                    continue;
                }

                if (bullet.test(line) || ordered.test(line)) {
                    // Indent of the first bullet defines this list's base level.
                    // Deeper-indented bullets become nested lists (rendered by
                    // recursing into renderMarkdown). Same-or-less indent at a
                    // bullet starts a sibling item (or ends the list).
                    const firstMatch = line.match(bullet) || line.match(ordered);
                    const baseIndent = firstMatch[1].length;
                    const isOrdered = ordered.test(line);
                    const items = [];
                    while (i < lines.length) {
                        const cur = lines[i];
                        if (!cur.trim()) {
                            // blank line breaks the list (matches CommonMark-ish behaviour)
                            i++;
                            break;
                        }
                        const mBul = cur.match(bullet);
                        const mOrd = cur.match(ordered);
                        const m = mBul || mOrd;
                        if (!m) break;
                        if (m[1].length < baseIndent) break;
                        if (m[1].length > baseIndent) break; // shouldn't happen at top of loop
                        // Same-type check: switching between -/* and 1. closes the list
                        if (isOrdered !== !!mOrd) break;

                        const itemBuf = [m[3]];
                        const nestedBuf = [];
                        i++;
                        while (i < lines.length) {
                            const nxt = lines[i];
                            if (!nxt.trim()) break;
                            const nBul = nxt.match(bullet);
                            const nOrd = nxt.match(ordered);
                            const nm = nBul || nOrd;
                            if (nm) {
                                if (nm[1].length > baseIndent) {
                                    // nested list line — dedent and stash
                                    nestedBuf.push(nxt.slice(baseIndent + 2));
                                    i++;
                                    continue;
                                }
                                // sibling or end of list
                                break;
                            }
                            // Plain continuation text
                            if (nestedBuf.length) {
                                // continuation inside the nested block
                                nestedBuf.push(nxt.slice(baseIndent + 2));
                            } else {
                                itemBuf.push(nxt.trim());
                            }
                            i++;
                        }

                        let liHtml = inline(itemBuf.join('\n'));
                        if (nestedBuf.length) {
                            liHtml += renderMarkdown(nestedBuf.join('\n'));
                        }
                        items.push('<li>' + liHtml + '</li>');
                    }
                    out.push((isOrdered ? '<ol>' : '<ul>') + items.join('') + (isOrdered ? '</ol>' : '</ul>'));
                    continue;
                }

                const buf = [line];
                i++;
                while (i < lines.length && lines[i].trim() && !/^#{1,6}\s/.test(lines[i]) && !/^>\s?/.test(lines[i]) && !bullet.test(lines[i]) && !ordered.test(lines[i]) && !/^```/.test(lines[i]) && !tableRow.test(lines[i])) {
                    buf.push(lines[i]);
                    i++;
                }
                out.push('<p>' + inline(buf.join(' ')) + '</p>');
            }
            return out.join('\n');
        }

        // Block dispatcher. New block types plug in here.
        const renderers = {
            markdown: function (block) {
                const div = document.createElement('div');
                div.innerHTML = renderMarkdown(block.content);
                return div;
            },
            mermaid: function (block) {
                // Mermaid scans elements with class "mermaid" whose textContent
                // is the diagram source. We collect these nodes and run
                // mermaid.run() once after all blocks are in the DOM.
                const div = document.createElement('div');
                div.className = 'mermaid';
                div.textContent = block.content;
                return div;
            },
            'force-graph': function (block) {
                // build.py emits parsed JSON: {nodes:[{id,size}], links:[{source,target}]}.
                // We instantiate force-graph after the container is in the DOM
                // so it can measure its own width.
                const div = document.createElement('div');
                div.className = 'force-graph';
                const data = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.ForceGraph) return;
                    const maxSize = data.nodes.reduce((m, n) => Math.max(m, n.size || 1), 1);
                    window.ForceGraph()(div)
                        .graphData(data)
                        .width(div.clientWidth)
                        .height(div.clientHeight)
                        .nodeRelSize(4)
                        .nodeVal(n => Math.max(20 * (n.size || 1) / maxSize, 0.001))
                        .nodeLabel(n => n.id + ' (' + (n.size || 1) + ')')
                        .nodeColor(() => 'rgba(135, 206, 235, 0.7)')
                        .linkColor(() => 'rgba(60, 60, 60, 0.4)')
                        .linkDirectionalArrowLength(4)
                        .linkDirectionalArrowRelPos(1)
                        .linkWidth(1);
                });
                return div;
            },
            'bubble-chart': function (block) {
                // build.py emits {nodes:[{name,size}]}. Renders a D3 circle-pack
                // SVG (same shape as the obren.io reference, just inline).
                const wrap = document.createElement('div');
                wrap.className = 'bubble-chart';
                const payload = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.d3) return;
                    const diameter = 480;
                    const fill = '#c0deed';
                    const textColor = '#111111';
                    const fontSize = 12;

                    const svg = window.d3.select(wrap).append('svg')
                        .attr('viewBox', '0 0 ' + diameter + ' ' + diameter)
                        .attr('width', diameter)
                        .attr('height', diameter);

                    const root = window.d3.hierarchy({children: payload.nodes})
                        .sum(d => d.size || 0)
                        .sort((a, b) => b.value - a.value);

                    window.d3.pack().size([diameter, diameter]).padding(2)(root);

                    const node = svg.selectAll('g')
                        .data(root.leaves())
                        .enter().append('g')
                        .attr('transform', d => 'translate(' + d.x + ',' + d.y + ')');

                    node.append('title').text(d => d.data.name + ': ' + d.value);
                    node.append('circle').attr('r', d => d.r).style('fill', fill);
                    node.append('text')
                        .attr('dy', '.3em')
                        .style('text-anchor', 'middle')
                        .style('fill', textColor)
                        .style('font-size', fontSize + 'px')
                        .text(d => d.data.name.substring(0, Math.max(0, Math.floor(d.r / 3))));
                });
                return wrap;
            }
        };

        // Render one modality's blocks into a host element. Mermaid runs
        // scoped to just the nodes created here, so lazily rendered tabs get
        // their diagrams on first activation.
        let mermaidInitialized = false;
        function renderBlocksInto(blocks, host) {
            const mermaidNodes = [];
            blocks.forEach(function (block) {
                const r = renderers[block.type];
                if (!r) {
                    const pre = document.createElement('pre');
                    pre.textContent = '[unknown block type: ' + block.type + ']';
                    host.appendChild(pre);
                    return;
                }
                const node = r(block);
                if (node instanceof Node) {
                    host.appendChild(node);
                    if (block.type === 'mermaid') mermaidNodes.push(node);
                }
            });
            if (mermaidNodes.length && window.mermaid) {
                if (!mermaidInitialized) {
                    window.mermaid.initialize({startOnLoad: false, theme: 'default'});
                    mermaidInitialized = true;
                }
                window.mermaid.run({nodes: mermaidNodes});
            }
        }

        // Modality tabs. One <article class="pane"> per modality; panes are
        // rendered lazily on first activation (force-graph / D3 / mermaid
        // need a visible, measurable container). With a single modality the
        // tab bar stays hidden and the page looks exactly like before.
        const mods = data.modalities;
        const tabBar = document.getElementById('modality-tabs');
        const panes = {};
        const tabButtons = {};
        const renderedPanes = {};

        mods.forEach(function (m) {
            const pane = document.createElement('article');
            pane.className = 'pane';
            pane.dataset.key = m.key;
            pane.hidden = true;
            root.appendChild(pane);
            panes[m.key] = pane;
        });

        const defaultKey = mods.some(m => m.key === 'index') ? 'index' : mods[0].key;

        function activate(key, updateHash) {
            mods.forEach(function (m) {
                const isActive = m.key === key;
                panes[m.key].hidden = !isActive;
                if (tabButtons[m.key]) {
                    tabButtons[m.key].classList.toggle('active', isActive);
                    tabButtons[m.key].setAttribute('aria-selected', isActive ? 'true' : 'false');
                }
            });
            // Unhide first, then render: the chart libraries measure widths.
            if (!renderedPanes[key]) {
                renderBlocksInto(mods.find(m => m.key === key).blocks, panes[key]);
                renderedPanes[key] = true;
            }
            if (updateHash) {
                history.replaceState(null, '',
                    key === defaultKey ? location.pathname + location.search : '#' + key);
            }
        }

        if (mods.length > 1) {
            mods.forEach(function (m) {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.textContent = m.label;
                btn.setAttribute('role', 'tab');
                btn.addEventListener('click', function () { activate(m.key, true); });
                tabBar.appendChild(btn);
                tabButtons[m.key] = btn;
            });
            tabBar.hidden = false;
        }

        // The hash selects a tab only when it matches a modality key, so
        // existing anchors keep working.
        const initialHash = location.hash.slice(1);
        activate(mods.some(m => m.key === initialHash) ? initialHash : defaultKey, false);
        window.addEventListener('hashchange', function () {
            const k = location.hash.slice(1);
            if (mods.some(m => m.key === k)) activate(k, false);
        });
    })();
</script>
