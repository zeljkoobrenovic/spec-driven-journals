<script id="data" type="application/json">{"meta": {"title": "Extending and Maintaining the System", "date": "2026-05-22", "author": "by Željko Obrenović (obren.io)", "permalink": "extending-and-maintaining-the-system", "timetoread": "9 min", "excerpt": "Spec-driven journals can evolve safely when maintainers preserve the small build contract, keep source and generated output separate, add journals deliberately, and verify changes with scoped builds and rendered pages.", "tags": "maintenance, extension, build contracts, start page", "icon": "assets/icons/extending-and-maintaining-the-system.png", "logo": "assets/images/extending-and-maintaining-the-system/logo.jpeg", "logo_credit": "Image generated by Google Gemini (gemini-3-pro-image-preview)"}, "tags": ["maintenance", "extension", "build contracts", "start page"], "modalities": [{"key": "index", "label": "Article", "meta": {}, "blocks": [{"type": "markdown", "content": "> Spec-driven journals can evolve safely when maintainers preserve the small build contract, keep source and generated output separate, add journals deliberately, and verify changes with scoped builds and rendered pages.\n\n[Spec-Driven Journals](https://github.com/zeljkoobrenovic/spec-driven-journals) is intentionally small, but it is not frozen.\n\nNew journals can be added. Templates can change. The renderer can support new block types. The start page can publish new entries. Helper scripts can evolve.\n\nThe maintenance challenge is to extend the system without turning it into a hidden framework that authors and AI agents cannot reason about.\n\nFor Spec-Driven Journals, maintenance should keep two public entry points coherent:\n\n| Entry point | Link |\n| --- | --- |\n| Official project repository | [github.com/zeljkoobrenovic/spec-driven-journals](https://github.com/zeljkoobrenovic/spec-driven-journals) |\n| Generated journal site | [zeljkoobrenovic.github.io/spec-driven-journals](https://zeljkoobrenovic.github.io/spec-driven-journals/) |\n\n## Preserve The Core Contract\n\nThe most important contracts are:\n\n| Contract | Why it matters |\n| --- | --- |\n| `_journals/<journal>/config.yaml` defines journal order. | Authors can inspect the table of contents in one file. |\n| Posts use front matter plus markdown body. | Metadata and prose stay together. |\n| Non-trivial posts have sibling specs. | Intent stays visible across sessions. |\n| Generated pages live under `docs/`. | Publication output is separate from source. |\n| Cross-links use double-bracket permalink syntax. | Links survive title changes. |\n| Blocks use `{type, content}`. | New renderers can plug in without changing the payload shape. |\n| The core build uses the Python standard library. | A new machine can build without dependency setup. |\n\n![Journal maintenance contracts map](assets/images/journal-maintenance-contracts-map.png)\n*Illustration placeholder: `journal-maintenance-contracts-map.png` should show the stable contracts around config, permalinks, specs, templates, build script, start-page publication, and verification checks.*\n\nThese contracts are what make Spec-Driven Journals learnable.\n\n## Choose The Smallest Change\n\nMost maintenance work should start with the smallest source change that solves the problem.\n\n| Need | Usually change | Avoid starting with |\n| --- | --- | --- |\n| Add a new collection of articles. | A new journal folder, `config.yaml`, posts, and specs. | Template or build changes. |\n| Add one article. | One post folder, one spec, and the journal config. | A new content format. |\n| Add a repeated visual language. | A documented custom block type after several real examples. | Raw HTML copied into many posts. |\n| Publish a generated journal on the start page. | `_start/_config/apps.json` and the start-page build. | Changing the journal generator. |\n| Fix a rendered problem. | Source markdown, asset paths, templates, or build logic. | Manual edits under `docs/`. |\n\n## Add A Journal\n\nTo add a journal:\n\n1. Create `_journals/<journal>/config.yaml`.\n2. Create `_journals/<journal>/posts/`.\n3. Add at least one post folder with `index.md`.\n4. Add `spec.md` for non-trivial posts.\n5. Add post paths under `sections:` in `config.yaml`.\n6. Build the journal.\n7. Add the generated journal to the start page if it should be discoverable.\n\nThe journal build and start page build are separate. A new journal can generate correctly under `docs/<journal>/` and still not appear on the start page until `_start/_config/apps.json` is updated and `_start/generate-docs.py` is run.\n\nThat separation is useful. It lets maintainers draft a journal before promoting it to the start page.\n\n## Add A Post\n\nTo add a post:\n\n1. Create `_journals/<journal>/posts/<slug>/index.md`.\n2. Create `_journals/<journal>/posts/<slug>/spec.md` if the work is substantive.\n3. Add front matter with a stable `permalink`.\n4. Add the post path to `config.yaml`.\n5. Build the journal.\n6. Inspect the generated post and spec pages.\n\nFor per-post folders, use the same slug for folder and permalink unless there is a clear reason not to. The system does not require that, but readers and maintainers benefit from the alignment.\n\n## Add Or Change A Template\n\nTemplate changes affect many pages.\n\nBefore changing `_templates/index.html`, `_templates/post.html`, or `_templates/site.css`, ask:\n\n- Is this a journal-specific need or a global rendering need?\n- Does the change affect existing posts?\n- Does it preserve the JSON payload contract?\n- Does it preserve raw HTML behavior where existing posts rely on it?\n- Does it need a build-side change too?\n\nTemplate changes should be verified by rebuilding at least the affected journal. Broad template changes should eventually be verified with a full build.\n\n## Add A Custom Block Type\n\nCustom blocks are the main extension point for richer content.\n\nThe pattern is:\n\n1. Add a fence tuple in `_wiring/build.py`.\n2. Optionally add a parser that transforms the raw block into JSON.\n3. Add a renderer function in `_templates/post.html`.\n4. Keep the block payload in the `{type, content}` envelope.\n5. Document the authoring syntax.\n\nDo not add a custom block just because markdown feels slightly inconvenient. Add one when it gives authors a reusable content language that improves several posts.\n\n## Maintain Stable URLs\n\n`permalink:` values are stable URLs.\n\nTitles can change. Section names can change. Folder names can sometimes change before publication. But changing a permalink after publication breaks links and cross-record references.\n\nThis matters more as journals grow. The more a record is cited, the more expensive a permalink change becomes.\n\n## Maintain Agent Instructions\n\n`AGENTS.md`, `CLAUDE.md`, and Spec-Driven Journals READMEs are part of the operating system for AI-mediated authoring.\n\nWhen build behavior changes, update the agent-facing instructions. Otherwise future agents will follow stale rules and produce reasonable-looking wrong work.\n\nGood maintenance keeps three things aligned:\n\n- actual implementation\n- human-facing documentation\n- agent-facing instructions\n\nWhen those drift, Spec-Driven Journals becomes harder to work in.\n\n## Verification Habits\n\nThere is no formal test suite yet. The practical checks are:\n\n```bash\npython3 -m py_compile _wiring/build.py _start/generate-docs.py\npython3 _wiring/build.py\npython3 _start/generate-docs.py\n```\n\nDuring scoped work, build the affected journal:\n\n```bash\npython3 -c \"import _wiring.build as b; index_tpl=(b.TEMPLATES_DIR/'index.html').read_text(encoding='utf-8'); post_tpl=(b.TEMPLATES_DIR/'post.html').read_text(encoding='utf-8'); b.DOCS_DIR.mkdir(exist_ok=True); b.build_journal(b.JOURNALS_DIR/'spec-driven-journals', index_tpl, post_tpl, b.build_crosslink_index())\"\n```\n\nThen inspect:\n\n- generated index page\n- changed post pages\n- generated spec pages\n- copied assets\n- unresolved double-bracket links\n- obvious rendering problems in tables, images, and custom blocks\n\n## When To Keep It Small\n\nThe system should stay small unless a real need appears.\n\nAvoid adding:\n\n- dependencies that only save a few lines\n- framework abstractions that hide simple file operations\n- content formats that only one post uses\n- generated metadata that no reader or maintainer uses\n- styling systems that make the templates harder to inspect\n\nSpec-Driven Journals' strength is that a reader can understand it. Preserve that.\n\n## The Closing Principle\n\nSpec-driven journals work when Spec-Driven Journals remains a clear collaboration surface.\n\nHumans bring intent and judgment. AI agents help edit and verify. Source files preserve the durable artifact. Generated pages make it readable. The build connects those layers with as little machinery as possible.\n\nThat is the system worth maintaining.\n"}]}]}</script>
<script>
    (function () {
        const data = JSON.parse(document.getElementById('data').textContent);
        const root = document.getElementById('content');

        const postId = (data.meta && data.meta.id) ? String(data.meta.id) : '';
        const postStatusRaw = (data.meta && data.meta.status) ? String(data.meta.status) : '';
        if (postId || postStatusRaw) {
            const header = document.getElementById('post-header');
            let sectionEl = header.querySelector('p.section');
            if (!sectionEl) {
                sectionEl = document.createElement('p');
                sectionEl.className = 'section';
                header.insertBefore(sectionEl, header.firstChild);
            }
            // Status pill goes first, then a " / " separator before the existing
            // content (section name and/or id).
            if (postStatusRaw) {
                const parts = postStatusRaw.split(':');
                const statusName = parts[0].trim();
                const statusColor = (parts[1] || '').trim();
                const wrap = document.createElement('span');
                wrap.className = 'post-status';
                const dot = document.createElement('span');
                dot.className = 'status-dot';
                if (statusColor) dot.style.background = statusColor;
                wrap.appendChild(dot);
                wrap.appendChild(document.createTextNode(statusName));
                if (sectionEl.firstChild) {
                    sectionEl.insertBefore(document.createTextNode(' • '), sectionEl.firstChild);
                    sectionEl.insertBefore(wrap, sectionEl.firstChild);
                } else {
                    sectionEl.appendChild(wrap);
                }
            }
            if (postId) {
                if (sectionEl.firstChild) sectionEl.appendChild(document.createTextNode(' • '));
                sectionEl.appendChild(document.createTextNode(postId));
            }
        }

        const tagsHost = document.getElementById('tags');
        (data.tags || []).forEach(function (t) {
            const span = document.createElement('span');
            span.className = 'tag';
            span.textContent = t;
            tagsHost.appendChild(span);
        });

        // Minimal markdown renderer. Supports: ATX headings, paragraphs, blockquotes,
        // unordered/ordered lists, fenced code, inline code, bold/italic/strikethrough, links, images, hr.
        // Sufficient for the posts in this repo; replace with a fuller parser if needed.
        function renderMarkdown(src) {
            const lines = src.replace(/\r\n/g, '\n').split('\n');
            const out = [];
            let i = 0;

            const bullet = /^(\s*)([-*])\s+(.*)$/;
            const ordered = /^(\s*)(\d+)\.\s+(.*)$/;
            const tableRow = /^\s*\|(.+)\|\s*$/;
            const tableSep = /^\s*\|?\s*:?-{3,}:?\s*(\|\s*:?-{3,}:?\s*)+\|?\s*$/;

            function splitRow(s) {
                let t = s.trim();
                if (t.startsWith('|')) t = t.slice(1);
                if (t.endsWith('|')) t = t.slice(0, -1);
                return t.split('|').map(c => c.trim());
            }

            function inline(s) {
                // Posts are trusted content, so raw HTML passes through unescaped
                // (some posts embed inline <blockquote>, <div>, etc.).
                // Stray ampersands still get fixed up.
                s = s.replace(/&(?![a-zA-Z]+;|#\d+;)/g, '&amp;');
                s = s.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<a class="image-link" href="$2" target="_blank" rel="noopener noreferrer"><img alt="$1" src="$2"></a>');
                s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
                s = s.replace(/`([^`]+)`/g, function (_, c) {
                    return '<code>' + c.replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</code>';
                });
                s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
                s = s.replace(/~~([^~\n]+)~~/g, '<del>$1</del>');
                s = s.replace(/(^|[^*])\*([^*\n]+)\*/g, '$1<em>$2</em>');
                return s;
            }

            while (i < lines.length) {
                const line = lines[i];
                if (!line.trim()) {
                    i++;
                    continue;
                }

                const fence = line.match(/^```(\w*)\s*$/);
                if (fence) {
                    i++;
                    const buf = [];
                    while (i < lines.length && !/^```\s*$/.test(lines[i])) {
                        buf.push(lines[i]);
                        i++;
                    }
                    i++;
                    const escaped = buf.join('\n').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                    const cls = fence[1] ? ' class="lang-' + fence[1] + '"' : '';
                    out.push('<pre><code' + cls + '>' + escaped + '</code></pre>');
                    continue;
                }

                const h = line.match(/^(#{1,6})\s+(.*)$/);
                if (h) {
                    out.push('<h' + h[1].length + '>' + inline(h[2]) + '</h' + h[1].length + '>');
                    i++;
                    continue;
                }

                if (/^\s*(?:-\s*){3,}\s*$/.test(line) || /^\s*\*{3,}\s*$/.test(line)) {
                    out.push('<hr>');
                    i++;
                    continue;
                }

                if (/^>\s?/.test(line)) {
                    const buf = [];
                    while (i < lines.length && /^>\s?/.test(lines[i])) {
                        buf.push(lines[i].replace(/^>\s?/, ''));
                        i++;
                    }
                    out.push('<blockquote>' + renderMarkdown(buf.join('\n')) + '</blockquote>');
                    continue;
                }

                if (tableRow.test(line) && i + 1 < lines.length && tableSep.test(lines[i + 1])) {
                    const headers = splitRow(line);
                    i += 2;
                    const rows = [];
                    while (i < lines.length && tableRow.test(lines[i])) {
                        rows.push(splitRow(lines[i]));
                        i++;
                    }
                    let html = '<table><thead><tr>';
                    headers.forEach(h => {
                        html += '<th>' + inline(h) + '</th>';
                    });
                    html += '</tr></thead><tbody>';
                    rows.forEach(r => {
                        html += '<tr>';
                        r.forEach(c => {
                            html += '<td>' + inline(c) + '</td>';
                        });
                        html += '</tr>';
                    });
                    html += '</tbody></table>';
                    out.push(html);
                    continue;
                }

                if (bullet.test(line) || ordered.test(line)) {
                    // Indent of the first bullet defines this list's base level.
                    // Deeper-indented bullets become nested lists (rendered by
                    // recursing into renderMarkdown). Same-or-less indent at a
                    // bullet starts a sibling item (or ends the list).
                    const firstMatch = line.match(bullet) || line.match(ordered);
                    const baseIndent = firstMatch[1].length;
                    const isOrdered = ordered.test(line);
                    const items = [];
                    while (i < lines.length) {
                        const cur = lines[i];
                        if (!cur.trim()) {
                            // blank line breaks the list (matches CommonMark-ish behaviour)
                            i++;
                            break;
                        }
                        const mBul = cur.match(bullet);
                        const mOrd = cur.match(ordered);
                        const m = mBul || mOrd;
                        if (!m) break;
                        if (m[1].length < baseIndent) break;
                        if (m[1].length > baseIndent) break; // shouldn't happen at top of loop
                        // Same-type check: switching between -/* and 1. closes the list
                        if (isOrdered !== !!mOrd) break;

                        const itemBuf = [m[3]];
                        const nestedBuf = [];
                        i++;
                        while (i < lines.length) {
                            const nxt = lines[i];
                            if (!nxt.trim()) break;
                            const nBul = nxt.match(bullet);
                            const nOrd = nxt.match(ordered);
                            const nm = nBul || nOrd;
                            if (nm) {
                                if (nm[1].length > baseIndent) {
                                    // nested list line — dedent and stash
                                    nestedBuf.push(nxt.slice(baseIndent + 2));
                                    i++;
                                    continue;
                                }
                                // sibling or end of list
                                break;
                            }
                            // Plain continuation text
                            if (nestedBuf.length) {
                                // continuation inside the nested block
                                nestedBuf.push(nxt.slice(baseIndent + 2));
                            } else {
                                itemBuf.push(nxt.trim());
                            }
                            i++;
                        }

                        let liHtml = inline(itemBuf.join('\n'));
                        if (nestedBuf.length) {
                            liHtml += renderMarkdown(nestedBuf.join('\n'));
                        }
                        items.push('<li>' + liHtml + '</li>');
                    }
                    out.push((isOrdered ? '<ol>' : '<ul>') + items.join('') + (isOrdered ? '</ol>' : '</ul>'));
                    continue;
                }

                const buf = [line];
                i++;
                while (i < lines.length && lines[i].trim() && !/^#{1,6}\s/.test(lines[i]) && !/^>\s?/.test(lines[i]) && !bullet.test(lines[i]) && !ordered.test(lines[i]) && !/^```/.test(lines[i]) && !tableRow.test(lines[i])) {
                    buf.push(lines[i]);
                    i++;
                }
                out.push('<p>' + inline(buf.join(' ')) + '</p>');
            }
            return out.join('\n');
        }

        // Block dispatcher. New block types plug in here.
        const renderers = {
            markdown: function (block) {
                const div = document.createElement('div');
                div.innerHTML = renderMarkdown(block.content);
                return div;
            },
            mermaid: function (block) {
                // Mermaid scans elements with class "mermaid" whose textContent
                // is the diagram source. We collect these nodes and run
                // mermaid.run() once after all blocks are in the DOM.
                const div = document.createElement('div');
                div.className = 'mermaid';
                div.textContent = block.content;
                return div;
            },
            'force-graph': function (block) {
                // build.py emits parsed JSON: {nodes:[{id,size}], links:[{source,target}]}.
                // We instantiate force-graph after the container is in the DOM
                // so it can measure its own width.
                const div = document.createElement('div');
                div.className = 'force-graph';
                const data = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.ForceGraph) return;
                    const maxSize = data.nodes.reduce((m, n) => Math.max(m, n.size || 1), 1);
                    window.ForceGraph()(div)
                        .graphData(data)
                        .width(div.clientWidth)
                        .height(div.clientHeight)
                        .nodeRelSize(4)
                        .nodeVal(n => Math.max(20 * (n.size || 1) / maxSize, 0.001))
                        .nodeLabel(n => n.id + ' (' + (n.size || 1) + ')')
                        .nodeColor(() => 'rgba(135, 206, 235, 0.7)')
                        .linkColor(() => 'rgba(60, 60, 60, 0.4)')
                        .linkDirectionalArrowLength(4)
                        .linkDirectionalArrowRelPos(1)
                        .linkWidth(1);
                });
                return div;
            },
            'bubble-chart': function (block) {
                // build.py emits {nodes:[{name,size}]}. Renders a D3 circle-pack
                // SVG (same shape as the obren.io reference, just inline).
                const wrap = document.createElement('div');
                wrap.className = 'bubble-chart';
                const payload = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.d3) return;
                    const diameter = 480;
                    const fill = '#c0deed';
                    const textColor = '#111111';
                    const fontSize = 12;

                    const svg = window.d3.select(wrap).append('svg')
                        .attr('viewBox', '0 0 ' + diameter + ' ' + diameter)
                        .attr('width', diameter)
                        .attr('height', diameter);

                    const root = window.d3.hierarchy({children: payload.nodes})
                        .sum(d => d.size || 0)
                        .sort((a, b) => b.value - a.value);

                    window.d3.pack().size([diameter, diameter]).padding(2)(root);

                    const node = svg.selectAll('g')
                        .data(root.leaves())
                        .enter().append('g')
                        .attr('transform', d => 'translate(' + d.x + ',' + d.y + ')');

                    node.append('title').text(d => d.data.name + ': ' + d.value);
                    node.append('circle').attr('r', d => d.r).style('fill', fill);
                    node.append('text')
                        .attr('dy', '.3em')
                        .style('text-anchor', 'middle')
                        .style('fill', textColor)
                        .style('font-size', fontSize + 'px')
                        .text(d => d.data.name.substring(0, Math.max(0, Math.floor(d.r / 3))));
                });
                return wrap;
            }
        };

        // Render one modality's blocks into a host element. Mermaid runs
        // scoped to just the nodes created here, so lazily rendered tabs get
        // their diagrams on first activation.
        let mermaidInitialized = false;
        function renderBlocksInto(blocks, host) {
            const mermaidNodes = [];
            blocks.forEach(function (block) {
                const r = renderers[block.type];
                if (!r) {
                    const pre = document.createElement('pre');
                    pre.textContent = '[unknown block type: ' + block.type + ']';
                    host.appendChild(pre);
                    return;
                }
                const node = r(block);
                if (node instanceof Node) {
                    host.appendChild(node);
                    if (block.type === 'mermaid') mermaidNodes.push(node);
                }
            });
            if (mermaidNodes.length && window.mermaid) {
                if (!mermaidInitialized) {
                    window.mermaid.initialize({startOnLoad: false, theme: 'default'});
                    mermaidInitialized = true;
                }
                window.mermaid.run({nodes: mermaidNodes});
            }
        }

        // Modality tabs. One <article class="pane"> per modality; panes are
        // rendered lazily on first activation (force-graph / D3 / mermaid
        // need a visible, measurable container). With a single modality the
        // tab bar stays hidden and the page looks exactly like before.
        const mods = data.modalities;
        const tabBar = document.getElementById('modality-tabs');
        const panes = {};
        const tabButtons = {};
        const renderedPanes = {};

        mods.forEach(function (m) {
            const pane = document.createElement('article');
            pane.className = 'pane';
            pane.dataset.key = m.key;
            pane.hidden = true;
            root.appendChild(pane);
            panes[m.key] = pane;
        });

        const defaultKey = mods.some(m => m.key === 'index') ? 'index' : mods[0].key;

        function activate(key, updateHash) {
            mods.forEach(function (m) {
                const isActive = m.key === key;
                panes[m.key].hidden = !isActive;
                if (tabButtons[m.key]) {
                    tabButtons[m.key].classList.toggle('active', isActive);
                    tabButtons[m.key].setAttribute('aria-selected', isActive ? 'true' : 'false');
                }
            });
            // Unhide first, then render: the chart libraries measure widths.
            if (!renderedPanes[key]) {
                renderBlocksInto(mods.find(m => m.key === key).blocks, panes[key]);
                renderedPanes[key] = true;
            }
            if (updateHash) {
                history.replaceState(null, '',
                    key === defaultKey ? location.pathname + location.search : '#' + key);
            }
        }

        if (mods.length > 1) {
            mods.forEach(function (m) {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.textContent = m.label;
                btn.setAttribute('role', 'tab');
                btn.addEventListener('click', function () { activate(m.key, true); });
                tabBar.appendChild(btn);
                tabButtons[m.key] = btn;
            });
            tabBar.hidden = false;
        }

        // The hash selects a tab only when it matches a modality key, so
        // existing anchors keep working.
        const initialHash = location.hash.slice(1);
        activate(mods.some(m => m.key === initialHash) ? initialHash : defaultKey, false);
        window.addEventListener('hashchange', function () {
            const k = location.hash.slice(1);
            if (mods.some(m => m.key === k)) activate(k, false);
        });
    })();
</script>
</body>
</html>
