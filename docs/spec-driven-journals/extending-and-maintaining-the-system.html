<script id="data" type="application/json">{"meta": {"title": "Extending and Maintaining the System", "date": "2026-05-22", "author": "by Željko Obrenović (obren.io)", "permalink": "extending-and-maintaining-the-system", "timetoread": "9 min", "excerpt": "Spec-driven journals can evolve safely when maintainers preserve the small build contract, keep source and generated output separate, add journals deliberately, and verify changes with scoped builds and rendered pages.", "tags": "maintenance, extension, build contracts, start page", "icon": "assets/icons/extending-and-maintaining-the-system.png", "logo": "assets/images/extending-and-maintaining-the-system/logo.jpeg", "logo_credit": "Image generated by Google Gemini (gemini-3-pro-image-preview)"}, "tags": ["maintenance", "extension", "build contracts", "start page"], "modalities": [{"key": "index", "label": "Article", "meta": {}, "blocks": [{"type": "markdown", "content": "> Spec-driven journals can evolve safely when maintainers preserve the small build contract, keep source and generated output separate, add journals deliberately, and verify changes with scoped builds and rendered pages.\n\n[Spec-Driven Journals](https://github.com/zeljkoobrenovic/spec-driven-journals) is intentionally small, but it is not frozen.\n\nNew journals can be added. Templates can change. The renderer can support new block types. The start page can publish new entries. Helper scripts can evolve.\n\nThe maintenance challenge is to extend the system without turning it into a hidden framework that authors and AI agents cannot reason about.\n\nFor Spec-Driven Journals, maintenance should keep two public entry points coherent:\n\n| Entry point | Link |\n| --- | --- |\n| Official project repository | [github.com/zeljkoobrenovic/spec-driven-journals](https://github.com/zeljkoobrenovic/spec-driven-journals) |\n| Generated journal site | [zeljkoobrenovic.github.io/spec-driven-journals](https://zeljkoobrenovic.github.io/spec-driven-journals/) |\n\n## Preserve The Core Contract\n\nThe most important contracts are:\n\n| Contract | Why it matters |\n| --- | --- |\n| `_journals/<journal>/config.yaml` defines journal order. | Authors can inspect the table of contents in one file. |\n| Posts use front matter plus markdown body. | Metadata and prose stay together. |\n| Non-trivial posts have sibling specs. | Intent stays visible across sessions. |\n| Modality files are discovered by presence (`summary.md`, `dialog.md`, `comics.md`). | One spec can drive several docs without config changes; the explicit registry keeps other sibling files ignored. |\n| Generated pages live under `docs/`. | Publication output is separate from source. |\n| Cross-links use double-bracket permalink syntax. | Links survive title changes. |\n| Blocks use `{type, content}` inside per-modality payloads. | New renderers can plug in without changing the payload shape. |\n| The core build uses the Python standard library. | A new machine can build without dependency setup. |\n\n![Journal maintenance contracts map](assets/images/journal-maintenance-contracts-map.png)\n*Illustration placeholder: `journal-maintenance-contracts-map.png` should show the stable contracts around config, permalinks, specs, templates, build script, start-page publication, and verification checks.*\n\nThese contracts are what make Spec-Driven Journals learnable.\n\n## Choose The Smallest Change\n\nMost maintenance work should start with the smallest source change that solves the problem.\n\n| Need | Usually change | Avoid starting with |\n| --- | --- | --- |\n| Add a new collection of articles. | A new journal folder, `config.yaml`, posts, and specs. | Template or build changes. |\n| Add one article. | One post folder, one spec, and the journal config. | A new content format. |\n| Add a repeated visual language. | A documented custom block type after several real examples. | Raw HTML copied into many posts. |\n| Publish a generated journal on the start page. | `_start/_config/apps.json` and the start-page build. | Changing the journal generator. |\n| Fix a rendered problem. | Source markdown, asset paths, templates, or build logic. | Manual edits under `docs/`. |\n\n## Add A Journal\n\nTo add a journal:\n\n1. Create `_journals/<journal>/config.yaml`.\n2. Create `_journals/<journal>/posts/`.\n3. Add at least one post folder with `index.md`.\n4. Add `spec.md` for non-trivial posts.\n5. Add post paths under `sections:` in `config.yaml`.\n6. Build the journal.\n7. Add the generated journal to the start page if it should be discoverable.\n\nThe journal build and start page build are separate. A new journal can generate correctly under `docs/<journal>/` and still not appear on the start page until `_start/_config/apps.json` is updated and `_start/generate-docs.py` is run.\n\nThat separation is useful. It lets maintainers draft a journal before promoting it to the start page.\n\n## Add A Post\n\nTo add a post:\n\n1. Create `_journals/<journal>/posts/<slug>/index.md`.\n2. Create `_journals/<journal>/posts/<slug>/spec.md` if the work is substantive.\n3. Add front matter with a stable `permalink`.\n4. Add the post path to `config.yaml`.\n5. Add modality docs (`summary.md`, `dialog.md`, `comics.md`) if the spec calls for them.\n6. Build the journal.\n7. Inspect the generated post and spec pages, including modality tabs.\n\nFor per-post folders, use the same slug for folder and permalink unless there is a clear reason not to. The system does not require that, but readers and maintainers benefit from the alignment.\n\n## Add Or Change A Template\n\nTemplate changes affect many pages.\n\nBefore changing `_templates/index.html`, `_templates/post.html`, or `_templates/site.css`, ask:\n\n- Is this a journal-specific need or a global rendering need?\n- Does the change affect existing posts?\n- Does it preserve the JSON payload contract?\n- Does it preserve raw HTML behavior where existing posts rely on it?\n- Does it need a build-side change too?\n\nTemplate changes should be verified by rebuilding at least the affected journal. Broad template changes should eventually be verified with a full build.\n\n## Add A Custom Block Type\n\nCustom blocks are the main extension point for richer content.\n\nThe pattern is:\n\n1. Add a fence tuple in `_wiring/build.py`.\n2. Optionally add a parser that transforms the raw block into JSON.\n3. Add a renderer function in `_templates/post.html`.\n4. Keep the block payload in the `{type, content}` envelope.\n5. Document the authoring syntax.\n\nDo not add a custom block just because markdown feels slightly inconvenient. Add one when it gives authors a reusable content language that improves several posts.\n\n## Maintain Stable URLs\n\n`permalink:` values are stable URLs.\n\nTitles can change. Section names can change. Folder names can sometimes change before publication. But changing a permalink after publication breaks links and cross-record references.\n\nThis matters more as journals grow. The more a record is cited, the more expensive a permalink change becomes.\n\n## Maintain Agent Instructions\n\n`AGENTS.md`, `CLAUDE.md`, and Spec-Driven Journals READMEs are part of the operating system for AI-mediated authoring.\n\nWhen build behavior changes, update the agent-facing instructions. Otherwise future agents will follow stale rules and produce reasonable-looking wrong work.\n\nGood maintenance keeps three things aligned:\n\n- actual implementation\n- human-facing documentation\n- agent-facing instructions\n\nWhen those drift, Spec-Driven Journals becomes harder to work in.\n\n## Verification Habits\n\nThere is no formal test suite yet. The practical checks are:\n\n```bash\npython3 -m py_compile _wiring/build.py _start/generate-docs.py\npython3 _wiring/build.py\npython3 _start/generate-docs.py\n```\n\nDuring scoped work, build the affected journal:\n\n```bash\npython3 -c \"import _wiring.build as b; index_tpl=(b.TEMPLATES_DIR/'index.html').read_text(encoding='utf-8'); post_tpl=(b.TEMPLATES_DIR/'post.html').read_text(encoding='utf-8'); b.DOCS_DIR.mkdir(exist_ok=True); b.build_journal(b.JOURNALS_DIR/'spec-driven-journals', index_tpl, post_tpl, b.build_crosslink_index())\"\n```\n\nThen inspect:\n\n- generated index page\n- changed post pages\n- generated spec pages\n- copied assets\n- unresolved double-bracket links\n- obvious rendering problems in tables, images, and custom blocks\n\n## When To Keep It Small\n\nThe system should stay small unless a real need appears.\n\nAvoid adding:\n\n- dependencies that only save a few lines\n- framework abstractions that hide simple file operations\n- content formats that only one post uses\n- generated metadata that no reader or maintainer uses\n- styling systems that make the templates harder to inspect\n\nSpec-Driven Journals' strength is that a reader can understand it. Preserve that.\n\n## The Closing Principle\n\nSpec-driven journals work when Spec-Driven Journals remains a clear collaboration surface.\n\nHumans bring intent and judgment. AI agents help edit and verify. Source files preserve the durable artifact. Generated pages make it readable. The build connects those layers with as little machinery as possible.\n\nThat is the system worth maintaining.\n"}]}, {"key": "summary", "label": "Summary", "meta": {"timetoread": "2 min"}, "blocks": [{"type": "markdown", "content": "Spec-Driven Journals is intentionally small but not frozen: new journals, templates, block types, and start-page entries are all expected. The way to evolve it safely is to preserve a small set of build contracts, keep source separate from generated output, prefer the smallest change that solves the problem, and verify with scoped builds and rendered-page inspection.\n\n**What changes**\n\n- Maintenance gets an explicit contract list that should remain stable: `config.yaml` defines journal order, posts are front matter plus markdown, non-trivial posts carry sibling specs, modality files are discovered by presence, generated pages live under `docs/`, cross-links use double-bracket permalink syntax, blocks keep the `{type, content}` envelope, and the core build stays standard-library Python.\n- Adding a journal becomes a known seven-step recipe — folder, `config.yaml`, posts, specs, sections, build, start page — instead of guesswork. The journal build and start-page build are deliberately separate: a journal can generate under `docs/<journal>/` and stay undiscoverable until `_start/_config/apps.json` is updated, which lets maintainers draft before promoting.\n- A lowest-impact decision table pairs each need with the smallest change: a new article collection means a new journal folder, not template work; a repeated visual language means a documented custom block type after several real examples, not raw HTML copied across posts; a rendering fix means changing source or build logic, never hand-editing `docs/`.\n- Template and build extensions get gating questions — journal-specific or global, does it preserve the JSON payload contract and raw-HTML behavior — and custom block types follow a fixed pattern: fence tuple, optional parser, renderer function, documented syntax.\n- Verification becomes a habit: `py_compile` the scripts, run the full builds or a scoped single-journal build, then inspect generated index, post, and spec pages, copied assets, and unresolved double-bracket links.\n\n**What it costs**\n\n- Permalinks (and the two public entry points — the GitHub repository and the generated site) are commitments: titles can change freely, but changing a published `permalink` breaks links, and the cost grows with every citation.\n- Agent-facing instructions (`AGENTS.md`, `CLAUDE.md`, READMEs) must be updated whenever build behavior changes — otherwise future agents follow stale rules and produce reasonable-looking wrong work. Implementation, human docs, and agent instructions must stay aligned.\n\n**What we are not doing**\n\n- No full release process and no CI/CD design — verification stays scoped builds plus inspection for now.\n- No visual redesign plan; avoid dependencies, framework abstractions, one-post content formats, and styling systems that make the system harder to inspect.\n\nThe Article tab has the full contract table, the step-by-step recipes, and the verification commands.\n"}]}, {"key": "dialog", "label": "Conversation", "meta": {"timetoread": "8 min listen"}, "blocks": [{"type": "markdown", "content": "## Why care about maintaining a tiny system?\n\n**Ben:** Ana, this is a small Python script, two HTML templates, and some markdown. Why does it need a whole article about \"extending and maintaining the system\"? What is there to maintain?\n\n**Ana:** That smallness is exactly what's at risk. Spec-Driven Journals is intentionally small, but it is not frozen — new journals get added, templates change, the renderer grows block types, the start page publishes new entries, helper scripts evolve. The maintenance challenge the post names is to extend the system without turning it into a hidden framework that authors and AI agents can no longer reason about. Nobody sets out to build a hidden framework. You get one by making twenty individually reasonable changes without a rule for which changes are cheap and which are expensive.\n\n**Ben:** And the rule is?\n\n**Ana:** Preserve a short list of contracts, and for everything else, pick the smallest source change that solves the problem. There are also two public entry points that maintenance has to keep coherent — the official repository on GitHub and the generated journal site on GitHub Pages. Whatever you change, both of those should keep making sense.\n\n## The contracts that should not move\n\n**Ben:** Okay, what's on the contract list? Because \"don't break things\" is not actionable.\n\n**Ana:** It's a concrete table in the article, eight rows. `config.yaml` in each journal defines journal order, so authors can inspect the table of contents in one file. Posts are front matter plus a markdown body, so metadata and prose stay together. Non-trivial posts have sibling specs, so intent stays visible across sessions. Modality files — `summary.md`, `dialog.md`, `comics.md` — are discovered by presence, so one spec can drive several docs without config changes. Generated pages live under `docs/`, keeping publication output separate from source. Cross-links use the double-bracket permalink syntax, so links survive title changes. Blocks keep the `{type, content}` envelope, so new renderers plug in without changing the payload shape. And the core build uses only the Python standard library, so a new machine builds without dependency setup.\n\n**Ben:** Some of those sound like preferences, not contracts. Standard library only? In 2026? One decent dependency could probably delete half the build script.\n\n**Ana:** And the article explicitly lists that under \"when to keep it small\": avoid dependencies that only save a few lines. The stated reason for the constraint is that a new machine can build without dependency setup. The deeper reason is the closing principle — the system's strength is that a reader can understand it. Every dependency, framework abstraction, or styling system that makes the templates harder to inspect spends some of that. These contracts are what make the system learnable, for humans and for AI agents working in it.\n\n**Ben:** Fine, but contracts plus \"smallest change\" is still vague when I'm sitting there with an actual need.\n\n**Ana:** That's why there's a decision table. Need a new collection of articles? That's a new journal folder with `config.yaml`, posts, and specs — not template or build changes. Need one article? One post folder, one spec, one config line — not a new content format. Want a repeated visual language? A documented custom block type, but only after several real examples — not raw HTML copied into many posts. Need to publish a journal on the start page? Edit `_start/_config/apps.json` and run the start-page build — don't touch the journal generator. And if a rendered page looks wrong, fix source markdown, asset paths, templates, or build logic — never hand-edit anything under `docs/`.\n\n## Adding things without guessing\n\n**Ben:** Walk me through the journal case, because that's the one where I'd expect hidden steps.\n\n**Ana:** Seven steps, no guessing. Create `_journals/<journal>/config.yaml`, create the `posts/` directory, add at least one post folder with `index.md`, add `spec.md` for the non-trivial posts, list the post paths under `sections:` in the config, build the journal, and then — if it should be discoverable — add it to the start page.\n\n**Ben:** That last step smells like a trap. So I can build a journal successfully and it still doesn't show up anywhere?\n\n**Ana:** Yes, and the article argues that's a feature, not a bug. The journal build and the start-page build are separate. A new journal can generate perfectly under `docs/<journal>/` and still not appear on the start page until `apps.json` is updated and `_start/generate-docs.py` is run. That separation lets maintainers draft a journal — build it, read it, iterate on it — before promoting it to the start page. Publication and discoverability are two different decisions.\n\n**Ben:** And a single post?\n\n**Ana:** Same shape, smaller: post folder with `index.md`, a `spec.md` if the work is substantive, front matter with a stable `permalink`, a line in `config.yaml`, modality docs if the spec calls for them, build, then inspect the generated post and spec pages, including the modality tabs. One convention worth keeping: use the same slug for the folder and the permalink. The system doesn't require it, but readers and maintainers benefit from the alignment.\n\n**Ben:** You said \"stable permalink\" like it's sacred. Titles change all the time — why is the URL different?\n\n**Ana:** Because everything keys off it. Titles can change, section names can change, even folder names can sometimes change before publication. But a `permalink:` is a published URL and the target of every double-bracket cross-reference. Change it after publication and you break external links and internal cross-links at once. And the cost compounds: the more a record is cited, the more expensive a permalink change becomes. It's the one rename the system genuinely punishes.\n\n## Templates, blocks, and the no-test-suite problem\n\n**Ben:** What about when the smallest change really is a template or build change? Those touch every page.\n\n**Ana:** Then you slow down and ask the article's gating questions first. Is this a journal-specific need or a global rendering need? Does it affect existing posts? Does it preserve the JSON payload contract? Does it preserve raw HTML behavior where existing posts rely on it? Does it need a build-side change too? Then verify by rebuilding at least the affected journal, and eventually a full build for broad changes. For richer content, the sanctioned extension point is a custom block type — the pattern from [Cross-Links, Assets, and Blocks](cross-links-assets-and-blocks.html): add a fence tuple in `_wiring/build.py`, optionally a parser that transforms the block into JSON, a renderer function in `_templates/post.html`, keep the `{type, content}` envelope, and document the authoring syntax.\n\n**Ben:** With the obvious failure mode that every minor markdown annoyance becomes a new block type.\n\n**Ana:** Which the article forbids in as many words: don't add a custom block just because markdown feels slightly inconvenient. Add one when it gives authors a reusable content language that improves several posts. Same bar as the decision table — several real examples first.\n\n**Ben:** Here's my real objection, though. You're describing template changes that touch every page, and there's no test suite. How is \"be careful\" a maintenance strategy?\n\n**Ana:** There's no formal test suite *yet* — the article is honest about that — but there are practical checks, and they're listed as commands, not vibes. `py_compile` on the build script and the start-page generator, then run both builds. During scoped work there's a one-liner that rebuilds just the affected journal through the same `build_journal` path, as documented in [Build Pipeline and Rendering Model](build-pipeline-and-rendering-model.html). Then a concrete inspection list: the generated index, the changed post pages, the generated spec pages, copied assets, unresolved double-bracket links, and obvious rendering problems in tables, images, and custom blocks.\n\n**Ben:** Manual inspection still depends on a human remembering to do it. What about the agents doing most of the editing?\n\n**Ana:** That's the part of maintenance people skip, and the article calls it out: `AGENTS.md`, `CLAUDE.md`, and the READMEs are part of the operating system for AI-mediated authoring. When build behavior changes and those don't, future agents follow stale rules and produce reasonable-looking wrong work — which is worse than obviously wrong work, because it passes a glance. Good maintenance keeps three things aligned: the actual implementation, the human-facing documentation, and the agent-facing instructions. When those drift, the system gets harder to work in for everyone.\n\n## What this post is not promising\n\n**Ben:** Close it out. What should I *not* expect from this article?\n\n**Ana:** Three explicit non-goals. It is not a full release process — it tells you how to change and verify the system, not how to ship versioned releases. It is not a CI/CD design — verification is scoped builds plus inspection, deliberately. And it is not a visual redesign plan. There's one open question it leaves standing: whether the project should eventually add a formal test suite or keep relying on scoped builds and inspection. That stays open until the manual checks stop being enough.\n\n**Ben:** So the whole maintenance doctrine is: a short contract list, smallest change first, and look at what you built before you call it done.\n\n**Ana:** Plus knowing why. The closing principle is that this works when the repository remains a clear collaboration surface — humans bring intent and judgment, AI agents help edit and verify, source files preserve the durable artifact, generated pages make it readable, and the build connects those layers with as little machinery as possible. *(laughs)* That's the system worth maintaining. Everything else in the post is just instructions for not breaking it.\n"}]}, {"key": "comics", "label": "Comic", "meta": {"timetoread": "3 min"}, "blocks": [{"type": "markdown", "content": "<!-- comic-style\n{\n  \"cast\": \"MAYA: a pragmatic engineer-author, short dark hair, glasses, rolled-up sleeves, calm and slightly amused, often holding a marker or a printed page. REX: an over-eager boxy robot AI assistant, one bent antenna, glowing rectangular eyes, perpetually carrying or printing too many documents.\",\n  \"style\": \"Clean two-tone explainer comic, thick ink outlines, flat colors with blue/teal accents on a light cream background, generous white space, hand-lettered speech bubbles with SHORT readable text (max 8 words per bubble), simple geometric office/library/print-shop settings mixing documents with software symbols, no photorealism, no dense text, no title text.\"\n}\n-->\n\nHow to grow a deliberately small publishing system without turning it into a hidden framework — in eight panels.\n\n![Comic panel: a robot carries a tall stack of folders toward an engineer standing next to a small tidy machine labeled BUILD.](assets/images/extending-and-maintaining-the-system/comic-01-small-not-frozen.jpeg)\n**Panel 1:** *Spec-Driven Journals is intentionally small — but it is not frozen.*\n\n![Comic panel: a robot presents a machine overgrown with tangled pipes and levers while an engineer squints, confused.](assets/images/extending-and-maintaining-the-system/comic-02-the-hidden-framework.jpeg)\n**Panel 2:** *The failure mode: extensions that turn a readable system into a hidden framework.*\n\n![Comic panel: an engineer pins a short row of contract cards on a wall while a robot salutes them.](assets/images/extending-and-maintaining-the-system/comic-03-the-contract-wall.jpeg)\n**Panel 3:** *The core idea: protect a short list of contracts — config, front matter, specs, docs output, cross-links.*\n\n![Comic panel: a robot lifts a giant wrench labeled TEMPLATES while an engineer offers a tiny screwdriver labeled ONE POST.](assets/images/extending-and-maintaining-the-system/comic-04-smallest-change-first.jpeg)\n**Panel 4:** *For each need, pick the lowest-impact change — a post before a format, a journal before a template.*\n\n![Comic panel: a robot polishes a journal binder backstage while an engineer guards a bright doorway labeled START PAGE.](assets/images/extending-and-maintaining-the-system/comic-05-draft-before-promote.jpeg)\n**Panel 5:** *A journal can build perfectly and stay off the start page — drafting and promoting are separate.*\n\n![Comic panel: a robot tries to swap a street sign held by many chains from documents while an engineer stops him.](assets/images/extending-and-maintaining-the-system/comic-06-permalinks-are-forever.jpeg)\n**Panel 6:** *Titles can change freely; a published permalink cannot — every citation makes it more expensive.*\n\n![Comic panel: an engineer inspects a freshly printed page with a magnifying glass beside a checklist while a robot holds the next page.](assets/images/extending-and-maintaining-the-system/comic-07-build-and-inspect.jpeg)\n**Panel 7:** *No test suite yet — the habit is scoped builds plus inspecting rendered pages, assets, and links.*\n\n![Comic panel: an engineer and a robot admire a small tidy machine with one new journal shelf, contract cards straight on the wall.](assets/images/extending-and-maintaining-the-system/comic-08-a-system-you-can-read.jpeg)\n**Panel 8:** *Extended, not complicated: the strength worth preserving is that a reader can understand the system.*\n"}]}]}</script>
<script>
    (function () {
        const data = JSON.parse(document.getElementById('data').textContent);
        const root = document.getElementById('content');

        const postId = (data.meta && data.meta.id) ? String(data.meta.id) : '';
        const postStatusRaw = (data.meta && data.meta.status) ? String(data.meta.status) : '';
        if (postId || postStatusRaw) {
            const header = document.getElementById('post-header');
            let sectionEl = header.querySelector('p.section');
            if (!sectionEl) {
                sectionEl = document.createElement('p');
                sectionEl.className = 'section';
                header.insertBefore(sectionEl, header.firstChild);
            }
            // Status pill goes first, then a " / " separator before the existing
            // content (section name and/or id).
            if (postStatusRaw) {
                const parts = postStatusRaw.split(':');
                const statusName = parts[0].trim();
                const statusColor = (parts[1] || '').trim();
                const wrap = document.createElement('span');
                wrap.className = 'post-status';
                const dot = document.createElement('span');
                dot.className = 'status-dot';
                if (statusColor) dot.style.background = statusColor;
                wrap.appendChild(dot);
                wrap.appendChild(document.createTextNode(statusName));
                if (sectionEl.firstChild) {
                    sectionEl.insertBefore(document.createTextNode(' • '), sectionEl.firstChild);
                    sectionEl.insertBefore(wrap, sectionEl.firstChild);
                } else {
                    sectionEl.appendChild(wrap);
                }
            }
            if (postId) {
                if (sectionEl.firstChild) sectionEl.appendChild(document.createTextNode(' • '));
                sectionEl.appendChild(document.createTextNode(postId));
            }
        }

        const tagsHost = document.getElementById('tags');
        (data.tags || []).forEach(function (t) {
            const span = document.createElement('span');
            span.className = 'tag';
            span.textContent = t;
            tagsHost.appendChild(span);
        });

        // Minimal markdown renderer. Supports: ATX headings, paragraphs, blockquotes,
        // unordered/ordered lists, fenced code, inline code, bold/italic/strikethrough, links, images, hr.
        // Sufficient for the posts in this repo; replace with a fuller parser if needed.
        function renderMarkdown(src) {
            const lines = src.replace(/\r\n/g, '\n').split('\n');
            const out = [];
            let i = 0;

            const bullet = /^(\s*)([-*])\s+(.*)$/;
            const ordered = /^(\s*)(\d+)\.\s+(.*)$/;
            const tableRow = /^\s*\|(.+)\|\s*$/;
            const tableSep = /^\s*\|?\s*:?-{3,}:?\s*(\|\s*:?-{3,}:?\s*)+\|?\s*$/;

            function splitRow(s) {
                let t = s.trim();
                if (t.startsWith('|')) t = t.slice(1);
                if (t.endsWith('|')) t = t.slice(0, -1);
                return t.split('|').map(c => c.trim());
            }

            function inline(s) {
                // Posts are trusted content, so raw HTML passes through unescaped
                // (some posts embed inline <blockquote>, <div>, etc.).
                // Stray ampersands still get fixed up.
                s = s.replace(/&(?![a-zA-Z]+;|#\d+;)/g, '&amp;');
                s = s.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<a class="image-link" href="$2" target="_blank" rel="noopener noreferrer"><img alt="$1" src="$2"></a>');
                s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
                s = s.replace(/`([^`]+)`/g, function (_, c) {
                    return '<code>' + c.replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</code>';
                });
                s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
                s = s.replace(/~~([^~\n]+)~~/g, '<del>$1</del>');
                s = s.replace(/(^|[^*])\*([^*\n]+)\*/g, '$1<em>$2</em>');
                return s;
            }

            while (i < lines.length) {
                const line = lines[i];
                if (!line.trim()) {
                    i++;
                    continue;
                }

                const fence = line.match(/^```(\w*)\s*$/);
                if (fence) {
                    i++;
                    const buf = [];
                    while (i < lines.length && !/^```\s*$/.test(lines[i])) {
                        buf.push(lines[i]);
                        i++;
                    }
                    i++;
                    const escaped = buf.join('\n').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                    const cls = fence[1] ? ' class="lang-' + fence[1] + '"' : '';
                    out.push('<pre><code' + cls + '>' + escaped + '</code></pre>');
                    continue;
                }

                const h = line.match(/^(#{1,6})\s+(.*)$/);
                if (h) {
                    out.push('<h' + h[1].length + '>' + inline(h[2]) + '</h' + h[1].length + '>');
                    i++;
                    continue;
                }

                if (/^\s*(?:-\s*){3,}\s*$/.test(line) || /^\s*\*{3,}\s*$/.test(line)) {
                    out.push('<hr>');
                    i++;
                    continue;
                }

                if (/^>\s?/.test(line)) {
                    const buf = [];
                    while (i < lines.length && /^>\s?/.test(lines[i])) {
                        buf.push(lines[i].replace(/^>\s?/, ''));
                        i++;
                    }
                    out.push('<blockquote>' + renderMarkdown(buf.join('\n')) + '</blockquote>');
                    continue;
                }

                if (tableRow.test(line) && i + 1 < lines.length && tableSep.test(lines[i + 1])) {
                    const headers = splitRow(line);
                    i += 2;
                    const rows = [];
                    while (i < lines.length && tableRow.test(lines[i])) {
                        rows.push(splitRow(lines[i]));
                        i++;
                    }
                    let html = '<table><thead><tr>';
                    headers.forEach(h => {
                        html += '<th>' + inline(h) + '</th>';
                    });
                    html += '</tr></thead><tbody>';
                    rows.forEach(r => {
                        html += '<tr>';
                        r.forEach(c => {
                            html += '<td>' + inline(c) + '</td>';
                        });
                        html += '</tr>';
                    });
                    html += '</tbody></table>';
                    out.push(html);
                    continue;
                }

                if (bullet.test(line) || ordered.test(line)) {
                    // Indent of the first bullet defines this list's base level.
                    // Deeper-indented bullets become nested lists (rendered by
                    // recursing into renderMarkdown). Same-or-less indent at a
                    // bullet starts a sibling item (or ends the list).
                    const firstMatch = line.match(bullet) || line.match(ordered);
                    const baseIndent = firstMatch[1].length;
                    const isOrdered = ordered.test(line);
                    const items = [];
                    while (i < lines.length) {
                        const cur = lines[i];
                        if (!cur.trim()) {
                            // blank line breaks the list (matches CommonMark-ish behaviour)
                            i++;
                            break;
                        }
                        const mBul = cur.match(bullet);
                        const mOrd = cur.match(ordered);
                        const m = mBul || mOrd;
                        if (!m) break;
                        if (m[1].length < baseIndent) break;
                        if (m[1].length > baseIndent) break; // shouldn't happen at top of loop
                        // Same-type check: switching between -/* and 1. closes the list
                        if (isOrdered !== !!mOrd) break;

                        const itemBuf = [m[3]];
                        const nestedBuf = [];
                        i++;
                        while (i < lines.length) {
                            const nxt = lines[i];
                            if (!nxt.trim()) break;
                            const nBul = nxt.match(bullet);
                            const nOrd = nxt.match(ordered);
                            const nm = nBul || nOrd;
                            if (nm) {
                                if (nm[1].length > baseIndent) {
                                    // nested list line — dedent and stash
                                    nestedBuf.push(nxt.slice(baseIndent + 2));
                                    i++;
                                    continue;
                                }
                                // sibling or end of list
                                break;
                            }
                            // Plain continuation text
                            if (nestedBuf.length) {
                                // continuation inside the nested block
                                nestedBuf.push(nxt.slice(baseIndent + 2));
                            } else {
                                itemBuf.push(nxt.trim());
                            }
                            i++;
                        }

                        let liHtml = inline(itemBuf.join('\n'));
                        if (nestedBuf.length) {
                            liHtml += renderMarkdown(nestedBuf.join('\n'));
                        }
                        items.push('<li>' + liHtml + '</li>');
                    }
                    out.push((isOrdered ? '<ol>' : '<ul>') + items.join('') + (isOrdered ? '</ol>' : '</ul>'));
                    continue;
                }

                const buf = [line];
                i++;
                while (i < lines.length && lines[i].trim() && !/^#{1,6}\s/.test(lines[i]) && !/^>\s?/.test(lines[i]) && !bullet.test(lines[i]) && !ordered.test(lines[i]) && !/^```/.test(lines[i]) && !tableRow.test(lines[i])) {
                    buf.push(lines[i]);
                    i++;
                }
                out.push('<p>' + inline(buf.join(' ')) + '</p>');
            }
            return out.join('\n');
        }

        // Block dispatcher. New block types plug in here.
        const renderers = {
            markdown: function (block) {
                const div = document.createElement('div');
                div.innerHTML = renderMarkdown(block.content);
                return div;
            },
            mermaid: function (block) {
                // Mermaid scans elements with class "mermaid" whose textContent
                // is the diagram source. We collect these nodes and run
                // mermaid.run() once after all blocks are in the DOM.
                const div = document.createElement('div');
                div.className = 'mermaid';
                div.textContent = block.content;
                return div;
            },
            'force-graph': function (block) {
                // build.py emits parsed JSON: {nodes:[{id,size}], links:[{source,target}]}.
                // We instantiate force-graph after the container is in the DOM
                // so it can measure its own width.
                const div = document.createElement('div');
                div.className = 'force-graph';
                const data = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.ForceGraph) return;
                    const maxSize = data.nodes.reduce((m, n) => Math.max(m, n.size || 1), 1);
                    window.ForceGraph()(div)
                        .graphData(data)
                        .width(div.clientWidth)
                        .height(div.clientHeight)
                        .nodeRelSize(4)
                        .nodeVal(n => Math.max(20 * (n.size || 1) / maxSize, 0.001))
                        .nodeLabel(n => n.id + ' (' + (n.size || 1) + ')')
                        .nodeColor(() => 'rgba(135, 206, 235, 0.7)')
                        .linkColor(() => 'rgba(60, 60, 60, 0.4)')
                        .linkDirectionalArrowLength(4)
                        .linkDirectionalArrowRelPos(1)
                        .linkWidth(1);
                });
                return div;
            },
            'bubble-chart': function (block) {
                // build.py emits {nodes:[{name,size}]}. Renders a D3 circle-pack
                // SVG (same shape as the obren.io reference, just inline).
                const wrap = document.createElement('div');
                wrap.className = 'bubble-chart';
                const payload = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.d3) return;
                    const diameter = 480;
                    const fill = '#c0deed';
                    const textColor = '#111111';
                    const fontSize = 12;

                    const svg = window.d3.select(wrap).append('svg')
                        .attr('viewBox', '0 0 ' + diameter + ' ' + diameter)
                        .attr('width', diameter)
                        .attr('height', diameter);

                    const root = window.d3.hierarchy({children: payload.nodes})
                        .sum(d => d.size || 0)
                        .sort((a, b) => b.value - a.value);

                    window.d3.pack().size([diameter, diameter]).padding(2)(root);

                    const node = svg.selectAll('g')
                        .data(root.leaves())
                        .enter().append('g')
                        .attr('transform', d => 'translate(' + d.x + ',' + d.y + ')');

                    node.append('title').text(d => d.data.name + ': ' + d.value);
                    node.append('circle').attr('r', d => d.r).style('fill', fill);
                    node.append('text')
                        .attr('dy', '.3em')
                        .style('text-anchor', 'middle')
                        .style('fill', textColor)
                        .style('font-size', fontSize + 'px')
                        .text(d => d.data.name.substring(0, Math.max(0, Math.floor(d.r / 3))));
                });
                return wrap;
            }
        };

        // Render one modality's blocks into a host element. Mermaid runs
        // scoped to just the nodes created here, so lazily rendered tabs get
        // their diagrams on first activation.
        let mermaidInitialized = false;
        function renderBlocksInto(blocks, host) {
            const mermaidNodes = [];
            blocks.forEach(function (block) {
                const r = renderers[block.type];
                if (!r) {
                    const pre = document.createElement('pre');
                    pre.textContent = '[unknown block type: ' + block.type + ']';
                    host.appendChild(pre);
                    return;
                }
                const node = r(block);
                if (node instanceof Node) {
                    host.appendChild(node);
                    if (block.type === 'mermaid') mermaidNodes.push(node);
                }
            });
            if (mermaidNodes.length && window.mermaid) {
                if (!mermaidInitialized) {
                    window.mermaid.initialize({startOnLoad: false, theme: 'default'});
                    mermaidInitialized = true;
                }
                window.mermaid.run({nodes: mermaidNodes});
            }
        }

        // Modality tabs. One <article class="pane"> per modality; panes are
        // rendered lazily on first activation (force-graph / D3 / mermaid
        // need a visible, measurable container). With a single modality the
        // tab bar stays hidden and the page looks exactly like before.
        const mods = data.modalities;
        const tabBar = document.getElementById('modality-tabs');
        const panes = {};
        const tabButtons = {};
        const renderedPanes = {};

        mods.forEach(function (m) {
            const pane = document.createElement('article');
            pane.className = 'pane';
            pane.dataset.key = m.key;
            pane.hidden = true;
            root.appendChild(pane);
            panes[m.key] = pane;
        });

        const defaultKey = mods.some(m => m.key === 'index') ? 'index' : mods[0].key;

        function activate(key, updateHash) {
            mods.forEach(function (m) {
                const isActive = m.key === key;
                panes[m.key].hidden = !isActive;
                if (tabButtons[m.key]) {
                    tabButtons[m.key].classList.toggle('active', isActive);
                    tabButtons[m.key].setAttribute('aria-selected', isActive ? 'true' : 'false');
                }
            });
            // Unhide first, then render: the chart libraries measure widths.
            if (!renderedPanes[key]) {
                renderBlocksInto(mods.find(m => m.key === key).blocks, panes[key]);
                renderedPanes[key] = true;
            }
            if (updateHash) {
                history.replaceState(null, '',
                    key === defaultKey ? location.pathname + location.search : '#' + key);
            }
        }

        if (mods.length > 1) {
            mods.forEach(function (m) {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.textContent = m.label;
                btn.setAttribute('role', 'tab');
                btn.addEventListener('click', function () { activate(m.key, true); });
                tabBar.appendChild(btn);
                tabButtons[m.key] = btn;
            });
            tabBar.hidden = false;
        }

        // The hash selects a tab only when it matches a modality key, so
        // existing anchors keep working.
        const initialHash = location.hash.slice(1);
        activate(mods.some(m => m.key === initialHash) ? initialHash : defaultKey, false);
        window.addEventListener('hashchange', function () {
            const k = location.hash.slice(1);
            if (mods.some(m => m.key === k)) activate(k, false);
        });
    })();
</script>
