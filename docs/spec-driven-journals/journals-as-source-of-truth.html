<script id="data" type="application/json">{"meta": {"title": "Journals as Source of Truth", "date": "2026-05-22", "author": "by Željko Obrenović (obren.io)", "permalink": "journals-as-source-of-truth", "timetoread": "7 min", "excerpt": "A spec-driven journal is useful because it separates canonical source from generated output: authors change markdown, specs, config, and assets, while generated HTML remains the review and publication surface.", "tags": "source of truth, markdown, git, publishing", "icon": "assets/icons/journals-as-source-of-truth.png", "logo": "assets/images/journals-as-source-of-truth/logo.jpeg", "logo_credit": "Image generated by Google Gemini (gemini-3-pro-image-preview)"}, "tags": ["source of truth", "markdown", "git", "publishing"], "modalities": [{"key": "index", "label": "Article", "meta": {}, "blocks": [{"type": "markdown", "content": "> A spec-driven journal is useful because it separates canonical source from generated output: authors change markdown, specs, config, and assets, while generated HTML remains the review and publication surface.\n\nThe most important rule in [Spec-Driven Journals](https://github.com/zeljkoobrenovic/spec-driven-journals) is simple: **source wins**.\n\nThe generated site matters. It is what readers see, search, and share. But the generated site is not where durable changes belong. Durable changes belong in source files under `_journals/`, `_templates/`, `_wiring/`, and `_start/`.\n\nThat rule connects this journal to two existing records: [Markdown Records as the Default Format for Technical Decisions, Strategies, and Discussions](../foundations/markdown-records.html) and [Practice Principle: Markdown Records as Canonical](../principles/markdown-records-as-canonical.html). Those records explain the broader principle. This article explains how the principle works inside Spec-Driven Journals.\n\nThe canonical source is the [official Spec-Driven Journals repository](https://github.com/zeljkoobrenovic/spec-driven-journals). The public reading surface is the [generated Spec-Driven Journals site](https://zeljkoobrenovic.github.io/spec-driven-journals/).\n\n## The Canonical Layer\n\nThe canonical layer contains files that humans and AI agents should edit:\n\n| Source file | Why it matters |\n| --- | --- |\n| `_journals/<journal>/config.yaml` | Declares the journal title, description, sections, and ordered post list. |\n| `_journals/<journal>/posts/<slug>/index.md` | The published article source — the required, default modality. |\n| `_journals/<journal>/posts/<slug>/spec.md` | The working contract for non-trivial article work. |\n| `_journals/<journal>/posts/<slug>/summary.md`, `dialog.md`, `comics.md` | Optional modality docs driven by the same spec, rendered as tabs on the post page. |\n| `_journals/<journal>/posts/<slug>/assets/` | Per-post images and other media. |\n| `_templates/index.html` and `_templates/post.html` | Shared rendering templates. |\n| `_templates/site.css` | Shared visual styling. |\n| `_wiring/build.py` | The build pipeline that turns journal source into generated pages. |\n| `_start/_config/apps.json` | The start-page catalog of published journals. |\n\nThese files are reviewable in git. They can be diffed, cited, linted, generated from, and read by an AI coding agent before it changes anything.\n\n## The Generated Layer\n\nThe generated layer lives under `docs/`.\n\nIt is still important:\n\n- it shows whether the article reads well after rendering\n- it exposes broken cross-links and missing assets\n- it gives reviewers a browser-friendly surface\n- it is what static hosting can publish\n- it lets non-authors read the system without opening markdown files\n\nBut generated HTML is output. During a build, `docs/<journal>/` is removed and recreated for each journal being built. Any manual change made there is fragile because the next build can overwrite it.\n\n![Source-first journal workflow](assets/images/source-first-journal-workflow.png)\n*Illustration placeholder: `source-first-journal-workflow.png` should show canonical source files on the left, generated docs on the right, and a review loop that returns fixes to source rather than patching generated HTML.*\n\n## Why This Helps Authors\n\nSource-first authoring gives writers a stable workflow:\n\n1. Change the post, spec, config, template, or script.\n2. Build the journal.\n3. Inspect generated output.\n4. If the rendered page exposes a problem, return to source.\n5. Commit source and generated output together when the change is meant to publish.\n\nThe generated site becomes a feedback loop, not a second editing surface.\n\nThat distinction prevents a common documentation failure: the source says one thing, the published page says another, and no one knows which one to trust.\n\n## Why This Helps AI Agents\n\nAI agents need stable context.\n\nIf the source of truth is a set of markdown files and small scripts, an agent can inspect the current system before acting. It can read the config, find the post, check the spec, understand the build, make scoped edits, run a scoped build, and summarize the result.\n\nIf the source of truth is scattered across generated pages, chat history, local browser edits, and unpublished documents, the agent has to guess. Guessing is where confident but wrong output starts.\n\nSpec-Driven Journals reduces that risk by making the source tree the memory.\n\n## The Role of Specs\n\nSpecs are part of the source of truth, but they are not the same as posts.\n\n| Artifact | Role |\n| --- | --- |\n| `spec.md` | States the intent and contract for a post — and which modalities it drives. |\n| `index.md` | Carries the published argument (the Article tab). |\n| `summary.md`, `dialog.md`, `comics.md` | Optional modality docs derived from the same spec and article. |\n| generated `.spec.html` | Lets reviewers inspect the contract in the browser. |\n| generated post HTML | Lets readers inspect all modalities of the post as tabs in the browser. |\n\nWhen a post changes direction, the spec should change first. If the post has moved beyond the spec, the spec is drifted and should be reconciled.\n\nThat is not process for its own sake. It is how Spec-Driven Journals keeps intent visible across AI-mediated sessions.\n\n## What Source-First Does Not Mean\n\nSource-first does not mean every thought must be written in markdown before discussion. Conversations, sketches, meetings, and AI sessions can all help shape the work.\n\nIt also does not mean generated pages are unimportant. A post that builds but reads poorly in the browser is not done.\n\nThe point is narrower and stronger: when the durable artifact is accepted, its canonical form belongs in source.\n\n## The Practical Test\n\nA journal is behaving like source of truth when a future author can answer these questions from Spec-Driven Journals source alone:\n\n- Which posts exist, and in what order?\n- What is the permalink for each post?\n- What was the intent of the post?\n- Which source files generate the page?\n- Which template renders it?\n- Which assets does it depend on?\n- Which related records does it link to?\n- What changed in the last meaningful authoring session?\n\nIf those answers live in source, the journal can keep improving. If they live only in memory, the journal decays.\n"}]}, {"key": "summary", "label": "Summary", "meta": {"timetoread": "2 min"}, "blocks": [{"type": "markdown", "content": "In Spec-Driven Journals, source wins: durable changes belong in the markdown, specs, config, templates, and assets under version control — not in the generated HTML. The generated site is what readers see and share, but it is a review and publication surface, recreated on every build, never the place to edit.\n\n**What changes**\n\n- Markdown in git becomes canonical. The files humans and AI agents edit live under `_journals/`, `_templates/`, `_wiring/`, and `_start/` — post sources, specs, modality docs, config, templates, the build script, and the start-page catalog. All of it is diffable, citable, and readable by an agent before it acts.\n- Generated HTML under `docs/` is treated strictly as output. It still matters — it exposes rendering problems, broken cross-links, and missing assets, and it is what static hosting publishes — but each build removes and recreates `docs/<journal>/`, so manual edits there are fragile by design.\n- Authoring becomes a stable loop: change source, build, inspect the rendered page, return to source if something is wrong, commit source and output together. The generated site is a feedback loop, not a second editing surface — which prevents source and published page from silently diverging.\n- Specs, posts, and generated docs get distinct roles: `spec.md` states intent and which modalities it drives; `index.md` carries the published argument; `summary.md`, `dialog.md`, and `comics.md` derive from the same spec; the generated `.spec.html` and post HTML let reviewers and readers inspect everything in the browser. When a post changes direction, the spec changes first.\n- The principle extends existing foundation records — [Markdown Records as the Default Format for Technical Decisions, Strategies, and Discussions](../foundations/markdown-records.html) and [Practice Principle: Markdown Records as Canonical](../principles/markdown-records-as-canonical.html) — and is anchored in concrete URLs: the official GitHub repository is canonical, the generated GitHub Pages site is the reading surface.\n\n**What it costs**\n\n- Discipline at the boundary: a rendered page that exposes a problem sends you back to source, never to a quick patch in `docs/` — even when the HTML fix would be faster.\n- Spec upkeep: when a post moves beyond its spec, the spec is drifted and must be reconciled, an obligation accepted to keep intent visible across AI-mediated sessions.\n\n**What we are not doing**\n\n- Not rewriting the foundation decision on markdown records — this article cross-links it rather than restating the ADR.\n- Not comparing knowledge-management tools, and not defining publishing governance for every journal.\n- Not claiming every thought must start in markdown — conversations, sketches, and AI sessions shape the work; only the accepted durable artifact must land in source.\n\nThe Article tab has the full canonical-layer table, the practical test for whether a journal behaves like source of truth, and the workflow detail.\n"}]}, {"key": "dialog", "label": "Conversation", "meta": {"timetoread": "8 min listen"}, "blocks": [{"type": "markdown", "content": "## Isn't this just \"use git\"?\n\n**Ben:** Ana, give it to me straight. \"Source wins, don't edit generated HTML\" — isn't that just telling people to use git? Why does this need a whole record?\n\n**Ana:** Because the failure it prevents is one everyone has lived through: the source says one thing, the published page says another, and no one knows which one to trust. Spec-Driven Journals makes the rule explicit and structural. Durable changes belong in the source files — under `_journals/`, `_templates/`, `_wiring/`, and `_start/`. The generated site under `docs/` is what readers see, search, and share, but it is not where durable changes belong.\n\n**Ben:** And the temptation to edit the generated page directly is real enough to legislate against?\n\n**Ana:** It's the most natural temptation there is. You spot a typo in the browser, the HTML file is right there, the fix takes ten seconds. But during a build, `docs/<journal>/` is removed and recreated for each journal being built. Any manual change made there is fragile because the next build can overwrite it. You haven't fixed the journal — you've created a divergence with a countdown timer on it.\n\n**Ben:** So the rule is really \"the generated layer is disposable.\"\n\n**Ana:** Disposable but not unimportant — that distinction matters and we'll get to it. First the positive half: what *is* canonical.\n\n## The two layers\n\n**Ben:** Okay, draw me the map. What counts as canonical?\n\n**Ana:** The files humans and AI agents should actually edit. The journal's `config.yaml` — title, description, sections, the ordered post list. Each post's `index.md` — the published article source, the required default modality. The post's `spec.md` — the working contract for non-trivial work. The optional modality docs — `summary.md`, `dialog.md`, `comics.md` — driven by the same spec and rendered as tabs. Per-post `assets/`. The shared templates and CSS, the build script, and the start-page catalog. Everything in that list is reviewable in git: it can be diffed, cited, linted, generated from, and read by an AI coding agent before it changes anything.\n\n**Ben:** That last clause is doing some work. We'll come back to it. And the generated layer — you said it's still important. How, if it's overwritten on every build?\n\n**Ana:** Five concrete ways, straight from the record. It shows whether the article reads well after rendering. It exposes broken cross-links and missing assets. It gives reviewers a browser-friendly surface. It is what static hosting can publish. And it lets non-authors read the system without opening markdown files. The generated site is genuinely the public reading surface — the project even keeps the split visible in its URLs: the GitHub repository is the canonical source, the GitHub Pages site is the generated output.\n\n**Ben:** So important as a *surface*, never as a *medium*. You read it, you don't write it.\n\n**Ana:** Exactly. And that gives authors a stable five-step workflow: change the post, spec, config, template, or script. Build the journal. Inspect generated output. If the rendered page exposes a problem, return to source. Commit source and generated output together when the change is meant to publish. The generated site becomes a feedback loop, not a second editing surface.\n\n## The AI agent angle\n\n**Ben:** Here's my skeptical read, though. This sounds like discipline for discipline's sake. Plenty of teams edit wikis directly and survive. What's actually at stake?\n\n**Ana:** The stakes went up when AI agents joined the authoring loop. AI agents need stable context. If the source of truth is a set of markdown files and small scripts, an agent can inspect the current system before acting — read the config, find the post, check the spec, understand the build, make scoped edits, run a scoped build, summarize the result.\n\n**Ben:** And if it isn't?\n\n**Ana:** Then the truth is scattered across generated pages, chat history, local browser edits, and unpublished documents — and the agent has to guess. Guessing is where confident but wrong output starts. That's the line I'd underline in the whole record. Spec-Driven Journals reduces that risk by making the source tree the memory.\n\n**Ben:** \"The source tree is the memory.\" Meaning the agent doesn't need to remember anything between sessions, because everything it needs is on disk?\n\n**Ana:** Right — and so does the human, which is the same benefit wearing two hats. The record ends with a practical test: a journal is behaving like source of truth when a future author can answer, from source alone — which posts exist and in what order, what each permalink is, what the intent of the post was, which source files generate the page, which template renders it, which assets it depends on, which related records it links to, and what changed in the last meaningful authoring session. If those answers live in source, the journal can keep improving. If they live only in memory, the journal decays.\n\n## Where specs fit\n\n**Ben:** You keep mentioning specs as part of the canonical layer. But isn't a spec just documentation about the post? Why is it source of truth rather than scaffolding you throw away?\n\n**Ana:** Because specs and posts carry different things, and both are durable. The record lays out the roles: `spec.md` states the intent and contract for a post — and which modalities it drives. `index.md` carries the published argument, the Article tab. The summary, dialog, and comic are optional modality docs derived from the same spec and article. And both get generated counterparts: a `.spec.html` so reviewers can inspect the contract in the browser, and the post HTML where readers see all the modalities as tabs.\n\n**Ben:** And when the post and the spec disagree?\n\n**Ana:** Then the spec is drifted and should be reconciled. The rule of direction is: when a post changes direction, the spec should change first. And the record is explicit that this is not process for its own sake — it is how Spec-Driven Journals keeps intent visible across AI-mediated sessions. Sessions end; context windows close. The spec is the piece of intent that survives.\n\n**Ben:** Let me push once more. The build step itself — doesn't requiring a build between edit and review just add friction compared to editing the page you're looking at?\n\n**Ana:** It adds one command, and it buys you the thing direct editing destroys: the guarantee that what you reviewed is what the source produces. A post that builds but reads poorly in the browser is not done — the record says that outright. The loop is edit source, build, look, go back to source. The friction is the feature: every fix lands where the next build, the next author, and the next agent can find it.\n\n## What this is not saying\n\n**Ben:** Alright. Fence it off for me — what should listeners *not* take away?\n\n**Ana:** Three explicit non-goals. This record is not rewriting the foundation decision on markdown records — that rationale lives in [Markdown Records as the Default Format for Technical Decisions, Strategies, and Discussions](../foundations/markdown-records.html) and [Practice Principle: Markdown Records as Canonical](../principles/markdown-records-as-canonical.html), and this article only explains how the principle works inside Spec-Driven Journals. It is not a tool-by-tool comparison of knowledge systems. And it is not publishing governance for every journal.\n\n**Ben:** And the softer misreadings?\n\n**Ana:** The record names those too. Source-first does not mean every thought must be written in markdown before discussion — conversations, sketches, meetings, and AI sessions can all help shape the work. And it does not mean generated pages are unimportant; we covered why they matter. The point is narrower and stronger: when the durable artifact is accepted, its canonical form belongs in source.\n\n**Ben:** So the one-line version for someone closing the tab now?\n\n**Ana:** Source wins. Edit the markdown, the spec, the config — never the generated page. Build to see, return to source to fix, commit both together.\n\n**Ben:** And if I forget all that, the next build will remind me by deleting my cleverness. *(laughs)*\n\n**Ana:** That's the system working as designed.\n"}]}, {"key": "comics", "label": "Comic", "meta": {"timetoread": "3 min"}, "blocks": [{"type": "markdown", "content": "<!-- comic-style\n{\n  \"cast\": \"MAYA: a pragmatic engineer-author, short dark hair, glasses, rolled-up sleeves, calm and slightly amused, often holding a marker or a printed page. REX: an over-eager boxy robot AI assistant, one bent antenna, glowing rectangular eyes, perpetually carrying or printing too many documents.\",\n  \"style\": \"Clean two-tone explainer comic, thick ink outlines, flat colors with blue/teal accents on a light cream background, generous white space, hand-lettered speech bubbles with SHORT readable text (max 8 words per bubble), simple geometric office/library/print-shop settings mixing documents with software symbols, no photorealism, no dense text, no title text.\"\n}\n-->\n\nWhy you edit the markdown and never the generated page — in eight panels.\n\n![Comic panel: an engineer pins a card reading SOURCE WINS above markdown files and printed web pages while a robot salutes.](assets/images/journals-as-source-of-truth/comic-01-source-wins.jpeg)\n**Panel 1:** *The most important rule in Spec-Driven Journals is simple: source wins.*\n\n![Comic panel: a robot tries to stick a patch onto a rendered web page labeled docs while the engineer stops him.](assets/images/journals-as-source-of-truth/comic-02-the-tempting-fix.jpeg)\n**Panel 2:** *The generated page is right there. Fixing it there is the trap.*\n\n![Comic panel: a build machine replaces all generated pages while the robot's manual patch falls into a wastebasket.](assets/images/journals-as-source-of-truth/comic-03-the-build-overwrites.jpeg)\n**Panel 3:** *During a build, docs is removed and recreated. Manual changes there do not survive.*\n\n![Comic panel: a two-shelf diagram separating editable source files from generated pages marked read only.](assets/images/journals-as-source-of-truth/comic-04-two-layers.jpeg)\n**Panel 4:** *The canonical layer is for editing; the generated layer is for reading and review.*\n\n![Comic panel: engineer and robot walk a circular workflow loop from source to build to inspection and back to source.](assets/images/journals-as-source-of-truth/comic-05-the-feedback-loop.jpeg)\n**Panel 5:** *Change source, build, inspect, return to source. The rendered page is feedback, not a canvas.*\n\n![Comic panel: a robot confidently reads an organized file tree on one side, while a confused ghost robot guesses among scattered notes on the other.](assets/images/journals-as-source-of-truth/comic-06-agents-need-stable-context.jpeg)\n**Panel 6:** *Agents inspect source before acting. Scattered truth means guessing, and guessing breeds confident wrong output.*\n\n![Comic panel: the engineer edits a spec document first while the article and modality docs wait in line behind it.](assets/images/journals-as-source-of-truth/comic-07-spec-changes-first.jpeg)\n**Panel 7:** *When a post changes direction, the spec changes first - that is how intent stays visible across sessions.*\n\n![Comic panel: a new author opens a tidy source-tree drawer with labeled compartments while the engineer and robot look on.](assets/images/journals-as-source-of-truth/comic-08-the-practical-test.jpeg)\n**Panel 8:** *The practical test: if the answers live in source, the journal keeps improving. If they live in memory, it decays.*\n"}]}]}</script>
<script>
    (function () {
        const data = JSON.parse(document.getElementById('data').textContent);
        const root = document.getElementById('content');

        const postId = (data.meta && data.meta.id) ? String(data.meta.id) : '';
        const postStatusRaw = (data.meta && data.meta.status) ? String(data.meta.status) : '';
        if (postId || postStatusRaw) {
            const header = document.getElementById('post-header');
            let sectionEl = header.querySelector('p.section');
            if (!sectionEl) {
                sectionEl = document.createElement('p');
                sectionEl.className = 'section';
                header.insertBefore(sectionEl, header.firstChild);
            }
            // Status pill goes first, then a " / " separator before the existing
            // content (section name and/or id).
            if (postStatusRaw) {
                const parts = postStatusRaw.split(':');
                const statusName = parts[0].trim();
                const statusColor = (parts[1] || '').trim();
                const wrap = document.createElement('span');
                wrap.className = 'post-status';
                const dot = document.createElement('span');
                dot.className = 'status-dot';
                if (statusColor) dot.style.background = statusColor;
                wrap.appendChild(dot);
                wrap.appendChild(document.createTextNode(statusName));
                if (sectionEl.firstChild) {
                    sectionEl.insertBefore(document.createTextNode(' • '), sectionEl.firstChild);
                    sectionEl.insertBefore(wrap, sectionEl.firstChild);
                } else {
                    sectionEl.appendChild(wrap);
                }
            }
            if (postId) {
                if (sectionEl.firstChild) sectionEl.appendChild(document.createTextNode(' • '));
                sectionEl.appendChild(document.createTextNode(postId));
            }
        }

        const tagsHost = document.getElementById('tags');
        (data.tags || []).forEach(function (t) {
            const span = document.createElement('span');
            span.className = 'tag';
            span.textContent = t;
            tagsHost.appendChild(span);
        });

        // Minimal markdown renderer. Supports: ATX headings, paragraphs, blockquotes,
        // unordered/ordered lists, fenced code, inline code, bold/italic/strikethrough, links, images, hr.
        // Sufficient for the posts in this repo; replace with a fuller parser if needed.
        function renderMarkdown(src) {
            const lines = src.replace(/\r\n/g, '\n').split('\n');
            const out = [];
            let i = 0;

            const bullet = /^(\s*)([-*])\s+(.*)$/;
            const ordered = /^(\s*)(\d+)\.\s+(.*)$/;
            const tableRow = /^\s*\|(.+)\|\s*$/;
            const tableSep = /^\s*\|?\s*:?-{3,}:?\s*(\|\s*:?-{3,}:?\s*)+\|?\s*$/;

            function splitRow(s) {
                let t = s.trim();
                if (t.startsWith('|')) t = t.slice(1);
                if (t.endsWith('|')) t = t.slice(0, -1);
                return t.split('|').map(c => c.trim());
            }

            function inline(s) {
                // Posts are trusted content, so raw HTML passes through unescaped
                // (some posts embed inline <blockquote>, <div>, etc.).
                // Stray ampersands still get fixed up.
                s = s.replace(/&(?![a-zA-Z]+;|#\d+;)/g, '&amp;');
                s = s.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<a class="image-link" href="$2" target="_blank" rel="noopener noreferrer"><img alt="$1" src="$2"></a>');
                s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
                s = s.replace(/`([^`]+)`/g, function (_, c) {
                    return '<code>' + c.replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</code>';
                });
                s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
                s = s.replace(/~~([^~\n]+)~~/g, '<del>$1</del>');
                s = s.replace(/(^|[^*])\*([^*\n]+)\*/g, '$1<em>$2</em>');
                return s;
            }

            while (i < lines.length) {
                const line = lines[i];
                if (!line.trim()) {
                    i++;
                    continue;
                }

                const fence = line.match(/^```(\w*)\s*$/);
                if (fence) {
                    i++;
                    const buf = [];
                    while (i < lines.length && !/^```\s*$/.test(lines[i])) {
                        buf.push(lines[i]);
                        i++;
                    }
                    i++;
                    const escaped = buf.join('\n').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                    const cls = fence[1] ? ' class="lang-' + fence[1] + '"' : '';
                    out.push('<pre><code' + cls + '>' + escaped + '</code></pre>');
                    continue;
                }

                const h = line.match(/^(#{1,6})\s+(.*)$/);
                if (h) {
                    out.push('<h' + h[1].length + '>' + inline(h[2]) + '</h' + h[1].length + '>');
                    i++;
                    continue;
                }

                if (/^\s*(?:-\s*){3,}\s*$/.test(line) || /^\s*\*{3,}\s*$/.test(line)) {
                    out.push('<hr>');
                    i++;
                    continue;
                }

                if (/^>\s?/.test(line)) {
                    const buf = [];
                    while (i < lines.length && /^>\s?/.test(lines[i])) {
                        buf.push(lines[i].replace(/^>\s?/, ''));
                        i++;
                    }
                    out.push('<blockquote>' + renderMarkdown(buf.join('\n')) + '</blockquote>');
                    continue;
                }

                if (tableRow.test(line) && i + 1 < lines.length && tableSep.test(lines[i + 1])) {
                    const headers = splitRow(line);
                    i += 2;
                    const rows = [];
                    while (i < lines.length && tableRow.test(lines[i])) {
                        rows.push(splitRow(lines[i]));
                        i++;
                    }
                    let html = '<table><thead><tr>';
                    headers.forEach(h => {
                        html += '<th>' + inline(h) + '</th>';
                    });
                    html += '</tr></thead><tbody>';
                    rows.forEach(r => {
                        html += '<tr>';
                        r.forEach(c => {
                            html += '<td>' + inline(c) + '</td>';
                        });
                        html += '</tr>';
                    });
                    html += '</tbody></table>';
                    out.push(html);
                    continue;
                }

                if (bullet.test(line) || ordered.test(line)) {
                    // Indent of the first bullet defines this list's base level.
                    // Deeper-indented bullets become nested lists (rendered by
                    // recursing into renderMarkdown). Same-or-less indent at a
                    // bullet starts a sibling item (or ends the list).
                    const firstMatch = line.match(bullet) || line.match(ordered);
                    const baseIndent = firstMatch[1].length;
                    const isOrdered = ordered.test(line);
                    const items = [];
                    while (i < lines.length) {
                        const cur = lines[i];
                        if (!cur.trim()) {
                            // blank line breaks the list (matches CommonMark-ish behaviour)
                            i++;
                            break;
                        }
                        const mBul = cur.match(bullet);
                        const mOrd = cur.match(ordered);
                        const m = mBul || mOrd;
                        if (!m) break;
                        if (m[1].length < baseIndent) break;
                        if (m[1].length > baseIndent) break; // shouldn't happen at top of loop
                        // Same-type check: switching between -/* and 1. closes the list
                        if (isOrdered !== !!mOrd) break;

                        const itemBuf = [m[3]];
                        const nestedBuf = [];
                        i++;
                        while (i < lines.length) {
                            const nxt = lines[i];
                            if (!nxt.trim()) break;
                            const nBul = nxt.match(bullet);
                            const nOrd = nxt.match(ordered);
                            const nm = nBul || nOrd;
                            if (nm) {
                                if (nm[1].length > baseIndent) {
                                    // nested list line — dedent and stash
                                    nestedBuf.push(nxt.slice(baseIndent + 2));
                                    i++;
                                    continue;
                                }
                                // sibling or end of list
                                break;
                            }
                            // Plain continuation text
                            if (nestedBuf.length) {
                                // continuation inside the nested block
                                nestedBuf.push(nxt.slice(baseIndent + 2));
                            } else {
                                itemBuf.push(nxt.trim());
                            }
                            i++;
                        }

                        let liHtml = inline(itemBuf.join('\n'));
                        if (nestedBuf.length) {
                            liHtml += renderMarkdown(nestedBuf.join('\n'));
                        }
                        items.push('<li>' + liHtml + '</li>');
                    }
                    out.push((isOrdered ? '<ol>' : '<ul>') + items.join('') + (isOrdered ? '</ol>' : '</ul>'));
                    continue;
                }

                const buf = [line];
                i++;
                while (i < lines.length && lines[i].trim() && !/^#{1,6}\s/.test(lines[i]) && !/^>\s?/.test(lines[i]) && !bullet.test(lines[i]) && !ordered.test(lines[i]) && !/^```/.test(lines[i]) && !tableRow.test(lines[i])) {
                    buf.push(lines[i]);
                    i++;
                }
                out.push('<p>' + inline(buf.join(' ')) + '</p>');
            }
            return out.join('\n');
        }

        // Block dispatcher. New block types plug in here.
        const renderers = {
            markdown: function (block) {
                const div = document.createElement('div');
                div.innerHTML = renderMarkdown(block.content);
                return div;
            },
            mermaid: function (block) {
                // Mermaid scans elements with class "mermaid" whose textContent
                // is the diagram source. We collect these nodes and run
                // mermaid.run() once after all blocks are in the DOM.
                const div = document.createElement('div');
                div.className = 'mermaid';
                div.textContent = block.content;
                return div;
            },
            'force-graph': function (block) {
                // build.py emits parsed JSON: {nodes:[{id,size}], links:[{source,target}]}.
                // We instantiate force-graph after the container is in the DOM
                // so it can measure its own width.
                const div = document.createElement('div');
                div.className = 'force-graph';
                const data = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.ForceGraph) return;
                    const maxSize = data.nodes.reduce((m, n) => Math.max(m, n.size || 1), 1);
                    window.ForceGraph()(div)
                        .graphData(data)
                        .width(div.clientWidth)
                        .height(div.clientHeight)
                        .nodeRelSize(4)
                        .nodeVal(n => Math.max(20 * (n.size || 1) / maxSize, 0.001))
                        .nodeLabel(n => n.id + ' (' + (n.size || 1) + ')')
                        .nodeColor(() => 'rgba(135, 206, 235, 0.7)')
                        .linkColor(() => 'rgba(60, 60, 60, 0.4)')
                        .linkDirectionalArrowLength(4)
                        .linkDirectionalArrowRelPos(1)
                        .linkWidth(1);
                });
                return div;
            },
            'bubble-chart': function (block) {
                // build.py emits {nodes:[{name,size}]}. Renders a D3 circle-pack
                // SVG (same shape as the obren.io reference, just inline).
                const wrap = document.createElement('div');
                wrap.className = 'bubble-chart';
                const payload = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.d3) return;
                    const diameter = 480;
                    const fill = '#c0deed';
                    const textColor = '#111111';
                    const fontSize = 12;

                    const svg = window.d3.select(wrap).append('svg')
                        .attr('viewBox', '0 0 ' + diameter + ' ' + diameter)
                        .attr('width', diameter)
                        .attr('height', diameter);

                    const root = window.d3.hierarchy({children: payload.nodes})
                        .sum(d => d.size || 0)
                        .sort((a, b) => b.value - a.value);

                    window.d3.pack().size([diameter, diameter]).padding(2)(root);

                    const node = svg.selectAll('g')
                        .data(root.leaves())
                        .enter().append('g')
                        .attr('transform', d => 'translate(' + d.x + ',' + d.y + ')');

                    node.append('title').text(d => d.data.name + ': ' + d.value);
                    node.append('circle').attr('r', d => d.r).style('fill', fill);
                    node.append('text')
                        .attr('dy', '.3em')
                        .style('text-anchor', 'middle')
                        .style('fill', textColor)
                        .style('font-size', fontSize + 'px')
                        .text(d => d.data.name.substring(0, Math.max(0, Math.floor(d.r / 3))));
                });
                return wrap;
            }
        };

        // Render one modality's blocks into a host element. Mermaid runs
        // scoped to just the nodes created here, so lazily rendered tabs get
        // their diagrams on first activation.
        let mermaidInitialized = false;
        function renderBlocksInto(blocks, host) {
            const mermaidNodes = [];
            blocks.forEach(function (block) {
                const r = renderers[block.type];
                if (!r) {
                    const pre = document.createElement('pre');
                    pre.textContent = '[unknown block type: ' + block.type + ']';
                    host.appendChild(pre);
                    return;
                }
                const node = r(block);
                if (node instanceof Node) {
                    host.appendChild(node);
                    if (block.type === 'mermaid') mermaidNodes.push(node);
                }
            });
            if (mermaidNodes.length && window.mermaid) {
                if (!mermaidInitialized) {
                    window.mermaid.initialize({startOnLoad: false, theme: 'default'});
                    mermaidInitialized = true;
                }
                window.mermaid.run({nodes: mermaidNodes});
            }
        }

        // Modality tabs. One <article class="pane"> per modality; panes are
        // rendered lazily on first activation (force-graph / D3 / mermaid
        // need a visible, measurable container). With a single modality the
        // tab bar stays hidden and the page looks exactly like before.
        const mods = data.modalities;
        const tabBar = document.getElementById('modality-tabs');
        const panes = {};
        const tabButtons = {};
        const renderedPanes = {};

        mods.forEach(function (m) {
            const pane = document.createElement('article');
            pane.className = 'pane';
            pane.dataset.key = m.key;
            pane.hidden = true;
            root.appendChild(pane);
            panes[m.key] = pane;
        });

        const defaultKey = mods.some(m => m.key === 'index') ? 'index' : mods[0].key;

        function activate(key, updateHash) {
            mods.forEach(function (m) {
                const isActive = m.key === key;
                panes[m.key].hidden = !isActive;
                if (tabButtons[m.key]) {
                    tabButtons[m.key].classList.toggle('active', isActive);
                    tabButtons[m.key].setAttribute('aria-selected', isActive ? 'true' : 'false');
                }
            });
            // Unhide first, then render: the chart libraries measure widths.
            if (!renderedPanes[key]) {
                renderBlocksInto(mods.find(m => m.key === key).blocks, panes[key]);
                renderedPanes[key] = true;
            }
            if (updateHash) {
                history.replaceState(null, '',
                    key === defaultKey ? location.pathname + location.search : '#' + key);
            }
        }

        if (mods.length > 1) {
            mods.forEach(function (m) {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.textContent = m.label;
                btn.setAttribute('role', 'tab');
                btn.addEventListener('click', function () { activate(m.key, true); });
                tabBar.appendChild(btn);
                tabButtons[m.key] = btn;
            });
            tabBar.hidden = false;
        }

        // The hash selects a tab only when it matches a modality key, so
        // existing anchors keep working.
        const initialHash = location.hash.slice(1);
        activate(mods.some(m => m.key === initialHash) ? initialHash : defaultKey, false);
        window.addEventListener('hashchange', function () {
            const k = location.hash.slice(1);
            if (mods.some(m => m.key === k)) activate(k, false);
        });
    })();
</script>
