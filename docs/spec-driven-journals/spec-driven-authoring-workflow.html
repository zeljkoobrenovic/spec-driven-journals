<script id="data" type="application/json">{"meta": {"title": "Spec-Driven Authoring Workflow", "date": "2026-05-22", "author": "by Željko Obrenović (obren.io)", "permalink": "spec-driven-authoring-workflow", "timetoread": "8 min", "excerpt": "Spec-driven authoring is the practical workflow inside Spec-Driven Journals: state the intent in a sibling spec, draft the post from that contract, build the journal, inspect the generated page, and return fixes to source.", "tags": "authoring, specs, workflow, review", "icon": "assets/icons/spec-driven-authoring-workflow.png", "logo": "assets/images/spec-driven-authoring-workflow/logo.jpeg", "logo_credit": "Image generated by Google Gemini (gemini-3-pro-image-preview)"}, "tags": ["authoring", "specs", "workflow", "review"], "blocks": [{"type": "markdown", "content": "> Spec-driven authoring is the practical workflow inside Spec-Driven Journals: state the intent in a sibling spec, draft the post from that contract, build the journal, inspect the generated page, and return fixes to source.\n\nSpec-driven authoring is not a large process. It is a small discipline that keeps substantial writing from drifting.\n\nThe durable rationale lives in [Spec-Driven Authoring as a Lightweight Default for Posts](../foundations/spec-driven-authoring.html). This article turns that rationale into a day-to-day workflow for [Spec-Driven Journals](https://github.com/zeljkoobrenovic/spec-driven-journals).\n\nThe previous article, [Cross-Links, Assets, and Blocks](cross-links-assets-and-blocks.html), covered what can go inside a post body. This one covers the order of work: how source, specs, posts, builds, and review fit into one repeatable loop.\n\n## The Workflow\n\nFor a non-trivial article, work in this order:\n\n1. Inspect the journal and related records.\n2. Create or update `spec.md`.\n3. Draft or revise `index.md`.\n4. Add the post to `config.yaml` if it is new.\n5. Build the affected journal.\n6. Inspect the generated post and spec pages.\n7. Return fixes to source.\n8. Summarize changed files, build result, and remaining gaps.\n\nThe important part is the order. The spec comes before the article when the article's intent is meaningful enough to drift.\n\n![Spec-driven authoring loop](assets/images/spec-driven-authoring-loop.png)\n*Illustration placeholder: `spec-driven-authoring-loop.png` should show the loop from inspect context, update `spec.md`, draft `index.md`, build the journal, inspect generated output, and return fixes to source.*\n\n## What Counts As Non-Trivial\n\nA post needs a spec when the intent is not self-evident from the title.\n\nExamples:\n\n| Change | Spec needed? | Reason |\n| --- | --- | --- |\n| New article series | Yes | The intent, audience, sequence, and sources need to be explicit. |\n| New foundation record | Yes | The record shapes durable practice. |\n| Major rewrite of an existing post | Yes | The old and new intent may diverge. |\n| Small typo fix | No | The intent is already clear. |\n| Broken image path fix | Usually no | The change is mechanical. |\n| Status flip or metadata correction | Usually no | The post argument is not changing. |\n\nThis journal uses specs for every article because the articles are part of a new collection and each one has a distinct role.\n\n## What The Spec Should Say\n\nA useful spec is short and concrete.\n\nIt should answer:\n\n- What does this article need to land?\n- Who is the reader?\n- What can a reviewer check?\n- What is deliberately out of scope?\n- What is still unresolved?\n- Which sources shaped the draft?\n- What changed while drafting?\n\nThe success criteria are especially important. They let the author, reviewer, and AI agent evaluate the post against a shared contract instead of against taste alone.\n\n## Draft The Post From The Spec\n\nOnce the spec exists, the post should satisfy it.\n\nThat does not mean the post must mechanically follow the spec headings. It means the post should land the intent and success criteria. The article can have its own narrative structure.\n\nThe distinction matters:\n\n| Spec | Post |\n| --- | --- |\n| Working contract. | Published artifact. |\n| Written for authoring and review. | Written for readers. |\n| Captures intent, sources, and changelog. | Carries the argument. |\n| Can be terse. | Should be readable. |\n\nIf the post discovers a better direction, update the spec. If the spec no longer describes the post, the work has drifted.\n\n## Build The Journal\n\nFor a normal full publication pass, Spec-Driven Journals documents:\n\n```bash\npython3 _wiring/build.py\npython3 _start/generate-docs.py\n```\n\nDuring a scoped edit, it is often better to build only the affected journal so unrelated dirty output is not touched. The generator exposes `build_journal()` for that pattern:\n\n```bash\npython3 -c \"import _wiring.build as b; index_tpl=(b.TEMPLATES_DIR/'index.html').read_text(encoding='utf-8'); post_tpl=(b.TEMPLATES_DIR/'post.html').read_text(encoding='utf-8'); b.DOCS_DIR.mkdir(exist_ok=True); b.build_journal(b.JOURNALS_DIR/'spec-driven-journals', index_tpl, post_tpl, b.build_crosslink_index())\"\n```\n\nThe full build remains the publication-level check. Scoped builds are useful while collaborating in a dirty worktree.\n\nAfter publication, the public reading surface is the [generated Spec-Driven Journals site](https://zeljkoobrenovic.github.io/spec-driven-journals/). Source changes should still be reviewed in the [official Spec-Driven Journals repository](https://github.com/zeljkoobrenovic/spec-driven-journals).\n\n## Inspect The Generated Output\n\nAfter building, check the generated files:\n\n- `docs/<journal>/index.html`\n- `docs/<journal>/<permalink>.html`\n- `docs/<journal>/<permalink>.spec.html` when a spec exists\n- copied assets under `docs/<journal>/assets/`\n\nAlso check for visible unresolved cross-links:\n\n```bash\nrg -n \"\\\\[\\\\[\" docs/<journal>\n```\n\nIf the page reads poorly, do not patch generated HTML. Go back to `index.md`, `spec.md`, config, templates, or assets.\n\n## Review Against The Spec\n\nA good review asks:\n\n- Does the post satisfy the spec intent?\n- Does it serve the stated audience?\n- Are the success criteria visibly met?\n- Did the post drift into non-goals?\n- Are sources represented honestly?\n- Does the generated page render tables, images, links, and custom blocks correctly?\n- Does the spec changelog reflect meaningful changes?\n\nThat review is more useful than proofreading alone.\n\n## The Payoff\n\nSpec-driven authoring makes future sessions cheaper.\n\nA future reader can inspect the article. A future maintainer can inspect the spec. A future AI agent can inspect both, then make a scoped change without reconstructing intent from conversation history.\n\nThat is the practical reason to keep the spec next to the post.\n"}]}</script>
<script>
    (function () {
        const data = JSON.parse(document.getElementById('data').textContent);
        const root = document.getElementById('content');

        const postId = (data.meta && data.meta.id) ? String(data.meta.id) : '';
        const postStatusRaw = (data.meta && data.meta.status) ? String(data.meta.status) : '';
        if (postId || postStatusRaw) {
            const header = document.getElementById('post-header');
            let sectionEl = header.querySelector('p.section');
            if (!sectionEl) {
                sectionEl = document.createElement('p');
                sectionEl.className = 'section';
                header.insertBefore(sectionEl, header.firstChild);
            }
            // Status pill goes first, then a " / " separator before the existing
            // content (section name and/or id).
            if (postStatusRaw) {
                const parts = postStatusRaw.split(':');
                const statusName = parts[0].trim();
                const statusColor = (parts[1] || '').trim();
                const wrap = document.createElement('span');
                wrap.className = 'post-status';
                const dot = document.createElement('span');
                dot.className = 'status-dot';
                if (statusColor) dot.style.background = statusColor;
                wrap.appendChild(dot);
                wrap.appendChild(document.createTextNode(statusName));
                if (sectionEl.firstChild) {
                    sectionEl.insertBefore(document.createTextNode(' • '), sectionEl.firstChild);
                    sectionEl.insertBefore(wrap, sectionEl.firstChild);
                } else {
                    sectionEl.appendChild(wrap);
                }
            }
            if (postId) {
                if (sectionEl.firstChild) sectionEl.appendChild(document.createTextNode(' • '));
                sectionEl.appendChild(document.createTextNode(postId));
            }
        }

        const tagsHost = document.getElementById('tags');
        (data.tags || []).forEach(function (t) {
            const span = document.createElement('span');
            span.className = 'tag';
            span.textContent = t;
            tagsHost.appendChild(span);
        });

        // Minimal markdown renderer. Supports: ATX headings, paragraphs, blockquotes,
        // unordered/ordered lists, fenced code, inline code, bold/italic/strikethrough, links, images, hr.
        // Sufficient for the posts in this repo; replace with a fuller parser if needed.
        function renderMarkdown(src) {
            const lines = src.replace(/\r\n/g, '\n').split('\n');
            const out = [];
            let i = 0;

            const bullet = /^(\s*)([-*])\s+(.*)$/;
            const ordered = /^(\s*)(\d+)\.\s+(.*)$/;
            const tableRow = /^\s*\|(.+)\|\s*$/;
            const tableSep = /^\s*\|?\s*:?-{3,}:?\s*(\|\s*:?-{3,}:?\s*)+\|?\s*$/;

            function splitRow(s) {
                let t = s.trim();
                if (t.startsWith('|')) t = t.slice(1);
                if (t.endsWith('|')) t = t.slice(0, -1);
                return t.split('|').map(c => c.trim());
            }

            function inline(s) {
                // Posts are trusted content, so raw HTML passes through unescaped
                // (some posts embed inline <blockquote>, <div>, etc.).
                // Stray ampersands still get fixed up.
                s = s.replace(/&(?![a-zA-Z]+;|#\d+;)/g, '&amp;');
                s = s.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<a class="image-link" href="$2" target="_blank" rel="noopener noreferrer"><img alt="$1" src="$2"></a>');
                s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
                s = s.replace(/`([^`]+)`/g, function (_, c) {
                    return '<code>' + c.replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</code>';
                });
                s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
                s = s.replace(/~~([^~\n]+)~~/g, '<del>$1</del>');
                s = s.replace(/(^|[^*])\*([^*\n]+)\*/g, '$1<em>$2</em>');
                return s;
            }

            while (i < lines.length) {
                const line = lines[i];
                if (!line.trim()) {
                    i++;
                    continue;
                }

                const fence = line.match(/^```(\w*)\s*$/);
                if (fence) {
                    i++;
                    const buf = [];
                    while (i < lines.length && !/^```\s*$/.test(lines[i])) {
                        buf.push(lines[i]);
                        i++;
                    }
                    i++;
                    const escaped = buf.join('\n').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                    const cls = fence[1] ? ' class="lang-' + fence[1] + '"' : '';
                    out.push('<pre><code' + cls + '>' + escaped + '</code></pre>');
                    continue;
                }

                const h = line.match(/^(#{1,6})\s+(.*)$/);
                if (h) {
                    out.push('<h' + h[1].length + '>' + inline(h[2]) + '</h' + h[1].length + '>');
                    i++;
                    continue;
                }

                if (/^\s*(?:-\s*){3,}\s*$/.test(line) || /^\s*\*{3,}\s*$/.test(line)) {
                    out.push('<hr>');
                    i++;
                    continue;
                }

                if (/^>\s?/.test(line)) {
                    const buf = [];
                    while (i < lines.length && /^>\s?/.test(lines[i])) {
                        buf.push(lines[i].replace(/^>\s?/, ''));
                        i++;
                    }
                    out.push('<blockquote>' + renderMarkdown(buf.join('\n')) + '</blockquote>');
                    continue;
                }

                if (tableRow.test(line) && i + 1 < lines.length && tableSep.test(lines[i + 1])) {
                    const headers = splitRow(line);
                    i += 2;
                    const rows = [];
                    while (i < lines.length && tableRow.test(lines[i])) {
                        rows.push(splitRow(lines[i]));
                        i++;
                    }
                    let html = '<table><thead><tr>';
                    headers.forEach(h => {
                        html += '<th>' + inline(h) + '</th>';
                    });
                    html += '</tr></thead><tbody>';
                    rows.forEach(r => {
                        html += '<tr>';
                        r.forEach(c => {
                            html += '<td>' + inline(c) + '</td>';
                        });
                        html += '</tr>';
                    });
                    html += '</tbody></table>';
                    out.push(html);
                    continue;
                }

                if (bullet.test(line) || ordered.test(line)) {
                    // Indent of the first bullet defines this list's base level.
                    // Deeper-indented bullets become nested lists (rendered by
                    // recursing into renderMarkdown). Same-or-less indent at a
                    // bullet starts a sibling item (or ends the list).
                    const firstMatch = line.match(bullet) || line.match(ordered);
                    const baseIndent = firstMatch[1].length;
                    const isOrdered = ordered.test(line);
                    const items = [];
                    while (i < lines.length) {
                        const cur = lines[i];
                        if (!cur.trim()) {
                            // blank line breaks the list (matches CommonMark-ish behaviour)
                            i++;
                            break;
                        }
                        const mBul = cur.match(bullet);
                        const mOrd = cur.match(ordered);
                        const m = mBul || mOrd;
                        if (!m) break;
                        if (m[1].length < baseIndent) break;
                        if (m[1].length > baseIndent) break; // shouldn't happen at top of loop
                        // Same-type check: switching between -/* and 1. closes the list
                        if (isOrdered !== !!mOrd) break;

                        const itemBuf = [m[3]];
                        const nestedBuf = [];
                        i++;
                        while (i < lines.length) {
                            const nxt = lines[i];
                            if (!nxt.trim()) break;
                            const nBul = nxt.match(bullet);
                            const nOrd = nxt.match(ordered);
                            const nm = nBul || nOrd;
                            if (nm) {
                                if (nm[1].length > baseIndent) {
                                    // nested list line — dedent and stash
                                    nestedBuf.push(nxt.slice(baseIndent + 2));
                                    i++;
                                    continue;
                                }
                                // sibling or end of list
                                break;
                            }
                            // Plain continuation text
                            if (nestedBuf.length) {
                                // continuation inside the nested block
                                nestedBuf.push(nxt.slice(baseIndent + 2));
                            } else {
                                itemBuf.push(nxt.trim());
                            }
                            i++;
                        }

                        let liHtml = inline(itemBuf.join('\n'));
                        if (nestedBuf.length) {
                            liHtml += renderMarkdown(nestedBuf.join('\n'));
                        }
                        items.push('<li>' + liHtml + '</li>');
                    }
                    out.push((isOrdered ? '<ol>' : '<ul>') + items.join('') + (isOrdered ? '</ol>' : '</ul>'));
                    continue;
                }

                const buf = [line];
                i++;
                while (i < lines.length && lines[i].trim() && !/^#{1,6}\s/.test(lines[i]) && !/^>\s?/.test(lines[i]) && !bullet.test(lines[i]) && !ordered.test(lines[i]) && !/^```/.test(lines[i]) && !tableRow.test(lines[i])) {
                    buf.push(lines[i]);
                    i++;
                }
                out.push('<p>' + inline(buf.join(' ')) + '</p>');
            }
            return out.join('\n');
        }

        // Block dispatcher. New block types plug in here.
        const renderers = {
            markdown: function (block) {
                const div = document.createElement('div');
                div.innerHTML = renderMarkdown(block.content);
                return div;
            },
            mermaid: function (block) {
                // Mermaid scans elements with class "mermaid" whose textContent
                // is the diagram source. We collect these nodes and run
                // mermaid.run() once after all blocks are in the DOM.
                const div = document.createElement('div');
                div.className = 'mermaid';
                div.textContent = block.content;
                return div;
            },
            'force-graph': function (block) {
                // build.py emits parsed JSON: {nodes:[{id,size}], links:[{source,target}]}.
                // We instantiate force-graph after the container is in the DOM
                // so it can measure its own width.
                const div = document.createElement('div');
                div.className = 'force-graph';
                const data = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.ForceGraph) return;
                    const maxSize = data.nodes.reduce((m, n) => Math.max(m, n.size || 1), 1);
                    window.ForceGraph()(div)
                        .graphData(data)
                        .width(div.clientWidth)
                        .height(div.clientHeight)
                        .nodeRelSize(4)
                        .nodeVal(n => Math.max(20 * (n.size || 1) / maxSize, 0.001))
                        .nodeLabel(n => n.id + ' (' + (n.size || 1) + ')')
                        .nodeColor(() => 'rgba(135, 206, 235, 0.7)')
                        .linkColor(() => 'rgba(60, 60, 60, 0.4)')
                        .linkDirectionalArrowLength(4)
                        .linkDirectionalArrowRelPos(1)
                        .linkWidth(1);
                });
                return div;
            },
            'bubble-chart': function (block) {
                // build.py emits {nodes:[{name,size}]}. Renders a D3 circle-pack
                // SVG (same shape as the obren.io reference, just inline).
                const wrap = document.createElement('div');
                wrap.className = 'bubble-chart';
                const payload = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.d3) return;
                    const diameter = 480;
                    const fill = '#c0deed';
                    const textColor = '#111111';
                    const fontSize = 12;

                    const svg = window.d3.select(wrap).append('svg')
                        .attr('viewBox', '0 0 ' + diameter + ' ' + diameter)
                        .attr('width', diameter)
                        .attr('height', diameter);

                    const root = window.d3.hierarchy({children: payload.nodes})
                        .sum(d => d.size || 0)
                        .sort((a, b) => b.value - a.value);

                    window.d3.pack().size([diameter, diameter]).padding(2)(root);

                    const node = svg.selectAll('g')
                        .data(root.leaves())
                        .enter().append('g')
                        .attr('transform', d => 'translate(' + d.x + ',' + d.y + ')');

                    node.append('title').text(d => d.data.name + ': ' + d.value);
                    node.append('circle').attr('r', d => d.r).style('fill', fill);
                    node.append('text')
                        .attr('dy', '.3em')
                        .style('text-anchor', 'middle')
                        .style('fill', textColor)
                        .style('font-size', fontSize + 'px')
                        .text(d => d.data.name.substring(0, Math.max(0, Math.floor(d.r / 3))));
                });
                return wrap;
            }
        };

        const mermaidNodes = [];
        data.blocks.forEach(function (block) {
            const r = renderers[block.type];
            if (!r) {
                const pre = document.createElement('pre');
                pre.textContent = '[unknown block type: ' + block.type + ']';
                root.appendChild(pre);
                return;
            }
            const node = r(block);
            if (node instanceof Node) {
                root.appendChild(node);
                if (block.type === 'mermaid') mermaidNodes.push(node);
            }
        });

        if (mermaidNodes.length && window.mermaid) {
            window.mermaid.initialize({startOnLoad: false, theme: 'default'});
            window.mermaid.run({nodes: mermaidNodes});
        }
    })();
</script>
</body>
</html>
