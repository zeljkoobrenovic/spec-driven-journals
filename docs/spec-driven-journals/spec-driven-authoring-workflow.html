<script id="data" type="application/json">{"meta": {"title": "Spec-Driven Authoring Workflow", "date": "2026-05-22", "author": "by Željko Obrenović (obren.io)", "permalink": "spec-driven-authoring-workflow", "timetoread": "8 min", "excerpt": "Spec-driven authoring is the practical workflow inside Spec-Driven Journals: state the intent in a sibling spec, draft the post from that contract, build the journal, inspect the generated page, and return fixes to source.", "tags": "authoring, specs, workflow, review", "icon": "assets/icons/spec-driven-authoring-workflow.png", "logo": "assets/images/spec-driven-authoring-workflow/logo.jpeg", "logo_credit": "Image generated by Google Gemini (gemini-3-pro-image-preview)"}, "tags": ["authoring", "specs", "workflow", "review"], "modalities": [{"key": "index", "label": "Article", "meta": {}, "blocks": [{"type": "markdown", "content": "> Spec-driven authoring is the practical workflow inside Spec-Driven Journals: state the intent in a sibling spec, draft the post from that contract, build the journal, inspect the generated page, and return fixes to source.\n\nSpec-driven authoring is not a large process. It is a small discipline that keeps substantial writing from drifting.\n\nThe durable rationale lives in [Spec-Driven Authoring as a Lightweight Default for Posts](../foundations/spec-driven-authoring.html). This article turns that rationale into a day-to-day workflow for [Spec-Driven Journals](https://github.com/zeljkoobrenovic/spec-driven-journals).\n\nThe previous article, [Cross-Links, Assets, and Blocks](cross-links-assets-and-blocks.html), covered what can go inside a post body. This one covers the order of work: how source, specs, posts, builds, and review fit into one repeatable loop.\n\n## The Workflow\n\nFor a non-trivial article, work in this order:\n\n1. Inspect the journal and related records.\n2. Create or update `spec.md`.\n3. Draft or revise `index.md`.\n4. Add the post to `config.yaml` if it is new.\n5. Add modality docs (`summary.md`, `dialog.md`, `comics.md`) if the spec calls for them.\n6. Build the affected journal.\n7. Inspect the generated post and spec pages.\n8. Return fixes to source.\n9. Summarize changed files, build result, and remaining gaps.\n\nThe important part is the order. The spec comes before the article when the article's intent is meaningful enough to drift.\n\n![Spec-driven authoring loop](assets/images/spec-driven-authoring-loop.png)\n*Illustration placeholder: `spec-driven-authoring-loop.png` should show the loop from inspect context, update `spec.md`, draft `index.md`, build the journal, inspect generated output, and return fixes to source.*\n\n## What Counts As Non-Trivial\n\nA post needs a spec when the intent is not self-evident from the title.\n\nExamples:\n\n| Change | Spec needed? | Reason |\n| --- | --- | --- |\n| New article series | Yes | The intent, audience, sequence, and sources need to be explicit. |\n| New foundation record | Yes | The record shapes durable practice. |\n| Major rewrite of an existing post | Yes | The old and new intent may diverge. |\n| Small typo fix | No | The intent is already clear. |\n| Broken image path fix | Usually no | The change is mechanical. |\n| Status flip or metadata correction | Usually no | The post argument is not changing. |\n\nThis journal uses specs for every article because the articles are part of a new collection and each one has a distinct role.\n\n## What The Spec Should Say\n\nA useful spec is short and concrete.\n\nIt should answer:\n\n- What does this article need to land?\n- Who is the reader?\n- What can a reviewer check?\n- What is deliberately out of scope?\n- What is still unresolved?\n- Which sources shaped the draft?\n- What changed while drafting?\n\nThe success criteria are especially important. They let the author, reviewer, and AI agent evaluate the post against a shared contract instead of against taste alone.\n\n## Draft The Post From The Spec\n\nOnce the spec exists, the post should satisfy it.\n\nThat does not mean the post must mechanically follow the spec headings. It means the post should land the intent and success criteria. The article can have its own narrative structure.\n\nThe distinction matters:\n\n| Spec | Post |\n| --- | --- |\n| Working contract. | Published artifact. |\n| Written for authoring and review. | Written for readers. |\n| Captures intent, sources, and changelog. | Carries the argument. |\n| Can be terse. | Should be readable. |\n\nIf the post discovers a better direction, update the spec. If the spec no longer describes the post, the work has drifted.\n\n## One Spec, Several Modalities\n\nA spec can drive more than the article. The spec's **Modalities** section declares which additional docs the post warrants:\n\n| Modality file | Tab | What it is |\n| --- | --- | --- |\n| `index.md` | Article | The detailed main article — required, default tab. |\n| `summary.md` | Summary | A management summary (300–500 words) keyed to the spec's success criteria and non-goals. |\n| `dialog.md` | Conversation | A two-host conversation that walks the success criteria as dialogue beats. |\n| `comics.md` | Comic | An explainer comic of generated panels, one beat per panel. |\n\nThe article is always written first; the other modalities derive from the spec plus the finished article. Each modality has a dedicated authoring skill (in `.claude/skills/`: `detailed-article`, `management-summary`, `podcast-dialog`, `explainer-comics`), and all of them treat the spec as a read-only contract — if a modality reveals drift, the spec gets reconciled, not bypassed.\n\n## Build The Journal\n\nFor a normal full publication pass, Spec-Driven Journals documents:\n\n```bash\npython3 _wiring/build.py\npython3 _start/generate-docs.py\n```\n\nDuring a scoped edit, it is often better to build only the affected journal so unrelated dirty output is not touched. The generator exposes `build_journal()` for that pattern:\n\n```bash\npython3 -c \"import _wiring.build as b; index_tpl=(b.TEMPLATES_DIR/'index.html').read_text(encoding='utf-8'); post_tpl=(b.TEMPLATES_DIR/'post.html').read_text(encoding='utf-8'); b.DOCS_DIR.mkdir(exist_ok=True); b.build_journal(b.JOURNALS_DIR/'spec-driven-journals', index_tpl, post_tpl, b.build_crosslink_index())\"\n```\n\nThe full build remains the publication-level check. Scoped builds are useful while collaborating in a dirty worktree.\n\nAfter publication, the public reading surface is the [generated Spec-Driven Journals site](https://zeljkoobrenovic.github.io/spec-driven-journals/). Source changes should still be reviewed in the [official Spec-Driven Journals repository](https://github.com/zeljkoobrenovic/spec-driven-journals).\n\n## Inspect The Generated Output\n\nAfter building, check the generated files:\n\n- `docs/<journal>/index.html`\n- `docs/<journal>/<permalink>.html`\n- `docs/<journal>/<permalink>.spec.html` when a spec exists\n- modality tabs on the post page when `summary.md`, `dialog.md`, or `comics.md` exist\n- copied assets under `docs/<journal>/assets/`\n\nAlso check for visible unresolved cross-links:\n\n```bash\nrg -n \"\\\\[\\\\[\" docs/<journal>\n```\n\nIf the page reads poorly, do not patch generated HTML. Go back to `index.md`, `spec.md`, config, templates, or assets.\n\n## Review Against The Spec\n\nA good review asks:\n\n- Does the post satisfy the spec intent?\n- Does it serve the stated audience?\n- Are the success criteria visibly met?\n- Did the post drift into non-goals?\n- Are sources represented honestly?\n- Does the generated page render tables, images, links, and custom blocks correctly?\n- Does the spec changelog reflect meaningful changes?\n\nThat review is more useful than proofreading alone.\n\n## The Payoff\n\nSpec-driven authoring makes future sessions cheaper.\n\nA future reader can inspect the article. A future maintainer can inspect the spec. A future AI agent can inspect both, then make a scoped change without reconstructing intent from conversation history.\n\nThat is the practical reason to keep the spec next to the post.\n"}]}, {"key": "summary", "label": "Summary", "meta": {"timetoread": "2 min"}, "blocks": [{"type": "markdown", "content": "Spec-driven authoring is the day-to-day workflow inside Spec-Driven Journals: state the intent in a sibling `spec.md`, draft the post against that contract, build the journal, inspect the generated page, and return every fix to source. It is not a large process — it is a small discipline that keeps substantial writing from drifting, and the durable rationale lives in [Spec-Driven Authoring as a Lightweight Default for Posts](../foundations/spec-driven-authoring.html).\n\n**What changes**\n\n- Non-trivial work follows a fixed order: inspect the journal and related records, create or update `spec.md`, draft `index.md`, wire `config.yaml`, add modality docs if the spec calls for them, build, inspect, return fixes to source. The order is the point — the spec comes before the article whenever the intent is meaningful enough to drift.\n- \"Non-trivial\" gets a working definition: a post needs a spec when the intent is not self-evident from the title. New series, new foundation records, and major rewrites need one; typo fixes, broken image paths, and status flips do not.\n- The spec's success criteria become the review contract. Author, reviewer, and AI agent evaluate the post against shared criteria — intent landed, audience served, non-goals avoided, sources represented honestly — instead of against taste alone.\n- One spec can drive several modalities. A **Modalities** section declares which docs the post warrants beyond the article: `summary.md` (Summary tab), `dialog.md` (Conversation tab), `comics.md` (Comic tab). The article is written first; the other modalities derive from the spec plus the finished article, each via a dedicated authoring skill that treats the spec as read-only.\n- Verification after building is explicit: check the generated index, post, and spec pages, the modality tabs, copied assets, and any visible unresolved `[[...]]` cross-links. The public generated site is the post-publication reading surface to inspect.\n\n**What it costs**\n\n- Specs are extra writing. The post does not mechanically follow the spec headings — it must land the intent and success criteria — but maintaining both means reconciling them: if the post discovers a better direction, the spec gets updated, or the work has drifted.\n- Fixes are never applied to generated HTML. If the page reads poorly, you go back to `index.md`, `spec.md`, config, templates, or assets, and rebuild — slower than patching output, deliberately.\n- Scoped per-journal builds keep a dirty worktree clean during collaboration, but the full build remains the publication-level check, so both passes exist.\n\n**What we are not doing**\n\n- No detailed editorial style guide for every journal.\n- No git branching or pull-request policy.\n- No instructions for generating icons or logos.\n\nThe Article tab covers the full loop, the spec/post contrast tables, the scoped-build command, and the review checklist.\n"}]}, {"key": "dialog", "label": "Conversation", "meta": {"timetoread": "8 min listen"}, "blocks": [{"type": "markdown", "content": "## Why does writing need a workflow?\n\n**Ben:** Ana, straight question. I write a post, I publish a post. Why do I need a nine-step workflow with a contract document sitting next to every article?\n\n**Ana:** Because the failure mode of substantial writing isn't typos — it's drift. You start an article meaning one thing, the draft wanders, and three sessions later nobody can say what the piece was supposed to do. Spec-driven authoring is not a large process. It's a small discipline: state the intent in a sibling `spec.md`, draft the post from that contract, build the journal, inspect the generated page, and return fixes to source. That's the whole loop.\n\n**Ben:** \"Small discipline\" is what every process says before it grows a steering committee.\n\n**Ana:** Fair, which is why the post is deliberately operational. The durable rationale — why specs exist at all — lives in [Spec-Driven Authoring as a Lightweight Default for Posts](../foundations/spec-driven-authoring.html). This article only answers the day-to-day question: in what order do you do the work? And the previous piece, [Cross-Links, Assets, and Blocks](cross-links-assets-and-blocks.html), covered what goes *inside* a post body. This one covers the sequence around it.\n\n## The loop, in order\n\n**Ben:** Okay, give me the sequence.\n\n**Ana:** Nine steps. Inspect the journal and related records. Create or update `spec.md`. Draft or revise `index.md`. Add the post to `config.yaml` if it's new. Add modality docs if the spec calls for them. Build the affected journal. Inspect the generated post and spec pages. Return fixes to source. Then summarize what changed, the build result, and remaining gaps.\n\n**Ben:** That's a list. What makes it a discipline?\n\n**Ana:** The order. The spec comes *before* the article whenever the article's intent is meaningful enough to drift. If you draft first and spec later, the spec becomes documentation of whatever you happened to write. Written first, it's a contract the draft has to satisfy.\n\n**Ben:** And what does this contract actually say? Because I've seen \"specs\" that are longer than the thing they specify.\n\n**Ana:** A useful spec is short and concrete. It answers: what does this article need to land, who is the reader, what can a reviewer check, what's deliberately out of scope, what's still unresolved, which sources shaped the draft, and what changed while drafting. The success criteria are the important part — they let the author, the reviewer, and an AI agent evaluate the post against a shared contract instead of against taste alone.\n\n**Ben:** Doesn't that turn writing into form-filling? Post follows spec headings, spec follows template, everything reads like a compliance report.\n\n**Ana:** No — and the post is explicit about this. Satisfying the spec doesn't mean mechanically following its headings. The spec is a working contract, written for authoring and review, and it can be terse. The post is the published artifact, written for readers, and it carries the argument with its own narrative structure. The test is only: does the post land the intent and the success criteria?\n\n**Ben:** And when the draft discovers something better than the spec predicted?\n\n**Ana:** Then you update the spec. If the spec no longer describes the post, the work has drifted — that's the signal, not a crime. The contract stays honest either way.\n\n## When a typo doesn't need a contract\n\n**Ben:** Surely you're not writing a spec to fix a typo.\n\n**Ana:** No. A post needs a spec when the intent is not self-evident from the title. The article has a table for exactly this. New article series — yes, because the intent, audience, sequence, and sources need to be explicit. New foundation record — yes, it shapes durable practice. Major rewrite — yes, because the old and new intent may diverge. Small typo fix — no, the intent is already clear. Broken image path — usually no, it's mechanical. Status flip or metadata correction — usually no, the argument isn't changing.\n\n**Ben:** So most edits skip the ceremony.\n\n**Ana:** Most *small* edits do. Though this particular journal uses specs for every article, because the articles are part of a new collection and each one has a distinct role. The threshold scales with the stakes.\n\n## One spec, several modalities\n\n**Ben:** You mentioned \"modality docs\" in step five and slid right past it. What is that?\n\n**Ana:** It's the newest part of the argument: a spec can drive more than the article. The spec gets a **Modalities** section that declares which additional docs the post warrants. Four exist. `index.md` is the detailed article — required, the default tab. `summary.md` is a management summary, 300 to 500 words, keyed to the spec's success criteria and non-goals. `dialog.md` is a two-host conversation that walks the success criteria as dialogue beats — you're listening to one. And `comics.md` is an explainer comic of generated panels, one beat per panel.\n\n**Ben:** That sounds like content marketing. Why would one record need four renditions?\n\n**Ana:** Because they're not four arguments — they're one contract rendered four ways. The article is always written first; the other modalities derive from the spec plus the finished article. Each modality has a dedicated authoring skill in `.claude/skills/` — `detailed-article`, `management-summary`, `podcast-dialog`, `explainer-comics` — and every one of them treats the spec as a read-only contract.\n\n**Ben:** What stops the summary from quietly saying something the article doesn't?\n\n**Ana:** The same rule as everywhere else in the loop: if a modality reveals drift, the spec gets reconciled, not bypassed. The skills aren't allowed to edit the contract from inside a rendition. The spec stays the single source of intent, and the modalities stay derivatives of it.\n\n## Build, inspect, and what this isn't\n\n**Ben:** Fine. I've drafted against the spec. Now what — just run the build and ship?\n\n**Ana:** Run the build, then actually look at what it produced. For a full publication pass that's `_wiring/build.py` plus the docs generator. During a scoped edit there's a documented pattern to build only the affected journal through `build_journal()`, so unrelated dirty output isn't touched — useful in a collaborating worktree. But the full build remains the publication-level check.\n\n**Ben:** And \"inspect\" means what, concretely?\n\n**Ana:** The article lists it. Check the generated index page, the post page, the spec page when a spec exists, the modality tabs when summary, dialog, or comics files exist, and the copied assets. Then grep the generated output for `[[` — visible double brackets mean an unresolved cross-link made it to the page. After publication, the public generated site at zeljkoobrenovic.github.io/spec-driven-journals is the reading surface to inspect, while source changes are still reviewed in the GitHub repository.\n\n**Ben:** And when the page reads badly, I just fix the HTML, right? It's sitting right there in `docs/`.\n\n**Ana:** That's the one thing you never do. Do not patch generated HTML. Go back to `index.md`, `spec.md`, the config, the templates, or the assets — and rebuild. Generated output is disposable; source is the only thing that's real.\n\n**Ben:** What does review look like at the end, then? Someone proofreads the final page?\n\n**Ana:** Proofreading is the smallest part. A good review asks: does the post satisfy the spec intent, does it serve the stated audience, are the success criteria visibly met, did the post drift into non-goals, are sources represented honestly, does the generated page render tables, images, links, and custom blocks correctly, and does the spec changelog reflect meaningful changes? That's more useful than proofreading alone, because it reviews against the contract.\n\n**Ben:** Last objection. This is a lot of structure for blog posts. Who's it actually for?\n\n**Ana:** Future sessions. A future reader inspects the article. A future maintainer inspects the spec. A future AI agent inspects both and makes a scoped change without reconstructing intent from conversation history. That's the practical reason the spec lives next to the post — and the payoff is that every later change gets cheaper. *(laughs)* It's the rare process that exists to reduce process.\n\n**Ben:** And what is this post explicitly *not* doing? Fence it off.\n\n**Ana:** Three things, straight from the spec's non-goals. It's not a detailed editorial style guide for every journal — each journal keeps its own conventions. It's not a git branching or pull-request policy — how you review and merge is out of scope. And it's not a manual for generating icons or logos — those helpers exist, but they're not this workflow. This post is just the loop: spec, draft, build, inspect, fix at source.\n\n**Ben:** Intent first, artifact second, and never edit the output.\n\n**Ana:** That's the whole discipline. Everything else is detail.\n"}]}, {"key": "comics", "label": "Comic", "meta": {"timetoread": "3 min"}, "blocks": [{"type": "markdown", "content": "<!-- comic-style\n{\n  \"cast\": \"MAYA: a pragmatic engineer-author, short dark hair, glasses, rolled-up sleeves, calm and slightly amused, often holding a marker or a printed page. REX: an over-eager boxy robot AI assistant, one bent antenna, glowing rectangular eyes, perpetually carrying or printing too many documents.\",\n  \"style\": \"Clean two-tone explainer comic, thick ink outlines, flat colors with blue/teal accents on a light cream background, generous white space, hand-lettered speech bubbles with SHORT readable text (max 8 words per bubble), simple geometric office/library/print-shop settings mixing documents with software symbols, no photorealism, no dense text, no title text.\"\n}\n-->\n\nHow a small sibling spec keeps every post, build, and fix pointed at the same intent — in eight panels.\n\n![Comic panel: a robot unrolls a very long winding draft scroll across an office while an engineer inspects one end, puzzled.](assets/images/spec-driven-authoring-workflow/comic-01-the-drifting-draft.jpeg)\n**Panel 1:** *The failure mode of substantial writing is not typos. It is drift.*\n\n![Comic panel: an engineer and a robot study a detective-style wall of pages and tangled string, the robot holding a magnifying glass.](assets/images/spec-driven-authoring-workflow/comic-02-nobody-remembers-why.jpeg)\n**Panel 2:** *Three sessions later, nobody can say what the piece was supposed to do.*\n\n![Comic panel: an engineer sets a small page labeled SPEC next to a thicker page labeled POST while a robot watches.](assets/images/spec-driven-authoring-workflow/comic-03-the-sibling-spec.jpeg)\n**Panel 3:** *State the intent in a sibling spec, then draft the post from that contract.*\n\n![Comic panel: an engineer and a robot walk a circular floor path with four icon stations, the robot pushing a document cart.](assets/images/spec-driven-authoring-workflow/comic-04-the-loop.jpeg)\n**Panel 4:** *Spec, draft, build, inspect, fix at source — the order is the discipline.*\n\n![Comic panel: a small letter hops through a tiny gate labeled TYPO while a robot with a clipboard guards a tall door labeled NEW SERIES.](assets/images/spec-driven-authoring-workflow/comic-05-typos-skip-the-line.jpeg)\n**Panel 5:** *A post needs a spec when the intent is not self-evident from the title.*\n\n![Comic panel: a robot runs a printing press fed by one SPEC page, producing an article, a summary card, a script, and a comic strip.](assets/images/spec-driven-authoring-workflow/comic-06-one-spec-four-tabs.jpeg)\n**Panel 6:** *The spec's Modalities section declares which docs the post warrants beyond the article.*\n\n![Comic panel: an engineer blocks a robot's wrench from touching a rendered web page and points back at source documents on a desk.](assets/images/spec-driven-authoring-workflow/comic-07-never-patch-the-output.jpeg)\n**Panel 7:** *If the page reads poorly, go back to the source and rebuild.*\n\n![Comic panel: a robot with a clock symbol easily retrieves a paired post and spec from a tidy library shelf while an engineer smiles.](assets/images/spec-driven-authoring-workflow/comic-08-cheap-future-sessions.jpeg)\n**Panel 8:** *Future sessions get cheaper: inspect the article, the spec, or both — no archaeology required.*\n"}]}]}</script>
<script>
    (function () {
        const data = JSON.parse(document.getElementById('data').textContent);
        const root = document.getElementById('content');

        const postId = (data.meta && data.meta.id) ? String(data.meta.id) : '';
        const postStatusRaw = (data.meta && data.meta.status) ? String(data.meta.status) : '';
        if (postId || postStatusRaw) {
            const header = document.getElementById('post-header');
            let sectionEl = header.querySelector('p.section');
            if (!sectionEl) {
                sectionEl = document.createElement('p');
                sectionEl.className = 'section';
                header.insertBefore(sectionEl, header.firstChild);
            }
            // Status pill goes first, then a " / " separator before the existing
            // content (section name and/or id).
            if (postStatusRaw) {
                const parts = postStatusRaw.split(':');
                const statusName = parts[0].trim();
                const statusColor = (parts[1] || '').trim();
                const wrap = document.createElement('span');
                wrap.className = 'post-status';
                const dot = document.createElement('span');
                dot.className = 'status-dot';
                if (statusColor) dot.style.background = statusColor;
                wrap.appendChild(dot);
                wrap.appendChild(document.createTextNode(statusName));
                if (sectionEl.firstChild) {
                    sectionEl.insertBefore(document.createTextNode(' • '), sectionEl.firstChild);
                    sectionEl.insertBefore(wrap, sectionEl.firstChild);
                } else {
                    sectionEl.appendChild(wrap);
                }
            }
            if (postId) {
                if (sectionEl.firstChild) sectionEl.appendChild(document.createTextNode(' • '));
                sectionEl.appendChild(document.createTextNode(postId));
            }
        }

        const tagsHost = document.getElementById('tags');
        (data.tags || []).forEach(function (t) {
            const span = document.createElement('span');
            span.className = 'tag';
            span.textContent = t;
            tagsHost.appendChild(span);
        });

        // Minimal markdown renderer. Supports: ATX headings, paragraphs, blockquotes,
        // unordered/ordered lists, fenced code, inline code, bold/italic/strikethrough, links, images, hr.
        // Sufficient for the posts in this repo; replace with a fuller parser if needed.
        function renderMarkdown(src) {
            const lines = src.replace(/\r\n/g, '\n').split('\n');
            const out = [];
            let i = 0;

            const bullet = /^(\s*)([-*])\s+(.*)$/;
            const ordered = /^(\s*)(\d+)\.\s+(.*)$/;
            const tableRow = /^\s*\|(.+)\|\s*$/;
            const tableSep = /^\s*\|?\s*:?-{3,}:?\s*(\|\s*:?-{3,}:?\s*)+\|?\s*$/;

            function splitRow(s) {
                let t = s.trim();
                if (t.startsWith('|')) t = t.slice(1);
                if (t.endsWith('|')) t = t.slice(0, -1);
                return t.split('|').map(c => c.trim());
            }

            function inline(s) {
                // Posts are trusted content, so raw HTML passes through unescaped
                // (some posts embed inline <blockquote>, <div>, etc.).
                // Stray ampersands still get fixed up.
                s = s.replace(/&(?![a-zA-Z]+;|#\d+;)/g, '&amp;');
                s = s.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<a class="image-link" href="$2" target="_blank" rel="noopener noreferrer"><img alt="$1" src="$2"></a>');
                s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
                s = s.replace(/`([^`]+)`/g, function (_, c) {
                    return '<code>' + c.replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</code>';
                });
                s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
                s = s.replace(/~~([^~\n]+)~~/g, '<del>$1</del>');
                s = s.replace(/(^|[^*])\*([^*\n]+)\*/g, '$1<em>$2</em>');
                return s;
            }

            while (i < lines.length) {
                const line = lines[i];
                if (!line.trim()) {
                    i++;
                    continue;
                }

                const fence = line.match(/^```(\w*)\s*$/);
                if (fence) {
                    i++;
                    const buf = [];
                    while (i < lines.length && !/^```\s*$/.test(lines[i])) {
                        buf.push(lines[i]);
                        i++;
                    }
                    i++;
                    const escaped = buf.join('\n').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                    const cls = fence[1] ? ' class="lang-' + fence[1] + '"' : '';
                    out.push('<pre><code' + cls + '>' + escaped + '</code></pre>');
                    continue;
                }

                const h = line.match(/^(#{1,6})\s+(.*)$/);
                if (h) {
                    out.push('<h' + h[1].length + '>' + inline(h[2]) + '</h' + h[1].length + '>');
                    i++;
                    continue;
                }

                if (/^\s*(?:-\s*){3,}\s*$/.test(line) || /^\s*\*{3,}\s*$/.test(line)) {
                    out.push('<hr>');
                    i++;
                    continue;
                }

                if (/^>\s?/.test(line)) {
                    const buf = [];
                    while (i < lines.length && /^>\s?/.test(lines[i])) {
                        buf.push(lines[i].replace(/^>\s?/, ''));
                        i++;
                    }
                    out.push('<blockquote>' + renderMarkdown(buf.join('\n')) + '</blockquote>');
                    continue;
                }

                if (tableRow.test(line) && i + 1 < lines.length && tableSep.test(lines[i + 1])) {
                    const headers = splitRow(line);
                    i += 2;
                    const rows = [];
                    while (i < lines.length && tableRow.test(lines[i])) {
                        rows.push(splitRow(lines[i]));
                        i++;
                    }
                    let html = '<table><thead><tr>';
                    headers.forEach(h => {
                        html += '<th>' + inline(h) + '</th>';
                    });
                    html += '</tr></thead><tbody>';
                    rows.forEach(r => {
                        html += '<tr>';
                        r.forEach(c => {
                            html += '<td>' + inline(c) + '</td>';
                        });
                        html += '</tr>';
                    });
                    html += '</tbody></table>';
                    out.push(html);
                    continue;
                }

                if (bullet.test(line) || ordered.test(line)) {
                    // Indent of the first bullet defines this list's base level.
                    // Deeper-indented bullets become nested lists (rendered by
                    // recursing into renderMarkdown). Same-or-less indent at a
                    // bullet starts a sibling item (or ends the list).
                    const firstMatch = line.match(bullet) || line.match(ordered);
                    const baseIndent = firstMatch[1].length;
                    const isOrdered = ordered.test(line);
                    const items = [];
                    while (i < lines.length) {
                        const cur = lines[i];
                        if (!cur.trim()) {
                            // blank line breaks the list (matches CommonMark-ish behaviour)
                            i++;
                            break;
                        }
                        const mBul = cur.match(bullet);
                        const mOrd = cur.match(ordered);
                        const m = mBul || mOrd;
                        if (!m) break;
                        if (m[1].length < baseIndent) break;
                        if (m[1].length > baseIndent) break; // shouldn't happen at top of loop
                        // Same-type check: switching between -/* and 1. closes the list
                        if (isOrdered !== !!mOrd) break;

                        const itemBuf = [m[3]];
                        const nestedBuf = [];
                        i++;
                        while (i < lines.length) {
                            const nxt = lines[i];
                            if (!nxt.trim()) break;
                            const nBul = nxt.match(bullet);
                            const nOrd = nxt.match(ordered);
                            const nm = nBul || nOrd;
                            if (nm) {
                                if (nm[1].length > baseIndent) {
                                    // nested list line — dedent and stash
                                    nestedBuf.push(nxt.slice(baseIndent + 2));
                                    i++;
                                    continue;
                                }
                                // sibling or end of list
                                break;
                            }
                            // Plain continuation text
                            if (nestedBuf.length) {
                                // continuation inside the nested block
                                nestedBuf.push(nxt.slice(baseIndent + 2));
                            } else {
                                itemBuf.push(nxt.trim());
                            }
                            i++;
                        }

                        let liHtml = inline(itemBuf.join('\n'));
                        if (nestedBuf.length) {
                            liHtml += renderMarkdown(nestedBuf.join('\n'));
                        }
                        items.push('<li>' + liHtml + '</li>');
                    }
                    out.push((isOrdered ? '<ol>' : '<ul>') + items.join('') + (isOrdered ? '</ol>' : '</ul>'));
                    continue;
                }

                const buf = [line];
                i++;
                while (i < lines.length && lines[i].trim() && !/^#{1,6}\s/.test(lines[i]) && !/^>\s?/.test(lines[i]) && !bullet.test(lines[i]) && !ordered.test(lines[i]) && !/^```/.test(lines[i]) && !tableRow.test(lines[i])) {
                    buf.push(lines[i]);
                    i++;
                }
                out.push('<p>' + inline(buf.join(' ')) + '</p>');
            }
            return out.join('\n');
        }

        // Block dispatcher. New block types plug in here.
        const renderers = {
            markdown: function (block) {
                const div = document.createElement('div');
                div.innerHTML = renderMarkdown(block.content);
                return div;
            },
            mermaid: function (block) {
                // Mermaid scans elements with class "mermaid" whose textContent
                // is the diagram source. We collect these nodes and run
                // mermaid.run() once after all blocks are in the DOM.
                const div = document.createElement('div');
                div.className = 'mermaid';
                div.textContent = block.content;
                return div;
            },
            'force-graph': function (block) {
                // build.py emits parsed JSON: {nodes:[{id,size}], links:[{source,target}]}.
                // We instantiate force-graph after the container is in the DOM
                // so it can measure its own width.
                const div = document.createElement('div');
                div.className = 'force-graph';
                const data = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.ForceGraph) return;
                    const maxSize = data.nodes.reduce((m, n) => Math.max(m, n.size || 1), 1);
                    window.ForceGraph()(div)
                        .graphData(data)
                        .width(div.clientWidth)
                        .height(div.clientHeight)
                        .nodeRelSize(4)
                        .nodeVal(n => Math.max(20 * (n.size || 1) / maxSize, 0.001))
                        .nodeLabel(n => n.id + ' (' + (n.size || 1) + ')')
                        .nodeColor(() => 'rgba(135, 206, 235, 0.7)')
                        .linkColor(() => 'rgba(60, 60, 60, 0.4)')
                        .linkDirectionalArrowLength(4)
                        .linkDirectionalArrowRelPos(1)
                        .linkWidth(1);
                });
                return div;
            },
            'bubble-chart': function (block) {
                // build.py emits {nodes:[{name,size}]}. Renders a D3 circle-pack
                // SVG (same shape as the obren.io reference, just inline).
                const wrap = document.createElement('div');
                wrap.className = 'bubble-chart';
                const payload = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.d3) return;
                    const diameter = 480;
                    const fill = '#c0deed';
                    const textColor = '#111111';
                    const fontSize = 12;

                    const svg = window.d3.select(wrap).append('svg')
                        .attr('viewBox', '0 0 ' + diameter + ' ' + diameter)
                        .attr('width', diameter)
                        .attr('height', diameter);

                    const root = window.d3.hierarchy({children: payload.nodes})
                        .sum(d => d.size || 0)
                        .sort((a, b) => b.value - a.value);

                    window.d3.pack().size([diameter, diameter]).padding(2)(root);

                    const node = svg.selectAll('g')
                        .data(root.leaves())
                        .enter().append('g')
                        .attr('transform', d => 'translate(' + d.x + ',' + d.y + ')');

                    node.append('title').text(d => d.data.name + ': ' + d.value);
                    node.append('circle').attr('r', d => d.r).style('fill', fill);
                    node.append('text')
                        .attr('dy', '.3em')
                        .style('text-anchor', 'middle')
                        .style('fill', textColor)
                        .style('font-size', fontSize + 'px')
                        .text(d => d.data.name.substring(0, Math.max(0, Math.floor(d.r / 3))));
                });
                return wrap;
            }
        };

        // Render one modality's blocks into a host element. Mermaid runs
        // scoped to just the nodes created here, so lazily rendered tabs get
        // their diagrams on first activation.
        let mermaidInitialized = false;
        function renderBlocksInto(blocks, host) {
            const mermaidNodes = [];
            blocks.forEach(function (block) {
                const r = renderers[block.type];
                if (!r) {
                    const pre = document.createElement('pre');
                    pre.textContent = '[unknown block type: ' + block.type + ']';
                    host.appendChild(pre);
                    return;
                }
                const node = r(block);
                if (node instanceof Node) {
                    host.appendChild(node);
                    if (block.type === 'mermaid') mermaidNodes.push(node);
                }
            });
            if (mermaidNodes.length && window.mermaid) {
                if (!mermaidInitialized) {
                    window.mermaid.initialize({startOnLoad: false, theme: 'default'});
                    mermaidInitialized = true;
                }
                window.mermaid.run({nodes: mermaidNodes});
            }
        }

        // Modality tabs. One <article class="pane"> per modality; panes are
        // rendered lazily on first activation (force-graph / D3 / mermaid
        // need a visible, measurable container). With a single modality the
        // tab bar stays hidden and the page looks exactly like before.
        const mods = data.modalities;
        const tabBar = document.getElementById('modality-tabs');
        const panes = {};
        const tabButtons = {};
        const renderedPanes = {};

        mods.forEach(function (m) {
            const pane = document.createElement('article');
            pane.className = 'pane';
            pane.dataset.key = m.key;
            pane.hidden = true;
            root.appendChild(pane);
            panes[m.key] = pane;
        });

        const defaultKey = mods.some(m => m.key === 'index') ? 'index' : mods[0].key;

        function activate(key, updateHash) {
            mods.forEach(function (m) {
                const isActive = m.key === key;
                panes[m.key].hidden = !isActive;
                if (tabButtons[m.key]) {
                    tabButtons[m.key].classList.toggle('active', isActive);
                    tabButtons[m.key].setAttribute('aria-selected', isActive ? 'true' : 'false');
                }
            });
            // Unhide first, then render: the chart libraries measure widths.
            if (!renderedPanes[key]) {
                renderBlocksInto(mods.find(m => m.key === key).blocks, panes[key]);
                renderedPanes[key] = true;
            }
            if (updateHash) {
                history.replaceState(null, '',
                    key === defaultKey ? location.pathname + location.search : '#' + key);
            }
        }

        if (mods.length > 1) {
            mods.forEach(function (m) {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.textContent = m.label;
                btn.setAttribute('role', 'tab');
                btn.addEventListener('click', function () { activate(m.key, true); });
                tabBar.appendChild(btn);
                tabButtons[m.key] = btn;
            });
            tabBar.hidden = false;
        }

        // The hash selects a tab only when it matches a modality key, so
        // existing anchors keep working.
        const initialHash = location.hash.slice(1);
        activate(mods.some(m => m.key === initialHash) ? initialHash : defaultKey, false);
        window.addEventListener('hashchange', function () {
            const k = location.hash.slice(1);
            if (mods.some(m => m.key === k)) activate(k, false);
        });
    })();
</script>
