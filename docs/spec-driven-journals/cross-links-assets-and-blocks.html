<script id="data" type="application/json">{"meta": {"title": "Cross-Links, Assets, and Blocks", "date": "2026-05-22", "author": "by Željko Obrenović (obren.io)", "permalink": "cross-links-assets-and-blocks", "timetoread": "8 min", "excerpt": "Spec-driven journals stay navigable through stable cross-links, simple asset paths, generated clickable images, and a small set of custom block types for diagrams and visualizations.", "tags": "cross-links, assets, markdown, rendering", "icon": "assets/icons/cross-links-assets-and-blocks.png", "logo": "assets/images/cross-links-assets-and-blocks/logo.jpeg", "logo_credit": "Image generated by Google Gemini (gemini-3-pro-image-preview)"}, "tags": ["cross-links", "assets", "markdown", "rendering"], "modalities": [{"key": "index", "label": "Article", "meta": {}, "blocks": [{"type": "markdown", "content": "> Spec-driven journals stay navigable through stable cross-links, simple asset paths, generated clickable images, and a small set of custom block types for diagrams and visualizations.\n\nSpec-Driven Journals uses a small content model, but it is not limited to plain paragraphs.\n\nPosts can link to other records by permalink, include images and media, render tables, and use custom block fences for diagrams and visualizations. The goal is to keep authoring simple while making generated pages useful.\n\nEverything in this article applies to every modality file in a post folder, not only `index.md`. A `summary.md`, `dialog.md`, or `comics.md` goes through the same pipeline: the same cross-link resolution, the same asset-path rewriting, and the same block fences.\n\nRead this after [Anatomy of a Journal](anatomy-of-a-journal.html). Once the folder structure is clear, this article explains what can go inside the post body and how the build and renderer treat it.\n\n## Content Features At A Glance\n\n| Feature | Author writes | Generated result |\n| --- | --- | --- |\n| Cross-record links | Double-bracket permalink references. | Stable same-journal or cross-journal links using the target title. |\n| Asset paths | `assets/...` paths in markdown or HTML attributes. | Paths rewritten and per-post assets copied into generated journal assets. |\n| Markdown images | Standard markdown image syntax. | A rendered image wrapped in a link to the same file. |\n| Custom blocks | Recognized fenced blocks such as Mermaid or force graphs. | Typed JSON blocks rendered by browser-side JavaScript. |\n\n![Links, assets, and custom blocks rendering map](assets/images/links-assets-blocks-rendering-map.png)\n*Illustration placeholder: `links-assets-blocks-rendering-map.png` should show cross-links, asset paths, markdown images, and custom block fences becoming rendered links, clickable images, diagrams, and visualizations.*\n\n## Cross-Record Links\n\nUse double brackets for record links: two opening square brackets, the target permalink, and two closing square brackets.\n\nFor example, a source reference to the `spec-driven-authoring` permalink becomes a link to the corresponding foundation record after the build.\n\nThe build resolves that to a normal markdown link using the target post's `title:` and `permalink:`.\n\nIf the target is in the same journal, the output link points to:\n\n```text\ntarget.html\n```\n\nIf the target is in another journal, the output link points to:\n\n```text\n../other-journal/target.html\n```\n\nIf the target cannot be resolved, the literal double-bracket token stays visible. That is useful because unresolved links become authoring TODOs instead of silently disappearing.\n\n## Why Links Use Permalinks\n\nCross-links use `permalink`, not file path or title.\n\nThat gives posts stable identities:\n\n| Source reference | Why it works |\n| --- | --- |\n| the `markdown-records` permalink | The permalink is stable even if the title changes. |\n| the `spec-driven-authoring` permalink | The build can resolve across journals. |\n| a missing permalink | The unresolved token stays visible for follow-up. |\n\nThe build uses the target title as link text. Rewording a title updates link text on the next build without changing source links.\n\n## Asset Paths\n\nPost bodies should use paths relative to the journal root:\n\n```markdown\n![Diagram](assets/images/diagram.png)\n```\n\nFor per-post assets, put the source file next to the post:\n\n```text\n_journals/<journal>/posts/<slug>/assets/images/diagram.png\n```\n\nDuring build, per-post assets are merged into:\n\n```text\ndocs/<journal>/assets/\n```\n\nThe same `assets/images/...` reference then works from the generated post page.\n\n## Clickable Images\n\nMarkdown images render as images wrapped in links to the same file:\n\n```html\n<a class=\"image-link\" href=\"assets/images/diagram.png\" target=\"_blank\">\n  <img src=\"assets/images/diagram.png\" alt=\"Diagram\">\n<\/a>\n```\n\nThat means readers can click an image and open it in a new tab.\n\nHero images defined through `logo:` are also wrapped in links. This is useful for diagrams, screenshots, and generated illustrations where the scaled page version may hide detail.\n\n## Supported Markdown\n\nThe renderer supports the subset used by the journals:\n\n- headings\n- paragraphs\n- blockquotes\n- fenced code\n- inline code\n- bold and italic text\n- strikethrough\n- links and images\n- ordered and unordered lists\n- horizontal rules\n- GitHub-flavored tables\n\nThe renderer is intentionally small. If Spec-Driven Journals needs richer markdown, update `_templates/post.html` deliberately rather than adding ad hoc generated HTML.\n\n## Custom Block Types\n\nThe build recognizes custom fences and lifts them out of markdown into typed blocks.\n\n| Block type | Opening fence | Role |\n| --- | --- | --- |\n| `mermaid` | `---begin mermaid---` | Mermaid diagrams rendered by Mermaid.js. |\n| `force-graph` | `---begin force-graph---` | Network graphs rendered by the force-graph library. |\n| `bubble-chart` | `---begin bubble-chart---` | Circle-packing charts rendered by D3. |\n| `wardley-map` | `---begin wardley-map---` | Wardley maps passed through to the upstream web component. |\n\nEach block is emitted as:\n\n```json\n{\"type\": \"mermaid\", \"content\": \"...\"}\n```\n\nThe template renderer dispatches on `type`.\n\n## Adding A New Block Type\n\nTo add a new block type:\n\n1. Add a fence definition to `_BLOCK_FENCES` in `_wiring/build.py`.\n2. Add a build-side parser if raw content needs transformation.\n3. Add a renderer entry in `_templates/post.html`.\n4. Rebuild affected journals.\n5. Add an example post or documentation if the block changes author behavior.\n\nDo not change the `{type, content}` envelope unless you are intentionally changing the renderer contract.\n\n## Good Authoring Habits\n\nUse cross-links when referring to durable records. Use ordinary links for external pages and one-off references. Keep image paths under `assets/...`. Give images meaningful alt text. Keep custom blocks small enough that a reader can still understand the surrounding article.\n\nRich content should support the argument. It should not become a second undocumented language inside the post.\n\nAfter these content mechanics are clear, [Spec-Driven Authoring Workflow](spec-driven-authoring-workflow.html) explains how to move a substantive article from spec to generated review.\n"}]}, {"key": "summary", "label": "Summary", "meta": {"timetoread": "2 min"}, "blocks": [{"type": "markdown", "content": "Spec-driven journals stay navigable through four content mechanisms layered on plain markdown: stable cross-record links, simple asset-path conventions, generated clickable images, and a small set of custom block fences for diagrams and visualizations. Authors write simple source; the build and the browser-side renderer do the rest — and the same mechanics apply to every modality file in a post folder, not only `index.md`.\n\n**What changes**\n\n- Posts link to other records with double-bracket permalink references. The build resolves each one to a normal link using the target's `title:` — same-journal targets become `target.html`, cross-journal targets become `../other-journal/target.html`, and unresolved references stay visible as literal tokens, turning broken links into authoring TODOs instead of silent failures.\n- Links key off `permalink`, not file path or title. Permalinks never change after publication, so titles can be reworded freely and every page that links to a record picks up the new wording on the next build.\n- Asset paths in post bodies stay relative to the journal root (`assets/images/...`). Per-post assets live next to the post source and are merged into the generated journal assets at build time, so the same reference resolves on the rendered page.\n- Markdown images render wrapped in links to their own files, so readers can open any diagram, screenshot, or generated illustration full-size in a new tab. Hero images defined through `logo:` get the same treatment.\n- Four custom block fences — `mermaid`, `force-graph`, `bubble-chart`, `wardley-map` — are lifted out of markdown into typed `{type, content}` blocks and rendered client-side. Extending the set means touching exactly three places: `_BLOCK_FENCES` in `_wiring/build.py`, an optional build-side parser, and a renderer entry in `_templates/post.html`.\n\n**What it costs**\n\n- The markdown renderer is deliberately small — the subset the journals actually use. Richer markdown means a deliberate update to `_templates/post.html`, not ad hoc generated HTML.\n- The `{type, content}` envelope is a renderer contract. Changing it changes the seam between build and template, so it must be an intentional decision, not a side effect.\n- Custom blocks demand restraint: they should support the argument, not become a second undocumented language inside the post.\n\n**What we are not doing**\n\n- Not a full Markdown syntax reference.\n- Not a D3, Mermaid, force-graph, or Wardley-map tutorial.\n- Not an accessibility policy for all media — though meaningful alt text remains a stated authoring habit.\n\nThe Article tab covers the full syntax, the rendering map, and the step-by-step recipe for adding a new block type. Read [Anatomy of a Journal](anatomy-of-a-journal.html) first; [Spec-Driven Authoring Workflow](spec-driven-authoring-workflow.html) comes next.\n"}]}, {"key": "dialog", "label": "Conversation", "meta": {"timetoread": "8 min listen"}, "blocks": [{"type": "markdown", "content": "## Why not just plain markdown?\n\n**Ben:** Ana, this one feels like documentation about documentation. Links, image paths, fenced blocks — why should a busy author care about any of this instead of just writing markdown and moving on?\n\n**Ana:** Because \"just writing markdown\" quietly breaks in three places: links rot when titles change, image paths break when pages move, and the moment you want a diagram you start pasting in undocumented HTML. The post describes a small content model that closes all three holes — stable cross-links, simple asset paths, generated clickable images, and a short list of custom block types. The point is exactly that an author shouldn't have to care much: write simple source, and the build and renderer do the rest.\n\n**Ben:** \"Small content model\" sounds like a euphemism for \"you can't do much.\"\n\n**Ana:** It's a deliberate trade. Posts can link to other records by permalink, include images and media, render tables, and use custom fences for diagrams and visualizations. That covers what these journals actually publish. The goal stated up front is to keep authoring simple while making the generated pages useful — not to reimplement a CMS. And one more thing worth knowing before we go further: all of this applies to every modality file in a post folder, not only the article. A summary, a dialog like this one, a comic script — same pipeline, same cross-link resolution, same asset rewriting, same block fences.\n\n## Links that survive a rename\n\n**Ben:** Start with links, then. Every wiki ever has had double-bracket links. What's the actual mechanism here?\n\n**Ana:** You write two opening square brackets, the target's permalink, two closing brackets. At build time that resolves to a normal markdown link. Same journal: the link points at `target.html`. Different journal: `../other-journal/target.html`. And the link *text* is the target post's `title:` from its front matter — you never type it.\n\n**Ben:** Why key off the permalink? Titles are what humans remember, and file paths are what the build actually knows.\n\n**Ana:** Because permalinks are the one thing that never changes. The post is explicit: cross-links use `permalink`, not file path or title, and that gives posts stable identities. Titles get reworded all the time — and since the build uses the target title as link text, rewording a title updates the link text everywhere on the next build without anyone touching a source file. File paths are an implementation detail; permalinks are the contract.\n\n**Ben:** And when I link to a record that doesn't exist? Half the time I'm referencing something I haven't written yet.\n\n**Ana:** That's the part I like most. If the target can't be resolved, the literal double-bracket token stays visible in the rendered page. The post calls that out as a feature: unresolved links become authoring TODOs instead of silently disappearing. You can link to a record you intend to write, ship the post, and the dangling reference sits there in plain sight until you write it.\n\n**Ben:** So when do I *not* use the double brackets?\n\n**Ana:** The post's authoring habit is clean: cross-links for durable records, ordinary links for external pages and one-off references. If it has a permalink in these journals, bracket it; if it's a URL out in the world, link it normally.\n\n## Images that don't break and don't hide detail\n\n**Ben:** Next hole: asset paths. What's the convention?\n\n**Ana:** One rule — paths in post bodies stay relative to the journal root: `assets/images/diagram.png`. For per-post assets, you put the source file right next to the post, under the post's own `assets/images/` folder. During the build, per-post assets are merged into the journal's generated `assets/` directory, so the exact same reference works from the generated page.\n\n**Ben:** Hold on. The file lives next to the post source, but the path I write pretends it lives at the journal root? That sounds like a path that's wrong until the build makes it right.\n\n**Ana:** That's precisely the design. The author gets locality — the image sits next to the post it belongs to, moves with it, gets reviewed with it. The reader gets one flat, predictable asset space. The build does the merging so neither side has to think about the other. You write one path convention, always, and it resolves.\n\n**Ben:** Fine. What's this about clickable images?\n\n**Ana:** Every markdown image renders as an image wrapped in a link to the same file — an anchor around the `img`, opening in a new tab. Hero images defined through `logo:` get the same wrapping. The post gives the reason: diagrams, screenshots, and generated illustrations often have detail the scaled page version hides. Click, and you get the full-size original. The author writes standard markdown image syntax; the link comes for free.\n\n**Ben:** That's a renderer decision the author never sees. Which makes me ask: how much markdown does this renderer actually support?\n\n**Ana:** A deliberate subset: headings, paragraphs, blockquotes, fenced and inline code, bold, italic, strikethrough, links, images, ordered and unordered lists, horizontal rules, and GitHub-flavored tables. The post is blunt that the renderer is intentionally small — and that if the journals ever need richer markdown, the move is to update `_templates/post.html` deliberately, not to start sneaking generated HTML into post bodies.\n\n## Diagrams without a second language\n\n**Ben:** Now the part I'm most skeptical about: custom block fences. Every project that invents its own fence syntax ends up with a private dialect nobody else can read. Why is this different?\n\n**Ana:** Because the list is short and closed by default. Four block types: `mermaid` for Mermaid.js diagrams, `force-graph` for network graphs, `bubble-chart` for D3 circle-packing, and `wardley-map`, which passes through to the upstream web component. Each fence opens with a marker like `---begin mermaid---`, and the build lifts the content out of the markdown into a typed block — literally `{\"type\": \"mermaid\", \"content\": \"...\"}` — and the template renderer dispatches on the type.\n\n**Ben:** And when someone wants block type five?\n\n**Ana:** There's an explicit five-step recipe in the article. Add a fence definition to `_BLOCK_FENCES` in `_wiring/build.py`. Add a build-side parser if the raw content needs transformation. Add a renderer entry in `_templates/post.html`. Rebuild the affected journals. And add an example post or documentation if the block changes how authors write. So extension is allowed, but it's a deliberate, documented act — not an inline hack.\n\n**Ben:** What's the thing you must *not* touch?\n\n**Ana:** The envelope. The post says it directly: do not change the `{type, content}` shape unless you are intentionally changing the renderer contract. That envelope is the seam between the Python build and the browser-side renderer. Everything else can grow; that seam stays fixed.\n\n**Ben:** Even granting all that — fences invite abuse. A post that's half custom blocks is a slide deck pretending to be an article.\n\n**Ana:** The post agrees with you, almost word for word. The authoring habits section says to keep custom blocks small enough that a reader can still understand the surrounding article, and that rich content should support the argument — it should not become a second undocumented language inside the post. The blocks earn their place per use, not by existing.\n\n## What this post is not\n\n**Ben:** Close it out. If I've absorbed the four mechanisms, what should I *not* expect from this record?\n\n**Ana:** Three explicit non-goals. It's not a full Markdown syntax reference — the supported subset is listed, and that's the extent of it. It's not a tutorial on D3, Mermaid, force-graph, or Wardley maps — the blocks hand off to those libraries, and learning them is on you. And it's not an accessibility policy for all media — though giving images meaningful alt text is still named as a basic authoring habit.\n\n**Ben:** And where does it sit in the reading order?\n\n**Ana:** After [Anatomy of a Journal](anatomy-of-a-journal.html), which covers the folder structure — this post is about what goes *inside* the post body once that structure is clear. And before [Spec-Driven Authoring Workflow](spec-driven-authoring-workflow.html), which picks up the next question: how a substantive article moves from spec to generated review.\n\n**Ben:** So the one-line takeaway: write boring source, get durable pages.\n\n**Ana:** *(laughs)* Pretty much. Stable links that survive renames, one asset path that always resolves, images that open full-size, and four diagram types behind one fixed contract. The author's job is the argument; the pipeline's job is everything else.\n"}]}, {"key": "comics", "label": "Comic", "meta": {"timetoread": "3 min"}, "blocks": [{"type": "markdown", "content": "<!-- comic-style\n{\n  \"cast\": \"MAYA: a pragmatic engineer-author, short dark hair, glasses, rolled-up sleeves, calm and slightly amused, often holding a marker or a printed page. REX: an over-eager boxy robot AI assistant, one bent antenna, glowing rectangular eyes, perpetually carrying or printing too many documents.\",\n  \"style\": \"Clean two-tone explainer comic, thick ink outlines, flat colors with blue/teal accents on a light cream background, generous white space, hand-lettered speech bubbles with SHORT readable text (max 8 words per bubble), simple geometric office/library/print-shop settings mixing documents with software symbols, no photorealism, no dense text, no title text.\"\n}\n-->\n\nHow posts stay navigable while staying plain markdown — in eight panels.\n\n![Comic panel: an engineer looks at a library of documents with snapped string connections while a robot holds a page with a missing picture.](assets/images/cross-links-assets-and-blocks/comic-01-the-broken-library.jpeg)\n**Panel 1:** *Left alone, links rot and image paths break.*\n\n![Comic panel: a robot glues messy code scraps onto a clean page while an engineer objects.](assets/images/cross-links-assets-and-blocks/comic-02-the-paste-everything-robot.jpeg)\n**Panel 2:** *The tempting fix: undocumented markup pasted into posts.*\n\n![Comic panel: an engineer shows a robot a small toolbox with four compartments for links, assets, images, and diagrams.](assets/images/cross-links-assets-and-blocks/comic-03-small-content-model.jpeg)\n**Panel 3:** *The idea: a deliberately small content model on top of markdown.*\n\n![Comic panel: a chain connects two documents while a robot swaps one document's title placard without breaking the chain.](assets/images/cross-links-assets-and-blocks/comic-04-permalink-anchors.jpeg)\n**Panel 4:** *Double-bracket links resolve by permalink; titles can change freely.*\n\n![Comic panel: a robot points at a visible unresolved link token on a page while an engineer flags it.](assets/images/cross-links-assets-and-blocks/comic-05-visible-todo.jpeg)\n**Panel 5:** *Broken links stay visible — a TODO, not a silent failure.*\n\n![Comic panel: a robot moves framed pictures from small folders onto one shared shelf while an engineer compares matching path tags.](assets/images/cross-links-assets-and-blocks/comic-06-asset-merge.jpeg)\n**Panel 6:** *Per-post assets merge at build time; the written path never changes.*\n\n![Comic panel: a cursor clicks a small diagram and a large detailed version opens in a new window while a robot applauds.](assets/images/cross-links-assets-and-blocks/comic-07-click-to-enlarge.jpeg)\n**Panel 7:** *Images render as links to themselves — click for full detail.*\n\n![Comic panel: an engineer fits four diagram tiles into matching sockets in a text wall while blocking a robot's oversized fifth tile.](assets/images/cross-links-assets-and-blocks/comic-08-blocks-with-restraint.jpeg)\n**Panel 8:** *Four block types, one fixed contract — rich content supports the argument, never replaces it.*\n"}]}]}</script>
<script>
    (function () {
        const data = JSON.parse(document.getElementById('data').textContent);
        const root = document.getElementById('content');

        const postId = (data.meta && data.meta.id) ? String(data.meta.id) : '';
        const postStatusRaw = (data.meta && data.meta.status) ? String(data.meta.status) : '';
        if (postId || postStatusRaw) {
            const header = document.getElementById('post-header');
            let sectionEl = header.querySelector('p.section');
            if (!sectionEl) {
                sectionEl = document.createElement('p');
                sectionEl.className = 'section';
                header.insertBefore(sectionEl, header.firstChild);
            }
            // Status pill goes first, then a " / " separator before the existing
            // content (section name and/or id).
            if (postStatusRaw) {
                const parts = postStatusRaw.split(':');
                const statusName = parts[0].trim();
                const statusColor = (parts[1] || '').trim();
                const wrap = document.createElement('span');
                wrap.className = 'post-status';
                const dot = document.createElement('span');
                dot.className = 'status-dot';
                if (statusColor) dot.style.background = statusColor;
                wrap.appendChild(dot);
                wrap.appendChild(document.createTextNode(statusName));
                if (sectionEl.firstChild) {
                    sectionEl.insertBefore(document.createTextNode(' • '), sectionEl.firstChild);
                    sectionEl.insertBefore(wrap, sectionEl.firstChild);
                } else {
                    sectionEl.appendChild(wrap);
                }
            }
            if (postId) {
                if (sectionEl.firstChild) sectionEl.appendChild(document.createTextNode(' • '));
                sectionEl.appendChild(document.createTextNode(postId));
            }
        }

        const tagsHost = document.getElementById('tags');
        (data.tags || []).forEach(function (t) {
            const span = document.createElement('span');
            span.className = 'tag';
            span.textContent = t;
            tagsHost.appendChild(span);
        });

        // Minimal markdown renderer. Supports: ATX headings, paragraphs, blockquotes,
        // unordered/ordered lists, fenced code, inline code, bold/italic/strikethrough, links, images, hr.
        // Sufficient for the posts in this repo; replace with a fuller parser if needed.
        function renderMarkdown(src) {
            const lines = src.replace(/\r\n/g, '\n').split('\n');
            const out = [];
            let i = 0;

            const bullet = /^(\s*)([-*])\s+(.*)$/;
            const ordered = /^(\s*)(\d+)\.\s+(.*)$/;
            const tableRow = /^\s*\|(.+)\|\s*$/;
            const tableSep = /^\s*\|?\s*:?-{3,}:?\s*(\|\s*:?-{3,}:?\s*)+\|?\s*$/;

            function splitRow(s) {
                let t = s.trim();
                if (t.startsWith('|')) t = t.slice(1);
                if (t.endsWith('|')) t = t.slice(0, -1);
                return t.split('|').map(c => c.trim());
            }

            function inline(s) {
                // Posts are trusted content, so raw HTML passes through unescaped
                // (some posts embed inline <blockquote>, <div>, etc.).
                // Stray ampersands still get fixed up.
                s = s.replace(/&(?![a-zA-Z]+;|#\d+;)/g, '&amp;');
                s = s.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<a class="image-link" href="$2" target="_blank" rel="noopener noreferrer"><img alt="$1" src="$2"></a>');
                s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
                s = s.replace(/`([^`]+)`/g, function (_, c) {
                    return '<code>' + c.replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</code>';
                });
                s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
                s = s.replace(/~~([^~\n]+)~~/g, '<del>$1</del>');
                s = s.replace(/(^|[^*])\*([^*\n]+)\*/g, '$1<em>$2</em>');
                return s;
            }

            while (i < lines.length) {
                const line = lines[i];
                if (!line.trim()) {
                    i++;
                    continue;
                }

                const fence = line.match(/^```(\w*)\s*$/);
                if (fence) {
                    i++;
                    const buf = [];
                    while (i < lines.length && !/^```\s*$/.test(lines[i])) {
                        buf.push(lines[i]);
                        i++;
                    }
                    i++;
                    const escaped = buf.join('\n').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                    const cls = fence[1] ? ' class="lang-' + fence[1] + '"' : '';
                    out.push('<pre><code' + cls + '>' + escaped + '</code></pre>');
                    continue;
                }

                const h = line.match(/^(#{1,6})\s+(.*)$/);
                if (h) {
                    out.push('<h' + h[1].length + '>' + inline(h[2]) + '</h' + h[1].length + '>');
                    i++;
                    continue;
                }

                if (/^\s*(?:-\s*){3,}\s*$/.test(line) || /^\s*\*{3,}\s*$/.test(line)) {
                    out.push('<hr>');
                    i++;
                    continue;
                }

                if (/^>\s?/.test(line)) {
                    const buf = [];
                    while (i < lines.length && /^>\s?/.test(lines[i])) {
                        buf.push(lines[i].replace(/^>\s?/, ''));
                        i++;
                    }
                    out.push('<blockquote>' + renderMarkdown(buf.join('\n')) + '</blockquote>');
                    continue;
                }

                if (tableRow.test(line) && i + 1 < lines.length && tableSep.test(lines[i + 1])) {
                    const headers = splitRow(line);
                    i += 2;
                    const rows = [];
                    while (i < lines.length && tableRow.test(lines[i])) {
                        rows.push(splitRow(lines[i]));
                        i++;
                    }
                    let html = '<table><thead><tr>';
                    headers.forEach(h => {
                        html += '<th>' + inline(h) + '</th>';
                    });
                    html += '</tr></thead><tbody>';
                    rows.forEach(r => {
                        html += '<tr>';
                        r.forEach(c => {
                            html += '<td>' + inline(c) + '</td>';
                        });
                        html += '</tr>';
                    });
                    html += '</tbody></table>';
                    out.push(html);
                    continue;
                }

                if (bullet.test(line) || ordered.test(line)) {
                    // Indent of the first bullet defines this list's base level.
                    // Deeper-indented bullets become nested lists (rendered by
                    // recursing into renderMarkdown). Same-or-less indent at a
                    // bullet starts a sibling item (or ends the list).
                    const firstMatch = line.match(bullet) || line.match(ordered);
                    const baseIndent = firstMatch[1].length;
                    const isOrdered = ordered.test(line);
                    const items = [];
                    while (i < lines.length) {
                        const cur = lines[i];
                        if (!cur.trim()) {
                            // blank line breaks the list (matches CommonMark-ish behaviour)
                            i++;
                            break;
                        }
                        const mBul = cur.match(bullet);
                        const mOrd = cur.match(ordered);
                        const m = mBul || mOrd;
                        if (!m) break;
                        if (m[1].length < baseIndent) break;
                        if (m[1].length > baseIndent) break; // shouldn't happen at top of loop
                        // Same-type check: switching between -/* and 1. closes the list
                        if (isOrdered !== !!mOrd) break;

                        const itemBuf = [m[3]];
                        const nestedBuf = [];
                        i++;
                        while (i < lines.length) {
                            const nxt = lines[i];
                            if (!nxt.trim()) break;
                            const nBul = nxt.match(bullet);
                            const nOrd = nxt.match(ordered);
                            const nm = nBul || nOrd;
                            if (nm) {
                                if (nm[1].length > baseIndent) {
                                    // nested list line — dedent and stash
                                    nestedBuf.push(nxt.slice(baseIndent + 2));
                                    i++;
                                    continue;
                                }
                                // sibling or end of list
                                break;
                            }
                            // Plain continuation text
                            if (nestedBuf.length) {
                                // continuation inside the nested block
                                nestedBuf.push(nxt.slice(baseIndent + 2));
                            } else {
                                itemBuf.push(nxt.trim());
                            }
                            i++;
                        }

                        let liHtml = inline(itemBuf.join('\n'));
                        if (nestedBuf.length) {
                            liHtml += renderMarkdown(nestedBuf.join('\n'));
                        }
                        items.push('<li>' + liHtml + '</li>');
                    }
                    out.push((isOrdered ? '<ol>' : '<ul>') + items.join('') + (isOrdered ? '</ol>' : '</ul>'));
                    continue;
                }

                const buf = [line];
                i++;
                while (i < lines.length && lines[i].trim() && !/^#{1,6}\s/.test(lines[i]) && !/^>\s?/.test(lines[i]) && !bullet.test(lines[i]) && !ordered.test(lines[i]) && !/^```/.test(lines[i]) && !tableRow.test(lines[i])) {
                    buf.push(lines[i]);
                    i++;
                }
                out.push('<p>' + inline(buf.join(' ')) + '</p>');
            }
            return out.join('\n');
        }

        // Block dispatcher. New block types plug in here.
        const renderers = {
            markdown: function (block) {
                const div = document.createElement('div');
                div.innerHTML = renderMarkdown(block.content);
                return div;
            },
            mermaid: function (block) {
                // Mermaid scans elements with class "mermaid" whose textContent
                // is the diagram source. We collect these nodes and run
                // mermaid.run() once after all blocks are in the DOM.
                const div = document.createElement('div');
                div.className = 'mermaid';
                div.textContent = block.content;
                return div;
            },
            'force-graph': function (block) {
                // build.py emits parsed JSON: {nodes:[{id,size}], links:[{source,target}]}.
                // We instantiate force-graph after the container is in the DOM
                // so it can measure its own width.
                const div = document.createElement('div');
                div.className = 'force-graph';
                const data = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.ForceGraph) return;
                    const maxSize = data.nodes.reduce((m, n) => Math.max(m, n.size || 1), 1);
                    window.ForceGraph()(div)
                        .graphData(data)
                        .width(div.clientWidth)
                        .height(div.clientHeight)
                        .nodeRelSize(4)
                        .nodeVal(n => Math.max(20 * (n.size || 1) / maxSize, 0.001))
                        .nodeLabel(n => n.id + ' (' + (n.size || 1) + ')')
                        .nodeColor(() => 'rgba(135, 206, 235, 0.7)')
                        .linkColor(() => 'rgba(60, 60, 60, 0.4)')
                        .linkDirectionalArrowLength(4)
                        .linkDirectionalArrowRelPos(1)
                        .linkWidth(1);
                });
                return div;
            },
            'bubble-chart': function (block) {
                // build.py emits {nodes:[{name,size}]}. Renders a D3 circle-pack
                // SVG (same shape as the obren.io reference, just inline).
                const wrap = document.createElement('div');
                wrap.className = 'bubble-chart';
                const payload = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.d3) return;
                    const diameter = 480;
                    const fill = '#c0deed';
                    const textColor = '#111111';
                    const fontSize = 12;

                    const svg = window.d3.select(wrap).append('svg')
                        .attr('viewBox', '0 0 ' + diameter + ' ' + diameter)
                        .attr('width', diameter)
                        .attr('height', diameter);

                    const root = window.d3.hierarchy({children: payload.nodes})
                        .sum(d => d.size || 0)
                        .sort((a, b) => b.value - a.value);

                    window.d3.pack().size([diameter, diameter]).padding(2)(root);

                    const node = svg.selectAll('g')
                        .data(root.leaves())
                        .enter().append('g')
                        .attr('transform', d => 'translate(' + d.x + ',' + d.y + ')');

                    node.append('title').text(d => d.data.name + ': ' + d.value);
                    node.append('circle').attr('r', d => d.r).style('fill', fill);
                    node.append('text')
                        .attr('dy', '.3em')
                        .style('text-anchor', 'middle')
                        .style('fill', textColor)
                        .style('font-size', fontSize + 'px')
                        .text(d => d.data.name.substring(0, Math.max(0, Math.floor(d.r / 3))));
                });
                return wrap;
            }
        };

        // Render one modality's blocks into a host element. Mermaid runs
        // scoped to just the nodes created here, so lazily rendered tabs get
        // their diagrams on first activation.
        let mermaidInitialized = false;
        function renderBlocksInto(blocks, host) {
            const mermaidNodes = [];
            blocks.forEach(function (block) {
                const r = renderers[block.type];
                if (!r) {
                    const pre = document.createElement('pre');
                    pre.textContent = '[unknown block type: ' + block.type + ']';
                    host.appendChild(pre);
                    return;
                }
                const node = r(block);
                if (node instanceof Node) {
                    host.appendChild(node);
                    if (block.type === 'mermaid') mermaidNodes.push(node);
                }
            });
            if (mermaidNodes.length && window.mermaid) {
                if (!mermaidInitialized) {
                    window.mermaid.initialize({startOnLoad: false, theme: 'default'});
                    mermaidInitialized = true;
                }
                window.mermaid.run({nodes: mermaidNodes});
            }
        }

        // Modality tabs. One <article class="pane"> per modality; panes are
        // rendered lazily on first activation (force-graph / D3 / mermaid
        // need a visible, measurable container). With a single modality the
        // tab bar stays hidden and the page looks exactly like before.
        const mods = data.modalities;
        const tabBar = document.getElementById('modality-tabs');
        const panes = {};
        const tabButtons = {};
        const renderedPanes = {};

        mods.forEach(function (m) {
            const pane = document.createElement('article');
            pane.className = 'pane';
            pane.dataset.key = m.key;
            pane.hidden = true;
            root.appendChild(pane);
            panes[m.key] = pane;
        });

        const defaultKey = mods.some(m => m.key === 'index') ? 'index' : mods[0].key;

        function activate(key, updateHash) {
            mods.forEach(function (m) {
                const isActive = m.key === key;
                panes[m.key].hidden = !isActive;
                if (tabButtons[m.key]) {
                    tabButtons[m.key].classList.toggle('active', isActive);
                    tabButtons[m.key].setAttribute('aria-selected', isActive ? 'true' : 'false');
                }
            });
            // Unhide first, then render: the chart libraries measure widths.
            if (!renderedPanes[key]) {
                renderBlocksInto(mods.find(m => m.key === key).blocks, panes[key]);
                renderedPanes[key] = true;
            }
            if (updateHash) {
                history.replaceState(null, '',
                    key === defaultKey ? location.pathname + location.search : '#' + key);
            }
        }

        if (mods.length > 1) {
            mods.forEach(function (m) {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.textContent = m.label;
                btn.setAttribute('role', 'tab');
                btn.addEventListener('click', function () { activate(m.key, true); });
                tabBar.appendChild(btn);
                tabButtons[m.key] = btn;
            });
            tabBar.hidden = false;
        }

        // The hash selects a tab only when it matches a modality key, so
        // existing anchors keep working.
        const initialHash = location.hash.slice(1);
        activate(mods.some(m => m.key === initialHash) ? initialHash : defaultKey, false);
        window.addEventListener('hashchange', function () {
            const k = location.hash.slice(1);
            if (mods.some(m => m.key === k)) activate(k, false);
        });
    })();
</script>
