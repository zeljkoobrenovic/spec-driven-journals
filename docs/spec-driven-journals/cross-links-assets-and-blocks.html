<script id="data" type="application/json">{"meta": {"title": "Cross-Links, Assets, and Blocks", "date": "2026-05-22", "author": "by Željko Obrenović (obren.io)", "permalink": "cross-links-assets-and-blocks", "timetoread": "8 min", "excerpt": "Spec-driven journals stay navigable through stable cross-links, simple asset paths, generated clickable images, and a small set of custom block types for diagrams and visualizations.", "tags": "cross-links, assets, markdown, rendering", "icon": "assets/icons/cross-links-assets-and-blocks.png", "logo": "assets/images/cross-links-assets-and-blocks/logo.jpeg", "logo_credit": "Image generated by Google Gemini (gemini-3-pro-image-preview)"}, "tags": ["cross-links", "assets", "markdown", "rendering"], "blocks": [{"type": "markdown", "content": "> Spec-driven journals stay navigable through stable cross-links, simple asset paths, generated clickable images, and a small set of custom block types for diagrams and visualizations.\n\nSpec-Driven Journals uses a small content model, but it is not limited to plain paragraphs.\n\nPosts can link to other records by permalink, include images and media, render tables, and use custom block fences for diagrams and visualizations. The goal is to keep authoring simple while making generated pages useful.\n\nRead this after [Anatomy of a Journal](anatomy-of-a-journal.html). Once the folder structure is clear, this article explains what can go inside the post body and how the build and renderer treat it.\n\n## Content Features At A Glance\n\n| Feature | Author writes | Generated result |\n| --- | --- | --- |\n| Cross-record links | Double-bracket permalink references. | Stable same-journal or cross-journal links using the target title. |\n| Asset paths | `assets/...` paths in markdown or HTML attributes. | Paths rewritten and per-post assets copied into generated journal assets. |\n| Markdown images | Standard markdown image syntax. | A rendered image wrapped in a link to the same file. |\n| Custom blocks | Recognized fenced blocks such as Mermaid or force graphs. | Typed JSON blocks rendered by browser-side JavaScript. |\n\n![Links, assets, and custom blocks rendering map](assets/images/links-assets-blocks-rendering-map.png)\n*Illustration placeholder: `links-assets-blocks-rendering-map.png` should show cross-links, asset paths, markdown images, and custom block fences becoming rendered links, clickable images, diagrams, and visualizations.*\n\n## Cross-Record Links\n\nUse double brackets for record links: two opening square brackets, the target permalink, and two closing square brackets.\n\nFor example, a source reference to the `spec-driven-authoring` permalink becomes a link to the corresponding foundation record after the build.\n\nThe build resolves that to a normal markdown link using the target post's `title:` and `permalink:`.\n\nIf the target is in the same journal, the output link points to:\n\n```text\ntarget.html\n```\n\nIf the target is in another journal, the output link points to:\n\n```text\n../other-journal/target.html\n```\n\nIf the target cannot be resolved, the literal double-bracket token stays visible. That is useful because unresolved links become authoring TODOs instead of silently disappearing.\n\n## Why Links Use Permalinks\n\nCross-links use `permalink`, not file path or title.\n\nThat gives posts stable identities:\n\n| Source reference | Why it works |\n| --- | --- |\n| the `markdown-records` permalink | The permalink is stable even if the title changes. |\n| the `spec-driven-authoring` permalink | The build can resolve across journals. |\n| a missing permalink | The unresolved token stays visible for follow-up. |\n\nThe build uses the target title as link text. Rewording a title updates link text on the next build without changing source links.\n\n## Asset Paths\n\nPost bodies should use paths relative to the journal root:\n\n```markdown\n![Diagram](assets/images/diagram.png)\n```\n\nFor per-post assets, put the source file next to the post:\n\n```text\n_journals/<journal>/posts/<slug>/assets/images/diagram.png\n```\n\nDuring build, per-post assets are merged into:\n\n```text\ndocs/<journal>/assets/\n```\n\nThe same `assets/images/...` reference then works from the generated post page.\n\n## Clickable Images\n\nMarkdown images render as images wrapped in links to the same file:\n\n```html\n<a class=\"image-link\" href=\"assets/images/diagram.png\" target=\"_blank\">\n  <img src=\"assets/images/diagram.png\" alt=\"Diagram\">\n<\/a>\n```\n\nThat means readers can click an image and open it in a new tab.\n\nHero images defined through `logo:` are also wrapped in links. This is useful for diagrams, screenshots, and generated illustrations where the scaled page version may hide detail.\n\n## Supported Markdown\n\nThe renderer supports the subset used by the journals:\n\n- headings\n- paragraphs\n- blockquotes\n- fenced code\n- inline code\n- bold and italic text\n- strikethrough\n- links and images\n- ordered and unordered lists\n- horizontal rules\n- GitHub-flavored tables\n\nThe renderer is intentionally small. If Spec-Driven Journals needs richer markdown, update `_templates/post.html` deliberately rather than adding ad hoc generated HTML.\n\n## Custom Block Types\n\nThe build recognizes custom fences and lifts them out of markdown into typed blocks.\n\n| Block type | Opening fence | Role |\n| --- | --- | --- |\n| `mermaid` | `---begin mermaid---` | Mermaid diagrams rendered by Mermaid.js. |\n| `force-graph` | `---begin force-graph---` | Network graphs rendered by the force-graph library. |\n| `bubble-chart` | `---begin bubble-chart---` | Circle-packing charts rendered by D3. |\n| `wardley-map` | `---begin wardley-map---` | Wardley maps passed through to the upstream web component. |\n\nEach block is emitted as:\n\n```json\n{\"type\": \"mermaid\", \"content\": \"...\"}\n```\n\nThe template renderer dispatches on `type`.\n\n## Adding A New Block Type\n\nTo add a new block type:\n\n1. Add a fence definition to `_BLOCK_FENCES` in `_wiring/build.py`.\n2. Add a build-side parser if raw content needs transformation.\n3. Add a renderer entry in `_templates/post.html`.\n4. Rebuild affected journals.\n5. Add an example post or documentation if the block changes author behavior.\n\nDo not change the `{type, content}` envelope unless you are intentionally changing the renderer contract.\n\n## Good Authoring Habits\n\nUse cross-links when referring to durable records. Use ordinary links for external pages and one-off references. Keep image paths under `assets/...`. Give images meaningful alt text. Keep custom blocks small enough that a reader can still understand the surrounding article.\n\nRich content should support the argument. It should not become a second undocumented language inside the post.\n\nAfter these content mechanics are clear, [Spec-Driven Authoring Workflow](spec-driven-authoring-workflow.html) explains how to move a substantive article from spec to generated review.\n"}]}</script>
<script>
    (function () {
        const data = JSON.parse(document.getElementById('data').textContent);
        const root = document.getElementById('content');

        const postId = (data.meta && data.meta.id) ? String(data.meta.id) : '';
        const postStatusRaw = (data.meta && data.meta.status) ? String(data.meta.status) : '';
        if (postId || postStatusRaw) {
            const header = document.getElementById('post-header');
            let sectionEl = header.querySelector('p.section');
            if (!sectionEl) {
                sectionEl = document.createElement('p');
                sectionEl.className = 'section';
                header.insertBefore(sectionEl, header.firstChild);
            }
            // Status pill goes first, then a " / " separator before the existing
            // content (section name and/or id).
            if (postStatusRaw) {
                const parts = postStatusRaw.split(':');
                const statusName = parts[0].trim();
                const statusColor = (parts[1] || '').trim();
                const wrap = document.createElement('span');
                wrap.className = 'post-status';
                const dot = document.createElement('span');
                dot.className = 'status-dot';
                if (statusColor) dot.style.background = statusColor;
                wrap.appendChild(dot);
                wrap.appendChild(document.createTextNode(statusName));
                if (sectionEl.firstChild) {
                    sectionEl.insertBefore(document.createTextNode(' • '), sectionEl.firstChild);
                    sectionEl.insertBefore(wrap, sectionEl.firstChild);
                } else {
                    sectionEl.appendChild(wrap);
                }
            }
            if (postId) {
                if (sectionEl.firstChild) sectionEl.appendChild(document.createTextNode(' • '));
                sectionEl.appendChild(document.createTextNode(postId));
            }
        }

        const tagsHost = document.getElementById('tags');
        (data.tags || []).forEach(function (t) {
            const span = document.createElement('span');
            span.className = 'tag';
            span.textContent = t;
            tagsHost.appendChild(span);
        });

        // Minimal markdown renderer. Supports: ATX headings, paragraphs, blockquotes,
        // unordered/ordered lists, fenced code, inline code, bold/italic/strikethrough, links, images, hr.
        // Sufficient for the posts in this repo; replace with a fuller parser if needed.
        function renderMarkdown(src) {
            const lines = src.replace(/\r\n/g, '\n').split('\n');
            const out = [];
            let i = 0;

            const bullet = /^(\s*)([-*])\s+(.*)$/;
            const ordered = /^(\s*)(\d+)\.\s+(.*)$/;
            const tableRow = /^\s*\|(.+)\|\s*$/;
            const tableSep = /^\s*\|?\s*:?-{3,}:?\s*(\|\s*:?-{3,}:?\s*)+\|?\s*$/;

            function splitRow(s) {
                let t = s.trim();
                if (t.startsWith('|')) t = t.slice(1);
                if (t.endsWith('|')) t = t.slice(0, -1);
                return t.split('|').map(c => c.trim());
            }

            function inline(s) {
                // Posts are trusted content, so raw HTML passes through unescaped
                // (some posts embed inline <blockquote>, <div>, etc.).
                // Stray ampersands still get fixed up.
                s = s.replace(/&(?![a-zA-Z]+;|#\d+;)/g, '&amp;');
                s = s.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<a class="image-link" href="$2" target="_blank" rel="noopener noreferrer"><img alt="$1" src="$2"></a>');
                s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
                s = s.replace(/`([^`]+)`/g, function (_, c) {
                    return '<code>' + c.replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</code>';
                });
                s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
                s = s.replace(/~~([^~\n]+)~~/g, '<del>$1</del>');
                s = s.replace(/(^|[^*])\*([^*\n]+)\*/g, '$1<em>$2</em>');
                return s;
            }

            while (i < lines.length) {
                const line = lines[i];
                if (!line.trim()) {
                    i++;
                    continue;
                }

                const fence = line.match(/^```(\w*)\s*$/);
                if (fence) {
                    i++;
                    const buf = [];
                    while (i < lines.length && !/^```\s*$/.test(lines[i])) {
                        buf.push(lines[i]);
                        i++;
                    }
                    i++;
                    const escaped = buf.join('\n').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                    const cls = fence[1] ? ' class="lang-' + fence[1] + '"' : '';
                    out.push('<pre><code' + cls + '>' + escaped + '</code></pre>');
                    continue;
                }

                const h = line.match(/^(#{1,6})\s+(.*)$/);
                if (h) {
                    out.push('<h' + h[1].length + '>' + inline(h[2]) + '</h' + h[1].length + '>');
                    i++;
                    continue;
                }

                if (/^\s*(?:-\s*){3,}\s*$/.test(line) || /^\s*\*{3,}\s*$/.test(line)) {
                    out.push('<hr>');
                    i++;
                    continue;
                }

                if (/^>\s?/.test(line)) {
                    const buf = [];
                    while (i < lines.length && /^>\s?/.test(lines[i])) {
                        buf.push(lines[i].replace(/^>\s?/, ''));
                        i++;
                    }
                    out.push('<blockquote>' + renderMarkdown(buf.join('\n')) + '</blockquote>');
                    continue;
                }

                if (tableRow.test(line) && i + 1 < lines.length && tableSep.test(lines[i + 1])) {
                    const headers = splitRow(line);
                    i += 2;
                    const rows = [];
                    while (i < lines.length && tableRow.test(lines[i])) {
                        rows.push(splitRow(lines[i]));
                        i++;
                    }
                    let html = '<table><thead><tr>';
                    headers.forEach(h => {
                        html += '<th>' + inline(h) + '</th>';
                    });
                    html += '</tr></thead><tbody>';
                    rows.forEach(r => {
                        html += '<tr>';
                        r.forEach(c => {
                            html += '<td>' + inline(c) + '</td>';
                        });
                        html += '</tr>';
                    });
                    html += '</tbody></table>';
                    out.push(html);
                    continue;
                }

                if (bullet.test(line) || ordered.test(line)) {
                    // Indent of the first bullet defines this list's base level.
                    // Deeper-indented bullets become nested lists (rendered by
                    // recursing into renderMarkdown). Same-or-less indent at a
                    // bullet starts a sibling item (or ends the list).
                    const firstMatch = line.match(bullet) || line.match(ordered);
                    const baseIndent = firstMatch[1].length;
                    const isOrdered = ordered.test(line);
                    const items = [];
                    while (i < lines.length) {
                        const cur = lines[i];
                        if (!cur.trim()) {
                            // blank line breaks the list (matches CommonMark-ish behaviour)
                            i++;
                            break;
                        }
                        const mBul = cur.match(bullet);
                        const mOrd = cur.match(ordered);
                        const m = mBul || mOrd;
                        if (!m) break;
                        if (m[1].length < baseIndent) break;
                        if (m[1].length > baseIndent) break; // shouldn't happen at top of loop
                        // Same-type check: switching between -/* and 1. closes the list
                        if (isOrdered !== !!mOrd) break;

                        const itemBuf = [m[3]];
                        const nestedBuf = [];
                        i++;
                        while (i < lines.length) {
                            const nxt = lines[i];
                            if (!nxt.trim()) break;
                            const nBul = nxt.match(bullet);
                            const nOrd = nxt.match(ordered);
                            const nm = nBul || nOrd;
                            if (nm) {
                                if (nm[1].length > baseIndent) {
                                    // nested list line — dedent and stash
                                    nestedBuf.push(nxt.slice(baseIndent + 2));
                                    i++;
                                    continue;
                                }
                                // sibling or end of list
                                break;
                            }
                            // Plain continuation text
                            if (nestedBuf.length) {
                                // continuation inside the nested block
                                nestedBuf.push(nxt.slice(baseIndent + 2));
                            } else {
                                itemBuf.push(nxt.trim());
                            }
                            i++;
                        }

                        let liHtml = inline(itemBuf.join('\n'));
                        if (nestedBuf.length) {
                            liHtml += renderMarkdown(nestedBuf.join('\n'));
                        }
                        items.push('<li>' + liHtml + '</li>');
                    }
                    out.push((isOrdered ? '<ol>' : '<ul>') + items.join('') + (isOrdered ? '</ol>' : '</ul>'));
                    continue;
                }

                const buf = [line];
                i++;
                while (i < lines.length && lines[i].trim() && !/^#{1,6}\s/.test(lines[i]) && !/^>\s?/.test(lines[i]) && !bullet.test(lines[i]) && !ordered.test(lines[i]) && !/^```/.test(lines[i]) && !tableRow.test(lines[i])) {
                    buf.push(lines[i]);
                    i++;
                }
                out.push('<p>' + inline(buf.join(' ')) + '</p>');
            }
            return out.join('\n');
        }

        // Block dispatcher. New block types plug in here.
        const renderers = {
            markdown: function (block) {
                const div = document.createElement('div');
                div.innerHTML = renderMarkdown(block.content);
                return div;
            },
            mermaid: function (block) {
                // Mermaid scans elements with class "mermaid" whose textContent
                // is the diagram source. We collect these nodes and run
                // mermaid.run() once after all blocks are in the DOM.
                const div = document.createElement('div');
                div.className = 'mermaid';
                div.textContent = block.content;
                return div;
            },
            'force-graph': function (block) {
                // build.py emits parsed JSON: {nodes:[{id,size}], links:[{source,target}]}.
                // We instantiate force-graph after the container is in the DOM
                // so it can measure its own width.
                const div = document.createElement('div');
                div.className = 'force-graph';
                const data = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.ForceGraph) return;
                    const maxSize = data.nodes.reduce((m, n) => Math.max(m, n.size || 1), 1);
                    window.ForceGraph()(div)
                        .graphData(data)
                        .width(div.clientWidth)
                        .height(div.clientHeight)
                        .nodeRelSize(4)
                        .nodeVal(n => Math.max(20 * (n.size || 1) / maxSize, 0.001))
                        .nodeLabel(n => n.id + ' (' + (n.size || 1) + ')')
                        .nodeColor(() => 'rgba(135, 206, 235, 0.7)')
                        .linkColor(() => 'rgba(60, 60, 60, 0.4)')
                        .linkDirectionalArrowLength(4)
                        .linkDirectionalArrowRelPos(1)
                        .linkWidth(1);
                });
                return div;
            },
            'bubble-chart': function (block) {
                // build.py emits {nodes:[{name,size}]}. Renders a D3 circle-pack
                // SVG (same shape as the obren.io reference, just inline).
                const wrap = document.createElement('div');
                wrap.className = 'bubble-chart';
                const payload = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.d3) return;
                    const diameter = 480;
                    const fill = '#c0deed';
                    const textColor = '#111111';
                    const fontSize = 12;

                    const svg = window.d3.select(wrap).append('svg')
                        .attr('viewBox', '0 0 ' + diameter + ' ' + diameter)
                        .attr('width', diameter)
                        .attr('height', diameter);

                    const root = window.d3.hierarchy({children: payload.nodes})
                        .sum(d => d.size || 0)
                        .sort((a, b) => b.value - a.value);

                    window.d3.pack().size([diameter, diameter]).padding(2)(root);

                    const node = svg.selectAll('g')
                        .data(root.leaves())
                        .enter().append('g')
                        .attr('transform', d => 'translate(' + d.x + ',' + d.y + ')');

                    node.append('title').text(d => d.data.name + ': ' + d.value);
                    node.append('circle').attr('r', d => d.r).style('fill', fill);
                    node.append('text')
                        .attr('dy', '.3em')
                        .style('text-anchor', 'middle')
                        .style('fill', textColor)
                        .style('font-size', fontSize + 'px')
                        .text(d => d.data.name.substring(0, Math.max(0, Math.floor(d.r / 3))));
                });
                return wrap;
            }
        };

        const mermaidNodes = [];
        data.blocks.forEach(function (block) {
            const r = renderers[block.type];
            if (!r) {
                const pre = document.createElement('pre');
                pre.textContent = '[unknown block type: ' + block.type + ']';
                root.appendChild(pre);
                return;
            }
            const node = r(block);
            if (node instanceof Node) {
                root.appendChild(node);
                if (block.type === 'mermaid') mermaidNodes.push(node);
            }
        });

        if (mermaidNodes.length && window.mermaid) {
            window.mermaid.initialize({startOnLoad: false, theme: 'default'});
            window.mermaid.run({nodes: mermaidNodes});
        }
    })();
</script>
</body>
</html>
