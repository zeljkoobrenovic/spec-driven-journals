<script id="data" type="application/json">{"meta": {"title": "Web application framework, batteries included, full stack, for a startup product", "date": "2020-01-21 21:12:01 +0100", "author": "by Team", "permalink": "web-application-framework-batteries-included-full-stack-for-a-startup-product", "excerpt": "We will build the startup product on Django. It is the only full-stack framework in contention that puts us inside Python's data and ML ecosystem, which is the deciding factor.", "logo": "assets/images/web-application-framework-batteries-included-full-stack-for-a-startup-product/logo.jpeg", "logo_credit": "Image generated by Google Gemini (gemini-3.1-flash-image-preview)", "icon": "assets/icons/web-application-framework-batteries-included-full-stack-for-a-startup-product.png"}, "tags": [], "blocks": [{"type": "markdown", "content": "> **Status**: Accepted (2020-01-21)\n>\n> **Decision**: We will build the startup product on Django (Python). Among the batteries-included, full-stack frameworks we considered, Django is the only one that puts us inside Python's data and ML ecosystem — which is the deciding factor for this product.\n\n## Context\n\nWe are building a web application for paying customers to sign in, upload files, process the data, and view reports. As an early-stage startup, the priorities that matter most are:\n\n- **Agile development.** We need fast iteration on features and product hypotheses.\n- **Full-stack coverage.** A single framework should handle both backend and frontend so we are not maintaining a parallel JavaScript stack.\n- **AI/ML compatibility.** The product is data-heavy. Easy interop with Jupyter, Pandas, NumPy, and the rest of the Python data ecosystem is core to the product, not a side concern.\n\nWhat matters less right now is raw runtime speed, massive-scale concurrency, and backwards compatibility with anything we already run.\n\nWe evaluated four batteries-included, full-stack candidates: Django (Python), Ruby on Rails (Ruby), Phoenix (Elixir), and Loco (Rust).\n\n## Decision\n\nDjango will be the web framework for the product. We will use it as a full-stack framework — server-rendered templates plus light JavaScript where needed — and keep the data/ML code in the same Python runtime where possible.\n\n## Rationale\n\n1. **Python ecosystem alignment.** Django runs on the same language as Jupyter, Pandas, NumPy, scikit-learn, TensorFlow, and PyTorch. Our data and ML code can share types, libraries, and tooling with the web layer with no translation step. None of the other candidates can match this for a data-heavy product.\n2. **Batteries included.** Auth, ORM, admin, forms, templating, and routing are all in the box. For a startup, this is exactly the kind of leverage that lets a small team ship a real product.\n3. **Agile fit.** Django's conventions, scaffolding, and documentation make it fast to go from idea to running feature. Rails is comparable on this axis; the others are not.\n4. **Why not Rails.** Rails is an excellent agile framework with a great ecosystem, but Ruby is a second-class citizen in the AI/ML world. Bridging from Rails to a separate Python data layer would erase most of the velocity advantage we are choosing a full-stack framework to get.\n5. **Why not Phoenix.** Phoenix and the BEAM are outstanding for concurrency and real-time use cases, but those are exactly the qualities we said we do not need yet. Meanwhile its data-science ecosystem is too immature for our core workload.\n6. **Why not Loco.** Loco is promising, but Rust's web and AI/ML ecosystems are still maturing, and Rust's iteration speed is slower than higher-level languages. Wrong tool for a product still searching for fit.\n\n## Implications\n\n1. **Lean on the framework.** We will use Django's admin, auth, ORM, and forms by default and resist building parallel infrastructure. Conventional Django is fast Django.\n2. **Server-rendered first.** The default UI will be Django templates with progressive enhancement, not a separate single-page front-end. We revisit only if a feature genuinely needs it.\n3. **Data and ML in-process where possible.** Reports, transforms, and model inference run in Python; we share libraries with our Jupyter notebooks rather than maintaining a separate analysis stack.\n4. **Performance is a future problem.** Python and Django are fast enough for our scale today. When we hit limits, the answers will be caching, query tuning, and pulling hot paths into background workers — not rewriting the stack.\n5. **Watch the failure case.** If the product turns out to need real-time concurrency or sub-millisecond latency, the framework choice will have to be revisited. We are explicitly betting that will not happen before we have product-market fit.\n\n## Conclusion\n\nDjango is the only candidate that satisfies all three of our high-priority criteria — agile development, full-stack coverage, and tight integration with Python's data and ML tooling. Phoenix and Loco are stronger on axes we are not optimising for. Rails is close on velocity but loses on AI/ML. For this product, at this stage, Django is the right choice.\n"}]}</script>
<script>
    (function () {
        const data = JSON.parse(document.getElementById('data').textContent);
        const root = document.getElementById('content');

        const tagsHost = document.getElementById('tags');
        (data.tags || []).forEach(function (t) {
            const span = document.createElement('span');
            span.className = 'tag';
            span.textContent = t;
            tagsHost.appendChild(span);
        });

        // Minimal markdown renderer. Supports: ATX headings, paragraphs, blockquotes,
        // unordered/ordered lists, fenced code, inline code, bold/italic, links, images, hr.
        // Sufficient for the posts in this repo; replace with a fuller parser if needed.
        function renderMarkdown(src) {
            const lines = src.replace(/\r\n/g, '\n').split('\n');
            const out = [];
            let i = 0;

            const bullet = /^(\s*)([-*])\s+(.*)$/;
            const ordered = /^(\s*)(\d+)\.\s+(.*)$/;
            const tableRow = /^\s*\|(.+)\|\s*$/;
            const tableSep = /^\s*\|?\s*:?-{3,}:?\s*(\|\s*:?-{3,}:?\s*)+\|?\s*$/;

            function splitRow(s) {
                let t = s.trim();
                if (t.startsWith('|')) t = t.slice(1);
                if (t.endsWith('|')) t = t.slice(0, -1);
                return t.split('|').map(c => c.trim());
            }

            function inline(s) {
                // Posts are trusted content, so raw HTML passes through unescaped
                // (some posts embed inline <blockquote>, <div>, etc.).
                // Stray ampersands still get fixed up.
                s = s.replace(/&(?![a-zA-Z]+;|#\d+;)/g, '&amp;');
                s = s.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img alt="$1" src="$2">');
                s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
                s = s.replace(/`([^`]+)`/g, function (_, c) {
                    return '<code>' + c.replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</code>';
                });
                s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
                s = s.replace(/(^|[^*])\*([^*\n]+)\*/g, '$1<em>$2</em>');
                return s;
            }

            while (i < lines.length) {
                const line = lines[i];
                if (!line.trim()) {
                    i++;
                    continue;
                }

                const fence = line.match(/^```(\w*)\s*$/);
                if (fence) {
                    i++;
                    const buf = [];
                    while (i < lines.length && !/^```\s*$/.test(lines[i])) {
                        buf.push(lines[i]);
                        i++;
                    }
                    i++;
                    const escaped = buf.join('\n').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                    const cls = fence[1] ? ' class="lang-' + fence[1] + '"' : '';
                    out.push('<pre><code' + cls + '>' + escaped + '</code></pre>');
                    continue;
                }

                const h = line.match(/^(#{1,6})\s+(.*)$/);
                if (h) {
                    out.push('<h' + h[1].length + '>' + inline(h[2]) + '</h' + h[1].length + '>');
                    i++;
                    continue;
                }

                if (/^\s*(?:-\s*){3,}\s*$/.test(line) || /^\s*\*{3,}\s*$/.test(line)) {
                    out.push('<hr>');
                    i++;
                    continue;
                }

                if (/^>\s?/.test(line)) {
                    const buf = [];
                    while (i < lines.length && /^>\s?/.test(lines[i])) {
                        buf.push(lines[i].replace(/^>\s?/, ''));
                        i++;
                    }
                    out.push('<blockquote>' + renderMarkdown(buf.join('\n')) + '</blockquote>');
                    continue;
                }

                if (tableRow.test(line) && i + 1 < lines.length && tableSep.test(lines[i + 1])) {
                    const headers = splitRow(line);
                    i += 2;
                    const rows = [];
                    while (i < lines.length && tableRow.test(lines[i])) {
                        rows.push(splitRow(lines[i]));
                        i++;
                    }
                    let html = '<table><thead><tr>';
                    headers.forEach(h => { html += '<th>' + inline(h) + '</th>'; });
                    html += '</tr></thead><tbody>';
                    rows.forEach(r => {
                        html += '<tr>';
                        r.forEach(c => { html += '<td>' + inline(c) + '</td>'; });
                        html += '</tr>';
                    });
                    html += '</tbody></table>';
                    out.push(html);
                    continue;
                }

                if (bullet.test(line) || ordered.test(line)) {
                    const isOrdered = ordered.test(line);
                    const re = isOrdered ? ordered : bullet;
                    const items = [];
                    while (i < lines.length && re.test(lines[i])) {
                        const m = lines[i].match(re);
                        let item = m[3];
                        i++;
                        while (i < lines.length && lines[i].trim() && !bullet.test(lines[i]) && !ordered.test(lines[i])) {
                            item += '\n' + lines[i].trim();
                            i++;
                        }
                        items.push('<li>' + inline(item) + '</li>');
                    }
                    out.push((isOrdered ? '<ol>' : '<ul>') + items.join('') + (isOrdered ? '</ol>' : '</ul>'));
                    continue;
                }

                const buf = [line];
                i++;
                while (i < lines.length && lines[i].trim() && !/^#{1,6}\s/.test(lines[i]) && !/^>\s?/.test(lines[i]) && !bullet.test(lines[i]) && !ordered.test(lines[i]) && !/^```/.test(lines[i]) && !tableRow.test(lines[i])) {
                    buf.push(lines[i]);
                    i++;
                }
                out.push('<p>' + inline(buf.join(' ')) + '</p>');
            }
            return out.join('\n');
        }

        // Block dispatcher. New block types plug in here.
        const renderers = {
            markdown: function (block) {
                const div = document.createElement('div');
                div.innerHTML = renderMarkdown(block.content);
                return div;
            },
            mermaid: function (block) {
                // Mermaid scans elements with class "mermaid" whose textContent
                // is the diagram source. We collect these nodes and run
                // mermaid.run() once after all blocks are in the DOM.
                const div = document.createElement('div');
                div.className = 'mermaid';
                div.textContent = block.content;
                return div;
            },
            'force-graph': function (block) {
                // build.py emits parsed JSON: {nodes:[{id,size}], links:[{source,target}]}.
                // We instantiate force-graph after the container is in the DOM
                // so it can measure its own width.
                const div = document.createElement('div');
                div.className = 'force-graph';
                const data = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.ForceGraph) return;
                    const maxSize = data.nodes.reduce((m, n) => Math.max(m, n.size || 1), 1);
                    window.ForceGraph()(div)
                        .graphData(data)
                        .width(div.clientWidth)
                        .height(div.clientHeight)
                        .nodeRelSize(4)
                        .nodeVal(n => Math.max(20 * (n.size || 1) / maxSize, 0.001))
                        .nodeLabel(n => n.id + ' (' + (n.size || 1) + ')')
                        .nodeColor(() => 'rgba(135, 206, 235, 0.7)')
                        .linkColor(() => 'rgba(60, 60, 60, 0.4)')
                        .linkDirectionalArrowLength(4)
                        .linkDirectionalArrowRelPos(1)
                        .linkWidth(1);
                });
                return div;
            },
            'bubble-chart': function (block) {
                // build.py emits {nodes:[{name,size}]}. Renders a D3 circle-pack
                // SVG (same shape as the obren.io reference, just inline).
                const wrap = document.createElement('div');
                wrap.className = 'bubble-chart';
                const payload = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.d3) return;
                    const diameter = 480;
                    const fill = '#c0deed';
                    const textColor = '#111111';
                    const fontSize = 12;

                    const svg = window.d3.select(wrap).append('svg')
                        .attr('viewBox', '0 0 ' + diameter + ' ' + diameter)
                        .attr('width', diameter)
                        .attr('height', diameter);

                    const root = window.d3.hierarchy({children: payload.nodes})
                        .sum(d => d.size || 0)
                        .sort((a, b) => b.value - a.value);

                    window.d3.pack().size([diameter, diameter]).padding(2)(root);

                    const node = svg.selectAll('g')
                        .data(root.leaves())
                        .enter().append('g')
                        .attr('transform', d => 'translate(' + d.x + ',' + d.y + ')');

                    node.append('title').text(d => d.data.name + ': ' + d.value);
                    node.append('circle').attr('r', d => d.r).style('fill', fill);
                    node.append('text')
                        .attr('dy', '.3em')
                        .style('text-anchor', 'middle')
                        .style('fill', textColor)
                        .style('font-size', fontSize + 'px')
                        .text(d => d.data.name.substring(0, Math.max(0, Math.floor(d.r / 3))));
                });
                return wrap;
            }
        };

        const mermaidNodes = [];
        data.blocks.forEach(function (block) {
            const r = renderers[block.type];
            if (!r) {
                const pre = document.createElement('pre');
                pre.textContent = '[unknown block type: ' + block.type + ']';
                root.appendChild(pre);
                return;
            }
            const node = r(block);
            if (node instanceof Node) {
                root.appendChild(node);
                if (block.type === 'mermaid') mermaidNodes.push(node);
            }
        });

        if (mermaidNodes.length && window.mermaid) {
            window.mermaid.initialize({startOnLoad: false, theme: 'default'});
            window.mermaid.run({nodes: mermaidNodes});
        }
    })();
</script>
