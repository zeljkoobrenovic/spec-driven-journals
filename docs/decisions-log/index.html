<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Decisions Log</title>
    <link rel="stylesheet" href="site.css">
    <style>
        header.site {
            padding-bottom: 4px;
            margin-bottom: 2px;
        }

        header.site .logo {
            display: block;
            width: 100%;
            max-height: 340px;
            object-fit: cover;
            margin-bottom: 0;
            box-shadow: rgba(0, 0, 0, 0.09) 0px 3px 12px;
        }

        header.site .logo-credit {
            color: var(--muted);
            font-size: 12px;
            margin: 4px 0 0;
            padding-left: 2px;
            text-align: right;
        }

        header.site h1 {
            margin-top: 20px;
            margin-bottom: 8px;
            padding: 0;
            font-size: 51px;
            font-weight: 500;
            letter-spacing: -0.01em;
            line-height: normal;
        }

        header.site p {
            margin: 0;
            color: var(--muted);
        }

        .search {
            margin: 0 0 38px;
        }

        .search input {
            width: 100%;
            padding: 12px 14px;
            font-size: 16px;
            border: 1px solid var(--rule);
            border-radius: 6px;
            background: #fff;
            font-family: inherit;
        }

        .search input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .hits {
            color: var(--muted);
            font-size: 13px;
            margin: 0 4px 20px;
        }

        .tag-filter {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin: 0 0 24px;
        }

        .tag-filter button {
            font: inherit;
            font-size: 13px;
            padding: 4px 10px;
            border: 1px solid deepskyblue;
            border-radius: 999px;
            background: #fff;
            color: var(--fg);
            cursor: pointer;
        }

        .tag-filter button:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .tag-filter button.active {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }

        .tag-filter button .count {
            color: var(--muted);
            margin-left: 4px;
        }

        .tag-filter button.active .count {
            color: rgba(255, 255, 255, 0.8);
        }

        .tag-filter button.hidden {
            display: none;
        }

        .tag-filter .tag-toggle {
            border-style: dashed;
            border-color: var(--muted);
            color: var(--muted);
        }

        .tag-filter .tag-toggle:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .status-filter {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin: 0 0 10px;
        }

        .status-filter button {
            font: inherit;
            font-size: 13px;
            padding: 4px 10px;
            border: 1px solid var(--rule);
            border-radius: 999px;
            background: #fff;
            color: var(--fg);
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .status-filter button:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .status-filter button.active {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }

        .status-filter button .status-dot {
            display: inline-block;
            width: 9px;
            height: 9px;
            border-radius: 50%;
            background: var(--muted);
        }

        .status-filter button .count {
            color: var(--muted);
        }

        .status-filter button.active .count {
            color: rgba(255, 255, 255, 0.8);
        }

        ul.posts .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin: 6px 0 0;
        }

        ul.posts .tags .tag {
            font-size: 12px;
            padding: 1px 8px;
            border-radius: 999px;
            border: 1px solid deepskyblue;
            color: blue;
            background-color: var(--tag-bg);
        }

        section.group {
            margin-bottom: 48px;
        }

        section.group > h2 {
            font-size: 32px;
            margin: 0 0 4px;
            font-weight: 500;
            letter-spacing: -0.01em;
        }

        section.group > .group-desc {
            color: var(--muted);
            margin: -8px 0 16px;
            font-size: 15px;
        }

        section.group.empty {
            display: none;
        }

        ul.posts {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        ul.posts li {
            display: flex;
            gap: 14px;
            padding: 14px 0;
            border-top: 1px dashed var(--rule);
        }

        ul.posts li:last-child {
            border-bottom: 1px solid var(--rule);
        }

        ul.posts li.hidden {
            display: none;
        }

        ul.posts .icon {
            flex: 0 0 100px;
            width: 100px;
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 7px;
        }

        ul.posts .icon img {
            max-width: 100%;
            max-height: 100%;
            border-radius: 10px;
        }

        ul.posts .icon.placeholder {
            background: var(--rule);
            border-radius: 4px;
        }

        ul.posts .meta {
            flex: 1;
            min-width: 0;
        }

        ul.posts .meta .post-id {
            color: var(--muted);
            font-size: 12px;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            margin: 0 0 2px;
        }

        ul.posts .meta .post-status,
        ul.posts .meta .post-id-text {
            margin-right: 8px;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        ul.posts .meta .post-status .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--muted);
        }

        ul.posts .meta .post-id .post-id-sep {
            margin-right: 8px;
            color: var(--rule);
        }

        ul.posts .meta a {
            color: rgb(23, 86, 169);
            text-decoration: none;
            font-weight: normal;
            font-size: 23px;
        }

        ul.posts .meta a:hover {
            color: var(--accent);
        }

        ul.posts .meta .excerpt {
            color: var(--muted);
            margin: 0;
            font-size: 15px;
        }

        .empty-msg {
            color: var(--muted);
            font-style: italic;
            display: none;
        }

        .empty-msg.show {
            display: block;
        }
    </style>
</head>
<body>
<main>
    <header class="site">
        <a href="assets/images/iStock-1365878406.jpg" target="_blank" rel="noopener noreferrer"><img class="logo" src="assets/images/iStock-1365878406.jpg" alt=""></a>
        <p class="logo-credit">Image by sasun bughdaryan from iStock</p>
        <div style="padding: 4px;">
            <h1>Decisions Log</h1>
            <p>A collection of example architecture and organizational decision records.</p>
        </div>
    </header>

    <div style="padding: 4px;">
        <div class="status-filter" id="status-filter"></div>
        <div class="tag-filter" id="tag-filter"></div>
        <div class="search">
            <input id="q" type="search" placeholder="Search..." autocomplete="off" style="width: calc(100% - 150px)">
            <span class="hits" id="hits"></span>
        </div>

        <div id="sections"></div>
        <p class="empty-msg" id="empty">No posts match your search.</p>
    </div>
</main>

<script id="data" type="application/json">{"sections": [{"title": "Programming Languages", "description": "Decisions about which programming languages to adopt.", "posts": [{"title": "Go programming language", "excerpt": "We will adopt Go programming language for building web applications going forward. Go is known for its simplicity and concise syntax. Our organization has been primarily using Java programming language for building web applications.", "url": "go-programming-language.html", "icon": "assets/icons/golang.png", "tags": ["accepted"]}, {"title": "Java Programming Language for the Project", "excerpt": "We will use Java as the primary language for the project, chosen for its security model, concurrency support, and the breadth of its ecosystem.", "url": "java-programming-language.html", "icon": "assets/icons/java.jpg", "tags": ["accepted"]}, {"title": "Programming Languages: TypeScript + Rust", "excerpt": "We will use TypeScript on the front-end and Rust on the back-end. Both give us compile-time safety; Rust additionally avoids the runtime pauses and complexity of a VM-based stack.", "url": "programming-languages.html", "icon": "assets/icons/ts+rust.png", "tags": ["draft"]}, {"title": "Python programming language", "excerpt": "We will use Python as the primary language for the project, chosen for its data and ML ecosystem, readability, and fit with our mixed data-and-web workload.", "url": "python-programming-language.html", "icon": "assets/icons/python.png", "tags": []}, {"title": "Rust programming language", "excerpt": "We will adopt Rust for new systems-level work and gradually migrate existing C and C++ code, trading a steeper learning curve for memory safety without sacrificing performance.", "url": "rust-programming-language.html", "icon": "assets/icons/rust.png", "tags": ["accepted"]}]}, {"title": "Front-end & UI", "description": "Decisions about front-end frameworks, libraries, and styling.", "posts": [{"title": "Chart library toolkit for data visualization using TypeScript and JSON", "excerpt": "We will adopt Apache ECharts as our chart toolkit. It is the only fully open-source option that covers the full set of charts we need — including candlestick, geo SVG maps, and clustering — without a commercial-licence trap or a D3-scale build effort.", "url": "chart-library-toolkit-for-data-visualization-using-typescript-and-json.html", "icon": "assets/icons/chart-library-toolkit-for-data-visualization-using-typescript-and-json.png", "tags": []}, {"title": "CSS framework", "excerpt": "We will use Bulma as our CSS framework. It gives us the components we need without dragging in jQuery, and stays out of the way of the modern JavaScript frameworks we build on top.", "url": "css-framework.html", "icon": "assets/icons/css-framework.png", "tags": []}, {"title": "React Front-End JavaScript Library", "excerpt": "We will use React as our front-end JavaScript library for building a responsive, component-based user interface.", "url": "react-front-end-javascript-library.html", "icon": "assets/icons/react-front-end-javascript-library.png", "tags": []}, {"title": "Svelte Components", "excerpt": "We will adopt SvelteUI as our default Svelte component library. It covers tables, grids, charts, and forms with reasonable performance and customizability, and we will integrate a dedicated charting or Gantt library when we hit its edges.", "url": "svelte-components.html", "icon": "assets/icons/svelte-components.png", "tags": []}, {"title": "Svelte Front-end JavaScript Library", "excerpt": "We will use Svelte as our front-end JavaScript library, preferring its compile-time approach and lightweight runtime over React, Vue, and Angular.", "url": "svelte-front-end-javascript-library.html", "icon": "assets/icons/svelte-front-end-javascript-library.png", "tags": []}, {"title": "SvelteKit framework", "excerpt": "We will build the application on SvelteKit, using its routing, SSR, and tooling as the front-end framework around Svelte components.", "url": "sveltekit-framework.html", "icon": "assets/icons/sveltekit-framework.png", "tags": []}, {"title": "Tailwind CSS", "excerpt": "We will use Tailwind CSS to style this web application. Its utility-first model accelerates development, customization, and consistent theming, and the trade-offs are well understood.", "url": "tailwind-css.html", "icon": "assets/icons/tailwind-css.png", "tags": []}, {"title": "Vue front-end JavaScript library", "excerpt": "We will adopt Vue as the primary front-end JavaScript library. Vue offers a gentle learning curve, a flexible integration model, and strong performance without the weight of larger frameworks.", "url": "vue-front-end-javascript-library.html", "icon": "assets/icons/vue-front-end-javascript-library.png", "tags": []}]}, {"title": "Back-end Frameworks", "description": "Decisions about back-end and full-stack web frameworks.", "posts": [{"title": "Python Django Framework", "excerpt": "We will use Django as the web framework for the customer-data application. Its ORM, security defaults, and admin tooling cover most of what we need out of the box.", "url": "python-django-framework.html", "icon": "assets/icons/python-django-framework.png", "tags": []}, {"title": "Ruby on Rails Framework", "excerpt": "We will build the application on Ruby on Rails, trading some runtime performance for a mature full-stack framework, strong conventions, and an existing team that knows Rails well.", "url": "ruby-on-rails-framework.html", "icon": "assets/icons/ruby-on-rails-framework.png", "tags": []}, {"title": "Web application framework, batteries included, full stack, for a startup product", "excerpt": "We will build the startup product on Django. It is the only full-stack framework in contention that puts us inside Python's data and ML ecosystem, which is the deciding factor.", "url": "web-application-framework-batteries-included-full-stack-for-a-startup-product.html", "icon": "assets/icons/web-application-framework-batteries-included-full-stack-for-a-startup-product.png", "tags": []}]}, {"title": "Databases & Storage", "description": "Decisions about database technologies and data storage.", "posts": [{"title": "Choosing a Database Technology", "excerpt": "We will use a document database for the new application — a flexible schema, horizontal scaling, and fast key/document retrieval fit our requirements better than a relational or event-based store.", "url": "choosing-a-database-technology.html", "icon": "assets/icons/choosing-a-database-technology.png", "tags": []}, {"title": "MySQL database", "excerpt": "We will use MySQL as the database management system for Project X — a mature, open-source RDBMS that fits our technology stack and meets our needs for performance, scalability, and reliability.", "url": "mysql-database.html", "icon": "assets/icons/mysql-database.png", "tags": []}, {"title": "PostgreSQL database", "excerpt": "We will use PostgreSQL as the database for our upcoming project, in preference to MySQL, for its richer feature set and stronger handling of complex data.", "url": "postgresql-database.html", "icon": "assets/icons/postgresql-database.png", "tags": []}, {"title": "Secrets storage", "excerpt": "We will use Bitwarden for user-oriented secrets and HashiCorp Vault for system-oriented secrets, splitting the problem along its natural boundary rather than forcing one tool to do both jobs.", "url": "secrets-storage.html", "icon": "assets/icons/secrets-storage.png", "tags": []}]}, {"title": "APIs & Conventions", "description": "Decisions about API design and naming conventions.", "posts": [{"title": "API using JSON v. gRPC", "excerpt": "We will use gRPC for the new service's API. Binary serialization, schema-first contracts, and built-in streaming outweigh the lower discoverability and library reach of JSON over HTTP for our workload.", "url": "api-using-json-v-grpc.html", "icon": "assets/icons/grpc.png", "tags": ["accepted"]}, {"title": "Snake_case v. camelCase for a REST API?", "excerpt": "We will use snake_case for REST API endpoint names and JSON field names. The decision is driven by consistency with our existing endpoints, readability, and matching what the rest of our codebase already does.", "url": "snake-case-v-camelcase-for-a-rest-api.html", "icon": "assets/icons/snake-case-v-camelcase-for-a-rest-api.png", "tags": []}, {"title": "Timestamp format", "excerpt": "We will use ISO 8601 in UTC with nanosecond precision — `YYYY-MM-DDTHH:MM:SS.NNNNNNNNNZ` — as the canonical timestamp format across all systems. It is human-readable, machine-parseable, and broadly supported.", "url": "timestamp-format.html", "icon": "assets/icons/timestamp-format.png", "tags": []}]}, {"title": "Cloud & Infrastructure", "description": "Decisions about cloud providers and container orchestration.", "posts": [{"title": "Amazon Web Services", "excerpt": "We will adopt Amazon Web Services as our cloud infrastructure provider, on the basis of AWS's service breadth, global footprint, security posture, and pay-as-you-go pricing.", "url": "amazon-web-services.html", "icon": "assets/icons/amazon-web-services.png", "tags": []}, {"title": "Docker Swarm Container Orchestration", "excerpt": "We will use Docker Swarm as our container orchestration tool, on the basis of its simplicity, tight integration with the Docker tooling our teams already use, and built-in load balancing.", "url": "docker-swarm-container-orchestration.html", "icon": "assets/icons/docker-swarm-container-orchestration.png", "tags": []}, {"title": "Google Cloud Platform", "excerpt": "We will use Google Cloud Platform as the cloud infrastructure for our application, on the basis of cost-effectiveness, scalability, reliability, and the flexibility of its managed services.", "url": "google-cloud-platform.html", "icon": "assets/icons/google-cloud-platform.png", "tags": []}, {"title": "Kubernetes container orchestration", "excerpt": "We will adopt Kubernetes as our container orchestration platform, on the basis of its scalability, decentralized architecture, community size, and ecosystem of supporting tools.", "url": "kubernetes-container-orchestration.html", "icon": "assets/icons/kubernetes-container-orchestration.png", "tags": []}, {"title": "Microsoft Azure cloud infrastructure", "excerpt": "We will adopt Microsoft Azure as the cloud infrastructure for the organization, on the basis of service breadth, hybrid-cloud support, security and compliance posture, and pay-as-you-go pricing.", "url": "microsoft-azure-cloud-infrastructure.html", "icon": "assets/icons/microsoft-azure-cloud-infrastructure.png", "tags": []}]}, {"title": "DevOps & Operations", "description": "Decisions about CI/CD, configuration, and observability.", "posts": [{"title": "Continuous integration", "excerpt": "We will adopt continuous integration as our default development workflow: every change builds, tests, and deploys to a delivery environment automatically. We accept the up-front investment in pipelines and discipline in exchange for faster, more reliable releases.", "url": "continuous-integration.html", "icon": "assets/icons/continuous-integration.png", "tags": []}, {"title": "Environment variable configuration", "excerpt": "We will configure applications via .env files, paired with a checked-in defaults file and a schema file. This follows the 12-factor pattern, keeps secrets out of source control, and matches the conventions our teams already know.", "url": "environment-variable-configuration.html", "icon": "assets/icons/environment-variable-configuration.png", "tags": []}, {"title": "Metrics, monitors, alerts", "excerpt": "Work in progress. We are evaluating tooling for metrics, monitoring, and alerting across the spectrum from simple open-source (Nagios) to feature-rich SaaS (New Relic). Prometheus + Grafana + Alertmanager and Zabbix are the current frontrunners.", "url": "metrics-monitors-alerts.html", "icon": "assets/icons/metrics-monitors-alerts.png", "tags": []}, {"title": "Microsoft Azure DevOps", "excerpt": "We will not adopt Microsoft Azure DevOps. The platform's advertised capabilities did not hold up under our evaluation, the components do not integrate well, and support response was poor. We will stay with the AWS-based incumbent.", "url": "microsoft-azure-devops.html", "icon": "assets/icons/microsoft-azure-devops.png", "tags": []}, {"title": "Monorepo vs multirepo", "excerpt": "We will use a monorepo while the project is small and rapid iteration matters more than stability. When the organization grows enough that stability outweighs iteration speed, we will plan a migration to a polyrepo layout.", "url": "monorepo-vs-multirepo.html", "icon": "assets/icons/monorepo-vs-multirepo.png", "tags": []}]}, {"title": "Security & Testing", "description": "Decisions about authentication, authorization, and testing tools.", "posts": [{"title": "Authentication and authorization options", "excerpt": "We will standardize on OpenID Connect (built on OAuth 2.0) for user authentication and API authorization across our web applications, with SAML reserved for enterprise SSO integrations that require it.", "url": "authentication-authorization-options.html", "icon": "assets/icons/authentication-authorization-options.png", "tags": []}, {"title": "Browser automation framework for E2E testing (Playwright vs Selenium)", "excerpt": "We will adopt Playwright as the browser automation framework for our end-to-end test pipeline, in preference to Selenium, on the basis of its concise API, first-class TypeScript and Python support, and stronger handling of dynamic UIs.", "url": "browser-automation-framework-for-e2e-testing-playwright-vs-selenium.html", "icon": "assets/icons/browser-automation-framework-for-e2e-testing-playwright-vs-selenium.png", "tags": []}]}, {"title": "Tooling", "description": "Decisions about developer tooling.", "posts": [{"title": "Programming code editors", "excerpt": "We will treat the programming code editor as a modular platform built around a Core, UI, Plugins, and Integrations split, so the editor can be extended and customized without changing its foundation.", "url": "programming-code-editors.html", "icon": "assets/icons/programming-code-editors.png", "tags": []}]}, {"title": "Ways of Working", "description": "Decisions about team practices and work arrangements.", "posts": [{"title": "4-day work-week", "excerpt": "We will move to a 4-day workweek next quarter for all employees, in response to employee feedback, research evidence, and our retention goals.", "url": "4-day-work-week.html", "icon": "assets/icons/4-day-work-week.png", "tags": []}, {"title": "Agile software development", "excerpt": "We will adopt Agile as our software development methodology to support iterative delivery, faster feedback, and better adaptation to changing requirements.", "url": "agile-software-development.html", "icon": "assets/icons/agile-software-development.png", "tags": []}, {"title": "High-trust teamwork", "excerpt": "We will adopt high-trust teamwork as a core value and operating principle, anchored in transparency, honesty, integrity, and respect, with explicit practices to build trust and to handle breaches when they occur.", "url": "high-trust-teamwork.html", "icon": "assets/icons/high-trust-teamwork.png", "tags": []}, {"title": "Work from home", "excerpt": "We will adopt a permanent hybrid work-from-home policy for eligible employees, allowing up to three remote days per week with two in-office days, supported by equipment, regular check-ins, and periodic review.", "url": "work-from-home.html", "icon": "assets/icons/work-from-home.png", "tags": []}]}]}</script>
<script>
    (function () {
        const data = JSON.parse(document.getElementById('data').textContent);
        const root = document.getElementById('sections');
        const empty = document.getElementById('empty');
        const hits = document.getElementById('hits');
        const tagFilter = document.getElementById('tag-filter');
        const statusFilter = document.getElementById('status-filter');
        const qInput = document.getElementById('q');

        function el(tag, attrs, children) {
            const e = document.createElement(tag);
            if (attrs) for (const k in attrs) {
                if (k === 'class') e.className = attrs[k];
                else if (k === 'text') e.textContent = attrs[k];
                else e.setAttribute(k, attrs[k]);
            }
            if (children) children.forEach(c => c && e.appendChild(c));
            return e;
        }

        // Tag and status counts across all posts.
        // status is stored as "name" or "name:color"; we count by name and
        // remember the (first observed) color per name so the filter chip dot
        // matches the inline post-status pill.
        const tagCounts = new Map();
        const statusCounts = new Map();
        const statusColors = new Map();
        let totalPosts = 0;
        data.sections.forEach(section => {
            section.posts.forEach(p => {
                totalPosts++;
                (p.tags || []).forEach(t => tagCounts.set(t, (tagCounts.get(t) || 0) + 1));
                if (p.status) {
                    const parts = String(p.status).split(':');
                    const name = parts[0].trim();
                    const color = (parts[1] || '').trim();
                    if (name) {
                        statusCounts.set(name, (statusCounts.get(name) || 0) + 1);
                        if (color && !statusColors.has(name)) statusColors.set(name, color);
                    }
                }
            });
        });

        // Build status filter buttons (sorted by count desc, then alpha).
        // Only renders if any post defines a status, so the row stays empty
        // and invisible otherwise.
        const sortedStatuses = Array.from(statusCounts.entries())
            .sort((a, b) => b[1] - a[1] || a[0].localeCompare(b[0]));
        const activeStatuses = new Set();
        sortedStatuses.forEach(([name, count]) => {
            const btn = el('button', {type: 'button', 'data-status': name});
            const dot = el('span', {class: 'status-dot'});
            const color = statusColors.get(name);
            if (color) dot.style.background = color;
            btn.appendChild(dot);
            btn.appendChild(document.createTextNode(name));
            btn.appendChild(el('span', {class: 'count', text: '(' + count + ')'}));
            btn.addEventListener('click', function () {
                if (activeStatuses.has(name)) activeStatuses.delete(name);
                else activeStatuses.add(name);
                btn.classList.toggle('active', activeStatuses.has(name));
                applyFilters();
            });
            statusFilter.appendChild(btn);
        });

        // Build tag filter buttons (sorted by count desc, then alpha).
        // Show only the first TAG_VISIBLE_LIMIT tags initially; the rest are
        // toggled via a "show more / fewer" button. Selected tags stay
        // visible even when collapsed, so an active filter never disappears.
        const TAG_VISIBLE_LIMIT = 12;
        const sortedTags = Array.from(tagCounts.entries())
            .sort((a, b) => b[1] - a[1] || a[0].localeCompare(b[0]));
        const activeTags = new Set();
        const overflowButtons = [];
        sortedTags.forEach(([tag, count], idx) => {
            const btn = el('button', {type: 'button', 'data-tag': tag});
            btn.appendChild(document.createTextNode(tag));
            btn.appendChild(el('span', {class: 'count', text: '(' + count + ')'}));
            btn.addEventListener('click', function () {
                if (activeTags.has(tag)) activeTags.delete(tag);
                else activeTags.add(tag);
                btn.classList.toggle('active', activeTags.has(tag));
                applyFilters();
            });
            if (idx >= TAG_VISIBLE_LIMIT) {
                btn.classList.add('hidden');
                overflowButtons.push(btn);
            }
            tagFilter.appendChild(btn);
        });

        let tagsExpanded = false;
        if (overflowButtons.length) {
            const toggle = el('button', {type: 'button', class: 'tag-toggle'});
            const hiddenLabel = '+ ' + overflowButtons.length + ' more';
            const shownLabel = 'show fewer';
            toggle.textContent = hiddenLabel;
            toggle.addEventListener('click', function () {
                tagsExpanded = !tagsExpanded;
                overflowButtons.forEach(b => {
                    // keep selected overflow tags visible even when collapsed
                    if (tagsExpanded || b.classList.contains('active')) {
                        b.classList.remove('hidden');
                    } else {
                        b.classList.add('hidden');
                    }
                });
                toggle.textContent = tagsExpanded ? shownLabel : hiddenLabel;
            });
            tagFilter.appendChild(toggle);
        }

        // Render sections
        data.sections.forEach(section => {
            const sec = el('section', {class: 'group'});
            sec.appendChild(el('h2', {text: section.title}));
            if (section.description) sec.appendChild(el('p', {class: 'group-desc', text: section.description}));
            const ul = el('ul', {class: 'posts'});
            section.posts.forEach(p => {
                const li = el('li');
                const tags = p.tags || [];
                const statusName = p.status ? String(p.status).split(':')[0].trim() : '';
                li.dataset.haystack = (p.title + ' ' + (p.excerpt || '') + ' ' + tags.join(' ') + ' ' + statusName).toLowerCase();
                li.dataset.tags = tags.join('|').toLowerCase();
                li.dataset.status = statusName.toLowerCase();
                const iconWrap = el('div', {class: p.icon ? 'icon' : 'icon placeholder'});
                if (p.icon) iconWrap.appendChild(el('img', {src: p.icon, alt: ''}));
                li.appendChild(iconWrap);
                const meta = el('div', {class: 'meta'});
                if (p.id || p.status) {
                    const idLine = el('p', {class: 'post-id'});
                    if (p.status) {
                        // status front-matter is "name" or "name:color".
                        const parts = String(p.status).split(':');
                        const statusName = parts[0].trim();
                        const statusColor = (parts[1] || '').trim();
                        const wrap = el('span', {class: 'post-status'});
                        const dot = el('span', {class: 'status-dot'});
                        if (statusColor) dot.style.background = statusColor;
                        wrap.appendChild(dot);
                        wrap.appendChild(document.createTextNode(statusName));
                        idLine.appendChild(wrap);
                    }
                    if (p.status && p.id) {
                        idLine.appendChild(el('span', {class: 'post-id-sep', text: '•'}));
                    }
                    if (p.id) idLine.appendChild(el('span', {class: 'post-id-text', text: '[' + p.id + ']'}));
                    meta.appendChild(idLine);
                }
                meta.appendChild(el('a', {href: p.url, text: p.title}));
                if (p.excerpt) meta.appendChild(el('p', {class: 'excerpt', text: p.excerpt}));
                if (tags.length) {
                    const tagWrap = el('div', {class: 'tags'});
                    tags.forEach(t => tagWrap.appendChild(el('span', {class: 'tag', text: t})));
                    meta.appendChild(tagWrap);
                }
                li.appendChild(meta);
                ul.appendChild(li);
            });
            sec.appendChild(ul);
            root.appendChild(sec);
        });

        function applyFilters() {
            const q = qInput.value.trim().toLowerCase();
            let visibleCount = 0;
            root.querySelectorAll('section.group').forEach(sec => {
                let secVisible = false;
                sec.querySelectorAll('li').forEach(li => {
                    const matchQ = !q || li.dataset.haystack.indexOf(q) !== -1;
                    let matchTag = true;
                    if (activeTags.size) {
                        const liTags = li.dataset.tags ? li.dataset.tags.split('|') : [];
                        // any-match: post must carry at least one selected tag
                        matchTag = false;
                        for (const t of activeTags) {
                            if (liTags.indexOf(t.toLowerCase()) !== -1) {
                                matchTag = true;
                                break;
                            }
                        }
                    }
                    let matchStatus = true;
                    if (activeStatuses.size) {
                        const liStatus = li.dataset.status || '';
                        // any-match: post status must equal one of the selected statuses
                        matchStatus = false;
                        for (const s of activeStatuses) {
                            if (liStatus === s.toLowerCase()) {
                                matchStatus = true;
                                break;
                            }
                        }
                    }
                    const match = matchQ && matchTag && matchStatus;
                    li.classList.toggle('hidden', !match);
                    if (match) {
                        secVisible = true;
                        visibleCount++;
                    }
                });
                sec.classList.toggle('empty', !secVisible);
            });
            empty.classList.toggle('show', visibleCount === 0);
            hits.textContent = ' = ' + ((q || activeTags.size || activeStatuses.size)
                ? visibleCount + ' of ' + totalPosts + ''
                : totalPosts + '');
        }

        qInput.addEventListener('input', applyFilters);
        applyFilters();
    })();
</script>
</body>
</html>
