<script id="data" type="application/json">{"meta": {"title": "Authentication and authorization options", "date": "2020-01-21 21:12:01 +0100", "author": "by Team", "permalink": "authentication-authorization-options", "excerpt": "We will standardize on OpenID Connect (built on OAuth 2.0) for user authentication and API authorization across our web applications, with SAML reserved for enterprise SSO integrations that require it.", "logo": "assets/images/authentication-authorization-options/logo.jpeg", "logo_credit": "Image generated by Google Gemini (gemini-3.1-flash-image-preview)", "icon": "assets/icons/authentication-authorization-options.png"}, "tags": [], "blocks": [{"type": "markdown", "content": "> **Status**: Accepted (2020-01-21)\n>\n> **Decision**: We will standardize on OpenID Connect (built on OAuth 2.0) for user authentication and API authorization across our web applications. SAML is retained only for enterprise SSO integrations that require it; LDAP remains in use as an internal directory store rather than as a public-facing auth protocol.\n\n## Context\n\nOur web applications need a consistent answer to two distinct questions: *who is this user?* (authentication) and *what are they allowed to do?* (authorization). Today we have a mix of approaches across services, which makes integration, audit, and onboarding harder than it should be.\n\nWe surveyed the protocols and technologies in active use in our environment and the wider ecosystem:\n\n- **OAuth 2.0** — delegated access. An authorization server issues short-lived tokens that let a third-party application act on the user's behalf without seeing their credentials. OAuth alone does not tell us *who* the user is.\n- **OpenID Connect (OIDC)** — an identity layer on top of OAuth 2.0. Adds an ID token containing user claims (subject, email, name, etc.), turning OAuth into a full authentication flow.\n- **SAML** — XML-based assertions exchanged between an identity provider and a service provider. Mature in enterprise SSO, less mobile-friendly, heavier on the wire than OIDC.\n- **WS-Federation** — Microsoft-centric SSO from the WS-* family. Largely superseded by OIDC outside legacy estates.\n- **LDAP** — a directory protocol, not an auth protocol. Useful as a backing store for user attributes and group membership; typically fronted by another protocol for application sign-in.\n- **Social SSO** (Google, GitHub, etc.) — OAuth/OIDC providers aimed at consumer users; reduces signup friction.\n\n## Decision\n\nOpenID Connect is the default for all new and migrated services:\n\n- User authentication uses an OIDC provider; applications consume the ID token to establish identity.\n- API authorization uses OAuth 2.0 access tokens issued by the same provider, with scopes mapped to application permissions.\n- SAML is permitted only for integrating with external partners or enterprise customers whose IdPs do not speak OIDC.\n- LDAP/Active Directory remain as the directory of record for employees, surfaced through the OIDC provider rather than queried directly by applications.\n- WS-Federation is not used in new work; existing endpoints are scheduled for migration.\n\n## Rationale\n\n1. **One protocol covers both questions.** OIDC gives us authentication and OAuth 2.0 gives us authorization in a single, coherent stack. Standardizing on one model removes duplicate code paths and per-service auth designs.\n2. **Modern web and mobile fit.** OIDC is JSON/HTTP-based and works cleanly with SPAs, mobile apps, and machine-to-machine flows. SAML's XML and browser-redirect ergonomics are awkward outside server-rendered web apps.\n3. **Strong ecosystem.** Mature libraries exist for every language we use; managed providers (Auth0, Okta, Cognito, Azure AD, Keycloak) all support OIDC out of the box.\n4. **Backwards compatibility where it matters.** SAML support remains available for enterprise SSO scenarios where the partner mandates it, so we keep the deals without imposing legacy on our own codebase.\n5. **Directory separation.** Treating LDAP as a data source rather than an auth protocol means applications never see passwords and the directory can be replaced or extended without touching application code.\n\n## Implications\n\n1. **Provider selection.** We will pick a single OIDC provider (or a thin abstraction) and route all applications through it, rather than letting each team integrate directly with upstream IdPs.\n2. **Token handling discipline.** Teams need clear guidance on token storage, refresh, scope design, and revocation. We will publish a short reference implementation per stack.\n3. **Migration work.** Existing custom auth and WS-Federation endpoints will be migrated to OIDC on a service-by-service basis; no flag day is planned.\n4. **SAML as an integration concern, not an architecture concern.** Where SAML is required, it is terminated at the provider, not at the application — apps still see OIDC tokens.\n5. **Social SSO is optional per product.** Consumer-facing products may enable Google or GitHub sign-in via the same OIDC provider; internal tools should not.\n\n## Conclusion\n\nStandardizing on OIDC and OAuth 2.0 gives us one auth model to build, document, and audit against, while still letting us meet enterprise customers on their own terms via SAML. The remaining work is migration and consistent implementation, not further protocol selection.\n"}]}</script>
<script>
    (function () {
        const data = JSON.parse(document.getElementById('data').textContent);
        const root = document.getElementById('content');

        const tagsHost = document.getElementById('tags');
        (data.tags || []).forEach(function (t) {
            const span = document.createElement('span');
            span.className = 'tag';
            span.textContent = t;
            tagsHost.appendChild(span);
        });

        // Minimal markdown renderer. Supports: ATX headings, paragraphs, blockquotes,
        // unordered/ordered lists, fenced code, inline code, bold/italic/strikethrough, links, images, hr.
        // Sufficient for the posts in this repo; replace with a fuller parser if needed.
        function renderMarkdown(src) {
            const lines = src.replace(/\r\n/g, '\n').split('\n');
            const out = [];
            let i = 0;

            const bullet = /^(\s*)([-*])\s+(.*)$/;
            const ordered = /^(\s*)(\d+)\.\s+(.*)$/;
            const tableRow = /^\s*\|(.+)\|\s*$/;
            const tableSep = /^\s*\|?\s*:?-{3,}:?\s*(\|\s*:?-{3,}:?\s*)+\|?\s*$/;

            function splitRow(s) {
                let t = s.trim();
                if (t.startsWith('|')) t = t.slice(1);
                if (t.endsWith('|')) t = t.slice(0, -1);
                return t.split('|').map(c => c.trim());
            }

            function inline(s) {
                // Posts are trusted content, so raw HTML passes through unescaped
                // (some posts embed inline <blockquote>, <div>, etc.).
                // Stray ampersands still get fixed up.
                s = s.replace(/&(?![a-zA-Z]+;|#\d+;)/g, '&amp;');
                s = s.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img alt="$1" src="$2">');
                s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
                s = s.replace(/`([^`]+)`/g, function (_, c) {
                    return '<code>' + c.replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</code>';
                });
                s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
                s = s.replace(/~~([^~\n]+)~~/g, '<del>$1</del>');
                s = s.replace(/(^|[^*])\*([^*\n]+)\*/g, '$1<em>$2</em>');
                return s;
            }

            while (i < lines.length) {
                const line = lines[i];
                if (!line.trim()) {
                    i++;
                    continue;
                }

                const fence = line.match(/^```(\w*)\s*$/);
                if (fence) {
                    i++;
                    const buf = [];
                    while (i < lines.length && !/^```\s*$/.test(lines[i])) {
                        buf.push(lines[i]);
                        i++;
                    }
                    i++;
                    const escaped = buf.join('\n').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                    const cls = fence[1] ? ' class="lang-' + fence[1] + '"' : '';
                    out.push('<pre><code' + cls + '>' + escaped + '</code></pre>');
                    continue;
                }

                const h = line.match(/^(#{1,6})\s+(.*)$/);
                if (h) {
                    out.push('<h' + h[1].length + '>' + inline(h[2]) + '</h' + h[1].length + '>');
                    i++;
                    continue;
                }

                if (/^\s*(?:-\s*){3,}\s*$/.test(line) || /^\s*\*{3,}\s*$/.test(line)) {
                    out.push('<hr>');
                    i++;
                    continue;
                }

                if (/^>\s?/.test(line)) {
                    const buf = [];
                    while (i < lines.length && /^>\s?/.test(lines[i])) {
                        buf.push(lines[i].replace(/^>\s?/, ''));
                        i++;
                    }
                    out.push('<blockquote>' + renderMarkdown(buf.join('\n')) + '</blockquote>');
                    continue;
                }

                if (tableRow.test(line) && i + 1 < lines.length && tableSep.test(lines[i + 1])) {
                    const headers = splitRow(line);
                    i += 2;
                    const rows = [];
                    while (i < lines.length && tableRow.test(lines[i])) {
                        rows.push(splitRow(lines[i]));
                        i++;
                    }
                    let html = '<table><thead><tr>';
                    headers.forEach(h => { html += '<th>' + inline(h) + '</th>'; });
                    html += '</tr></thead><tbody>';
                    rows.forEach(r => {
                        html += '<tr>';
                        r.forEach(c => { html += '<td>' + inline(c) + '</td>'; });
                        html += '</tr>';
                    });
                    html += '</tbody></table>';
                    out.push(html);
                    continue;
                }

                if (bullet.test(line) || ordered.test(line)) {
                    const isOrdered = ordered.test(line);
                    const re = isOrdered ? ordered : bullet;
                    const items = [];
                    while (i < lines.length && re.test(lines[i])) {
                        const m = lines[i].match(re);
                        let item = m[3];
                        i++;
                        while (i < lines.length && lines[i].trim() && !bullet.test(lines[i]) && !ordered.test(lines[i])) {
                            item += '\n' + lines[i].trim();
                            i++;
                        }
                        items.push('<li>' + inline(item) + '</li>');
                    }
                    out.push((isOrdered ? '<ol>' : '<ul>') + items.join('') + (isOrdered ? '</ol>' : '</ul>'));
                    continue;
                }

                const buf = [line];
                i++;
                while (i < lines.length && lines[i].trim() && !/^#{1,6}\s/.test(lines[i]) && !/^>\s?/.test(lines[i]) && !bullet.test(lines[i]) && !ordered.test(lines[i]) && !/^```/.test(lines[i]) && !tableRow.test(lines[i])) {
                    buf.push(lines[i]);
                    i++;
                }
                out.push('<p>' + inline(buf.join(' ')) + '</p>');
            }
            return out.join('\n');
        }

        // Block dispatcher. New block types plug in here.
        const renderers = {
            markdown: function (block) {
                const div = document.createElement('div');
                div.innerHTML = renderMarkdown(block.content);
                return div;
            },
            mermaid: function (block) {
                // Mermaid scans elements with class "mermaid" whose textContent
                // is the diagram source. We collect these nodes and run
                // mermaid.run() once after all blocks are in the DOM.
                const div = document.createElement('div');
                div.className = 'mermaid';
                div.textContent = block.content;
                return div;
            },
            'force-graph': function (block) {
                // build.py emits parsed JSON: {nodes:[{id,size}], links:[{source,target}]}.
                // We instantiate force-graph after the container is in the DOM
                // so it can measure its own width.
                const div = document.createElement('div');
                div.className = 'force-graph';
                const data = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.ForceGraph) return;
                    const maxSize = data.nodes.reduce((m, n) => Math.max(m, n.size || 1), 1);
                    window.ForceGraph()(div)
                        .graphData(data)
                        .width(div.clientWidth)
                        .height(div.clientHeight)
                        .nodeRelSize(4)
                        .nodeVal(n => Math.max(20 * (n.size || 1) / maxSize, 0.001))
                        .nodeLabel(n => n.id + ' (' + (n.size || 1) + ')')
                        .nodeColor(() => 'rgba(135, 206, 235, 0.7)')
                        .linkColor(() => 'rgba(60, 60, 60, 0.4)')
                        .linkDirectionalArrowLength(4)
                        .linkDirectionalArrowRelPos(1)
                        .linkWidth(1);
                });
                return div;
            },
            'bubble-chart': function (block) {
                // build.py emits {nodes:[{name,size}]}. Renders a D3 circle-pack
                // SVG (same shape as the obren.io reference, just inline).
                const wrap = document.createElement('div');
                wrap.className = 'bubble-chart';
                const payload = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.d3) return;
                    const diameter = 480;
                    const fill = '#c0deed';
                    const textColor = '#111111';
                    const fontSize = 12;

                    const svg = window.d3.select(wrap).append('svg')
                        .attr('viewBox', '0 0 ' + diameter + ' ' + diameter)
                        .attr('width', diameter)
                        .attr('height', diameter);

                    const root = window.d3.hierarchy({children: payload.nodes})
                        .sum(d => d.size || 0)
                        .sort((a, b) => b.value - a.value);

                    window.d3.pack().size([diameter, diameter]).padding(2)(root);

                    const node = svg.selectAll('g')
                        .data(root.leaves())
                        .enter().append('g')
                        .attr('transform', d => 'translate(' + d.x + ',' + d.y + ')');

                    node.append('title').text(d => d.data.name + ': ' + d.value);
                    node.append('circle').attr('r', d => d.r).style('fill', fill);
                    node.append('text')
                        .attr('dy', '.3em')
                        .style('text-anchor', 'middle')
                        .style('fill', textColor)
                        .style('font-size', fontSize + 'px')
                        .text(d => d.data.name.substring(0, Math.max(0, Math.floor(d.r / 3))));
                });
                return wrap;
            }
        };

        const mermaidNodes = [];
        data.blocks.forEach(function (block) {
            const r = renderers[block.type];
            if (!r) {
                const pre = document.createElement('pre');
                pre.textContent = '[unknown block type: ' + block.type + ']';
                root.appendChild(pre);
                return;
            }
            const node = r(block);
            if (node instanceof Node) {
                root.appendChild(node);
                if (block.type === 'mermaid') mermaidNodes.push(node);
            }
        });

        if (mermaidNodes.length && window.mermaid) {
            window.mermaid.initialize({startOnLoad: false, theme: 'default'});
            window.mermaid.run({nodes: mermaidNodes});
        }
    })();
</script>
