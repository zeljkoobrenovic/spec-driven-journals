<script id="data" type="application/json">{"meta": {"title": "Microsoft Azure DevOps", "date": "2020-01-21 21:12:01 +0100", "author": "by Team", "permalink": "microsoft-azure-devops", "excerpt": "We will not adopt Microsoft Azure DevOps. The platform's advertised capabilities did not hold up under our evaluation, the components do not integrate well, and support response was poor. We will stay with the AWS-based incumbent.", "logo": "assets/images/microsoft-azure-devops/logo.jpeg", "logo_credit": "Image generated by Google Gemini (gemini-3.1-flash-image-preview)", "icon": "assets/icons/microsoft-azure-devops.png"}, "tags": [], "blocks": [{"type": "markdown", "content": "> **Status**: Rejected (2020-01-21)\n>\n> **Decision**: We will not adopt Microsoft Azure DevOps. We will continue with the AWS-based incumbent toolchain for build, integration, deployment, and hosting. The choice is reversible if Azure DevOps significantly improves.\n\n## Context\n\nWe want DevOps tooling to build, integrate, deploy, and host our projects. Microsoft Azure DevOps was on the candidate list because:\n\n- We are considering Azure as a hosting platform more broadly.\n- Microsoft has been investing heavily in developer experience (notably the GitHub acquisition).\n- A unified offering from one vendor is operationally attractive if it works well.\n\nOur requirements:\n\n- **Fast builds.** We are willing to pay a premium for short build times because they accelerate the feedback loop.\n- **High reliability.** We test high-value workloads (financial and confidential transactions), and reliability is non-negotiable.\n- **Composability.** We want to mix and match — bring our own build agents, choose our own VCS, or coordinate with self-hosted CI — without being locked in.\n- **Reportable failure modes.** When something breaks, especially something security-relevant, we need a working channel to report it.\n\n## Decision\n\nReject Microsoft Azure DevOps. We will stay with the AWS-based incumbent toolchain. The decision is reversible if Azure DevOps's situation changes materially.\n\n## Rationale\n\n1. **Hands-on experience was poor.** We ran a real evaluation across Azure DevOps, Azure Pipelines, Azure Repos, and infrastructure spin-up via Terraform. The advertised capabilities did not hold up in practice.\n2. **Setup is a tangle of overlapping UIs.** Azure sign-in, microsoft.com sign-in, and live.com sign-in coexist and overlap in confusing ways. Identity alone consumed disproportionate setup time.\n3. **Security reporting did not work.** We discovered a minor security issue during evaluation and could not find a working channel to report it. Multiple Microsoft representatives could not route it. We eventually reached Microsoft Security, who responded \"won't fix.\"\n4. **Documentation is inconsistent.** Docs are frequently outdated or wrong; Microsoft's own search makes them hard to find even when they exist.\n5. **Terraform support lags AWS.** It works, but Microsoft's pattern is to push vendors to maintain Terraform examples rather than maintain authoritative ones themselves. The result is gaps and inconsistency compared with the AWS equivalents.\n6. **Peer reports confirm our experience.** Independent reports — Hacker News discussion, Windows Development MVPs, blog write-ups — describe the same UI clunkiness, slow builds, weak pull-request UX, and integration friction. The complaints predate our evaluation and have persisted across UI rewrites.\n7. **Cost premium.** Our rough estimate is that choosing Azure DevOps would cost ~3x in time and effort over staying with the incumbent, with no clear corresponding capability gain.\n\n## Implications\n\n1. **Status quo.** We continue with the AWS-based incumbent for build, integration, deployment, and hosting.\n2. **Bounded Azure exposure.** Rejecting Azure DevOps reduces the pull toward adopting Azure more broadly. Other Azure services can still be evaluated on their own merits.\n3. **Microsoft acquisition strategy.** Microsoft is acquiring developer tools aggressively (GitHub, Citus). If we revisit, we should evaluate the acquired offerings separately and watch for tissue-rejection risk (staff turnover, slow integration).\n4. **Easily reversible.** Our DevOps choices live alongside the AWS incumbent; revisiting Azure DevOps in the future is a parallel evaluation, not a migration.\n5. **Watch list.** Edward Thomson (Azure PM) and other Azure team members have engaged openly and technically in public discussion. That is a positive signal worth tracking when deciding whether to re-evaluate.\n\n## Conclusion\n\nAzure DevOps's advertised offering does not match its delivered experience today. We are not adopting it. We remain open — explicitly — to revisiting the decision if the platform's integration, performance, and support improve enough to clearly beat what we already have.\n"}]}</script>
<script>
    (function () {
        const data = JSON.parse(document.getElementById('data').textContent);
        const root = document.getElementById('content');

        const tagsHost = document.getElementById('tags');
        (data.tags || []).forEach(function (t) {
            const span = document.createElement('span');
            span.className = 'tag';
            span.textContent = t;
            tagsHost.appendChild(span);
        });

        // Minimal markdown renderer. Supports: ATX headings, paragraphs, blockquotes,
        // unordered/ordered lists, fenced code, inline code, bold/italic/strikethrough, links, images, hr.
        // Sufficient for the posts in this repo; replace with a fuller parser if needed.
        function renderMarkdown(src) {
            const lines = src.replace(/\r\n/g, '\n').split('\n');
            const out = [];
            let i = 0;

            const bullet = /^(\s*)([-*])\s+(.*)$/;
            const ordered = /^(\s*)(\d+)\.\s+(.*)$/;
            const tableRow = /^\s*\|(.+)\|\s*$/;
            const tableSep = /^\s*\|?\s*:?-{3,}:?\s*(\|\s*:?-{3,}:?\s*)+\|?\s*$/;

            function splitRow(s) {
                let t = s.trim();
                if (t.startsWith('|')) t = t.slice(1);
                if (t.endsWith('|')) t = t.slice(0, -1);
                return t.split('|').map(c => c.trim());
            }

            function inline(s) {
                // Posts are trusted content, so raw HTML passes through unescaped
                // (some posts embed inline <blockquote>, <div>, etc.).
                // Stray ampersands still get fixed up.
                s = s.replace(/&(?![a-zA-Z]+;|#\d+;)/g, '&amp;');
                s = s.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img alt="$1" src="$2">');
                s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
                s = s.replace(/`([^`]+)`/g, function (_, c) {
                    return '<code>' + c.replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</code>';
                });
                s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
                s = s.replace(/~~([^~\n]+)~~/g, '<del>$1</del>');
                s = s.replace(/(^|[^*])\*([^*\n]+)\*/g, '$1<em>$2</em>');
                return s;
            }

            while (i < lines.length) {
                const line = lines[i];
                if (!line.trim()) {
                    i++;
                    continue;
                }

                const fence = line.match(/^```(\w*)\s*$/);
                if (fence) {
                    i++;
                    const buf = [];
                    while (i < lines.length && !/^```\s*$/.test(lines[i])) {
                        buf.push(lines[i]);
                        i++;
                    }
                    i++;
                    const escaped = buf.join('\n').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                    const cls = fence[1] ? ' class="lang-' + fence[1] + '"' : '';
                    out.push('<pre><code' + cls + '>' + escaped + '</code></pre>');
                    continue;
                }

                const h = line.match(/^(#{1,6})\s+(.*)$/);
                if (h) {
                    out.push('<h' + h[1].length + '>' + inline(h[2]) + '</h' + h[1].length + '>');
                    i++;
                    continue;
                }

                if (/^\s*(?:-\s*){3,}\s*$/.test(line) || /^\s*\*{3,}\s*$/.test(line)) {
                    out.push('<hr>');
                    i++;
                    continue;
                }

                if (/^>\s?/.test(line)) {
                    const buf = [];
                    while (i < lines.length && /^>\s?/.test(lines[i])) {
                        buf.push(lines[i].replace(/^>\s?/, ''));
                        i++;
                    }
                    out.push('<blockquote>' + renderMarkdown(buf.join('\n')) + '</blockquote>');
                    continue;
                }

                if (tableRow.test(line) && i + 1 < lines.length && tableSep.test(lines[i + 1])) {
                    const headers = splitRow(line);
                    i += 2;
                    const rows = [];
                    while (i < lines.length && tableRow.test(lines[i])) {
                        rows.push(splitRow(lines[i]));
                        i++;
                    }
                    let html = '<table><thead><tr>';
                    headers.forEach(h => { html += '<th>' + inline(h) + '</th>'; });
                    html += '</tr></thead><tbody>';
                    rows.forEach(r => {
                        html += '<tr>';
                        r.forEach(c => { html += '<td>' + inline(c) + '</td>'; });
                        html += '</tr>';
                    });
                    html += '</tbody></table>';
                    out.push(html);
                    continue;
                }

                if (bullet.test(line) || ordered.test(line)) {
                    const isOrdered = ordered.test(line);
                    const re = isOrdered ? ordered : bullet;
                    const items = [];
                    while (i < lines.length && re.test(lines[i])) {
                        const m = lines[i].match(re);
                        let item = m[3];
                        i++;
                        while (i < lines.length && lines[i].trim() && !bullet.test(lines[i]) && !ordered.test(lines[i])) {
                            item += '\n' + lines[i].trim();
                            i++;
                        }
                        items.push('<li>' + inline(item) + '</li>');
                    }
                    out.push((isOrdered ? '<ol>' : '<ul>') + items.join('') + (isOrdered ? '</ol>' : '</ul>'));
                    continue;
                }

                const buf = [line];
                i++;
                while (i < lines.length && lines[i].trim() && !/^#{1,6}\s/.test(lines[i]) && !/^>\s?/.test(lines[i]) && !bullet.test(lines[i]) && !ordered.test(lines[i]) && !/^```/.test(lines[i]) && !tableRow.test(lines[i])) {
                    buf.push(lines[i]);
                    i++;
                }
                out.push('<p>' + inline(buf.join(' ')) + '</p>');
            }
            return out.join('\n');
        }

        // Block dispatcher. New block types plug in here.
        const renderers = {
            markdown: function (block) {
                const div = document.createElement('div');
                div.innerHTML = renderMarkdown(block.content);
                return div;
            },
            mermaid: function (block) {
                // Mermaid scans elements with class "mermaid" whose textContent
                // is the diagram source. We collect these nodes and run
                // mermaid.run() once after all blocks are in the DOM.
                const div = document.createElement('div');
                div.className = 'mermaid';
                div.textContent = block.content;
                return div;
            },
            'force-graph': function (block) {
                // build.py emits parsed JSON: {nodes:[{id,size}], links:[{source,target}]}.
                // We instantiate force-graph after the container is in the DOM
                // so it can measure its own width.
                const div = document.createElement('div');
                div.className = 'force-graph';
                const data = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.ForceGraph) return;
                    const maxSize = data.nodes.reduce((m, n) => Math.max(m, n.size || 1), 1);
                    window.ForceGraph()(div)
                        .graphData(data)
                        .width(div.clientWidth)
                        .height(div.clientHeight)
                        .nodeRelSize(4)
                        .nodeVal(n => Math.max(20 * (n.size || 1) / maxSize, 0.001))
                        .nodeLabel(n => n.id + ' (' + (n.size || 1) + ')')
                        .nodeColor(() => 'rgba(135, 206, 235, 0.7)')
                        .linkColor(() => 'rgba(60, 60, 60, 0.4)')
                        .linkDirectionalArrowLength(4)
                        .linkDirectionalArrowRelPos(1)
                        .linkWidth(1);
                });
                return div;
            },
            'bubble-chart': function (block) {
                // build.py emits {nodes:[{name,size}]}. Renders a D3 circle-pack
                // SVG (same shape as the obren.io reference, just inline).
                const wrap = document.createElement('div');
                wrap.className = 'bubble-chart';
                const payload = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.d3) return;
                    const diameter = 480;
                    const fill = '#c0deed';
                    const textColor = '#111111';
                    const fontSize = 12;

                    const svg = window.d3.select(wrap).append('svg')
                        .attr('viewBox', '0 0 ' + diameter + ' ' + diameter)
                        .attr('width', diameter)
                        .attr('height', diameter);

                    const root = window.d3.hierarchy({children: payload.nodes})
                        .sum(d => d.size || 0)
                        .sort((a, b) => b.value - a.value);

                    window.d3.pack().size([diameter, diameter]).padding(2)(root);

                    const node = svg.selectAll('g')
                        .data(root.leaves())
                        .enter().append('g')
                        .attr('transform', d => 'translate(' + d.x + ',' + d.y + ')');

                    node.append('title').text(d => d.data.name + ': ' + d.value);
                    node.append('circle').attr('r', d => d.r).style('fill', fill);
                    node.append('text')
                        .attr('dy', '.3em')
                        .style('text-anchor', 'middle')
                        .style('fill', textColor)
                        .style('font-size', fontSize + 'px')
                        .text(d => d.data.name.substring(0, Math.max(0, Math.floor(d.r / 3))));
                });
                return wrap;
            }
        };

        const mermaidNodes = [];
        data.blocks.forEach(function (block) {
            const r = renderers[block.type];
            if (!r) {
                const pre = document.createElement('pre');
                pre.textContent = '[unknown block type: ' + block.type + ']';
                root.appendChild(pre);
                return;
            }
            const node = r(block);
            if (node instanceof Node) {
                root.appendChild(node);
                if (block.type === 'mermaid') mermaidNodes.push(node);
            }
        });

        if (mermaidNodes.length && window.mermaid) {
            window.mermaid.initialize({startOnLoad: false, theme: 'default'});
            window.mermaid.run({nodes: mermaidNodes});
        }
    })();
</script>
