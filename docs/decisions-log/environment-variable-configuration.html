<script id="data" type="application/json">{"meta": {"title": "Environment variable configuration", "date": "2020-01-21 21:12:01 +0100", "author": "by Team", "permalink": "environment-variable-configuration", "excerpt": "We will configure applications via .env files, paired with a checked-in defaults file and a schema file. This follows the 12-factor pattern, keeps secrets out of source control, and matches the conventions our teams already know.", "logo": "assets/images/environment-variable-configuration/logo.jpeg", "logo_credit": "Image generated by Google Gemini (gemini-3.1-flash-image-preview)", "icon": "assets/icons/environment-variable-configuration.png"}, "tags": [], "blocks": [{"type": "markdown", "content": "> **Status**: Accepted (2020-01-21)\n>\n> **Decision**: All applications will read configuration from environment variables loaded from `.env` files at deploy time, with a checked-in `.env.defaults` for non-secret defaults and a `.env.schema` enumerating the keys an application expects.\n\n## Context\n\nWe want one build of an application to behave differently in different environments — development, test, demo, production — without rebuilding the binary or branching the source. We also want our configuration approach to:\n\n- Keep secrets out of the source code management system.\n- Be discoverable: a developer should be able to see what an app can be configured with, and what the defaults are.\n- Match the 12-factor (and 15-factor) conventions our teams already follow on other projects.\n\n## Decision\n\nWe will configure all applications via environment variables, populated from `.env` files. Each application will ship with:\n\n- A `.env.schema` file that lists every supported configuration key (checked in).\n- A `.env.defaults` file with non-secret default values (checked in).\n- An environment-specific `.env` file containing the actual values and any secrets (not checked in; managed by deploy tooling).\n\nSecrets in particular never live in `.env` files inside the repo.\n\n## Rationale\n\n1. **Matches industry practice.** The 12/15-factor app pattern is widely adopted, well understood, and broadly supported across our language runtimes (e.g. `dotenv` for Node, similar libraries elsewhere).\n2. **Team familiarity.** Our teams have used `.env`-style configuration on many previous projects successfully. Standardizing on it removes a per-project decision and reduces ramp-up cost.\n3. **Discoverability via schema.** A `.env.schema` makes the contract explicit: anyone touching the app can see at a glance what knobs exist. A missing key is a build-time question, not a runtime mystery.\n4. **Defaults via a separate file.** Keeping defaults in `.env.defaults` lets developers run the app locally without copying values around, while leaving the real `.env` for environment-specific overrides and secrets.\n5. **Simplicity.** Files are easier to reason about than a network call to a config server. We accept the trade-off (no central audit trail, no live reconfiguration) for now.\n\n## Implications\n\n1. **Secrets handling.** We need a separate mechanism for secrets — a vault, a secrets manager, or environment injection by the deploy platform. The `.env` mechanism only ever carries the values, never the secrets themselves in source.\n2. **DevOps integration.** We will add hooks, validators, and CI checks that compare a deploy's environment against the `.env.schema` so missing or extra keys fail fast.\n3. **Training.** All developers need to learn the convention — schema, defaults, and the rule about secrets — so the pattern is applied consistently across applications.\n4. **Existing applications.** Apps using a less capable approach (hardcoded config, in-source constants) will be migrated. Apps using a more capable approach (a dedicated config or licensing server) will be left alone unless there is a separate reason to change.\n5. **Reversibility.** The choice is easily reversible: moving from `.env` files to a config server later is a contained change at the boundary, not a rewrite.\n\n## Conclusion\n\n`.env` files plus a schema and defaults file is the simplest approach that meets our requirements, matches industry practice, and aligns with how our teams already work. We accept its limits — no centralized audit, no live reload — as fair trade-offs for now.\n\n---\n\nExample `.env`:\n\n```env\nNAME=Alice Anderson\nEMAIL=alice@example.com\n```\n\nExample `.env.defaults`:\n\n```env\nNAME=Joe Doe\nEMAIL=joe@example.com\n```\n\nExample `.env.schema` (keys only):\n\n```env\nNAME\nEMAIL\n```\n"}]}</script>
<script>
    (function () {
        const data = JSON.parse(document.getElementById('data').textContent);
        const root = document.getElementById('content');

        const tagsHost = document.getElementById('tags');
        (data.tags || []).forEach(function (t) {
            const span = document.createElement('span');
            span.className = 'tag';
            span.textContent = t;
            tagsHost.appendChild(span);
        });

        // Minimal markdown renderer. Supports: ATX headings, paragraphs, blockquotes,
        // unordered/ordered lists, fenced code, inline code, bold/italic, links, images, hr.
        // Sufficient for the posts in this repo; replace with a fuller parser if needed.
        function renderMarkdown(src) {
            const lines = src.replace(/\r\n/g, '\n').split('\n');
            const out = [];
            let i = 0;

            const bullet = /^(\s*)([-*])\s+(.*)$/;
            const ordered = /^(\s*)(\d+)\.\s+(.*)$/;

            function inline(s) {
                // Posts are trusted content, so raw HTML passes through unescaped
                // (some posts embed inline <blockquote>, <div>, etc.).
                // Stray ampersands still get fixed up.
                s = s.replace(/&(?![a-zA-Z]+;|#\d+;)/g, '&amp;');
                s = s.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img alt="$1" src="$2">');
                s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
                s = s.replace(/`([^`]+)`/g, function (_, c) {
                    return '<code>' + c.replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</code>';
                });
                s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
                s = s.replace(/(^|[^*])\*([^*\n]+)\*/g, '$1<em>$2</em>');
                return s;
            }

            while (i < lines.length) {
                const line = lines[i];
                if (!line.trim()) {
                    i++;
                    continue;
                }

                const fence = line.match(/^```(\w*)\s*$/);
                if (fence) {
                    i++;
                    const buf = [];
                    while (i < lines.length && !/^```\s*$/.test(lines[i])) {
                        buf.push(lines[i]);
                        i++;
                    }
                    i++;
                    const escaped = buf.join('\n').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                    const cls = fence[1] ? ' class="lang-' + fence[1] + '"' : '';
                    out.push('<pre><code' + cls + '>' + escaped + '</code></pre>');
                    continue;
                }

                const h = line.match(/^(#{1,6})\s+(.*)$/);
                if (h) {
                    out.push('<h' + h[1].length + '>' + inline(h[2]) + '</h' + h[1].length + '>');
                    i++;
                    continue;
                }

                if (/^\s*(?:-\s*){3,}\s*$/.test(line) || /^\s*\*{3,}\s*$/.test(line)) {
                    out.push('<hr>');
                    i++;
                    continue;
                }

                if (/^>\s?/.test(line)) {
                    const buf = [];
                    while (i < lines.length && /^>\s?/.test(lines[i])) {
                        buf.push(lines[i].replace(/^>\s?/, ''));
                        i++;
                    }
                    out.push('<blockquote>' + renderMarkdown(buf.join('\n')) + '</blockquote>');
                    continue;
                }

                if (bullet.test(line) || ordered.test(line)) {
                    const isOrdered = ordered.test(line);
                    const re = isOrdered ? ordered : bullet;
                    const items = [];
                    while (i < lines.length && re.test(lines[i])) {
                        const m = lines[i].match(re);
                        let item = m[3];
                        i++;
                        while (i < lines.length && lines[i].trim() && !bullet.test(lines[i]) && !ordered.test(lines[i])) {
                            item += '\n' + lines[i].trim();
                            i++;
                        }
                        items.push('<li>' + inline(item) + '</li>');
                    }
                    out.push((isOrdered ? '<ol>' : '<ul>') + items.join('') + (isOrdered ? '</ol>' : '</ul>'));
                    continue;
                }

                const buf = [line];
                i++;
                while (i < lines.length && lines[i].trim() && !/^#{1,6}\s/.test(lines[i]) && !/^>\s?/.test(lines[i]) && !bullet.test(lines[i]) && !ordered.test(lines[i]) && !/^```/.test(lines[i])) {
                    buf.push(lines[i]);
                    i++;
                }
                out.push('<p>' + inline(buf.join(' ')) + '</p>');
            }
            return out.join('\n');
        }

        // Block dispatcher. New block types plug in here.
        const renderers = {
            markdown: function (block) {
                const div = document.createElement('div');
                div.innerHTML = renderMarkdown(block.content);
                return div;
            },
            mermaid: function (block) {
                // Mermaid scans elements with class "mermaid" whose textContent
                // is the diagram source. We collect these nodes and run
                // mermaid.run() once after all blocks are in the DOM.
                const div = document.createElement('div');
                div.className = 'mermaid';
                div.textContent = block.content;
                return div;
            },
            'force-graph': function (block) {
                // build.py emits parsed JSON: {nodes:[{id,size}], links:[{source,target}]}.
                // We instantiate force-graph after the container is in the DOM
                // so it can measure its own width.
                const div = document.createElement('div');
                div.className = 'force-graph';
                const data = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.ForceGraph) return;
                    const maxSize = data.nodes.reduce((m, n) => Math.max(m, n.size || 1), 1);
                    window.ForceGraph()(div)
                        .graphData(data)
                        .width(div.clientWidth)
                        .height(div.clientHeight)
                        .nodeRelSize(4)
                        .nodeVal(n => Math.max(20 * (n.size || 1) / maxSize, 0.001))
                        .nodeLabel(n => n.id + ' (' + (n.size || 1) + ')')
                        .nodeColor(() => 'rgba(135, 206, 235, 0.7)')
                        .linkColor(() => 'rgba(60, 60, 60, 0.4)')
                        .linkDirectionalArrowLength(4)
                        .linkDirectionalArrowRelPos(1)
                        .linkWidth(1);
                });
                return div;
            },
            'bubble-chart': function (block) {
                // build.py emits {nodes:[{name,size}]}. Renders a D3 circle-pack
                // SVG (same shape as the obren.io reference, just inline).
                const wrap = document.createElement('div');
                wrap.className = 'bubble-chart';
                const payload = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.d3) return;
                    const diameter = 480;
                    const fill = '#c0deed';
                    const textColor = '#111111';
                    const fontSize = 12;

                    const svg = window.d3.select(wrap).append('svg')
                        .attr('viewBox', '0 0 ' + diameter + ' ' + diameter)
                        .attr('width', diameter)
                        .attr('height', diameter);

                    const root = window.d3.hierarchy({children: payload.nodes})
                        .sum(d => d.size || 0)
                        .sort((a, b) => b.value - a.value);

                    window.d3.pack().size([diameter, diameter]).padding(2)(root);

                    const node = svg.selectAll('g')
                        .data(root.leaves())
                        .enter().append('g')
                        .attr('transform', d => 'translate(' + d.x + ',' + d.y + ')');

                    node.append('title').text(d => d.data.name + ': ' + d.value);
                    node.append('circle').attr('r', d => d.r).style('fill', fill);
                    node.append('text')
                        .attr('dy', '.3em')
                        .style('text-anchor', 'middle')
                        .style('fill', textColor)
                        .style('font-size', fontSize + 'px')
                        .text(d => d.data.name.substring(0, Math.max(0, Math.floor(d.r / 3))));
                });
                return wrap;
            }
        };

        const mermaidNodes = [];
        data.blocks.forEach(function (block) {
            const r = renderers[block.type];
            if (!r) {
                const pre = document.createElement('pre');
                pre.textContent = '[unknown block type: ' + block.type + ']';
                root.appendChild(pre);
                return;
            }
            const node = r(block);
            if (node instanceof Node) {
                root.appendChild(node);
                if (block.type === 'mermaid') mermaidNodes.push(node);
            }
        });

        if (mermaidNodes.length && window.mermaid) {
            window.mermaid.initialize({startOnLoad: false, theme: 'default'});
            window.mermaid.run({nodes: mermaidNodes});
        }
    })();
</script>
