<script id="data" type="application/json">{"meta": {"title": "Product Domain as Source of Truth", "date": "2026-05-22", "author": "by Željko Obrenović (obren.io)", "permalink": "product-domain-as-source-of-truth", "timetoread": "7 min", "excerpt": "A product domain is the unit of memory in Spec-Driven Product Architecture: one folder that keeps customer value, strategy, delivery, product bricks, teams, roadmap, and evidence in a form AI agents can inspect and change.", "tags": "product domains, source of truth, json, static documentation", "icon": "assets/icons/product-domain-as-source-of-truth.png", "logo": "assets/images/product-domain-as-source-of-truth/logo.jpeg", "logo_credit": "Image generated by Google Gemini (gemini-3-pro-image-preview)"}, "tags": ["product domains", "source of truth", "json", "static documentation"], "modalities": [{"key": "index", "label": "Article", "meta": {}, "blocks": [{"type": "markdown", "content": "> A product domain is the unit of memory in Spec-Driven Product Architecture: one folder that keeps customer value, strategy, delivery, product bricks, teams, roadmap, and evidence in a form AI agents can inspect and change.\n\nThe central authoring unit in Spec-Driven Product Architecture is the product domain.\n\nA product domain is not just a market category and not just a software bounded context. It is the durable modeling boundary for a coherent product area: the customers it serves, the jobs it supports, the product strategy it pursues, the capabilities it needs, the product bricks that make those capabilities real, and the teams and roadmap that move it forward.\n\nIn the source project, domains live under [`_config/product-domains/<domain-id>/`](https://github.com/zeljkoobrenovic/spec-driven-product-architecture/tree/main/_config/product-domains).\n\nThat folder is the source of truth. The generated HTML under [`docs/product-domains/<domain-id>/`](https://github.com/zeljkoobrenovic/spec-driven-product-architecture/tree/main/docs/product-domains) is the review and publishing surface.\n\nThe next articles use Ride Sharing Marketplace as a running example. Its [source specification folder](https://github.com/zeljkoobrenovic/spec-driven-product-architecture/tree/main/_config/product-domains/ride-sharing-marketplace) shows the authored model, and its [generated documentation](https://zeljkoobrenovic.github.io/spec-driven-product-architecture/product-domains/ride-sharing-marketplace/start/index.html) shows the review surface produced from that model.\n\n![Real Estate Marketplace generated start page with cards for customers, insights, competition, product bricks, deployments, teams, objectives, KTLO, and releases.](assets/extras/screenshot_start_page_of_one_product_architecture.png)\n*A generated domain entry page turns the source folder into a navigable review surface. The cards are not separate documents; they are rendered views over the same product-domain model.*\n\n## Why The Domain Folder Matters\n\nAI agents need a place to return to. Without a stable source-of-truth folder, every prompt becomes a new negotiation about context. The agent may remember the previous conversation poorly, invent structure, or optimize one artifact while breaking another.\n\nThe domain folder gives the agent a working memory that is:\n\n- **structured** - files have expected names and schemas.\n- **inspectable** - future sessions can read the same source before making changes.\n- **cross-linked** - customers, capabilities, bricks, teams, and plans can refer to one another.\n- **validatable** - JSON can be parsed and references can be checked.\n- **publishable** - generated documentation lets humans review the model without reading raw JSON.\n\nThis is why the repository guidance says to start in [`_config/**`](https://github.com/zeljkoobrenovic/spec-driven-product-architecture/tree/main/_config), not in generated pages.\n\n## The Main Source Files\n\nThe current project contains many domains, including ride sharing, online retail, public cloud services, internal developer platforms, travel accommodations, premium airlines, enterprise CRM, and cloud data and AI platforms. They vary in content, but the modeling pattern is consistent.\n\n| Source area | Role in the model |\n| --- | --- |\n| [`_domain/DOMAIN.md`](https://github.com/zeljkoobrenovic/spec-driven-product-architecture/blob/main/_config/product-domains/ride-sharing-marketplace/_domain/DOMAIN.md) | Short framing note: why this domain exists and what it covers. |\n| [`start/config.json`](https://github.com/zeljkoobrenovic/spec-driven-product-architecture/blob/main/_config/product-domains/ride-sharing-marketplace/start/config.json) | Domain identity used by generated entry pages. |\n| [`customers/customers.json`](https://github.com/zeljkoobrenovic/spec-driven-product-architecture/blob/main/_config/product-domains/ride-sharing-marketplace/customers/customers.json) | Customer groups, personas, jobs to be done, KPI pyramids, strategy horizons, and outcomes. |\n| [`customers/insights.json`](https://github.com/zeljkoobrenovic/spec-driven-product-architecture/blob/main/_config/product-domains/ride-sharing-marketplace/customers/insights.json) | Research notes and customer insights where the domain uses them. |\n| [`product-deployments/products.json`](https://github.com/zeljkoobrenovic/spec-driven-product-architecture/blob/main/_config/product-domains/ride-sharing-marketplace/product-deployments/products.json) | Market-facing product surfaces and product lines. |\n| [`product-deployments/deployment.json`](https://github.com/zeljkoobrenovic/spec-driven-product-architecture/blob/main/_config/product-domains/ride-sharing-marketplace/product-deployments/deployment.json) | Deployment and delivery shape for those products. |\n| [`delivery/releases.json`](https://github.com/zeljkoobrenovic/spec-driven-product-architecture/blob/main/_config/product-domains/ride-sharing-marketplace/delivery/releases.json) | Concrete release and delivery planning artifacts. |\n| [`product-bricks/product-bricks.json`](https://github.com/zeljkoobrenovic/spec-driven-product-architecture/blob/main/_config/product-domains/ride-sharing-marketplace/product-bricks/product-bricks.json) | Implementation-facing brick catalog: systems, modules, dependencies, and data. |\n| [`product-bricks/product-capability.json`](https://github.com/zeljkoobrenovic/spec-driven-product-architecture/blob/main/_config/product-domains/ride-sharing-marketplace/product-bricks/product-capability.json) | Outcome-based capabilities composed from product bricks and external systems. |\n| [`objectives/...`](https://github.com/zeljkoobrenovic/spec-driven-product-architecture/tree/main/_config/product-domains/ride-sharing-marketplace/objectives) | Current, next, KTLO, archived objectives, initiatives, and discoveries. |\n| [`teams/teams.json`](https://github.com/zeljkoobrenovic/spec-driven-product-architecture/blob/main/_config/product-domains/ride-sharing-marketplace/teams/teams.json) | Ownership, team topology, responsibilities, coordination, and staffing assumptions. |\n| [`business/scorecard.json`](https://github.com/zeljkoobrenovic/spec-driven-product-architecture/blob/main/_config/product-domains/ride-sharing-marketplace/business/scorecard.json) and [`business/competition.json`](https://github.com/zeljkoobrenovic/spec-driven-product-architecture/blob/main/_config/product-domains/ride-sharing-marketplace/business/competition.json) | Business context, scorecard, market landscape, and sourced competitor facts. |\n| [`data/data-assets.json`](https://github.com/zeljkoobrenovic/spec-driven-product-architecture/blob/main/_config/product-domains/ride-sharing-marketplace/data/data-assets.json) | Data assets used or owned by the domain. |\n\nThe exact set can evolve, but the discipline should not: product architecture lives in source files, not in one-off prose.\n\n## Source First, Docs Second\n\nGenerated documentation is still important. It makes the model readable, searchable, and easier to review with stakeholders who do not want to inspect JSON.\n\nBut generated docs are not the place to make strategic changes.\n\nThe workflow should be:\n\n1. Edit the source model.\n2. Validate the source model.\n3. Generate the documentation.\n4. Review the rendered documentation.\n5. Return to source if the rendered story exposes a gap.\n\nThis matters because direct edits to generated pages cannot preserve the model. They may look good, but the next generation run overwrites them and the agent cannot reason from them reliably.\n\n## Stable IDs Are Part Of The Spec\n\nThe repository insists on lowercase stable IDs. That can feel like a mechanical rule, but it is a product-architecture rule.\n\nAn ID is how one part of the model can refer to another part without depending on display text. A capability can point to a brick. A team can own a brick. A roadmap item can reference a target. A data dependency can identify the module that owns or uses a data asset.\n\nNames can improve over time. IDs should survive those wording changes.\n\nFor AI agents, stable IDs reduce ambiguity. The agent can change \"Trip Request and Intent Capture\" to a better display name while preserving references to `trip`. That is the difference between editing a model and rewriting a document.\n\n## The Domain Is Not A Prompt\n\nPrompts are useful for creation. They are not sufficient for maintenance.\n\nA prompt can say, \"Create a product architecture model for a ride-sharing marketplace.\" The domain source files record what the agent actually decided: which rider groups exist, which jobs matter, which capabilities are needed, which bricks support those capabilities, which teams own them, and where assumptions remain.\n\nThat difference is essential. The prompt starts the work. The domain model preserves the work.\n\n## What Good Looks Like\n\nA strong domain model has a recognizable shape:\n\n- Customer groups are materially different, not duplicate personas with renamed labels.\n- Jobs to be done describe customer progress, not internal feature usage.\n- KPIs are measurable and tied to product outcomes.\n- Product capabilities are outcome-based.\n- Product bricks are buildable and ownable.\n- Teams can plausibly own the bricks.\n- Roadmap and delivery objects point back to customers, capabilities, bricks, or teams.\n- Evidence and assumptions are visible enough for future reviewers.\n\nThat is the source-of-truth discipline behind [What Is Spec-Driven Product Architecture?](what-is-spec-driven-product-architecture.html). The next article, [From Customer Value to Architecture](customer-value-to-architecture.html), starts at the top of that source model: customer value.\n"}]}, {"key": "summary", "label": "Summary", "meta": {"timetoread": "2 min"}, "blocks": [{"type": "markdown", "content": "The product domain folder is the durable source of truth in Spec-Driven Product Architecture. One folder per domain — [`_config/product-domains/<domain-id>/`](https://github.com/zeljkoobrenovic/spec-driven-product-architecture/tree/main/_config/product-domains) in the source project — keeps customer value, strategy, delivery, product bricks, teams, roadmap, and evidence as structured source files; the generated documentation under `docs/` is the review and publishing surface, never the place to make changes.\n\nThe reason is operational: AI agents need a place to return to. Without a stable source-of-truth folder, every prompt becomes a new negotiation about context — the agent remembers the previous conversation poorly, invents structure, or optimizes one artifact while breaking another. The domain folder is the working memory that makes [What Is Spec-Driven Product Architecture?](what-is-spec-driven-product-architecture.html) practical.\n\n**What changes**\n\n- The product domain — not the document, the deck, or the prompt — is the main modeling boundary: the customers a product area serves, the strategy it pursues, the capabilities it needs, the bricks that realize them, and the teams and roadmap that move it forward.\n- Architecture facts live in named, schema-shaped source files: `customers.json`, `product-bricks.json`, `product-capability.json`, `teams.json`, objectives, releases, business scorecard and competition, and data assets — structured, inspectable, cross-linked, validatable, and publishable.\n- The workflow is source-first: edit the model, validate it, generate the documentation, review the rendered story, and return to source when review exposes a gap.\n- Stable lowercase IDs become part of the spec: display names can improve over time while references between capabilities, bricks, teams, and roadmap items survive — the difference between editing a model and rewriting a document.\n- Ride Sharing Marketplace is the series' running example: its [source folder](https://github.com/zeljkoobrenovic/spec-driven-product-architecture/tree/main/_config/product-domains/ride-sharing-marketplace) shows the authored model and its [generated documentation](https://zeljkoobrenovic.github.io/spec-driven-product-architecture/product-domains/ride-sharing-marketplace/start/index.html) shows the review surface produced from it.\n\n**What it costs**\n\n- The model must be maintained as structured JSON with validation discipline; a prompt can start the work, but only the domain files preserve it.\n- Polished generated pages cannot be hand-fixed: edits there are overwritten by the next generation run, so gaps found in review must travel back to the source — slower than touching up HTML, but it is what keeps the model real.\n\n**What we are not doing**\n\n- Not an exhaustive JSON schema reference — the file set can evolve; the discipline should not.\n- Not a step-by-step domain creation tutorial.\n- Not a comparison with enterprise architecture repository tools.\n\nThe Article tab catalogs the source files, the source-first workflow, and what a good domain model looks like. The series continues with [From Customer Value to Architecture](customer-value-to-architecture.html), starting at the top of the model: customer value.\n"}]}, {"key": "dialog", "label": "Conversation", "meta": {"timetoread": "8 min listen"}, "blocks": [{"type": "markdown", "content": "## Why a folder?\n\n**Ben:** Last time you sold me an eight-layer model of the product domain. Now the follow-up is — what, a folder? \"Where the files live\" sounds like the least interesting question in product architecture.\n\n**Ana:** It sounds like a filing question, but it's actually a memory question. AI agents need a place to return to. Without a stable source-of-truth folder, every prompt becomes a new negotiation about context. The agent remembers the previous conversation poorly, invents structure, or optimizes one artifact while quietly breaking another.\n\n**Ben:** So the folder is the agent's working memory.\n\n**Ana:** Exactly. In the source project, every domain lives under `_config/product-domains/<domain-id>/`. That folder is the source of truth. And the memory has properties, not just a location: it's structured — files have expected names and schemas. It's inspectable — a future session reads the same source before changing anything. It's cross-linked — customers, capabilities, bricks, teams, and plans refer to one another. It's validatable — JSON parses, references can be checked. And it's publishable — generated documentation lets humans review the model without reading raw JSON.\n\n**Ben:** And the generated documentation — the nice HTML pages — is what, second-class?\n\n**Ana:** It's the review and publishing surface. Important, but downstream. The repository guidance is blunt about it: start in `_config`, not in generated pages.\n\n## What's actually in the folder\n\n**Ben:** Okay, open the folder for me. What am I looking at?\n\n**Ana:** A consistent pattern. A short `DOMAIN.md` framing note — why this domain exists. `customers.json` with customer groups, personas, jobs to be done, KPI pyramids, strategy horizons, and outcomes; `insights.json` for research notes. Product surfaces and their deployment shape. `releases.json` for delivery planning. The implementation-facing side: `product-bricks.json` — systems, modules, dependencies, data — and `product-capability.json` — outcome-based capabilities composed from bricks. Then objectives, `teams.json` for ownership and topology, a business scorecard and competition file, and data assets.\n\n**Ben:** That's a lot of JSON. You're describing an enterprise architecture repository with extra steps.\n\n**Ana:** I'm deliberately not going to litigate EA tooling here — that comparison is explicitly out of scope for this record. What I'll say is that the pattern holds across very different domains in the project: ride sharing, online retail, public cloud services, internal developer platforms, premium airlines, enterprise CRM. The contents vary; the modeling pattern is consistent. And the exact file set can evolve. The discipline is the durable part: product architecture lives in source files, not in one-off prose.\n\n**Ben:** Is there a concrete one I can actually look at, or is this all hypothetical?\n\n**Ana:** Ride Sharing Marketplace — it's the running example for the whole series. Its source specification folder is public, and so is the generated documentation built from it. You can hold the authored model in one hand and the review surface in the other and see that they're the same thing rendered twice.\n\n## Source first, docs second\n\n**Ben:** Here's my honest objection. The generated pages are readable. The JSON is not. When a stakeholder spots a problem on a rendered page, the fastest fix is to edit the page. Why is that wrong?\n\n**Ana:** Because direct edits to generated pages cannot preserve the model. They may look good for a day. Then the next generation run overwrites them, and in the meantime the agent can't reason from them — the fix exists only in HTML, disconnected from the customers, bricks, and teams it should relate to.\n\n**Ben:** So what's the loop supposed to be?\n\n**Ana:** Five steps. Edit the source model. Validate it. Generate the documentation. Review the rendered story. And — this is the step people skip — return to source if the rendered story exposes a gap. The generated docs are genuinely important: they make the model readable, searchable, reviewable with people who will never open JSON. They're just not the place to make strategic changes.\n\n**Ben:** That loop is slower than editing the page.\n\n**Ana:** Per edit, yes. Across the life of the model, no — because every shortcut edit to a generated page is work the model loses. You pay once for discipline or repeatedly for drift.\n\n## The case for boring IDs\n\n**Ben:** The repository apparently insists on lowercase stable IDs. That's the kind of rule that makes me suspect a style guide got out of hand.\n\n**Ana:** It reads as a mechanical rule, but it's a product-architecture rule. An ID is how one part of the model refers to another part without depending on display text. A capability points to a brick. A team owns a brick. A roadmap item references a target. A data dependency identifies the module that owns a data asset. Names can improve over time; IDs survive the rewording.\n\n**Ben:** Give me the concrete version.\n\n**Ana:** An agent can rename \"Trip Request and Intent Capture\" to something better while every reference to `trip` keeps working. That's the difference between editing a model and rewriting a document. For AI agents specifically, stable IDs collapse ambiguity — the agent doesn't have to guess whether two differently-worded labels mean the same thing.\n\n## Why not just prompt it again?\n\n**Ben:** Let me try the lazier alternative. Agents are good now. Why maintain a folder at all? Whenever I need the architecture, I prompt: \"Create a product architecture model for a ride-sharing marketplace.\" Fresh every time.\n\n**Ana:** A prompt is useful for creation and insufficient for maintenance. That prompt will give you *a* model — plausible, well-formatted, and disconnected from every decision you've actually made. The domain source files record what was actually decided: which rider groups exist, which jobs matter, which capabilities are needed, which bricks support them, which teams own them, and where the assumptions still live.\n\n**Ben:** The prompt starts the work, the model preserves it.\n\n**Ana:** That's the line, yes. And it's why this record exists as a foundation for the rest of the series — everything downstream, from [From Customer Value to Architecture](customer-value-to-architecture.html) to [Product Bricks and Capabilities](product-bricks-and-capabilities.html), assumes there's one place where those decisions accumulate instead of evaporating between sessions.\n\n## What good looks like\n\n**Ben:** Suppose a team adopts this and produces a folder full of dutiful JSON. How do I tell a living model from cargo-cult compliance?\n\n**Ana:** Good models have a recognizable shape. Customer groups are materially different — not duplicate personas with renamed labels. Jobs to be done describe customer progress, not internal feature usage. KPIs are measurable and tied to product outcomes. Capabilities are outcome-based; bricks are buildable and ownable; the teams listed can plausibly own them. Roadmap and delivery objects point back to customers, capabilities, bricks, or teams. And evidence and assumptions are visible enough for future reviewers to challenge.\n\n**Ben:** Closing duty, then: what is this record *not* claiming?\n\n**Ana:** Three non-goals, stated up front. It's not an exhaustive JSON schema reference — the layers and the discipline matter more than field-by-field detail. It's not a step-by-step domain creation tutorial. And it's not a comparison with enterprise architecture repository tools, however much you'd enjoy that fight. One open question is parked too: whether a small folder-tree diagram earns its place in a later visual pass.\n\n**Ben:** So: one folder, source before docs, IDs before names, and a prompt is a starting gun, not a record.\n\n**Ana:** That's the source-of-truth discipline behind [What Is Spec-Driven Product Architecture?](what-is-spec-driven-product-architecture.html). Next we climb to the top of the model — [From Customer Value to Architecture](customer-value-to-architecture.html) — and start where the folder starts: customer value.\n"}]}, {"key": "comics", "label": "Comic", "meta": {"timetoread": "3 min"}, "blocks": [{"type": "markdown", "content": "<!-- comic-style\n{\n  \"cast\": \"MAYA: a pragmatic product architect, short dark hair, glasses, rolled-up sleeves, calm and slightly amused, often holding a marker or tablet. REX: an over-eager boxy robot AI assistant, one bent antenna, glowing rectangular eyes, perpetually holding or printing too many documents.\",\n  \"style\": \"Clean two-tone explainer comic, thick ink outlines, flat colors with blue/teal accents on a light cream background, generous white space, hand-lettered speech bubbles with SHORT readable text (max 8 words per bubble), simple geometric office/whiteboard settings, no photorealism, no dense text, no title text.\"\n}\n-->\n\nWhy one folder — not the pretty pages — holds the product architecture, in eight panels.\n\n![Comic panel: a boxy robot boots up at a messy desk and asks what was decided, while the architect sighs.](assets/images/product-domain-as-source-of-truth/comic-01-fresh-session-amnesia.jpeg)\n**Panel 1:** *Without a place to return to, every prompt is a new negotiation about context.*\n\n![Comic panel: a robot proudly builds a wobbly tower of mismatched documents while another pile topples over.](assets/images/product-domain-as-source-of-truth/comic-02-inventing-structure.jpeg)\n**Panel 2:** *The agent invents structure, or optimizes one artifact while quietly breaking another.*\n\n![Comic panel: a robot paints a fix onto a framed generated page while a machine prints a replacement behind it.](assets/images/product-domain-as-source-of-truth/comic-03-painting-the-mirror.jpeg)\n**Panel 3:** *Generated pages are overwritten on the next run — edits there cannot preserve the model.*\n\n![Comic panel: the architect presents one folder with labeled drawers for customers, bricks, teams, roadmap, and evidence.](assets/images/product-domain-as-source-of-truth/comic-04-one-folder-of-truth.jpeg)\n**Panel 4:** *The decision: one domain folder holds the whole model — structured, inspectable, cross-linked.*\n\n![Comic panel: a five-step loop on a whiteboard from editing source to reviewing docs and back to source.](assets/images/product-domain-as-source-of-truth/comic-05-the-source-first-loop.jpeg)\n**Panel 5:** *The workflow: edit the source, validate, generate, review — and return to source when review finds a gap.*\n\n![Comic panel: a robot swaps a display-name sign while a small ID tag keeps its strings connected to other model parts.](assets/images/product-domain-as-source-of-truth/comic-06-the-id-survives.jpeg)\n**Panel 6:** *Stable IDs are part of the spec: names can improve, references survive the rewording.*\n\n![Comic panel: a robot fixes a cracked JSON brick at a validation gate while a shortcut to a pretty page is roped off.](assets/images/product-domain-as-source-of-truth/comic-07-the-price-of-discipline.jpeg)\n**Panel 7:** *The cost: structured JSON and validation discipline — slower per edit, but the model stays real.*\n\n![Comic panel: the robot opens the domain folder in a fresh session and happily resumes work while the architect smiles.](assets/images/product-domain-as-source-of-truth/comic-08-memory-that-returns.jpeg)\n**Panel 8:** *The payoff: the prompt starts the work; the domain folder preserves it across every session.*\n"}]}]}</script>
<script>
    (function () {
        const data = JSON.parse(document.getElementById('data').textContent);
        const root = document.getElementById('content');

        const postId = (data.meta && data.meta.id) ? String(data.meta.id) : '';
        const postStatusRaw = (data.meta && data.meta.status) ? String(data.meta.status) : '';
        if (postId || postStatusRaw) {
            const header = document.getElementById('post-header');
            let sectionEl = header.querySelector('p.section');
            if (!sectionEl) {
                sectionEl = document.createElement('p');
                sectionEl.className = 'section';
                header.insertBefore(sectionEl, header.firstChild);
            }
            // Status pill goes first, then a " / " separator before the existing
            // content (section name and/or id).
            if (postStatusRaw) {
                const parts = postStatusRaw.split(':');
                const statusName = parts[0].trim();
                const statusColor = (parts[1] || '').trim();
                const wrap = document.createElement('span');
                wrap.className = 'post-status';
                const dot = document.createElement('span');
                dot.className = 'status-dot';
                if (statusColor) dot.style.background = statusColor;
                wrap.appendChild(dot);
                wrap.appendChild(document.createTextNode(statusName));
                if (sectionEl.firstChild) {
                    sectionEl.insertBefore(document.createTextNode(' • '), sectionEl.firstChild);
                    sectionEl.insertBefore(wrap, sectionEl.firstChild);
                } else {
                    sectionEl.appendChild(wrap);
                }
            }
            if (postId) {
                if (sectionEl.firstChild) sectionEl.appendChild(document.createTextNode(' • '));
                sectionEl.appendChild(document.createTextNode(postId));
            }
        }

        const tagsHost = document.getElementById('tags');
        (data.tags || []).forEach(function (t) {
            const span = document.createElement('span');
            span.className = 'tag';
            span.textContent = t;
            tagsHost.appendChild(span);
        });

        // Minimal markdown renderer. Supports: ATX headings, paragraphs, blockquotes,
        // unordered/ordered lists, fenced code, inline code, bold/italic/strikethrough, links, images, hr.
        // Sufficient for the posts in this repo; replace with a fuller parser if needed.
        function renderMarkdown(src) {
            const lines = src.replace(/\r\n/g, '\n').split('\n');
            const out = [];
            let i = 0;

            const bullet = /^(\s*)([-*])\s+(.*)$/;
            const ordered = /^(\s*)(\d+)\.\s+(.*)$/;
            const tableRow = /^\s*\|(.+)\|\s*$/;
            const tableSep = /^\s*\|?\s*:?-{3,}:?\s*(\|\s*:?-{3,}:?\s*)+\|?\s*$/;

            function splitRow(s) {
                let t = s.trim();
                if (t.startsWith('|')) t = t.slice(1);
                if (t.endsWith('|')) t = t.slice(0, -1);
                return t.split('|').map(c => c.trim());
            }

            function inline(s) {
                // Posts are trusted content, so raw HTML passes through unescaped
                // (some posts embed inline <blockquote>, <div>, etc.).
                // Stray ampersands still get fixed up.
                s = s.replace(/&(?![a-zA-Z]+;|#\d+;)/g, '&amp;');
                s = s.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<a class="image-link" href="$2" target="_blank" rel="noopener noreferrer"><img alt="$1" src="$2"></a>');
                s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
                s = s.replace(/`([^`]+)`/g, function (_, c) {
                    return '<code>' + c.replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</code>';
                });
                s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
                s = s.replace(/~~([^~\n]+)~~/g, '<del>$1</del>');
                s = s.replace(/(^|[^*])\*([^*\n]+)\*/g, '$1<em>$2</em>');
                return s;
            }

            while (i < lines.length) {
                const line = lines[i];
                if (!line.trim()) {
                    i++;
                    continue;
                }

                const fence = line.match(/^```(\w*)\s*$/);
                if (fence) {
                    i++;
                    const buf = [];
                    while (i < lines.length && !/^```\s*$/.test(lines[i])) {
                        buf.push(lines[i]);
                        i++;
                    }
                    i++;
                    const escaped = buf.join('\n').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                    const cls = fence[1] ? ' class="lang-' + fence[1] + '"' : '';
                    out.push('<pre><code' + cls + '>' + escaped + '</code></pre>');
                    continue;
                }

                const h = line.match(/^(#{1,6})\s+(.*)$/);
                if (h) {
                    out.push('<h' + h[1].length + '>' + inline(h[2]) + '</h' + h[1].length + '>');
                    i++;
                    continue;
                }

                if (/^\s*(?:-\s*){3,}\s*$/.test(line) || /^\s*\*{3,}\s*$/.test(line)) {
                    out.push('<hr>');
                    i++;
                    continue;
                }

                if (/^>\s?/.test(line)) {
                    const buf = [];
                    while (i < lines.length && /^>\s?/.test(lines[i])) {
                        buf.push(lines[i].replace(/^>\s?/, ''));
                        i++;
                    }
                    out.push('<blockquote>' + renderMarkdown(buf.join('\n')) + '</blockquote>');
                    continue;
                }

                if (tableRow.test(line) && i + 1 < lines.length && tableSep.test(lines[i + 1])) {
                    const headers = splitRow(line);
                    i += 2;
                    const rows = [];
                    while (i < lines.length && tableRow.test(lines[i])) {
                        rows.push(splitRow(lines[i]));
                        i++;
                    }
                    let html = '<table><thead><tr>';
                    headers.forEach(h => {
                        html += '<th>' + inline(h) + '</th>';
                    });
                    html += '</tr></thead><tbody>';
                    rows.forEach(r => {
                        html += '<tr>';
                        r.forEach(c => {
                            html += '<td>' + inline(c) + '</td>';
                        });
                        html += '</tr>';
                    });
                    html += '</tbody></table>';
                    out.push(html);
                    continue;
                }

                if (bullet.test(line) || ordered.test(line)) {
                    // Indent of the first bullet defines this list's base level.
                    // Deeper-indented bullets become nested lists (rendered by
                    // recursing into renderMarkdown). Same-or-less indent at a
                    // bullet starts a sibling item (or ends the list).
                    const firstMatch = line.match(bullet) || line.match(ordered);
                    const baseIndent = firstMatch[1].length;
                    const isOrdered = ordered.test(line);
                    const items = [];
                    while (i < lines.length) {
                        const cur = lines[i];
                        if (!cur.trim()) {
                            // blank line breaks the list (matches CommonMark-ish behaviour)
                            i++;
                            break;
                        }
                        const mBul = cur.match(bullet);
                        const mOrd = cur.match(ordered);
                        const m = mBul || mOrd;
                        if (!m) break;
                        if (m[1].length < baseIndent) break;
                        if (m[1].length > baseIndent) break; // shouldn't happen at top of loop
                        // Same-type check: switching between -/* and 1. closes the list
                        if (isOrdered !== !!mOrd) break;

                        const itemBuf = [m[3]];
                        const nestedBuf = [];
                        i++;
                        while (i < lines.length) {
                            const nxt = lines[i];
                            if (!nxt.trim()) break;
                            const nBul = nxt.match(bullet);
                            const nOrd = nxt.match(ordered);
                            const nm = nBul || nOrd;
                            if (nm) {
                                if (nm[1].length > baseIndent) {
                                    // nested list line — dedent and stash
                                    nestedBuf.push(nxt.slice(baseIndent + 2));
                                    i++;
                                    continue;
                                }
                                // sibling or end of list
                                break;
                            }
                            // Plain continuation text
                            if (nestedBuf.length) {
                                // continuation inside the nested block
                                nestedBuf.push(nxt.slice(baseIndent + 2));
                            } else {
                                itemBuf.push(nxt.trim());
                            }
                            i++;
                        }

                        let liHtml = inline(itemBuf.join('\n'));
                        if (nestedBuf.length) {
                            liHtml += renderMarkdown(nestedBuf.join('\n'));
                        }
                        items.push('<li>' + liHtml + '</li>');
                    }
                    out.push((isOrdered ? '<ol>' : '<ul>') + items.join('') + (isOrdered ? '</ol>' : '</ul>'));
                    continue;
                }

                const buf = [line];
                i++;
                while (i < lines.length && lines[i].trim() && !/^#{1,6}\s/.test(lines[i]) && !/^>\s?/.test(lines[i]) && !bullet.test(lines[i]) && !ordered.test(lines[i]) && !/^```/.test(lines[i]) && !tableRow.test(lines[i])) {
                    buf.push(lines[i]);
                    i++;
                }
                out.push('<p>' + inline(buf.join(' ')) + '</p>');
            }
            return out.join('\n');
        }

        // Block dispatcher. New block types plug in here.
        const renderers = {
            markdown: function (block) {
                const div = document.createElement('div');
                div.innerHTML = renderMarkdown(block.content);
                return div;
            },
            mermaid: function (block) {
                // Mermaid scans elements with class "mermaid" whose textContent
                // is the diagram source. We collect these nodes and run
                // mermaid.run() once after all blocks are in the DOM.
                const div = document.createElement('div');
                div.className = 'mermaid';
                div.textContent = block.content;
                return div;
            },
            'force-graph': function (block) {
                // build.py emits parsed JSON: {nodes:[{id,size}], links:[{source,target}]}.
                // We instantiate force-graph after the container is in the DOM
                // so it can measure its own width.
                const div = document.createElement('div');
                div.className = 'force-graph';
                const data = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.ForceGraph) return;
                    const maxSize = data.nodes.reduce((m, n) => Math.max(m, n.size || 1), 1);
                    window.ForceGraph()(div)
                        .graphData(data)
                        .width(div.clientWidth)
                        .height(div.clientHeight)
                        .nodeRelSize(4)
                        .nodeVal(n => Math.max(20 * (n.size || 1) / maxSize, 0.001))
                        .nodeLabel(n => n.id + ' (' + (n.size || 1) + ')')
                        .nodeColor(() => 'rgba(135, 206, 235, 0.7)')
                        .linkColor(() => 'rgba(60, 60, 60, 0.4)')
                        .linkDirectionalArrowLength(4)
                        .linkDirectionalArrowRelPos(1)
                        .linkWidth(1);
                });
                return div;
            },
            'bubble-chart': function (block) {
                // build.py emits {nodes:[{name,size}]}. Renders a D3 circle-pack
                // SVG (same shape as the obren.io reference, just inline).
                const wrap = document.createElement('div');
                wrap.className = 'bubble-chart';
                const payload = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.d3) return;
                    const diameter = 480;
                    const fill = '#c0deed';
                    const textColor = '#111111';
                    const fontSize = 12;

                    const svg = window.d3.select(wrap).append('svg')
                        .attr('viewBox', '0 0 ' + diameter + ' ' + diameter)
                        .attr('width', diameter)
                        .attr('height', diameter);

                    const root = window.d3.hierarchy({children: payload.nodes})
                        .sum(d => d.size || 0)
                        .sort((a, b) => b.value - a.value);

                    window.d3.pack().size([diameter, diameter]).padding(2)(root);

                    const node = svg.selectAll('g')
                        .data(root.leaves())
                        .enter().append('g')
                        .attr('transform', d => 'translate(' + d.x + ',' + d.y + ')');

                    node.append('title').text(d => d.data.name + ': ' + d.value);
                    node.append('circle').attr('r', d => d.r).style('fill', fill);
                    node.append('text')
                        .attr('dy', '.3em')
                        .style('text-anchor', 'middle')
                        .style('fill', textColor)
                        .style('font-size', fontSize + 'px')
                        .text(d => d.data.name.substring(0, Math.max(0, Math.floor(d.r / 3))));
                });
                return wrap;
            }
        };

        // Render one modality's blocks into a host element. Mermaid runs
        // scoped to just the nodes created here, so lazily rendered tabs get
        // their diagrams on first activation.
        let mermaidInitialized = false;
        function renderBlocksInto(blocks, host) {
            const mermaidNodes = [];
            blocks.forEach(function (block) {
                const r = renderers[block.type];
                if (!r) {
                    const pre = document.createElement('pre');
                    pre.textContent = '[unknown block type: ' + block.type + ']';
                    host.appendChild(pre);
                    return;
                }
                const node = r(block);
                if (node instanceof Node) {
                    host.appendChild(node);
                    if (block.type === 'mermaid') mermaidNodes.push(node);
                }
            });
            if (mermaidNodes.length && window.mermaid) {
                if (!mermaidInitialized) {
                    window.mermaid.initialize({startOnLoad: false, theme: 'default'});
                    mermaidInitialized = true;
                }
                window.mermaid.run({nodes: mermaidNodes});
            }
        }

        // Modality tabs. One <article class="pane"> per modality; panes are
        // rendered lazily on first activation (force-graph / D3 / mermaid
        // need a visible, measurable container). With a single modality the
        // tab bar stays hidden and the page looks exactly like before.
        const mods = data.modalities;
        const tabBar = document.getElementById('modality-tabs');
        const panes = {};
        const tabButtons = {};
        const renderedPanes = {};

        mods.forEach(function (m) {
            const pane = document.createElement('article');
            pane.className = 'pane';
            pane.dataset.key = m.key;
            pane.hidden = true;
            root.appendChild(pane);
            panes[m.key] = pane;
        });

        const defaultKey = mods.some(m => m.key === 'index') ? 'index' : mods[0].key;

        function activate(key, updateHash) {
            mods.forEach(function (m) {
                const isActive = m.key === key;
                panes[m.key].hidden = !isActive;
                if (tabButtons[m.key]) {
                    tabButtons[m.key].classList.toggle('active', isActive);
                    tabButtons[m.key].setAttribute('aria-selected', isActive ? 'true' : 'false');
                }
            });
            // Unhide first, then render: the chart libraries measure widths.
            if (!renderedPanes[key]) {
                renderBlocksInto(mods.find(m => m.key === key).blocks, panes[key]);
                renderedPanes[key] = true;
            }
            if (updateHash) {
                history.replaceState(null, '',
                    key === defaultKey ? location.pathname + location.search : '#' + key);
            }
        }

        if (mods.length > 1) {
            mods.forEach(function (m) {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.textContent = m.label;
                btn.setAttribute('role', 'tab');
                btn.addEventListener('click', function () { activate(m.key, true); });
                tabBar.appendChild(btn);
                tabButtons[m.key] = btn;
            });
            tabBar.hidden = false;
        }

        // The hash selects a tab only when it matches a modality key, so
        // existing anchors keep working.
        const initialHash = location.hash.slice(1);
        activate(mods.some(m => m.key === initialHash) ? initialHash : defaultKey, false);
        window.addEventListener('hashchange', function () {
            const k = location.hash.slice(1);
            if (mods.some(m => m.key === k)) activate(k, false);
        });
    })();
</script>
