<script id="data" type="application/json">{"meta": {"title": "Delivery, Teams, and Roadmaps", "date": "2026-05-22", "author": "by Željko Obrenović (obren.io)", "permalink": "delivery-teams-and-roadmaps", "timetoread": "8 min", "excerpt": "A product architecture model becomes operable when delivery, team ownership, objectives, releases, targets, and roadmap overlays are connected to the same customer and brick model.", "tags": "delivery, teams, roadmap, product architecture", "icon": "assets/icons/delivery-teams-and-roadmaps.png", "logo": "assets/images/delivery-teams-and-roadmaps/logo.jpeg", "logo_credit": "Image generated by Google Gemini (gemini-3-pro-image-preview)"}, "tags": ["delivery", "teams", "roadmap", "product architecture"], "modalities": [{"key": "index", "label": "Article", "meta": {}, "blocks": [{"type": "markdown", "content": "> A product architecture model becomes operable when delivery, team ownership, objectives, releases, targets, and roadmap overlays are connected to the same customer and brick model.\n\nProduct architecture is often described as structure. Delivery is often described as process. Team design is often described as organization.\n\nIn practice, they are inseparable.\n\nA product architecture that ignores delivery cannot explain how change happens. A delivery plan that ignores architecture cannot explain what is being changed. A team model that ignores product bricks cannot explain who owns the durable parts of the product.\n\nSpec-Driven Product Architecture keeps these concerns in the same domain model.\n\n## Delivery Is Part Of The Architecture\n\nDelivery artifacts describe how the product reaches customers and how change reaches production.\n\nIn the source project, delivery can include:\n\n- channels and touchpoints\n- APIs and events\n- operational workflows\n- MVP scope\n- releases\n- capability mappings\n- delivery risks and constraints\n\nThat information is architectural because it shapes interfaces, dependencies, reliability needs, and ownership boundaries.\n\nFor example, a product that is delivered through mobile apps, partner APIs, and backoffice operations has a different architecture than a product delivered only through a web workflow. A product with regulated approvals has different delivery constraints than a consumer experiment platform. A marketplace with live supply-demand balancing has different release risk than a static content site.\n\nThe delivery model records those differences explicitly.\n\n![Product deployment view showing market-facing platforms, their customers, interfaces, channels, and related bricks.](assets/extras/screenshot_product_deployments.png)\n*Deployment views connect the product promise to concrete channels and interfaces. They make it harder to discuss delivery without noticing which surfaces, bricks, and customers are affected.*\n\n## Teams Own Bricks, Not Just Tasks\n\nTeam design becomes clearer when product bricks exist.\n\nTeams can be stream-aligned, platform, enabling, data, reliability, compliance, finance, trust, or operational-control teams. The exact shape depends on the domain. The important rule is that teams should have a plausible relationship to the bricks and capabilities they affect.\n\nA team model should answer:\n\n- Which product bricks does this team own?\n- Which capabilities does this team enable or coordinate?\n- Which dependencies create collaboration needs?\n- Which operating responsibilities are ongoing?\n- Which teams need platform support, data support, reliability support, or compliance support?\n\n![Teams overview showing role blocks, headcount, group leadership, and stream-aligned teams in the Real Estate Marketplace model.](assets/extras/screenshot_product_teams.png)\n*A team view gives the architecture an ownership surface. It shows whether the model has enough staffing and topology detail to support the bricks and capabilities it names.*\n\nThis does not mean every brick has a single isolated team. Some capabilities require multiple teams. Some platform bricks serve many teams. Some operating workflows require handoffs. But the model should make those realities visible.\n\nHidden ownership is one of the fastest ways for product architecture to decay.\n\n![Team dependency view showing explicit team relationships and shared product-brick dependencies for a homepage team.](assets/extras/screenshot_product_one_team_dependecies.png)\n*The dependency view exposes coordination work. A team can appear well-scoped on paper and still depend on shared bricks, enabling teams, or supporting platforms that need to be planned explicitly.*\n\n## Roadmaps Need Model References\n\nRoadmaps are often written as lists of initiatives. That is useful for planning but weak for architecture unless the initiatives point back to the model.\n\nA strong roadmap item can reference:\n\n- customer groups or jobs it improves\n- KPIs it should move\n- capabilities it creates or changes\n- product bricks it builds, evolves, or retires\n- teams involved\n- delivery releases or targets\n- evidence and assumptions\n\nThis makes roadmap discussion more concrete. Instead of asking only \"what are we doing next quarter?\" the model supports questions such as:\n\n- Which customer outcome does this item change?\n- Which bricks are affected?\n- Which team owns the long-term capability after delivery?\n- Which dependencies make this item risky?\n- Which target state does it move us toward?\n- Which assumptions must be validated first?\n\nThe roadmap becomes an overlay on the architecture, not a disconnected plan.\n\n![Releases overview showing release timing, affected customers, product channels, and product bricks.](assets/extras/screenshot_releases.png)\n*A release view becomes more useful when scope is tied back to customers, channels, and bricks. It lets reviewers discuss sequencing as architecture, not only as calendar management.*\n\n## Objectives And Discoveries Belong In The Same Story\n\nThe source project also models objectives, initiatives, discoveries, targets, documents, and roadmap data.\n\nThis matters because product architecture is never fully known upfront. A domain model should support uncertainty. Discoveries capture hypotheses, research questions, or unresolved constraints. Objectives express outcomes and priorities. Initiatives create delivery movement. Targets describe desired future states.\n\n![Objectives overview showing company objectives next to team objectives and key-result target cards.](assets/extras/screenshot_objectives.png)\n*Objectives make priorities visible at the same level as architecture. The useful question is not just what a team owns, but which measurable outcome that ownership is meant to improve.*\n\nWhen these artifacts live near the customer, capability, brick, and team model, AI agents can reason across them. A future session can ask:\n\n- Does this initiative still match the objective?\n- Does this discovery change the capability map?\n- Does this team own the brick that the release depends on?\n- Does this target state require new data assets or integrations?\n\nThat is much harder when objectives live in one tool, architecture in another, and delivery notes in a third.\n\n![Team objective detail page with mapped company objectives, key results, status chips, and a dependency map from objective to initiative.](assets/extras/screenshot_team_objective.png)\n*A detailed objective page shows the traceability standard: a goal should connect to company priorities, key results, and initiatives clearly enough that reviewers can challenge the links.*\n\n## A Practical Trace\n\nA healthy domain model can support a concrete trace. Continuing the ride-sharing example:\n\n| Model step | Ride-sharing example |\n| --- | --- |\n| Customer group | Riders who need dependable trips under time pressure. |\n| Job to be done | Get matched with a trustworthy trip that arrives when expected. |\n| KPI | Request-to-match time, pickup success rate, ETA accuracy, cancellation rate. |\n| Capability | Book and complete a reliable trip. |\n| Product brick | Matching and dispatch, coordinated with trip request, pricing, payments, and support/recovery. |\n| Team | Marketplace matching team owns dispatch reliability and coordinates with pricing, payments, trust, and support. |\n| Release | Improve dispatch resilience and cancellation recovery. |\n| Roadmap target | Reduce marketplace failure modes before expanding advanced optimization. |\n| Evidence | Product analytics, support tickets, incident history, repository ownership, cloud activity, and financial impact. |\n\nThis trace is the main reason to keep delivery, teams, and roadmaps inside the product architecture model.\n\n## Generated Docs Expose Operating Gaps\n\nAt this stage, the generated static site is not just a publishing convenience. It is a review surface for the operating model.\n\nRaw JSON is useful for agents and validation. Rendered documentation is useful for humans. It lets product leaders, architects, engineers, and stakeholders inspect whether the model tells a coherent story.\n\nIf the generated page for a domain feels disconnected, that is feedback on the source model. Maybe customer groups are too vague. Maybe bricks do not map to capabilities. Maybe teams are named but not connected to ownership. Maybe roadmap items are written as generic plans.\n\nThe review should go back to source.\n\n## The Operating Test\n\nA product architecture model is operable when it can help a team make better decisions:\n\n- Should this initiative be prioritized?\n- Which brick will carry the long-term responsibility?\n- Which team should own the change?\n- Which capability is missing?\n- Which customer outcome is unsupported?\n- Which dependency or data asset creates risk?\n\nIf the model cannot answer questions like these, it may still be a useful description. It is not yet an operating product architecture.\n\nThe next article, [AI Agents as Product Architecture Authors](ai-agents-as-product-architecture-authors.html), explains how AI agents can help author this model without turning it into disconnected generated prose.\n"}]}, {"key": "summary", "label": "Summary", "meta": {"timetoread": "2 min"}, "blocks": [{"type": "markdown", "content": "Delivery, team ownership, objectives, releases, targets, and roadmap overlays belong inside the product architecture model — not in a separate project-management layer. A product architecture model becomes operable when all of these reference the same customer and brick model.\n\nThe argument is practical: architecture that ignores delivery cannot explain how change happens; a delivery plan that ignores architecture cannot explain what is being changed; a team model that ignores [Product Bricks and Capabilities](product-bricks-and-capabilities.html) cannot explain who owns the durable parts of the product. Keeping them in one domain model makes the connections inspectable — by people and by AI agents.\n\n**What changes**\n\n- Delivery artifacts (channels, APIs, operational workflows, MVP scope, releases, delivery risks) are modeled as architecture, because they shape interfaces, dependencies, reliability needs, and ownership boundaries.\n- Teams own product bricks and coordinate around capabilities, not just tasks. The model must answer which bricks a team owns, which capabilities it enables, and which dependencies create coordination work — hidden ownership is one of the fastest ways for product architecture to decay.\n- Roadmap items reference the model: the customer groups and jobs they improve, the KPIs they should move, the capabilities and bricks they change, the teams involved, and the evidence or assumptions behind them. The roadmap becomes an overlay on the architecture, not a disconnected plan.\n- Objectives, initiatives, discoveries, and targets live next to the customer, capability, brick, and team model, so questions like \"does this initiative still match the objective?\" can be asked across artifacts.\n- Generated documentation acts as a review surface for the operating model: if a rendered domain page feels disconnected, that is feedback on the source model, and the fix goes back to source.\n\n**What it costs**\n\n- The operating model must be maintained with the same discipline as the rest of the architecture — teams, releases, and roadmap items kept current and connected, not exported once from a planning tool.\n- Coordination realities (shared bricks, multi-team capabilities, handoffs) are made explicit rather than smoothed over, which can be uncomfortable to see.\n\n**What we are not doing**\n\n- Prescribing a delivery methodology — the model records how delivery works, not which process to follow.\n- Providing a release-planning template or a team-topology tutorial; team shapes depend on the domain.\n\nThe test is simple: the model is operable when it helps decide what to prioritize, which team owns a change, and which customer outcome is unsupported. The Article tab walks the ride-sharing example from customer group to release, owning team, roadmap target, and evidence.\n"}]}, {"key": "dialog", "label": "Conversation", "meta": {"timetoread": "8 min listen"}, "blocks": [{"type": "markdown", "content": "## Why should I care?\n\n**Ben:** Straight question first. Architecture is structure. Delivery is process. Team design is org charts. Three disciplines, three owners, three tools. Why is this article insisting on stuffing all of them into one product architecture model?\n\n**Ana:** Because the separation is a fiction we maintain at our own expense. A product architecture that ignores delivery cannot explain how change happens. A delivery plan that ignores architecture cannot explain *what* is being changed. A team model that ignores product bricks cannot explain who owns the durable parts of the product. In practice the three are inseparable — the model just makes that visible.\n\n**Ben:** \"Inseparable\" is easy to say. Give me the architectural argument for, say, delivery. Why is a release schedule an architecture concern?\n\n**Ana:** Because delivery information shapes interfaces, dependencies, reliability needs, and ownership boundaries. A product delivered through mobile apps, partner APIs, and backoffice operations has a different architecture than one delivered through a single web workflow. A product with regulated approvals has different delivery constraints than a consumer experiment platform. A marketplace with live supply-demand balancing has different release risk than a static content site. The delivery model — channels, APIs, operational workflows, MVP scope, releases, risks — records those differences explicitly instead of leaving them as tribal knowledge.\n\n## Teams own bricks, not tasks\n\n**Ben:** Let's do teams. Every org I've seen has a team list. What does putting it in the architecture model add?\n\n**Ana:** The team list answers \"who exists.\" The model has to answer harder questions: which product bricks does this team own? Which capabilities does it enable or coordinate? Which dependencies create collaboration needs? Which operating responsibilities are ongoing? Which teams need platform, data, reliability, or compliance support? Teams own bricks, not just tasks — that's the rule. The bricks come from [Product Bricks and Capabilities](product-bricks-and-capabilities.html); the team model gives them an ownership surface.\n\n**Ben:** Sounds tidy on a slide. Reality is messier — shared platforms, capabilities that need four teams, operational handoffs. Does the model pretend each brick has its own neat little team?\n\n**Ana:** Explicitly not. Some capabilities require multiple teams. Some platform bricks serve many teams. Some workflows require handoffs. The requirement is not one-brick-one-team — it's that those realities are *visible*. There's a dependency view for exactly this: a team can look well-scoped on paper and still depend on shared bricks, enabling teams, and supporting platforms that need to be planned explicitly. The model exposes the coordination work instead of letting it surprise you mid-quarter.\n\n**Ben:** And if ownership is fuzzy?\n\n**Ana:** Then you've found the rot early. Hidden ownership is one of the fastest ways for product architecture to decay. A brick nobody owns gets changed by everyone and maintained by no one.\n\n## Roadmaps that point somewhere\n\n**Ben:** Now roadmaps. Mine is a list of initiatives in a planning tool, reviewed quarterly, and honestly it works fine. What's wrong with it?\n\n**Ana:** Nothing — for planning. It's weak for architecture, unless the initiatives point back to the model. A strong roadmap item references the customer groups or jobs it improves, the KPIs it should move, the capabilities it creates or changes, the bricks it builds, evolves, or retires, the teams involved, the releases or targets it belongs to, and the evidence or assumptions behind it.\n\n**Ben:** That's a lot of metadata for a planning ticket.\n\n**Ana:** It's the difference between asking \"what are we doing next quarter?\" and being able to ask: which customer outcome does this item change? Which bricks are affected? Which team owns the long-term capability after delivery? Which dependencies make it risky? Which target state does it move us toward? Which assumptions must be validated first? The roadmap becomes an overlay on the architecture, not a disconnected plan. Sequencing turns into an architecture discussion instead of calendar management.\n\n**Ben:** You also model objectives and \"discoveries.\" Why drag OKRs into an architecture repository?\n\n**Ana:** Because product architecture is never fully known upfront, and the model should support uncertainty rather than hide it. Discoveries capture hypotheses and unresolved constraints. Objectives express outcomes and priorities. Initiatives create movement; targets describe desired future states. When those live next to the customer, capability, brick, and team model, a future session — human or AI — can ask: does this initiative still match the objective? Does this discovery change the capability map? Does this team own the brick the release depends on? That's nearly impossible when objectives live in one tool, architecture in another, and delivery notes in a third.\n\n## The trace\n\n**Ben:** Make it concrete. Walk the ride-sharing example through the whole thing.\n\n**Ana:** The full trace, top to bottom. Customer group: riders who need dependable trips under time pressure. Job: get matched with a trustworthy trip that arrives when expected. KPIs: request-to-match time, pickup success rate, ETA accuracy, cancellation rate. Capability: book and complete a reliable trip. Bricks: matching and dispatch, coordinated with trip request, pricing, payments, and support. Team: the marketplace matching team owns dispatch reliability and coordinates with pricing, payments, trust, and support. Release: improve dispatch resilience and cancellation recovery. Roadmap target: reduce marketplace failure modes before expanding advanced optimization. Evidence underneath: product analytics, support tickets, incident history, repository ownership, cloud activity, financial impact.\n\n**Ben:** And that trace is the actual payoff?\n\n**Ana:** It's the main reason to keep delivery, teams, and roadmaps inside the model at all. Every step is inspectable, so every step can be challenged.\n\n## The review surface\n\n**Ben:** One more skeptical pass. You generate a documentation site from all this. Isn't that just publishing?\n\n**Ana:** At this stage it's more than publishing — it's a review surface for the operating model. Raw JSON serves agents and validation; rendered pages serve humans. And here's the useful part: if the generated page for a domain feels disconnected, that's feedback on the *source model*. Maybe the customer groups are vague. Maybe bricks don't map to capabilities. Maybe teams are named but not connected to ownership. Maybe roadmap items read like generic plans. The review goes back to source — the same loop [Product Domain as Source of Truth](product-domain-as-source-of-truth.html) establishes.\n\n**Ben:** So how do I know when the model is good enough? There must be a test.\n\n**Ana:** The operating test: can the model help a team make better decisions? Should this initiative be prioritized? Which brick carries the long-term responsibility? Which team should own the change? Which capability is missing? Which customer outcome is unsupported? Which dependency creates risk? If it can't help answer questions like those, it may be a useful description — but it's not yet an operating product architecture.\n\n## What we're not saying\n\n**Ben:** Close it out. What is this record *not* telling me to do?\n\n**Ana:** Three non-goals, on purpose. It does not prescribe a delivery methodology — model how delivery works; pick your own process. It's not a release-planning template. And it's not a team topology tutorial — teams can be stream-aligned, platform, enabling, data, compliance, whatever the domain demands; the only rule is a plausible relationship between teams and the bricks and capabilities they affect.\n\n**Ben:** So the headline: my org chart, my roadmap tool, and my architecture diagrams are describing one system, and only the model admits it.\n\n**Ana:** That's the whole argument. And the natural next question — how AI agents help author all of this without turning it into disconnected generated prose — is exactly where [AI Agents as Product Architecture Authors](ai-agents-as-product-architecture-authors.html) picks up.\n"}]}, {"key": "comics", "label": "Comic", "meta": {"timetoread": "3 min"}, "blocks": [{"type": "markdown", "content": "<!-- comic-style\n{\n  \"cast\": \"MAYA: a pragmatic product architect, short dark hair, glasses, rolled-up sleeves, calm and slightly amused, often holding a marker or tablet. REX: an over-eager boxy robot AI assistant, one bent antenna, glowing rectangular eyes, perpetually holding or printing too many documents.\",\n  \"style\": \"Clean two-tone explainer comic, thick ink outlines, flat colors with blue/teal accents on a light cream background, generous white space, hand-lettered speech bubbles with SHORT readable text (max 8 words per bubble), simple geometric office/whiteboard settings, no photorealism, no dense text, no title text.\"\n}\n-->\n\nWhy delivery, teams, and roadmaps belong inside the architecture — in eight panels.\n\n![Comic panel: three closed doors labeled architecture, delivery, and teams while an architect watches a robot carry memos between them.](assets/images/delivery-teams-and-roadmaps/comic-01-three-separate-rooms.jpeg)\n**Panel 1:** *Architecture is called structure, delivery is called process, teams are called organization — but they describe one system.*\n\n![Comic panel: a robot pushes a cart of release boxes toward unlabeled gray shapes, holding a plan with only dates.](assets/images/delivery-teams-and-roadmaps/comic-02-change-without-a-what.jpeg)\n**Panel 2:** *A delivery plan that ignores architecture cannot explain what is being changed — and vice versa.*\n\n![Comic panel: a cracked brick with an unreadable owner tag under a flickering light as the architect shines a flashlight on it.](assets/images/delivery-teams-and-roadmaps/comic-03-hidden-ownership.jpeg)\n**Panel 3:** *The anti-pattern: hidden ownership — a brick nobody owns is changed by everyone and maintained by no one.*\n\n![Comic panel: an architect pins release cards, team pennants, and roadmap arrows onto one connected board of customers and bricks.](assets/images/delivery-teams-and-roadmaps/comic-04-one-connected-model.jpeg)\n**Panel 4:** *The decision: delivery, ownership, objectives, releases, and roadmap overlays live in the same domain model as customers and bricks.*\n\n![Comic panel: a team plants a flag on a labeled brick with ropes connecting it to neighboring bricks owned by other teams.](assets/images/delivery-teams-and-roadmaps/comic-05-teams-own-bricks.jpeg)\n**Panel 5:** *Teams own bricks, not just tasks — and the dependency view exposes the coordination work between them.*\n\n![Comic panel: a robot lays a transparent roadmap sheet over the architecture board so every arrow touches a brick or team.](assets/images/delivery-teams-and-roadmaps/comic-06-roadmap-overlay.jpeg)\n**Panel 6:** *A strong roadmap item points back to customers, KPIs, capabilities, bricks, and teams — an overlay, not a separate plan.*\n\n![Comic panel: an architect traces one glowing thread through stations for customer, KPI, capability, brick, team, release, and evidence.](assets/images/delivery-teams-and-roadmaps/comic-07-the-trace.jpeg)\n**Panel 7:** *The payoff is the trace: from riders under time pressure to dispatch bricks, the matching team, the release, and the evidence.*\n\n![Comic panel: a team debates around the connected model board while the robot holds a sign reading it answers back.](assets/images/delivery-teams-and-roadmaps/comic-08-the-operating-test.jpeg)\n**Panel 8:** *The operating test: a model is real architecture when it helps decide what to prioritize, who owns it, and what's at risk.*\n"}]}]}</script>
<script>
    (function () {
        const data = JSON.parse(document.getElementById('data').textContent);
        const root = document.getElementById('content');

        const postId = (data.meta && data.meta.id) ? String(data.meta.id) : '';
        const postStatusRaw = (data.meta && data.meta.status) ? String(data.meta.status) : '';
        if (postId || postStatusRaw) {
            const header = document.getElementById('post-header');
            let sectionEl = header.querySelector('p.section');
            if (!sectionEl) {
                sectionEl = document.createElement('p');
                sectionEl.className = 'section';
                header.insertBefore(sectionEl, header.firstChild);
            }
            // Status pill goes first, then a " / " separator before the existing
            // content (section name and/or id).
            if (postStatusRaw) {
                const parts = postStatusRaw.split(':');
                const statusName = parts[0].trim();
                const statusColor = (parts[1] || '').trim();
                const wrap = document.createElement('span');
                wrap.className = 'post-status';
                const dot = document.createElement('span');
                dot.className = 'status-dot';
                if (statusColor) dot.style.background = statusColor;
                wrap.appendChild(dot);
                wrap.appendChild(document.createTextNode(statusName));
                if (sectionEl.firstChild) {
                    sectionEl.insertBefore(document.createTextNode(' • '), sectionEl.firstChild);
                    sectionEl.insertBefore(wrap, sectionEl.firstChild);
                } else {
                    sectionEl.appendChild(wrap);
                }
            }
            if (postId) {
                if (sectionEl.firstChild) sectionEl.appendChild(document.createTextNode(' • '));
                sectionEl.appendChild(document.createTextNode(postId));
            }
        }

        const tagsHost = document.getElementById('tags');
        (data.tags || []).forEach(function (t) {
            const span = document.createElement('span');
            span.className = 'tag';
            span.textContent = t;
            tagsHost.appendChild(span);
        });

        // Minimal markdown renderer. Supports: ATX headings, paragraphs, blockquotes,
        // unordered/ordered lists, fenced code, inline code, bold/italic/strikethrough, links, images, hr.
        // Sufficient for the posts in this repo; replace with a fuller parser if needed.
        function renderMarkdown(src) {
            const lines = src.replace(/\r\n/g, '\n').split('\n');
            const out = [];
            let i = 0;

            const bullet = /^(\s*)([-*])\s+(.*)$/;
            const ordered = /^(\s*)(\d+)\.\s+(.*)$/;
            const tableRow = /^\s*\|(.+)\|\s*$/;
            const tableSep = /^\s*\|?\s*:?-{3,}:?\s*(\|\s*:?-{3,}:?\s*)+\|?\s*$/;

            function splitRow(s) {
                let t = s.trim();
                if (t.startsWith('|')) t = t.slice(1);
                if (t.endsWith('|')) t = t.slice(0, -1);
                return t.split('|').map(c => c.trim());
            }

            function inline(s) {
                // Posts are trusted content, so raw HTML passes through unescaped
                // (some posts embed inline <blockquote>, <div>, etc.).
                // Stray ampersands still get fixed up.
                s = s.replace(/&(?![a-zA-Z]+;|#\d+;)/g, '&amp;');
                s = s.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<a class="image-link" href="$2" target="_blank" rel="noopener noreferrer"><img alt="$1" src="$2"></a>');
                s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
                s = s.replace(/`([^`]+)`/g, function (_, c) {
                    return '<code>' + c.replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</code>';
                });
                s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
                s = s.replace(/~~([^~\n]+)~~/g, '<del>$1</del>');
                s = s.replace(/(^|[^*])\*([^*\n]+)\*/g, '$1<em>$2</em>');
                return s;
            }

            while (i < lines.length) {
                const line = lines[i];
                if (!line.trim()) {
                    i++;
                    continue;
                }

                const fence = line.match(/^```(\w*)\s*$/);
                if (fence) {
                    i++;
                    const buf = [];
                    while (i < lines.length && !/^```\s*$/.test(lines[i])) {
                        buf.push(lines[i]);
                        i++;
                    }
                    i++;
                    const escaped = buf.join('\n').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                    const cls = fence[1] ? ' class="lang-' + fence[1] + '"' : '';
                    out.push('<pre><code' + cls + '>' + escaped + '</code></pre>');
                    continue;
                }

                const h = line.match(/^(#{1,6})\s+(.*)$/);
                if (h) {
                    out.push('<h' + h[1].length + '>' + inline(h[2]) + '</h' + h[1].length + '>');
                    i++;
                    continue;
                }

                if (/^\s*(?:-\s*){3,}\s*$/.test(line) || /^\s*\*{3,}\s*$/.test(line)) {
                    out.push('<hr>');
                    i++;
                    continue;
                }

                if (/^>\s?/.test(line)) {
                    const buf = [];
                    while (i < lines.length && /^>\s?/.test(lines[i])) {
                        buf.push(lines[i].replace(/^>\s?/, ''));
                        i++;
                    }
                    out.push('<blockquote>' + renderMarkdown(buf.join('\n')) + '</blockquote>');
                    continue;
                }

                if (tableRow.test(line) && i + 1 < lines.length && tableSep.test(lines[i + 1])) {
                    const headers = splitRow(line);
                    i += 2;
                    const rows = [];
                    while (i < lines.length && tableRow.test(lines[i])) {
                        rows.push(splitRow(lines[i]));
                        i++;
                    }
                    let html = '<table><thead><tr>';
                    headers.forEach(h => {
                        html += '<th>' + inline(h) + '</th>';
                    });
                    html += '</tr></thead><tbody>';
                    rows.forEach(r => {
                        html += '<tr>';
                        r.forEach(c => {
                            html += '<td>' + inline(c) + '</td>';
                        });
                        html += '</tr>';
                    });
                    html += '</tbody></table>';
                    out.push(html);
                    continue;
                }

                if (bullet.test(line) || ordered.test(line)) {
                    // Indent of the first bullet defines this list's base level.
                    // Deeper-indented bullets become nested lists (rendered by
                    // recursing into renderMarkdown). Same-or-less indent at a
                    // bullet starts a sibling item (or ends the list).
                    const firstMatch = line.match(bullet) || line.match(ordered);
                    const baseIndent = firstMatch[1].length;
                    const isOrdered = ordered.test(line);
                    const items = [];
                    while (i < lines.length) {
                        const cur = lines[i];
                        if (!cur.trim()) {
                            // blank line breaks the list (matches CommonMark-ish behaviour)
                            i++;
                            break;
                        }
                        const mBul = cur.match(bullet);
                        const mOrd = cur.match(ordered);
                        const m = mBul || mOrd;
                        if (!m) break;
                        if (m[1].length < baseIndent) break;
                        if (m[1].length > baseIndent) break; // shouldn't happen at top of loop
                        // Same-type check: switching between -/* and 1. closes the list
                        if (isOrdered !== !!mOrd) break;

                        const itemBuf = [m[3]];
                        const nestedBuf = [];
                        i++;
                        while (i < lines.length) {
                            const nxt = lines[i];
                            if (!nxt.trim()) break;
                            const nBul = nxt.match(bullet);
                            const nOrd = nxt.match(ordered);
                            const nm = nBul || nOrd;
                            if (nm) {
                                if (nm[1].length > baseIndent) {
                                    // nested list line — dedent and stash
                                    nestedBuf.push(nxt.slice(baseIndent + 2));
                                    i++;
                                    continue;
                                }
                                // sibling or end of list
                                break;
                            }
                            // Plain continuation text
                            if (nestedBuf.length) {
                                // continuation inside the nested block
                                nestedBuf.push(nxt.slice(baseIndent + 2));
                            } else {
                                itemBuf.push(nxt.trim());
                            }
                            i++;
                        }

                        let liHtml = inline(itemBuf.join('\n'));
                        if (nestedBuf.length) {
                            liHtml += renderMarkdown(nestedBuf.join('\n'));
                        }
                        items.push('<li>' + liHtml + '</li>');
                    }
                    out.push((isOrdered ? '<ol>' : '<ul>') + items.join('') + (isOrdered ? '</ol>' : '</ul>'));
                    continue;
                }

                const buf = [line];
                i++;
                while (i < lines.length && lines[i].trim() && !/^#{1,6}\s/.test(lines[i]) && !/^>\s?/.test(lines[i]) && !bullet.test(lines[i]) && !ordered.test(lines[i]) && !/^```/.test(lines[i]) && !tableRow.test(lines[i])) {
                    buf.push(lines[i]);
                    i++;
                }
                out.push('<p>' + inline(buf.join(' ')) + '</p>');
            }
            return out.join('\n');
        }

        // Block dispatcher. New block types plug in here.
        const renderers = {
            markdown: function (block) {
                const div = document.createElement('div');
                div.innerHTML = renderMarkdown(block.content);
                return div;
            },
            mermaid: function (block) {
                // Mermaid scans elements with class "mermaid" whose textContent
                // is the diagram source. We collect these nodes and run
                // mermaid.run() once after all blocks are in the DOM.
                const div = document.createElement('div');
                div.className = 'mermaid';
                div.textContent = block.content;
                return div;
            },
            'force-graph': function (block) {
                // build.py emits parsed JSON: {nodes:[{id,size}], links:[{source,target}]}.
                // We instantiate force-graph after the container is in the DOM
                // so it can measure its own width.
                const div = document.createElement('div');
                div.className = 'force-graph';
                const data = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.ForceGraph) return;
                    const maxSize = data.nodes.reduce((m, n) => Math.max(m, n.size || 1), 1);
                    window.ForceGraph()(div)
                        .graphData(data)
                        .width(div.clientWidth)
                        .height(div.clientHeight)
                        .nodeRelSize(4)
                        .nodeVal(n => Math.max(20 * (n.size || 1) / maxSize, 0.001))
                        .nodeLabel(n => n.id + ' (' + (n.size || 1) + ')')
                        .nodeColor(() => 'rgba(135, 206, 235, 0.7)')
                        .linkColor(() => 'rgba(60, 60, 60, 0.4)')
                        .linkDirectionalArrowLength(4)
                        .linkDirectionalArrowRelPos(1)
                        .linkWidth(1);
                });
                return div;
            },
            'bubble-chart': function (block) {
                // build.py emits {nodes:[{name,size}]}. Renders a D3 circle-pack
                // SVG (same shape as the obren.io reference, just inline).
                const wrap = document.createElement('div');
                wrap.className = 'bubble-chart';
                const payload = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.d3) return;
                    const diameter = 480;
                    const fill = '#c0deed';
                    const textColor = '#111111';
                    const fontSize = 12;

                    const svg = window.d3.select(wrap).append('svg')
                        .attr('viewBox', '0 0 ' + diameter + ' ' + diameter)
                        .attr('width', diameter)
                        .attr('height', diameter);

                    const root = window.d3.hierarchy({children: payload.nodes})
                        .sum(d => d.size || 0)
                        .sort((a, b) => b.value - a.value);

                    window.d3.pack().size([diameter, diameter]).padding(2)(root);

                    const node = svg.selectAll('g')
                        .data(root.leaves())
                        .enter().append('g')
                        .attr('transform', d => 'translate(' + d.x + ',' + d.y + ')');

                    node.append('title').text(d => d.data.name + ': ' + d.value);
                    node.append('circle').attr('r', d => d.r).style('fill', fill);
                    node.append('text')
                        .attr('dy', '.3em')
                        .style('text-anchor', 'middle')
                        .style('fill', textColor)
                        .style('font-size', fontSize + 'px')
                        .text(d => d.data.name.substring(0, Math.max(0, Math.floor(d.r / 3))));
                });
                return wrap;
            }
        };

        // Render one modality's blocks into a host element. Mermaid runs
        // scoped to just the nodes created here, so lazily rendered tabs get
        // their diagrams on first activation.
        let mermaidInitialized = false;
        function renderBlocksInto(blocks, host) {
            const mermaidNodes = [];
            blocks.forEach(function (block) {
                const r = renderers[block.type];
                if (!r) {
                    const pre = document.createElement('pre');
                    pre.textContent = '[unknown block type: ' + block.type + ']';
                    host.appendChild(pre);
                    return;
                }
                const node = r(block);
                if (node instanceof Node) {
                    host.appendChild(node);
                    if (block.type === 'mermaid') mermaidNodes.push(node);
                }
            });
            if (mermaidNodes.length && window.mermaid) {
                if (!mermaidInitialized) {
                    window.mermaid.initialize({startOnLoad: false, theme: 'default'});
                    mermaidInitialized = true;
                }
                window.mermaid.run({nodes: mermaidNodes});
            }
        }

        // Modality tabs. One <article class="pane"> per modality; panes are
        // rendered lazily on first activation (force-graph / D3 / mermaid
        // need a visible, measurable container). With a single modality the
        // tab bar stays hidden and the page looks exactly like before.
        const mods = data.modalities;
        const tabBar = document.getElementById('modality-tabs');
        const panes = {};
        const tabButtons = {};
        const renderedPanes = {};

        mods.forEach(function (m) {
            const pane = document.createElement('article');
            pane.className = 'pane';
            pane.dataset.key = m.key;
            pane.hidden = true;
            root.appendChild(pane);
            panes[m.key] = pane;
        });

        const defaultKey = mods.some(m => m.key === 'index') ? 'index' : mods[0].key;

        function activate(key, updateHash) {
            mods.forEach(function (m) {
                const isActive = m.key === key;
                panes[m.key].hidden = !isActive;
                if (tabButtons[m.key]) {
                    tabButtons[m.key].classList.toggle('active', isActive);
                    tabButtons[m.key].setAttribute('aria-selected', isActive ? 'true' : 'false');
                }
            });
            // Unhide first, then render: the chart libraries measure widths.
            if (!renderedPanes[key]) {
                renderBlocksInto(mods.find(m => m.key === key).blocks, panes[key]);
                renderedPanes[key] = true;
            }
            if (updateHash) {
                history.replaceState(null, '',
                    key === defaultKey ? location.pathname + location.search : '#' + key);
            }
        }

        if (mods.length > 1) {
            mods.forEach(function (m) {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.textContent = m.label;
                btn.setAttribute('role', 'tab');
                btn.addEventListener('click', function () { activate(m.key, true); });
                tabBar.appendChild(btn);
                tabButtons[m.key] = btn;
            });
            tabBar.hidden = false;
        }

        // The hash selects a tab only when it matches a modality key, so
        // existing anchors keep working.
        const initialHash = location.hash.slice(1);
        activate(mods.some(m => m.key === initialHash) ? initialHash : defaultKey, false);
        window.addEventListener('hashchange', function () {
            const k = location.hash.slice(1);
            if (mods.some(m => m.key === k)) activate(k, false);
        });
    })();
</script>
