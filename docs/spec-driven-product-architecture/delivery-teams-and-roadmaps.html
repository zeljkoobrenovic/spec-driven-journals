<script id="data" type="application/json">{"meta": {"title": "Delivery, Teams, and Roadmaps", "date": "2026-05-22", "author": "by Željko Obrenović (obren.io)", "permalink": "delivery-teams-and-roadmaps", "timetoread": "8 min", "excerpt": "A product architecture model becomes operable when delivery, team ownership, objectives, releases, targets, and roadmap overlays are connected to the same customer and brick model.", "tags": "delivery, teams, roadmap, product architecture", "icon": "assets/icons/delivery-teams-and-roadmaps.png", "logo": "assets/images/delivery-teams-and-roadmaps/logo.jpeg", "logo_credit": "Image generated by Google Gemini (gemini-3-pro-image-preview)"}, "tags": ["delivery", "teams", "roadmap", "product architecture"], "modalities": [{"key": "index", "label": "Article", "meta": {}, "blocks": [{"type": "markdown", "content": "> A product architecture model becomes operable when delivery, team ownership, objectives, releases, targets, and roadmap overlays are connected to the same customer and brick model.\n\nProduct architecture is often described as structure. Delivery is often described as process. Team design is often described as organization.\n\nIn practice, they are inseparable.\n\nA product architecture that ignores delivery cannot explain how change happens. A delivery plan that ignores architecture cannot explain what is being changed. A team model that ignores product bricks cannot explain who owns the durable parts of the product.\n\nSpec-Driven Product Architecture keeps these concerns in the same domain model.\n\n## Delivery Is Part Of The Architecture\n\nDelivery artifacts describe how the product reaches customers and how change reaches production.\n\nIn the source project, delivery can include:\n\n- channels and touchpoints\n- APIs and events\n- operational workflows\n- MVP scope\n- releases\n- capability mappings\n- delivery risks and constraints\n\nThat information is architectural because it shapes interfaces, dependencies, reliability needs, and ownership boundaries.\n\nFor example, a product that is delivered through mobile apps, partner APIs, and backoffice operations has a different architecture than a product delivered only through a web workflow. A product with regulated approvals has different delivery constraints than a consumer experiment platform. A marketplace with live supply-demand balancing has different release risk than a static content site.\n\nThe delivery model records those differences explicitly.\n\n![Product deployment view showing market-facing platforms, their customers, interfaces, channels, and related bricks.](assets/extras/screenshot_product_deployments.png)\n*Deployment views connect the product promise to concrete channels and interfaces. They make it harder to discuss delivery without noticing which surfaces, bricks, and customers are affected.*\n\n## Teams Own Bricks, Not Just Tasks\n\nTeam design becomes clearer when product bricks exist.\n\nTeams can be stream-aligned, platform, enabling, data, reliability, compliance, finance, trust, or operational-control teams. The exact shape depends on the domain. The important rule is that teams should have a plausible relationship to the bricks and capabilities they affect.\n\nA team model should answer:\n\n- Which product bricks does this team own?\n- Which capabilities does this team enable or coordinate?\n- Which dependencies create collaboration needs?\n- Which operating responsibilities are ongoing?\n- Which teams need platform support, data support, reliability support, or compliance support?\n\n![Teams overview showing role blocks, headcount, group leadership, and stream-aligned teams in the Real Estate Marketplace model.](assets/extras/screenshot_product_teams.png)\n*A team view gives the architecture an ownership surface. It shows whether the model has enough staffing and topology detail to support the bricks and capabilities it names.*\n\nThis does not mean every brick has a single isolated team. Some capabilities require multiple teams. Some platform bricks serve many teams. Some operating workflows require handoffs. But the model should make those realities visible.\n\nHidden ownership is one of the fastest ways for product architecture to decay.\n\n![Team dependency view showing explicit team relationships and shared product-brick dependencies for a homepage team.](assets/extras/screenshot_product_one_team_dependecies.png)\n*The dependency view exposes coordination work. A team can appear well-scoped on paper and still depend on shared bricks, enabling teams, or supporting platforms that need to be planned explicitly.*\n\n## Roadmaps Need Model References\n\nRoadmaps are often written as lists of initiatives. That is useful for planning but weak for architecture unless the initiatives point back to the model.\n\nA strong roadmap item can reference:\n\n- customer groups or jobs it improves\n- KPIs it should move\n- capabilities it creates or changes\n- product bricks it builds, evolves, or retires\n- teams involved\n- delivery releases or targets\n- evidence and assumptions\n\nThis makes roadmap discussion more concrete. Instead of asking only \"what are we doing next quarter?\" the model supports questions such as:\n\n- Which customer outcome does this item change?\n- Which bricks are affected?\n- Which team owns the long-term capability after delivery?\n- Which dependencies make this item risky?\n- Which target state does it move us toward?\n- Which assumptions must be validated first?\n\nThe roadmap becomes an overlay on the architecture, not a disconnected plan.\n\n![Releases overview showing release timing, affected customers, product channels, and product bricks.](assets/extras/screenshot_releases.png)\n*A release view becomes more useful when scope is tied back to customers, channels, and bricks. It lets reviewers discuss sequencing as architecture, not only as calendar management.*\n\n## Objectives And Discoveries Belong In The Same Story\n\nThe source project also models objectives, initiatives, discoveries, targets, documents, and roadmap data.\n\nThis matters because product architecture is never fully known upfront. A domain model should support uncertainty. Discoveries capture hypotheses, research questions, or unresolved constraints. Objectives express outcomes and priorities. Initiatives create delivery movement. Targets describe desired future states.\n\n![Objectives overview showing company objectives next to team objectives and key-result target cards.](assets/extras/screenshot_objectives.png)\n*Objectives make priorities visible at the same level as architecture. The useful question is not just what a team owns, but which measurable outcome that ownership is meant to improve.*\n\nWhen these artifacts live near the customer, capability, brick, and team model, AI agents can reason across them. A future session can ask:\n\n- Does this initiative still match the objective?\n- Does this discovery change the capability map?\n- Does this team own the brick that the release depends on?\n- Does this target state require new data assets or integrations?\n\nThat is much harder when objectives live in one tool, architecture in another, and delivery notes in a third.\n\n![Team objective detail page with mapped company objectives, key results, status chips, and a dependency map from objective to initiative.](assets/extras/screenshot_team_objective.png)\n*A detailed objective page shows the traceability standard: a goal should connect to company priorities, key results, and initiatives clearly enough that reviewers can challenge the links.*\n\n## A Practical Trace\n\nA healthy domain model can support a concrete trace. Continuing the ride-sharing example:\n\n| Model step | Ride-sharing example |\n| --- | --- |\n| Customer group | Riders who need dependable trips under time pressure. |\n| Job to be done | Get matched with a trustworthy trip that arrives when expected. |\n| KPI | Request-to-match time, pickup success rate, ETA accuracy, cancellation rate. |\n| Capability | Book and complete a reliable trip. |\n| Product brick | Matching and dispatch, coordinated with trip request, pricing, payments, and support/recovery. |\n| Team | Marketplace matching team owns dispatch reliability and coordinates with pricing, payments, trust, and support. |\n| Release | Improve dispatch resilience and cancellation recovery. |\n| Roadmap target | Reduce marketplace failure modes before expanding advanced optimization. |\n| Evidence | Product analytics, support tickets, incident history, repository ownership, cloud activity, and financial impact. |\n\nThis trace is the main reason to keep delivery, teams, and roadmaps inside the product architecture model.\n\n## Generated Docs Expose Operating Gaps\n\nAt this stage, the generated static site is not just a publishing convenience. It is a review surface for the operating model.\n\nRaw JSON is useful for agents and validation. Rendered documentation is useful for humans. It lets product leaders, architects, engineers, and stakeholders inspect whether the model tells a coherent story.\n\nIf the generated page for a domain feels disconnected, that is feedback on the source model. Maybe customer groups are too vague. Maybe bricks do not map to capabilities. Maybe teams are named but not connected to ownership. Maybe roadmap items are written as generic plans.\n\nThe review should go back to source.\n\n## The Operating Test\n\nA product architecture model is operable when it can help a team make better decisions:\n\n- Should this initiative be prioritized?\n- Which brick will carry the long-term responsibility?\n- Which team should own the change?\n- Which capability is missing?\n- Which customer outcome is unsupported?\n- Which dependency or data asset creates risk?\n\nIf the model cannot answer questions like these, it may still be a useful description. It is not yet an operating product architecture.\n\nThe next article, [AI Agents as Product Architecture Authors](ai-agents-as-product-architecture-authors.html), explains how AI agents can help author this model without turning it into disconnected generated prose.\n"}]}]}</script>

    (function () {

        const postStatusRaw = (data.meta && data.meta.status) ? String(data.meta.status) : '';
        if (postId || postStatusRaw) {
            const header = document.getElementById('post-header');
            let sectionEl = header.querySelector('p.section');

                sectionEl = document.createElement('p');
                sectionEl.className = 'section';

            }

            if (postStatusRaw) {
                const parts = postStatusRaw.split(':');
                const statusName = parts[0].trim();
                const statusColor = (parts[1] || '').trim();
                const wrap = document.createElement('span');
                wrap.className = 'post-status';
                const dot = document.createElement('span');
                dot.className = 'status-dot';
                if (statusColor) dot.style.background = statusColor;
                wrap.appendChild(dot);
                wrap.appendChild(document.createTextNode(statusName));
                if (sectionEl.firstChild) {

                    sectionEl.insertBefore(wrap, sectionEl.firstChild);
                } else {

                }
            }
            if (postId) {
                if (sectionEl.firstChild) sectionEl.appendChild(document.createTextNode(' • '));
                sectionEl.appendChild(document.createTextNode(postId));
            }
        }

        const tagsHost = document.getElementById('tags');
        (data.tags || []).forEach(function (t) {
            const span = document.createElement('span');
            span.className = 'tag';
            span.textContent = t;
            tagsHost.appendChild(span);
        });

        // Minimal markdown renderer. Supports: ATX headings, paragraphs, blockquotes,
        // unordered/ordered lists, fenced code, inline code, bold/italic/strikethrough, links, images, hr.
        // Sufficient for the posts in this repo; replace with a fuller parser if needed.
        function renderMarkdown(src) {
            const lines = src.replace(/\r\n/g, '\n').split('\n');
            const out = [];
            let i = 0;

            const bullet = /^(\s*)([-*])\s+(.*)$/;
            const ordered = /^(\s*)(\d+)\.\s+(.*)$/;
            const tableRow = /^\s*\|(.+)\|\s*$/;
            const tableSep = /^\s*\|?\s*:?-{3,}:?\s*(\|\s*:?-{3,}:?\s*)+\|?\s*$/;

            function splitRow(s) {
                let t = s.trim();
                if (t.startsWith('|')) t = t.slice(1);
                if (t.endsWith('|')) t = t.slice(0, -1);
                return t.split('|').map(c => c.trim());
            }

            function inline(s) {
                // Posts are trusted content, so raw HTML passes through unescaped
                // (some posts embed inline <blockquote>, <div>, etc.).
                // Stray ampersands still get fixed up.
                s = s.replace(/&(?![a-zA-Z]+;|#\d+;)/g, '&amp;');
                s = s.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<a class="image-link" href="$2" target="_blank" rel="noopener noreferrer"><img alt="$1" src="$2"></a>');
                s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
                s = s.replace(/`([^`]+)`/g, function (_, c) {
                    return '<code>' + c.replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</code>';
                });
                s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
                s = s.replace(/~~([^~\n]+)~~/g, '<del>$1</del>');
                s = s.replace(/(^|[^*])\*([^*\n]+)\*/g, '$1<em>$2</em>');
                return s;
            }

            while (i < lines.length) {
                const line = lines[i];
                if (!line.trim()) {
                    i++;
                    continue;
                }

                const fence = line.match(/^```(\w*)\s*$/);
                if (fence) {
                    i++;
                    const buf = [];
                    while (i < lines.length && !/^```\s*$/.test(lines[i])) {
                        buf.push(lines[i]);
                        i++;
                    }
                    i++;
                    const escaped = buf.join('\n').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                    const cls = fence[1] ? ' class="lang-' + fence[1] + '"' : '';
                    out.push('<pre><code' + cls + '>' + escaped + '</code></pre>');
                    continue;
                }

                const h = line.match(/^(#{1,6})\s+(.*)$/);
                if (h) {
                    out.push('<h' + h[1].length + '>' + inline(h[2]) + '</h' + h[1].length + '>');
                    i++;
                    continue;
                }

                if (/^\s*(?:-\s*){3,}\s*$/.test(line) || /^\s*\*{3,}\s*$/.test(line)) {
                    out.push('<hr>');
                    i++;
                    continue;
                }

                if (/^>\s?/.test(line)) {
                    const buf = [];
                    while (i < lines.length && /^>\s?/.test(lines[i])) {
                        buf.push(lines[i].replace(/^>\s?/, ''));
                        i++;
                    }
                    out.push('<blockquote>' + renderMarkdown(buf.join('\n')) + '</blockquote>');
                    continue;
                }

                if (tableRow.test(line) && i + 1 < lines.length && tableSep.test(lines[i + 1])) {
                    const headers = splitRow(line);
                    i += 2;
                    const rows = [];
                    while (i < lines.length && tableRow.test(lines[i])) {
                        rows.push(splitRow(lines[i]));
                        i++;
                    }
                    let html = '<table><thead><tr>';
                    headers.forEach(h => {
                        html += '<th>' + inline(h) + '</th>';
                    });
                    html += '</tr></thead><tbody>';
                    rows.forEach(r => {
                        html += '<tr>';
                        r.forEach(c => {
                            html += '<td>' + inline(c) + '</td>';
                        });
                        html += '</tr>';
                    });
                    html += '</tbody></table>';
                    out.push(html);
                    continue;
                }

                if (bullet.test(line) || ordered.test(line)) {
                    // Indent of the first bullet defines this list's base level.
                    // Deeper-indented bullets become nested lists (rendered by
                    // recursing into renderMarkdown). Same-or-less indent at a
                    // bullet starts a sibling item (or ends the list).
                    const firstMatch = line.match(bullet) || line.match(ordered);
                    const baseIndent = firstMatch[1].length;
                    const isOrdered = ordered.test(line);
                    const items = [];
                    while (i < lines.length) {
                        const cur = lines[i];
                        if (!cur.trim()) {
                            // blank line breaks the list (matches CommonMark-ish behaviour)
                            i++;
                            break;
                        }
                        const mBul = cur.match(bullet);
                        const mOrd = cur.match(ordered);
                        const m = mBul || mOrd;
                        if (!m) break;
                        if (m[1].length < baseIndent) break;
                        if (m[1].length > baseIndent) break; // shouldn't happen at top of loop
                        // Same-type check: switching between -/* and 1. closes the list
                        if (isOrdered !== !!mOrd) break;

                        const itemBuf = [m[3]];
                        const nestedBuf = [];
                        i++;
                        while (i < lines.length) {
                            const nxt = lines[i];
                            if (!nxt.trim()) break;
                            const nBul = nxt.match(bullet);
                            const nOrd = nxt.match(ordered);
                            const nm = nBul || nOrd;
                            if (nm) {
                                if (nm[1].length > baseIndent) {
                                    // nested list line — dedent and stash
                                    nestedBuf.push(nxt.slice(baseIndent + 2));
                                    i++;
                                    continue;
                                }
                                // sibling or end of list
                                break;
                            }
                            // Plain continuation text
                            if (nestedBuf.length) {
                                // continuation inside the nested block
                                nestedBuf.push(nxt.slice(baseIndent + 2));
                            } else {
                                itemBuf.push(nxt.trim());
                            }
                            i++;
                        }

                        let liHtml = inline(itemBuf.join('\n'));
                        if (nestedBuf.length) {
                            liHtml += renderMarkdown(nestedBuf.join('\n'));
                        }
                        items.push('<li>' + liHtml + '</li>');
                    }
                    out.push((isOrdered ? '<ol>' : '<ul>') + items.join('') + (isOrdered ? '</ol>' : '</ul>'));
                    continue;
                }

                const buf = [line];
                i++;
                while (i < lines.length && lines[i].trim() && !/^#{1,6}\s/.test(lines[i]) && !/^>\s?/.test(lines[i]) && !bullet.test(lines[i]) && !ordered.test(lines[i]) && !/^```/.test(lines[i]) && !tableRow.test(lines[i])) {
                    buf.push(lines[i]);
                    i++;
                }
                out.push('<p>' + inline(buf.join(' ')) + '</p>');
            }
            return out.join('\n');
        }

        // Block dispatcher. New block types plug in here.
        const renderers = {
            markdown: function (block) {
                const div = document.createElement('div');
                div.innerHTML = renderMarkdown(block.content);
                return div;
            },
            mermaid: function (block) {
                // Mermaid scans elements with class "mermaid" whose textContent
                // is the diagram source. We collect these nodes and run
                // mermaid.run() once after all blocks are in the DOM.
                const div = document.createElement('div');
                div.className = 'mermaid';
                div.textContent = block.content;
                return div;
            },
            'force-graph': function (block) {
                // build.py emits parsed JSON: {nodes:[{id,size}], links:[{source,target}]}.
                // We instantiate force-graph after the container is in the DOM
                // so it can measure its own width.
                const div = document.createElement('div');
                div.className = 'force-graph';
                const data = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.ForceGraph) return;
                    const maxSize = data.nodes.reduce((m, n) => Math.max(m, n.size || 1), 1);
                    window.ForceGraph()(div)
                        .graphData(data)
                        .width(div.clientWidth)
                        .height(div.clientHeight)
                        .nodeRelSize(4)
                        .nodeVal(n => Math.max(20 * (n.size || 1) / maxSize, 0.001))
                        .nodeLabel(n => n.id + ' (' + (n.size || 1) + ')')
                        .nodeColor(() => 'rgba(135, 206, 235, 0.7)')
                        .linkColor(() => 'rgba(60, 60, 60, 0.4)')
                        .linkDirectionalArrowLength(4)
                        .linkDirectionalArrowRelPos(1)
                        .linkWidth(1);
                });
                return div;
            },
            'bubble-chart': function (block) {
                // build.py emits {nodes:[{name,size}]}. Renders a D3 circle-pack
                // SVG (same shape as the obren.io reference, just inline).
                const wrap = document.createElement('div');
                wrap.className = 'bubble-chart';
                const payload = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.d3) return;
                    const diameter = 480;
                    const fill = '#c0deed';
                    const textColor = '#111111';
                    const fontSize = 12;

                    const svg = window.d3.select(wrap).append('svg')
                        .attr('viewBox', '0 0 ' + diameter + ' ' + diameter)
                        .attr('width', diameter)
                        .attr('height', diameter);

                    const root = window.d3.hierarchy({children: payload.nodes})
                        .sum(d => d.size || 0)
                        .sort((a, b) => b.value - a.value);

                    window.d3.pack().size([diameter, diameter]).padding(2)(root);

                    const node = svg.selectAll('g')
                        .data(root.leaves())
                        .enter().append('g')
                        .attr('transform', d => 'translate(' + d.x + ',' + d.y + ')');

                    node.append('title').text(d => d.data.name + ': ' + d.value);
                    node.append('circle').attr('r', d => d.r).style('fill', fill);
                    node.append('text')
                        .attr('dy', '.3em')
                        .style('text-anchor', 'middle')
                        .style('fill', textColor)
                        .style('font-size', fontSize + 'px')
                        .text(d => d.data.name.substring(0, Math.max(0, Math.floor(d.r / 3))));
                });
                return wrap;
            }
        };

        // Render one modality's blocks into a host element. Mermaid runs
        // scoped to just the nodes created here, so lazily rendered tabs get
        // their diagrams on first activation.
        let mermaidInitialized = false;
        function renderBlocksInto(blocks, host) {
            const mermaidNodes = [];
            blocks.forEach(function (block) {
                const r = renderers[block.type];
                if (!r) {
                    const pre = document.createElement('pre');
                    pre.textContent = '[unknown block type: ' + block.type + ']';
                    host.appendChild(pre);
                    return;
                }
                const node = r(block);
                if (node instanceof Node) {
                    host.appendChild(node);
                    if (block.type === 'mermaid') mermaidNodes.push(node);
                }
            });
            if (mermaidNodes.length && window.mermaid) {
                if (!mermaidInitialized) {
                    window.mermaid.initialize({startOnLoad: false, theme: 'default'});
                    mermaidInitialized = true;
                }
                window.mermaid.run({nodes: mermaidNodes});
            }
        }

        // Modality tabs. One <article class="pane"> per modality; panes are
        // rendered lazily on first activation (force-graph / D3 / mermaid
        // need a visible, measurable container). With a single modality the
        // tab bar stays hidden and the page looks exactly like before.
        const mods = data.modalities;
        const tabBar = document.getElementById('modality-tabs');
        const panes = {};
        const tabButtons = {};
        const renderedPanes = {};

        mods.forEach(function (m) {
            const pane = document.createElement('article');
            pane.className = 'pane';
            pane.dataset.key = m.key;
            pane.hidden = true;
            root.appendChild(pane);
            panes[m.key] = pane;
        });

        const defaultKey = mods.some(m => m.key === 'index') ? 'index' : mods[0].key;

        function activate(key, updateHash) {
            mods.forEach(function (m) {
                const isActive = m.key === key;
                panes[m.key].hidden = !isActive;
                if (tabButtons[m.key]) {
                    tabButtons[m.key].classList.toggle('active', isActive);
                    tabButtons[m.key].setAttribute('aria-selected', isActive ? 'true' : 'false');
                }
            });
            // Unhide first, then render: the chart libraries measure widths.
            if (!renderedPanes[key]) {
                renderBlocksInto(mods.find(m => m.key === key).blocks, panes[key]);
                renderedPanes[key] = true;
            }
            if (updateHash) {
                history.replaceState(null, '',
                    key === defaultKey ? location.pathname + location.search : '#' + key);
            }
        }

        if (mods.length > 1) {
            mods.forEach(function (m) {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.textContent = m.label;
                btn.setAttribute('role', 'tab');
                btn.addEventListener('click', function () { activate(m.key, true); });
                tabBar.appendChild(btn);
                tabButtons[m.key] = btn;
            });
            tabBar.hidden = false;
        }

        // The hash selects a tab only when it matches a modality key, so
        // existing anchors keep working.
        const initialHash = location.hash.slice(1);
        activate(mods.some(m => m.key === initialHash) ? initialHash : defaultKey, false);
        window.addEventListener('hashchange', function () {
            const k = location.hash.slice(1);
            if (mods.some(m => m.key === k)) activate(k, false);
        });
    })();
</script>
</body>
</html>
