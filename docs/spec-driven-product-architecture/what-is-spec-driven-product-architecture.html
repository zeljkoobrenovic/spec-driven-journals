<script id="data" type="application/json">{"meta": {"title": "What Is Spec-Driven Product Architecture?", "date": "2026-05-22", "author": "by Željko Obrenović (obren.io)", "permalink": "what-is-spec-driven-product-architecture", "timetoread": "10 min", "excerpt": "Spec-driven product architecture treats the product domain model as a source-of-truth artifact: structured enough for AI agents to author and validate, and rich enough to connect product vision to implementation reality.", "tags": "product architecture, spec-driven development, ai, strategy", "icon": "assets/icons/what-is-spec-driven-product-architecture.png", "logo": "assets/images/what-is-spec-driven-product-architecture/logo.jpeg", "logo_credit": "Image generated by Google Gemini (gemini-3-pro-image-preview)"}, "tags": ["product architecture", "spec-driven development", "ai", "strategy"], "modalities": [{"key": "index", "label": "Article", "meta": {}, "blocks": [{"type": "markdown", "content": "> Spec-driven product architecture treats the product domain model as a source-of-truth artifact: structured enough for AI agents to author and validate, and rich enough to connect product vision to implementation reality.\n\nSpec-driven development usually starts close to software delivery. A team writes a specification, an AI agent or developer turns it into code, and tests or reviews check whether the implementation matches the spec.\n\nThat is useful, but it is too narrow for product architecture.\n\nMost products fail to stay coherent before code appears. Customer groups are described in one place, product vision in another, architecture in diagrams, roadmap in planning tools, teams in org charts, and evidence in scattered documents. AI agents can help write all of those artifacts, but without a shared structure they also amplify the fragmentation. They produce plausible text that is hard to compare, hard to validate, and hard to connect back to delivery reality.\n\nSpec-driven product architecture moves the specification boundary upward. The spec is not only a feature brief or a technical design. It is a structured model of a product domain.\n\n## The Core Idea\n\nIn this series, **Spec-Driven Product Architecture** is the method; the public [repository](https://github.com/zeljkoobrenovic/spec-driven-product-architecture) is the working implementation. The method says product architecture should live in structured source models that humans and AI agents can inspect, validate, and publish.\n\nA product architecture model should not stop at a vision statement. It should connect the idea of the product to the structures that make it buildable, operable, and reviewable:\n\n| Layer | What it specifies |\n| --- | --- |\n| Customers | Customer groups, personas, jobs to be done, pains, needs, and outcomes. |\n| Strategy | Value propositions, KPI pyramids, north-star metrics, and product horizons. |\n| Delivery | Channels, APIs, events, releases, MVP scope, and operating workflows. |\n| Product capabilities | Outcome-based capabilities that customers and the business care about. |\n| Product bricks | Implementation-facing building blocks: systems, services, interfaces, modules, data, and dependencies. |\n| Teams | Ownership, responsibilities, coordination points, and team topology. |\n| Roadmap | Targets, initiatives, discoveries, releases, and sequencing. |\n| Evidence and grounding | Source links, assumptions, documents, data signals, and architecture references that ground the model. |\n\nThe model is written as structured JSON under [`_config/`](https://github.com/zeljkoobrenovic/spec-driven-product-architecture/tree/main/_config), rendered into static documentation, and maintained by AI agents and humans together.\n\nReaders can also explore many generated product-domain examples in the published [Spec-Driven Product Architecture overview](https://zeljkoobrenovic.github.io/spec-driven-product-architecture/start-packages/overview/index.html).\n\n\n![Layered product-domain model showing customers, strategy, delivery, capabilities, product bricks, teams, roadmap, and evidence as connected source-of-truth layers.](assets/images/spec-driven-product-architecture-layer-model.jpeg)\n*The product-domain model works as a connected layer stack: product vision flows into customer groups, strategy horizons, delivery, capabilities, product bricks, teams, roadmap, and evidence.*\n\n\n## Dreaming, Exploring, And Grounding\n\nA realistic product architecture needs three complementary modes: **dreaming**, **exploring**, and **grounding**.\n\n| Mode | What it does | Typical artifacts |\n| --- | --- | --- |\n| Dreaming | Defines the intended product: vision, concept, customer value, capabilities, product architecture, future state, and roadmap. | Product-domain specs, strategy horizons, capability maps, product-brick models, target states. |\n| Exploring | Looks at what is actually happening in reality by building and using tools over real data. This connects to [Grounded Architecture](https://grounded-architecture.io/), especially its emphasis on data-led architecture practice and Lightweight Architectural Analytics. | Source-code maps, public-cloud activity, repository activity, deployment and incident data, finance data, ownership maps, technology landscape views. |\n| Grounding | Explicitly connects dreaming and exploring so each important product-architecture concept has evidence, or a visible assumption, in the available data. | Evidence links, data references, confidence notes, trend signals, drift indicators, unresolved evidence gaps. |\n\n![Dreaming, exploring, and grounding loop connecting product vision, real-world architecture data, and evidence-backed product architecture.](assets/images/dreaming-exploring-grounding-loop.png)\n*A pragmatic product architecture moves between dreaming the intended product, exploring real source/code/cloud/log/finance data, and grounding concepts in evidence, assumptions, and trend signals.*\n\nDreaming is necessary because product architecture needs imagination. It defines where the product should go, which customer outcomes matter, and which capabilities and product bricks should exist.\n\nExploring is necessary because organizations already have a reality. Source code, cloud usage, logs, delivery activity, finance, incident history, and ownership signals show what systems exist, how they behave, where money is spent, and where teams are actually investing attention. Grounded Architecture describes this kind of data-led practice as a way to keep architecture connected to the organization and its technology landscape.\n\nGrounding is the explicit join between the two. It asks whether the concepts in the product-domain model can be connected to evidence:\n\n- Does this product brick map to real repositories, services, cloud assets, APIs, or operational workflows?\n- Does this capability have evidence in customer journeys, support data, product analytics, or delivery plans?\n- Does this team ownership claim match repository ownership, activity logs, incident responsibility, or financial accountability?\n- Does this roadmap target respond to observed trends, or only to an aspirational story?\n- Which concepts are still assumptions because the current data does not prove or disprove them?\n\nThe goal is not to reject every concept that lacks evidence. Early product architecture always contains bets. The goal is to make those bets visible, keep the model up to date, and detect when reality starts moving away from the dream.\n\n## Why Product Vision Is Not Enough\n\nProduct vision is necessary, but it is not operational by itself.\n\n\"Build a better ride-sharing marketplace\" does not tell an agent how rider jobs connect to dispatch, pricing, risk, payments, support, driver earnings, fleet operations, or marketplace analytics. \"Modernize internal developer experience\" does not tell an agent which developer journeys matter, which golden paths exist, which platform capabilities are required, who owns them, or how the roadmap should reduce cognitive load.\n\nA vision becomes useful when the model can answer practical questions:\n\n- Which customer groups are materially different?\n- Which jobs to be done create the most important product outcomes?\n- Which KPIs express whether those outcomes are improving?\n- Which capabilities make the outcomes possible?\n- Which product bricks support those capabilities?\n- Which teams own those bricks?\n- Which roadmap items change those bricks, capabilities, and customer outcomes?\n- Which facts are sourced and which are explicit assumptions?\n\nThose questions are the point of the spec.\n\n## Why AI Changes The Bar\n\nAI agents can draft product architecture faster than a human can write it manually. That speed is useful only when the repository gives the agent a clear shape to follow.\n\nWithout structure, an agent tends to produce general product strategy prose. With structure, examples, and validation, the same agent can produce a model that another agent can inspect, extend, compare, and render.\n\nIn this project, the agent is not asked to \"write a strategy.\" It is asked to create or refine source files such as:\n\n- [`customers/customers.json`](https://github.com/zeljkoobrenovic/spec-driven-product-architecture/blob/main/_config/product-domains/ride-sharing-marketplace/customers/customers.json)\n- [`product-deployments/products.json`](https://github.com/zeljkoobrenovic/spec-driven-product-architecture/blob/main/_config/product-domains/ride-sharing-marketplace/product-deployments/products.json)\n- [`product-deployments/deployment.json`](https://github.com/zeljkoobrenovic/spec-driven-product-architecture/blob/main/_config/product-domains/ride-sharing-marketplace/product-deployments/deployment.json)\n- [`delivery/releases.json`](https://github.com/zeljkoobrenovic/spec-driven-product-architecture/blob/main/_config/product-domains/ride-sharing-marketplace/delivery/releases.json)\n- [`product-bricks/product-bricks.json`](https://github.com/zeljkoobrenovic/spec-driven-product-architecture/blob/main/_config/product-domains/ride-sharing-marketplace/product-bricks/product-bricks.json)\n- [`product-bricks/product-capability.json`](https://github.com/zeljkoobrenovic/spec-driven-product-architecture/blob/main/_config/product-domains/ride-sharing-marketplace/product-bricks/product-capability.json)\n- [`objectives/current/...`](https://github.com/zeljkoobrenovic/spec-driven-product-architecture/tree/main/_config/product-domains/ride-sharing-marketplace/objectives/current)\n- [`teams/teams.json`](https://github.com/zeljkoobrenovic/spec-driven-product-architecture/blob/main/_config/product-domains/ride-sharing-marketplace/teams/teams.json)\n- [`business/competition.json`](https://github.com/zeljkoobrenovic/spec-driven-product-architecture/blob/main/_config/product-domains/ride-sharing-marketplace/business/competition.json)\n- [`start/config.json`](https://github.com/zeljkoobrenovic/spec-driven-product-architecture/blob/main/_config/product-domains/ride-sharing-marketplace/start/config.json)\n\nThat is a different operating model. The agent has to work inside a domain language, preserve stable IDs, reuse existing schema patterns, keep references consistent, and validate the model before generated documentation is trusted.\n\n## What Makes It Application-Aware\n\nMany product strategy artifacts are intentionally abstract. They describe customers, needs, opportunities, and value propositions. That abstraction is useful, but it leaves a gap between \"what the product should do\" and \"what has to exist in the application and organization.\"\n\nSpec-Driven Product Architecture closes that gap with product bricks and delivery models.\n\nA product brick is not just a feature and not just a system. It is an implementation-facing unit that can be built, owned, evolved, and connected to product value. A brick can include user-facing components, APIs, message consumers, services, integrations, data dependencies, and dependencies on other bricks. Product capabilities then describe the outcome-based combinations of bricks that produce customer or business value.\n\nThis is what makes the model application-aware. It does not pretend product architecture is only market positioning. It keeps enough implementation structure to support real delivery conversations.\n\n## What This Series Covers\n\nThe rest of this series expands the model in layers:\n\n- [Product Domain as Source of Truth](product-domain-as-source-of-truth.html) explains why the product domain folder is the source of truth.\n- [From Customer Value to Architecture](customer-value-to-architecture.html) shows how customer groups, jobs, KPIs, and strategy horizons create the top of the model.\n- [Product Bricks and Capabilities](product-bricks-and-capabilities.html) explains the bridge from outcomes to implementation-facing architecture.\n- [Delivery, Teams, and Roadmaps](delivery-teams-and-roadmaps.html) connects delivery, ownership, and planning.\n- [AI Agents as Product Architecture Authors](ai-agents-as-product-architecture-authors.html) describes how AI agents should work inside the model.\n- [Modeling Diverse Domains](modeling-diverse-domains.html) explains why examples from many domains are part of the method.\n- [Grounding, Validation, and Publishing](evidence-validation-and-publishing.html) returns to the grounding frame and explains validation and generated static documentation.\n\nSeveral articles use Ride Sharing Marketplace as a lightweight running example. The example is concrete enough to show the model end to end, but it is not meant to make the method specific to marketplaces.\n\nThe goal is not to create a heavier planning process. The goal is to give humans and AI agents a shared product-architecture language that is specific enough to be useful and structured enough to survive repeated changes.\n"}]}, {"key": "summary", "label": "Summary", "meta": {"timetoread": "2 min"}, "blocks": [{"type": "markdown", "content": "Spec-driven product architecture treats the product domain model — not the feature brief — as the specification. The model is structured enough for AI agents to author and validate, and rich enough to connect product vision to implementation reality.\n\nOrdinary spec-driven development starts close to code: write a spec, generate an implementation, check the match. This series moves the specification boundary upward, to the product domain itself. The reason is practical: most products lose coherence *before* code appears — customers, strategy, architecture, roadmap, teams, and evidence live in disconnected artifacts, and AI agents amplify that fragmentation when there is no shared structure.\n\n**What changes**\n\n- Product architecture lives in structured, versioned source models covering eight layers: customers, strategy, delivery, product capabilities, product bricks, teams, roadmap, and evidence.\n- AI agents stop \"writing strategy prose\" and start editing source files inside a domain language — preserving stable IDs, reusing schema patterns, and validating before generated documentation is trusted.\n- The practice runs in three modes: **dreaming** (the intended product), **exploring** (what real source, cloud, delivery, and finance data show), and **grounding** (explicitly connecting the two so every concept has evidence or a visible assumption).\n- The model stays application-aware: product bricks and capabilities keep enough implementation structure to support real delivery conversations, not just market positioning.\n\n**What it costs**\n\n- The model must be maintained as a first-class artifact — structured JSON, validation, and publishing discipline rather than free-form documents.\n- Early models contain bets; grounding makes them visible rather than eliminating them, which means living with explicit, tracked assumptions.\n\n**What we are not doing**\n\n- This is not schema documentation or a tutorial for building a full product domain.\n- It is not a decision record arguing you must adopt the approach — it introduces the method and the series.\n\nThe Article tab covers the full layer model, the dreaming/exploring/grounding loop, and why product vision alone is not operational. The series continues with [Product Domain as Source of Truth](product-domain-as-source-of-truth.html).\n"}]}, {"key": "dialog", "label": "Conversation", "meta": {"timetoread": "8 min listen"}, "blocks": [{"type": "markdown", "content": "## Why should I care?\n\n**Ben:** So give it to me straight. \"Spec-driven product architecture\" — isn't this just spec-driven development with a fancier name?\n\n**Ana:** That's exactly the right first question, because the difference is the whole point. Spec-driven development starts close to code: you write a spec, an agent or a developer implements it, tests check the match. Useful — but narrow. Spec-driven product architecture moves the specification boundary upward. The spec isn't a feature brief or a technical design. It's a structured model of the entire product domain.\n\n**Ben:** Why does the boundary need to move? The code is where things actually break.\n\n**Ana:** Is it, though? Most products fail to stay coherent *before* code appears. Customer groups are described in one document, product vision in another, architecture in diagrams, roadmap in planning tools, teams in org charts, evidence scattered everywhere. Nothing connects them. And here's the uncomfortable part: AI agents make that worse, not better, when there's no shared structure. They happily produce plausible text for every one of those artifacts — text that's hard to compare, hard to validate, and impossible to trace back to delivery reality.\n\n**Ben:** So the pitch is: one model to rule them all?\n\n**Ana:** One model to *connect* them all. Eight layers, concretely: customers, strategy, delivery, product capabilities, product bricks, teams, roadmap, and evidence. Written as structured JSON, rendered into documentation, maintained by humans and AI agents together. Vision flows down into customer groups, capabilities, implementation-facing bricks, ownership, and sequencing — and every layer can be inspected.\n\n## The vision objection\n\n**Ben:** Let me push back. Plenty of great products were built on a strong vision and a whiteboard. \"Build a better ride-sharing marketplace\" — a good team fills in the rest.\n\n**Ana:** A good *human* team, with years of shared context, maybe. Now hand that sentence to an AI agent. \"Build a better ride-sharing marketplace\" doesn't tell it how rider jobs connect to dispatch, pricing, risk, payments, driver earnings, or marketplace analytics. Vision is necessary — it's just not operational. It becomes operational when the model can answer practical questions: which customer groups are materially different? Which jobs to be done drive the outcomes that matter? Which KPIs say whether they're improving? Which capabilities make them possible, which bricks support those capabilities, who owns the bricks, and which roadmap items change them?\n\n**Ben:** That's a long list of questions for a planning artifact.\n\n**Ana:** Those questions *are* the spec. That's the reframe. The spec isn't prose describing intent — it's a structure that can answer.\n\n## Dreaming, exploring, grounding\n\n**Ben:** You keep saying \"evidence.\" Architecture documents are famously fiction. What stops this model from being beautifully structured fiction?\n\n**Ana:** The three modes — this is my favorite part. **Dreaming** defines the intended product: vision, customer value, capabilities, target architecture, roadmap. **Exploring** looks at what's actually happening, through real data — source-code maps, cloud activity, deployment and incident history, finance data, ownership signals. That part inherits directly from Grounded Architecture and its data-led practice. And **grounding** is the explicit join: does this product brick map to real repositories and services? Does this team-ownership claim match repository activity and incident responsibility? Does this roadmap target respond to an observed trend, or only to an aspirational story?\n\n**Ben:** And when a concept has no evidence? Early-stage products are mostly bets.\n\n**Ana:** Then it stays in the model as a *visible* assumption. The goal isn't to reject every concept that lacks evidence — early product architecture always contains bets. The goal is to make the bets explicit, keep the model current, and notice when reality starts drifting away from the dream. Fiction is fine when it's labeled fiction.\n\n## Where the AI fits\n\n**Ben:** You said agents amplify fragmentation. Now you want them maintaining the model. Which is it?\n\n**Ana:** Both — structure is the difference. Without it, an agent asked to \"write a strategy\" produces general strategy prose. With structure, examples, and validation, the same agent edits source files: `customers.json`, `product-bricks.json`, capability maps, release models. It has to work inside a domain language, preserve stable IDs, reuse schema patterns, keep references consistent, and pass validation before anything generated is trusted. That's a different operating model — the agent is an author inside a constrained language, not a text generator.\n\n**Ben:** Constrained languages have a way of drifting into abstraction. Strategy frameworks especially — customers, needs, value propositions, and then a chasm down to actual systems.\n\n**Ana:** Which is why the model is deliberately application-aware. A product brick isn't just a feature and isn't just a system — it's an implementation-facing unit that can be built, owned, and evolved: user-facing components, APIs, message consumers, services, data dependencies, dependencies on other bricks. Capabilities then describe the outcome-based combinations of bricks that produce customer or business value. It keeps enough implementation structure to support real delivery conversations, not just market positioning.\n\n## What this isn't\n\n**Ben:** Closing question. What should I *not* expect from this series?\n\n**Ana:** Three things, deliberately. It's not schema documentation — the layers matter more than field-by-field detail. It's not a tutorial for building a full product domain end to end. And it's not a decision record telling your organization to adopt this — it's an introduction to a method, with the public repository as the working implementation.\n\n**Ben:** And if I want the next layer down?\n\n**Ana:** Start with [Product Domain as Source of Truth](product-domain-as-source-of-truth.html) — why the domain folder is the source of truth — then the series walks the model layer by layer, with a ride-sharing marketplace as the running example. Concrete enough to show the model end to end; not so specific that the method only works for marketplaces.\n\n**Ben:** Structured enough to be useful, durable enough to survive change. I've heard worse pitches. *(laughs)*\n\n**Ana:** That's the whole goal — a shared product-architecture language for humans and AI agents. The dream, the data, and the join between them.\n"}]}, {"key": "comics", "label": "Comic", "meta": {"timetoread": "3 min"}, "blocks": [{"type": "markdown", "content": "<!-- comic-style\n{\n  \"cast\": \"MAYA: a pragmatic product architect, short dark hair, glasses, rolled-up sleeves, calm and slightly amused, often holding a marker or tablet. REX: an over-eager boxy robot AI assistant, one bent antenna, glowing rectangular eyes, perpetually holding or printing too many documents.\",\n  \"style\": \"Clean two-tone explainer comic, thick ink outlines, flat colors with blue/teal accents on a light cream background, generous white space, hand-lettered speech bubbles with SHORT readable text (max 8 words per bubble), simple geometric office/whiteboard settings, no photorealism, no dense text, no title text.\"\n}\n-->\n\nHow a product stays coherent before any code exists — in eight panels.\n\n![Comic panel: an architect surrounded by disconnected artifacts — sticky-note vision, whiteboard architecture, roadmap tool, org chart, and loose evidence papers.](assets/images/what-is-spec-driven-product-architecture/comic-01-scattered-everywhere.jpeg)\n**Panel 1:** *Products lose coherence long before code appears: vision, architecture, roadmap, teams, and evidence all live in different places.*\n\n![Comic panel: a robot prints piles of impressive but contradictory strategy documents while the architect compares two mismatched pages.](assets/images/what-is-spec-driven-product-architecture/comic-02-rex-amplifies.jpeg)\n**Panel 2:** *AI agents amplify the fragmentation: plausible text everywhere, hard to compare, validate, or connect to delivery.*\n\n![Comic panel: a robot puzzled by a one-line vision card while huge unlabeled machinery looms behind it.](assets/images/what-is-spec-driven-product-architecture/comic-03-vision-is-not-enough.jpeg)\n**Panel 3:** *Vision is necessary but not operational: one sentence cannot tell an agent how jobs, pricing, payments, and support connect.*\n\n![Comic panel: the architect presents a connected eight-layer stack from customers down to evidence while the robot admires it.](assets/images/what-is-spec-driven-product-architecture/comic-04-the-layer-stack.jpeg)\n**Panel 4:** *The core move: the spec becomes a structured model of the product domain — eight connected layers, not a feature brief.*\n\n![Comic panel: a three-station loop labeled dream, explore, and ground, walked by the architect and the robot.](assets/images/what-is-spec-driven-product-architecture/comic-05-dream-explore-ground.jpeg)\n**Panel 5:** *Three modes keep the model honest: dream the intended product, explore real data, ground every concept in evidence.*\n\n![Comic panel: the robot neatly slots labeled JSON bricks into a structured board with a validation gate, watched by the architect.](assets/images/what-is-spec-driven-product-architecture/comic-06-rex-in-the-schema.jpeg)\n**Panel 6:** *With structure, examples, and validation, the agent edits source models inside a domain language — not strategy prose.*\n\n![Comic panel: concepts tagged as evidence-backed or assumption, with the robot pointing at one drifting link.](assets/images/what-is-spec-driven-product-architecture/comic-07-visible-bets.jpeg)\n**Panel 7:** *Early architecture always contains bets — grounding keeps them visible and shows when reality drifts from the dream.*\n\n![Comic panel: the architect and the robot share one connected model board while old scattered documents sit in a recycling bin.](assets/images/what-is-spec-driven-product-architecture/comic-08-shared-language.jpeg)\n**Panel 8:** *The goal: a shared product-architecture language — specific enough to be useful, structured enough to survive repeated change.*\n"}]}]}</script>
<script>
    (function () {
        const data = JSON.parse(document.getElementById('data').textContent);
        const root = document.getElementById('content');

        const postId = (data.meta && data.meta.id) ? String(data.meta.id) : '';
        const postStatusRaw = (data.meta && data.meta.status) ? String(data.meta.status) : '';
        if (postId || postStatusRaw) {
            const header = document.getElementById('post-header');
            let sectionEl = header.querySelector('p.section');
            if (!sectionEl) {
                sectionEl = document.createElement('p');
                sectionEl.className = 'section';
                header.insertBefore(sectionEl, header.firstChild);
            }
            // Status pill goes first, then a " / " separator before the existing
            // content (section name and/or id).
            if (postStatusRaw) {
                const parts = postStatusRaw.split(':');
                const statusName = parts[0].trim();
                const statusColor = (parts[1] || '').trim();
                const wrap = document.createElement('span');
                wrap.className = 'post-status';
                const dot = document.createElement('span');
                dot.className = 'status-dot';
                if (statusColor) dot.style.background = statusColor;
                wrap.appendChild(dot);
                wrap.appendChild(document.createTextNode(statusName));
                if (sectionEl.firstChild) {
                    sectionEl.insertBefore(document.createTextNode(' • '), sectionEl.firstChild);
                    sectionEl.insertBefore(wrap, sectionEl.firstChild);
                } else {
                    sectionEl.appendChild(wrap);
                }
            }
            if (postId) {
                if (sectionEl.firstChild) sectionEl.appendChild(document.createTextNode(' • '));
                sectionEl.appendChild(document.createTextNode(postId));
            }
        }

        const tagsHost = document.getElementById('tags');
        (data.tags || []).forEach(function (t) {
            const span = document.createElement('span');
            span.className = 'tag';
            span.textContent = t;
            tagsHost.appendChild(span);
        });

        // Minimal markdown renderer. Supports: ATX headings, paragraphs, blockquotes,
        // unordered/ordered lists, fenced code, inline code, bold/italic/strikethrough, links, images, hr.
        // Sufficient for the posts in this repo; replace with a fuller parser if needed.
        function renderMarkdown(src) {
            const lines = src.replace(/\r\n/g, '\n').split('\n');
            const out = [];
            let i = 0;

            const bullet = /^(\s*)([-*])\s+(.*)$/;
            const ordered = /^(\s*)(\d+)\.\s+(.*)$/;
            const tableRow = /^\s*\|(.+)\|\s*$/;
            const tableSep = /^\s*\|?\s*:?-{3,}:?\s*(\|\s*:?-{3,}:?\s*)+\|?\s*$/;

            function splitRow(s) {
                let t = s.trim();
                if (t.startsWith('|')) t = t.slice(1);
                if (t.endsWith('|')) t = t.slice(0, -1);
                return t.split('|').map(c => c.trim());
            }

            function inline(s) {
                // Posts are trusted content, so raw HTML passes through unescaped
                // (some posts embed inline <blockquote>, <div>, etc.).
                // Stray ampersands still get fixed up.
                s = s.replace(/&(?![a-zA-Z]+;|#\d+;)/g, '&amp;');
                s = s.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<a class="image-link" href="$2" target="_blank" rel="noopener noreferrer"><img alt="$1" src="$2"></a>');
                s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
                s = s.replace(/`([^`]+)`/g, function (_, c) {
                    return '<code>' + c.replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</code>';
                });
                s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
                s = s.replace(/~~([^~\n]+)~~/g, '<del>$1</del>');
                s = s.replace(/(^|[^*])\*([^*\n]+)\*/g, '$1<em>$2</em>');
                return s;
            }

            while (i < lines.length) {
                const line = lines[i];
                if (!line.trim()) {
                    i++;
                    continue;
                }

                const fence = line.match(/^```(\w*)\s*$/);
                if (fence) {
                    i++;
                    const buf = [];
                    while (i < lines.length && !/^```\s*$/.test(lines[i])) {
                        buf.push(lines[i]);
                        i++;
                    }
                    i++;
                    const escaped = buf.join('\n').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                    const cls = fence[1] ? ' class="lang-' + fence[1] + '"' : '';
                    out.push('<pre><code' + cls + '>' + escaped + '</code></pre>');
                    continue;
                }

                const h = line.match(/^(#{1,6})\s+(.*)$/);
                if (h) {
                    out.push('<h' + h[1].length + '>' + inline(h[2]) + '</h' + h[1].length + '>');
                    i++;
                    continue;
                }

                if (/^\s*(?:-\s*){3,}\s*$/.test(line) || /^\s*\*{3,}\s*$/.test(line)) {
                    out.push('<hr>');
                    i++;
                    continue;
                }

                if (/^>\s?/.test(line)) {
                    const buf = [];
                    while (i < lines.length && /^>\s?/.test(lines[i])) {
                        buf.push(lines[i].replace(/^>\s?/, ''));
                        i++;
                    }
                    out.push('<blockquote>' + renderMarkdown(buf.join('\n')) + '</blockquote>');
                    continue;
                }

                if (tableRow.test(line) && i + 1 < lines.length && tableSep.test(lines[i + 1])) {
                    const headers = splitRow(line);
                    i += 2;
                    const rows = [];
                    while (i < lines.length && tableRow.test(lines[i])) {
                        rows.push(splitRow(lines[i]));
                        i++;
                    }
                    let html = '<table><thead><tr>';
                    headers.forEach(h => {
                        html += '<th>' + inline(h) + '</th>';
                    });
                    html += '</tr></thead><tbody>';
                    rows.forEach(r => {
                        html += '<tr>';
                        r.forEach(c => {
                            html += '<td>' + inline(c) + '</td>';
                        });
                        html += '</tr>';
                    });
                    html += '</tbody></table>';
                    out.push(html);
                    continue;
                }

                if (bullet.test(line) || ordered.test(line)) {
                    // Indent of the first bullet defines this list's base level.
                    // Deeper-indented bullets become nested lists (rendered by
                    // recursing into renderMarkdown). Same-or-less indent at a
                    // bullet starts a sibling item (or ends the list).
                    const firstMatch = line.match(bullet) || line.match(ordered);
                    const baseIndent = firstMatch[1].length;
                    const isOrdered = ordered.test(line);
                    const items = [];
                    while (i < lines.length) {
                        const cur = lines[i];
                        if (!cur.trim()) {
                            // blank line breaks the list (matches CommonMark-ish behaviour)
                            i++;
                            break;
                        }
                        const mBul = cur.match(bullet);
                        const mOrd = cur.match(ordered);
                        const m = mBul || mOrd;
                        if (!m) break;
                        if (m[1].length < baseIndent) break;
                        if (m[1].length > baseIndent) break; // shouldn't happen at top of loop
                        // Same-type check: switching between -/* and 1. closes the list
                        if (isOrdered !== !!mOrd) break;

                        const itemBuf = [m[3]];
                        const nestedBuf = [];
                        i++;
                        while (i < lines.length) {
                            const nxt = lines[i];
                            if (!nxt.trim()) break;
                            const nBul = nxt.match(bullet);
                            const nOrd = nxt.match(ordered);
                            const nm = nBul || nOrd;
                            if (nm) {
                                if (nm[1].length > baseIndent) {
                                    // nested list line — dedent and stash
                                    nestedBuf.push(nxt.slice(baseIndent + 2));
                                    i++;
                                    continue;
                                }
                                // sibling or end of list
                                break;
                            }
                            // Plain continuation text
                            if (nestedBuf.length) {
                                // continuation inside the nested block
                                nestedBuf.push(nxt.slice(baseIndent + 2));
                            } else {
                                itemBuf.push(nxt.trim());
                            }
                            i++;
                        }

                        let liHtml = inline(itemBuf.join('\n'));
                        if (nestedBuf.length) {
                            liHtml += renderMarkdown(nestedBuf.join('\n'));
                        }
                        items.push('<li>' + liHtml + '</li>');
                    }
                    out.push((isOrdered ? '<ol>' : '<ul>') + items.join('') + (isOrdered ? '</ol>' : '</ul>'));
                    continue;
                }

                const buf = [line];
                i++;
                while (i < lines.length && lines[i].trim() && !/^#{1,6}\s/.test(lines[i]) && !/^>\s?/.test(lines[i]) && !bullet.test(lines[i]) && !ordered.test(lines[i]) && !/^```/.test(lines[i]) && !tableRow.test(lines[i])) {
                    buf.push(lines[i]);
                    i++;
                }
                out.push('<p>' + inline(buf.join(' ')) + '</p>');
            }
            return out.join('\n');
        }

        // Block dispatcher. New block types plug in here.
        const renderers = {
            markdown: function (block) {
                const div = document.createElement('div');
                div.innerHTML = renderMarkdown(block.content);
                return div;
            },
            mermaid: function (block) {
                // Mermaid scans elements with class "mermaid" whose textContent
                // is the diagram source. We collect these nodes and run
                // mermaid.run() once after all blocks are in the DOM.
                const div = document.createElement('div');
                div.className = 'mermaid';
                div.textContent = block.content;
                return div;
            },
            'force-graph': function (block) {
                // build.py emits parsed JSON: {nodes:[{id,size}], links:[{source,target}]}.
                // We instantiate force-graph after the container is in the DOM
                // so it can measure its own width.
                const div = document.createElement('div');
                div.className = 'force-graph';
                const data = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.ForceGraph) return;
                    const maxSize = data.nodes.reduce((m, n) => Math.max(m, n.size || 1), 1);
                    window.ForceGraph()(div)
                        .graphData(data)
                        .width(div.clientWidth)
                        .height(div.clientHeight)
                        .nodeRelSize(4)
                        .nodeVal(n => Math.max(20 * (n.size || 1) / maxSize, 0.001))
                        .nodeLabel(n => n.id + ' (' + (n.size || 1) + ')')
                        .nodeColor(() => 'rgba(135, 206, 235, 0.7)')
                        .linkColor(() => 'rgba(60, 60, 60, 0.4)')
                        .linkDirectionalArrowLength(4)
                        .linkDirectionalArrowRelPos(1)
                        .linkWidth(1);
                });
                return div;
            },
            'bubble-chart': function (block) {
                // build.py emits {nodes:[{name,size}]}. Renders a D3 circle-pack
                // SVG (same shape as the obren.io reference, just inline).
                const wrap = document.createElement('div');
                wrap.className = 'bubble-chart';
                const payload = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.d3) return;
                    const diameter = 480;
                    const fill = '#c0deed';
                    const textColor = '#111111';
                    const fontSize = 12;

                    const svg = window.d3.select(wrap).append('svg')
                        .attr('viewBox', '0 0 ' + diameter + ' ' + diameter)
                        .attr('width', diameter)
                        .attr('height', diameter);

                    const root = window.d3.hierarchy({children: payload.nodes})
                        .sum(d => d.size || 0)
                        .sort((a, b) => b.value - a.value);

                    window.d3.pack().size([diameter, diameter]).padding(2)(root);

                    const node = svg.selectAll('g')
                        .data(root.leaves())
                        .enter().append('g')
                        .attr('transform', d => 'translate(' + d.x + ',' + d.y + ')');

                    node.append('title').text(d => d.data.name + ': ' + d.value);
                    node.append('circle').attr('r', d => d.r).style('fill', fill);
                    node.append('text')
                        .attr('dy', '.3em')
                        .style('text-anchor', 'middle')
                        .style('fill', textColor)
                        .style('font-size', fontSize + 'px')
                        .text(d => d.data.name.substring(0, Math.max(0, Math.floor(d.r / 3))));
                });
                return wrap;
            }
        };

        // Render one modality's blocks into a host element. Mermaid runs
        // scoped to just the nodes created here, so lazily rendered tabs get
        // their diagrams on first activation.
        let mermaidInitialized = false;
        function renderBlocksInto(blocks, host) {
            const mermaidNodes = [];
            blocks.forEach(function (block) {
                const r = renderers[block.type];
                if (!r) {
                    const pre = document.createElement('pre');
                    pre.textContent = '[unknown block type: ' + block.type + ']';
                    host.appendChild(pre);
                    return;
                }
                const node = r(block);
                if (node instanceof Node) {
                    host.appendChild(node);
                    if (block.type === 'mermaid') mermaidNodes.push(node);
                }
            });
            if (mermaidNodes.length && window.mermaid) {
                if (!mermaidInitialized) {
                    window.mermaid.initialize({startOnLoad: false, theme: 'default'});
                    mermaidInitialized = true;
                }
                window.mermaid.run({nodes: mermaidNodes});
            }
        }

        // Modality tabs. One <article class="pane"> per modality; panes are
        // rendered lazily on first activation (force-graph / D3 / mermaid
        // need a visible, measurable container). With a single modality the
        // tab bar stays hidden and the page looks exactly like before.
        const mods = data.modalities;
        const tabBar = document.getElementById('modality-tabs');
        const panes = {};
        const tabButtons = {};
        const renderedPanes = {};

        mods.forEach(function (m) {
            const pane = document.createElement('article');
            pane.className = 'pane';
            pane.dataset.key = m.key;
            pane.hidden = true;
            root.appendChild(pane);
            panes[m.key] = pane;
        });

        const defaultKey = mods.some(m => m.key === 'index') ? 'index' : mods[0].key;

        function activate(key, updateHash) {
            mods.forEach(function (m) {
                const isActive = m.key === key;
                panes[m.key].hidden = !isActive;
                if (tabButtons[m.key]) {
                    tabButtons[m.key].classList.toggle('active', isActive);
                    tabButtons[m.key].setAttribute('aria-selected', isActive ? 'true' : 'false');
                }
            });
            // Unhide first, then render: the chart libraries measure widths.
            if (!renderedPanes[key]) {
                renderBlocksInto(mods.find(m => m.key === key).blocks, panes[key]);
                renderedPanes[key] = true;
            }
            if (updateHash) {
                history.replaceState(null, '',
                    key === defaultKey ? location.pathname + location.search : '#' + key);
            }
        }

        if (mods.length > 1) {
            mods.forEach(function (m) {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.textContent = m.label;
                btn.setAttribute('role', 'tab');
                btn.addEventListener('click', function () { activate(m.key, true); });
                tabBar.appendChild(btn);
                tabButtons[m.key] = btn;
            });
            tabBar.hidden = false;
        }

        // The hash selects a tab only when it matches a modality key, so
        // existing anchors keep working.
        const initialHash = location.hash.slice(1);
        activate(mods.some(m => m.key === initialHash) ? initialHash : defaultKey, false);
        window.addEventListener('hashchange', function () {
            const k = location.hash.slice(1);
            if (mods.some(m => m.key === k)) activate(k, false);
        });
    })();
</script>
