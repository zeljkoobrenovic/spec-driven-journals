<script id="data" type="application/json">{"meta": {"title": "What Is Spec-Driven Product Architecture?", "date": "2026-05-22", "author": "by Željko Obrenović (obren.io)", "permalink": "what-is-spec-driven-product-architecture", "timetoread": "10 min", "excerpt": "Spec-driven product architecture treats the product domain model as a source-of-truth artifact: structured enough for AI agents to author and validate, and rich enough to connect product vision to implementation reality.", "tags": "product architecture, spec-driven development, ai, strategy", "icon": "assets/icons/what-is-spec-driven-product-architecture.png", "logo": "assets/images/what-is-spec-driven-product-architecture/logo.jpeg", "logo_credit": "Image generated by Google Gemini (gemini-3-pro-image-preview)"}, "tags": ["product architecture", "spec-driven development", "ai", "strategy"], "blocks": [{"type": "markdown", "content": "> Spec-driven product architecture treats the product domain model as a source-of-truth artifact: structured enough for AI agents to author and validate, and rich enough to connect product vision to implementation reality.\n\nSpec-driven development usually starts close to software delivery. A team writes a specification, an AI agent or developer turns it into code, and tests or reviews check whether the implementation matches the spec.\n\nThat is useful, but it is too narrow for product architecture.\n\nMost products fail to stay coherent before code appears. Customer groups are described in one place, product vision in another, architecture in diagrams, roadmap in planning tools, teams in org charts, and evidence in scattered documents. AI agents can help write all of those artifacts, but without a shared structure they also amplify the fragmentation. They produce plausible text that is hard to compare, hard to validate, and hard to connect back to delivery reality.\n\nSpec-driven product architecture moves the specification boundary upward. The spec is not only a feature brief or a technical design. It is a structured model of a product domain.\n\n## The Core Idea\n\nIn this series, **Spec-Driven Product Architecture** is the method; the public [repository](https://github.com/zeljkoobrenovic/spec-driven-product-architecture) is the working implementation. The method says product architecture should live in structured source models that humans and AI agents can inspect, validate, and publish.\n\nA product architecture model should not stop at a vision statement. It should connect the idea of the product to the structures that make it buildable, operable, and reviewable:\n\n| Layer | What it specifies |\n| --- | --- |\n| Customers | Customer groups, personas, jobs to be done, pains, needs, and outcomes. |\n| Strategy | Value propositions, KPI pyramids, north-star metrics, and product horizons. |\n| Delivery | Channels, APIs, events, releases, MVP scope, and operating workflows. |\n| Product capabilities | Outcome-based capabilities that customers and the business care about. |\n| Product bricks | Implementation-facing building blocks: systems, services, interfaces, modules, data, and dependencies. |\n| Teams | Ownership, responsibilities, coordination points, and team topology. |\n| Roadmap | Targets, initiatives, discoveries, releases, and sequencing. |\n| Evidence and grounding | Source links, assumptions, documents, data signals, and architecture references that ground the model. |\n\nThe model is written as structured JSON under [`_config/`](https://github.com/zeljkoobrenovic/spec-driven-product-architecture/tree/main/_config), rendered into static documentation, and maintained by AI agents and humans together.\n\nReaders can also explore many generated product-domain examples in the published [Spec-Driven Product Architecture overview](https://zeljkoobrenovic.github.io/spec-driven-product-architecture/start-packages/overview/index.html).\n\n\n![Layered product-domain model showing customers, strategy, delivery, capabilities, product bricks, teams, roadmap, and evidence as connected source-of-truth layers.](assets/images/spec-driven-product-architecture-layer-model.jpeg)\n*The product-domain model works as a connected layer stack: product vision flows into customer groups, strategy horizons, delivery, capabilities, product bricks, teams, roadmap, and evidence.*\n\n\n## Dreaming, Exploring, And Grounding\n\nA realistic product architecture needs three complementary modes: **dreaming**, **exploring**, and **grounding**.\n\n| Mode | What it does | Typical artifacts |\n| --- | --- | --- |\n| Dreaming | Defines the intended product: vision, concept, customer value, capabilities, product architecture, future state, and roadmap. | Product-domain specs, strategy horizons, capability maps, product-brick models, target states. |\n| Exploring | Looks at what is actually happening in reality by building and using tools over real data. This connects to [Grounded Architecture](https://grounded-architecture.io/), especially its emphasis on data-led architecture practice and Lightweight Architectural Analytics. | Source-code maps, public-cloud activity, repository activity, deployment and incident data, finance data, ownership maps, technology landscape views. |\n| Grounding | Explicitly connects dreaming and exploring so each important product-architecture concept has evidence, or a visible assumption, in the available data. | Evidence links, data references, confidence notes, trend signals, drift indicators, unresolved evidence gaps. |\n\n![Dreaming, exploring, and grounding loop connecting product vision, real-world architecture data, and evidence-backed product architecture.](assets/images/dreaming-exploring-grounding-loop.png)\n*A pragmatic product architecture moves between dreaming the intended product, exploring real source/code/cloud/log/finance data, and grounding concepts in evidence, assumptions, and trend signals.*\n\nDreaming is necessary because product architecture needs imagination. It defines where the product should go, which customer outcomes matter, and which capabilities and product bricks should exist.\n\nExploring is necessary because organizations already have a reality. Source code, cloud usage, logs, delivery activity, finance, incident history, and ownership signals show what systems exist, how they behave, where money is spent, and where teams are actually investing attention. Grounded Architecture describes this kind of data-led practice as a way to keep architecture connected to the organization and its technology landscape.\n\nGrounding is the explicit join between the two. It asks whether the concepts in the product-domain model can be connected to evidence:\n\n- Does this product brick map to real repositories, services, cloud assets, APIs, or operational workflows?\n- Does this capability have evidence in customer journeys, support data, product analytics, or delivery plans?\n- Does this team ownership claim match repository ownership, activity logs, incident responsibility, or financial accountability?\n- Does this roadmap target respond to observed trends, or only to an aspirational story?\n- Which concepts are still assumptions because the current data does not prove or disprove them?\n\nThe goal is not to reject every concept that lacks evidence. Early product architecture always contains bets. The goal is to make those bets visible, keep the model up to date, and detect when reality starts moving away from the dream.\n\n## Why Product Vision Is Not Enough\n\nProduct vision is necessary, but it is not operational by itself.\n\n\"Build a better ride-sharing marketplace\" does not tell an agent how rider jobs connect to dispatch, pricing, risk, payments, support, driver earnings, fleet operations, or marketplace analytics. \"Modernize internal developer experience\" does not tell an agent which developer journeys matter, which golden paths exist, which platform capabilities are required, who owns them, or how the roadmap should reduce cognitive load.\n\nA vision becomes useful when the model can answer practical questions:\n\n- Which customer groups are materially different?\n- Which jobs to be done create the most important product outcomes?\n- Which KPIs express whether those outcomes are improving?\n- Which capabilities make the outcomes possible?\n- Which product bricks support those capabilities?\n- Which teams own those bricks?\n- Which roadmap items change those bricks, capabilities, and customer outcomes?\n- Which facts are sourced and which are explicit assumptions?\n\nThose questions are the point of the spec.\n\n## Why AI Changes The Bar\n\nAI agents can draft product architecture faster than a human can write it manually. That speed is useful only when the repository gives the agent a clear shape to follow.\n\nWithout structure, an agent tends to produce general product strategy prose. With structure, examples, and validation, the same agent can produce a model that another agent can inspect, extend, compare, and render.\n\nIn this project, the agent is not asked to \"write a strategy.\" It is asked to create or refine source files such as:\n\n- [`customers/customers.json`](https://github.com/zeljkoobrenovic/spec-driven-product-architecture/blob/main/_config/product-domains/ride-sharing-marketplace/customers/customers.json)\n- [`product-deployments/products.json`](https://github.com/zeljkoobrenovic/spec-driven-product-architecture/blob/main/_config/product-domains/ride-sharing-marketplace/product-deployments/products.json)\n- [`product-deployments/deployment.json`](https://github.com/zeljkoobrenovic/spec-driven-product-architecture/blob/main/_config/product-domains/ride-sharing-marketplace/product-deployments/deployment.json)\n- [`delivery/releases.json`](https://github.com/zeljkoobrenovic/spec-driven-product-architecture/blob/main/_config/product-domains/ride-sharing-marketplace/delivery/releases.json)\n- [`product-bricks/product-bricks.json`](https://github.com/zeljkoobrenovic/spec-driven-product-architecture/blob/main/_config/product-domains/ride-sharing-marketplace/product-bricks/product-bricks.json)\n- [`product-bricks/product-capability.json`](https://github.com/zeljkoobrenovic/spec-driven-product-architecture/blob/main/_config/product-domains/ride-sharing-marketplace/product-bricks/product-capability.json)\n- [`objectives/current/...`](https://github.com/zeljkoobrenovic/spec-driven-product-architecture/tree/main/_config/product-domains/ride-sharing-marketplace/objectives/current)\n- [`teams/teams.json`](https://github.com/zeljkoobrenovic/spec-driven-product-architecture/blob/main/_config/product-domains/ride-sharing-marketplace/teams/teams.json)\n- [`business/competition.json`](https://github.com/zeljkoobrenovic/spec-driven-product-architecture/blob/main/_config/product-domains/ride-sharing-marketplace/business/competition.json)\n- [`start/config.json`](https://github.com/zeljkoobrenovic/spec-driven-product-architecture/blob/main/_config/product-domains/ride-sharing-marketplace/start/config.json)\n\nThat is a different operating model. The agent has to work inside a domain language, preserve stable IDs, reuse existing schema patterns, keep references consistent, and validate the model before generated documentation is trusted.\n\n## What Makes It Application-Aware\n\nMany product strategy artifacts are intentionally abstract. They describe customers, needs, opportunities, and value propositions. That abstraction is useful, but it leaves a gap between \"what the product should do\" and \"what has to exist in the application and organization.\"\n\nSpec-Driven Product Architecture closes that gap with product bricks and delivery models.\n\nA product brick is not just a feature and not just a system. It is an implementation-facing unit that can be built, owned, evolved, and connected to product value. A brick can include user-facing components, APIs, message consumers, services, integrations, data dependencies, and dependencies on other bricks. Product capabilities then describe the outcome-based combinations of bricks that produce customer or business value.\n\nThis is what makes the model application-aware. It does not pretend product architecture is only market positioning. It keeps enough implementation structure to support real delivery conversations.\n\n## What This Series Covers\n\nThe rest of this series expands the model in layers:\n\n- [Product Domain as Source of Truth](product-domain-as-source-of-truth.html) explains why the product domain folder is the source of truth.\n- [From Customer Value to Architecture](customer-value-to-architecture.html) shows how customer groups, jobs, KPIs, and strategy horizons create the top of the model.\n- [Product Bricks and Capabilities](product-bricks-and-capabilities.html) explains the bridge from outcomes to implementation-facing architecture.\n- [Delivery, Teams, and Roadmaps](delivery-teams-and-roadmaps.html) connects delivery, ownership, and planning.\n- [AI Agents as Product Architecture Authors](ai-agents-as-product-architecture-authors.html) describes how AI agents should work inside the model.\n- [Modeling Diverse Domains](modeling-diverse-domains.html) explains why examples from many domains are part of the method.\n- [Grounding, Validation, and Publishing](evidence-validation-and-publishing.html) returns to the grounding frame and explains validation and generated static documentation.\n\nSeveral articles use Ride Sharing Marketplace as a lightweight running example. The example is concrete enough to show the model end to end, but it is not meant to make the method specific to marketplaces.\n\nThe goal is not to create a heavier planning process. The goal is to give humans and AI agents a shared product-architecture language that is specific enough to be useful and structured enough to survive repeated changes.\n"}]}</script>

                        const nestedBuf = [];
                        i++;
                        while (i < lines.length) {
                            const nxt = lines[i];
                            if (!nxt.trim()) break;
                            const nBul = nxt.match(bullet);
                            const nOrd = nxt.match(ordered);
                            const nm = nBul || nOrd;
                            if (nm) {
                                if (nm[1].length > baseIndent) {
                                    // nested list line — dedent and stash
                                    nestedBuf.push(nxt.slice(baseIndent + 2));
                                    i++;
                                    continue;
                                }
                                // sibling or end of list
                                break;
                            }
                            // Plain continuation text
                            if (nestedBuf.length) {
                                // continuation inside the nested block
                                nestedBuf.push(nxt.slice(baseIndent + 2));
                            } else {
                                itemBuf.push(nxt.trim());
                            }
                            i++;
                        }

                        let liHtml = inline(itemBuf.join('\n'));
                        if (nestedBuf.length) {
                            liHtml += renderMarkdown(nestedBuf.join('\n'));
                        }
                        items.push('<li>' + liHtml + '</li>');
                    }
                    out.push((isOrdered ? '<ol>' : '<ul>') + items.join('') + (isOrdered ? '</ol>' : '</ul>'));
                    continue;
                }

                const buf = [line];
                i++;
                while (i < lines.length && lines[i].trim() && !/^#{1,6}\s/.test(lines[i]) && !/^>\s?/.test(lines[i]) && !bullet.test(lines[i]) && !ordered.test(lines[i]) && !/^```/.test(lines[i]) && !tableRow.test(lines[i])) {
                    buf.push(lines[i]);
                    i++;
                }
                out.push('<p>' + inline(buf.join(' ')) + '</p>');
            }
            return out.join('\n');
        }

        // Block dispatcher. New block types plug in here.
        const renderers = {
            markdown: function (block) {
                const div = document.createElement('div');
                div.innerHTML = renderMarkdown(block.content);
                return div;
            },
            mermaid: function (block) {
                // Mermaid scans elements with class "mermaid" whose textContent
                // is the diagram source. We collect these nodes and run
                // mermaid.run() once after all blocks are in the DOM.
                const div = document.createElement('div');
                div.className = 'mermaid';
                div.textContent = block.content;
                return div;
            },
            'force-graph': function (block) {
                // build.py emits parsed JSON: {nodes:[{id,size}], links:[{source,target}]}.
                // We instantiate force-graph after the container is in the DOM
                // so it can measure its own width.
                const div = document.createElement('div');
                div.className = 'force-graph';
                const data = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.ForceGraph) return;
                    const maxSize = data.nodes.reduce((m, n) => Math.max(m, n.size || 1), 1);
                    window.ForceGraph()(div)
                        .graphData(data)
                        .width(div.clientWidth)
                        .height(div.clientHeight)
                        .nodeRelSize(4)
                        .nodeVal(n => Math.max(20 * (n.size || 1) / maxSize, 0.001))
                        .nodeLabel(n => n.id + ' (' + (n.size || 1) + ')')
                        .nodeColor(() => 'rgba(135, 206, 235, 0.7)')
                        .linkColor(() => 'rgba(60, 60, 60, 0.4)')
                        .linkDirectionalArrowLength(4)
                        .linkDirectionalArrowRelPos(1)
                        .linkWidth(1);
                });
                return div;
            },
            'bubble-chart': function (block) {
                // build.py emits {nodes:[{name,size}]}. Renders a D3 circle-pack
                // SVG (same shape as the obren.io reference, just inline).
                const wrap = document.createElement('div');
                wrap.className = 'bubble-chart';
                const payload = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.d3) return;
                    const diameter = 480;
                    const fill = '#c0deed';
                    const textColor = '#111111';
                    const fontSize = 12;

                    const svg = window.d3.select(wrap).append('svg')
                        .attr('viewBox', '0 0 ' + diameter + ' ' + diameter)
                        .attr('width', diameter)
                        .attr('height', diameter);

                    const root = window.d3.hierarchy({children: payload.nodes})
                        .sum(d => d.size || 0)
                        .sort((a, b) => b.value - a.value);

                    window.d3.pack().size([diameter, diameter]).padding(2)(root);

                    const node = svg.selectAll('g')
                        .data(root.leaves())
                        .enter().append('g')
                        .attr('transform', d => 'translate(' + d.x + ',' + d.y + ')');

                    node.append('title').text(d => d.data.name + ': ' + d.value);
                    node.append('circle').attr('r', d => d.r).style('fill', fill);
                    node.append('text')
                        .attr('dy', '.3em')
                        .style('text-anchor', 'middle')
                        .style('fill', textColor)
                        .style('font-size', fontSize + 'px')
                        .text(d => d.data.name.substring(0, Math.max(0, Math.floor(d.r / 3))));
                });
                return wrap;
            }
        };

        const mermaidNodes = [];
        data.blocks.forEach(function (block) {
            const r = renderers[block.type];
            if (!r) {
                const pre = document.createElement('pre');
                pre.textContent = '[unknown block type: ' + block.type + ']';
                root.appendChild(pre);
                return;
            }
            const node = r(block);
            if (node instanceof Node) {
                root.appendChild(node);
                if (block.type === 'mermaid') mermaidNodes.push(node);
            }
        });

        if (mermaidNodes.length && window.mermaid) {
            window.mermaid.initialize({startOnLoad: false, theme: 'default'});
            window.mermaid.run({nodes: mermaidNodes});
        }
    })();
</script>
</body>
</html>
