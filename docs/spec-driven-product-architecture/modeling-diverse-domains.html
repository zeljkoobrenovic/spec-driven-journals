<script id="data" type="application/json">{"meta": {"title": "Modeling Diverse Domains", "date": "2026-05-22", "author": "by Željko Obrenović (obren.io)", "permalink": "modeling-diverse-domains", "timetoread": "8 min", "excerpt": "Diverse product-domain examples are not decoration. They teach AI agents which modeling structures are reusable and which product details must remain specific to the domain.", "tags": "examples, domains, ai, modeling", "icon": "assets/icons/modeling-diverse-domains.png", "logo": "assets/images/modeling-diverse-domains/logo.jpeg", "logo_credit": "Image generated by Google Gemini (gemini-3-pro-image-preview)"}, "tags": ["examples", "domains", "ai", "modeling"], "blocks": [{"type": "markdown", "content": "> Diverse product-domain examples are not decoration. They teach AI agents which modeling structures are reusable and which product details must remain specific to the domain.\n\nSpec-Driven Product Architecture includes many product domains: ride sharing, online retail, public cloud services, internal developer platforms, enterprise CRM, premium airlines, local delivery, audio streaming, freight logistics, travel accommodations, industrial water intelligence, and more. Readers can browse the generated examples in the published [product-domain overview](https://zeljkoobrenovic.github.io/spec-driven-product-architecture/start-packages/overview/index.html).\n\nThat variety is not just for demonstration. It is part of the method.\n\nAI agents improve when they can inspect examples. But examples are useful only when they show both consistency and variation. If every example is the same type of product, the agent learns a narrow pattern and over-applies it. If every example uses a different structure, the agent has no stable model to follow.\n\nThe project needs both: reusable structure and domain-specific content.\n\n## What Should Stay The Same\n\nAcross domains, the modeling language should stay stable.\n\nMost domains should be expressible through:\n\n- customer groups\n- personas or stakeholder roles\n- jobs to be done\n- journeys\n- KPI pyramids\n- product strategy horizons\n- product deployments\n- delivery channels, APIs, events, and releases\n- product capabilities\n- product bricks\n- data assets\n- objectives, initiatives, discoveries, and targets\n- teams and ownership\n- evidence, documents, and business context\n\nThis consistency is what lets AI agents transfer learning from one domain to another. A new domain can borrow the structure of mature domains without copying their business content.\n\n## What Must Stay Different\n\nThe domain story must not be standardized into mush.\n\nA ride-sharing marketplace has live supply-demand balancing, dispatch, pricing, safety, driver earnings, and city operations. A public cloud services domain has infrastructure products, developer APIs, governance, reliability, security, marketplace services, and usage-based economics. A premium long-haul airline has retailing, loyalty, operations, recovery, partner connectivity, cargo, and regulated service delivery.\n\nThose domains should not have the same capabilities with different names.\n\nThe reusable model asks the same categories of questions. The domain-specific model answers them differently.\n\n| Reusable question | Domain-specific answer |\n| --- | --- |\n| Who are the materially different customers? | Riders and drivers; developers and platform teams; travelers and airline operations; sellers and shoppers. |\n| What progress are they trying to make? | Complete a trip, deploy safely, recover a disrupted journey, convert an order. |\n| Which KPIs prove improvement? | ETA accuracy, deployment lead time, recovery time, fulfillment accuracy. |\n| Which capabilities are needed? | Dispatch, golden paths, disruption recovery, checkout, partner onboarding. |\n| Which product bricks make them real? | Domain-specific systems, modules, services, integrations, and data assets. |\n| Which teams should own the work? | Stream teams, platform teams, trust teams, data teams, operations teams, compliance teams. |\n\nThis is why examples should be varied. They protect the method from becoming a template that fills itself.\n\n## Domain Archetypes Help\n\nThe existing set of domains suggests several archetypes:\n\n- **Marketplaces** - ride sharing, local delivery, travel accommodations, hosted stays, online retail, real estate, general listings.\n- **Platforms** - internal developer platform, public cloud services, cloud data and AI platform, technical design collaboration.\n- **Regulated or operational services** - premium airline, payments and revenue infrastructure, internet number registry and routing trust, industrial water intelligence.\n- **Enterprise systems** - enterprise CRM, enterprise architecture management, travel and expense management.\n- **Consumer subscription or content products** - audio streaming, digital news, mental wellbeing community.\n\nArchetypes help an agent choose structural references. A new marketplace should inspect marketplace domains. A new developer tooling domain should inspect platform domains. A regulated operational product should inspect domains where compliance, reliability, and evidence are strong.\n\nThe agent should still inspect generator expectations and current schemas. Archetypes guide comparison; they do not replace repository reading.\n\n## Examples Teach Depth\n\nOne hidden benefit of examples is depth calibration.\n\nWithout examples, an agent may produce a shallow skeleton:\n\n- three customer groups\n- five generic capabilities\n- ten vague product bricks\n- a team list with no ownership\n- a roadmap that reads like a project plan\n\nMature examples show a higher bar:\n\n- customer groups with distinct jobs and fears\n- jobs with steps and capability needs\n- KPI trees with specific leaves\n- product bricks with modules and dependencies\n- capabilities composed from multiple bricks\n- teams that plausibly own bricks\n- evidence and assumptions made visible\n\nThis is how the repository makes \"good enough\" concrete.\n\n## Examples Also Reveal Schema Drift\n\nThe source project is evolving. Some files have moved from older names to newer names. Some domains may be more current than others. Some generator expectations may differ from older guidance.\n\nThat is normal in a living repository, but it means agents must inspect before editing.\n\nAn agent should ask:\n\n- Which comparable domains look most mature and current?\n- Which file names do the generators actually expect?\n- Which schema shape appears canonical now?\n- Are there legacy fields that should not be copied?\n- Which validation checks exist?\n\nThis is especially important when creating new domains. Copying an old pattern blindly can preserve drift.\n\n## The Quality Test\n\nDiverse examples are working when they improve future authoring.\n\nA new AI session should be able to inspect the repository and infer:\n\n- how deep a mature domain should be\n- how to separate market facts from assumptions\n- how to avoid generic product-brick filler\n- how to wire capabilities to bricks\n- how to connect teams to ownership\n- how to keep generated documentation useful\n\nThat is the point of modeling diverse domains. The examples are not final truth. They are a growing pattern library for structured product-architecture work.\n\n## Example Domains To Inspect\n\nThe most useful way to read an example is to compare the source specification with the generated documentation. The source folder shows what the AI agent and human reviewers authored. The generated pages show how that model becomes navigable product-architecture documentation.\n\n![Side-by-side schematic comparison of a GitHub product-domain specification folder and the matching generated GitHub Pages documentation.](assets/images/domain-spec-to-generated-docs-comparison.png)\n*The useful comparison is source next to publication: the Ride Sharing Marketplace folder shows the authored specification, while the generated pages show how that same model becomes navigable documentation.*\n\n| Domain | Source specification folder | Generated documentation |\n| --- | --- | --- |\n| Ride Sharing Marketplace | [spec folder](https://github.com/zeljkoobrenovic/spec-driven-product-architecture/tree/main/_config/product-domains/ride-sharing-marketplace) | [generated docs](https://zeljkoobrenovic.github.io/spec-driven-product-architecture/product-domains/ride-sharing-marketplace/start/index.html) |\n| Online Retail Marketplace | [spec folder](https://github.com/zeljkoobrenovic/spec-driven-product-architecture/tree/main/_config/product-domains/online-retail-marketplace) | [generated docs](https://zeljkoobrenovic.github.io/spec-driven-product-architecture/product-domains/online-retail-marketplace/start/index.html) |\n| Internal Developer Platform | [spec folder](https://github.com/zeljkoobrenovic/spec-driven-product-architecture/tree/main/_config/product-domains/internal-developer-platform) | [generated docs](https://zeljkoobrenovic.github.io/spec-driven-product-architecture/product-domains/internal-developer-platform/start/index.html) |\n| Public Cloud Services | [spec folder](https://github.com/zeljkoobrenovic/spec-driven-product-architecture/tree/main/_config/product-domains/public-cloud-services) | [generated docs](https://zeljkoobrenovic.github.io/spec-driven-product-architecture/product-domains/public-cloud-services/start/index.html) |\n| Cloud Data and AI Platform | [spec folder](https://github.com/zeljkoobrenovic/spec-driven-product-architecture/tree/main/_config/product-domains/cloud-data-and-ai-platform) | [generated docs](https://zeljkoobrenovic.github.io/spec-driven-product-architecture/product-domains/cloud-data-and-ai-platform/start/index.html) |\n| Enterprise CRM and Revenue Operations | [spec folder](https://github.com/zeljkoobrenovic/spec-driven-product-architecture/tree/main/_config/product-domains/enterprise-crm-and-revenue-operations) | [generated docs](https://zeljkoobrenovic.github.io/spec-driven-product-architecture/product-domains/enterprise-crm-and-revenue-operations/start/index.html) |\n| Premium Long-Haul Airline | [spec folder](https://github.com/zeljkoobrenovic/spec-driven-product-architecture/tree/main/_config/product-domains/premium-long-haul-airline) | [generated docs](https://zeljkoobrenovic.github.io/spec-driven-product-architecture/product-domains/premium-long-haul-airline/start/index.html) |\n| Travel Accommodations Marketplace | [spec folder](https://github.com/zeljkoobrenovic/spec-driven-product-architecture/tree/main/_config/product-domains/travel-accommodations-marketplace) | [generated docs](https://zeljkoobrenovic.github.io/spec-driven-product-architecture/product-domains/travel-accommodations-marketplace/start/index.html) |\n\n[Grounding, Validation, and Publishing](evidence-validation-and-publishing.html) closes the series by returning to grounding: how evidence, validation, and static publishing keep the pattern library trustworthy enough to use.\n"}]}</script>

    (function () {
        const data = JSON.parse(document.getElementById('data').textContent);
        const root = document.getElementById('content');

        const postId = (data.meta && data.meta.id) ? String(data.meta.id) : '';
        const postStatusRaw = (data.meta && data.meta.status) ? String(data.meta.status) : '';
        if (postId || postStatusRaw) {
            const header = document.getElementById('post-header');
            let sectionEl = header.querySelector('p.section');
            if (!sectionEl) {
                sectionEl = document.createElement('p');
                sectionEl.className = 'section';
                header.insertBefore(sectionEl, header.firstChild);
            }
            // Status pill goes first, then a " / " separator before the existing
            // content (section name and/or id).
            if (postStatusRaw) {
                const parts = postStatusRaw.split(':');
                const statusName = parts[0].trim();
                const statusColor = (parts[1] || '').trim();
                const wrap = document.createElement('span');
                wrap.className = 'post-status';
                const dot = document.createElement('span');
                dot.className = 'status-dot';
                if (statusColor) dot.style.background = statusColor;
                wrap.appendChild(dot);
                wrap.appendChild(document.createTextNode(statusName));
                if (sectionEl.firstChild) {
                    sectionEl.insertBefore(document.createTextNode(' • '), sectionEl.firstChild);
                    sectionEl.insertBefore(wrap, sectionEl.firstChild);
                } else {
                    sectionEl.appendChild(wrap);
                }
            }
            if (postId) {
                if (sectionEl.firstChild) sectionEl.appendChild(document.createTextNode(' • '));
                sectionEl.appendChild(document.createTextNode(postId));
            }
        }

        const tagsHost = document.getElementById('tags');
        (data.tags || []).forEach(function (t) {
            const span = document.createElement('span');
            span.className = 'tag';
            span.textContent = t;
            tagsHost.appendChild(span);
        });

        // Minimal markdown renderer. Supports: ATX headings, paragraphs, blockquotes,
        // unordered/ordered lists, fenced code, inline code, bold/italic/strikethrough, links, images, hr.
        // Sufficient for the posts in this repo; replace with a fuller parser if needed.
        function renderMarkdown(src) {
            const lines = src.replace(/\r\n/g, '\n').split('\n');
            const out = [];
            let i = 0;

            const bullet = /^(\s*)([-*])\s+(.*)$/;
            const ordered = /^(\s*)(\d+)\.\s+(.*)$/;
            const tableRow = /^\s*\|(.+)\|\s*$/;
            const tableSep = /^\s*\|?\s*:?-{3,}:?\s*(\|\s*:?-{3,}:?\s*)+\|?\s*$/;

            function splitRow(s) {
                let t = s.trim();
                if (t.startsWith('|')) t = t.slice(1);
                if (t.endsWith('|')) t = t.slice(0, -1);
                return t.split('|').map(c => c.trim());
            }

            function inline(s) {
                // Posts are trusted content, so raw HTML passes through unescaped
                // (some posts embed inline <blockquote>, <div>, etc.).
                // Stray ampersands still get fixed up.
                s = s.replace(/&(?![a-zA-Z]+;|#\d+;)/g, '&amp;');
                s = s.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<a class="image-link" href="$2" target="_blank" rel="noopener noreferrer"><img alt="$1" src="$2"></a>');
                s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
                s = s.replace(/`([^`]+)`/g, function (_, c) {
                    return '<code>' + c.replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</code>';
                });
                s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
                s = s.replace(/~~([^~\n]+)~~/g, '<del>$1</del>');
                s = s.replace(/(^|[^*])\*([^*\n]+)\*/g, '$1<em>$2</em>');
                return s;
            }

            while (i < lines.length) {
                const line = lines[i];
                if (!line.trim()) {
                    i++;
                    continue;
                }

                const fence = line.match(/^```(\w*)\s*$/);
                if (fence) {
                    i++;
                    const buf = [];
                    while (i < lines.length && !/^```\s*$/.test(lines[i])) {
                        buf.push(lines[i]);
                        i++;
                    }
                    i++;
                    const escaped = buf.join('\n').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                    const cls = fence[1] ? ' class="lang-' + fence[1] + '"' : '';
                    out.push('<pre><code' + cls + '>' + escaped + '</code></pre>');
                    continue;
                }

                const h = line.match(/^(#{1,6})\s+(.*)$/);
                if (h) {
                    out.push('<h' + h[1].length + '>' + inline(h[2]) + '</h' + h[1].length + '>');
                    i++;
                    continue;
                }

                if (/^\s*(?:-\s*){3,}\s*$/.test(line) || /^\s*\*{3,}\s*$/.test(line)) {
                    out.push('<hr>');
                    i++;
                    continue;
                }

                if (/^>\s?/.test(line)) {
                    const buf = [];
                    while (i < lines.length && /^>\s?/.test(lines[i])) {
                        buf.push(lines[i].replace(/^>\s?/, ''));
                        i++;
                    }
                    out.push('<blockquote>' + renderMarkdown(buf.join('\n')) + '</blockquote>');
                    continue;
                }

                if (tableRow.test(line) && i + 1 < lines.length && tableSep.test(lines[i + 1])) {
                    const headers = splitRow(line);
                    i += 2;
                    const rows = [];
                    while (i < lines.length && tableRow.test(lines[i])) {
                        rows.push(splitRow(lines[i]));
                        i++;
                    }
                    let html = '<table><thead><tr>';
                    headers.forEach(h => {
                        html += '<th>' + inline(h) + '</th>';
                    });
                    html += '</tr></thead><tbody>';
                    rows.forEach(r => {
                        html += '<tr>';
                        r.forEach(c => {
                            html += '<td>' + inline(c) + '</td>';
                        });
                        html += '</tr>';
                    });
                    html += '</tbody></table>';
                    out.push(html);
                    continue;
                }

                if (bullet.test(line) || ordered.test(line)) {
                    // Indent of the first bullet defines this list's base level.
                    // Deeper-indented bullets become nested lists (rendered by
                    // recursing into renderMarkdown). Same-or-less indent at a
                    // bullet starts a sibling item (or ends the list).
                    const firstMatch = line.match(bullet) || line.match(ordered);
                    const baseIndent = firstMatch[1].length;
                    const isOrdered = ordered.test(line);
                    const items = [];
                    while (i < lines.length) {
                        const cur = lines[i];
                        if (!cur.trim()) {
                            // blank line breaks the list (matches CommonMark-ish behaviour)
                            i++;
                            break;
                        }
                        const mBul = cur.match(bullet);
                        const mOrd = cur.match(ordered);
                        const m = mBul || mOrd;
                        if (!m) break;
                        if (m[1].length < baseIndent) break;
                        if (m[1].length > baseIndent) break; // shouldn't happen at top of loop
                        // Same-type check: switching between -/* and 1. closes the list
                        if (isOrdered !== !!mOrd) break;

                        const itemBuf = [m[3]];
                        const nestedBuf = [];
                        i++;
                        while (i < lines.length) {
                            const nxt = lines[i];
                            if (!nxt.trim()) break;
                            const nBul = nxt.match(bullet);
                            const nOrd = nxt.match(ordered);
                            const nm = nBul || nOrd;
                            if (nm) {
                                if (nm[1].length > baseIndent) {
                                    // nested list line — dedent and stash
                                    nestedBuf.push(nxt.slice(baseIndent + 2));
                                    i++;
                                    continue;
                                }
                                // sibling or end of list
                                break;
                            }
                            // Plain continuation text
                            if (nestedBuf.length) {
                                // continuation inside the nested block
                                nestedBuf.push(nxt.slice(baseIndent + 2));
                            } else {
                                itemBuf.push(nxt.trim());
                            }
                            i++;
                        }

                        let liHtml = inline(itemBuf.join('\n'));
                        if (nestedBuf.length) {
                            liHtml += renderMarkdown(nestedBuf.join('\n'));
                        }
                        items.push('<li>' + liHtml + '</li>');
                    }
                    out.push((isOrdered ? '<ol>' : '<ul>') + items.join('') + (isOrdered ? '</ol>' : '</ul>'));
                    continue;
                }

                const buf = [line];
                i++;
                while (i < lines.length && lines[i].trim() && !/^#{1,6}\s/.test(lines[i]) && !/^>\s?/.test(lines[i]) && !bullet.test(lines[i]) && !ordered.test(lines[i]) && !/^```/.test(lines[i]) && !tableRow.test(lines[i])) {
                    buf.push(lines[i]);
                    i++;
                }
                out.push('<p>' + inline(buf.join(' ')) + '</p>');
            }
            return out.join('\n');
        }

        // Block dispatcher. New block types plug in here.
        const renderers = {
            markdown: function (block) {
                const div = document.createElement('div');
                div.innerHTML = renderMarkdown(block.content);
                return div;
            },
            mermaid: function (block) {
                // Mermaid scans elements with class "mermaid" whose textContent
                // is the diagram source. We collect these nodes and run
                // mermaid.run() once after all blocks are in the DOM.
                const div = document.createElement('div');
                div.className = 'mermaid';
                div.textContent = block.content;
                return div;
            },
            'force-graph': function (block) {
                // build.py emits parsed JSON: {nodes:[{id,size}], links:[{source,target}]}.
                // We instantiate force-graph after the container is in the DOM
                // so it can measure its own width.
                const div = document.createElement('div');
                div.className = 'force-graph';
                const data = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.ForceGraph) return;
                    const maxSize = data.nodes.reduce((m, n) => Math.max(m, n.size || 1), 1);
                    window.ForceGraph()(div)
                        .graphData(data)
                        .width(div.clientWidth)
                        .height(div.clientHeight)
                        .nodeRelSize(4)
                        .nodeVal(n => Math.max(20 * (n.size || 1) / maxSize, 0.001))
                        .nodeLabel(n => n.id + ' (' + (n.size || 1) + ')')
                        .nodeColor(() => 'rgba(135, 206, 235, 0.7)')
                        .linkColor(() => 'rgba(60, 60, 60, 0.4)')
                        .linkDirectionalArrowLength(4)
                        .linkDirectionalArrowRelPos(1)
                        .linkWidth(1);
                });
                return div;
            },
            'bubble-chart': function (block) {
                // build.py emits {nodes:[{name,size}]}. Renders a D3 circle-pack
                // SVG (same shape as the obren.io reference, just inline).
                const wrap = document.createElement('div');
                wrap.className = 'bubble-chart';
                const payload = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.d3) return;
                    const diameter = 480;
                    const fill = '#c0deed';
                    const textColor = '#111111';
                    const fontSize = 12;

                    const svg = window.d3.select(wrap).append('svg')
                        .attr('viewBox', '0 0 ' + diameter + ' ' + diameter)
                        .attr('width', diameter)
                        .attr('height', diameter);

                    const root = window.d3.hierarchy({children: payload.nodes})
                        .sum(d => d.size || 0)
                        .sort((a, b) => b.value - a.value);

                    window.d3.pack().size([diameter, diameter]).padding(2)(root);

                    const node = svg.selectAll('g')
                        .data(root.leaves())
                        .enter().append('g')
                        .attr('transform', d => 'translate(' + d.x + ',' + d.y + ')');

                    node.append('title').text(d => d.data.name + ': ' + d.value);
                    node.append('circle').attr('r', d => d.r).style('fill', fill);
                    node.append('text')
                        .attr('dy', '.3em')
                        .style('text-anchor', 'middle')
                        .style('fill', textColor)
                        .style('font-size', fontSize + 'px')
                        .text(d => d.data.name.substring(0, Math.max(0, Math.floor(d.r / 3))));
                });
                return wrap;
            }
        };

        const mermaidNodes = [];
        data.blocks.forEach(function (block) {
            const r = renderers[block.type];
            if (!r) {
                const pre = document.createElement('pre');
                pre.textContent = '[unknown block type: ' + block.type + ']';
                root.appendChild(pre);
                return;
            }
            const node = r(block);
            if (node instanceof Node) {
                root.appendChild(node);
                if (block.type === 'mermaid') mermaidNodes.push(node);
            }
        });

        if (mermaidNodes.length && window.mermaid) {
            window.mermaid.initialize({startOnLoad: false, theme: 'default'});
            window.mermaid.run({nodes: mermaidNodes});
        }
    })();
</script>
</body>
</html>
