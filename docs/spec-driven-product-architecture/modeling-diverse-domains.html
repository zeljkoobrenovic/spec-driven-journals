<script id="data" type="application/json">{"meta": {"title": "Modeling Diverse Domains", "date": "2026-05-22", "author": "by Željko Obrenović (obren.io)", "permalink": "modeling-diverse-domains", "timetoread": "8 min", "excerpt": "Diverse product-domain examples are not decoration. They teach AI agents which modeling structures are reusable and which product details must remain specific to the domain.", "tags": "examples, domains, ai, modeling", "icon": "assets/icons/modeling-diverse-domains.png", "logo": "assets/images/modeling-diverse-domains/logo.jpeg", "logo_credit": "Image generated by Google Gemini (gemini-3-pro-image-preview)"}, "tags": ["examples", "domains", "ai", "modeling"], "modalities": [{"key": "index", "label": "Article", "meta": {}, "blocks": [{"type": "markdown", "content": "> Diverse product-domain examples are not decoration. They teach AI agents which modeling structures are reusable and which product details must remain specific to the domain.\n\nSpec-Driven Product Architecture includes many product domains: ride sharing, online retail, public cloud services, internal developer platforms, enterprise CRM, premium airlines, local delivery, audio streaming, freight logistics, travel accommodations, industrial water intelligence, and more. Readers can browse the generated examples in the published [product-domain overview](https://zeljkoobrenovic.github.io/spec-driven-product-architecture/start-packages/overview/index.html).\n\n![Generated product-domain overview page with a searchable grid of domains grouped into marketplaces, mobility, travel, finance, biotech, and technical infrastructure.](assets/extras/screenshot_product_architecture_index.png)\n*The overview is more than a showcase. It gives agents and reviewers a starting map for comparing domains before choosing examples to inspect more deeply.*\n\nThat variety is not just for demonstration. It is part of the method.\n\nAI agents improve when they can inspect examples. But examples are useful only when they show both consistency and variation. If every example is the same type of product, the agent learns a narrow pattern and over-applies it. If every example uses a different structure, the agent has no stable model to follow.\n\nThe project needs both: reusable structure and domain-specific content.\n\n## What Should Stay The Same\n\nAcross domains, the modeling language should stay stable.\n\nMost domains should be expressible through:\n\n- customer groups\n- personas or stakeholder roles\n- jobs to be done\n- journeys\n- KPI pyramids\n- product strategy horizons\n- product deployments\n- delivery channels, APIs, events, and releases\n- product capabilities\n- product bricks\n- data assets\n- objectives, initiatives, discoveries, and targets\n- teams and ownership\n- evidence, documents, and business context\n\nThis consistency is what lets AI agents transfer learning from one domain to another. A new domain can borrow the structure of mature domains without copying their business content.\n\n## What Must Stay Different\n\nThe domain story must not be standardized into mush.\n\nA ride-sharing marketplace has live supply-demand balancing, dispatch, pricing, safety, driver earnings, and city operations. A public cloud services domain has infrastructure products, developer APIs, governance, reliability, security, marketplace services, and usage-based economics. A premium long-haul airline has retailing, loyalty, operations, recovery, partner connectivity, cargo, and regulated service delivery.\n\nThose domains should not have the same capabilities with different names.\n\nThe reusable model asks the same categories of questions. The domain-specific model answers them differently.\n\n| Reusable question | Domain-specific answer |\n| --- | --- |\n| Who are the materially different customers? | Riders and drivers; developers and platform teams; travelers and airline operations; sellers and shoppers. |\n| What progress are they trying to make? | Complete a trip, deploy safely, recover a disrupted journey, convert an order. |\n| Which KPIs prove improvement? | ETA accuracy, deployment lead time, recovery time, fulfillment accuracy. |\n| Which capabilities are needed? | Dispatch, golden paths, disruption recovery, checkout, partner onboarding. |\n| Which product bricks make them real? | Domain-specific systems, modules, services, integrations, and data assets. |\n| Which teams should own the work? | Stream teams, platform teams, trust teams, data teams, operations teams, compliance teams. |\n\nThis is why examples should be varied. They protect the method from becoming a template that fills itself.\n\n## Domain Archetypes Help\n\nThe existing set of domains suggests several archetypes:\n\n- **Marketplaces** - ride sharing, local delivery, travel accommodations, hosted stays, online retail, real estate, general listings.\n- **Platforms** - internal developer platform, public cloud services, cloud data and AI platform, technical design collaboration.\n- **Regulated or operational services** - premium airline, payments and revenue infrastructure, internet number registry and routing trust, industrial water intelligence.\n- **Enterprise systems** - enterprise CRM, enterprise architecture management, travel and expense management.\n- **Consumer subscription or content products** - audio streaming, digital news, mental wellbeing community.\n\nArchetypes help an agent choose structural references. A new marketplace should inspect marketplace domains. A new developer tooling domain should inspect platform domains. A regulated operational product should inspect domains where compliance, reliability, and evidence are strong.\n\nThe agent should still inspect generator expectations and current schemas. Archetypes guide comparison; they do not replace repository reading.\n\n## Examples Teach Depth\n\nOne hidden benefit of examples is depth calibration.\n\nWithout examples, an agent may produce a shallow skeleton:\n\n- three customer groups\n- five generic capabilities\n- ten vague product bricks\n- a team list with no ownership\n- a roadmap that reads like a project plan\n\nMature examples show a higher bar:\n\n- customer groups with distinct jobs and fears\n- jobs with steps and capability needs\n- KPI trees with specific leaves\n- product bricks with modules and dependencies\n- capabilities composed from multiple bricks\n- teams that plausibly own bricks\n- evidence and assumptions made visible\n\nThis is how the repository makes \"good enough\" concrete.\n\n## Examples Also Reveal Schema Drift\n\nThe source project is evolving. Some files have moved from older names to newer names. Some domains may be more current than others. Some generator expectations may differ from older guidance.\n\nThat is normal in a living repository, but it means agents must inspect before editing.\n\nAn agent should ask:\n\n- Which comparable domains look most mature and current?\n- Which file names do the generators actually expect?\n- Which schema shape appears canonical now?\n- Are there legacy fields that should not be copied?\n- Which validation checks exist?\n\nThis is especially important when creating new domains. Copying an old pattern blindly can preserve drift.\n\n## The Quality Test\n\nDiverse examples are working when they improve future authoring.\n\nA new AI session should be able to inspect the repository and infer:\n\n- how deep a mature domain should be\n- how to separate market facts from assumptions\n- how to avoid generic product-brick filler\n- how to wire capabilities to bricks\n- how to connect teams to ownership\n- how to keep generated documentation useful\n\nThat is the point of modeling diverse domains. The examples are not final truth. They are a growing pattern library for structured product-architecture work.\n\n## Example Domains To Inspect\n\nThe most useful way to read an example is to compare the source specification with the generated documentation. The source folder shows what the AI agent and human reviewers authored. The generated pages show how that model becomes navigable product-architecture documentation.\n\n![Side-by-side schematic comparison of a GitHub product-domain specification folder and the matching generated GitHub Pages documentation.](assets/images/domain-spec-to-generated-docs-comparison.png)\n*The useful comparison is source next to publication: the Ride Sharing Marketplace folder shows the authored specification, while the generated pages show how that same model becomes navigable documentation.*\n\n| Domain | Source specification folder | Generated documentation |\n| --- | --- | --- |\n| Ride Sharing Marketplace | [spec folder](https://github.com/zeljkoobrenovic/spec-driven-product-architecture/tree/main/_config/product-domains/ride-sharing-marketplace) | [generated docs](https://zeljkoobrenovic.github.io/spec-driven-product-architecture/product-domains/ride-sharing-marketplace/start/index.html) |\n| Online Retail Marketplace | [spec folder](https://github.com/zeljkoobrenovic/spec-driven-product-architecture/tree/main/_config/product-domains/online-retail-marketplace) | [generated docs](https://zeljkoobrenovic.github.io/spec-driven-product-architecture/product-domains/online-retail-marketplace/start/index.html) |\n| Internal Developer Platform | [spec folder](https://github.com/zeljkoobrenovic/spec-driven-product-architecture/tree/main/_config/product-domains/internal-developer-platform) | [generated docs](https://zeljkoobrenovic.github.io/spec-driven-product-architecture/product-domains/internal-developer-platform/start/index.html) |\n| Public Cloud Services | [spec folder](https://github.com/zeljkoobrenovic/spec-driven-product-architecture/tree/main/_config/product-domains/public-cloud-services) | [generated docs](https://zeljkoobrenovic.github.io/spec-driven-product-architecture/product-domains/public-cloud-services/start/index.html) |\n| Cloud Data and AI Platform | [spec folder](https://github.com/zeljkoobrenovic/spec-driven-product-architecture/tree/main/_config/product-domains/cloud-data-and-ai-platform) | [generated docs](https://zeljkoobrenovic.github.io/spec-driven-product-architecture/product-domains/cloud-data-and-ai-platform/start/index.html) |\n| Enterprise CRM and Revenue Operations | [spec folder](https://github.com/zeljkoobrenovic/spec-driven-product-architecture/tree/main/_config/product-domains/enterprise-crm-and-revenue-operations) | [generated docs](https://zeljkoobrenovic.github.io/spec-driven-product-architecture/product-domains/enterprise-crm-and-revenue-operations/start/index.html) |\n| Premium Long-Haul Airline | [spec folder](https://github.com/zeljkoobrenovic/spec-driven-product-architecture/tree/main/_config/product-domains/premium-long-haul-airline) | [generated docs](https://zeljkoobrenovic.github.io/spec-driven-product-architecture/product-domains/premium-long-haul-airline/start/index.html) |\n| Travel Accommodations Marketplace | [spec folder](https://github.com/zeljkoobrenovic/spec-driven-product-architecture/tree/main/_config/product-domains/travel-accommodations-marketplace) | [generated docs](https://zeljkoobrenovic.github.io/spec-driven-product-architecture/product-domains/travel-accommodations-marketplace/start/index.html) |\n\n[Grounding, Validation, and Publishing](evidence-validation-and-publishing.html) closes the series by returning to grounding: how evidence, validation, and static publishing keep the pattern library trustworthy enough to use.\n"}]}, {"key": "summary", "label": "Summary", "meta": {"timetoread": "2 min"}, "blocks": [{"type": "markdown", "content": "Diverse product-domain examples are part of the method, not demo filler. The repository models many domains — ride sharing, public cloud, premium airlines, audio streaming, freight logistics, and more — because variety is what teaches AI agents which modeling structures are reusable and which product details must stay specific to the domain.\n\nThe underlying problem is how agents learn from examples. If every example is the same kind of product, an agent learns a narrow pattern and over-applies it. If every example uses a different structure, there is no stable model to follow. The example set therefore has to show both consistency and variation at once.\n\n**What changes**\n\n- The modeling language stays stable across domains — customer groups, jobs to be done, journeys, KPI pyramids, capabilities, product bricks, data assets, teams, and evidence — so structure transfers from mature domains to new ones without copying their business content.\n- The domain story stays different: a ride-sharing marketplace, a public cloud platform, and a long-haul airline must not end up with the same capabilities under different names. The reusable model asks the same questions; each domain answers them differently.\n- Domain **archetypes** (marketplaces, platforms, regulated or operational services, enterprise systems, consumer subscription products) guide which existing examples an agent should inspect when modeling something new.\n- Mature examples calibrate depth and quality: they show what \"good enough\" looks like — KPI trees with specific leaves, bricks with modules and dependencies, teams that plausibly own them — instead of a shallow generic skeleton.\n- Every representative generated domain page is paired with its GitHub source specification folder, so readers and agents can jump from publication back to the authored model.\n\n**What it costs**\n\n- A living example set drifts: file names, schemas, and generator expectations evolve, so agents must inspect which domains look current and which fields are legacy before editing — copying an old pattern blindly preserves drift.\n- Variation resists templating. Keeping domains genuinely different takes deliberate effort; the easy failure mode is standardizing every product story into mush.\n\n**What we are not doing**\n\n- No deep comparison of all existing domains, and no ranking of domains by maturity.\n- No external market analysis for individual domains — the examples model structure, not market research.\n\nThe Article tab walks the reusable-versus-specific split, the archetypes, the depth calibration, and the full table of example domains with their source folders. [AI Agents as Product Architecture Authors](ai-agents-as-product-architecture-authors.html) covers how agents use these examples when authoring; [Grounding, Validation, and Publishing](evidence-validation-and-publishing.html) closes the series on keeping the pattern library trustworthy.\n"}]}, {"key": "dialog", "label": "Conversation", "meta": {"timetoread": "8 min listen"}, "blocks": [{"type": "markdown", "content": "## Why so many domains?\n\n**Ben:** Honest question. The repository models ride sharing, online retail, public cloud, a premium airline, audio streaming, freight logistics, industrial water intelligence... That reads like a demo reel. Why does a method need twenty example domains?\n\n**Ana:** Because the variety *is* the method. AI agents improve when they can inspect examples — but examples only teach when they show both consistency and variation. If every example is the same type of product, the agent learns a narrow pattern and over-applies it everywhere. If every example uses a different structure, there's no stable model to follow at all. You need many domains that share one modeling language and disagree on everything else.\n\n**Ben:** So it's a training set, not a showcase.\n\n**Ana:** A pattern library, yes. And there's a published [product-domain overview](https://zeljkoobrenovic.github.io/spec-driven-product-architecture/start-packages/overview/index.html) that works as the map — agents and reviewers use it to compare domains before choosing which ones to inspect deeply.\n\n**Ben:** Fine, but \"consistency and variation\" sounds like one of those phrases that can justify anything. What concretely stays the same?\n\n**Ana:** The modeling language. Across every domain you should be able to express the product through the same building blocks: customer groups, personas, jobs to be done, journeys, KPI pyramids, strategy horizons, deployments, channels and APIs, product capabilities, product bricks, data assets, objectives and initiatives, teams and ownership, evidence. That stability is what lets an agent transfer learning — a new domain borrows the *structure* of mature domains without copying their business content.\n\n## The mush problem\n\n**Ben:** Here's my worry with that list. Once you have a fixed set of categories, every domain starts answering them the same way. Give a template to enough people and you get twenty copies of the template. What stops a ride-sharing marketplace and an airline from ending up with the same capabilities under different names?\n\n**Ana:** That's exactly the failure mode the article names — standardizing the domain story into mush. And the defense is the split: the reusable model asks the same *categories* of questions, but each domain must answer them differently. A ride-sharing marketplace genuinely has live supply-demand balancing, dispatch, pricing, driver earnings, city operations. A public cloud domain has developer APIs, governance, reliability, marketplace services, usage-based economics. A premium long-haul airline has retailing, loyalty, disruption recovery, partner connectivity, cargo, regulated service delivery. Those aren't renamed versions of each other.\n\n**Ben:** Give me the question-and-answer version.\n\n**Ana:** Same question: who are the materially different customers? Riders and drivers in one domain; developers and platform teams in another; travelers and airline operations in a third. Same question: which KPIs prove improvement? ETA accuracy, deployment lead time, recovery time — completely different answers. The reusable question is the invariant. The answer is the domain.\n\n**Ben:** And the diversity of examples is what keeps that honest?\n\n**Ana:** Right. If all the examples were marketplaces, the method would quietly turn into a marketplace template that fills itself. The airline, the cloud platform, the water-intelligence domain — they force the structure to prove it generalizes without flattening anything.\n\n## Archetypes, not an inventory\n\n**Ben:** Twenty-plus domains is still a lot to inspect. If I'm an agent — or a human — starting a new domain, where do I even look first?\n\n**Ana:** That's where archetypes come in. The existing set clusters naturally: **marketplaces** like ride sharing, local delivery, travel accommodations, online retail; **platforms** like the internal developer platform, public cloud services, the cloud data and AI platform; **regulated or operational services** like the premium airline, payments infrastructure, industrial water intelligence; **enterprise systems** like CRM and enterprise architecture management; and **consumer subscription or content products** like audio streaming and digital news. A new marketplace should inspect marketplace domains. A new developer tool should inspect platforms. A regulated product should inspect the domains where compliance and evidence are strong.\n\n**Ben:** Why archetypes rather than just documenting every domain in detail?\n\n**Ana:** Deliberate choice, and it's in the spec's decision log: representative archetypes rather than an exhaustive inventory, to keep the thing readable. There's an open question about whether to later expand three domains into proper case studies — but cataloguing everything was rejected.\n\n**Ben:** One caveat I'd want on record: archetypes sound like they could become a shortcut. \"It's a marketplace, copy the marketplace.\"\n\n**Ana:** The article is explicit about that — archetypes guide comparison, they do not replace repository reading. The agent still has to inspect what the generators actually expect and what the current schemas look like. Which brings us to the part people underestimate.\n\n## Depth and drift\n\n**Ben:** Go on.\n\n**Ana:** Examples teach *depth*. Without them, an agent produces a shallow skeleton — three customer groups, five generic capabilities, ten vague product bricks, a team list with no ownership, a roadmap that reads like a project plan. Mature examples show a higher bar: customer groups with distinct jobs and fears, KPI trees with specific leaves, bricks with modules and dependencies, capabilities composed from multiple bricks, teams that plausibly own them, assumptions made visible. The examples are how the repository makes \"good enough\" concrete instead of leaving it as taste.\n\n**Ben:** Okay, but here's the cost question. A living repository with twenty domains — they can't all be equally current. Some were authored against older schemas, file names move, generator expectations shift. Your pattern library is partly a museum.\n\n**Ana:** True, and the article doesn't hide it — it calls it schema drift, and it's the price of a living example set. The consequence is a rule: inspect before editing. Which comparable domains look most mature? Which file names do the generators actually expect now? Which schema shape is canonical? Are there legacy fields that shouldn't be copied? Copying an old pattern blindly doesn't just produce one stale domain — it *preserves* the drift and propagates it forward.\n\n**Ben:** So the examples are simultaneously the quality bar and a drift hazard.\n\n**Ana:** Yes — and that tension is why [AI Agents as Product Architecture Authors](ai-agents-as-product-architecture-authors.html) insists agents work inside validation and current schemas rather than freestyle from any one example. The quality test for the whole example set is simple: does a fresh AI session, inspecting the repository, infer how deep a mature domain should be, how to separate market facts from assumptions, how to avoid generic brick filler, how to wire capabilities to bricks and teams to ownership? If yes, the diversity is doing its job.\n\n**Ben:** Can a reader actually check that, or do they have to take your word for it?\n\n**Ana:** They can check it directly — that's why the article ends with a table pairing each representative generated domain page with its GitHub source specification folder. The useful way to read an example is source next to publication: the spec folder shows what the agent and human reviewers authored; the generated pages show how that model becomes navigable documentation. Ride Sharing Marketplace is the one to start with, since it's also the running example of the whole series.\n\n## What we're not claiming\n\n**Ben:** Let's close the way we usually do. What is this record explicitly *not* saying?\n\n**Ana:** Three non-goals. It's not a deep comparison of all existing domains — archetypes and a link table, not a survey. It's not a maturity ranking; nobody is grading domains against each other. And it's not market analysis — the airline domain doesn't tell you anything true about the airline industry beyond what the modeling needed.\n\n**Ben:** And the examples themselves — final form?\n\n**Ana:** Explicitly not. The examples are not final truth; they're a growing pattern library for structured product-architecture work. The open question on the spec is whether to expand a few domains into full case studies later. And the revisit trigger is built into the method: when a new session inspects the repository and *can't* infer the quality bar, the example set needs work.\n\n**Ben:** A demo reel that turned out to be the curriculum. Fine — I'll allow it. *(laughs)*\n\n**Ana:** And if you want the trust side — how evidence and validation keep that curriculum honest — [Grounding, Validation, and Publishing](evidence-validation-and-publishing.html) closes the series with exactly that.\n"}]}, {"key": "comics", "label": "Comic", "meta": {"timetoread": "3 min"}, "blocks": [{"type": "markdown", "content": "<!-- comic-style\n{\n  \"cast\": \"MAYA: a pragmatic product architect, short dark hair, glasses, rolled-up sleeves, calm and slightly amused, often holding a marker or tablet. REX: an over-eager boxy robot AI assistant, one bent antenna, glowing rectangular eyes, perpetually holding or printing too many documents.\",\n  \"style\": \"Clean two-tone explainer comic, thick ink outlines, flat colors with blue/teal accents on a light cream background, generous white space, hand-lettered speech bubbles with SHORT readable text (max 8 words per bubble), simple geometric office/whiteboard settings, no photorealism, no dense text, no title text.\"\n}\n-->\n\nWhy one method models twenty different products — in eight panels.\n\n![Comic panel: a robot unrolls a wall chart of many product-domain tiles while the architect asks why so many.](assets/images/modeling-diverse-domains/comic-01-why-so-many.jpeg)\n**Panel 1:** *Ride sharing, retail, cloud, airlines, streaming, freight... the variety is not decoration.*\n\n![Comic panel: a robot stamps identical marketplace labels onto an airplane, a server, and a pipe while the architect winces.](assets/images/modeling-diverse-domains/comic-02-one-example-narrow.jpeg)\n**Panel 2:** *One kind of example teaches a narrow pattern — and the agent over-applies it everywhere.*\n\n![Comic panel: a robot stands baffled between example boards drawn as a spiral, a pile, and a tangle of arrows.](assets/images/modeling-diverse-domains/comic-03-no-stable-model.jpeg)\n**Panel 3:** *The opposite failure: if every example has its own structure, nothing transfers.*\n\n![Comic panel: a template machine turns distinct domain shapes into identical gray blobs as the architect stops the conveyor.](assets/images/modeling-diverse-domains/comic-04-the-mush-machine.jpeg)\n**Panel 4:** *The anti-pattern: forcing every domain through one template until the product story turns to mush.*\n\n![Comic panel: a whiteboard with one fixed column of questions and three visibly different answer columns for different domains.](assets/images/modeling-diverse-domains/comic-05-same-questions-different-answers.jpeg)\n**Panel 5:** *The decision: the reusable model asks the same questions; each domain must answer them differently.*\n\n![Comic panel: a robot carries a blank domain board toward labeled archetype shelves in a small library.](assets/images/modeling-diverse-domains/comic-06-archetype-shelves.jpeg)\n**Panel 6:** *How it plays out: archetypes tell a new domain which mature examples to learn structure from.*\n\n![Comic panel: a robot reaches for a dusty old folder while the architect points a flashlight at a current, validated one.](assets/images/modeling-diverse-domains/comic-07-inspect-before-copying.jpeg)\n**Panel 7:** *The cost: a living example set drifts — copying an old pattern blindly preserves the drift.*\n\n![Comic panel: the architect and robot admire a wall of diverse domain boards with one empty slot for the next domain.](assets/images/modeling-diverse-domains/comic-08-pattern-library-grows.jpeg)\n**Panel 8:** *The examples are not final truth — they are a growing pattern library for the next domain.*\n"}]}]}</script>
<script>
    (function () {
        const data = JSON.parse(document.getElementById('data').textContent);
        const root = document.getElementById('content');

        const postId = (data.meta && data.meta.id) ? String(data.meta.id) : '';
        const postStatusRaw = (data.meta && data.meta.status) ? String(data.meta.status) : '';
        if (postId || postStatusRaw) {
            const header = document.getElementById('post-header');
            let sectionEl = header.querySelector('p.section');
            if (!sectionEl) {
                sectionEl = document.createElement('p');
                sectionEl.className = 'section';
                header.insertBefore(sectionEl, header.firstChild);
            }
            // Status pill goes first, then a " / " separator before the existing
            // content (section name and/or id).
            if (postStatusRaw) {
                const parts = postStatusRaw.split(':');
                const statusName = parts[0].trim();
                const statusColor = (parts[1] || '').trim();
                const wrap = document.createElement('span');
                wrap.className = 'post-status';
                const dot = document.createElement('span');
                dot.className = 'status-dot';
                if (statusColor) dot.style.background = statusColor;
                wrap.appendChild(dot);
                wrap.appendChild(document.createTextNode(statusName));
                if (sectionEl.firstChild) {
                    sectionEl.insertBefore(document.createTextNode(' • '), sectionEl.firstChild);
                    sectionEl.insertBefore(wrap, sectionEl.firstChild);
                } else {
                    sectionEl.appendChild(wrap);
                }
            }
            if (postId) {
                if (sectionEl.firstChild) sectionEl.appendChild(document.createTextNode(' • '));
                sectionEl.appendChild(document.createTextNode(postId));
            }
        }

        const tagsHost = document.getElementById('tags');
        (data.tags || []).forEach(function (t) {
            const span = document.createElement('span');
            span.className = 'tag';
            span.textContent = t;
            tagsHost.appendChild(span);
        });

        // Minimal markdown renderer. Supports: ATX headings, paragraphs, blockquotes,
        // unordered/ordered lists, fenced code, inline code, bold/italic/strikethrough, links, images, hr.
        // Sufficient for the posts in this repo; replace with a fuller parser if needed.
        function renderMarkdown(src) {
            const lines = src.replace(/\r\n/g, '\n').split('\n');
            const out = [];
            let i = 0;

            const bullet = /^(\s*)([-*])\s+(.*)$/;
            const ordered = /^(\s*)(\d+)\.\s+(.*)$/;
            const tableRow = /^\s*\|(.+)\|\s*$/;
            const tableSep = /^\s*\|?\s*:?-{3,}:?\s*(\|\s*:?-{3,}:?\s*)+\|?\s*$/;

            function splitRow(s) {
                let t = s.trim();
                if (t.startsWith('|')) t = t.slice(1);
                if (t.endsWith('|')) t = t.slice(0, -1);
                return t.split('|').map(c => c.trim());
            }

            function inline(s) {
                // Posts are trusted content, so raw HTML passes through unescaped
                // (some posts embed inline <blockquote>, <div>, etc.).
                // Stray ampersands still get fixed up.
                s = s.replace(/&(?![a-zA-Z]+;|#\d+;)/g, '&amp;');
                s = s.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<a class="image-link" href="$2" target="_blank" rel="noopener noreferrer"><img alt="$1" src="$2"></a>');
                s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
                s = s.replace(/`([^`]+)`/g, function (_, c) {
                    return '<code>' + c.replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</code>';
                });
                s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
                s = s.replace(/~~([^~\n]+)~~/g, '<del>$1</del>');
                s = s.replace(/(^|[^*])\*([^*\n]+)\*/g, '$1<em>$2</em>');
                return s;
            }

            while (i < lines.length) {
                const line = lines[i];
                if (!line.trim()) {
                    i++;
                    continue;
                }

                const fence = line.match(/^```(\w*)\s*$/);
                if (fence) {
                    i++;
                    const buf = [];
                    while (i < lines.length && !/^```\s*$/.test(lines[i])) {
                        buf.push(lines[i]);
                        i++;
                    }
                    i++;
                    const escaped = buf.join('\n').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                    const cls = fence[1] ? ' class="lang-' + fence[1] + '"' : '';
                    out.push('<pre><code' + cls + '>' + escaped + '</code></pre>');
                    continue;
                }

                const h = line.match(/^(#{1,6})\s+(.*)$/);
                if (h) {
                    out.push('<h' + h[1].length + '>' + inline(h[2]) + '</h' + h[1].length + '>');
                    i++;
                    continue;
                }

                if (/^\s*(?:-\s*){3,}\s*$/.test(line) || /^\s*\*{3,}\s*$/.test(line)) {
                    out.push('<hr>');
                    i++;
                    continue;
                }

                if (/^>\s?/.test(line)) {
                    const buf = [];
                    while (i < lines.length && /^>\s?/.test(lines[i])) {
                        buf.push(lines[i].replace(/^>\s?/, ''));
                        i++;
                    }
                    out.push('<blockquote>' + renderMarkdown(buf.join('\n')) + '</blockquote>');
                    continue;
                }

                if (tableRow.test(line) && i + 1 < lines.length && tableSep.test(lines[i + 1])) {
                    const headers = splitRow(line);
                    i += 2;
                    const rows = [];
                    while (i < lines.length && tableRow.test(lines[i])) {
                        rows.push(splitRow(lines[i]));
                        i++;
                    }
                    let html = '<table><thead><tr>';
                    headers.forEach(h => {
                        html += '<th>' + inline(h) + '</th>';
                    });
                    html += '</tr></thead><tbody>';
                    rows.forEach(r => {
                        html += '<tr>';
                        r.forEach(c => {
                            html += '<td>' + inline(c) + '</td>';
                        });
                        html += '</tr>';
                    });
                    html += '</tbody></table>';
                    out.push(html);
                    continue;
                }

                if (bullet.test(line) || ordered.test(line)) {
                    // Indent of the first bullet defines this list's base level.
                    // Deeper-indented bullets become nested lists (rendered by
                    // recursing into renderMarkdown). Same-or-less indent at a
                    // bullet starts a sibling item (or ends the list).
                    const firstMatch = line.match(bullet) || line.match(ordered);
                    const baseIndent = firstMatch[1].length;
                    const isOrdered = ordered.test(line);
                    const items = [];
                    while (i < lines.length) {
                        const cur = lines[i];
                        if (!cur.trim()) {
                            // blank line breaks the list (matches CommonMark-ish behaviour)
                            i++;
                            break;
                        }
                        const mBul = cur.match(bullet);
                        const mOrd = cur.match(ordered);
                        const m = mBul || mOrd;
                        if (!m) break;
                        if (m[1].length < baseIndent) break;
                        if (m[1].length > baseIndent) break; // shouldn't happen at top of loop
                        // Same-type check: switching between -/* and 1. closes the list
                        if (isOrdered !== !!mOrd) break;

                        const itemBuf = [m[3]];
                        const nestedBuf = [];
                        i++;
                        while (i < lines.length) {
                            const nxt = lines[i];
                            if (!nxt.trim()) break;
                            const nBul = nxt.match(bullet);
                            const nOrd = nxt.match(ordered);
                            const nm = nBul || nOrd;
                            if (nm) {
                                if (nm[1].length > baseIndent) {
                                    // nested list line — dedent and stash
                                    nestedBuf.push(nxt.slice(baseIndent + 2));
                                    i++;
                                    continue;
                                }
                                // sibling or end of list
                                break;
                            }
                            // Plain continuation text
                            if (nestedBuf.length) {
                                // continuation inside the nested block
                                nestedBuf.push(nxt.slice(baseIndent + 2));
                            } else {
                                itemBuf.push(nxt.trim());
                            }
                            i++;
                        }

                        let liHtml = inline(itemBuf.join('\n'));
                        if (nestedBuf.length) {
                            liHtml += renderMarkdown(nestedBuf.join('\n'));
                        }
                        items.push('<li>' + liHtml + '</li>');
                    }
                    out.push((isOrdered ? '<ol>' : '<ul>') + items.join('') + (isOrdered ? '</ol>' : '</ul>'));
                    continue;
                }

                const buf = [line];
                i++;
                while (i < lines.length && lines[i].trim() && !/^#{1,6}\s/.test(lines[i]) && !/^>\s?/.test(lines[i]) && !bullet.test(lines[i]) && !ordered.test(lines[i]) && !/^```/.test(lines[i]) && !tableRow.test(lines[i])) {
                    buf.push(lines[i]);
                    i++;
                }
                out.push('<p>' + inline(buf.join(' ')) + '</p>');
            }
            return out.join('\n');
        }

        // Block dispatcher. New block types plug in here.
        const renderers = {
            markdown: function (block) {
                const div = document.createElement('div');
                div.innerHTML = renderMarkdown(block.content);
                return div;
            },
            mermaid: function (block) {
                // Mermaid scans elements with class "mermaid" whose textContent
                // is the diagram source. We collect these nodes and run
                // mermaid.run() once after all blocks are in the DOM.
                const div = document.createElement('div');
                div.className = 'mermaid';
                div.textContent = block.content;
                return div;
            },
            'force-graph': function (block) {
                // build.py emits parsed JSON: {nodes:[{id,size}], links:[{source,target}]}.
                // We instantiate force-graph after the container is in the DOM
                // so it can measure its own width.
                const div = document.createElement('div');
                div.className = 'force-graph';
                const data = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.ForceGraph) return;
                    const maxSize = data.nodes.reduce((m, n) => Math.max(m, n.size || 1), 1);
                    window.ForceGraph()(div)
                        .graphData(data)
                        .width(div.clientWidth)
                        .height(div.clientHeight)
                        .nodeRelSize(4)
                        .nodeVal(n => Math.max(20 * (n.size || 1) / maxSize, 0.001))
                        .nodeLabel(n => n.id + ' (' + (n.size || 1) + ')')
                        .nodeColor(() => 'rgba(135, 206, 235, 0.7)')
                        .linkColor(() => 'rgba(60, 60, 60, 0.4)')
                        .linkDirectionalArrowLength(4)
                        .linkDirectionalArrowRelPos(1)
                        .linkWidth(1);
                });
                return div;
            },
            'bubble-chart': function (block) {
                // build.py emits {nodes:[{name,size}]}. Renders a D3 circle-pack
                // SVG (same shape as the obren.io reference, just inline).
                const wrap = document.createElement('div');
                wrap.className = 'bubble-chart';
                const payload = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.d3) return;
                    const diameter = 480;
                    const fill = '#c0deed';
                    const textColor = '#111111';
                    const fontSize = 12;

                    const svg = window.d3.select(wrap).append('svg')
                        .attr('viewBox', '0 0 ' + diameter + ' ' + diameter)
                        .attr('width', diameter)
                        .attr('height', diameter);

                    const root = window.d3.hierarchy({children: payload.nodes})
                        .sum(d => d.size || 0)
                        .sort((a, b) => b.value - a.value);

                    window.d3.pack().size([diameter, diameter]).padding(2)(root);

                    const node = svg.selectAll('g')
                        .data(root.leaves())
                        .enter().append('g')
                        .attr('transform', d => 'translate(' + d.x + ',' + d.y + ')');

                    node.append('title').text(d => d.data.name + ': ' + d.value);
                    node.append('circle').attr('r', d => d.r).style('fill', fill);
                    node.append('text')
                        .attr('dy', '.3em')
                        .style('text-anchor', 'middle')
                        .style('fill', textColor)
                        .style('font-size', fontSize + 'px')
                        .text(d => d.data.name.substring(0, Math.max(0, Math.floor(d.r / 3))));
                });
                return wrap;
            }
        };

        // Render one modality's blocks into a host element. Mermaid runs
        // scoped to just the nodes created here, so lazily rendered tabs get
        // their diagrams on first activation.
        let mermaidInitialized = false;
        function renderBlocksInto(blocks, host) {
            const mermaidNodes = [];
            blocks.forEach(function (block) {
                const r = renderers[block.type];
                if (!r) {
                    const pre = document.createElement('pre');
                    pre.textContent = '[unknown block type: ' + block.type + ']';
                    host.appendChild(pre);
                    return;
                }
                const node = r(block);
                if (node instanceof Node) {
                    host.appendChild(node);
                    if (block.type === 'mermaid') mermaidNodes.push(node);
                }
            });
            if (mermaidNodes.length && window.mermaid) {
                if (!mermaidInitialized) {
                    window.mermaid.initialize({startOnLoad: false, theme: 'default'});
                    mermaidInitialized = true;
                }
                window.mermaid.run({nodes: mermaidNodes});
            }
        }

        // Modality tabs. One <article class="pane"> per modality; panes are
        // rendered lazily on first activation (force-graph / D3 / mermaid
        // need a visible, measurable container). With a single modality the
        // tab bar stays hidden and the page looks exactly like before.
        const mods = data.modalities;
        const tabBar = document.getElementById('modality-tabs');
        const panes = {};
        const tabButtons = {};
        const renderedPanes = {};

        mods.forEach(function (m) {
            const pane = document.createElement('article');
            pane.className = 'pane';
            pane.dataset.key = m.key;
            pane.hidden = true;
            root.appendChild(pane);
            panes[m.key] = pane;
        });

        const defaultKey = mods.some(m => m.key === 'index') ? 'index' : mods[0].key;

        function activate(key, updateHash) {
            mods.forEach(function (m) {
                const isActive = m.key === key;
                panes[m.key].hidden = !isActive;
                if (tabButtons[m.key]) {
                    tabButtons[m.key].classList.toggle('active', isActive);
                    tabButtons[m.key].setAttribute('aria-selected', isActive ? 'true' : 'false');
                }
            });
            // Unhide first, then render: the chart libraries measure widths.
            if (!renderedPanes[key]) {
                renderBlocksInto(mods.find(m => m.key === key).blocks, panes[key]);
                renderedPanes[key] = true;
            }
            if (updateHash) {
                history.replaceState(null, '',
                    key === defaultKey ? location.pathname + location.search : '#' + key);
            }
        }

        if (mods.length > 1) {
            mods.forEach(function (m) {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.textContent = m.label;
                btn.setAttribute('role', 'tab');
                btn.addEventListener('click', function () { activate(m.key, true); });
                tabBar.appendChild(btn);
                tabButtons[m.key] = btn;
            });
            tabBar.hidden = false;
        }

        // The hash selects a tab only when it matches a modality key, so
        // existing anchors keep working.
        const initialHash = location.hash.slice(1);
        activate(mods.some(m => m.key === initialHash) ? initialHash : defaultKey, false);
        window.addEventListener('hashchange', function () {
            const k = location.hash.slice(1);
            if (mods.some(m => m.key === k)) activate(k, false);
        });
    })();
</script>
