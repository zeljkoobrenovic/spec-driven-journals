<script id="data" type="application/json">{"meta": {"title": "AI Agents as Product Architecture Authors", "date": "2026-05-22", "author": "by Željko Obrenović (obren.io)", "permalink": "ai-agents-as-product-architecture-authors", "timetoread": "9 min", "excerpt": "AI agents become useful product-architecture authors when they are given structure, examples, local skills, validation gates, source-first media generation, and a repository they can inspect and validate.", "tags": "ai agents, authoring, product architecture, validation", "icon": "assets/icons/ai-agents-as-product-architecture-authors.png", "logo": "assets/images/ai-agents-as-product-architecture-authors/logo.jpeg", "logo_credit": "Image generated by Google Gemini (gemini-3-pro-image-preview)"}, "tags": ["ai agents", "authoring", "product architecture", "validation"], "modalities": [{"key": "index", "label": "Article", "meta": {}, "blocks": [{"type": "markdown", "content": "> AI agents become useful product-architecture authors when they are given structure, examples, local skills, validation gates, source-first media generation, and a repository they can inspect and validate.\n\nAI agents are good at producing plausible product and architecture prose. That is both useful and dangerous.\n\nThe useful part is speed. An agent can inspect examples, draft source files, fill in repetitive structures, connect artifacts, and generate documentation much faster than a human starting from a blank page.\n\nThe dangerous part is also speed. If the repository does not constrain the work, the agent can produce a confident model that looks coherent but is not grounded in evidence, does not match the existing schema, and cannot be maintained by the next session.\n\nSpec-Driven Product Architecture treats AI agents as structured authors, not independent strategy owners.\n\n## The Human-Agent Division Of Labor\n\nHumans provide intent, judgment, source selection, and review. Agents provide structured drafting, repository navigation, cross-artifact consistency checks, and mechanical validation.\n\n| Human responsibility | Agent responsibility |\n| --- | --- |\n| Choose the product domain and purpose. | Inspect existing domains and infer current patterns. |\n| Provide source links, business context, and constraints. | Separate sourced facts, assumptions, and inferences. |\n| Review whether the model is strategically plausible. | Create or edit source files in the expected structure. |\n| Decide tradeoffs and resolve ambiguity. | Keep IDs stable and references consistent. |\n| Accept, reject, or revise the generated model. | Run validators and generate documentation when requested. |\n\nThis division keeps accountability where it belongs. The agent helps produce the model; it does not own the product strategy.\n\n## Why Local Skills Matter\n\nThe source project includes a repo-local skill library under [`_skills/product-domains/`](https://github.com/zeljkoobrenovic/spec-driven-product-architecture/tree/main/_skills/product-domains).\n\nThose skills are not marketing copy. They are operational guidance for agent work. They define how to approach domain framing, market research, customer segmentation, jobs to be done, KPI architecture, product strategy, product-brick architecture, delivery model design, team topology, roadmap design, schema recognition, structured JSON authoring, and static documentation modeling.\n\nThe skills help the agent avoid a common failure: treating every product architecture task as the same generic writing exercise.\n\nFor example:\n\n- A market-research task needs evidence discipline.\n- A product-brick task needs implementation-facing boundaries.\n- A team-topology task needs ownership and coordination logic.\n- A structured JSON task needs schema compatibility and reference stability.\n\nDifferent phases need different guidance. The skill library gives the agent a way to load only the relevant guidance for the current task.\n\n## Examples Are Part Of The Method\n\nThe project has many product domains. That matters because AI agents learn the repository's shape by inspecting examples.\n\nWhen asked to create a new domain, the agent should not invent a folder structure from memory. It should inspect mature comparable domains, generator expectations, templates, and validation scripts. Then it should reuse the current repository patterns.\n\nThis is how the repository turns examples into authoring infrastructure.\n\nThe examples show:\n\n- how customer groups are expressed\n- how jobs to be done are structured\n- how KPI pyramids are written\n- how strategy horizons are shaped\n- how product bricks use groups, modules, dependencies, and metadata\n- how capabilities depend on bricks\n- how teams own work\n- how generated documentation expects the source to look\n\nThe agent still needs judgment. But it starts from the current system instead of a blank prompt.\n\n## AI Makes The Documentation Engaging\n\nAI is not only useful for drafting source JSON. It is also useful for turning structured product architecture into engaging documents, stories, and visuals.\n\nProduct strategy and implementation architecture are easier to review when the documentation shows the story clearly:\n\n- icons that make domains, customers, capabilities, and product bricks easier to scan\n- comic-like or storyboard visualizations of customer journeys and jobs to be done\n- step-by-step panels that explain how a customer moves from trigger to discovery, evaluation, trial, engagement, and retention\n- executive-style infographics that connect a job, its outcome, supporting capabilities, and relevant KPIs\n- dependency visuals that show how capabilities depend on product bricks, modules, APIs, data assets, teams, and external systems\n- trend and evidence visuals that show whether the architecture is becoming more coherent or drifting away from the intended model\n\n![Gallery of AI-generated product-architecture storytelling assets, including domain icons, JTBD comic panels, customer journey storyboards, capability infographics, and dependency visuals.](assets/images/ai-generated-product-architecture-storytelling-gallery.png)\n*Structured visuals make the product-domain model easier to scan: icons, journey panels, JTBD comics, capability infographics, dependency maps, and trend views can all be generated from the same source language.*\n\nThe important rule is that these visuals should be generated from the source model, not invented beside it. In the source repository, the image-generation scripts under [`_config/scripts/image-generation`](https://github.com/zeljkoobrenovic/spec-driven-product-architecture/tree/main/_config/scripts/image-generation) are a concrete example. They scan product-domain customer models, read `jobsToBeDone` and `customerJourneyStories`, build image prompts from the actual customer, JTBD, journey, outcome, capability, and KPI language, write images into [`customers/media/`](https://github.com/zeljkoobrenovic/spec-driven-product-architecture/tree/main/_config/product-domains/ride-sharing-marketplace/customers/media), and update [`customers.json`](https://github.com/zeljkoobrenovic/spec-driven-product-architecture/blob/main/_config/product-domains/ride-sharing-marketplace/customers/customers.json) media references when needed.\n\n![Rendered customer job page showing AI-generated comic panels for defining search intent, evaluating market fit, and shortlisting properties.](assets/extras/screenshot_customer_jobs_to_be_done.png)\n*The rendered page is the important test. Generated panels are useful only when they stay tied to the customer model and make the job easier to inspect, discuss, and revise.*\n\n![Source-first image generation workflow from customers.json through prompt generation and image APIs into customers/media and updated media references.](assets/images/source-first-image-generation-workflow.png)\n*Source-first image generation keeps media tied to the model: customer JSON feeds prompts, image APIs create the assets, and the source model records the resulting media references.*\n\nThat keeps storytelling connected to the specification. A comic-like journey panel is not a decorative illustration; it is a visual rendering of a modeled customer job. An icon is not only branding; it helps readers navigate a domain model. A dependency visual is not just a diagram; it exposes whether the implementation-facing product bricks and capabilities are understandable enough to reason about.\n\nThis is where LLMs and image models complement the structured repository. The model gives AI the content and constraints. AI turns that content into documents, visual narratives, and maps that humans can actually use in strategy conversations.\n\n## A Good Agent Workflow\n\nA useful AI-mediated session follows a source-first sequence:\n\n1. Read the repository guidance.\n2. Inspect existing domains and generator expectations.\n3. Load only the relevant local skills.\n4. Clarify the intended domain and sources.\n5. Draft or revise source files under [`_config/product-domains/<domain-id>/`](https://github.com/zeljkoobrenovic/spec-driven-product-architecture/tree/main/_config/product-domains).\n6. Keep IDs lowercase and stable.\n7. Keep references synchronized across customers, capabilities, bricks, teams, objectives, and delivery.\n8. Validate JSON and run the scoped domain validator.\n9. Generate docs only when requested or when static output is part of the task.\n10. Summarize assumptions, changed files, validation, and remaining gaps.\n\nThis workflow is slower than asking for a polished article. It is much faster than repairing a disconnected product model later.\n\n## Validation Changes The Conversation\n\nValidation is not a bureaucratic step. It changes what agents optimize for.\n\nIf the only output is prose, the agent optimizes for fluency. If the output must be valid JSON, reference-consistent, schema-aligned, and renderable, the agent has to work with the actual model.\n\nThe source project includes validation scripts such as [`_skills/product-domains/scripts/validate-domain-model.py`](https://github.com/zeljkoobrenovic/spec-driven-product-architecture/blob/main/_skills/product-domains/scripts/validate-domain-model.py):\n\n```text\npython3 _skills/product-domains/scripts/validate-domain-model.py <domain-id>\n```\n\nValidation cannot prove the product strategy is right. It can prove that the source model is parseable and catch classes of inconsistency that otherwise waste review time.\n\nStrategic review remains human work.\n\n## What To Avoid\n\nAI-mediated product architecture fails when the agent is allowed to drift into unsupported certainty.\n\nWatch for:\n\n- invented business metrics\n- generic customers that could fit any domain\n- product bricks with no owning team\n- capabilities that are just renamed systems\n- roadmaps disconnected from customers or KPIs\n- generated docs edited directly instead of source files\n- schema changes introduced because the agent did not inspect examples\n- assumptions presented as sourced facts\n\nThe fix is not to stop using agents. The fix is to give them a stronger source model, clearer examples, and validation gates.\n\n## The Role Of The Reviewer\n\nThe human reviewer should not only proofread text. They should inspect the model's coherence:\n\n- Is the domain scoped correctly?\n- Are the customers materially distinct?\n- Do jobs describe progress?\n- Are KPIs specific enough?\n- Do capabilities represent outcomes?\n- Are product bricks buildable and ownable?\n- Do teams and roadmap items connect to the model?\n- Are assumptions visible?\n\nThat review turns AI output into product architecture.\n\n[Modeling Diverse Domains](modeling-diverse-domains.html) explains why the project deliberately contains many different domains. The variety is not incidental; it is how the method learns what is stable across product contexts and what must remain domain-specific.\n"}]}, {"key": "summary", "label": "Summary", "meta": {"timetoread": "2 min"}, "blocks": [{"type": "markdown", "content": "AI agents are treated as structured product-architecture authors, not autonomous strategists. They become genuinely useful when the repository gives them structure to work inside: examples to inspect, local skills to follow, source models to edit, validation gates to pass, and source-first media generation — with humans keeping intent, judgment, source selection, and review.\n\nThe risk this addresses is speed in both directions. An agent drafts source files, fills repetitive structure, and generates documentation far faster than a human starting from a blank page — and, unconstrained, just as quickly produces a confident model that looks coherent but is ungrounded, schema-incompatible, and unmaintainable by the next session.\n\n**What changes**\n\n- A clear human–agent division of labor: humans choose the domain, provide sources and constraints, decide tradeoffs, and accept or reject the model; agents inspect existing patterns, edit source files, keep IDs and references stable, and run validators. Accountability for strategy stays human.\n- Agent sessions follow a source-first workflow: read repository guidance, inspect comparable domains, load only the relevant local skills, draft or revise source files, validate, and only then generate documentation — closing with a summary of assumptions and gaps.\n- A repo-local skill library replaces generic prompting: market research, jobs to be done, KPI architecture, product bricks, team topology, and structured JSON each get phase-specific guidance, so the agent stops treating every task as the same writing exercise.\n- Validation changes what the agent optimizes for: when output must be valid JSON, reference-consistent, and renderable, the agent works with the actual model instead of optimizing prose fluency.\n- AI-generated visuals — domain icons, JTBD comics, customer journey panels, capability infographics, dependency maps — make the documentation engaging, but are derived from the source model (prompts built from the actual `customers.json` language), never invented as disconnected decoration.\n\n**What it costs**\n\n- The structured workflow is slower than asking for a polished article; the bet is that it is much faster than repairing a disconnected product model later.\n- Human review gets harder, not easier: reviewers must inspect model coherence — distinct customers, ownable bricks, connected roadmaps, visible assumptions — not just proofread text.\n- Examples, skills, and validators are authoring infrastructure that must be maintained for agents to stay effective.\n\n**What we are not doing**\n\n- This is not a prompt-engineering catalog or a tool-specific guide for Codex or Claude Code.\n- It does not claim AI agents can replace product judgment; validation proves the model is parseable and consistent, not that the strategy is right.\n\nThe Article tab covers the full workflow, the skill library, source-first image generation, and the failure modes to watch for. [Modeling Diverse Domains](modeling-diverse-domains.html) explains the example library agents learn from; [Delivery, Teams, and Roadmaps](delivery-teams-and-roadmaps.html) gives the operating-model context.\n"}]}, {"key": "dialog", "label": "Conversation", "meta": {"timetoread": "8 min listen"}, "blocks": [{"type": "markdown", "content": "## Why should I care?\n\n**Ben:** Let me start with the obvious objection. Every vendor on earth is telling me AI agents can write my product strategy. You're telling me they can too — so what's the news here?\n\n**Ana:** The news is the opposite of the pitch. AI agents are very good at producing plausible product and architecture prose, and that's both the useful part and the dangerous part. Useful, because an agent can inspect examples, draft source files, fill in repetitive structure, and generate documentation far faster than a human starting from a blank page. Dangerous, because if nothing constrains the work, you get a confident model that looks coherent but isn't grounded in evidence, doesn't match the existing schema, and can't be maintained by the next session.\n\n**Ben:** So the answer is to use agents less?\n\n**Ana:** No — the answer is to use them differently. Spec-driven product architecture treats AI agents as *structured authors*, not independent strategy owners. The repository gives them structure to work inside: examples to inspect, local skills to follow, source models to edit, and validation gates to pass. The human keeps intent, judgment, source selection, and review.\n\n**Ben:** \"Structured author\" sounds like a euphemism for \"fancy autocomplete.\"\n\n**Ana:** It's more like a division of labor with a clear seam. Humans choose the product domain and purpose, provide sources and constraints, decide tradeoffs, and accept or reject the model. Agents inspect existing domains and infer current patterns, separate sourced facts from assumptions, edit source files in the expected structure, keep IDs stable and references consistent, and run validators. The agent helps produce the model; it does not own the product strategy. That's how accountability stays where it belongs.\n\n## Skills and examples\n\n**Ben:** Fine, but every agent session starts from zero. How does it know what \"the expected structure\" even is?\n\n**Ana:** Two mechanisms. The first is a repo-local skill library. The source project keeps operational guidance under `_skills/product-domains/` — how to approach domain framing, market research, customer segmentation, jobs to be done, KPI architecture, product bricks, team topology, roadmap design, structured JSON authoring. The point is that different phases need different guidance. A market-research task needs evidence discipline. A product-brick task needs implementation-facing boundaries. A team-topology task needs ownership logic. Without that, the agent treats every product architecture task as the same generic writing exercise.\n\n**Ben:** And the second mechanism?\n\n**Ana:** Examples. The project deliberately contains many product domains — that's the whole argument of [Modeling Diverse Domains](modeling-diverse-domains.html). When an agent is asked to create a new domain, it should not invent a folder structure from memory. It inspects mature comparable domains, generator expectations, templates, and validation scripts, and reuses the current patterns. The examples show how customer groups are expressed, how KPI pyramids are written, how bricks use groups and dependencies, how teams own work. The agent still needs judgment, but it starts from the current system instead of a blank prompt.\n\n**Ben:** That sounds like a lot of infrastructure just to babysit a chatbot.\n\n**Ana:** It's authoring infrastructure, and humans benefit from it too. But yes, there's a real cost: the examples, skills, and validators have to be maintained. The bet is explicit — the structured workflow is slower than asking for a polished article, and much faster than repairing a disconnected product model later.\n\n## The validation gate\n\n**Ben:** Here's my deeper worry. An agent can pass any structural check you give it and still write fiction. Validation feels like bureaucratic theater.\n\n**Ana:** Validation isn't there to prove the strategy is right — it can't, and the article says so plainly. It's there because it changes what the agent optimizes for. If the only output is prose, the agent optimizes for fluency. If the output must be valid JSON, reference-consistent, schema-aligned, and renderable, the agent has to work with the actual model. The project ships scoped validators — one command per domain — that catch whole classes of inconsistency that would otherwise waste human review time.\n\n**Ben:** So what does a good session actually look like, start to finish?\n\n**Ana:** Source-first, in order: read the repository guidance; inspect existing domains and generator expectations; load only the relevant skills; clarify the intended domain and sources with the human; draft or revise source files under the domain folder; keep IDs lowercase and stable; keep references synchronized across customers, capabilities, bricks, teams, objectives, and delivery; validate; generate docs only when requested; and finish by summarizing assumptions, changed files, validation results, and remaining gaps.\n\n**Ben:** That last step — summarizing assumptions — feels like the one agents will quietly skip.\n\n**Ana:** Which is exactly why it's named in the workflow. The single worst failure mode is assumptions presented as sourced facts. The agent's job includes separating what came from a provided source, what's an inference, and what's a guess. The reviewer can't do their job if those are blended into one confident voice.\n\n## The pictures\n\n**Ben:** Now the part I'm most skeptical about: AI-generated comics in strategy documentation. Isn't that just decoration? Clip art with better PR?\n\n**Ana:** It's decoration precisely when it's invented beside the model — and that's the rule the article draws. Generated visuals are legitimate when they're derived *from* the source model. The image-generation scripts in the source project are the concrete example: they scan the customer models, read the actual jobs-to-be-done and journey stories, build prompts from that real customer and KPI language, write the images into the domain's media folder, and update the media references in `customers.json` itself.\n\n**Ben:** Why bother at all, though? The JSON is the spec. The pictures don't add information.\n\n**Ana:** They add inspectability. Product strategy is easier to review when the documentation shows the story: icons make domains and bricks easier to scan, journey panels show how a customer moves from trigger to retention, infographics connect a job to its outcome, capabilities, and KPIs, and dependency visuals expose whether the bricks and capabilities are even understandable enough to reason about. A comic-like journey panel isn't an illustration — it's a visual rendering of a modeled customer job. The rendered page is the test: generated panels are useful only when they stay tied to the model and make the job easier to inspect, discuss, and revise.\n\n**Ben:** So the structured model feeds the AI, and the AI feeds the conversation.\n\n**Ana:** That's the complement, yes. The model gives AI the content and the constraints; AI turns it into documents, narratives, and maps humans can actually use in strategy conversations.\n\n## Where this breaks\n\n**Ben:** Give me the failure catalog. What does it look like when this goes wrong?\n\n**Ana:** The article lists the watch items: invented business metrics. Generic customers that could fit any domain. Product bricks with no owning team. Capabilities that are just renamed systems. Roadmaps disconnected from customers or KPIs. Generated docs edited directly instead of the source files. Schema changes introduced because the agent didn't inspect examples. And the one we already named — assumptions dressed up as facts.\n\n**Ben:** And when you see those, you pull the agent out of the loop?\n\n**Ana:** No — that's the trap. The fix is not to stop using agents. The fix is a stronger source model, clearer examples, and validation gates. The other half is the reviewer's job description: don't just proofread the text, inspect the model's coherence. Is the domain scoped correctly? Are the customers materially distinct? Do jobs describe progress? Are KPIs specific? Are bricks buildable and ownable? Do teams and roadmap items connect to the model — the operating-model side that [Delivery, Teams, and Roadmaps](delivery-teams-and-roadmaps.html) covers? That review is what turns AI output into product architecture.\n\n## What we're not saying\n\n**Ben:** Closing question. What should I *not* take away from this?\n\n**Ana:** Three non-goals, deliberately. This is not a prompt-engineering catalog — you won't find a list of magic phrases. It's not a tool-specific guide for Codex or Claude Code; the method is about repository structure, not a particular CLI. And it absolutely does not claim AI agents can replace product judgment. Strategic review remains human work. Validation proves the model is parseable and consistent; only a human can say whether it's right.\n\n**Ben:** So the agent is the fast hand, and the human is still the editor-in-chief.\n\n**Ana:** With one upgrade: the editor reviews a validated, structured, inspectable model — not a pile of confident prose. *(laughs)* That difference is the whole post.\n"}]}, {"key": "comics", "label": "Comic", "meta": {"timetoread": "3 min"}, "blocks": [{"type": "markdown", "content": "<!-- comic-style\n{\n  \"cast\": \"MAYA: a pragmatic product architect, short dark hair, glasses, rolled-up sleeves, calm and slightly amused, often holding a marker or tablet. REX: an over-eager boxy robot AI assistant, one bent antenna, glowing rectangular eyes, perpetually holding or printing too many documents.\",\n  \"style\": \"Clean two-tone explainer comic, thick ink outlines, flat colors with blue/teal accents on a light cream background, generous white space, hand-lettered speech bubbles with SHORT readable text (max 8 words per bubble), simple geometric office/whiteboard settings, no photorealism, no dense text, no title text.\"\n}\n-->\n\nWhat AI agents are actually for in product architecture — in eight panels.\n\n![Comic panel: a robot proudly presents a thick instant strategy document while a skeptical architect raises an eyebrow.](assets/images/ai-agents-as-product-architecture-authors/comic-01-instant-strategy.jpeg)\n**Panel 1:** *AI agents produce plausible product prose at speed — which is both the useful part and the dangerous part.*\n\n![Comic panel: an architect pulls a thread from a confident document and it unravels into disconnected fragments.](assets/images/ai-agents-as-product-architecture-authors/comic-02-confident-but-hollow.jpeg)\n**Panel 2:** *Unconstrained, an agent builds a confident model that no evidence supports and no next session can maintain.*\n\n![Comic panel: a robot presents a chart claiming the target customer is everyone while the architect facepalms.](assets/images/ai-agents-as-product-architecture-authors/comic-03-customers-everyone.jpeg)\n**Panel 3:** *The failure modes are recognizable: generic customers, invented metrics, capabilities that are just renamed systems.*\n\n![Comic panel: the architect hands the robot a toolbox labeled examples, skills, and validators while keeping the decision clipboard.](assets/images/ai-agents-as-product-architecture-authors/comic-04-structured-author.jpeg)\n**Panel 4:** *The decision: treat agents as structured authors inside the repository — humans keep intent, judgment, and review.*\n\n![Comic panel: a robot studies a shelf of structured domain folders and takes notes while the architect nods.](assets/images/ai-agents-as-product-architecture-authors/comic-05-inspect-the-examples.jpeg)\n**Panel 5:** *Examples are authoring infrastructure: the agent starts from the current system, not from a blank prompt.*\n\n![Comic panel: a robot carries labeled JSON blocks through a validation gate while one rejected block sits in a bin.](assets/images/ai-agents-as-product-architecture-authors/comic-06-the-validation-gate.jpeg)\n**Panel 6:** *Validation changes what the agent optimizes for: the output must parse and stay consistent before anyone reviews it.*\n\n![Comic panel: a pipeline turns a JSON source file into icons, journey panels, and a dependency map, while a disconnected doodle is crossed out.](assets/images/ai-agents-as-product-architecture-authors/comic-07-pictures-from-the-model.jpeg)\n**Panel 7:** *Source-first visuals — icons, journey panels, JTBD comics, dependency maps — render the model; they never replace it.*\n\n![Comic panel: the architect reviews a connected model board with checkmarks while the robot stands by with validated files.](assets/images/ai-agents-as-product-architecture-authors/comic-08-fast-hand-human-editor.jpeg)\n**Panel 8:** *The trade: a slower structured workflow today instead of repairing a disconnected product model later — the agent is the fast hand, the human stays editor-in-chief.*\n"}]}]}</script>
<script>
    (function () {
        const data = JSON.parse(document.getElementById('data').textContent);
        const root = document.getElementById('content');

        const postId = (data.meta && data.meta.id) ? String(data.meta.id) : '';
        const postStatusRaw = (data.meta && data.meta.status) ? String(data.meta.status) : '';
        if (postId || postStatusRaw) {
            const header = document.getElementById('post-header');
            let sectionEl = header.querySelector('p.section');
            if (!sectionEl) {
                sectionEl = document.createElement('p');
                sectionEl.className = 'section';
                header.insertBefore(sectionEl, header.firstChild);
            }
            // Status pill goes first, then a " / " separator before the existing
            // content (section name and/or id).
            if (postStatusRaw) {
                const parts = postStatusRaw.split(':');
                const statusName = parts[0].trim();
                const statusColor = (parts[1] || '').trim();
                const wrap = document.createElement('span');
                wrap.className = 'post-status';
                const dot = document.createElement('span');
                dot.className = 'status-dot';
                if (statusColor) dot.style.background = statusColor;
                wrap.appendChild(dot);
                wrap.appendChild(document.createTextNode(statusName));
                if (sectionEl.firstChild) {
                    sectionEl.insertBefore(document.createTextNode(' • '), sectionEl.firstChild);
                    sectionEl.insertBefore(wrap, sectionEl.firstChild);
                } else {
                    sectionEl.appendChild(wrap);
                }
            }
            if (postId) {
                if (sectionEl.firstChild) sectionEl.appendChild(document.createTextNode(' • '));
                sectionEl.appendChild(document.createTextNode(postId));
            }
        }

        const tagsHost = document.getElementById('tags');
        (data.tags || []).forEach(function (t) {
            const span = document.createElement('span');
            span.className = 'tag';
            span.textContent = t;
            tagsHost.appendChild(span);
        });

        // Minimal markdown renderer. Supports: ATX headings, paragraphs, blockquotes,
        // unordered/ordered lists, fenced code, inline code, bold/italic/strikethrough, links, images, hr.
        // Sufficient for the posts in this repo; replace with a fuller parser if needed.
        function renderMarkdown(src) {
            const lines = src.replace(/\r\n/g, '\n').split('\n');
            const out = [];
            let i = 0;

            const bullet = /^(\s*)([-*])\s+(.*)$/;
            const ordered = /^(\s*)(\d+)\.\s+(.*)$/;
            const tableRow = /^\s*\|(.+)\|\s*$/;
            const tableSep = /^\s*\|?\s*:?-{3,}:?\s*(\|\s*:?-{3,}:?\s*)+\|?\s*$/;

            function splitRow(s) {
                let t = s.trim();
                if (t.startsWith('|')) t = t.slice(1);
                if (t.endsWith('|')) t = t.slice(0, -1);
                return t.split('|').map(c => c.trim());
            }

            function inline(s) {
                // Posts are trusted content, so raw HTML passes through unescaped
                // (some posts embed inline <blockquote>, <div>, etc.).
                // Stray ampersands still get fixed up.
                s = s.replace(/&(?![a-zA-Z]+;|#\d+;)/g, '&amp;');
                s = s.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<a class="image-link" href="$2" target="_blank" rel="noopener noreferrer"><img alt="$1" src="$2"></a>');
                s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
                s = s.replace(/`([^`]+)`/g, function (_, c) {
                    return '<code>' + c.replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</code>';
                });
                s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
                s = s.replace(/~~([^~\n]+)~~/g, '<del>$1</del>');
                s = s.replace(/(^|[^*])\*([^*\n]+)\*/g, '$1<em>$2</em>');
                return s;
            }

            while (i < lines.length) {
                const line = lines[i];
                if (!line.trim()) {
                    i++;
                    continue;
                }

                const fence = line.match(/^```(\w*)\s*$/);
                if (fence) {
                    i++;
                    const buf = [];
                    while (i < lines.length && !/^```\s*$/.test(lines[i])) {
                        buf.push(lines[i]);
                        i++;
                    }
                    i++;
                    const escaped = buf.join('\n').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                    const cls = fence[1] ? ' class="lang-' + fence[1] + '"' : '';
                    out.push('<pre><code' + cls + '>' + escaped + '</code></pre>');
                    continue;
                }

                const h = line.match(/^(#{1,6})\s+(.*)$/);
                if (h) {
                    out.push('<h' + h[1].length + '>' + inline(h[2]) + '</h' + h[1].length + '>');
                    i++;
                    continue;
                }

                if (/^\s*(?:-\s*){3,}\s*$/.test(line) || /^\s*\*{3,}\s*$/.test(line)) {
                    out.push('<hr>');
                    i++;
                    continue;
                }

                if (/^>\s?/.test(line)) {
                    const buf = [];
                    while (i < lines.length && /^>\s?/.test(lines[i])) {
                        buf.push(lines[i].replace(/^>\s?/, ''));
                        i++;
                    }
                    out.push('<blockquote>' + renderMarkdown(buf.join('\n')) + '</blockquote>');
                    continue;
                }

                if (tableRow.test(line) && i + 1 < lines.length && tableSep.test(lines[i + 1])) {
                    const headers = splitRow(line);
                    i += 2;
                    const rows = [];
                    while (i < lines.length && tableRow.test(lines[i])) {
                        rows.push(splitRow(lines[i]));
                        i++;
                    }
                    let html = '<table><thead><tr>';
                    headers.forEach(h => {
                        html += '<th>' + inline(h) + '</th>';
                    });
                    html += '</tr></thead><tbody>';
                    rows.forEach(r => {
                        html += '<tr>';
                        r.forEach(c => {
                            html += '<td>' + inline(c) + '</td>';
                        });
                        html += '</tr>';
                    });
                    html += '</tbody></table>';
                    out.push(html);
                    continue;
                }

                if (bullet.test(line) || ordered.test(line)) {
                    // Indent of the first bullet defines this list's base level.
                    // Deeper-indented bullets become nested lists (rendered by
                    // recursing into renderMarkdown). Same-or-less indent at a
                    // bullet starts a sibling item (or ends the list).
                    const firstMatch = line.match(bullet) || line.match(ordered);
                    const baseIndent = firstMatch[1].length;
                    const isOrdered = ordered.test(line);
                    const items = [];
                    while (i < lines.length) {
                        const cur = lines[i];
                        if (!cur.trim()) {
                            // blank line breaks the list (matches CommonMark-ish behaviour)
                            i++;
                            break;
                        }
                        const mBul = cur.match(bullet);
                        const mOrd = cur.match(ordered);
                        const m = mBul || mOrd;
                        if (!m) break;
                        if (m[1].length < baseIndent) break;
                        if (m[1].length > baseIndent) break; // shouldn't happen at top of loop
                        // Same-type check: switching between -/* and 1. closes the list
                        if (isOrdered !== !!mOrd) break;

                        const itemBuf = [m[3]];
                        const nestedBuf = [];
                        i++;
                        while (i < lines.length) {
                            const nxt = lines[i];
                            if (!nxt.trim()) break;
                            const nBul = nxt.match(bullet);
                            const nOrd = nxt.match(ordered);
                            const nm = nBul || nOrd;
                            if (nm) {
                                if (nm[1].length > baseIndent) {
                                    // nested list line — dedent and stash
                                    nestedBuf.push(nxt.slice(baseIndent + 2));
                                    i++;
                                    continue;
                                }
                                // sibling or end of list
                                break;
                            }
                            // Plain continuation text
                            if (nestedBuf.length) {
                                // continuation inside the nested block
                                nestedBuf.push(nxt.slice(baseIndent + 2));
                            } else {
                                itemBuf.push(nxt.trim());
                            }
                            i++;
                        }

                        let liHtml = inline(itemBuf.join('\n'));
                        if (nestedBuf.length) {
                            liHtml += renderMarkdown(nestedBuf.join('\n'));
                        }
                        items.push('<li>' + liHtml + '</li>');
                    }
                    out.push((isOrdered ? '<ol>' : '<ul>') + items.join('') + (isOrdered ? '</ol>' : '</ul>'));
                    continue;
                }

                const buf = [line];
                i++;
                while (i < lines.length && lines[i].trim() && !/^#{1,6}\s/.test(lines[i]) && !/^>\s?/.test(lines[i]) && !bullet.test(lines[i]) && !ordered.test(lines[i]) && !/^```/.test(lines[i]) && !tableRow.test(lines[i])) {
                    buf.push(lines[i]);
                    i++;
                }
                out.push('<p>' + inline(buf.join(' ')) + '</p>');
            }
            return out.join('\n');
        }

        // Block dispatcher. New block types plug in here.
        const renderers = {
            markdown: function (block) {
                const div = document.createElement('div');
                div.innerHTML = renderMarkdown(block.content);
                return div;
            },
            mermaid: function (block) {
                // Mermaid scans elements with class "mermaid" whose textContent
                // is the diagram source. We collect these nodes and run
                // mermaid.run() once after all blocks are in the DOM.
                const div = document.createElement('div');
                div.className = 'mermaid';
                div.textContent = block.content;
                return div;
            },
            'force-graph': function (block) {
                // build.py emits parsed JSON: {nodes:[{id,size}], links:[{source,target}]}.
                // We instantiate force-graph after the container is in the DOM
                // so it can measure its own width.
                const div = document.createElement('div');
                div.className = 'force-graph';
                const data = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.ForceGraph) return;
                    const maxSize = data.nodes.reduce((m, n) => Math.max(m, n.size || 1), 1);
                    window.ForceGraph()(div)
                        .graphData(data)
                        .width(div.clientWidth)
                        .height(div.clientHeight)
                        .nodeRelSize(4)
                        .nodeVal(n => Math.max(20 * (n.size || 1) / maxSize, 0.001))
                        .nodeLabel(n => n.id + ' (' + (n.size || 1) + ')')
                        .nodeColor(() => 'rgba(135, 206, 235, 0.7)')
                        .linkColor(() => 'rgba(60, 60, 60, 0.4)')
                        .linkDirectionalArrowLength(4)
                        .linkDirectionalArrowRelPos(1)
                        .linkWidth(1);
                });
                return div;
            },
            'bubble-chart': function (block) {
                // build.py emits {nodes:[{name,size}]}. Renders a D3 circle-pack
                // SVG (same shape as the obren.io reference, just inline).
                const wrap = document.createElement('div');
                wrap.className = 'bubble-chart';
                const payload = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.d3) return;
                    const diameter = 480;
                    const fill = '#c0deed';
                    const textColor = '#111111';
                    const fontSize = 12;

                    const svg = window.d3.select(wrap).append('svg')
                        .attr('viewBox', '0 0 ' + diameter + ' ' + diameter)
                        .attr('width', diameter)
                        .attr('height', diameter);

                    const root = window.d3.hierarchy({children: payload.nodes})
                        .sum(d => d.size || 0)
                        .sort((a, b) => b.value - a.value);

                    window.d3.pack().size([diameter, diameter]).padding(2)(root);

                    const node = svg.selectAll('g')
                        .data(root.leaves())
                        .enter().append('g')
                        .attr('transform', d => 'translate(' + d.x + ',' + d.y + ')');

                    node.append('title').text(d => d.data.name + ': ' + d.value);
                    node.append('circle').attr('r', d => d.r).style('fill', fill);
                    node.append('text')
                        .attr('dy', '.3em')
                        .style('text-anchor', 'middle')
                        .style('fill', textColor)
                        .style('font-size', fontSize + 'px')
                        .text(d => d.data.name.substring(0, Math.max(0, Math.floor(d.r / 3))));
                });
                return wrap;
            }
        };

        // Render one modality's blocks into a host element. Mermaid runs
        // scoped to just the nodes created here, so lazily rendered tabs get
        // their diagrams on first activation.
        let mermaidInitialized = false;
        function renderBlocksInto(blocks, host) {
            const mermaidNodes = [];
            blocks.forEach(function (block) {
                const r = renderers[block.type];
                if (!r) {
                    const pre = document.createElement('pre');
                    pre.textContent = '[unknown block type: ' + block.type + ']';
                    host.appendChild(pre);
                    return;
                }
                const node = r(block);
                if (node instanceof Node) {
                    host.appendChild(node);
                    if (block.type === 'mermaid') mermaidNodes.push(node);
                }
            });
            if (mermaidNodes.length && window.mermaid) {
                if (!mermaidInitialized) {
                    window.mermaid.initialize({startOnLoad: false, theme: 'default'});
                    mermaidInitialized = true;
                }
                window.mermaid.run({nodes: mermaidNodes});
            }
        }

        // Modality tabs. One <article class="pane"> per modality; panes are
        // rendered lazily on first activation (force-graph / D3 / mermaid
        // need a visible, measurable container). With a single modality the
        // tab bar stays hidden and the page looks exactly like before.
        const mods = data.modalities;
        const tabBar = document.getElementById('modality-tabs');
        const panes = {};
        const tabButtons = {};
        const renderedPanes = {};

        mods.forEach(function (m) {
            const pane = document.createElement('article');
            pane.className = 'pane';
            pane.dataset.key = m.key;
            pane.hidden = true;
            root.appendChild(pane);
            panes[m.key] = pane;
        });

        const defaultKey = mods.some(m => m.key === 'index') ? 'index' : mods[0].key;

        function activate(key, updateHash) {
            mods.forEach(function (m) {
                const isActive = m.key === key;
                panes[m.key].hidden = !isActive;
                if (tabButtons[m.key]) {
                    tabButtons[m.key].classList.toggle('active', isActive);
                    tabButtons[m.key].setAttribute('aria-selected', isActive ? 'true' : 'false');
                }
            });
            // Unhide first, then render: the chart libraries measure widths.
            if (!renderedPanes[key]) {
                renderBlocksInto(mods.find(m => m.key === key).blocks, panes[key]);
                renderedPanes[key] = true;
            }
            if (updateHash) {
                history.replaceState(null, '',
                    key === defaultKey ? location.pathname + location.search : '#' + key);
            }
        }

        if (mods.length > 1) {
            mods.forEach(function (m) {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.textContent = m.label;
                btn.setAttribute('role', 'tab');
                btn.addEventListener('click', function () { activate(m.key, true); });
                tabBar.appendChild(btn);
                tabButtons[m.key] = btn;
            });
            tabBar.hidden = false;
        }

        // The hash selects a tab only when it matches a modality key, so
        // existing anchors keep working.
        const initialHash = location.hash.slice(1);
        activate(mods.some(m => m.key === initialHash) ? initialHash : defaultKey, false);
        window.addEventListener('hashchange', function () {
            const k = location.hash.slice(1);
            if (mods.some(m => m.key === k)) activate(k, false);
        });
    })();
</script>
