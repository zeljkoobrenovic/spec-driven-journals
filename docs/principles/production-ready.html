<script id="data" type="application/json">{"meta": {"id": "ORG-PRIN-PRODUCTION-READY", "status": "draft:gray", "title": "Operational Principle: Production Ready", "date": "2026-05-16", "author": "Organization Tech Strategy", "permalink": "production-ready", "timetoread": "12 min", "excerpt": "A service is not done when it works in staging. It is done when it is fit to run in production. That means observability, health checks, secrets handling, deploy and rollback, capacity, on-call ownership, runbooks, security defaults, and data-protection considerations are all in place before traffic flows. Production-readiness is a property of the *service*, validated against an explicit checklist, owned by the team that runs it. It is not a stage in a release plan.", "tags": "operations, production, sre, on-call, observability, reliability", "logo": "assets/images/production-ready/logo.jpeg", "logo_credit": "Inspired by the JLP Engineering Principles 'Production Ready' principle", "icon": "assets/icons/production-ready.png"}, "tags": ["operations", "production", "sre", "on-call", "observability", "reliability"], "blocks": [{"type": "markdown", "content": "> **Status**: DRAFT\n>\n> **Principle**: An Organization service is **Production Ready** when it can be operated safely and recoverably by the team that owns it. Production-readiness is checked against an explicit list, signed off by the owning team, and refreshed on a regular cadence. Services that fail the list do not receive production traffic, regardless of how complete the features are.\n\n## Statement\n\nProduction Ready means a service has:\n\n* **Ownership**: a named team, an on-call rotation, and a documented escalation path.\n* **Observability**: structured logs, metrics, and traces with consistent shapes.\n* **Health**: liveness and readiness checks aligned with the runtime.\n* **Deployability**: automated build, deploy, and rollback through CI/CD.\n* **Configurability**: secrets and configuration loaded from approved sources.\n* **Resilience**: documented behaviour under partial failure, retries, timeouts.\n* **Capacity**: known limits and a known scaling strategy.\n* **Security**: authentication, authorisation, transport, and dependency hygiene.\n* **Data**: classification of data handled, retention, and protection.\n* **Runbooks**: written, current, and discoverable.\n\nA service that ships without these is not \"early\"; it is *not production ready*.\n\n## How to Read This Principle\n\n| What it says | What it does **not** say |\n| --- | --- |\n| Readiness is a checklist on the service. | Readiness is a one-time gate at launch. |\n| The owning team confirms readiness. | A central team approves readiness. |\n| The bar is consistent across services. | The bar is identical regardless of risk. |\n| Production-readiness can be lost. | Once granted, it is permanent. |\n| The list is small enough to read. | The list grows freely. |\n\nThe point is to make readiness a property maintained by the team, not a stage in a release process.\n\n## How to Apply This Principle\n\nUse this principle to:\n\n* Explain why feature completeness is not production readiness.\n* Evaluate a service against ownership, observability, deployability, resilience, security, data, and runbook expectations.\n* Treat readiness as a maintained property rather than a launch ceremony.\n* Recognise when a service has lost production readiness after going live.\n\n## Rationale\n\nOutages, near-misses, and slow incidents share root causes that are often unglamorous: a missing log line, an unowned alert, a deploy that cannot be rolled back, a runbook that links to a deleted document, a secret in a config file. None of those root causes are technically hard to fix. They go unfixed because they are nobody's main job, until they are an incident.\n\nA Production Ready checklist makes the unglamorous explicit. It puts the responsibility for each item on the team that runs the service. It removes the ambiguity about whether a service is \"ready enough\" by replacing taste with a list.\n\nThe principle aligns with the way Organization's platform is shaping up. ECS Fargate provides standard places to wire health checks, observability, and deploy. AWS provides standard places to manage secrets and access. The platform's job is to make the readiness items easy to satisfy; the team's job is to satisfy them.\n\n## Implications\n\n* **A platform-supported checklist exists.** It is short, current, and reflects what is genuinely needed.\n* **Readiness is the owning team's call.** A team confirms its own service against the list and is accountable for the answer.\n* **Going live requires readiness.** Production traffic is gated by the readiness state.\n* **Readiness can be revoked.** A service that loses ownership, stops emitting metrics, or accumulates unanswered alerts is no longer ready.\n* **Risk shapes scope, not standards.** A higher-risk service may need more, but never less than the baseline.\n* **Defaults satisfy most items.** Templates, base images, and platform defaults should pre-satisfy logging, metrics, health checks, deploy, and secrets.\n* **Runbooks live near the service.** Stored in the repository or a known location, kept current, written for the person paged at 3am.\n\n## Readiness Tests\n\nBefore production traffic flows, the owning team should be able to demonstrate readiness rather than assert it.\n\nUseful tests:\n\n* Can a new engineer find the owner, runbook, dashboards, alerts, and escalation path in five minutes?\n* Can the team deploy and roll back without manual infrastructure work?\n* Can the service lose a dependency and fail in the documented way?\n* Can an on-call engineer distinguish \"service is down\" from \"dependency is down\" from \"traffic changed\"?\n* Are secrets rotated through the approved path?\n* Are data classification, retention, and deletion responsibilities clear?\n* Has the team practiced at least one likely failure mode?\n\nProduction-ready is not a promise that nothing will fail. It is evidence that the team can understand, contain, and recover from failure.\n\n## What This Means for Teams\n\nFor service teams:\n\n* Use the platform defaults so most items are satisfied without custom work.\n* Treat the readiness checklist as a small, ongoing job, not a launch gate.\n* Practice rollback regularly enough that you trust it.\n* Run game days for non-trivial services.\n* When your service changes shape - new data, new traffic, new dependencies - re-check readiness.\n\nFor platform and SRE roles:\n\n* Maintain the readiness checklist as a real, working document.\n* Make the items cheap to satisfy via defaults, templates, and tooling.\n* Detect drift: services without ownership, stale runbooks, silent alerts.\n* Treat readiness as a shared signal, not a stick.\n\nFor tech leads:\n\n* Build readiness into delivery plans, not after them.\n* Block launches that materially miss readiness; do not let them slide on the promise of a follow-up.\n\n## Anti-Patterns\n\n* **\"Production-ready means features work.\"** Features in staging are not the same as a service in production.\n* **Launch and forget.** A service goes live and never has its readiness re-checked.\n* **Orphan services.** Services in production with no named owner; their on-call is \"whoever notices\".\n* **Vanity dashboards.** Metrics that look impressive but are unrelated to user-facing reliability.\n* **Runbooks as wishes.** \"Restart and see\" is not a runbook.\n* **Untested rollback.** Rollback exists in theory; nobody has run it under pressure.\n* **Secret in a file.** Secrets in config files because the secret store felt like extra work.\n* **Readiness theatre.** A checkbox exercise that says yes regardless of the actual state.\n\n## Examples\n\nAligned with the principle:\n\n* A new backend service ships on .NET, ECS Fargate, Ubuntu base, with structured logs, metrics, traces, health checks, and rollback wired up before launch.\n* Secrets come from AWS Secrets Manager via the standard pattern.\n* A runbook in the service repo lists the top five alerts and the first action for each.\n* The team runs a quarterly game day and refreshes the runbook based on what they learned.\n\nOut of alignment with the principle:\n\n* A service ships with logs but no metrics or traces because \"we'll add them later\".\n* On-call is \"whoever was last in the repo\".\n* Rollback has not been used in production in 18 months and nobody is sure it still works.\n* A runbook page is the original launch slide deck.\n\n## Discussion Prompts\n\nUse these prompts before launch and after incidents:\n\n* What would the on-call engineer need at 3am that is still missing?\n* Which readiness item are we treating as follow-up work, and what risk does that create?\n* How would we prove rollback, escalation, and observability work before traffic arrives?\n\n## Related Principles\n\n* [Operational Principle: Observable by Default](observable-by-default.html) - readiness depends on visible signals.\n* [Operational Principle: Cloud Native on AWS](cloud-native-on-aws.html) - readiness uses AWS-native primitives where they exist.\n* [Organisation Principle: Capabilities Follow Ownership](capabilities-follow-ownership.html) - services in production must have a named owner.\n* [Practice Principle: Governance as Code](governance-as-code.html) - readiness items should be enforced by automation where possible.\n\n## Scope and Revisiting\n\nThis principle applies to every service that receives production traffic, processes production data, or is part of a production-critical pipeline. It applies whether the service is owned by an Organization product team or maintained from an AVIV Group inheritance.\n\nIt does not apply to internal experiments, ad-hoc scripts, or sandboxes with no production data and no production traffic.\n\nThe principle should be revisited if:\n\n* The platform changes shape enough that the checklist needs major re-shaping (for example, a move to a different runtime).\n* Major regulatory or compliance requirements add or remove items.\n* Repeated incidents reveal that the current checklist is missing a category.\n\n## Authoritative References\n\n* Google SRE Book, [Service Best Practices and Readiness Reviews](https://sre.google/sre-book/).\n* Susan J. Fowler, *Production-Ready Microservices*, O'Reilly.\n* John Lewis Partnership, [Production Ready Principle](https://engineering-principles.jlp.engineering/).\n* AWS, [Operational Excellence Pillar](https://docs.aws.amazon.com/wellarchitected/latest/operational-excellence-pillar/welcome.html).\n"}]}</script>
<script>
    (function () {
        const data = JSON.parse(document.getElementById('data').textContent);
        const root = document.getElementById('content');

        const postId = (data.meta && data.meta.id) ? String(data.meta.id) : '';
        const postStatusRaw = (data.meta && data.meta.status) ? String(data.meta.status) : '';
        if (postId || postStatusRaw) {
            const header = document.getElementById('post-header');
            let sectionEl = header.querySelector('p.section');
            if (!sectionEl) {
                sectionEl = document.createElement('p');
                sectionEl.className = 'section';
                header.insertBefore(sectionEl, header.firstChild);
            }
            // Status pill goes first, then a " / " separator before the existing
            // content (section name and/or id).
            if (postStatusRaw) {
                const parts = postStatusRaw.split(':');
                const statusName = parts[0].trim();
                const statusColor = (parts[1] || '').trim();
                const wrap = document.createElement('span');
                wrap.className = 'post-status';
                const dot = document.createElement('span');
                dot.className = 'status-dot';
                if (statusColor) dot.style.background = statusColor;
                wrap.appendChild(dot);
                wrap.appendChild(document.createTextNode(statusName));
                if (sectionEl.firstChild) {
                    sectionEl.insertBefore(document.createTextNode(' • '), sectionEl.firstChild);
                    sectionEl.insertBefore(wrap, sectionEl.firstChild);
                } else {
                    sectionEl.appendChild(wrap);
                }
            }
            if (postId) {
                if (sectionEl.firstChild) sectionEl.appendChild(document.createTextNode(' • '));
                sectionEl.appendChild(document.createTextNode(postId));
            }
        }

        const tagsHost = document.getElementById('tags');
        (data.tags || []).forEach(function (t) {
            const span = document.createElement('span');
            span.className = 'tag';
            span.textContent = t;
            tagsHost.appendChild(span);
        });

        // Minimal markdown renderer. Supports: ATX headings, paragraphs, blockquotes,
        // unordered/ordered lists, fenced code, inline code, bold/italic/strikethrough, links, images, hr.
        // Sufficient for the posts in this repo; replace with a fuller parser if needed.
        function renderMarkdown(src) {
            const lines = src.replace(/\r\n/g, '\n').split('\n');
            const out = [];
            let i = 0;

            const bullet = /^(\s*)([-*])\s+(.*)$/;
            const ordered = /^(\s*)(\d+)\.\s+(.*)$/;
            const tableRow = /^\s*\|(.+)\|\s*$/;
            const tableSep = /^\s*\|?\s*:?-{3,}:?\s*(\|\s*:?-{3,}:?\s*)+\|?\s*$/;

            function splitRow(s) {
                let t = s.trim();
                if (t.startsWith('|')) t = t.slice(1);
                if (t.endsWith('|')) t = t.slice(0, -1);
                return t.split('|').map(c => c.trim());
            }

            function inline(s) {
                // Posts are trusted content, so raw HTML passes through unescaped
                // (some posts embed inline <blockquote>, <div>, etc.).
                // Stray ampersands still get fixed up.
                s = s.replace(/&(?![a-zA-Z]+;|#\d+;)/g, '&amp;');
                s = s.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img alt="$1" src="$2">');
                s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
                s = s.replace(/`([^`]+)`/g, function (_, c) {
                    return '<code>' + c.replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</code>';
                });
                s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
                s = s.replace(/~~([^~\n]+)~~/g, '<del>$1</del>');
                s = s.replace(/(^|[^*])\*([^*\n]+)\*/g, '$1<em>$2</em>');
                return s;
            }

            while (i < lines.length) {
                const line = lines[i];
                if (!line.trim()) {
                    i++;
                    continue;
                }

                const fence = line.match(/^```(\w*)\s*$/);
                if (fence) {
                    i++;
                    const buf = [];
                    while (i < lines.length && !/^```\s*$/.test(lines[i])) {
                        buf.push(lines[i]);
                        i++;
                    }
                    i++;
                    const escaped = buf.join('\n').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                    const cls = fence[1] ? ' class="lang-' + fence[1] + '"' : '';
                    out.push('<pre><code' + cls + '>' + escaped + '</code></pre>');
                    continue;
                }

                const h = line.match(/^(#{1,6})\s+(.*)$/);
                if (h) {
                    out.push('<h' + h[1].length + '>' + inline(h[2]) + '</h' + h[1].length + '>');
                    i++;
                    continue;
                }

                if (/^\s*(?:-\s*){3,}\s*$/.test(line) || /^\s*\*{3,}\s*$/.test(line)) {
                    out.push('<hr>');
                    i++;
                    continue;
                }

                if (/^>\s?/.test(line)) {
                    const buf = [];
                    while (i < lines.length && /^>\s?/.test(lines[i])) {
                        buf.push(lines[i].replace(/^>\s?/, ''));
                        i++;
                    }
                    out.push('<blockquote>' + renderMarkdown(buf.join('\n')) + '</blockquote>');
                    continue;
                }

                if (tableRow.test(line) && i + 1 < lines.length && tableSep.test(lines[i + 1])) {
                    const headers = splitRow(line);
                    i += 2;
                    const rows = [];
                    while (i < lines.length && tableRow.test(lines[i])) {
                        rows.push(splitRow(lines[i]));
                        i++;
                    }
                    let html = '<table><thead><tr>';
                    headers.forEach(h => {
                        html += '<th>' + inline(h) + '</th>';
                    });
                    html += '</tr></thead><tbody>';
                    rows.forEach(r => {
                        html += '<tr>';
                        r.forEach(c => {
                            html += '<td>' + inline(c) + '</td>';
                        });
                        html += '</tr>';
                    });
                    html += '</tbody></table>';
                    out.push(html);
                    continue;
                }

                if (bullet.test(line) || ordered.test(line)) {
                    // Indent of the first bullet defines this list's base level.
                    // Deeper-indented bullets become nested lists (rendered by
                    // recursing into renderMarkdown). Same-or-less indent at a
                    // bullet starts a sibling item (or ends the list).
                    const firstMatch = line.match(bullet) || line.match(ordered);
                    const baseIndent = firstMatch[1].length;
                    const isOrdered = ordered.test(line);
                    const items = [];
                    while (i < lines.length) {
                        const cur = lines[i];
                        if (!cur.trim()) {
                            // blank line breaks the list (matches CommonMark-ish behaviour)
                            i++;
                            break;
                        }
                        const mBul = cur.match(bullet);
                        const mOrd = cur.match(ordered);
                        const m = mBul || mOrd;
                        if (!m) break;
                        if (m[1].length < baseIndent) break;
                        if (m[1].length > baseIndent) break; // shouldn't happen at top of loop
                        // Same-type check: switching between -/* and 1. closes the list
                        if (isOrdered !== !!mOrd) break;

                        const itemBuf = [m[3]];
                        const nestedBuf = [];
                        i++;
                        while (i < lines.length) {
                            const nxt = lines[i];
                            if (!nxt.trim()) break;
                            const nBul = nxt.match(bullet);
                            const nOrd = nxt.match(ordered);
                            const nm = nBul || nOrd;
                            if (nm) {
                                if (nm[1].length > baseIndent) {
                                    // nested list line — dedent and stash
                                    nestedBuf.push(nxt.slice(baseIndent + 2));
                                    i++;
                                    continue;
                                }
                                // sibling or end of list
                                break;
                            }
                            // Plain continuation text
                            if (nestedBuf.length) {
                                // continuation inside the nested block
                                nestedBuf.push(nxt.slice(baseIndent + 2));
                            } else {
                                itemBuf.push(nxt.trim());
                            }
                            i++;
                        }

                        let liHtml = inline(itemBuf.join('\n'));
                        if (nestedBuf.length) {
                            liHtml += renderMarkdown(nestedBuf.join('\n'));
                        }
                        items.push('<li>' + liHtml + '</li>');
                    }
                    out.push((isOrdered ? '<ol>' : '<ul>') + items.join('') + (isOrdered ? '</ol>' : '</ul>'));
                    continue;
                }

                const buf = [line];
                i++;
                while (i < lines.length && lines[i].trim() && !/^#{1,6}\s/.test(lines[i]) && !/^>\s?/.test(lines[i]) && !bullet.test(lines[i]) && !ordered.test(lines[i]) && !/^```/.test(lines[i]) && !tableRow.test(lines[i])) {
                    buf.push(lines[i]);
                    i++;
                }
                out.push('<p>' + inline(buf.join(' ')) + '</p>');
            }
            return out.join('\n');
        }

        // Block dispatcher. New block types plug in here.
        const renderers = {
            markdown: function (block) {
                const div = document.createElement('div');
                div.innerHTML = renderMarkdown(block.content);
                return div;
            },
            mermaid: function (block) {
                // Mermaid scans elements with class "mermaid" whose textContent
                // is the diagram source. We collect these nodes and run
                // mermaid.run() once after all blocks are in the DOM.
                const div = document.createElement('div');
                div.className = 'mermaid';
                div.textContent = block.content;
                return div;
            },
            'force-graph': function (block) {
                // build.py emits parsed JSON: {nodes:[{id,size}], links:[{source,target}]}.
                // We instantiate force-graph after the container is in the DOM
                // so it can measure its own width.
                const div = document.createElement('div');
                div.className = 'force-graph';
                const data = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.ForceGraph) return;
                    const maxSize = data.nodes.reduce((m, n) => Math.max(m, n.size || 1), 1);
                    window.ForceGraph()(div)
                        .graphData(data)
                        .width(div.clientWidth)
                        .height(div.clientHeight)
                        .nodeRelSize(4)
                        .nodeVal(n => Math.max(20 * (n.size || 1) / maxSize, 0.001))
                        .nodeLabel(n => n.id + ' (' + (n.size || 1) + ')')
                        .nodeColor(() => 'rgba(135, 206, 235, 0.7)')
                        .linkColor(() => 'rgba(60, 60, 60, 0.4)')
                        .linkDirectionalArrowLength(4)
                        .linkDirectionalArrowRelPos(1)
                        .linkWidth(1);
                });
                return div;
            },
            'bubble-chart': function (block) {
                // build.py emits {nodes:[{name,size}]}. Renders a D3 circle-pack
                // SVG (same shape as the obren.io reference, just inline).
                const wrap = document.createElement('div');
                wrap.className = 'bubble-chart';
                const payload = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.d3) return;
                    const diameter = 480;
                    const fill = '#c0deed';
                    const textColor = '#111111';
                    const fontSize = 12;

                    const svg = window.d3.select(wrap).append('svg')
                        .attr('viewBox', '0 0 ' + diameter + ' ' + diameter)
                        .attr('width', diameter)
                        .attr('height', diameter);

                    const root = window.d3.hierarchy({children: payload.nodes})
                        .sum(d => d.size || 0)
                        .sort((a, b) => b.value - a.value);

                    window.d3.pack().size([diameter, diameter]).padding(2)(root);

                    const node = svg.selectAll('g')
                        .data(root.leaves())
                        .enter().append('g')
                        .attr('transform', d => 'translate(' + d.x + ',' + d.y + ')');

                    node.append('title').text(d => d.data.name + ': ' + d.value);
                    node.append('circle').attr('r', d => d.r).style('fill', fill);
                    node.append('text')
                        .attr('dy', '.3em')
                        .style('text-anchor', 'middle')
                        .style('fill', textColor)
                        .style('font-size', fontSize + 'px')
                        .text(d => d.data.name.substring(0, Math.max(0, Math.floor(d.r / 3))));
                });
                return wrap;
            }
        };

        const mermaidNodes = [];
        data.blocks.forEach(function (block) {
            const r = renderers[block.type];
            if (!r) {
                const pre = document.createElement('pre');
                pre.textContent = '[unknown block type: ' + block.type + ']';
                root.appendChild(pre);
                return;
            }
            const node = r(block);
            if (node instanceof Node) {
                root.appendChild(node);
                if (block.type === 'mermaid') mermaidNodes.push(node);
            }
        });

        if (mermaidNodes.length && window.mermaid) {
            window.mermaid.initialize({startOnLoad: false, theme: 'default'});
            window.mermaid.run({nodes: mermaidNodes});
        }
    })();
</script>
</body>
</html>
