<script id="data" type="application/json">{"meta": {"id": "ORG-PRIN-EVOLUTIONARY-SYSTEMS", "status": "draft:gray", "title": "Design Principle: Evolutionary Systems", "date": "2026-05-16", "author": "Organization Tech Strategy", "permalink": "evolutionary-systems", "timetoread": "12 min", "excerpt": "Design Organization systems for change. The next change is closer and more probable than the next clean rewrite. Architectures should enable small, safe, incremental changes throughout their lifecycle, not optimise for a fixed end-state that will never quite arrive. This shows up as backwards-compatible contracts, additive schema changes, feature flags, well-defined seams, reversible deploys, and a strong bias against grand re-architectures. Evolutionary systems are how Organization makes long-term progress without big-bang risk.", "tags": "design, evolution, change, refactoring, fitness-functions", "logo": "assets/images/evolutionary-systems/logo.jpeg", "logo_credit": "Inspired by the JLP Engineering Principles 'Evolutionary Systems' principle", "icon": "assets/icons/evolutionary-systems.png"}, "tags": ["design", "evolution", "change", "refactoring", "fitness-functions"], "blocks": [{"type": "markdown", "content": "> **Status**: DRAFT\n>\n> **Principle**: Organization systems should be designed and operated to support **easy, incremental change** for as long as they live. The next change matters more than the next rewrite. Contracts, schemas, deployments, and integrations should be shaped so that a small change can be made safely, observed in production, and reversed if necessary. Big-bang re-architectures are a sign that evolution failed earlier, not a celebrated norm.\n\n## Statement\n\nOrganization systems should be:\n\n* Easy to change in small steps.\n* Hard to break with a single deploy.\n* Reversible when a change is wrong.\n* Backwards-compatible across contracts and schemas wherever feasible.\n* Continuously refactored, not periodically rewritten.\n\nA system that is *only* easy to change at the start of its life is not evolutionary. A system that requires a programme of work to change after two years has stopped being evolutionary, regardless of how clean its diagram looks.\n\n## How to Read This Principle\n\n| What it says | What it does **not** say |\n| --- | --- |\n| Optimise for the next change. | Avoid all big decisions. |\n| Prefer additive, backwards-compatible changes. | Never break a contract. |\n| Refactor continuously. | Refactor for its own sake. |\n| Reversibility is a property of the change pipeline. | Reversibility means manual rollback scripts. |\n| Big-bang re-architecture is a smell. | Re-architecture is forbidden. |\n\nEvolutionary design is a way of thinking about *future* changes. It is not a license to defer every hard decision indefinitely.\n\n## How to Apply This Principle\n\nUse this principle to:\n\n* Design changes as small, observable, reversible steps.\n* Recognise when a migration plan has become a big-bang rewrite.\n* Use contracts, schemas, feature flags, and fitness signals to support evolution.\n* Explain why continuous refactoring is cheaper than periodic rescue projects.\n\n## Rationale\n\nThe most reliable fact about a system in production is that someone will need to change it. They will need to change it because of:\n\n* New product behaviour.\n* New regulatory or compliance requirements.\n* New scale or cost constraints.\n* New security expectations.\n* A failed assumption that the original design baked in.\n\nIf the cost of each change is high, two things happen. First, the team stops making small changes and waits for \"the next refactor\". Second, the refactor never quite arrives, because the system has grown around the friction.\n\nEvolutionary design lowers the cost of each step. It accepts that the system in three years' time is going to differ from the one in production today, and prefers to get there by many small, observable steps rather than one large unobservable jump.\n\nThis principle also lines up with how Organization's wider strategy is structured. Inheriting AVIV Group's tooling and then simplifying over 6-12 months is an evolutionary move. Taking the AVIV web stack as a starting point and reserving the right to diverge is evolutionary. The AI strategy's \"incremental over big-bang\" rule is the same principle, expressed differently.\n\n## Implications\n\n* **Contracts are evolved, not replaced.** Add fields, support both shapes during a transition, retire old shapes once consumers have moved.\n* **Schemas use additive migrations.** Add columns; backfill; deprecate old columns; remove later. Never combine \"add\", \"rename\", and \"drop\" into one deployment.\n* **Feature flags are part of the architecture.** They make change a runtime decision rather than a deployment event.\n* **Deploys are reversible.** Rolling back a deploy should not require a database restore.\n* **Strangler patterns over rewrites.** Replace systems by routing traffic away from them piece by piece.\n* **Fitness functions guard against regression.** Performance, error rate, security, and architectural properties should be measured continuously, not audited once.\n* **Refactoring is part of the work, not a separate quarter.** Every change leaves the affected area at least as clean as it found it.\n\n## Evolutionary Design Checklist\n\nA proposed change is evolutionary when it can move through production in controlled steps. Ask:\n\n* Can old and new behaviour run side by side for at least one deploy?\n* Can the change be enabled for a subset of users, traffic, tenants, or consumers?\n* Can rollback happen without restoring a database from backup?\n* Are contract and schema changes additive before they are destructive?\n* Is the migration observable through metrics, logs, traces, and business signals?\n* Is there a clear retirement plan for flags, adapters, compatibility layers, and old paths?\n* Does each step deliver learning or value, rather than only preparing for a future cutover?\n\nIf the plan has only two states - \"old system\" and \"new system\" - it is probably a rewrite plan, not an evolutionary plan.\n\n## What This Means for Teams\n\nFor service teams:\n\n* When changing a published contract, support old and new in parallel for at least one deploy.\n* Treat database migrations as a sequence of additive, reversible steps.\n* Wrap risky changes in feature flags with a clear off-switch and a clear retirement date.\n* Use canary or progressive deploys where the platform supports them.\n* Pay refactoring cost continuously rather than letting it accumulate.\n\nFor platform and architecture roles:\n\n* Make rollback and progressive deploy the default in golden paths.\n* Provide patterns for additive schema changes, contract versioning, and feature flagging.\n* Track architectural fitness signals - error rate, latency, change failure rate, lead time - as first-class outputs of the platform.\n\nFor tech leads:\n\n* Push back on changes that bundle \"fix\", \"refactor\", and \"rewrite\" into a single deploy.\n* Plan migrations in slices with clear, observable milestones.\n* Treat any decision that says \"we'll fix it in the rewrite\" as a red flag.\n\n## Anti-Patterns\n\n* **The Big Rewrite.** A new system replaces an old one in a single cutover, after a long parallel build, with limited production feedback until the end.\n* **Breaking change as default.** Every consumer is forced to update at the same time because the producer changed the contract.\n* **One-way migration.** A deploy that cannot be rolled back without data loss or a restore.\n* **Refactor quarter.** A long pause in feature work to \"clean things up\", followed by a return to the same patterns.\n* **Feature flag graveyard.** Hundreds of unused flags accumulating, hiding the real control flow.\n* **Architecture as a frozen artifact.** A diagram approved once and not updated as the system evolves.\n* **\"We'll fix it in the rewrite.\"** Used as a license to add the very debt the rewrite is supposed to remove.\n\n## Examples\n\nAligned with the principle:\n\n* Adding a new Kafka event type while keeping the old one supported until consumers migrate.\n* Migrating from one library to another via an internal adapter that lets services move one at a time.\n* Splitting a large service by extracting one route at a time behind a feature flag.\n* Consolidating AWS accounts gradually rather than re-platforming everything in one cutover.\n\nOut of alignment with the principle:\n\n* A \"v2\" service rebuilt next to \"v1\" for nine months and switched over in a single weekend.\n* A schema change that renames and drops columns in the same migration.\n* A library upgrade that requires every team to deploy on the same day.\n* A re-architecture proposal whose only success criterion is \"v2 is live\".\n\n## Discussion Prompts\n\nUse these prompts in design reviews:\n\n* What is the smallest safe step that teaches us something useful?\n* Which part of the plan is reversible, and which part is not?\n* What compatibility layer, flag, or metric needs a retirement date?\n\n## Related Principles\n\n* [Design Principle: Small (and Not Too Small) and Simple (and Not Too Simple)](small-and-simple.html) - small pieces are individually easier to evolve.\n* [Design Principle: Standardize Before Diverging](standardize-before-diverging.html) - shared defaults give you safe seams to evolve along.\n* [Organisation Principle: Inherit, Then Simplify](inherit-then-simplify.html) - inherited estates become simpler through evolution, not replacement.\n* [Operational Principle: Production Ready](production-ready.html) - evolutionary change depends on production feedback.\n\n## Scope and Revisiting\n\nThis principle applies to all Organization-owned systems: backend services, web and mobile applications, data and integration pipelines, internal platforms, and shared libraries.\n\nIt does not apply to genuinely throwaway prototypes, short-lived experiments, or one-off scripts; though even there, a habit of reversibility usually pays off.\n\nThe principle should be revisited if:\n\n* The platform stops supporting safe, progressive deploys or rollback.\n* The cost of running parallel versions of a contract or schema becomes unsustainable.\n* A radical architectural shift (for example, a regulatory event) requires a deliberate, exceptional big-bang change.\n\n## Authoritative References\n\n* Neal Ford, Rebecca Parsons, Patrick Kua, *Building Evolutionary Architectures*, O'Reilly.\n* Martin Fowler, [Strangler Fig Application](https://martinfowler.com/bliki/StranglerFigApplication.html).\n* John Lewis Partnership, [Evolutionary Systems Principle](https://engineering-principles.jlp.engineering/).\n* DORA, [Four Key Metrics](https://dora.dev/research/).\n"}]}</script>
<script>
    (function () {
        const data = JSON.parse(document.getElementById('data').textContent);
        const root = document.getElementById('content');

        const postId = (data.meta && data.meta.id) ? String(data.meta.id) : '';
        const postStatusRaw = (data.meta && data.meta.status) ? String(data.meta.status) : '';
        if (postId || postStatusRaw) {
            const header = document.getElementById('post-header');
            let sectionEl = header.querySelector('p.section');
            if (!sectionEl) {
                sectionEl = document.createElement('p');
                sectionEl.className = 'section';
                header.insertBefore(sectionEl, header.firstChild);
            }
            // Status pill goes first, then a " / " separator before the existing
            // content (section name and/or id).
            if (postStatusRaw) {
                const parts = postStatusRaw.split(':');
                const statusName = parts[0].trim();
                const statusColor = (parts[1] || '').trim();
                const wrap = document.createElement('span');
                wrap.className = 'post-status';
                const dot = document.createElement('span');
                dot.className = 'status-dot';
                if (statusColor) dot.style.background = statusColor;
                wrap.appendChild(dot);
                wrap.appendChild(document.createTextNode(statusName));
                if (sectionEl.firstChild) {
                    sectionEl.insertBefore(document.createTextNode(' • '), sectionEl.firstChild);
                    sectionEl.insertBefore(wrap, sectionEl.firstChild);
                } else {
                    sectionEl.appendChild(wrap);
                }
            }
            if (postId) {
                if (sectionEl.firstChild) sectionEl.appendChild(document.createTextNode(' • '));
                sectionEl.appendChild(document.createTextNode(postId));
            }
        }

        const tagsHost = document.getElementById('tags');
        (data.tags || []).forEach(function (t) {
            const span = document.createElement('span');
            span.className = 'tag';
            span.textContent = t;
            tagsHost.appendChild(span);
        });

        // Minimal markdown renderer. Supports: ATX headings, paragraphs, blockquotes,
        // unordered/ordered lists, fenced code, inline code, bold/italic/strikethrough, links, images, hr.
        // Sufficient for the posts in this repo; replace with a fuller parser if needed.
        function renderMarkdown(src) {
            const lines = src.replace(/\r\n/g, '\n').split('\n');
            const out = [];
            let i = 0;

            const bullet = /^(\s*)([-*])\s+(.*)$/;
            const ordered = /^(\s*)(\d+)\.\s+(.*)$/;
            const tableRow = /^\s*\|(.+)\|\s*$/;
            const tableSep = /^\s*\|?\s*:?-{3,}:?\s*(\|\s*:?-{3,}:?\s*)+\|?\s*$/;

            function splitRow(s) {
                let t = s.trim();
                if (t.startsWith('|')) t = t.slice(1);
                if (t.endsWith('|')) t = t.slice(0, -1);
                return t.split('|').map(c => c.trim());
            }

            function inline(s) {
                // Posts are trusted content, so raw HTML passes through unescaped
                // (some posts embed inline <blockquote>, <div>, etc.).
                // Stray ampersands still get fixed up.
                s = s.replace(/&(?![a-zA-Z]+;|#\d+;)/g, '&amp;');
                s = s.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<a class="image-link" href="$2" target="_blank" rel="noopener noreferrer"><img alt="$1" src="$2"></a>');
                s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
                s = s.replace(/`([^`]+)`/g, function (_, c) {
                    return '<code>' + c.replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</code>';
                });
                s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
                s = s.replace(/~~([^~\n]+)~~/g, '<del>$1</del>');
                s = s.replace(/(^|[^*])\*([^*\n]+)\*/g, '$1<em>$2</em>');
                return s;
            }

            while (i < lines.length) {
                const line = lines[i];
                if (!line.trim()) {
                    i++;
                    continue;
                }

                const fence = line.match(/^```(\w*)\s*$/);
                if (fence) {
                    i++;
                    const buf = [];
                    while (i < lines.length && !/^```\s*$/.test(lines[i])) {
                        buf.push(lines[i]);
                        i++;
                    }
                    i++;
                    const escaped = buf.join('\n').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                    const cls = fence[1] ? ' class="lang-' + fence[1] + '"' : '';
                    out.push('<pre><code' + cls + '>' + escaped + '</code></pre>');
                    continue;
                }

                const h = line.match(/^(#{1,6})\s+(.*)$/);
                if (h) {
                    out.push('<h' + h[1].length + '>' + inline(h[2]) + '</h' + h[1].length + '>');
                    i++;
                    continue;
                }

                if (/^\s*(?:-\s*){3,}\s*$/.test(line) || /^\s*\*{3,}\s*$/.test(line)) {
                    out.push('<hr>');
                    i++;
                    continue;
                }

                if (/^>\s?/.test(line)) {
                    const buf = [];
                    while (i < lines.length && /^>\s?/.test(lines[i])) {
                        buf.push(lines[i].replace(/^>\s?/, ''));
                        i++;
                    }
                    out.push('<blockquote>' + renderMarkdown(buf.join('\n')) + '</blockquote>');
                    continue;
                }

                if (tableRow.test(line) && i + 1 < lines.length && tableSep.test(lines[i + 1])) {
                    const headers = splitRow(line);
                    i += 2;
                    const rows = [];
                    while (i < lines.length && tableRow.test(lines[i])) {
                        rows.push(splitRow(lines[i]));
                        i++;
                    }
                    let html = '<table><thead><tr>';
                    headers.forEach(h => {
                        html += '<th>' + inline(h) + '</th>';
                    });
                    html += '</tr></thead><tbody>';
                    rows.forEach(r => {
                        html += '<tr>';
                        r.forEach(c => {
                            html += '<td>' + inline(c) + '</td>';
                        });
                        html += '</tr>';
                    });
                    html += '</tbody></table>';
                    out.push(html);
                    continue;
                }

                if (bullet.test(line) || ordered.test(line)) {
                    // Indent of the first bullet defines this list's base level.
                    // Deeper-indented bullets become nested lists (rendered by
                    // recursing into renderMarkdown). Same-or-less indent at a
                    // bullet starts a sibling item (or ends the list).
                    const firstMatch = line.match(bullet) || line.match(ordered);
                    const baseIndent = firstMatch[1].length;
                    const isOrdered = ordered.test(line);
                    const items = [];
                    while (i < lines.length) {
                        const cur = lines[i];
                        if (!cur.trim()) {
                            // blank line breaks the list (matches CommonMark-ish behaviour)
                            i++;
                            break;
                        }
                        const mBul = cur.match(bullet);
                        const mOrd = cur.match(ordered);
                        const m = mBul || mOrd;
                        if (!m) break;
                        if (m[1].length < baseIndent) break;
                        if (m[1].length > baseIndent) break; // shouldn't happen at top of loop
                        // Same-type check: switching between -/* and 1. closes the list
                        if (isOrdered !== !!mOrd) break;

                        const itemBuf = [m[3]];
                        const nestedBuf = [];
                        i++;
                        while (i < lines.length) {
                            const nxt = lines[i];
                            if (!nxt.trim()) break;
                            const nBul = nxt.match(bullet);
                            const nOrd = nxt.match(ordered);
                            const nm = nBul || nOrd;
                            if (nm) {
                                if (nm[1].length > baseIndent) {
                                    // nested list line — dedent and stash
                                    nestedBuf.push(nxt.slice(baseIndent + 2));
                                    i++;
                                    continue;
                                }
                                // sibling or end of list
                                break;
                            }
                            // Plain continuation text
                            if (nestedBuf.length) {
                                // continuation inside the nested block
                                nestedBuf.push(nxt.slice(baseIndent + 2));
                            } else {
                                itemBuf.push(nxt.trim());
                            }
                            i++;
                        }

                        let liHtml = inline(itemBuf.join('\n'));
                        if (nestedBuf.length) {
                            liHtml += renderMarkdown(nestedBuf.join('\n'));
                        }
                        items.push('<li>' + liHtml + '</li>');
                    }
                    out.push((isOrdered ? '<ol>' : '<ul>') + items.join('') + (isOrdered ? '</ol>' : '</ul>'));
                    continue;
                }

                const buf = [line];
                i++;
                while (i < lines.length && lines[i].trim() && !/^#{1,6}\s/.test(lines[i]) && !/^>\s?/.test(lines[i]) && !bullet.test(lines[i]) && !ordered.test(lines[i]) && !/^```/.test(lines[i]) && !tableRow.test(lines[i])) {
                    buf.push(lines[i]);
                    i++;
                }
                out.push('<p>' + inline(buf.join(' ')) + '</p>');
            }
            return out.join('\n');
        }

        // Block dispatcher. New block types plug in here.
        const renderers = {
            markdown: function (block) {
                const div = document.createElement('div');
                div.innerHTML = renderMarkdown(block.content);
                return div;
            },
            mermaid: function (block) {
                // Mermaid scans elements with class "mermaid" whose textContent
                // is the diagram source. We collect these nodes and run
                // mermaid.run() once after all blocks are in the DOM.
                const div = document.createElement('div');
                div.className = 'mermaid';
                div.textContent = block.content;
                return div;
            },
            'force-graph': function (block) {
                // build.py emits parsed JSON: {nodes:[{id,size}], links:[{source,target}]}.
                // We instantiate force-graph after the container is in the DOM
                // so it can measure its own width.
                const div = document.createElement('div');
                div.className = 'force-graph';
                const data = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.ForceGraph) return;
                    const maxSize = data.nodes.reduce((m, n) => Math.max(m, n.size || 1), 1);
                    window.ForceGraph()(div)
                        .graphData(data)
                        .width(div.clientWidth)
                        .height(div.clientHeight)
                        .nodeRelSize(4)
                        .nodeVal(n => Math.max(20 * (n.size || 1) / maxSize, 0.001))
                        .nodeLabel(n => n.id + ' (' + (n.size || 1) + ')')
                        .nodeColor(() => 'rgba(135, 206, 235, 0.7)')
                        .linkColor(() => 'rgba(60, 60, 60, 0.4)')
                        .linkDirectionalArrowLength(4)
                        .linkDirectionalArrowRelPos(1)
                        .linkWidth(1);
                });
                return div;
            },
            'bubble-chart': function (block) {
                // build.py emits {nodes:[{name,size}]}. Renders a D3 circle-pack
                // SVG (same shape as the obren.io reference, just inline).
                const wrap = document.createElement('div');
                wrap.className = 'bubble-chart';
                const payload = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.d3) return;
                    const diameter = 480;
                    const fill = '#c0deed';
                    const textColor = '#111111';
                    const fontSize = 12;

                    const svg = window.d3.select(wrap).append('svg')
                        .attr('viewBox', '0 0 ' + diameter + ' ' + diameter)
                        .attr('width', diameter)
                        .attr('height', diameter);

                    const root = window.d3.hierarchy({children: payload.nodes})
                        .sum(d => d.size || 0)
                        .sort((a, b) => b.value - a.value);

                    window.d3.pack().size([diameter, diameter]).padding(2)(root);

                    const node = svg.selectAll('g')
                        .data(root.leaves())
                        .enter().append('g')
                        .attr('transform', d => 'translate(' + d.x + ',' + d.y + ')');

                    node.append('title').text(d => d.data.name + ': ' + d.value);
                    node.append('circle').attr('r', d => d.r).style('fill', fill);
                    node.append('text')
                        .attr('dy', '.3em')
                        .style('text-anchor', 'middle')
                        .style('fill', textColor)
                        .style('font-size', fontSize + 'px')
                        .text(d => d.data.name.substring(0, Math.max(0, Math.floor(d.r / 3))));
                });
                return wrap;
            }
        };

        const mermaidNodes = [];
        data.blocks.forEach(function (block) {
            const r = renderers[block.type];
            if (!r) {
                const pre = document.createElement('pre');
                pre.textContent = '[unknown block type: ' + block.type + ']';
                root.appendChild(pre);
                return;
            }
            const node = r(block);
            if (node instanceof Node) {
                root.appendChild(node);
                if (block.type === 'mermaid') mermaidNodes.push(node);
            }
        });

        if (mermaidNodes.length && window.mermaid) {
            window.mermaid.initialize({startOnLoad: false, theme: 'default'});
            window.mermaid.run({nodes: mermaidNodes});
        }
    })();
</script>
</body>
</html>
