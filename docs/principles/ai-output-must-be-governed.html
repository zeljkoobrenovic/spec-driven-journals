<script id="data" type="application/json">{"meta": {"id": "ORG-PRIN-AI-OUTPUT-MUST-BE-GOVERNED", "status": "draft:gray", "title": "Practice Principle: AI Output Must Be Governed", "date": "2026-05-16", "author": "Organization Tech Strategy", "permalink": "ai-output-must-be-governed", "timetoread": "12 min", "excerpt": "AI-generated code, configuration, and documentation at Organization is treated as draft input. Human accountability does not move. Every AI change flows through the same engineering standards, reviews, tests, observability, and security gates as human work, plus AI-specific controls: scoped permission modes, hooks, secrets handling, approved tool registries, and audit trails. The principle is simple: AI accelerates engineering work; it does not relax engineering governance.", "tags": "practices, ai, claude-code, governance, policy, accountability, security", "logo": "assets/images/ai-output-must-be-governed/logo.jpeg", "logo_credit": "Inspired by Organization's AI policy and AI engineering standards", "icon": "assets/icons/ai-output-must-be-governed.png"}, "tags": ["practices", "ai", "claude-code", "governance", "policy", "accountability", "security"], "blocks": [{"type": "markdown", "content": "> **Status**: DRAFT\n>\n> **Principle**: AI-generated output - code, infrastructure, configuration, documentation, automation - is **draft input**, not authoritative work. It is reviewed, tested, and accepted by a named human accountable for the change. AI agents operate inside scoped permissions, with explicit hooks, approved tool registries, secrets handling, and audit trails. The acceleration AI provides is real; the engineering bar AI must clear is not lowered.\n\n## Statement\n\nAt Organization:\n\n* **Human accountability for AI-generated changes is non-negotiable.** A named human reviews, approves, and owns the result.\n* **AI output goes through the same engineering gates as human output.** Tests, CI checks, security scans, observability, code review, ADRs.\n* **AI agents have scoped capabilities.** Permission modes, hook scripts, allowlists for commands, MCP servers, subagents, and tool registries.\n* **Sensitive data is classified before AI access.** What may be sent to a model is a policy decision, not a developer decision.\n* **Audit trails exist.** Who used which agent, with which tools, on which repository, generating which changes, approved by whom.\n* **Default agent is Claude Code**; other agents only by exception.\n\nThe principle integrates AI into Organization's existing governance rather than carving out a separate, lighter regime for it.\n\n## How to Read This Principle\n\n| What it says | What it does **not** say |\n| --- | --- |\n| AI output is draft input. | AI output is untrustworthy. |\n| Humans approve and own changes. | Humans must hand-write every line. |\n| AI agents run in scoped modes. | AI agents are tightly caged. |\n| Engineering gates apply equally to AI. | AI gets an extra, harsher gate. |\n| Audit trails are kept. | All AI use is surveilled. |\n\nThe principle aims to make AI a normal, governed development tool. It rejects both \"AI is special and must be banned\" and \"AI is special and gets to skip the rules\".\n\n## How to Apply This Principle\n\nUse this principle to:\n\n* Explain why AI output is draft input, even when it looks correct.\n* Review AI-generated changes with the same accountability as human-written changes.\n* Identify the extra governance surfaces created by agents, Skills, MCP servers, hooks, and prompts.\n* Recognise unsafe AI usage patterns before they become incidents.\n\n## Rationale\n\nAI-assisted development has two failure modes Organization needs to avoid simultaneously.\n\nThe first is **rejection**. If governance is too heavy or too theatrical, teams will either avoid AI tooling entirely or work around it informally. Organization loses the acceleration without gaining safety.\n\nThe second is **dilution**. If AI tools bypass normal gates - because they \"feel fast\", because reviewers trust the model, because permission modes are too permissive - the engineering bar drops invisibly. Reviewers approve more code than they understand. Tests are written by the same model that wrote the code they cover. Security scans run on output nobody fully read. Drift accumulates faster than humans can catch.\n\nThe principle threads between these failures by:\n\n* Keeping accountability with humans, where it has always been.\n* Treating AI as a powerful, governed development tool, not a peer engineer.\n* Encoding controls in the *agent* (permission modes, hooks, registries) rather than in policy alone.\n* Demanding the same observability and audit posture for AI-driven work as for human-driven work.\n\nThe AI strategy and AI policy decisions implement this principle as concrete controls. The principle generalises those controls into a stable expectation.\n\n## Implications\n\n* **A named human approves every AI-driven change.** Approval is meaningful: the reviewer has read and understood the change.\n* **AI-generated code passes the standard CI gates.** Tests, linting, security scans, observability templates - all apply.\n* **Claude Code runs with explicit settings.** Permission modes, hook scripts, allowlists, and CLAUDE.md fragments are configured per project.\n* **MCP servers, Skills, and subagents are registered.** Capabilities outside the default set are added by request and reviewed.\n* **Data classification rules are clear.** What can be sent to which model, in which mode, is a policy decision with an ADR.\n* **Audit trails are real.** Tool usage, approvals, exceptions, incidents.\n* **Exceptions to the default agent are recorded.** Codex, Gemini, or other agents may be used when justified, by ADR.\n* **Incidents involving AI are handled like any other incident.** Same retrospective process, same lessons-learned discipline.\n\n## Review Checklist\n\nBefore accepting AI-generated work, the accountable human should be able to answer yes to these questions:\n\n* Do I understand the change well enough to explain it without mentioning the AI tool?\n* Did the change pass the same tests, scans, and review expectations as human-written work?\n* Are secrets, customer data, and internal-only context handled according to policy?\n* Are the AI tools, MCP servers, Skills, and subagents used in the session approved for this repository?\n* Did the agent stay inside the expected permission mode and command scope?\n* Is there enough audit trail to reconstruct what happened if this change causes an incident?\n* Have I checked that generated tests are testing behaviour, not simply mirroring generated implementation?\n\nIf the answer to any of these is unclear, the work is still draft input. The right response is not to ban the tool; it is to finish the engineering review.\n\n## What This Means for Teams\n\nFor service teams:\n\n* Read AI-generated changes as carefully as you would read a colleague's PR. Approval is a load-bearing act.\n* Use Claude Code with the standard settings and CLAUDE.md fragments.\n* Treat suspicious behaviour - hallucinated APIs, secrets pasted into prompts, unexpected tool use - as an incident, not a quirk.\n* Add tests; do not let the model both write and test the same change without human eyes.\n\nFor platform and AI Engineering Enablement roles:\n\n* Maintain the default agent settings, permission modes, hooks, Skills, MCP allowlists, and CLAUDE.md fragments.\n* Run the six-month review on AI tooling.\n* Track adoption, usage patterns, exceptions, and incidents.\n\nFor security and compliance roles:\n\n* Classify data ahead of AI usage; do not leave classification to the moment of the prompt.\n* Define what counts as a reportable AI incident.\n* Audit the audit trails periodically.\n\nFor tech leads:\n\n* Watch for \"AI made me do it\" patterns in PR reviews. The model proposes; the human disposes.\n* Block changes that bypass the AI controls; route them through the exception process.\n\n## Anti-Patterns\n\n* **Approval without reading.** Reviewers rubber-stamping AI PRs because \"it's just AI\".\n* **YOLO mode in production repos.** Permission modes that grant the agent broad write access without hooks or approvals.\n* **AI-written tests for AI-written code.** No independent human verification of either side.\n* **Tool sprawl.** MCP servers, subagents, and Skills proliferating without registration or review.\n* **Secrets in prompts.** Pasting `.env` content or credentials into an AI session.\n* **Bypass via personal accounts.** Engineers using personal AI accounts on company code to \"avoid the rules\".\n* **Shadow agents.** Use of non-default AI tools without an exception ADR.\n* **Audit blackout.** No record of which AI did what, in which repository, with which permissions.\n\n## Examples\n\nAligned with the principle:\n\n* A developer uses Claude Code to refactor a service. The change goes through CI, security scans, code review, and is approved by a named human.\n* MCP servers and Skills used by the team are listed in the registry with owners.\n* A data classification rule prevents production customer data being sent to a model.\n* A six-month AI tooling review evaluates incidents, satisfaction, and effectiveness, with outcomes recorded as an ADR.\n\nOut of alignment with the principle:\n\n* A PR approved with a single \"looks fine - generated by Claude\" comment.\n* Claude Code running with no settings file, no hooks, and no CLAUDE.md.\n* A Skill written by one engineer being used across the org with no registration or ownership.\n* AI agents wired into production deployment paths without explicit approval gates.\n\n## Discussion Prompts\n\nUse these prompts in onboarding or team retrospectives:\n\n* What would make us confident that an AI-generated change was understood by a human?\n* Which AI controls are currently encoded, and which still depend on memory or policy text?\n* Where could AI speed tempt us to skip evidence, review, or ownership?\n\n## Related Principles\n\n* [Practice Principle: Governance as Code](governance-as-code.html) - AI controls are themselves encoded as settings, hooks, and registries.\n* [Organisation Principle: Capabilities Follow Ownership](capabilities-follow-ownership.html) - Skills, MCP servers, and subagents are capabilities with owners.\n* [Organisation Principle: Tooling Decisions Are Explicit and Reversible](tooling-explicit-and-reversible.html) - the AI tooling default is dated and reviewed.\n* [Operational Principle: Production Ready](production-ready.html) - AI-driven changes still need to meet readiness.\n* [Operational Principle: Observable by Default](observable-by-default.html) - AI-driven changes still need to be observable.\n* [Practice Principle: Markdown Records as Canonical](markdown-records-as-canonical.html) - AI tooling decisions and exceptions live as ADRs.\n\n## Scope and Revisiting\n\nThis principle applies to all use of AI assistants - code, configuration, infrastructure, documentation, automation - in Organization's engineering work. It applies to Claude Code as the default agent, and to any other agent used by exception.\n\nIt does not apply to:\n\n* Non-engineering uses of AI (for example, marketing or content) that have their own governance regime.\n* Personal experimentation outside any Organization repository or system.\n\nThe principle should be revisited if:\n\n* Agent capabilities change shape significantly (for example, autonomous multi-step deployments that need a different governance model).\n* The default agent choice changes after a review cycle.\n* Incident patterns reveal that current controls are insufficient.\n* Regulation explicitly governs AI in software development in ways that require additional or different controls.\n\n## Authoritative References\n\n* Organization AI Decisions Log, AI Coding Policy: Human Accountability with Executable Controls ([AI Coding Policy: Human Accountability with Executable Controls](../ai-decisions-log/ai-policy.html)).\n* Organization AI Decisions Log, AI Engineering Standards: Governance-as-Code for Modernization ([AI Engineering Standards: Governance-as-Code for Modernization](../ai-decisions-log/ai-engineering-standards.html)).\n* Organization AI Decisions Log, AI Developer Tooling: Claude Code as the Default Agent Platform for 2026 ([AI Developer Tooling: Claude Code as the Default Agent Platform for 2026](../ai-decisions-log/ai-tooling.html)).\n* Anthropic, [Claude Code Documentation](https://docs.anthropic.com/claude/docs/claude-code).\n* John Lewis Partnership, [Engineering Principles](https://engineering-principles.jlp.engineering/).\n"}]}</script>

                const statusName = parts[0].trim();

                const wrap = document.createElement('span');

                dot.className = 'status-dot';

            }
            if (postId) {
                if (sectionEl.firstChild) sectionEl.appendChild(document.createTextNode(' • '));
                sectionEl.appendChild(document.createTextNode(postId));
            }
        }

        const tagsHost = document.getElementById('tags');
        (data.tags || []).forEach(function (t) {
            const span = document.createElement('span');
            span.className = 'tag';
            span.textContent = t;
            tagsHost.appendChild(span);
        });

        // Minimal markdown renderer. Supports: ATX headings, paragraphs, blockquotes,
        // unordered/ordered lists, fenced code, inline code, bold/italic/strikethrough, links, images, hr.
        // Sufficient for the posts in this repo; replace with a fuller parser if needed.
        function renderMarkdown(src) {
            const lines = src.replace(/\r\n/g, '\n').split('\n');
            const out = [];
            let i = 0;

            const bullet = /^(\s*)([-*])\s+(.*)$/;
            const ordered = /^(\s*)(\d+)\.\s+(.*)$/;
            const tableRow = /^\s*\|(.+)\|\s*$/;
            const tableSep = /^\s*\|?\s*:?-{3,}:?\s*(\|\s*:?-{3,}:?\s*)+\|?\s*$/;

            function splitRow(s) {
                let t = s.trim();
                if (t.startsWith('|')) t = t.slice(1);
                if (t.endsWith('|')) t = t.slice(0, -1);
                return t.split('|').map(c => c.trim());
            }

            function inline(s) {
                // Posts are trusted content, so raw HTML passes through unescaped
                // (some posts embed inline <blockquote>, <div>, etc.).
                // Stray ampersands still get fixed up.
                s = s.replace(/&(?![a-zA-Z]+;|#\d+;)/g, '&amp;');
                s = s.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img alt="$1" src="$2">');
                s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
                s = s.replace(/`([^`]+)`/g, function (_, c) {
                    return '<code>' + c.replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</code>';
                });
                s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
                s = s.replace(/~~([^~\n]+)~~/g, '<del>$1</del>');
                s = s.replace(/(^|[^*])\*([^*\n]+)\*/g, '$1<em>$2</em>');
                return s;
            }

            while (i < lines.length) {
                const line = lines[i];
                if (!line.trim()) {
                    i++;
                    continue;
                }

                const fence = line.match(/^```(\w*)\s*$/);
                if (fence) {
                    i++;
                    const buf = [];
                    while (i < lines.length && !/^```\s*$/.test(lines[i])) {
                        buf.push(lines[i]);
                        i++;
                    }
                    i++;
                    const escaped = buf.join('\n').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                    const cls = fence[1] ? ' class="lang-' + fence[1] + '"' : '';
                    out.push('<pre><code' + cls + '>' + escaped + '</code></pre>');
                    continue;
                }

                const h = line.match(/^(#{1,6})\s+(.*)$/);
                if (h) {
                    out.push('<h' + h[1].length + '>' + inline(h[2]) + '</h' + h[1].length + '>');
                    i++;
                    continue;
                }

                if (/^\s*(?:-\s*){3,}\s*$/.test(line) || /^\s*\*{3,}\s*$/.test(line)) {
                    out.push('<hr>');
                    i++;
                    continue;
                }

                if (/^>\s?/.test(line)) {
                    const buf = [];
                    while (i < lines.length && /^>\s?/.test(lines[i])) {
                        buf.push(lines[i].replace(/^>\s?/, ''));
                        i++;
                    }
                    out.push('<blockquote>' + renderMarkdown(buf.join('\n')) + '</blockquote>');
                    continue;
                }

                if (tableRow.test(line) && i + 1 < lines.length && tableSep.test(lines[i + 1])) {
                    const headers = splitRow(line);
                    i += 2;
                    const rows = [];
                    while (i < lines.length && tableRow.test(lines[i])) {
                        rows.push(splitRow(lines[i]));
                        i++;
                    }
                    let html = '<table><thead><tr>';
                    headers.forEach(h => {
                        html += '<th>' + inline(h) + '</th>';
                    });
                    html += '</tr></thead><tbody>';
                    rows.forEach(r => {
                        html += '<tr>';
                        r.forEach(c => {
                            html += '<td>' + inline(c) + '</td>';
                        });
                        html += '</tr>';
                    });
                    html += '</tbody></table>';
                    out.push(html);
                    continue;
                }

                if (bullet.test(line) || ordered.test(line)) {
                    // Indent of the first bullet defines this list's base level.
                    // Deeper-indented bullets become nested lists (rendered by
                    // recursing into renderMarkdown). Same-or-less indent at a
                    // bullet starts a sibling item (or ends the list).
                    const firstMatch = line.match(bullet) || line.match(ordered);
                    const baseIndent = firstMatch[1].length;
                    const isOrdered = ordered.test(line);
                    const items = [];
                    while (i < lines.length) {

                        if (!cur.trim()) {
                            // blank line breaks the list (matches CommonMark-ish behaviour)
                            i++;
                            break;

                        const mBul = cur.match(bullet);
                        const mOrd = cur.match(ordered);
                        const m = mBul || mOrd;
                        if (!m) break;
                        if (m[1].length < baseIndent) break;
                        if (m[1].length > baseIndent) break; // shouldn't happen at top of loop

                        const nestedBuf = [];
                        i++;
                        while (i < lines.length) {
                            const nxt = lines[i];
                            if (!nxt.trim()) break;
                            const nBul = nxt.match(bullet);
                            const nOrd = nxt.match(ordered);
                            const nm = nBul || nOrd;
                            if (nm) {
                                if (nm[1].length > baseIndent) {
                                    // nested list line — dedent and stash
                                    nestedBuf.push(nxt.slice(baseIndent + 2));

                                    continue;
                                }
                                // sibling or end of list
                                break;
                            }
                            // Plain continuation text
                            if (nestedBuf.length) {
                                // continuation inside the nested block
                                nestedBuf.push(nxt.slice(baseIndent + 2));
                            } else {
                                itemBuf.push(nxt.trim());

                        if (nestedBuf.length) {

                        items.push('<li>' + liHtml + '</li>');
                    }
                    out.push((isOrdered ? '<ol>' : '<ul>') + items.join('') + (isOrdered ? '</ol>' : '</ul>'));
                    continue;
                }

                const buf = [line];
                i++;
                while (i < lines.length && lines[i].trim() && !/^#{1,6}\s/.test(lines[i]) && !/^>\s?/.test(lines[i]) && !bullet.test(lines[i]) && !ordered.test(lines[i]) && !/^```/.test(lines[i]) && !tableRow.test(lines[i])) {
                    buf.push(lines[i]);
                    i++;
                }
                out.push('<p>' + inline(buf.join(' ')) + '</p>');
            }
            return out.join('\n');
        }

        // Block dispatcher. New block types plug in here.
        const renderers = {
            markdown: function (block) {
                const div = document.createElement('div');
                div.innerHTML = renderMarkdown(block.content);
                return div;
            },
            mermaid: function (block) {
                // Mermaid scans elements with class "mermaid" whose textContent
                // is the diagram source. We collect these nodes and run
                // mermaid.run() once after all blocks are in the DOM.
                const div = document.createElement('div');
                div.className = 'mermaid';
                div.textContent = block.content;
                return div;
            },
            'force-graph': function (block) {
                // build.py emits parsed JSON: {nodes:[{id,size}], links:[{source,target}]}.
                // We instantiate force-graph after the container is in the DOM
                // so it can measure its own width.
                const div = document.createElement('div');
                div.className = 'force-graph';
                const data = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.ForceGraph) return;
                    const maxSize = data.nodes.reduce((m, n) => Math.max(m, n.size || 1), 1);
                    window.ForceGraph()(div)
                        .graphData(data)
                        .width(div.clientWidth)
                        .height(div.clientHeight)
                        .nodeRelSize(4)
                        .nodeVal(n => Math.max(20 * (n.size || 1) / maxSize, 0.001))
                        .nodeLabel(n => n.id + ' (' + (n.size || 1) + ')')
                        .nodeColor(() => 'rgba(135, 206, 235, 0.7)')
                        .linkColor(() => 'rgba(60, 60, 60, 0.4)')
                        .linkDirectionalArrowLength(4)
                        .linkDirectionalArrowRelPos(1)
                        .linkWidth(1);
                });
                return div;
            },
            'bubble-chart': function (block) {
                // build.py emits {nodes:[{name,size}]}. Renders a D3 circle-pack
                // SVG (same shape as the obren.io reference, just inline).
                const wrap = document.createElement('div');
                wrap.className = 'bubble-chart';
                const payload = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.d3) return;
                    const diameter = 480;
                    const fill = '#c0deed';
                    const textColor = '#111111';
                    const fontSize = 12;

                    const svg = window.d3.select(wrap).append('svg')
                        .attr('viewBox', '0 0 ' + diameter + ' ' + diameter)
                        .attr('width', diameter)
                        .attr('height', diameter);

                    const root = window.d3.hierarchy({children: payload.nodes})
                        .sum(d => d.size || 0)
                        .sort((a, b) => b.value - a.value);

                    window.d3.pack().size([diameter, diameter]).padding(2)(root);

                    const node = svg.selectAll('g')
                        .data(root.leaves())
                        .enter().append('g')
                        .attr('transform', d => 'translate(' + d.x + ',' + d.y + ')');

                    node.append('title').text(d => d.data.name + ': ' + d.value);
                    node.append('circle').attr('r', d => d.r).style('fill', fill);
                    node.append('text')
                        .attr('dy', '.3em')
                        .style('text-anchor', 'middle')
                        .style('fill', textColor)
                        .style('font-size', fontSize + 'px')
                        .text(d => d.data.name.substring(0, Math.max(0, Math.floor(d.r / 3))));
                });
                return wrap;
            }
        };

        const mermaidNodes = [];
        data.blocks.forEach(function (block) {
            const r = renderers[block.type];
            if (!r) {
                const pre = document.createElement('pre');
                pre.textContent = '[unknown block type: ' + block.type + ']';
                root.appendChild(pre);
                return;
            }
            const node = r(block);
            if (node instanceof Node) {
                root.appendChild(node);
                if (block.type === 'mermaid') mermaidNodes.push(node);
            }
        });

        if (mermaidNodes.length && window.mermaid) {
            window.mermaid.initialize({startOnLoad: false, theme: 'default'});
            window.mermaid.run({nodes: mermaidNodes});
        }
    })();
</script>
</body>
</html>
