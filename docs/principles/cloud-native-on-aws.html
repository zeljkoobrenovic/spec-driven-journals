<script id="data" type="application/json">{"meta": {"id": "ORG-PRIN-CLOUD-NATIVE-ON-AWS", "status": "draft:gray", "title": "Operational Principle: Cloud Native on AWS", "date": "2026-05-16", "author": "Organization Tech Strategy", "permalink": "cloud-native-on-aws", "timetoread": "12 min", "excerpt": "Organization is an AWS company. Build cloud-native by default: managed services where they remove operational toil, AWS-native primitives where they fit, and self-managed alternatives only when there is a written reason. Cloud-native means stateless, horizontally scalable, deployable through automation, and observable through standard AWS interfaces. It does not mean serverless-everywhere, multi-cloud-just-in-case, or rebuilding what AWS already does well.", "tags": "cloud, aws, managed-services, msk, ecs, fargate, operations", "logo": "assets/images/cloud-native-on-aws/logo.jpeg", "logo_credit": "Inspired by Organization's AWS-centric tech-decisions log", "icon": "assets/icons/cloud-native-on-aws.png"}, "tags": ["cloud", "aws", "managed-services", "msk", "ecs", "fargate", "operations"], "blocks": [{"type": "markdown", "content": "> **Status**: DRAFT\n>\n> **Principle**: Organization builds on AWS using cloud-native patterns: stateless services, horizontal scaling, AWS-managed services where the value is clear, and AWS-native operational primitives (IAM, VPC, CloudWatch, Secrets Manager, MSK, ECS) by default. Deviations - self-managed alternatives, other clouds, or non-cloud-native shapes - require an ADR, not a preference.\n\n## Statement\n\nCloud Native on AWS at Organization means:\n\n* **AWS** is the strategic public cloud. Backend workloads consolidate there.\n* **Managed services** are preferred where they remove operational toil without significantly worsening cost, control, or portability.\n* **Stateless services** are the default; state lives in managed datastores and managed brokers.\n* **Horizontal scaling** is the default growth model.\n* **IAM, VPC, secrets, logs, metrics, traces** flow through AWS-native interfaces.\n* **MSK, ECS Fargate, Ubuntu base images** are the chosen managed primitives for the backend.\n\nA workload is cloud-native on AWS when it scales horizontally, deploys through automation, integrates with AWS-native observability, and depends on managed services for state.\n\n## How to Read This Principle\n\n| What it says | What it does **not** say |\n| --- | --- |\n| AWS is the strategic cloud. | Multi-cloud is forbidden under all circumstances. |\n| Managed services are preferred. | Every workload must be serverless. |\n| Stateless is the default service shape. | State is never allowed. |\n| Use AWS-native primitives. | Avoid all third-party tools on AWS. |\n| Deviations need an ADR. | Deviations are unwelcome. |\n\nThe principle commits to a primary cloud and a primary set of patterns. It does not mandate any single AWS product family for every workload.\n\n## How to Apply This Principle\n\nUse this principle to:\n\n* Explain what \"cloud-native on AWS\" means beyond simply running in AWS.\n* Choose managed AWS primitives when they reduce operational toil.\n* Identify when self-managed infrastructure or another cloud needs an ADR.\n* Separate workload fit from cloud-product preference.\n\n## Rationale\n\nOrganization has consolidated on AWS via the AVIV Group contract for procurement leverage, scale, and a coherent operating model. That choice only pays off if the engineering posture matches it: cloud-native services on AWS get more out of the shared platform than near-cloud or anti-cloud designs do.\n\nCloud-native services are easier to:\n\n* Scale predictably under load.\n* Recover after instance, AZ, or even regional failure.\n* Operate with shared tools and shared eyes.\n* Secure through IAM and VPC primitives.\n* Govern through tagging, organisations, and central guardrails.\n\nSelf-managed alternatives - self-hosted Kafka, self-managed Kubernetes, self-built secret stores - are valid in narrow cases, but they re-introduce operational work that the platform team would otherwise not need to do. Each one is a slow tax.\n\nThe principle does not push toward \"serverless-everything\". ECS Fargate was chosen over Lambda-everywhere because the workload shape is mostly long-running services, not bursty event-driven functions. The cloud-native pattern follows the workload, not the brochure.\n\n## Implications\n\n* **Stateless services first.** Persistent state lives in managed datastores (RDS, Aurora, DynamoDB, S3) or managed brokers (MSK), not on service instances.\n* **Use ECS Fargate as the default runtime.** Containers, Ubuntu base, AWS-managed networking.\n* **Use MSK as the default broker.** Kafka is the messaging backbone; MSK is the managed implementation.\n* **Use AWS-native observability.** CloudWatch logs, metrics, X-Ray traces, with the option of overlaying additional tooling where justified.\n* **Use IAM as the access primitive.** No homegrown auth between services unless there is no AWS-native option.\n* **VPC and networking are inherited from AVIV Group** during the 6-12 month inheritance period and simplified deliberately afterwards.\n* **Multi-AZ is the default for production workloads.** Multi-region is justified per workload.\n* **Multi-cloud is by exception.** A workload may run elsewhere if there is a specific reason - data locality, regulatory, vendor - documented in an ADR.\n\n## Decision Heuristics\n\nWhen choosing a cloud shape, start from these questions:\n\n* Can this workload run as a stateless container on ECS Fargate?\n* Can state live in an AWS-managed datastore, broker, cache, or object store?\n* Can access be expressed through IAM, VPC boundaries, and standard secrets handling?\n* Can logs, metrics, traces, and alarms use the standard AWS observability path?\n* Does the managed service remove more operational work than it adds in cost, limits, or lock-in?\n* If a self-managed service is proposed, which operational burden is the team explicitly accepting?\n* If another cloud is proposed, what requirement cannot be met inside AWS?\n\nThe expected answer is not always \"AWS managed service\". The expected behaviour is that non-AWS-native choices are made with their full operational cost visible.\n\n## What This Means for Teams\n\nFor service teams:\n\n* Default to ECS Fargate, MSK, and AWS-native datastores for new work.\n* Avoid building stateful services unless the state genuinely belongs in the service.\n* Use AWS Secrets Manager, AWS IAM, and standard observability paths.\n* Prefer scaling out over scaling up; prefer multi-AZ over heroic single-AZ designs.\n\nFor platform and SRE roles:\n\n* Provide the AWS-native primitives as golden paths.\n* Curate where AWS-managed services are the right answer and where they are not.\n* Track when an AWS service becomes available that obsoletes a self-managed alternative.\n\nFor tech leads:\n\n* Use AWS-native first as a starting question, not a constraint.\n* Bring proposals that diverge from AWS-native to the Architecture Advisory Forum early.\n\n## Anti-Patterns\n\n* **Just-in-case multi-cloud.** Building portability that no one will use, paying complexity tax every day for a hypothetical migration.\n* **Bring-your-own everything.** Self-managed databases, brokers, and orchestrators on AWS instances when the managed equivalents would do.\n* **Lift-and-shift forever.** Workloads moved to AWS but never refactored to use AWS-native primitives.\n* **Stateful service drift.** Services accumulating state on local disk or in-process caches because the managed datastore \"felt slow\".\n* **Serverless-everywhere by default.** Treating Lambda as the only valid AWS shape for every workload regardless of profile.\n* **Cloud-native theatre.** Containers and Kubernetes adopted as \"modern\" while the design is still a single-node monolith.\n\n## Examples\n\nAligned with the principle:\n\n* A new backend service runs on ECS Fargate, talks to MSK, stores state in Aurora Postgres, uses Secrets Manager, and is observed through CloudWatch.\n* A team chooses Aurora over a self-managed PostgreSQL because the managed-service trade-offs are acceptable.\n* MSK is used as the Kafka backbone instead of Confluent Cloud or self-hosted Kafka because it stays inside the AVIV Group AWS contract.\n\nOut of alignment with the principle:\n\n* A team deploys a \"Kafka cluster\" on EC2 because they prefer it to MSK, with no ADR.\n* A new database is introduced in a different cloud because a vendor demo was compelling.\n* A service stores state on local Fargate disk to avoid the managed-database setup.\n\n## Discussion Prompts\n\nUse these prompts in onboarding or team reviews:\n\n* Which part of our workload is genuinely special, and which part can follow the AWS golden path?\n* What operational work are we accepting when we choose self-managed infrastructure?\n* Which old lift-and-shift workload should be revisited for AWS-native simplification?\n\n## Related Principles\n\n* [Design Principle: Small (and Not Too Small) and Simple (and Not Too Simple)](small-and-simple.html) - managed services reduce operational complexity.\n* [Design Principle: Evolutionary Systems](evolutionary-systems.html) - AWS-native primitives evolve with the platform.\n* [Design Principle: Smarts in the Nodes, not the Network](smarts-in-the-nodes.html) - managed pipes are dumb on purpose; smarts stay in services.\n* [Organisation Principle: Inherit, Then Simplify](inherit-then-simplify.html) - inherited AWS tooling is simplified, not abandoned.\n* [Operational Principle: Observable by Default](observable-by-default.html) - AWS-native observability is the default.\n\n## Scope and Revisiting\n\nThis principle applies to backend services, data pipelines, integrations, and supporting infrastructure that Organization operates.\n\nIt does not apply to client-side applications (web, mobile), to AVIV Group services that Organization consumes but does not run, or to genuinely on-premise systems that are out of scope.\n\nThe principle should be revisited if:\n\n* The AVIV Group AWS relationship changes materially.\n* A managed AWS service decision needs to be re-evaluated against a new alternative.\n* Compliance or data-residency requirements force workloads off AWS in ways the current pattern cannot accommodate.\n\n## Authoritative References\n\n* AWS, [Well-Architected Framework](https://docs.aws.amazon.com/wellarchitected/latest/framework/welcome.html).\n* CNCF, [Cloud Native Definition](https://github.com/cncf/toc/blob/main/DEFINITION.md).\n* John Lewis Partnership, [Cloud Native Principle](https://engineering-principles.jlp.engineering/).\n* Organization Tech Decisions Log, [Public Cloud: Consolidate on AWS via AVIV Group Contract](../tech-decisions-log/infra-tech-aws.html).\n"}]}</script>

    (function () {
        const data = JSON.parse(document.getElementById('data').textContent);
        const root = document.getElementById('content');

        const postId = (data.meta && data.meta.id) ? String(data.meta.id) : '';
        const postStatusRaw = (data.meta && data.meta.status) ? String(data.meta.status) : '';
        if (postId || postStatusRaw) {
            const header = document.getElementById('post-header');
            let sectionEl = header.querySelector('p.section');
            if (!sectionEl) {
                sectionEl = document.createElement('p');
                sectionEl.className = 'section';
                header.insertBefore(sectionEl, header.firstChild);
            }
            // Status pill goes first, then a " / " separator before the existing
            // content (section name and/or id).
            if (postStatusRaw) {
                const parts = postStatusRaw.split(':');
                const statusName = parts[0].trim();
                const statusColor = (parts[1] || '').trim();
                const wrap = document.createElement('span');
                wrap.className = 'post-status';
                const dot = document.createElement('span');
                dot.className = 'status-dot';
                if (statusColor) dot.style.background = statusColor;
                wrap.appendChild(dot);
                wrap.appendChild(document.createTextNode(statusName));
                if (sectionEl.firstChild) {
                    sectionEl.insertBefore(document.createTextNode(' • '), sectionEl.firstChild);
                    sectionEl.insertBefore(wrap, sectionEl.firstChild);
                } else {
                    sectionEl.appendChild(wrap);
                }
            }
            if (postId) {
                if (sectionEl.firstChild) sectionEl.appendChild(document.createTextNode(' • '));
                sectionEl.appendChild(document.createTextNode(postId));
            }
        }

        const tagsHost = document.getElementById('tags');
        (data.tags || []).forEach(function (t) {
            const span = document.createElement('span');
            span.className = 'tag';
            span.textContent = t;
            tagsHost.appendChild(span);
        });

        // Minimal markdown renderer. Supports: ATX headings, paragraphs, blockquotes,
        // unordered/ordered lists, fenced code, inline code, bold/italic/strikethrough, links, images, hr.
        // Sufficient for the posts in this repo; replace with a fuller parser if needed.
        function renderMarkdown(src) {
            const lines = src.replace(/\r\n/g, '\n').split('\n');
            const out = [];
            let i = 0;

            const bullet = /^(\s*)([-*])\s+(.*)$/;
            const ordered = /^(\s*)(\d+)\.\s+(.*)$/;
            const tableRow = /^\s*\|(.+)\|\s*$/;
            const tableSep = /^\s*\|?\s*:?-{3,}:?\s*(\|\s*:?-{3,}:?\s*)+\|?\s*$/;

            function splitRow(s) {
                let t = s.trim();
                if (t.startsWith('|')) t = t.slice(1);
                if (t.endsWith('|')) t = t.slice(0, -1);
                return t.split('|').map(c => c.trim());
            }

            function inline(s) {
                // Posts are trusted content, so raw HTML passes through unescaped
                // (some posts embed inline <blockquote>, <div>, etc.).
                // Stray ampersands still get fixed up.
                s = s.replace(/&(?![a-zA-Z]+;|#\d+;)/g, '&amp;');
                s = s.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<a class="image-link" href="$2" target="_blank" rel="noopener noreferrer"><img alt="$1" src="$2"></a>');
                s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
                s = s.replace(/`([^`]+)`/g, function (_, c) {
                    return '<code>' + c.replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</code>';
                });
                s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
                s = s.replace(/~~([^~\n]+)~~/g, '<del>$1</del>');
                s = s.replace(/(^|[^*])\*([^*\n]+)\*/g, '$1<em>$2</em>');
                return s;
            }

            while (i < lines.length) {
                const line = lines[i];
                if (!line.trim()) {
                    i++;
                    continue;
                }

                const fence = line.match(/^```(\w*)\s*$/);
                if (fence) {
                    i++;
                    const buf = [];
                    while (i < lines.length && !/^```\s*$/.test(lines[i])) {
                        buf.push(lines[i]);
                        i++;
                    }
                    i++;
                    const escaped = buf.join('\n').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                    const cls = fence[1] ? ' class="lang-' + fence[1] + '"' : '';
                    out.push('<pre><code' + cls + '>' + escaped + '</code></pre>');
                    continue;
                }

                const h = line.match(/^(#{1,6})\s+(.*)$/);
                if (h) {
                    out.push('<h' + h[1].length + '>' + inline(h[2]) + '</h' + h[1].length + '>');
                    i++;
                    continue;
                }

                if (/^\s*(?:-\s*){3,}\s*$/.test(line) || /^\s*\*{3,}\s*$/.test(line)) {
                    out.push('<hr>');
                    i++;
                    continue;
                }

                if (/^>\s?/.test(line)) {
                    const buf = [];
                    while (i < lines.length && /^>\s?/.test(lines[i])) {
                        buf.push(lines[i].replace(/^>\s?/, ''));
                        i++;
                    }
                    out.push('<blockquote>' + renderMarkdown(buf.join('\n')) + '</blockquote>');
                    continue;
                }

                if (tableRow.test(line) && i + 1 < lines.length && tableSep.test(lines[i + 1])) {
                    const headers = splitRow(line);
                    i += 2;
                    const rows = [];
                    while (i < lines.length && tableRow.test(lines[i])) {
                        rows.push(splitRow(lines[i]));
                        i++;
                    }
                    let html = '<table><thead><tr>';
                    headers.forEach(h => {
                        html += '<th>' + inline(h) + '</th>';
                    });
                    html += '</tr></thead><tbody>';
                    rows.forEach(r => {
                        html += '<tr>';
                        r.forEach(c => {
                            html += '<td>' + inline(c) + '</td>';
                        });
                        html += '</tr>';
                    });
                    html += '</tbody></table>';
                    out.push(html);
                    continue;
                }

                if (bullet.test(line) || ordered.test(line)) {
                    // Indent of the first bullet defines this list's base level.
                    // Deeper-indented bullets become nested lists (rendered by
                    // recursing into renderMarkdown). Same-or-less indent at a
                    // bullet starts a sibling item (or ends the list).
                    const firstMatch = line.match(bullet) || line.match(ordered);
                    const baseIndent = firstMatch[1].length;
                    const isOrdered = ordered.test(line);
                    const items = [];
                    while (i < lines.length) {
                        const cur = lines[i];
                        if (!cur.trim()) {
                            // blank line breaks the list (matches CommonMark-ish behaviour)
                            i++;
                            break;
                        }
                        const mBul = cur.match(bullet);
                        const mOrd = cur.match(ordered);
                        const m = mBul || mOrd;
                        if (!m) break;
                        if (m[1].length < baseIndent) break;
                        if (m[1].length > baseIndent) break; // shouldn't happen at top of loop
                        // Same-type check: switching between -/* and 1. closes the list
                        if (isOrdered !== !!mOrd) break;

                        const itemBuf = [m[3]];
                        const nestedBuf = [];
                        i++;
                        while (i < lines.length) {
                            const nxt = lines[i];
                            if (!nxt.trim()) break;
                            const nBul = nxt.match(bullet);
                            const nOrd = nxt.match(ordered);
                            const nm = nBul || nOrd;
                            if (nm) {
                                if (nm[1].length > baseIndent) {
                                    // nested list line — dedent and stash
                                    nestedBuf.push(nxt.slice(baseIndent + 2));
                                    i++;
                                    continue;
                                }
                                // sibling or end of list
                                break;
                            }
                            // Plain continuation text
                            if (nestedBuf.length) {
                                // continuation inside the nested block
                                nestedBuf.push(nxt.slice(baseIndent + 2));
                            } else {
                                itemBuf.push(nxt.trim());
                            }
                            i++;
                        }

                        let liHtml = inline(itemBuf.join('\n'));
                        if (nestedBuf.length) {
                            liHtml += renderMarkdown(nestedBuf.join('\n'));
                        }
                        items.push('<li>' + liHtml + '</li>');
                    }
                    out.push((isOrdered ? '<ol>' : '<ul>') + items.join('') + (isOrdered ? '</ol>' : '</ul>'));
                    continue;
                }

                const buf = [line];
                i++;
                while (i < lines.length && lines[i].trim() && !/^#{1,6}\s/.test(lines[i]) && !/^>\s?/.test(lines[i]) && !bullet.test(lines[i]) && !ordered.test(lines[i]) && !/^```/.test(lines[i]) && !tableRow.test(lines[i])) {
                    buf.push(lines[i]);
                    i++;
                }
                out.push('<p>' + inline(buf.join(' ')) + '</p>');
            }
            return out.join('\n');
        }

        // Block dispatcher. New block types plug in here.
        const renderers = {
            markdown: function (block) {
                const div = document.createElement('div');
                div.innerHTML = renderMarkdown(block.content);
                return div;
            },
            mermaid: function (block) {
                // Mermaid scans elements with class "mermaid" whose textContent
                // is the diagram source. We collect these nodes and run
                // mermaid.run() once after all blocks are in the DOM.
                const div = document.createElement('div');
                div.className = 'mermaid';
                div.textContent = block.content;
                return div;
            },
            'force-graph': function (block) {
                // build.py emits parsed JSON: {nodes:[{id,size}], links:[{source,target}]}.
                // We instantiate force-graph after the container is in the DOM
                // so it can measure its own width.
                const div = document.createElement('div');
                div.className = 'force-graph';
                const data = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.ForceGraph) return;
                    const maxSize = data.nodes.reduce((m, n) => Math.max(m, n.size || 1), 1);
                    window.ForceGraph()(div)
                        .graphData(data)
                        .width(div.clientWidth)
                        .height(div.clientHeight)
                        .nodeRelSize(4)
                        .nodeVal(n => Math.max(20 * (n.size || 1) / maxSize, 0.001))
                        .nodeLabel(n => n.id + ' (' + (n.size || 1) + ')')
                        .nodeColor(() => 'rgba(135, 206, 235, 0.7)')
                        .linkColor(() => 'rgba(60, 60, 60, 0.4)')
                        .linkDirectionalArrowLength(4)
                        .linkDirectionalArrowRelPos(1)
                        .linkWidth(1);
                });
                return div;
            },
            'bubble-chart': function (block) {
                // build.py emits {nodes:[{name,size}]}. Renders a D3 circle-pack
                // SVG (same shape as the obren.io reference, just inline).
                const wrap = document.createElement('div');
                wrap.className = 'bubble-chart';
                const payload = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.d3) return;
                    const diameter = 480;
                    const fill = '#c0deed';
                    const textColor = '#111111';
                    const fontSize = 12;

                    const svg = window.d3.select(wrap).append('svg')
                        .attr('viewBox', '0 0 ' + diameter + ' ' + diameter)
                        .attr('width', diameter)
                        .attr('height', diameter);

                    const root = window.d3.hierarchy({children: payload.nodes})
                        .sum(d => d.size || 0)
                        .sort((a, b) => b.value - a.value);

                    window.d3.pack().size([diameter, diameter]).padding(2)(root);

                    const node = svg.selectAll('g')
                        .data(root.leaves())
                        .enter().append('g')
                        .attr('transform', d => 'translate(' + d.x + ',' + d.y + ')');

                    node.append('title').text(d => d.data.name + ': ' + d.value);
                    node.append('circle').attr('r', d => d.r).style('fill', fill);
                    node.append('text')
                        .attr('dy', '.3em')
                        .style('text-anchor', 'middle')
                        .style('fill', textColor)
                        .style('font-size', fontSize + 'px')
                        .text(d => d.data.name.substring(0, Math.max(0, Math.floor(d.r / 3))));
                });
                return wrap;
            }
        };

        const mermaidNodes = [];
        data.blocks.forEach(function (block) {
            const r = renderers[block.type];
            if (!r) {
                const pre = document.createElement('pre');
                pre.textContent = '[unknown block type: ' + block.type + ']';
                root.appendChild(pre);
                return;
            }
            const node = r(block);
            if (node instanceof Node) {
                root.appendChild(node);
                if (block.type === 'mermaid') mermaidNodes.push(node);
            }
        });

        if (mermaidNodes.length && window.mermaid) {
            window.mermaid.initialize({startOnLoad: false, theme: 'default'});
            window.mermaid.run({nodes: mermaidNodes});
        }
    })();
</script>
</body>
</html>
