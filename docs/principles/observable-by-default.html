<script id="data" type="application/json">{"meta": {"id": "ORG-PRIN-OBSERVABLE-BY-DEFAULT", "status": "draft:gray", "title": "Operational Principle: Observable by Default", "date": "2026-05-16", "author": "Organization Tech Strategy", "permalink": "observable-by-default", "timetoread": "12 min", "excerpt": "Every Organization service emits structured logs, useful metrics, and distributed traces from day one. Observability is not a feature added after an incident; it is a default property delivered by templates, libraries, and the platform. The goal is not dashboards; the goal is to answer 'what just happened, where, and why?' in minutes for any production system. Without observability, every other operational principle collapses into guesswork.", "tags": "operations, observability, logging, metrics, tracing, slos", "logo": "assets/images/observable-by-default/logo.jpeg", "logo_credit": "Inspired by Charity Majors and the JLP Engineering Principles", "icon": "assets/icons/observable-by-default.png"}, "tags": ["operations", "observability", "logging", "metrics", "tracing", "slos"], "modalities": [{"key": "index", "label": "Article", "meta": {}, "blocks": [{"type": "markdown", "content": "> **Status**: DRAFT\n>\n> **Principle**: Organization services are **Observable by Default**. Structured logs, metrics, and traces are produced by every service from the day it is created, using shared shapes, shared destinations, and shared correlation. Observability is delivered by golden templates, libraries, and platform defaults, not bolted on after the first incident.\n\n## Statement\n\nEvery Organization service emits:\n\n* **Structured logs** in a consistent JSON shape, with shared fields (trace ID, span ID, service name, environment, correlation IDs).\n* **Metrics** covering the four golden signals (latency, traffic, errors, saturation) plus business-relevant signals where relevant.\n* **Distributed traces** with consistent trace propagation across service boundaries and asynchronous flows.\n* **Health and readiness signals** aligned with the runtime.\n* **Service-level objectives** for user-visible behaviour, not just internal metrics.\n\nAll three pillars flow through AWS-native destinations (CloudWatch and equivalents) with the option of additional overlays where justified.\n\n## How to Read This Principle\n\n| What it says | What it does **not** say |\n| --- | --- |\n| Observability is a default. | Observability solves itself. |\n| Use shared shapes and destinations. | Use exactly one observability tool. |\n| Emit logs, metrics, and traces. | Emit everything possible. |\n| SLOs frame what matters. | SLOs replace operational sense. |\n| Observability supports debugging. | Observability is for dashboards. |\n\nThe principle is about answering questions in production, not about volume of telemetry.\n\n## How to Apply This Principle\n\nUse this principle to:\n\n* Explain the difference between observability and having dashboards.\n* Identify the questions logs, metrics, traces, and SLOs should answer during an incident.\n* Design telemetry with shared shapes, correlation, and ownership from service creation.\n* Recognise alert noise and unowned dashboards as reliability risks.\n\n## Rationale\n\nThe most expensive minutes in an incident are the ones spent trying to figure out *what is happening*. The cost is paid in lost availability, lost customer trust, and lost engineering time. Observability is the only mitigation that reliably reduces those minutes.\n\nObservability also pays compounding dividends outside incidents:\n\n* Capacity planning becomes evidence-based.\n* Performance regressions become detectable rather than felt.\n* Deploys gain feedback loops via canary metrics and trace deltas.\n* New joiners learn the system from real behaviour, not stories.\n\nIt only works if observability is *consistent*. Logs in five formats, metrics in three systems, and traces in none means each service is investigated differently. The principle is therefore as much about shared *shape* as about shared *coverage*.\n\nOrganization's wider stack supports this: AWS provides default destinations (CloudWatch, X-Ray) and integration with ECS, MSK, and AVIV Group's central tooling. Claude Code can be used to enforce observability patterns through Skills, templates, and CI checks.\n\n## Implications\n\n* **Templates emit telemetry from line one.** New service templates ship with structured logs, metrics, and traces enabled.\n* **Shared library or shared sidecar.** Telemetry shape is enforced centrally, not negotiated per service.\n* **Correlation IDs are propagated everywhere.** HTTP, Kafka, batch jobs, scheduled tasks.\n* **Logs are structured.** Unstructured log lines are an exception, not a default.\n* **High-cardinality events are first-class.** Wide events with many attributes are more useful than narrow events with rolled-up metrics alone.\n* **SLOs are defined for user-visible behaviour.** Internal latency is a leading indicator, not a final goal.\n* **Alerting is symptom-based.** Page on user impact, not on every internal anomaly.\n* **Dashboards have owners.** A dashboard with no owner is a dashboard nobody trusts.\n\n## Debugging Test\n\nA service is observably healthy when an engineer who did not write it can answer these questions quickly during an incident:\n\n* What changed recently?\n* Which users, tenants, regions, or flows are affected?\n* Where did the request or event go after it entered the system?\n* Which downstream dependency is slow, failing, or saturated?\n* Is the problem a deploy, data shape, dependency, load pattern, or configuration change?\n* Is user-facing reliability inside or outside the SLO?\n* What should be rolled back, disabled, scaled, or escalated?\n\nIf the answer requires guessing, asking the original author, or reading production code under pressure, the service is not observable enough.\n\n## What This Means for Teams\n\nFor service teams:\n\n* Use the standard logging library, the standard metrics conventions, and the standard tracing setup.\n* Add structured event logs for the operations your service does for users, not only for the code paths.\n* Define SLOs that reflect what your users (internal or external) actually care about.\n* Treat alerts you mute as bugs in the alerting, not as background noise.\n\nFor platform and SRE roles:\n\n* Own the templates, libraries, and platform defaults that deliver observability.\n* Keep CloudWatch and any overlay tooling working together rather than competing.\n* Provide patterns for trace propagation through MSK and asynchronous flows.\n\nFor tech leads:\n\n* Block production launches that miss observability defaults.\n* Push for SLO definition during design, not during the first incident.\n\n## Anti-Patterns\n\n* **Unstructured log spew.** Free-text log lines with no shared fields, requiring grep gymnastics to debug.\n* **Metric explosion without meaning.** Hundreds of dashboards, none of which answer real questions.\n* **Tracing in one service.** Distributed tracing that stops at the first hop, so the trace is no use distributed.\n* **Alert fatigue.** Pagers tuned to ringing, so genuine incidents are lost in noise.\n* **Owner-less dashboards.** A graveyard of dashboards left behind by ex-projects.\n* **Bolt-on observability.** Logging and metrics added after an incident, then forgotten until the next.\n* **Observability vendor lock-in by accident.** Telemetry that only works on one vendor's stack because shape was tied to the vendor.\n\n## Examples\n\nAligned with the principle:\n\n* A new ECS Fargate service ships with structured JSON logs, OpenTelemetry traces, and CloudWatch metrics from its first commit.\n* Kafka producers and consumers propagate trace headers; a single trace links a user request to all downstream consumers.\n* An SLO of \"99.5% of search responses under 400ms\" is defined alongside the service, with error budget burn alerts.\n* Each service has an \"owned dashboards\" list in its README.\n\nOut of alignment with the principle:\n\n* A service ships with `print` statements as logs because \"we'll add proper logging in a sprint\".\n* Three teams use three different trace propagation schemes; traces cannot be joined.\n* Metrics exist but no SLOs are defined; on-call decides what is wrong by feel.\n* Alerts trigger on every internal anomaly, half of them muted by default.\n\n## Discussion Prompts\n\nUse these prompts in readiness or incident reviews:\n\n* What question could we not answer quickly in the last incident?\n* Which dashboard, alert, or SLO has no clear owner?\n* Where does trace or correlation context break across a service boundary?\n\n## Related Principles\n\n* [Operational Principle: Production Ready](production-ready.html) - observability is a readiness item.\n* [Operational Principle: Cloud Native on AWS](cloud-native-on-aws.html) - AWS-native observability is the default destination.\n* [Design Principle: Evolutionary Systems](evolutionary-systems.html) - observability is required for safe incremental change.\n* [Practice Principle: Governance as Code](governance-as-code.html) - observability defaults are enforced via templates and CI.\n* [Practice Principle: AI Output Must Be Governed](ai-output-must-be-governed.html) - AI-generated changes need observability to be safely validated.\n\n## Scope and Revisiting\n\nThis principle applies to every Organization service, pipeline, and integration that runs in production or pre-production. It also applies to internal platforms whose failure would affect production.\n\nIt does not apply to one-off scripts or experiments with no production exposure, though even there structured logs are a habit worth keeping.\n\nThe principle should be revisited if:\n\n* The AWS observability stack changes meaningfully (for example, a managed OpenTelemetry destination becomes standard).\n* Cost of telemetry becomes a significant operational driver and requires reshaping defaults.\n* A new compliance requirement forces specific retention or redaction patterns.\n\n## Authoritative References\n\n* Charity Majors, Liz Fong-Jones, George Miranda, *Observability Engineering*, O'Reilly.\n* Google SRE Workbook, [Implementing SLOs](https://sre.google/workbook/implementing-slos/).\n* OpenTelemetry, [Specification](https://opentelemetry.io/docs/specs/).\n* John Lewis Partnership, [Engineering Principles](https://engineering-principles.jlp.engineering/).\n"}]}]}</script>
<script>
    (function () {
        const data = JSON.parse(document.getElementById('data').textContent);
        const root = document.getElementById('content');

        const postId = (data.meta && data.meta.id) ? String(data.meta.id) : '';
        const postStatusRaw = (data.meta && data.meta.status) ? String(data.meta.status) : '';
        if (postId || postStatusRaw) {
            const header = document.getElementById('post-header');
            let sectionEl = header.querySelector('p.section');
            if (!sectionEl) {
                sectionEl = document.createElement('p');
                sectionEl.className = 'section';
                header.insertBefore(sectionEl, header.firstChild);
            }
            // Status pill goes first, then a " / " separator before the existing
            // content (section name and/or id).
            if (postStatusRaw) {
                const parts = postStatusRaw.split(':');
                const statusName = parts[0].trim();
                const statusColor = (parts[1] || '').trim();
                const wrap = document.createElement('span');
                wrap.className = 'post-status';
                const dot = document.createElement('span');
                dot.className = 'status-dot';
                if (statusColor) dot.style.background = statusColor;
                wrap.appendChild(dot);
                wrap.appendChild(document.createTextNode(statusName));
                if (sectionEl.firstChild) {
                    sectionEl.insertBefore(document.createTextNode(' • '), sectionEl.firstChild);
                    sectionEl.insertBefore(wrap, sectionEl.firstChild);
                } else {
                    sectionEl.appendChild(wrap);
                }
            }
            if (postId) {
                if (sectionEl.firstChild) sectionEl.appendChild(document.createTextNode(' • '));
                sectionEl.appendChild(document.createTextNode(postId));
            }
        }

        const tagsHost = document.getElementById('tags');
        (data.tags || []).forEach(function (t) {
            const span = document.createElement('span');
            span.className = 'tag';
            span.textContent = t;
            tagsHost.appendChild(span);
        });

        // Minimal markdown renderer. Supports: ATX headings, paragraphs, blockquotes,
        // unordered/ordered lists, fenced code, inline code, bold/italic/strikethrough, links, images, hr.
        // Sufficient for the posts in this repo; replace with a fuller parser if needed.
        function renderMarkdown(src) {
            const lines = src.replace(/\r\n/g, '\n').split('\n');
            const out = [];
            let i = 0;

            const bullet = /^(\s*)([-*])\s+(.*)$/;
            const ordered = /^(\s*)(\d+)\.\s+(.*)$/;
            const tableRow = /^\s*\|(.+)\|\s*$/;
            const tableSep = /^\s*\|?\s*:?-{3,}:?\s*(\|\s*:?-{3,}:?\s*)+\|?\s*$/;

            function splitRow(s) {
                let t = s.trim();
                if (t.startsWith('|')) t = t.slice(1);
                if (t.endsWith('|')) t = t.slice(0, -1);
                return t.split('|').map(c => c.trim());
            }

            function inline(s) {
                // Posts are trusted content, so raw HTML passes through unescaped
                // (some posts embed inline <blockquote>, <div>, etc.).
                // Stray ampersands still get fixed up.
                s = s.replace(/&(?![a-zA-Z]+;|#\d+;)/g, '&amp;');
                s = s.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<a class="image-link" href="$2" target="_blank" rel="noopener noreferrer"><img alt="$1" src="$2"></a>');
                s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
                s = s.replace(/`([^`]+)`/g, function (_, c) {
                    return '<code>' + c.replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</code>';
                });
                s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
                s = s.replace(/~~([^~\n]+)~~/g, '<del>$1</del>');
                s = s.replace(/(^|[^*])\*([^*\n]+)\*/g, '$1<em>$2</em>');
                return s;
            }

            while (i < lines.length) {
                const line = lines[i];
                if (!line.trim()) {
                    i++;
                    continue;
                }

                const fence = line.match(/^```(\w*)\s*$/);
                if (fence) {
                    i++;
                    const buf = [];
                    while (i < lines.length && !/^```\s*$/.test(lines[i])) {
                        buf.push(lines[i]);
                        i++;
                    }
                    i++;
                    const escaped = buf.join('\n').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                    const cls = fence[1] ? ' class="lang-' + fence[1] + '"' : '';
                    out.push('<pre><code' + cls + '>' + escaped + '</code></pre>');
                    continue;
                }

                const h = line.match(/^(#{1,6})\s+(.*)$/);
                if (h) {
                    out.push('<h' + h[1].length + '>' + inline(h[2]) + '</h' + h[1].length + '>');
                    i++;
                    continue;
                }

                if (/^\s*(?:-\s*){3,}\s*$/.test(line) || /^\s*\*{3,}\s*$/.test(line)) {
                    out.push('<hr>');
                    i++;
                    continue;
                }

                if (/^>\s?/.test(line)) {
                    const buf = [];
                    while (i < lines.length && /^>\s?/.test(lines[i])) {
                        buf.push(lines[i].replace(/^>\s?/, ''));
                        i++;
                    }
                    out.push('<blockquote>' + renderMarkdown(buf.join('\n')) + '</blockquote>');
                    continue;
                }

                if (tableRow.test(line) && i + 1 < lines.length && tableSep.test(lines[i + 1])) {
                    const headers = splitRow(line);
                    i += 2;
                    const rows = [];
                    while (i < lines.length && tableRow.test(lines[i])) {
                        rows.push(splitRow(lines[i]));
                        i++;
                    }
                    let html = '<table><thead><tr>';
                    headers.forEach(h => {
                        html += '<th>' + inline(h) + '</th>';
                    });
                    html += '</tr></thead><tbody>';
                    rows.forEach(r => {
                        html += '<tr>';
                        r.forEach(c => {
                            html += '<td>' + inline(c) + '</td>';
                        });
                        html += '</tr>';
                    });
                    html += '</tbody></table>';
                    out.push(html);
                    continue;
                }

                if (bullet.test(line) || ordered.test(line)) {
                    // Indent of the first bullet defines this list's base level.
                    // Deeper-indented bullets become nested lists (rendered by
                    // recursing into renderMarkdown). Same-or-less indent at a
                    // bullet starts a sibling item (or ends the list).
                    const firstMatch = line.match(bullet) || line.match(ordered);
                    const baseIndent = firstMatch[1].length;
                    const isOrdered = ordered.test(line);
                    const items = [];
                    while (i < lines.length) {
                        const cur = lines[i];
                        if (!cur.trim()) {
                            // blank line breaks the list (matches CommonMark-ish behaviour)
                            i++;
                            break;
                        }
                        const mBul = cur.match(bullet);
                        const mOrd = cur.match(ordered);
                        const m = mBul || mOrd;
                        if (!m) break;
                        if (m[1].length < baseIndent) break;
                        if (m[1].length > baseIndent) break; // shouldn't happen at top of loop
                        // Same-type check: switching between -/* and 1. closes the list
                        if (isOrdered !== !!mOrd) break;

                        const itemBuf = [m[3]];
                        const nestedBuf = [];
                        i++;
                        while (i < lines.length) {
                            const nxt = lines[i];
                            if (!nxt.trim()) break;
                            const nBul = nxt.match(bullet);
                            const nOrd = nxt.match(ordered);
                            const nm = nBul || nOrd;
                            if (nm) {
                                if (nm[1].length > baseIndent) {
                                    // nested list line — dedent and stash
                                    nestedBuf.push(nxt.slice(baseIndent + 2));
                                    i++;
                                    continue;
                                }
                                // sibling or end of list
                                break;
                            }
                            // Plain continuation text
                            if (nestedBuf.length) {
                                // continuation inside the nested block
                                nestedBuf.push(nxt.slice(baseIndent + 2));
                            } else {
                                itemBuf.push(nxt.trim());
                            }
                            i++;
                        }

                        let liHtml = inline(itemBuf.join('\n'));
                        if (nestedBuf.length) {
                            liHtml += renderMarkdown(nestedBuf.join('\n'));
                        }
                        items.push('<li>' + liHtml + '</li>');
                    }
                    out.push((isOrdered ? '<ol>' : '<ul>') + items.join('') + (isOrdered ? '</ol>' : '</ul>'));
                    continue;
                }

                const buf = [line];
                i++;
                while (i < lines.length && lines[i].trim() && !/^#{1,6}\s/.test(lines[i]) && !/^>\s?/.test(lines[i]) && !bullet.test(lines[i]) && !ordered.test(lines[i]) && !/^```/.test(lines[i]) && !tableRow.test(lines[i])) {
                    buf.push(lines[i]);
                    i++;
                }
                out.push('<p>' + inline(buf.join(' ')) + '</p>');
            }
            return out.join('\n');
        }

        // Block dispatcher. New block types plug in here.
        const renderers = {
            markdown: function (block) {
                const div = document.createElement('div');
                div.innerHTML = renderMarkdown(block.content);
                return div;
            },
            mermaid: function (block) {
                // Mermaid scans elements with class "mermaid" whose textContent
                // is the diagram source. We collect these nodes and run
                // mermaid.run() once after all blocks are in the DOM.
                const div = document.createElement('div');
                div.className = 'mermaid';
                div.textContent = block.content;
                return div;
            },
            'force-graph': function (block) {
                // build.py emits parsed JSON: {nodes:[{id,size}], links:[{source,target}]}.
                // We instantiate force-graph after the container is in the DOM
                // so it can measure its own width.
                const div = document.createElement('div');
                div.className = 'force-graph';
                const data = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.ForceGraph) return;
                    const maxSize = data.nodes.reduce((m, n) => Math.max(m, n.size || 1), 1);
                    window.ForceGraph()(div)
                        .graphData(data)
                        .width(div.clientWidth)
                        .height(div.clientHeight)
                        .nodeRelSize(4)
                        .nodeVal(n => Math.max(20 * (n.size || 1) / maxSize, 0.001))
                        .nodeLabel(n => n.id + ' (' + (n.size || 1) + ')')
                        .nodeColor(() => 'rgba(135, 206, 235, 0.7)')
                        .linkColor(() => 'rgba(60, 60, 60, 0.4)')
                        .linkDirectionalArrowLength(4)
                        .linkDirectionalArrowRelPos(1)
                        .linkWidth(1);
                });
                return div;
            },
            'bubble-chart': function (block) {
                // build.py emits {nodes:[{name,size}]}. Renders a D3 circle-pack
                // SVG (same shape as the obren.io reference, just inline).
                const wrap = document.createElement('div');
                wrap.className = 'bubble-chart';
                const payload = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.d3) return;
                    const diameter = 480;
                    const fill = '#c0deed';
                    const textColor = '#111111';
                    const fontSize = 12;

                    const svg = window.d3.select(wrap).append('svg')
                        .attr('viewBox', '0 0 ' + diameter + ' ' + diameter)
                        .attr('width', diameter)
                        .attr('height', diameter);

                    const root = window.d3.hierarchy({children: payload.nodes})
                        .sum(d => d.size || 0)
                        .sort((a, b) => b.value - a.value);

                    window.d3.pack().size([diameter, diameter]).padding(2)(root);

                    const node = svg.selectAll('g')
                        .data(root.leaves())
                        .enter().append('g')
                        .attr('transform', d => 'translate(' + d.x + ',' + d.y + ')');

                    node.append('title').text(d => d.data.name + ': ' + d.value);
                    node.append('circle').attr('r', d => d.r).style('fill', fill);
                    node.append('text')
                        .attr('dy', '.3em')
                        .style('text-anchor', 'middle')
                        .style('fill', textColor)
                        .style('font-size', fontSize + 'px')
                        .text(d => d.data.name.substring(0, Math.max(0, Math.floor(d.r / 3))));
                });
                return wrap;
            }
        };

        // Render one modality's blocks into a host element. Mermaid runs
        // scoped to just the nodes created here, so lazily rendered tabs get
        // their diagrams on first activation.
        let mermaidInitialized = false;
        function renderBlocksInto(blocks, host) {
            const mermaidNodes = [];
            blocks.forEach(function (block) {
                const r = renderers[block.type];
                if (!r) {
                    const pre = document.createElement('pre');
                    pre.textContent = '[unknown block type: ' + block.type + ']';
                    host.appendChild(pre);
                    return;
                }
                const node = r(block);
                if (node instanceof Node) {
                    host.appendChild(node);
                    if (block.type === 'mermaid') mermaidNodes.push(node);
                }
            });
            if (mermaidNodes.length && window.mermaid) {
                if (!mermaidInitialized) {
                    window.mermaid.initialize({startOnLoad: false, theme: 'default'});
                    mermaidInitialized = true;
                }
                window.mermaid.run({nodes: mermaidNodes});
            }
        }

        // Modality tabs. One <article class="pane"> per modality; panes are
        // rendered lazily on first activation (force-graph / D3 / mermaid
        // need a visible, measurable container). With a single modality the
        // tab bar stays hidden and the page looks exactly like before.
        const mods = data.modalities;
        const tabBar = document.getElementById('modality-tabs');
        const panes = {};
        const tabButtons = {};
        const renderedPanes = {};

        mods.forEach(function (m) {
            const pane = document.createElement('article');
            pane.className = 'pane';
            pane.dataset.key = m.key;
            pane.hidden = true;
            root.appendChild(pane);
            panes[m.key] = pane;
        });

        const defaultKey = mods.some(m => m.key === 'index') ? 'index' : mods[0].key;

        function activate(key, updateHash) {
            mods.forEach(function (m) {
                const isActive = m.key === key;
                panes[m.key].hidden = !isActive;
                if (tabButtons[m.key]) {
                    tabButtons[m.key].classList.toggle('active', isActive);
                    tabButtons[m.key].setAttribute('aria-selected', isActive ? 'true' : 'false');
                }
            });
            // Unhide first, then render: the chart libraries measure widths.
            if (!renderedPanes[key]) {
                renderBlocksInto(mods.find(m => m.key === key).blocks, panes[key]);
                renderedPanes[key] = true;
            }
            if (updateHash) {
                history.replaceState(null, '',
                    key === defaultKey ? location.pathname + location.search : '#' + key);
            }
        }

        if (mods.length > 1) {
            mods.forEach(function (m) {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.textContent = m.label;
                btn.setAttribute('role', 'tab');
                btn.addEventListener('click', function () { activate(m.key, true); });
                tabBar.appendChild(btn);
                tabButtons[m.key] = btn;
            });
            tabBar.hidden = false;
        }

        // The hash selects a tab only when it matches a modality key, so
        // existing anchors keep working.
        const initialHash = location.hash.slice(1);
        activate(mods.some(m => m.key === initialHash) ? initialHash : defaultKey, false);
        window.addEventListener('hashchange', function () {
            const k = location.hash.slice(1);
            if (mods.some(m => m.key === k)) activate(k, false);
        });
    })();
</script>
</body>
</html>
