<script id="data" type="application/json">{"meta": {"id": "ORG-PRIN-ADVICE-IN-PUBLIC", "status": "draft:gray", "title": "Practice Principle: Advice in Public", "date": "2026-05-16", "author": "Organization Tech Strategy", "permalink": "advice-in-public", "timetoread": "12 min", "excerpt": "Architecture advice happens in the open at Organization. Decisions are made by teams; the conversations supporting those decisions take place where many people can listen, contribute, and learn. The Architecture Advisory Forum is the standing venue, but the principle is broader: prefer ADRs over private memos, public PR reviews over private feedback, and shared forums over 1-1 escalations. Conversation is a learning multiplier; private advice serves one team, public advice serves the organisation.", "tags": "practices, advice-process, communication, aaf, learning-organisation, transparency", "logo": "assets/images/advice-in-public/logo.jpeg", "logo_credit": "Inspired by Andrew Harmel-Law and the Architecture Advisory Forum", "icon": "assets/icons/advice-in-public.png"}, "tags": ["practices", "advice-process", "communication", "aaf", "learning-organisation", "transparency"], "blocks": [{"type": "markdown", "content": "> **Status**: DRAFT\n>\n> **Principle**: Advice that shapes Organization's technical decisions happens **in public**. The default venue is the Architecture Advisory Forum; the default written form is an ADR with reviewable comments; the default conversation is one many people can witness. Private advice is allowed and sometimes necessary, but the bias is toward shared learning. The organisation gets smarter only if many people hear the same conversations.\n\n## Statement\n\nOrganization prefers:\n\n* **Public forums over private meetings** for architecture advice.\n* **Public ADRs over private memos** for proposals.\n* **Public PR reviews over private feedback** for code-level architecture.\n* **Open invites over closed lists** for advisory conversations.\n* **Documented disagreement over silent dissent.**\n\nPrivacy is allowed and sometimes required (personnel, sensitive business, security incidents). The default is public.\n\n## How to Read This Principle\n\n| What it says | What it does **not** say |\n| --- | --- |\n| The default venue is open. | All conversations must be public. |\n| Many people listening is the value. | Many people speaking is the value. |\n| Disagreement is documented. | Disagreement must escalate. |\n| ADRs and forums are primary. | Slack and 1-1s are forbidden. |\n| Public advice creates learning. | Public advice replaces expertise. |\n\nThe principle is about *bias*, not absolutism. Some conversations belong in private. Most do not.\n\n## How to Apply This Principle\n\nUse this principle to:\n\n* Explain why public advice creates organisational learning, not just transparency.\n* Decide when advice belongs in the AAF, an ADR, a PR, or a private conversation.\n* Turn a useful private exchange into a public record without exposing sensitive detail.\n* Recognise when private advice is becoming hidden authority.\n\n## Rationale\n\nPrivate architecture advice has a known failure mode. Two people exchange context, and only two people learn. The next time the same question arises, a different two people repeat the same conversation. Over a year, the organisation rediscovers the same answers dozens of times, each rediscovery costing the time of senior engineers and never producing a durable shared understanding.\n\nPublic advice changes the economics:\n\n* One conversation educates many.\n* Tacit knowledge becomes visible.\n* New joiners ramp by listening, not just by asking.\n* Cross-team patterns emerge from exposure, not mandate.\n* Disagreements happen openly and are resolved with reasoning.\n* The organisation accumulates a shared trail that future decisions can cite.\n\nThe Architecture Advisory Forum is the central instance of this principle. It is explicitly *open-invite*, not because every attendee will contribute, but because the audience itself is part of the value.\n\nThe principle also reinforces decision ownership. Public advice supports teams that own the decision; private advice tends to look like instruction whether it is intended that way or not.\n\n## Implications\n\n* **AAF is open-invite, weekly, on a stable cadence.** Anyone can attend.\n* **Proposed decisions arrive as ADRs.** The text is the starting point for advice.\n* **PR comments are reviewed in the open.** Significant architectural feedback goes on the PR, not in DMs.\n* **Disagreement is documented.** Dissent shows up in the ADR, the PR, or the forum minutes, not in private channels.\n* **1-1 conversations summarise into the public artifact.** If a useful 1-1 advice exchange happens, the outcome is folded into the ADR or PR.\n* **Privacy is justified, not assumed.** Personnel, security incidents, sensitive business: yes. Architecture: no.\n* **Conversation quality is curated.** Public does not mean low-signal; people who attend are expected to contribute, not just spectate.\n\n## Application Questions\n\nUse this principle whenever advice could change a technical decision or teach more than one team. A useful test is simple: if the same explanation would be valuable to a second team later, the advice should probably leave a public trace.\n\nAsk these questions before keeping advice private:\n\n* Is the topic genuinely confidential, or merely uncomfortable?\n* Would another team learn from this reasoning?\n* Is the advice likely to become precedent?\n* Is a senior person's private opinion being mistaken for authority?\n* Can the useful part be summarised in an ADR, PR, or AAF note without exposing sensitive detail?\n\nPublic advice does not mean every conversation must happen in a meeting. It means the reasoning that shaped the decision is visible enough for others to inspect, challenge, and reuse.\n\n## What This Means for Teams\n\nFor service teams:\n\n* Bring decisions to the AAF as ADRs while advice can still change them.\n* Use the forum to gather advice; the decision remains yours.\n* Capture advice received - in the ADR, in PR comments, or in linked notes - so the trail is durable.\n\nFor senior engineers and architects:\n\n* Default to giving advice in public.\n* When you find yourself repeating the same 1-1 advice, raise the pattern in the AAF and write it down.\n* Use the public forum to model the behaviour you want others to repeat.\n\nFor platform and AI Engineering Enablement roles:\n\n* Make AAF attendance easy and rewarding.\n* Capture and link meeting outcomes back into the relevant ADRs.\n* Treat the public trail as part of the platform's documentation.\n\nFor senior leadership:\n\n* Attend the AAF as a listener. Modelling presence without dominance is itself valuable.\n* Resist setting up parallel private forums for \"the important decisions\"; those undercut the principle.\n\n## Anti-Patterns\n\n* **DM-as-default.** All useful advice happens in private messages; the public artifact is empty.\n* **Shadow forum.** A small private group makes the real decisions; the AAF is briefed afterwards.\n* **Audience-without-participation.** The forum exists but only three people ever speak.\n* **Performance.** Public discussions become performative because everyone is watching; honest disagreement moves to private.\n* **Silent dissent.** A senior engineer disagrees in private but stays quiet in public.\n* **Permanent privacy.** A topic is treated as sensitive once and never re-opened to the public.\n* **Forum theatre.** The AAF runs but the decisions were already made and only the appearance of advice remains.\n\n## Examples\n\nAligned with the principle:\n\n* A team brings a proposed caching pattern to the AAF, hears advice from several other teams, updates the ADR with what changed.\n* A PR comment from a platform engineer about a Kafka topic design becomes the seed for an ADR.\n* A senior engineer who is asked the same question repeatedly turns the answer into a markdown record and links to it in future replies.\n\nOut of alignment with the principle:\n\n* A platform decision quietly emerges from a senior architect's private conversations; nobody else can find the rationale.\n* AAF attendance shrinks to a closed list of senior engineers because juniors \"don't have much to add\".\n* A team's \"consultation\" amounts to one DM with one architect.\n\n## Discussion Prompts\n\nUse these prompts in onboarding or team retrospectives:\n\n* Which recent technical conversation should have left a more public trail?\n* Where are we using private advice because it is genuinely sensitive, and where are we using it because it is convenient?\n* What repeated 1-1 advice should become an ADR, principle, or AAF topic?\n\n## Related Principles\n\n* [Organisation Principle: Decisions Stay with Teams](decisions-stay-with-teams.html) - public advice supports team-owned decisions.\n* [Practice Principle: Markdown Records as Canonical](markdown-records-as-canonical.html) - the public trail lives as markdown.\n* [Practice Principle: Governance as Code](governance-as-code.html) - some advice patterns are encoded in checks and templates rather than meetings.\n* [Organisation Principle: Capabilities Follow Ownership](capabilities-follow-ownership.html) - public advice prevents tacit knowledge becoming personal capital.\n\n## Scope and Revisiting\n\nThis principle applies to architecture advice for Organization's technical decisions: design, integration, platform, tooling, AI configuration, and operating model.\n\nIt does not apply to:\n\n* Personnel and performance conversations.\n* Security incident response (which has its own forum and confidentiality rules).\n* Genuinely confidential commercial or legal topics.\n* Internal team retrospectives where psychological safety requires privacy.\n\nThe principle should be revisited if:\n\n* AAF attendance and participation drop persistently.\n* The volume of architectural decisions outgrows what a single forum can support and the principle needs additional venues.\n* Cultural or organisational shifts mean \"public\" no longer scales the way it does today.\n\n## Authoritative References\n\n* Andrew Harmel-Law, [Scaling the Practice of Architecture, Conversationally](https://martinfowler.com/articles/scaling-architecture-conversationally.html).\n* Will Larson, [An Elegant Puzzle: Systems of Engineering Management](https://lethain.com/an-elegant-puzzle/), Stripe Press.\n* Organization Foundations, Architecture Advisory Forum ([Architecture Advisory Forum as a Standing Advice Ritual](../foundations/architecture-advisory-forum.html)).\n* John Lewis Partnership, [Engineering Principles](https://engineering-principles.jlp.engineering/).\n"}]}</script>
<script>
    (function () {
        const data = JSON.parse(document.getElementById('data').textContent);
        const root = document.getElementById('content');

        const postId = (data.meta && data.meta.id) ? String(data.meta.id) : '';
        const postStatusRaw = (data.meta && data.meta.status) ? String(data.meta.status) : '';
        if (postId || postStatusRaw) {
            const header = document.getElementById('post-header');
            let sectionEl = header.querySelector('p.section');
            if (!sectionEl) {
                sectionEl = document.createElement('p');
                sectionEl.className = 'section';
                header.insertBefore(sectionEl, header.firstChild);
            }
            // Status pill goes first, then a " / " separator before the existing
            // content (section name and/or id).
            if (postStatusRaw) {
                const parts = postStatusRaw.split(':');
                const statusName = parts[0].trim();
                const statusColor = (parts[1] || '').trim();
                const wrap = document.createElement('span');
                wrap.className = 'post-status';
                const dot = document.createElement('span');
                dot.className = 'status-dot';
                if (statusColor) dot.style.background = statusColor;
                wrap.appendChild(dot);
                wrap.appendChild(document.createTextNode(statusName));
                if (sectionEl.firstChild) {
                    sectionEl.insertBefore(document.createTextNode(' • '), sectionEl.firstChild);
                    sectionEl.insertBefore(wrap, sectionEl.firstChild);
                } else {
                    sectionEl.appendChild(wrap);
                }
            }
            if (postId) {
                if (sectionEl.firstChild) sectionEl.appendChild(document.createTextNode(' • '));
                sectionEl.appendChild(document.createTextNode(postId));
            }
        }

        const tagsHost = document.getElementById('tags');
        (data.tags || []).forEach(function (t) {
            const span = document.createElement('span');
            span.className = 'tag';
            span.textContent = t;
            tagsHost.appendChild(span);
        });

        // Minimal markdown renderer. Supports: ATX headings, paragraphs, blockquotes,
        // unordered/ordered lists, fenced code, inline code, bold/italic/strikethrough, links, images, hr.
        // Sufficient for the posts in this repo; replace with a fuller parser if needed.
        function renderMarkdown(src) {
            const lines = src.replace(/\r\n/g, '\n').split('\n');
            const out = [];
            let i = 0;

            const bullet = /^(\s*)([-*])\s+(.*)$/;
            const ordered = /^(\s*)(\d+)\.\s+(.*)$/;
            const tableRow = /^\s*\|(.+)\|\s*$/;
            const tableSep = /^\s*\|?\s*:?-{3,}:?\s*(\|\s*:?-{3,}:?\s*)+\|?\s*$/;

            function splitRow(s) {
                let t = s.trim();
                if (t.startsWith('|')) t = t.slice(1);
                if (t.endsWith('|')) t = t.slice(0, -1);
                return t.split('|').map(c => c.trim());
            }

            function inline(s) {
                // Posts are trusted content, so raw HTML passes through unescaped
                // (some posts embed inline <blockquote>, <div>, etc.).
                // Stray ampersands still get fixed up.
                s = s.replace(/&(?![a-zA-Z]+;|#\d+;)/g, '&amp;');
                s = s.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<a class="image-link" href="$2" target="_blank" rel="noopener noreferrer"><img alt="$1" src="$2"></a>');
                s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
                s = s.replace(/`([^`]+)`/g, function (_, c) {
                    return '<code>' + c.replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</code>';
                });
                s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
                s = s.replace(/~~([^~\n]+)~~/g, '<del>$1</del>');
                s = s.replace(/(^|[^*])\*([^*\n]+)\*/g, '$1<em>$2</em>');
                return s;
            }

            while (i < lines.length) {
                const line = lines[i];
                if (!line.trim()) {
                    i++;
                    continue;
                }

                const fence = line.match(/^```(\w*)\s*$/);
                if (fence) {
                    i++;
                    const buf = [];
                    while (i < lines.length && !/^```\s*$/.test(lines[i])) {
                        buf.push(lines[i]);
                        i++;
                    }
                    i++;
                    const escaped = buf.join('\n').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                    const cls = fence[1] ? ' class="lang-' + fence[1] + '"' : '';
                    out.push('<pre><code' + cls + '>' + escaped + '</code></pre>');
                    continue;
                }

                const h = line.match(/^(#{1,6})\s+(.*)$/);
                if (h) {
                    out.push('<h' + h[1].length + '>' + inline(h[2]) + '</h' + h[1].length + '>');
                    i++;
                    continue;
                }

                if (/^\s*(?:-\s*){3,}\s*$/.test(line) || /^\s*\*{3,}\s*$/.test(line)) {
                    out.push('<hr>');
                    i++;
                    continue;
                }

                if (/^>\s?/.test(line)) {
                    const buf = [];
                    while (i < lines.length && /^>\s?/.test(lines[i])) {
                        buf.push(lines[i].replace(/^>\s?/, ''));
                        i++;
                    }
                    out.push('<blockquote>' + renderMarkdown(buf.join('\n')) + '</blockquote>');
                    continue;
                }

                if (tableRow.test(line) && i + 1 < lines.length && tableSep.test(lines[i + 1])) {
                    const headers = splitRow(line);
                    i += 2;
                    const rows = [];
                    while (i < lines.length && tableRow.test(lines[i])) {
                        rows.push(splitRow(lines[i]));
                        i++;
                    }
                    let html = '<table><thead><tr>';
                    headers.forEach(h => {
                        html += '<th>' + inline(h) + '</th>';
                    });
                    html += '</tr></thead><tbody>';
                    rows.forEach(r => {
                        html += '<tr>';
                        r.forEach(c => {
                            html += '<td>' + inline(c) + '</td>';
                        });
                        html += '</tr>';
                    });
                    html += '</tbody></table>';
                    out.push(html);
                    continue;
                }

                if (bullet.test(line) || ordered.test(line)) {
                    // Indent of the first bullet defines this list's base level.
                    // Deeper-indented bullets become nested lists (rendered by
                    // recursing into renderMarkdown). Same-or-less indent at a
                    // bullet starts a sibling item (or ends the list).
                    const firstMatch = line.match(bullet) || line.match(ordered);
                    const baseIndent = firstMatch[1].length;
                    const isOrdered = ordered.test(line);
                    const items = [];
                    while (i < lines.length) {
                        const cur = lines[i];
                        if (!cur.trim()) {
                            // blank line breaks the list (matches CommonMark-ish behaviour)
                            i++;
                            break;
                        }
                        const mBul = cur.match(bullet);
                        const mOrd = cur.match(ordered);
                        const m = mBul || mOrd;
                        if (!m) break;
                        if (m[1].length < baseIndent) break;
                        if (m[1].length > baseIndent) break; // shouldn't happen at top of loop
                        // Same-type check: switching between -/* and 1. closes the list
                        if (isOrdered !== !!mOrd) break;

                        const itemBuf = [m[3]];
                        const nestedBuf = [];
                        i++;
                        while (i < lines.length) {
                            const nxt = lines[i];
                            if (!nxt.trim()) break;
                            const nBul = nxt.match(bullet);
                            const nOrd = nxt.match(ordered);
                            const nm = nBul || nOrd;
                            if (nm) {
                                if (nm[1].length > baseIndent) {
                                    // nested list line — dedent and stash
                                    nestedBuf.push(nxt.slice(baseIndent + 2));
                                    i++;
                                    continue;
                                }
                                // sibling or end of list
                                break;
                            }
                            // Plain continuation text
                            if (nestedBuf.length) {
                                // continuation inside the nested block
                                nestedBuf.push(nxt.slice(baseIndent + 2));
                            } else {
                                itemBuf.push(nxt.trim());
                            }
                            i++;
                        }

                        let liHtml = inline(itemBuf.join('\n'));
                        if (nestedBuf.length) {
                            liHtml += renderMarkdown(nestedBuf.join('\n'));
                        }
                        items.push('<li>' + liHtml + '</li>');
                    }
                    out.push((isOrdered ? '<ol>' : '<ul>') + items.join('') + (isOrdered ? '</ol>' : '</ul>'));
                    continue;
                }

                const buf = [line];
                i++;
                while (i < lines.length && lines[i].trim() && !/^#{1,6}\s/.test(lines[i]) && !/^>\s?/.test(lines[i]) && !bullet.test(lines[i]) && !ordered.test(lines[i]) && !/^```/.test(lines[i]) && !tableRow.test(lines[i])) {
                    buf.push(lines[i]);
                    i++;
                }
                out.push('<p>' + inline(buf.join(' ')) + '</p>');
            }
            return out.join('\n');
        }

        // Block dispatcher. New block types plug in here.
        const renderers = {
            markdown: function (block) {
                const div = document.createElement('div');
                div.innerHTML = renderMarkdown(block.content);
                return div;
            },
            mermaid: function (block) {
                // Mermaid scans elements with class "mermaid" whose textContent
                // is the diagram source. We collect these nodes and run
                // mermaid.run() once after all blocks are in the DOM.
                const div = document.createElement('div');
                div.className = 'mermaid';
                div.textContent = block.content;
                return div;
            },
            'force-graph': function (block) {
                // build.py emits parsed JSON: {nodes:[{id,size}], links:[{source,target}]}.
                // We instantiate force-graph after the container is in the DOM
                // so it can measure its own width.
                const div = document.createElement('div');
                div.className = 'force-graph';
                const data = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.ForceGraph) return;
                    const maxSize = data.nodes.reduce((m, n) => Math.max(m, n.size || 1), 1);
                    window.ForceGraph()(div)
                        .graphData(data)
                        .width(div.clientWidth)
                        .height(div.clientHeight)
                        .nodeRelSize(4)
                        .nodeVal(n => Math.max(20 * (n.size || 1) / maxSize, 0.001))
                        .nodeLabel(n => n.id + ' (' + (n.size || 1) + ')')
                        .nodeColor(() => 'rgba(135, 206, 235, 0.7)')
                        .linkColor(() => 'rgba(60, 60, 60, 0.4)')
                        .linkDirectionalArrowLength(4)
                        .linkDirectionalArrowRelPos(1)
                        .linkWidth(1);
                });
                return div;
            },
            'bubble-chart': function (block) {
                // build.py emits {nodes:[{name,size}]}. Renders a D3 circle-pack
                // SVG (same shape as the obren.io reference, just inline).
                const wrap = document.createElement('div');
                wrap.className = 'bubble-chart';
                const payload = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.d3) return;
                    const diameter = 480;
                    const fill = '#c0deed';
                    const textColor = '#111111';
                    const fontSize = 12;

                    const svg = window.d3.select(wrap).append('svg')
                        .attr('viewBox', '0 0 ' + diameter + ' ' + diameter)
                        .attr('width', diameter)
                        .attr('height', diameter);

                    const root = window.d3.hierarchy({children: payload.nodes})
                        .sum(d => d.size || 0)
                        .sort((a, b) => b.value - a.value);

                    window.d3.pack().size([diameter, diameter]).padding(2)(root);

                    const node = svg.selectAll('g')
                        .data(root.leaves())
                        .enter().append('g')
                        .attr('transform', d => 'translate(' + d.x + ',' + d.y + ')');

                    node.append('title').text(d => d.data.name + ': ' + d.value);
                    node.append('circle').attr('r', d => d.r).style('fill', fill);
                    node.append('text')
                        .attr('dy', '.3em')
                        .style('text-anchor', 'middle')
                        .style('fill', textColor)
                        .style('font-size', fontSize + 'px')
                        .text(d => d.data.name.substring(0, Math.max(0, Math.floor(d.r / 3))));
                });
                return wrap;
            }
        };

        const mermaidNodes = [];
        data.blocks.forEach(function (block) {
            const r = renderers[block.type];
            if (!r) {
                const pre = document.createElement('pre');
                pre.textContent = '[unknown block type: ' + block.type + ']';
                root.appendChild(pre);
                return;
            }
            const node = r(block);
            if (node instanceof Node) {
                root.appendChild(node);
                if (block.type === 'mermaid') mermaidNodes.push(node);
            }
        });

        if (mermaidNodes.length && window.mermaid) {
            window.mermaid.initialize({startOnLoad: false, theme: 'default'});
            window.mermaid.run({nodes: mermaidNodes});
        }
    })();
</script>
</body>
</html>
