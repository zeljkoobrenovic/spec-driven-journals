<script id="data" type="application/json">{"meta": {"id": "ORG-PRIN-CAPABILITIES-FOLLOW-OWNERSHIP", "status": "draft:gray", "title": "Organisation Principle: Capabilities Follow Ownership", "date": "2026-05-16", "author": "Organization Tech Strategy", "permalink": "capabilities-follow-ownership", "timetoread": "12 min", "excerpt": "Every shared capability at Organization - service, library, platform, golden path, Skill, MCP server, subagent, CLAUDE.md fragment, runbook - belongs to a named owner with a real lifecycle. Capabilities without owners decay, drift, and quietly poison the platform. The principle is simple: if it can be used by another team, it has an owner, a lifecycle, and a decommissioning plan. Otherwise it should not exist as a shared thing.", "tags": "organisation, ownership, platform, lifecycle, capabilities, skills, mcp", "logo": "assets/images/capabilities-follow-ownership/logo.jpeg", "logo_credit": "Inspired by Team Topologies and Organization's AI operating model", "icon": "assets/icons/capabilities-follow-ownership.png"}, "tags": ["organisation", "ownership", "platform", "lifecycle", "capabilities", "skills", "mcp"], "modalities": [{"key": "index", "label": "Article", "meta": {}, "blocks": [{"type": "markdown", "content": "> **Status**: DRAFT\n>\n> **Principle**: Every shared engineering capability at Organization has a named owner, a lifecycle, and a decommissioning path. This applies to services, libraries, platforms, golden paths, templates, Skills, MCP servers, subagents, CLAUDE.md fragments, runbooks, and any other artifact other teams depend on. Capabilities without owners decay silently and poison the platform. If a capability cannot be owned, it should not be shared.\n\n## Statement\n\nA **capability** is anything one team produces that another team can use: a service, an API, a library, a base image, a CI template, a CLAUDE.md fragment, a Skill, an MCP server, a subagent, a runbook, a dashboard, a build script.\n\nEvery capability has:\n\n* **An owning team.** Named, not implied.\n* **A purpose.** What it does, when to use it, when not to.\n* **A lifecycle status.** Active, deprecated, retired.\n* **A review cadence.** Whether it is still doing its job.\n* **A decommissioning plan.** What replaces it if it goes away.\n\nCapabilities that lose their owner do not become \"everyone's\"; they become nobody's. The principle prevents that by requiring ownership up front and surfacing loss of ownership when it happens.\n\n## How to Read This Principle\n\n| What it says | What it does **not** say |\n| --- | --- |\n| Shared capabilities have owners. | Every line of code has a single named author. |\n| Ownership is by team. | Ownership is by individual. |\n| Lifecycles are explicit. | Capabilities live forever. |\n| Decommissioning is planned. | Capabilities are deleted casually. |\n| Unowned capabilities should not be shared. | Unowned work cannot exist. |\n\nThe principle scopes ownership to the things other teams depend on. Personal scripts, prototypes, and experiments are not subject to the same standard.\n\n## How to Apply This Principle\n\nUse this principle to:\n\n* Distinguish a team-local artifact from a shared capability.\n* Explain why ownership, lifecycle, and decommissioning must be decided before broad adoption.\n* Evaluate whether a capability is safe for other teams to depend on.\n* Spot the early signs of capability decay: stale docs, unclear owners, hidden consumers, and permanent deprecation.\n\n## Rationale\n\nShared capabilities compound when they are owned. They decay when they are not. The decay pattern is consistent:\n\n1. A team builds a useful artifact - a CI template, a Kafka client wrapper, a Claude Code Skill.\n2. Other teams adopt it.\n3. The original team's priorities change.\n4. The artifact stops being maintained.\n5. Bugs accumulate; documentation goes stale; trust erodes.\n6. Other teams either fork it, abandon it, or use it through workarounds.\n7. The platform is now harder to operate than it would have been with no shared artifact at all.\n\nOrganization's AI strategy makes this acute. Skills, MCP servers, subagents, CLAUDE.md fragments, hooks, and Claude Code settings are all *capabilities*. Without explicit ownership and lifecycle, the AI engineering surface decays the same way as a Java library would.\n\nThe dedicated AI Engineering Enablement function in the AI operating model exists in part to make this principle real for AI-shaped capabilities. The same logic applies to backend libraries, frontend templates, infrastructure modules, and platform golden paths.\n\n## Implications\n\n* **Every shared capability has a `CODEOWNERS` (or equivalent) entry.** No file enters a shared platform without ownership.\n* **Lifecycle status is visible.** Active, deprecated, retired - readers know which.\n* **Deprecation has a date.** \"Deprecated\" without a removal date is permanent in practice.\n* **A capability without an owner is decommissioned, not adopted by default.** Other teams stepping in is a deliberate choice, not an accident.\n* **Capabilities are reviewed periodically.** Usage, cost, satisfaction, and fit are reviewed; outcomes are recorded.\n* **Adoption is informed.** Other teams choosing to depend on a capability do so with the lifecycle visible.\n* **Personal experiments are not shared capabilities.** They live in personal or experimental spaces until promoted.\n\n## Capability Registry Minimum\n\nA shared capability should not enter a platform, catalog, or team-facing default without a minimum record:\n\n| Field | Why it matters |\n| --- | --- |\n| **Name** | Gives teams a stable thing to refer to. |\n| **Owner** | Makes support and change responsibility explicit. |\n| **Purpose** | Explains what the capability is for and when to use it. |\n| **Status** | Shows whether it is active, deprecated, experimental, or retired. |\n| **Consumers** | Helps assess blast radius when it changes. |\n| **Support path** | Tells users where to ask questions and report problems. |\n| **Review date** | Prevents quiet decay. |\n| **Exit path** | Explains what teams should do if the capability is retired. |\n\nThis registry does not need to be heavy. A simple markdown page, YAML catalog, or repository index is enough if it is maintained and linked from the places teams actually look.\n\n## What This Means for Teams\n\nFor service teams:\n\n* Before publishing a capability for others to use, accept the ownership cost.\n* Mark personal or experimental things as such; do not let them become shared by accident.\n* When a capability you own no longer fits, deprecate it formally; do not just stop maintaining it.\n\nFor platform and AI Engineering Enablement roles:\n\n* Curate the registry of shared capabilities, including Skills, MCP servers, subagents, and CLAUDE.md fragments.\n* Enforce the ownership requirement for entries into shared registries.\n* Run lifecycle reviews and publish results.\n\nFor tech leads:\n\n* When adopting a capability, check its owner and lifecycle status.\n* Refuse to adopt unowned shared artifacts; raise the gap instead of working around it.\n\nFor senior leadership:\n\n* Treat lifecycle reviews as a real signal of platform health.\n* Resist the urge to \"consolidate\" unowned things into a single team without funding ownership.\n\n## Anti-Patterns\n\n* **Tragedy of the commons.** A useful library that everyone uses and nobody maintains.\n* **Ghost capability.** A Skill, template, or service in production that no team admits to owning.\n* **Promotion-by-use.** A team's internal helper becomes a de facto platform because adoption outran ownership decisions.\n* **Permanent deprecation.** Capabilities marked deprecated for years with no removal plan.\n* **Owner-of-record only.** A team is technically the owner but has no capacity to operate the capability.\n* **Forced adoption.** Other teams told to depend on a capability that has no real owner.\n* **Personal Skill at platform scale.** An individual's Claude Code Skill becomes used across the org without a named team behind it.\n\n## Examples\n\nAligned with the principle:\n\n* A Claude Code Skill in the shared registry has a named owning team, a lifecycle status, and a review date.\n* A CI template lives in a repo with CODEOWNERS, a README explaining the purpose and lifecycle, and a deprecation plan if applicable.\n* A platform team explicitly accepts ownership of an inherited capability before it is promoted to a shared default.\n\nOut of alignment with the principle:\n\n* A subagent used across teams that was written by one engineer who has since changed teams.\n* A \"deprecated since 2024\" capability that 30 services still depend on.\n* A Skill registry that contains entries with no owner column.\n\n## Discussion Prompts\n\nUse these prompts in onboarding or team retrospectives:\n\n* Which shared capability do we depend on whose owner is unclear?\n* Which capability have we accidentally promoted from team-local helper to platform dependency?\n* What should we decommission rather than continue maintaining weakly?\n\n## Related Principles\n\n* [Design Principle: Standardize Before Diverging](standardize-before-diverging.html) - defaults are themselves capabilities and need owners.\n* [Organisation Principle: Decisions Stay with Teams](decisions-stay-with-teams.html) - capability ownership lines up with decision ownership.\n* [Practice Principle: Governance as Code](governance-as-code.html) - ownership and lifecycle are partly enforced by automation.\n* [Operational Principle: Production Ready](production-ready.html) - operational ownership is a readiness item.\n* [Practice Principle: AI Output Must Be Governed](ai-output-must-be-governed.html) - AI-shaped capabilities are subject to the same ownership rules as code.\n\n## Scope and Revisiting\n\nThis principle applies to all shared capabilities consumed across team boundaries at Organization: code, infrastructure, templates, AI configuration, documentation, dashboards, runbooks, and similar.\n\nIt does not apply to genuinely team-local artifacts that other teams do not depend on.\n\nThe principle should be revisited if:\n\n* The shared registry becomes too granular or too coarse to be useful.\n* Lifecycle reviews are repeatedly skipped or repeatedly inconclusive.\n* A new kind of capability (for example, a new AI primitive) requires a different ownership model.\n\n## Authoritative References\n\n* Matthew Skelton, Manuel Pais, *Team Topologies*, IT Revolution.\n* Charity Majors, [What is \"Ownership\"?](https://charity.wtf/).\n* Organization AI Decisions Log, AI Operating Model: Dedicated AI Engineering Enablement Function ([AI Operating Model: Dedicated AI Engineering Enablement Function](../ai-decisions-log/ai-operating-model.html)).\n* John Lewis Partnership, [Engineering Principles](https://engineering-principles.jlp.engineering/).\n"}]}]}</script>

        const postStatusRaw = (data.meta && data.meta.status) ? String(data.meta.status) : '';
        if (postId || postStatusRaw) {

            if (postStatusRaw) {

                const statusName = parts[0].trim();
                const statusColor = (parts[1] || '').trim();
                const wrap = document.createElement('span');
                wrap.className = 'post-status';
                const dot = document.createElement('span');
                dot.className = 'status-dot';
                if (statusColor) dot.style.background = statusColor;

                    sectionEl.insertBefore(wrap, sectionEl.firstChild);
                } else {
                    sectionEl.appendChild(wrap);
                }
            }
            if (postId) {
                if (sectionEl.firstChild) sectionEl.appendChild(document.createTextNode(' • '));
                sectionEl.appendChild(document.createTextNode(postId));
            }
        }

        const tagsHost = document.getElementById('tags');
        (data.tags || []).forEach(function (t) {
            const span = document.createElement('span');
            span.className = 'tag';
            span.textContent = t;
            tagsHost.appendChild(span);
        });

        // Minimal markdown renderer. Supports: ATX headings, paragraphs, blockquotes,
        // unordered/ordered lists, fenced code, inline code, bold/italic/strikethrough, links, images, hr.
        // Sufficient for the posts in this repo; replace with a fuller parser if needed.
        function renderMarkdown(src) {
            const lines = src.replace(/\r\n/g, '\n').split('\n');
            const out = [];
            let i = 0;

            const bullet = /^(\s*)([-*])\s+(.*)$/;
            const ordered = /^(\s*)(\d+)\.\s+(.*)$/;
            const tableRow = /^\s*\|(.+)\|\s*$/;
            const tableSep = /^\s*\|?\s*:?-{3,}:?\s*(\|\s*:?-{3,}:?\s*)+\|?\s*$/;

            function splitRow(s) {
                let t = s.trim();
                if (t.startsWith('|')) t = t.slice(1);
                if (t.endsWith('|')) t = t.slice(0, -1);
                return t.split('|').map(c => c.trim());
            }

            function inline(s) {
                // Posts are trusted content, so raw HTML passes through unescaped
                // (some posts embed inline <blockquote>, <div>, etc.).
                // Stray ampersands still get fixed up.
                s = s.replace(/&(?![a-zA-Z]+;|#\d+;)/g, '&amp;');
                s = s.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<a class="image-link" href="$2" target="_blank" rel="noopener noreferrer"><img alt="$1" src="$2"></a>');
                s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
                s = s.replace(/`([^`]+)`/g, function (_, c) {
                    return '<code>' + c.replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</code>';
                });
                s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
                s = s.replace(/~~([^~\n]+)~~/g, '<del>$1</del>');
                s = s.replace(/(^|[^*])\*([^*\n]+)\*/g, '$1<em>$2</em>');
                return s;
            }

            while (i < lines.length) {
                const line = lines[i];
                if (!line.trim()) {
                    i++;
                    continue;
                }

                const fence = line.match(/^```(\w*)\s*$/);
                if (fence) {
                    i++;
                    const buf = [];
                    while (i < lines.length && !/^```\s*$/.test(lines[i])) {
                        buf.push(lines[i]);
                        i++;
                    }
                    i++;
                    const escaped = buf.join('\n').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                    const cls = fence[1] ? ' class="lang-' + fence[1] + '"' : '';
                    out.push('<pre><code' + cls + '>' + escaped + '</code></pre>');
                    continue;
                }

                const h = line.match(/^(#{1,6})\s+(.*)$/);
                if (h) {
                    out.push('<h' + h[1].length + '>' + inline(h[2]) + '</h' + h[1].length + '>');
                    i++;
                    continue;
                }

                if (/^\s*(?:-\s*){3,}\s*$/.test(line) || /^\s*\*{3,}\s*$/.test(line)) {
                    out.push('<hr>');
                    i++;
                    continue;
                }

                if (/^>\s?/.test(line)) {
                    const buf = [];
                    while (i < lines.length && /^>\s?/.test(lines[i])) {
                        buf.push(lines[i].replace(/^>\s?/, ''));
                        i++;
                    }
                    out.push('<blockquote>' + renderMarkdown(buf.join('\n')) + '</blockquote>');
                    continue;
                }

                if (tableRow.test(line) && i + 1 < lines.length && tableSep.test(lines[i + 1])) {
                    const headers = splitRow(line);
                    i += 2;
                    const rows = [];
                    while (i < lines.length && tableRow.test(lines[i])) {
                        rows.push(splitRow(lines[i]));
                        i++;
                    }
                    let html = '<table><thead><tr>';
                    headers.forEach(h => {
                        html += '<th>' + inline(h) + '</th>';
                    });
                    html += '</tr></thead><tbody>';
                    rows.forEach(r => {
                        html += '<tr>';
                        r.forEach(c => {
                            html += '<td>' + inline(c) + '</td>';
                        });
                        html += '</tr>';
                    });
                    html += '</tbody></table>';
                    out.push(html);
                    continue;
                }

                if (bullet.test(line) || ordered.test(line)) {
                    // Indent of the first bullet defines this list's base level.
                    // Deeper-indented bullets become nested lists (rendered by
                    // recursing into renderMarkdown). Same-or-less indent at a
                    // bullet starts a sibling item (or ends the list).
                    const firstMatch = line.match(bullet) || line.match(ordered);
                    const baseIndent = firstMatch[1].length;
                    const isOrdered = ordered.test(line);
                    const items = [];
                    while (i < lines.length) {
                        const cur = lines[i];
                        if (!cur.trim()) {
                            // blank line breaks the list (matches CommonMark-ish behaviour)
                            i++;
                            break;
                        }
                        const mBul = cur.match(bullet);
                        const mOrd = cur.match(ordered);
                        const m = mBul || mOrd;
                        if (!m) break;
                        if (m[1].length < baseIndent) break;
                        if (m[1].length > baseIndent) break; // shouldn't happen at top of loop
                        // Same-type check: switching between -/* and 1. closes the list
                        if (isOrdered !== !!mOrd) break;

                        const itemBuf = [m[3]];
                        const nestedBuf = [];
                        i++;
                        while (i < lines.length) {
                            const nxt = lines[i];
                            if (!nxt.trim()) break;
                            const nBul = nxt.match(bullet);
                            const nOrd = nxt.match(ordered);
                            const nm = nBul || nOrd;
                            if (nm) {
                                if (nm[1].length > baseIndent) {
                                    // nested list line — dedent and stash
                                    nestedBuf.push(nxt.slice(baseIndent + 2));
                                    i++;
                                    continue;
                                }
                                // sibling or end of list
                                break;
                            }
                            // Plain continuation text
                            if (nestedBuf.length) {
                                // continuation inside the nested block
                                nestedBuf.push(nxt.slice(baseIndent + 2));
                            } else {
                                itemBuf.push(nxt.trim());
                            }
                            i++;
                        }

                        let liHtml = inline(itemBuf.join('\n'));
                        if (nestedBuf.length) {
                            liHtml += renderMarkdown(nestedBuf.join('\n'));
                        }
                        items.push('<li>' + liHtml + '</li>');
                    }
                    out.push((isOrdered ? '<ol>' : '<ul>') + items.join('') + (isOrdered ? '</ol>' : '</ul>'));
                    continue;
                }

                const buf = [line];
                i++;
                while (i < lines.length && lines[i].trim() && !/^#{1,6}\s/.test(lines[i]) && !/^>\s?/.test(lines[i]) && !bullet.test(lines[i]) && !ordered.test(lines[i]) && !/^```/.test(lines[i]) && !tableRow.test(lines[i])) {
                    buf.push(lines[i]);
                    i++;
                }
                out.push('<p>' + inline(buf.join(' ')) + '</p>');
            }
            return out.join('\n');
        }

        // Block dispatcher. New block types plug in here.
        const renderers = {
            markdown: function (block) {
                const div = document.createElement('div');
                div.innerHTML = renderMarkdown(block.content);
                return div;
            },
            mermaid: function (block) {
                // Mermaid scans elements with class "mermaid" whose textContent
                // is the diagram source. We collect these nodes and run
                // mermaid.run() once after all blocks are in the DOM.
                const div = document.createElement('div');
                div.className = 'mermaid';
                div.textContent = block.content;
                return div;
            },
            'force-graph': function (block) {
                // build.py emits parsed JSON: {nodes:[{id,size}], links:[{source,target}]}.
                // We instantiate force-graph after the container is in the DOM
                // so it can measure its own width.
                const div = document.createElement('div');
                div.className = 'force-graph';
                const data = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.ForceGraph) return;
                    const maxSize = data.nodes.reduce((m, n) => Math.max(m, n.size || 1), 1);
                    window.ForceGraph()(div)
                        .graphData(data)
                        .width(div.clientWidth)
                        .height(div.clientHeight)
                        .nodeRelSize(4)
                        .nodeVal(n => Math.max(20 * (n.size || 1) / maxSize, 0.001))
                        .nodeLabel(n => n.id + ' (' + (n.size || 1) + ')')
                        .nodeColor(() => 'rgba(135, 206, 235, 0.7)')
                        .linkColor(() => 'rgba(60, 60, 60, 0.4)')
                        .linkDirectionalArrowLength(4)
                        .linkDirectionalArrowRelPos(1)
                        .linkWidth(1);
                });
                return div;
            },
            'bubble-chart': function (block) {
                // build.py emits {nodes:[{name,size}]}. Renders a D3 circle-pack
                // SVG (same shape as the obren.io reference, just inline).
                const wrap = document.createElement('div');
                wrap.className = 'bubble-chart';
                const payload = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.d3) return;
                    const diameter = 480;
                    const fill = '#c0deed';
                    const textColor = '#111111';
                    const fontSize = 12;

                    const svg = window.d3.select(wrap).append('svg')
                        .attr('viewBox', '0 0 ' + diameter + ' ' + diameter)
                        .attr('width', diameter)
                        .attr('height', diameter);

                    const root = window.d3.hierarchy({children: payload.nodes})
                        .sum(d => d.size || 0)
                        .sort((a, b) => b.value - a.value);

                    window.d3.pack().size([diameter, diameter]).padding(2)(root);

                    const node = svg.selectAll('g')
                        .data(root.leaves())
                        .enter().append('g')
                        .attr('transform', d => 'translate(' + d.x + ',' + d.y + ')');

                    node.append('title').text(d => d.data.name + ': ' + d.value);
                    node.append('circle').attr('r', d => d.r).style('fill', fill);
                    node.append('text')
                        .attr('dy', '.3em')
                        .style('text-anchor', 'middle')
                        .style('fill', textColor)
                        .style('font-size', fontSize + 'px')
                        .text(d => d.data.name.substring(0, Math.max(0, Math.floor(d.r / 3))));
                });
                return wrap;
            }
        };

        // Render one modality's blocks into a host element. Mermaid runs
        // scoped to just the nodes created here, so lazily rendered tabs get
        // their diagrams on first activation.
        let mermaidInitialized = false;
        function renderBlocksInto(blocks, host) {
            const mermaidNodes = [];
            blocks.forEach(function (block) {
                const r = renderers[block.type];
                if (!r) {
                    const pre = document.createElement('pre');
                    pre.textContent = '[unknown block type: ' + block.type + ']';
                    host.appendChild(pre);
                    return;
                }
                const node = r(block);
                if (node instanceof Node) {
                    host.appendChild(node);
                    if (block.type === 'mermaid') mermaidNodes.push(node);
                }
            });
            if (mermaidNodes.length && window.mermaid) {
                if (!mermaidInitialized) {
                    window.mermaid.initialize({startOnLoad: false, theme: 'default'});
                    mermaidInitialized = true;
                }
                window.mermaid.run({nodes: mermaidNodes});
            }
        }

        // Modality tabs. One <article class="pane"> per modality; panes are
        // rendered lazily on first activation (force-graph / D3 / mermaid
        // need a visible, measurable container). With a single modality the
        // tab bar stays hidden and the page looks exactly like before.
        const mods = data.modalities;
        const tabBar = document.getElementById('modality-tabs');
        const panes = {};
        const tabButtons = {};
        const renderedPanes = {};

        mods.forEach(function (m) {
            const pane = document.createElement('article');
            pane.className = 'pane';
            pane.dataset.key = m.key;
            pane.hidden = true;
            root.appendChild(pane);
            panes[m.key] = pane;
        });

        const defaultKey = mods.some(m => m.key === 'index') ? 'index' : mods[0].key;

        function activate(key, updateHash) {
            mods.forEach(function (m) {
                const isActive = m.key === key;
                panes[m.key].hidden = !isActive;
                if (tabButtons[m.key]) {
                    tabButtons[m.key].classList.toggle('active', isActive);
                    tabButtons[m.key].setAttribute('aria-selected', isActive ? 'true' : 'false');
                }
            });
            // Unhide first, then render: the chart libraries measure widths.
            if (!renderedPanes[key]) {
                renderBlocksInto(mods.find(m => m.key === key).blocks, panes[key]);
                renderedPanes[key] = true;
            }
            if (updateHash) {
                history.replaceState(null, '',
                    key === defaultKey ? location.pathname + location.search : '#' + key);
            }
        }

        if (mods.length > 1) {
            mods.forEach(function (m) {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.textContent = m.label;
                btn.setAttribute('role', 'tab');
                btn.addEventListener('click', function () { activate(m.key, true); });
                tabBar.appendChild(btn);
                tabButtons[m.key] = btn;
            });
            tabBar.hidden = false;
        }

        // The hash selects a tab only when it matches a modality key, so
        // existing anchors keep working.
        const initialHash = location.hash.slice(1);
        activate(mods.some(m => m.key === initialHash) ? initialHash : defaultKey, false);
        window.addEventListener('hashchange', function () {
            const k = location.hash.slice(1);
            if (mods.some(m => m.key === k)) activate(k, false);
        });
    })();
</script>
</body>
</html>
