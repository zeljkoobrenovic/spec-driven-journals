<script id="data" type="application/json">{"meta": {"id": "ORG-PRIN-STANDARDIZE-BEFORE-DIVERGING", "status": "draft:gray", "title": "Design Principle: Standardize Before Diverging", "date": "2026-05-16", "author": "Organization Tech Strategy", "permalink": "standardize-before-diverging", "timetoread": "12 min", "excerpt": "Adopt a default before allowing variation. Organization's backend on .NET, compute on ECS Fargate, messaging on MSK, cloud on AWS, and AI tooling on Claude Code are all defaults. Teams may diverge from a default by ADR, but they may not diverge by accident. The principle protects the cost compounding of a shared platform: a golden path is only valuable if most teams are on it. Variation has to earn its keep, not be granted by silence.", "tags": "design, standardization, golden-path, exceptions, governance", "logo": "assets/images/standardize-before-diverging/logo.jpeg", "logo_credit": "Inspired by Organization's tech-decisions log and AI strategy", "icon": "assets/icons/standardize-before-diverging.png"}, "tags": ["design", "standardization", "golden-path", "exceptions", "governance"], "blocks": [{"type": "markdown", "content": "> **Status**: DRAFT\n>\n> **Principle**: Organization picks defaults and stays on them until there is a written, owned reason to diverge. A team may propose an exception by ADR, name the costs, and accept the responsibility for the divergence. Silence is not a license. The platform's value compounds only when most teams use the default; exceptions are a managed minority, not a parallel norm.\n\n## Statement\n\nFor every shared technology decision, Organization:\n\n1. Picks a single default.\n2. Documents the default as the expected choice.\n3. Makes the default the easiest path - tooling, examples, support, hiring, training.\n4. Permits divergence only through a documented exception.\n5. Reviews exceptions on a schedule.\n\nThe principle applies to programming languages, runtimes, container bases, cloud provider, messaging, AI tooling, observability, repository conventions, and any other choice where shared compounding matters more than local optimisation.\n\n## How to Read This Principle\n\n| What it says | What it does **not** say |\n| --- | --- |\n| There is a default. | The default fits every case. |\n| Divergence requires an ADR. | Divergence is forbidden. |\n| Defaults should be easy. | Non-defaults should be impossible. |\n| Exceptions get reviewed. | Exceptions are temporary by definition. |\n| The platform compounds on the default. | The platform must do everything. |\n\nThe principle does not mean uniformity at any cost. It means *deliberate* divergence by *named* owners with *known* trade-offs.\n\n## How to Apply This Principle\n\nUse this principle to:\n\n* Explain why defaults compound platform value.\n* Distinguish deliberate divergence from accidental variation.\n* Write or review an exception ADR that names local benefit and global cost.\n* Recognise when a default is failing because it is not the easiest path.\n\n## Rationale\n\nA shared engineering platform pays off through repetition. Every team that adopts the default reduces the marginal cost of:\n\n* Adding observability.\n* Adding security defaults.\n* Onboarding new engineers.\n* Sharing patterns and golden templates.\n* Operating systems on-call.\n* Applying AI tooling like Claude Code with shared CLAUDE.md context.\n\nVariation, by contrast, taxes the platform. Each new runtime, base image, cloud provider, broker, or convention duplicates work that the default already does. The platform either supports the variant - which makes it weaker - or doesn't support it - which leaves the team alone with the consequences.\n\nOrganization's strategic decisions are a long list of defaults. Backend on .NET. Compute on ECS Fargate. Container base on Ubuntu. Messaging on MSK. Cloud on AWS. AI tooling on Claude Code. AVIV Group as the inherited starting point for web, mobile, and AWS foundation tooling. This principle is the meta-decision behind those choices.\n\n## Implications\n\n* **Defaults are written down.** Every shared choice has a record stating what it is, who owns it, and how to depart from it.\n* **Divergence is by ADR.** A team that wants to diverge writes an ADR, names the alternative, the cost, the owner, and the revisit trigger.\n* **Defaults are made cheap.** Templates, golden paths, CI defaults, and Skills target the default. Friction lives on the divergence path, not the default path.\n* **Exceptions are reviewed periodically.** Exceptions that have not been used or have stopped being justified should be retired.\n* **A default that is not the easy path is not a default.** If most teams ignore it, the principle is failing.\n* **A default that is mandatory has stopped being a principle and become an edict.** Edicts produce malicious compliance.\n\n## Exception Test\n\nA divergence proposal should answer these questions before work starts:\n\n* Which default is being diverged from?\n* What requirement is not met by improving or using the default?\n* What local benefit does the divergence create?\n* What global cost does it add to hiring, support, operations, AI context, security, or platform tooling?\n* Which team owns the divergence and its lifecycle?\n* What evidence would cause the team to return to the default?\n* When will the exception be reviewed?\n\nThe test is not meant to block every exception. It ensures exceptions are deliberate enough that the organisation can learn from them instead of accumulating accidental variety.\n\n## What This Means for Teams\n\nFor service teams:\n\n* If a default exists for what you need, use it. Even if a different choice would be marginally better in isolation.\n* If you need to diverge, write the ADR before you start, not after.\n* Treat your divergence as a cost your team owns: tooling gaps, hiring constraints, lack of golden paths.\n\nFor platform and architecture roles:\n\n* Maintain the list of defaults publicly.\n* Invest in making the default the easy path: templates, Skills, sane defaults, observability, security.\n* Run periodic exception reviews.\n\nFor tech leads:\n\n* Before proposing a new technology, ask whether the default can be improved to cover the case.\n* When mentoring teams, prefer the default unless there is a real reason not to.\n* Bring divergence proposals to the Architecture Advisory Forum early.\n\n## Anti-Patterns\n\n* **Best-tool-for-the-job per team.** Every team chooses its own runtime, broker, and database, justified locally and expensive globally.\n* **Default by silence.** A default exists in slides but not in tooling; teams quietly diverge because no path supports the default.\n* **Default by edict.** A default is enforced bureaucratically without ever being made the easy path.\n* **Exception drift.** Exceptions accumulate, are never reviewed, and gradually outnumber default usage.\n* **Standard-then-shadow.** A team officially adopts the default but maintains a parallel non-default system \"for now\".\n* **Single-team standard.** A standard set by one team for everyone else, without consultation.\n* **Greenfield exemption.** New work is allowed to diverge because \"it's new\"; old work keeps the default.\n\n## Examples\n\nAligned with the principle:\n\n* New backend service starts on .NET, ECS Fargate, Ubuntu base, MSK for messaging - no ADR needed.\n* A team needing a small TypeScript BFF writes a short ADR explaining the narrow scope, with .NET still the default for new core services.\n* Claude Code is the default AI coding tool; Codex or Gemini use is allowed by exception with a recorded rationale.\n* AVIV Group's web Golden Path is the starting point; divergence is recorded and owned.\n\nOut of alignment with the principle:\n\n* A team adopts a new runtime \"just for this service\" without an ADR, and the runtime spreads.\n* A new database engine is introduced because a vendor demo was compelling, with no review of how it compares to the default.\n* The default is documented but the only golden template ships for a different runtime.\n* Exceptions are granted in Slack threads with no recording.\n\n## Discussion Prompts\n\nUse these prompts in exception reviews:\n\n* Is the default genuinely insufficient, or is it merely less familiar?\n* What global cost does this local optimisation create?\n* What would make the exception unnecessary in six months?\n\n## Related Principles\n\n* [Design Principle: Small (and Not Too Small) and Simple (and Not Too Simple)](small-and-simple.html) - a small palette of defaults is itself a form of simplicity.\n* [Organisation Principle: Inherit, Then Simplify](inherit-then-simplify.html) - inherited defaults are honoured until simplified, not abandoned.\n* [Organisation Principle: Tooling Decisions Are Explicit and Reversible](tooling-explicit-and-reversible.html) - tooling defaults are deliberately chosen and revisited on a cadence.\n* [Practice Principle: Governance as Code](governance-as-code.html) - defaults are reinforced through executable golden paths.\n\n## Scope and Revisiting\n\nThis principle applies to all shared technology choices: language, runtime, cloud, messaging, observability, AI tooling, repository structure, and similar.\n\nIt does not apply to choices that are local to one component and do not affect other teams (for example, a library used only within one service that has no operational footprint outside it).\n\nThe principle should be revisited if:\n\n* The defaults stop reflecting where Organization actually invests.\n* The exception process becomes a bottleneck or a rubber stamp.\n* A major shift in the AVIV Group relationship changes what \"inherited\" means.\n\n## Authoritative References\n\n* Mike Amundsen, [Paved Roads vs Guard Rails](https://www.thoughtworks.com/insights/blog/microservices/paved-roads-vs-guard-rails).\n* Spotify Engineering, [Paved Path for Backend Services](https://engineering.atspotify.com/).\n* Charity Majors, [Paved Roads](https://charity.wtf/).\n* Organization, AI Tooling Decision: Claude Code as Default ([AI Developer Tooling: Claude Code as the Default Agent Platform for 2026](../ai-decisions-log/ai-tooling.html)).\n"}]}</script>
<script>
    (function () {
        const data = JSON.parse(document.getElementById('data').textContent);
        const root = document.getElementById('content');

        const postId = (data.meta && data.meta.id) ? String(data.meta.id) : '';
        const postStatusRaw = (data.meta && data.meta.status) ? String(data.meta.status) : '';
        if (postId || postStatusRaw) {
            const header = document.getElementById('post-header');
            let sectionEl = header.querySelector('p.section');
            if (!sectionEl) {
                sectionEl = document.createElement('p');
                sectionEl.className = 'section';
                header.insertBefore(sectionEl, header.firstChild);
            }
            // Status pill goes first, then a " / " separator before the existing
            // content (section name and/or id).
            if (postStatusRaw) {
                const parts = postStatusRaw.split(':');
                const statusName = parts[0].trim();
                const statusColor = (parts[1] || '').trim();
                const wrap = document.createElement('span');
                wrap.className = 'post-status';
                const dot = document.createElement('span');
                dot.className = 'status-dot';
                if (statusColor) dot.style.background = statusColor;
                wrap.appendChild(dot);
                wrap.appendChild(document.createTextNode(statusName));
                if (sectionEl.firstChild) {
                    sectionEl.insertBefore(document.createTextNode(' • '), sectionEl.firstChild);
                    sectionEl.insertBefore(wrap, sectionEl.firstChild);
                } else {
                    sectionEl.appendChild(wrap);
                }
            }
            if (postId) {
                if (sectionEl.firstChild) sectionEl.appendChild(document.createTextNode(' • '));
                sectionEl.appendChild(document.createTextNode(postId));
            }
        }

        const tagsHost = document.getElementById('tags');
        (data.tags || []).forEach(function (t) {
            const span = document.createElement('span');
            span.className = 'tag';
            span.textContent = t;
            tagsHost.appendChild(span);
        });

        // Minimal markdown renderer. Supports: ATX headings, paragraphs, blockquotes,
        // unordered/ordered lists, fenced code, inline code, bold/italic/strikethrough, links, images, hr.
        // Sufficient for the posts in this repo; replace with a fuller parser if needed.
        function renderMarkdown(src) {
            const lines = src.replace(/\r\n/g, '\n').split('\n');
            const out = [];
            let i = 0;

            const bullet = /^(\s*)([-*])\s+(.*)$/;
            const ordered = /^(\s*)(\d+)\.\s+(.*)$/;
            const tableRow = /^\s*\|(.+)\|\s*$/;
            const tableSep = /^\s*\|?\s*:?-{3,}:?\s*(\|\s*:?-{3,}:?\s*)+\|?\s*$/;

            function splitRow(s) {
                let t = s.trim();
                if (t.startsWith('|')) t = t.slice(1);
                if (t.endsWith('|')) t = t.slice(0, -1);
                return t.split('|').map(c => c.trim());
            }

            function inline(s) {
                // Posts are trusted content, so raw HTML passes through unescaped
                // (some posts embed inline <blockquote>, <div>, etc.).
                // Stray ampersands still get fixed up.
                s = s.replace(/&(?![a-zA-Z]+;|#\d+;)/g, '&amp;');
                s = s.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img alt="$1" src="$2">');
                s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
                s = s.replace(/`([^`]+)`/g, function (_, c) {
                    return '<code>' + c.replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</code>';
                });
                s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
                s = s.replace(/~~([^~\n]+)~~/g, '<del>$1</del>');
                s = s.replace(/(^|[^*])\*([^*\n]+)\*/g, '$1<em>$2</em>');
                return s;
            }

            while (i < lines.length) {
                const line = lines[i];
                if (!line.trim()) {
                    i++;
                    continue;
                }

                const fence = line.match(/^```(\w*)\s*$/);
                if (fence) {
                    i++;
                    const buf = [];
                    while (i < lines.length && !/^```\s*$/.test(lines[i])) {
                        buf.push(lines[i]);
                        i++;
                    }
                    i++;
                    const escaped = buf.join('\n').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                    const cls = fence[1] ? ' class="lang-' + fence[1] + '"' : '';
                    out.push('<pre><code' + cls + '>' + escaped + '</code></pre>');
                    continue;
                }

                const h = line.match(/^(#{1,6})\s+(.*)$/);
                if (h) {
                    out.push('<h' + h[1].length + '>' + inline(h[2]) + '</h' + h[1].length + '>');
                    i++;
                    continue;
                }

                if (/^\s*(?:-\s*){3,}\s*$/.test(line) || /^\s*\*{3,}\s*$/.test(line)) {
                    out.push('<hr>');
                    i++;
                    continue;
                }

                if (/^>\s?/.test(line)) {
                    const buf = [];
                    while (i < lines.length && /^>\s?/.test(lines[i])) {
                        buf.push(lines[i].replace(/^>\s?/, ''));
                        i++;
                    }
                    out.push('<blockquote>' + renderMarkdown(buf.join('\n')) + '</blockquote>');
                    continue;
                }

                if (tableRow.test(line) && i + 1 < lines.length && tableSep.test(lines[i + 1])) {
                    const headers = splitRow(line);
                    i += 2;
                    const rows = [];
                    while (i < lines.length && tableRow.test(lines[i])) {
                        rows.push(splitRow(lines[i]));
                        i++;
                    }
                    let html = '<table><thead><tr>';
                    headers.forEach(h => {
                        html += '<th>' + inline(h) + '</th>';
                    });
                    html += '</tr></thead><tbody>';
                    rows.forEach(r => {
                        html += '<tr>';
                        r.forEach(c => {
                            html += '<td>' + inline(c) + '</td>';
                        });
                        html += '</tr>';
                    });
                    html += '</tbody></table>';
                    out.push(html);
                    continue;
                }

                if (bullet.test(line) || ordered.test(line)) {
                    // Indent of the first bullet defines this list's base level.
                    // Deeper-indented bullets become nested lists (rendered by
                    // recursing into renderMarkdown). Same-or-less indent at a
                    // bullet starts a sibling item (or ends the list).
                    const firstMatch = line.match(bullet) || line.match(ordered);
                    const baseIndent = firstMatch[1].length;
                    const isOrdered = ordered.test(line);
                    const items = [];
                    while (i < lines.length) {
                        const cur = lines[i];
                        if (!cur.trim()) {
                            // blank line breaks the list (matches CommonMark-ish behaviour)
                            i++;
                            break;
                        }
                        const mBul = cur.match(bullet);
                        const mOrd = cur.match(ordered);
                        const m = mBul || mOrd;
                        if (!m) break;
                        if (m[1].length < baseIndent) break;
                        if (m[1].length > baseIndent) break; // shouldn't happen at top of loop
                        // Same-type check: switching between -/* and 1. closes the list
                        if (isOrdered !== !!mOrd) break;

                        const itemBuf = [m[3]];
                        const nestedBuf = [];
                        i++;
                        while (i < lines.length) {
                            const nxt = lines[i];
                            if (!nxt.trim()) break;
                            const nBul = nxt.match(bullet);
                            const nOrd = nxt.match(ordered);
                            const nm = nBul || nOrd;
                            if (nm) {
                                if (nm[1].length > baseIndent) {
                                    // nested list line — dedent and stash
                                    nestedBuf.push(nxt.slice(baseIndent + 2));
                                    i++;
                                    continue;
                                }
                                // sibling or end of list
                                break;
                            }
                            // Plain continuation text
                            if (nestedBuf.length) {
                                // continuation inside the nested block
                                nestedBuf.push(nxt.slice(baseIndent + 2));
                            } else {
                                itemBuf.push(nxt.trim());
                            }
                            i++;
                        }

                        let liHtml = inline(itemBuf.join('\n'));
                        if (nestedBuf.length) {
                            liHtml += renderMarkdown(nestedBuf.join('\n'));
                        }
                        items.push('<li>' + liHtml + '</li>');
                    }
                    out.push((isOrdered ? '<ol>' : '<ul>') + items.join('') + (isOrdered ? '</ol>' : '</ul>'));
                    continue;
                }

                const buf = [line];
                i++;
                while (i < lines.length && lines[i].trim() && !/^#{1,6}\s/.test(lines[i]) && !/^>\s?/.test(lines[i]) && !bullet.test(lines[i]) && !ordered.test(lines[i]) && !/^```/.test(lines[i]) && !tableRow.test(lines[i])) {
                    buf.push(lines[i]);
                    i++;
                }
                out.push('<p>' + inline(buf.join(' ')) + '</p>');
            }
            return out.join('\n');
        }

        // Block dispatcher. New block types plug in here.
        const renderers = {
            markdown: function (block) {
                const div = document.createElement('div');
                div.innerHTML = renderMarkdown(block.content);
                return div;
            },
            mermaid: function (block) {
                // Mermaid scans elements with class "mermaid" whose textContent
                // is the diagram source. We collect these nodes and run
                // mermaid.run() once after all blocks are in the DOM.
                const div = document.createElement('div');
                div.className = 'mermaid';
                div.textContent = block.content;
                return div;
            },
            'force-graph': function (block) {
                // build.py emits parsed JSON: {nodes:[{id,size}], links:[{source,target}]}.
                // We instantiate force-graph after the container is in the DOM
                // so it can measure its own width.
                const div = document.createElement('div');
                div.className = 'force-graph';
                const data = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.ForceGraph) return;
                    const maxSize = data.nodes.reduce((m, n) => Math.max(m, n.size || 1), 1);
                    window.ForceGraph()(div)
                        .graphData(data)
                        .width(div.clientWidth)
                        .height(div.clientHeight)
                        .nodeRelSize(4)
                        .nodeVal(n => Math.max(20 * (n.size || 1) / maxSize, 0.001))
                        .nodeLabel(n => n.id + ' (' + (n.size || 1) + ')')
                        .nodeColor(() => 'rgba(135, 206, 235, 0.7)')
                        .linkColor(() => 'rgba(60, 60, 60, 0.4)')
                        .linkDirectionalArrowLength(4)
                        .linkDirectionalArrowRelPos(1)
                        .linkWidth(1);
                });
                return div;
            },
            'bubble-chart': function (block) {
                // build.py emits {nodes:[{name,size}]}. Renders a D3 circle-pack
                // SVG (same shape as the obren.io reference, just inline).
                const wrap = document.createElement('div');
                wrap.className = 'bubble-chart';
                const payload = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.d3) return;
                    const diameter = 480;
                    const fill = '#c0deed';
                    const textColor = '#111111';
                    const fontSize = 12;

                    const svg = window.d3.select(wrap).append('svg')
                        .attr('viewBox', '0 0 ' + diameter + ' ' + diameter)
                        .attr('width', diameter)
                        .attr('height', diameter);

                    const root = window.d3.hierarchy({children: payload.nodes})
                        .sum(d => d.size || 0)
                        .sort((a, b) => b.value - a.value);

                    window.d3.pack().size([diameter, diameter]).padding(2)(root);

                    const node = svg.selectAll('g')
                        .data(root.leaves())
                        .enter().append('g')
                        .attr('transform', d => 'translate(' + d.x + ',' + d.y + ')');

                    node.append('title').text(d => d.data.name + ': ' + d.value);
                    node.append('circle').attr('r', d => d.r).style('fill', fill);
                    node.append('text')
                        .attr('dy', '.3em')
                        .style('text-anchor', 'middle')
                        .style('fill', textColor)
                        .style('font-size', fontSize + 'px')
                        .text(d => d.data.name.substring(0, Math.max(0, Math.floor(d.r / 3))));
                });
                return wrap;
            }
        };

        const mermaidNodes = [];
        data.blocks.forEach(function (block) {
            const r = renderers[block.type];
            if (!r) {
                const pre = document.createElement('pre');
                pre.textContent = '[unknown block type: ' + block.type + ']';
                root.appendChild(pre);
                return;
            }
            const node = r(block);
            if (node instanceof Node) {
                root.appendChild(node);
                if (block.type === 'mermaid') mermaidNodes.push(node);
            }
        });

        if (mermaidNodes.length && window.mermaid) {
            window.mermaid.initialize({startOnLoad: false, theme: 'default'});
            window.mermaid.run({nodes: mermaidNodes});
        }
    })();
</script>
</body>
</html>
