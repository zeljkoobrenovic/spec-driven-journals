<script id="data" type="application/json">{"meta": {"id": "ORG-SD-WEB-START", "status": "draft:gray", "title": "Web Tech Stack: Start from AVIV Group's Golden Path, Own the Fork", "date": "2026-05-15", "author": "Organization Tech Strategy", "permalink": "web-tech-stack", "timetoread": "6 min", "excerpt": "Organization will use AVIV Group's current Web Golden Path as the starting point for its web stack: React, TypeScript, the Gemini Design System, and Unified Frontend. Organization will take its own source copies of Gemini and Unified Frontend and operate them as Organization-owned platforms. This gives Organization a fast, compatible start for inherited web assets while preserving the right to diverge from AVIV's future roadmap.", "tags": "frontend, web", "logo": "assets/images/web-tech-stack/logo.jpeg", "logo_credit": "Image generated by Google Gemini (gemini-3-pro-image-preview)", "icon": "assets/icons/web-tech-stack.png"}, "tags": ["frontend", "web"], "modalities": [{"key": "index", "label": "Article", "meta": {}, "blocks": [{"type": "markdown", "content": "> **Status**: DRAFT\n>\n> **Decision**: Organization will use AVIV Group's current Web Golden Path as the baseline for web work: React, TypeScript, Gemini Design System, and Unified Frontend. Organization will copy the Gemini Design System and Unified Frontend source code and operate those copies as Organization-owned platforms from day one. Alignment with AVIV is a starting point, not a standing commitment.\n\n## Decision\n\nAdopt **AVIV Group's current Web Golden Path** as the starting point for Organization web delivery:\n\n* React is the default UI framework.\n* TypeScript is the default implementation language.\n* Gemini Design System is the starting component and design foundation.\n* Unified Frontend is the starting platform for micro-frontend composition and routing.\n* Organization owns source copies of Gemini and Unified Frontend.\n* Future AVIV web stack changes require an explicit Organization decision. They do not flow automatically into Organization platforms.\n\nThis is an **own-the-fork decision**. Organization starts from AVIV assets to move quickly, but local ownership protects Organization from being blocked by another roadmap.\n\n## How to Use This Decision\n\nUse this ADR before starting or reshaping web work:\n\n| Question | Default answer |\n| --- | --- |\n| Is this new or inherited Organization web work? | Start from React, TypeScript, Gemini, and Unified Frontend. |\n| Is the work about shared components or composition? | Improve the Organization-owned Gemini or Unified Frontend copies rather than creating local one-offs. |\n| Is the proposal to replace React, TypeScript, Gemini, or Unified Frontend? | Treat it as an exception requiring an explicit decision. |\n| Is AVIV changing its Web Golden Path? | Review deliberately; do not auto-adopt. |\n\nThe decision is meant to stop immediate re-platforming debates while the inherited web estate is being absorbed. It does not freeze Organization's web architecture forever.\n\n## Why This Default\n\nThe inherited White Label components already use AVIV's Web Golden Path. Rebuilding that foundation before Organization can operate and evolve it would create avoidable cost and delay.\n\nReact and TypeScript are mainstream, well-supported choices. Gemini and Unified Frontend are more specific assets: they are valuable because they carry existing design, composition, tooling, and community knowledge. Their value depends on Organization treating them as owned internal products rather than passive copied code.\n\n## Ownership Boundary\n\n| Area | Organization responsibility |\n| --- | --- |\n| Gemini copy | Component quality, accessibility, brand fit, releases, documentation, contribution rules, and migration support. |\n| Unified Frontend copy | Routing, composition, runtime dependencies, platform compatibility, monitoring, releases, and support. |\n| Product teams | Use the shared stack by default and feed reusable improvements back into the owned platform copies. |\n| AVIV alignment | Review upstream fixes and changes deliberately; port only when useful for Organization. |\n| Divergence | Record reason, owner, expected maintenance cost, and migration impact. |\n\nThe fork is not a license for uncontrolled local variation. The point is to create a clear Organization platform boundary.\n\n## Consequences\n\n### Positive\n\n* Inherited web assets can be used and extended without immediate re-platforming.\n* Teams start from mainstream React and TypeScript foundations.\n* Organization can reuse AVIV patterns, documentation, examples, and engineering knowledge while building local ownership.\n* Product teams can prioritize Organization-specific needs without waiting for every AVIV platform decision.\n* A shared design system and composition model reduce avoidable variation across web surfaces.\n\n### Negative\n\n* Organization inherits the technical debt, assumptions, bugs, and constraints present in Gemini and Unified Frontend at copy time.\n* Maintaining copied platform assets requires staffing, release discipline, documentation, dependency upgrades, browser compatibility work, and support.\n* AVIV fixes and features do not arrive automatically.\n* Over time, AVIV examples and Organization copies may diverge, reducing the value of shared knowledge.\n* Teams may be tempted to bypass the shared copies with local component or composition variants unless ownership is active.\n\n## What This Means for Teams\n\n* Use React and TypeScript for new Organization web work by default.\n* Treat Gemini and Unified Frontend as Organization internal platforms with owners, backlogs, releases, and support expectations.\n* Prefer improving shared platform assets over creating one-off team variants.\n* Review AVIV security and dependency updates deliberately; neither ignore them nor pull them blindly.\n* Make divergence visible with reason, owner, expected maintenance cost, and review trigger.\n* Keep accessibility, design consistency, browser support, and runtime observability as platform responsibilities, not afterthoughts.\n\n## Exception Criteria\n\nA proposal to diverge from the web baseline should explain:\n\n* the user, product, or engineering problem that the current baseline cannot solve well;\n* whether the issue is caused by React, TypeScript, Gemini, Unified Frontend, inherited design, or local implementation quality;\n* the migration impact on inherited White Label components and active product teams;\n* who will own the new capability, support it, and upgrade it over time;\n* whether the change reduces total complexity or only moves complexity into another layer;\n* how success will be measured and when the exception will be revisited.\n\n## Considered Options\n\n| Option | Assessment |\n| --- | --- |\n| **Adopt AVIV's Web Golden Path and own source copies** | Chosen. Fastest path to use inherited assets while preserving Organization autonomy. |\n| **Build an independent Organization stack immediately** | Maximizes autonomy, but discards useful inherited platform work and delays delivery. |\n| **Partial adoption** | Can be useful later, but risks an unclear platform model if used as the initial stance. |\n| **Follow AVIV automatically** | Reduces local decisions, but makes Organization dependent on another roadmap. Rejected. |\n\n## Scope and Revisiting\n\nIn scope:\n\n* inherited Organization web assets;\n* React and TypeScript as the default web implementation baseline;\n* Organization-owned Gemini and Unified Frontend copies;\n* deliberate divergence from AVIV's future Web Golden Path.\n\nOut of scope:\n\n* native mobile stack decisions, covered by [Mobile Tech Stack: Start from AVIV Group's Native Baseline, Own the Apps](mobile-tech-stack.html);\n* backend service stack decisions, covered by [Backend Services Platform: Standardize on .NET with C#](backend-tech-stack-framework.html);\n* detailed web application architecture, state management, testing, and release runbooks.\n\nRevisit this decision if:\n\n* maintaining the Organization-owned copies becomes disproportionate;\n* divergence from AVIV materially reduces productivity;\n* Organization product strategy requires capabilities the inherited stack cannot support without significant rework;\n* AVIV makes a major web stack change that Organization may want to adopt or reject explicitly.\n\n## Authoritative References\n\n* [React documentation](https://react.dev/learn).\n* [TypeScript documentation](https://www.typescriptlang.org/docs/).\n\n## Appendix: Vocabulary\n\n\n\n| Term | Meaning in this ADR |\n| --- | --- |\n| **Web Golden Path** | AVIV Group's current default web stack and platform model. |\n| **React** | The default UI framework for Organization web work. |\n| **TypeScript** | The default implementation language for Organization web work. |\n| **Gemini Design System** | The inherited design-system foundation that Organization will operate as its own platform copy. |\n| **Unified Frontend** | The inherited micro-frontend composition and routing platform that Organization will operate as its own platform copy. |\n| **Own the fork** | Copy source into Organization ownership, then decide deliberately what to port, change, or discard. |\n| **Divergence** | A deliberate Organization change that makes its web platform differ from AVIV's future direction. |\n"}]}]}</script>
<script>
    (function () {
        const data = JSON.parse(document.getElementById('data').textContent);
        const root = document.getElementById('content');

        const postId = (data.meta && data.meta.id) ? String(data.meta.id) : '';
        const postStatusRaw = (data.meta && data.meta.status) ? String(data.meta.status) : '';
        if (postId || postStatusRaw) {
            const header = document.getElementById('post-header');
            let sectionEl = header.querySelector('p.section');
            if (!sectionEl) {
                sectionEl = document.createElement('p');
                sectionEl.className = 'section';
                header.insertBefore(sectionEl, header.firstChild);
            }
            // Status pill goes first, then a " / " separator before the existing
            // content (section name and/or id).
            if (postStatusRaw) {
                const parts = postStatusRaw.split(':');
                const statusName = parts[0].trim();
                const statusColor = (parts[1] || '').trim();
                const wrap = document.createElement('span');
                wrap.className = 'post-status';
                const dot = document.createElement('span');
                dot.className = 'status-dot';
                if (statusColor) dot.style.background = statusColor;
                wrap.appendChild(dot);
                wrap.appendChild(document.createTextNode(statusName));
                if (sectionEl.firstChild) {
                    sectionEl.insertBefore(document.createTextNode(' • '), sectionEl.firstChild);
                    sectionEl.insertBefore(wrap, sectionEl.firstChild);
                } else {
                    sectionEl.appendChild(wrap);
                }
            }
            if (postId) {
                if (sectionEl.firstChild) sectionEl.appendChild(document.createTextNode(' • '));
                sectionEl.appendChild(document.createTextNode(postId));
            }
        }

        const tagsHost = document.getElementById('tags');
        (data.tags || []).forEach(function (t) {
            const span = document.createElement('span');
            span.className = 'tag';
            span.textContent = t;
            tagsHost.appendChild(span);
        });

        // Minimal markdown renderer. Supports: ATX headings, paragraphs, blockquotes,
        // unordered/ordered lists, fenced code, inline code, bold/italic/strikethrough, links, images, hr.
        // Sufficient for the posts in this repo; replace with a fuller parser if needed.
        function renderMarkdown(src) {
            const lines = src.replace(/\r\n/g, '\n').split('\n');
            const out = [];
            let i = 0;

            const bullet = /^(\s*)([-*])\s+(.*)$/;
            const ordered = /^(\s*)(\d+)\.\s+(.*)$/;
            const tableRow = /^\s*\|(.+)\|\s*$/;
            const tableSep = /^\s*\|?\s*:?-{3,}:?\s*(\|\s*:?-{3,}:?\s*)+\|?\s*$/;

            function splitRow(s) {
                let t = s.trim();
                if (t.startsWith('|')) t = t.slice(1);
                if (t.endsWith('|')) t = t.slice(0, -1);
                return t.split('|').map(c => c.trim());
            }

            function inline(s) {
                // Posts are trusted content, so raw HTML passes through unescaped
                // (some posts embed inline <blockquote>, <div>, etc.).
                // Stray ampersands still get fixed up.
                s = s.replace(/&(?![a-zA-Z]+;|#\d+;)/g, '&amp;');
                s = s.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<a class="image-link" href="$2" target="_blank" rel="noopener noreferrer"><img alt="$1" src="$2"></a>');
                s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
                s = s.replace(/`([^`]+)`/g, function (_, c) {
                    return '<code>' + c.replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</code>';
                });
                s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
                s = s.replace(/~~([^~\n]+)~~/g, '<del>$1</del>');
                s = s.replace(/(^|[^*])\*([^*\n]+)\*/g, '$1<em>$2</em>');
                return s;
            }

            while (i < lines.length) {
                const line = lines[i];
                if (!line.trim()) {
                    i++;
                    continue;
                }

                const fence = line.match(/^```(\w*)\s*$/);
                if (fence) {
                    i++;
                    const buf = [];
                    while (i < lines.length && !/^```\s*$/.test(lines[i])) {
                        buf.push(lines[i]);
                        i++;
                    }
                    i++;
                    const escaped = buf.join('\n').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                    const cls = fence[1] ? ' class="lang-' + fence[1] + '"' : '';
                    out.push('<pre><code' + cls + '>' + escaped + '</code></pre>');
                    continue;
                }

                const h = line.match(/^(#{1,6})\s+(.*)$/);
                if (h) {
                    out.push('<h' + h[1].length + '>' + inline(h[2]) + '</h' + h[1].length + '>');
                    i++;
                    continue;
                }

                if (/^\s*(?:-\s*){3,}\s*$/.test(line) || /^\s*\*{3,}\s*$/.test(line)) {
                    out.push('<hr>');
                    i++;
                    continue;
                }

                if (/^>\s?/.test(line)) {
                    const buf = [];
                    while (i < lines.length && /^>\s?/.test(lines[i])) {
                        buf.push(lines[i].replace(/^>\s?/, ''));
                        i++;
                    }
                    out.push('<blockquote>' + renderMarkdown(buf.join('\n')) + '</blockquote>');
                    continue;
                }

                if (tableRow.test(line) && i + 1 < lines.length && tableSep.test(lines[i + 1])) {
                    const headers = splitRow(line);
                    i += 2;
                    const rows = [];
                    while (i < lines.length && tableRow.test(lines[i])) {
                        rows.push(splitRow(lines[i]));
                        i++;
                    }
                    let html = '<table><thead><tr>';
                    headers.forEach(h => {
                        html += '<th>' + inline(h) + '</th>';
                    });
                    html += '</tr></thead><tbody>';
                    rows.forEach(r => {
                        html += '<tr>';
                        r.forEach(c => {
                            html += '<td>' + inline(c) + '</td>';
                        });
                        html += '</tr>';
                    });
                    html += '</tbody></table>';
                    out.push(html);
                    continue;
                }

                if (bullet.test(line) || ordered.test(line)) {
                    // Indent of the first bullet defines this list's base level.
                    // Deeper-indented bullets become nested lists (rendered by
                    // recursing into renderMarkdown). Same-or-less indent at a
                    // bullet starts a sibling item (or ends the list).
                    const firstMatch = line.match(bullet) || line.match(ordered);
                    const baseIndent = firstMatch[1].length;
                    const isOrdered = ordered.test(line);
                    const items = [];
                    while (i < lines.length) {
                        const cur = lines[i];
                        if (!cur.trim()) {
                            // blank line breaks the list (matches CommonMark-ish behaviour)
                            i++;
                            break;
                        }
                        const mBul = cur.match(bullet);
                        const mOrd = cur.match(ordered);
                        const m = mBul || mOrd;
                        if (!m) break;
                        if (m[1].length < baseIndent) break;
                        if (m[1].length > baseIndent) break; // shouldn't happen at top of loop
                        // Same-type check: switching between -/* and 1. closes the list
                        if (isOrdered !== !!mOrd) break;

                        const itemBuf = [m[3]];
                        const nestedBuf = [];
                        i++;
                        while (i < lines.length) {
                            const nxt = lines[i];
                            if (!nxt.trim()) break;
                            const nBul = nxt.match(bullet);
                            const nOrd = nxt.match(ordered);
                            const nm = nBul || nOrd;
                            if (nm) {
                                if (nm[1].length > baseIndent) {
                                    // nested list line — dedent and stash
                                    nestedBuf.push(nxt.slice(baseIndent + 2));
                                    i++;
                                    continue;
                                }
                                // sibling or end of list
                                break;
                            }
                            // Plain continuation text
                            if (nestedBuf.length) {
                                // continuation inside the nested block
                                nestedBuf.push(nxt.slice(baseIndent + 2));
                            } else {
                                itemBuf.push(nxt.trim());
                            }
                            i++;
                        }

                        let liHtml = inline(itemBuf.join('\n'));
                        if (nestedBuf.length) {
                            liHtml += renderMarkdown(nestedBuf.join('\n'));
                        }
                        items.push('<li>' + liHtml + '</li>');
                    }
                    out.push((isOrdered ? '<ol>' : '<ul>') + items.join('') + (isOrdered ? '</ol>' : '</ul>'));
                    continue;
                }

                const buf = [line];
                i++;
                while (i < lines.length && lines[i].trim() && !/^#{1,6}\s/.test(lines[i]) && !/^>\s?/.test(lines[i]) && !bullet.test(lines[i]) && !ordered.test(lines[i]) && !/^```/.test(lines[i]) && !tableRow.test(lines[i])) {
                    buf.push(lines[i]);
                    i++;
                }
                out.push('<p>' + inline(buf.join(' ')) + '</p>');
            }
            return out.join('\n');
        }

        // Block dispatcher. New block types plug in here.
        const renderers = {
            markdown: function (block) {
                const div = document.createElement('div');
                div.innerHTML = renderMarkdown(block.content);
                return div;
            },
            mermaid: function (block) {
                // Mermaid scans elements with class "mermaid" whose textContent
                // is the diagram source. We collect these nodes and run
                // mermaid.run() once after all blocks are in the DOM.
                const div = document.createElement('div');
                div.className = 'mermaid';
                div.textContent = block.content;
                return div;
            },
            'force-graph': function (block) {
                // build.py emits parsed JSON: {nodes:[{id,size}], links:[{source,target}]}.
                // We instantiate force-graph after the container is in the DOM
                // so it can measure its own width.
                const div = document.createElement('div');
                div.className = 'force-graph';
                const data = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.ForceGraph) return;
                    const maxSize = data.nodes.reduce((m, n) => Math.max(m, n.size || 1), 1);
                    window.ForceGraph()(div)
                        .graphData(data)
                        .width(div.clientWidth)
                        .height(div.clientHeight)
                        .nodeRelSize(4)
                        .nodeVal(n => Math.max(20 * (n.size || 1) / maxSize, 0.001))
                        .nodeLabel(n => n.id + ' (' + (n.size || 1) + ')')
                        .nodeColor(() => 'rgba(135, 206, 235, 0.7)')
                        .linkColor(() => 'rgba(60, 60, 60, 0.4)')
                        .linkDirectionalArrowLength(4)
                        .linkDirectionalArrowRelPos(1)
                        .linkWidth(1);
                });
                return div;
            },
            'bubble-chart': function (block) {
                // build.py emits {nodes:[{name,size}]}. Renders a D3 circle-pack
                // SVG (same shape as the obren.io reference, just inline).
                const wrap = document.createElement('div');
                wrap.className = 'bubble-chart';
                const payload = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.d3) return;
                    const diameter = 480;
                    const fill = '#c0deed';
                    const textColor = '#111111';
                    const fontSize = 12;

                    const svg = window.d3.select(wrap).append('svg')
                        .attr('viewBox', '0 0 ' + diameter + ' ' + diameter)
                        .attr('width', diameter)
                        .attr('height', diameter);

                    const root = window.d3.hierarchy({children: payload.nodes})
                        .sum(d => d.size || 0)
                        .sort((a, b) => b.value - a.value);

                    window.d3.pack().size([diameter, diameter]).padding(2)(root);

                    const node = svg.selectAll('g')
                        .data(root.leaves())
                        .enter().append('g')
                        .attr('transform', d => 'translate(' + d.x + ',' + d.y + ')');

                    node.append('title').text(d => d.data.name + ': ' + d.value);
                    node.append('circle').attr('r', d => d.r).style('fill', fill);
                    node.append('text')
                        .attr('dy', '.3em')
                        .style('text-anchor', 'middle')
                        .style('fill', textColor)
                        .style('font-size', fontSize + 'px')
                        .text(d => d.data.name.substring(0, Math.max(0, Math.floor(d.r / 3))));
                });
                return wrap;
            }
        };

        // Render one modality's blocks into a host element. Mermaid runs
        // scoped to just the nodes created here, so lazily rendered tabs get
        // their diagrams on first activation.
        let mermaidInitialized = false;
        function renderBlocksInto(blocks, host) {
            const mermaidNodes = [];
            blocks.forEach(function (block) {
                const r = renderers[block.type];
                if (!r) {
                    const pre = document.createElement('pre');
                    pre.textContent = '[unknown block type: ' + block.type + ']';
                    host.appendChild(pre);
                    return;
                }
                const node = r(block);
                if (node instanceof Node) {
                    host.appendChild(node);
                    if (block.type === 'mermaid') mermaidNodes.push(node);
                }
            });
            if (mermaidNodes.length && window.mermaid) {
                if (!mermaidInitialized) {
                    window.mermaid.initialize({startOnLoad: false, theme: 'default'});
                    mermaidInitialized = true;
                }
                window.mermaid.run({nodes: mermaidNodes});
            }
        }

        // Modality tabs. One <article class="pane"> per modality; panes are
        // rendered lazily on first activation (force-graph / D3 / mermaid
        // need a visible, measurable container). With a single modality the
        // tab bar stays hidden and the page looks exactly like before.
        const mods = data.modalities;
        const tabBar = document.getElementById('modality-tabs');
        const panes = {};
        const tabButtons = {};
        const renderedPanes = {};

        mods.forEach(function (m) {
            const pane = document.createElement('article');
            pane.className = 'pane';
            pane.dataset.key = m.key;
            pane.hidden = true;
            root.appendChild(pane);
            panes[m.key] = pane;
        });

        const defaultKey = mods.some(m => m.key === 'index') ? 'index' : mods[0].key;

        function activate(key, updateHash) {
            mods.forEach(function (m) {
                const isActive = m.key === key;
                panes[m.key].hidden = !isActive;
                if (tabButtons[m.key]) {
                    tabButtons[m.key].classList.toggle('active', isActive);
                    tabButtons[m.key].setAttribute('aria-selected', isActive ? 'true' : 'false');
                }
            });
            // Unhide first, then render: the chart libraries measure widths.
            if (!renderedPanes[key]) {
                renderBlocksInto(mods.find(m => m.key === key).blocks, panes[key]);
                renderedPanes[key] = true;
            }
            if (updateHash) {
                history.replaceState(null, '',
                    key === defaultKey ? location.pathname + location.search : '#' + key);
            }
        }

        if (mods.length > 1) {
            mods.forEach(function (m) {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.textContent = m.label;
                btn.setAttribute('role', 'tab');
                btn.addEventListener('click', function () { activate(m.key, true); });
                tabBar.appendChild(btn);
                tabButtons[m.key] = btn;
            });
            tabBar.hidden = false;
        }

        // The hash selects a tab only when it matches a modality key, so
        // existing anchors keep working.
        const initialHash = location.hash.slice(1);
        activate(mods.some(m => m.key === initialHash) ? initialHash : defaultKey, false);
        window.addEventListener('hashchange', function () {
            const k = location.hash.slice(1);
            if (mods.some(m => m.key === k)) activate(k, false);
        });
    })();
</script>
</body>
</html>
