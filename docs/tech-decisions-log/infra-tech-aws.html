<script id="data" type="application/json">{"meta": {"id": "ORG-SD-BACK-AWS", "status": "draft:gray", "title": "Public Cloud: Consolidate on AWS via AVIV Group Contract", "date": "2026-05-15", "author": "Organization Tech Strategy", "permalink": "infra-tech-aws", "timetoread": "8 min", "excerpt": "Organization commits to AWS as its strategic public cloud provider and will consolidate its backend workloads there. Organization will inherit AVIV Group's AWS commercial contract and account configuration, leverage AVIV's scale and procurement for better unit costs, and use AVIV Group's central AWS functions for cross-cutting topics such as procurement, basic FinOps, and AWS relationship management.", "tags": "backend, infra, aws", "icon": "assets/icons/infra-tech-stack-aws.png", "logo": "assets/images/infra-tech-stack-aws/logo.jpeg", "logo_credit": "Image generated by Google Gemini (gemini-3-pro-image-preview)"}, "tags": ["backend", "infra", "aws"], "blocks": [{"type": "markdown", "content": "> **Status**: DRAFT\n>\n> **Decision**: Organization commits to AWS as its strategic public cloud and will consolidate backend workloads there under AVIV Group's AWS commercial contract and account configuration. Organization will use AVIV Group's central AWS functions for generic, non-differentiating topics such as procurement, baseline FinOps, and AWS relationship management. Workload-level engineering, architecture, security posture, and product ownership remain with Organization.\n\n## Decision\n\nAdopt **AWS** as Organization's strategic public cloud provider for backend workloads.\n\nConcretely:\n\n* New and migrated backend workloads default to AWS.\n* Organization uses AVIV Group's AWS commercial contract rather than negotiating an independent master agreement.\n* Organization accounts sit inside AVIV Group's AWS Organization and account structure.\n* AVIV Group central functions own the generic AWS relationship: procurement, commercial negotiation, baseline FinOps, consolidated billing, support relationship, and high-level AWS engagement.\n* Organization owns workload architecture, service-level decisions, security posture inside its accounts, product reliability, and workload-level cost behavior.\n\nThis decision defines the cloud provider and commercial operating model. It does not decide which AWS services every workload should use.\n\n## How to Use This Decision\n\nUse this ADR when a team asks where a backend workload should run or how AWS responsibility is split:\n\n| Question | Default answer |\n| --- | --- |\n| Is this an Organization backend workload? | Run it on AWS unless there is an explicit exception. |\n| Does Organization need its own AWS contract? | No. Use the AVIV Group contract and central commercial functions. |\n| Does AVIV own workload architecture? | No. Organization owns architecture, reliability, security choices, and product outcomes inside its accounts. |\n| Is every AWS service automatically approved? | No. Service choice still needs architecture, security, cost, and operating-model review. |\n| Does a different cloud or multi-cloud pattern fit? | Only with a documented decision and clear ownership model. |\n\nThe decision is meant to stop provider-level fragmentation. It should move discussion from \"which cloud?\" to \"which AWS pattern is appropriate for this workload?\"\n\n## Why This Default\n\nAWS is the pragmatic default because Organization is part of an AVIV Group estate that already has AWS scale, contract terms, central functions, and inherited workloads. Using that structure gives Organization:\n\n* better unit economics than it would likely achieve alone;\n* less procurement and contract overhead;\n* access to group-level AWS support, escalation, and relationship management;\n* a simpler migration path for inherited AWS-aligned workloads;\n* one strategic cloud skill base rather than multiple parallel provider models.\n\nThe decision is not a claim that AWS is best for every possible workload. It is a consolidation decision: one strategic public cloud is easier to govern, staff, secure, and optimize than several.\n\n## Responsibility Boundary\n\n| Area | AVIV Group central AWS functions | Organization |\n| --- | --- | --- |\n| Commercial contract | Own master AWS agreement, group commitments, support tier, and commercial negotiations. | Provide demand forecasts and material workload plans that affect commitments. |\n| Account structure | Provide the organization model, baseline account patterns, and shared guardrails. | Request and use accounts according to workload, environment, and ownership needs. |\n| Baseline FinOps | Provide cost reporting, commitment management, tagging standards, and anomaly detection. | Own workload-level cost drivers, capacity choices, rightsizing, and cost-aware design. |\n| Security guardrails | Provide organization-level controls and shared security tooling. | Own application security, data protection choices, IAM usage, and secure configuration inside accounts. |\n| AWS relationship | Manage group-level AWS relationship, TAM access, and strategic escalations. | Own incident context, workload diagnostics, and product impact assessment. |\n| Service selection | Define group-level restrictions or preferred service patterns where they exist. | Choose concrete AWS services within guardrails and document meaningful risks. |\n\nThis boundary needs active maintenance. Most friction will come from unclear ownership, not from AWS itself.\n\n## Consequences\n\n### Positive\n\n* Organization gets access to AVIV Group scale, negotiated terms, commitment pools, and consolidated billing.\n* Organization avoids staffing a full AWS procurement, contract, and baseline FinOps function.\n* Inherited AVIV-aligned workloads can stay within the same provider and commercial envelope.\n* Consolidating on one cloud reduces skills sprawl and architecture fragmentation.\n* Organization engineering capacity stays focused on workload-level architecture, product features, and reliability.\n\n### Negative\n\n* Organization becomes commercially dependent on AVIV Group's AWS contract and cloud strategy.\n* Provider lock-in to AWS is reinforced.\n* Some negotiation and escalation flows must go through AVIV rather than directly from Organization.\n* Group-level standards for tags, accounts, guardrails, reporting, and baseline controls become inputs to Organization's environment.\n* If AVIV changes its strategic cloud direction later, Organization inherits the re-evaluation question.\n\n## What This Means for Teams\n\n* Start backend workload planning from AWS.\n* Use approved infrastructure-as-code, account, tagging, security, and deployment patterns.\n* Treat cost visibility as an engineering responsibility, not a finance-only responsibility.\n* Review AWS service choices for maturity, operational fit, data handling, security model, cost behavior, quotas, and lock-in.\n* Make exceptions to AWS, group guardrails, or standard account models rare, explicit, owned, and time-bound.\n* Do not assume AVIV central functions own product reliability. They provide shared cloud capabilities; teams own their workloads.\n\n## Exception Criteria\n\nA proposal to use another provider, an independent AWS contract, or a multi-cloud pattern should explain:\n\n* the user, product, regulatory, or engineering need that cannot be met inside the AWS baseline;\n* whether the issue is caused by AWS itself, the AVIV contract model, the account model, missing platform capability, or local implementation quality;\n* migration and integration impact for networking, identity, observability, security, data, and deployment pipelines;\n* who owns procurement, provider relationship, cost management, support, security posture, and incident response;\n* how the workload will meet the same reliability, audit, and security expectations as AWS workloads;\n* when the exception will be revisited.\n\n## Considered Options\n\n| Option | Assessment |\n| --- | --- |\n| **AWS via AVIV Group contract and central functions** | Chosen. Best fit for inherited workloads, commercial leverage, and operating-model simplicity. |\n| **AWS with an independent Organization contract** | More autonomy, but higher overhead and likely weaker unit economics. |\n| **Different primary public cloud** | Possible in theory, but creates migration cost and discards group AWS leverage. |\n| **Multi-cloud from the start** | Reduces provider concentration in theory, but multiplies skills, governance, security, and cost complexity now. |\n\n## Scope and Revisiting\n\nIn scope:\n\n* strategic public cloud provider selection;\n* AVIV Group AWS commercial and central-function model;\n* workload-level ownership boundary;\n* backend workloads, inherited and new.\n\nOut of scope:\n\n* account vending and AWS foundation tooling, covered by [AWS Foundation: Inherit Central AVIV Group Tooling for 6-12 Months](infra-tech-stack-aws-foundation.html);\n* AWS networking, covered by [AWS Networking: Inherit Central AVIV Group Tooling, Simplify Deliberately](infra-tech-stack-networking.html);\n* backend compute, covered by [Compute Infrastructure: Standardize on Docker, ECS Fargate, and Ubuntu Base Images](infra-tech-stack-compute.html);\n* backend messaging, covered by [Messaging Infrastructure: Standardize on Amazon MSK as the Kafka Backbone](infra-tech-stack-messaging.html);\n* detailed service-by-service AWS architecture.\n\nRevisit this decision if:\n\n* AVIV Group changes its primary cloud strategy;\n* AWS contract terms materially affect Organization cost or autonomy;\n* central AWS functions no longer meet Organization's baseline needs;\n* a regulatory or product requirement makes another provider materially better;\n* Organization's workload profile changes enough that AWS is no longer the obvious consolidation target.\n\n## Authoritative References\n\n* [AWS Organizations documentation](https://docs.aws.amazon.com/organizations/latest/userguide/orgs_introduction.html).\n* [AWS Well-Architected Framework](https://docs.aws.amazon.com/wellarchitected/latest/framework/welcome.html).\n* [AWS Shared Responsibility Model](https://aws.amazon.com/compliance/shared-responsibility-model/).\n* [AWS Billing and Cost Management documentation](https://docs.aws.amazon.com/cost-management/latest/userguide/what-is-costmanagement.html).\n* [AWS Savings Plans documentation](https://docs.aws.amazon.com/savingsplans/latest/userguide/what-is-savings-plans.html).\n* [AWS Control Tower documentation](https://docs.aws.amazon.com/controltower/latest/userguide/what-is-control-tower.html).\n\n## Appendix: Vocabulary\n\n\n\n| Term | Meaning in this ADR |\n| --- | --- |\n| **Public cloud provider** | The primary cloud platform where Organization runs backend workloads. |\n| **AWS Organization** | The group-level AWS account structure under which Organization accounts are managed. |\n| **AWS account** | A boundary for workloads, permissions, costs, quotas, and blast radius. |\n| **Workload** | An application, service, data platform, or product capability running on AWS. |\n| **Central AWS function** | AVIV Group capability that handles common AWS topics across companies or domains. |\n| **FinOps** | Shared engineering, product, and finance practice for managing cloud spend. |\n| **Commitment discount** | Commercial discount mechanism such as Savings Plans or reserved capacity. |\n| **Guardrail** | A policy, standard, or control that shapes what teams can do in AWS accounts. |\n"}]}</script>
<script>
    (function () {
        const data = JSON.parse(document.getElementById('data').textContent);
        const root = document.getElementById('content');

        const postId = (data.meta && data.meta.id) ? String(data.meta.id) : '';
        const postStatusRaw = (data.meta && data.meta.status) ? String(data.meta.status) : '';
        if (postId || postStatusRaw) {
            const header = document.getElementById('post-header');
            let sectionEl = header.querySelector('p.section');
            if (!sectionEl) {
                sectionEl = document.createElement('p');
                sectionEl.className = 'section';
                header.insertBefore(sectionEl, header.firstChild);
            }
            // Status pill goes first, then a " / " separator before the existing
            // content (section name and/or id).
            if (postStatusRaw) {
                const parts = postStatusRaw.split(':');
                const statusName = parts[0].trim();
                const statusColor = (parts[1] || '').trim();
                const wrap = document.createElement('span');
                wrap.className = 'post-status';
                const dot = document.createElement('span');
                dot.className = 'status-dot';
                if (statusColor) dot.style.background = statusColor;
                wrap.appendChild(dot);
                wrap.appendChild(document.createTextNode(statusName));
                if (sectionEl.firstChild) {
                    sectionEl.insertBefore(document.createTextNode(' • '), sectionEl.firstChild);
                    sectionEl.insertBefore(wrap, sectionEl.firstChild);
                } else {
                    sectionEl.appendChild(wrap);
                }
            }
            if (postId) {
                if (sectionEl.firstChild) sectionEl.appendChild(document.createTextNode(' • '));
                sectionEl.appendChild(document.createTextNode(postId));
            }
        }

        const tagsHost = document.getElementById('tags');
        (data.tags || []).forEach(function (t) {
            const span = document.createElement('span');
            span.className = 'tag';
            span.textContent = t;
            tagsHost.appendChild(span);
        });

        // Minimal markdown renderer. Supports: ATX headings, paragraphs, blockquotes,
        // unordered/ordered lists, fenced code, inline code, bold/italic/strikethrough, links, images, hr.
        // Sufficient for the posts in this repo; replace with a fuller parser if needed.
        function renderMarkdown(src) {
            const lines = src.replace(/\r\n/g, '\n').split('\n');
            const out = [];
            let i = 0;

            const bullet = /^(\s*)([-*])\s+(.*)$/;
            const ordered = /^(\s*)(\d+)\.\s+(.*)$/;
            const tableRow = /^\s*\|(.+)\|\s*$/;
            const tableSep = /^\s*\|?\s*:?-{3,}:?\s*(\|\s*:?-{3,}:?\s*)+\|?\s*$/;

            function splitRow(s) {
                let t = s.trim();
                if (t.startsWith('|')) t = t.slice(1);
                if (t.endsWith('|')) t = t.slice(0, -1);
                return t.split('|').map(c => c.trim());
            }

            function inline(s) {
                // Posts are trusted content, so raw HTML passes through unescaped
                // (some posts embed inline <blockquote>, <div>, etc.).
                // Stray ampersands still get fixed up.
                s = s.replace(/&(?![a-zA-Z]+;|#\d+;)/g, '&amp;');
                s = s.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img alt="$1" src="$2">');
                s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
                s = s.replace(/`([^`]+)`/g, function (_, c) {
                    return '<code>' + c.replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</code>';
                });
                s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
                s = s.replace(/~~([^~\n]+)~~/g, '<del>$1</del>');
                s = s.replace(/(^|[^*])\*([^*\n]+)\*/g, '$1<em>$2</em>');
                return s;
            }

            while (i < lines.length) {
                const line = lines[i];
                if (!line.trim()) {
                    i++;
                    continue;
                }

                const fence = line.match(/^```(\w*)\s*$/);
                if (fence) {
                    i++;
                    const buf = [];
                    while (i < lines.length && !/^```\s*$/.test(lines[i])) {
                        buf.push(lines[i]);
                        i++;
                    }
                    i++;
                    const escaped = buf.join('\n').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                    const cls = fence[1] ? ' class="lang-' + fence[1] + '"' : '';
                    out.push('<pre><code' + cls + '>' + escaped + '</code></pre>');
                    continue;
                }

                const h = line.match(/^(#{1,6})\s+(.*)$/);
                if (h) {
                    out.push('<h' + h[1].length + '>' + inline(h[2]) + '</h' + h[1].length + '>');
                    i++;
                    continue;
                }

                if (/^\s*(?:-\s*){3,}\s*$/.test(line) || /^\s*\*{3,}\s*$/.test(line)) {
                    out.push('<hr>');
                    i++;
                    continue;
                }

                if (/^>\s?/.test(line)) {
                    const buf = [];
                    while (i < lines.length && /^>\s?/.test(lines[i])) {
                        buf.push(lines[i].replace(/^>\s?/, ''));
                        i++;
                    }
                    out.push('<blockquote>' + renderMarkdown(buf.join('\n')) + '</blockquote>');
                    continue;
                }

                if (tableRow.test(line) && i + 1 < lines.length && tableSep.test(lines[i + 1])) {
                    const headers = splitRow(line);
                    i += 2;
                    const rows = [];
                    while (i < lines.length && tableRow.test(lines[i])) {
                        rows.push(splitRow(lines[i]));
                        i++;
                    }
                    let html = '<table><thead><tr>';
                    headers.forEach(h => {
                        html += '<th>' + inline(h) + '</th>';
                    });
                    html += '</tr></thead><tbody>';
                    rows.forEach(r => {
                        html += '<tr>';
                        r.forEach(c => {
                            html += '<td>' + inline(c) + '</td>';
                        });
                        html += '</tr>';
                    });
                    html += '</tbody></table>';
                    out.push(html);
                    continue;
                }

                if (bullet.test(line) || ordered.test(line)) {
                    // Indent of the first bullet defines this list's base level.
                    // Deeper-indented bullets become nested lists (rendered by
                    // recursing into renderMarkdown). Same-or-less indent at a
                    // bullet starts a sibling item (or ends the list).
                    const firstMatch = line.match(bullet) || line.match(ordered);
                    const baseIndent = firstMatch[1].length;
                    const isOrdered = ordered.test(line);
                    const items = [];
                    while (i < lines.length) {
                        const cur = lines[i];
                        if (!cur.trim()) {
                            // blank line breaks the list (matches CommonMark-ish behaviour)
                            i++;
                            break;
                        }
                        const mBul = cur.match(bullet);
                        const mOrd = cur.match(ordered);
                        const m = mBul || mOrd;
                        if (!m) break;
                        if (m[1].length < baseIndent) break;
                        if (m[1].length > baseIndent) break; // shouldn't happen at top of loop
                        // Same-type check: switching between -/* and 1. closes the list
                        if (isOrdered !== !!mOrd) break;

                        const itemBuf = [m[3]];
                        const nestedBuf = [];
                        i++;
                        while (i < lines.length) {
                            const nxt = lines[i];
                            if (!nxt.trim()) break;
                            const nBul = nxt.match(bullet);
                            const nOrd = nxt.match(ordered);
                            const nm = nBul || nOrd;
                            if (nm) {
                                if (nm[1].length > baseIndent) {
                                    // nested list line — dedent and stash
                                    nestedBuf.push(nxt.slice(baseIndent + 2));
                                    i++;
                                    continue;
                                }
                                // sibling or end of list
                                break;
                            }
                            // Plain continuation text
                            if (nestedBuf.length) {
                                // continuation inside the nested block
                                nestedBuf.push(nxt.slice(baseIndent + 2));
                            } else {
                                itemBuf.push(nxt.trim());
                            }
                            i++;
                        }

                        let liHtml = inline(itemBuf.join('\n'));
                        if (nestedBuf.length) {
                            liHtml += renderMarkdown(nestedBuf.join('\n'));
                        }
                        items.push('<li>' + liHtml + '</li>');
                    }
                    out.push((isOrdered ? '<ol>' : '<ul>') + items.join('') + (isOrdered ? '</ol>' : '</ul>'));
                    continue;
                }

                const buf = [line];
                i++;
                while (i < lines.length && lines[i].trim() && !/^#{1,6}\s/.test(lines[i]) && !/^>\s?/.test(lines[i]) && !bullet.test(lines[i]) && !ordered.test(lines[i]) && !/^```/.test(lines[i]) && !tableRow.test(lines[i])) {
                    buf.push(lines[i]);
                    i++;
                }
                out.push('<p>' + inline(buf.join(' ')) + '</p>');
            }
            return out.join('\n');
        }

        // Block dispatcher. New block types plug in here.
        const renderers = {
            markdown: function (block) {
                const div = document.createElement('div');
                div.innerHTML = renderMarkdown(block.content);
                return div;
            },
            mermaid: function (block) {
                // Mermaid scans elements with class "mermaid" whose textContent
                // is the diagram source. We collect these nodes and run
                // mermaid.run() once after all blocks are in the DOM.
                const div = document.createElement('div');
                div.className = 'mermaid';
                div.textContent = block.content;
                return div;
            },
            'force-graph': function (block) {
                // build.py emits parsed JSON: {nodes:[{id,size}], links:[{source,target}]}.
                // We instantiate force-graph after the container is in the DOM
                // so it can measure its own width.
                const div = document.createElement('div');
                div.className = 'force-graph';
                const data = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.ForceGraph) return;
                    const maxSize = data.nodes.reduce((m, n) => Math.max(m, n.size || 1), 1);
                    window.ForceGraph()(div)
                        .graphData(data)
                        .width(div.clientWidth)
                        .height(div.clientHeight)
                        .nodeRelSize(4)
                        .nodeVal(n => Math.max(20 * (n.size || 1) / maxSize, 0.001))
                        .nodeLabel(n => n.id + ' (' + (n.size || 1) + ')')
                        .nodeColor(() => 'rgba(135, 206, 235, 0.7)')
                        .linkColor(() => 'rgba(60, 60, 60, 0.4)')
                        .linkDirectionalArrowLength(4)
                        .linkDirectionalArrowRelPos(1)
                        .linkWidth(1);
                });
                return div;
            },
            'bubble-chart': function (block) {
                // build.py emits {nodes:[{name,size}]}. Renders a D3 circle-pack
                // SVG (same shape as the obren.io reference, just inline).
                const wrap = document.createElement('div');
                wrap.className = 'bubble-chart';
                const payload = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.d3) return;
                    const diameter = 480;
                    const fill = '#c0deed';
                    const textColor = '#111111';
                    const fontSize = 12;

                    const svg = window.d3.select(wrap).append('svg')
                        .attr('viewBox', '0 0 ' + diameter + ' ' + diameter)
                        .attr('width', diameter)
                        .attr('height', diameter);

                    const root = window.d3.hierarchy({children: payload.nodes})
                        .sum(d => d.size || 0)
                        .sort((a, b) => b.value - a.value);

                    window.d3.pack().size([diameter, diameter]).padding(2)(root);

                    const node = svg.selectAll('g')
                        .data(root.leaves())
                        .enter().append('g')
                        .attr('transform', d => 'translate(' + d.x + ',' + d.y + ')');

                    node.append('title').text(d => d.data.name + ': ' + d.value);
                    node.append('circle').attr('r', d => d.r).style('fill', fill);
                    node.append('text')
                        .attr('dy', '.3em')
                        .style('text-anchor', 'middle')
                        .style('fill', textColor)
                        .style('font-size', fontSize + 'px')
                        .text(d => d.data.name.substring(0, Math.max(0, Math.floor(d.r / 3))));
                });
                return wrap;
            }
        };

        const mermaidNodes = [];
        data.blocks.forEach(function (block) {
            const r = renderers[block.type];
            if (!r) {
                const pre = document.createElement('pre');
                pre.textContent = '[unknown block type: ' + block.type + ']';
                root.appendChild(pre);
                return;
            }
            const node = r(block);
            if (node instanceof Node) {
                root.appendChild(node);
                if (block.type === 'mermaid') mermaidNodes.push(node);
            }
        });

        if (mermaidNodes.length && window.mermaid) {
            window.mermaid.initialize({startOnLoad: false, theme: 'default'});
            window.mermaid.run({nodes: mermaidNodes});
        }
    })();
</script>
</body>
</html>
