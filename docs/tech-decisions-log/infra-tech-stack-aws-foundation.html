<script id="data" type="application/json">{"meta": {"id": "ORG-SD-INFRA-AWS-FOUNDATION", "status": "draft:gray", "title": "AWS Foundation: Inherit Central AVIV Group Tooling for 6-12 Months", "date": "2026-05-15", "author": "Organization Tech Strategy", "permalink": "infra-tech-stack-aws-foundation", "timetoread": "12 min", "excerpt": "As a starting point, Organization will use AVIV Group's existing central AWS foundation tooling for account creation, account lifecycle management, landing-zone guardrails, and access management: AWS Organizations, AWS Control Tower, AFT (Account Factory for Terraform), and the supporting custom-built access scripts. Organization will not significantly deviate from this setup for the next 6-12 months. The decision is time-bounded: after the initial period, Organization expects a simpler, more conventional, and more country-delegated foundation model with less reliance on custom tooling.", "tags": "backend, infrastructure, aws", "icon": "assets/icons/infra-tech-stack-aws-foundation.png", "logo": "assets/images/infra-tech-stack-aws-foundation/logo.jpeg", "logo_credit": "Image generated by Google Gemini (gemini-3-pro-image-preview)"}, "tags": ["backend", "infrastructure", "aws"], "blocks": [{"type": "markdown", "content": "> **Status**: DRAFT\n>\n> **Decision**: For the next 6-12 months, Organization will use AVIV Group's central AWS foundation for account creation, account lifecycle management, landing-zone guardrails, and access management. Organization will not stand up parallel tooling, fork the central setup, or significantly diverge during this period. The expected future state is simpler, more conventional AWS-native tooling with more country-level ownership for Organization.\n\n## Decision\n\nFor the next **6-12 months**, Organization will use **AVIV Group's existing central AWS foundation** as its baseline for account and access management.\n\nConcretely:\n\n* AWS accounts for Organization are created and lifecycle-managed through the central AVIV Group setup.\n* AWS Organizations, AWS Control Tower, and AFT remain the inherited foundation path.\n* Human access remains managed through the central AVIV access model, including current custom-built access scripts.\n* Organization will not build parallel account-vending, organization, landing-zone, or access-management tooling during this period.\n* Organization will not fork the central tooling during this period.\n* Organization will prepare for a later shift toward more conventional AWS-native tooling and more delegated country-level ownership.\n\nThis decision sits under the public cloud decision, [Public Cloud: Consolidate on AWS via AVIV Group Contract](infra-tech-aws.html). It defines the foundation layer only. Workload compute, networking, messaging, and application architecture are covered elsewhere.\n\n## How to Use This Decision\n\nUse this ADR when a team needs an AWS account, access model, guardrail change, or foundation-level exception:\n\n| Question | Default answer |\n| --- | --- |\n| Does Organization need a new AWS account or account lifecycle change? | Use the central AVIV foundation process. |\n| Should Organization fork or replace account-vending/access tooling now? | No. Use the inheritance period to learn and simplify. |\n| Is this ordinary workload infrastructure inside an account? | Keep it with the workload team and normal IaC path. |\n| Is this an OU, SCP, Control Tower, AFT, access, or account-baseline change? | Treat it as foundation-level and route through the central process. |\n| Is the central process blocking a material need? | Request a documented, time-bound exception. |\n\nThe decision is a sequencing choice: inherit now, learn deliberately, and revisit with evidence. It is not a claim that central custom tooling is the desired permanent model.\n\n## Why This Default\n\nThe current AWS estate already lives inside AVIV Group's foundation and commercial model. Moving away immediately would add high-blast-radius work at the moment Organization also needs workload momentum.\n\nThe default is conservative because foundation changes affect many accounts at once: security posture, auditability, billing, access, policy inheritance, account provisioning, and future delegation. A rushed local foundation would create more risk than value during the initial transition.\n\nThe expected direction is still simplification:\n\n* more use of conventional AWS capabilities where they are sufficient;\n* less reliance on custom access scripts;\n* clearer country-level ownership for routine account and access work;\n* retained group guardrails where security, audit, procurement, and FinOps need consistency;\n* better self-service for common account and access requests.\n\n## Boundary: Foundation vs Workload\n\n| Topic | Foundation-owned | Workload-owned |\n| --- | --- | --- |\n| Account creation | Request process, account metadata, OU placement, lifecycle state. | Business purpose, owning team, environment, and workload justification. |\n| Organization structure | OU hierarchy, inherited policies, Control Tower enrollment. | Understanding inherited constraints and requesting the right account type. |\n| Guardrails and SCPs | Baseline controls, policy attachment, exception process. | Designing workloads inside guardrails and requesting justified exceptions. |\n| Human access baseline | Central access model, permission sets or roles, federation, auditability. | Requesting least-privilege access and removing unused access. |\n| Account customization | AFT workflow, baseline tags, default settings, account bootstrapping. | Workload-specific infrastructure deployed inside the account. |\n| Cost allocation baseline | Account metadata, required tags, consolidated billing alignment. | Workload forecasts, budgets, rightsizing, and cost optimization. |\n| Incident response | Foundation incidents, break-glass, account drift, policy failures. | Application incidents, service dashboards, and service runbooks. |\n\nThis boundary prevents two failure modes: product teams waiting on the foundation for normal workload choices, and product teams bypassing the foundation for high-blast-radius changes.\n\n## Commitments During the Inheritance Period\n\nThe 6-12 month window should produce concrete learning, not passive waiting:\n\n* Maintain a current inventory of Organization accounts, owners, environments, workloads, lifecycle states, and cost centers.\n* Map OU placement, inherited SCPs, Control Tower controls, known policy failures, and common exception paths.\n* Record lead time, access friction, customization pain points, drift incidents, and workarounds.\n* Avoid new deep automation dependencies on custom access scripts.\n* Standardize account, access, exception, and metadata request artifacts.\n* Identify routine foundation tasks that could move to Organization ownership later.\n* Prepare a future-state proposal for delegated ownership inside group guardrails.\n\nThese artifacts are the evidence for the revisit.\n\n## Consequences\n\n### Positive\n\n* Organization gets a fast start without first building account-vending, landing-zone, or access tooling.\n* Inherited accounts remain in their current organizational and guardrail context.\n* The decision stays aligned with the AWS via AVIV Group contract in [Public Cloud: Consolidate on AWS via AVIV Group Contract](infra-tech-aws.html).\n* Engineering capacity can focus on workload-level migration, compute, messaging, and product delivery.\n* The time-bounded horizon creates a natural revisit point.\n* Future delegation can be based on observed friction and real account inventory rather than assumptions.\n\n### Negative\n\n* Organization depends on the central AVIV Group function for account creation, landing-zone changes, and access workflows during this period.\n* Non-standard foundation requests may take longer than Organization prefers.\n* Custom access scripts remain an external dependency and may change during the transition.\n* Organization inherits central opinions about OU structure, SCPs, controls, tags, names, and access workflows.\n* Organization will not build foundation-operating muscle unless learning is deliberate.\n* If AVIV's expected simplification slips, Organization must explicitly re-evaluate instead of drifting indefinitely.\n\n## What This Means for Teams\n\n* Use the central account and access process for foundation-level changes.\n* Keep application infrastructure inside workload-owned IaC and CI/CD paths; do not use AFT as an application deployment system.\n* Make account purpose, owner, environment, cost center, data classification, and lifecycle explicit.\n* Request least-privilege access and remove unused access.\n* Escalate foundation gaps rather than normalizing bypasses or shadow tooling.\n* Treat custom access scripts as transitional tooling, not stable Organization APIs.\n* Capture friction so the revisit has evidence.\n\n## Exception Criteria\n\nAn exception to the inheritance approach should explain:\n\n* the specific foundation capability that central tooling cannot provide in time;\n* affected accounts, OUs, workloads, users, and compliance or delivery impact;\n* why a temporary central-process workaround is not sufficient;\n* how auditability, least privilege, billing, tagging, logging, and support are preserved;\n* how the exception will be retired or reconciled when the AVIV foundation changes;\n* who owns the exception and when it will be reviewed.\n\nValid exceptions should be rare: security or compliance needs that cannot wait, production access blockers with material impact, mandatory migration support, or a short-lived migration bridge with an expiry date.\n\n## Considered Options\n\n| Option | Assessment |\n| --- | --- |\n| **Inherit AVIV central foundation for 6-12 months** | Chosen. Maintains continuity while Organization learns, maps friction, and prepares for delegated ownership. |\n| **Stand up Organization-specific foundation now** | More autonomy, but likely duplicates work that will change and distracts from workload momentum. |\n| **Fork the central tooling** | Gives local control, but locks Organization into custom non-differentiating tooling. |\n| **Adopt conventional AWS-native tooling immediately** | Aligns with the expected future direction, but creates avoidable near-term migration and central-operating friction. |\n| **Freeze foundation changes** | Minimizes churn, but blocks legitimate migration, access, and lifecycle needs. |\n\n## Scope and Revisiting\n\nIn scope:\n\n* account creation and lifecycle management;\n* AWS Organizations and OU placement;\n* Control Tower landing-zone controls;\n* AFT account provisioning and customization;\n* human access management;\n* foundation-level guardrails and exceptions.\n\nOut of scope:\n\n* public cloud provider selection, covered by [Public Cloud: Consolidate on AWS via AVIV Group Contract](infra-tech-aws.html);\n* AWS networking, covered by [AWS Networking: Inherit Central AVIV Group Tooling, Simplify Deliberately](infra-tech-stack-networking.html);\n* workload compute, covered by [Compute Infrastructure: Standardize on Docker, ECS Fargate, and Ubuntu Base Images](infra-tech-stack-compute.html);\n* backend messaging, covered by [Messaging Infrastructure: Standardize on Amazon MSK as the Kafka Backbone](infra-tech-stack-messaging.html);\n* application infrastructure inside accounts;\n* workload-level FinOps beyond required account metadata and central reporting.\n\nRevisit this decision in the planned **2026-11-01 to 2027-05-01** window, or earlier if:\n\n* AVIV Group materially changes its AWS foundation toward a simpler, less centralized, more country-delegated model;\n* central custom access tooling changes in a way that affects Organization workflows;\n* a material foundation-level blocker affects inherited workload migration;\n* the AWS strategy in [Public Cloud: Consolidate on AWS via AVIV Group Contract](infra-tech-aws.html) changes.\n\nAt the revisit, Organization should decide which foundation capabilities it should own directly, which should remain central, and which custom-tool dependencies should be retired.\n\n## Authoritative References\n\n* [AWS Organizations documentation](https://docs.aws.amazon.com/organizations/latest/userguide/orgs_introduction.html).\n* [AWS Organizations service control policies](https://docs.aws.amazon.com/organizations/latest/userguide/orgs_manage_policies_scps.html).\n* [AWS Control Tower documentation](https://docs.aws.amazon.com/controltower/latest/userguide/what-is-control-tower.html).\n* [AWS Control Tower controls](https://docs.aws.amazon.com/controltower/latest/userguide/how-controls-work.html).\n* [AWS Control Tower drift detection](https://docs.aws.amazon.com/controltower/latest/userguide/drift.html).\n* [AWS Control Tower Account Factory for Terraform](https://docs.aws.amazon.com/controltower/latest/userguide/aft-overview.html).\n* [AWS IAM Identity Center documentation](https://docs.aws.amazon.com/singlesignon/latest/userguide/what-is.html).\n* [IAM Identity Center permission sets](https://docs.aws.amazon.com/singlesignon/latest/userguide/permissionsets.html).\n\n## Appendix: Vocabulary\n\n\n\n| Term | Meaning in this ADR |\n| --- | --- |\n| **AWS account** | A security, billing, quota, and operational boundary for workloads. |\n| **Management account** | The AWS Organizations management account; not a normal workload account. |\n| **Member account** | An account inside the AWS Organization where workloads or shared capabilities run. |\n| **Organizational unit (OU)** | A group of AWS accounts inside AWS Organizations. |\n| **Service control policy (SCP)** | An Organizations policy that sets maximum permissions for member accounts. |\n| **Landing zone** | A governed multi-account AWS environment with baseline accounts, controls, and structure. |\n| **Control / guardrail** | A rule that enforces, detects, or pre-checks governance requirements. |\n| **AFT** | Account Factory for Terraform, used for account provisioning and account customization under Control Tower. |\n| **IAM Identity Center** | AWS workforce access service for account and application access. |\n| **Permission set** | An IAM Identity Center access template for roles in AWS accounts. |\n| **Drift** | A difference between expected governed state and actual state. |\n| **Delegation** | Moving selected foundation responsibilities to Organization while retaining agreed group guardrails. |\n"}]}</script>

    (function () {
        const data = JSON.parse(document.getElementById('data').textContent);
        const root = document.getElementById('content');

        const postId = (data.meta && data.meta.id) ? String(data.meta.id) : '';
        const postStatusRaw = (data.meta && data.meta.status) ? String(data.meta.status) : '';
        if (postId || postStatusRaw) {
            const header = document.getElementById('post-header');
            let sectionEl = header.querySelector('p.section');
            if (!sectionEl) {
                sectionEl = document.createElement('p');
                sectionEl.className = 'section';
                header.insertBefore(sectionEl, header.firstChild);
            }
            // Status pill goes first, then a " / " separator before the existing
            // content (section name and/or id).
            if (postStatusRaw) {
                const parts = postStatusRaw.split(':');
                const statusName = parts[0].trim();
                const statusColor = (parts[1] || '').trim();
                const wrap = document.createElement('span');
                wrap.className = 'post-status';
                const dot = document.createElement('span');
                dot.className = 'status-dot';
                if (statusColor) dot.style.background = statusColor;
                wrap.appendChild(dot);
                wrap.appendChild(document.createTextNode(statusName));
                if (sectionEl.firstChild) {
                    sectionEl.insertBefore(document.createTextNode(' • '), sectionEl.firstChild);
                    sectionEl.insertBefore(wrap, sectionEl.firstChild);
                } else {
                    sectionEl.appendChild(wrap);
                }
            }
            if (postId) {
                if (sectionEl.firstChild) sectionEl.appendChild(document.createTextNode(' • '));
                sectionEl.appendChild(document.createTextNode(postId));
            }
        }

        const tagsHost = document.getElementById('tags');
        (data.tags || []).forEach(function (t) {
            const span = document.createElement('span');
            span.className = 'tag';
            span.textContent = t;
            tagsHost.appendChild(span);
        });

        // Minimal markdown renderer. Supports: ATX headings, paragraphs, blockquotes,
        // unordered/ordered lists, fenced code, inline code, bold/italic/strikethrough, links, images, hr.
        // Sufficient for the posts in this repo; replace with a fuller parser if needed.
        function renderMarkdown(src) {
            const lines = src.replace(/\r\n/g, '\n').split('\n');
            const out = [];
            let i = 0;

            const bullet = /^(\s*)([-*])\s+(.*)$/;
            const ordered = /^(\s*)(\d+)\.\s+(.*)$/;
            const tableRow = /^\s*\|(.+)\|\s*$/;
            const tableSep = /^\s*\|?\s*:?-{3,}:?\s*(\|\s*:?-{3,}:?\s*)+\|?\s*$/;

            function splitRow(s) {
                let t = s.trim();
                if (t.startsWith('|')) t = t.slice(1);
                if (t.endsWith('|')) t = t.slice(0, -1);
                return t.split('|').map(c => c.trim());
            }

            function inline(s) {
                // Posts are trusted content, so raw HTML passes through unescaped
                // (some posts embed inline <blockquote>, <div>, etc.).
                // Stray ampersands still get fixed up.
                s = s.replace(/&(?![a-zA-Z]+;|#\d+;)/g, '&amp;');
                s = s.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<a class="image-link" href="$2" target="_blank" rel="noopener noreferrer"><img alt="$1" src="$2"></a>');
                s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
                s = s.replace(/`([^`]+)`/g, function (_, c) {
                    return '<code>' + c.replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</code>';
                });
                s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
                s = s.replace(/~~([^~\n]+)~~/g, '<del>$1</del>');
                s = s.replace(/(^|[^*])\*([^*\n]+)\*/g, '$1<em>$2</em>');
                return s;
            }

            while (i < lines.length) {
                const line = lines[i];
                if (!line.trim()) {
                    i++;
                    continue;
                }

                const fence = line.match(/^```(\w*)\s*$/);
                if (fence) {
                    i++;
                    const buf = [];
                    while (i < lines.length && !/^```\s*$/.test(lines[i])) {
                        buf.push(lines[i]);
                        i++;
                    }
                    i++;
                    const escaped = buf.join('\n').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                    const cls = fence[1] ? ' class="lang-' + fence[1] + '"' : '';
                    out.push('<pre><code' + cls + '>' + escaped + '</code></pre>');
                    continue;
                }

                const h = line.match(/^(#{1,6})\s+(.*)$/);
                if (h) {
                    out.push('<h' + h[1].length + '>' + inline(h[2]) + '</h' + h[1].length + '>');
                    i++;
                    continue;
                }

                if (/^\s*(?:-\s*){3,}\s*$/.test(line) || /^\s*\*{3,}\s*$/.test(line)) {
                    out.push('<hr>');
                    i++;
                    continue;
                }

                if (/^>\s?/.test(line)) {
                    const buf = [];
                    while (i < lines.length && /^>\s?/.test(lines[i])) {
                        buf.push(lines[i].replace(/^>\s?/, ''));
                        i++;
                    }
                    out.push('<blockquote>' + renderMarkdown(buf.join('\n')) + '</blockquote>');
                    continue;
                }

                if (tableRow.test(line) && i + 1 < lines.length && tableSep.test(lines[i + 1])) {
                    const headers = splitRow(line);
                    i += 2;
                    const rows = [];
                    while (i < lines.length && tableRow.test(lines[i])) {
                        rows.push(splitRow(lines[i]));
                        i++;
                    }
                    let html = '<table><thead><tr>';
                    headers.forEach(h => {
                        html += '<th>' + inline(h) + '</th>';
                    });
                    html += '</tr></thead><tbody>';
                    rows.forEach(r => {
                        html += '<tr>';
                        r.forEach(c => {
                            html += '<td>' + inline(c) + '</td>';
                        });
                        html += '</tr>';
                    });
                    html += '</tbody></table>';
                    out.push(html);
                    continue;
                }

                if (bullet.test(line) || ordered.test(line)) {
                    // Indent of the first bullet defines this list's base level.
                    // Deeper-indented bullets become nested lists (rendered by
                    // recursing into renderMarkdown). Same-or-less indent at a
                    // bullet starts a sibling item (or ends the list).
                    const firstMatch = line.match(bullet) || line.match(ordered);
                    const baseIndent = firstMatch[1].length;
                    const isOrdered = ordered.test(line);
                    const items = [];
                    while (i < lines.length) {
                        const cur = lines[i];
                        if (!cur.trim()) {
                            // blank line breaks the list (matches CommonMark-ish behaviour)
                            i++;
                            break;
                        }
                        const mBul = cur.match(bullet);
                        const mOrd = cur.match(ordered);
                        const m = mBul || mOrd;
                        if (!m) break;
                        if (m[1].length < baseIndent) break;
                        if (m[1].length > baseIndent) break; // shouldn't happen at top of loop
                        // Same-type check: switching between -/* and 1. closes the list
                        if (isOrdered !== !!mOrd) break;

                        const itemBuf = [m[3]];
                        const nestedBuf = [];
                        i++;
                        while (i < lines.length) {
                            const nxt = lines[i];
                            if (!nxt.trim()) break;
                            const nBul = nxt.match(bullet);
                            const nOrd = nxt.match(ordered);
                            const nm = nBul || nOrd;
                            if (nm) {
                                if (nm[1].length > baseIndent) {
                                    // nested list line — dedent and stash
                                    nestedBuf.push(nxt.slice(baseIndent + 2));
                                    i++;
                                    continue;
                                }
                                // sibling or end of list
                                break;
                            }
                            // Plain continuation text
                            if (nestedBuf.length) {
                                // continuation inside the nested block
                                nestedBuf.push(nxt.slice(baseIndent + 2));
                            } else {
                                itemBuf.push(nxt.trim());
                            }
                            i++;
                        }

                        let liHtml = inline(itemBuf.join('\n'));
                        if (nestedBuf.length) {
                            liHtml += renderMarkdown(nestedBuf.join('\n'));
                        }
                        items.push('<li>' + liHtml + '</li>');
                    }
                    out.push((isOrdered ? '<ol>' : '<ul>') + items.join('') + (isOrdered ? '</ol>' : '</ul>'));
                    continue;
                }

                const buf = [line];
                i++;
                while (i < lines.length && lines[i].trim() && !/^#{1,6}\s/.test(lines[i]) && !/^>\s?/.test(lines[i]) && !bullet.test(lines[i]) && !ordered.test(lines[i]) && !/^```/.test(lines[i]) && !tableRow.test(lines[i])) {
                    buf.push(lines[i]);
                    i++;
                }
                out.push('<p>' + inline(buf.join(' ')) + '</p>');
            }
            return out.join('\n');
        }

        // Block dispatcher. New block types plug in here.
        const renderers = {
            markdown: function (block) {
                const div = document.createElement('div');
                div.innerHTML = renderMarkdown(block.content);
                return div;
            },
            mermaid: function (block) {
                // Mermaid scans elements with class "mermaid" whose textContent
                // is the diagram source. We collect these nodes and run
                // mermaid.run() once after all blocks are in the DOM.
                const div = document.createElement('div');
                div.className = 'mermaid';
                div.textContent = block.content;
                return div;
            },
            'force-graph': function (block) {
                // build.py emits parsed JSON: {nodes:[{id,size}], links:[{source,target}]}.
                // We instantiate force-graph after the container is in the DOM
                // so it can measure its own width.
                const div = document.createElement('div');
                div.className = 'force-graph';
                const data = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.ForceGraph) return;
                    const maxSize = data.nodes.reduce((m, n) => Math.max(m, n.size || 1), 1);
                    window.ForceGraph()(div)
                        .graphData(data)
                        .width(div.clientWidth)
                        .height(div.clientHeight)
                        .nodeRelSize(4)
                        .nodeVal(n => Math.max(20 * (n.size || 1) / maxSize, 0.001))
                        .nodeLabel(n => n.id + ' (' + (n.size || 1) + ')')
                        .nodeColor(() => 'rgba(135, 206, 235, 0.7)')
                        .linkColor(() => 'rgba(60, 60, 60, 0.4)')
                        .linkDirectionalArrowLength(4)
                        .linkDirectionalArrowRelPos(1)
                        .linkWidth(1);
                });
                return div;
            },
            'bubble-chart': function (block) {
                // build.py emits {nodes:[{name,size}]}. Renders a D3 circle-pack
                // SVG (same shape as the obren.io reference, just inline).
                const wrap = document.createElement('div');
                wrap.className = 'bubble-chart';
                const payload = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.d3) return;
                    const diameter = 480;
                    const fill = '#c0deed';
                    const textColor = '#111111';
                    const fontSize = 12;

                    const svg = window.d3.select(wrap).append('svg')
                        .attr('viewBox', '0 0 ' + diameter + ' ' + diameter)
                        .attr('width', diameter)
                        .attr('height', diameter);

                    const root = window.d3.hierarchy({children: payload.nodes})
                        .sum(d => d.size || 0)
                        .sort((a, b) => b.value - a.value);

                    window.d3.pack().size([diameter, diameter]).padding(2)(root);

                    const node = svg.selectAll('g')
                        .data(root.leaves())
                        .enter().append('g')
                        .attr('transform', d => 'translate(' + d.x + ',' + d.y + ')');

                    node.append('title').text(d => d.data.name + ': ' + d.value);
                    node.append('circle').attr('r', d => d.r).style('fill', fill);
                    node.append('text')
                        .attr('dy', '.3em')
                        .style('text-anchor', 'middle')
                        .style('fill', textColor)
                        .style('font-size', fontSize + 'px')
                        .text(d => d.data.name.substring(0, Math.max(0, Math.floor(d.r / 3))));
                });
                return wrap;
            }
        };

        const mermaidNodes = [];
        data.blocks.forEach(function (block) {
            const r = renderers[block.type];
            if (!r) {
                const pre = document.createElement('pre');
                pre.textContent = '[unknown block type: ' + block.type + ']';
                root.appendChild(pre);
                return;
            }
            const node = r(block);
            if (node instanceof Node) {
                root.appendChild(node);
                if (block.type === 'mermaid') mermaidNodes.push(node);
            }
        });

        if (mermaidNodes.length && window.mermaid) {
            window.mermaid.initialize({startOnLoad: false, theme: 'default'});
            window.mermaid.run({nodes: mermaidNodes});
        }
    })();
</script>
</body>
</html>
