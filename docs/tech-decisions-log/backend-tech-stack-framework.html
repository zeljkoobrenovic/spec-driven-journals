<script id="data" type="application/json">{"meta": {"id": "ORG-SD-BACK-FRAMEWORK", "title": "Backend Services Platform: Standardize on .NET with C#", "status": "draft:gray", "date": "2026-05-15", "author": "Organization Tech Strategy", "permalink": "backend-tech-stack-framework", "timetoread": "11 min", "excerpt": "Organization will use .NET with C# as the default platform for core backend services: domain services, stable HTTP APIs, Kafka producers and consumers, and long-running workers running in containers on AWS ECS Fargate. Node.js with TypeScript remains available for narrow frontend-edge use cases such as small BFFs and simple API aggregation, but it is not the default for durable backend business logic.", "tags": "backend", "icon": "assets/icons/backend-tech-stack-framework.png", "logo": "assets/images/backend-tech-stack-framework/logo.jpeg", "logo_credit": "Image generated by Google Gemini (gemini-3-pro-image-preview)"}, "tags": ["backend"], "blocks": [{"type": "markdown", "content": "> **Status**: DRAFT\n>\n> **Decision**: Organization will use .NET with C# as the default platform for core backend services. The default applies to domain services, stable HTTP APIs, Kafka producers and consumers, and long-running workers running in containers on AWS ECS Fargate. Node.js with TypeScript remains available for narrow frontend-edge use cases, but it is not the default for durable backend business logic. This is a platform-convergence decision, not a claim that .NET is best for every workload.\n> \n> **Discussion**: [Slack thread](...)\n> \n> **Owner**: ...\n> \n> **Advisors**: ... \n> \n> **Curator**: ...\n\n## Decision\n\nAdopt **.NET with C#** as the default backend services platform for Organization.\n\nConcretely:\n\n* New core backend services use C# on the approved .NET LTS runtime.\n* HTTP APIs use the approved ASP.NET Core service template.\n* Background workers and Kafka consumers use the approved .NET worker pattern.\n* Services run as Docker containers on AWS ECS Fargate, aligned with [Compute Infrastructure: Standardize on Docker, ECS Fargate, and Ubuntu Base Images](infra-tech-stack-compute.html).\n* Kafka producers and consumers target Amazon MSK, aligned with [Messaging Infrastructure: Standardize on Amazon MSK as the Kafka Backbone](infra-tech-stack-messaging.html).\n* Node.js with TypeScript is allowed only where the component is genuinely frontend-edge: small BFFs, thin UI-specific aggregation, or simple glue with no durable business ownership.\n* Java, Kotlin, Go, Python, and other backend stacks are not defaults for new core backend services. Exceptions need an explicit ADR or Architecture Advisory Forum advice.\n\nThis decision defines the default **language, runtime, and service model** for backend services. It does not define every NuGet package, service template detail, migration sequence, or training plan.\n\n## How to Use This Decision\n\nUse this decision to answer three questions before creating or modernizing a backend component:\n\n| Question | Default answer |\n| --- | --- |\n| Is this a core backend service with durable business logic, owned data, stable APIs, Kafka processing, or long-running work? | Use .NET with C#. |\n| Is this a thin frontend-edge component for one UI surface, with shallow aggregation and no durable business rules? | Node.js with TypeScript may fit, with review. |\n| Is this a data-platform job, ML workload, one-off script, or operational tool? | Use the relevant domain standard; do not treat it as a backend-service exception by default. |\n\nThe decision is intended to stop recurring language debates for normal backend work. It should move discussion from \"which stack do we like?\" to \"what service shape are we building, and does it fit the default?\"\n\n## Why This Default\n\nOrganization's strategic backend shape is:\n\n* business-logic-heavy;\n* API-serving;\n* Kafka-driven;\n* containerized;\n* long-running;\n* owned and operated by product/domain teams.\n\n.NET with C# fits that shape because it gives one coherent service model for APIs, workers, dependency injection, configuration, logging, health checks, graceful shutdown, and strongly typed domain code. It also aligns with Organization's existing C#/.NET estate and concentrates platform investment in one primary backend stack.\n\nThe choice is not based on syntax preference. It is based on reducing platform fragmentation and making service ownership easier to teach, template, review, operate, and staff.\n\n## What .NET Means Here\n\nThis ADR means **modern .NET**, not preservation of every historical .NET pattern.\n\n| Modern expectation | Legacy pattern to avoid |\n| --- | --- |\n| Cross-platform .NET on an approved LTS baseline. | Treating old .NET Framework assumptions as the default. |\n| Containerized services on Linux-based images. | Server-bound deployments with hidden machine configuration. |\n| ASP.NET Core, Generic Host, and Worker Services. | Custom process wrappers and ad hoc startup code. |\n| Typed configuration, dependency injection, health checks, and structured logging. | Scattered environment reads, service locators, static globals, and local-debug logs. |\n| Explicit API and event contracts. | Sharing hidden DTOs or duplicating business rules across runtimes. |\n\nThe decision should therefore guide modernization work: when legacy C#/.NET systems are touched meaningfully, teams should move toward current .NET service patterns rather than copy old structure into a new runtime.\n\n## Node.js Boundary\n\nNode.js with TypeScript remains useful at the frontend edge. It is not a second strategic backend platform.\n\n| Component | Default |\n| --- | --- |\n| Core domain service | .NET with C#. |\n| Stable backend API | .NET with C#. |\n| Kafka consumer with business side effects | .NET with C#. |\n| Long-running worker | .NET with C#. |\n| Shared backend library or platform capability | .NET with C#, unless a separate platform decision says otherwise. |\n| Small BFF for one frontend | Node.js with TypeScript may fit. |\n| Thin API aggregation close to UI code | Node.js with TypeScript may fit. |\n| One-off operational script | Case by case; do not let scripts become hidden services. |\n\nThe boundary test is simple: if the component owns durable business behavior, data, events, or operational responsibility, it belongs on the backend platform. If it only shapes backend APIs for one frontend surface, the Node.js edge can be appropriate.\n\nChoosing .NET also means frontend/backend integration should rely on explicit contracts rather than shared runtime code:\n\n* HTTP APIs publish OpenAPI or equivalent contracts.\n* Kafka topics use versioned schemas and compatibility rules.\n* Clients are generated or maintained from published contracts.\n* Durable validation and business rules live in backend services, not in BFFs or UI code.\n\n## Consequences\n\n### Positive\n\n* Backend platform investment can concentrate on one default stack: templates, base images, analyzers, CI, observability, package policy, runbooks, and examples.\n* Engineers get a consistent service model for APIs, workers, Kafka consumers, configuration, logging, health checks, and shutdown behavior.\n* Kafka-driven services align with the MSK direction in [Messaging Infrastructure: Standardize on Amazon MSK as the Kafka Backbone](infra-tech-stack-messaging.html).\n* Containerized services align with the ECS Fargate direction in [Compute Infrastructure: Standardize on Docker, ECS Fargate, and Ubuntu Base Images](infra-tech-stack-compute.html).\n* Existing C#/.NET knowledge becomes an asset, while legacy patterns can be retired deliberately.\n* Node.js remains available where it is strongest: frontend-adjacent edge work.\n\n### Negative\n\n* Engineers whose backend experience is mainly TypeScript need a deliberate C#/.NET ramp-up path.\n* Frontend/backend direct code sharing becomes less natural; contract-first integration becomes more important.\n* The Node.js exception boundary needs active review, or it will grow into a second backend platform.\n* .NET LTS does not remove maintenance work. Runtime versions, SDK feature bands, NuGet packages, and base images still need ownership and upgrade discipline.\n* Some legacy systems may need pattern cleanup before teams can experience the benefits of modern .NET.\n\n## What This Means for Teams\n\nFor product and domain teams:\n\n* Start new core backend services from the approved .NET template.\n* Treat Kafka consumers as durable backend services, not plumbing scripts.\n* Publish API and event contracts explicitly.\n* Keep runtime, dependencies, base images, dashboards, alerts, and runbooks current.\n* Use Node.js only when the component is genuinely frontend-edge and intentionally thin.\n\nFor platform and enablement teams:\n\n* Maintain the approved .NET runtime baseline, SDK guidance, base images, service templates, and package policy.\n* Provide examples for HTTP APIs, workers, Kafka producers and consumers, health checks, observability, and graceful shutdown.\n* Support teams moving from legacy .NET patterns to modern .NET service patterns.\n* Review Node.js exceptions for scope creep.\n\nFor reviewers and the Architecture Advisory Forum:\n\n* Challenge new backend services that do not start from the .NET default.\n* Ask whether a proposed Node.js service is truly edge-shaped or is carrying durable backend responsibility.\n* Keep exceptions explicit, owned, observable, and revisited.\n\n## Exception Criteria\n\nAn exception to the .NET default should explain:\n\n* the workload shape that makes .NET a poor fit;\n* why the alternative is materially better for this component;\n* whether the component is edge, data, operational tooling, or core backend;\n* who owns runtime patching, security scanning, deployment, observability, and support;\n* how the component integrates with .NET services, frontends, Kafka topics, and AWS infrastructure;\n* when the exception will be revisited.\n\nValid exceptions are expected to be narrow. A broad exception is usually evidence that this ADR needs to be revisited rather than bypassed repeatedly.\n\n## Considered Options\n\n| Option | Assessment |\n| --- | --- |\n| **.NET with C# as default** | Chosen. Best fit for Organization's backend shape, existing skills, Kafka direction, and ECS Fargate deployment model. |\n| **Node.js with TypeScript as default** | Strong for frontend-edge work, but would create a second core backend platform and weaken convergence. |\n| **No default / team choice** | Maximizes local autonomy, but spreads templates, libraries, operations, hiring, and review across too many stacks. |\n| **JVM stack as default** | Technically credible, but adds a major skills and platform migration without a clear Organization-specific advantage over .NET. |\n| **Go as default** | Strong for some infrastructure and small services, but not the best strategic fit for Organization's business-logic-heavy backend estate. |\n\n## Scope and Revisiting\n\nIn scope:\n\n* new core backend services;\n* backend APIs;\n* Kafka producers and consumers;\n* long-running workers;\n* meaningful modernization of actively changed backend services.\n\nOut of scope:\n\n* frontend stack decisions, covered by [Web Tech Stack: Start from AVIV Group's Golden Path, Own the Fork](web-tech-stack.html);\n* mobile stack decisions, covered by [Mobile Tech Stack: Start from AVIV Group's Native Baseline, Own the Apps](mobile-tech-stack.html);\n* data engineering and analytics workloads;\n* one-off operational scripts that do not become production services;\n* legacy systems that are not being actively modernized.\n\nRevisit this decision if:\n\n* Organization's backend workload shifts away from long-running containerized services;\n* the .NET ecosystem materially weakens for containers, Kafka, AWS operation, or support lifecycle;\n* the engineering skills base shifts materially away from C#/.NET;\n* Node.js edge exceptions become common enough to indicate that the boundary no longer matches reality;\n* platform ownership cannot sustain the .NET baseline, templates, and upgrade path.\n\n## Authoritative References\n\n* Microsoft, [.NET releases, patches, and support](https://learn.microsoft.com/en-us/dotnet/core/releases-and-support).\n* Microsoft, [.NET Generic Host in ASP.NET Core](https://learn.microsoft.com/en-us/aspnet/core/fundamentals/host/generic-host).\n* Microsoft, [Worker Services in .NET](https://learn.microsoft.com/en-us/dotnet/core/extensions/workers).\n* Microsoft, [.NET container images](https://learn.microsoft.com/en-us/dotnet/core/docker/container-images).\n* Confluent, [Confluent .NET Client for Apache Kafka](https://docs.confluent.io/kafka-clients/dotnet/current/overview.html).\n\n## Appendix: Vocabulary\n\nThis vocabulary is included as reference material. It should help readers share the same language without turning the ADR body into a framework tutorial.\n\n| Term | Meaning in this ADR |\n| --- | --- |\n| **C#** | The default programming language for new core backend services. |\n| **.NET** | The runtime and platform used to build and run those services. |\n| **.NET LTS** | The approved Long Term Support runtime baseline used for production services. |\n| **ASP.NET Core** | The default .NET framework for HTTP APIs and web-hosted backend services. |\n| **Generic Host** | The common .NET application host for startup, dependency injection, configuration, logging, and shutdown. |\n| **Worker Service** | The .NET service shape for long-running background work such as Kafka consumers. |\n| **Hosted service** | A background component managed by the .NET host lifecycle. |\n| **Dependency injection** | The standard mechanism for composing application dependencies and managing lifetimes. |\n| **Options pattern** | The .NET convention for binding and validating typed configuration. |\n| **Health check** | A liveness or readiness signal used by runtime and operational tooling. |\n| **NuGet** | The package manager and dependency distribution mechanism for .NET. |\n| **BFF** | Backend-for-Frontend: a thin UI-specific API layer, not a place for durable backend business rules. |\n| **Frontend edge** | Code close to one frontend surface that shapes or aggregates APIs without owning durable domain behavior. |\n| **Core backend service** | A service that owns durable business behavior, data, events, APIs, or operational responsibility. |\n"}]}</script>
<script>
    (function () {
        const data = JSON.parse(document.getElementById('data').textContent);
        const root = document.getElementById('content');

        const postId = (data.meta && data.meta.id) ? String(data.meta.id) : '';
        const postStatusRaw = (data.meta && data.meta.status) ? String(data.meta.status) : '';
        if (postId || postStatusRaw) {
            const header = document.getElementById('post-header');
            let sectionEl = header.querySelector('p.section');
            if (!sectionEl) {
                sectionEl = document.createElement('p');
                sectionEl.className = 'section';
                header.insertBefore(sectionEl, header.firstChild);
            }
            // Status pill goes first, then a " / " separator before the existing
            // content (section name and/or id).
            if (postStatusRaw) {
                const parts = postStatusRaw.split(':');
                const statusName = parts[0].trim();
                const statusColor = (parts[1] || '').trim();
                const wrap = document.createElement('span');
                wrap.className = 'post-status';
                const dot = document.createElement('span');
                dot.className = 'status-dot';
                if (statusColor) dot.style.background = statusColor;
                wrap.appendChild(dot);
                wrap.appendChild(document.createTextNode(statusName));
                if (sectionEl.firstChild) {
                    sectionEl.insertBefore(document.createTextNode(' • '), sectionEl.firstChild);
                    sectionEl.insertBefore(wrap, sectionEl.firstChild);
                } else {
                    sectionEl.appendChild(wrap);
                }
            }
            if (postId) {
                if (sectionEl.firstChild) sectionEl.appendChild(document.createTextNode(' • '));
                sectionEl.appendChild(document.createTextNode(postId));
            }
        }

        const tagsHost = document.getElementById('tags');
        (data.tags || []).forEach(function (t) {
            const span = document.createElement('span');
            span.className = 'tag';
            span.textContent = t;
            tagsHost.appendChild(span);
        });

        // Minimal markdown renderer. Supports: ATX headings, paragraphs, blockquotes,
        // unordered/ordered lists, fenced code, inline code, bold/italic/strikethrough, links, images, hr.
        // Sufficient for the posts in this repo; replace with a fuller parser if needed.
        function renderMarkdown(src) {
            const lines = src.replace(/\r\n/g, '\n').split('\n');
            const out = [];
            let i = 0;

            const bullet = /^(\s*)([-*])\s+(.*)$/;
            const ordered = /^(\s*)(\d+)\.\s+(.*)$/;
            const tableRow = /^\s*\|(.+)\|\s*$/;
            const tableSep = /^\s*\|?\s*:?-{3,}:?\s*(\|\s*:?-{3,}:?\s*)+\|?\s*$/;

            function splitRow(s) {
                let t = s.trim();
                if (t.startsWith('|')) t = t.slice(1);
                if (t.endsWith('|')) t = t.slice(0, -1);
                return t.split('|').map(c => c.trim());
            }

            function inline(s) {
                // Posts are trusted content, so raw HTML passes through unescaped
                // (some posts embed inline <blockquote>, <div>, etc.).
                // Stray ampersands still get fixed up.
                s = s.replace(/&(?![a-zA-Z]+;|#\d+;)/g, '&amp;');
                s = s.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img alt="$1" src="$2">');
                s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
                s = s.replace(/`([^`]+)`/g, function (_, c) {
                    return '<code>' + c.replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</code>';
                });
                s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
                s = s.replace(/~~([^~\n]+)~~/g, '<del>$1</del>');
                s = s.replace(/(^|[^*])\*([^*\n]+)\*/g, '$1<em>$2</em>');
                return s;
            }

            while (i < lines.length) {
                const line = lines[i];
                if (!line.trim()) {
                    i++;
                    continue;
                }

                const fence = line.match(/^```(\w*)\s*$/);
                if (fence) {
                    i++;
                    const buf = [];
                    while (i < lines.length && !/^```\s*$/.test(lines[i])) {
                        buf.push(lines[i]);
                        i++;
                    }
                    i++;
                    const escaped = buf.join('\n').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                    const cls = fence[1] ? ' class="lang-' + fence[1] + '"' : '';
                    out.push('<pre><code' + cls + '>' + escaped + '</code></pre>');
                    continue;
                }

                const h = line.match(/^(#{1,6})\s+(.*)$/);
                if (h) {
                    out.push('<h' + h[1].length + '>' + inline(h[2]) + '</h' + h[1].length + '>');
                    i++;
                    continue;
                }

                if (/^\s*(?:-\s*){3,}\s*$/.test(line) || /^\s*\*{3,}\s*$/.test(line)) {
                    out.push('<hr>');
                    i++;
                    continue;
                }

                if (/^>\s?/.test(line)) {
                    const buf = [];
                    while (i < lines.length && /^>\s?/.test(lines[i])) {
                        buf.push(lines[i].replace(/^>\s?/, ''));
                        i++;
                    }
                    out.push('<blockquote>' + renderMarkdown(buf.join('\n')) + '</blockquote>');
                    continue;
                }

                if (tableRow.test(line) && i + 1 < lines.length && tableSep.test(lines[i + 1])) {
                    const headers = splitRow(line);
                    i += 2;
                    const rows = [];
                    while (i < lines.length && tableRow.test(lines[i])) {
                        rows.push(splitRow(lines[i]));
                        i++;
                    }
                    let html = '<table><thead><tr>';
                    headers.forEach(h => {
                        html += '<th>' + inline(h) + '</th>';
                    });
                    html += '</tr></thead><tbody>';
                    rows.forEach(r => {
                        html += '<tr>';
                        r.forEach(c => {
                            html += '<td>' + inline(c) + '</td>';
                        });
                        html += '</tr>';
                    });
                    html += '</tbody></table>';
                    out.push(html);
                    continue;
                }

                if (bullet.test(line) || ordered.test(line)) {
                    // Indent of the first bullet defines this list's base level.
                    // Deeper-indented bullets become nested lists (rendered by
                    // recursing into renderMarkdown). Same-or-less indent at a
                    // bullet starts a sibling item (or ends the list).
                    const firstMatch = line.match(bullet) || line.match(ordered);
                    const baseIndent = firstMatch[1].length;
                    const isOrdered = ordered.test(line);
                    const items = [];
                    while (i < lines.length) {
                        const cur = lines[i];
                        if (!cur.trim()) {
                            // blank line breaks the list (matches CommonMark-ish behaviour)
                            i++;
                            break;
                        }
                        const mBul = cur.match(bullet);
                        const mOrd = cur.match(ordered);
                        const m = mBul || mOrd;
                        if (!m) break;
                        if (m[1].length < baseIndent) break;
                        if (m[1].length > baseIndent) break; // shouldn't happen at top of loop
                        // Same-type check: switching between -/* and 1. closes the list
                        if (isOrdered !== !!mOrd) break;

                        const itemBuf = [m[3]];
                        const nestedBuf = [];
                        i++;
                        while (i < lines.length) {
                            const nxt = lines[i];
                            if (!nxt.trim()) break;
                            const nBul = nxt.match(bullet);
                            const nOrd = nxt.match(ordered);
                            const nm = nBul || nOrd;
                            if (nm) {
                                if (nm[1].length > baseIndent) {
                                    // nested list line — dedent and stash
                                    nestedBuf.push(nxt.slice(baseIndent + 2));
                                    i++;
                                    continue;
                                }
                                // sibling or end of list
                                break;
                            }
                            // Plain continuation text
                            if (nestedBuf.length) {
                                // continuation inside the nested block
                                nestedBuf.push(nxt.slice(baseIndent + 2));
                            } else {
                                itemBuf.push(nxt.trim());
                            }
                            i++;
                        }

                        let liHtml = inline(itemBuf.join('\n'));
                        if (nestedBuf.length) {
                            liHtml += renderMarkdown(nestedBuf.join('\n'));
                        }
                        items.push('<li>' + liHtml + '</li>');
                    }
                    out.push((isOrdered ? '<ol>' : '<ul>') + items.join('') + (isOrdered ? '</ol>' : '</ul>'));
                    continue;
                }

                const buf = [line];
                i++;
                while (i < lines.length && lines[i].trim() && !/^#{1,6}\s/.test(lines[i]) && !/^>\s?/.test(lines[i]) && !bullet.test(lines[i]) && !ordered.test(lines[i]) && !/^```/.test(lines[i]) && !tableRow.test(lines[i])) {
                    buf.push(lines[i]);
                    i++;
                }
                out.push('<p>' + inline(buf.join(' ')) + '</p>');
            }
            return out.join('\n');
        }

        // Block dispatcher. New block types plug in here.
        const renderers = {
            markdown: function (block) {
                const div = document.createElement('div');
                div.innerHTML = renderMarkdown(block.content);
                return div;
            },
            mermaid: function (block) {
                // Mermaid scans elements with class "mermaid" whose textContent
                // is the diagram source. We collect these nodes and run
                // mermaid.run() once after all blocks are in the DOM.
                const div = document.createElement('div');
                div.className = 'mermaid';
                div.textContent = block.content;
                return div;
            },
            'force-graph': function (block) {
                // build.py emits parsed JSON: {nodes:[{id,size}], links:[{source,target}]}.
                // We instantiate force-graph after the container is in the DOM
                // so it can measure its own width.
                const div = document.createElement('div');
                div.className = 'force-graph';
                const data = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.ForceGraph) return;
                    const maxSize = data.nodes.reduce((m, n) => Math.max(m, n.size || 1), 1);
                    window.ForceGraph()(div)
                        .graphData(data)
                        .width(div.clientWidth)
                        .height(div.clientHeight)
                        .nodeRelSize(4)
                        .nodeVal(n => Math.max(20 * (n.size || 1) / maxSize, 0.001))
                        .nodeLabel(n => n.id + ' (' + (n.size || 1) + ')')
                        .nodeColor(() => 'rgba(135, 206, 235, 0.7)')
                        .linkColor(() => 'rgba(60, 60, 60, 0.4)')
                        .linkDirectionalArrowLength(4)
                        .linkDirectionalArrowRelPos(1)
                        .linkWidth(1);
                });
                return div;
            },
            'bubble-chart': function (block) {
                // build.py emits {nodes:[{name,size}]}. Renders a D3 circle-pack
                // SVG (same shape as the obren.io reference, just inline).
                const wrap = document.createElement('div');
                wrap.className = 'bubble-chart';
                const payload = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.d3) return;
                    const diameter = 480;
                    const fill = '#c0deed';
                    const textColor = '#111111';
                    const fontSize = 12;

                    const svg = window.d3.select(wrap).append('svg')
                        .attr('viewBox', '0 0 ' + diameter + ' ' + diameter)
                        .attr('width', diameter)
                        .attr('height', diameter);

                    const root = window.d3.hierarchy({children: payload.nodes})
                        .sum(d => d.size || 0)
                        .sort((a, b) => b.value - a.value);

                    window.d3.pack().size([diameter, diameter]).padding(2)(root);

                    const node = svg.selectAll('g')
                        .data(root.leaves())
                        .enter().append('g')
                        .attr('transform', d => 'translate(' + d.x + ',' + d.y + ')');

                    node.append('title').text(d => d.data.name + ': ' + d.value);
                    node.append('circle').attr('r', d => d.r).style('fill', fill);
                    node.append('text')
                        .attr('dy', '.3em')
                        .style('text-anchor', 'middle')
                        .style('fill', textColor)
                        .style('font-size', fontSize + 'px')
                        .text(d => d.data.name.substring(0, Math.max(0, Math.floor(d.r / 3))));
                });
                return wrap;
            }
        };

        const mermaidNodes = [];
        data.blocks.forEach(function (block) {
            const r = renderers[block.type];
            if (!r) {
                const pre = document.createElement('pre');
                pre.textContent = '[unknown block type: ' + block.type + ']';
                root.appendChild(pre);
                return;
            }
            const node = r(block);
            if (node instanceof Node) {
                root.appendChild(node);
                if (block.type === 'mermaid') mermaidNodes.push(node);
            }
        });

        if (mermaidNodes.length && window.mermaid) {
            window.mermaid.initialize({startOnLoad: false, theme: 'default'});
            window.mermaid.run({nodes: mermaidNodes});
        }
    })();
</script>
</body>
</html>
