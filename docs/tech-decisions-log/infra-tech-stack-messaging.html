<script id="data" type="application/json">{"meta": {"id": "ORG-SD-BACK-MESSAGING", "status": "draft:gray", "title": "Messaging Infrastructure: Standardize on Amazon MSK as the Kafka Backbone", "date": "2026-05-15", "author": "Organization Tech Strategy", "permalink": "infra-tech-stack-messaging", "timetoread": "12 min", "excerpt": "Organization will use Amazon MSK (Managed Streaming for Apache Kafka) as the strategic messaging backbone for its backend stack. Kafka is chosen for its durable log model, broad applicability across event streaming, asynchronous integration, replay, and analytics use cases. MSK is preferred over self-managed Kafka and Confluent Cloud because it stays inside the AVIV Group AWS contract and operating model. Organization explicitly accepts that Kafka is a new technology stack with very little in-house expertise today, and treats building that expertise as part of the cost of this decision.", "tags": "backend, messaging, kafka", "icon": "assets/icons/infra-tech-stack-messaging.png", "logo": "assets/images/infra-tech-stack-messaging/logo.jpeg", "logo_credit": "Image generated by Google Gemini (gemini-3-pro-image-preview)"}, "tags": ["backend", "messaging", "kafka"], "blocks": [{"type": "markdown", "content": "> **Status**: DRAFT\n>\n> **Decision**: Organization will use Amazon MSK as the strategic Kafka backbone for backend messaging. Kafka topics on MSK become the default for durable event streams, asynchronous service-to-service integration, replay, and analytics-facing event flows. SQS, SNS, and EventBridge remain available for narrow use cases, but they are not the strategic messaging backbone. Building Kafka expertise is an explicit cost of this decision.\n\n## Decision\n\nAdopt **Amazon MSK** as Organization's strategic backend messaging platform.\n\nConcretely:\n\n* Durable business events and multi-consumer event streams default to Kafka topics on MSK.\n* Organization consumes Kafka as an AWS managed service, not as self-managed Kafka and not through a third-party Kafka vendor by default.\n* Kafka clients run from the standard backend compute model in [Compute Infrastructure: Standardize on Docker, ECS Fargate, and Ubuntu Base Images](infra-tech-stack-compute.html).\n* SQS, SNS, and EventBridge remain available for narrow patterns where Kafka would add unnecessary weight.\n* Self-managed Kafka, Confluent Cloud, Kinesis, Pulsar, and other streaming platforms are not defaults.\n\nThis decision builds on the AWS cloud decision, [Public Cloud: Consolidate on AWS via AVIV Group Contract](infra-tech-aws.html), and the compute decision, [Compute Infrastructure: Standardize on Docker, ECS Fargate, and Ubuntu Base Images](infra-tech-stack-compute.html). It defines the strategic messaging backbone; it does not define every topic convention, schema format, library, or migration sequence.\n\n## How to Use This Decision\n\nUse this ADR before introducing asynchronous integration:\n\n| Question | Default answer |\n| --- | --- |\n| Is this a durable business event useful to multiple current or future consumers? | Use Kafka on MSK. |\n| Does the flow need replay, late-joining consumers, analytics consumption, or independent consumer groups? | Use Kafka on MSK. |\n| Is this a private work queue for one logical worker group with no event-history value? | SQS may fit. |\n| Is this simple fan-out to AWS-native targets without replay needs? | SNS may fit. |\n| Is this AWS-service event routing, SaaS event routing, or a schedule? | EventBridge may fit. |\n| Does the caller need an immediate answer? | Use an API, not messaging by default. |\n| Is this a long-running business workflow with state, timers, and compensation? | Use a workflow pattern; do not hide workflow state in Kafka consumers. |\n\nKafka is the backbone for event logs, not a universal replacement for every communication pattern.\n\n## Why This Default\n\nOrganization needs durable, replayable, multi-consumer event streams for backend integration and analytics-facing flows. Kafka's model fits that shape better than assembling a backbone from SQS, SNS, and EventBridge.\n\nMSK is chosen because it keeps Kafka inside the AVIV Group AWS contract and operating model while avoiding self-managed broker operations. AWS operates the managed service foundation. Organization still owns topic design, schemas, access, producers, consumers, lag, replay, and incident response.\n\nThe main risk is skill. Kafka is new to Organization and only lightly used elsewhere in AVIV Group. This ADR deliberately accepts a skills-investment cost instead of hiding it.\n\n## What Kafka Means Here\n\nKafka should be used for events that read like business facts, not implementation commands. A good event has:\n\n| Concern | Expectation |\n| --- | --- |\n| Meaning | The event describes something that already happened. |\n| Ownership | A producer owns event meaning, schema compatibility, and support path. |\n| Schema | Payload structure is versioned and compatibility is checked. |\n| Partition key | Ordering and load distribution are deliberate design choices. |\n| Retention | The replay window is explicit and tied to business, analytics, compliance, and cost needs. |\n| Consumers | Consumer groups own idempotent processing, offset handling, lag monitoring, and replay readiness. |\n| Failure path | Poison events, retries, dead-letter handling, and replay are designed before production use. |\n\nKafka mechanics become architecture decisions. Ordering is per partition. At-least-once processing is normal. Replay can duplicate side effects. Consumer lag is often a business signal, not only an infrastructure metric.\n\n## Consequences\n\n### Positive\n\n* Organization gets one strategic messaging backbone for durable event streams.\n* Event replay, independent consumers, and analytics-facing consumption become first-class patterns.\n* MSK removes most broker-operations burden compared with self-managed Kafka.\n* The platform stays inside the AVIV Group AWS contract and central AWS operating model.\n* Kafka clients align with the ECS Fargate compute standard in [Compute Infrastructure: Standardize on Docker, ECS Fargate, and Ubuntu Base Images](infra-tech-stack-compute.html).\n* Messaging investment can concentrate on one platform, one set of conventions, and one education path.\n\n### Negative\n\n* Kafka has a steeper learning curve than SQS, SNS, or EventBridge.\n* Organization has limited in-house Kafka expertise today; training, templates, reviews, and runbooks are part of the cost.\n* MSK has a cluster cost floor and may be expensive for very low-volume tactical flows.\n* Even on MSK, Organization owns topic governance, schemas, ACLs, client patterns, monitoring, and incident response.\n* MSK is AWS-specific. Moving to another Kafka delivery model later is possible at the protocol level but not operationally free.\n* \"Kafka by default\" can become overuse unless the SQS/SNS/EventBridge boundary is actively reviewed.\n\n## What This Means for Teams\n\n* Design durable business events as Kafka events by default.\n* Do not create a topic until owner, event meaning, schema, partition key, retention, access control, monitoring, and failure handling are clear.\n* Producers own event meaning and compatibility.\n* Consumers own idempotency, offset commits, lag monitoring, retry behavior, and replay safety.\n* Use recommended producer and consumer patterns rather than raw client usage everywhere.\n* Use SQS, SNS, or EventBridge only when the flow is truly simpler outside Kafka, and document the reason.\n* Treat Kafka literacy, runbooks, schema review, topic inventory, and incident drills as part of delivery, not optional enablement.\n\n## Responsibility Boundary\n\n| Area | Platform / enablement teams | Product / domain teams |\n| --- | --- | --- |\n| MSK foundation | Provide clusters, network access, access mechanisms, baseline monitoring, and upgrade guidance. | Consume the approved platform rather than creating parallel Kafka infrastructure. |\n| Topic governance | Define naming, metadata, retention defaults, lifecycle rules, and review workflow. | Own event purpose, event meaning, consumers, and deprecation decisions. |\n| Schemas | Provide schema tooling and compatibility checks. | Own schema evolution and compatibility with real consumers. |\n| Client patterns | Provide recommended producer and consumer examples. | Use the patterns consistently and surface gaps. |\n| Observability | Provide broker dashboards and standard alert templates. | Add service-level and business-level alerts for producer and consumer behavior. |\n| Incident response | Own cluster-level runbooks. | Own domain incidents caused by bad events, consumer failures, lag, and replay effects. |\n\n## Exception Criteria\n\nAn exception to Kafka on MSK should explain:\n\n* the integration shape that Kafka does not serve well;\n* the alternative service and why it is simpler or safer for this flow;\n* who owns operations, monitoring, access control, retries, failure handling, and cost;\n* whether the flow needs replay, late-joining consumers, analytics, or independent consumer evolution;\n* the security and data classification model;\n* when the exception will be revisited.\n\nExamples of likely valid exceptions:\n\n* SQS for a private work queue with one logical consumer group and no replay or fan-out requirement;\n* SNS for simple pub/sub fan-out to AWS-native subscribers where durable replay is not needed;\n* EventBridge for AWS service events, SaaS events, schedules, or simple integration rules;\n* direct API calls for request/response interactions;\n* workflow tooling for long-running business processes with explicit state, timers, retries, or compensation.\n\n## Considered Options\n\n| Option | Assessment |\n| --- | --- |\n| **Amazon MSK as Kafka backbone** | Chosen. Best fit for durable event logs, replay, independent consumers, AWS alignment, and mainstream Kafka clients. |\n| **SQS + SNS + EventBridge as backbone** | Excellent tactical tools, but not one coherent durable event-log backbone. |\n| **Self-managed Kafka** | Maximum control, but too much broker-operations burden for Organization's desired model. |\n| **Confluent Cloud / Platform** | Strong Kafka-native feature set, but introduces a separate vendor and commercial model outside the AVIV AWS path. |\n| **Kinesis Data Streams** | AWS-native streaming, but narrower ecosystem and stronger AWS-specific API lock-in than Kafka. |\n\n## Scope and Revisiting\n\nIn scope:\n\n* durable business events;\n* event streams with multiple independent consumers;\n* asynchronous backend service integration;\n* analytics-facing event flows;\n* Kafka producer and consumer operation.\n\nOut of scope:\n\n* workflow orchestration;\n* in-process pub/sub inside one service;\n* real-time client-facing transport such as WebSockets or push notifications;\n* database change-data-capture sources except where they feed Kafka topics;\n* detailed topic naming, schema registry, serialization, and client-library standards.\n\nRevisit this decision if:\n\n* actual messaging patterns are dominated by low-volume flows that Kafka does not serve well;\n* MSK cost or operations materially worsen relative to alternatives;\n* AVIV Group changes its AWS operating model in a way that affects MSK;\n* Kafka expertise does not materialize after a defined evaluation period;\n* teams repeatedly need SQS, SNS, EventBridge, or workflow exceptions in ways that suggest the backbone boundary is wrong.\n\n## Authoritative References\n\n* [Amazon MSK documentation](https://docs.aws.amazon.com/msk/latest/developerguide/what-is-msk.html).\n* [Apache Kafka documentation](https://kafka.apache.org/documentation/).\n* [AWS Glue Schema Registry documentation](https://docs.aws.amazon.com/glue/latest/dg/schema-registry.html).\n* [Amazon SQS documentation](https://docs.aws.amazon.com/AWSSimpleQueueService/latest/SQSDeveloperGuide/welcome.html).\n* [Amazon SNS documentation](https://docs.aws.amazon.com/sns/latest/dg/welcome.html).\n* [Amazon EventBridge documentation](https://docs.aws.amazon.com/eventbridge/latest/userguide/eb-what-is.html).\n* [Amazon Kinesis Data Streams documentation](https://docs.aws.amazon.com/streams/latest/dev/introduction.html).\n* [Confluent Schema Registry documentation](https://docs.confluent.io/platform/current/schema-registry/index.html).\n\n## Appendix: Vocabulary\n\n\n\n| Term | Meaning in this ADR |\n| --- | --- |\n| **Event** | A record of a business or system fact that already happened. |\n| **Command** | A request for another component to do something. |\n| **Topic** | A named Kafka log that stores related events. |\n| **Partition** | An ordered subset of a Kafka topic. |\n| **Partition key** | The value used to choose the partition for an event. |\n| **Consumer group** | A named group of consumers that share work and track offsets together. |\n| **Offset** | A consumer group's position in a topic partition. |\n| **Retention** | How long Kafka keeps records in a topic. |\n| **Schema** | The versioned contract for event payload structure. |\n| **Producer** | The service that publishes events. |\n| **Consumer** | The service or job that reads events. |\n| **Consumer lag** | The distance between latest available records and what a consumer group has processed. |\n| **Idempotency** | The ability to process the same event more than once without incorrect side effects. |\n| **Replay** | Re-reading older records from a topic. |\n| **Dead-letter path** | The agreed handling path for events that cannot be processed. |\n| **Transactional outbox** | A pattern that writes state changes and outbound events through one reliable path. |\n"}]}</script>

    (function () {

        // Minimal markdown renderer. Supports: ATX headings, paragraphs, blockquotes,
        // unordered/ordered lists, fenced code, inline code, bold/italic/strikethrough, links, images, hr.
        // Sufficient for the posts in this repo; replace with a fuller parser if needed.
        function renderMarkdown(src) {
            const lines = src.replace(/\r\n/g, '\n').split('\n');
            const out = [];
            let i = 0;

            const bullet = /^(\s*)([-*])\s+(.*)$/;
            const ordered = /^(\s*)(\d+)\.\s+(.*)$/;
            const tableRow = /^\s*\|(.+)\|\s*$/;
            const tableSep = /^\s*\|?\s*:?-{3,}:?\s*(\|\s*:?-{3,}:?\s*)+\|?\s*$/;

            function splitRow(s) {
                let t = s.trim();
                if (t.startsWith('|')) t = t.slice(1);
                if (t.endsWith('|')) t = t.slice(0, -1);
                return t.split('|').map(c => c.trim());
            }

            function inline(s) {
                // Posts are trusted content, so raw HTML passes through unescaped
                // (some posts embed inline <blockquote>, <div>, etc.).
                // Stray ampersands still get fixed up.
                s = s.replace(/&(?![a-zA-Z]+;|#\d+;)/g, '&amp;');
                s = s.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<a class="image-link" href="$2" target="_blank" rel="noopener noreferrer"><img alt="$1" src="$2"></a>');
                s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
                s = s.replace(/`([^`]+)`/g, function (_, c) {
                    return '<code>' + c.replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</code>';
                });
                s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
                s = s.replace(/~~([^~\n]+)~~/g, '<del>$1</del>');
                s = s.replace(/(^|[^*])\*([^*\n]+)\*/g, '$1<em>$2</em>');
                return s;
            }

            while (i < lines.length) {
                const line = lines[i];
                if (!line.trim()) {
                    i++;
                    continue;
                }

                const fence = line.match(/^```(\w*)\s*$/);
                if (fence) {
                    i++;
                    const buf = [];
                    while (i < lines.length && !/^```\s*$/.test(lines[i])) {
                        buf.push(lines[i]);
                        i++;
                    }
                    i++;
                    const escaped = buf.join('\n').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                    const cls = fence[1] ? ' class="lang-' + fence[1] + '"' : '';
                    out.push('<pre><code' + cls + '>' + escaped + '</code></pre>');
                    continue;

                const h = line.match(/^(#{1,6})\s+(.*)$/);
                if (h) {
                    out.push('<h' + h[1].length + '>' + inline(h[2]) + '</h' + h[1].length + '>');
                    i++;
                    continue;
                }

                if (/^\s*(?:-\s*){3,}\s*$/.test(line) || /^\s*\*{3,}\s*$/.test(line)) {
                    out.push('<hr>');
                    i++;
                    continue;
                }

                if (/^>\s?/.test(line)) {
                    const buf = [];
                    while (i < lines.length && /^>\s?/.test(lines[i])) {
                        buf.push(lines[i].replace(/^>\s?/, ''));
                        i++;
                    }
                    out.push('<blockquote>' + renderMarkdown(buf.join('\n')) + '</blockquote>');
                    continue;
                }

                if (tableRow.test(line) && i + 1 < lines.length && tableSep.test(lines[i + 1])) {
                    const headers = splitRow(line);
                    i += 2;
                    const rows = [];
                    while (i < lines.length && tableRow.test(lines[i])) {
                        rows.push(splitRow(lines[i]));
                        i++;
                    }
                    let html = '<table><thead><tr>';
                    headers.forEach(h => {
                        html += '<th>' + inline(h) + '</th>';
                    });
                    html += '</tr></thead><tbody>';
                    rows.forEach(r => {
                        html += '<tr>';
                        r.forEach(c => {
                            html += '<td>' + inline(c) + '</td>';
                        });
                        html += '</tr>';
                    });
                    html += '</tbody></table>';
                    out.push(html);
                    continue;
                }

                if (bullet.test(line) || ordered.test(line)) {
                    // Indent of the first bullet defines this list's base level.
                    // Deeper-indented bullets become nested lists (rendered by
                    // recursing into renderMarkdown). Same-or-less indent at a
                    // bullet starts a sibling item (or ends the list).
                    const firstMatch = line.match(bullet) || line.match(ordered);
                    const baseIndent = firstMatch[1].length;
                    const isOrdered = ordered.test(line);
                    const items = [];
                    while (i < lines.length) {
                        const cur = lines[i];
                        if (!cur.trim()) {

                            i++;

                        const mBul = cur.match(bullet);
                        const mOrd = cur.match(ordered);
                        const m = mBul || mOrd;
                        if (!m) break;
                        if (m[1].length < baseIndent) break;
                        if (m[1].length > baseIndent) break; // shouldn't happen at top of loop
                        // Same-type check: switching between -/* and 1. closes the list
                        if (isOrdered !== !!mOrd) break;

                        const itemBuf = [m[3]];
                        const nestedBuf = [];
                        i++;
                        while (i < lines.length) {
                            const nxt = lines[i];
                            if (!nxt.trim()) break;
                            const nBul = nxt.match(bullet);
                            const nOrd = nxt.match(ordered);
                            const nm = nBul || nOrd;
                            if (nm) {
                                if (nm[1].length > baseIndent) {
                                    // nested list line — dedent and stash
                                    nestedBuf.push(nxt.slice(baseIndent + 2));
                                    i++;
                                    continue;
                                }
                                // sibling or end of list
                                break;
                            }
                            // Plain continuation text
                            if (nestedBuf.length) {
                                // continuation inside the nested block
                                nestedBuf.push(nxt.slice(baseIndent + 2));
                            } else {
                                itemBuf.push(nxt.trim());
                            }
                            i++;
                        }

                        let liHtml = inline(itemBuf.join('\n'));
                        if (nestedBuf.length) {
                            liHtml += renderMarkdown(nestedBuf.join('\n'));
                        }
                        items.push('<li>' + liHtml + '</li>');
                    }
                    out.push((isOrdered ? '<ol>' : '<ul>') + items.join('') + (isOrdered ? '</ol>' : '</ul>'));
                    continue;
                }

                const buf = [line];
                i++;
                while (i < lines.length && lines[i].trim() && !/^#{1,6}\s/.test(lines[i]) && !/^>\s?/.test(lines[i]) && !bullet.test(lines[i]) && !ordered.test(lines[i]) && !/^```/.test(lines[i]) && !tableRow.test(lines[i])) {
                    buf.push(lines[i]);
                    i++;
                }
                out.push('<p>' + inline(buf.join(' ')) + '</p>');
            }
            return out.join('\n');
        }

        // Block dispatcher. New block types plug in here.
        const renderers = {
            markdown: function (block) {
                const div = document.createElement('div');
                div.innerHTML = renderMarkdown(block.content);
                return div;
            },
            mermaid: function (block) {
                // Mermaid scans elements with class "mermaid" whose textContent
                // is the diagram source. We collect these nodes and run
                // mermaid.run() once after all blocks are in the DOM.
                const div = document.createElement('div');
                div.className = 'mermaid';
                div.textContent = block.content;
                return div;
            },
            'force-graph': function (block) {
                // build.py emits parsed JSON: {nodes:[{id,size}], links:[{source,target}]}.
                // We instantiate force-graph after the container is in the DOM
                // so it can measure its own width.
                const div = document.createElement('div');
                div.className = 'force-graph';
                const data = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.ForceGraph) return;
                    const maxSize = data.nodes.reduce((m, n) => Math.max(m, n.size || 1), 1);
                    window.ForceGraph()(div)
                        .graphData(data)
                        .width(div.clientWidth)
                        .height(div.clientHeight)
                        .nodeRelSize(4)
                        .nodeVal(n => Math.max(20 * (n.size || 1) / maxSize, 0.001))
                        .nodeLabel(n => n.id + ' (' + (n.size || 1) + ')')
                        .nodeColor(() => 'rgba(135, 206, 235, 0.7)')
                        .linkColor(() => 'rgba(60, 60, 60, 0.4)')
                        .linkDirectionalArrowLength(4)
                        .linkDirectionalArrowRelPos(1)
                        .linkWidth(1);
                });
                return div;
            },
            'bubble-chart': function (block) {
                // build.py emits {nodes:[{name,size}]}. Renders a D3 circle-pack
                // SVG (same shape as the obren.io reference, just inline).
                const wrap = document.createElement('div');
                wrap.className = 'bubble-chart';
                const payload = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.d3) return;
                    const diameter = 480;
                    const fill = '#c0deed';
                    const textColor = '#111111';
                    const fontSize = 12;

                    const svg = window.d3.select(wrap).append('svg')
                        .attr('viewBox', '0 0 ' + diameter + ' ' + diameter)
                        .attr('width', diameter)
                        .attr('height', diameter);

                    const root = window.d3.hierarchy({children: payload.nodes})
                        .sum(d => d.size || 0)
                        .sort((a, b) => b.value - a.value);

                    window.d3.pack().size([diameter, diameter]).padding(2)(root);

                    const node = svg.selectAll('g')
                        .data(root.leaves())
                        .enter().append('g')
                        .attr('transform', d => 'translate(' + d.x + ',' + d.y + ')');

                    node.append('title').text(d => d.data.name + ': ' + d.value);
                    node.append('circle').attr('r', d => d.r).style('fill', fill);
                    node.append('text')
                        .attr('dy', '.3em')
                        .style('text-anchor', 'middle')
                        .style('fill', textColor)
                        .style('font-size', fontSize + 'px')
                        .text(d => d.data.name.substring(0, Math.max(0, Math.floor(d.r / 3))));
                });
                return wrap;
            }
        };

        const mermaidNodes = [];
        data.blocks.forEach(function (block) {
            const r = renderers[block.type];
            if (!r) {
                const pre = document.createElement('pre');
                pre.textContent = '[unknown block type: ' + block.type + ']';
                root.appendChild(pre);
                return;
            }
            const node = r(block);
            if (node instanceof Node) {
                root.appendChild(node);
                if (block.type === 'mermaid') mermaidNodes.push(node);
            }
        });

        if (mermaidNodes.length && window.mermaid) {
            window.mermaid.initialize({startOnLoad: false, theme: 'default'});
            window.mermaid.run({nodes: mermaidNodes});
        }
    })();
</script>
</body>
</html>
