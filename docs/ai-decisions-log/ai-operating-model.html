<script id="data" type="application/json">{"meta": {"id": "ORG-SD-AI-OPERATING-MODEL", "status": "draft:gray", "title": "AI Operating Model: Dedicated AI Engineering Enablement Function", "date": "2026-05-15", "author": "Organization Tech Strategy", "permalink": "ai-operating-model", "timetoread": "11 min", "excerpt": "Organization establishes a dedicated AI Engineering Enablement function that owns the shared AI developer platform: Claude Code defaults, CLAUDE.md templates, Skills, MCP and subagent registries, policy controls, exception process, adoption support, incident coordination, and the six-month review cycle. Product teams retain delivery accountability; enablement owns shared primitives, not product features.", "tags": "ai, claude-code, platform", "icon": "assets/icons/ai-operating-model.png", "logo": "assets/images/ai-operating-model/logo.jpeg", "logo_credit": "Image generated by Google Gemini (gemini-3-pro-image-preview)"}, "tags": ["ai", "claude-code", "platform"], "blocks": [{"type": "markdown", "content": "> **Status**: DRAFT\n>\n> **Decision**: Organization will establish a dedicated AI Engineering Enablement function to own the shared AI developer platform: Claude Code defaults, CLAUDE.md templates, Skills, MCP and subagent registries, policy controls, exception process, adoption support, incident coordination, and the six-month review cycle. Product teams retain delivery accountability; enablement owns shared primitives, not product features.\n\n## Decision\n\nEstablish a dedicated **AI Engineering Enablement** function inside Organization engineering.\n\nThe function owns:\n\n* the Claude Code default platform defined in [AI Developer Tooling: Claude Code as the Default Agent Platform for 2026](ai-tooling.html);\n* shared CLAUDE.md templates, settings, hooks, Skills, MCP servers, subagents, examples, and onboarding material;\n* approved registries for tools, MCP servers, Skills, subagents, exceptions, and review dates;\n* translation of [AI Coding Policy: Human Accountability with Executable Controls](ai-policy.html) into executable settings, hooks, allowlists, CI gates, registries, and review guidance;\n* the exception process for non-default tools and non-standard configurations;\n* adoption support, office hours, contribution paths, incident coordination, and disablement paths;\n* the six-month review cycle for tooling, policy, standards, incidents, exceptions, value, and cost.\n\nProduct teams retain accountability for code, services, tests, pull requests, local guidance, production outcomes, and AI-assisted changes they accept.\n\nThis is a platform operating model, not an AI center that does product teams' work.\n\n## How to Use This Decision\n\nUse this ADR when deciding who owns an AI developer-platform concern:\n\n| Question | Default owner |\n| --- | --- |\n| Shared Claude Code baseline, settings, hooks, templates, and registries? | AI Engineering Enablement. |\n| Repository-local CLAUDE.md additions and local checks? | Product team, within the shared baseline. |\n| Shared Skills, MCP servers, and subagents? | AI Engineering Enablement, with contributors from teams. |\n| Local one-off Skill or guidance for one repository? | Product team, unless it should become shared. |\n| AI-assisted pull request quality and merge decision? | Product team. |\n| Tool exception, MCP intake, or high-risk shared capability? | AI Engineering Enablement with Security/Legal/Privacy where needed. |\n| AI incident involving tool disablement or policy controls? | AI Engineering Enablement coordinates; affected teams own service impact. |\n\nThe function should make the safe path easier than local invention.\n\n## Why This Default\n\nThe AI tooling and policy decisions need an owner. Without one, Skills, MCP servers, hooks, templates, and exceptions drift across teams; policy becomes inconsistent; reviews are anecdotal; and incident response is slow.\n\nDedicated enablement is chosen because shared AI developer tooling behaves like an internal platform. It needs:\n\n* maintained defaults;\n* authoritative registries;\n* executable controls;\n* contribution intake;\n* support and onboarding;\n* incident disablement paths;\n* regular evidence-based review.\n\nA guild can help, but part-time coordination is not enough for controls, registries, incidents, and six-month reviews.\n\n## Operating Commitments\n\nThe function should keep a narrow, useful service catalog:\n\n| Service | Expected output |\n| --- | --- |\n| Repository onboarding | Baseline CLAUDE.md, settings, hooks, approved Skills/subagents, PR evidence guidance. |\n| MCP intake | Review, scope, owner, registry entry, audit behavior, and disablement path. |\n| Skill/subagent review | Acceptance criteria, naming, input/output contract, tool scope, and owner. |\n| Policy-control update | Settings, hooks, allowlists, CI checks, and documentation. |\n| Exception review | Time-bounded approval or rejection with reason and review date. |\n| Team enablement | Office hours, examples, onboarding help, and first-workflow support. |\n| Incident support | Disablement, evidence collection, control updates, and post-incident learning. |\n| Six-month review | Evidence pack, recommendation, accepted changes, retired assets. |\n\nEnablement should measure adoption, reuse, exception lead time, incidents, cost, developer feedback, and retired assets. It should not optimize for generated-code volume.\n\n## Consequences\n\n### Positive\n\n* There is one owner for the shared AI developer platform.\n* Skills, MCP servers, subagents, hooks, and templates can compound across teams.\n* Policy becomes executable faster because one function owns the translation from rule to control.\n* Exceptions have a known owner and review date.\n* Six-month reviews happen with evidence rather than market noise.\n* Product teams get a paved path instead of designing controls from scratch.\n\n### Negative\n\n* Dedicated headcount is required.\n* The function can become a bottleneck if it behaves as an approval queue.\n* Central assets can become stale without ownership and retirement discipline.\n* Boundaries with product teams, Security, Legal, Privacy, and architecture need active maintenance.\n* Fast AI tooling changes may outpace the function unless exception pilots and review evidence stay healthy.\n\n## What This Means for Teams\n\n* Use the shared baseline unless a local deviation is documented.\n* Own the quality, tests, review, and production outcome of AI-assisted changes.\n* Contribute repeated local workflows back to the shared catalog when they are broadly useful.\n* Request MCP servers and non-default tools through the published intake path.\n* Escalate unsafe tool behavior, suspected data leakage, prompt injection, or control bypass immediately.\n* Do not wait for enablement approval for ordinary work inside the approved envelope.\n\n## Considered Options\n\n| Option | Assessment |\n| --- | --- |\n| **Dedicated AI Engineering Enablement function** | Chosen. Provides accountable ownership for shared platform primitives, controls, registries, and reviews. |\n| **Embedded ownership in each product team** | Maximizes local fit, but fragments policy, registries, Skills, MCP governance, and review evidence. |\n| **Federated guild** | Useful as a community layer, but too weak for operational ownership of controls and incidents. |\n| **Vendor-managed enablement** | Can accelerate setup, but puts policy and platform learning outside Organization. |\n\n## Scope and Revisiting\n\nIn scope:\n\n* ownership of the shared AI developer platform;\n* registries, policy controls, exception process, onboarding, incident coordination, and six-month review;\n* contribution paths for shared Skills, MCP servers, subagents, hooks, and templates.\n\nOut of scope:\n\n* end-user product AI features;\n* internal non-engineering AI tools;\n* operating model for production model inference;\n* detailed team-by-team staffing plan;\n* product-team delivery ownership.\n\nReview this operating model every six months, aligned with [AI Developer Tooling: Claude Code as the Default Agent Platform for 2026](ai-tooling.html) and [AI Coding Policy: Human Accountability with Executable Controls](ai-policy.html). The next planned review is **2026-11-15**. Revisit earlier if enablement becomes a bottleneck, an AI incident exposes an ownership gap, the default tooling changes, or Organization engineering is materially restructured.\n\n## Authoritative References\n\n* [NIST AI Risk Management Framework](https://www.nist.gov/itl/ai-risk-management-framework).\n* [OWASP Top 10 for Large Language Model Applications](https://owasp.org/www-project-top-10-for-large-language-model-applications).\n* [OWASP MCP Top 10](https://owasp.org/www-project-mcp-top-10/).\n* [Claude Code documentation](https://docs.anthropic.com/en/docs/claude-code).\n* [Claude Code settings](https://docs.anthropic.com/en/docs/claude-code/settings).\n* [Claude Code hooks](https://docs.anthropic.com/en/docs/claude-code/hooks).\n* [Claude Code subagents](https://docs.anthropic.com/en/docs/claude-code/sub-agents).\n* [Model Context Protocol introduction](https://modelcontextprotocol.io/routing).\n* [Model Context Protocol architecture](https://modelcontextprotocol.io/docs/learn/architecture).\n\n## Appendix: Vocabulary\n\n\n\n| Term | Meaning in this ADR |\n| --- | --- |\n| **Enablement** | Shared defaults, support, patterns, and self-serve paths that help teams move safely. |\n| **Governance** | Rules, registries, controls, evidence, and exception paths. |\n| **Shared primitive** | A reusable platform asset such as a template, Skill, MCP server, subagent, hook, or setting. |\n| **Registry** | Authoritative record of approved tools, Skills, MCP servers, subagents, and exceptions. |\n| **Exception process** | Time-bounded review path for non-default tools or configurations. |\n| **Disablement path** | Operational route for quickly turning off a risky tool, Skill, MCP server, subagent, hook, or scope. |\n| **Six-month review** | Evidence-based review of default tooling, policy, standards, exceptions, incidents, and value. |\n| **Product-team ownership** | Accountability for repository code, tests, review, service operation, and production outcomes. |\n"}]}</script>
<script>
    (function () {
        const data = JSON.parse(document.getElementById('data').textContent);
        const root = document.getElementById('content');

        const postId = (data.meta && data.meta.id) ? String(data.meta.id) : '';
        const postStatusRaw = (data.meta && data.meta.status) ? String(data.meta.status) : '';
        if (postId || postStatusRaw) {
            const header = document.getElementById('post-header');
            let sectionEl = header.querySelector('p.section');
            if (!sectionEl) {
                sectionEl = document.createElement('p');
                sectionEl.className = 'section';
                header.insertBefore(sectionEl, header.firstChild);
            }
            // Status pill goes first, then a " / " separator before the existing
            // content (section name and/or id).
            if (postStatusRaw) {
                const parts = postStatusRaw.split(':');
                const statusName = parts[0].trim();
                const statusColor = (parts[1] || '').trim();
                const wrap = document.createElement('span');
                wrap.className = 'post-status';
                const dot = document.createElement('span');
                dot.className = 'status-dot';
                if (statusColor) dot.style.background = statusColor;
                wrap.appendChild(dot);
                wrap.appendChild(document.createTextNode(statusName));
                if (sectionEl.firstChild) {
                    sectionEl.insertBefore(document.createTextNode(' • '), sectionEl.firstChild);
                    sectionEl.insertBefore(wrap, sectionEl.firstChild);
                } else {
                    sectionEl.appendChild(wrap);
                }
            }
            if (postId) {
                if (sectionEl.firstChild) sectionEl.appendChild(document.createTextNode(' • '));
                sectionEl.appendChild(document.createTextNode(postId));
            }
        }

        const tagsHost = document.getElementById('tags');
        (data.tags || []).forEach(function (t) {
            const span = document.createElement('span');
            span.className = 'tag';
            span.textContent = t;
            tagsHost.appendChild(span);
        });

        // Minimal markdown renderer. Supports: ATX headings, paragraphs, blockquotes,
        // unordered/ordered lists, fenced code, inline code, bold/italic/strikethrough, links, images, hr.
        // Sufficient for the posts in this repo; replace with a fuller parser if needed.
        function renderMarkdown(src) {
            const lines = src.replace(/\r\n/g, '\n').split('\n');
            const out = [];
            let i = 0;

            const bullet = /^(\s*)([-*])\s+(.*)$/;
            const ordered = /^(\s*)(\d+)\.\s+(.*)$/;
            const tableRow = /^\s*\|(.+)\|\s*$/;
            const tableSep = /^\s*\|?\s*:?-{3,}:?\s*(\|\s*:?-{3,}:?\s*)+\|?\s*$/;

            function splitRow(s) {
                let t = s.trim();
                if (t.startsWith('|')) t = t.slice(1);
                if (t.endsWith('|')) t = t.slice(0, -1);
                return t.split('|').map(c => c.trim());
            }

            function inline(s) {
                // Posts are trusted content, so raw HTML passes through unescaped
                // (some posts embed inline <blockquote>, <div>, etc.).
                // Stray ampersands still get fixed up.
                s = s.replace(/&(?![a-zA-Z]+;|#\d+;)/g, '&amp;');
                s = s.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<a class="image-link" href="$2" target="_blank" rel="noopener noreferrer"><img alt="$1" src="$2"></a>');
                s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
                s = s.replace(/`([^`]+)`/g, function (_, c) {
                    return '<code>' + c.replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</code>';
                });
                s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
                s = s.replace(/~~([^~\n]+)~~/g, '<del>$1</del>');
                s = s.replace(/(^|[^*])\*([^*\n]+)\*/g, '$1<em>$2</em>');
                return s;
            }

            while (i < lines.length) {
                const line = lines[i];
                if (!line.trim()) {
                    i++;
                    continue;
                }

                const fence = line.match(/^```(\w*)\s*$/);
                if (fence) {
                    i++;
                    const buf = [];
                    while (i < lines.length && !/^```\s*$/.test(lines[i])) {
                        buf.push(lines[i]);
                        i++;
                    }
                    i++;
                    const escaped = buf.join('\n').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                    const cls = fence[1] ? ' class="lang-' + fence[1] + '"' : '';
                    out.push('<pre><code' + cls + '>' + escaped + '</code></pre>');
                    continue;
                }

                const h = line.match(/^(#{1,6})\s+(.*)$/);
                if (h) {
                    out.push('<h' + h[1].length + '>' + inline(h[2]) + '</h' + h[1].length + '>');
                    i++;
                    continue;
                }

                if (/^\s*(?:-\s*){3,}\s*$/.test(line) || /^\s*\*{3,}\s*$/.test(line)) {
                    out.push('<hr>');
                    i++;
                    continue;
                }

                if (/^>\s?/.test(line)) {
                    const buf = [];
                    while (i < lines.length && /^>\s?/.test(lines[i])) {
                        buf.push(lines[i].replace(/^>\s?/, ''));
                        i++;
                    }
                    out.push('<blockquote>' + renderMarkdown(buf.join('\n')) + '</blockquote>');
                    continue;
                }

                if (tableRow.test(line) && i + 1 < lines.length && tableSep.test(lines[i + 1])) {
                    const headers = splitRow(line);
                    i += 2;
                    const rows = [];
                    while (i < lines.length && tableRow.test(lines[i])) {
                        rows.push(splitRow(lines[i]));
                        i++;
                    }
                    let html = '<table><thead><tr>';
                    headers.forEach(h => {
                        html += '<th>' + inline(h) + '</th>';
                    });
                    html += '</tr></thead><tbody>';
                    rows.forEach(r => {
                        html += '<tr>';
                        r.forEach(c => {
                            html += '<td>' + inline(c) + '</td>';
                        });
                        html += '</tr>';
                    });
                    html += '</tbody></table>';
                    out.push(html);
                    continue;
                }

                if (bullet.test(line) || ordered.test(line)) {
                    // Indent of the first bullet defines this list's base level.
                    // Deeper-indented bullets become nested lists (rendered by
                    // recursing into renderMarkdown). Same-or-less indent at a
                    // bullet starts a sibling item (or ends the list).
                    const firstMatch = line.match(bullet) || line.match(ordered);
                    const baseIndent = firstMatch[1].length;
                    const isOrdered = ordered.test(line);
                    const items = [];
                    while (i < lines.length) {
                        const cur = lines[i];
                        if (!cur.trim()) {
                            // blank line breaks the list (matches CommonMark-ish behaviour)
                            i++;
                            break;
                        }
                        const mBul = cur.match(bullet);
                        const mOrd = cur.match(ordered);
                        const m = mBul || mOrd;
                        if (!m) break;
                        if (m[1].length < baseIndent) break;
                        if (m[1].length > baseIndent) break; // shouldn't happen at top of loop
                        // Same-type check: switching between -/* and 1. closes the list
                        if (isOrdered !== !!mOrd) break;

                        const itemBuf = [m[3]];
                        const nestedBuf = [];
                        i++;
                        while (i < lines.length) {
                            const nxt = lines[i];
                            if (!nxt.trim()) break;
                            const nBul = nxt.match(bullet);
                            const nOrd = nxt.match(ordered);
                            const nm = nBul || nOrd;
                            if (nm) {
                                if (nm[1].length > baseIndent) {
                                    // nested list line — dedent and stash
                                    nestedBuf.push(nxt.slice(baseIndent + 2));
                                    i++;
                                    continue;
                                }
                                // sibling or end of list
                                break;
                            }
                            // Plain continuation text
                            if (nestedBuf.length) {
                                // continuation inside the nested block
                                nestedBuf.push(nxt.slice(baseIndent + 2));
                            } else {
                                itemBuf.push(nxt.trim());
                            }
                            i++;
                        }

                        let liHtml = inline(itemBuf.join('\n'));
                        if (nestedBuf.length) {
                            liHtml += renderMarkdown(nestedBuf.join('\n'));
                        }
                        items.push('<li>' + liHtml + '</li>');
                    }
                    out.push((isOrdered ? '<ol>' : '<ul>') + items.join('') + (isOrdered ? '</ol>' : '</ul>'));
                    continue;
                }

                const buf = [line];
                i++;
                while (i < lines.length && lines[i].trim() && !/^#{1,6}\s/.test(lines[i]) && !/^>\s?/.test(lines[i]) && !bullet.test(lines[i]) && !ordered.test(lines[i]) && !/^```/.test(lines[i]) && !tableRow.test(lines[i])) {
                    buf.push(lines[i]);
                    i++;
                }
                out.push('<p>' + inline(buf.join(' ')) + '</p>');
            }
            return out.join('\n');
        }

        // Block dispatcher. New block types plug in here.
        const renderers = {
            markdown: function (block) {
                const div = document.createElement('div');
                div.innerHTML = renderMarkdown(block.content);
                return div;
            },
            mermaid: function (block) {
                // Mermaid scans elements with class "mermaid" whose textContent
                // is the diagram source. We collect these nodes and run
                // mermaid.run() once after all blocks are in the DOM.
                const div = document.createElement('div');
                div.className = 'mermaid';
                div.textContent = block.content;
                return div;
            },
            'force-graph': function (block) {
                // build.py emits parsed JSON: {nodes:[{id,size}], links:[{source,target}]}.
                // We instantiate force-graph after the container is in the DOM
                // so it can measure its own width.
                const div = document.createElement('div');
                div.className = 'force-graph';
                const data = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.ForceGraph) return;
                    const maxSize = data.nodes.reduce((m, n) => Math.max(m, n.size || 1), 1);
                    window.ForceGraph()(div)
                        .graphData(data)
                        .width(div.clientWidth)
                        .height(div.clientHeight)
                        .nodeRelSize(4)
                        .nodeVal(n => Math.max(20 * (n.size || 1) / maxSize, 0.001))
                        .nodeLabel(n => n.id + ' (' + (n.size || 1) + ')')
                        .nodeColor(() => 'rgba(135, 206, 235, 0.7)')
                        .linkColor(() => 'rgba(60, 60, 60, 0.4)')
                        .linkDirectionalArrowLength(4)
                        .linkDirectionalArrowRelPos(1)
                        .linkWidth(1);
                });
                return div;
            },
            'bubble-chart': function (block) {
                // build.py emits {nodes:[{name,size}]}. Renders a D3 circle-pack
                // SVG (same shape as the obren.io reference, just inline).
                const wrap = document.createElement('div');
                wrap.className = 'bubble-chart';
                const payload = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.d3) return;
                    const diameter = 480;
                    const fill = '#c0deed';
                    const textColor = '#111111';
                    const fontSize = 12;

                    const svg = window.d3.select(wrap).append('svg')
                        .attr('viewBox', '0 0 ' + diameter + ' ' + diameter)
                        .attr('width', diameter)
                        .attr('height', diameter);

                    const root = window.d3.hierarchy({children: payload.nodes})
                        .sum(d => d.size || 0)
                        .sort((a, b) => b.value - a.value);

                    window.d3.pack().size([diameter, diameter]).padding(2)(root);

                    const node = svg.selectAll('g')
                        .data(root.leaves())
                        .enter().append('g')
                        .attr('transform', d => 'translate(' + d.x + ',' + d.y + ')');

                    node.append('title').text(d => d.data.name + ': ' + d.value);
                    node.append('circle').attr('r', d => d.r).style('fill', fill);
                    node.append('text')
                        .attr('dy', '.3em')
                        .style('text-anchor', 'middle')
                        .style('fill', textColor)
                        .style('font-size', fontSize + 'px')
                        .text(d => d.data.name.substring(0, Math.max(0, Math.floor(d.r / 3))));
                });
                return wrap;
            }
        };

        const mermaidNodes = [];
        data.blocks.forEach(function (block) {
            const r = renderers[block.type];
            if (!r) {
                const pre = document.createElement('pre');
                pre.textContent = '[unknown block type: ' + block.type + ']';
                root.appendChild(pre);
                return;
            }
            const node = r(block);
            if (node instanceof Node) {
                root.appendChild(node);
                if (block.type === 'mermaid') mermaidNodes.push(node);
            }
        });

        if (mermaidNodes.length && window.mermaid) {
            window.mermaid.initialize({startOnLoad: false, theme: 'default'});
            window.mermaid.run({nodes: mermaidNodes});
        }
    })();
</script>
</body>
</html>
