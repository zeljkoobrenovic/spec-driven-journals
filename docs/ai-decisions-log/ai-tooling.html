<script id="data" type="application/json">{"meta": {"id": "ORG-SD-AI-TOOLING", "status": "draft:gray", "title": "AI Developer Tooling: Claude Code as the Default Agent Platform for 2026", "date": "2026-05-15", "author": "Organization Tech Strategy", "permalink": "ai-tooling", "timetoread": "11 min", "excerpt": "Organization adopts Claude Code as the default AI developer tool for 2026. This is a platform decision, not a claim about which model is permanently best. The decision chooses the shared surface where CLAUDE.md files, Skills, MCP servers, subagents, hooks, settings, templates, permission modes, registries, and audit controls can compound across teams. Codex, Gemini, and other agentic coding tools remain available by exception when they fit a concrete workflow better.", "tags": "ai, claude-code, devex, agentic-coding", "icon": "assets/icons/ai-tooling.png", "logo": "assets/images/ai-tooling/logo.jpeg", "logo_credit": "Image generated by Google Gemini (gemini-3-pro-image-preview)"}, "tags": ["ai", "claude-code", "devex", "agentic-coding"], "blocks": [{"type": "markdown", "content": "> **Status**: DRAFT\n>\n> **Decision**: Organization will adopt Claude Code as the default AI developer tool for 2026. This is a platform decision, not a model leaderboard call: it selects the shared surface where CLAUDE.md files, Skills, MCP servers, subagents, hooks, settings, templates, permission modes, registries, and audit controls can compound across teams. Codex, Gemini, and future agentic coding tools remain available by documented exception.\n\n## Decision\n\nAdopt **Claude Code as the default AI developer tool** across Organization for 2026.\n\nConcretely:\n\n* New AI-assisted software-development work uses Claude Code by default.\n* Shared AI developer-platform assets are built first for Claude Code: repository guidance, Skills, MCP servers, subagents, hooks, settings, permission modes, registries, templates, and audit controls.\n* Codex, Gemini, and future agentic coding tools remain available through documented, time-bounded exceptions.\n* AI Engineering Enablement owns the default platform and exception process, aligned with [AI Operating Model: Dedicated AI Engineering Enablement Function](ai-operating-model.html).\n* The default is reviewed every six months. The next planned review is **2026-11-15**.\n\nThis decision chooses the shared **tooling platform surface**. It does not claim Claude Code is permanently the best model, ban alternative tools, or reduce review/testing obligations.\n\n## How to Use This Decision\n\nUse this ADR when starting or changing AI-assisted development workflows:\n\n| Question | Default answer |\n| --- | --- |\n| Is a team starting AI-assisted coding in a repository? | Use Claude Code and the shared baseline. |\n| Does the work need repository guidance, Skills, MCP, subagents, hooks, or settings? | Build on the Claude Code platform surface first. |\n| Does another tool fit a specific workflow better? | Request a time-bounded exception with evidence and controls. |\n| Is a model benchmark better this month? | Treat it as review input, not an automatic platform change. |\n| Is the task high-risk? | Follow [AI Coding Policy: Human Accountability with Executable Controls](ai-policy.html) and the repository's local controls regardless of tool. |\n\nThe decision should move conversation from \"which assistant is most exciting?\" to \"which platform lets Organization make safe, reusable AI-assisted workflows normal?\"\n\n## Why This Default\n\nAI developer tooling is not only chat. Once a tool can inspect repositories, run commands, call external tools, edit files, and delegate work, it becomes part of the engineering platform.\n\nClaude Code is the 2026 default because it gives Organization a single place where shared investment can compound:\n\n* repository-local guidance through CLAUDE.md;\n* reusable workflows through Skills;\n* controlled external context through MCP;\n* role-specific work through subagents;\n* executable policy through settings, hooks, permission modes, and CI integration;\n* shared evidence through registries, templates, and audit trails.\n\nThe main value is not that every individual task is best in Claude Code. The value is that standards, policy, enablement, review evidence, and reusable workflows have one default implementation surface.\n\n## Exception Criteria\n\nA non-default AI coding tool may be justified when it has a concrete workflow advantage, such as:\n\n* better support for a specific language, IDE, operating system, or local toolchain;\n* stronger model or tool behavior for a bounded task;\n* required integration with an ecosystem not covered by Claude Code;\n* a security, data-residency, or enterprise constraint that makes the default unsuitable;\n* a pilot intended to inform the six-month review.\n\nAn exception request should include workflow, repositories, expected actions, data classification, requested tool capabilities, blocked capabilities, audit evidence, success measures, owner, and review date. Preference for another UI is not enough.\n\n## Consequences\n\n### Positive\n\n* Enablement investment compounds on one platform surface.\n* Policy in [AI Coding Policy: Human Accountability with Executable Controls](ai-policy.html) has a primary enforcement path.\n* Onboarding, support, and internal mobility benefit from a shared toolchain.\n* Shared Skills, MCP servers, subagents, hooks, and settings can be reused across repositories.\n* The exception path keeps alternatives available without fragmenting the default.\n* The six-month review prevents the default from becoming permanent by inertia.\n\n### Negative\n\n* Organization accepts vendor concentration risk for the default tooling surface.\n* Teams already invested in other tools pay a switching or adaptation cost.\n* Claude-specific governance assets must be translated if the default changes later.\n* Exception-approved tools need their own control envelope, which adds governance work.\n* A six-month review may lag short-lived market shifts, but shorter cycles would create churn.\n\n## What This Means for Teams\n\n* Start from the shared Claude Code baseline for repository onboarding.\n* Keep repository guidance current so the agent sees local standards before editing.\n* Turn repeated workflows into maintained Skills or subagents, not copied prompts.\n* Use MCP only when live external context or tools are genuinely needed.\n* Keep high-risk work under the controls defined in [AI Coding Policy: Human Accountability with Executable Controls](ai-policy.html).\n* Record material AI-assisted changes with enough evidence for review.\n* Bring useful local patterns back to AI Engineering Enablement for possible shared catalog inclusion.\n\n## Considered Options\n\n| Option | Assessment |\n| --- | --- |\n| **Claude Code as default, others by exception** | Chosen. Best current fit for shared governance, repository guidance, reusable workflows, and controlled execution. |\n| **Codex as default** | Credible alternative, but would require rebuilding the shared control and enablement surface around a different default. |\n| **Gemini CLI as default** | Credible alternative for some workflows, but not selected as the main 2026 platform surface. |\n| **No default** | Maximizes local choice, but fragments policy, onboarding, security review, and reusable workflow investment. |\n\n## Scope and Revisiting\n\nIn scope:\n\n* AI-assisted software development at Organization;\n* developer-agent default tooling;\n* shared Skills, MCP servers, subagents, hooks, settings, templates, and registries;\n* exception-approved coding agents.\n\nOut of scope:\n\n* end-user product AI features;\n* internal non-engineering AI tools;\n* model-level choices for production inference;\n* procurement terms except where they materially affect the tool default.\n\nRevisit this decision on **2026-11-15**, or earlier if:\n\n* a competing platform shows a durable advantage in Organization's real workflows;\n* Claude Code regresses materially in governance, security, cost, or enterprise readiness;\n* exception pilots produce strong evidence that the default should change;\n* Organization's modernization strategy changes enough that another tool is clearly better.\n\n## Authoritative References\n\n* [Claude Code documentation](https://docs.anthropic.com/en/docs/claude-code).\n* [Claude Code settings](https://docs.anthropic.com/en/docs/claude-code/settings).\n* [Claude Code hooks](https://docs.anthropic.com/en/docs/claude-code/hooks).\n* [Claude Code subagents](https://docs.anthropic.com/en/docs/claude-code/sub-agents).\n* [Claude Code security](https://docs.anthropic.com/en/docs/claude-code/security).\n* [Claude Code feature overview](https://code.claude.com/docs/en/features-overview).\n* [Model Context Protocol introduction](https://modelcontextprotocol.io/routing).\n* [Model Context Protocol architecture](https://modelcontextprotocol.io/docs/learn/architecture).\n* [OpenAI Codex CLI getting started](https://help.openai.com/en/articles/11096431).\n* [Gemini CLI extensions](https://google-gemini.github.io/gemini-cli/docs/extensions/).\n\n## Appendix: Vocabulary\n\n\n\n| Term | Meaning in this ADR |\n| --- | --- |\n| **Model** | The underlying LLM used by a tool. |\n| **Tool** | The developer-facing agent, CLI, IDE integration, and execution environment. |\n| **Platform surface** | Files, settings, hooks, Skills, MCP servers, subagents, registries, and templates that teams share. |\n| **CLAUDE.md** | Repository or directory guidance read by Claude Code. |\n| **Skill** | Reusable instruction package for a specific capability or workflow. |\n| **MCP server** | Model Context Protocol server that exposes external tools, data, or services to the agent. |\n| **Subagent** | Specialized agent with narrower task framing, tools, and output contract. |\n| **Hook** | Automation triggered by agent events, such as tool use or stop events. |\n| **Permission mode** | Approval model for tool use and actions. |\n| **Registry** | Central source of truth for approved tools, MCP servers, Skills, subagents, and exceptions. |\n| **Exception** | Approved use of a non-default tool or non-standard configuration. |\n"}]}</script>
<script>
    (function () {
        const data = JSON.parse(document.getElementById('data').textContent);
        const root = document.getElementById('content');

        const postId = (data.meta && data.meta.id) ? String(data.meta.id) : '';
        const postStatusRaw = (data.meta && data.meta.status) ? String(data.meta.status) : '';
        if (postId || postStatusRaw) {
            const header = document.getElementById('post-header');
            let sectionEl = header.querySelector('p.section');
            if (!sectionEl) {
                sectionEl = document.createElement('p');
                sectionEl.className = 'section';
                header.insertBefore(sectionEl, header.firstChild);
            }
            // Status pill goes first, then a " / " separator before the existing
            // content (section name and/or id).
            if (postStatusRaw) {
                const parts = postStatusRaw.split(':');
                const statusName = parts[0].trim();
                const statusColor = (parts[1] || '').trim();
                const wrap = document.createElement('span');
                wrap.className = 'post-status';
                const dot = document.createElement('span');
                dot.className = 'status-dot';
                if (statusColor) dot.style.background = statusColor;
                wrap.appendChild(dot);
                wrap.appendChild(document.createTextNode(statusName));
                if (sectionEl.firstChild) {
                    sectionEl.insertBefore(document.createTextNode(' • '), sectionEl.firstChild);
                    sectionEl.insertBefore(wrap, sectionEl.firstChild);
                } else {
                    sectionEl.appendChild(wrap);
                }
            }
            if (postId) {
                if (sectionEl.firstChild) sectionEl.appendChild(document.createTextNode(' • '));
                sectionEl.appendChild(document.createTextNode(postId));
            }
        }

        const tagsHost = document.getElementById('tags');
        (data.tags || []).forEach(function (t) {
            const span = document.createElement('span');
            span.className = 'tag';
            span.textContent = t;
            tagsHost.appendChild(span);
        });

        // Minimal markdown renderer. Supports: ATX headings, paragraphs, blockquotes,
        // unordered/ordered lists, fenced code, inline code, bold/italic/strikethrough, links, images, hr.
        // Sufficient for the posts in this repo; replace with a fuller parser if needed.
        function renderMarkdown(src) {
            const lines = src.replace(/\r\n/g, '\n').split('\n');
            const out = [];
            let i = 0;

            const bullet = /^(\s*)([-*])\s+(.*)$/;
            const ordered = /^(\s*)(\d+)\.\s+(.*)$/;
            const tableRow = /^\s*\|(.+)\|\s*$/;
            const tableSep = /^\s*\|?\s*:?-{3,}:?\s*(\|\s*:?-{3,}:?\s*)+\|?\s*$/;

            function splitRow(s) {
                let t = s.trim();
                if (t.startsWith('|')) t = t.slice(1);
                if (t.endsWith('|')) t = t.slice(0, -1);
                return t.split('|').map(c => c.trim());
            }

            function inline(s) {
                // Posts are trusted content, so raw HTML passes through unescaped
                // (some posts embed inline <blockquote>, <div>, etc.).
                // Stray ampersands still get fixed up.
                s = s.replace(/&(?![a-zA-Z]+;|#\d+;)/g, '&amp;');
                s = s.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<a class="image-link" href="$2" target="_blank" rel="noopener noreferrer"><img alt="$1" src="$2"></a>');
                s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
                s = s.replace(/`([^`]+)`/g, function (_, c) {
                    return '<code>' + c.replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</code>';
                });
                s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
                s = s.replace(/~~([^~\n]+)~~/g, '<del>$1</del>');
                s = s.replace(/(^|[^*])\*([^*\n]+)\*/g, '$1<em>$2</em>');
                return s;
            }

            while (i < lines.length) {
                const line = lines[i];
                if (!line.trim()) {
                    i++;
                    continue;
                }

                const fence = line.match(/^```(\w*)\s*$/);
                if (fence) {
                    i++;
                    const buf = [];
                    while (i < lines.length && !/^```\s*$/.test(lines[i])) {
                        buf.push(lines[i]);
                        i++;
                    }
                    i++;
                    const escaped = buf.join('\n').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                    const cls = fence[1] ? ' class="lang-' + fence[1] + '"' : '';
                    out.push('<pre><code' + cls + '>' + escaped + '</code></pre>');
                    continue;
                }

                const h = line.match(/^(#{1,6})\s+(.*)$/);
                if (h) {
                    out.push('<h' + h[1].length + '>' + inline(h[2]) + '</h' + h[1].length + '>');
                    i++;
                    continue;
                }

                if (/^\s*(?:-\s*){3,}\s*$/.test(line) || /^\s*\*{3,}\s*$/.test(line)) {
                    out.push('<hr>');
                    i++;
                    continue;
                }

                if (/^>\s?/.test(line)) {
                    const buf = [];
                    while (i < lines.length && /^>\s?/.test(lines[i])) {
                        buf.push(lines[i].replace(/^>\s?/, ''));
                        i++;
                    }
                    out.push('<blockquote>' + renderMarkdown(buf.join('\n')) + '</blockquote>');
                    continue;
                }

                if (tableRow.test(line) && i + 1 < lines.length && tableSep.test(lines[i + 1])) {
                    const headers = splitRow(line);
                    i += 2;
                    const rows = [];
                    while (i < lines.length && tableRow.test(lines[i])) {
                        rows.push(splitRow(lines[i]));
                        i++;
                    }
                    let html = '<table><thead><tr>';
                    headers.forEach(h => {
                        html += '<th>' + inline(h) + '</th>';
                    });
                    html += '</tr></thead><tbody>';
                    rows.forEach(r => {
                        html += '<tr>';
                        r.forEach(c => {
                            html += '<td>' + inline(c) + '</td>';
                        });
                        html += '</tr>';
                    });
                    html += '</tbody></table>';
                    out.push(html);
                    continue;
                }

                if (bullet.test(line) || ordered.test(line)) {
                    // Indent of the first bullet defines this list's base level.
                    // Deeper-indented bullets become nested lists (rendered by
                    // recursing into renderMarkdown). Same-or-less indent at a
                    // bullet starts a sibling item (or ends the list).
                    const firstMatch = line.match(bullet) || line.match(ordered);
                    const baseIndent = firstMatch[1].length;
                    const isOrdered = ordered.test(line);
                    const items = [];
                    while (i < lines.length) {
                        const cur = lines[i];
                        if (!cur.trim()) {
                            // blank line breaks the list (matches CommonMark-ish behaviour)
                            i++;
                            break;
                        }
                        const mBul = cur.match(bullet);
                        const mOrd = cur.match(ordered);
                        const m = mBul || mOrd;
                        if (!m) break;
                        if (m[1].length < baseIndent) break;
                        if (m[1].length > baseIndent) break; // shouldn't happen at top of loop
                        // Same-type check: switching between -/* and 1. closes the list
                        if (isOrdered !== !!mOrd) break;

                        const itemBuf = [m[3]];
                        const nestedBuf = [];
                        i++;
                        while (i < lines.length) {
                            const nxt = lines[i];
                            if (!nxt.trim()) break;
                            const nBul = nxt.match(bullet);
                            const nOrd = nxt.match(ordered);
                            const nm = nBul || nOrd;
                            if (nm) {
                                if (nm[1].length > baseIndent) {
                                    // nested list line — dedent and stash
                                    nestedBuf.push(nxt.slice(baseIndent + 2));
                                    i++;
                                    continue;
                                }
                                // sibling or end of list
                                break;
                            }
                            // Plain continuation text
                            if (nestedBuf.length) {
                                // continuation inside the nested block
                                nestedBuf.push(nxt.slice(baseIndent + 2));
                            } else {
                                itemBuf.push(nxt.trim());
                            }
                            i++;
                        }

                        let liHtml = inline(itemBuf.join('\n'));
                        if (nestedBuf.length) {
                            liHtml += renderMarkdown(nestedBuf.join('\n'));
                        }
                        items.push('<li>' + liHtml + '</li>');
                    }
                    out.push((isOrdered ? '<ol>' : '<ul>') + items.join('') + (isOrdered ? '</ol>' : '</ul>'));
                    continue;
                }

                const buf = [line];
                i++;
                while (i < lines.length && lines[i].trim() && !/^#{1,6}\s/.test(lines[i]) && !/^>\s?/.test(lines[i]) && !bullet.test(lines[i]) && !ordered.test(lines[i]) && !/^```/.test(lines[i]) && !tableRow.test(lines[i])) {
                    buf.push(lines[i]);
                    i++;
                }
                out.push('<p>' + inline(buf.join(' ')) + '</p>');
            }
            return out.join('\n');
        }

        // Block dispatcher. New block types plug in here.
        const renderers = {
            markdown: function (block) {
                const div = document.createElement('div');
                div.innerHTML = renderMarkdown(block.content);
                return div;
            },
            mermaid: function (block) {
                // Mermaid scans elements with class "mermaid" whose textContent
                // is the diagram source. We collect these nodes and run
                // mermaid.run() once after all blocks are in the DOM.
                const div = document.createElement('div');
                div.className = 'mermaid';
                div.textContent = block.content;
                return div;
            },
            'force-graph': function (block) {
                // build.py emits parsed JSON: {nodes:[{id,size}], links:[{source,target}]}.
                // We instantiate force-graph after the container is in the DOM
                // so it can measure its own width.
                const div = document.createElement('div');
                div.className = 'force-graph';
                const data = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.ForceGraph) return;
                    const maxSize = data.nodes.reduce((m, n) => Math.max(m, n.size || 1), 1);
                    window.ForceGraph()(div)
                        .graphData(data)
                        .width(div.clientWidth)
                        .height(div.clientHeight)
                        .nodeRelSize(4)
                        .nodeVal(n => Math.max(20 * (n.size || 1) / maxSize, 0.001))
                        .nodeLabel(n => n.id + ' (' + (n.size || 1) + ')')
                        .nodeColor(() => 'rgba(135, 206, 235, 0.7)')
                        .linkColor(() => 'rgba(60, 60, 60, 0.4)')
                        .linkDirectionalArrowLength(4)
                        .linkDirectionalArrowRelPos(1)
                        .linkWidth(1);
                });
                return div;
            },
            'bubble-chart': function (block) {
                // build.py emits {nodes:[{name,size}]}. Renders a D3 circle-pack
                // SVG (same shape as the obren.io reference, just inline).
                const wrap = document.createElement('div');
                wrap.className = 'bubble-chart';
                const payload = JSON.parse(block.content);
                requestAnimationFrame(function () {
                    if (!window.d3) return;
                    const diameter = 480;
                    const fill = '#c0deed';
                    const textColor = '#111111';
                    const fontSize = 12;

                    const svg = window.d3.select(wrap).append('svg')
                        .attr('viewBox', '0 0 ' + diameter + ' ' + diameter)
                        .attr('width', diameter)
                        .attr('height', diameter);

                    const root = window.d3.hierarchy({children: payload.nodes})
                        .sum(d => d.size || 0)
                        .sort((a, b) => b.value - a.value);

                    window.d3.pack().size([diameter, diameter]).padding(2)(root);

                    const node = svg.selectAll('g')
                        .data(root.leaves())
                        .enter().append('g')
                        .attr('transform', d => 'translate(' + d.x + ',' + d.y + ')');

                    node.append('title').text(d => d.data.name + ': ' + d.value);
                    node.append('circle').attr('r', d => d.r).style('fill', fill);
                    node.append('text')
                        .attr('dy', '.3em')
                        .style('text-anchor', 'middle')
                        .style('fill', textColor)
                        .style('font-size', fontSize + 'px')
                        .text(d => d.data.name.substring(0, Math.max(0, Math.floor(d.r / 3))));
                });
                return wrap;
            }
        };

        const mermaidNodes = [];
        data.blocks.forEach(function (block) {
            const r = renderers[block.type];
            if (!r) {
                const pre = document.createElement('pre');
                pre.textContent = '[unknown block type: ' + block.type + ']';
                root.appendChild(pre);
                return;
            }
            const node = r(block);
            if (node instanceof Node) {
                root.appendChild(node);
                if (block.type === 'mermaid') mermaidNodes.push(node);
            }
        });

        if (mermaidNodes.length && window.mermaid) {
            window.mermaid.initialize({startOnLoad: false, theme: 'default'});
            window.mermaid.run({nodes: mermaidNodes});
        }
    })();
</script>
</body>
</html>
