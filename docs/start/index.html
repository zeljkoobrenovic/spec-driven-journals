<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Spec-Driven Journals</title>
    <style>
        body {
            font-family: Ubuntu, Optima, Segoe, Segoe UI, Candara, Calibri, Arial, sans-serif;
            margin: 40px;
            text-align: center;
        }

        .group {
            display: inline-block;
            border: 1px solid lightgrey;
            border-radius: 6px;
            margin: 8px 18px 8px 8px;
            padding: 5px;
            background-color: #f8f8f8;
        }

        .group-title {
            font-size: 90%;
            margin-top: 4px;
            color: grey;
        }

        .app {
            margin: 10px;
            padding-top: 10px;
            border: solid lightgrey 1px;
            box-shadow: 0 2px 4px 0 rgba(0, 0, 0, 0.2), 0 3px 10px 0 rgba(0, 0, 0, 0.19);
            display: inline-block;
            height: 320px;
            width: 220px;
            object-fit: cover;
            text-align: center;
            vertical-align: top;
            border-radius: 12px;
            background-color: white;
        }

        .name {
            font-weight: bold;
            font-size: 18px;
            margin-top: 12px;
            color: #5009DC;
            overflow: hidden;
            padding-left: 8px;
            padding-right: 8px;
        }

        .source {
            font-size: 11px;
            color: grey;
            margin: 3px;
        }

        .description {
            font-size: 14px;
            color: grey;
            margin: 3px;
            line-height: 21px;
            padding-left: 8px;
            padding-right: 8px;
        }

        a {
            text-decoration: none;
        }

        .icon {
            width: 140px;
            height: 140px;
            object-fit: contain;
            border-radius: 4px;
            margin-top: 26px;
            margin-bottom: 20px;
            filter: grayscale(100%);
        }

        .tab {
            overflow: hidden;
            border: 1px solid #ccc;
            background-color: #f1f1f1;
        }

        .tab button {
            background-color: inherit;
            float: left;
            border: none;
            outline: none;
            cursor: pointer;
            padding: 14px 16px;
            transition: 0.3s;
            font-size: 14px;
        }

        .tab button:hover {
            background-color: #ddd;
        }

        .tab button.active {
            background-color: #ccc;
        }

        .tabcontent {
            display: none;
            padding: 0;
            border: 1px solid #ccc;
            border-top: none;
        }
    </style>
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Ubuntu">
    <script>
        const START_TAB_STORAGE_KEY = 'grounded-product-architecture:start-active-tab';

        function initTab() {
            let tabName = '';
            if (typeof apps !== 'undefined' && apps.length > 0) {
                tabName = 'tab_content_' + apps[0].tab;
            }
            const storedTab = window.sessionStorage.getItem(START_TAB_STORAGE_KEY);
            if (storedTab && document.getElementById('tab_' + storedTab)) {
                tabName = storedTab;
            }
            if (tabName) {
                openTab(tabName);
            }
        }

        function openTab(tabName) {
            const tabcontent = document.getElementsByClassName('tabcontent');
            for (let i = 0; i < tabcontent.length; i++) {
                tabcontent[i].style.display = 'none';
            }
            const tablinks = document.getElementsByClassName('tablinks');
            for (let i = 0; i < tablinks.length; i++) {
                tablinks[i].className = tablinks[i].className.replace(' active', '');
            }
            document.getElementById(tabName).style.display = 'block';
            document.getElementById('tab_' + tabName).className += ' active';
            window.sessionStorage.setItem(START_TAB_STORAGE_KEY, tabName);
        }
    </script>
</head>
<body>
<div style="margin-top: 10px"><img src="icons/logo.png" style="height: 164px; border: 1px solid lightgrey; border-radius: 20px; padding: 12px; margin: 8px;"></div>
<div style="margin: 8px; margin-top: 0; font-size: 40px; color: #8c8c8c">Spec-Driven Journals</div>
<div style="margin-bottom: 36px; font-size: 20px; color: #8c8c8c">Journals on architecture decisions, templates, and supporting documents. Available free on <a href="https://github.com/zeljkoobrenovic/spec-driven-journals" targget="_blank">GitHub</a>.</div>

<div style="margin: -10px; padding: 6px" id="search_container">
    <div style="margin-bottom: 30px; color: grey">
        <input id="filter_all" type="text" placeholder="search..."
               style="font-size: 16px; height: 32px; width: 320px"
               onkeyup="update()">
        <span id="summary_all"></span>
    </div>
    <div id="content_search"></div>
</div>

<div class="tab" id="tab_navigation">
</div>

<div id="tab_content"></div>

<script>
    const apps = {"config": {"openInNewTab": true, "enableSearch": true, "domainName": "Spec-Driven Journals", "domainDescription": "Journals on architecture decisions, templates, and supporting documents. Available free on <a href=\"https://github.com/zeljkoobrenovic/spec-driven-journals\" targget=\"_blank\">GitHub</a>."}, "apps": [{"tab": "Manuals", "apps": [{"group": "Manuals", "apps": [{"name": "Spec-Driven<br>Product Architecture", "link": "../spec-driven-product-architecture/index.html", "icon": "icons/spec-driven-product-architecture.png", "description": "explaining spec-driven product architecture", "source": ""}, {"name": "Spec-Driven<br>Journals", "link": "../spec-driven-journals/index.html#insights", "icon": "icons/spec-driven-product-journal.png", "description": "explaining spec-driven journals", "source": ""}]}]}, {"tab": "Strategic Docs", "apps": [{"group": "decision logs", "apps": [{"name": "ORG Foundational<br>Tech Decisions", "link": "../foundations/index.html", "icon": "icons/foundations.png", "description": "foundational decision documents", "source": ""}, {"name": "ORG Strategic<br>Tech Decisions", "link": "../tech-decisions-log/index.html", "icon": "icons/decisions-log.png", "description": "strategic tech decision documents", "source": ""}, {"name": "ORG Strategic<br>AI Decisions", "link": "../ai-decisions-log/index.html", "icon": "icons/ai-decisions.png", "description": "strategic AI decision documents", "source": ""}]}, {"group": "org", "apps": [{"name": "ORG Strategic<br>Org Design Decisions", "link": "../org-design/index.html", "icon": "icons/organization.png", "description": "strategic org decision documents", "source": ""}]}, {"group": "strategy & principles", "apps": [{"name": "Organization<br>Tech Strategy", "link": "../tech-strategy/index.html", "icon": "icons/strategy.png", "description": "overall tech strategy", "source": ""}, {"name": "Organization<br>Engineering Principles", "link": "../principles/index.html", "icon": "icons/principles.png", "description": "key engineering principles guiding our work", "source": ""}, {"name": "ORG AI-Assisted<br>Dev Strategy", "link": "../ai-dev-strategy/index.html", "icon": "icons/ai-strategy.png", "description": "AI-assisted SDLC strategy", "source": ""}]}]}, {"tab": "Templates and Examples", "apps": [{"group": "ADRs", "apps": [{"name": "Educational<br>Documents", "link": "../documents/index.html", "icon": "icons/docs.png", "description": "educational articles", "source": ""}, {"name": "Templates", "link": "../adr-templates/index.html#insights", "icon": "icons/templates.png", "description": "ADR templates by people and orgs", "source": ""}, {"name": "Decisions Log Example", "link": "../decisions-log/index.html", "icon": "icons/decisions-log.png", "description": "example decision documents", "source": ""}, {"name": "MADR Decisions Log Example", "link": "../madr/index.html", "icon": "icons/madr.png", "description": "example decision documents", "source": ""}]}]}]}.apps;
    const config = {"config": {"openInNewTab": true, "enableSearch": true, "domainName": "Spec-Driven Journals", "domainDescription": "Journals on architecture decisions, templates, and supporting documents. Available free on <a href=\"https://github.com/zeljkoobrenovic/spec-driven-journals\" targget=\"_blank\">GitHub</a>."}, "apps": [{"tab": "Manuals", "apps": [{"group": "Manuals", "apps": [{"name": "Spec-Driven<br>Product Architecture", "link": "../spec-driven-product-architecture/index.html", "icon": "icons/spec-driven-product-architecture.png", "description": "explaining spec-driven product architecture", "source": ""}, {"name": "Spec-Driven<br>Journals", "link": "../spec-driven-journals/index.html#insights", "icon": "icons/spec-driven-product-journal.png", "description": "explaining spec-driven journals", "source": ""}]}]}, {"tab": "Strategic Docs", "apps": [{"group": "decision logs", "apps": [{"name": "ORG Foundational<br>Tech Decisions", "link": "../foundations/index.html", "icon": "icons/foundations.png", "description": "foundational decision documents", "source": ""}, {"name": "ORG Strategic<br>Tech Decisions", "link": "../tech-decisions-log/index.html", "icon": "icons/decisions-log.png", "description": "strategic tech decision documents", "source": ""}, {"name": "ORG Strategic<br>AI Decisions", "link": "../ai-decisions-log/index.html", "icon": "icons/ai-decisions.png", "description": "strategic AI decision documents", "source": ""}]}, {"group": "org", "apps": [{"name": "ORG Strategic<br>Org Design Decisions", "link": "../org-design/index.html", "icon": "icons/organization.png", "description": "strategic org decision documents", "source": ""}]}, {"group": "strategy & principles", "apps": [{"name": "Organization<br>Tech Strategy", "link": "../tech-strategy/index.html", "icon": "icons/strategy.png", "description": "overall tech strategy", "source": ""}, {"name": "Organization<br>Engineering Principles", "link": "../principles/index.html", "icon": "icons/principles.png", "description": "key engineering principles guiding our work", "source": ""}, {"name": "ORG AI-Assisted<br>Dev Strategy", "link": "../ai-dev-strategy/index.html", "icon": "icons/ai-strategy.png", "description": "AI-assisted SDLC strategy", "source": ""}]}]}, {"tab": "Templates and Examples", "apps": [{"group": "ADRs", "apps": [{"name": "Educational<br>Documents", "link": "../documents/index.html", "icon": "icons/docs.png", "description": "educational articles", "source": ""}, {"name": "Templates", "link": "../adr-templates/index.html#insights", "icon": "icons/templates.png", "description": "ADR templates by people and orgs", "source": ""}, {"name": "Decisions Log Example", "link": "../decisions-log/index.html", "icon": "icons/decisions-log.png", "description": "example decision documents", "source": ""}, {"name": "MADR Decisions Log Example", "link": "../madr/index.html", "icon": "icons/madr.png", "description": "example decision documents", "source": ""}]}]}]}.config;
    let tabNavigationHtml = '';
    let tabContentHtml = '';
    apps.forEach(tab => {
        tabNavigationHtml += '<button id="tab_tab_content_' + tab.tab + '" class="tablinks" onclick="openTab(\'tab_content_' + tab.tab + '\')">' + tab.tab + '</button>';

        tabContentHtml += '<div id="tab_content_' + tab.tab + '" class="tabcontent" style="margin: 0; padding: 6px;">' +
            '<div id="content_' + tab.tab + '"></div>' +
            '</div>';
    });

    document.getElementById('tab_navigation').innerHTML = tabNavigationHtml;
    document.getElementById('tab_content').innerHTML = tabContentHtml;
    initTab();
</script>

<script>
    // Pre-build a flat list with pre-lowercased fields for search
    const allApps = [];
    apps.forEach(tab => {
        tab.apps.forEach(group => {
            group.apps.forEach(app => {
                allApps.push({
                    app: app,
                    name: (app.name || '').toLowerCase(),
                    description: (app.description || '').toLowerCase(),
                    source: (app.source || '').toLowerCase()
                });
            });
        });
    });

    function renderAppCard(app) {
        let html = '<div class="app">';
        if (config.openInNewTab === false || app.openInNewTab === false) {
            html += '<a href="' + app.link + '">';
        } else {
            html += '<a target="_blank" href="' + app.link + '">';
        }
        html += '<div style="height: 38px">';
        html += '<div class="name">' + app.name + '</div>';
        if (app.source) {
            html += '<div class="source">source: ' + app.source + '</div>';
        } else {
            html += '<div class="source"></div>';
        }
        html += '</div>';
        html += '<div><img class="icon" src="' + app.icon + '"></div>';
        html += '<div class="description">' + app.description + '</div>';
        html += '</a>';
        html += '</div>';
        return html;
    }

    function renderTabs() {
        apps.forEach(tab => {
            let html = '';
            tab.apps.forEach(group => {
                html += '<div class="group">';
                html += '<div class="group-title">' + group.group + '</div>';
                group.apps.forEach(app => {
                    html += renderAppCard(app);
                });
                html += '</div>';
            });
            document.getElementById('content_' + tab.tab).innerHTML = html;
        });
    }

    function update() {
        const filterText = document.getElementById('filter_all').value.trim().toLowerCase();

        if (filterText) {
            document.getElementById('tab_navigation').style.display = 'none';
            document.getElementById('tab_content').style.display = 'none';
            document.getElementById('content_search').style.display = 'block';

            let html = '';
            let count = 0;
            allApps.forEach(entry => {
                if (entry.name.includes(filterText) || entry.description.includes(filterText) || entry.source.includes(filterText)) {
                    html += renderAppCard(entry.app);
                    count++;
                }
            });
            document.getElementById('content_search').innerHTML = html;
            document.getElementById('summary_all').innerHTML = ' = ' + count + ' app' + (count !== 1 ? 's' : '');
        } else {
            document.getElementById('tab_navigation').style.display = '';
            document.getElementById('tab_content').style.display = '';
            document.getElementById('content_search').style.display = 'none';
            document.getElementById('summary_all').innerHTML = '';
        }
    }

    if (!config || !config.enableSearch) {
        document.getElementById('search_container').style.display = 'none';
    }

    renderTabs();
</script>
</body>
</html>
