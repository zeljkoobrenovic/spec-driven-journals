<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>__TITLE__</title>
    <link rel="stylesheet" href="../../site.css">
    <style>
        body {
            line-height: 1.65;
        }

        main {
            padding-top: 32px;
        }

        nav.top {
            font-size: 14px;
            margin-bottom: 24px;
        }

        nav.top a {
            color: var(--muted);
            text-decoration: none;
        }

        nav.top a:hover {
            color: var(--accent);
        }

        header.post {
            margin-bottom: 32px;
        }

        header.post h1 {
            font-size: 34px;
            line-height: 1.2;
            margin: 0 0 12px;
            letter-spacing: -0.01em;
        }

        header.post .byline {
            color: var(--muted);
            font-size: 15px;
            margin: 0;
        }

        article h2 {
            font-size: 26px;
            margin: 40px 0 12px;
            letter-spacing: -0.01em;
        }

        article h3 {
            font-size: 20px;
            margin: 28px 0 8px;
        }

        article h4 {
            font-size: 17px;
            margin: 20px 0 6px;
        }

        article p {
            margin: 0 0 16px;
        }

        article a {
            color: var(--accent);
        }

        article img {
            max-width: 100%;
            height: auto;
        }

        article ul, article ol {
            padding-left: 24px;
            margin: 0 0 16px;
        }

        article li {
            margin-bottom: 6px;
        }

        article hr {
            border: none;
            border-top: 1px solid var(--rule);
            margin: 32px 0;
        }

        article blockquote {
            margin: 16px 0;
            padding: 12px 18px;
            background: var(--quote-bg);
            border-left: 3px solid var(--accent);
            color: #333;
        }

        article blockquote p:last-child {
            margin-bottom: 0;
        }

        article code {
            background: var(--code-bg);
            padding: 1px 5px;
            border-radius: 3px;
            font-size: 0.92em;
        }

        article pre {
            background: var(--code-bg);
            padding: 14px 16px;
            border-radius: 6px;
            overflow-x: auto;
            font-size: 14px;
            line-height: 1.5;
        }

        article pre code {
            background: none;
            padding: 0;
        }
    </style>
</head>
<body>
<main>
    <nav class="top"><a href="../../index.html">← Back to index</a></nav>
    <header class="post">
        <h1>__TITLE__</h1>
        <p class="byline">__BYLINE__</p>
    </header>
    <article id="content"></article>
    <footer>
        <a href="../../index.html">← Back to index</a>
    </footer>
</main>

<script id="data" type="application/json">__DATA_JSON__</script>
<script>
    (function () {
        const data = JSON.parse(document.getElementById('data').textContent);
        const root = document.getElementById('content');

        // Minimal markdown renderer. Supports: ATX headings, paragraphs, blockquotes,
        // unordered/ordered lists, fenced code, inline code, bold/italic, links, images, hr.
        // Sufficient for the posts in this repo; replace with a fuller parser if needed.
        function renderMarkdown(src) {
            const lines = src.replace(/\r\n/g, '\n').split('\n');
            const out = [];
            let i = 0;

            const bullet = /^(\s*)([-*])\s+(.*)$/;
            const ordered = /^(\s*)(\d+)\.\s+(.*)$/;

            function inline(s) {
                // Posts are trusted content, so raw HTML passes through unescaped
                // (some posts embed inline <blockquote>, <div>, etc.).
                // Stray ampersands still get fixed up.
                s = s.replace(/&(?![a-zA-Z]+;|#\d+;)/g, '&amp;');
                s = s.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img alt="$1" src="$2">');
                s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
                s = s.replace(/`([^`]+)`/g, function (_, c) {
                    return '<code>' + c.replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</code>';
                });
                s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
                s = s.replace(/(^|[^*])\*([^*\n]+)\*/g, '$1<em>$2</em>');
                return s;
            }

            while (i < lines.length) {
                const line = lines[i];
                if (!line.trim()) {
                    i++;
                    continue;
                }

                const fence = line.match(/^```(\w*)\s*$/);
                if (fence) {
                    i++;
                    const buf = [];
                    while (i < lines.length && !/^```\s*$/.test(lines[i])) {
                        buf.push(lines[i]);
                        i++;
                    }
                    i++;
                    const escaped = buf.join('\n').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                    const cls = fence[1] ? ' class="lang-' + fence[1] + '"' : '';
                    out.push('<pre><code' + cls + '>' + escaped + '</code></pre>');
                    continue;
                }

                const h = line.match(/^(#{1,6})\s+(.*)$/);
                if (h) {
                    out.push('<h' + h[1].length + '>' + inline(h[2]) + '</h' + h[1].length + '>');
                    i++;
                    continue;
                }

                if (/^\s*(?:-\s*){3,}\s*$/.test(line) || /^\s*\*{3,}\s*$/.test(line)) {
                    out.push('<hr>');
                    i++;
                    continue;
                }

                if (/^>\s?/.test(line)) {
                    const buf = [];
                    while (i < lines.length && /^>\s?/.test(lines[i])) {
                        buf.push(lines[i].replace(/^>\s?/, ''));
                        i++;
                    }
                    out.push('<blockquote>' + renderMarkdown(buf.join('\n')) + '</blockquote>');
                    continue;
                }

                if (bullet.test(line) || ordered.test(line)) {
                    const isOrdered = ordered.test(line);
                    const re = isOrdered ? ordered : bullet;
                    const items = [];
                    while (i < lines.length && re.test(lines[i])) {
                        const m = lines[i].match(re);
                        let item = m[3];
                        i++;
                        while (i < lines.length && lines[i].trim() && !bullet.test(lines[i]) && !ordered.test(lines[i])) {
                            item += '\n' + lines[i].trim();
                            i++;
                        }
                        items.push('<li>' + inline(item) + '</li>');
                    }
                    out.push((isOrdered ? '<ol>' : '<ul>') + items.join('') + (isOrdered ? '</ol>' : '</ul>'));
                    continue;
                }

                const buf = [line];
                i++;
                while (i < lines.length && lines[i].trim() && !/^#{1,6}\s/.test(lines[i]) && !/^>\s?/.test(lines[i]) && !bullet.test(lines[i]) && !ordered.test(lines[i]) && !/^```/.test(lines[i])) {
                    buf.push(lines[i]);
                    i++;
                }
                out.push('<p>' + inline(buf.join(' ')) + '</p>');
            }
            return out.join('\n');
        }

        // Block dispatcher. New block types (mermaid, embedded svg, etc.) plug in here.
        const renderers = {
            markdown: function (block) {
                const div = document.createElement('div');
                div.innerHTML = renderMarkdown(block.content);
                return div;
            }
            // future: mermaid: function (block) { ... }
        };

        data.blocks.forEach(function (block) {
            const r = renderers[block.type];
            if (!r) {
                const pre = document.createElement('pre');
                pre.textContent = '[unknown block type: ' + block.type + ']';
                root.appendChild(pre);
                return;
            }
            const node = r(block);
            if (node instanceof Node) root.appendChild(node);
        });
    })();
</script>
</body>
</html>
